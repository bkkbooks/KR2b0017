body:
  text: 皇王大紀卷六十七宋胡宏撰三王紀敬王三十六年齊國書髙無丕帥師伐魯及清季孫謂其宰冉求曰齊師在清必魯故也若之何求曰一子守二子從公禦諸竟季孫曰不能求曰居封疆之間二子不可求曰若不可則君無出一子帥師背城而戰不屬者非魯人也魯之羣室衆於齊之兵車一室敵車優矣子何患焉二子之不欲戰也宜政在季氏當子之身齊人伐魯而不能戰子之耻也大不列於諸侯矣季孫使從於朝待於黨氏之溝州仇呼而問戰焉對曰君子有遠慮小人何知何忌強問之對曰小人慮材而言量力而行者也州仇曰是謂我不成丈夫也退而搜乘季氏之甲七千冉求以武城人三百為已徒卒老幼守宫次于雩門之外公為遇負杖入保者息曰使之雖病也任之雖重也君子不能為謀也士不能死也吾既言之矣敢不勉乎師及齊師戰于郊公為與童汪錡往皆死焉齊師自稷不踰溝冉求之右樊遲曰非不能也不信子也請三刻而踰之衆從之冉有用矛遂入齊軍獲甲首八十齊人不能師冉求請從之三季孫弗許魯人欲勿殤童汪錡問於孔子子曰能執干戈以衛社稷雖欲勿殤也不亦可乎孔子在衛魯人以幣召孔子還魯侯問曰寡人生於深宫之中長於婦人之手未嘗知哀未嘗知憂未嘗知勞未嘗知懼未嘗知危也今欲知之亦有道乎孔子曰君入宗廟升阼階望榱棟視几筵而不見其人則哀可知矣夙興視朝一物失應亂亡之端則憂可知矣日出聽政至於中昃諸侯賔來行禮揖讓慎其威儀則勞可知矣緬然長思出於四門周章逺望亡國之墟必有數焉則懼可知矣夫君者舟也庶人者水也水所以載舟亦所以覆舟則危可知矣公曰請問為政孔子對曰政者正也君為正則百姓從政矣君之所為百姓之所從也君所不為百姓何從夫婦别父子親君臣嚴三者正則庶物從之矣公曰願聞所以行三言之道對曰古之為政愛人為大所以治愛人禮為大所以治禮敬為大敬之至矣大昏為大是故冕而親迎親之也君子興敬為親舍敬是遺親也弗愛不親弗敬不正愛與敬其政之本歟公曰冕而親迎不已重乎孔子愀然作色而對曰天地不合萬物不生合二姓之好以嗣先聖為天地社稷宗廟之主君何謂己重乎是故三代明王之政必敬其妻子也有道為政先禮禮其政之本歟公曰敢問君子何貴乎天道也孔子曰貴其不已也是故仁人之事親也如事天事天如事親是故孝子成身君子無不敬也敬身為大無不愛也愛人為大不能愛人不能有其身不能有其身不能安土不能安土不能樂天不能樂天則不能成其身公曰何為則民服孔子對曰舉直錯諸枉則民服舉枉錯諸直則民不服陳司徒轅頗賦封田以嫁公女有餘以為己大器國人逐之出奔鄭道渴其族轅咺進稻醴粱糗腵脯焉喜曰何其給也對曰器成而具曰何不吾諫曰懼先行吳將伐齊越王入朝王及列士皆有饋賂吳人皆喜伍員懼曰是豢吳也夫諫于王曰越在我心腹之疾也壤地同而有欲於我夫其柔服求濟其欲也不如早從事焉得志於齊猶獲石田也無所用之越不為沼吳其泯矣使醫除疾而曰必遺類焉者未之有也盤庚之誥曰其有顛越不恭則劓殄無遺育無俾易種於兹邑是商所以興也弗聽遂興師伐齊魯侯會之齊國書將中軍戰于艾陵大敗齊師獲國書公孫夏閭丘明陳書東郭書革車八百乘甲士三千以獻于公公使太史固歸國子之元吳王歸國賜伍員屬鏤員自殺盛以鴟夷投之江吳人莫不憐之越王曰吳可伐乎范蠡曰未可滕侯薨子某嗣衛世叔疾娶於宋子朝其娣嬖子朝出孔圉使疾出其妻而妻之疾使寺人誘其初妻之娣置諸犁孔圉怒奪其妻遂出奔宋魯季孫欲以田賦使冉求訪於孔子三發不應求曰子為國老待子而行若之何子之不言也孔子曰求先王制土籍田以力而砥其逺邇賦里以入而量其有無任力以夫而議其老幼鰥寡孤疾有軍旅然後徴之無則已其收田一井出稯禾秉芻缶米而已是故君子之行也度於禮施取其厚事舉其中斂從其薄以丘足矣若不度於禮而貪冒無厭雖以田賦將又不足且季孫若欲行而法則周公之典在若欲茍而行又何訪焉弗聽孔子間居四方之士前後就學者三千人升堂入室者七十二人德行顏回閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子遊子夏是為十哲而亞於夫子者顏子也顏子問仁子曰克己復禮為仁一日克己復禮天下歸仁焉顏子曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顏子曰回雖不敏請事斯語矣顏子問為邦子曰行夏之時乘殷之輅服周之冕樂則韶舞放鄭聲逺佞人鄭聲淫佞人殆顏子死子哭之曰噫天喪豫天喪豫從者曰子慟矣曰有慟乎非夫人之為慟而誰為孟子論曰禹稷當平世三過其門而不入孔子賢之顔子當亂世居於陋巷一簞食一瓢飲人不堪其憂顔子不改其樂孔子賢之孟子曰禹稷顔回同道禹思天下有溺者猶己溺之也稷思天下有飢者猶己飢之也是以如是其急也禹稷顔子易地則皆然仲尼燕居子張子貢言遊侍子曰居吾語女禮使女三人以禮周流無不遍也夫郊社之禮所以仁鬼神也嘗禘之禮所以仁昭穆也饋奠之禮所以仁死喪也鄉射之禮所以仁鄉黨也食饗之禮所以仁賔客也是故居處有禮故長幼别閨門有禮故三族和朝廷有禮故官爵序田獵有禮故戎事間軍旅有禮故武功成加於身而措於前凡衆之動得其宜夫禮者理也樂者節也君子無理不動無節不作不能詩於禮繆不能樂於禮素薄於德於禮虛兩君相見揖讓而入門入門而縣興揖讓而升堂升堂而樂闋下管象舞夏籥序興陳其薦爼序其禮樂備其百官如此而後君子知仁焉行中規還中矩和鸞中采齊客出以雍徹以振羽是知君子無物而不在禮矣入門而金作示情也升歌清廟示德也下而管象示事也是故古之君子不必親相與言也以禮樂相示而已子曰制度在禮文為在禮行之其在人乎子貢越席而對曰敢問夔其窮乎子曰達於禮而不達於樂謂之素達於樂而不達於禮謂之偏夫夔傳於此名也古之人也子張問政子曰君子明於禮樂舉而錯之而已矣子張復問子曰師爾以為必鋪几筵升降酌獻酬酢然後謂之禮乎爾以為必行綴兆興羽籥然後謂之樂乎言而履之禮也行而樂之樂也是故室則有奧阼席則有上下車則有左右行則有隨立則有序昔聖帝明王力此以南面而天下平矣孔子間居子夏侍問曰詩云愷悌君子民之父母何如斯可謂民之父母也子曰必逹於禮樂之原以致五至而行三無以橫於天下子夏曰何謂五至子曰志之所至詩亦至焉詩之所至禮亦至焉禮之所至樂亦至焉樂之所至哀亦至焉哀樂相生是故正明目而視之不可得而見也傾耳而聽之不可得而聞也志氣塞乎天地此之謂五至子夏曰何謂三無子曰無聲之樂無體之禮無服之喪子夏曰敢問何詩近之子曰夙夜基命宥密無聲之樂也威儀逮逮不可選也無體之禮也凡民有喪匍匐救之無服之喪也子夏曰三王之德參於天地敢問何如而可以參於天地乎子曰天無私覆地無私載日月無私照奉此三者以勞天下天有四時春夏秋冬風雨霜露無非教也地載神氣神氣風霆風霆流形庶物露生無非教也清明在躬志氣如神嗜欲將至有開必先天降時雨山川出雲是故三代之王也必先其令聞詩云明明天子令聞不已三代之德也子夏蹶然而起負墻而立曰弟子敢不承乎宰我問鬼神於孔子子曰氣者神之盛也魄者鬼之盛也氣發揚於上為昭明焄蒿此百物之精也神之著也衆生必死死必歸土此之謂鬼因物之精制為之極明命鬼神以為黔首則二端既立報以二禮建設朝事燔燎羶薌見以蕭光以報氣也薦黍稷羞肝肺首心間以俠甒加以鬱鬯以報魄也教民反古復始不忘其所由生也魯季孫求語於從祖叔母敬薑對曰吾聞之先姑曰君子能勞後世有繼子夏聞之曰善哉商聞之古之嫁者不及舅姑謂之不幸夫婦學於舅姑者禮也敬薑如季氏季孫在朝與之言弗應而入季氏入見曰肥也不得聞命無乃罪乎敬薑曰外朝者子所以業君之官職也內朝者子所以庀季氏之政也而寢門之內吾敢言乎公父文伯朝其母敬薑薑方績文伯諫敬薑曰瘠土之民勞勞則思而善心生沃土之民逸逸則淫而惡心生是故天子大采朝日與公卿祖識地德日中考政與師尹維旅牧伯相宣序民事少采夕月與太史司載糾虔天刑日入監九御共備祀事而後即安諸侯朝修王命晝考其國職夕省其典刑夜警百工使無慆淫而後即安卿大夫朝考職晝講政夕序業夜庀其家事而後即安士朝受業晝講貫夕復習夜計過無憾而後即安庶人明而動晦而休無日以怠王后親織玄紞公侯夫人加之以紘綖卿之內子為大𢃄命婦祭服列士之妻加之以朝服愆而有辟古之制也自上以下誰敢淫心舍力吾冀而朝夕修我今爾乃曰胡不自安余懼穆伯之絶祀也仲尼聞之曰弟子識之季孫之見敬薑也䦱門而與之言皆不踰閾祭悼子季孫與焉胙不受徹爼不宴宗不具不繹繹不盡飫則退仲尼聞之曰有别矣穆伯之喪敬薑晝哭文伯之喪晝夜哭仲尼聞之曰知禮矣仲尼與蠟賔事畢出遊于觀之上喟然而嘆言偃在側曰君子何歎子曰大道之行也與三代之英丘未之逮也而有志焉大道之行也天下為公選賢與能講信修睦故人不獨親其親不獨子其子使老有所終壯有所用幼有所長鰥寡孤獨廢疾者皆有所養男有所分女有所歸貨惡其棄於地也不必藏於己力惡其不出於身也不必為己故外户不閉是謂大同大道既隱天下為家各親其親各子其子貨力為己大人世及以為禮城郭溝池以為固以正君臣以篤父子以睦兄弟以和夫婦以功為己是謂小康禹湯文武成王周公由此其選也此六君子未有不謹於禮者言偃復問曰可得聞歟子曰我欲觀夏道是故之杞而不足徴也吾得夏時焉我欲觀殷道是故之宋而不足徴也吾得坤乾焉嗚呼我觀周道幽厲傷之吾舍魯何適矣魯之郊禘非禮也周公其衰矣杞之郊也禹也宋之郊也契也是天子之事守也故聖王修義之柏禮之序以治人情人情者聖人之田也修禮以耕之陳義以種之講學以耨之本仁以聚之播樂以安之故禮者義之實也協諸義而協禮雖先王未之有可以義起也義者仁之節也得之者強仁者義之本也得之者尊故治國不以禮猶無耜而耕也為禮而不本於義猶耕而弗種也為義而不講之以學猶種而弗耨也講之以學而不合之以仁猶耨而弗穫也合之以仁而不安之以樂猶穫而弗食也安之以樂而不達於順猶食而弗肥也父子篤兄弟睦夫婦和家之肥也大臣法小臣亷官職相序君臣相正國之肥也天子以德為車以樂為御諸侯以禮相與大夫以法相序士以信相考百姓以睦相守天下之肥也是謂大順故無水旱蟲螟之災人無凶飢妖孽之疾天不愛其道地不愛其寶人不愛其情故天降甘露地出醴泉山出器車河出馬圗鳯凰麒麟皆在郊棷龜龍在宫沼此之謂大順明於順然後能守危也魯禘孔子曰禘自既灌而往者吾不欲觀之矣或問禘之説子曰不知也知其説者之於天下也其如示諸斯乎指其掌祭如在祭神如神在子曰吾不與祭如不祭孔子曰禘者帝王之大祭也仲尼嘗奉薦而進其親也慤其行趨趨以數己祭子貢問曰子之言祭濟濟漆漆然今子之祭如是何也子曰濟濟者容也逺也漆漆者容也自反也容以逺若容以自反夫何恍惚之有乎反饋樂成薦其薦爼序其禮樂備其百官君子致其濟濟漆漆夫何神明之及交夫言豈一端而已夫各有所當也孝子將祭百物既備夫婦齊戒沐浴盛服奉承而進之洞洞乎如弗勝如將失之於是諭其志意以其恍惚以與神明交庶或饗之孝子之志也進退必敬如親聽命則或使之然也其立之也敬以詘其進之也敬以愈其薦之也敬以欲退而立如將受命已徹而退敬齊之色不絶於靣陶陶遂遂如將復入然孝子之有親愛者必有和氣有和氣者必有愈色有愈色者必有婉容孝子如執圭如奉盈洞洞屬屬如弗勝如將失之嚴威儼恪非所以事親也成人之道也孔子謂季氏八佾舞於庭是可忍也孰不可忍也三家以雍徹孔子曰相維辟公天子穆穆奚取於三家之堂林放問禮之本子曰大哉問禮與其奢也寧儉喪與其易也寧戚季氏旅於泰山子謂冉有曰女弗能救與對曰不能子曰嗚呼曾謂泰山不如林放乎季孫問政於孔子子曰政者正也子帥以正孰敢不正季孫患盜問於孔子子曰苟子之不欲雖賞之不竊季孫曰如殺無道以就有道何如子曰子為政焉用殺子欲善而民善矣君子之德風小人之德草草上之風必偃季孫問曰使民敬忠以勸如之何子曰臨之以莊則敬孝慈則忠舉善而教不能則勸孔子言衛靈公之無道也季孫曰夫如是奚而不喪子曰仲叔圉治賔客祝鮀治宗廟王孫賈治軍旅夫如是奚其喪季孫問仲由可使從政也與子曰由也果於從政乎何有曰賜也可使從政也與子曰賜也達於從政乎何有曰求也可使從政也與曰求也藝於從政乎何有仲孫何忌問孝子曰無違樊遲御子告之曰孟孫問孝於我我對曰無違樊遲曰何謂也子曰生事之以禮死葬之以禮祭之以禮何忌子彘問孝子曰父母惟其疾之憂彘問季路仁乎子曰不知也又問子曰千乘之國可使治其賦也不知其仁也求也何如子曰求也千室之邑百乘之家可使為之宰也不知其仁也赤也何如子曰赤也束帶立於朝可使與賔客言也不知其仁也季路冉有曾晳公西華侍坐子曰以吾一日長乎爾毋吾以也居則曰不吾知也如或知爾則何以哉子路率爾而對曰千乘之國攝乎大國之間加之以師旅因之以飢饉由也為之比及三年可使有勇且知方也夫子哂之求爾何如對曰方六七十如五六十求也為之比及三年可使足民如其禮樂以俟君子赤爾何如對曰非曰能之願學焉宗廟之事如會同端章甫願為小相焉點爾何如鼓瑟希鏗爾舍瑟而作對曰異乎三子者之撰子曰何傷乎亦各言其志也曰暮春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸夫子喟然嘆曰吾與點也三子出曾晳後曰夫三子者之言何如子曰亦各言其志也已矣曰夫子何哂由也曰為國以禮其言不讓是故哂之唯求則非邦也與安見方六七十如五六十而非邦也者唯赤則非邦也與宗廟會同非諸侯而何赤也為之小孰能為之大子貢問政子曰足食足兵民信之矣子貢曰必不得已而去於斯三者何先曰去兵子貢曰必不得已而去於斯二者何先曰去食自古皆有死民無信不立子張問政子曰居之無倦行之以忠子路問政子曰先之勞之請益曰無倦子貢為信陽宰子曰勤之慎之仲弓為季氏宰問政子曰先有司赦小過舉賢才曰焉知賢才而舉之曰舉爾所知爾所不知人其舍諸子夏為莒父宰問政子曰無欲速無見小利欲速則不達見小利則大事不成子路治蒲三年孔子過之入其境曰善哉田疇易草萊辟溝洫深民盡力也恭敬以信矣入其邑曰善哉墻屋固樹木茂民不偷也忠信以寬矣至其庭曰善哉由也清聞諸下用命令不擾也明察以斷矣宓不齊為單父宰父事者三人兄事者五人友事者十一人稟度者五人孔子大之曰此堯舜所以聽天下也宓有才智而仁愛百姓不忍欺孔子曰君子哉言偃為武城宰孔子過之聞絃歌之聲莞爾而笑曰割雞焉用牛刀子遊對曰昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使也子曰二三子偃之言是也前言戲之耳問言偃曰女得人焉爾乎曰有淡臺滅明者行不由徑非公事未嘗至於偃之室也子曰鳯鳥不至河不出圖吾已矣夫又曰甚矣吾衰也久矣吾不復夢見周公又曰茍有用我者期月而已可也三年有成又曰道不行乘桴浮于海從我者其由與子路聞之喜子曰由也好勇過我無所取材子曰夷狄之有君不如諸夏之亡也子欲居九夷或曰陋如之何曰君子居之何陋之有孔子悼道之不行謂門弟子曰我欲載之空言不如見諸行事之深切著明也於是案魯春秋核當世之事而加筆削焉遊夏之徒不能贊一辭也是嵗洛絶于周淇絶于衛經曰十有一年春齊國書帥師伐我諸侯來伐無有不書四鄙者今齊師及清涉泗非有城下之盟可諱之辱亦書伐我何也傳説復于髙宗曰惟甲胄起戎惟干戈省厥躬夫省厥躬者自反之謂也自反而縮則為壯自反而不縮則為老師之老壯在曲直曲直在我而不繫乎人者也邾子齊之甥魯嘗入邾以其君來齊人為是取歡及闡請師於吳曲在我矣及歸邾益而齊人歸歡及闡又辭吳師直在齊矣魯人何名會吳伐之也故春秋之記斯師特曰伐我者欲省致師之由而躬自厚也垂訓之義大矣夏陳轅頗出奔鄭五月公會吳伐齊甲戌齊國書帥師及吳戰于艾陵齊師敗績獲齊國書秋七月辛酉滕子虞母卒冬十有一月葬滕隱公衛世叔齊出奔宋皇王大紀卷六十七

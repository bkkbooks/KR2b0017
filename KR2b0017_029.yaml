body:
  text: 皇王大紀卷二十九宋胡宏撰三王紀孝王三年甲寅惡來之後有非子者居犬丘好馬畜善養息之王命主馬於汧渭之間馬大蕃息王邑之􅪮為附庸使續伯益之後號秦王之世大雹江漢冰牛馬死十三年甲子十五年王崩諡曰孝王公卿諸侯立懿王太子燮夷王元年先王之制諸侯朝于天子天子不下堂王始下堂而見諸侯王室浸衰諸侯相侵伐或不來朝八年甲戌荆熊繹之五世孫曰熊渠甚得江漢民和於是西伐庸東侵揚粵拓地至于鄂立其三子自為王居江上宋微仲曽孫湣公共舍長子弗父何而立弟熙湣公薨熙為君弟鮒弒之以國授弗父何弗父何弗受鮒自立衛頃公康叔之七世孫也衛首壞王制并邶鄘之地邶國風首篇曰柏舟五章章六句言仁而不遇也衛頃公之時仁人不遇小人在側泛彼柏舟柏宜為舟者泛流貌亦泛其流言不以濟渡也耿耿不寐如有隱憂微我無酒以遨以遊我心匪鑒不可以茹度也亦有兄弟不可以據依也薄言往訴逢彼之怒我心匪石不可轉也石雖堅尚可轉我心匪席不可卷也席雖平尚可卷威儀棣棣富而間習也不可選也數也憂心悄悄憂貌愠怒也于羣小覯閔病也既多受侮不少靜言思之寤辟拊心有摽拊心之貌日居月諸胡迭而微心之憂矣如匪浣衣如衣之不浣靜言思之不能奮飛頃公薨子僖侯嗣十六年王崩諡曰夷王子胡立厲王二年甲申十二年甲午大雅十九篇曰民勞五章十句召穆公刺厲王也民亦勞止汔危也或幾也可小康惠此中國以綏四方無縱詭隨以謹無良詭人之善隨人之惡慎小以懲大也式遏寇虐憯曽也不畏明柔逺能邇以定我王民亦勞止汔可小休惠此中國以為民逑合也聚也無縱詭隨以謹惛怓大亂也式遏寇虐無俾民憂無棄爾勞以為王休民亦勞止汔可小息惠此京師以綏四國無縱詭隨以謹罔極式遏寇虐無俾作慝惡也敬慎威儀以近有德民亦勞止汔可小愒息也惠此中國俾民憂泄去也無縱詭隨以謹醜衆也厲危也或惡也式遏寇虐無俾正敗戎猶女也雖小子而式用也𢎞大民亦勞止汔可小安惠此中國國無有殘無縱詭隨以謹繾綣反覆也式遏冦虐無俾正反王欲玉女是用大諌凡伯周公之𦙍也入為王之卿士大雅二十篇曰板八章章八句凡伯刺厲王也上帝君也板板反也下民卒疸病也勞也出話善言也不然不行也為猶道也不逺靡聖管管無所依也不實於亶誠也猶圖也之未逺是用大諌天之方難無然憲憲猶欣欣也天之方蹶動也無然泄泄猶沓沓也辭之輯和也矣民之洽矣合也辭之懌矣說也民之莫定也矣我雖異事及爾同寮我即爾謀聽我囂囂猶謷謷也我言維服事也勿以為笑先民有言詢于芻蕘薪采也天之方虐無然謔謔老夫灌灌猶欵欵也小子蹻蹻驕貌匪我言耄老耄也爾用憂謔多將熇熇熾盛也不可救藥天之方懠無為夸毗威儀卒迷善人載尸民之方殿呻吟也屎則莫我敢葵喪亂蔑資無財也曾莫惠我師天之牖道也民如塤如篪相和也如璋如圭相合也如取如攜言必從也攜無曰益牖民孔易民之多辟無自立辟法也價善也人維藩屏也大師維垣牆也大邦維屏大宗維翰王者天下之大宗幹也懷德維寧宗子維城無俾城壞無獨斯畏敬天之怒無敢戲豫逸豫也敬天之渝無敢馳驅自恣也昊天曰明及爾出王往也昊天曰旦及爾游衍游溢也二十二年甲辰大雅二十一篇曰蕩八章章八句召穆公傷周室大壞也厲王無道天下蕩蕩無綱紀文章故作是詩也蕩蕩上帝託言王也下民之辟君也疾威疾病威罪也上帝其命多辟天生蒸民其命匪諶誠也靡不有初鮮克有終文王曰咨咨汝殷商曽是彊強梁也禦奪也曽是掊克曾是在位列位曾是在服事也天降滔慢也德女興是力文王曰咨咨汝殷商而秉義類彊禦多懟流言以對遂也寇攘式內侯作侯祝祝詛也靡届靡究文王曰咨咨汝殷商女炮烋猶彭亨也于中國斂怨以為德不明爾德時無背無側後無臣側無人也爾德不明以無陪無卿無陪二無卿士也文王曰咨咨汝殷商天不湎爾以酒不義從式既愆爾止靡明靡晦式號式呼俾晝作夜文王曰咨咨女殷商如蜩如螳如沸如羮小大近喪人尚乎由行內奰不醉而怒曰奰于中國覃及鬼方逺也文王曰咨咨女殷商匪上帝不時殷不用舊雖無老成人尚有典刑曽是莫聽大命以傾文王曰咨咨女殷商人亦有言顛沛仆也拔也之揭見根貌枝葉未有害本實先撥猶絶也殷鍳不逺在夏后之世陳胡公四世孫幽公寧立陳國風首篇曰宛丘三章章四句刺幽公也淫荒昏亂游蕩無度焉子之湯蕩也兮宛丘四方髙中央下曰宛之上兮洵信也有情兮而無望兮坎擊鼓聲其擊鼓宛丘之下無冬無夏值持也其鷺羽舞者所持之翳以鷺羽為之坎其擊缶盡也宛丘之道無冬無夏值其鷺翿翳也陳國風二篇曰東門之枌三章章四句疾亂也幽公淫荒風之所行男女棄其舊業亟㑹於道路歌舞於市井爾東門之枌白榆也宛丘之栩杼也國之交㑹子仲陳大夫氏之子婆娑舞也其下榖善也旦于差擇也南方之原原大夫氏不績其麻市也婆娑榖旦于逝越以鬷數也邁行也視爾如荍芘芣也貽我握椒芬香也二十六年衛僖侯薨世子共伯蚤死其弟和嗣能修康叔之政百姓安集大雅二十二篇抑十二章三章章八句九章章十句衛武公刺厲王亦以自警也抑抑密也審諦也威儀維德之隅廉也人亦有言靡哲不愚國有道則智無道則愚庶人之愚亦職主也維疾哲人之愚亦維斯戾罪也無競競也維人四方其訓之有覺直也德行四國順之訏大也謨定命逺猶道也圖也辰時也告敬慎威儀維民之則其在于今興迷亂于政顛覆厥德荒湛于酒女雖湛樂從弗念厥紹繼也罔敷求先王克共明刑共執刑法也肆皇天弗尚如彼泉流無淪率也胥以亡夙興夜寐灑掃庭內維民之章表也修爾車馬弓矢戎兵用戒戎作用逖逺也蠻方質成也爾人民謹爾侯度用戒不虞非度也慎爾出話善言也敬爾威儀無不柔嘉白圭之玷尚可磨也斯言之玷不可為也無易由言無曰茍矣莫捫持也朕舌言不可逝矣無言不讎用也無德不報惠于朋友庶民小子子孫繩繩萬民靡不承視爾友君子輯和也柔爾顔不遐有愆相在爾室尚不愧于屋漏西北隅謂之屋漏或曰屋小帳也漏隱也無曰不顯莫豫云覯神之格至也思不可度思矧可射思辟法也爾為德俾臧俾嘉淑慎爾止至也不愆于儀不僣差也不賊鮮不為則投我以桃報之以李彼童而角童羊之無角者而角自用也實虹潰也亂也小子荏染柔木柔忍之木言緡被也之絲溫溫恭人維德之基其維哲人告之話言善言也順德之行其維愚人覆反也謂我僣不信也民各有心於乎小子未知臧否匪手攜之言示之事匪面命之言提其耳借假也曰未知亦既抱子民之靡盈誰夙早也知而莫晚也成昊天孔昭我生靡樂視爾夢夢亂也我心慘慘不樂也誨爾諄諄聽我藐藐不入也匪用為教覆用為虐借曰未知亦聿既耄老也於乎小子告爾舊止聽用我謀庶無大悔天方艱難曰喪厥國取譬不逺昊天不忒回遹其德俾民大棘鄘國風首篇曰柏舟二章章七句共姜自誓也衛世子共伯早死其妻守義父母欲奪而嫁之誓而弗許故作是詩以絶之泛彼柏舟在彼中河髧兩髦之貌彼兩髦髮至眉子事父母之飾實維我儀匹也之死矢靡它至死誓無它心母也天父也只不諒信也人只泛彼柏舟在彼河側髧彼兩髦實維我特匹也之死矢靡慝邪也母也天只不諒人只二十八年齊侯山薨哀公母弟也諡曰獻侯二十一年王說榮夷公芮良夫曰榮夷公好專利而不知大難夫利百物之所生也天地之所載也王人導利而布之上下使神人百物無不得其極猶日恐懼怨之來也今王學專利而不辟大難其可也匹夫專利猶謂之盜王而行之其歸鮮矣王卒以榮夷公為卿士政益暴虐大雅二十三篇曰桑柔十六章八章章八句八章章六句芮伯刺厲王也菀茂也彼桑柔其下侯大也旬言隂均也捋采其劉殺也陳也瘼病也此下民不殄絶大除也心憂倉創也兄滋也填兮塞也久也倬明大貌彼昊天寧不我矜四牡騤騤不息也旟旐有翩行不息貌亂生不夷平也靡國不泯滅也民靡有黎齊也具俱也禍以燼災餘也於乎有哀國步斯頻急也國步蔑資基也天不我將靡所止疑定也云徂何往君子實維秉心無競強也誰生厲惡也階至今為梗病也憂心殷殷念我土宇我生不辰逢天僤厚也怒自西徂東靡所定處多我覯􅢌孔棘我圉埀也為謀為毖慎也亂況斯削告爾憂恤誨爾序爵誰能執熱逝不以濯濯所以救熱禮所以救亂其何能淑載胥及溺如彼遡鄉也風亦孔之僾唈也不能舒息也民有肅心荓使也云不逮好是稼穡力民代食稼穡維寶代食維好天降喪亂滅我立王降此蟊賊蟲食根曰蟊食節曰賊稼穡卒盡也癢病也哀恫痛也中國具贅連屬也卒荒虗也靡有旅力以念穹蒼維此惠君民人所瞻秉心宣遍也猶謀也考慎其相質也或曰輔相也維彼不順自獨俾臧使人謂我善也自有肺腸俾民卒狂瞻彼中林甡甡衆多成群也其鹿朋友已譖不胥以榖相欺背不以善相與人亦有言進退維谷窮也維此聖人瞻言百里逺慮也維彼愚人覆狂以喜匪言不能胡斯畏忌維此良人弗求弗迪進也維彼忍心是顧是復民之貪亂寧為荼毒大風有隧道也有空大谷維此良人作為式穀維彼不順征以中垢言暗冥也大風有隧貪人敗類善也聽言則對誦言如醉匪用其良覆反也俾我悖嗟爾朋友豫豈不知而作如彼飛蟲時亦弋獲既之隂女反豫來赫炙也民之罔極職凉薄也善背為民不利如云不克民之回遹職競用力民之未戾定也職盜為冦凉曰不可覆背善詈雖曰匪豫既作爾歌三十二年甲寅三十四年時荆楚冦於南獫狁冦於北淮夷冦於東命虢公征之不克徴斂數起虐用其民民不堪命聚議而興謗召穆公以告王怒得衛巫使糾謗者收殺之人莫敢言道路以目王喜曰吾能弭謗矣穆公對曰古者天子聽政使公卿至于列士獻詩瞽獻典史獻書師針瞍賦矇誦百工諫庶人傳語近臣盡規親戚補察瞽史教誨耆艾修之而後王斟酌焉是以行事而不悖民之有口猶土之有川也川壅而潰傷人必多民亦如之是故善為川者决之使導善為民者宣之使言今王障之其與能幾何王不聽二十七年京師憒憒王無所容乃流于彘在汾水之上實河東永安天下莫與太子靜保于召穆公之宫穆公素得民心與周公奉太子監國訓諭國人國人乃定二伯行政謂之共和諸侯相侵伐或朝或不朝三十八年晉虞叔六世孫司徒立是為僖公唐國風首篇曰蟋蟀三章章八句刺晉僖公也儉不中禮故作是詩以閔之欲其及時以禮自娛樂也此晉也而謂之唐本其風俗憂深思逺儉而用禮有堯之遺風焉蟋蟀蛬也在堂九月嵗聿遂也其莫今我不樂日月其除去也無已甚也太康樂也職主也思其居好樂無荒大也良士瞿瞿瞿瞿然顧禮義也蟋蟀在堂嵗聿其逝今我不樂日月其邁無已太康職思其外禮樂之外好樂無荒良士蹶蹶動而敏於事蟋蟀在堂役車其休今我不樂日月其慆過也無已大康職思其憂可憂也好樂無荒良士休休樂道之心秦非子曾孫仲好賢用兵攻奪西戎地其邑始大秦國風首篇曰車鄰美秦仲也秦仲始大有車馬禮樂侍御之好焉有車鄰鄰衆車聲有馬白顛的顙也未見君子寺人內小臣之令阪陂者曰阪有漆隰有栗既見君子竝坐鼓瑟又見其禮樂焉今者不樂逝者其耋老也阪有桑隰有楊既見君子並坐鼓簧笙也今者不樂逝者其亡喪棄也四十二年甲子王在彘五十一年王死于彘諡曰厲王周召二伯知太子之有志也遂奉太子即位是嵗旱皇王大紀卷二十九

body:
  text: 皇王大紀卷四十一宋胡宏撰三王紀襄王元年春正月丁丑宋公薨諡曰桓公兹父嗣衛國風七篇曰河廣二章章四句宋襄公母歸于衛思而不止故作是詩也誰謂河廣一葦杭之杭渡也誰謂宋遠跂豫望之誰謂河廣曾不容刀誰謂宋逺曾不崇朝邶國風十四篇曰泉水四章章六句衛女思歸也嫁於諸侯父母終思歸寧而不得故作是詩以自見也毖彼泉水亦流于淇興也泉水始出毖然流于淇淇水名也有懷于衛靡日不思孌彼諸姬聊與之謀孌好諸姬同姓之女聊願也出宿于泲飲餞于禰泲地名祖而舍軷飲酒於其側曰餞重始有事於道也禰地名女子有行遠父母兄弟問我諸姑遂及伯姊父之姊妹稱姑先生曰姊出宿于干飲餞于言干言所適國郊也載脂載舝還車言邁脂舝其車以還我行也遄臻于衛不瑕有害遄疾臻至瑕遠也我思肥泉兹之永歎所出同所歸異為肥泉思須與漕我心悠悠須漕衛邑也駕言出遊以寫我憂寫除也衛國風五篇曰竹竿四章章四句衛女思歸也適異國而不見答思而能禮者也籊籊竹竿以釣于淇興也籊籊長而殺也釣以得魚如婦人之待禮以成為室家豈不爾思逺莫致之泉源在左淇水在右泉源小水之源淇水大水也女子有行逺兄弟父母淇水在右泉源在左巧笑之瑳佩玉之儺瑳巧笑貌儺行有節度淇水悠悠檜楫松舟悠悠流貌檜柏葉松身楫所以櫂舟也舟楫相配得水而行男女相配得禮而備駕言出遊以寫我憂出遊思鄉衛之道王使宰周公㑹齊侯宋子衛侯鄭伯許男曹伯于葵丘夏五月乙酉魯伯姬卒秋七月戊辰齊侯盟諸侯于葵丘初命曰誅不孝無易樹子無以妾為妻再命曰尊賢育材以彰有德三命曰敬老慈幼無忘賔旅四命曰士無世官官事無攝取士必得無專殺大夫五命曰無曲防無遏糴無有封而不告曰凡我同盟之人既盟之後言歸于好諸侯咸喻乎齊侯之志甲不解纍兵不解翳韜無弓服無矢束牲載書而不㰱血王使宰周公孔賜齊侯胙曰天子有事于文武使孔賜伯舅胙齊侯將下拜孔曰且有後命天子使孔曰以伯舅耋老加勞賜一級無下拜齊侯顧管仲管仲進曰臣不進禮亂之本也齊侯對曰天威不違顔咫尺小白敢貪天子之命無下拜恐隕越于下以遺天子羞敢不下拜下拜登受於是宋桓公未葬而襄公㑹諸侯故曰子凡在喪王曰小童公侯曰子甲子晉侯薨諡曰獻公奚齊嗣秦伯使人弔公子重耳且曰寡人聞之亡國恆於斯得國恆於斯雖吾子儼然在憂服之中喪亦不可久也時亦不可失也孺子其圗之以告舅犯舅犯曰孺子其辭焉喪人無寶仁親以為寶父死之謂何又因以為利天下其孰能說之孺子其辭焉公子重耳對客曰君惠弔亡臣重耳身喪父死不得與於哭泣之哀以為君憂父死之謂何或敢有他志以辱君命稽顙而不拜哭而起起而不私子顯以致命于秦伯秦伯曰仁夫公子重耳稽顙而不拜則未為後也故不成拜哭而起則愛父也起而不私則逺利也初獻公使荀息傅奚齊公疾召之曰以是藐諸孤辱在大夫其若之何對曰臣竭其股肱之力加之以忠貞其濟君之靈也不濟則以死繼之里克丕鄭將殺奚齊告息曰三怨將作秦晉輔之子將何如曰將死之克曰無益也息曰吾與先君言矣我欲無二而能謂人已乎克殺奚齊于次息立公子卓以葬經曰九年春王三月丁丑宋公御說卒夏公㑹宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘其曰宰周公者以冢宰兼三公也古者三公無其人則以六卿之有道者上兼師保之任冢宰或闕亦以三公下行端揆之職夫以冢宰兼三公其職任重矣而不殊㑹之何也人臣則有進退之節出入均勞之義非王世子貴有常尊之可比矣秋七月乙酉伯姬卒九月戊辰諸侯盟於葵丘㑹盟同地再言葵丘何也書之重辭之復其中必有大美惡焉葵丘之盟美之大者也觀五禁初命之詞則知桓公翼戴襄王之事信矣甲子晉侯佹諸薨晉里克殺其君之子奚齊榖梁子曰其君之子云者國又不子也不正其殺申生而立之也人君擅一國之名竄為其所于則當子矣國人何為不子也民至愚而神天理根于人心雖以私欲滅之而有不可滅也春秋書此以明獻公之罪抑人欲之私示天理之公為後世戒其義大矣以此防民猶有欲易太子而立趙王如意致夫人之為人彘者二年冬十一月魯侯如齊溫子叛王即狄又不能於狄狄人伐之王不救狄遂滅溫溫子奔衛里克殺卓子于朝荀息死之齊侯以諸侯之師伐晉及髙梁而還里克使召重耳子犯曰以喪求國是樂喪也以亂求人是喜亂也喜怒哀樂易節何以導民公子曰非喪誰繼非亂誰納子犯曰哀在父母為大喪讒在兄弟為大亂大喪大亂之罰不可犯也乃辭使者郤芮使夷吾重賂秦以求入秦伯納之謂公孫枝曰夷吾其定乎對曰臣聞之唯則定國今其言多忌克難哉齊侯許男伐北戎晉侯使謂里克曰微子則不及此雖然子弒二君與一大夫為子君者不亦難乎對曰不有廢也君何以興欲加之罪其無辭乎臣聞命矣伏劍而死晉侯悔之曰芮也使寡人過殺我社稷之鎮魯大雨雪經曰十年春王正月公如齊狄滅溫溫子奔衛晉里克弒其君卓國人不君奚齊卓子而曰里克弒其君卓何也是里克君之也克者世子申生之傅也孋姬將殺世子而難里克使優施飲之酒而告之以其故里克聽其謀欲以中立自免稱疾不朝居三旬而難作是謂持祿容身速獻公殺適立庶之禍者故成其君臣之名以正其弒逆之罪克雖欲辭而不受其可得乎使克明於大臣之義據經廷諍以動其君執節不二固太子以攜其黨多為之故以變其志其濟則國之福也其不濟而死於其職亦無歉矣人臣所明者義於功不貴幸而成所立者節於死不貴幸而免克欲以中立祈免自為智矣而終亦不能免等死耳不死於世子而死於弒君其亦不知命之蔽哉語曰不知命無以為君子也為人臣而不知春秋之義者必陷於篡弒誅死之罪克之謂矣及其大夫荀息荀息者奚齊卓子之傅也君弒而死於難書及所以著其節書大夫不失其官也於荀息何取焉若息者可謂不食其言矣或曰息既狥君為昏不食其言庸取乎世衰道微人愛其情私相疑二以成傾危之俗至於刑牲㰱血要質鬼神猶不能固其約也孰有可以託六尺之孤寄百里之命臨死節而不可奪如息者哉自古皆有死民無信不立故聖人以信易食而君子以信易生息不食言其可少乎夏齊侯許男伐北戎晉殺其大夫里克里克殺二君與一大夫不以討賊之詞書者惠公殺之不以其罪也殺之不以其罪奈何里克所為弒者為重耳也夷吾曰是又將殺我也則謂克曰爾既殺乎二孺子矣又將圖寡人為爾君者不亦病乎里克對曰不有廢也君何以興欲加之罪何患無詞臣聞命矣伏劍而死若惠公既立而謂克曰先君命大夫為世子傳世子死非其罪而大夫不知恤若奚齊者既有先君之命矣而大夫又殺之以及卓大夫雖殺之獨不念先君之命乎則克必再拜而死不復有言矣惠公乃曰又將圗寡人是殺之不以其罪也故稱國以殺而不去其官秋七月冬大雨雪三年里克之死丕鄭在秦言於秦伯曰呂甥郤稱冀芮實為不從若重問以召之臣出晉君君納重耳蔑不濟矣秦伯使泠至從丕鄭報問且召三子郤芮曰幣重而言甘誘我也遂殺丕鄭祈舉及七輿大夫鄭之子豹奔秦王使召武公及內史過賜晉侯夷吾命晉侯執玉卑拜不稽首吕甥郤芮相不敬過歸告王曰晉不亡其君必無後吕郤將不免王曰何故對曰長衆使民之道祓除其心以精之忠以立之禮以順之信以行之晉侯以惡實心施其所惡不敬王命背賂虐處替其鎮誣其王矣夫天事恆象任重享大者必速及大臣享其祿弗諫而阿之亦必及焉魯侯及其夫人會齊侯於陽榖六月魯大雩王子帶濳與伊雒之戎伐成周秦晉伐戎以救周黃恃諸侯之睦於齊也曰自郢及我九百里焉能害我不歸楚貢楚人伐黃齊侯燕管仲酒三行仲趨出公反之曰仲父年長寡人亦衰願一朝安仲父也仲對曰臣聞沈於樂者反於憂厚於味者薄於德壯而怠則失時老而懈則無名順天之道必以善終公曰善於是齊侯頗驕溢怠於政事仲因曰國有事終日而君不聞則堂上遠於百里十日而君不聞則堂上逺於千里三月而君不聞則門庭逺於萬里如是而不亂亡者未之有也是故黃帝立明堂之議堯有衢室之問舜有告善之旌禹立建鼓於朝湯有總街之訊武王有靈臺之復所以開視聽廣聰明也請立嘖室目曰法簡而易行事約而易從求寡而易足刑審而不犯人有非上之過謂之正士名曰嘖室之議經曰十有一年春晉殺其大夫丕鄭父按左氏丕鄭言於秦伯請出晉君則鄭有罪矣曷為稱國以殺而不去其官惠公以私意殺里克故其黨皆懼鄭之有此謀由殺里克致之也春秋以大義公天下為誅賞故書法如此其稱國者兼罪用事大夫不能格君心之非至於多忌濫刑危其國也夏公及夫人姜氏會齊侯于陽榖襄陵許翰曰先乎陽榖之㑹為大雨雪後乎陽榖之㑹為大雩僖公賢君不能禮佐齊桓警其怠忽而更與之俱肆于寵樂是以見戒于天如此以公夫人陽榖之㑹觀之齊桓霸業怠矣故楚人伐黃不能救凡此類屬詞比事直書于䇿而義自見者也秋八月大雩冬楚人伐黃按榖梁子曰貫之盟管敬仲言於桓公江黃逺齊而近楚楚為利之國也若伐而不能救則無以宗諸侯矣桓公不聽遂與之盟管仲死楚伐江滅黃桓公不能救故君子閔之也遠國慕義背夷即華所謂出自幽谷遷于喬木春秋之所取也被兵城守史歷三時告命已至而援師不出則失救患分災攘夷狄安與國之義矣滅弦滅溫皆不書伐滅黃而書伐者罪桓公既與㑹盟而又不能救也四年春正月庚午日有食之召陵之盟管仲言於齊侯曰江黃遠齊而近楚君必歸之不歸而楚伐之則不得不救救而不及則無以宗諸侯矣齊侯不從夏楚人滅黃齊不能救王以戎難故討叔帶叔帶奔齊齊侯使管仲平戎于王王饗以上卿之禮仲辭曰臣賤有司也有天子之二守國髙在若節春秋來承王命何以禮焉陪臣敢辭王曰舅氏余嘉乃勳應乃懿德謂督不忘往踐乃職毋逆朕命仲受下卿之禮而還論曰諸侯之不得僭天子大夫之不得僭諸侯猶趾掌之不可為股肱股肱之不可為元首也愚觀管仲齊桓下拜及此辭饗之事可為恭矣而為鏤簋朱紘山節藻梲塞門反坫三歸不攝之僭何歟霸者務施報圗大權而共小節據實勢而崇虛名者也仲相桓公匡王室封諸侯號令天下幾於改物故桓公尊寵之而賜以羣臣不得用之禮也仲奪伯氏駢邑三百飯疏食飲水沒齒無怨言雖㑹盟征伐歲臨而能使齊常冠於諸侯賦斂輕減府庫充實百姓富庶賢才服其能小民懷其惠矣故斯禮也國人以為宜賜管仲以為當得莫有知其非者孔子譏之曰管仲之器小哉管氏而知禮孰不知禮所以明王霸異道義利異途示後人以天理之所在使人欲不得而汨之也冬十月丁丑陳侯薨子欵嗣星晝墜于秦有聲經曰十有二年春王三月庚午日有食之夏楚人滅黃春秋滅人之國其罪則一而見滅之君其例則三以歸者既無死難之節又無克復之志貪生畏死甘就執辱其罪為重許斯頓牂之類是也出奔者雖不死社稷有興復之望焉託於諸侯猶得寓禮其罪為輕弦子溫子之類是也若夫國滅死於其位是得正而斃焉者矣於禮為合於時為不幸若江黃二國是也其書滅者見蠻夷之强罪諸侯之弱責方伯連師之不修其職使小國賢君困於强暴不得其所公羊子所謂亡國之善詞上下之同力者也秋七月冬十有二月丁丑陳侯杵臼卒五年甲戌狄侵衛春三月陳葬其君宣公淮夷病把齊侯㑹宋公魯侯陳侯衛侯鄭伯許男曹伯于鹹以謀救杞且謀王室也為戎難故諸侯戍周齊仲孫湫致之秋七月魯大雩魯季友如齊晉薦饑乞糴于秦秦伯謂百里奚與諸乎對曰天災流行國家代有救災恤鄰道也行道有福秦於是輸粟于晉自雍及絳相繼經曰十有三年春狄侵衛齊桓公為陽榖之㑹是肆其寵樂其行荒矣楚人伐黃而救兵不起是忽于簡書其業怠矣然後狄人窺伺中國今年侵衛明年侵鄭近在王都之側淮夷亦來病杞而不忌也伯益戒于舜曰無怠無荒四夷來王此至誠無息帝王之道春秋之法也齊桓晉文若此類者其事則直書于策其義則遊聖門者默識於言意之表矣故曰仲尼之徒無道桓文之事者夏四月葬陳宣公公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯于鹹秋九月大雩冬公子友如齊六年齊侯宋公魯侯陳侯衛侯鄭伯許男曹伯帥師城緣陵而遷把焉齊侯與之車百乘甲一千夏四月魯侯使季姬見鄫子于防季姬使鄫子來朝六月辛卯晉沙鹿崩卜偃曰期年將有大咎幾亡國狄侵鄭蔡侯薨子甲午嗣秦饑乞糴于晉晉侯弗與慶鄭曰背施幸災民所棄也近猶讎之况怨敵乎弗聽經曰十有四年春諸侯城緣陵齊桓公城三國而書詞不同城楚丘則沒諸侯而不書城緣陵則書諸侯而不序城邢則再序三國之師何也邢以自遷為文故再列三師而書城邢者美其得救患分災之義無封國之嫌也淮夷病杞諸侯㑹于鹹城緣陵而遷杞焉則其事專矣故前目後凡直書諸侯而不序也是故以功言之則楚丘為大以義言之則城邢為美春秋之法明其道不計其功正其義不謀其利者也詳著城邢之師而深沒楚丘之迹貴王賤霸羞稱桓文以正待人之體也明此則知曾西不為管仲畏仲由之說矣夏六月季姬及鄫子遇于防使鄫子來朝春秋內女適人者明有所從則繫諸國若杞伯姬是也其未適人者明有所從則書其字若子叔姬是也季姬書字而未繫諸國其女而非婦亦明矣及者內為志內女而外與諸侯遇譏魯也朝不言使言使非正鄫子國君而季姬使之朝病鄫也魯秉周禮男女之際豈其若是之甚乎蓋魯公鍾愛其女使自擇配故得與鄫子遇于防而遂以季姬歸之耳有孟光之德有伯鸞之賢變而不失禮之正則猶可矣不然非所以為愛而厚其别也故稱及稱遇稱使罪魯與鄫以正男女之禮為後世之戒也秋八月辛卯沙鹿崩沙鹿晉地也卜偃曰期年必有大咎國幾亡詩稱百川沸騰山冢崒崩言西周之將亡也書沙鹿崩於前書穫晉侯於後雖不指其事應而事應具存此春秋畏物之反常為異使人恐懼修省之意也其垂戒明矣狄侵鄭冬蔡侯肸卒七年冬十二月魯侯如齊楚人伐徐春正月齊侯㑹宋公魯侯陳侯衛侯鄭伯許男曹伯盟于牡丘遂次于匡使諸侯之大夫救徐三月日有食之五月齊師曹師伐厲以救徐六月魯有螽魯季姬歸于鄫己卯晦雷震魯展夷伯之廟宋人伐曹徐恃諸侯之救不設備楚人敗之晉侯之入許賂中大夫既而皆背之許秦伯以河外列城五東盡虢略南及華山內及解梁城既而不與晉饑秦輸之粟秦饑晉閉之糴故秦伯伐晉晉侯使韓簡視師復曰師少於我鬭士倍我公曰何故對曰出因其資入用其寵饑食其粟三施而無報是以來也今又擊之我怠秦奮倍猶未也公曰一夫不可狃况國乎遂使請戰曰寡人不佞能合其衆而不能離也君若不還無所逃命秦伯使公孫枝對曰君之未入而寡人懼之入而未定列猶吾憂也茍列定矣敢不承命戰于韓原晉戎馬還濘而止公號慶鄭鄭去之秦獲晉侯以歸晉大夫反首拔舍從之秦伯曰二三子何其戚也寡人姑從君而西豈敢以至晉大夫三拜稽首曰君履后土而戴皇天皇天后土實聞君之言羣臣敢在下風秦伯乃舍晉侯于靈臺秦大夫請以入公曰晉人戚憂以重我天地以要我不圗晉憂重其怒也我食吾言背天地也重怒難任背天地不祥必歸晉君晉侯使郤乞告瑕吕飴甥且召之教乞曰朝國人而以君命賞曰孤雖歸辱社稷矣其卜二圉也衆皆哭晉於是乎作爰田飴甥曰君亡之不恤而羣臣是憂惠之至也將若君何衆曰何為而可對曰征繕以輔孺子諸侯聞之喪君有君羣臣輯睦甲兵益多好我者勸惡我者懼庶有益乎衆說晉於是乎作州兵飴甥㑹秦盟于王城秦伯曰晉國和乎對曰不和小人恥失其君而悼喪其親不憚征繕以立圉也曰必報讐君子愛其君而知其罪不憚征繕以待秦命曰必報德以此不和秦伯曰國謂君何對曰小人戚謂之不免君子恕以為必歸納而不定以德為怨秦不其然秦伯曰是吾心也改館晉侯饋七牢焉十一月晉侯歸數慶鄭斬之而後入韓簡者曲沃武公之弟韓萬之孫也自武公并晉國韓氏為晉大夫管仲有病齊侯問之曰即有不諱將奈社稷何對曰鮑叔牙潔亷善士也其於不已若者不比之人一聞人之過終身不忘不可以為政隰朋之為人也上志而下求醜不若黃帝而哀不已若者以德分人謂之聖以財分人謂之賢以賢臨人未有得人者也以賢下人未有不得人者也其於國有不聞也其於家有不見也朋其可乎公曰諾仲因曰豎刁以自宫得幸衛公子開方以利口獲進易牙以殺子見用牙也不愛其子焉能愛公開方也十五年不歸省其親焉能愛公刁也不愛其身焉能愛公願公逺之無使亂政管仲卒隰朋代之未幾亦卒於是齊侯耄矣豎刁等有寵於長衛姬侵權用事齊侯不能去經曰十有五年春王正月公如齊楚人伐徐三月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯盟于牡丘遂次于匡公孫敖帥師及諸侯之大夫救徐楚都于郢距徐亦逺而舉兵伐徐暴橫憑陵之罪著矣徐在山東與齊密邇以封境言之不可以不速救以形勢言之非有餽糧越險之難也今書盟於牡丘見諸侯救患之不協矣書次于匡見霸主號令之不嚴矣書大夫帥師而諸侯不行見桓德益衰而禦夷狄安中國之志怠矣凡兵而書救未有不善之也救而書次則尤罪其當速而故緩失用師之義矣中庸曰至誠無息不息則久春秋謹始卒欲有國者敦不息之誠也始勤而終怠則不能久而無以固其國矣夏五月日有食之秋七月齊師曹師伐厲八月螽九月公至自會季姬歸于鄫己卯晦震夷伯之廟震者雷電繫夷伯之廟也不曰夷伯之廟震而曰震夷伯之廟者天應之也天人相感之意微矣夷伯者魯大夫也大夫既卒不名榖梁以為因此見天子至於士皆有廟天子七廟諸侯五大夫三士二故德厚者流光德薄者流卑是以貴始德之本也始封必為祖冬宋人伐曹楚人敗徐于婁林十有一月壬戍晉侯及秦伯戰于韓獲晉侯秦伯伐晉而經不書伐專罪晉也獲晉侯以歸而經不書歸免秦伯也書伐書及者兩俱有罪而以及為主書獲書歸者兩俱有罪而以歸為甚今此專罪晉侯之背施幸災貪愛怒鄰而恕秦伯也然則秦戰義乎春秋無義戰彼善於此則有之矣其不言師敗績何也君獲不言師敗績君重於師也大夫戰而見獲必書師敗績師與大夫敵也君為重師次之大夫敵春秋之法也與孟子之言何以異孟子為時君牛羊用人莫之恤也故以民為貴君為輕春秋正名定分為萬世法故以君為重師次之堯以天下命舜舜亦命禹必稱元后為先此經世大常而仲尼蓋祖述之也惟此義不行然後叛逆之黨有託以為民輕棄君親而不顧者矣八年冬十一月戊申朔隕石于宋五是月六鷁退飛過宋都周內史叔興聘于宋宋公問吉凶焉對曰今兹魯多大喪明年齊有亂君將得諸侯而不終退而告人曰君失問是隂陽之事非吉凶所由生也吉凶由人春正月壬申魯季友卒子行父嗣為卿二月丙申鄫季姬薨夏五月甲子魯公孫兹卒鄭人殺其世子華淮夷病鄫冬十月齊侯㑹宋公魯侯陳侯衛侯鄭伯許男邢侯曹伯于淮以謀救鄫經曰十有六年春王正月戊申朔隕石于宋五是月六鷁退飛過宋都隕石自空凝結而隕也退飛有氣逆驅而飛也石隕鷁飛而得其數與名在春秋時凡有國者察於萬象之變亦審矣此宋異也何以書於魯史亦見當時之國有非所當告而告之者矣何以不削乎聖人因災異以明天人感應之理而著之於經垂戒後世如石隕于宋而書曰隕石此天應之也和氣致祥乖氣致異人事感於下則天變應於上茍知其故恐懼修省變可消矣宋襄公以亡國之餘欲圖霸業五石隕六鷁退飛不自省其德也後五年有孟之執又明年有泓之敗天之示人顯矣聖人所書之義明矣可不察之也哉三月壬申公子季友卒季者其字也友者其名也大夫卒而書名則曷為稱子聞諸師曰春秋時魯卿有生而賜氏者季友仲遂是也生而賜氏者何命之世為卿也季子忠賢在僖公有翼戴之勤襄仲弒逆在襄公有援立之力此二君者不勝私情欲以異賞報之也故皆生而賜氏俾世其官經於其卒各以氏書者志變法亂紀之端貽權臣竊命之禍其垂戒逺矣後人可不警哉夏四月丙申鄫季姬卒內女嫁於諸侯則尊同尊同則記其卒記其卒則必記其葬然而有不記者此筆削之㫖非可以例求者也宋伯姬在家為淑女既嫁為賢婦死於義而不回此行之超絶卓異者既書其葬又載其諡僖公鍾愛季姬使自擇配季姬不能自克以禮恃愛而行雖書其卒因奪其葬所以謹夫婦之道正人倫之統明王教之始也以此防民猶有嫁殤立廟舉朝素衣親臨祖載如魏明帝之厚其女者秋七月甲子公孫兹卒冬十有二月公㑹齊侯宋公陳侯衛侯鄭伯許男邢侯曹伯于淮九年齊人為徐伐英氏以報婁林之役魯侯在㑹季孫行父帥師滅項諸侯城鄫役人病不果城而還齊侯聞項之滅也止魯侯魯大夫㑹齊侯於卞齊侯乃歸公齊侯夫人王姬無子內嬖如夫人者六人長衛姬生無虧少衛姬生元鄭姬生昭葛嬴生潘密姬生商人宋華子生雍齊侯愛昭屬之宋公以為世子而五公子皆求立齊侯不能决冬十月乙亥齊侯薨易牙豎刁奉公命立無虧昭奔宋國內大亂凡六十日始赴於諸侯又七日而後殯論曰齊桓之所以有始而無終者大本不正也使齊桓果有匡天下之志而不求自利則管子者天下之材也當以見諸天王上言文武之勤中述成康之盛下陳今日之衰微蓋自幽王滅于西戎秦人力戰取豐鎬平王東遷于成周虞虢魏芮皆畿內諸侯乘亂各據土宇王畿中斷無西偏矣使齊桓管仲入贊天王匡正畿甸以修王略謹五禮以齊諸侯整六軍以膺戎狄則周室赫然中興而王化行矣惜乎齊桓管仲不知出此而溺於飲宴衽席之間也經曰十有七年春齊人徐人伐英氏夏滅項聖人於魯事有君臣之義凡大惡必隱避其詞而為之諱今此滅項其惡大矣曷不諱乎曰事有隱諱臣子施之於君父者也故成公取鄟襄公取邿昭公取鄫皆不言滅而書取程氏以為在君則當諱是也若夫滅項則僖公在㑹季孫所為耳執政之臣擅權為惡而不與之諱此春秋尊君抑臣不為朋黨比周之意也秋夫人姜氏會齊侯于卞九月公至自㑹冬十有二月乙亥齊侯小白卒十年冬十一月宋公曹伯衛人邾人伐齊齊人殺公子無虧魯人救齊鄭伯始朝楚宋人納公子昭齊人將立昭不勝四公子之徒遂與宋人戰三月戊寅宋敗齊師于甗立昭而還狄人救齊夏六月丁亥齊葬其君桓公邢人狄人伐衛衛侯師于兹婁狄師還經曰十有八年春王正月宋公曹伯衛人邾人伐齊夏師救齊五月戊寅宋師及齊師戰于甗齊師敗績狄救齊伐齊之喪奉少奪尊其罪大故其責詳書師救齊者善魯也救者善則伐者惡矣凡書救者未有不善之也書狄救齊許狄也許夷狄則罪諸夏矣許之曷為不稱人深著中國諸侯之罪也凡伐者為客受伐者為主今齊人受伐以宋為主者曲在宋也凡師直為壯曲為老書齊師敗績者責齊臣也或曰桓公管仲嘗屬孝公於宋襄以為世子矣則何以不可立乎曰不能制命雖天王欲撫鄭伯以從楚春秋猶以大義裁之不與也桓公君臣乃欲以私愛亂長幼之節其可哉獨不見宣王與仲山甫爭魯侯戲括之事其後如之何也春秋深罪宋公大義明矣秋八月丁亥葬齊桓公桓公九合諸侯不以兵車威令加乎四海幾於改物雖名方伯實行天子之事然而不能慎終於始付託非人柩方在殯四鄰謀動其國家而莫之恤至於九月而後葬以此見功利之在人淺矣春秋明道正義不急近功而規小利於齊桓晉文之事有所貶而無過褒以此冬邢人狄人伐衛狄稱人進之也慕義而來進之可也以夷狄伐衛而進之可乎伐衛所以救齊也衛嘗亡滅東徙渡河無所控告齊桓公攘夷狄而封之使衛國忘亡誰之賜也桓公方殁不念舊德欲厚報之遽伐人喪人理亡矣桓公攘夷狄安中國免民於左衽諸侯不念其賜而於衛為尤先書狄救齊以著中國諸侯之罪再書狄人伐衛所以見救齊之善功近而德逺矣皇王大紀卷四十一

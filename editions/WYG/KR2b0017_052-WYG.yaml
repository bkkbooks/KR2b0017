body:
  text: 皇王大紀卷五十二宋胡宏撰三王紀靈王元年冬十一月葬簡王鄭師侵宋楚令也齊侯伐萊萊人賂之以索馬牛皆百匹乃還春三月魯侯之母姜氏薨夏四月鄭伯薨謚曰成公子髠頑嗣晉師宋師衛師侵鄭晉荀罃㑹諸侯之大夫于戚以謀鄭故魯仲孫蔑請城虎牢以偪之荀罃曰善然寡君之憂不唯鄭將有請于齊魯葬齊姜齊侯使諸姜宗婦送葬召萊子萊子不會晏弱城東陽以偪萊魯叔孫豹聘于宋通嗣君也晉荀罃復㑹諸侯之大夫于戚齊崔杼及滕薛小邾之大夫皆會以罃有欲請于齊之言故也遂城虎牢鄭人乃成楚右司馬公子申多受小國之賂以偪嬰齊壬夫楚人殺之經曰二年春王正月葬簡王鄭師伐宋夏五月庚寅夫人姜氏薨六月庚辰鄭伯睔卒晉師宋師衛甯殖侵鄭秋七月仲孫蔑會晉荀罃宋華元衛孫林父曹人邾人于戚己丑𦵏我小君齊姜叔孫豹如宋冬仲孫蔑會晉荀罃齊崔杼宋華元衛孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢虎牢鄭地巖險聞於天下地有所必據而不可以棄焉者也有而不能守故不繫於鄭然則據地設險亦所貴乎王公設險以守其國大易之訓也城郭溝池以為固六君子之所謹也鑿斯池築斯城與民同守孟子所以語滕君也夫狡焉思啓封疆而爭地以戰殺人盈野爭城以戰殺人盈城者固非春秋之所貴守天子之土繼先君之世不能設險守國將至於遷潰滅亡亦非聖人之所與故城虎牢而不繫於鄭程氏以為責鄭之不能有也其聖人以待衰世之意小康之事耶楚殺其大夫公子申二年楚公子嬰齊為簡之師組甲被練使鄧廖帥之以侵呉呉人要而擊之獲鄧廖伐楚取駕駕良邑也廖亦楚之良也魯侯朝于晉春二月盟于長樗而還晉中軍尉祁奚請老晉侯問嗣焉稱解狐其讎也將立之而卒又問焉對曰午也可人有言曰擇臣莫若君擇子莫若父午之少也婉以從令好學而不戲其壯也彊志而用命守業而不淫其冠也和安而好敬柔惠小物而鎮定大事有直質而無流心非義不變非上不舉其佐羊舌職死矣晉侯曰孰可以代之對曰赤也可乃以祁午為中軍尉羊舌赤佐之軍無秕政單頃公會諸侯盟于雞澤晉侯欲修呉好使荀會逆呉王于淮上呉王不至楚公子壬夫為令尹侵欲於小國陳侯使袁僑如會求成晉侯使和組父告于諸侯於是諸侯之大夫及袁僑盟晉侯之弟揚干亂行於曲梁魏絳戮其僕晉侯怒將殺絳以告羊舌赤對曰絳無貳志事君不辟難有罪不逃刑其將來辭何辱命焉言終魏絳以書至曰日君乏使使臣斯司馬臣聞師衆以順為武軍事有死無犯為敬君合諸侯臣敢不敬君師不武執事不敬罪莫大焉臣懼其死以及揚干無所逃罪不能致訓至於用鉞臣之罪重敢有不從以怒君心請歸死于司冦晉侯說使佐新軍諸侯還楚司馬公子何忌侵陳許男事楚不㑹于雞澤晉荀罃伐許經曰三年春楚公子嬰齊帥師伐呉公如晉夏四月壬戌公及晉侯盟於長樗公至自晉六月公㑹單子晉侯宋公衛侯鄭伯莒子邾子齊世子光己未同盟于雞澤同盟或以為冇三例一則王臣預盟二則諸侯同欲三則惡其反覆夫惡其反覆與諸侯同欲而書同信矣王臣預盟而書同義則未安盟於女栗及蘇子也盟于洮于翟泉㑹王人也而皆不書同然則此三盟者正所謂諸侯同欲而書同盟也其同欲奈何同疾楚也㑹于柯陵之歳夏伐鄭楚人師于首止而諸侯還冬伐鄭楚人師于汝上而諸侯還陳袁僑如㑹楚師在繁陽而韓獻子懼罪棄疾立復封陳蔡而中國恐是知此三盟者諸侯皆有戒心而脩盟故稱同不以尹子單子劉子亦預此盟而譏之也夫三臣將命必惇信明義而後可以表正乎天下諸侯守邦必尊主奉法而後可以保其社稷今王臣下與諸侯約誓諸侯亦敢上與王臣要言斯大亂之道也則亦不待書同盟而罪自見矣陳侯使袁僑如會戊寅叔孫豹及諸侯之大夫及陳袁僑盟秋公至自會冬晉荀罃帥師伐許三年春正月陳侯薨諡曰成公子溺嗣楚人將伐陳聞喪乃止陳人不聽命楚人侵陳魯叔孫豹聘于晉魯成公妾姒氏卒陳𦵏其君魯𦵏定姒魯侯如晉聽政請屬鄫不許仲孫蔑曰以寡君之密邇仇讎而願固事君無失官命鄫無賦於司馬為執事朝夕之命敝邑敝邑􅄶小闕而為罪是以願借助焉晉侯許之楚人使頓間陳而侵伐之陳圍頓無終子嘉父遣使因魏絳請和諸戎晉侯欲不許於是晉侯好田絳曰諸侯新服將觀於我徳則睦否則攜貳勞師於戎而楚伐陳必不能救是棄陳也諸華必叛戎禽獸也獲戎失華無乃不可乎昔周辛甲之為太史也命百官官箴王闕虞人曰芒芒禹迹畫為九州經啓九道民有寢廟獸有茂草各有攸處徳用不擾在帝夷羿冒于原獸忘其國恤而思其麀牡武不可重用不恢于夏家獸臣司原敢告僕夫虞箴如是可不懲乎且和戎有五利焉戎狄荐居貴貨易土土可賈焉一也邊鄙不聳民狎其野穡人成功二也戎狄事晉四鄰振動諸侯威懐三也以徳綏戎師徒不勤甲兵不頓四也鑒于后羿而用徳度逺至邇安五也公說使絳盟諸戎脩民事田以時經曰四年春王三月己酉陳侯午卒午者襄公名也襄公哀公之皇祖考也曷不諱乎古者死而無諡不以名為諱周人以諡易名於是乎有諱禮夫子兼帝王之道叅文質之中而作春秋以法萬世如公薨不地滅國書取出奔稱遜之類所以放其文也莊公名同而書同盟僖公名申而書戊申定公名宋而書宋人之類所以從其質也後世不明此義則有以諱易人之名者又有以諱易人之姓者詩書則諱臨文則諱嫌名則諱二名則偏諱愚者違禮以為孝諂者獻佞以為忠忌諱繁名實亂而春秋之法不行矣夏叔孫豹如晉秋七月戊子夫人姒氏薨𦵏陳成公八月辛亥𦵏我小君定姒冬公如晉陳人圍頓四年魯侯歸鄭公子發聘于魯魯叔孫豹覿鄫世子巫于晉以成屬鄫呉王使夀越如晉辭不㑹于雞澤之故且請聽諸侯之好晉人將為之合諸侯使魯仲孫蔑衛孫林父先㑹呉且告會期楚人討陳叛故曰由令尹實侵欲焉乃殺公子壬夫君子曰已則無信而殺人以逞不亦難乎晉侯會諸侯于戚於是魯叔孫豹又以屬鄫為不利使鄫大夫聽命于㑹魯侯歸楚人以公子貞為令尹晉士匄曰楚人討貳而立貞必改行而疾討陳陳近於楚民朝夕急能無徃乎有陳非吾事也無之而後可諸侯戍陳楚令尹伐陳諸侯㑹于城棣以救之諸侯還魯季孫行父卒大夫入斂公在位宰庀家器以備𦵏無衣帛之妾無食粟之馬無藏金玉無重器備是為季文子經曰五年春公至自晉夏鄭伯使公子發来聘叔孫豹鄫世子巫如晉仲孫蔑衛孫林父會呉于善道秋大雩楚殺其大夫公子壬夫公會晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光呉人鄫人于戚吳何以稱人按左氏吳子使夀越如晉請聽諸侯之好晉人將為之合諸侯使魯衛大夫㑹呉于善道且告㑹期然則戚之事乃吳人來㑹不為主也來㑹諸侯而不為主則進而稱人諸侯徃與之㑹而主呉貶而稱國聖人之情見矣春秋之義明矣公至自㑹冬戍陳楚公子貞帥師伐陳公㑹晉侯宋公衛侯鄭伯曹伯齊世子光救陳十有二月公至自救陳辛未季孫行父卒五年甲午春正月把伯姑容薨諡曰桓公子丐嗣齊晏弱圍萊萊人軍齊師大敗萊子奔棠宋華弱樂轡少相狎長相優又相謗也轡怒以弓梏弱于朝公見之曰司武而梏於朝難以服矣遂逐之把𦵏其君滕侯朝于莒魯女為鄫夫人取莒公子為後魯叔孫豹聘于邾脩平焉晉人以鄫故討于魯曰何故亡鄫季孫宿如晉見且聽命十月齊人滅萊經曰六年春王三月壬午把伯姑容卒夏宋華弱來奔秋葬把桓公滕子來朝莒子滅鄫鄫取莒公子為後罪在鄫子不在莒人春秋應以梁亡之例而書鄫亡不當但責莒人也今直罪莒捨鄫何哉曰莒人之以其子為鄫後與黄歇進李圉之妹於楚王吕不韋獻邯郸之姬於秦公子其事雖殊其欲滅人之祀而有其國則一也以此防民猶有以韓謐為世嗣昏亂紀度如郭氏者冬叔孫豹如邾季孫宿如晉十有二月齊侯滅萊六年郯子朝于魯魯卜郊三不從乃免牲仲孫蔑曰吾乃今而後知有卜筮夫祀郊后稷以祈農事也是故啓蟄而郊郊而後耕今既耕而卜郊宜其不從也小邾子朝于魯魯隧正叔仲昭伯欲善季氏而求媚于費宰南遺謂遺請城費吾多與而役故季氏城費魯季孫宿如衛報公孫剽之聘且辭緩報非貳也魯有螽八月衛孫林父聘於魯魯侯與之盟楚師圍陳諸侯會于鄬以救之鄭伯如會及鄵公子騑使賊弑之而以瘧疾赴于諸侯諡曰僖公子喜嗣羣公子謀討騑騑先之殺子狐子熈子侯子丁陳人患楚慶虎慶寅謂楚人曰吾使公子黄徃而執之楚人從之二慶使告陳侯于㑹曰楚人執公子黄矣君若不來羣臣不忍社稷宗廟懼有二圖陳侯潜歸晉韓厥老長子無忌有廢疾將立之辭曰無忌不才請立起也與田蘇㳺而曰好仁立之不亦可乎厥使起朝遂老晉侯謂無忌仁使掌公族大夫經曰七年春郯子來朝夏四月三卜郊不從乃免牲小邾子來朝城費夫文子相三君無衣帛之妾無食粟之馬無藏金玉無重器備則固忠於公室而不顧其所食之私邑也及行父卒宿之不忠遂專魯國之政羣小媚之無故勞民妄興是役季氏益張其後孔子行乎季孫三月不違至於帥師墮費其越禮不度可知矣然則書城費乃履霜堅冰之戒强私家弱公室之萌據事直書而義自見矣用人不惟其賢惟其世豈不殆哉秋季孫宿如衛八月螽冬十月衛侯使孫林父來聘壬戌及孫林父盟楚公子貞帥師圍陳十有二月公會晉侯宋公陳侯衛侯曹伯莒子邾子于鄬鄭伯髠頑如會未見諸侯丙戌卒于鄵按鄭僖公三傳皆以為弑而書卒一傳以為為中國諱不使夷狄之民加中國之君疑得聖人之意夫弑君之賊其惡不待貶絶而自見矣見弑者豈無不善之積以及其身者乎衛桓則以嫡母無寵宋殤則以亟戰疲民齊襄則以同行鳥獸鄭夷則以侮慢大臣蔡固則以淫而不父陳平國則以殺諌臣而通于夏氏楚䖍則以多行無禮齊奚則以嬖孽而國人不之君呉餘祭則以輕近刑人而晉州蒲欲盡去羣大夫而立其左右也若夫鄭僖公則異於是矣中國者禮義之所出也夷狄者禽獸之與隣也僖公欲從諸侯㑹于鄬則是貴禮義為中國之君也諸大夫欲背諸夏與荆楚則是近禽獸為夷狄之民也以中國之君而見弑於夷狄之民豈有不善之積以及其身者乎聖人至是傷之甚懼之甚故變文而書曰鄭伯髠頑如㑹未見諸侯丙戌卒于鄵未見諸侯其曰如㑹何致其志也諸侯卒于境内不地鄵鄭邑也其曰卒于鄵見其弑而隱之也卒鄭伯逃歸陳侯聖人之旨微公穀之義精矣存天理抑人欲之意逺矣陳侯逃歸穀梁子曰逃義曰逃逃者匹夫之事上二年諸侯戌陳今楚令尹來伐諸侯又救之亦既勤矣為陳侯計者下令國中大申儆備立太子以守親聽命於諸侯謀禦敵之策當是時晉君方明八卿和睦諸侯聽命必能致力於陳矣不此之顧棄儀衛而逃歸此匹夫之事耳夫義路也禮門也輕棄中國惟蠻夷之懼是不能由是路出入是門故書逃歸以罪之可謂深切著明矣七年魯侯朝于晉且聽朝聘之數鄭葬其君僖公鄭公子發公孫輙侵蔡獲蔡司馬公子燮鄭人皆喜公孫僑曰小國無文徳而有武功禍莫大焉自今晉楚伐鄭不四五年弗得寜矣僑以字行是為鄭子産晉侯將命朝聘之數于邢丘使諸侯之大夫聽命故齊髙厚宋向戌魯季孫宿衛寗殖邾大夫㑹之鄭伯因獻捷親聽命焉魯侯歸莒伐魯疆鄫田魯大雩楚師伐鄭公子騑欲從楚公孫舍之欲待晉騑曰民急矣姑從楚以舒吾民晉師至吾又從之敬恭幣帛以待强者而庇民焉不亦可乎舎之曰五㑹之信今將叛之雖楚救我將安用之晉君方明四軍無闕八卿和睦必不棄鄭完守以老楚仗信以待晉不亦可乎騑曰謀夫孔多是用不集發言盈庭誰敢執其咎請從楚騑也受其咎乃及楚平晉士匄聘于魯告將用師于鄭經曰八年春王正月公如晉夏𦵏鄭僖公鄭人侵蔡獲蔡公子燮季孫宿㑹晉侯鄭伯齊人宋人衛人邾人于邢丘蘇轍曰悼公改命朝聘之數使諸侯之大夫聽命於㑹大夫稱人衆詞也臣則以為大夫稱人貶之也夫不自為政也而委於臣下是以國之利器示人而不知寳也朝聘事之大者重煩諸侯而使大夫聽命無乃以姑息愛人而不由徳乎使政在大夫而諸侯失國又豈所以愛之也後此八年溴梁之㑹悼公初沒諸侯皆在而大夫獨盟君若贅旒夫豈一朝一夕之故哉故邢丘之事魯公在晉而季孫宿㑹見魯之失政也諸侯之大夫貶而稱人謹其始也公至自晉莒人伐我東鄙秋九月大雩冬楚公子貞帥師伐鄭畏天者保其國鄭介大國之間困強楚之令而欲息肩於晉若能信任仁賢明其政刑經畫財賦以禮法自守而親比四隣必能保其封境荆楚雖大何畏焉而子耳子國加兵於蔡獲公子燮無故怒楚所謂不脩文徳而有武功者也楚人來討不從則力不能敵從之則晉師必至故國人皆喜而子産獨不順焉是以獲公子燮特書侵蔡以罪之而公子貞來伐鄭及楚平不復書矣犠牲玉帛待於境上以待强者而請盟其能國乎晉侯使士匄來聘八年宋災魯季孫宿如晉魯宣夫人薨夏六月魯葬穆姜秦伯乞師于楚伐晉公子貞曰晉君類能而使之上讓下競不可敵也王曰吾既許之矣師于武城以為之援秦人侵晉晉饑弗能報也諸侯伐鄭晉知罃將中軍師于汜令於諸侯曰脩器備盛餱糧歸老幼居疾于虎牢肆𤯝圍鄭鄭人恐乃行成荀偃曰遂圍之以待楚人之救也而與之戰不然無成罃曰許之盟而還師以敝楚人吾三分四軍與諸侯之銳以逆來者於我未病楚不能矣猶愈於戰諸侯暴骨以逞不可以争大勞未艾君子勞心小人勞力先王之制也諸侯皆不欲戰乃許鄭成將盟于戲六卿及其大夫門子皆從鄭伯晉士弱為載書曰自今日既盟之後鄭國而不惟晉命是聽而或有異志者有如此盟公子騑曰天禍鄭國使介居二大國之間大國不加徳音而亂以要之使其鬼神不獲歆其禋祀其人民不獲享其土利夫婦辛苦墊隘無所底告自今日既盟之後鄭國而不惟有禮與强可以庇民者是從而敢有異志者亦如之荀偃曰改載書公孫舎之曰昭大神要言焉若可改也大國亦可叛也知罃曰我實不徳而要人以盟豈禮也哉乃盟而還晉人不得志於鄭以諸侯復伐之門其三門濟於隂阪次于隂口而還楚王伐鄭鄭公子騑將及楚平公子嘉公孫蠆曰與大國盟口血未乾而背之可乎公子騑公孫舎之曰吾盟固云惟强是從今楚師至晉不能救則楚強矣盟誓之言豈敢背之且要盟無質神弗臨也所臨惟信信者言之瑞也乃及楚平晉侯歸謀所以息民自公以下茍有積者盡出之國無滯積亦無困人公無禁利亦無貪民祈以幣更賔以特牲器用不作車服從給行之期年國乃有節三駕而楚不能與争經曰九年春宋災夏季孫宿如晉五月辛酉夫人姜氏薨秋八月癸未𦵏我小君穆姜冬公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光伐鄭十有二月己亥同盟于戲鄭之見伐於楚子展曰小國無信兵亂日至亡無日矣請完守以老楚仗信以待晉其策未有失也而子駟遂及楚盟於是晉師至矣諸侯伐鄭鄭人行成荀偃曰遂圍之以待楚人之救而與之戰不然無成知罃曰許之盟而還師以敝楚吾三分四軍與諸侯之鋭以逆來者於我未病楚不能矣猶愈於戰暴骨以逞不可以争乃許鄭成同盟于戯夫善為國者不師善師者不陣善陣者不戰知武子明於善陣之法以佐晉悼公屢與諸侯伐鄭楚輙救之而不與之戰楚師遂屈得善勝之道矣故下書蕭魚之㑹以美之楚子伐鄭九年甲寅晉侯合諸侯㑹呉王夀夢於柤晉荀偃士匄請伐偪陽而封宋向戍焉荀罃曰城小而固勝之不武弗勝為笑固請圍之諸侯之師乆於偪陽偃請曰水潦將降懼不能歸請班師罃怒曰女成二事而後告余余恐亂命以不女違女既勤君而興諸侯牽帥老夫以至于此既無武守而又欲易余罪曰是實班師不然克矣余羸老也可重任乎七日不克必爾乎取之三月庚寅偃匄帥師親受矢石甲午滅之以與向戍戍辭曰君若鎮撫宋國而以偪陽光啓寡君羣臣安矣乃與宋公晉侯以偪陽子歸獻于武宫謂之夷俘偪陽䢵姓也使周内史遷其族嗣納諸霍人以奉妘祀楚公子貞鄭公孫輙伐宋晉荀罃伐秦莒人間諸侯之有事也伐魯晉侯復㑹十一國諸侯伐鄭齊崔杼使太子光先至于師命長于滕鄭公子騑當國發為司馬輙為司空騑與尉止有争將禦諸侯之師而黜其車尉止獲又與之争又抑之曰爾車非禮也遂弗使獻騑為田洫司氏堵氏侯氏子師氏皆喪田焉故五族聚羣不逞之人因公子之徒以作亂入西宫之朝殺三卿司徒嘉知之故不死騑之子夏聞盜不儆而出尸而追盜聞盜刼鄭伯入于北宫乃歸授甲臣妾多逃器用多喪發之子子産聞盜為門者庀羣司閉府庫完守備成列而後出兵車十七乗尸而攻盜殺尉止子師僕盜衆盡死侯晉奔晉堵女父司臣尉翩司齊奔宋公子嘉當國為載書以位序聽政辟大夫諸司門子弗順子産謀焚書嘉曰是衆為政也國不亦難乎子産曰衆怒難犯專欲難成子必從之乃焚書于倉門之外衆然後定諸侯之師城虎牢而戍之晉師城梧及制士魴魏絳戍之鄭及晉平楚師救鄭諸侯之師還鄭而南至於陽陵楚師不退荀罃曰今我逃楚楚必驕驕則可與戰矣欒黶曰逃楚晉之恥也我將獨進師遂進與楚師夾潁而軍鄭子蟜曰諸侯既有成行必不戰矣從之將退不從亦退退楚必圍我猶將退也不如從楚亦以退之宵涉潁與楚人盟欒黶欲伐鄭師荀罃曰我實不能禦楚又不能庇鄭鄭何罪不如致怨焉而還今伐其師楚必救之戰而不克為諸侯笑不如還侵鄭北鄙而歸楚亦還王叔陳生與伯輿争政晉侯使士匄平王室聽其訟王叔之宰曰蓽門圭竇之人而皆陵其上難為上矣伯輿之大夫曰昔平王東遷吾七姓從王牲用備具王賴之而賜之騂旄之盟曰世世無失職若蓽門圭竇其能來東底乎今自王叔之相也政以賄成而刑放於寵官之師旅不勝其富吾能無蓽門圭竇乎王右伯輿士匄從王王叔奔晉經曰十年春公㑹晉侯宋公衛侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光㑹呉于柤夏五月甲午遂滅偪陽公至自㑹楚公子貞鄭公孫輙帥師伐宋晉師伐秦秋莒子邾子齊世子光滕子薛伯把伯小邾子伐鄭冬盜殺鄭公子騑公子發公孫輙不稱大夫程氏以為失卿職也卿大夫者國君之陪貳政之本也强則精神折衝聞有偃息談笑而郤敵國之兵勝千里之難者矣乃至於身不能保而盜得殺之於朝安在其為陪貳乎故削其大夫為當官失職者之鑒也戍鄭虎牢楚公子貞帥師救鄭虎牢之地城不繫鄭者責在鄭也戌而繫鄭者罪諸侯也設險所以守國有是險而不能設犧牲玉帛待盟境上使其民人不享土利辛苦墊隘無所底告然後請成故不繫鄭者責其不能有也鄭人從楚固云不義然中國所以城之者非欲斷荆楚之路為鄭蔽也駐師阨險以逼之爾至是伐而復戌焉猶前志也則可謂以義服之乎故戌而繫鄭者若曰鄭國分地受諸天子非列國所得専所以罪諸侯也聖人既以虎牢還繫於鄭又書楚公子貞帥師救鄭諸侯之罪益明矣夫以救許楚所以深罪諸侯不能保鄭肆其陵逼曽荆楚之不若也亦可謂深切著明也矣公至自伐鄭十年冬十一月魯季孫宿將作三軍三分公室三家各有其一叔孫豹曰天子作軍公帥之以征不徳元侯作師卿帥之以承天子諸侯有卿無軍帥教衛以賛元侯伯子男有大夫無卿帥賦以從諸侯今我諸侯也而為元侯之制無乃不可乎宿固請豹曰然則盟諸僖閎詛諸五父之衢於是三子各毁其乗季氏使其乗之人以其役邑入者無征不入者倍征孟氏使半為臣若子若弟叔孫氏使盡為臣不然不舎春不郊鄭大夫謀曰不從晉國㡬亡何為而使晉師致死於我公孫舎之曰與宋為惡諸侯必至吾從之盟楚師至吾又從則晉怒甚矣晉能驟來楚將不能吾乃固與晉大夫說之使疆埸之司惡於宋宋向戍侵鄭舎之帥師侵宋晉侯伐鄭㑹諸侯于北林圍鄭觀兵於南門鄭人行成盟于亳城北士匄曰不慎必失諸侯諸侯道敝而無成能無貳乎乃盟載書曰凡我同盟毋藴年毋壅利毋保奸毋留慝救災患恤禍亂同好惡奬王室或間茲命明神殛之諸侯還楚王使公子貞乞旅于秦將以伐鄭鄭伯逆之伐宋晉侯會諸侯悉師以復伐鄭鄭人使良霄太宰石㚟如楚告將服于晉曰孤以社稷之故不能懐君若能以玉帛綏晉不然則武震以攝威之孤之願也諸侯之師觀兵于鄭鄭人行成會于蕭魚赦鄭囚皆禮而歸之納斥候禁侵掠晉侯使叔向告于諸侯叔向者晉公族羊舌肹也以字行鄭人賂晉侯以兵車百乗歌鐘二肆及其鎛磬女樂二八晉侯以樂之半賜魏絳曰子教寡人和諸戎以正諸華八年之中九合諸侯如樂之和無所不諧請與子樂之辭曰臣願君安其樂而思其終也公曰賞國之典也不可廢也魏絳於是乎始有金石之樂諸侯還良霄至楚楚人執之秦庻長鮑伐晉以救鄭晉士魴禦之少秦師而弗設備戰于櫟晉師敗績經曰十有一年春王正月作三軍魯頌曰公車千乗說者以為大國之軍也故知三軍魯之舊耳然車而謂之公車則臣下無私乗也徒而謂之公徒則臣下無私民也若有侵伐諸卿更帥以出事畢則將歸於朝車復於甸甲散於丘卒還於邑襄公幼弱季氏益張廢公室之三軍而三家各有其一季氏盡征焉而舊法亡矣是以謂之作其明年季孫宿敕台遂入鄆又其後享范獻子而公臣不能具三耦民不屬公可知矣春秋書其作舎以見昭公失國定公無正而兵權不可去公室有天下國家者之所宜鑒也夏四月四卜郊不從乃不郊鄭公孫舎之帥師侵宋公㑹晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭秋七月己未同盟于亳城北公至自伐鄭楚子鄭伯伐宋盟于亳城北鄭服而同盟也㝷復從楚伐宋故書同盟見其既同而又叛也亳之盟其載書曰或間茲命明神殛之雖渝此盟而不顧也噫慢鬼神至于此極而盟猶足恃乎公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭會于蕭魚程氏曰㑹于蕭魚鄭又服而請㑹也不書鄭㑹謂其不可信也而晉悼公推至誠以待人信鄭不疑禮其囚而歸焉納斥候禁侵掠遣叔肹告于諸侯而鄭自此不復背晉者二十四年至哉誠之能感人也而悼公又能謀於魏絳以息民聽於知武子而不與楚戰故三駕而楚不能與之争雖城濮之績不越是矣公至自㑹楚人執鄭行人良霄冬秦人伐晉皇王大紀卷五十二

body:
  text: 皇王大紀卷四十二宋胡宏撰三王紀襄王十一年春正月宋人執滕子嬰齊夏四月宋人曹人邾人盟于曹南鄫子㑹盟于邾宋公使邾子用鄫子于次睢之社欲以屬東夷子魚曰古者六畜不相為用小事不用大牲而況敢用人乎祭祀以為人也民神之主也用人其誰饗之齊桓公存三亡國以屬諸侯義士猶曰薄徳今一會而虐二國之君又用諸淫昏之鬼將以求霸不亦難乎得死為幸弗聽己酉邾人執鄫子用之曹人叛盟宋公將伐曹子魚曰君之徳無乃猶有所闕而以伐人若之何盍姑内省徳乎無闕而後動可乎弗聽帥師圍曹曹國風二篇曰候人四章章四句刺近小人也共公遠君子而好近小人焉彼候人兮何戈與祋候人道路送賔客者何掲祋殳也言賢者之官不過候人彼其之子三百赤芾彼彼曹朝也芾韠也一命緼芾黝珩再命赤芾黝珩三命赤芾葱珩大夫以上赤芾乗維鵜在梁不濡其翼鵜洿澤也梁水中之梁鵜在梁可謂不需其翼者乎彼其之子不稱其服維鵜在梁不濡其咮咮喙也彼其之子不遂其媾媾厚也薈兮蔚兮南山朝隮薈蔚雲興也南山曹南山也隮升雲也婉兮孌兮季女斯飢婉少貌孌好也季女人之少子也女氏之弱者曹國風三篇曰鳲鳩四章章六句刺不壹也在位無君子用心之不壹也鳲鳩在桑其子七兮興也鳲鳩秸鞠也鳲鳩之養其子朝從上下莫從下上平均如一淑人君子其儀一兮其儀一兮心如結兮言執義一則用心固鳲鳩在桑其子在梅飛在梅也淑人君子其帶伊絲其帶伊絲其弁伊騏騏騏文也弁皮弁也鳲鳩在桑其子在棘淑人君子其儀不忒忒疑也其儀不忒正是四國正是也鳲鳩在桑其子在榛淑人君子正是國人正是國人胡不萬年曹國風終四篇曰下泉四章章四句思治也曹人疾共公侵刻下民不得其所憂而思明王賢伯也洌彼下泉浸彼苞稂興也冽寒也下泉泉下流也苞本也稂童粱非溉草得水而病也愾我寤嘆念彼周京洌彼下泉浸彼苞蕭蕭蒿也愾我寤嘆念彼京師芃芃黍苗隂雨膏之芃芃美貌四國有王郇伯勞之郇伯郇侯也諸侯有事二伯述職衞大旱衞國風九篇曰有狐三章章四句刺時也衞之男女失時喪其妃耦焉古者國有凶荒則殺禮而多昬㑹男女之無夫家者所以育人民也有狐綏綏在彼淇梁興也綏綏匹行貌石絶水曰梁心之憂矣之子無裳之子無室家者在下曰裳所以配衣也有狐綏綏在彼淇厲厲梁可厲之旁心之憂矣之子無帶帶所以束衣有狐綏綏在彼淇側心之憂矣之子無服言無室家若人無衣服衛人伐邢陳侯請脩好於諸侯以無忘齊桓之徳故魯侯㑹陳人蔡人楚人鄭人盟於齊梁伯好土功亟城而弗處民罷而弗堪則曰某寇將至乃溝公宫民懼而潰秦遂取梁經曰十有九年春王三月宋人執滕子嬰齊執之是非決以稱人與稱爵而見執者則以名與不名知其罪之在也經書見執於人者悉皆不名而滕子獨名是亦有罪焉耳夫以齊桓之盛九合諸侯不以兵車雖江黄之逺國猶相繼來盟而滕介齊宋之間不與衣裳之㑹者三十有七年及宋襄繼起又不尊事大國其見執則有由矣書名著其罪也茍為有罪其見執固宜宋何以稱人不得爲伯討乎執雖以罪不歸于京師則稱人惡其專也歸于京師而執非其罪則稱人惡其濫也夏六月宋公曹人邾人盟於曹南鄫子㑹盟於邾己酉邾人執鄫子用之秋宋人圍曹盟于曹南口血未乾今復圍曹者討不服也愛人不親反其仁治人不治反其智襄公不能内自省德而急於合諸侯執嬰齊非伯討不足以示威盟曹南非同志不足以示信卒於兵敗身傷不知反求諸己欲速見小利之過也漢景削七國而吳楚叛東都疾横議而黨錮興唐文宗切於除姦而訓注用故子夏為莒父宰問政子曰無欲速無見小利欲速則不逹見小利則大事不成經書襄公不越數端而知其操心之若此者仲尼筆削推見至隱如化工賦象并其情不得遯焉非特畫筆之肖其形耳故春秋者化工也非畫筆也衛人伐邢冬㑹陳人蔡人楚人鄭人盟於齊盟㑹皆君之禮也㣲者盟㑹不志於春秋凡所志者必有君與貴大夫居其間也然則為此盟者乃公與陳蔡楚鄭之君或其大夫矣曷為内則没公外則人諸侯與其大夫諱是盟也楚人之得與中國㑹盟自此始也莊公十年荆敗蔡師始見經其後入蔡伐鄭皆以號舉夷狄之也僖公元年改而稱楚經亦書人於是乎浸强矣然終桓公世皆止書人而不得與中國㑹盟者以齊修霸業能制其强故也桓公既沒中國無霸鄭伯首朝于楚其後遂為此盟故春秋沒公人陳蔡諸侯而以鄭列其下盖深罪之也又二年復盟于鹿上至㑹于盂遂執宋公以伐宋而楚於是乎大張列位於陳之上而書爵矣聖人書此豈與之乎所以著夷狄之强傷中國之衰莫能抗也故深諱此盟一以外夷狄二以惡諸侯之失道三以謹盟㑹之始也梁亡陸淳曰秦肆其暴取人之國沒而不書其義安在曰乗人之危惡易見也滅人之國罪易知也自取滅亡其事微矣春秋之作聖人所以明微也梁本侯國魚爛而亡何哉易曰天行健君子以自强不息古者諸侯朝修其禁令晝攷其國職夕省其典刑夜儆百工無使熖淫而後即安故克勤於邦荒度上功者禹也慄慄危懼檢身若不及者湯也自朝至於日中昃不遑暇食用咸和萬民者文王也凡有國家者土地雖廣人民雖衆甲兵雖多城郭雖固而不能自强於政治則日危月削如火銷膏以至滅亡而莫覺也而況好土功輕民力湎於酒淫於色心昏而出惡政者乎其亡可立而待也十二年魯新作南門郜子朝于魯三月乙巳魯西宫災滑人叛鄭鄭公子士洩堵寇帥師入滑齊人狄人盟于邢謀衛難也於是衛方病邢隨以漢東諸侯叛楚鬬榖於菟帥師伐隨取成而還宋公欲合諸侯魯臧孫辰聞之曰以欲從人則可以人從欲鮮濟經曰二十年春新作南門言新者有故也言作創始也其曰南門者南非一門也庫門天子臯門雉門天子應門書新作南門譏用民力於所不當為也魯人為長府閔子騫曰仍舊貫如之何何必改作孔子曰夫人不言言必有中春秋凡用民力得其時制者猶書于䇿以見勞民為重事而况輕用於所不當為者乎然僖公嘗脩泮宫復閟宫矣奚斯董其役史克頌其事而經不書者宫廟以事其祖考學校以教國之子弟二者為國之先務雖用民力不可廢也其垂教之意深矣夏郜子來朝五月乙巳西宫災鄭人入滑秋齊人狄人盟于邢冬楚人伐隨十三年狄侵衛宋公將為鹿上之盟以求諸侯於楚子魚曰小國爭盟禍也宋其亡乎幸而後敗於是宋人齊人楚人盟于鹿上魯大旱公欲焚巫尫臧孫辰曰修城郭貶食省用務穡勸分此其務也公從之宋公將㑹楚王陳侯蔡侯鄭伯許男曹伯于盂子魚曰君欲已甚其何以堪楚王曰宋乃召我乎我必襲辱之楚王㑹諸侯于盂執宋公以伐宋魯侯伐邾楚王使宜申遺魯以宋俘魯侯㑹楚請宋公冬十月癸丑楚王與諸侯盟而釋之任宿須句顓㬰風姓也實司大皥與有濟之祀以服事諸夏邾人滅須句須句子奔魯因成風也成風言於公曰崇明祀保小寡周禮也若封須句是崇皡濟而脩祀紓禍也經曰二十有一年春狄侵衛宋人齊人楚人盟于鹿上夏大旱秋宋公楚子陳侯蔡侯鄭伯許男曹伯會于盂執宋公以伐宋執宋公者楚子也何以不言楚子執之分惡於諸侯也諸侯皆在㑹而蠻夷執其㑹主拱手以聽而莫之敢違其不勇於為義亦甚矣故特列楚人於陳蔡之間而以同執為文夫以楚之强豈能勝秦五國之衆何弱於趙然澠池之㑹藺相如一奮其氣威信敵國秦雖虎狼猶不敢動况以五國之君而不能得志於荆楚乎宋以乗車之㑹往而楚伏兵車以執之則宋直楚曲其義已明雖以匹夫自反而縮猶不可耻矧南面之君也哉然春秋為賢者諱宋公見執不少隐之何也夫盟主者所以合天下之諸侯攘夷狄尊王室者也宋公欲繼齊桓之烈而與楚盟㑹豈攘夷狄尊周室之義乎故人宋公於鹿上之盟而于盂之㑹直書其事而不隠所以深貶之也冬公伐邾楚人使宜申來獻捷不曰來獻宋捷為魯諱也諸侯從楚伐宋而魯獨不與故楚來獻捷以脅魯為魯計者拒其使而不受可也請於天王而討之可也宋公先代之後作賔王家方脩盟㑹而伏兵車執之於壇玷之上又以軍獲遺獻諸侯其横逆甚矣拒其使而不受聲其罪而致討不患無詞魯於是時曽不能申大義以攘荆楚尊中國故不曰宋㨗特為魯諱十有二月癸丑公㑹諸侯盟于薄釋宋公㑹不書其所為獨㑹于稷書成宋亂者為受郜鼎立華督也㑹于澶淵言宋災故者為葬蔡侯不討般也盟不書所為而盟于薄言釋宋公者宋方主㑹而蠻夷執而伐之以其俘獲來遺是夷狄反為中國主禽獸將逼人而食之矣此正天下大變春秋之所謹也魯既不能申大義以抑其强暴使宋公見釋出自天王與中國而顧㰱血要言求楚子以釋之是操縱大權自蠻夷出其事己慎甚矣故書㑹書盟書釋皆不言楚子為魯諱以深貶之也穀梁謂不與楚專釋是已或以為嘉我公之救患誤矣十四年魯侯伐邾取須句反其君焉鄭伯如楚宋公衛侯許男滕子伐鄭子魚曰所謂禍在此矣富辰言於王曰兄弟不協焉能怨諸侯之不睦盍歸叔帶乎王召之自齊歸于京師邾人以須句故出師魯侯不設備臧孫辰曰小不可易也衆不可恃也詩曰敬之敬之天惟顯思命不易哉先生之明徳猶無不難也無不懼也況我小國乎君其無謂邾小蠭蠆有毒而況國乎弗聽六月丁未戰于升陘魯師敗績邾人獲公胄縣諸魚門邾雖戰勝死傷甚衆無衣可復至用矢焉楚王伐宋以救鄭九月己巳朔宋公阻泓水而陣既成列楚人未既濟子魚請擊之公不可既濟而未成列又以告公又不可既陳而後擊之宋師敗績公傷股門官殱焉國人皆咎公公曰君子不重傷不禽二毛古之為軍也不以阻隘也寡人雖亡國之餘不鼓不成列子魚曰君未知戰若愛重傷則如勿傷愛其二毛則如服焉丙子晨鄭文夫人芊氏姜氏勞楚王于柯澤王使示以俘馘君子曰非禮也婦人送迎不出門見兄弟不踰閾戎事不邇女器丁丑王入享于鄭夜出文芈送于軍取鄭二姬以歸叔詹曰楚王其不没乎為禮卒於無别諸侯是以知其不遂霸也經曰十有二年春公伐邾取須句按左氏則魯固得崇明祀保小寡之禮何以書取乎不請于王命而專為母家報怨謀動干戈於邦内擅取人國而反其君是以亂易亂非所以為禮也與收奪者無異夏宋公衛侯許男滕子伐鄭秋八月丁未及邾人戰于升陘魯既敗績邾亦幾亡輕用師徒害及兩國亦異於誅暴救亂之兵矣故諱不言公而書及内以諱為貶冬十有一月己巳朔宋公及楚人戰於泓宋師敗績泓之戰宋襄公不阨人於險不鼓不成列先儒以為至仁大義雖文王之戰不能過也而春秋不與何哉物有本末事有終始順事恕施者王政之本也襄公伐齊之喪奉少奪尊使齊有殺無虧之惡有敗績之傷此晉獻公之所以亂其國者罪一也桓公存三亡國以屬諸侯義士猶曰薄徳而一㑹虐二國之君罪二也曹人不服盍姑省徳無闕然後動而興師圍之罪三也凡此三者不仁非義襄公敢行而獨愛重傷與二毛則亦何異盜跖之以分均出後為仁義陳仲子以避兄離母居於陵為亷乎夫計末遺本飾小名妨大徳者春秋之所惡也故詞繁不殺而宋公書及以深貶之也十五年甲申春齊侯怨宋公之不與盟於齊也伐宋圍緡三月庚寅宋公薨傷於泓故也諡曰襄公子王臣嗣楚成得臣帥師伐陳討其貳於宋也遂取焦夷城頓而還得臣子玉也以字行子文以為之功使為令尹薳吕臣曰子若國何對曰吾以靖國也夫有大功而無貴仕其人能靖者與有㡬九月把伯薨諡曰成公弟姑容嗣成公始行夷禮終其身經曰二十有三年春齊侯伐宋圍緡齊霸國之餘業也宋襄公既敗於泓荆楚之勢益張矣齊侯既無尊中國攘夷狄恤災患畏簡書之意又乘其約而伐之此又義之所不得為者也故書伐國而言圍邑以著其罪然則桓公伐鄭圍新城何以不為貶乎鄭與楚合憑陵中國桓公伐之攘夷狄也宋與楚戰兵敗身傷齊侯伐之殘中夏也其事異矣美惡不嫌同詞夏五月庚寅宋公兹父卒秋楚人伐陳冬十有一月把子卒春秋天子之事也而尤謹于華夷之辨中國之所以為中國以禮義也一失則為夷狄再失則為禽獸人類滅矣魯桓簒弑滕首朝之貶而稱子治其黨也夷不亂華成公變之貶而稱子存諸夏也十六年鄭人入滑王為滑請鄭不聽命王怒將以狄伐鄭富辰諫曰太上以徳撫民其次親親以相及也昔周公弔二叔之不咸故封建親戚以蕃屏周管蔡郕霍魯衛毛聃郜雍曹滕畢原酆郇文之昭也邗晉應韓武之穆也凡蔣邢茅胙祭周公之𦙍也召穆公思周德之不類當厲宣之際糾合宗族于成周而作詩曰棠棣之華鄂不韡韡凡今之人莫如兄弟兄弟䦧於牆外禦其侮雖有小忿不廢懿親鄭在天子兄弟也兄弟之怨不徴於他章怨外利不義棄親即狄不祥以怨報徳不仁王其若之何弗聽使頽叔出狄師伐鄭取櫟王將以狄隗為后富扆諌曰不可王者尊貴明賢庸勲長老愛親禮新親舊者也今王棄鄭而降於狄一舉而棄七徳夫婚姻禍福之階也利内則受福利外則取禍狄固貪惏王又啓之女徳無極婦怨無終狄必為患弗聽隗氏通於叔帶王替隗氏頽叔曰我實使狄狄其怨我遂奉叔帶以狄師攻王王御士將禦之王曰先后其謂我何寜使諸侯圗之遂出適鄭處于汜使告諸侯曰不榖不徳得罪於寵子帶鄙在鄭地汜敢告叔父伯舅魯臧文仲對曰天子䝉塵于外敢不奔問官守鄭伯與孔將鉏石甲父侯宣多省視官具于汜而後聽其私政晉侯夷吾薨諡曰恵公子圉嗣時公子重耳已在秦矣初重耳處狄十二年狐偃曰吾來此也休以擇利也盍行乎乃行過衛衛侯不禮焉及齊桓公妻之有馬二十乗公子安之曰民生安樂孰知其他從者不可姜氏曰行也西方之書曰懐與安實疚大事管敬仲曰畏威如疾民之上也從懷如流民之下也若何懷安遂行及曹曹伯聞其骿脅薄而觀之僖負羈之妻曰吾觀晉公子之從者皆足以相國反國而得志於諸侯若誅無禮曹其首也及宋宋司馬公孫固言於公曰晉公子好善不厭父事狐偃而惠以有謀師事趙衰而文以忠貞長事賈佗而多識以恭敬動則諮焉成幼不倦君其禮之襄公贈之以馬二十乗及鄭鄭亦不禮焉叔詹諫曰晉公子有三焉天其或者將建諸男女同姓其生不蕃公子姬出而至於今一也離外之患而天不靖晉國二也有三士足以上人三也晉鄭同儕其過子弟固將禮焉况天之所啓乎弗聽及楚楚王以周禮饗之九獻庭實旅百既饗楚王問曰公子若反晉國則何以報不榖對曰若以君靈得反晉國晉楚治兵遇於中原其辟君三舍若不獲命其左執鞭弭右屬櫜鞬以與君周旋子玊請殺之王曰公子廣而儉文而有禮其從者肅而寛忠而能力晉惠無親外内惡之吾聞姬姓唐叔之後其後衰者也其將由晉公子乎天將興之誰能廢之違天必有大咎乃送諸秦秦伯享之公子賦河水公賦六月趙衰曰重耳拜賜公子降拜稽首公降一級而辭焉衰曰君稱所以佐天子者命重耳重耳敢不拜晉侯圉命無從亡人期期而不至無赦毛偃從重耳狐突弗召命執之對曰子之能仕父教之忠古之制也策名委贄貳乃辟也今臣之子名在重耳有年數矣若又召之教之貳也父教子貳何以事君刑之不濫君之明也臣之願也淫刑以逞誰則無罪臣聞命矣圉殺之秦伯納晉公子秦世子罃贈送于渭之陽秦國風九篇曰渭陽二章章四句康公念母也康公之母晉獻公之女文公遭麗姬之難未反而秦姬卒穆公納文公康公時為大子贈送文公于渭之陽念母之不見也我見舅氏如母存焉及其即位思而作是詩也我送舅氏曰至渭陽母之昆弟曰舅何以贈之路車乗黄贈送也乗黄四馬也我送舅氏悠悠我思何以贈之瓊瑰玊佩瓊瑰石而次玉公子濟河晉軍自廬栁退軍于郇狐偃及秦晉大夫盟于郇公子入于曲沃殺圉于髙梁諡曰懷公吕郤畏偪將焚公宫而弑晉侯寺人披請見公使辭焉曰夫袪猶在女其行乎對曰君命無二古之制也除君之惡唯力是視齊桓公置射鉤而使管仲相君若易之何辱命焉行者甚衆豈唯刑臣見之以難告晉侯潜㑹秦伯于王城吕甥郤芮求公不獲乃如河上秦伯誘而殺之晉侯逆夫人嬴氏以歸秦伯送衛於晉三千人實紀綱之僕公屬百官賦職任功棄責薄斂施舍分寡救乏振滯匡困資無輕關易道通商寛農懋穡勸分省用足財利器明徳舉善援能官方定物正名育類昭舊族愛親戚明賢良尊貴寵賞功勞事耉老禮賔旅友故舊胥籍狐箕欒郤栢先羊舌董韓寔掌近官諸姬之良掌其中官異姓之能掌其逺官公食貢大夫食邑士食田庶人食力工商食官皂𨽻食職官宰食加政平民阜財用不匱年饑晉侯問於箕鄭對曰信於君心信於名信於令信於事於是民知君心貧而不懼藏出於入何匱之有公使為箕公謂郭偃曰始吾以治國為易今也難對曰君以為易其難將至矣君以為難其易將至矣公問於胥臣曰吾使陽處父傅讙何如對曰是在讙也籧篨不可使俯戚施不可使仰僬僥不可使舉侏儒不可使援矇瞍不可使視瘖不可使言聾聵不可使聽童昬不可使謀質善而賢良贊之則濟違將不入若川有原以卬浦而後大初晉侯之豎里鳬須守藏者也其出也竊藏以逃盡用以求納之及入求見公辭焉對曰居者為社稷之守行者為羈絏之僕其亦可也何必罪居者國君而讎匹夫懼者甚衆矣公遽見之賞從亡者介之推不言禄禄亦弗及推曰獻公之子九人唯君在矣天未絶晉必將有主主晉祀者非君而誰天實置之而二三子以為己力不亦誣乎遂隐而死晉侯以緜上為之田曰以志吾過且旌善人陶叔狄言於公曰臣何以無賞公曰導我以仁義者受上賞禁我不得為非者次之犯矢石有汗馬之勞者又次之若徒以便嬖事我無補吾之闕徧賞之後當及汝矣晉人大説王使太宰王子文公虎及内史興賜晉侯重耳命晉侯使上卿逆於境親郊勞館諸宗廟饋九牢設庭燎及期命於武宫設桑主布几筵太宰莅之晉侯端委而入太宰以王命令冕服内史賛之三命而後即冕服既畢賔饗贈餞如公命侯伯之禮而加之以宴好興歸告王曰晉侯有禮矣禮所以觀忠信仁義也忠則分均而民不怨信則守固而令不偷仁則行報而財不匱義則節度而動不􅂝四者不失何事不濟王其善之樹於有禮艾人必豐王從之使於晉者道相逮也宋公朝於楚還過鄭鄭伯將享之問於禮皇武子對曰宋於周為客天子有事膰焉有喪拜焉豐厚可也鄭伯從之衛侯將伐邢禮至曰不得其守國不可得也我請昆弟仕焉乃往得仕經曰二十有四年春王正月夏狄伐鄭秋七月冬天王出居于鄭自周無出特書曰出者言其自取之也夫鄭伯不王固有罪矣襄王不知自反念其制命之未順也忍小忍暱懿親以扞外侮而棄徳崇姦遂出狄師是用夷制夏如木之植㧞其本也不亦傎乎王者以天下為家京師為室而四方歸往猶天之無不覆也東周降于列國既不能家天下矣又毁其室而不保則是寄生之君耳貶而書出以為後戒唐資突厥之兵以伐隋而世有戎狄之禍晉藉契丹之力以取唐而卒有播遷之辱許翰以謂不講於春秋戒襄王之所以出其言信矣而華夷之辨可不謹乎居者宅其所有之稱出而曰居者若曰普天之下莫非王土撥亂反正存天理之意也晉侯夷吾卒十七年冬十一月衞人伐邢丙子二禮從國子巡城掖以赴外殺之遂滅邢二月癸酉衛侯薨諡曰文公子鄭嗣宋蕩伯姬迎婦于魯宋殺其大夫王使至晉狐偃言於晉侯曰求諸侯莫如勤王諸侯信之且大義也不能脩身而又不能宗人人將焉依繼文之業定武之功啓土安疆今為可矣公説乃行賂于草中之戎與麗土之狄以啓東道時秦伯師于河上將納王晉侯辭秦師而下三月甲辰次於陽樊右師圍叔帶於温左師逆王夏四月丁巳入于王城殺叔帶于隰戊午晉侯朝王王享醴命之宥賜之以地辭請隧焉王弗許曰先民有言曰改玉改行叔父若能光裕大徳更姓改物以創制天下則備物以鎮撫百姓若尚將列為公侯以復先王之職則余一人其敢以私勞變前之大章晉侯遂不敢請而受陽樊温原攅茅之田始啓南陽陽樊不服圍之倉葛呼曰夫三軍之所尋將蠻夷戎狄之驕逸不䖍於是乎致武此羸者陽也懷我王徳未狎君政故未承命謂君其何徳之布以懷柔之今將蔑殺其民人宜吾不敢服也此誰非王之親姻其虐之也晉侯聞之曰此君子之言也乃出其民楚子玊圍陳納頓子于頓衛葬其君文公冬晉侯圍原命三日之糧原不降命去之諜出曰原將降矣軍吏曰請待之公曰信國之寳民之所庇也得原失信何以庇之所亡滋多退一舍而原降以趙衰為原大夫衛人平莒于魯冬十月癸亥公㑹衛子莒慶盟于洮修文公之好且及莒平也經曰二十有五年春正月丙午衛侯燬滅邢衛侯何以名滅同姓也春秋之法諸侯不生名滅同姓則名者謂其滅先祖之裔蔑骨肉之恩故生而書名示王法不容誅也聖人與天地合德滅人邦國而絶其祀同姓與異姓奚别焉而或名或否何也王道理一而分殊異端二本而無分分殊之樊私勝而失仁無分之罪兼愛而失義春秋之法由仁義行而人道立者也可以無差等乎然則晉滅虞楚滅䕫亦同姓也曷為不名曰諸侯滅同姓則名其常也有名有不名例之變也邢雖與狄伐衛而經無譏文者為能救齊也衛人曽不反思而遷怒於邢又遣禮至昆弟往仕焉誘其守而殺之于外與虞公貪璧馬以易鄰國及其身者其情異矣春秋原情定罪而衛燬獨名盖輕重之權衡也若荆楚則僣號稱王聖人比諸夷狄於㓕䕫乎何誅也夏四月癸酉衛侯燬卒宋蕩伯姬來迎婦伯姬公女也而配蕩氏其往嫁不見於經者國君不與大夫敵也今来迎婦而史策書之見公失禮下主大夫之昏是慢宗廟卑朝廷也姑自逆婦其失明矣宋殺其大夫秋楚人圍陳納頓子于頓圍陳納頓子也納云者不與納也諸侯之正也何以不與乎夫陳先代之後不能以禮安靖鄰國保恤寡小中國諸侯又不能脩方伯連帥之職而使楚人納之是夷狄仗義正諸夏也故書曰楚人圍陳納頓子于頓其責中國深矣此亦正本自治之意塟衛文公冬十有二月癸亥公㑹衞子莒慶盟于洮皇王大紀卷四十二

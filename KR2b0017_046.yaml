body:
  text: 皇王大紀卷四十六宋胡宏撰三王紀匡王元年冬魯季孫行父如晉春正月宋司馬華耦如魯盟其官皆從之魯侯與之宴辭曰君之先臣督得罪於宋殤公名在諸侯之䇿臣承其祀其敢辱君請承命於亞旅曹伯朝于魯齊人歸公孫敖之喪寘諸堂阜難毁以為請立于朝以待命許之取而殯之齊人送之為孟氏且國故也葬視慶父仲遂欲勿哭叔彭生曰喪親之終也雖不能始善終可也子無失道何怨於人仲遂哭之夏四月辛丑朔日有食之魯鼓用牲於社古者日食天子不舉伐鼔于社諸侯用幣于社伐鼓于朝以昭事神訓民事君示有等威也齊人懼諸侯之討且憚單伯之守正也遂歸之蔡人不與晉郤缺以上軍伐蔡曰君弱不可以怠遂入蔡以城下之盟而還齊人侵魯西鄙季孫行父如晉九月晉侯宋公衛侯蔡侯鄭伯許男陳侯曹伯盟于扈謀伐齊也齊人賂晉侯故不克而還魯侯以有齊難故不㑹凡諸侯會公不與而經不書者諱君惡也與而不書後也十月齊人歸魯子叔姬齊侯侵魯西鄙謂諸侯不能也遂伐曹入其郛以討其朝于魯季孫行父曰齊侯其不免乎已無禮而討於有禮者曰女何故行禮禮以順天天之道也已則反天而又以討人難以免矣是歲蔡荘侯薨子申嗣經曰十有五年春季孫行父如晉三月宋司馬華孫來盟司馬主兵之官稱華孫者自督弑殤公諸侯受賂失賊不討使東宋政及其後世繼掌兵權春秋之所禁者故傳載其承命亞旅之詞而經書宋司馬華孫來盟其曰華孫猶季孫仲孫臧孫之類不書名者義不繋於名也不稱使以是專行為無君矣孟子曰所謂故國者非謂其有喬木有世臣之謂也春秋此義其欲後世以賢者之類功臣之冑為世臣然後委之以政乎夏曹伯來朝齊人歸公孫敖之喪公孫敖慶父之後行又醜矣出奔他國其卒與䘮歸皆書于䇿者許翰以謂文伯惠叔二子之哀誠無已也故魯人從其請國史記其事仲尼因而不革者以敖著教也易曰有子考無咎周公命蔡仲曰爾尚盖前人之愆六月辛丑朔日有食之鼔用牲于社單伯至自齊單伯天子之命大夫也故逆王姬㑹伐宋使于齊皆書其字致而不名與意如婼異者無所書而不尊王命謹臣禮也晉郤缺帥師伐蔡戊午入蔡秋齊人侵我西鄙季孫行父如晉冬十有一月諸侯盟于扈盟于扈者晉侯宋公衛蔡陳鄭曹許八國之君也何以不序略之也春秋於夷狄君臣同詞而不分爵號説者以為畧之也八國曷為畧之等於夷狄乎齊人弑君不能致討受賂而退奚以賢於狄矣不曰晋人㑹諸侯盟于扈而曰諸侯盟者分惡於諸侯也田恒弑其君孔子沐浴而朝告於哀公請討之弑君之賊夫人之所討也而况於諸侯乎况於鄰國乎略諸侯而不序以其欲討齊罪而後不能也况於鄰壤初不與盟㑹者乎魯君之罪亦可知矣十有二月齊人來歸子叔姬不言齊子叔姬來歸而曰齊人來歸子叔姬無罪齊人自絶而歸之爾春秋深罪齊人以商人為君而不知其惡故其執其歸與弑其君商人皆稱齊人深責之也齊侯侵我西鄙遂伐曹入其郛二年春魯將及齊平魯侯有疾使季孫行父會齊侯于陽穀請盟齊侯不肯曰請俟君間魯侯四不視朔使仲遂納賂於齊夏四月戊辰盟于郪丘六月辛未魯僖夫人聲姜薨魯人毁泉臺有蛇自泉宫出故毁之楚王之即位也少政在潘崇聲色是好令曰敢諫者死伍舉進曰有鳥在阜三年不飛不鳴是何鳥也王曰飛將冲天鳴將驚人舉退矣吾知之矣王淫樂益甚蘇從請諌王曰不聞令乎對曰好樂者多求多求而民怨今又因之以饑饉加之以軍旅國亡無日矣時楚大饑戎伐其西南至于阜山又伐其東南至于陽丘庸人帥羣蠻以叛楚麋人帥百濮聚於選將伐楚申息之北門不啓王聞從言起執其手出而坐朝誅阿䛕大臣五舉處士六任伍舉蘇從以政謀徙於阪髙蒍賈曰不可我能徃冦亦能徃不如伐庸夫麋與百濮謂我饑不能師故伐我也若我出師必懼而歸百濮離居将各走其邑誰暇謀人乃出師旬有五日百濮乃罷楚王乗驛㑹師伐庸秦人巴人從楚師羣蠻從楚王盟遂滅庸宋公之弟鮑禮於國人宋饑竭其粟而貸之年自七十已上無不饋詒也國之材人無不事也親自桓以下無不恤也襄夫人助之施宋公無道國人奉鮑以因夫人於是蕩意諸復為司城夫人將使公田孟諸而殺之公知之盡以寳行蕩意諸曰盍適諸侯公曰不能其大夫至於君祖母以及國人諸侯誰納我盡以其寶賜左右而使行夫人使謂司城去公對曰臣之而逃其難若後君何九月公將田孟諸未至襄夫人使帥甸攻而殺之蕩意諸死之鮑襲位趙盾請於晉侯曰宋人弑君反天理逆民則晉為盟主而不修天罰將懼及焉公許之經曰十有六年春季孫行父㑹齊侯于陽榖齊侯弗及盟夏五月公四不視朔天子班朔于諸侯諸侯每月奉以告廟出視朝政文公四不視朔公羊子以為有疾也不言疾自是公無疾不視朔也此見聖人所書之意若後復視朔者必於此書公有疾與昭公如晉之事比矣文公厭政備見於經閏不告朔不視無雨不閔㑹同不與廟壊不修作主不時事神治民之怠也則其心放而不知求久矣六月戊辰公子遂及齊侯盟于郪丘秋八月辛未夫人姜氏薨毁泉臺先祖為之非矣然臺之存毁非安危治亂之所係也雖勿居可也而必毁之是暴揚其失有輕先祖之心此履霸之漸弑父與君之萌春秋之所謹也故書楚人秦人巴人滅庸楚大饑戎與麋濮交伐之而庸人幸其弱帥群蠻以叛楚此取滅之道也楚人謀徙於阪髙蒍賈曰不可我能徃冦亦能徃不如伐庸亦見其謀國之善矣故列書三國而楚不稱師減楚之罪詞也冬十有一月宋人弑其君杵臼此襄夫人使甸殺之也而書宋人者昭公無道國人之所欲弑也君無道而弑之可乎諸侯殺其大夫雖當於罪若不歸諸司冦猶有專政之嫌以為不臣矣况於北面歸戴奉之以為君也故曰人臣無将將則必誅昭公無道聖人以弒君之罪歸宋人者以明三綱人道之大倫君臣之義不可廢也然則有土之君可以肆於民上而無誅乎諸侯無道天子方伯在焉臣子國人其何居死於其職而明於去就從違之義斯可矣蕩意諸亦死職春秋削之不得班於孔父仇牧荀息何也三子閑其君而見殺春秋之所取也意諸知國人将弑其君而不能正坐待其及而死之所謂匹夫匹婦自經於溝瀆而莫之知也奚得與死於其職者比乎聖人所以獨取髙哀之去而書字以褒之也三年晉荀林父衛孔達陳公孫寧鄭石楚伐宋討曰何故弑君宋人行賂師立文公而還二月癸亥魯葬僖公夫人聲姜齊伐魯西鄙仲遂請盟夏四月癸未齊侯魯侯盟于榖晉侯蒐于黄父遂㑹宋公衛侯蔡侯陳侯鄭伯許男曹伯于扈將為魯討齊取賂而還鄭伯曰徃取賂於宋又取賂於齊晉不足與也魯侯有齊難故不㑹晉侯不見鄭伯鄭公子歸生與趙盾書曰寡君即位成陳蔡一朝于襄再見於君夷與孤之二三臣相及於絳今大國曰爾未逞吾志敝邑有亡無以加焉古人有言曰畏首畏尾身其餘㡬又曰鹿死不擇音小國之事大國也徳則其人也不徳則其鹿也鋌而走險急何能擇将悉敝賦以待於儵唯執事命之遂受盟于楚魯仲遂如齊拜榖之盟復曰聞齊人将食魯之麥以臣觀之将不能齊君之語偷先大夫臧文仲曰民主偷必死經曰十有七年春晉人衛人陳人鄭人伐宋列國之卿其君所與共天位治天職者宋有弑君之亂欲行天討而伐宋乃其職也復不能討而成其亂是不足為國卿失其職矣故皆貶而稱人大夫帥師稱名氏賤者窮諸人其稱人賤之也田常弑簡公孔子請討曰以吾從大夫之後不敢不告也夏四月癸亥葬我小君聲姜齊侯伐我西鄙六月癸未公及齊侯盟于榖諸侯㑹于扈宋昭公雖為無道人臣将則必誅春秋正宋人為弑君之罪所以明人道之大倫也故大夫無沐浴之請則貶而稱人諸侯無討賊之功則畧而不序不然是廢君臣之義人欲肆而天理滅矣故曰春秋成而亂臣賊子懼秋公至自榖冬公子遂如齊四年魯夫人姜氏生世子赤及公子視二妃敬嬴生公子接敬嬴嬖而私事襄仲遂以其子屬焉故遂欲立接叔彭生不可乃立子惡十二月丁丑公薨于臺下秦伯罃薨諡曰康公子稻嗣齊侯之為公子也與邴歜之父争田不勝及即位乃掘而則之而使歜僕納閻職之妻而使職驂乗三月戊戍公㳺于申池二人浴于池歜以扑抶職職怒歜曰人奪女妻而不怒一抶女庸何傷職曰與刖其父而不能病者何如乃起弑公納諸竹中歸舍爵而行齊人立公子元夏四月癸酉魯葬其君文公魯仲遂叔孫得臣如齊請立公子接齊侯新立欲親魯許之仲遂歸八月殺子赤及視以君命召叔彭生其宰公冉務人止之曰入必死彭生曰死君命可也曰若君命可死非君命何聽弗聽乃入殺而埋之馬矢之中夫人歸于齊哭而過市曰天乎遂為不道殺適立庶市人皆哭魯人謂之哀姜魯季孫行父如齊莒子生世子僕又生季佗愛季佗而黜僕且多行無禮於國國人弑之諡曰紀公僕以其寶玉奔魯魯侯命與之邑季孫行父曰先大夫臧文仲教行父曰見有禮於其君者如孝子之養父母也見無禮於其君者如鷹鸇之逐鳥雀也行父奉以周旋弗敢失墜夫莒僕則其孝敬則弑君父矣則其忠信則竊寳玊矣其人則盗賊也其器則姦兆也保而利之則主藏也以訓則昏民無則焉使司冦出諸境經曰十有八年春王二月丁丑公薨于臺下秦伯罃卒夏五月戊戍齊人弑其君商人按左氏齊懿公即位刖邴歜之父而使歜僕納閻職之妻而使職驂乗二人者實弑懿公然則於法冝書曰盗而特變其詞以為齊人何也亂臣賊子之動於惡必有利其所為而與之者人人不利其所為而莫之與則孤危獨立無以濟其惡簒弑之謀息矣惟利其所為而與之者衆是以能濟其惡天下胥為禽獸而莫之遏公子商人驟施於國而多聚士盡其家而貸於公有司是以財誘齊國之人也齊人貪公子一時之私施不顧君臣萬世之大倫弑其國君則靦面以為之臣而不能討執其君母則拱手以聴其所為而不能救故於懿公見殺特不書盗反以弑君之罪歸諸齊人以誅亂賊之黨弭簒弑之漸所謂㧞本塞源懲禍亂之所由也故曰春秋成而亂臣賊子懼六月癸酉葬我君文公秋公子遂叔孫得臣如齊使舉上客将稱元帥此春秋立文之常體也其有變文書介副者欲以起問者見事情也子赤夫人之子今卒于弑不著其實是為國諱惡無以傳信於将來而春秋之大義隠矣故上書大夫並使下書夫人歸于齊中曰子卒則見禍亂邪謀發於奉使之日而公子遂殺立其君之罪著矣冬十月子卒諸侯在喪稱子繼世不忍當也既葬不名終人子之事也踰年稱君縁民臣之心也子卒何以不日遇弑不忍言也既葬而不名不名而遇弑者不日以見其弑子赤是也踰年而稱君稱君而遇弑者不地以見其弑閔公是也何以知其賊乎上書大夫並使下書子卒夫人歸則知罪之在公子遂矣孫于邾出奔莒則知罪之在夫人與慶父矣繼世之恩終事之重情文之節隠惡之禮記事之信誅亂臣討賊子之義亦備矣夫人姜氏歸于齊書夫人則知其正書姜氏則知其非見絶于先君書歸于齊則知其無罪異於孫干邾者而魯國臣子殺嫡立庶敬嬴宣公不能事主君存適母其罪不書而竝見矣季孫行父如齊莒弑其君庶其五年魯仲遂如齊逆女春正月以夫人姜氏歸魯季孫行父如齊納賂以請㑹晉人討不用命者放胥甲父于衛而立其子克齊侯㑹魯侯于平州仲遂如齊拜成魯人以濟西田為賂于齊邾子朝于魯楚王侵陳遂侵宋晉趙盾帥師救陳宋宋公陳侯衛侯曹伯㑹趙盾于棐林伐鄭楚蒍賈救鄭遇于北林晉人乃還晉欲求成于秦趙穿曰我侵崇秦急崇必救之吾以求成焉趙穿侵崇秦弗與成晉人伐黄以報北林之役於是晉侯侈趙盾為政驟諌而不入故不競於楚經曰元年春王正月公即位宣公為弑君者所立受之而不討賊是亦聞乎弑也故如其意焉而書即位以著其自立之罪而不嫌於同詞美一也有小大則褒詞異惡一也有小大則貶詞異一美一惡無嫌於同公子遂如齊逆女魯秉周禮喪未期年遣卿逆女何亟乎太子赤齊出也仲遂殺子赤及其母弟而立宣公懼於見討故結昏于齊為自安訃越典禮以逆之如此其亟而不顧者必敬嬴仲遂請齊立接之始謀也其後滕文公定為三年䘮父兄百官皆不欲曰吾宗國魯先君莫之行也䘮紀浸廢夫豈一朝一夕之故自文宣莫之行矣此所謂不待貶絶而罪惡見者也三月遂以夫人婦姜至自齊有不待貶絶而罪惡見者不貶絶以見惡夫人與有罪焉則待貶而後見故不稱氏夫人其如何知惡無禮如野有死麕能以禮自防如草蟲愆期有待如歸妹之九四則可免矣凡稱婦者其詞雖同立義則異逆婦姜于齊病文公也以婦姜至自齊責敬嬴也敬嬴嬖妾私事襄仲以其子屬之殺世適兄弟出主君夫人援成風故事即以子貴為國君母斬焉在衰服之中請昏納婦而其罪隠而未見也故因夫人至特稱婦姜以顯之此乃春秋推見至隠著妾母當國用事為後世鑒也槩指為有姑之詞而不察其㫖則精義隠矣夏季孫行父如齊經書行父如齊而不言其故謂納賂以請㑹者傳也經有不待傳而著者比事以觀斯得矣下書公㑹齊侯于平州則知此㑹行父請之也又書齊人取濟西田則知其請盖以賂也雖㣲傳其事著矣諸侯立郷為公室輔猶室之有楹也而謀國如此亦不待貶絶而惡自見者也不然以行父之勤勞恭儉相三君而無私積必能以其君顯名與晏嬰等矣晉放其大夫胥甲父于衛放猶羈置母去其所比於專殺者其罪薄乎云爾或以為近正非矣大夫當官既不請於天子而自命以為有罪人不告於司冦而擅刑猶不逺於正乎秦晉戰於河曲撓㬰駢之謀者趙穿也若討其不用命則當以穿為首止治軍門之呼偕貶可也而獨放胥甲父則以趙盾當國穿其族子而盾庇之也桃園之罪其志固形於此矣故稱國以攽見晉政之在私門而成上侵為後戒也公㑹齊侯于平州按左氏曰㑹于平州以定公位魯宣簒立踰年舉國臣子既從之矣若之何位猶未定而有待於平州之㑹也春秋以來弑君篡國者已列於諸侯之㑹則不復致討故曹人以此請負芻于晉夫簒弑之賊毁滅天理無所容於天地之間人無存沒時無古今其罪不得赦也以列於㑹而不復討是率中國為戎夷棄人類為禽獸此仲尼所為懼春秋所以作也然欲定其位者魯宣公宜稱及齊而曰㑹者討賊之法也凡討亂臣賊子必深絶其黨而後為惡者孤矣公子遂如齊宣公簒立之罪仲遂主謀為首惡初請于齊遂為上客而並書介使者罪叔孫得臣不能為有無亦從之也大夫有以死争者矣然削而不書者以叔仲惠伯死非君命失其所也遂及行父則一再見于經矣如齊拜成雖削之可也又再書于策者於此著其始終成就弑立之謀以戒後世人臣或内交宫禁以固其寵或外結藩鎮以為之援至於殺生廢置皆出其手而人主不悟者其慮深矣凡此旨直書于策而義自見者也六月齊人取濟西田魯人致賂以免討而書齊人取田者所以著齊罪春秋討賊尤嚴於利其為惡而助之者所以孤其黨夫齊魯鄰國盟主之餘業也子惡弑出姜歸而宣公立不能聲罪致討務寜魯亂首與之㑹是利其為惡而助之也弑君簒國人道所不容而貨賂公行免於諸侯之討則中國遂為戎夷人類滅為禽獸其禍乃自不知以義為利而以利之可以為利而為之也孟氏為梁王極言利國者必至於弑奪而後饜盖得經書取田之意舉法如此然後人知保義棄利亂臣賊子孤立無徒而亂少弭矣秋邾子來朝楚子鄭人侵陳遂侵宋楚書爵而人鄭者貶之也鄭伯本以宋人弑君晉不能討受賂而還以此罪晉為不足與也遂受盟于楚今乃附楚以亟病中國何義乎書侵陳遂侵宋者以見潜師掠境肆為侵暴非能聲宋罪而討之也既正此師為不義然後中國之師可舉矣晉趙盾帥師救陳鄭在王畿之内而附蠻夷陳先代帝王之後而見侵逼此門庭之冦利用禦之者也晉能救陳則存諸夏攘夷狄之師故特褒而書救凡書救者未有不善之也如解倒懸如拯民於塗炭之中知此義則知春秋用兵之意矣傳稱師救陳宋經不書宋此非缺文乃聖人削之也前方以不能討宋上卿貶而稱人諸侯㑹而不序今若書救宋則典刑紊矣宋公陳侯衛侯曹伯㑹晉師于棐林伐鄭列數諸侯而㑹晉趙盾之事穀梁子以為大趙盾之事以其大之也故曰師此説非也春秋立法君為重而大夫與師其體敵列數諸侯於帥師之下而又書大夫之名氏則臣疑於君而不可以為訓其曰㑹晉師此謹禮於㣲之意也其立義精矣棄林鄭地也前者地而後伐以為疑詞此其地則以著其美者一美一惡無嫌於同趙穿帥師侵崇崇在西方秦所與也晉欲求成于秦不以大義動之而伐其與國則為諼已甚比諸伐楚以救江異矣而傳謂設此謀者趙穿也意者趙穿已有逆心欲得兵權託於伐國以用其衆乎不然何謀之迂而當國者亦不裁正而從之也穿之名姓自登史䇿弑君于桃園而上卿以志同受惡其端又見於此書侵以見所以求成者非其道也晉人宋人伐鄭宋人弑君既列於㑹在春秋衰世已免於諸侯之討矣論春秋王法則其罪固在法所不救也而晉人與之合兵伐鄭是謂以燕伐燕庸愈乎其書晉人宋人非将卑師少盖貶而人之也以貶書伐者若曰聲罪致討而已有瑕則何以伐人矣六年甲寅鄭公子歸生受命於楚伐宋宋華元樂吕禦之二月壬子戰于大棘宋師敗績囚華元獲樂吕將戰華元殺羊食士其御羊斟不與及戰與入鄭師故敗宋人以兵車百乗文馬百駟以贖華元半入華元逃歸秦伐晉以報崇也遂圍焦晉趙盾救焦遂自隂地及宋衛陳三國之師侵鄭楚鬬椒曰能欲諸侯而惡其難乎遂次于鄭以待晉師趙盾曰彼宗競于楚殆将斃矣姑益其疾乃去之晉侯不君厚斂以彫牆從臺上弹人而觀其辟丸也宰夫胹熊蹯不熟殺之趙盾将諫士季請先三進及溜而後視之曰吾知所過矣将改之季稽首曰人誰無過過而能改善莫大焉社稷之固矣豈惟羣臣賴之猶不改宣子驟諌公患之使鉏麑賊之晨徃寝門闢矣盛服將朝尚早坐而假寐麑嘆曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一于此不如死也觸槐而死公飲盾酒伏甲將攻之其右提彌明知之趨登曰臣侍君燕過三爵非禮也遂扶以下鬬且出提彌明死之公介靈輒倒㦸以禦公徒而免之盾出奔秋七月乙丑趙穿弑晉侯于桃園盾未出山而復大史書曰趙盾弑其君以示於朝盾曰不然對曰子為正卿亡不越境反不討賊非子而誰盾曰我之懐矣自貽伊慼其我之謂矣孔子曰董狐古之良史也書法不隠趙宣子古之良大夫也為法受惡惜也越境乃免盾使穿逆文公子黑臀于周而立之諡先君曰靈公晉自驪姬之亂無公族至是始宦卿之適而為之田以為公族又宦其餘子亦為餘子其庶子為公行八月乙亥王崩諡曰匡王弟瑜立經曰二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲華元兩軍接刃主將見獲其負明矣又書師敗績詞不贅乎此明大夫雖貴與師等也故將尊師少稱将不稱師師衆将卑稱師不稱将将尊師衆並書于䇿者示人君不可輕役大衆又重将師之選其義深矣或曰元帥三軍之司命而輕重若是班乎自行師而言則以元帥為司命自有國而言則以得衆為邦本鄭使髙克将兵禦狄于境欲逺克也而不恤其師楚以六卒實從得臣恐䘮師也而不恤其將故經以棄師罪鄭以殺其大夫責楚明此義然後知王者之道輕重之權衡矣秦師伐晉按左氏以報崇也遂圍焦晉用大師於崇乃趙穿私意而無名也故書侵秦人為是興師而報晉則問其無名之罪也故書伐世豈有欲求成於强國而侵其所與可以得成者乎穿之情見矣宣子當國筭無遺策獨懵於此哉其從之也而盾之情亦見矣春秋書事筆削因革必有以也一侵一伐而不書圍焦所以誅晉卿上侵之意其所由來者漸矣夏晉人宋人衛人陳人侵鄭按左氏晉趙盾及諸侯之師侵鄭以報大棘之役初鄭歸生受命于楚以伐宋經不書伐而以宋華元主大棘之戰者盖楚人有詞于宋矣師之老壯在曲直晉主夏盟盾既當國合諸侯之師何畏乎楚何避乎鬬椒然力非不足而去之者以理曲也故卿不氏而稱人師書侵而不言伐易於訟卦之象曰君子作事謀始始而不謀將至於興師動衆有不能定者矣晉惟取賂釋宋而不討至於中國之大不能服鄭不競於楚可不慎乎春秋行事必正其本為末流之苦此也其垂戒明矣秋九月乙丑晉趙盾弑其君夷臯趙穿手弑其君董狐歸獄於盾其斷盾之獄詞曰子為正卿亡不越境反不討賊以是書斷而盾也受其惡而不敢辭仲尼因其法而不之革其義云何曰正卿當國任事之臣也國事莫酷於君見弑不於其身而誰責乎亡而越境謂去國而不還也然後君臣之義絶反而討賊謂復讐而不釋也然後臣子之事終不然是盾偽出而實聞乎故也假令不與聞者而縦賊不討是有今将之心而意欲穿之成乎弑矣惡莫慘乎意今以此罪盾乃閑臣子之邪心而謹其漸也盾雖欲辭而不受可乎以髙貴鄉公之事觀馬抽戈者成濟唱謀者賈充當國者司馬昭也為天吏者将原司馬昭之心而誅之乎亦将致辟成齊而足也故陳泰曰惟斬賈充可以少謝天下耳昭問其次意在濟也秦欲進此直指昭也然則趙穿弑君而盾為首惡春秋之大義明矣㣲夫子推見至隠垂法後世亂臣賊子皆以詭計獲免而至愚無知如史太鄧扈樂之徒皆䝉歸獄而受戮焉君臣父子不相夷以至於禽獸也㡬希故曰春秋成而亂臣賊子懼冬十月乙亥天王崩皇王大紀卷四十六

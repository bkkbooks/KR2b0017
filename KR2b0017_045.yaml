body:
  text: 皇王大紀卷四十五宋胡宏撰三王紀襄王二十九年魯逆夫人于齊卿不行非禮也君子是以知其不允於魯也曰貴聘而賤逆之君而卑之立而廢之棄信而壞其主在國必亂在家必亡晉人以孔達衛之良也免之狄侵齊楚人滅江秦伯為之降服出次不舉過數大夫諌公曰同盟滅敢不矜乎吾自懼也晉侯伐秦圍邧新城以報王官之役衛寧武子俞聘于魯公與之宴為賦湛露及彤弓不辭又不答賦使行人私焉對曰臣以為肄業及之也昔諸侯朝正於王王宴樂之於是乎賦湛露則天子當陽諸侯用命也諸侯敵王所愾而獻其功王於是乎賜之彤弓一彤矢百玈弓矢千以覺報宴今陪臣來繼舊好君辱貺之其敢千大禮以自取戾九月壬寅魯僖公之母成風薨秦伯用由余之謀破西戎取國十二開地千里王使召公過賀秦伯以金鼓命為西方諸侯伯經曰四年春公至自晉夏逆婦薑于齊逆皆稱女以未成婦而女者在父母家之所稱也往逆而稱婦入國不書至何哉此春秋誅意之論也禫制未終思念娶事是不志哀而居約矣方逆也而已成為婦未至也而如在國中原其意而誅之也不稱夫人薑氏者亦與有貶焉婦人不專行何以與有貶父母與有罪也文公不知敬其伉儷違禮而行使國亂子弒齊人不能鑒微知著冒禮而往使其女不允於魯皆失於不正其始之過也夫婦之際人倫之首禮不可不謹也故交貶之以為後鑒狄侵齊秋楚人滅江晉侯伐秦晉人三敗秦師見報乃常情耳而穆公濟河焚舟則貶而稱人秦取王官及郊未至結怨如晉師之甚也襄公又報之於常情過矣而得稱爵何也聖人以常情待晉襄而以王事責秦穆所以異乎襄公忘親背惠大破秦師敗狄伐許怒魯侯之不朝也而以無禮施之是専尚威力先事加人莫知省德而後動也今又報秦不足罪矣穆公初敗于殽悔過自誓增修德政宜若過而知悔悔而能改又有濟河之役則非誓言之意所以備責之也然晉襄見伐而報猶無譏焉秦穆至是見伐而不報善可知矣不譏晉侯所以深善秦伯春秋大改過嘉釋怨王者之事也故仲尼定書列秦誓於百篇之末以見悔過能改而不責人聖賢誥命不越此矣衛侯使寧俞來聘冬十有一月壬寅夫人風氏薨風氏僖公之母莊公妾也而稱夫人自是嫡妾亂矣語曰邦君之妻邦人稱之曰君夫人稱諸異邦曰寡小君蓋敵體之稱也若夫妾媵則非敵矣其生亦以夫人之名稱號之其沒亦以夫人之禮卒葬之非所以正其分也以妾媵為夫人徒欲尊寵其所愛而不虞卑其身以妾母為夫人徒欲崇貴其所生而不虞賤其父卑其身則失位賤其父則無本越禮至是不亦悖乎夫禮庶子為其母無服不敢二尊者也春秋於成風記其卒葬各以實書不為異詞者謹禮之所由變也三十年冬十一月王使榮叔歸魯成風之含且賵正月辛亥魯葬成風召昭公會葬魯公孫敖如晉初鄀叛楚即秦又二於楚夏秦人入鄀六人叛楚即東夷秋楚成大心仲歸帥師滅六冬楚子燮滅蓼臧文仲聞六與蓼滅曰臯陶庭堅不祀忽諸德之不建民之無援哀哉晉陽處父聘于衛反過寧寧嬴從之及溫而還其妻問之嬴曰以剛商書曰沉潛剛克髙明柔克夫子一之其不沒乎天為剛德猶不干時况在人乎且華而不實怨之所聚也犯而聚怨不可以定身余懼不獲其利而離其難是以去之經曰五年春王正月王使榮叔歸含且賵珠玉曰含車馬曰賵歸含且賵者厚禮妾母也不稱天王者弗克若天也春秋係王於天以定其名號者所履則天位也所冶則天職也所勑而惇之者則天之所敘也所自而庸之者則天之所秩也所賞所刑者則天之所命而天之所討也夫婦人倫之本今成風以妾僭嫡王不能正又使大夫歸含賵焉而成之為夫人則王法廢人倫亂矣是謂弗克若天而悖其道非小失耳故特不稱天以謹之也三月辛亥葬我小君成風仲子雖聘非惠公之嫡也春秋之初尚以為疑故别為之宫而羽數特異此雖非禮之正然不祔于姑猶有辨焉至是成風書葬乃有二夫人祔廟而亂倫易紀無復辨矣故禮之失自成風始也王使召伯來會葬成風薨王使榮叔歸含且賵既不稱天矣及使召伯來會葬人與貶焉何也歸含且賵施於妾母已稠疊人使卿會葬恩數有加是將祔之於廟也而致禮於成風盡矣聘一也含賵而又葬則其事益隆亂倫廢法甚矣再不稱天所以示其戒也夏公孫敖如晉秦人入鄀秋楚人滅六冬十月甲申許男業卒三十一年晉侯搜于夷舍二軍將登箕鄭父先都而使士縠梁益耳將中軍先克曰狐趙之勳不可廢也使狐射姑將中軍趙盾佐之陽處父成季之屬也至自溫言於晉侯謂趙盾能曰使能國之利也改搜于董易中軍趙盾於是始為國政制事典正法罪辟獄刑董逋逃由質要治舊汙本秩禮續常職出滯淹既成以授太傅陽子與太師賈他使行諸晉國以為常法許葬其君僖公魯臧孫辰以陳衛之睦也曰宜求好於陳季孫行父聘於陳且娶焉秦伯任好薨諡曰穆公子罃嗣以子車氏之三子奄息仲行針虎為殉皆秦之良也國人哀之秦國風六篇曰黃鳥三章章十二句哀三良也國人刺穆公以人從死而作是詩也交交黃鳥止于棘興也交交小貌黃鳥以時往來得其所人以壽命終亦得其所誰從穆公子車奄息子車氏奄息名維此奄息百夫之特乃特百夫之德臨其穴惴惴其栗惴惴懼也彼蒼者天殱我良人殱盡良善也如可贖兮人百其身交交黃鳥止于桑誰從穆公子車仲行維此仲行百夫之防防比也臨其穴惴惴其栗彼蒼者天殱我良人如可贖兮人百其身交交黃鳥止于楚誰從穆公子車針虎維此針虎百夫之禦臨其穴惴惴其栗彼蒼者天殱我良人如可贖兮人百其身君子曰秦穆之不得為盟主也宜哉死而棄民先王違世猶貽之法而况奪之善人乎古之王者知命之不長是以並建聖哲樹之風聲分之采物著之話言為之律度陳之藝極引之儀表豫之法制告之訓典教之防利委之常秩道之以禮則使毋失其土宜衆隸賴之而後即命聖王同之今縱無法以遺後嗣而又收其良以死難以在上矣君子是以知秦之不復東征也魯季孫行父如晉使求遭喪之禮以行曰備豫不虞古之善教也六月乙亥晉侯歡薨諡曰襄公大臣以世子夷臯少國家多難欲立長君趙盾曰立公子雍好善而長先君愛之且近於秦秦舊好也置善則固事長則順立愛則孝結舊則安狐射姑曰立公子樂辰嬴嬖於二君立其子民必安之盾曰為二嬖淫也為先君子出在小國辟也母淫子辟無威陳小而逺無援將何安焉使先蔑士會如秦逆公子雍荀林父止蔑曰夫人世子猶在而外求君此必不行子以疾辭若何不然將及不聽八月魯仲遂如晉晉葬其君襄公晉狐射姑怨太傅陽子之易其班也而知具無援於晉也使續鞫居殺處父晉殺續鞫居射姑奔狄趙盾使臾駢送其帑夷之搜射姑戮臾駢之人欲盡殺賈氏臾駢曰吾聞之敵惠敵怨不在後嗣夫子禮於賈季我以其寵報私怨無乃不可乎親扞送之閏月魯侯朝于廟而不告朔閏以正時時以作事事以厚生生民之道於是乎在不告閏朔棄時政也何以為民經曰六年春葬許僖公夏季孫行父如陳秋季孫行父如晉八月乙亥晉侯歡卒冬十月公子遂如晉葬晉襄公晉殺其大夫陽處父晉狐射姑出奔狄公羊子曰晉殺其大夫陽處父則狐射姑曷為出奔射姑殺也射姑殺則其稱國以殺何君漏言也易曰不出戶庭無咎何謂也子曰亂之所生則言語以為階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也凡書殺者在上則稱君在下則稱民在衆則稱人在微者則稱盜君與臣同殺則稱國今殺處父者射姑耳君獨以漏言故亦預殺焉所以為後世戒也或以處父為侵官非歟曰人君用人失當則其國必危凡立于朝者舉當諫君况身為晉國之太傅耶若以為侵官將相大臣非其人百官有司失其職在位者當拱默自全隂聽人主之所為至於顛危而不救則將焉用彼相乎率天下臣子為持祿榮身不忠之行以誤朝迷國者必此侵官之説夫閏月不告月猶朝于廟不告月者不告朔也不告朔則曷為不言朔也因月之虧盈而置閏是主乎月之有閏也故不言朔而言月占天時則以星授民事則以節候寒暑之至則以氣百官修其政於朝庶民服其事於野則主乎是焉耳矣閏不可廢乎曰迎日推策則有其數轉璣觀衡則有其象歸竒於扐以象閏數也斗指兩辰之間象也象數者天理也非人所能為也故以定時成歲者唐典也以詔王居門終月者周制也班告朔于邦國不以是為附月之餘而弗之數也猶朝于廟者幸其不已之詞子貢欲去告朔之餼羊子曰爾愛其羊我愛其禮三十二年冬魯侯伐邾春正月甲戍取須句遂城郚二月宋公王臣薨諡曰成公弟禦殺世子而自立宋人殺之立成公少子杵臼將去羣公子樂豫曰公族公室之枝葉也若去之則本根無所庇廕矣親之以德皆股肱也誰敢攜二不聽穆襄之族率國人以攻公殺公孫固公孫鄭于公宫六卿和公室樂豫舍司馬以讓公子卬卬公之弟也公即位而葬秦伯送公子雍于晉襄夫人穆嬴日抱世子以啼于朝曰先君何罪其嗣亦何罪舍適嗣不立而外求君將焉置此諸大夫畏逼乃背先蔑立世子夷臯以禦秦師趙盾將中軍先克佐之及堇隂蒯得犯命克奪其田盾曰我若受秦秦則賔也不受冦也既不受矣而復緩師秦必生心先人有奪人之心軍之善謀也潛師夜起敗秦師于令狐先蔑奔秦士會從之狄侵魯魯告于晉晉人因狐射姑問狄且讓之狄人問趙衰趙盾孰賢賈對曰趙衰冬之日盾夏之日也齊侯宋公衛侯陳侯鄭伯許男曹伯會晉趙盾盟于扈晉侯立故魯侯後至徐伐莒莒人為徐人伐之故請盟於魯魯公孫敖如莒涖盟初公孫敖娶于莒曰戴已生文伯其娣聲已生惠叔戴已卒又聘于莒莒人以聲已辭則為襄仲遂聘焉是行也因為襄仲逆及鄢陵登城見之美自為娶之仲請攻之公將許之叔仲惠伯諫曰兵作於內為亂於外為冦冦猶及人亂自及也今臣作亂而君不禁以啓冦讐若之何公止之惠伯成之使仲舍之公孫敖反之晉郤缺言於趙盾曰日衛不睦故取其地今已睦矣可以歸之叛而不討何以示威服而不柔何以示懷非威非懷何以示德無德何以主盟子為正卿以主諸侯而不務德將若之何盾悅歸匡戚之田于衛經曰七年春公伐邾三月甲戍取須句遂城郚夏四月宋公王臣卒宋人殺其大夫書宋人者國亂無政非君命而衆人擅殺之也大夫不名義繫於殺大夫而其名不足紀也戊子晉人及秦人戰于令狐晉先蔑奔秦程氏以為晉不謝秦秦納不正皆罪也故稱人晉懼秦之不肯已而擊之是晉人為志乎是戰者也故書及其貶之如此者使後世臣子慎於廢立之際不可忽也治亂存亡係國君之廢立事莫重於此矣而可以有誤乎奕者舉棋不定不勝其耦况置君而可以不定乎狄侵我西鄙秋八月公會諸侯晉大夫盟于扈諸侯會晉趙盾盟于扈為晉侯立也趙盾內專廢置其君外強諸侯為此盟其不名者見大夫之強也諸侯不序見公之不及於會也文公怠惰事多廢緩既約晉盟而復後至故隱其不及罪公之不能自強於政治魯自是日益衰矣冬徐伐莒公孫敖如莒涖盟三十三年秦人伐晉取武城秦國風六篇曰晨風三章章六句刺康公也忘穆公之業始棄其賢臣焉鴥彼晨風鬱彼北林興也鴥疾飛貌晨風鸇也鬱積也北林林名也先君招賢人賢人往之鴥疾如晨風之飛入北林未見君子憂心欽欽思望之心中欽欽然如何如何忘我實多今則忘之矣山有苞櫟隰有六駮櫟木也駮如馬倨牙食虎豹未見君子憂心靡樂如何如何忘我實多山有苞棣隰有樹檖棣唐棣也檖赤羅也未見君子憂心如醉如何如何忘我實多六月戊申王崩諡曰襄王子壬臣立晉人討扈之盟于魯八月壬午仲遂會晉趙盾于衡雍乙酉遂會伊雒之戎盟于暴魯使公孫敖如周弔不至而復以幣奔莒從己氏魯有螽宋襄夫人襄王之姊也宋公不禮焉夫人因戴氏之族以殺公黨襄公之孫孔叔公孫鍾離及大司馬卬卬握節以死司城蕩意諸效節於府人出奔魯晉箕鄭父先都士縠梁益耳蒯得作亂經曰八年春王正月夏四月秋八月戊申天王崩冬十月壬午公子遂會晉趙盾盟于衡雍乙酉公子遂會雒戎盟于暴春秋記約而志詳其書公子遂盟趙盾及雒戎何詞之贅乎曰聖人謹華夷之辨所以明族類别內外也雒邑天地之中而戎醜居之亂華甚矣再稱公子各曰其會正其名與地以深别之者示中國夷狄終不可雜也自東漢已來乃與戎雜處而不辨晉至於神州陸沉唐亦世有戎狄之亂許翰以為謀國者不知學春秋之過信矣公孫敖如京師不至而復丙戍奔莒按左氏公孫敖奔莒從己氏也男女人之大欲存焉寡欲者養心之要欲而不行可以為難矣然欲生於色而縱於淫色出於性目之所視有同美焉不可掩也淫出於氣不持其志則放僻趨蹶無不為矣敖如京師其書不至而復者言敖無入使于周之意惟己氏之欲從也夫以志徇氣肆行淫欲而不能為之帥至於棄其家國出奔而不顧此天下之大戒也春秋謹書其事於敖與何誅使後人為鑒必持其志修窒欲之方也螽宋人殺其大夫司馬宋司城來奔初宋昭公將去羣公子樂豫以為不可遂舍司馬以讓卬卬固昭公之黨欲專宋政而昭公周欲以其弟卬自衛也夫司馬掌兵之司不選衆舉賢以素有威望為國人所畏服者使居其任乃故寵其私昵鮮有不亡者矣公子卬蕩意諸皆以官舉見主兵者不能其官至於見殺守土者不能其官至於見奔而其君不免失身見弒之禍冝矣頃王元年毛伯衛求金于魯魯夫人如齊晉箕鄭父等使賊殺中軍之佐先克十二月魯叔孫得臣如京師辛丑葬襄王晉人殺先都梁益耳正月魯夫人歸晉人殺箕鄭父士縠蒯得范山言於楚王曰晉君少不在諸侯北方可圗也楚王師于狼淵以伐鄭囚公子堅公子尨及樂耳鄭及楚平晉趙盾宋華耦魯仲遂衛孔達許大夫救鄭不及楚師狄侵齊六月曹伯襄薨諡曰共公子夀嗣夏楚人侵陳克壺丘以其服於晉也七月癸酉魯地震楚公子朱伐陳陳人敗之獲公子茷而懼乃及楚平楚王使子越椒聘于魯秦人歸魯夫人成風之禭曹葬其君共公經曰九年春毛伯來求金毛伯天子大夫何以不稱使當喪未君也踰年即位矣何以言未君古者諒隂三年百官總己以聽於冡宰夫百官總己以聽則是冡宰獨專國政之時託於王命以號令天下夫豈不可而不稱使春秋之旨微矣非特謹天下之通喪所以示後世大臣當國秉政不可擅權改成法也跋扈之臣假仗主威脅制中外凡有所行動以詔書從事蓋未有以春秋此義折之耳夫人薑氏如齊二月叔孫得臣如京師辛丑葬襄王晉人殺其大夫先都三月夫人薑氏至自齊夫人與君敵體同主宗廟之事出必告行反必告至則書于策然適他國者或曰享或曰會或曰如衆矣未有致之者則其行非禮以不致見其罪也出薑如齊以寧父母於禮得行矣其致者非特以告廟書耳夫人初歸豈其不告為文公越禮故削而不書示誅意之法矣今此書至者又以小君之重也夫承祭祀以為宗廟主一國之母儀而可以搖動乎出薑至是蓋不安於魯故至而特書以示防微杜漸之意其為世慮深矣晉人殺其大夫士縠及箕鄭父殺先都士縠國也其稱人以殺者國亂無政衆人擅殺之稱也何以知其非討賊之詞書殺其大夫則知之矣三大夫皆強家也求專晉不得挾私怨以作亂而使賊殺其中軍佐則固有罪矣曷為不去其官當是時靈公初立主幼不君政在趙盾而中軍佐者盾之黨也若獄有所歸則此三人者獨無可議從末減乎而皆殺之是大夫專生殺而政不自人主出也故不稱國討不去其官而箕鄭父書及示後世司賞罰者必本忠恕無有偏黨之意其義精矣楚人伐鄭公子遂會晉人宋人衛人許人救鄭按左氏范山言於楚于曰晉君少不在諸侯北方可圗也楚子師于狼淵以伐鄭則是貪得無故慿陵諸夏之兵也故楚子親將貶而稱人晉宋衛則趙盾華孔皆國卿也何以貶而稱人救而不及楚師欲以懲不恪也晉主夏盟不在諸侯以啓戎心誰之過乎故書救而稱人以罪趙盾之不能折衝消患為夷狄之所窺也夏狄侵齊秋八月曹伯襄卒九月癸酉地震冬楚子使椒來聘楚僣稱王春秋之始獨以號舉夷狄之也中間來聘改而書人漸進之矣至是其君書爵其臣書名而稱使遂與諸侯比者是以中國之禮待之也所謂謹華夷之辨內諸夏而外四夷安在乎曰吳楚聖賢之後見周之弱王靈不及僣擬名號此以夏而變於夷者也聖人重絶之夫春秋立法謹嚴而宅心忠恕嚴於立法故僣號稱王則深加貶黜比之夷狄以正君臣之義恕以宅心故內雖不使與中國同外亦不使與夷狄等思善悔過慕向中國則進之而不拒此慎用刑重絶人之意也噫春秋之所以為春秋非聖人莫能修之者乎秦人來歸僖公成風之禭秦人歸禭而曰僖公成風者非兼禭也亦猶平王來賵仲子而謂之惠公仲子爾仲子惠公之妾也然則風氏亦莊公之妾曷不書曰來歸莊公成風之禭乎曰寵愛仲子以妾為妻者惠公也故書惠公仲子所以正後世之為人夫者當明夫道不可亂嫡妾之分以卑其身尊崇風氏立為夫人者僖公也故書僖公成風所以正後世之為人子者當明子道不可行僣亂之禮以賤其父聖人埀戒之義明矣葬曹共公二年甲辰春正月辛卯魯臧孫辰卒諡曰文仲孔子論之曰臧文仲其竊位者歟知栁下惠之賢而不與立也又曰臧文仲居蔡山節藻棁何如其知也秦伯伐晉取北徴楚工尹鬬宜申與仲歸謀殺楚王事泄被誅魯自十一月不雨至于五月魯及蘇子盟于女栗王立故也狄侵宋陳侯鄭伯會楚王于息冬遂及蔡侯次于厥貉將以伐宋宋華御事曰楚欲弱我也先為之弱乎我實不能民何罪乃逆楚王勞且聽命遂道以田孟諸宋公為右盂鄭伯為左盂厥貉之會麋子逃歸經曰十年春王三月辛卯臧孫辰卒夏秦伐晉説者謂秦伐晉以戎狄書蓋闕文者據左氏少梁北徴之師兩國相攻無他得失言之也然晉取少梁事不經見固未可據秦以狄書者程氏以謂晉舍嫡嗣而外求君罪也既而悔之正矣秦不顧義理是非惟以報復為事則夷狄之道也以此狄秦義周然矣或者猶有深許晉人悔過能改終不遂非之意故重貶秦伯以見乎楚殺其大夫宜申按左氏宜申與仲歸弒穆王而誅則是討弒君之賊也曷為稱國以殺又書其官而不曰楚人殺宜申乎曰穆王者即楚世子商臣也而春秋之義微矣自正月不雨至于秋七月及蘇子盟于女栗冬狄侵宋楚子蔡侯次于厥貉楚滅江六平陳與鄭於是乎為伐宋之舉次于厥貉凡伐而次者其次為善次而伐者其次為貶齊師次陘修文告以威敵善之也故上書伐楚以著其美楚次厥貉藏禍心以慿夏貶之也故下書伐麋以著其罪當是時陳鄭宋皆從楚矣獨書蔡侯何哉鄭失三大夫俟救而不及陳獲公子茷而懼宋方有狄難蓋有不得已者非所欲也蔡無四境之虞則是得已不已志在從夷狄矣故削三國書蔡侯見其棄諸夏之惡也三年楚王伐麋成大心敗麋師于防渚潘崇伐麋至于錫穴魯叔仲惠伯會晉郤缺于承匡謀諸侯之從於楚者曹伯朝于魯魯仲遂聘于宋復蕩意諸因賀楚師之不害也秋鄋瞞侵齊遂伐魯叔孫得臣追之八月甲午敗之于鹹獲長狄僑如經曰十有一年春楚子伐麋夏叔彭生會晉郤缺于承匡秋曹伯來朝公子遂如宋狄侵齊冬十月甲午叔孫得臣敗狄于鹹左氏稱此長狄也而劉敞以為非夫春秋正名之書其稱狄也或曰狄或曰白狄或曰赤狄其稱戎也或曰戎或曰山戎或曰薑戎或曰陸渾之戎不别其種類書之于䇿後亦無所考矣四年郕伯薨郕太子朱儒自安於夫鍾國人更立君冬十一月朱儒以夫鍾與郕邽奔魯魯以諸侯之禮逆之把伯朝于魯且請絶叔姬而無絶婚公許之十二月庚子子叔姬卒羣舒叛楚楚令尹成嘉執舒子平及宗子圍巢滕侯朝于魯秦伯使西乞術聘于魯且言將伐晉秦國風曰無衣三章章五句刺用兵也秦人刺其君好攻戰亟用兵而不與民同欲焉豈曰無衣與子同袍興也袍襺也上與百姓同欲則百姓樂致其死王于興師修我戈矛與子同仇戈長六尺六寸矛長二丈天下有道則禮樂征伐自天子出仇匹也豈曰無衣與子同澤澤潤澤也王于興師修我矛戟與子偕作作起也豈曰無衣與子同裳王于興師修我甲兵與子偕行行往也秦國風終十篇曰權輿二章章五句刺康公也忘先君之舊臣與賢者有始而無終也於我乎夏屋渠渠夏大也今也每食無餘于嗟乎不承權輿氶繼也權輿始也於我乎每食四簋四簋黍稷稻粱今也每食不飽于嗟乎不承權輿秦伯為令狐之役故伐晉取羈馬趙盾禦之從秦師于河曲臾駢曰秦不能久請深壘固軍以待之秦人欲戰謂士會曰若何而戰對曰臾駢必實為此謀將以老我師也趙有側室曰穿晉君之壻也有寵而弱不在軍事好勇而狂且惡臾駢之佐上軍也若使輕者肆焉其可秦軍掩晉上軍趙穿追之不及反怒曰裹糧坐甲敵至不擊將何俟以其屬出冬十二月戊午乃皆出戰交綏秦行人夜戒師曰兩君之士皆未憗也明日請相見也臾駢曰使者目動而言肆將遁矣薄諸河必敗之胥甲趙穿當軍門呼曰死傷未收而棄之不惠也不待期而薄人於險無勇也乃止秦帥夜遁初趙盾薦韓厥為司馬厥以軍法戮宣子之僕宣子謂諸大夫曰可賀我矣吾選厥也任其事故諸大夫賢宣子魯季孫行父帥師城諸及鄆經曰十有二年春王正月郕伯來奔把伯來朝二月庚子子叔姬卒夏楚人圍巢秋滕子來朝秦伯使術來聘冬十有二月戊午晉人秦人戰于河曲秦伯親將晉上卿趙盾禦之其稱人何為令狐之役故也秦納不正遂非積忿晉不謝秦潛師禦之是以暴兵連禍至此極也凡戰皆以主人及客者處己之道寡怨之方王者之事其不書晉及何也前年秦師來伐晉不言戰者晉已服矣故狄秦而免晉今又為此役則秦曲甚矣故不以晉為主惟動大衆從秦師不奉詞令以止之也故貶而稱人此輕重之權衡也季孫行父帥師城諸及鄆五年春三月壬午陳侯朔薨諡曰共公子平國嗣楚人不禮焉遂行成于晉趙盾謂諸大夫曰范會在秦狐射姑在狄難日至矣若之何郤缺曰射姑罪大士會有恥不犯其知足使也士會遂歸其處秦者為劉氏初邾子蘧蒢卜遷於繹史曰利於民不利於君邾子曰天生民而樹之君以利之也民既利矣孤必與焉遂遷三月薨諡曰文公文公元妃齊薑生貜且二妃晉姬生捷災邾子以貜且為嗣捷災奔晉魯自十一月不雨至于五月魯大室屋壞魯侯如晉朝且尋盟衛侯會公于沓請平于晉狄侵衛冬十月己丑晉侯魯侯盟魯侯還自晉鄭伯會公于棐亦請平于晉公皆成之楚王商臣薨諡曰穆王子旅嗣經曰十有三年春王正月夏五月壬午陳侯朔卒邾子蘧蒢卒正月不雨至於秋七月大室屋壞大室周公之廟也周公稱太廟魯公稱世室羣公稱宫書大室屋壞譏久不修也何以知久乎自正月不雨則無壞道也不雨凡七月而先君之廟壞不恭甚矣凡此皆志文公怠慢不謹事宗廟以致魯國衰削之由垂戒切矣冬公如晉衛侯會公于沓狄侵衛十有二月己丑公及晉侯盟公還自晉鄭伯會公于棐六年王崩諡曰頃王子班立周公閲與王孫蘇爭政故不赴於諸侯魯使之弔邾喪也不敬邾人伐魯南鄙魯叔彭生帥師伐邾齊侯元妃魯子叔姬無寵生舍無威公子商人驟施於國而多聚士盡其家貸於公有司以繼之三月乙亥齊侯潘薨諡曰昭公舍為嗣夏四月癸酉宋公魯侯陳侯衛侯鄭伯許男曹伯會晉趙盾盟于新城同外楚也七月有星孛入于北斗周內史叔服曰不出七年宋齊晉之君皆將死亂晉趙盾以諸侯之師八百乘納捷災于邾邾人辭曰齊出貜且長盾曰非吾力不能納也義實不爾克也引師而去之公孫敖之奔莒也魯人立其子文伯榖榖疾病請曰榖之子弱請立弟難也文伯卒魯人立惠叔難敖重賂以求復難以為請許之將來九月甲申卒于齊告喪請葬弗許齊商人弒舍而讓其兄元元曰爾求之久矣我能事爾爾不可使多蓄憾將免我乎爾為之齊人遂定商人宋高哀為蕭封人以為卿不義宋公而出遂奔魯魯單伯如齊請子叔姬齊人執之又執子叔姬經曰十有四年春王正月公至自晉邾人伐我南鄙叔彭生帥師伐邾五月乙亥齊侯潘卒六月公會宋公陳侯衛侯鄭伯許男曹伯晉趙盾癸酉同盟于新城同盟于新城同外楚也其曰同者志諸侯同欲非強之也而宋公陳侯鄭伯在焉則知楚次厥貉三國雖從誠有弗獲己者削而不書蓋恕之也蔡不與盟果有背華即夷之實矣夷考晉楚行事未有以大相逺也而春秋與奪如此者荆楚僣王若與同好陵蔑中華是將代宗周為共主君臣之義滅矣可不謹乎秋七月有星孛入于北斗孛者惡氣所生暗亂不明之貌也入于北斗者斗有環域天之三辰綱紀星也宋先代之後齊晉天子方伯中國紀綱彗者所以除舊布新也禎祥妖孽隨其所感先事而著後三年宋弒昭公又二年齊弒懿公又二年晉弒靈公此三君者皆違道失德而死于亂符叔服之言天之示人顯矣史之有占明矣公至自會晉人納捷災于邾弗克納邾文公元妃齊薑生定公二妃晉姬生捷災文公卒邾人立定公捷災奔晉趙盾以諸侯之師八百乘納捷災于邾邾人辭曰齊出貜且長宣子曰非吾力不能納也義實不爾克也引師而去之故君子善之而書曰弗克納也在易同人之九四曰乘其墉弗克攻吉象曰乘其墉義弗克也其吉則困而反則也其趙盾之謂矣聖人以悔過為大過而不改將文過以遂非則有怙終之刑過而能悔不二過以逺罪則有遷善之美其曰弗克納見私欲不行可以為難矣然則何以稱人大夫而置諸侯非也聞義能徙故為之諱內以諱為貶外以諱為善九月甲申公孫敖卒于齊齊公子商人弒其君舍州吁殺君則以國氏商人獨稱公子何也以國氏者纍及乎上稱公子者誅止其身夫州吁寵愛有匹嫡奪正之漸莊公養成其惡而莫之禁至於弒逆則有以致之也故曰以國氏者纍及乎上按左氏魯叔姬妃齊昭公生舍叔姬無寵舍無威商人心知其孤危寡恃可以取而代也於是驟施於國而多聚士然則商人弒逆出於其身之所為而非昭公有以致之故曰稱公子者誅止其身舍未踰年而成之為君者穀梁子曰成舍之為君所以重商人之弒也宋子哀來奔宋昭公無道髙哀為蕭封人以為卿不義宋公而出遂來奔書曰子哀貴之也易曰幾者動之微吉之先見者也君子見幾而作不俟終日宋子哀有焉昔微子去紂列於三仁之首子哀不立於危亂之邦而春秋書字謂能貴愛其身以存道也若偷生避禍而去國出奔亦何取之有冬單伯如齊齊人執單伯齊君舍魯之甥也商人殺舍固忌魯矣魯使單伯如齊齊人意欲辱魯故執單伯并執子叔姬而誣之以罪不稱行人公羊所謂以己執之者也齊人執子叔姬子叔姬者齊君舍之母也殺其君執其母皆商人所為而以齊人執之何也商人弒君之罪已顯而齊人黨賊之惡未彰商人驟施於國而多聚士是以財誘齊國之人而濟其惡也齊人懷商人之私惠忘君父之大倫弒其君而不能討執其母而莫之救則是舉國之人皆有不赦之罪也假有人馬正色而立於朝誰敢致難其君與執其母而不之顧乎故聖人書曰齊人執子叔姬所以窮逆賊之黨與而治之也其討罪之旨嚴矣故曰春秋成而亂臣賊子懼皇王大紀卷四十五

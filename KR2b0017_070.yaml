body:
  text: 皇王大紀卷七十宋胡宏撰三王紀元王元年春晉侯午薨諡曰定公子錯嗣夏四月邾子自齊之越曰吳為無道執父立子越王歸之越人伐吳二年石隕于晉越圍吳三年吳王困蹙卑辭乞成于越越王曰請居王於甬東夫婦三百孤與王為二君以沒王年夫差曰孤老矣不能事君王矣仰天歎曰使死者有知吾何以見子胥乃縊越王悉定吳地誅太宰嚭以其不忠於君而外受重賂與已比周也振旅而歸范蠡進曰君憂臣勞君辱臣死昔王辱於會稽臣不死者為報吳也今吳報矣請從此辭越王曰何至是蠡與其私屬浮於五湖智宣子將以瑶為後智果曰不如宵也瑶之賢於人者五其不逮者一也美鬢長大射御足力技藝畢給巧文辨慧強毅果敢如是而甚不仁夫以其五賢陵人而以不仁行之其孰能待之若果立瑶也智宗必滅弗聽宣子卒立瑶為嗣五年衛侯既入侵辱大臣大臣作亂衛侯出如城鉏請師于越彗見晉澮丹水絶三日蔡侯朔薨諡曰成侯子産立六年夏越人宋人魯人納衛侯百姓不與衛侯不敢入國人立莊公庶弟黚衛侯輒使問子貢且曰吾其入乎子貢對曰吾不識也私於使者曰今君再在孫矣內不聞獻之親外不聞成之卿則賜不識所由入也詩曰無競惟人四方其訓之若得其人四方以為主而國於何有宋公無子取公孫周二子得啓畜諸公宫公寵大尹諸卿皆因之以達事大尹常不告而以其欲稱君命以令國人惡之冬十月公遊于空澤薨于連申大尹祕不發喪奉公歸而立啓三日國人知之司城樂茷宣言曰大尹蠱惑其君而專其利今君無疾而死死又匿之是無它矣與我者救君者也衆皆從之茷與大司馬皇非我欲伐公室樂得曰不可彼以陵公有罪我伐公則乂甚焉使國人施於大尹大尹奉啓奔楚乃立得諡先君曰景公王崩諡曰元王子介立貞王元年晉荀瑶伐鄭次于桐丘鄭人請救于齊齊陳恆救鄭瑶畏恆之得衆也引師而還使告恆曰大夫陳之自出陳之不祀鄭之罪也故寡君使瑶察陳衷焉謂大夫其恤陳乎若利本之顚瑶何有焉恆怒曰多陵人者皆不在智伯其能久乎魯季孫肥卒是為康子初康子之母死公輸若方小斂般請以機封將從之公肩假曰不可夫魯有初公室視豐碑三家視桓楹般爾以人之母嘗巧則豈不得以其母以嘗巧者乎則病者乎噫弗果從魯孺子􅀈之喪公欲為之設撥顏柳曰天子龍輴而椁幬諸侯輴而設幬為榆沈故設撥三臣者廢輴而設撥竊禮之不中者也而君何學焉宋公既立國人弗順遂至於亡謂其御曰寡人居于外卿大夫美之居于內侍御者美之不知吾過是以至此若得反國敢不改操易行宋人聞而復之二年彗星見魯侯患三桓之陵僭也欲以諸侯去之三桓亦患公之多妄也秋八月攻公于有山氏公如越請師歸見弒于有山氏諡曰哀公立其子寧三年甲戌晉空桐震七日臺舍皆壞人多死五年晉智瑶伐鄭圍南里謂趙無恤入之對曰主在此曰惡而無勇何以為子對曰以能忍恥庶無害趙宗乎越王勾踐薨子適郢立後遷都琅琊傳四世而為王無疆適郢元凱本史記作石與燕獻公薨子孝公立六年晉河絶于扈七年有虹圍日八年秦塹阿房伐犬戎大荔克其王城時諸戎居岐梁淫漆之北義渠大荔最強築城數十稱王鄭伯勝薨諡曰聲公子錫嗣陳恆卒是為成子子盤代十年有五虹青色聚于日十一年晉荀瑶趙無恤魏曼多之孫桓子韓不信之孫康子分士吉射故地以為己邑晉侯怒告于齊魯將伐四卿四卿攻之公奔齊死于道號出公時智氏最強有併吞晉國之志而未敢乃立昭公曽孫驕淫愎而好勝專決國事蔡侯産薨諡聲侯子元侯立十二年晉河水赤三日陳盤使其兄弟宗人盡為齊都邑大夫與三晉通使十三年甲申智瑶韓康子魏桓子宴於藍臺智伯戲康子侮段規智國諫曰夏書有之一人三失怨豈在明不見是圖夫君子能勤小物故無大患今主一宴而恥人君相無乃不可乎弗聽齊侯驁薨諡平公子積嗣十四年智伯求地于魏魏與之又求地於韓韓亦與之又求地於趙趙不與智伯怒帥韓魏以攻趙無恤將出從者曰長子近且城厚完無恤曰民罷力以完之又斃死以守之其誰與我從者曰邯鄲之倉庫實無恤曰浚民之膏澤以實之又因而殺之其誰與我晉陽先君之所屬也尹鐸之所寬也民必和矣乃走晉陽三家圍之十五年三家圍晉陽不下決晉水以灌之城不浸者三版沈竈産蛙民無叛意鄭人弒其君錫諡曰哀公而立聲公之弟丑是為恭公十六年智伯行水魏桓子御韓康子驂乘智伯曰吾乃今知水可以亡人國也桓子肘康子康子履桓子之跗以汾水可以灌安邑絳水可以灌平陽也於是趙襄子使張孟談濳出見二子曰唇亡則齒寒趙亡則韓魏為之次矣二子乃隂約而遣之襄子夜反決水灌智伯軍韓魏翼而擊之滅智氏分其地燕孝公薨子成公嗣十八年衛侯黚薨諡曰悼公子弗嗣問於孔伋曰道大難明學術如何伋對曰體道者逸而不窮任術者勞而無功古之篤道君子生不足以係之利何足以動之死不足以禁之害何足以變之君曰善蔡元侯薨子齊嗣二十二年楚滅蔡二十三年甲午二十四年楚滅杞東拓地至泗上遂滅莒二十五年秦伐義渠虜其王韓魏共滅伊洛隂戎其遺脫者西踰岍隴二十六年日食星晝見秦厲共公薨子躁公嗣二十八年王崩諡曰貞定王太子去疾立三月弟叔襲殺哀王而自立是為思王二十九年王弟嵬攻殺思王而自立齊陳盤卒子伯代秦南鄭反魯侯寧薨諡曰悼公子嘉嗣季昭子強問於孟敬子捷曰為君何食敬子曰食粥天下之達禮也吾三臣者之不能居公室也四方莫不聞矣勉而為瘠則吾能毋乃使人疑夫不以情居瘠者乎哉我則食食考王元年晉哀公薨子幽公栁立獨有絳曲沃朝于三家二年河赤于晉龍門三日三年王封其弟揭于河南及揭之孫封其少子於鞏以奉王自號東周公四年甲辰六年日食夏六月秦雨雪晉大風壞垣燕成公薨子湣公立八年衛公弗薨諡曰敬公子糾嗣九年三晉強衛使為已屬楚子章薨諡曰惠王子仲嗣十年晉丹泌水溢反相擊十一年義渠伐秦至渭南十二年秦躁公薨弟懷公嗣十三年冬晉桃杏冬實十四年甲寅孔門七十二賢之徒修習先聖之業講論不怠子夏之門人問交於子張子張曰子夏云何對曰子夏曰可者與之其不可者拒之子張曰異乎吾所聞君子尊賢而容衆嘉善而矜不能我之大賢歟於人何所不容我之不賢歟人將拒我如之何其拒人也有子問於曽子曰聞喪於夫子乎曰聞之矣喪欲速貧死欲速朽有子曰是非君子之言也曽子曰參也聞諸夫子也有子又曰是非君子之言也曽子曰參也與子遊聞之有子曰然然則夫子有為言之也曽子以斯言告於子遊子遊曰甚哉有子之言似夫子也昔者夫子居於宋見桓司馬自為石椁三年而不成夫子曰若是其靡也死不如速朽之愈也死之欲速朽為桓司馬言之也南宫敬叔反必載寶而朝夫子曰若是其貨也喪不如速貧之愈也喪之欲速貧為敬叔言之也曽子以子遊之言告於有子有子曰然吾固曰非夫子之言也曽子曰子何以知之有子曰夫子制於中都四寸之棺五寸之槨以斯知不欲速朽也昔者夫子失魯司寇將之荆蓋先之以子夏又申之以冉有以斯知不欲速貧也子夏喪其子而喪其明曽子弔之曰吾聞之也朋友喪明則哭之曾子哭子夏亦哭曰天乎豫之無罪也曾子怒曰商女何無罪也吾與女事夫子於洙泗之間退而老於西河之上使西河之民疑女於夫子爾罪一也喪爾親使民未有聞焉爾罪二也喪爾子喪爾明爾罪三也而曰女何無罪歟子夏投其杖而拜曰吾過矣吾過矣吾離羣而索居亦己久矣夫晝居於內問其疾可也夜居於外弔之可也是故君子非有大故不宿於外非致齊也非疾也不晝夜居於內子夏習詩易春秋開明教授子遊曰子夏之門人小子當灑掃應對進退則可矣抑末也本之則無如之何子夏聞之曰噫言遊過矣君子之道孰先傳焉孰後倦焉譬諸草木區以别矣君子之道焉可誣也有始有卒者其唯聖人乎於是子遊子夏子張以有若似夫子欲以所事夫子事之言於曾子曽子曰不可江漢以濯之秋陽以暴之皓皓乎不可尚已三千之徒散之四方閔子在魯季氏使為費宰閔子語使者曰善為我辭焉如有復我者則吾必在汶上矣子貢遊於諸侯諸侯無不敬重與之分庭抗禮終老於齊常問於師乙曰賜聞聲歌各有宜如賜者宜何歌也對曰乙賤工也何足以問所宜請誦其所聞而吾子自執焉寬而靜柔而立者宜歌頌廣大而靜疏達而信者宜歌大雅恭儉而好禮者宜歌小雅正直而靜亷而謙者宜歌國風肆直而慈愛者宜歌商溫良而能斷者宜歌齊夫商者五帝之遺聲也商人識之故謂之商齊者三代之遺聲也齊人識之故謂之齊歌之為言也長言之也説之故言之言之不足故長言之長言之不足故嗟嘆之嗟嘆之不足故不知手之舞之足之蹈之也淡臺滅明南遊至江從弟子三百人名顯于諸侯原憲居魯隱于草澤環堵之室茨以生草蓬戶不完桑以為樞甕牖圭竇以為塞匡坐而弦歌以此自終公晳哀未嘗屈節於人見仕於大夫之家者心則鄙之商瞿以易學教授曽參初為親仕於莒得三秉而心樂親沒之後齊欲迎為相晉迎以上卿楚迎以令尹祿三千鍾不洎其心窮居自得曳縰而歌商頌聲滿天地若出金石天子不得臣諸侯不得友孟氏使陽膚為士師問於曽子曽子曰上失其道民散久矣如得其情則哀矜而勿喜曽子有疾孟敬子捷問之曽子言曰鳥之將死其鳴也哀人之將死其言也善君子所貴乎道者三動容貌斯遠暴慢矣正顏色斯近信矣出辭氣斯遠鄙倍矣籩豆之事則有司存曽子疾甚謂曽元曽申曰飛鳥巢於高山魚鱉穴於深淵然所以得於人者餌也君子茍能無以利害義則辱安從至哉禍生於懈惰孝衰於妻子不可不察也時樂正子春坐於牀下申元坐於足童子隅坐而執燭童子曰華而睆大夫之簀歟子春曰止曽子聞之瞿然曰呼曰華而睆大夫之簀歟曽子曰然斯季孫之賜也我未之能易也元起易簀曽元曰夫子之病革矣不可以變幸而至於旦請敬易之曽子曰爾之愛我也不如彼君子之愛人也以德細人之愛人也以姑息吾何求乎吾得正而斃焉斯已矣舉扶而易之反席未安而沒曽子將沒召門弟子曰啓豫足啓豫手詩云戰戰兢兢如臨深淵如履薄氷而今而後吾知免夫小子其後樂正子春下堂而傷其足數月不出猶有憂色弟子問曰夫子之足瘳矣數月不出猶有憂色何也子春曰吾聞諸夫子曰天之所生地之所養惟人為大父母全而生之子全而歸之可謂孝矣故君子頃步而不敢忘孝也一舉足而不敢忘是故道而不徑舟而不遊一出言而不敢忘是故惡言不出於口忿言不反於身今豫忘之是以憂也十五年王崩諡曰考王子午立衛侯糾薨諡曰昭公子亹嗣威烈王元年秦庶長鼂中喬與大臣弒其君懷公而立其弟是為靈公趙無恤卒是為襄子初襄子未立而伯魯死既立封其子周於代亦早卒於是以周之子浣為嗣治中牟韓康子卒子武子立魏桓子卒孫斯立以卜子夏田子方為師嘗問於子夏曰吾端冕而聽古樂則惟恐卧聽鄭衛之音則不知倦何也子夏曰君所問者樂也所好者音也夫樂者與音相近而不同曰敢問何如子夏曰古者綱紀正天地順而四時當民有德而五榖昌然後聖人正六律和五聲弦歌詩頌作為鞉鼓椌楬塤篪和之以鐘磬竽瑟舞之以干戚旄狄始奏以文復亂以武治亂以相訊疾以雅君子於是語於是道古修身及家平均天下此所以祭先王之廟也所以獻酬酳酢也所以官序貴賤各得其宜也所以示後世有尊卑長幼之序也是故君子聽鐘聲則思武臣聽磬聲則思死封疆之臣聽琴瑟之聲則思志義之臣聽竽笙簫管之聲則思畜聚之臣聽鼓鼙之聲則思將帥之臣非聽其鏗鏘而已也彼亦有所合之也今夫新樂姦聲以濫溺而不止及優侏儒獶雜子女不知父子樂終不可以語不可以道古故君之所好者溺音也曰敢問溺音何從出也子夏曰鄭音好濫淫志宋音燕女溺志衛音趣促數速煩志齊音傲辟喬志此四者皆淫於色而害於德是以祭祀弗用也二年宋公得薨諡曰昭公子購由嗣三年冬晉有火下于北方其聲如雷四年夏四月晉大雨雪晉幽公淫宵出為盜所殺魏斯捕盜誅之立其弟止秦作吳陽上畤祭黃帝下畤祭炎帝五年韓武子治平陽魯侯嘉薨諡曰元公子顯嗣七年楚滅郯陳伯卒子和代九年甲子十年秦靈公薨子獻公不得立而立懷公季子是為簡公衛侯亹薨諡懷公子頽嗣十三年晉河崩壅龍門至于底柱冬十月大雨雪十四年春正月乃止魏李悝作盡地力之教以為一夫治田百畝為粟百五十石下熟倍收深耕易耨則畝益三斗不勤則損亦如之善為國者必平糴米石三十為平善為糴者必觀上中下歲隨其凶豐而收之而發之雖遇飢饉而民不流散魏斯用其言國以富強魏斯伐中山克之問守於翟璜璜薦李克斯見與語大説之克曰貴者賤之惡也富者貧之惡也智者愚之惡也斯曰若何而可對曰貴而能下富而能分智而能教則無患矣斯曰善它日斯問曰吳何以亡對曰數戰而民罷數勝而主驕以驕主御罷民所以亡也卜子夏門人段干木居于魏躬耕不仕魏斯過其閭必式時往問之立而不怠乃見翟璜則夷踞而與之言璜不説斯曰段干木官之不可祿之不受汝祿則千鍾官則卿也又責吾禮無乃難乎十六年日食趙浣卒子籍嗣曽元北遊見燕君而歸或曰燕何以不用子元曰燕君之志卑志卑者不求取也十七年三晉比年伐秦秦兵數敗初令吏帶劍塹洛城重泉韓武子卒子虔立魏伐秦築臨晉十八年秦初租禾魯侯訪於孔伋曰吾欲掩先君之惡而揚其善亦有道乎伋對曰私情之細不如公義之大故舜禹於其父不敢私有之魯侯曰吾欲三分魯國以一聘公儀休為相何如對曰君好賢如飢渴則賢者自至若無信用之實徒欲以高官厚祿為釣餌使公儀子之智若魚鳥可也公於是以禮聘休為相休使食祿者不得與下民爭利見其妻織命焚其機奉法循理無所變更羣下自正魯侯之母死使人問於曽申曰如之何對曰申也聞諸申之父曰哭泣之哀齊斬之情饘粥之食自天子達楚子仲薨諡曰簡王子當嗣十九年甲戌魏斯與羣臣飲酒師經鼓琴斯意甚適起舞曰使我言而無違者師經曰昔堯舜惟恐言而人不違桀紂惟恐言而人違之君是何言之悖也斯改容敬受教二十一年魏斯謂李克曰先生嘗言家貧思良妻國亂思良相今所置非成則璜二子何如對曰卑不謀尊疏不謀戚臣在關門之外不敢當命斯曰先生臨事勿讓克曰居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取五者足以定之矣斯曰善克出翟璜曰聞君召先生而卜相果誰為之克曰魏成璜作色曰西河守吳起臣所進也君內以鄴為憂臣進西門豹君欲伐中山臣進樂羊中山已拔無使守之臣進先生君之子無傅臣進屈侯鮒以耳目睹記臣何負於魏成克曰子進克者克將比周以求大官哉君問相於克克之對如是所以知君之必相成者成食祿千鍾什九在外什一在內是故東得卜子夏西得田子方段干木此三人君師之子所進五人者君臣之子惡得與魏成比也璜再拜曰鄙人失對願卒為弟子起衛人聞斯賢而歸之斯問諸克克曰其用兵司馬穰苴弗過也斯以為將起卧不設席行不騎乘與士卒最下者同衣食分勞苦齊侯積薨諡曰宣公子代嗣是為康公二十三年魏斯趙籍韓虔來請命王命之為諸侯司馬氏曰天子之職莫大於禮禮莫大於分分莫大於君今晉大夫暴蔑其君剖分晉國天子既不能討又寵秩之先王之禮於斯盡矣九鼎震魏侯一日燕羣臣方樂而天雨命駕將適野左右曰君安之曰期虞人獵豈可無一會期哉乃往身自罷之又嘗與田子方飲曰鐘聲不比乎左高子方曰君明樂官不明樂音君明樂音臣恐聾於官也韓嘗借師伐趙文侯對曰趙兄弟也不敢聞命趙借師伐韓應之亦然二國怒已而知魏侯謀已也皆朝之二十四年王崩諡曰威烈王子驕立燕湣公薨子僖公立盜弒楚子當諡曰聲王子疑嗣皇王大紀卷七十

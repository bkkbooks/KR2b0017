body:
  text: 皇王大紀卷七十九宋胡宏撰三王紀赧王荀子曰萬物同宇而異體人倫竝處同求而異道同欲而異知無君以制臣無上以制下欲惡同物欲多而物寡寡則必爭矣離居不相待則窮羣而無分則爭窮者患也爭者禍也救患除禍則莫若明分使羣矣足國之道節用以禮裕民以政禮者貴賤有等長幼有差貧富輕重皆有稱者也故天子袾裷衣冕諸侯𤣥裷衣冕大夫禆冕士皮辨服德必稱位位必稱祿祿必稱用由士已上則必以禮樂節之衆庶百姓則必以法數制之量地而立國計利而畜民度人力而授事使民必勝事事必出利利足以生民皆使衣食百用出入相掩輕田野之稅平關市之征省商賈之數罕興力役無奪農時如是則國富矣有分者天下之大利也君者所以管分之樞要也先王分割而等異之非特以為淫泰夸麗將以明仁之文通仁之順也故為之雕琢刻鏤黻黼文章使足以辨貴賤而已不求其觀為之鐘鼓管磬琴瑟竽笙使足以辨吉凶合歡和而已不求其餘為之宫室臺榭使足以避燥濕養德辨輕重而已不求其外詩曰雕琢其章金玉其相亹亹我王綱紀四方此之謂也若夫重色而衣之重味而食之重財而制之合天下而居之非特以為淫泰也以為王天下治萬變財萬物養萬民者為莫若仁人之善也知慮足以治之仁厚足以安之德音足以化之故相率而為之勞苦以務佚之為之出死斷亡以覆救之為之雕琢刻鏤黻黼文章以藩飾之故仁人在上百姓貴之如帝親之如父母者無他故焉其所是焉誠美其所得焉誠大其所利焉誠多詩曰我任我輦我車我牛我行既集蓋云歸哉此之謂也故曰君子以德小人以力力者德之役也百姓之力待之而後功百姓之羣待之而後和百姓之財待之而後聚百姓之勢待之而後安百姓之夀待之而後長父子不得不親兄弟不得不順男女不得不歡少者以長老者以養故曰天地生之聖人成之此之謂也今之世不然厚刀布之斂以奪之財重田野之稅以奪之食苛關市之征以難其事不然而已矣有掎挈伺詐權謀傾覆以相顛倒以靡弊之是以臣或弒其君下或弒其上粥其城倍其節而不死其事者無他故焉人主自取之詩曰無言不讎無德不報此之謂也墨子之言昭然為天下憂不足夫不足非天下之公患也特墨子之私憂過計也人善治之可以相食養者不可勝數也天地之生萬物墨子大有天下小有一國將蹙然衣粗食惡憂戚而非樂將少人徒省官職上功勞苦與百姓均事業齊功勞苦是則賞罰不行賞罰不行則賢者不可得而進也不肖不可得而退也則能不能不可得而官也若是則萬物失宜事變失應上失天時下失地利中失人和天下熬然若燒若焦墨子雖為之衣褐帶索嚽菽飲水惡能足之乎既以伐其本竭其原而焦天下矣故先王聖人為之不然知夫為人主上者不美不飾之不足以一民也不富不厚之不足以管下也不威不强之不足以禁暴勝悍也故必將撞大鐘擊鳴鼓吹笙竽彈琴瑟以塞其耳必將雕琢刻鏤黻黼文章以塞其目必將芻豢稻粱五味芬芳以塞其口然後衆人徒備官職漸慶賞嚴刑罰以戒其心使天下生民之類皆知己之所願欲之舉在于是也故其賞行皆知己之所畏恐之舉在于是也故其罰威賞行罰威則賢者可得而進也不肖者可得而退也能不能可得而官也若是則萬物得宜事變得應上得天時下得地利中得人和則財貨渾渾如泉源汸汸如河海暴暴如丘山故儒術誠行則天下大而富使有功撞鐘擊鼓而和詩曰鐘鼓喤喤磬管將將降福穰穰降福簡簡威儀反反既醉既飽福祿來反此之謂也故墨術誠行則天下尚儉而彌貧非鬭而日爭勞苦頓悴而愈無功愀然憂戚非樂而日不和詩曰天方薦瘥喪亂𢎞多民言無嘉憯莫懲嗟此之謂也埀事養民以偷譽不可以遂功而忘民亦不可古人為之使民急不傷力緩不後時事成功立上下俱富不教而誅則刑繁而邪不勝教而不誅則姦民不懲誅而不賞則勤屬之民不勸誅賞而不類則下疑俗儉而百姓不一故先王明禮義以一之致忠信以愛之尚賢使能以次之爵服慶賞以申重之時其事輕其任以調齊之潢然兼覆之養長之如保赤子若是故姦邪不作盜賊不起而化善者勸勉矣故曰上一則下一矣上二則下二矣辟之若草木枝葉必類本此之謂也利而不利也愛而不用也者取天下矣利而後利之愛而後用之者保社稷不利而利之不愛而用之者危國家也上不隆禮則兵弱下不愛民則兵弱已諾不信則兵弱慶賞不漸則兵弱將率不能則兵弱上好功則國貧上好利則國貧士大夫衆則國貧工商衆則國貧無制數度量則國貧下貧則上貧下富則上富故田野縣鄙者財之本也垣窖倉廩者財之末也百姓時和事業得叙者貨之源也等賦府庫者貨之流也故明主必謹養其和節其流開其源而時斟酌焉故田野荒而倉廩實百姓虛而府庫滿夫是之謂國蹶伐其本竭其源而并之其末然而主相不知惡也則其傾覆滅亡可立而待也事强暴之國難使强暴之國事我易事之以貨寶則貨寶單而交不結約信盟誓則約定而畔無日割國之錙銖以賂之則割定而欲無厭事之彌煩其侵人愈甚必至於資單國舉然後已修禮以齊朝正法以齊官平政以齊民然後節奏齊於朝百事齊於官衆庶齊於下如是則近者競親逺方致願上下一心三軍同力名聲足以暴炙之威强足以捶笞之拱揖指麾而强暴之國莫不趨使矣荀子曰國者天下之制利用也人主者天下之利勢也得道以持之則大安也大榮也積美之源也不得道以持之則大危也大纍也有之不如無之有也及其綦也索為匹夫不可得也彼持國者必不可以獨也論一相以兼率之使臣下百吏莫不宿道鄉方而務是夫人主之職也傳曰農分田而耕賈分貨而販百工分事而勸士大夫分職而聽建國諸侯之君分土而守三公總方而議則天子共己而已矣聰明君子者善服人者也人服而勢從之人不服而勢去之故人主欲得調一天下制秦楚則莫若聰明君子矣夫貴為天子富有天下名為聖王兼制人人莫得而制也是人情之所同欲也而王者兼而有是者也人茍不狂惑戅陋者其誰不樂是也哉欲是之主竝肩而存違是之主不世絶千嵗而不合何也曰人主不公人臣不忠也人主則外賢而偏舉人臣則爭職而妬賢是其所以不合之故也人主胡不廣焉無恤親疏無偏貴賤唯誠能之求若是則人臣輕職業讓賢而安隨其後如是則禹舜還至王業還起功一天下名配禹舜物由有可樂如是其美者乎嗚呼君人者亦可以察若言矣嗚呼哀哉君人者千嵗而不覺也若夫貫日而治平權物而稱用使衣服有制宫室有度人徒有數喪祭械用皆有等宜以是用挾於萬物尺寸尋丈莫不得修乎制數度量然後行則是官人使吏之事也不足數於大君子之前故君人者立隆政本朝而當所使要百事者誠仁人也則身佚而國治功大而名美上可以王下可以霸故能當一人而天下取主道治近不治逺治明不治幽治一不治二主能治近則逺者治主能治明則幽者化主能當一則百事正明主好要而暗主好詳主好要則百事詳主好詳則百事荒君者論一相陳一法明一指以兼覆之兼照之者相者論列百官之長要百事之聽度其功勞論其慶賞歲終奉其成功以效於君當則可不當則廢故君人勞於索之而休於使之湯武者修其道行其義興天下同利除天下同害天下歸之故厚德音以生民則致寬使民則綦理辨政令制度所以接天下之人百姓有非理者如豪末則雖孤獨鰥寡必不加焉是故百姓貴之如帝親之如父母為之出死斷亡而不愈者無他故焉道德誠明利澤誠厚也隆禮義審貴賤則士大夫貴節死制齊制度重官秩則百吏畏法遵繩關市譏而不征則商賈敦慤時斬伐佻期日則百工忠信輕稅省斂則農夫朴力士大夫務節死制然後兵徑百吏畏法修繩然後國治商賈敦慤則安貨通財而國求給矣百工忠信則器用巧使矣農夫朴力則百事不廢居則有名動則有功此儒之所謂曲辨也荀子曰有治人無治法法不能獨立類不能自行得其人則存法者治之端也君子法之原也不知法之義而正法之數者雖博臨事必亂故明王急得其人得其人則身佚而國治功大而名美上可以王下可以霸書曰惟文王敬忌一人以懌此之謂也故械數者治之流也君子者治之源也官人守數君子養源源清則流清故上好禮義尚賢使能無貪利之心則下亦將綦辭讓致忠信而謹於臣子矣如是則雖在小民不待符節别契而信不待探籌投鈎而公不待衡石稱懸而平不待斗斛敦槩而嘖故賞不用而人勸罰不用而人服有司不勞而事理政命不煩而俗美百姓莫敢不順上之法象上之志勤上之事而安樂之矣是之謂至平請問為人君曰以禮分施均遍而不偏請問為人臣曰以勤侍君忠順而不懈請問為人父曰寬惠而有禮請問為人子曰敬愛而致文請問為人兄曰慈愛而見友請問為人弟曰敬詘而不悖請問為人夫曰致功而不流致臨而有辨請問為人妻曰夫有禮則柔從聽侍夫無禮則恐懼而自竦也此道也偏立而亂俱有而治請問兼能之奈何曰審自禮也古者先王審禮以旁皇周浹於天下動無不審也故君子之於禮敬而安之用天地理萬物變而不凝血氣和平志意廣大行義塞於天地之間仁知之極也夫是之謂聖人審禮也君者儀也儀正而景正不能愛人不能利人而求之親愛已不可得也人不親不愛而求其為己用為己死不可得也人不為己用不為己死而求兵之徑城之固不可得也兵不徑城不固而求敵之不至不可得也敵至而求無危削滅亡不可得也故人主欲强固安樂則莫若反之民欲附下一民則莫若反之政欲修政美國則莫若求其人故君人者愛人而安好士而榮兩道者何也曰君道也善生養人者也善班治人者也善顯設人者也善藩飾人者也省工價衆農夫禁盜賊除奸邪是所以養生之也天子三公諸侯一相大夫擅官士保職莫不法度而公是所以班治之也論德而定次量能而授官皆使其人載其事而各得其所宜上賢使之為三公次賢使之為諸侯下賢使之為士夫是所以顯設之也修冠辨衣裳黼黻文章雕琢刻鏤皆有等差是所以藩飾之也善生養人者人親之善班治人者人安之善顯設人者人樂之善藩飾人者人榮之四統者俱而天下歸之職分而民不深次定而序不亂兼聽齊明而百事不留如是則臣下百吏至于庶人莫不修已而後敢安止誠能而後敢受職百姓易俗小人變心姦怪之屬莫不反慤夫是之謂政教之極故天子不視而見不聽而聰不慮而知不動而功塊然獨坐而天下從之如一體為人主者在慎取相人主有六患使賢者為之則與不肖者規之使知者慮之則與愚者論之使修士行之則與汙邪之人疑之雖欲成立得乎哉語曰好女之色惡者之孽也公正之士衆人之瘞也修乎道之人汙邪之賊也今使汙邪之人論其怨賊而求其無偏得乎哉古之人取人之道參之以禮用人之法禁之以等卑不得臨尊輕不得縣重愚不得謀知是以萬舉不過也人王欲得善射逺中微者縣貴爵重賞以招致之內不阿子弟外不隱逺人能中是者取之然而求卿相輔佐則獨不若是其公也按唯便嬖親比己者之用也豈不過甚矣哉故明主有私人以金石珠玉無私人官職事業牆之外目不見也里之前耳不聞也而人主之守司逺者天下近者境內耳目之明如是其狹也人主之守司如是其廣也然則人主將何以知之曰便嬖左右者人主之所以窺逺收衆之門户牖嚮也故人主必有便嬖左右足信者然後可其知惠足使規物其端誠足使定物然後可事物之至如泉源一物不應亂之端也卿相輔佐人主基杖也故人主必將有卿相輔佐足任者然後可其德音足以鎮撫百姓其知慮足以應待萬變然後可四鄰不可以不相接也然而不必相親也故人主必將有足使喻志决疑於逺方者然後可其辨說足以解煩其知慮足以决疑其齊斷足以距難然後可無左右足信者謂之暗無輔佐足任者謂之獨所使於四鄰諸侯者非其人謂之孤孤獨而䁆謂之危國雖臣若存古之人曰亡矣荀子曰人臣之論有態臣者有篡臣者有功臣者有聖臣者內不足使一民外不足使距難百姓不親諸侯不信然而巧敏佞說善取寵乎上是態臣者也上不忠乎君下善取譽乎民不恤公道通義朋黨比周以環主圗私為務是篡臣者也內足使一民外足使距難民親之士信之上忠乎君下愛百姓而不倦是功臣者也上則能尊君下則能愛民政令教化形下如影應卒遇變齊給如響推類接譽以待無方曲成制象是聖臣者也用聖臣者王用功臣者强用篡臣者危用態臣者亡從命而利君謂之順逆命而利君謂之忠不恤君之榮辱不恤國之臧否偷合茍容以持祿養交而已耳謂之國賊君有過謀過事將危國家隕社稷大臣父兄有能進言於君用則可不用則去謂之諫有能進言於君用則可不用死謂之爭有能比知同力率羣臣百吏而强君遂以解國之大患除國之大害成於尊君安國謂之輔有能抗君之命竊君之重反君之事以安國之危除君之辱成國之大利謂之拂故諌爭輔拂之人社稷之臣也明君之所尊厚也傳曰從道不從君此之謂也事聖君有聽從無諫爭事中君有諫爭無諂諛事暴君有補削無矯拂迫脅於時窮居於暴國而無所避之則崇其美揚其善違其惡隱其敗言其所長不稱其所短詩曰國有大命不可以告人妨其躬身此之謂也因其懼也而改其過因其憂也而辨其故因其喜也而入其道因其怒也而除其怨書曰從命而不拂微諫而不倦為上則明為下則遜此之謂也以德復君而化之大忠也以德調君而補之次忠也以是諫非而怒之下忠也仁者必敬人人賢而不敬則是禽獸也人不肖而不敬則是狎虎也故仁者必敬人賢者則貴而敬之不肖者則畏而敬之賢者則親而敬之不肖者則疏而敬之師術有四而博習不與焉尊嚴而憚可以為師耆艾而信可以為師誦說而不陵不犯可以為師知微而論可以為師賞不欲僣刑不欲濫賞僣則利及小人刑濫則害及君子若不幸而過寧僣無濫與其害善不若利淫荀子曰趙孝成王請問兵要孫卿曰在乎附民而已民之親我歡若父母其好我芬若椒蘭人之情雖桀跖豈肯賊其所好者哉齊人隆技擊得一首者則賜贖錙金無本賞矣事小敵毳脆則偷可用也事大敵堅則渙焉離耳是亡國之兵也其去賃市傭而戰之幾矣魏氏之武卒以度取之衣三屬之甲操十二石之弩負矢五十箇置戈其上冠䩜帶劍贏三日之糧日中而趨百里中試則復其戶利其田宅是數年而衰而未可奪也改造則不易周也是故地雖大其稅必寡是危國之兵也秦人使民所以要利於上者非鬬無由也功賞相長也五甲首而隸五家是最為衆強長久四世有勝非幸也數也故齊之技擊不可以遇魏氏之武卒魏氏之武卒不可以遇秦之鋭士秦之鋭士不可以當桓文之制節桓文之制節不可以敵湯武之仁義孝成王曰善請問為將孫卿曰制號政令欲嚴以威慶賞刑罰欲必以信處舍收藏欲周以固徙舉進退欲安以重欲疾以速窺敵觀變欲潛以深欲伍以參遇敵决戰必道吾所明無道吾所疑夫是之謂六術無欲將而惡廢無急勝而忘敗無威內而輕外無見其利而不顧其害凡慮事欲熟而用財欲泰夫是之謂五權可殺而不可使處不完可殺而不可使擊不勝可殺而不可使欺百姓夫是之謂三至凡百事之成也必在敬之其敗也必在慢之故敬勝怠則吉怠勝敬則滅慎行此六術五權三至而處之以恭敬是謂天下之將通於神明矣荀子曰人君者隆禮尊賢而王重法愛民而霸好利多詐而危權謀傾覆幽險而盡亡威有三禮樂則修分議則明舉錯則時愛利則形如是則百姓貴之如帝髙之如天視之如父母畏之如神明夫是之謂道德之威禮樂則不修分義則不明舉錯則不時愛利則不形然而其禁暴也察其誅不服也審其刑罰重而信其誅殺猛而必如是百姓劫則畏贏則敖上執拘則最得間則散敵中則奪夫是之謂暴察之威無愛人之心無利人之事而日為亂人之道百姓歡敖則從而執縳之刑灼之如是下比周賁潰以離上矣夫是之謂狂妄之威此三威者道德之威成乎安强暴察之威成乎危弱狂妄之威成乎滅亡故桀紂者善為人所惡而湯武者善為人所好也人之所惡何也汙漫爭奪貪利是也人之所好者何也禮義辭讓忠信是也故人莫貴乎生莫樂乎安所以養生安樂者莫大乎禮義人知貴生樂安而棄禮義辟之是猶欲夀而歾頸愚莫大焉故為人上者必將慎禮義務忠信然後可此君人者之大本也天行有常不為堯存不為桀亡應之以治則吉應之以亂則凶強本而節用則天不能貧養備而動時則天不能病修道而不二則天不能禍水旱不能使之饑渴寒暑不能使之疾祅怪不能使之凶故明於天人之分則可謂至人矣不為而成不求而得夫是之謂天職天有其時地有其財人有其治夫是之謂能參列星隨旋日月遞照四時代御隂陽大化風雨博施萬物各得其養以成不見其事而見其功夫是之謂神形具神生好惡喜怒哀樂藏焉夫是之謂天情耳目鼻口形能各有接而不相能也夫是之謂天官心居中虛以治五官夫是之謂天君財非其類以養其類夫是之謂天養順其類者謂之福逆其類者謂之禍夫是之謂天政聖人清其天君正其天官備其天養順其天政養其天情以全其天功則天地官而萬物役矣天不為人惡寒也而輟冬地不為人惡遼逺也而輟廣君子不為小人胸胸也而輟行天有常道矣地有常數矣君子有常體矣君子道其常小人計其功楚王後車千乘非知也君子啜菽飲水非愚也是節然也若夫心意修德行厚知慮明生於今而志乎古則是其在我者也故君子敬其在已者而不慕其在天者是以日進也小人錯其在已者而慕其在天者是以日退也星墜木鳴日月蝕風雨之不時怪星之黨見上明而政平雖並起無傷也是天地之變隂陽之化物之罕至者也怪之可也畏之非也人祅則可畏也楛耕傷稼耘耨失薉政險失民田稼薉惡糴貴民饑道路有死人政令不明舉錯不時本事不理禮義不修內外無别男女淫亂則父子相疑上下乖離冦難並至夫是之謂人祅三者錯無安國勉力不時則牛馬相生六畜作祅傳曰萬物之怪書不說若夫君臣之義父子之親夫婦之别則日切磋而不舍也皇王大紀卷七十九

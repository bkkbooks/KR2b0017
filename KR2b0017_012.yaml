body:
  text: 皇王大紀卷十二宋胡宏撰三王紀武王大雅首篇曰文王七章章八句文王受命作周也文王在上於昭于天周雖舊邦其命維新有周不顯帝命不時文王陟降在帝左右亹亹文王令聞不已陳錫哉周侯文王孫子文王孫子本支百世凡周之士不顯亦世世之不顯厥猶翼翼思皇多士生此王國王國克生維周之楨濟濟多士文王以寧穆穆文王於緝熈敬止假哉天命有商孫子商之孫子其麗不億上帝既命侯于周服侯服于周天命靡常殷士膚敏祼將于京厥作祼將帝服黼冔王之藎臣無念爾祖無念爾祖聿修厥徳永言配命自求多福殷之未䘮師克配上帝宜鑒于殷駿命不易命之不易無遏爾躬宣昭義問有虞殷自天上天之載無聲無臭儀刑文王萬邦作孚大雅二篇曰大明八章四章章六句四章章八句文王有明徳故天復命武王也明明在下赫赫在上天難忱斯不易維王天位殷適使不挾四方摯仲氏任自彼殷商來嫁于周曰嬪于京乃及王季維徳之行大任有身生此文王維此文王小心翼翼昭事上帝聿懷多福厥徳不回以受方國天監在下有命既集文王初載天作之合在洽之陽在渭之涘文王嘉止大邦有子大邦有子俔天之妹文定厥祥親迎于渭造舟為梁不顯其光有命自天命此文王于周于京纘女維莘長子維行篤生武王保右命爾爕伐大商殷商之旅其㑹如林矢于牧野維予侯興上帝臨女無二爾心牧野洋洋檀車煌煌駟騵彭彭維師尚父時維鷹揚凉佐也彼武王肆伐大商㑹朝清明大雅十篇曰文王有聲八章章五句繼伐也武王能廣文王之聲卒其伐功也文王有聲遹駿有聲遹求厥寧遹觀厥成文王烝哉文王受命有此武功既伐于崇作邑于豐文王烝哉築城伊淢作豐伊匹匪棘其欲遹追來孝王后烝哉王公伊濯維豐之垣四方攸同王后維翰王后烝哉豐水東注維禹之績四方攸同皇王維辟皇王烝哉鎬京辟廱自西自東自南自北無思不服皇王烝哉考卜維王宅是鎬京維龜正之武王成之武王烝哉豐水有芑武王豈不仕詒厥孫謀以燕翼子武王烝哉大雅十一篇曰生民八章四章章十句四章章八句尊祖也后稷生於姜嫄文武之功起於后稷故推以配天焉厥初生民時維姜嫄生民如何克禋克祀以弗無子履帝武敏歆攸介攸止載震載夙載生載育時維后稷誕彌厥月先生如達不坼不副無菑無害以赫厥靈上帝不寧不康禋祀居然生子誕寘之隘巷牛羊腓字之誕寘之平林㑹伐平林誕寘之寒氷鳥覆翼之鳥乃去矣后稷呱矣實覃實訏厥聲載路誕實匍匐克岐克嶷以就口實藝之荏菽荏菽斾斾禾役穟穟麻麥幪幪𤓰瓞唪唪誕后稷之穡有相之道茀厥豐草種之黄茂實方實苞實種實褎實發實秀實堅實好實頴實栗即有邰家室誕降嘉種維秬維秠維穈維芑恒之秬秠是穫是畝恒之穈芑是任是負以歸肇祀誕我祀如何或舂或揄或簸或蹂釋之叟叟烝之浮浮載謀載惟取蕭祭脂取羝以軷載燔載烈以興嗣歳卭盛于豆于豆于登其香始升上帝居歆胡臭亶時后稷肇祀庶無罪悔以迄于今論曰后稷人臣祭天可乎堯之初載地未平天未成制度草創后稷教民稼穡樹藝五榖誕降嘉種人頼以生於是祭報天而興嗣歳禮時為大若後人效之則亂矣大建公侯於天下封黄帝之後於祝唐帝之後於薊虞帝之後胡公媯滿於陳以胡公之父虞閼父嘗為周陶正王頼其利器用也妻之以元女大姬分之以肅慎氏之楛矢以備三恪復封夏后氏之後東婁公於把封紂子武庚於殷用其禮樂作賔于王家皆為上公是為二王之後得神農之後封之於焦封尚父於齊都營丘爽鳩氏之墟封周公於魯都曲阜少昊大庭之墟封召公於燕庶叔髙於畢皆留相周封叔鮮於管叔度於蔡叔處於霍以監殷是為三監以殷餘民封康叔於朝歌國號衛封叔振鐸於曹叔武于叔季載于那封庶弟叔繡于滕叔鄭于毛又封諸叔于郜于雍于原于郇于酆虢仲虢叔為文王卿士勲在王室藏於盟府仲封於西虢實故夏墟叔封於東虢都制初泰伯仲雍奔荆楚採藥於衡山之下荆人義之從者日衆東至海上得千餘家遂為國自號句吳泰伯薨無子仲雍嗣為吳君天子使求其後得周章仲雍曾孫也世君吳矣因封之曰吳伯復封章弟於故夏墟是為虞仲封少昊之裔兹輿於莒封祝融安期之裔挾於邾封四岳姜姓文叔於許封仲虺弟雍渭之後於薛新受封者八百國兄弟之君十有五人同姓者四十餘人班宗彛作分器孔氏之論曰聖人南面而聽天下所宜先者五而民不與焉一曰治親二曰報功三曰舉賢四曰使能五曰存愛五者一得於天下民無不足無不贍者五者一物紕繆民莫得其所矣周頌三十篇曰賚一章六句大封於廟也賚予也言所以錫予善人也文王既勤止我應受之敷時繹思我徂維求定時周之命於繹思康叔之國王訓之作康誥酒誥梓材周書有叙傳失之矣康誥王若曰孟侯朕其弟小子封惟乃丕顯考文王克明徳慎罰不敢侮鰥寡庸庸祗祗威威顯民用肇造我區夏越我一二邦以脩我西土惟時怙冐聞于上帝帝休天乃大命文王殪戎殷誕受厥命越厥邦厥民惟時叙乃寡兄朂肆汝小子封在兹東土王曰嗚呼封汝念哉今民將在祗遹乃文考紹聞衣徳言往敷求于殷先哲王用保乂民汝丕逺惟商耉成人宅心知訓别求聞由古先哲王用康保民𢎞于天若徳裕乃身不廢在王命王曰嗚呼小子封恫瘝乃身敬哉天畏棐忱民情大可見小人難保往盡乃心無康好逸豫乃其乂民我聞曰怨不在大亦不在小惠不惠懋不懋已汝惟小子乃服惟𢎞王應保殷民亦惟助王宅天命作新民王曰嗚呼封敬明乃罰人有小罪非𤯝乃惟終自作不典式爾有厥罪小乃不可不殺乃有大罪非終乃惟𤯝災適爾既道極厥辜時乃不可殺王曰嗚呼封有叙時乃大明服惟民其勑懋和若有疾惟民其畢棄咎若保赤子惟民其康乂非汝封刑人殺人無或刑人殺人又曰非汝封劓刵人無或劓刵人王曰外事汝陳時臬司師兹殷罰有倫又曰要囚服念五六日至于旬時丕蔽要囚王曰汝陳時臬事罸蔽殷彛用其義刑義殺勿庸以次汝封乃汝盡遜曰時叙惟曰未有遜事已汝惟小子未其有若汝封之心朕心朕徳惟乃知凡民自得罪㓂攘姦宄殺越人于貨睯不畏死罔弗憝王曰封元惡大憝矧惟不孝不友子弗祗服厥父事大傷厥考心于父不能字厥子乃疾厥子于弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不友于弟惟弔兹不于我政人得罪天惟與我民彛大冺亂曰乃其速由文王作罰刑兹無赦不率大戛矧惟外庶子訓人惟厥正人越小臣諸節乃别播敷造民大譽弗念弗庸瘝厥君時乃引惡惟朕憝已汝乃其速由兹義率殺亦惟君惟長不能厥家人越厥小臣外正惟威惟虐大放王命乃非徳用乂汝亦罔不克敬典由裕民惟文王之敬忌乃裕民曰我惟有及則予一人以懌王曰封爽惟民迪吉康我時其惟殷先哲王徳用康乂民作求矧今民罔迪不適不迪則罔政在厥邦王曰封予惟不可不監告汝徳之說于罰之行今惟民不靜未戾厥心廸屢未同爽惟天其罰殛我我其不怨惟厥罪無在大亦無在多矧曰其尚顯聞于天王曰嗚呼封敬哉無作怨勿用非謀非彛蔽時忱丕則敏徳用康乃心顧乃徳逺乃猷裕乃以民寧不汝瑕殄王曰嗚呼肆汝小子封惟命不于常汝念哉無我殄享明乃服命高乃聽用康乂民王若曰往哉封勿替敬典聽朕告汝乃以殷民世享酒誥王若曰明大命于妹邦乃穆考文王肇國在西土厥誥毖庶邦庶士越少正御事朝夕曰祀兹酒惟天降命肇我民惟元祀天降威我民用大亂喪徳亦罔非酒惟行越小大邦用喪亦罔非酒惟辜文王誥教小子有正有事無彞酒越庶國飲惟祀徳將無醉惟曰我民迪小子惟土物愛厥心臧聰聽祖考之彞訓越小大徳小子惟一妺土嗣爾股肱純其藝黍稷奔走事厥考厥長肇牽車牛逺服賈用孝養厥父母厥父母慶自洗腆致用酒庶士有正越庶伯君子其汝典聽朕教爾大克羞耉惟君爾乃飲食醉飽丕惟曰爾克永觀省作稽中徳爾尚克羞餽祀爾乃自介用逸兹乃允惟王正事之臣兹亦惟天若元徳永不忘在王家王曰封我西土棐徂邦君御事小子尚克用文王教不腆于酒故我至于今克受殷之命王曰封我聞惟曰在昔殷先哲王迪畏天顯小民經徳秉哲自成湯咸至于帝乙成王畏相惟御事厥棐有恭不敢自暇自逸矧曰其敢崇飲越在外服侯甸男衛邦伯越在内服百僚庶尹惟亞惟服宗工越百姓里居罔敢湎于酒不惟不敢亦不暇惟助成王徳顯越尹人祗辟我聞亦惟曰在今後嗣王酣身厥命罔顯于民祗保越怨不易誕惟厥縱淫泆于非彞用燕喪威儀民罔不盡傷心惟荒腆于酒不惟自息乃逸厥心疾狠不克畏死辜在商邑越殷國滅無罹弗帷徳馨香祀登聞于天誕惟民怨庶羣自酒腥聞在上故天降喪于殷罔愛于殷惟逸天非虐惟民自速辜王曰封予不惟若兹多誥古人有言曰人無於水監當於民監今惟殷墜厥命我其可不大監撫于時予惟曰汝劼毖殷獻臣侯甸男衛矧太史友内史友越獻臣百宗工矧惟爾事服休服采矧惟若疇圻父薄違農父若保宏父定辟矧汝剛制于酒厥或誥曰羣飲汝勿佚盡執拘以歸于周予其殺又惟殷之迪諸臣百工仍湎于酒勿庸殺之姑惟教之有斯明享乃不用我教辭惟我一人弗恤弗蠲乃事時同于殺王曰封汝典聽朕毖勿辯乃司民湎于酒梓材王曰封以厥庶民暨厥臣達大家以厥臣達王惟邦君汝若恒越曰我有師師司徒司馬司空尹旅曰予罔厲殺人亦厥君先敬勞肆徂厥敬勞肆往姦宄殺人歴人宥肆亦見厥君事戕敗人宥王啓監厥亂為民曰無胥戕無胥虐至于敬寡至于屬婦合由以容王其效邦君越御事厥命曷以引養引恬自古王若兹監罔攸辟惟曰若稽田既勤敷菑惟其陳修為厥疆畎若作室家既勤垣墉惟其塗塈茨若作梓材既勤樸斵惟其塗丹雘今王惟曰先王既勤用明徳懷為夾庶邦享作兄弟方來亦既用明徳后式典集庶邦丕享皇天既付中國民越厥疆土于先王肆王惟徳用和懌先後迷民用懌先王受命已若兹監惟曰欲至于萬年惟王子子孫孫永保民皇王大紀卷十二

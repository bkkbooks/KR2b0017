body:
  text: 皇王大紀卷二十八宋胡宏撰三王紀康王王承文武成王之業無所變更勤修先王之訓典用和洽於天下以對揚皇天上帝之丕顯休命小雅首篇曰鹿鳴三章章八句言燕羣臣嘉賔也既飲食之又實幣帛筐篚以將其厚意然後忠臣嘉賔得盡其心矣呦呦鹿鳴食野之蘋藾蕭也我有嘉賔鼓瑟吹笙吹笙鼓簧承筐是將筐篚也所以將幣帛也人之好我示我周至也行道也呦呦鹿鳴食野之蒿菣也我有嘉賔德音孔昭視古示字民不恌愈也君子是則是效可法效也我有旨酒嘉賔式燕以敖遊也呦呦鹿鳴食野之芩草也我有嘉賔鼓瑟鼓琴鼓瑟鼓琴和樂且湛樂之久也我有旨酒以燕安也樂嘉賔之心小雅二篇曰四牡五章章五句勞使臣之來也有功而見知則説矣四牡騑騑行不止之貌周道倭遲歷逺之貌豈不懷歸私思也王事靡盬公義也我心傷悲情思也四牡騑騑嘽嘽駱馬喘息貌白馬黑鬛曰駱豈不懷歸王事靡盬不堅固也不遑暇也啓跪也處居也翩翩者隼夫不也載飛載下集于苞栩王事靡盬不遑將養也父翩翩者隼載飛載止集于苞杞枸檵也王事靡盬不遑將母駕彼四駱載驟駸駸驟也豈不懷歸是用作歌將母來諗念也告也小雅三篇曰皇皇者華五章章四句君遣使臣也送之以禮樂言逺而有光華也皇皇猶煌煌也者華于彼原隰髙平曰原下濕曰隰侁侁衆多貌征夫行人也每懷靡及我馬維駒六轡如濡載馳載驅周忠信也爰咨諏訪善為咨咨事為諏我馬維騏六轡如絲言調忍也載馳載驅周爰咨謀咨事之難易為謀我馬維駱六轡沃若載馳載驅周爰咨度咨禮義所宜為度我馬維駰隂白雜毛曰駰六轡既均調也載馳載驅周爰咨詢親戚之謀為詢小雅四篇曰常棣八章章四句燕兄弟也閔管蔡之失道故作常棣焉常棣棣也之華鄂承華者不鞾鞾明盛貌凡今之人莫如兄弟死喪之威兄弟孔懷原隰裒聚也矣兄弟求矣脊令在原兄弟急難雍渠也飛則鳴行則搖不能自舍也每有良朋況茲也也永長也嘆兄弟鬩狠也于牆外禦其侮每有良朋蒸也無戎相也助也喪亂既平既安且寧雖有兄弟不如友生儐陳也爾籩豆飲酒之飫私也兄弟既具和樂且孺妻子好合如鼓瑟琴兄弟既翕和樂且湛宜爾室家樂爾妻孥是究是圗亶信也其然乎小雅五篇曰伐木六章章六句燕朋友故舊也自天子至於庶人未有不須友以成者親親以睦友賢人不棄不遺故舊則民德歸厚矣伐木丁丁伐木聲鳥鳴嚶嚶出自幽谷遷于喬木嚶其鳴矣求其友聲相彼鳥矣猶求友聲矧况也伊人矣不求友生神之聽之終和且平伐木許許釃酒以筐曰釃有藇美貌既有肥羜未成羊曰羜以速諸父天子謂同姓諸侯諸侯謂同姓大夫皆曰父寧適不來微無也我弗顧於粲鮮明貌灑掃陳饋八簋圓曰簋天子用八既有肥牡以速諸舅異姓則稱舅寧適不來微我有咎伐木于阪釃酒有衍美也籩豆有踐陳列貌兄弟無逺民之失德乾餱食也以愆民尚以乾餱獲愆過於人有酒湑湑莤之也我無酒酤一宿酒也我坎坎鼓我蹲蹲舞貌舞我逮我暇矣飲此湑矣小雅六篇曰天保六章章六句下報上也君能下下以成其政臣能歸美以報其上焉天保定爾亦孔之固堅也俾爾單信也盡也厚何福不除開也俾爾多益以莫不庶衆也天保定爾俾爾戩穀罄盡也無不宜受天百祿降爾遐福惟日不足天保定爾以莫不興如山如阜髙平曰陸大陸曰阜如岡如陵大阜曰陵言廣厚也如川之方至以莫不增吉善也蠲潔也為饎酒食也是用孝享禴祠蒸嘗于公事也先王君曰卜爾先君也尸象神卜豫也萬壽無疆神之弔至也矣詒遺也爾多福民之質成也矣日用飲食羣黎百姓百官族姓遍為爾德如月之恆弦也如日之升出也如南山之壽不騫虧也不崩如松柏之茂無不爾或承小雅十篇曰魚麗六章三章章四句三章章二句美萬物盛多能備禮也魚麗歷也于罶曲梁也寡婦之笥也鱨揚也鯊鮀也太平有道則微物衆多君子有酒旨且多魚麗于罶魴鱧鮦也君子有酒多且旨魚麗于罶鰋鮎也鯉君子有酒旨且有物其多矣維其嘉矣物其旨矣維其偕矣物其有矣維其時矣小雅十一篇曰南陔孝子相戒以養也小雅十二篇曰白華孝子之潔白也小雅十三篇曰華黍時和嵗豐宜黍稷也三篇有其義而亡其辭小雅十四篇南有嘉魚四章章四句樂與賢也太平之君子至誠樂與賢者共之也南有嘉魚江漢之間魚所産也蒸然罩罩篧也君子有酒嘉賔式燕以樂南有嘉魚蒸然汕汕樔也今之撩罟也君子有酒嘉賔式燕以衎南有樛木甘瓠纍之君子有酒嘉賔式燕綏之翩翩者隼蒸然來思君子有酒嘉賔式燕又思小雅十五篇曰南山有臺五章章六句樂得賢也得賢則能為邦家立太平之基矣南山有臺夫須也北山有萊草也樂只君子邦家之基樂只君子萬壽無期南山有桑北山有楊樂只君子邦家之光樂只君子萬壽無疆南山有杞北山有李樂只君子民之父母樂只君子德音不已南山有栲山樗也北山有杻檍也樂只君子遐不眉壽秀眉也樂只君子德音是茂南山有枸枳枸北山有楰鼠梓樂只君子遐不黃耉樂只君子保艾爾後小雅十六篇曰由庚萬物得由其道也小雅十七篇曰崇丘萬物得極其髙大也小雅十八篇曰由儀萬物之生各得其宜也三篇有其義而亡其辭小雅十九篇曰蓼蕭四章章六句澤及四海也蓼長大也彼蕭蒿也斯零露湑兮露貌既見君子我心寫兮燕笑語兮是以有譽處兮蓼彼蕭斯零露瀼瀼既見君子為龍竄也為光其德不爽差也壽考不忘蓼彼蕭斯零露泥泥既見君子孔燕豈弟樂易也宜兄宜弟為兄亦宜為弟亦宜令德壽豈蓼彼蕭斯零露濃濃既見君子鞗轡也革轡首也沖沖埀飾貌和鸞雍雍在軾曰和在鏕曰鸞萬福攸同小雅二十篇曰湛露四章章四句天子燕諸侯也湛湛盛多貌露斯匪陽日也不晞乾也厭厭安也夜飲私燕也不醉無歸湛湛露斯在彼豐草厭厭夜飲在宗載考夜飲必於宗室湛湛露斯在彼把棘顯允君子莫不令德其桐其椅其實離離垂也豈弟君子莫不令儀小雅二十一篇曰彤弓三章章六句天子錫有功諸侯也彤朱也弓弨弛也兮受言我也藏之我有嘉賔中心貺之賜也鐘鼓既設一朝饗之彤弓弨兮受言載之載以歸也我有嘉賔中心喜之鐘鼓既設一朝右勸也之彤弓弨兮受言櫜韜也之我有嘉賔中心好之鐘鼓既設一朝酬報也之小雅二十二篇曰菁菁者莪四章章四句樂育材也君子能長育人材則天下喜樂之矣菁菁盛貌者莪羅蒿也在彼中阿大陵中也既見君子樂且有儀菁菁者莪在彼中沚沚中也既見君子我心則喜菁菁者莪在彼中陵既見君子錫我百朋泛泛楊舟楊木為舟亦沈亦浮載沈載浮既見君子我心則休大雅十二篇曰行葦八章章四句言忠厚也周家忠厚仁及草木故能內睦九族外尊事黃耉養老乞言以成其福祿焉敦聚也彼行道也葦牛羊勿踐履方苞方體形也維葉泥泥初生貌戚戚內相親也兄弟莫逺具爾或肆陳也之筵或授之几老者加之以几肆筵設重也席授几有緝猶續也御侍也或獻主曰獻或酢客曰酢洗爵奠斚主酬客客奠而不舉醓醢以薦肉醢也或燔或炙嘉殽脾臄函也或歌或咢徒擊也敦盡也弓既堅四鍭矢也既鈞叄亭已舍矢既均中藝也序賔以賢敦弓既句合而成規既挾四鍭四鍭如樹言皆中也序賔以不侮皆賢也曽孫維主酒醴維醹厚也酌以大斗長三尺以祈報也告也黃耉黃耇台背大老也背有台文以引以翼在前曰引在旁曰翼壽考維祺吉也以介景大也福大雅十三篇曰既醉八章章四句言太平也醉酒飽德人有士君子之行焉既醉以酒既飽以德既者盡其禮終其事君子萬年介爾景福既醉以酒爾殽既將行也君子萬年介爾昭明昭明有融融長也髙朗令善也終令終有俶始也公尸嘉告其告維何籩豆靜嘉朋友攸攝攝以威儀言相攝佐者以威儀也威儀孔時君子有孝子孝子不匱永錫爾類善也其類維何室家之壺廣也君子萬年永錫祚胤嗣也其胤維何天被爾祿福也君子萬年景命有僕附也其僕維何釐爾女士釐豫也爾女士從以孫子大雅十四篇曰鳬鷖五章章六句守成也太平之君子能持盈守成神祇祖考安樂之也鳬鷖在涇公尸來燕來寧鳬水鳥鷖鳬屬太平則萬物衆多爾酒既清爾殽既馨香之逺聞公尸燕飲福祿來成鳬鷖在沙水旁也公尸來燕來宜冝其事也爾酒既多品齊多爾殽既嘉備而美公尸燕飲福祿來為厚為孝子也鳬鷖在渚公尸來燕來處止也爾酒既湑爾殽伊脯公尸燕飲福祿來下鳬鷖在潨水會也公尸來燕來宗尊也既燕于宗福祿攸降公尸燕飲福祿來崇重也鳬鷖在亹山絶水也公尸來止熏熏和説也旨酒欣欣樂也燔灸芬芬香也公尸燕飲無有後艱三十五年王居天位敬恭神人四夷賔服海內晏然百姓興於禮義囹圄空虛刑措不用四十餘年有唐虞氏之風焉是嵗王崩諡曰康王子瑕立昭王六年甲午十六年甲辰二十六年甲寅三十六年甲子四十六年甲戌五十一年王在位久不能強於政治風化稍衰有光五色貫紫微井水溢是嵗王征荆蠻軍旅涉漢梁敗王及祭公隕于漢王右辛餘靡振王北濟反振祭公王因是發疾崩諡曰昭王子滿立生五十年矣論曰史有謂昭王以楚人不朝南征濟漢楚人密以膠舟進中流舟解王沒於水若是則楚有不可赦之罪嗣王所當寢苫枕戈誓弗與共天下者也愚觀穆王命君牙伯冏之文典雅𢎞奧克己求善蓋賢君也豈有忽棄君父而不動天下之兵以討荆楚者哉疑好事者為之如堯幽囚舜野死之類也是以不取彼而取此穆王三年王既除喪愍文武之道缺舉用賢才命君牙為司徒國史敘君牙曰穆王命君牙為周大司徒作君牙君牙王若曰嗚呼君牙惟乃祖乃父世篤忠貞服勞王家厥有成績紀于太常惟豫小子嗣守文武成康遺緒亦維先王之臣克左右亂四方心之憂危若蹈虎尾涉春冰今命爾豫翼作股肱心膂纘乃舊服無忝祖考𢎞敷五典式和民則爾身克正罔敢弗正民心罔中惟爾之中夏暑雨小民惟曰怨咨冬祁寒小民亦惟曰怨咨厥惟艱哉思其艱以圖其易民乃寧鳴乎丕顯哉文王謨丕承哉武王烈佑啓我後人咸以正罔闕爾惟敬明乃訓用奉若于先王對揚文武之光命追配于前人王若曰君牙乃惟由先正舊典時式民之治亂在兹率乃祖考之攸行昭乃辟之有義命伯冏為太僕國史敘冏命曰穆王命伯冏為周太僕正作冏命冏命王若曰伯冏惟豫弗克于德嗣先人宅丕后怵愓惟厲中夜以興思免厥愆昔在文武聰明齊聖小大之臣咸懷忠良其侍御僕從罔匪正人以旦夕承弼厥辟出入起居罔有不欽發號施令罔有不臧下民祇若萬邦咸休惟豫一人無良實賴左右前後有位之士匡其不及繩愆糾繆格其非心俾克紹先烈今豫命汝作大正正于群僕侍御之臣懋乃后德交修不逮慎簡乃僚無以巧言令色便辟側媚其惟吉士僕臣正厥后克正僕臣諛厥后自聖后德惟臣不德惟臣爾無昵于憸人充耳目之官迪上以非先王之典非人其吉惟貨其吉若時瘝厥官惟爾大弗克祇厥辟惟豫汝辜王曰嗚呼欽哉永弼乃后于彛憲五年甲申十五年甲午二十五年甲辰三十五年甲寅王將征犬戎祭公謀父諌曰先王耀德不觀兵夫兵戢而時動動則威觀則玩玩則無震是以先王之於民也茂正其德而厚其性阜其財求而利其器用明利害之鄉以文修之使之務利而辟害懷德而畏威故能保世以滋大至于武王致戎于商牧非務武也勤恤民隱而除其害也先王之制甸服者祭侯服者祀賔服者享要服者貢荒服者王日祭月祀時享嵗貢終王有不祭則修意有不祀則修言有不享則修文有不貢則修名有不王則修德序成而有不至於是有刑不祭伐不祀征不享讓不貢告不王布令陳辭而有不至則增修於德無勤民於逺是以近無不聽逺無不服今自大畢伯士之終也犬戎氏以其職來王天子曰豫必以不享征之且觀之兵無乃廢先王之訓而王幾頓乎吾聞犬戎樹敦率舊德而守終純固其有以禦我矣王不聽遂征之得四白狼四白鹿以歸由是荒服者不至周德始衰三十六年東巡至鄭大騎之谷起春宵宫集諸方士言神仙宫闕園林有紫府黃庭玉京金闕玉樹龜臺金堂蜃閣青溪洞府瓊林之異於是王始好巡遊嬴蜚廉别子季勝之後有造父者得驊騮騏驥驖驪騄耳八駿馬獻於王王大喜欲周行天下求神仙西巡狩樂而忘返作白雲黃竹之歌天下愁怨潢池之東有徐子偃者亦嬴姓也修飾仁義諸夷歸之者三十六國因僭稱王王聞之疾馳而歸造父為御起諸侯之師與荆楚合攻徐大破之偃王走死論曰世傳徐偃王仁義人也夫仁義之人無犯上之事無干時之慮今徐子朝諸侯僭王號犯上干時亦已甚矣其及也宜豈惟徐偃王為然後世亦有之如天水隗囂尊禮賢士坐談西伯自以為仁義者也然卒至於殺身亡宗蓋施小惠以為仁立小節以為義雖足以欺惑愚衆於須臾亦終必亡而已矣若夫由仁義行者必無敵於天下豈有兵敗國亡而身死於人手哉乃賜造父以趙城為趙氏未幾王又將出祭公謀父作祈招之詩以風王曰祈招之愔愔式昭德音思我王度式如玉式如金勤民之力而無醉飽之心王感而止命修詞令以懷諸侯以柔四夷周遂再安四十五年甲子王寵盛姬為作重璧之臺五十年王居位久教化衰刑罰繁思有以清之乃作吕刑國史敘吕刑曰穆王訓夏贖刑作吕刑吕刑惟吕命王享國百年耄荒度作刑以詰四方王曰若古有訓蚩尤惟始作亂延及于平民罔不冦賊鴟義姦宄奪攘矯虔苖民弗用靈制以刑惟作五虐之刑曰法殺戮無辜爰始淫為劓刵椓黥越兹麗刑并制罔差有辭民興胥漸泯泯棼棼罔中于信以覆詛盟虐威庶戮方告無辜于上上帝監民罔有馨香德刑發聞惟腥皇帝哀矜庶戮之不辜報虐以威遏絶苖民無世在下乃命重黎絶地天通罔有降格羣后之逮在下明明棐常鰥寡無蓋皇帝清問下民鰥寡有辭于苖德威惟畏德明惟明乃命三后恤功于民伯夷降典折民惟刑禹平水土主名山川稷降播種農殖嘉穀三后成功惟殷于民士制百姓于刑之中以教祗德穆穆在上明明在下灼于四方罔不惟德之勤故乃明于刑之中率義于民棐彛典獄非訖于威惟訖于富敬忌罔有擇言在身惟克天德自作元命配享在下王曰嗟四方司政典獄非爾惟作天牧今爾何監非時伯夷播刑之迪其今爾何懲惟時苖民匪察于獄之麗罔擇吉人觀于五刑之中惟時庶威奪貨斷制五刑以亂無辜上帝不蠲降咎于苖苖民無辭于罰乃絶厥世王曰嗚呼念之哉伯父伯兄仲叔季弟幼子童孫皆聽朕言庶有格命今爾罔不由慰日勤爾罔或戒不勤天齊于民俾我一日非終惟終在人爾尚敬逆天命以奉我一人雖畏勿畏雖休勿休惟敬五刑以成三德一人有慶兆民賴之其寧惟永王曰吁來有邦有土告爾祥刑在今爾安百姓何擇非人何敬非刑何度非及兩造具備師聽五辭五辭簡孚正于五刑五刑不簡正于五罰五罰不服正于五過五過之疵惟官惟反惟內惟貨惟來其罪惟均其審克之五刑之疑有赦五罰之疑有赦其審克之簡孚有衆惟貌有稽無簡不聽具嚴天威墨辟疑赦其罰百鍰閲實其罪劓辟疑赦其罰惟倍閲實其罪剕辟疑赦其罰倍差閲實其罪宫辟疑赦其罰六百鍰閲實其罪大辟疑赦其罰千鍰閲實其罪墨罰之屬千劓罰之屬千剕罰之屬五百宫罰之屬三百大辟之罰其屬二百五刑之屬三千上下比罪無僭亂辭勿用不行惟察惟法其審克之上刑適輕下服下刑適重上服輕重諸罰有權刑罰世輕世重惟齊非齊有倫有要罰懲非死人極于病非佞折獄惟良折獄罔非在中察辭于差非從惟從哀敬折獄明啓刑書胥占咸庶中正其刑其罰其審克之獄成而孚輸而孚其刑上備有并兩刑王曰嗚呼敬之哉官伯族姓朕言多懼朕敬于刑有德惟刑今天相民作配在下明清于單辭民之亂罔不中聽獄之兩辭無或私家于獄之兩辭獄貨非寶惟府辜功報以庶尤永畏惟罰非天不中惟人在命天罰不極庶民罔有令政在于天下王曰嗚呼嗣孫今往何監非德于民之中尚明聽之哉哲人惟刑無疆之辭屬于五極咸中有慶受王嘉師監于兹祥刑論曰考吕刑則墨劓剕宫大辟乃苖民所作五虐之刑也苗民坐是以終世而先王亦遵用之者以是五刑治怙終之人蓋五刑之極刑也賊人之肌體而絶其命一成而不可變故君子盡心焉穆王耄荒德雖下衰然能曲盡典獄之情偽以訓戒天下後世其仁民之意厚矣孔子所以有取也亦不得中行而與之故思狂狷之意歟五十五年甲戌王崩於祇宫諡曰穆王子繄扈立恭王十年甲申十二年王崩諡曰恭王子囏立懿王元年自王為政王室始衰徙都槐里八年甲午十八年甲辰齊侯不辰丁公曽孫也是為哀公齊國風首篇曰雞鳴三章章四句思賢妃也哀公荒淫怠慢故陳賢妃貞女夙夜警戒相成之道焉雞既鳴矣朝既盈矣雞鳴而夫人作朝盈而君作匪雞則鳴蒼蠅之聲有似遠雞之鳴東方明矣朝既昌矣東方明則夫人纚笄而朝朝已昌盛則君聽朝匪東方則鳴月出之光見月光以為東方明蟲飛薨薨甘與子同夢會且歸矣無庶豫子憎無使衆人以我故而憎子齊國風二篇曰還三章章四句刺荒也哀公好畋獵從禽獸而無厭國人化之遂成風俗習於畋獵謂之賢間於馳逐謂之好焉子之還兮便捷之貌遭我乎峱山名之間兮並併也驅從兩肩獸三嵗曰肩兮揖我謂我儇兮利也子之茂兮美也遭我乎峱之道兮並驅從兩牡兮揖我謂我好兮子之昌兮盛也遭我乎峱之陽兮並驅從兩狼兮揖我謂我臧兮齊國風三篇曰著三章章三句刺時也時不親迎也俟我於著門屏之間也乎而充耳以素象瑱乎而尚之以瓊華美石士之服也乎而俟我於庭乎而充耳以青青玉乎而尚之以瓊瑩石似玉卿大夫之服乎而俟我於堂乎而充耳以黃黃玉乎而尚之以瓊英石似玉人君之服乎而齊國風四篇曰東方之日二章章五句刺哀也君臣失道男女淫奔不能以禮化也東方之日兮興君不明故言其明未融彼姝初婚之貌者子在我室兮在我室兮履禮也我即兮就也東方之月兮彼姝者子在我闥兮興臣之明在我闥兮履我發兮行也齊國風五篇曰東方未明三章章四句刺無節也朝廷興居無節號令不時挈壺氏不得掌其職焉東方未明顛倒衣裳上曰衣下曰裳顛之倒之自公召之東方未晞明之始升顛倒裳衣倒之顛之自公令之折栁樊圃折栁以藩圃無益於禁狂夫瞿瞿無守之貌不能辰時也夜不夙早也則莫晚也二十五年王崩諡曰懿王恭王之弟辟方立皇王大紀卷二十八

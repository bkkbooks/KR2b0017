body:
  text: 皇王大紀卷三十五宋胡宏撰三王紀桓王十二年冬十有一月魯侯狩于郎王使冢宰渠伯糾聘于魯侯秦師侵芮敗焉小之也芮伯萬之母芮薑惡芮伯之多寵人也逐之出居于魏冬王師秦師圍魏執芮伯以歸魏芮皆姬姓魏地南枕河北涉汾水西迫于秦東厄于晉魏國風首篇曰葛屨二章一章六句一章五句刺褊也魏地狹隘其民機巧趨利其君儉嗇褊急而無德以將之糾糾葛屨可以履霜摻摻女手可以縫裳要之襋之好人服之好人提提宛然左辟佩其象揥維是𥚹心是以為刺魏國風二篇曰汾沮洳三章章六句刺儉也其君儉以能勤刺不得禮也彼汾沮洳漸洳也言采其莫菜也彼其之子美無度美無度殊異乎公路彼汾一方言采其桑彼其之子美如英萬人為英美如英殊異乎公行彼汾一曲言采其藚彼其之子美如玉美如玉殊異乎公族魏國風三篇曰園有桃二章章十二句刺時也大夫憂其君國小而迫而儉以嗇不能用其民而無德教日以侵削故作是詩也園有桃其實之殽心之憂矣我歌且謡不知我者謂我士也驕彼人是哉子曰何其心之憂矣其誰知之其誰知之蓋亦勿思園有棘棗也其實之食心之憂矣聊以行國不知我者謂我士也罔極彼人是哉子曰何其心之憂矣其誰知之其誰知之蓋亦勿思魏國風四篇曰陟岵三章章六句孝子行役思念父母也國迫而數侵削役乎大國父母兄弟離散而作是詩也陟彼岵兮山無草木曰岵瞻望父兮父曰嗟豫子行役夙夜無已上慎旃哉上謂去服事也猶來無止父尚義也陟彼屺兮山有草木曰屺瞻望母兮母曰嗟豫季行役夙夜無寐上慎旃哉猶來無棄母尚思也陟彼岡兮瞻望兄兮兄曰嗟豫弟行役夙夜必偕俱也上慎旃哉猶來無死兄尚親也魏國風五篇曰十畝之間二章章三句刺時也言其國削小民無所居焉十畝之間兮桑者間間兮男女往來無别之貌行與子還兮去東相遇十畝之外兮桑者泄泄兮人多之貌行與子逝兮行相逮及魏國風六篇曰伐檀三章章九句刺貪也在位貪鄙無功而受祿君子不得仕進爾坎坎伐檀兮坎坎伐木聲置之河之干兮置置也干崖也河水清且漣猗風行水成文曰漣伐檀以待世用若俟河水清且漣不稼不穡胡取禾三百㕓兮一夫之居曰㕓不狩不獵胡瞻爾庭有縣貆兮貆獸名彼君子兮不素餐兮素空也坎坎伐輻兮置之河之側兮河水清且直猗直直波也不稼不穡種之曰稼斂之曰穡胡取禾三百億兮萬萬曰億不狩不獵胡瞻爾庭有縣特兮獸三嵗曰特彼君子兮不素食兮坎坎伐輪兮置之河之漘兮漘亦崖也河水清且淪猗小風成文曰淪不稼不穡胡取禾三百囷兮不狩不獵胡瞻爾庭有縣鶉兮彼君子兮不素飱兮熟食曰飱魏國風終七篇曰碩鼠三章章八句刺重斂也國人刺其君重斂蠶食於民不修其政貪而畏人若大鼠也碩鼠碩鼠無食我黍三嵗貫女貫事也莫我肯顧逝將去女適彼樂土樂土樂土爰得我所碩鼠碩鼠無食我麥三嵗貫女莫我肯德逝將去女適彼樂國樂國樂國爰得我直得其直道碩鼠碩鼠無食我苗三嵗貫女莫我肯勞逝將去女適彼樂郊樂郊樂郊誰之永號號呼永歌也經曰四年春正月公狩于郎何以書譏逺也戎祀國之大事狩所以講大事也不時則傷農不地則害物可不謹乎以非其地而必書是春秋謹於微之意也每謹於微然後王德全矣夏天王使宰渠伯糾來聘宰冢宰也渠氏伯爵糾其名也名之何也操刑賞之柄以御下者王也論刑賞之法以詔王者宰也承命以聘弒君之賊故書名以見其非宰也然桓公沒榮叔來錫命何以書字而不名也始而來聘冢宰書名以見貶終而追錫王不稱天以示譏其義備矣宰咺獨稱官糾兼稱爵何也如咺者豈初得政猶未受封而糾則或以諸侯入相或既相而封者乎漢初命相必擇列侯為之後用公孫因相而得封蓋欲倣古重其任也任之重則責益深矣嫡妾之分君臣之義天下之大倫無所輕重糾以既封故兼稱爵見春秋責相之意也不書秋冬四時具然後成嵗故雖無事必書首時今此獨於秋冬闕焉何也立天之道曰隂曰陽陽居春夏以養育為事所以生物也隂居秋冬以肅殺為事所以成物也王者賞以春夏刑以秋冬象天道也桓弒隱公而立大司馬九伐之法雖未之舉猶有望也及使冢宰下聘恩禮加焉則天下之望絶矣故宰糾書名而去秋冬二時以見天王之不復能用刑也十三年甲戌冬十有一月己丑陳侯鮑薨諡曰桓公公弟他殺太子免而代之陳國風六篇曰墓門二章章六句刺陳他也陳他無良師傅以至於不義惡加於萬民焉墓門有棘斧以斯之夫也不良國人知之知而不已誰昔然矣墓門有梅有梟萃止夫也不良歌以訊之訊豫不顧顛倒思豫齊侯鄭伯朝于紀欲以襲之紀人知之王使仍叔之子聘于魯陳葬其君桓公魯城祝丘王奪鄭伯政鄭伯不朝王以諸侯伐鄭鄭伯禦之王為中軍虢公林父將右軍蔡人衛人屬焉周公黑肩將左軍陳人屬焉鄭子元請為左拒以當蔡衛為右拒以當陳人曰陳亂民莫有鬭心若先犯之必奔王卒顧之必亂蔡衛不支固將先奔既而萃於王卒可以集事從之曼伯為右拒祭仲足為左拒原繁髙渠彌以中軍奉公為魚麗之陳先偏後伍伍承彌縫戰于繻葛命二拒曰旝動而鼓蔡衛陳皆奔王卒亂鄭師合以攻之王卒大敗祝聃射王中肩王亦能軍聃請從之公曰君子不欲多上人況敢陵天子乎茍自救也社稷無隕多矣夜鄭伯使祭足勞王且問左右王國風六篇曰兔爰三章章七句閔周也桓王失信諸侯背叛搆怨連禍王師傷敗君子不樂其生焉有兔爰爰緩意雉離于羅我生之初尚無為我生之後逢此百罹憂也尚寐無吪動也有兔爰爰雉離于罦覆車也我生之初尚無造我生之後逢此百憂尚寐無覺有兔爰爰雉離于罿罬也我生之初尚無庸我生之後逢此百凶尚寐無聰鄭國風七篇曰遵大路二章章四句思君子也莊公失道君子去之國人思望焉遵大路兮摻執子之袪兮無我惡兮不寁故也摻攬也寁速也遵大路兮摻執子之手兮無我魗兮不寁好也魗棄也鄭國風八篇曰女曰雞鳴三章章六句刺不説德也陳古義以刺今不説德而好色也女曰雞鳴士曰昧旦子興視夜明星有爛將翺將翔弋鳬與鴈弋言加之與子宜之宜言飲酒與子偕老琴瑟在御莫不靜好知子之來之雜佩以贈之知子之順之雜佩以問之知子之好之雜佩以報之衛國風八篇曰伯兮四章章四句刺時也言君子行役為王前驅過時而不反焉伯兮朅兮朅武勇貌邦之桀兮桀特立也伯也執殳長丈二而無刃為王前驅自伯之東首如飛蓬豈無膏沐誰適為容其雨其雨杲杲出日願言思伯甘心首疾焉得諼草令人忘憂言樹之背背比堂也願言思伯使我心痗衛國風九篇曰有狐三章章四句刺時也衛之男女失時喪其妃耦焉古者國有凶荒則殺禮而多昏會男女之無夫家者所以育人民也有狐綏綏匹行貌在彼淇梁石絶水曰梁心之憂矣之子無裳有狐綏綏在彼淇厲厲深可厲之旁心之憂矣之子無帶有狐綏綏在彼淇側心之憂矣之子無服初衛侯蒸於夷薑生伋子屬諸右公子為之娶於齊而美公納之弼國風之十八篇新臺三章章四句刺衛宣公也納伋之妻作新臺于河上而要之國人惡之而作是詩也新臺有泚河水瀰瀰燕婉之求籧篨不鮮不能俯者新臺有灑河水浼浼燕婉之求籧篨不殄魚網之設鴻則離之燕婉之求得此戚施不能仰者秋魯大雩凡祀啓蟄而郊龍見而雩始殺而嘗閉蟄而蒸魯有螽州公如曹度其國危遂不復經曰五年春正月甲戍己丑陳侯鮑卒夏齊侯鄭伯如紀此外相如國史承告而書聖人存而弗削者以小國恃大國之安靖已而乃包藏禍心以圖之也所以著齊人滅紀之罪明紀侯去國之由也天王使仍叔之子來聘卿大夫天下之公選也周衰小人得政以朝廷官爵施及童稚賢者老身於萆門圭竇公道不行然後兵亂侵陵國家傾覆春秋書武氏仍叔之子云者戒後世人主徇大臣私意而用其子弟之弱者居公選之地以敗亂其國家欲其深省之也葬陳桓公城祝丘秋蔡人衛人陳人從王伐鄭魯桓弒君而自立宋督弒君而得政天下大惡人理所不容也則遣使聘焉而莫之討鄭伯不朝貶其爵可也乃憤怒自將以攻之非天討也故不稱天若移此師以加宋魯誰曰非天討乎既譏天王以端本矣三國以兵會伐則言從王者又以明君臣之義也君行而臣從正也戰于繻葛而不書戰王卒大敗而不書敗者又以存天下之大防也三綱軍政之本聖人寓軍政於春秋而書法若此者皆裁自聖心非國史所能與也大雩大雩者雩于上帝用盛樂也諸侯雩于境內山川爾魯侯而郊禘大雩欲悉書於策則有不勝書故雩祭因旱以書而特謂之大郊禘亦因事以書而義自見此皆國史所不能與而君子以謂性命之文是也諸侯不得祭天地大夫不得祭山川士庶人不敢以他人祖稱祭於己之寢禮也明乎春秋之義則知聖人治國如指諸掌之説矣螽冬州公如曹天子三公稱公王者之後稱公州公諸侯而稱公者昔畢髙以父師而釐束土衛武以列國而入相于周蓋與後世出入均勞之意同此其所以稱公也外相如不書此何以書將有其末故先録其本十四年冬十有一月州公自曹朝于魯荆熊通侵隨使薳章求成焉軍於瑕以待之隨人使少師董成鬭伯比言於楚子曰吾不得志於漢東也我則使然我張吾三軍而被吾甲兵以武臨之彼則懼而協以謀我故難間也漢東之國隨為大隨張必棄小國小國離楚之利也少師侈請羸師以張之熊率且比曰季梁在何益鬭伯比曰以為後圖少師得其君王毁軍而納少師少師歸請追楚師隨侯將許之季梁止之曰天方授楚楚之羸其誘我也君何急焉臣聞小之能敵大也小道大淫所謂道忠於民而信於神也上思利民忠也祝史正辭信也今民餒而君逞欲祝史矯舉以祭臣不知其可也公曰吾牲牷肥腯粢盛豐備何則不信對曰夫民神之主也是以聖王先成民而後致力於神故奉牲以告曰博碩肥腯謂民力之普存也謂其畜之碩大蕃滋也謂其不疾瘯蠡也謂其備腯咸有也奉盛以告曰潔粢豐盛謂其三時不害而民和平年豐也奉酒醴以告曰嘉栗旨酒謂其上下皆有嘉德而無違心也所謂馨香無讒慝也故務其三時修其五教親其九族以致其禋祀於是乎民和而神降之福故動則有成今民各有心而鬼神乏主君雖獨豐其何福之有君姑修政而親兄弟之國庶免於難隨侯懼而修政楚不敢伐齊侯欲滅紀紀侯求魯為之主春二月魯侯會之于郕北戎伐齊齊侯使乞師于鄭鄭太子忽帥師救齊六月大敗戎師獲其二帥大良少良甲首三百以獻於齊於是諸侯之大夫戍齊齊人饋之餼使魯為其班後鄭鄭忽以其有功也怒故有郎之師魯侯之未昏於齊也齊侯欲以文薑妻忽忽辭人問其故太子曰人各有耦齊大非吾耦也詩云自求多福在我而已大國何為君子曰善自為謀及其敗戎師也齊侯又請妻之固辭人問其故太子曰無事於齊吾猶不敢今以君命奔齊之急而受室以歸是以師昏也民其謂我何遂辭諸鄭伯六月壬午魯大閲以簡車馬陳公子躍蔡出也蔡人殺他而立之秋七月丁卯魯夫人生子以太子生之禮舉之接以太牢卜士負之士妻食之公與文薑宗婦命之公問名於申繻對曰名有五有信有義以類命為象取於物為假取於父為類不以官不以山川不以隱疾不以畜牲不以器幣周人以諱事神名終將諱之故以國則廢名以官則廢職以山川則廢主以畜牲則廢祀以器幣則廢禮晉以僖侯廢司徒宋以武公廢司空先君獻武廢二山是以大物不可以命公曰是其生也與吾同物命之曰同紀侯朝于魯謀請王命以求成于齊魯侯告之以不能經曰六年春正月實來實者州公名也書曰實來不復其國也春秋之法諸侯不生名失地滅同姓則名正名經世之本名正而天下定矣或曰孟子以諸侯失國託於諸侯禮也今州公書名以匹夫畜之可乎曰世衰道微諸侯其有壤地褊小迫乎強暴而失國是不幸焉非其罪也則以諸侯之禮接之可也若談子在莒弦子在黃溫子在衛雖失國出奔而春秋不名義可見矣若夫或棄賢保佞或驕奢淫縱或用兵暴亂自底滅亡如蔡獻舞邾益曹陽州實之徒待之以初乃禮之過也觀春秋所書則知所以處寓公之禮與強為善自暴棄者之勸戒矣夏四月公會紀侯于郕秋八月壬午大閲書八月不時也書大閲非禮也先王寓軍政於四時之田訓民禦暴其備豫也懼鄭忽畏齊人不因田狩而閲兵車屬農失政甚矣春秋非持以不時非禮書也乃天未隂雨徹彼桑土綢繆牖戶之意蔡人殺陳他他殺太子而代其位至是踰年不成之為君者以賊討也書蔡人以善蔡書陳他以善陳善蔡者以蔡人知他之為賊善陳者以陳國不以他為君知其為賊故稱人稱人討賊之詞也不以為君故稱名稱名當討之賊也魯桓殺君而鄭伯與之盟宋督殺君而四君納其賂則不知其為賊矣齊商人殺君者及其見殺則稱位蔡般弒父者及其見殺則稱爵是齊蔡國人皆以為君矣聖人於此抑揚豫奪遏人欲於橫流存天理於既滅見諸行事可謂深切而著明者矣九月丁卯子同生適冢始生即書于䇿與子之法也唐虞禪夏后殷周繼春秋兼帝王之道賢可禪則以天下為公而不拘於世及之禮子可繼則以天下為家而不必於讓國之義萬世之通道也與賢者貴於得人與子者定於立嫡經書子同生所以明與子之法正國家之本防後世配嫡奪正之事垂訓之義大矣此世子也其不曰世子何也天下無生而貴者誓於天子然後為世子冬紀侯來朝主者成敗之機榮辱之本也魯桓弒君之賊人人之所同惡夫人得而討之者也而紀侯主之以求援其能國乎然則何以得免於貶志不在於朝桓也十五年冬十二月乙亥魯焚咸丘榖伯鄧侯朝于魯盟向求成于鄭既而背之鄭人齊人衛人伐盟向王遷盟向之民于郟曲沃伯入翼殺其君小子侯王使虢仲伐之稱復歸曲沃虢仲立哀侯弟緡唐國風八篇曰鴇羽三章章七句刺時也昭公之後大亂五世君子下從征役不得養其父母而作是詩也肅肅鴇羽集于苞栩王事靡盬靡不攻緻也不能藝稷黍父母何怙悠悠蒼天曷其有所肅肅鴇翼集于苞棘王事靡盬不能藝黍稷父母何食悠悠蒼天曷其有極肅肅鴇行集于苞桑王事靡盬不能藝稻梁父母何嘗悠悠蒼天曷其有常經曰七年春二月己亥焚咸丘易稱王用三驅禮天子不合圍夫子釣而不綱皆愛物之意也焚咸丘所謂焚林而田者也夏榖伯綏來朝鄧侯吾離來朝榖伯鄧侯何以生名桓天下之大惡也執之者無禁殺之者無罪榖伯鄧侯越國踰境相繼而朝之即大惡之黨也故特貶而書名與失地滅同姓者比焉經於朝桓者或貶爵或書名或稱人以誅絶其黨撥亂之法嚴矣誅止其身而黨之者無罪則人之類不相賊殺為禽獸也幾希矣不書秋冬田常弒其君孔子請討之以從大夫之後不敢不告也桓弒隱公而立雖方伯連帥環視而未之恤猶有望也及榖鄧二國自逺來朝則天下諸侯莫有可望者矣故七年榖伯鄧侯各書其名而去秋冬二時以見諸侯之不復能修其職也然則見之行事不亦深切著明矣乎故曰春秋成而亂臣賊子懼十六年冬十一月己卯魯蒸王使家父聘于魯春三月丁巳魯再蒸隨少師有寵楚鬭伯比曰可矣讎有釁不可失也夏楚子合諸侯于沈鹿黃隨不會使薳章讓黃楚子伐隨軍於漢淮之間季梁請下之弗許而後戰所以怒我而怠寇也少師謂隨侯曰必速戰不然將失楚師隨侯禦之望楚師季梁曰楚人上左君必左無與王遇且攻其右右無良焉必敗偏敗衆乃攜矣少師曰不當王非敵也弗從戰于速把隨師敗績隨侯逸鬭丹獲其戎車與其戎右少師秋隨及楚平楚子將不許鬭伯比曰天去其疾矣隨未可克也乃盟而還楚闢地東至睢上魯伐邾秋八月雨雪王使祭公言于魯以取女遂逆后于紀秦寧公魯姬生武公德公寧公薨庶長弗忌威壘三父舍世子兄弟不立而立其庶出子經曰八年春正月己卯蒸蒸以中冬時也何以書為再蒸見瀆也天王使家父來聘家父何以無貶乃同則書重之義虞史以人主大臣為一體春秋以天王宰相為一心故來聘桓公則宰糾書名以正其始錫桓公命王不稱天以正其終而榮叔家父之徒不與也故人主之職在論相而止矣夏五月丁丑蒸春秋之文有一句而包數義者戎伐凡伯于楚丘以歸之類是也有再書而一貶者春正月己卯蒸夏五月丁丑蒸是也秋伐邾冬十月雨雪祭公來遂逆王后于紀劉敞曰祭公王之三公也曷為不稱使不與王之使祭公也師傅之官坐而論道其任重矣今其來魯乃命魯侯以婚􅊚之事者也若是則大夫可矣何必三公任之重使之輕故祭公緣比義得専命不報遂行如紀而王以輕使為失祭公以遂行為罪矣此説是也官師從單靖公逆王后于齊劉夏非卿而書靖公合理則不書故先儒以為宜使卿逆公監之禮也十七年冬紀季薑歸于京師巴子使告于楚請與鄧為好楚子使道朔將巴客聘于鄧鄧南鄙鄾人奪之幣殺道朔及巴行人楚讓於鄧鄧人弗受夏楚鬬廉及邑師圍鄾鄧飬甥聃甥救鄾三逐巴師不克鬭廉衡陳于巴師之中以戰而北鄧人逐之背巴師而夾攻之鄧師大敗鄾人宵潰秋虢仲芮伯荀侯賈伯伐曲沃曹伯終生使其世子射姑朝于魯終生叔振鐸七世孫也魯侯饗之樂奏而嘆施父曰曹太子其有憂乎非嘆所也經曰九年春紀季薑歸于京師自逆者而言則當尊崇其匹內主六宫之政使妃妾不得上僭故從天王所命而稱王后示天下之母儀也自歸者而言則當樛屈逮下使夫人嬪婦皆得進御於君而無嫉妬之心故從父母所子而稱季薑化天下以婦道也詞之抑揚各有所當皆正始之道王化之基也夏四月秋七月冬曹伯使其世子射姑來朝周制世子攝其君者謂朝於天子有時雖老疾者亦不敢後故使世子攝已事以見天子急述職也諸侯間於王事則相朝其禮本無時曹伯既有疾何急於朝桓而使世子攝哉君疾而儲副出啓姦邪窺伺之心危道也世子將欲已乎則方命矣曰孝子盡道以事其親者也不盡道而茍焉以從命為孝又焉得為孝十八年曹伯薨射姑嗣三月曹葬其君桓公虢仲譖其大夫詹父於王詹父有辭以王師伐虢夏虢公出奔虞秦人納芮伯萬于芮魯侯衛侯期于桃丘衛侯弗至初虞叔有玉虞公求旃弗獻既而悔之曰周諺有之匹夫無罪懷璧其罪吾焉用此其以賈害也乃獻之又求其寶劍叔曰是無厭也無厭將及我遂伐虞公公奔共池鄭伯以忽怒故請師於齊以伐魯冬十月丙午齊侯以師助之魯侯與戰于郎邶國風八篇曰雄雉四章章四句刺衛宣公也淫亂不恤國事軍旅數起大夫久役男女怨曠國人患之而作是詩也雄雉于飛泄泄其羽興也雄雉見雌雉飛而鼓其翼泄泄然我之懷矣自詒伊阻詒遺伊維阻難也雄雉于飛下上其音展矣君子實勞我心展誠也瞻彼日月悠悠我思瞻視也道之云逺曷云能來百爾君子不知德行不忮不求何用不臧弼國風九篇曰匏有苦葉四章章四句刺衛宣公也公與夫人並為淫亂匏有苦葉濟有深涉興也匏謂之瓠瓠之葉苦不可食也濟度也由膝以上為涉深則厲淺則揭以衣涉水為厲謂由帶以上也揭褰衣也遭時制宜如遇水深則厲淺則揭矣男女之際安可以無禮義將無以自濟也有瀰濟盈有鷕雉鳴瀰深水也盈滿也深水人之所難也鷕雌雉聲也衛夫人有淫泆之意授人以色假人以辭不顧禮義之難使宣公有淫昏之行濟盈不濡軌雉嗚求其牡濡清也由輈以上為軌違禮義不由其道猶雉鳴而求其牡矣飛曰雌雄走曰牝牡雍雍鳴鴈旭日始旦雍雍鴈聲和也納采用鴈旭日始出謂大昕之時士如歸妻逮氷未泮逮及泮散也招招舟子人涉卭否招招號召之貌舟子舟人主濟渡者卭我也人涉卭否卭須我友人皆涉我友未至我獨侍之而不涉以言室家之道非得所適貞女不行非得禮義昏姻不成邶國風十七篇曰靜女三章章四句刺時也衛君無道夫人無德靜女其姝俟我於城隅靜貞靜女也德貞靜而有法度乃可説也姝美色也俟侍也城隅以言髙而不可踰愛而不見搔首踟蹰言志往而行正靜女其孌貽我彤管既有美德又有美色又能遺我以古人之法可以配人君也古者后夫人必有女史彤管之法史不記過其罪殺之后妃羣妾以禮御於君所女史書其日月授之以環以進退之生子月辰則以金環退之當御者以銀環進之著于左手既御著于右手事無大小記以成法彤管有煒説懌女美煒赤貌彤管以赤心正人也自牧歸荑洵美且異牧田官也荑牙之始生也本之於荑取其有始有終匪女之為美美人之貽非為其徒説美色而已美其人能遺我法則衛侯納伋子之妻生夀及朔屬壽於左公子薑氏與朔搆伋子公使諸齊使盜待諸莘將殺之壽子告之使行不可曰棄父之命烏用子矣有無父之國則可也及行飲以酒夀子載其旌以先盜殺之伋子至曰我之求也此何罪又殺之邶國風十九篇二子乘舟思伋夀也衛宣公之二子爭相為死國人傷而思之作是詩也二子乘舟泛泛其景二子伋夀也朔與母訴伋於公公令伋之齊使賊先待於隘夀知之以告伋使去伋曰君命不可逃國人傷其涉危遂往如乘舟而無所薄泛泛然迅疾而不凝也願言思子中心養養願每也飬飬然憂不知所定二子乘舟泛泛其逝往也願言思子不瑕有害言二子之不逺害邶國風十篇曰谷風六章章八句刺夫婦失道也衛人化其上淫於新昏而棄其舊室夫婦離絶國俗傷敗焉習習谷風以隂以雨興也習習和舒貌東風謂之谷風隂陽和而谷風至夫婦和則室家成室家成而繼嗣生黽勉同心不宜有怒言黽勉者思與君子同志也采葑采菲無以下體葑須也菲芴也下體根莖也德音莫違及爾同死行道遲遲中心有違遲遲舒行貌違離也不逺伊爾薄送我畿門內也誰謂荼苦其甘如薺荼苦菜也宴爾新昏如兄如弟宴安也涇以渭濁湜湜其沚涇渭相入而清濁異宴爾新昏不我屑以屑潔也毋逝我梁毋發我笱逝之也梁魚梁笱所以捕魚也我躬不閲遑恤我後閲容也就其深矣方之舟之就其淺矣泳之遊之舟船也何有何亡黽勉求之有謂富也亡謂貧也凡民有喪匍匐救之不我能慉反以我為讐慉養也既阻我德賈用不售阻難也昔育恐育鞠及爾顛覆育長鞠窮也既生既育比豫于毒我有旨蓄亦以御冬旨美御禦也宴爾新昏以我御窮有洸有潰既詒我肄洸洸武也潰潰怒也肄勞也不念昔者伊豫來塈塈息也衛國風四篇曰氓六章章十句刺時也宣公之時禮義消亡淫風大行男女無别遂相奔誘華落色衰復相棄背或乃困而自悔喪其妃耦故序其事以風焉美反正刺淫泆也氓之蚩蚩抱布貿絲氓民也蚩蚩敦厚之貌布幣也匪來貿絲來即我謀送子涉淇至于頓丘丘一成為頓丘匪我愆期子無良媒愆過也將子無怒秋以為期將願也乘彼垝垣以望復關垝毁也復關君子所近也不見復關泣涕漣漣言其有一心乎君子故能自悔既見復關載笑載言爾卜爾筮體無咎言龜曰卜蓍曰筮體兆卦之體以爾車來以我賄遷賄財遷徙也桑之未落其葉沃若于嗟鳩兮無食桑椹于嗟女兮無與士耽桑女功之所起沃若猶沃沃然鳩鶻鳩也食桑椹過則醉而傷其性耽樂也女與士耽則傷禮義士之耽兮猶可説也女之耽兮不可説也桑之落矣其黃而隕自我徂爾三嵗食貧淇水湯湯漸車帷裳隕墜也湯湯水盛貌帷裳婦人之車也女也不爽士二其行爽差也士也罔極二三其德極中也三嵗為婦靡室勞矣夙興夜寐靡有朝矣言既遂矣至于暴矣兄弟不知嘻其笑矣嘻嘻然笑靜言思之躬自悼矣悼傷也及爾偕老老使我怨淇則有岸隰則有泮泮坡也總角之宴言笑宴宴信誓旦旦總角結髮也晏晏和柔也信誓旦旦然不思其反反是不思亦已焉哉經曰十年春王正月桓無王今復書王何也十者盈數也天道十年則亦周矣人事十年則亦變矣故易稱守貞者十年而必反傳論逺惡者十年而必棄桓公至是其數已盈宜見誅於天人矣十年書王紀常理也有習於穀梁子而不得傳者見二年書王以為正與夷之卒此年書王而曹伯適薨遂附益之以為正終生之卒誤矣果正諸侯之卒不緣篡弒者陳侯鮑在五年之正月曷不書王以正其卒乎庚申曹伯終生卒夏五月葬曹桓公秋公會衛侯于桃丘弗遇弗者遷詞惡失信也衛初約魯會于桃丘至是中變而從齊鄭於是乎有郎之師其戰于郎直書曰來盟于惡曹俱奪其爵則桃丘之弗遇也蓋惡衛侯之失信矣桃丘衛地冬十有二月丙午齊侯衛侯鄭伯來戰于郎春秋加兵于魯衆矣未有書來戰此獨不稱侵伐而以來戰為文何也兵凶器戰危事聖人所重也誅暴禁亂敵加於己蓋有不得已而應者矣未有悖道縱欲得己不已而先之者也魯桓弒立天下大惡人人之所得討也鄭伯則首盟于越以定其位齊侯則繼會于稷以濟其姦曾不能修方伯之職駐師境上聲罪致討伸天下之大義也今特以私忿小怨親帥其師戰于魯境尚為知類也哉此春秋之所必誅而不以聽也故以三國為主而書來戰于郎鄭人主兵而首齊猶州吁主兵而先宋皇王大紀卷三十五

body:
  text: 皇王大紀卷六十宋胡宏撰三王紀敬王四年宋葬其君魯侯自齊歸于鄆齊侯将納魯侯命無受魯貨申豐從女賈以幣錦適齊謂梁丘據之人髙齮能貨據為髙氏後粟五千庾據受之言於齊侯曰羣臣不盡力于魯君者非不能事君也然據有異焉宋元公為魯君如晋卒於曲棘叔孫昭子求納其君無疾而死不知天之棄魯耶抑魯君有罪於鬼神故及此也君若待于曲棘使羣臣從魯君以卜焉若可師有濟也君而繼之兹無敵矣若其無成君無辱焉齊侯從之使公子鉏帥師從魯侯圍成大夫公孫朝謂意如曰有都以衛國也請我受師許之告于齊師曰孟氏魯之敝室也用成已甚弗能忍也請息肩于齊齊師圍成成人伐齊師之飲馬于淄者曰将以厭衆魯成備而後告曰不勝衆師及齊師戰于炊鼻齊侯與諸侯謀納魯侯魯侯㑹之楚王居薨諡曰平王子軫嗣尹氏渉于鞏焚東訾單子如晉告急劉子以王出次于滑晉知躒趙鞅帥師納王使女寛守闕塞王起師于滑遂次于尸晉師克鞏召伯盈逐王子朝及召氏之族毛伯得尹氏固南宫嚚奉周之典籍奔楚召伯逆王于尸及劉子單子盟遂軍圉澤次于堤上入于成周盟于襄宫晉師使成公般戍周而還王入于荘宫子朝使告于諸侯曰昔武王克殷成王靖四方康王息民竝建母弟以蕃屏周亦曰吾無專享文武之功且為後人迷敗傾覆而溺入于難則振救之至于厲王王心戾虐萬民弗忍居王于彘諸侯釋位以間王政宣王有志而後效官則是兄弟之能用力於王室也至於惠王天不靖周生頺禍心施于叔帯惠襄辟難越去王都則有晉鄭咸黜不端以綏定王家則是兄弟之能率先王之命也今單旗劉狄剥亂天下晉為不道是攝是賛兹不榖震盪播越竄在荆蠻若我一二兄弟甥舅奨順天法無助狡猾以從先王之命則所願也昔先王之命曰王后無適則擇立長年鈞以徳徳鈞以卜王不立愛公卿無私古之制也穆后及太子蚤夭即世單劉賛私立少以間先王亦惟伯仲叔季圖之晋伐齊阿鄄燕侵齊河上晏嬰薦田穰苴曰苴雖庶孽然文能附衆武能威敵願君試之齊侯以為将禦燕晉苴曰臣素卑賤願得君寵信之士與之俱齊侯命貴幸臣荘賈為監軍苴令曰凢在軍行者明日日中畢㑹後者死及期吏士皆集夕時賈乃至直斬以徇軍中震慄然後行士卒次舎井竈飲食問疾醫藥身自拊循之悉取将軍之資糧享士卒身與士卒平分糧食最比其羸弱者士皆爭奮晉師聞之為之罷去燕師聞之度水而解苴振旅而歸齊侯以為大司馬已而鮑氏髙國之屬害其能譛而黜之發病卒齊侯将大用孔仲尼封以尼谿之田問於晏嬰嬰曰周室之衰禮樂廢缺久矣君欲用之以移齊俗恐不能究也齊髙庭問君子之道於孔子子曰貞以守之敬以輔之仁以行之終日言不遺己之憂終日行不遺己之患惟智者能焉經曰二十有六年春王正月葬宋元公三月公至自齊居于鄆居者有其土地人民之稱也昭公失國出奔而稱居于鄆者存一國之防也襄王已出而稱居于鄭敬王未入而稱居于狄泉者存天下之防也天子之於天下率土之濵莫非其臣非諸侯所敢擅也諸侯之於封國四境之内莫非其土非大夫所得專也故諸侯避舍以待廵守而大夫專邑是謂叛君曰居于鄆其為防也至矣夏公圍成成者孟氏之邑左氏曰齊侯将納公命無受魯貨申豐適齊貨梁丘據據受之言於齊侯曰羣臣不盡力于魯君者非不能事君也據有異焉宋元公為魯君如晋卒于曲棘叔孫昭子求納其君無疾而死不知天之棄魯邪抑魯君有罪於鬼神故及此也若使羣臣從魯君以卜師有濟也而繼焉兹無敵矣齊侯從之使公子鉏帥師從公圍成不書齊師者景公怵於邪說為義不終故㣲之也書公圍成則季氏之不臣昭公之不君齊侯之不能修方伯連帥之職其罪咸具矣秋公㑹齊侯莒子邾子把伯盟于鄟陵公至自㑹居于鄆九月庚申楚子居卒冬十月天王入于成周左氏曰晋知躒趙鞅帥師納王入于成周使成公般戍周而還不曰入于京師者京師者衆大之稱不可繫之入也其曰成周云者黍離而次不列于雅䧏為國風之意而景王寵愛庶孽弱其世適之罪著矣尹氏召伯毛伯以王子朝奔楚取國有五利寵居一焉子朝有寵於景王為之黨者衆矣卒不能立至於奔楚何也是非有出於人之本心者不可以私愛是亦不可以私惡非卒歸於公而止矣景王寵愛子朝将蘄於見是而天下不以為是疎薄子猛将蘄於見非而天下卒不以為非徒設此心兩棄之也庶孽憑寵為羣小之所宗而人心不服適子恃正人心之所向而羣小不從故伯服雖殺而平王亦不能復宗周之盛申生已死而奚齊卓子亦不能勝里克之兵是兩棄之也景王不監覆車王猛子朝之際危亦甚矣春秋詳書為後世戒可謂深切著明也哉五年魯侯如齊復歸鄆吳王欲因楚喪而伐之使公子掩餘公子燭庸帥師圍潛使延州來季子聘于上國遂聘于晉以觀諸侯楚莠尹然工尹麇左尹郤宛工尹夀帥師救潛吳師不能退公子光曰此時也不可失也告鱄設諸曰上國有言不索何獲我王嗣也吾欲求之事若克季子雖至不吾廢也鱄設諸曰王可殺也母老子幼是無若何光伏甲於堀室而享王王使甲坐於道及其門門階戸席皆王親也夾之以鈹羞者獻體改服於門外執羞者坐行而入執鈹者夾承之及體以相授也光偽足疾入于堀室鱄設諸置劍於魚中以進抽劍刺王鈹交於胸遂弑王僚光即位以鱄設諸子為卿召伍員為行人季子至曰茍先君無廢祀民人無廢主社稷有奉國家無傾乃吾君也吾誰敢怨哀死事生以待天命非我生亂立者從之先人之道也復命哭墓復位而待掩餘奔徐燭庸奔鍾吾楚師聞吳亂而還楚郤宛直而和國人說之鄢将師費無極惡之囊瓦賄而信讒無極謂之曰郤宛欲飲子酒又謂宛曰令尹欲飲酒於子氏宛曰必來辱為惠已甚吾無以酬之若何無極曰令尹好甲兵子出之吾擇焉取五甲五兵曰寘諸門令尹至必觀之而從以酬之及饗日帷諸門左無極謂令尹曰吾幾禍子左尹将為子不利甲在門矣且此役也可以得志於吳宛取賂焉以乗亂為不祥誤羣帥吳乗我喪我乗其亂不亦可乎令尹使視郤氏則有甲焉遂攻之宛自殺盡滅其族黨晉陳陽令終伯州犂之孫嚭奔吳吳以為太宰晉陳之族呼於國曰鄢氏費氏專禍楚國弱寡王室蒙王與令尹以自利也令尹盡信之矣國将如之何令尹病之晉士鞅㑹諸侯之大夫令戍周且謀納魯君也宋衛固請之士鞅取貨於季孫謂樂祁犂北宫喜曰季孫未知其罪而君伐之請囚請亡於是乎不獲君又不克而自出也夫豈無備而能出君乎季氏之復天救之也休公徒之怒而啟叔孫氏之心不然豈其伐人而說甲執氷以游叔孫氏懼禍之濫而自同於季氏天之道也魯君守齊三年而無成季氏甚得其民淮夷與之有十年之備有齊楚之援有天之賛有民之助有堅守之心有列國之權而弗敢宣也事君如在國故鞅以為難二子皆圖國者也而欲納魯君鞅之願也請從二子以圍魯無成死之二子懼皆辭乃辭小國而以難復楚卻宛之難國言未巳進胙者莫不謗令尹沈尹戍言於令尹曰無極楚之讒人也民莫不知去朝吳出蔡侯朱喪太子建殺連尹奢屏王之耳目使不聰明不然平王之温惠㳟儉有過成荘無不及焉所以不獲諸侯邇無極也今又殺三不辜以興大謗智者除讒以自安也今子愛讒以自危也甚矣其惑也令尹曰是瓦之罪敢不良圖遂殺無極盡滅其族以說於國謗言乃止曹伯薨弟野嗣邾快奔魯魯侯如齊齊侯饗之子家子曰朝夕立於其朝又何享焉其飲酒也乃飲酒使宰獻而請安子仲之子曰重為齊侯夫人曰請使重見子家子乃以君出經曰二十有七年春公如齊公至自齊居于鄆夏四月吳弑其君僚此公子光使專諸弑之而稱國何也吳子夀夢有四子長諸樊次餘祭次夷末次季札光諸樊之子也僚夷末之子也諸樊兄弟以次相及必欲致國於季子而季子終不受則國宜之光也僚烏得為君故稱國以弑而不歸獄於光其稱國以弑者吳大臣之罪也大臣任大事事莫大於置君矣故君存而國本定君終而嗣子立社稷嘉靖人無間言此秉政大臣之任伊吕之所以安商周孔明之所以定劉漢也若廢立進退出於羣小閽寺而當國大臣不預則将焉用彼相矣此春秋歸罪大臣稱國弑君之意其經世之慮深矣楚殺其大夫郤宛秋晉士鞅宋樂祁犂衛北宫喜曹人邾人滕人㑹于扈按左氏扈之㑹令戍周且謀納公也宋衛皆利納公固請之士鞅取貨於季孫謂樂祁北宫喜曰魯君守齊三年而無成季氏甚得其民淮夷與之有十年之備有齊楚之援有堅守之心有列國之權而弗敢宣也事君如在國鞅以為難二子皆圖國者也而欲納魯公請從二子以圍魯無成死之二子懼皆辭乃辭小國而以難復文十五年諸侯盟于扈将為魯討齊齊侯賂之而不克討故在㑹諸侯畧而不叙今此謀納公亦以賂故不克納而諸侯之大夫皆序何也曰利於納公者宋衛之大夫也受賂而不納公者獨范鞅主之耳又况戍周之令行乎所以列序而不畧也以此見聖人取捨之大情而輕重審矣冬十月曹伯牛卒邾快來奔公如齊公至自齊居于鄆六年曹𦵏其君魯侯如晉将如乾侯子家子曰有求於人而即其安人孰矜之其造於竟也弗聽使請逆于晉晉人曰天禍魯國君淹恤在外亦不使一介辱在寡人而即安於甥舅其亦使逆君魯侯復于竟而後逆之鄭伯薨子蠆嗣晉祁盈家臣祁勝與鄔臧通室盈執之勝賂荀躒躒言於晉侯以專戮執盈殺之及其黨楊食我遂滅祁氏羊舌氏於是韓起卒魏舒為政分二家之田為十縣謂賈辛司馬烏為有力於王室謂知徐吾趙朝韓固魏戊餘子之不失職能守業者也皆命之為縣大夫其司馬彌牟孟丙樂霄僚安皆受縣而後見以賢舉也孔仲尼聞之曰魏子之舉也義其命也忠其長有後於晉國乎鄭塟其君滕侯薨子結嗣滕塟其君梗陽人有獄魏戊不能斷以獄上其大宗賂以女樂魏舒将受之戊謂閻没女寛曰主以不賄聞若受梗陽人賄莫甚焉吾子必諌舒召二子食比置三嘆舒曰惟食忘憂三嘆何也對曰或賜二小人酒不夕食饋之始至恐其不足是以嘆中置自咎曰豈将軍食之而有不足是以再嘆及饋之畢願以小人之腹為君子之心屬厭而已舒辭梗陽人經曰二十有八年春王三月葬曹悼公公如晉次于乾侯夏四月丙戍鄭伯寧卒六月葬鄭定公秋七月癸巳滕子寧卒冬葬滕悼公七年甲辰魯侯之鄆齊侯使髙張唁之稱主君子家子曰齊卑君矣君祗辱焉遂如乾侯季孫意如毎嵗賈馬具從者之衣屨而歸之于乾侯公執歸馬者賣之乃不歸馬公賜公衍羔裘使獻龍輔於齊侯遂入羔裘齊侯喜與之陽榖公衍公為之生也其母偕出公衍先生公為之母曰相與偕出請相與偕告三日公為生其母先以告公為為兄魯侯私喜於陽榖而思於魯曰公為為此禍也且後生而為兄其誣也久矣黜之而以公衍為太子魯叔詣卒龍見于綘郊鄆人叛魯侯晉趙鞅荀盈帥師城汝濵遂賦晉國一鼓鐵以鑄刑鼎著范宣子所為刑書焉孔仲尼曰晉其亡乎失其度矣夫晉國将守唐叔之所受法度以經緯其民卿大夫以序守之民是以能尊其貴貴是以能守其業貴賤不愆所謂度也夫宣子之刑夷之蒐也晉國之亂制也若之何以為法經曰二十有九年春公至自乾侯居于鄆齊侯使髙張來唁公遣使來唁淺事也亦書于經者罪齊侯不能修方伯連帥之職也昔狄人迫逐黎侯黎侯寓于衛衛人弗恤黎之臣子勸其君以歸而賦式㣲其一章曰㣲君之故者以事求人而人不有其事是謂㣲君之故若昭公見逐出奔而齊莫之討淹恤日久而齊莫之納㣲君之故矣其二章曰㣲君之躬者以身下人而人不有其身謂㣲君之躬若齊侯設禮以享而使宰獻遣使來唁而稱主君㣲君之躬矣諸侯失國託於諸侯禮也諸侯失國諸侯納之正也齊之先世常主夏盟而太公受先王五侯九伯之命矣魯為鄰境甥舅之國也昭公朝夕立於其朝曽不能陳師境上討意如逐君之罪而遣使唁公豈得禮乎公如晉次于乾侯夏四月庚子叔詣卒秋七月冬十月鄆潰民逃其上曰潰自是昭公削迹於魯尺地一民皆非其有矣公之出奔處鄆四年民不見徳亡無愛徵至于潰散豈非昏迷不返自納於罟獲䧟穽之中其從者又皆艾殺其民視如土芥其下不堪所以潰與然則去宗廟社稷出奔而猶不惕然恐懼祈改過以補前行之愆也自棄甚矣欲不亡得乎噫故書以為後世戒八年晉侯薨子午嗣鄭游吉如晉弔且送葬魏舒使士彌牟詰之曰悼公之喪子西弔子蟜送葬今吾子無貳何故對曰先王之制諸侯之喪士弔大夫送葬惟嘉好聘享三軍之事於是乎使卿晉之喪事敝邑之間先君有所助執紼矣若其不間士大夫有所不獲數矣靈王之喪我先君簡公在楚我先大夫印段實往敝邑之少卿也王吏不討䘏所無也今大夫曰女盍從舊舊有豐有省不知所從從其豐則寡君㓜弱是以不共從其省則吉在此矣惟大夫圖之晉人不能詰吳王使徐人執掩餘使鍾吾人執燭庸二公子奔楚楚王大封而定其徙公子申諌曰吳光新得國而親其民視民如子辛苦同之将用之也若好吳邊疆使柔服焉猶懼其至吾又强其讎以重怒之無乃不可乎盍姑億吾鬼神而寜吾族姓以待其歸将焉用自播揚焉王弗聼吳王怒冬吳王執鍾吾子遂伐徐防山以水之滅徐徐子章羽斷其髪携其夫人以逆吳王王唁而送之使其邇臣從之奔楚楚沈尹戍帥師救徐弗及遂城夷使徐子處之吳王問伍員曰初而言伐楚余知其可也而恐其使余往也又惡人有余之功也今余将自有之矣伐楚何如對曰楚執政衆而乖莫適任患若為三師以肄焉一師至彼必皆出彼出則歸彼歸則出楚必道敝亟肄以罷之多方以誤之既罷而後以三軍繼之必大克之吳王從之楚於是乎始病齊人孫武隠居於吳呉人莫知其能伍員薦之吳王問以兵法武進書十有三篇王大信重之吳以益彊經曰三十年春王正月公在乾侯公去社稷于今五年毎歳首月不書公者在魯四封之内則無適而非其所也至是鄆潰客寄乾侯非其所矣歳首必書公之所在者盖以存君不與季氏之專國也而罪臣子譏諸侯之意具矣唐武后廢遷中宗革命自立史臣列于本紀欲著其罪而君子以為非春秋之法其言曰天下者唐之天下中宗受之於其父武后安得絶先君之世復繫嗣君之年黜武氏之號自以為竊取春秋之義信矣夏六月庚辰晉侯去疾卒秋八月葬晉頃公冬十有二月吳滅徐徐子章羽奔楚九年晉侯将以師納魯侯范鞅曰若召季孫而不來則信不臣矣然後伐之若何晉人召季孫鞅使私焉曰子必來我受其無咎意如會荀躒于適歴躒曰寡君使躒謂吾子何故出君有君不事周有常刑子其圖之季孫練冠麻衣跣行伏而對曰事君臣之所不得也敢逃刑命君若以臣為有罪請囚於費以待君之察也亦惟君若以先臣之故弗絶季氏而賜之死若弗殺弗亡君之惠也死且不朽若得從君而歸則固臣之願也敢有異心季孫從躒如乾侯子家子曰君與之歸一慙之不忍而終身慙乎公曰諾衆曰在一言矣君必逐之薛伯薨子定嗣荀躒以晉侯之命唁魯侯且曰寡君使躒以君命討於意如意如不敢逃死君其入也魯侯曰君惠顧先君之好施及亡人将使歸糞除宗祧以事君則不能見夫人已所能見夫人者有如河躒掩耳而走曰寡君其罪之恐敢與知魯國之難臣請復於寡君退而謂季孫曰君怒未怠子姑歸祭子家子曰君以一乗入於魯師季孫必與君歸公欲從之衆從者脅公不得歸薛塟其君邾黒肱以濫奔魯十月辛亥朔日食晉趙鞅問諸史墨對曰六年及此月也吳其入郢乎終亦弗克日月在辰尾庚午之日日始有謫火勝金故弗克經曰三十有一年春王正月公在乾侯季孫意如㑹晉荀躒于適歴左氏曰晋侯将以師納公士鞅曰若召季孫而不來曰則信不臣矣然後伐之若何晋人召季孫鞅使私焉子必來我受其無咎意如出君不事專有魯國晋實主盟不能致討而寵以㑹禮不亦逆哉或曰季孫事君如在國未知其罪而君伐之是昭公之過也則非矣行貨齊晋使不納公禱於焬宫求君不入及其復也猶欲絶其兆域加之惡謚安在乎事君如在國猶曰未知其罪乎齊晋不能誅亂禁姦悖君臣之義不知其從自及也陸淳以謂逐君之臣晋不之罪而反與為㑹書曰意如㑹晋荀躒于適歴晋侯之為盟主可見矣荀躒之為人臣可知矣此不待貶絶而罪惡見者也得春秋所書之意矣夏四月丁巳薛伯榖卒晉侯使荀躒唁公于乾侯秋葬薛獻公冬黒肱以濫來奔十有二月辛亥朔日有食之十年魯侯取闞呉伐越越王允常禦之呉師還越本子爵世數㣲逺無紀於諸國周衰東夷多附之僣稱王多棄常法以從其私欲劉子卷與萇𢎞謀城成周衛彪傒適周聞之見單子曰周詩曰天之所支不可壊也其所壊亦不可支也昔武王克商而作是詩也以為飫歌名之曰支以為後之人使永監焉諺曰從善如登從惡如崩夫天道導可而省否者也今萇叔劉子欲支天之所壊不亦難乎於是天子告於晉曰天䧏禍于周使我兄弟並有亂心以為伯父憂我一二親暱甥舅不皇啟處於今十年勤戍五年余一人無日忘之閔閔焉如農夫之望歳懼以待時伯父若肆大惠復二文之業弛周室之憂徼文武之福以固盟主宣昭令名則余一人有大願也昔成王合諸侯城成周以為東都崇文徳焉今我欲徼福假靈于成王修成周之城俾戍人無勤諸侯用寧蝥賊逺屏晉之力也其委諸伯父實重圖之范鞅謂魏舒曰與其戍周不如城之天子實云雖有後事晉勿與知可也從王命以紓諸侯晉國無憂是之不務而又焉從事舒曰善乃與韓不信如京師合諸侯之大夫于狄泉尋盟且令城成周士彌牟營成周計丈數揣髙卑度厚薄仞溝洫物土方議逺邇量事期計徒庸慮財用書糇糧以令役於諸侯屬役賦文書以授帥而效諸劉子韓不信臨之以為成命宋仲幾不受功曰滕薛郳吾役也薛宰曰宋為無道絶我小國於周以我適楚故我常從宋晉文公為踐土之盟曰凡我同盟各復舊職若從踐土若從宋亦惟命仲幾曰踐土固然薛宰曰薛之皇祖奚仲居薛為夏車正奚仲遷於邳仲虺居薛以為湯左相若復舊職将承王官何故以役諸侯仲幾曰三代異物薛焉得有舊為宋役亦其職也士彌牟曰晉之從政者新子姑受功歸吾視諸故府仲幾曰縱子忘之山川鬼神其忘諸乎彌牟怒謂不信曰薛徴於人宋徴於鬼宋罪大矣且已無辭而抑我以神誣我也啟寵納侮其此之謂矣必以仲㡬為戮乃執之以歸魯侯薨于乾侯晉趙鞅問於史墨曰季氏出其君而民服焉諸侯與之君死於外而莫之或罪也對曰物生有兩有三有五有陪貳王有公諸侯有卿皆有貳也天生季氏以貳魯侯為日乆矣民之服焉不亦宜乎魯君世從其失季氏世修其勤民忘君矣雖死於外其誰矜之社稷無常奉君臣無常位自古以然詩曰髙岸為谷深谷為陵三后之姓於今為庶王所知也昔成季友文姜之愛子也有大功於魯受費以為上卿至於文子武子世増其業不廢舊績魯文公薨而東門遂殺適立庶魯君於是乎失國政在季氏於此君也四公矣民不知君何以得國是以為君慎器與名不可以假人曹平公弟通弑其君野諡曰聲公通自立經曰三十有二年春王正月公在乾侯取闞夏吳伐越秋七月冬仲孫何忌㑹晉韓不信齊髙張宋仲幾衛世叔申鄭國參曹人莒人薛人把人小邾人城成周天子有道守在四夷今至於城王都可以不書乎不曰城京師而曰城成周者京師衆大之稱成周地名也與列國等矣十二月己未公薨于乾侯諸侯失國出奔者衆矣鄭伯突為祭仲所逐而出奔入于櫟而復國衛侯衎為孫寗所逐而出奔入于夷儀而復國昭公在外八年終以客死為天下笑何也祭仲雖專而世權不重於季氏衛侯失國猶夫人也而有推挽之者所以雖失而復得也魯自季友受費以為上卿至于意如專執國命四世矣其臣皆季氏之孚也其民皆季氏之獲也而昭公有一子家駒言不見聼計不行也不能復國宜矣故春秋詳録其所因為後世之戒公雖失國然毎嵗之首月必書公在乾侯誅意如也書齊侯取鄆公圍成鄆潰絶昭公也為人臣者觀毎嵗必書公所在必不敢萌䟦扈不臣之心為人君者觀春秋所書圍成鄆潰知社稷之無常奉也亦必少警矣嗚呼可謂深切著明者矣皇王大紀巻六十

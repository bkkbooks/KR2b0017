  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0017_WYG_011-1a, image: WYG0313/WYG0313-0110c.png}
body:
  text: 皇王大紀卷十一宋胡宏撰三王紀武王十有一年春一月癸巳王自周征商以其罪告于皇天后土所過名山大川師渡孟津作泰誓中流白魚躍入于王舟既濟有火自上覆于下至于王屋流為烏戊午次于河朔諸侯以師來㑹者八百國王徇師而誓之時厥明王乃大廵六師明誓衆士癸亥王帥九師虎賁三百人陳于牧野作牧誓二月甲子昧爽紂率其衆號七十萬㑹于牧野起自黄陵至于鵲岸王以太白之旗麾之曰無畏寧爾也非敵百姓也尚父鼔之殷商之衆若崩厥角稽首紂反走宣室衣其珠玉衣自焚死王引師入商誅妲己殺惡來驅蜚廉於海隅而戮之分師討紂之黨滅者五十國驅虎豹犀象而逺之天下大恱殷㣲子啓面縳銜璧輿櫬而見王王親釋其縛受其璧而祓之焚其櫬禮而命之使復其所乃進殷之遺老問其亡故對曰子不聽父弟不聽兄婦不聽夫臣不聽君君令不行以信為欺以欺為忠政由妃妾田獵無時坐起以金鼔棄尊卑長㓜之叙無量度權衡之則教民以惡所以亡也王曰信哉問羣臣曰政將何施尚父曰殷民習於㓙惡者宜戮之以振徳威召公曰有罪者誅之無罪者安之以示好惡周公曰宜使各安其居昭之以徳化之以道王曰善哉親殷人如周視殷民如子改獨夫之苛暴施庶民之政倍庶士之禄大賚天下善人是富始濟河而立邠岐之社為天下大社遷殷社以為宗廟之屏謂之亳社各賜諸侯以為之戒祀于太廟始定事先之禮諱名立諡賤不誄貴㓜不誄長唯天子稱天以誄之諸侯不得相誄追王古公亶父曰太王季歴曰王季文考曰文王論曰先儒謂文王受命改元稱王九年而崩武王以大統未集故即位而不改元因文王九年為十一年觀兵于商至十三年乃復伐商夫元原於一不可再者也若文王可以大統未集而改元稱王武王承文王之業何以不可使武王即位而不改元也無元何以為君故紂之二十四祀武王之元年而此十一年者武王之十一年也夫文王武王盡道以事紂未嘗不冀其悛改也改而有天命則固君之不改而無天命則將臣之文王何容心哉順天而已一日天命未絶則猶君也君可以兵脅乎君子之能事君者猶卑巽而不矜溫恭而不厲况聖人天性慈和發而中節者乎先儒不知君臣之義乃造觀兵之說則其事君不能道義以為本可知矣夫文武本列諸侯也而得列諸侯心恱誠服咸率道由義治其國以事紂自非與天地合徳與日月齊明與鬼神合其變化者不能感人如是也豈後世因便乗利僥倖成功於一時不知命者所可比擬乎泰誓叙曰十有一年經曰十三年者三之文誤也曷為知其然以皇極經世知之也柴于上帝祈於社望于山川以后稷配天破鼔折桴馬散之華山之陽而弗復乗牛散之桃林之野而弗復服車甲衅而藏之府庫而弗復用倒載干戈包之以虎皮將帥之士使為諸侯名之曰建櫜散軍而郊射左射貍首右射騶虞而貫革之射息也禆冕搢笏而虎賁之士說劔也祀乎明堂而民知孝朝覲然後諸侯知所以臣耕籍然後諸侯知所以敬食三老五更於大學天子親袒割牲執醬而饋執爵而酳冕而總干然後諸侯知所以悌祀先賢于西學然後諸侯知徳之可崇謹權量審法度修廢官興滅國繼絶世舉逸民自西自東自南自北無思不服論曰揖讓征伐以安天下皆聖人之所為也或以為揖讓近厚征伐近薄言湯武之徳不如堯舜則非矣若以征伐為啓後世争奪之門者自漢氏而後英雄咸假揖讓成其簒竊而未有能明白行湯武之事者也雖謂揖讓不如征伐亦可矣或曰韶盡美矣又盡善也武盡美矣未盡善也然則孔子之言何耶曰此謂樂耳韶之樂徳盡美矣其音聲節奏又盡善也武之樂徳盡美矣其音聲節奏未盡善也觀聖人者盍亦審諸以斗杓建子冬十有一月為歳首是謂天統以夜半為朔改祀曰年建大赤乗赤路黄馬蕃鬛大事斂用日出戎事乗騵戎車曰元戎先良馬牲用騂剛行丁巳厯論曰十一月一陽復於地下此周正之所以建子也十二月二陽長於地中此商正之所以建丑也天道至㣲非聖人莫能知建正以昭示天下使天下之為人上者由之而知則能養天下之善於至㣲而不至於夭閼止天下之惡於至㣲而不至於盈積深探其幾推而行之聖人之妙用也知道者於此見天心焉是仁之端也聖人教天下後世之意可謂深切著明矣豈因易代止以新時人耳目而已哉周書叙曰惟十有一年武王伐殷一月戊午師渡孟津作泰誓三篇泰誓上篇曰惟十有三當為一字年春大㑹于孟津王曰嗟我友邦冢君越我御事庶士明聽誓惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母今商王受弗敬上天降災下民沈湎冐色敢行暴虐罪人以族官人以世惟宫室臺榭陂池侈服以殘害于爾萬姓焚炙忠良刳剔孕婦皇天震怒命我文考肅將天威大勲未集肆予小子發以爾友邦冡君觀政于商惟受罔有悛心乃夷居弗事上帝神祗遺厥先宗廟弗祀犧牲粢盛既于㓙盜乃曰吾有民有命罔懲其侮天佑下民作之君作之師惟其克相上帝寵綏四方有罪無罪予曷敢有越厥志同力度徳同徳度義受有臣億萬惟億萬心予有臣三千惟一心商罪貫盈天命誅之予弗順天厥罪惟鈞予夙夜祗懼受命文考類于上帝宜于冢土以爾有衆底天之罰天矜于民民之所欲天必從之爾尚弼予一人永清四海時哉弗可失泰誓中篇曰惟戊午王次于河朔群后以師畢㑹王乃徇師而誓曰嗚呼西土有衆咸聽朕言我聞吉人為善惟日不足凶人為不善亦惟日不足今商王受力行無度播棄黎老眤比罪人淫酗肆虐臣下化之朋家作仇脅權相滅無辜籲天穢徳彰聞惟天惠民惟辟奉天有夏桀弗克若天流毒下國天乃佑命成湯降黜夏命惟受罪浮于桀剥䘮元良賊虐諫輔謂已有天命謂敬不足行謂祭無益謂暴無傷厥監惟不逺在彼夏王天其以予乂民朕夣協朕卜襲于休祥戎商必克受有億兆夷人離心離徳予有亂臣十人同心同徳雖有周親不如仁人天視自我民視天聽自我民聽百姓有過在予一人今朕必往我武惟揚侵于之疆取彼凶殘我伐用張于湯有光朂哉夫子罔或無畏寧執非敵百姓懔懔若崩厥角嗚呼乃一徳一心立定厥功惟克永世泰誓下篇曰時厥明王乃大巡六師明誓衆士王曰嗚呼我西土君子天有顯道厥類惟彰今商王受狎侮五常荒怠弗敬自絶于天結怨于民斮朝渉之脛剖賢人之心作威殺戮毒痡四海崇信姦回放黜師保屏棄典刑囚奴正士郊社不修宗廟不享作竒技淫巧以恱婦人上帝弗順祝降時喪爾其孜孜奉予一人恭行天罰古人有言曰撫我則后虐我則讎獨夫受洪惟作威乃汝世讎樹徳務滋除惡務本肆予小子誕以爾衆士殄殲乃讎爾衆士其尚廸果毅以登乃辟功多有厚賞不迪有顯戮嗚呼惟我文考若日月之照臨光于四方顯于西土惟我有周誕受多方予克受非予武惟朕文考無罪受克予非朕文考有罪惟予小子無良周書牧誓叙曰武王戎車三百輛虎賁三百人與受戰于牧野作牧誓牧誓時甲子昧爽王朝至于商郊野乃誓王左杖黄鉞右秉白旄以麾曰逖矣西土之人王曰嗟我友邦冢君御事司徒司馬司空亞旅師氏千夫長百夫長及庸蜀羌髳㣲盧彭濮人稱爾戈比爾干立爾矛予其誓王曰古人有言曰牝鷄無晨牝鷄之晨惟家之索今商王受惟婦言是用昬棄厥肆祀弗答昬棄厥遺王父母弟不迪乃惟四方之多罪逋逃是崇是長是信是使是以為大夫卿士俾暴虐于百姓以姦宄于商邑今予發惟恭行天之罰今日之事不愆于六歩七歩乃止齊焉夫子朂哉不愆于四伐五伐六伐七伐乃止齊焉朂哉夫子尚桓桓如虎如貔如熊如羆于商郊弗迓克奔以役西土朂哉夫子爾所弗朂其于爾躬有戮周書武成叙曰武王伐殷往伐歸獸識其政事作武成武成惟一月壬辰旁死魄越翼日癸巳王朝歩自周于征伐商底商之罪告于皇天后土所過名山大川曰惟有道曾孫周王發將有大正于商今商王受無道暴殄天物害虐烝民為天下逋逃主萃淵藪予小子既獲仁人敢祗承上帝以遏亂略華夏蠻貊罔不率俾恭天成命惟爾有神尚克相予以濟兆民無作神羞既戊午師逾孟津癸亥陳于商郊俟天休命甲子昧爽受率其旅若林㑹于牧野罔有敵于我師前徒倒戈攻于後以北血流漂杵一戎衣天下大定釋箕子囚封比干墓式商容閭散鹿臺之財發鉅橋之粟大賚于四海而萬姓恱服厥四月哉生明王來自商至于豐乃偃武脩文歸馬于華山之陽放牛于桃林之野示天下弗服丁未祀于周廟邦甸侯衛駿奔走執豆籩越三日庚戍柴望大告武成既生魄庶邦冢君暨百工受命于周王若曰嗚呼羣后惟先王建邦啓土公劉克篤前烈至于太王肇基王迹王季其勤王家我文考文王克成厥勲誕膺天命以撫方夏大邦畏其力小邦懷其徳惟九年大統未集予小子其承厥志肆予東征綏厥士女維其士女匪厥𤣥黄昭我周王天休震動用附我大邑周乃反商政政由舊列爵惟五分土惟三建官惟賢位事惟能重民五教惟食䘮祭惇信明義崇徳報功垂拱而天下治皇王大紀卷十一

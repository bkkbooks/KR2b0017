body:
  text: 皇王大紀卷二十三宋胡宏撰三王紀康王學校曰陶唐氏始建大學曰成均有虞氏曰庠曰米廪夏后氏曰序曰校商曰學曰瞽宗周曰膠曰庠此五代之學也若夫天子曰辟雍諸侯曰頖宫則漢儒之亂名也凡始立學者既釁器用幣然後釋菜不舞不授器乃退儐于東序一獻無介語可也及釋奠于先聖先師行事必以幣凡學春官釋奠于其先師秋冬亦如之凡學世子及學士必時春誦夏弦學干戈秋學禮冬誦書學羽籥弋灼凡祭與養老乞言合語學舞干戚大樂正授數小樂正詔之於東序禮在瞽宗書在上庠執禮典書者詔之大司成論說在東序凡侍坐於大司成者逺近間三席可以問終則負牆列事未盡不問凡語于郊者必取賢斂才焉或以德進或以事舉或以言揚曲藝皆誓之以待又語三而一有焉乃進其等以其序謂之郊人逺之於成均以及取爵於上尊也古者家有孰黨有庠鄉有校遂有序國有學以周官考之則州亦有序名雖不同然家之孰黨之庠所以教童子秀士也鄉之校遂之序所以教成人選士也國之學所以教壯而博學造士也自王太子王子羣后之太子卿大夫元士之適子而下人材皆生於鄉遂之夫家者也鄉大夫遂大夫受教法於司徒退而頒之於六鄉六遂之吏使各以教其所治五家為比五比為閭閭胥教二十五家以司徒之法者也其法謂何六禮也七教也八政也有事則閭胥各聚其衆而讀法書其敬敏任恤者四閭為族族師帥四閭胥教百家月吉屬其家讀法書其孝弟睦姻有學者春秋祭酺亦如之五族為黨黨帥五族教百家四時之孟月吉日屬其衆讀法春秋祭亦如之國索鬼神而蠟祭則以禮屬民而飲酒于序書其德行道義五黨為州州長帥五黨正教二千五百家正月之吉屬其衆讀法以考閭胥族師黨長所書德行道藝而勸之以糾其過惡而戒之若歲時祭祀州社則屬其衆而讀法春秋以禮㑹民而射于州序亦如之歲終則㑹三年大比則大考州里以贊卿大夫廢置大比則鄉老及鄉大夫羣吏獻賢能之書于王王再拜受之登于天府內史二之按唐虞之官人也三載考績三考乃黜陟幽明夏后商周因之者也官人既如是則學校之教士亦如是閭胥族師黨正擇民之秀者十年出就外傅鄉遂大夫三大比然後自孰之庠升秀士之有德者於鄉校遂序名在司徒不從鄉之征役而謂之選士又三大比則鄉遂大夫贊司徒自鄉校遂序升選士之有德行者於學建大樂正焉名在大胥之版不從司徒車甲之教而謂之俊士大樂正掌成均之法以治建國之學政合國之子弟凡有道者有德者使教焉順先生詩書禮樂以造士教之以樂德中和祇庸孝友教之以樂語興道諷誦言語教之以樂舞雲門大卷大咸大磬大濩大夏大武于九年學成然後大樂正以告于王王與冢宰定其論某可以為公與某可以為孤與某可以為卿與某可以為大夫與某可以為士與官有闕則各以其材補之小學九年習六禮七教八政之名數而歸之于家見于行事不專居學也其有雖通名數而識趣汙下無德行者則各因其材以為工賈府史胥徒不得為士大夫矣鄉學九年通六禮七教八政之理義亦歸之于家見諸行事不專居學其雖有通義而志不正固無德行者亦各因其材以為工賈或府史胥徒不得為士大夫矣國學九年講習先聖王之大道一年視離經辨志三年視敬業樂羣五年視博習親師七年視論學取友謂之小成九年知類通達强立而不反謂之大成然猶有大姦慝矯情飾行者可以欺衆人而得至於國學者及大樂正揆之以天道照之以聖心則無所逃矣故有天子視學之禮而大樂正之任不可輕矣此古者人材所以過人必四十而後仕也豈與不問賢否糊名考校取其虛文一日之長者比哉軍法曰制軍之法天子之田方千里為方百里者百百里為六鄉百里為六遂近郊為鄉逺郊為遂方里而井一井八家為田九百畝四井為邑四邑為丘四丘為甸六十四井一丘之賦戎馬一匹牛三頭四甸為縣四縣為都甸地方八里八八六十四井旁加一里為成加三十六井為百井一成之賦長轂一乘步卒七十二人甲士三人八百夫中取七十五人亦十一之法五家為比五比為閭二十五家四閭為族百家五族為黨五百家五黨為州二千五百家五州為鄉一萬二千五百家六鄉七萬五千家出車百乘六遂出車百乘五人為伍五伍為兩二十五人四兩為卒一百人五卒為師二千五百家五師為軍一萬二千五百人千乘之軍步卒甲士七萬五千人是為六軍天子提封百萬井出車萬乘為六軍者十大都之田方三十二里為井一千有竒為夫家八千有竒出車十乘有竒公侯之國方百里為田百井或為十都或為九都為夫家八萬出車百乘步卒甲士七千五百人為師者三是故天子萬乘言車數也諸侯千乘大夫百乘言夫數也三代明王安不忘危存不忘亡治不忘亂周官大司馬中春教振旅司馬以旗致民平列陳如戰之陳辨鼓鐸鐲鐃之用王執路諸侯執賁鼓軍將執晉鼓師帥執提旅帥執鼙卒長執鐃兩司馬執鐸公司馬執鐲以教坐作進退疾徐疏數之節遂以搜田有司表貉誓民鼓遂圍禁火弊獻禽以祭社中夏教苃舍如振旅之陳羣吏撰車徒讀書契辨號名之用帥以門名縣鄙各以官名家以號名鄉以州名野以邑名百官象其事以辨軍之夜事其他皆如振旅遂以苖田如搜田之法車弊獻禽以享礿中秋教治兵如振旅之陳辨旗物之用王載太常諸侯載旗軍吏載旗師都載旜鄉遂載物郊野載旐百官載旟各書其事與其號焉其他皆如振旅遂以獮田如搜田之法羅弊致禽以祀祊中冬教大閲前期羣吏戒衆庶修戰法虞人萊所田之野為表百步則一為三表又五十步為一表田之日司馬建旗于後表之中羣吏以旗物鼓鐸鐲大角鐃各帥其民而致質明弊旗誅後至者乃陳車徒如戰之陳皆坐羣吏聽誓于陳前斬牲以左右徇陳曰不用命者斬之中軍以鼙令鼓鼓人皆三鼓司馬振鐸羣吏作旗車徒皆作鼓行鳴鐲車徒皆行及表乃止三鼓摝鐸羣吏弊旗車徒皆坐又三鼓振鐸作旗車徒皆作鼓進鳴鐲車驟徒趨及表乃止坐作如初乃鼓車馳徒走及表乃止鼓戒三闋苦冗車三發徒三刺乃鼓退鳴鐃且却及表乃止坐作如初遂以狩田以旌為左右和之門羣吏各帥其車徒以叙和出左右陳車徒有司平之旗居卒間以分地前後有屯百步有司巡其前後險野人為主易野車為主既陳乃設驅逆之車有司表貉于陳前中軍以鼙令鼓鼓人皆三鼓羣吏振鐸車徒皆作遂鼓行徒銜枚而進大獸公之小禽私之獲者取左耳及所弊鼓皆駴車徒皆譟徒乃弊致禽饁獸于郊入獻禽以享蒸五十者不為甸徒軍旅什伍同爵則尚齒頒禽隆諸長者劉歆周官大司馬天子六軍大國三軍次國二軍小國一軍謹按井田封國之制天子方千里百萬井九百萬夫之地受田者八百萬夫以一成十里之賦計之於八百萬夫之家取七十二萬人為步卒選二萬人為甲士是為萬乘蓋什一之法真先王寬大之制也夫然後可以中天下而立當四面應諸侯而無侵陵之慮矣豈止六軍而已哉然而云爾者天子閒居以六軍入宿衛有大事天子親出六卿各將一軍以從故也夫立政而籍兵固七十五萬人矣平居入宿衛有事而徴發惟六軍是用是亦什一之法真先王長久之策也夫然後可以中天下而立當四面應諸侯而無危迫之慮矣豈止六軍而已哉若諸侯則田方百里九萬夫之地是為千乘之國受田者八萬夫所得以為兵者三師而已不得有三軍之衆也嗚呼聖帝明王之制可謂盡善天子諸侯形勢如此其懸絶也夏非桀商非紂周非幽厲則其盛大之業豈至於亡湯七十里文王百里非大聖人安能致諸侯心恱誠服而有天下後人徒見春秋之時五伯擅命遂以封建為不如郡縣曾不知平王而下衰微不足以自立然猶傳世二十為天下共主幾五百年者正賴之於諸侯也如後世郡縣天下則東周之亡也久矣秦之子嬰晉之愍懷隋之越代可考也則又有唐末藩鎮跋扈訾封建者是皆逆賊專地抗衡朝廷不能制其死命不得已而授之者也豈與三代論功德選親賢分土惟三者比乎論曰三代宿衛之法不可得聞矣然亦有可推者按三代王畿千里八百萬夫籍為兵者七十有五萬人以六軍為十畨入宿衛自王城達于畿封一歲十二月虞夏五載一巡狩周天子六年時巡則未知其宿衛扈從者皆以一時而更乎以一時而更則五年而再周也春聽之以鼓鐸夏教之以茇舍秋辨之以旗物冬習之以戰陳宿衛三月巡狩四方周而復始習之也故不惰教之也故不驕親之也故不悖寬之也故不怨三王之王以守則固以征則强後王雖不振猶有所持循者以法良故也宫室曰周禮土方氏掌以土圭之法測土深正日景以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多隂日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所會也隂陽之所和也然則百物阜安乃建王國焉匠人建國水地以縣置𣙗魚制以縣視以景為規識日出之景與日入之景畫參諸日中之景夜考之極星以正朝夕營國方九里旁三門國中九經九緯經涂九軌左祖右社靣朝後市市朝一夫夏后氏世室堂修二七廣四修一五室三四步四三尺九階四旁兩夾忩白盛門堂三之二室三之一殷人重屋堂修七尋堂崇三尺四阿重屋周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵室中度以几堂上度以筵宫中度以尋野度以步涂度以軌廟門容大扄七個闈門容小扄三個路門不容乘車之五個應門二徹三個王宫門阿之制五雉宫隅之制九雉經涂九軌環涂七軌野涂五軌門阿之制以為都城之制宫隅之制以為諸侯之城制環涂以為諸侯經涂野涂以為都經涂天子五門雉門象魏之門發號施令受大朝會法度所出振鐸之朝也夏后氏之世室也旁為清臺以觀天文殷人之陽館也又曰重屋也周曰明堂旁為靈臺以候雲物其外為庫門又其外為臯門其內為應門又其內為路門應門之內為燕朝以朝王族外為治朝以朝百官庫門之外謂之外朝朝士掌建邦外朝之法左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後靣三槐三公位焉州長衆庶在其後左嘉石平罷民焉右肺石達窮民焉路門之內路寢一天子居之小寢五后與三夫人居之內有九室九嬪居之諸侯三寢三門應門之外為臯門其內為路門天子諸侯門有臺天子之堂夏一尺殷三尺周九尺諸侯七尺大夫五尺士三尺天子外屏旅樹也諸侯內屏卿大夫以簾士以帷冠服曰冠冕衣裘屨王祀昊天上帝則服大裘而冕祀五帝亦如之享先王則衮冕享先公饗射則鷩必列冕祀四望山川則毳冕祭社稷五祀則希冕祭羣小祀則𤣥冕凡兵事韋辨服眂朝則皮辨服凡甸冠辨服大札大荒大烖素服公之服自衮冕而下如王之服侯伯之服自鷩冕而下如公之服子男之服自毳冕而下如侯伯之服孤之服自希冕而下如子男之服卿大夫之服自𤣥冕而下如孤之服士之服自皮辨而下如大夫之服其齊服有𤣥端素端王之五冕皆𤣥冕朱裏延紐五采繅十有二就皆五采玉十有二玉笄朱紘諸侯之繅斿九就瑉玉三采其餘如王之事繅斿皆就玉瑱玉笄王之皮辨㑹五采玉璂象邸玉笄諸侯及孤卿大夫之冕韋辨皮辨各以其等為之始冠緇布冠自諸侯下達冠而敝之可也𤣥冠朱組纓天子之冠也緇布冠繢緌諸侯之冠也𤣥冠丹組纓諸侯之齊冠也𤣥冠綦組纓士之齊冠也縞冠𤣥武子姓之冠也縞冠素紕既祥之冠也居冠屬武自天子下達有事然後緌垂緌五寸惰游之士也𤣥冠縞武不齒之服也親沒不髦素冠徹緣大帛不緌委武𤣥縞而後蕤君衣狐白裘錦衣以裼之錦衣狐裘諸侯之服也君子狐青裘豹褎𤣥綃衣以裼之麛亡雞裘青犴褎絞衣以裼之羔裘豹飾緇衣以裼之狐裘黃衣以裼之君之右虎裘厥左狼裘士不衣狐白犬羊之裘不裼庶人之服不文飾也故不裼裘之裼也見美也弔則襲不盡飾也君在則裼盡飾也服之襲也充美也是故尸襲執玉龜襲無事則裼弗敢充也禮不盛服不充故大裘不裼王后六服禕許韋衣揄狄闕狄鞠衣展衣素紗夫人揄狄君命屈狄再命禕衣一命袒衣士褖衣唯世婦命於奠繭其他則皆從男子外內命婦之服鞠衣展衣緣衣素紗王后之首服為副編次追衡笄王及后之服屨赤舄黑舄赤繶黃繶青句素屨葛屨外內命夫命婦之命屨功屨散屨大夫士朝𤣥端夕深衣深衣曲夾如矩三袪十有二幅縫齊倍要鉤邉續衽衽當旁袼之髙下可以回肘長衣中衣繼掩於撿尺夾二寸袪起魚尺二寸緣廣寸半具父母大父母衣純以繢具父母衣純以青孤子衣純以素士不衣織無君者不二采衣正色裳間色非列采不入公門振絺綌不入公門襲裘不入公門野夫黃衣黃冠庶人雖有千金之幣不得服韍甫勿帶佩玉韍韠音必也有虞氏之服也夏后氏文之以山殷火周龍章韠君朱大夫素士爵韋圜音圓殺直天子直公侯前後方大夫前方後挫角士前後正韠下廣二尺上廣一尺長三尺其頸五寸肩革帶博二寸會去上五寸紕以爵韋六寸不至下五寸純以素紃以五采一命緼於忩韍幽衡再命赤韍幽衡三命赤韍葱衡天子素帶朱裏終辟諸侯素帶終辟大夫素帶辟垂士練帶率下辟居士錦帶弟子縞帶并紐約用組三寸長齊于帶紳長制士三尺有司二尺有五寸子游曰三分帶下紳居二焉紳韠結三齊大夫大帶四寸雜帶君朱緑大夫𤣥華士緇辟二寸再繚四寸凡帶有繂力出無針功肆束及帶勤者有事則收之走則擁之凡帶必有佩玉佩玉有衝牙天子佩白玉而𤣥組綬公侯佩山𤣥玉而朱組綬大夫佩水蒼玉而純組綬世子佩瑜玉而綦音其組綬士佩瓀玫莫抷而緼組綬進則揖之退則揚之然後玉鏘鳴也左玉佩右器佩玉佩以修德器佩以祇事世子君在不佩玉左結佩右設佩居則設佩朝則結佩齊則綪千見結佩而爵韠君子無故玉不去身於玉比德焉是以非辟之心無自入也圭笏王晉大圭執鎮圭繅藉五采五就以朝日公執桓圭侯執信圭伯執躬圭繅皆三采三就子執穀璧男執蒲璧繅皆二采再就以朝覲宗遇會同于王合六瑞圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼諸侯相見亦如之瑑圭璋璧琮繅皆二采一就以眺他吊聘四圭有邸以祀天旅上帝兩圭有邸以祀地旅四望祼貫圭有瓉以肆先王以祼賔客圭璧以祀日月星辰璋邸射以祀山川以造贈賔客土圭以致四時日月封國則以土地珍圭以徴守以恤凶荒牙璋以起軍旅以治兵守璧羡以起度穀圭以和難以聘女琬圭以治德以結好琰圭以易行以除慝笏度二尺有六寸其中博三寸其殺六分而去一天子以球玉諸侯以象大夫以魚須文竹士竹本象可也天子之笏曰珽天子搢音箭珽杼上終葵首方正於天下也諸侯曰荼前詘後直讓於天子也大夫前詘後詘無所不讓也見天子入太廟與射無說笏小功不說笏當事免則說之凡有指畫於君前用笏造受命於君前則書於笏笏畢用也因飾焉執孤執皮帛卿執羔大夫執鴈士執雉庶人執鶩工商執雞服食起居雜禮天子玉藻十有三旒前後邃延龍卷以祭𤣥端而朝日於東門之外聽朔於南門之外閏月則闔門左扉立于其中皮辨以日視朝遂以食日中而餕奏而食日少牢朔月大牢五飲上水漿酒醴酏羊支卒食𤣥端而居動則左史書之言則右史書之御瞽幾聲之上下年不順成則天子素服乘素車食無樂諸侯𤣥端以祭禆冕以朝皮辨以聽朔於太廟朝服以日視朝於內朝朝辨色始入君日出而視之退適路寢聽政使人視大夫大夫退然後適小寢釋服又朝服以食特牲三俎祭肺夕深衣祭牢肉朔月少牢五俎四簋子卯稷食菜羮夫人與君同庖君無故不殺牛大夫無故不殺羊士無故不殺犬豕君子逺庖厨凡有血氣之類弗身踐也至于八月不雨君不舉年不順成君衣布搢本關梁不租山澤列而不賦土功不興大夫不得造車馬皇王大紀卷二十三

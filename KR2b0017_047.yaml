body:
  text: 皇王大紀卷四十七宋胡宏撰三王紀定王元年冬十一月魯郊牛之口傷改卜牛牛死乃不郊猶三望望郊之屬也不郊亦無望可也葬匡王晉侯伐鄭鄭及晉平楚王伐陸渾之戎遂至於雒觀兵于周疆問鼎之大小輕重焉王孫滿對曰在德不在鼎昔夏之方有德也逺方圖物貢金九牧鑄鼎象物以承天休桀有昏德鼎遷於商載祀六百商紂暴虐鼎遷于周天祚明德有所底止成王定鼎于郟鄏卜世三十卜年七百天所命也周德雖衰天命未改鼎之輕重未可問也楚王曰楚國折鉤之喙足以為九鼎遂歸楚人侵鄭亦狄侵齊宋公三年武氏之族道昭公子歸奉宋公母弟司城須以作亂宋公皆殺之逐武穆之族武穆之族以曹師伐宋宋師圍曹報武氏之亂也八月丙戌鄭伯蘭薨世子夷嗣鄭葬其君穆公經曰三年春王正月郊牛之口傷改卜牛牛死乃不郊乃不郊為牛之口傷改卜牛而牛又死也不然郊矣禮為天王服斬衰周人告喪于魯史策已書而未葬也祀帝于郊夫豈其時而或謂不以王事廢天事禮乎春秋以來喪紀浸廢有不奔王喪而逺適他國有修弔禮而自相聘問固將以是為可舉而不廢也卒至漢文以日易月後世不能復其所由來漸矣春秋備書其義自見猶三望三望者公羊曰祭泰山河海夫天子有天下凡宇宙之內名山大川皆其所主也故得祭天而有方望無所不通諸侯有一國則境外之山川他人所主者而可以望乎李氏旅於泰山冉求弗能救而夫子責之者為泰山魯侯所主也大夫何與焉李氏不得旅泰山則河海非魯之封內其不得祭亦明矣猶者可已不當為之詞葬匡王四月而葬王室不君其禮略也微者往會魯侯不臣其情慢也或曰宣公親之者也而常事不書非矣崩葬始終之大變豈以是為常事而不書也楚子伐陸渾之戎夷狄相攻不志此其志何也為陸渾在王都之側戎夏雜處族類之不分也楚又至洛觀兵于周疆問鼎之大小輕重焉故特書于策以謹華夷之辨禁􅠕夏之階夏楚人侵鄭按左氏晉侯伐鄭鄭及晉平而經不書者仲尼削之也鄭本以晉靈不君取賂釋賊為不足與似也而往從楚非矣今晉成初立背僣竊偽邦而歸諸夏則是反之正也春秋大改過許遷善書楚人侵鄭者與鄭伯之能反正也故獨著楚人侵掠諸夏之罪爾鄭既見侵於楚則及晉平可知矣秋赤狄侵齊宋師圍曹按左氏宋文公即位盡逐武穆之族二族以曹師伐宋然不書于經者二旅以見逐而舉兵非討罪也及宋師圍曹報武氏之亂而經書之者端本清源之意也武穆二族與曹之師奚為至於宋哉不能反躬自治恃宋強以報之兵革何時而息也宋惟有不赦之罪莫之治也故書法如此冬十月丙戍鄭伯蘭卒葬鄭穆公二年冬十一月齊侯魯侯平莒及郯莒人不肻魯侯伐莒取向秦伯稻薨諡曰共公子榮嗣楚人獻黿於鄭伯公子宋與公子歸生將見宋之食指動以示歸生曰他日我如此必嘗異味及入宰夫將解黿相視而笑公問之歸生以告及食大夫黿召宋而弗與也宋怒染指於鼎嘗之而出公怒欲殺之宋與歸生謀先歸生曰畜老猶憚殺之而况君乎反譛歸生歸生懼而從之夏四月乙酉遂弒其君諡曰幽公立其弟堅初楚令尹子文之弟子良生子越椒子文曰必殺之熊虎之狀豺狼之聲其可畜乎子良不可子文曰若敖氏之鬼不血食矣及子文卒其子般代焉椒為司馬蒍賈譛般殺之椒為令尹已為司馬至是椒以其族叛殺蒍賈楚人擊滅之椒子苖賁皇奔晉王思子文之治楚也其孫針尹克黃使於齊還及宋聞亂其人曰不可以入矣針尹曰棄君之命獨誰受之君天也天可逃乎遂歸復命而自拘於司敗王曰子文無後何以勸善使復其所赤狄侵齊魯侯平莒如齊楚子伐鄭經曰四年春王正月公及齊侯平莒及郯莒人不肻公伐莒取向心不偏黨之謂平以此心平物者物必順以此心平怨者怨必釋惟小人不能宅心之若是也雖以勢宜力強之而有不獲成者矣夫以齊魯大國平郯莒小邦其降心聽命不待文告之及也然而言莒人不肻則以宣公心有所私係失平怨之本矣故書及書取以著其罪及所欲也平者成也取者盜也不肯者心弗允從莫能強之者也以利心圖成雖強大者不能行之於弱小春秋書此戒後世之不知治其本者故行有不得者反求諸己斯可矣秦伯稻卒夏六月乙酉鄭公子歸生弒其君夷首謀弒逆者公子宋也懼譛而從之者歸生也而以歸生為首惡何也夫亂臣賊子欲有能全其身而不死也故季子然其惡而不從者未仲由冉求其從之者與子曰弒父與君亦不從也是以死節許二子矣歸生懼譛而從公子宋特無求路不可奪之死節耳書為首惡不亦過乎曰歸生與宋並為大夫乃貴戚之卿同執國政可以不從一也嘗統大師與宋人戰獲其元帥已得兵權可以不從二也聞宋逆謀登時而覺先事誅之猶反手耳夫據殺生之柄仗大義以制人使人聽己猶犬羊之伏於虎也何畏於人懼其見殺而從之者哉計不出此顧以畜老憚殺比方君父歸生之心悖矣故春秋捨公子宋而以弒君之罪歸之為後世鑒若司馬亮沈慶之等茍知此義則能討罪人不至於失身為賊所制矣赤狄侵齊公如齊公至自齊君行告至常事不書宣公此年如齊而皆致者危也夫以篡弒謀於齊而求安上不知冇天王下不知有方伯惟交是奉而可保乎髙固之事亦殆矣故此年如齊而皆致以戒後世之欲利有攸往者惟義之與比為可安矣冬楚子伐鄭三年魯侯如齊齊髙固使齊侯止公請叔姬焉秋七月齊髙固逆子叔姬於魯魯叔孫得臣卒齊髙固及子叔姬來魯反馬也楚王伐鄭陳及楚平晉荀林父救鄭伐陳楚王嘗罷朝而晏樊姬曰何晏王曰我論政於虞丘子姬曰令尹賢乎王曰然樊姬笑王曰何笑姬曰妾非不欲專貴擅愛也以為傷王之義故所進妾同位者數人今令尹為政未常進一賢是不忠也不知是不智也明日王以告令尹謝曰誠如姬言於是薦蒍賈之子艾獵是為孫叔敖迎之於南海之濵王問以治國對曰國之有是衆非所惡若王不能定則國不可得而治也王曰獨在君乎對曰君驕士曰士非我無由富貴士驕君曰君非我無由安強君昏迷而不悟士飢寒而不進君臣不合國是無由定矣昔桀紂以合取人合者為是不合者為非是以亡也王曰今拜君為令尹願令尹與士大夫共定國是寡人豈敢以偏國驕士民哉孫叔敖既受命狐丘丈人見曰位髙而驕者民去之官大而專者君惡之祿厚而不知足者怨處之位髙而意益下官大而心益小祿厚而施益博謹此三者其無咎乎經曰五年春公如齊夏公至自齊秋九月齊髙固來逆子叔姬按左氏公如齊髙固使齊侯止公請叔姬焉書夏公至自齊秋齊髙固來逆子叔姬罪宣公也其曰來者以公自為之主稱子者或謂别于先公之女也諸侯嫁女於大夫主大夫以與之者為體敵也而公自為之主壓尊毁列卑朝廷慢宗廟矣夫以鄭國褊小楚公子圍之貴驕強大來娶於鄭子産辭而郤之使館于外欲野賜之幾不得撫有其室而宣公以魯國周公之後逼於髙固請婚其女強委禽焉而不能止惟不知以禮為守身之幹是以得此辱也春秋詳書為後世鑒欲人之必謹於禮以定其位不然卑巽妄説不近於禮奚足逺耻辱哉叔孫得臣卒內大夫卒無有不日者以春秋魯史也其或不日則有恩數之略以仲遂如齊謀弒子赤叔孫得臣與之偕行在宣公固有援立之私其恩數豈略而不書日是聖人削之也君臣父子妃妾適庶人道之大倫也方仲遂以殺適立庶往謀於齊而與得臣並使也若懵然不知其謀或知之而不能救則將焉用彼相矣春秋治子赤之事專在仲遂以其內交宫禁外結強鄰大惡無所分也而叔孫得臣有同使于齊之罪故特不書日以貶之若曰大夫而不能為有無者不足加以恩數云爾冬齊髙固及子叔姬來左氏曰反馬也禮嫁女留其送馬不敢自安及廟見成婦遣使反馬則髙固親來非禮也又禮女子有行逺父母者嵗一歸寧今見逆逾時未易嵗也而叔姬亟來亦非禮也故書及書來以著其罪也大夫適他國必有君命與公事否則禮法之所禁而可犯乎惠公許其臣越禮恣行而莫遏髙固委其君踰境自如而不忌則人欲已肆矣凡婚姻常事不書而書此者則以為非常為後世戒也楚人伐鄭四年晉趙盾衛孫免侵陳王使子服求后于齊赤狄伐晉圍懷及邢丘晉侯欲伐之荀林父曰使疾其民以盈其貫將可殪也楚人伐鄭鄭伯會楚王于厲將盟鄭伯逃歸六月魯有螽召桓公逆王后于齊經曰六年春晉趙盾衛孫免侵陳按傳稱陳及楚平荀林父伐陳經皆不書者以下書晉衛加兵于陳即陳楚平可知矣以趙盾孫免書侵即林父無詞可稱亦可知矣愛人不親反其仁治人不治反其智晉常命上將帥師救陳又再與之連兵伐鄭今而即楚無乃於己有缺盍亦自反可也不內省德遽以兵加之則非義矣故林父不書伐而盾免書侵以正晉人所以主盟非其道也夏四月秋八月螽傳謂螽為榖災虐取於民之效也先是公伐莒取向後再如齊伐萊軍旅數起賊斂既繁戾氣應之矣夫善惡之感萌於心而災祥之應見於事宣公不知舍惡遷善以補前行之愆而用兵不息災異數見年榖不豐國用空乏卒至於改助法而稅民蓋自此始矣經於蟲螟一物之變必書于策示後世天人感應之理不可誣當慎其所感矣冬十月五年衛孫良夫如魯盟始通且謀會晉也魯侯會齊侯伐萊魯大旱秋河徙鄭及晉平晉侯宋公魯侯衛侯鄭伯曹伯會于黑壤王叔桓公臨之以謀不睦晉侯之立也魯侯不朝又不使大夫聘晉人止公盟于黑壤魯侯不得與以賂免經曰七年春衛侯使孫良夫來盟來盟為前定者嘗有約言矣未足效信而釋疑又相歃血固結之爾是盟衛欲為晉致魯而魯專事齊初未與晉通也必有疑焉而衛侯任其無咎故遣良夫來為此盟而公卒見辱盟非春秋之所貴義自見矣夏公會齊侯伐萊秋公至自伐萊大旱及者內為志會者外為主平莒及郯公所欲也故書及繼以取向即所欲者可知矣伐萊齊志也故書會繼以伐致即師行之危亦可知矣公與齊侯俱不務德合黨連兵恃強陵弱是以為此舉也軍旅之後必有凶年言民以征役怨咨之氣感動天變而旱乾作矣其以大旱書者或不雩或雖雩而不雨也不雩則無恤民憂國之心雩而不雨格天之精意缺矣冬公會晉侯宋公衛侯鄭伯曹伯于黑壤會而不得見不以不得見為諱盟而不與盟不以不與盟為諱則曲不在公而主會盟者之罪耳與於會不與於盟而公有歉焉非主會盟者之過也則書會不書盟若黑壤是也晉侯之立公既不朝又不使大夫聘而每嵗適齊是宣公行有不慊於心而非晉人之咎矣凡不直者臣為君隱子為父隱於以養臣子愛敬之心而不事盟主又以賂免則不直在己矣六年夏四月魯仲遂如齊至黃有疾而還自辛巳有事於太廟仲遂卒于垂壬午猶繹萬入去籥戊子魯敬嬴薨白狄及晉平遂會晉師伐秦楚為衆舒叛故伐舒蓼滅之楚王疆之及滑汭盟吳越而還五月甲子日有食之既八月己丑魯葬敬嬴雨不克葬庚寅日中而克葬魯城平陽陳及晉平楚師伐陳取成而還單襄公聘于宋遂假道于陳以聘于楚過陳候不在疆火朝覿矣道無列樹茀不可行場功未畢膳宰不致餼司里不授館民將築臺于夏氏歸言於王曰陳侯不有大咎國必亡王曰何故對曰辰角見而雨畢於是除道天根見而水涸於是成梁本見而草木節解於是備藏駟見隕霜於是冬裘具火見而清風戒寒於是修城郭宫室此先王之教也列樹以表道立鄙食以守路國有郊牧疆有寓望藪有圃草囿有林池其餘無非榖土國有班事縣有序民此周制也敵國賔至關尹以告行理以節逆之候人為導卿郊迎宗祝執祀司里授館司徒具徒司空視道司寇詰姦虞人入材甸人積薪火師監燎水師監濯膳宰致饔廩人獻餼司馬陳芻工人展車其貴國之賔至則以班加一等益虔至於王使則皆官正蒞事上卿監之若王巡狩則君親監之此周之秩官也各守爾典毋即慆淫此先王之令也今陳如是廢其教而棄其制蔑其官而犯其令將何以守國經曰八年春公至自會夏六月公子遂如齊至黃乃復至黃乃復壅君命也有疾亦不復可乎大夫以君命出聞喪徐行而不反未致事而死以尸將事楚伐吳陳侯使公孫貞子往吊及良而卒將以尸入吳人辭焉上介芉尹蓋曰寡君使蓋備使弔君之下吏無祿使人逢天之感大命隕墜絶世于良廢日供積一日遷次今君命逆使人曰無以尸造于門是我寡君之命委于草莽也無乃不可乎吳人不敢辭君子以為知禮乃者無其上之詞其曰復事未畢也辛巳有事于太廟仲遂卒于垂冇事言時祭此公子遂也曷為書字生而賜氏俾世其官也曷為書卒以事之變卒之也古者諸侯立家大夫卒而賜氏其後尊禮權臣寵遇貴戚不由其道於是乎有生而賜氏其在魯則季友仲遂是也襄仲殺惡及視援立宣公而宣公深德之故生而賜氏使世大夫以答之也經於其卒書族以志變法之端為後世戒壬午猶繹萬入去籥繹者祭之明日以賔尸也猶者可已之詞萬舞也以其無聲也故入而遂用籥管也以其有聲也故去而不作是謂故知不可存其邪心而不能格也禮大夫卒當祭則不告終事而聞則不繹不告者盡肅敬之誠於宗廟不繹者全始終之恩於臣子今仲遂國卿也卒而猶繹則失寵遇大臣之禮矣春秋雖隆君抑臣而體貌有加焉則亷陛益尊而臣節礪後世法家專欲隆君而不得其道至以大馬國人相視大倫滅矣聖人書法如此存君臣之義也戊子夫人嬴氏薨敬嬴文公妾也何以稱夫人自成風聞季友之繇事友而屬其子及僖公得國立以為夫人於是乎嫡妾亂矣春秋於風氏凡始卒四貶之則禘于太廟秦人歸禭榮叔含賵召伯會葬去其姓氏不稱大人王再書而無天是也敬嬴又嬖私事襄仲而屬宣公不待致于太廟援例以立則從同而無貶矣其意若曰以義起禮為可繼茍出於私情而非義後雖欲正可若何晉師白狄伐秦晉主夏盟糾合諸侯攘夷狄安諸夏乃其職矣秦人之怨起自侵崇其曲在晉責己可也既不知自反釋怨修睦以補前過已可咎矣乃復興師動衆會戎狄以伐之獨不惡傷其類乎直書於策貶自見矣楚人滅舒蓼按詩稱戎狄是膺荆舒是懲在周公所懲者其自相攻滅中國何與焉然春秋書而不削是時楚人疆舒蓼及滑汭盟吳越勢益強大將為中國憂而民有被髮左袵之患矣經斯世者當以為懼有攘郤之謀而不可忽則聖人之意也秋七月甲子日有食之既冬十月己丑葬我小君敬嬴成風薨以夫人葬以小君將祔于廟而始有二夫人也則四貶之以止其事今敬嬴亦薨以夫人葬以小君使祔于廟無貶以正之傱同同可也而於宣公元年即以所逆穆薑婦之何也曰婦有姑之詞見敬嬴遂以子貴援例而亟立為夫人也僖公享國八年然後致成風而敬嬴之亟也雖云援例魯君臣之責亦可知矣無貶而書法若此首猶桓宣弒君而書即位爾雨不克葬庚寅日中而克葬敬嬴以其子宣公屬諸襄仲殺太子及其母弟雖假手于仲實敬嬴之謀也經書子赤卒夫人薑氏歸于齊其文無貶而讀者有傷切之意焉則以秉􅉓不可滅也傳謂哭而過市市人皆哭敬嬴逆天理拂人心之狀慘矣其於終事雨不克葬著咎徵焉而謂無天道乎此皆直書以見人心與天理之不可誣者也夫喪事即逺有進無退浴于中霤飯于牖下小斂于戶內大斂于阼階殯于客位還于廟祖于庭塴于墓以弔賔則其退有節以虞事則其祭有時不為雨止禮也雨不克葬喪不以制也或曰卜葬先逺日所以避不懷也諸侯相朝與旅見天子入門而雨霑服失容則廢矧送終大事人情所不忍遽反可冒雨不待成禮而葬乎潦車載蓑笠士喪禮也有國家者乃不能為雨備何也且公庭之於墓次具禮意固不同矣不得不可以為悅無財不可以為悅得之為有財古之人皆用焉而不能為之備是儉其親也不亦薄乎故穀梁子曰而不克葬喪不以制也厚葬古人之所戒而墨之治喪也以薄又君子之所不與故喪事以制春秋之旨也城平陽楚師伐陳七年冬十一月魯侯如齊王使徴聘於諸侯魯仲孫蔑應命王以為有禮厚賄之齊侯伐萊魯伐東夷取根牟六月滕侯薨諡曰昭公子繡嗣七月晉侯宋公衛侯鄭伯曹伯會于扈以討不睦陳侯不會晉荀林父以諸侯之師伐陳辛酉晉侯薨於扈乃還諡曰成公子獳嗣八月癸酉衛侯薨諡曰成公子遫嗣宋人圍滕楚王為厲之役伐鄭晉郤缺救之鄭伯敗楚師于栁棼國人皆喜唯公子去疾憂曰是國之災也吾死無日矣陳侯與其大夫孔寧儀行父通於夏姬𠂻其衵服以戲于朝泄冶諫曰公卿宣淫民無效焉且聞不令君其納之公曰吾能改矣公告二子二子請殺之公弗禁遂殺泄冶陳國風九篇曰株林二章章四句刺靈公也淫乎夏姬驅馳而往朝夕不休息焉胡為乎株林從夏南株林夏氏邑也夏南夏徵舒也匪適株林從夏南駕我乘馬説于株野乘我乘駒朝食于株大夫乘駒陳國風十篇曰澤陂三章章六句刺時也言靈公君臣淫於其國男女相説憂思感傷彼澤之陂有蒲與荷興也陂澤障也荷芙渠也有美一人傷如之何傷無禮也寤寐無為涕泗滂沱自目曰涕自鼻曰泗彼澤之陂有蒲與蕳蕳蘭也有美一人碩大且卷卷好貌寤寐無為中心悁悁悁悁猶悒悒也彼澤之陂有蒲菡蓞菡蓞荷華也有美一人碩大且儼儼矜莊貌寤寐無為輾轉伏枕經曰九年春王正月公如齊公至自齊夏仲孫蔑如京師以淺言之屬辭比事春秋教也當嵗首月公朝于齊夏使大夫聘于京師此皆比事可考不待貶絶而惡自見者也宣公享國九年於周才一往聘其在齊則又再朝矣經於如齊每行必致深罪之也下逮戰國周衰甚矣齊威王往朝于周而天下皆賢之况春秋時乎而宣公不能也故聘朝之禮廢則君臣之位失諸侯之行惡而倍畔侵陵之敗起矣此經書君如齊臣如周之意而特書王正月以表之也齊侯伐萊秋取根牟八月滕子卒九月晉侯宋公衛侯鄭伯曹伯會于扈晉荀林父帥師伐陳按左氏討不睦也陳侯不會荀林父以諸侯之師伐陳晉侯卒乃還則知經所書者與晉罪陳之詞也會于扈以侍陳而陳侯不會然後林父以諸侯之師伐之也則幾于自反而有禮矣不書諸侯之師而曰林父帥師者在會諸侯皆以師聽命而林父兼將之也則其衆輯矣晉主夏盟又常救陳所宜與也而惟楚之即夫豈義乎辛酉晉侯黑臀卒於扈冬十月癸酉衛侯鄭卒晉成公何以不葬魯不會也衛成公何以不葬亦魯不會也衛成事晉甚謹而魯宣公獨深向齊衛欲為晉致魯故謀黑壤之會而特使孫良夫來盟以定之也及會于黑壤而晉人止公賂然後免是以扈之會皆前日諸侯而魯獨不往二國繼以喪赴亦皆不會此所謂無其事而缺其文者也或曰二君皆有貶焉故不書葬誤矣魯人不會亦無貶乎書卒而以私怨廢禮忘親其罪已見春秋文簡而直視人若日月之無私照也曲生意義失之逺矣宋人圍滕圍國非將卑師少之所能辨也必動大衆而使大夫為主帥明矣然而稱人是貶之也滕既小國又方有喪所宜矜哀弔恤之不暇而用兵革以圍之比事以觀知見貶之罪在不仁矣楚子伐鄭晉郤缺帥師救鄭楚兵加鄭數矣或稱人或稱爵何也鄭自晉成公初立舍楚而從中國正也楚人為是興師而加鄭不義矣故宣公三年書人書侵罪之也次年鄭公子歸生弒其君諸侯未有聲罪致討者而楚師至焉故特書爵與之也然興師動衆賊則不討惟服鄭之為事則非義舉矣故又次年傳稱楚子伐鄭而經書人再貶之也至是稱爵豈與之乎按公羊例君將不言帥師書其重者也至此書爵見其陵暴中華以重兵臨鄭矣何以知其非與之乎曰下書晉郤缺帥師救鄭則知非與之也由此觀春秋書法皆欲治亂賊之黨謹華夷之辨以一字為褒貶深切著明矣陳殺其大夫泄冶稱國以殺者君與用事大臣同殺之也稱其大夫則不失官守而殺之者有專輒之罪矣泄冶無罪而書名何也冶以諫殺身者也殺諫臣者必有亡國弒君之禍故書其名為徵舒弒君楚子滅陳之端以垂後戒此所謂義係於名而書其名者也比干諫而死子曰商有三仁焉泄冶諫而死何獨無褒詞又語默死生當其可而止泄冶之盡言無隱不愧乎史魚之直矣方諸比干自靖自獻于先王則未可同日而語也冶雖效忠其猶在宋子哀魯叔肸之後乎故仕于昏亂之朝若異姓者如子哀潔身而去可也其貴戚耶不食其祿如叔肸善矣八年冬魯侯如齊齊侯以魯服故歸魯濟西田春二月丙辰日有食之己巳齊侯薨諡曰惠公公子無野嗣初崔杼有寵於惠公髙國畏其逼也逐之奔衛魯侯如齊齊侯喪故也三月癸巳陳侯與孔寧儀行父飲酒於夏氏公謂行父曰徴舒似女對曰亦似君徴舒病之公出自其廏射而殺之諡曰靈二子奔楚滕人恃晉而不事宋四月宋人伐之齊葬其君惠公魯公孫歸父會葬鄭及楚平晉人宋人衛人曹人伐鄭取成而還王使王季子聘於魯王問魯大夫對曰人君寬以保本肅以濟時宣以教施惠以和民則無事不徹人臣敬以承命恪以守業恭以給事儉以足用則無任不堪季孫行父仲孫蔑儉其長處魯乎叔孫僑如公孫歸父侈侈必貪貪必謀人亡之道也魯公孫歸父帥師伐邾取繹魯大水魯季孫行父如齊魯公孫歸父如齊齊侯使國佐聘于魯魯飢楚王伐鄭晉士會救鄭逐楚師于潁北諸侯之師戍鄭鄭公子歸生卒鄭人討幽公之亂斫歸生之棺而逐其族改葬幽公諡曰靈楚法羣臣朝馬踐霤者斬輈戮御太子犯令廷理置于法太子怒請殺之王曰立法從令所以尊敬宗廟前有老主而不踰後有儲主而不屬真守法之臣也益爵二等經曰十年春公如齊公至自齊此亦如齊亦致其至而不書月上九年亦如齊亦致其至而書月者為是年夏使仲孫蔑如京師故特書於嵗首書王正月以著宣公之罪而君臣名分之際謹嚴如此也歸田以為私惠比於君臣名分之際則大小不侔矣齊人歸我濟西田宣公於齊順其所欲既以女妻其臣又以兵會伐萊之舉又每歲牲朝于齊廷雖諸侯事天子無是禮也故惠公悅其能順事已而以所取濟西田歸之也歸歡及闡直書曰歸此獨書我者乃相親愛惠遺之意或謂濟西魯之本封故書我則誤矣以柔巽卑屈事人不以其道而得地與悅人之柔巽卑屈事已不以其道而歸其地皆人欲之私而非義矣夏四月丙辰日有食之己巳齊侯元卒齊崔氏出奔衛按左氏崔杼有寵於惠公髙國畏其逼也公卒而逐之奔衛書曰崔氏以族奔也許翰以為崔杼出而能反反而能弒者以其宗強於此舉氏辨之早也其説得矣所謂譏世卿者非公羊本旨蓋門弟子因尹氏武氏稱世卿而附益之於此爾經有事同而詞異亦有事異而詞同一視之則泥而不通矣公如齊五月公至自齊文約而事詳者經也春如齊朝惠公夏如齊奔其喪若是雖不致可也而皆致者甚之也天王之喪不奔欲行郊禮而汲汲於奔齊惠公之喪天王之葬不會使微者往而公孫歸父會齊惠公之葬其不顧君臣上下尊卑之等所謂肆人欲滅天理而無忌憚者也詞繁而不殺聖人之情見矣癸巳陳夏徴舒弒其君平國陳靈公之無道也而稱大夫之名氏以弒何也禍莫大於拒諫而殺直臣忠莫顯于身見殺而其言驗泄冶所為不憚斧鉞盡言于其君者正謂靈公君臣通于夏徵舒之家恐其及禍不忍坐觀故昧死言之靈公不能納乂從而殺之卒以見弒而亡其國此萬世之大戒也特書徴舒之名氏以見泄冶忠言之驗靈公見弒之由使有國者必以逺色修身包容狂直開納諫諍為心也以為罪不及民故稱大大以弒者非經意矣六月宋師伐滕前圍滕稱人刺伐喪也此伐滕稱師譏用衆也宋大國爵上公霸主之餘業力非不足也今鄰有弒逆不能聲罪致討乃用大衆以伐所當矜恤之小邦且滕不事已無乃已德猶有所缺而滕何尤焉故特稱師以著其罪而汲汲於誅亂臣討賊子之意見矣公孫歸父如齊葬齊惠公歸父仲遂之子貴而有寵宣公深德齊侯之能定其位而又以濟西田歸之也故生則傾身以事之而不辭於屈辱沒則親往奔喪而使貴卿會其葬亦不顧天王之禮缺然莫之供也比事考詞義自見矣晉人宋人衛人曹人伐鄭按左氏鄭及楚平諸侯伐鄭取成而還其稱人貶也鄭居大國之間從於強令豈其罪乎不能以德鎮撫而用力爭之是謂五十步笑百步庸何愈於楚自是貴楚益輕罪在晉矣秋天王使王季子來聘公羊傳曰王季子者王之母弟也王有時聘以結諸侯之好禮也宣公享國至是十年不朝于周而比年朝齊不奔王喪而奔齊侯喪不遣貴卿會匡王葬而使歸父會齊侯之葬縱未舉法勿聘焉猶可也而使王季子來王靈益不震矣自是王聘春秋亦不書矣公孫歸父帥師伐邾取繹用貴卿為主將舉大衆出征伐不施於亂臣賊子奉天討罪而陵弱侵小近在邦域之中附庸之國是為盜也當此時陳有弒君之亂既來赴告藏在諸侯之策矣曽不是圖而有事於邾不亦傎乎故四國伐鄭貶而稱人魯人伐邾特書取繹以罪之也大水季孫行父如齊冬公孫歸父如齊按左氏行父如齊初聘也歸父如齊邾故也齊侯嗣立宣公親往奔其父喪又使貴卿會葬矣若待踰年然後來聘未晚也而季孫亟行歸父繼往則以宣公君臣不知為國以禮而謂妄悅取人之可以免於討也歸父貪於取繹畏齊而往蓋理曲則氣必餒矣能無畏乎哉春秋備書而不削以著其罪為後世鑒也齊侯使國佐來聘葬之速也太不懷也又未逾年而以君命遣使聘于鄰國則哀感之情忘矣孟子曰飬生不足以當大事惟送死可以當大事滕文公五月居廬未有命戒及至葬顔色之戚哭泣之哀弔者大悅而有願為其氓者蓋禮義人心之所同然也齊頃公嗣位之初舉動如此喪師失地幾見執獲豈特婦人笑客之罪哉已失守身之本矣飢楚子伐鄭經有詞同而意異者比事以觀斯得之矣九年楚子伐鄭稱爵者貶詞也若曰國君自將恃強壓弱憑陵中夏之稱也知然者以下書晉郤缺帥師救鄭則貶楚可知矣此年楚子伐鄭稱爵者直詞也若曰以實屬詞書其重者而意不以楚為罪也知然者以傳書晉士會救鄭逐楚師于潁北而經削之則責晉可知矣此類兼以傳為案者也皇天大紀卷四十七

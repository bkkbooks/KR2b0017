body:
  text: 皇王大紀卷三十三宋胡宏撰三王紀平王二十四年甲午衛侯夫人齊薑無子娶陳媯生子完薑氏子之嬖妾生子州吁衛國風三篇曰碩人四章章七句閔莊薑也莊公惑於嬖妾使驕上僭莊薑賢而不見答終以無子國人閔而憂之碩大也人其頎長也衣錦褧衣襜也禪也加錦衣之上嫌其文之太著也齊侯之子衛侯之妻東宫之妹邢侯之姨談公維私姊妹之夫曰私手如柔荑如新生之美膚如凝脂領如蝤蠐齒如瓠犀螓首廣而方蛾眉巧笑倩兮美目盼兮碩人敖敖長貌説暫息也于農郊近郊四牡有驕壯貌朱幩馬扇汗鑣鑣馬銜翟茀以山雉為車蔽以朝大夫夙退無使君勞河水洋洋盛貌北流活活流貌施罛濊濊魚罟施於水中鱣鮪發發多貌葭蘆也菼薍也揭揭長也庶薑孽孽盛貌庶士有朅武壯貌邶國風二篇曰緑衣四章章四句衛莊薑傷已也妾上僣夫人失位而作是詩也緑兮衣兮緑衣黃裏緑間色黃正色心之憂矣曷維其已緑兮衣兮緑衣黃裳心之憂矣曷維其亡緑兮絲兮汝所治兮我思古人俾無訧過也兮絺兮綌兮淒其以風我思古人實獲我心二十五年晉侯仇薨是為文侯子伯嗣是為昭公自絳徙都翼唐國風二篇曰山有樞三章章八句刺晉昭公也不能修道以正其國有財不能用有鐘鼓不能以自樂有朝廷不能灑掃政荒民散將以危亡四鄰謀取其國家而不知國人作詩以刺之也山有樞隰有榆子有衣裳弗曳弗婁亦曳也子有車馬弗馳弗驅宛死貌其死矣他人是愈樂也山有栲隰有杻子有廷內弗灑弗掃子有鐘鼓弗鼓弗考宛其死矣他人是保安也山有漆隰有栗子有酒食何不日鼓瑟且以喜樂且以永日宛其死矣他人入室秦初制三族之法二十六年晉侯伯封其叔父成師于曲沃使靖侯之孫欒賔傅之師服曰古者天子建國諸侯立家大夫有二宗士有隸子弟等衰如是是以能固今晉甸侯也而建國本既弱矣其能久乎唐國風三篇曰揚之水三章二章章六句一章四句刺晉昭公也昭公分國以封沃沃盛強昭公微弱國人將叛而歸沃焉揚之水白石鑿鑿素衣朱襮從子於沃既見君子云何不樂揚之水白石皓皓素衣朱繡從子于鵠曲沃邑既見君子云何其憂揚之水白石粼粼我聞有命不敢以告人二十七年鄭伯掘突薨諡曰武公武公娶于申曰武薑生寤生及叔段薑氏愛段欲立之公弗許寤生嗣是為莊公二十八年武薑請封段于制公曰制巖邑也虢叔死焉他邑唯命請京使居之祭封人仲足諫曰都城過百雉國之害也先王之制大都不過三國之一中五之一小九之一今京不度非制也君將不堪公曰薑氏欲之焉辟害對曰薑氏何厭之有不如早為之所無使滋蔓蔓難圖也蔓草猶不可除況君之寵弟乎公曰多行不義必自斃鄭國風二篇曰將仲子三章章八句刺莊公也不勝其母以害其弟弟叔失道而公弗制祭仲諫而弗聽小不忍以致大亂焉將請也仲子兮無踰我里無折我樹杞豈敢愛之畏我父母仲可懷也父母之言亦可畏也將仲子兮無踰我牆無折我樹桑豈敢愛之畏我諸兄仲可懷也諸兄之言亦可畏也將仲子兮無踰我園無折我樹檀豈敢愛之畏人之多言仲可懷也人之多言亦可畏也鄭國風三篇曰叔于田三章章五句刺莊公也叔處于京繕甲治兵以出於田國人説而歸之叔于田巷無居人豈無居人不如叔也洵美且仁叔于狩巷無飲酒豈無飲酒不如叔也洵美且好叔適野巷無服馬豈無服馬不如叔也洵美且武鄭國風四篇曰大叔于田三章章十句刺莊公也叔多才而好勇不義而得衆也叔于田乘乘馬執轡如組兩驂如舞叔在藪火烈具舉禪禓肉袒也暴虎空手搏之也獻于公所將叔無狃習也復也戒其傷女叔于田乘乘黃四馬皆黃兩服中央夾轅者上襄最良也兩驂在兩傍者鴈行叔在藪火烈具揚叔善射忌忌辭也又良御忌抑磬騁也控忌抑縱發矢也送從禽也忌叔于田乘乘鴇驪白雜毛曰鴇兩服齊首兩驂如手叔在藪火烈具阜盛也叔馬慢忌叔發罕忌抑釋掤覆矢者忌抑鬯弓韜之也忌三十年荆蚡冒薨弟熊通殺其世子而自立秦文公獲若石云于陳倉北阪城以一牢祠之命曰陳寶三十一年曲沃成師能修其政唐國風四篇曰椒聊二章章六句刺晉昭公也君子見沃之盛強能修其政知其蕃衍盛大子孫將有晉國焉椒聊野椒也之實蕃衍盈升彼其之子碩大無朋椒聊且逺長也條且椒聊之實蕃衍盈掬彼其之子碩大且篤椒聊且逺條且晉大夫潘父弒其君伯諡曰昭公將納成師晉人殺潘父立昭公弟平國內亂唐國風五篇曰綢繆三章章六句刺晉亂也國亂則婚姻不得其時焉綢繆束薪三星在天謂始見東方嫁娶之時也今夕何夕見此良人子兮子兮如此良人何綢繆束芻三星在隅東南也今夕何夕見此邂逅子兮子兮如此邂逅何綢繆束楚三星在戶正南也今夕何夕見此粲三女為粲者子兮子兮如此粲者何三十四年甲辰三十六年衛侯楊薨諡曰莊公子完嗣是為桓公初莊公寵州吁好兵公弗禁大夫石碏諌曰臣聞愛子教之義方弗納於邪驕奢淫泆所自邪也四者之來寵祿過也夫寵而不驕驕而能降降而不憾憾而能眕者鮮矣弗聽其子厚與州吁遊禁之不可及桓公立而老三十九年晉曲沃成師卒是為桓叔子鱓代唐國風六篇曰杕杜二章章九句刺時也君不能親其宗族骨肉離散獨居而無兄弟將為沃所并爾有杕特貌之杜赤棠其葉湑湑枝葉不相比獨行踽踽無所親也豈無他人不如我同父嗟行之人胡不比焉人無兄弟胡不佽助也焉有枤之杜其葉菁菁希少貌獨行睘睘無所依也豈無他人不如我同姓嗟行之人胡不比焉人無兄弟胡不佽焉唐國風七篇曰羔裘二章章四句刺時也晉人刺其在位不恤其民也羔裘豹袪卿大夫之服也自由也我人居居安居也豈無他人維子之故羔裘豹褎自我人究究盡心力也豈無他人維子之好四十年齊侯祿父立文侯赤之孫也四十一年宋公舍其子與夷以國讓其弟和宋公薨諡曰宣公和即位大夫正考父佐戴武宣三命茲益恭其鼎銘曰一命而僂再命而傴三命而俯循牆而走亦莫余敢侮饘於是粥於是以糊其口鄭伯伐魯魯公子息姑逆戰於狐壤鄭人獲之以歸囚諸尹氏息姑賂尹氏而禱於其主鍾巫遂與尹氏歸而立其主四十四年甲寅鄭大叔命西鄙北鄙二於己公子呂曰國不堪二君將若之何臣請除之無生民心公曰無庸將自及四十七年曲沃鱓入翼弒其君平諡曰孝公國人逐鱓立孝公弟郤四十八年宋師侵魯魯人敗之于黃魯侯元妃孟子卒繼室以聲子生息姑宋武公薨之年生女曰仲子手有文曰為魯夫人故魯侯娶焉生子允而弗湟薨諡曰惠公孔子曰夏道尊命事鬼敬神而逺之近人而忠焉先祿而後威先賞而後罰親而不尊其民之敝蠢而愚喬而野朴而不文殷人尊神率民以事神先鬼而後禮先罰而後賞尊而不親其民之敝蕩而不靜勝而無恥周人尊禮尚施事鬼敬神而逺之近人而忠焉其賞罰用爵列親而不尊其民之敝利而巧文而不慙賊而蔽子曰夏道未瀆辭不求備不大望於民民未厭其親殷人未瀆禮而求備於民周人強民未瀆神而賞爵刑罰窮矣子曰虞夏之道寡怨於民殷周之道不勝其弊子曰虞夏之質殷周之文至矣虞夏之文不勝其質殷周之質不勝其文四十九年冬魯公子息姑欲以位讓其弟允諸大夫不可息姑乃即魯侯位魯侯求好於邾春正月與邾子盟於蔑鄭大叔完聚繕甲兵具卒乘將襲鄭夫人將啓之公聞其期曰可矣三月命公子吕帥車二百乘以伐京京人叛段段入鄢鄭伯伐諸鄢大叔出奔共其子滑奔衛鄭伯置薑氏於城潁而誓之曰不及黃泉無相見也既而悔之潁谷封人考叔聞之有獻於公公賜之食食舍肉公問之對曰小人有母請以遺之公曰爾有母遺繄我獨無潁考叔曰何謂也公語之故且告之悔對曰君何患焉若闕地及泉隧而相見其誰曰不然公從之母子如初王命鄭伯為卿士衛人為鄭公孫滑伐鄭取廪延魯仲子之喪夏五月王使冡宰致賵魯侯求成於宋秋七月盟于宿冬十月祭伯朝於魯魯大夫孝公之子益師卒至魯哀公之世孔子不復夢見周公於是按魯史春秋斷自隱公元年筆則筆削則削而作春秋春秋經曰元年春王正月謂一為元者明人君之用也元即仁也仁人心也春秋深明其用當自貴者始故治國先正其心心正而後天下莫不一於正冬而曰春者行夏之時也春天時正王月書時又書月見天人一理而知王與天同火也加王於正者公羊子曰大一統也天無二日土無二王家無二主尊無二上道無二致政無二門而知天下定於一也魯隱不書即位者內不承國於先君上不稟命于天子也首絀隱公以明大法父子君臣之倫正矣何以始於魯隱平王子母適冢正后親遭褒姒之難廢黜播遷而宗國顛覆至是暮年又以天王之尊而賵諸侯寵妾人望絶矣春秋於此蓋有不得已焉故託始乎隱也不書即位國君逾年改元必行告廟之禮國史主記時政必書即位之事而隱公闕焉是仲尼削之也古者諸侯繼世襲封則內必有所承爵位土田受之天子則上必有所稿內不承國於先君上不稿命於天子諸侯大夫巳以立而遂立焉是與爭亂造端而篡弒所由起也春秋首黜隱公以明大法父子君臣之倫正矣三月公及邾儀父盟于蔑魯侯爵而稱公此臣子之詞從周之文者也我所欲曰及邾附庸儀父其君之字也王朝大夫例稱字列國之命大夫例例稱字諸侯之兄弟例稱字中國之附庸例稱字然有當稱字或黜而名例當稱人或進而書字者聖人之特筆也春秋大義公天下講信修睦至於刑牲要神非所貴也夏五月鄭伯克段于鄢不稱國不稱將不稱師而專曰鄭伯者薑氏嘗欲立段矣鄭伯恐其終將軋已為後患也故縱使至於亂然後以叛逆討之則國人不敢從薑氏不敢主而大叔屬籍當絶不可復居父母之邦此鄭伯之志也春秋誅其意以正人心垂訓之義大矣不書奔義不繫於奔也秋七月天王使宰咺來歸惠公仲子之賵春秋創制繫王於天為萬世法冡宰稱宰咺者名也王朝公卿書官大夫書字上士中士書名下士書人咺位六卿之長而名之何也以天王之尊下賵諸侯之妾咺為冡宰承命而行故特貶而書名或曰僖公之母成風亦莊公妾也其卒也王使榮叔歸舍且賵其葬也王使召伯來會葬而榮召書字何也前賵仲子則名冢宰後葬成風王不稱天其法嚴矣九月及宋人盟于宿內稱及外稱人皆微者其地以國宿亦與焉微者盟會不志於春秋此其志者有宿國之君也凡書名者惡其屢盟不待會同私約不繇天子慢鬼神犯刑政以成傾危之習也冬十有二月祭伯來按左氏曰非王命也祭伯畿內諸侯為王卿士來朝于魯直書曰來不與其私交杜朋黨之原為後世事君而有二心者之明戒也經於內臣朝聘告赴皆貶而不與正其本也公子益師卒凡公子公孫登名於史貴戚之卿也其稱公子以貴戚故使為卿也不書官者不請於王而自命也卿卒必書此春秋貴大臣之意或書或不書著禮貌之差也不書葬明君臣之等也名而不書氏者身自為卿而非世也公子翬不書卒何也迷國誤朝躬行弒討之賊也公子遂書卒何也因事之變以明卿卒不繹之禮也季孫意如書卒何也春秋有變例定哀多微詞定公幸於禍而忘其讎誘於利而忘其辱以意如為大夫不討先君之賊也五十年春魯侯與戎會於濳修惠公之好戎請盟魯侯辭莒子取於向向薑不安莒而歸三月莒人入向以薑氏還魯司空無駭帥師入極戎復請盟夏六月庚辰魯侯與盟於唐秋七月紀侯使其大夫履緰逆夫人於魯八月魯伯姬歸於紀十月乙卯魯侯夫人子氏薨鄭人以王師虢師伐衛討廪延之師王將分政於虢公鄭伯怨王王曰無之於是與鄭交質經曰二年春公會戎於濳戎狄舉號外之也天子與天地參無不覆載王德之體也內中國而外四夷使之各安其所者王道之用也是故親戎狄致全繒之奉是首顧居下也戎狄來朝位侯王之上是亂常失序也羌胡居塞內無出入之防為猾夏之階也故馭戎之道正朔不加奚會同之有夏五月莒人入向無駭帥師入極以事言之入者造其國都以義言之入者逆而不順莒稱人小國也無駭不氏未賜族也其書帥師用大衆也非王命而入人國邑逞其私意見諸侯之不臣也擅興而征討不加焉見天王之不君也據事直書義自見矣秋八月庚辰公及戎盟於唐春秋謹華夷之辨與戎盟非義矣其書日者謹之也後世如西漢結戎狄以許婚而配偶非其類如唐肅宗約回紇以求援而華夏被其毒如德宗信吐蕃以與盟而臣主蒙其恥雖悔於終亦將奚及春秋謹唐之盟垂戒逺矣九月紀履緰來逆女冬十月伯姬歸于紀穀梁子曰逆女親者也使大夫非正也夫婦人倫之本也故文王為世子而親迎韓侯為諸侯而親迎入春秋之始名宰咺歸賵書履緰逆女衆妾之分定矣大昏之禮嚴矣紀子伯莒子盟于密凡閼文有斷以大義削之而非闕者有本據舊史因之而不能益者亦有先儒傳受承誤而不敢增者闕疑而慎言其餘可矣必曲為之説則鑿矣十有二月乙卯夫人子氏薨穀梁子曰隱之妻也邦君之妻國人稱之曰小君卒則書薨以明齊也先卒而不書葬以明順也夫婦人倫之本入春秋之始於子氏書薨不書葬明示大倫苟知其義則夫夫婦婦而家道正矣鄭人伐衛凡兵聲罪致討曰伐濳師入境曰侵兩兵相接曰戰繯其城邑曰圍造其國都曰入徙其朝市曰遷毁其宗廟社稷曰滅詭道而勝之曰敗悉虜而俘之曰取輕行而掩之曰襲已去而躡之曰追聚兵而守之曰戍以弱假強而能左右之曰以皆志其事實以明輕重內兵書敗曰戰書滅曰取特婉其詞為君隱也征伐天子之大權今鄭無王命雖有言可執亦王法所禁況於修怨乎不書戰者衛已服也衛服則可免矣此義施於伐而不書戰皆可通矣五十一年春正月庚戌王崩諡曰平王太子泄父蚤死嫡孫林立將遂畀虢公政二月鄭祭足率師取溫之麥王與鄭交惡君子曰信不由中質無益也明恕而行要之以禮雖無有質誰能間之茍有明信澗溪沼沚之毛蘋蘩蕰藻之菜筐筥錡釡之器潢汙行潦之水可薦於鬼神可羞於王公而況君子結二國之信行之以禮又焉用質風有采蘩采蘋雅有行葦泂酌昭忠信也宋公疾召大司馬孔父嘉曰先君舍與夷而立寡人寡人弗敢忘若得保首領以沒先君若問與夷其將何辭以對請子奉之以主社稷雖死亦毋悔焉對曰羣臣願奉馮也公曰不可先君以寡人為賢使主社稷若棄德不讓是廢先君之舉也豈曰能賢光昭先君之令德可不務乎吾子其無廢先君之功使馮出居于鄭嘉者正考父之子也夏六月庚辰宋公薨與夷即位冬十月齊侯鄭伯盟於石門尋盧之盟經曰三年春王二月己巳日有食之經書日食三十六精厯算者所能考其行有常度是災而非異矣然每食必書示後世治厯明時之法遇災而懼之意也克謹天戒則雖有象而無其應弗克畏天災咎之來必矣凡經所書者或妾婦乘其夫或臣子背君父或政權在臣下或外夷侵中國皆陽微隂盛之證而可忽乎三月庚戌天王崩崩者上墜之形春秋歷十有三王桓襄匡簡景志崩志葬者赴告及魯往會之也平惠定靈志崩不志葬者赴告雖及魯不會也莊僖頃崩葬皆不志王室不告魯亦不往也諸侯為天王服斬衰禮當以所聞先後而奔喪今周人來訃魯侯不往是無君也其罪不書而自見矣夏四月辛卯尹氏卒尹氏天子大夫世執朝權為周階亂者也因其告喪與立子朝以朝奔楚皆以氏書者志世卿非禮為後鑒也官不擇人世授之柄黨與既衆威福下移大姦根據而莫除人主孤立而無助國不亡幸爾春秋書尹氏武氏仍叔之子於魯書季友仲遂皆志其非禮也公羊子此説必有所受矣秋武氏子來求賻武氏天子之大夫何以不稱使古者天子崩嗣王諒隂百官總己以聽於冢宰三年非王命也以非王命而不稱使春秋之旨微矣於以謹天下之通喪而嚴君臣之名分也大賻以貨財則生者所須索也君取於臣不言求而曰求賻求車求金皆著天王之失道也上失其道則下不臣矣八月庚辰宋公和卒古者諸侯之邦交間問殷聘而世相朝周制王哭諸侯則大宗伯為上相司服為王制緦麻宰夫掌邦之弔事戒令與其幣器財用外諸侯卒國史承告而後書聖人皆存而弗削而天子待諸侯之義見矣卒而或日或不日者何謹則書日慢則書時其大致然也卒而或名或不名者何嘗會盟聘問則名可知不則雖使至告喪其名亦不可得而知矣諸侯曰薨而何以書卒周室東遷諸侯専國上不請命聖人奉天討以正王法特書曰卒貶黜之也冬十有二月齊侯鄭伯盟于石門外盟會常事也何以書在春秋之亂世常事也於聖人之王法則非常也書而弗削者其諸以是為非常典而有志於天下為公之世乎癸未葬宋穆公諸侯五月而葬同盟至周制有職喪掌諸侯之喪禮蒞其禁令序其事凡諸侯及諸臣葬於墓者則冢人授之兆為之蹕而均其禁外諸侯葬其事則因魯會而書其義則聖人或存或削而天子待諸侯之義見矣卒而或葬或不葬者何有患於禮而不葬者有弱其君而不葬者無其事闕其文魯史之舊也有討其賊而不葬者宋殤齊昭告亂書弒矣而經不書葬有諱其辱而不葬者晉主夏盟在景公時告喪書日矣而經不書葬有治其罪而不葬者魯宋盟會未嘗不同而三世不葬有避其號而不葬者吳楚之君書卒者十有親送於西門之外者矣而經不書葬皆聖人所削春秋之法也桓王元年冬十二月戊申衛公子州吁弒其君而自立宋公魯侯將為會尋宿之盟未及期衛人來告亂遂遇于清宋公子馮在鄭鄭人欲納之衛州吁將修先君之怨於鄭而求寵於諸侯以和其民乃使人啖宋以伐鄭除公子馮之利宋人許之陳蔡方睦於衛州吁使公孫文仲帥師及宋公陳侯蔡人伐鄭邶國風三篇曰燕燕四章章六句衛莊薑送歸妾也燕燕于飛差池張舒也其羽之子于歸歸宗也逺送于野郊外曰野瞻望弗及泣涕如雨燕燕于飛頡之頏之飛而上曰頡下曰頏之子于歸逺于將之行也瞻仰弗及佇立以泣久立也燕燕于飛下上其音之子于歸逺送于南陳在衛南瞻望弗及實勞我心仲氏任大也只其心塞實也淵深也終溫且惠順也淑愼其身先君之思以朂寡人勉也邶國風四篇曰日月四章章六句衛莊薑傷已也遭州吁之難傷已不見答於先君以至窮困之詩也日居月諸照臨下土日乎月乎照臨之也乃如之人兮逝逮也不古故也處胡何也能有定寧曾也不我顧日居月諸下土是冒乃如之人兮逝不相好不及我以相好胡能有定寧不我報日居月諸出自東方日始月盛皆出東方乃如之人兮德音無良胡能有定俾也可忘日居月諸東方自出父兮母兮畜我不卒胡能有定報我不述循也邶國風五篇曰終風四章章四句衛莊薑傷已也遭州吁之暴見侮慢而不能正也終風且暴終日風為終風顧我則笑侮之也謔浪笑傲言戲謔不敬中心是悼終風且霾兩土也惠然肻來莫往莫來人無子道以來事己已亦不得以母道往加之悠悠我思終風且曀隂而風曰曀不日有曀寤言不寐願言則嚏跲也曀曀其隂如常隂曀曀然虺虺其靁寤言不寐願言則懷傷也邶國風六篇曰擊鼓五章章四句怨州吁也衛州吁用兵暴亂使公孫文仲將而平陳與宋國人怨其勇而無禮也擊鼓其鏜踊躍用兵鏜然擊鼓聲也土國城漕我獨南行漕衛邑也從孫子仲平陳與宋不我以歸憂心有忡爰居爰處爰喪其馬于以求之于林之下死生契濶與子成説契濶勤苦也説數也執子之手與子偕老偕俱也于嗟濶兮不我活兮于嗟洵兮不我信兮洵逺信極也宋公使乞師於魯侯問於衆仲曰州吁其成乎對曰臣聞以德和民不聞以亂以亂猶治絲而棼之也夫州吁阻兵而安忍阻兵無衆安忍無親衆叛親離難以濟矣夫兵猶火也弗戢將自焚也公辭之公子翬請以師會之公弗許固請而行遂會諸侯敗鄭徒兵圍其東門五日而還州吁未能和其民厚問定君於石子石子曰王覲為可陳侯方有寵於王陳衛方睦若朝陳使請必可得也厚從州吁如陳石碏使告于陳曰衛國褊小老夫耄矣無能為也此二人者實弒寡君敢即圖之陳人執之而請涖于衛衛人使右宰醜蒞殺州吁于濮石碏使其宰獳羊肩蒞殺石厚于陳諡其君曰桓公衛人逆桓公之弟晉於邢冬十月公子晉即位經曰四年春王二月莒人伐把取牟婁聲罪伐人而強奪其土故特書曰取以著其惡聖王不作諸侯放恣有取其故地如僖公之取濟西成公之取汝陽亦書曰取何也茍不請於天王以正疆理而擅兵爭奪雖取本邑與奪人之有者無以異春秋之義不以亂易亂故亦書曰取正其本也戊申衛州吁弒其君完此衛公子州吁也而削其屬籍特以國氏者罪莊公不待以公子之道使預聞政事主兵權而當國也夏公及宋公遇于清古者有遇禮不期而會以明造次亦有恭肅之心春秋書遇私為之約自比於不期而遇者直簡其禮耳簡略慢易無國君之禮則莫適主矣故志內之遇者三而皆以及若曰以此及彼然也志外之遇者四而皆以爵若曰以尊及卑然也故凡書遇者皆惡其無人君相見之禮也宋公陳侯蔡人衛人伐鄭春秋誅首惡興是役者首謀在衛而以宋主兵可也鄰有弒逆聲罪赴討雖先發而後聞可也宋殤不恤衛有殺君之難欲定州吁而從其邪説是肆人欲滅天理非人之所為也故以宋公為首諸國為從示誅亂臣討賊子必先治其黨與之法也此義行為惡者孤矣故曰春秋成而亂臣賊子懼秋翬帥師會宋公陳侯蔡人衛人伐鄭宋公乞師公辭而弗許義也翬以不義強其君固請而行之無君之心兆矣隱公不能辨之於早罷其兵權使之帥師也是以及鍾巫之禍春秋於此去其公子以謹履霜之戒夫春秋立義至精詞極簡嚴若曰翬帥師會伐鄭豈不白乎再序四國何其詞費也言之重詞之復其中必有大美惡焉四國合黨翬復會師同伐無罪之邦欲定弒君之賊惡之極也言之不足而再言聖人之情見而誅討亂臣之法嚴矣九月衛人殺州吁于濮伐鄭稱人責詞也殺州吁稱人衆詞也公羊子稱人為討賊之詞是矣于濮者著諸侯之罪也衛人失賊而曰著諸侯之罪何也州吁二月弒君緣四國連兵欲定其位故衛人久然後能殺之于濮非諸侯之罪而何夫以討賊許衆人而以失賊罪鄰國與賊者寡矣故曰春秋成賊子懼冬十有二月衛人立晉人衆辭立者不宜立也內不承國於先君上不稟命於天子衆謂宜立而遂自立焉可乎故於衛人特書曰立所以著擅置其君之罪於晉絶其公子所以明專有其國之非而父子君臣之義明矣皇王大紀卷三十三

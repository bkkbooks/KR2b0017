body:
  text: 皇王大紀卷六十八宋胡宏撰三王紀敬王三十七年魯用田賦初魯昭公娶于吳同姓也稱之曰孟子孟子卒孔子與弔適季氏季氏不絻放絰而拜魯侯會吳王于橐臯太宰嚭請尋盟公不欲使子貢對曰盟所以周信也故心以制之玉帛以奉之言以結之明神以要之寡君以為苟有盟焉弗可改也若猶可改日盟何益今吾子曰必尋盟若可尋也亦可寒也乃不尋盟吳徴會于衛衛侯會吳于鄖魯侯衛侯宋皇瑗盟而卒辭吳盟吳人藩衛侯之舍子貢見宰嚭語及衛故太宰曰寡君願事衛君衛君之來也緩寡君懼故將止之子貢曰衛君之來必謀於其衆或欲或否是以緩來其欲來者子之黨也其不欲來者子之讐也若執衛君是墮黨而崇讐也嚭説乃舍衛侯論曰子貢在聖門列於言語之科今觀其遺言理暢義明使雖甚愚人亦曉然知利害之所在此聖人之所貴也若夫縱橫捭闔不顧理義一出而存魯亂齊破吳強晉霸越則子貢之所甚惡也嗚呼以文王武王之將聖司馬太史尚信以為隂修德政以傾商不宅大憂而干紂又况聖門諸子哉愚惡夫棄聖經而祖述司馬太史以為實録者是以論之使後學無惑焉宋鄭之間有隙地焉曰彌作頃丘玉暢嵒戈錫鄭子産與宋人為成曰勿有是及宋平元之族自蕭奔鄭鄭人為之城嵒戈錫宋向巢伐鄭取錫殺元公之孫遂圍嵒鄭罕達救嵒圍宋師魯螽季孫問諸孔子子曰火伏而後蟄者畢今火猶西流司厯過也經曰十有二年春用田賦哀公問於有若曰年飢用不足如之何有若對曰盍徹乎曰二吾猶不足如之何其徹也曰百姓足君孰與不足百姓不足君孰與足古者公田九一助而不稅魯自宣公初稅畝後世遂以為常而不復矣至是二猶不足故又以田賦也夫先王制土籍田以助而砥其逺邇賦里以入而量其有無今用田賦軍旅之征非矣田以出粟為主而足食賦以出軍為主而足兵周制宅不毛者有里布無職事者征夫家漆林之稅二十而五則弛力薄征當以農民為急而增賦竭作不使末業者獨幸而免也今二猶不足而用田賦是重田農民而削其本何以為國書曰用田賦用者不宜用也近世議弛商賈之征達於時政者欲先省國用首寬農民後及商賈知春秋譏田賦之意矣夏五月甲辰孟子卒孟子吳女昭公之夫人其曰孟子云者諱取同姓也禮取妻不取同姓買妾不知其姓則卜之厚男女之别也同姓從宗合族屬異姓主名治際會名著而男女有别矣四世而緦服窮也五世而袒免殺同姓也六世親屬竭矣其庶姓别於上戚單於下昏姻可以通乎綴之以姓而弗别合之以食而弗殊雖百世而昏姻不通周道然也昭公不謹於禮欲結好強吳以去三家之權忍取同姓以混男女之别不命于天子以弱其配不見於廟不書於册以廢其常典禮之大本喪矣其失國也宜故陳司敗問昭公知禮乎子曰知禮子退揖巫馬期而進之曰吾聞君子不黨君子亦黨乎君娶於吳為同姓謂之吳孟子君而知禮孰不知禮巫馬期以告子曰丘也幸茍有過人必知之書孟子卒雖曰亦為君隱而實不可掩矣公會吳于橐臯秋公會衛侯宋皇瑗于鄖宋向巢帥師伐鄭冬十有二月螽三十八年宋向魋救其師鄭罕達使徇曰得桓魋者有賞魋也逃歸遂取宋師于嵒以六邑為虛許男薨子結嗣單子晉侯魯侯吳王會于黃池越王非其身之所種則不食非其夫人所織則不衣十年不收於國民有三年之食咸願一戰以雪會稽之耻越王從之大敗吳師獲其太子友遂入吳吳人告敗王惡其聞也自剄七人於幕下將盟與晉爭長晉人曰君言周室既卑諸侯大夫失禮於天子今君王東海淫名聞於天下君有短垣而自踰之况荆蠻何有於周室命圭有命固曰吳伯不曰吳王周無二王君若無卑天子以干不祥而曰吳公孤敢不從君命吳人不肯曰於周室我為長晉人曰於姬姓我為伯趙鞅呼司馬寅曰日旰矣大事未成二臣之罪也建鼓整列二臣死之長幼必可知也對曰請姑視之反曰肉食者無墨今吳王有墨國勝乎太子死乎且夷德輕不能忍久請少待之乃先晉魯侯歸許葬其君魯螽吳王歸國厚幣與越平越自度未能滅吳乃與吳平經曰十三年春鄭罕達帥師取宋師于嵒夏許男成卒公會晉侯及吳子于黃池黃池衛地其言及者會兩伯之詞也春秋內中國而外諸夷吳人主會其先晉紀常也春秋四夷雖大皆曰子吳僭王矣其稱子正名也以會兩伯之詞而言及者先吳則拂經而失序列書則泯實而傳疑特書曰及順天地之經著盟會之實又以見夷之強而抑其橫也定公以來晉失霸業不主夏盟夫差暴橫勢傾上國自稱周室於已為長蓋太伯之後以族屬言則伯父也而黃池之會聖人書法如此者則後世治中國御四夷之道也明此義則知漢宣帝待單于位在諸侯王上蕭傳之議非矣唐髙祖稱臣於突厥倚以為助劉文靖之䇿失矣况於以父事之如晉者將欲保國而免其侵暴可乎或曰茍不為此至于亡國則如之何曰存亡者天也得失者人也不可逆者理也以人勝天則事有在我者矣必若顛倒冠履而得天下其能一朝居乎故春秋撥亂反正之書不可以廢焉者也楚公子申帥師伐陳於越入吳吳自柏舉以來馮陵中國黃池之會遂主夏盟可謂強矣而春秋繼書於越入吳所謂因事屬詞垂戒後世而見親切著明之義也曾子曰戒之戒之出乎爾者反乎爾老氏曰佳兵不祥之器其事好還夫以力勝人者人亦以力勝之矣吳嘗破越遂有輕楚之心及其破楚又有驕齊之志既勝齊師復與晉人爭長自謂英之敵也而越已入其國都矣吳侵中國而越滅之越又不監而楚滅之楚又不監而秦滅之秦又不監而漢滅之老氏曽子其言豈欺也哉春秋初書於越入吳在柏舉之後再書於越入吳在黃池之後皆因事屬詞垂戒後世不待貶絶而見深切著明之義也而可廢乎秋公至自會晉魏曼多帥師侵衛葬許元公九月螽冬十有一月有星孛于東方盜殺陳夏區夫十有二月螽三十九年冬孔子筆削春秋三年矣於是魯侯西狩於大野叔孫氏之車子鉏商獲麟以為不祥賜虞人孔子見之喟然嘆曰麟也何為至哉然後取之聖人與天為一感應之際惟聖人知之衆人所不識也經曰十有四年春西狩獲麟於是絶筆焉以為春秋經成聖人之用備矣小邾射以句繹奔魯曰使季路要我吾無盟季路辭季孫使謂之曰千乘之國不信其盟而信子之言子何辱焉季路曰魯有事於小邾不敢問故死其城下何也彼不臣而濟其言是義之也由不能季氏將伐顓臾冉有季路見於孔子曰季氏將有事於顓臾孔子曰求無乃爾是過歟夫顓臾昔者先王以為東蒙主且在邦域之中矣是社稷之臣也何以伐為冉有曰夫子欲之吾二臣者皆不欲也孔子曰求周任有言曰陳力就列不能者止危而不持顛而不扶則將焉用彼相矣且爾言過矣虎兕出於柙龜玉毁於櫝中是誰之過歟冉有曰今夫顓臾固而近於費今不取後世必為子孫憂孔子曰求君子疾夫舍曰欲之而必為之辭丘也聞有國有家者不患寡而患不均不患貧而患不安蓋均無貧和無寡安無傾夫如是故逺人不服則修文德以來之既來之則安之今由與求也相夫子逺人不服而不能來也邦分崩離析而不能守也而謀動干戈於邦內吾恐季孫之憂不在顓臾而在蕭墻之內也孔子曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出自諸侯出蓋十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣天下有道則政不在大夫天下有道則庶人不議孔子曰祿之去公室五世矣政逮於大夫四世矣故夫三桓之子孫微矣齊陳恆與隰斯登靈臺南靣為隰子之家樹所蔽恆心欲去之隰子歸命伐之俄而止之相室請其故隰子曰亂世以愚全身陳子將行大事而我知其微禍莫大焉三月庚申朔日有食之齊侯使闞止為政陳恆憚之驟顧諸朝御鞅言於公曰陳闞不可並也君其擇焉闞止謂其臣陳豹曰我欲盡逐陳氏立女何如對曰我逺於陳氏矣且其違者不過數人何盡逐焉豹以告恆兄弟四乘如公公與婦人飲酒于檀臺恆遷諸寢公怒闞止屬徒攻闈與大門不克乃出陳氏追殺之將殺東郭賈陳逆請而免之出雍門陳豹與之車弗受曰逆為余請豹與余車余有私焉事人而有私於其讐何以見魯衛之士遂奔衛恆執齊侯置于舒州公曰吾早從鞅言不及此宋司馬向魋之寵害於公公將討之未及魋先謀公公告司馬皇野曰余長魋也今將禍余請即救對曰必得左師向巢而後可乃以詐召巢巢至公告之故拜不能起公曰所難子者上有天下有先君巢乃聽命攻桓氏魋入于曹以叛巢伐之不克遂奔魯曹人叛魋奔衛夏四月甲午齊陳恆弒其君壬立其弟驁孔子沐浴而朝告於魯侯曰陳恆弒其君請討之公曰告夫三子者孔子曰以吾從大夫之後不敢不告也之三子告不可孔子曰以吾從大夫之後不敢不告也陳恆專政言於齊侯曰德施人之所欲君其行之刑罰人之所惡臣請行之公曰善恆於是盡誅大臣不附已及公族之強者威行齊國割安平以東至于琅琊自為封邑大於齊有子淵棲者非恆所為隱居不仕恆使劫之子淵棲曰子以我為智乎臣弒其君而從之非智也以我為仁乎見利而背君非仁也以我為勇乎劫我以兵懼而與子非勇也何補於子使吾有此三者終不從子矣恆乃舍之魯仲孫彘將圉馬於成成宰公孫宿不受彘怒何忌卒成人奔喪彘不納宿以成叛歸于齊魯侯問社於宰我宰我對曰夏后氏以松殷人以柏周人以栗曰使民戰栗孔子聞之曰成事不説遂事不諫既往不咎四十年夏楚令尹司馬帥師伐吳至于桐汭陳侯使公孫貞子弔焉及良而卒將以尸入吳王使太宰嚭勞且辭上介芉尹蓋對曰寡君聞楚為不道荐伐吳國滅厥人民寡君使蓋備使弔君之下吏無祿使人逢天之戚大命殞墜絶世于良廢日供積一日遷次今君命使人曰無以尸造于門是我寡君之命委于草莽也且臣聞之曰事死如事生禮也於是乎有朝聘而終以尸將事之禮又有朝聘而遭喪之禮若不以尸將命是遭喪而還也無乃不可乎吳人納之秋齊陳瓘過衛季路見焉曰天或者以陳氏為斧斤既斫喪公室而他人有之未可知也其使終饗之亦未可知也若善魯以待時不亦可乎何必惡焉瓘歸言於恆齊及魯平子貢見公孫宿曰人皆臣人而有背人之心况齊人雖為子役其有不二乎子周公之孫也多饗大利猶思不義利不可得而剝喪宗國將焉用之宿曰善哉吾不早聞齊人歸成於魯衛孔姬蒯瞶之姊也生悝圉卒悝為政孔姬使豎渾良夫如戚世子請入孔姬許之良夫與世子蒙衣而乘昏入孔氏迫悝於厠強盟之遂劫以登臺孔氏老欒寧奉衛侯輒奔魯宰季路聞亂將入遇士師子羔子羔曰弗及不踐其難季路曰食焉不避其難子羔遂出季路入及門公孫敢門焉曰無入為也季子曰是公孫也求利焉而逃其難由不然利其祿必救其患有使者出乃入曰世子焉用孔悝蒯聵使后乞孟黶敵子路以戈擊之斷纓季子曰君子死冠不免結纓而死悝立蒯聵子羔嘗刖人出至郭門而遇焉謂子羔曰追其將至盍避諸子羔從之入於其室亂定子羔曰何子之不念怨也對曰君臨論臣愀然有哀矜之色豈私臣哉又敢誰怨孔子聞衛亂曰柴也其來乎由也其死矣又聞是曰善哉柴之用刑也孔子哭季路於中庭有入弔者而孔子拜之既哭進使者而問故使者曰醢之矣遂命覆醢冬熒惑守心心宋星也宋公憂之司星子韋曰可移於相公曰相吾之股肱曰可移於民公曰無民誰君又曰可移於嵗公曰嵗飢民困吾亦病矣子韋曰天髙聽卑君有君人之言三熒惑其將退舍候之果退魯飢公問於有若曰年飢用不足如之何有若對曰盍徹乎曰二吾猶不足如之何其徹也對曰百姓足君孰與不足百姓不足君孰與足四十一年夏四月癸未孔子蚤作負手曳杖逍遙于門歌曰泰山其頽乎梁木其壞乎哲人其萎乎既歌而入當户而坐子貢聞之曰泰山其頽則吾將安仰梁木其壞哲人其萎則吾將安放夫子殆將病也遂趨而入夫子曰賜爾來何遲也夏后氏殯於東階之上則猶在阼也殷人殯於兩楹之間則與賔主夾之也周人殯於西階之上則猶賔之也丘也殷人也豫疇昔之夜夢坐奠於兩楹之間夫明王不興而天下其孰能宗豫豫殆將死矣己丑孔子沒門人四方來奔喪疑所服子貢曰昔者夫子之喪顏淵若喪子而無服喪子路亦然請喪夫子若喪父而無服衆皆從之公赤治殯葬襲衣十一稱佩象環而綦組綬飾棺牆置翣設披周也設崇殷也綢練設旐夏也魯侯誄之曰旻天不弔不憖遺一老俾屏余一人以在位煢煢余在疚嗚呼哀哉尼父無自律子貢曰生不能用死而誄之非禮也稱一人非名也夫子曰禮失則昏名失則愆君其不沒魯乎六月葬尼父於闕里泗水之上於是有自燕來觀者舍於子夏氏子夏曰聖人之葬人與人之葬聖人也子何觀焉昔者夫子言之曰吾見封之若堂者矣見若坊者矣見若覆夏屋者矣見若斧者矣從若斧者焉馬鬛封之謂也曽子曰夫孝置之而塞乎天地溥之而橫乎四海施諸後世而無朝夕推而放諸東海而準推而放諸西海而準推而放諸南海而準推而放諸北海而準曽子曰樹木以時伐焉禽獸以時殺焉夫子曰斷一樹殺一獸不以其時非孝也孝有三小孝用力中孝用勞大孝不匱思慈愛忘勞可謂用力矣尊仁安義可謂用勞矣博施備物可謂不匱矣父母愛之喜而不忘父母惡之懼而無怨父母有過諫而不逆父母既沒必求仁者之粟以祀之此之謂禮終衛侯賜孔悝鼎銘曰六月丁亥公假于太廟公曰叔舅乃祖莊叔左右成公成公乃命莊叔隨難于漢陽即宫於宗周奔走無射啓右獻公乃命成叔纂乃祖服興舊嗜欲作率卿士躬恤衛國其勤公家夙夜不解民咸曰休哉公曰叔舅豫汝銘若纂乃考服悝拜稽首對揚以辟之勤大命施于蒸彛鼎是故鼎有銘銘者自名也自名以稱揚論撰其先祖之有德善功烈勳勞慶賞聲名列於天下而酌之祭器以祀其先祖者也為先祖莫不有美焉莫不有惡焉銘之義稱美而不稱惡此孝子孫之心也子孫守宗廟社稷其先祖無美而稱之是誣也有善而弗知不明也知而弗傳不仁也此三者君子之所耻也無幾何公飲悝酒於平陽醉而逐之奔宋楚公子申欲召公勝於吳葉公沈諸梁曰不可申曰勝信而勇使衛藩焉乃召之處吳竟為白公諸梁曰周仁之謂信率義之謂勇勝好復言而期死又求死士殆有私乎子必悔之勝固請伐鄭申許之未起師晉人伐鄭申救鄭勝怒將作亂或以告申曰勝如卵余翼而長之寧有是也秋七月勝殺申及公子結于朝諸梁在蔡方城之外人勸之入諸梁曰吾聞之以險僥幸者其求無厭偏重必離勝欲立平王子子閭曰王孫若安靖楚國匡正王室而後庇焉啓之願也敢不聽從若將專利以傾王室不顧楚國有死不能遂殺子閭及大夫齊管修劫王如髙府諸梁聞之乃入圉公陽穴宫以王如昭夫人之宫諸梁亦至攻勝殺之諸梁兼二事國寧乃使申子寧結子寬為令尹司馬而老於葉其顧命曰毋以小謀敗大作毋以嬖御人疾莊后毋以嬖御士疾莊士大夫卿士衛侯嬖人求酒於太叔遺弗獲譛而逐之遺奔晉衛侯謂渾良夫曰吾不得先君之器奈何對曰疾與亡君皆君子也召之而擇材焉可也若不材器可得也有豎告太子太子劫公而盟之殺良夫吳大飢越文種請伐吳范蠡曰從時者猶救火追亡不可緩也四十二年春越王伐吳徇於軍曰父母耆老而無昆弟者兄弟四五人皆在者有眩瞀之疾者皆以告王親命之歸進至笠澤吳王禦之夾水而陳越王為左右勾卒使夜或左或右鼓譟而進吳師分以禦之越王以三軍潛涉衝吳中軍吳師敗績晉趙鞅使召衛侯衛侯辭以難夏六月鞅師圍衛齊人救之鞅還白公之亂陳人侵楚楚王問帥大師子榖曰右領差車與左史老嘗相令尹司馬伐陳其可也沈諸梁曰師賤民慢懼不用命焉子榖曰觀丁父鄀俘也武王以為軍率是以克州蓼服隨君大啓羣蠻彭仲爽申俘也文王以為令尹實縣申息朝陳蔡封畛於汝唯其任也何賤之有諸梁曰臣懼右領左史有二俘之賤而無其令德也王乃使武城尹公孫朝伐陳滅之冬十月晉趙鞅圍衛將入鞅曰止叔向有言怙亂滅國者無後衛人出衛侯鞅立襄公之孫般師而還趙鞅之臣周舍死鞅自是聽朝不樂大夫問焉鞅曰自吾失周舍惟聞唯唯不聞諤諤是以憂也晉人説之十一月衛侯入般師出初衛侯登城望戎州使翦之又見己氏之妻髮美髠之以為吕薑髢公役匠久將逐石圃石圃因匠氏攻公公走入于戎州已氏示之璧曰活我吾與女璧已氏曰殺女璧將焉往遂殺之及世子疾衛人復般師十二月齊人立靈公之子起皇王大紀卷六十八

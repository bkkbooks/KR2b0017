body:
  text: 皇王大紀卷二十宋胡宏撰三王紀成王十一年周公在豐將没作無逸用訓于王周公薨王命君陳纘周公之任作君陳魯公來奔喪初周公欲葬成周王葬公于畢告周公作亳姑諡曰文公孔子曰昔者周公事文王行無專制事無由已身若不勝衣言若不出口奉持於前洞洞焉若將失之可謂能子矣武王崩成王幼周公承之成文武之徳聽天下之政七年致政于成王請而後為復而後行無擅志無矜色可謂能臣矣魯公奉周公主歸國徐夷乗喪作亂魯公治兵于費作費誓子夏問諸孔子曰三年之喪卒哭金革之事無辟也者歟孔子曰夏后氏三年之喪既殯而致事殷人既葬而致事記曰君子不奪人之親亦不可奪親此之謂乎子夏曰金革之事無辟也者非歟孔子曰吾聞諸老耼昔者魯公伯禽有為為之也今有三年之喪從其利者則吾不知也論曰孔子定書必有先後之義經秦焚燬聖人之意不可盡見愚詳攷經文禹當堯時别九州平水土而載於夏書之首者此夏后氏之所以王天下也今雖以載於帝堯之時讀者探本索原固未失聖人之意矣髙宗惟傅說之言是聽殷所以衰而復興禮所以廢而復起黷于祭祀其初年時事也若不能改致有肜日之異又何以為髙宗故今載肜日之訓於說命之前以不没髙宗改過從善致中興之實也康誥叙曰成王既伐管叔蔡叔以殷餘民封康叔謹按康叔者成王之叔父也不應稱之曰朕其弟成王者康叔之猶子也不應稱曰乃寡兄其曰兄曰弟者盖武王命康叔之辭也故史記武王封康叔於衛且康叔文王之子叔虞成王之弟也周公東征叔虞已得封於唐王命歸周公于東豈有康叔得封反在唐叔之後者乎故不得不舍書叙而從經史也周公東征三年而歸明年奉王東伐淮夷遂踐奄還歸于豐而作多方及營洛邑成周成反政于王分正東郊而作多士以多士在多方之前既無大義而時不可逆是以正之也武王崩之年師尚父猶在成王二年三監叛尚父不任征討而周公自行者是尚父已薨矣周公不見知於成王所以敢將兵居外者恃召父為保爾不然周公其可離成王左右乎故君奭之作在元年而不在亂定之後也以無逸繫於周公將没者考於君奭立政洛誥諸篇周公於成王皆有沖孺幼小之稱而無逸獨無故知其為最後也凡此皆本之經文非敢以胷臆亂古書之舊或有尚論古人之君子盍試攷諸是乎非耶又從而正之可也周書叙無逸曰周公作無逸無逸周公曰嗚呼君子所其無逸先知稼穡之艱難乃逸則知小人之依相小人厥父母勤勞稼穡厥子乃不知稼穡之艱難乃逸乃諺既誕否則侮厥父母曰昔之人無聞知周公曰嗚呼我聞曰昔在殷王中宗嚴恭寅畏天命自度治民祇懼不敢荒寜肆中宗之享國七十有五年其在髙宗時舊勞于外爰暨小人作其即位乃或亮隂三年不言其惟不言言乃雍不敢荒寜嘉靖殷邦至于小大無時或怨肆髙宗之享國五十有九年其在祖甲不義惟王舊為小人作其即位爰知小人之依能保惠于庶民不敢侮鰥寡肆祖甲之享國三十有三年自時厥後立王生則逸不知稼穡之艱難不聞小人之勞惟耽樂之從自時厥後亦罔或克壽或十年或七八年或五六年或三四年周公曰嗚呼厥亦惟我周太王王季克自抑畏文王卑服即康功田功徽柔懿恭懷保小民惠鮮鰥寡自朝至于日中昃不遑暇食用咸和萬民文王不敢盤于遊田以庶邦惟正之供文王受命惟中身厥享國五十年周公曰嗚呼繼自今嗣王則其無淫于觀于逸于遊于田以萬民惟正之供無皇曰今日耽樂乃非民攸訓非天攸若時人丕則有愆無若殷王受之迷亂酗于酒徳哉周公曰嗚呼我聞曰古之人猶胥訓告胥保惠胥教誨民無或胥譸張為幻此厥不聽人乃訓之乃變亂先王之正刑至于大小民否則厥心違怨否則厥口詛祝周公曰嗚呼自殷王中宗及髙宗及祖甲及我周文王兹四人迪哲厥或告之曰小人怨汝詈汝則皇自敬徳厥愆曰朕之愆允若時不啻不敢含怒此厥不聽人乃或譸張為幻曰小人怨汝詈汝則信之則若時不永念厥辟不寛綽厥心亂罰無罪殺無辜怨有同是叢于厥身周公曰嗚呼嗣王其監于兹周書叙君陳曰周公既没命君陳分正東郊成周作君陳君陳王若曰君陳惟爾令徳孝恭惟孝友于兄弟克施有政命汝尹兹東郊敬哉昔周公師保萬民民懐其徳往慎乃司兹率厥常懋昭周公之訓惟民其又我聞曰至治馨香感于神明黍稷非馨明徳惟馨爾尚式時周公之猷訓惟日孜孜無敢逸豫凡人未見聖若不克見既見聖亦不克由聖爾其戒哉爾惟風下民惟草圖厥政莫或不艱有廢有興出入自爾師虞庶言同則繹爾有嘉謀嘉猷則入告爾后于内爾乃順之于外曰斯謀斯猷惟我后之徳嗚呼臣人咸若時惟良顯哉王曰君陳爾惟𢎞周公丕訓無依勢作威無倚法以削寛而有制從容以和殷民在辟予曰辟爾惟勿辟予曰宥爾惟勿宥惟厥中有弗若于汝政弗化于汝訓辟以止辟乃辟狃于姦宄敗常亂俗三細不宥爾無忿疾于頑無求備于一夫必有忍其乃有濟有容徳乃大簡厥脩亦簡其或不脩進厥良以率其或不良惟民生厚因物有遷違上所命從厥攸好爾克敬典在徳時乃罔不變允升于大猷惟予一人膺受多福其爾之休終有辭於永世周書叙費誓曰魯使伯禽宅曲阜徐夷並興東郊不開作費誓費誓公曰嗟人無譁聽命徂兹淮夷徐戎並興善糓乃甲胄敽乃干無敢不弔備乃弓矢鍛乃戈矛礪乃鋒刃無敢不善今惟淫舍牿牛馬杜乃擭敜乃穽無敢傷牿牿之傷汝則有常刑馬牛其風臣妾逋逃勿敢越逐祇復之我商賚汝乃越逐不復汝則有常刑無敢冦攘踰垣牆竊馬牛誘臣妾汝則有常刑甲戌我惟征徐戎峙乃糗糧無敢不逮汝則有大刑魯人三郊三遂峙乃楨榦甲戌我惟築無敢不供汝則有無餘刑非殺魯人三郊三遂峙乃芻茭無敢不多汝則有大刑衛侯􅀈伯皆有馴行由是康叔入為司冦季載入為司空有令名於天下王追念周公有大勲勞命魯公世世祀周公以天子之禮樂得郊禘大雩是以魯君孟春乗大輅載弧韣旂十有二旒龍章而設日月祀帝于郊配以后稷當祫則牲用白牡尊用犧象山罍鬱尊用黄目灌用玉瓚大圭薦用玉豆雕篹爵用玉琖仍雕加以璧散璧角爼用梡嶡升歌清廟下管象武朱干玉戚冕而舞大武皮弁素積裼八佾以舞大夏此宗周禘禮也以祀周公於魯廟賜許田為魯會東都朝宿之邑命魯公之弟食采於周舉文武勤勞之後鬻熊曾孫熊繹以子男之田封之於楚居丹陽大雅十五篇曰假樂四章章六句嘉成王也假樂君子顯顯令徳宜民宜人受禄于天保右命之自天申之干禄百福子孫千億穆穆皇皇宜君宜王不愆不忘率由舊章威儀抑抑徳音秩秩有常也無怨無惡率由羣匹受福無疆四方之綱之綱之紀燕及朋友羣臣也百辟卿士媚于天子不解于位民之攸塈息也十九年甲辰二十九年甲寅王將崩命大臣輔太子作顧命周書叙曰成王將崩命召公畢公率諸侯相康王作顧命顧命惟四月哉生魄王不懌甲子王乃洮頮水相被冕服憑玉儿乃同召太保奭芮伯彤伯畢公衛侯毛公師氏虎臣百尹御事王曰嗚呼疾大漸惟㡬病日臻既彌畱恐不獲誓言嗣兹予審訓命汝昔君文王武王宣重光奠麗陳教則肄肄不違用克達殷集大命在後之侗敬迓天威嗣守文武大訓無敢昏逾今天降疾殆弗興弗悟爾尚明時朕言用敬保元子釗𢎞濟于艱難柔逺能邇安勸小大庶邦思夫人自亂于威儀爾無以釗冐貢于非㡬兹既受命還出綴衣于庭越翼日乙丑王崩太保命仲桓南宫毛俾爰齊侯吕伋以二干戈虎賁百人逆子釗于南門之外延入翼室恤宅宗丁卯命作冊度越七日癸酉伯相命士須材狄設黼扆綴衣牖間南嚮敷重篾席黼純華玉仍几西序東嚮敷重底席綴純文貝仍几東序西嚮敷重豐席畫純雕玉仍几西夾南嚮敷重筍席𤣥紛純漆仍几越玉五重陳寳赤刀大訓𢎞璧琬琰在西序大玉夷玉天球河圖在東序𦙍之舞衣大貝鼖鼔在西房兊之戈和之弓垂之竹矢在東房大輅在賔階面綴輅在阼階面先輅在左塾之前次輅在右塾之前二人雀弁執惠立于畢門之内四人綦弁執戈上刃夾兩階戺一人冕執劉立于東堂一人冕執鉞立于西堂一人冕執戣立于東垂一人冕執瞿立于西垂一人冕執銳立于側階王麻冕黼裳由賔階隮卿士邦君麻冕蟻裳入即位太保太史太宗皆麻冕彤裳太保承介圭上宗奉同瑁由阼階隮太史秉書由賔階隮御王冊命曰皇后憑玉儿道揚末命命汝嗣訓臨君周邦率循大卞燮和天下用答揚文武之光訓王再拜興荅曰眇𦕈予末小子其能而亂四方以敬忌天威乃受同瑁王三宿三祭三咤上宗曰饗太保受同降盥以異同秉璋以酢授宗人同拜王荅拜太保受同祭嚌宅授宗人同拜王答拜太保䧏収諸侯出廟門侯論曰人多以為成王中材之主也以愚觀其臨終處斷大事不動聲色過人逺甚然後知周公所以教之者至而成王進徳之勇也成王既崩然後逆元子於南門之外者是太子宫在南門外也夫太子國儲宫副疾既大漸而不居中可乎古者聖贒之君以死生為常故不與怛化小人大命未終妻子已環而泣之者同也以大臣為腹心故公其子而不與之私重輔弼也以天下為家故必終於正寢公卿百官受顧命而不没於妻子之手也後世此道不明人君牽滯於兒女子之情而懼於死生之變以利勢亂其心而以天下私其子故不任大臣以天下而大臣亦不敢以天下自任於是有母后臨朝之顛制有外戚擅權之大患有閹寺狐鼠之深害有偏信獨任之隂謀矣此後世所以不及三代也又曰唐虞夏商天子之服十有二章繢日月星辰山龍華蟲於衣絺繡宗彛藻火粉米黼黻於裳上公九章自山龍而下侯伯七章自華蟲而下子男五章自宗彛而下卿大夫三章自粉米而下士一章黼黻而已周天子九章士皮弁素積天子公侯卿士五服有章矣康王受命之際其君臣冕服非常章何也天子崩嗣君即位而後成服者不敢重已事而輕天命也不敢後父事而先已事也衰麻者闕文周書序康王之誥曰康王既尸天子遂誥諸侯作康王之誥康王之誥王出在應門之内太保率西方諸侯入應門左畢公率東方諸侯入應門右皆布乗黄朱賔稱奉圭兼幣曰一二臣衛敢執壤奠皆再拜稽首王義嗣徳答拜太保暨芮伯咸進相揖皆再拜稽首曰敢敬告天子皇天改大邦殷之命惟周文武誕受羑若克恤西土惟新陟王畢協賞罰戡定厥功用敷遺後人休今王敬之哉張皇六師無壊我髙祖寡命王若曰庶邦侯甸男衛惟予一人釗報誥昔君文武丕平富不務咎底至齊信用昭明于天下則亦有熊羆之士不二心之臣保乂王家用端命于上帝皇天用訓厥道付畀四方乃命建侯樹屏在我後之人今予一二伯父尚胥暨顧綏爾先公之臣服于先王雖爾身在外乃心罔不在王室用奉恤厥若無遺鞠子羞羣公既皆聽命相揖趨出王釋冕反喪服冬十月葬王于畢諡曰成王皇王大紀卷二十

body:
  text: 皇王大紀卷六十五宋胡宏撰三王紀敬王二十三年孔子從而祭膰肉不至不脫冕而行遂適衛冉有僕子曰庶矣哉冉有曰既庶矣又何加焉曰富之既富矣又何加焉曰教之季路薦髙柴為費宰而從孔子於衛子曰賊夫人之子子路對曰有民人焉有社稷焉何必讀書然後為學子曰是故惡夫佞者論曰司馬遷載孔子墮三都之明年由大司宼攝相事夫聖人之所以大過人者無它焉如天之生物隨其分限無不可為而過者無可為而不及者為委吏則必㑹計當為乗田則必畜養蕃為宰而親民則制為養生送死之節為司空而正封域則溝合昭公之墓為司宼而治姦亂則誅少正卯而墮三都及成不墮三家之慮變矣故春秋經文不曰三家直書曰公聖人色斯舉矣安有明年由大司宼攝相之事所以必知其無者考按經文明定公十三年無更敗起廢之事而築蛇淵囿絶與墮都之意不侔故也遷載孔子言行不得其眞者尤多則未知其所以得實録之名者何故齊侯衛侯次于垂葭使師伐晉將濟河諸大夫皆曰不可邴意兹曰可鋭師伐河内傳必數日而後及絳絳不三月不能出河則我既濟水矣乃伐河内魯大蒐晉趙鞅謂邯鄲午曰歸我衛貢五百家吾舍諸晉陽午許諾歸告其父兄皆曰不可趙鞅怒遂殺午邯鄲叛上軍司馬籍秦圍邯鄲午荀寅之甥也寅士吉射之姻也而相與睦將作亂董安于聞之告趙鞅曰先備諸鞅曰晉國有命始禍者死為後可也二子伐趙氏之宫鞅奔晉陽荀躒言於晉侯曰君命大臣始禍者死載書在河今三臣始禍而獨逐鞅刑已不鈞請皆逐之荀躒韓不信魏曼多奉晉侯以伐二子弗克二子將伐公齊髙彊曰三折肱知為良毉惟伐君為不可我以伐君在此矣三家未睦可盡克也克之君將誰與若先伐君是使睦也弗聽遂伐公國人助之二子敗奔朝歌韓魏以趙氏為請趙鞅入于絳盟於公宫初衛公叔發朝而請享其君退而見史鰌曰子必禍矣子富而君貪罪其及乎曰然吾不先告子是吾罪也君既許我矣其若之何鰌曰何害子臣可以免富而能臣必免於難上下同之戍也驕其亡乎富而不驕者鮮吾惟子之見驕而不亡者未之有也戍必與焉及發卒衛侯始惡於戍以其富也戍又將去夫人南子之黨夫人愬之曰戍將為亂薛弑其君比子夷嗣越王允常薨子勾踐嗣孔子至蒲會公叔氏以蒲叛衛而止孔子曰茍無適衛吾則出子孔子許之盟而出遂適衛子貢曰盟可負乎孔子曰要我以盟非義也孔子主衛大夫顔讎由至于郊衛侯郊迎館之上館故孔子於衛有際可之仕王孫賈問曰與其媚於奥寜媚於竈何謂也子曰不然獲罪於天無所禱也彌子瑕之妻與子路之妻兄弟也彌子謂子路曰孔子主我衛卿可得也子路以告孔子不從曰有命衛公孫朝問於子貢曰仲尼焉學子貢曰文武之道未墜於地在人賢者識其大者不賢者識其小者莫不有文武之道焉夫子焉不學而亦何常師之有衛侯享孔子夫人南子使請曰四方之君子不辱與寡君為兄弟者必見寡小君寡小君願有見也孔子見之入門北靣稽首夫人在絺帷中再拜環珮玉聲璆然孔子出子路不説夫子矢之曰予所否者天厭之天厭之經曰十有三年齊侯衛侯次于垂葭夏築蛇淵囿大蒐于比蒲衛公孟彄帥師伐曹秋晉趙鞅入于晉陽以叛按左氏趙鞅謂邯鄲午曰歸我衛貢五百家吾舍諸晉陽午許諾告其父兄皆不可趙孟怒遂殺午圍邯鄲午荀寅之甥荀寅士吉射之姻也而相與睦遂伐趙氏鞅奔晉陽晉人圍之趙鞅之入拒范中行也而直書曰叛何也人臣專土與君為市則是簒弑之階堅氷之戒豈無以有己之義乎後世大臣有困於讒間遷延居外不敢釋兵卒以憂死者亦未明人臣之義故耳故直書入于晉陽以叛入者不順之詞叛者不赦之罪冬晉荀寅士吉射入于朝歌以叛按左氏知文韓簡魏襄子與荀寅范吉射相惡將逐荀范言於晉侯曰君命大臣始禍者死載書在河今三臣始禍而獨逐鞅刑不均矣請皆逐之遂奉公以伐二子二子敗奔朝歌晉主夏盟威服天下及大夫專政賄賂公行内外離析示威平丘而齊叛辭請召陵而蔡叛盟于沙鹹而鄭叛次于五氏而衛叛蒞于鄭㑹于夾谷㰱于黄而魯叛諸侯叛于外大夫叛于内故奔于晉陽而趙鞅叛入于朝歌而荀寅與士吉射叛以晉國之大天下莫强焉邦分崩而不能守也春秋於晉事或略而不序或賤而稱人或書以陋之責亦備矣至是三卿内叛直書于䇿見其效也故臧哀伯曰國家之敗由官邪也官之失德寵賂彰也晉卿始禍縁衛貢也樂祁見執獻楊楯也蔡侯從吳荀寅貨也昭公弗納范鞅賂也而晉室自是不復能主盟矣故為國以義不以利春秋之大法在焉見諸行事亦可謂深切著明矣晉趙鞅歸于晉按左氏荀范奔朝歌韓魏以趙氏為請鞅入于絳盟于公宫然則書歸者易詞也韓魏為之請晉侯許之復而寅與吉射去國出奔則無有難之者故其歸為昜矣三子之叛其罪一也鞅以有援故得復寅吉射以無助故終叛春秋書鞅歸于晉非與之也以罪晉侯縱失有罪無政刑耳叛逆人臣之大惡始禍晉國之載書既不能致辟于鞅奉行天討以警亂臣又亢不𠂻徇韓魏之請而許之復無政刑矣其能國乎先儒或謂言歸者以地正國也鞅取晉陽之甲以逐君側之惡人則其説誤矣以地正國而可是人主可得而脅人臣擅興無罪以兵諫者眞愛其君也使後世賊臣稱兵向闕以誅君側為名而實欲脅君取國者則此説啓之也大失春秋之意矣薛弑其君比稱國以弑者當國大臣也孫復以為舉國之衆皆可誅非矣三晉有國半天下若皆可誅刀鋸不亦濫乎潁川常秩曰孫復之於春秋動輒有罪蓋商鞅之法耳棄灰於道者有誅歩過六尺者有罰其不即人心逺矣王回以是尚秩此善議復者二十四年衛侯逐公叔戍戍奔魯其黨趙陽出奔宋頓子牂欲事晉背楚而絶陳好楚師陳師滅頓衛公叔戍之黨北宫結奔魯吳伐越越王禦之陳于欈李患吳師之整也使死士再禽焉不動使罪人三行屬劔於頸而辭曰二軍有治臣奸旗鼓不敏於君之行前不敢迯刑敢歸死自剄也師屬之目越王因而伐之大敗之靈姑浮以戈擊吳王傷將指取其一屨薨於陘去欈李七里子夫差嗣夫差使人立于庭茍出入必謂已曰夫差而忘越王之殺而父乎則對曰唯不敢忘晉人圍朝歌齊侯魯侯衛侯㑹于牽謀救朝歌齊侯又㑹宋于洮王使歸脤於魯衛夫人南子宋女也衛侯為之召宋公子朝太子蒯聵羞之謂戯陽速曰從我而朝少君少君見我我顧乃殺之速曰諾乃朝夫人太子三顧速不進夫人見其色啼而走曰太子將殺余公執其手以登臺太子奔宋盡逐其黨故公孟彄出奔鄭遂奔齊宋公子辰自蕭奔魯魯侯蒐于比蒲邾子來會魯城莒父冬衛侯為沼宛春諫曰君居深宫狐裘而熊席不知民之寒也乃命罷役左右曰德歸於春怨歸於君衛侯曰春魯之匹夫也寡人舉焉春之善非寡人之善歟孔子在衛喜籧伯玉史鰌嘗曰君子哉籧伯玉邦有道則仕邦無道則可卷而懐之直哉史魚邦有道如矢邦無道如矢衛侯問陳於孔子對曰爼豆之事則嘗聞之矣軍旅之事未之學也明日遂行匡人嘗為陽虎所暴孔子過匡匡人聚觀曰此陽虎也遂圍之從者不知所為孔子絃歌不輟莊周曰子路入見曰何夫子之娛也子曰居吾語汝當堯舜而天下無窮人非知得也當桀紂而天下無通人非知失也時勢適然夫水行不避蛟龍者漁父之勇也陸行不避虎兕者獵夫之勇也白刃交於前視死若生者烈士之勇也知窮之有命通之有時臨大難而不懼者聖人之勇也由處矣吾命有所制矣既而歎曰文王既沒文不在兹乎天之將喪斯文也後死者不得與於斯文也天之未喪斯文也匡人其如予何乃使從者問故匡人謝曰以為陽虎也遂圍之今非也請辭而去孔子遂如宋經曰十有四年春衛公叔戍來奔衛趙陽出奔宋公叔戍將去南子之黨夫人愬曰戍將為亂故公叔來奔趙陽北宫結皆戍黨也故亦出奔而靈公無道不能正家以䘮其大臣之罪著矣戍又以富見惡於衛侯夫富者怨之府也使戍積而能散以財發身不為貪人之所怨於以保其爵位儻庶幾乎二月辛巳楚公子結陳公孫佗人帥師滅頓以頓子牂歸夏衛北宫結來奔五月於越敗吳於檇李吳子光卒按左氏吳伐越勾踐禦之患其整也使罪人三行屬劔於頸吳師屬目因伐之闔閭傷而卒書敗者詐戰也定公五年於越入吳至是敗吳於檇李㑹黄池之嵗越又入吳悉書于史以其告也哀之元年吳子敗越棲勾踐於㑹稽之上豈獨不告而史册不書疑仲尼削之也吳子光卒夫差使人立於庭茍出入必謂已曰而忘越王之殺而父乎則對曰唯不敢忘三年乃報越然則夫椒之戰復父讎也非報怨也春秋削而不書以為常事也其㫖微矣公㑹齊侯衛侯于牽公至自㑹秋齊侯宋公㑹于洮天王使石向來歸脤衛世子蒯瞶出奔宋世子國本也以寵南子故不能保世子而使之去國以欲殺南子故不能安其身至於出奔是輕宗廟社稷之所付託而恣行矣春秋兩著其罪故特書世子其義不繫於與蒯聵之世其國也而靈公無道不能正家以危其國本至使父子相殘毁滅天理之所由著矣衛公孟彄出奔鄭宋公之弟辰自蕭來奔大蒐于比蒲邾子來㑹公城莒父及霄二十五年邾子朝于魯魯之郊牛為鼷䑕所食而死吳之入楚也胡子盡俘楚邑之近胡者楚既定胡子豹又不事楚曰存亡有命事楚何為多取費焉楚王滅之魯郊魯侯薨子蔣嗣鄭師伐宋敗宋師于老丘齊侯衛侯次于蕖蒢以救宋邾子奔魯侯之喪魯定公姒氏卒魯葬其君滕侯㑹焉魯葬定夫人魯城漆經曰十有五年春王正月邾子來朝鼷䑕食郊牛牛死改卜牛二月辛丑楚子滅胡以胡子豹歸按左氏吳之入楚胡子盡俘楚邑之近胡者楚既定又不事楚曰存亡有命事楚何為為是楚滅之夫滅人之國其罪大矣然胡子豹乗楚之約盡俘其邑之近胡者所謂國必自滅而後人滅之非滅之者獨有罪也國君造命不可委命者既以為有命而又貪生忍辱不死于社稷則是不知命矣書以歸罪豹之不能死位而與歸也故楚子書爵而胡子豹名夏五月辛亥郊壬申公薨于髙寢鄭罕達帥師伐宋齊侯衛侯次于蕖蒢邾子來奔喪秋七月壬申姒氏卒八月庚辰朔日有食之九月滕子來㑹葬丁巳葬我君定公雨不克葬戊午日下昃乃克葬辛巳葬定姒公羊曰有子則廟廟則書葬曽子問竝有喪則如之何子曰葬先輕而後重其奠也其虞也先重而後輕冬城漆二十六年魯侯蔣之元年楚圍蔡以報栢舉之役蔡人男女以辨使疆於江汝之間而還蔡復請遷于吳既又悔之魯有鼷䑕食郊牛魯人伐邾越王以吳王之將報越也興師伐之范蠡諫曰持盈者與天定傾者與人節事者與地天時不作不為人客人事不起不可為之始爭者事之末也淫佚者上帝之禁也若遂行之將妨於國家靡王躬身王不聽吳王禦之大破越王于夫椒乗勝入越越王以甲楯五千棲於㑹稽下令曰有能退吳者與共越國之政大夫種進曰臣聞之賈人夏則資皮秋則資絺旱則資車以待乏也今求謀臣無乃後乎勾踐曰茍得聞子大夫之言何後之有喟然嘆曰吾其己乎文種進曰湯繫夏臺文王囚羑里未必不為福乃卑辭乞成於吳吳王將許之伍員曰不可臣聞樹徳莫如滋去疾莫如盡昔有過澆滅夏少康以一旅之衆復禹舊績今吳不如過而越大於少康或將豐之不亦難乎勾踐能親而務施施不失人親不棄勞與我同壤而世為仇讎於是乎克而弗取將又存之而長宼讎後雖悔之不可食已吳王疑未決越使文種賂太宰嚭曰勾踐不敢徹聲於天王使臣私於執事願以身隨君王也嚭言於王曰古者伐國服之而已今越已服其又何求王許越平伍員告人曰越十年生聚而十年教訓二十年之外吳其為沼乎越王歸説於國人曰寡人之罪也寡人請更飬生葬死問傷弔憂賀喜去民之所惡補民之不足委管籥屬國家於大夫種與范蠡入官于吳三年而吳人遣之古者父之讎弗與共戴天兄弟之讎不反兵交遊之讎不同國是時人習於亂務相報復而無禮儀卜商問於孔子曰居父母之仇如之何孔子曰寢苫枕戈不仕弗與共天下也遇諸市朝不反兵而鬬曰居昆弟之仇如之何曰仕弗與共國銜君命而使雖遇之不鬬曰居從父昆弟之仇如之何曰不為魁主人能則執兵而陪其後君之仇視父師長之仇視昆弟吳侵陳脩先君之怨楚大夫皆懼公子申曰二三子䘏不相睦無患吳矣昔闔閭食不貳味居不重席室不崇壇器不雕鏤宫室不觀舟車不飾衣服財用擇不取費在國天有災癘親巡孤寡而共其乏困在軍熟食者分而後敢食勤恤其民而與之勞逸是以民不罷勞死知不曠今聞夫差次有臺榭陂池焉宿有妃嬙嬪御焉一日之行所欲必成玩好是從珍異是聚觀樂是務視民如讎而用之日新夫先自敗也已安能敗我孔子在宋有嘉樹焉時與弟子游息其下宋桓魋疾之乃伐其樹孔子去宋又將要殺之從者恐懼孔子曰天生德於予桓魋其如予何主司城貞子遂㣲服而去與門人相失至鄭東門外告子貢曰東門有人其顙似堯其項類臯陶其肩類子產自腰以下不及禹三寸纍纍若喪家之狗子貢以告孔子笑曰其形未也狀似喪家之狗然哉經曰元年春王正月公即位楚子陳侯隨侯許男圍蔡按左氏曰報柏舉也蔡人男女以辨使疆于江汝之間夫男女以辨則是降也疆于江汝則遷其國也而獨書圍蔡何也蔡嘗以吳師入郢昭王奔隨壊宗廟徙陳器撻平王之墓矣至是楚國復寜帥師圍蔡降其衆遷其國而春秋書之略者見蔡宜得報而楚子復讎之事可恕也聖人本無怨而怨出於不怨故議讎之輕重有至於不與共戴天者今楚人禍及宗廟辱逮父母若包羞忍耻而不能一洒之則不可以有立而天理滅矣故特書圍蔡而稱爵恕楚之罪詞也鼷鼠食郊牛改卜牛夏四月辛巳郊鼷䑕食郊牛改卜牛志不敬也夏四月郊書不時也四卜非禮五卜强也全曰牲傷曰牛已牛矣其尚卜免之何也常置之上帝矣故卜而後免之不敢專也昔者周公郊祀后稷以配天此成王亮隂之時位冢宰攝國政行天子之事也魯何以得郊成王追念周公有大勲勞於天下而欲尊魯故賜以重祭得郊禘大雩然則可乎孔子曰魯之郊禘非禮也周公其衰矣欲尊魯而賜以人臣不得用之禮樂豈所以康周公也哉天子祭天地諸侯祭社稷大夫祭五祀庶人祭其祖此定理也今魯得郊以為常事春秋欲削而不書無以見其失禮盡書之乎則有不勝書者故聖人因其失禮之中又有失焉者則書于䇿所謂由性命而發言也聖人奚容心哉因事而書以誌其失為後世戒其垂訓之義大矣秋齊侯衛侯伐晉冬仲孫何忌帥師伐邾二十七年甲子魯師伐邾將伐絞邾人愛其土遂以漷東田及沂西田求成魯人許之衛侯遊於郊公子郢僕公曰余無子將立女不對它日又謂之對曰郢不足以辱社稷君其改圗君夫人在堂三揖在下君命祗辱衛侯薨夫人曰命公子郢為世子君命也對曰郢異於它子且君沒於吾手若有之郢必聞之且亡人之子輒在乃立輒滕侯朝魯晉趙鞅納衛世子蒯瞶於戚宵迷陽虎曰右河而南必至焉使太子纔八人衰絰偽自衛逆者告於門哭而入遂居之齊人輸粟於朝歌鄭罕達駟𢎞送之晉趙鞅禦之遇於鐵鞅誓曰范氏中行氏反易天明斬艾百姓欲擅晉國而滅其君寡君恃鄭而保焉今鄭為不道棄君助臣二三子順天明從君命經德義除詬耻在此行也克敵者上大夫受縣下大夫受郡士田十萬庶人工商遂人臣𨽻圉免王良御衛世子為右鄭人擊鞅中肩斃於車中太子攻之以戈鄭師北獲齊粟千車衛葬其君吳洩庸如蔡納聘而稍納師師畢入衆知之蔡侯告大夫殺公子駟以説哭而遷墓遂遷于州來孔子在陳將之荆陳蔡大夫謀曰孔丘之徒所言皆中諸侯之病諸侯莫能用將適楚楚若用之陳蔡用事大夫危矣於是孔子絶糧季路愠見曰君子亦有窮乎孔子曰君子固窮小人窮斯濫矣居下而無憂者思不逺處身而常逸者志不廣夫芝蘭生於深林不以無人而不芳君子積德懐道不為困窮而改節夫遇不遇時也賢不肖材也君子脩身端行以俟其時凡七日藜羮不糝孔子絃歌不衰從者病莫能興臣於陳侯陳司敗問魯昭公知禮乎孔子曰知禮孔子退揖巫馬期而進曰吾聞君子不黨君子亦黨乎君娶於吳為同姓謂之吳孟子君而知禮孰不知禮巫馬期以告孔子曰丘也幸茍有過人必知之孟軻氏曰君子之厄於陳蔡之間無上下之交也經曰二年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田癸巳叔孫州仇仲孫何忌及邾子盟于句繹曷為列書三卿哀公得國不張公室三卿並將魯衆悉行伐國取地以盟其君而已不與焉適越之辱兆矣定公之薨邾子來奔䘮事魯恭矣而不免於見伐徒自辱焉不知以禮為國之故也邾在邦域之中不加矜恤而諸卿相繼伐之既取其田而又强與之盟不知以義睦鄰之故也故詳書以著其罪三人伐則曷為二人盟盟者各盟其所得也莫强乎季孫何獨無得季氏四分公室有其二昭公伐意如叔孫氏救意如而昭公孫陽虎囚桓子孟孫氏救桓子而陽虎奔今得邾田蓋季氏以歸二家而不取也夏四月丙子衛侯元卒滕子來朝晉趙鞅帥師納衛世子蒯聵于戚世子不言納位其所固有國其所宜君謂之儲副則無所事乎納矣凡公子出奔復而得國者其順且昜則曰歸有奉焉則曰自其難也則曰入不稱納矣况世子哉今趙鞅帥師以蒯瞶復國而書納者見蒯瞶無道為國人之所不受也國人不受而稱世子者罪衛人之拒之也所以然者縁蒯聵出奔靈公未嘗有命廢之而立他子及公之卒大臣又未嘗謀於國人數瞶之罪選公子之賢者以主其國乃從輒之所欲而居之以子拒父此其所以稱世子也人莫不愛其親而志於殺莫不敬其父而忘其䘮莫不慈其子欲其子之富且貴也而奪其位蒯聵之於天理逆矣何疑於廢黜然父雖不父子不可以不子輒乃據國而與之爭可乎故特係納衛世子蒯聵于戚于趙鞅帥師之下而鞅不知義靈公與衛國大臣不能早正國家之本以致禍亂其罪皆見矣秋八月甲戌晉趙鞅帥師及鄭罕達帥師戰于鐵鄭師敗績冬十月葬衛靈公十有一月蔡遷于州來蔡殺其大夫公子駟州來吳所滅也蔡雖請遷於吳而中悔吳人如蔡納聘而師畢入蔡侯告大夫殺公子駟以説哭而遷墓如此則實吳人之所遷也而經以自遷為文何也楚既降蔡使疆於江汝蔡人聽命而還師矣復背楚請遷於吳而又自悔也其謀之不臧甚矣夫遷國大事也盤庚五遷利害甚明衆猶胥怨不適有居至於丁寜反復播告之脩而後定也今蔡介于吳楚二大國之間背楚誑吳及其事急又委罪於執政其誰之咎也故經以自遷為文而殺公子駟則書大夫而稱國言君與用事大臣擅殺之也放公孫獵則書大夫而稱人言國亂無政衆人擅放之也駟與獵其以請遷于吳為非者乎而委之罪以説誰敢復有盡忠而與謀其國者哉二十八年齊師衛師圍戚求援于中山魯地震魯司鐸火火踰公宫桓宫僖宫災救火者皆曰顧府南宫説至命周人出御書俟于宫子服何至命宰人出禮書校人乗馬巾車脂轄百官官備府庫慎守官人肅給濟濡帷幕鬱攸從之蒙葺公屋自太廟始公父歜至命校人駕乗車季孫斯至御公立于象魏之外命藏象魏曰舊章不可亡也孔子在陳聞火曰其桓僖乎魯師城啓陽魯季孫斯卒是為桓子子肥代為政衛侯適在請弔魯侯辭不得命公為主客入弔肥立于門右北靣魯侯升自東階西鄉客升自西階弔魯侯拜興哭肥拜稽顙於位有如二孤非禮也古者其君後主人而拜曾子問曰喪有二孤廟有二主禮歟孔子曰天無二日土無二王家無二主尊無二上未知其為禮也廟有二主自齊桓始也喪有二孤自季康子之過也秦伯薨子某嗣魯師圍邾晉趙鞅攻朝歌荀寅奔邯鄲孔子在陳復將之荆先之以子夏又申之以冉有過葉葉公語孔子曰吾黨有直躬者其父攘羊而子證之子曰吾黨之直者異於是父為子隱子為父隱直在其中矣葉公問政孔子曰近者説逺者來葉公問孔子於子路子路不對子曰女奚不曰其為人也發憤忘食樂以忘憂不知老之將至云爾孔子至楚楚王大喜將封之公子申諫曰周文王百里之君卒王天下今孔丘述三五之道明周召之業又有羣賢為之輔王誠封之非國之福也王乃止楚狂接輿歌而過孔子曰鳯兮鳯兮何德之衰也來世不可待也徃世不可追也天下有道聖人成焉天下無道聖人生焉方今之時僅免刑焉福輕乎羽莫之知載禍重乎地莫之知避已乎己乎臨人以德殆乎殆乎畫地而趨迷陽迷陽無傷吾行吾行卻曲無傷吾足山木自宼也膏火自煎也桂可食故伐之漆可用故割之人皆知有用之用而不知無用之用也孔子下欲與之言趨而避之不得與之言或曰接輿姓陸名通孔子去楚長沮桀溺耦而耕孔子過之使子路問津焉長沮曰夫執輿者為誰曰為孔丘是魯孔丘與曰是也是知津矣問於桀溺桀溺曰子為誰曰為仲由是魯孔丘之徒與曰然曰滔滔者天下皆是也而誰與易之且而與其從辟人之士也豈若從辟世之士哉耰而不輟子路行以告夫子憮然曰鳥獸不可與同羣吾非斯人之徒與而誰與天下有道丘不與易也子路從而後遇丈人以杖荷篠子路問曰子見夫子乎丈人曰四體不勤五糓不分孰為夫子植其杖而耘子路拱而立止子路宿殺雞為黍而食之見其二子焉明日子路行以告子曰隱者也使子路反見之至則行矣子路曰不仕無義長幼之節不可廢也君臣之義如之何其廢之欲潔其身而亂大倫君子之仕也行其義也道之不行已知之矣孔子復歸于陳經曰三年春齊國夏衛石曼姑帥師圍戚按左氏靈公遊于郊公子郢御公曰余無子將立汝對曰郢不足以辱社稷君其改國君夫人在堂三揖在下君命祗辱靈公卒夫人曰命公子郢為太子君命也對曰郢異於他子且君没於吾手若有郢必聞且亡人之子輒在乃立輒以拒蒯聵前稱世子者所以深罪輒之見立不辭而拒其父也輒若可立則蒯瞶為未絶未絶則是世子尚存而可以拒乎主兵者衛也何以序齊為首罪齊人與衛之為惡而黨之也公孫文仲主兵伐鄭而序宋為首以誅蕩公石曼姑主兵圍戚而序齊為首以誅國夏訓天下後世討亂臣賊子之法也古者孫從祖又孫氏王父之字考於廟制昭常為昭穆常為穆不以父命辭王父命理也輒雖由嫡孫得立然非有靈公之命安得云受之王父辭父命哉故冉有謂子貢曰夫子為衛君乎子貢曰諾吾將問之入曰伯夷叔齊何人也曰古之賢人也怨乎曰求仁而得仁又何怨出曰夫子不為也伯夷以父命為尊而讓其弟叔齊以天倫為重而讓其兄仲尼以為求仁而得仁者也然則為輒者奈何宜辭於國曰若以父為有罪將從王父之命則有社稷鎮公子在我焉得為君以為無罪則國乃世子之所有也天下豈有無父之國哉而使我立乎其位如此則言順而事成矣是故輒辭其位以避父則衛之臣子拒蒯瞶而輔之可也輒利其位以拒父則衛之臣子舍爵禄而去之可也烏有父不慈子不孝爭利其國滅天理而可為者乎夏四月甲午地震五月辛卯桓宫僖宫災桓僖親盡矣其宫何以存季氏者出于桓立於僖世專魯國之政其諸以是為恱而不毁歟何以不稱及等也稱及則祖有尊卑矣或謂祖有功宗有德所以勸也則如之何曰孝子慈孫事其祖考仁也奚問其功徳之有無也必若此言是子孫得選擇其祖宗而尊事之矣豈理也哉季孫斯叔孫州仇帥師城啓陽宋樂髠帥師伐曹秋七月丙子季孫斯卒蔡人放其大夫公孫獵于吳冬十月癸卯秦伯卒叔孫州仇仲孫何忌帥師圍邾皇王大紀卷六十五

body:
  text: 皇王大紀卷三十一宋胡宏撰三王紀幽王二年涇渭洛三川震伯陽父曰天地之氣不失其序若過其序民亂之也陽伏而不能出隂迫而不能蒸於是有地震陽失而在隂川源必塞塞必竭竭必崩夫國依山川而崩竭亡之徴也昔伊洛竭而夏亡河竭而商亡今周德若二代之季矣不亡何待若亡不過十年天之紀也未幾三川竭岐山崩小雅三十七篇曰節南山十章六章章八句四章章四句家父刺幽王也節髙峻貌彼南山維石巖巖積石貌赫赫顯盛貌師尹尹氏民具俱也爾瞻視也憂心如惔燔也不敢戲談國既卒盡也斬斷也何用不監視也節彼南山有實滿也其猗長也赫赫師尹不平謂何天方薦重也瘥病也喪亂𢎞多民言無嘉憯曾莫懲嗟尹氏大師維周之氐本也秉國之均平也四方是維制也持也天子是毗輔也俾民不迷不弔至也昊天不宜空窮也我師弗躬弗親庶民弗信弗問弗仕察也勿罔君子式夷式已用平則巳也無小人殆瑣瑣小貌姻亞則無膴仕壻之父相謂曰姻兩壻曰亞膴厚也昊天不傭均也降此鞠盈也訩訟也昊天不惠降此大戾乖也君子如屆極也俾民心闋息也君子如夷平易也惡怒是違則民乖爭之情去不弔昊天亂靡有定式月斯生月月益甚也俾民不寧憂心如酲病酒曰酲誰秉國成平也不自為政卒勞百姓駕彼四牡四牡項大也領我瞻四方蹙蹙縮小貌靡所騁馳也方茂勉也爾惡相爾矛矣既夷既懌服也如相酬酢也矣昊天不平我王不寧不懲其心覆怨其正長也家父大夫也作誦以究王訩式訛化也爾心以畜萬邦三年初王娶于申生太子宜臼又得褒姒王愛之甚生子伯服有虢石父者以巧佞得幸比於褒姒而譖太子及申后王信之廢后黜太子於申立伯服為太子以石父為卿王之世日暈再重內赤外青中有黑畫貫上下小雅三十八篇曰正月十二章八章章八句五章章六句大夫刺幽王也正月夏四月繁多也霜我心憂傷民之訛言亦孔之將大也念我獨兮憂心京京憂不去也哀我小心癙病也憂以癢亦病也父母生我胡俾我愈病也不自我先不自我後好言自口莠醜也言自口憂心愈愈憂懼也是以有侮憂心惸惸憂意也念我無祿民之無辜并其臣僕古者有罪不入于刑則役之圜上以為臣僕哀我人斯于何從祿瞻烏爰止于誰之屋富人之屋烏所集也瞻彼中林侯維也薪侯蒸民今方殆危也視天夢夢夢夢然亂也既克有定靡人弗勝有皇上帝伊誰云憎惡也謂山蓋卑為岡為陵在位非君子也民之訛言寧莫之懲召彼故老元老也訊問也之占夢具曰豫聖誰知烏之雌雄謂天蓋髙不敢不局曲也謂地蓋厚不敢不蹐纍足也維號斯言有倫道也有脊理也哀今之人胡為虺蜴螈也瞻彼阪田﨑嶇之處有菀其特菀然特茂天之扤動也我如不我克謂其迅疾也彼求我則如不我得執我仇仇匹也類也亦不我力心之憂矣如或結之今茲之正長也胡然厲惡也矣燎之方揚寧或滅之赫赫宗周褒姒滅之終其永懷又窘困也隂雨喻君有難其車既載乃棄爾輔載輸墮也爾載將請也伯長也助子無棄爾輔員益也于爾輻屢顧爾僕不輸爾載終踰絶險曾是不意不以為意魚在于沼亦匪克樂濳雖伏矣亦孔之照憂心慘慘念國之為虐彼有旨酒又有嘉殽言禮物備洽比其鄰昏姻孔云念我獨兮憂心殷殷痛也佌佌小也彼有屋䔩䔩陋也方有穀民今之無祿天夭是椓夭之椓之也哿可也矣富人哀此惸獨小雅三十九篇曰十月之交八章章八句大夫刺幽王也十月之交朔日辛卯日有食之亦孔之醜彼月而微此日而微月臣道日君道今此下民亦孔之哀日月告凶不用其行四國無政不用其良彼月而食則維其常此日而食于何不臧􅏎燁震電不寧不令百川沸騰山冡崒崩髙岸為谷深谷為陵哀今之人胡憯莫懲皇父卿士番維司徒家伯冢宰仲允膳夫棸子內史蹶維趣馬楀維師氏皇父家伯仲允皆字番棸蹶楀皆氏豔妻褒姒美色曰豔煽熾也方處抑此皇父豈曰不時是也胡為我作不即我謀徹我牆屋田卒汙萊下則汙髙則萊曰豫不戕禮則然矣皇父孔聖自謂聖也作都于向邑名擇三有事侯國三卿亶侯多藏信維貪人多藏也不憖遺一老俾守我王擇有車馬以居徂向黽勉從事不敢告勞無罪無辜讒口囂囂下民之孽匪降自天噂沓背憎職競由人悠悠憂也我里居也亦孔之痗病也四方有羡我獨居憂民莫不逸我獨不敢休天命不徹道也通也我不敢效我友自逸親屬之臣心不能已小雅四十篇曰雨無正七章二章章十句二章章八句三章章六句大夫刺幽王也雨自上下者也衆多如雨而非所以為政也浩浩昊天不駿長也其德降喪飢饉穀不熟曰飢蔬不熟曰饉斬伐四國旻天疾威弗慮弗圖舍除也彼有罪既伏其辜若此無罪淪率也胥相也以鋪遍也周宗既滅靡所止戾定也正長也大夫離居莫知我勩勞也三事大夫莫肯夙夜邦君諸侯莫肯朝夕庶曰式臧覆反也出為惡如何昊天辟法也言不信如彼行邁則靡所臻凡百君子各敬爾身胡不相畏不畏于天戎兵也成不退飢成不遂安也曾我暬侍也御憯憯日瘁病也凡百君子莫肯用訊聽言則答譖言則退哀哉不能言匪舌是出維躬是瘁哿矣能言巧言如流哿矣世所謂能言也巧言從俗如水轉流俾躬處休維曰于往也仕孔棘且殆云不可使得罪于天子亦云可使怨及朋友謂爾遷于王都曰豫未有室家賢者不肯遷于王都也鼠憂也思泣血無聲曰泣血無言不疾無所言而不見疾也昔爾出居誰從作爾室遭亂世義不得去思其友而不肯反者也小雅四十一篇曰小旻六章三章章八句三章章七句大夫刺幽王也旻天疾威敷于下土謀猶回辟也遹辟也何日斯沮謀臧不從不臧覆用我視謀猶亦孔之卬病也潝潝訿訿亦孔之哀謀之其臧則具是違謀之不臧則具是依我視謀猶伊于胡底我龜既厭不我告猶謀夫孔多是用不集發言盈庭誰敢執其咎如匪行邁謀是用不得于道哀哉為猶匪先民是程匪大猶是經維邇言是聽維邇言是爭如彼築室于道謀是用不潰遂也于成國雖靡止或聖或否民雖靡膴或哲或謀或肅或艾如彼泉流無淪胥以敗不敢暴虎不敢馮河人知其一莫知其他戰戰兢兢如臨深淵如履薄冰小雅四十二篇曰小宛六章章六句大夫刺幽王也宛小貌彼鳴鳩鶻雕翰飛戾天言行小人道責髙明之功終不可得我心憂傷念昔先人明發發夕至明不寐有懷二人文王武王人之齊聖飲酒溫克彼昏不知一醉日富各敬爾儀天命不又中原有菽庶民采之言采者則得之螟蛉桑蟲也有子果螺蒲盧也負之持也教誨爾子式榖似之題視也睇也彼脊令載飛載鳴飛且鳴不能自舍君子有取節爾我日斯邁而月斯征夙興夜寐無忝爾所生交交小貌桑扈率場啄粟竊脂也竊脂肉食今無肉而循場啄粟失其食性不能自活哀我填寡宜岸訟也宜獄握粟出卜自何能榖溫溫恭人如集于木恐墜也惴惴小心如臨于谷恐隕也戰戰兢兢如履薄氷小雅四十三篇曰小辨八章章八句刺幽王也太子之傅作焉辨樂也彼鸒卑居雅烏也斯歸飛提提羣貌民莫不穀我獨于罹言遭褒姒之難何辜于天我罪伊何心之憂矣云如之何踧踧平易也周道鞠窮也為茂草我心憂傷惄思也焉如搗心疾也假寐永嘆維憂用老心之憂矣疢如疾首維桑與梓必恭敬止父之所樹已尚不敢不恭敬靡瞻匪父靡依靡母不屬于毛不離于裏毛在外陽也言父裏在內隂也言母天之生我我辰時也安在菀彼桞斯鳴蜩嘒嘒有漼深也者淵萑葦淠淠衆也譬彼舟流不知所屇心之憂矣不遑假寐鹿斯之奔維足伎伎舒貌雉之朝雊尚求其雌譬彼壞木疾用無枝心之憂矣寧莫之知相彼投兔尚或先之行有死人尚或墐之路冢曰墐君子秉心維其忍之心之憂矣涕既隕之君子信讒如或酬之君子不惠不舒究之伐木掎矣掎其巔析薪扡矣隨其理舍彼有罪豫之他矣加也莫髙匪山莫浚匪泉君子無易由言耳屬于垣無逝我梁無發我笱我躬不閲遑恤我後小雅四十四篇曰巧言六章章八句刺幽王也大夫傷於讒故作是詩也悠悠昊天曰父母且無罪無辜亂如此憮大也昊天已威子慎無罪昊天泰憮豫慎無辜亂之初生僭始既涵容也亂之又生君子信讒君子如怒亂庶遄沮君子如祉亂庶遄已君子屢盟亂是用長君子信盜亂是用暴盜言孔甘亂是用餤進也匪其止共維王之卬病也奕奕寢廟君子作之秩秩進智也大猷聖人莫之他人有心豫忖度之躍躍毚兔狡兔也遇犬獲之荏染柔意柔木椅桐梓漆也君子樹之往來行言心焉數之蛇蛇淺意碩言出自口矣巧言如簧顔之厚矣彼何人斯居河之麋水草之交無拳力也無勇職為亂階既微骭痬也且腫腫足也爾勇伊何為猶將多爾居徒幾何小雅四十五篇曰何人斯八章章六句蘇公刺暴公也暴公為卿士而譖蘇公焉故蘇公作是詩而絶之彼何人斯其心孔艱胡逝我梁不入我門伊誰云從維暴之云二人從行誰為此禍胡逝我梁不入唁我始者不如今云不我可彼何人斯胡逝我陳堂塗也我聞其聲不見其身不愧于人不畏于天彼何人斯其為飄風胡不自北胡不自南胡逝我梁秪攪亂也我心爾之安行亦不遑舍爾之亟行遑脂爾車一者之來云何其旴爾還而入我心易説也也還而不入否難知也一者之來俾我祇病也也伯氏吹塤土曰塤仲氏吹篪竹曰篪及爾如貫諒不我知出此三物豕犬雞以詛爾斯為鬼為蜮則不可得有靦姡然也面目視人罔極作此好歌以極反側不正直也小雅四十六篇曰巷伯七章四章章四句一章五句一章八句一章六句刺幽王也寺人傷於讒故作是詩也萋兮斐兮成是貝錦文章相錯成餘泉餘蚳之貝文也彼譖人者亦已太甚哆兮侈兮成是南箕箕星哆然踵狹而舌廣今讒人因寺人之近嫌而成言其罪猶因箕星之哆而又侈大之彼譖人者誰適與謀緝緝口舌聲翩翩往來貌謀欲譖人慎爾言也謂爾不信捷捷幡幡謀欲譖言豈不爾受既其女遷驕讒也人好好喜也勞人憂譖者草草勞心也蒼天蒼天視彼驕人矜此勞人彼譖人者誰適與謀取彼譖人投畀豺虎豺虎不食投畀有北有北不受投畀有昊楊園園名之道猗加也于畝丘寺人孟子作為此詩凡百君子敬而聽之小雅四十七篇曰谷風三章章六句刺幽王也天下俗薄朋友道絶焉習習谷風維風及雨將恐將懼維豫與女將安將樂女轉棄豫習習谷風維風及頽頽風之焚輪者也風薄相扶而上將恐將懼置豫于懷將安將樂棄豫如遺習習谷風維山崔嵬無草不死無木不萎忘我大德思我小怨小雅四十八篇曰蓼莪六章四章章四句二章章八句刺幽王也民人勞苦孝子不得終養爾蓼蓼長大貌者莪匪莪伊蒿哀哀父母生我劬勞蓼蓼者莪匪莪伊蔚牡菣也哀哀父母生我勞瘁瓶之罄矣盡也維罍之恥瓶小罍大鮮民之生不如死之久矣無父何怙無母何恃出則銜恤入則靡無也至父兮生我母兮鞠我拊我畜我長我育我顧我復我出入腹我子行父母之神行欲報之德昊天罔極南山烈烈飄風發發民莫不榖我獨何害南山律律飄風弗弗民莫不榖我獨不卒小雅四十九篇曰大東七章章八句刺亂也東國困於役而傷於財談大夫作是詩以告病焉有饛滿也簋飱熟食謂黍稷也有救長貌棘赤心也匕周道如砥平也其直如矢不偏也君子所履小人所視眷反領也言顧之潸焉出涕小東大東小亦於東大亦於東也杼柚其空糾糾葛屨可以履霜佻佻獨行貌公子談公子行彼周行既往既來使我心疚有冽寒意氿泉側出無浸穫艾也薪契契憂苦也寤歎哀我憚人勞也薪是穫薪尚可載也哀我憚人亦可息也東人談人之子職勞不來西人周人也之子粲粲衣服舟人之子舟楫之人熊羆是裘言富也私人之子私家也百僚是試試用於百官也或以其酒不以其漿或醉於酒或不得漿鞙鞙長貌佩璲不以其長不稱也維天有漢天河也監亦有光光而不明跂彼織女終日七襄襄駕也從旦至莫七辰而一移因謂之七襄雖則七襄不成報章不能反報成章睆明貌彼牽牛不以服牝服也箱車箱也東有啓明西有長庚太白旦出東為啓明莫出西為長庚有救天畢載施之行畢掩兔之器救畢貌何嘗見其可用乎鄭曰畢祭器所以助載鼎今天畢則施於行列而已維南有箕不可以簸揚維北有斗不可以挹㪺也酒漿維南有箕載翕合也其舌維北有斗西柄之揭小雅五十篇曰四月八章章四句大夫刺幽王也在位貪殘下國搆禍怨亂並興焉四月維夏六月徂往也或曰猶始也暑先祖匪人胡寧忍豫秋日凄凄百卉具腓病也亂離瘼矣奚其適歸冬日烈烈飄風發發民莫不穀我獨何害山有嘉卉侯栗侯梅廢􅏸也為殘賊莫知其尤相彼泉水載清載濁我日構禍曷云能穀滔滔江漢南國之紀盡瘁以仕寧莫我有匪鶉匪鳶鶉雕也雕鳶貪殘之烏翰飛戾天匪鱣匪鮪濳逃于淵山有蕨薇隰有杞枸檵也桋赤棟也君子作歌維以告哀小雅五十一篇曰北山六章三章章六句三章章四句大夫刺幽王也役使不均已勞於從事不得養其父母焉陟彼北山言采其杞偕偕強壯貌士子朝夕從事王事靡盬不堅固也憂我父母溥天之下莫非王土率土之濵莫非王臣大夫不均我從事獨賢四牡彭彭不得息王事傍傍不得已嘉我未老鮮善也我方將壯也旅力方剛經營四方或燕燕居息或盡瘁事國或息偃在床或不已于行或不知呌號呼召也或慘慘劬勞或棲遲偃仰或王事鞅掌失容也或湛樂飲酒或慘慘畏咎或出入風議或靡事不為小雅五十二篇曰無將大車三章章四句大夫悔將小人也無將大車大車小人之所將也祇自塵兮無思百憂祇自疷病也兮無將大車維塵冥冥無思百憂不出于熲光也無將大車維塵雍兮猶蔽也無思百憂祗自重兮猶纍也小雅五十三篇小明五章三章章十二句二章章六句大夫悔仕於亂世也明明上天照臨下土我征徂西至于艽野遠荒之地二月初吉朔日載離寒暑心之憂矣其毒大苦念彼共人涕零如雨豈不懷歸畏此罪罟網也昔我往矣日月方除除陳生新鄭云四月為除曷云其還嵗聿云莫念我獨兮我事孔庶心之憂矣憚勞也我不暇念彼共人眷眷懷顧豈不懷歸畏此譴怒昔我往矣日月方奧暖也曷云其還政事愈蹙嵗聿云莫采蕭穫菽心之憂矣自詒伊戚念彼共人興言出宿豈不懷歸畏此反覆嗟爾君子無恆安處靖共爾位正直正直為正能正人之曲曰直是與神之聽之式榖以女嗟爾君子無恆安息靖共爾位好是正直神之聽之介大也爾景亦大也福小雅五十四篇曰鼓鐘四章章五句刺幽王也鼓鐘將將淮水湯湯憂心且傷淑人君子懷允不忘鼓鐘喈喈淮水湝湝憂心且悲淑人君子其德不回鼓鐘伐鼛大鼓淮有三洲憂心且妯動也淑人君子其德不猶鼓鐘欽欽鼓瑟鼓琴笙磬同音謂四縣皆同也以雅以南以籥不僭小雅五十五篇曰楚茨六章章十二句刺幽王也政煩賦重田萊多荒飢饉降喪民卒流亡祭祀不饗故君子思古焉楚楚茨棘也者茨言抽除也其棘自昔何為我藝黍稷我黍與與我稷翼翼我倉既盈我庾露積日庾維億萬萬曰億以為酒食以享以祀以妥安坐也以侑勸也以介景福濟濟蹌蹌潔爾牛羊以往蒸嘗或剝或亨或肆或將祝祭于祊祀事孔明先祖是皇大也神保是饗孝孫有慶報以介福萬壽無疆執㸑踖踖為俎孔碩或燔或炙君婦莫莫言清靜而敬至也為豆孔庶為賔為客獻酬交錯東西為交邪行為錯禮儀卒度笑語卒獲神保是格報以介福萬夀攸酢報也我孔熯敬也矣式禮莫愆工祝致告善其事曰工徂賚孝孫苾芬孝祀神嗜飲食卜爾百福如幾期也如式法也既齊既稷疾也即也既匡既勑永錫爾極時萬時億禮儀既備鍾鼓既戒孝孫徂位工祝致告神具醉止皇尸載起鼓鐘送尸神保聿歸諸宰君婦廢徹不遲諸父兄弟備言燕私樂具入奏以綏後祿爾殽既將莫怨具慶既醉既飽小大稽首神嗜飲食使君壽考孔惠孔時維其盡之子子孫孫勿替引之小雅五十六篇曰信南山六章章六句刺幽王也不能修成王之業疆理天下以奉禹功故君子思古焉信彼南山維禹甸治也之畇畇墾辟貌原隰曾孫田之我疆我理南東其畝或南或東上天同雲雨雪氛氛益之以霡霂小雨也既優既渥既霑既足生我百穀疆埸畔也翼翼讓畔也黍稷彧彧曾孫之穡以為酒食畀我尸賔壽考萬年中田有廬疆埸有瓜是剝是菹剝瓜為菹也獻之皇祖曾孫壽考受天之祜祭以清酒從以騂牡享于祖考執其鸞刀刀有鸞者言割中節也以啓其毛取其血膋是蒸進也是享苾苾芬芬祀事孔明先祖是皇報以介福萬夀無疆小雅五十七篇曰甫田四章章十句刺幽王也君子傷今而思古焉倬明貌彼甫田謂天下田也或曰甫夫也嵗取十千一成之稅也我取其陳食我農人自古有年今適南畝或耘除草也或耔雍本也黍稷薿薿攸介攸止蒸我髦士以我齊明器實曰齊在器曰盛與我犧羊以社以方迎四方氣於郊也我田既臧農夫之慶琴瑟擊鼓以御迎也田祖以祈甘雨以介助也我稷黍以榖善也飬也我士女曾孫來止以其婦子饁彼南畝田畯至喜攘其左右嘗其旨否禾易治也長竟也畝終善且有曾孫不怒農夫克敏曾孫之稼如茨屋也如梁車梁也曾孫之庾如坻如京髙丘也乃求千斯倉乃求萬斯箱車也黍稷稻粱農夫之慶報以介福萬夀無疆小雅五十八篇曰大田四章二章章八句二章章九句刺幽王也言鰥寡不能自存焉大田多稼既種既戒既備乃事以我覃利也耜俶載南畝播厥百穀既庭直也且碩曾孫是若既方生房也既皂漸成實也既堅既好不稂不莠擇種之善去其螟食心者螣食葉者及其蟊食根者賊食節者無害我田稚田祖有神秉畀炎火有淹雲興貌萋萋雲行貌興雨祁祁徐也雨我公田遂及我私彼有不穫稚此有不斂穧彼有遺秉此有滯穗伊寡婦之利曾孫來止以其婦子饁彼南畝田畯至喜來方禋祀以其騂牛也黑羊豕也與其黍稷以享以祀以介景福小雅五十九篇曰瞻彼洛矣三章章六句刺幽王也思古明王能爵命諸侯賞善罰惡焉瞻彼洛矣維水泱泱深廣貌君子至止福祿如茨韎韐茅搜染祭服之韠也合韋為之有奭以作六師瞻彼洛矣維水泱泱君子至止鞞琫有珌容刀之鞞也琫上飾珌下飾天子玉琫而珧珌諸侯琫而璆珌大夫鐐琫而鏐珌士珕琫而珕珌君子萬年保其家室瞻彼洛矣維水泱泱君子至止福祿既同君子萬年保其家邦晉侯費薨諡曰穆侯世子仇嗣趙叔帶造父之七世孫也以王無道去之晉晉人受之趙氏始建於晉荆季紃立熊渠之四世孫也聰明和協蓋其先人四年秦莊公薨子襄公嗣秦國風二篇曰駟驖三章章四句美襄公也始命有田狩之事園囿之樂焉駟驖驪也孔阜大也六轡在手四馬六轡言馬之良也公之媚子能以道媚于上下者從公于狩奉時是也辰時也牡辰牡孔碩冬獻狼夏獻麋春秋獻鹿豕群獸公曰左之舍拔矢末也則獲遊于北園四馬既間習也輶輕也車鸞鑣置鸞於鑣載獫歇驕田犬也長喙曰獫短喙曰歇驕秦國風三篇曰小戎三章章十句美襄公也備其兵甲以討西戎西戎方強而征伐不休國人則矜其車甲婦人能閔其君子焉小戎兵車也俴收軫也五五束也楘歷録也梁輈輈上句衡也一輈五束束有歷録遊環靷環也在背上貫驂之外轡以禁其出脅驅脅驅者著服馬之外脅以止驂之入隂掩軓也在軾前垂輈上也靷所以引也鋈白金也續續靷也以白金飾續引之環文茵虎皮也暢轂長轂也駕我騏騏文也馵左足白也言念君子溫其如玉在其板屋西戎板屋亂我心曲四牡孔阜六轡在手騏駵赤身黑鬛也是中中服也騧黃馬黑喙也驪是驂兩騑也龍盾之合盡龍其盾合而載之鋈以觼軜軜驂內轡也繫於軾前軜之角以白金為飾也言念君子溫其在邑在敵邑也方何為期胡然我念之俴駟四介馬也孔羣甚和調也厹矛三隅矛也鋈錞鐏也蒙雜羽也伐中干也有苑以雜羽飾中干苑然有文也虎韔弓室也以虎皮飾弓室也鏤膺膺馬帶鏤金為飾交韔二弓交二弓於韔也竹閉紲也緄繩也縢約也言念君子載寢載興厭厭安靜也良人秩秩有知也德音秦國風四篇曰蒹葭三章章八句刺襄公也未能用周禮將無以固其國焉蒹簾也葭蘆也蒼蒼盛也白露為霜白露凝寒為霜然後嵗事成國家由禮然後固所謂伊人在水一方在水之一方難得其來也遡洄逆流而上也從之道阻且長遡遊順流而涉也從之宛在水中央蒹葭凄凄白露未晞未乾為霜也所謂伊人在水之湄水隒也遡洄從之道阻且躋升也遡遊從之宛在水中坻水渚也蒹葭采采白露未已猶未止也所謂伊人在水之涘水崖也遡洄從之道阻且右出其右也遡遊從之宛在水中沚亦小渚也陳侯燮立僖公曾孫也小雅六十篇曰裳裳者華四章章六句刺幽王也古之仕者世祿小人在位則讒諂並進棄賢者之類絶功臣之世焉裳裳猶堂堂也者華其葉湑盛貌兮我覯之子我心寫兮我心寫兮是以有譽處兮裳裳者華藝盛也其黃矣我覯之子維其有章矣維其有章矣是以有慶矣裳裳者華或黃或白我覯之子乘其四駱乘其四駱六轡沃若言世祿也左之左之君子宜之右之右之君子有之左陽道朝祀事右隂道喪戎之事也維其有之是以似嗣也之小雅六十一篇曰桑扈四章章四句刺幽王也君臣上下動無禮文焉交交飛來往貌桑扈有鶯其羽鶯然有文章君子樂胥皆也受天之祜交交桑扈有鶯其領頸也君子樂胥萬邦之屏蔽也之屏之翰幹也百辟為憲法也不戢斂也不難難也受福不那多也兕觥鄭云罰爵也其觩觩然陳設貌旨酒思柔彼交匪敖萬福來求小雅六十二篇曰鴛鴦四章章四句刺幽王也思古明王交於萬物有道自奉養有節焉鴛鴦于飛畢之羅之取之以道於其飛而取之也君子萬年福祿宜之鴛鴦在梁戢其左翼言休息無恐也君子萬年宜其遐福乘馬在廄摧之莝也秣之粟也言愛國用也君子萬年福祿艾養也之乘馬在廄秣之摧之君子萬年福祿綏之小雅六十三篇曰頍辨三章章十二句諸公刺幽王也暴戾無親不能宴樂同姓親睦九族孤危將亡故作是詩也有頍者辨頍辨貌實維伊何爾酒既旨爾殽既嘉豈伊異人兄弟匪他蔦寄生也與女蘿菟絲松蘿也諸公自喻也施于松柏未見君子憂心奕奕奕奕然無所薄也既見君子庶幾説懌有頍者辨實維何期爾酒既旨爾殽既時豈伊異人兄弟具來蔦與女蘿施于松上未見君子憂心怲怲盛滿也既見君子庶幾有臧有頍者辨實維在首爾酒既旨爾殽既阜豈伊異人兄弟甥舅如彼雨雪先集維霰死喪無日無幾相見樂酒今夕君子維宴小雅六十四篇曰車舝五章章六句大夫刺幽王也褒姒妬嫉無道並進讒巧敗國德澤不加於民周人思得賢女以配君子故作是詩也間關車之舝兮間關設舝也思孌季女逝兮匪飢匪渴德音來括會也雖無好友式燕且喜依茂木貌彼平林平地之林有集維鷮雉也辰時也彼碩女令德來教式燕且譽好爾無射雖無旨酒式飲庶幾雖無嘉殽式食庶幾雖無德與女式歌且舞陟彼髙岡析其柞薪析其柞薪其葉湑兮鮮善也我覯爾我心寫兮髙山仰止景大也行行止四牡騑騑六轡如琴覯爾新昏以慰我心小雅六十五篇曰青蠅三章章四句大夫刺幽王也營營往來貌青蠅止于樊藩也豈弟君子無信讒言營營青蠅止于棘讒人罔極極猶已也交亂四國營營青蠅止于榛讒人罔極構合也我二人皇王大紀卷三十一

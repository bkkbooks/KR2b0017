body:
  text: 皇王大紀卷四宋胡宏撰五帝紀帝舜有虞氏元載舜踐天子位都于蒲阪建旗乘鸞車號有虞以土德王封丹朱於實沈之墟是為唐以奉其先祀服其服禮樂如之以客見天子天子弗臣示不敢專也封象於有庳論曰蘇黃門曰世未有不能承其父母而能治天下者斯言信矣象日以殺舜為事固非在妻二女之後此萬章之失也以象之傲而欲殺舜世有傳之者安能其必無乎就其事以處兄弟之間亦可以為訓不必深辨也且弟以殺兄為事在常人則或有報復之心在賢者則必引咎自責不藏怒不宿怨也在聖人則哀矜而訓誘之矣是舜封象於有庳使吏治其國而享其衣食租賦欲常常而見之使源源而來友之至也先儒乃以有庳為今之舂陵吁舜都蒲阪使誠封象於是則欲常常而見之使源源而來適以道斃之也然則有庳當何居殆畿內之地歟觀此則漢文之於淮南晉武之於齊攸宋太祖之於義康唐太宗之於元吉莫不有慙德可以為世戒矣行戊午厯作布政之宫曰五府又曰總章畏天而愛民恤逺而親近好問而好察邇言隱惡而揚善執其兩端用其中於民于是日月光華卿雲叢聚作五絃之琴詠南風之詩曰南風之薰兮可以解吾民之慍兮南風之時兮可以阜吾民之財兮巧於使民不窮其力天下無佚民割青州碣石北遼東之地為營州割冀州恆山以北燕薊之地為幽州割冀太行西北之地為并州南撫交趾西發氐羌北發山戎息慎東方島夷舜凡有事必咨于大禹稷契臯陶伯夷垂益后夔謂之八師虞書舜典敘曰虞舜側微堯聞之聰明將使嗣位歷試諸難作舜典舜典曰若稽古帝舜曰重華協于帝濬哲文明溫恭允塞玄德升聞乃命以位慎徽五典五典克從納于百揆百揆時敘賔于四門四門穆穆納于大麓烈風雷雨弗迷帝曰格汝舜詢事考言乃言底可績三載汝陟帝位舜讓于德弗嗣正月上日受終于文祖在璇璣玉衡以齊七政肆類于上帝禋于六宗望于山川遍于羣神輯五瑞既月乃日覲四嶽羣牧班瑞于羣后嵗二月東巡狩至于岱宗柴望秩于山川肆覲東后協時月正日同律度量衡修五禮五玉三帛二生一死贄如五器卒乃復五月南巡狩至于南嶽如岱禮八月西巡狩至于西嶽如初十一月朔巡狩至于北嶽如西禮歸格于藝祖用特五載一巡狩羣后四朝敷奏以言明試以功車服以庸肇十有二州封十有二山濬川象以典刑流宥五刑鞭作官刑朴作教刑金作贖刑眚災肆赦怙終賊刑欽哉欽哉惟刑之恤哉流共工於幽州放歡兜於崇山竄三苗于三危殛鯀于羽山四罪而天下咸服二十有八載帝乃殂落百姓如喪考妣三載四海遏密八音月正元日舜格于文祖詢于四嶽闢四門明四目逹四聰咨十有二牧曰食哉惟時柔逺能邇惇德允元而難壬人蠻夷率服舜曰咨四嶽有能奮庸熙帝之載使宅百揆亮采惠疇僉曰伯禹作司空帝曰俞咨禹汝平水土惟時懋哉禹拜稽首讓于稷契暨臯陶帝曰俞汝往哉帝曰棄黎民阻飢汝后稷播時百榖帝曰契百姓不親五品不遜汝作司徒敬敷五教在寬帝曰臯陶蠻夷猾夏冦賊姦宄汝作士五刑有服五服三就五流有宅五宅三居惟明克允帝曰疇若豫工僉曰垂哉帝曰垂汝共工垂拜稽首讓于殳斨暨伯與帝曰俞往哉汝諧帝曰疇若豫上下草木鳥獸僉曰益哉帝曰俞咨益汝作朕虞益拜稽首讓于朱虎熊羆帝曰俞往哉汝諧帝曰咨四嶽有能典朕三禮僉曰伯夷帝曰俞咨伯汝作秩宗夙夜惟寅直哉惟清伯拜稽首讓于夔龍帝曰俞往欽哉帝曰夔命汝典樂教胄子直而溫寬而栗剛而無虐簡而無傲詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和帝曰龍朕聖讒説殄行震驚朕師命汝作納言夙夜出納朕命惟允帝曰咨汝二十有二人欽哉惟時亮天工三載考績三考黜陟幽明庶績咸熙分北三苖論曰肆類于上帝禋于六宗此闕文失其次者也其文宜曰受終于文祖禋于六宗在璇璣玉衡以齊七政肆類于上帝宜于冢土望于山川書經焚毁伏生耄矣口授于人故多闕失也國有大事必既告諸祖禰然後告于天地以及羣臣此禮之常也故有以六宗為三昭三穆學者多從其説孔安國曰六宗者四時也寒暑也日也月也星也水旱也夫聖人名必當物祀上帝而謂之類者本乎天者咸在其中也況四時寒暑水旱與日月星辰之運即天神之屬又可分裂各為神乎古者大旱雩于上帝不曰雩于旱神斯可見矣歷代諸儒之説咸與孔氏不相逺獨虞喜以六宗為地闕之於理無義考之於文無徴雖欲取之其孰信之又曰舜柴於四嶽所以致吾誠而教諸侯以必有事也封十二山使無牧伐表識一州之走集示民之有事也五載巡狩周遍天下禮百神體諸侯以撫兆民天行健聖人之行亦健天心無欲聖人之心亦無欲天德日新聖人之德亦日新此聖人在位益久而天下益平治之道也自史遷著封禪書載管言上古封禪之君七十有二後世人主希慕之以為太平盛典然登不遍於四嶽封非有十二山入懷宴安不行五載一巡狩之制出崇泰奢無納言計功行賞之實鐫文告成明示得意而非所以教諸侯德也泥金檢玉遂其侈心而非所以教諸侯禮也心與天道相反事與聖人相悖故太平之典方舉而天災人禍隨至者多矣梁許懋曰燧人氏之前世質民淳安得泥金檢玉結繩而治安得鐫文告成是故考舜典可以知後世封禪之失稽懋言可以知史遷著書之繆君天下者奈何信史遷而不信孔氏乎虞書大禹謨敘曰臯陶矢厥謨禹成厥功帝舜申之作大禹臯陶謨益稷大禹謨曰若稽古大禹曰文命敷于四海祗承于帝曰后克艱厥后臣克艱厥臣政乃又黎民敏德帝曰俞允若茲嘉言罔攸伏野無遺賢萬邦咸寧稽於衆舍己從人不虐無告不廢困窮維帝時克益曰都帝德廣運乃聖乃神乃武乃文皇天眷命奄有四海為天下君禹曰惠迪吉從逆凶惟影響益曰吁戒哉警戒無虞罔失法度罔遊于逸罔淫于樂任賢勿二去邪勿疑疑謀勿成百志惟熙罔違道以干百姓之譽罔咈百姓以從己之欲無怠無荒四夷來王益稷帝曰來禹汝亦昌言禹拜曰都帝豫何言豫思日孜孜臯陶曰吁如何禹曰洪水滔天浩浩懷山襄陵下民昏墊豫乘四載隨山刋木暨益奏庶鮮食豫決九川距四海濬畎澮距川暨稷播奏庶艱食鮮食懋遷有無化居蒸民乃粒萬邦作乂臯陶曰師汝昌言禹曰都帝慎乃在位帝曰俞禹曰安汝止惟幾惟康其弼直惟動丕應傒志以昭受上帝天其申命用休帝曰吁臣哉鄰哉鄰哉臣哉禹曰俞帝曰臣作朕股肱耳目豫欲左右有民汝翼豫欲宣力四方汝為豫欲觀古人之象日月星辰山龍華蟲作會宗彛藻火粉米黼黻絺繡以五采彰施于五色作服汝明豫欲聞六律五聲八音在治忽以出納五言汝聽豫違汝弼汝無面從退有後言欽四鄰庶頑讒説若不在時侯以明之撻以記之書用識哉欲並生哉工以納言時而揚之格則承之庸之否則威之禹曰俞哉帝光天之下至于海隅蒼生萬邦黎獻共惟帝臣惟帝是舉敷納以言明試以功車服以庸誰敢不讓敢不敬應帝不時敷同日奏罔功無若丹朱傲惟慢遊是好傲虐是作罔晝夜額額罔水行舟朋淫于家用殄厥世豫創若時娶于塗山辛壬癸甲啓呱呱而泣豫弗子惟荒度土功弼成五服至于五千州十有二師外薄四海咸建五長各迪有功苗頑弗即工帝其念哉帝曰迪朕德時乃功惟敘臯陶方祗厥敘方施象刑惟明禹曰於帝念哉德惟善政政在養民水火金木土穀惟修正德利用厚生惟和九功惟敘九敘惟歌戒之用休董之用威勸之以九歌俾勿壞帝曰俞地平天成六府三事允治萬世永賴時乃功夔曰於豫擊石拊石百獸率舞庶尹允諧又曰戛擊嗚球搏拊琴瑟以咏祖考來格虞賔在位羣后德讓下管鼗鼓合止柷敔笙鏞以間鳥獸蹌蹌簫韶九成鳳凰來儀帝庸作歌曰敕天之命惟時惟幾乃歌曰股肱喜哉元首起哉百工熙哉臯陶拜手稽首揚言曰念哉率作興事慎乃憲欽哉屢省乃成欽哉乃賡載歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱惰哉萬事墮哉帝拜曰俞往欽哉九載甲午十九載甲辰舜問於善卷曰子有意於天下乎善卷曰豫立於宇宙之中冬日衣皮毛夏日衣葛絺春耕形足以勞動秋收斂身足以休養日出而作日入而息逍遙於天地之間而心意自得吾何天下為哉去入深山莫知其處他日問其友石戶之農石戶之農曰捲捲乎后之為人葆力之士也身負妻戴子入海終身不反二十九載甲寅昆吾之裔子以擾龍事帝封之唆口鬲川賜姓曰董三十一載舜子商均女英所生也不肖不可付以天下舜耄不能親政命伯禹攝天子事伯禹請讓于咎繇舜稱美咎繇之休以堯命已之事命禹禹再辭又固舜曰毋天之厯數在爾躬人心惟危道心惟微惟精惟一允執厥中三十二載禹遂攝天子事舜命禹出征三苗苗民逆命伯益贊禹班師振旅而歸舜大敷文德以緝武備有苗乃格三十三載大禹謨曰帝曰格汝禹朕宅帝位三十有三載耄期倦于勤汝惟不怠總朕師禹曰朕德罔克民不依臯陶邁種德德乃降黎民懷之帝念哉念茲在茲釋茲在茲名言茲在茲允出茲在茲惟帝念功帝曰臯陶惟茲臣庶罔或干豫正汝作士明于五刑以弼五教刑期于無刑期于豫治民協于中時乃功懋哉臯陶曰帝德罔愆臨下以簡御衆以寬罰弗及嗣賞延于世宥過無大刑故無小罪疑惟輕功疑惟重與其殺不辜寧失不經好生之德洽于民心茲用不犯于有司帝曰俾豫從欲以治四方風動惟乃之休帝曰來洚水警豫成允成功惟汝賢克勤于邦克儉于家不自滿假惟汝賢汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功豫懋乃德嘉乃丕績天之厯數在爾躬爾終陟元后人心惟危道心惟微惟精惟一允執厥中無稽之言勿聽弗詢之謀弗庸可愛非君可畏非民衆非元后何戴后非衆罔與守邦欽哉慎乃有位敬修其可願四海困窮天祿永終惟口出好興戎朕言不再禹曰枚卜功臣惟吉之從帝曰禹官占惟先蔽志昆命于元龜朕志先定詢謀僉同鬼神其依龜筮協從卜不習吉禹拜稽首固辭帝曰母惟汝諧正月朔旦受命于神宗率百官若帝之初帝曰咨禹惟時有苗弗率汝徂征禹乃會羣后誓于師曰濟濟有衆咸聽朕命蠢茲有苖昏迷不恭侮慢自賢反道敗德君子在野小人在位民棄不保天降之咎肆豫以爾衆士奉辭罰罪爾尚一乃心力其克有勳三旬苖民逆命益贊于禹曰惟德動天無逺弗屆滿招損謙受益時乃天道帝初于歷山往于田日號泣于旻天于父母負罪引慝祗載見瞽瞍夔夔齋栗瞽瞍亦允若至諴感神矧兹有苖禹拜昌言曰俞班師振旅帝乃誕敷文德舞干羽于兩階七旬有苗格三十九載甲子四十八載舜陟方葬于鳴條舜生三十徴庸三十在位五十載陟方乃死帝釐下土方設居方别生分類作汨作九共九篇稿飫孔子曰君哉舜也巍巍乎有天下而不與焉又曰無為而治者其舜也與夫何為哉恭己正南面而已矣又曰後世雖有作者虞帝弗可及也已矣德如天地化如四時又曰舜其至孝矣五十而慕孟子曰舜之飯糗茹草也若將終身焉及其為天子也被袗衣鼓琴二女果若固有之孟子曰大孝終身慕父母五十而慕者豫於大舜見之矣是故孝子之至莫大乎尊親尊親之至莫大乎以天下養為天子父尊之至也以天下養養之至也孟子曰舜明于庶物察于人倫由仁義行非行仁義也孟子曰堯舜之道孝悌而已孟子曰規矩方員之至也聖人人倫之至也欲為君盡君道欲為臣盡臣道二者皆法堯舜而已不以舜之所以事堯事君不敬其君者也不以堯之所以治民治民賊其民者也孟子曰智者無不知也當務之為急仁者無不愛也急親賢之為務堯舜之智而不遍物急先務也堯舜之仁不遍愛人急親賢也不能三年之喪而緦小功之察放飯流啜而問無齒決是之謂不知務孟子曰堯舜之道不以仁政不能平治天下今有仁心仁聞而民不被其澤者不行先王之道也聖人既竭心思焉繼之以不忍人之政然後仁覆於天下自堯以來九族內睦百官外正化行諸侯流及兆民皆有君子之行比屋可封後世莫能繼也四十九載甲戌五十載商均除喪禹委政於臯陶伯益退避于陽城天下諸侯朝覲訟獄謳歌者不之商均而之禹論曰愚讀五帝書然後知聖人澤及斯民之逺也後世有立功于一時興利于一邦者人猶追思而祀之是數聖人者有功于天下萬世曾不得推苖裔立宗子建廟廷春秋四時饗天下之報也有天下者端拱九重之內治其國家上之天文下之地理中之人倫衣食之原器用之利法度之彰禮樂之則誰推明制作之也而忘之乎夷戎之人駕一偏空説失事理之制而其神像反得蟠據名山中華巍業相望又聽其雕梁畫棟羣淪滅三綱之人而豢養之此何道也其不耕不殖侵漁民利耗蠧民財乃細事耳為政者恬不以為慮諸華無人可悲之甚矣皇王大紀卷四

body:
  text: 皇王大紀卷五十一宋胡宏撰三王紀簡王九年甲申冬十一月莒子薨諡曰厲公孫密州嗣衛侯如晉晉侯強見孫林父焉衛侯不可既歸晉侯使郤犫送孫林父而見之衛侯欲辭夫人姜氏曰不可是先君宗卿之嗣也大國又以為請不許將亡雖惡之不猶愈于亡乎君其忍之衛侯見而復之魯叔孫僑如如齊逆夫人鄭公子喜帥師伐許師敗鄭伯復伐許入其郛許人平以公孫申之封七月魯叔孫僑如以夫人姜氏歸衛侯有疾使寧殖立敬姒之子衎衛侯薨諡曰定公夫人姜氏既哭而息見衎之不哀也不內酌飲曰是夫也將不唯衛國之敗其必始於未亡人大夫聞之無不聳懼秦伯榮薨諡曰桓公子后嗣經曰十有四年春王正月莒子朱卒夏衛孫林父自晉歸于衛秋叔孫僑如如齊逆女鄭公子喜帥師伐許九月僑如以夫人婦姜氏至自齊穀梁曰大夫不以夫人以夫人非正也刺不親逆也僑如之不氏一事而再見者卒名耳然則娶於他邦而道里或逺必親迎乎以封壤則有大小以爵次則有尊卑以道途則有逺邇或迎之于其國或迎之於境上或迎之於所館中禮之節可也冬十月庚寅衛侯臧卒秦伯卒十年十二月衛葬其君定公正月乙巳魯仲嬰齊卒公孫歸父之弟也癸丑晉侯衛侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚討曹伯負芻執而歸諸京師諸侯將見欣時于王而立之欣時辭曰前志有之曰聖逹節次守節下不失節為君非吾節也雖不能聖敢失守乎遂逃奔宋是為曹子臧四月宋公薨諡曰共公少子成嗣楚將北師公子貞不可公子側曰利則進爾申叔時曰子反必不免楚王侵鄭及暴隧遂侵衛及首止鄭公子喜侵楚取新石晉欒書欲報楚韓厥曰無庸使重其罪民將叛之無民孰戰六月庚辰宋葬其君共公宋華元為右師魚石為左師蕩澤為司馬華喜為司徒公孫師為司城向為人為大司寇鱗朱為少司冦向帶為大宰魚府為少宰蕩氏汰而驕蕩澤弱公室殺公子肥華元曰我為右師君臣之訓師所司也今公室卑而不能正吾罪大矣不能治官敢賴寵乎乃出奔晉二華戴族也司城莊族也六官皆桓族也魚石將止華元魚府曰右師反必討是無桓氏也魚石曰右師多大功國人與之不反懼桓氏之無祀於宋也右師討猶有戍在遂自止華元于河上請討許之乃反使華喜公孫師帥國人攻蕩氏殺子山魚石向為人鱗朱向帶魚府出舍於睢上華元使止不可元自止之不可乃反魚府曰今不從不得入矣右師視疾而言速有異志焉若不我納今將馳矣登丘而望之則馳騁而從之則决睢澨閉門登陴矣四子奔楚元使戍為左師老佐為司馬樂裔為司冦以靖國人九月晉士燮齊髙無咎宋華元魯叔孫僑如衛孫林父鄭公子鰌邾人會吳于鍾離許男畏逼如鄭請遷於楚楚公子申遷許于葉晉三郤害伯宗譛而殺之其子州犁奔楚韓厥曰善人天地之紀也而驟絶之殆難免乎初伯宗每朝其妻必戒之曰盜憎主人民惡其上子好直言必及於難經曰十有五年春王二月葬衛定公三月乙巳仲嬰齊卒嬰齊者公子遂之子公孫歸父之弟也歸父出奔齊魯人徐傷其無後也於是使嬰齊後之故書曰仲嬰齊此可謂亂昭穆之序失父子之親者以後歸父則弟不可以為兄嗣以後襄仲則以公字為氏亦非矣癸丑公㑹晉侯衛侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚晉人執曹伯歸于京師稱侯以執伯討也何以為伯討晉合諸侯伐秦曹宣公卒于師曹人使公子負芻守使公子欣時逆曹伯之喪負芻殺其太子而自立至是晉侯執之又不敢自治而歸于京師使即天刑夫是之謂伯討春秋執諸侯者衆矣未有執得其罪如此者故獨書其爵公至自會夏六月宋公固卒楚子伐鄭秋八月庚辰葬宋共公宋華元出奔晉宋華元自晉歸于宋宋殺其大夫山宋魚石出奔楚華元出奔晉與歸于宋皆不省文者著其正也書之重詞之復必有美惡焉詞繁而不殺所以與之也以不賴寵而出奔以國人與晉皆許之討而後入正可知矣蘇轍謂使元懷祿顧寵重於出奔則不能討此說是也山不書氏背其族也背其族者伐其本也人而無本人道絶矣葛藟猶能庇其本根况於人而忍伐其本乎冬十有一月叔孫僑如會晉士燮齊髙無咎宋華元衛孫林父鄭公子鰌邾子㑹吳子于鍾離吳以號舉夷之也㑹而殊㑹外之也殊會有二義會王世子于首止意在尊王室不敢與世子抗也㑹吳子于鍾離于柤于向意在賤夷狄而罪諸侯不能與之敵也夫以太伯至德實始有吳以族言之則周之伯父也至其後世遂以號舉者以其僣竊稱王不能居中國之爵號耳成襄之間中國無霸齊晉大國亦皆俯首東向而親吳聖人蓋傷之故特殊㑹可謂深切著明矣許遷于葉十一年冬十一月雨木冰于魯楚王自武城以汝隂之田求成于鄭鄭叛晉滕侯薨諡曰文公子原嗣鄭公子喜帥師侵宋夏四月丙寅朔日有食之晉侯將伐鄭士燮曰若逞吾願諸侯皆叛晉可以逞若唯鄭叛晉國之憂可立俟也郤至曰然則王者多憂乎燮曰我王者也乎哉夫王者成其德而逺人歸故無憂今我寡德而求王者之功故多憂欒書曰不可以當吾世而失諸侯乃興師欒書將中軍郤犫如衛遂如齊欒黶如魯皆乞師焉孟獻子曰有勝矣楚王救鄭司馬公子側將中軍過申入見申叔時曰師其如何對曰內棄其民外絶其好瀆齊盟而食話言干時以動而疲民以逞民不知信進退罪也吾不復見子矣晉楚遇于鄢陵士燮不欲戰郤至曰韓之戰惠公不振旅箕之役先軫不反命邲之師荀伯不復從皆晉之恥也今我辟楚又益耻也燮曰吾先君之亟戰也有故秦狄齊楚皆强不盡力子孫將弱今三強服矣敵楚而已惟聖人能內外無患自非聖人外寧必有內憂盍釋楚以為外懼乎甲午晦楚晨壓晉軍而陳軍吏患之范丐曰塞井夷竈陳於軍中而疏行首何患焉欒書曰楚師輕窕固壘待之退而擊之必獲勝焉郤至曰楚有六間不可失也其二卿相惡王卒以舊鄭陳而不整蠻軍而不陳陳不違晦在陳而囂我必克之楚潘黨與養由基蹲甲而射之徹七札焉以示王曰君有二臣如此何憂於戰王怒曰大辱國晉侯及楚子鄭伯戰于鄢陵射楚子中目韓厥從鄭伯其右請俘之郤至曰傷國君有刑亦且止楚師薄於險養由基射再發盡殪晉師乃止楚司馬命軍吏察夷傷補卒乘繕甲兵展車馬雞鳴而食唯命是聽晉人患之苗賁皇徇曰搜乘補卒秣馬利兵修陳固列蓐食申禱明日復戰乃逸楚囚王召司馬司馬醉不能見王曰天敗楚也夫余不可以待乃宵遁晉入楚軍三日榖楚師還及瑕王使謂司馬曰先大夫之覆師徒者君不在子無以為過不榖之罪也司馬再拜曰君賜臣死死且不朽王使止之弗及戰之日齊國佐髙無咎至于師衛侯出于衛魯侯出于壞隤魯叔孫僑如通於公母穆姜欲去季孟而取其室公將會諸侯穆姜送之使逐二子公以晉難告請反而聽命姜怒公子偃公子鉏趨過指之曰女不可皆君也公行待於壞隤申宫警備設守而後行使孟獻子守于公宫晉侯會齊侯衛侯宋華元邾人于沙隨以謀伐鄭魯侯後至僑如使告郤犫曰吾君待于壞隤以待勝者犫取貨于僑如而訴魯侯晉侯不見公公至自會尹武公㑹晉侯魯侯齊國佐邾人伐鄭曹人請于晉曰自我先君宣公即世國人曰若之何憂猶未弭而又討我寡君以亡曹國社稷之鎮公子是大泯曹也先君無乃有罪則君列諸會矣晉侯謂子臧反吾歸而君子臧反曹伯歸子臧盡致其邑與卿而不出魯侯之㑹伐鄭也姜又命公如初公又申守而行叔孫僑如使告郤犫曰魯之有季孟猶晉之有欒范也政令於是乎成今其謀曰晉政多門不可從也寧事齊楚有亡而蔑從晉矣若欲得志於魯請止行父而殺之我斃蔑也不然歸必叛七月晉人執季孫行父于苕丘魯侯還待于鄆使公孫嬰齊請季孫于晉郤犫曰茍去仲孫蔑而止季孫行父吾於子國親於公室對曰僑如之情子必聞之矣若去蔑與行父是大棄魯國而罪寡君也若猶不棄則夫二人者魯國社稷之臣若朝亡之魯必夕亡郤犫曰吾為子請邑對曰嬰齊魯之常𨽻也敢介大國以求厚焉承寡君之命以請若得所請吾子之賜多矣又何求士燮謂欒書曰季孫於魯相二君矣妾不衣帛馬不食粟可不謂忠乎信讒慝而棄忠良若諸侯何公孫嬰齊奉君命無私謀國家不二圖其身不忘其君若虛其請是棄善人也子其圖之乃許魯平赦季孫九月魯出叔孫僑如而盟之僑如奔齊立其弟豹十月乙丑季孫及郤犫盟于扈魯侯歸乙丑刺公子偃孟獻子之子子服它言于季孫曰子為上卿妾不衣帛馬不食粟人其以子為愛且不華國乎季孫曰吾亦願之然吾聞以德榮為國華而見國人之食粗衣惡者猶多是以不敢文子以告獻子獻子囚之七日它於是儉素文子曰過而能改民之上也使為上大夫經曰十有六年春王正月雨木冰雨木氷者雨而木氷也何休曰木者少陽幼君大臣之象氷者凝隂兵之類也氷脅木者君臣將執於兵之徴未幾而有沙隨苕丘之事天人之際休咎之應焉可誣也而欲盡廢五行傳亦過矣夏四月辛未滕子卒鄭公子喜帥師侵宋六月丙寅朔日有食之晉侯使欒黶來乞師甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績不書師敗績以其君親集矢於目而身傷為重也當是時兩軍相抗未有勝負之形晉之捷也亦幸焉爾幸非持勝之道范文子所以立於軍門有聖人能內外無患盍釋楚以為外懼之戒乎楚師雖敗其勢益張晉遂怠矣卒有欒氏之譛而誅三郤國內大亂聖人備書以見行事之深切著明也楚殺其大夫公子側秋公會晉侯齊侯衛侯宋華元邾人于沙隨不見公臣子之於君父揚其美不揚其惡為尊者諱為親者諱禮也聖人假魯史以示王法其於魯事有君臣之義故君弒則書薨易地則書假滅國則書取出奔則書遜屈己而與强國之大夫盟則書及叛盟失信而莫適守則沒公而書㑹凡此類雖不沒其實示天下之公必隱避其辭以存臣子之禮然則沙隨之㑹晉不見公是魯侯之大辱深可恥焉者矣曷為直書其事而不諱乎曰春秋伸道不伸邪榮義不榮勢正已而無恤乎人以仁禮存心而不憂橫逆之至者也沙隨之㑹魯有內難師出後期所當恤者晉人聽叔孫僑如之譛怒公而不見曲在晉矣魯侯自反非有背仁棄禮不忠之咎也昔曽子嘗聞大勇於夫子曰自反而縮雖千萬人吾往矣孟子言浩然之氣至剛至大以直養而無害則塞乎天地之間沙隨之不見於公何歉乎直書不諱者示天下後世使之知大勇浩然之氣所以守身應物如此其垂訓之義大矣公至自會公會尹子晉侯齊國佐邾人伐鄭曹伯歸自京師曹伯不名其位未嘗絶也不絶其位所以纍乎天王也其言自京師王命也言天王之釋有罪也善不䝉賞惡不即刑以堯為君舜為臣雖得天下不能一朝居也負芻殺世子而自立不能因晉之執置諸刑典而使復國則無以為天下之共主矣九月晉人執季孫行父舍之于苕丘冬十月乙亥叔孫僑如出奔齊十有二月乙丑季孫行父及晉郤犫盟于扈公至自會乙酉刺公子偃按左氏所載則是非著矣十二年鄭公子騑侵晉衛北宫括帥師救晉侵鄭尹武公單襄公會晉侯齊侯宋公魯侯衛侯曹伯邾人伐鄭自戲童至于曲洧魯侯見單襄公言及郤犫之譛也單子曰君何患焉晉君視逺而步高夫目以定體足以從之視逺者絶義足髙者棄德何以能久郤氏晉之寵人也味厚者臘毒位髙者疾顛三卿五大夫可以戒懼矣而錡好陵人犫誣人至掩人其誰能忍之齊國子立於淫亂之朝好盡言以招人過怨之本也唯善人能受盡言齊其有乎二國有禍可以取伯何患之有四月乙酉同盟于柯陵楚公子嬰齊救鄭師于首丘諸侯還齊慶克通于聲孟子鮑牽以告國佐佐召克謂之克告夫人曰國子謫我夫人怒國子相齊侯會諸侯髙鮑處守及還將至閉門而索客孟子訴之曰髙鮑將不納君而立公子角國子知之齊侯刖鮑牽而逐髙無咎無咎奔莒髙弱以盧叛秋七月辛丑魯用郊晉侯使荀罃乞師于魯單子㑹晉侯宋公魯侯衛侯曹伯齊人邾人圍鄭楚公子申救鄭師于汝上諸侯還壬申魯公孫嬰齊卒于貍脤十月丁巳朔日有食之邾子薨諡曰定公子牼嗣齊侯使崔杼為大夫使慶克佐之帥師圍盧國佐從諸侯圍鄭以難請而歸遂如盧師殺慶克以榖叛齊侯與盟于徐關而復之盧降使國勝告難于晉待命于清晉侯侈多外嬖欲去羣大夫而立其左右胥童以克之廢怒郤氏郤錡嘗奪夷陽五田郤犫嘗與長魚矯爭田執而梏之與其父母妻子同一轅三子皆嬖於晉侯晉侯田與婦人先殺而飲酒後使大夫殺郤至奉豕寺人張孟奪之至射而殺之公曰季子欺豫晉侯將作難胥童曰必先三郤族大多怨去大族不逼敵多怨有庸公曰然將以甲八百攻郤氏長魚矯請無用衆公使清沸魋助之抽戈結衽而僞訟於三郤者三郤聽焉遂皆殺之尸諸朝胥童劫欒書荀偃矯曰必殺之公曰一朝而尸三卿吾不忍益也對曰人將忍君遂出奔狄公使辭於二子曰寡人有討於郤氏既伏其辜矣大夫無辱其復職位乃皆歸胥童為卿晉侯遊于匠麗氏書偃執之召士丐丐辭召韓厥厥辭舒庸人以楚鄢陵之敗道吳人伐巢伐駕圍釐虺遂恃吳而不設備楚公子槖帥師襲舒庸滅之經曰十有七年春衛北宫括帥師侵鄭夏公㑹尹子單子晉侯齊侯宋公衛侯曹伯邾人伐鄭六月乙酉同盟于柯陵秋公至自㑹齊髙無咎出奔莒九月辛丑用郊郊之不時未有甚於此者也故特曰用郊用者不宜用也或曰蓋以人享叩其鼻血以薦也古者六畜不相為用況敢用人乎晉侯使荀罃來乞師冬會單子晉侯宋公衛侯曹伯齊人邾人伐鄭十有一月公至自伐鄭壬申公孫嬰齊卒于貍脤十有二月丁巳朔日有食之邾子貜且卒晉殺其大夫郤錡郤犫郤至楚人滅舒庸十三年冬十一月晉欒書荀偃殺胥童庚申使程滑弒晉侯葬之于翼東門之外以車一乘諡曰厲公民無哀之者魯邊人以告魯侯方朝問諸大夫曰誰之過也里革曰夫君人者其威大矣失威而至於殺其過多矣周子者晉襄公之五世孫也事單襄公立無跛視無旋聽無聳言無逺晉國有憂未嘗不戚有慶未嘗不怡襄公甚愛之曰周令德恭孝其必有晉國乎於是晉人來逆周子諸大夫見于清原周子曰孤始願不及此雖及此豈非天乎抑人之求君使出命也立而不從將安用君二三子用我今日否亦今日共而從君神所福也對曰羣臣敢不唯命是聽盟而入朝于武宫逐不臣者七人十二月乙酉朔周子即位定百事立百官育門子選賢良興舊族出滯賞畢故刑赦囚繫宥閒罪薦積德逮鰥寡振廢淹養老幼恤孤疾年過七十公親見之凡六官之長皆民譽舉不失職官不易方爵不踰德師不陵正旅不逼師民無謗言欒伯請公族大夫公曰荀家惇惠荀會文敏黶也果敢無忌鎮靜夫膏粱之性難正也使惇惠者教之則遍而不倦文敏者導之則婉而入果敢者諗之則過不隱鎮靜者修之則一齊侯使士華免以戈殺國佐于內宫之朝師逃于夫人之宫使清人殺國勝國弱奔魯以慶封為大夫既齊侯反國弱使嗣國氏魯侯朝于晉鄭伯侵宋及曹門外遂會楚子伐宋取朝郟楚子辛鄭皇辰侵城郜取幽丘同伐彭城納宋魚石向為人鱗朱向帶魚府焉以三百乘戍之而還宋人患之西鉏吾曰若楚人與吾同惡以德於我吾固事之也不敢二矣不然而收吾憎使贊其政以問釁亦吾患也今將崇諸侯之姦而披其地以塞夷庚逞姦而攜服毒諸侯而懼吳晉吾庸多矣杞伯邾子朝于魯魯築鹿囿夏六月魯侯薨諡曰成公子午嗣生三年矣宋人圍彭城楚公子嬰齊救之伐宋華元如晉告急時韓厥將中軍曰欲求得人必先勤之成霸安彊自宋始矣晉侯師于台谷救宋遇楚師於靡角之谷楚師還晉士魴乞師于魯晉侯會宋公衛侯邾子魯仲孫蔑齊崔杼盟于虛朾以謀救宋宋人辭諸侯而請師以圍彭城魯葬其君仲孫蔑請于諸侯先歸會葬經曰十有八年春王正月晉殺其大夫胥童庚申晉弒其君州蒲弒君天下之大罪討賊天下之大刑春秋合於人心而定罪聖人順於天理而用刑固不以大霈釋當誅之賊亦不以大刑加不弒之人然趙盾以不越境而書弒許世子止以不嘗藥而書弒鄭歸生以憚老懼讒而書弒楚公子比以不能效死不立而書弒齊陳乞以廢長立幼而書弒欒書身為元帥親執厲公使程滑弒公而以車一乘葬之于翼東門之外仲尼無私與天為一奚獨於盾止歸生比乞則責之甚偹討之甚嚴而於欒武子闊略如此乎學者深求其㫖知聖人誅亂賊之大要而後可與言春秋矣齊殺其大夫國佐公如晉夏楚子鄭伯伐宋宋魚石復入于彭城此伐宋以納魚石其不曰納宋魚石于彭城何也劉敞曰不與納也諸侯失國諸侯納之正也諸侯世也大夫失位諸侯納之非正也大夫不世也諸侯託於諸侯禮也大夫託於諸侯非禮也其言復入者已絶而復入惡之甚者宋魚石晉欒盈是矣公至自晉晉侯使士丐來聘杞伯來朝八月邾子來朝築鹿囿己丑公薨于路寢冬楚人鄭人侵宋晉侯使士魴來乞師十有二月仲孫蔑㑹晉侯宋公衛侯邾子齊崔杼同盟于虛朾丁未葬我君成公十四年魯侯午之元年諸侯之大夫圍彭城彭城降晉晉以五大夫歸置諸瓠丘晉韓厥荀偃帥諸侯之師伐鄭入其郛敗其徒兵於洧上於是東諸侯之師次于鄫以待晉師自鄭以鄫之師侵楚焦夷及陳晉侯衛侯次于戚以為之援楚師救鄭侵宋吕留秋七月辛酉王崩諡曰簡王子泄心立邾子朝于魯衛侯使公孫剽聘于魯剽黑背之子也晉荀罃聘於魯古者諸侯即位小國朝之大國聘焉以繼好結信謀事補闕禮之大者也經曰元年春王正月公即位仲孫蔑會晉欒黶宋華元衛寧殖曹人邾人莒人滕人薛人圍宋彭城書圍彭城者魯史舊文也曰圍宋彭城者仲尼親筆也楚已取彭城封魚石矣則曷為繫之宋楚不得取之宋石不得受之楚楚雖專其地君子不登叛人所以正疆域固封守也夏晉韓厥帥師伐鄭仲孫蔑會齊崔杼曹人邾人把人次于鄫楚人釋君而臣是助事已悖矣晉降彭城以魚石等歸遂伐鄭而諸侯次于鄫此皆放於義而行者也傳書楚子辛救鄭而經不書者鄭本為楚以其君之故親集矢於目是以與楚而不二也棄中國從蠻夷不能以大義裁之惟私欲之從則鄭無可救之善楚不得有能救之名經所以削之也秋楚公子壬夫帥師侵宋九月辛酉天王崩邾子來朝冬衛侯使公孫剽來聘晉侯使荀罃來聘簡王崩赴告已及矣則宜以所聞先後而奔喪今邾子方來修朝禮衛侯晉侯方來修聘事於王喪若越人視秦人之肥瘠焉而左氏以為禮此何禮也滕定公薨世子定為三年之喪父兄百官皆不欲曰吾宗國魯先君莫之行也喪紀益廢民習於耳目而不察故後世以日易月人子安而行之不知春秋之義惜哉皇王大紀卷五十一

body:
  text: 皇王大紀卷三十九宋胡宏撰三王紀惠王十年甲寅魯侯會把伯姬于洮左氏曰會于洮非事也天子非展義不巡狩諸侯非民事不舉卿非君命不越境夏四月齊侯宋公魯侯陳侯鄭伯會盟于幽齊定令關市五十而征一賦祿以粟田稅上年什取三中年什二下年什一大凶不稅其或飢饉則弛而稅令諸侯必足三年之食以其餘修兵革不足者助之發齊于是霸小白喜曰孤有管仲猶鴻之有翼也號曰仲父論曰齊亦公侯之地爾及管仲得政遂能強大霸諸侯何也守信不二行法無私舉用賢才開闢言路不藉樹蓄務富民財不大興兵務舒民力仗尊王之義會于首止天子憚其正而王室之亂消寧魯難誅哀薑公道伸而諸侯服盟于召陵禮荆楚而中國之義立封衛楚丘城邢夷儀遷把緣陵而夷狄不得肆此其所以九合諸侯虎視中原之大略也其去戎狄也逺矣故孔子曰如其仁如其仁若夫伐魯國以殺子糾而父子兄弟之恩薄五大夫立子頽出天王不能奔命而君臣之義虧魯晉宋有弒君之賊而不能討也陳有殺適立庶之亂而不正也鄭有兄弟爭國之禍而不能止也以病燕則伐北戎山戎以包茅不貢則南伐楚以不從已則伐宋伐鄭執陳轅濤塗厚自封殖滅談滅遂降鄣遷陽處已如是何以服人是以北則晉專冀方西則秦專雍土南則荆楚強橫滅弦滅黃圍許伐徐而終不退聽也原其失皆由不知天理之本而馳心於功利之域故輕重後先不相並無以得天下心而功烈如彼其卑也其去王也逺故孟子曰管仲曾西之所不為也而子謂我願之乎魯公子友如陳葬原仲原仲季友之舊也魯把伯姬歸寧魯侯以叔姬嫁于莒大夫慶慶來親迎把伯朝于魯王使召伯賜齊侯命且請伐衛以其立子頽也齊侯魯侯會于城濮經曰二十有七年春公會把伯姬于洮莊公愛其女而不能節之以禮非事而特會于洮此春秋之所禁也惟不節之以禮然後有使自擇配如僖公之於季姬而典訓亡矣夏六月公會齊侯宋公陳侯鄭伯同盟于幽同盟之例有惡其反覆而書同盟有諸侯同欲而書同盟前此鄭伯嘗二於齊矣至是齊桓強盛有伯中國攘夷狄之勢諸侯皆歸之鄭伯於是焉有畏服之心其得與於盟所欲也故特書同視他盟為愈矣秋公子友如陳葬原仲私行也何以通季子之私行而無貶乎曰春秋端本之書也京師諸夏之表也祭伯以寰內諸侯而來朝祭叔以王朝大夫而來聘尹氏以天子三公來告其喪誣上行私表不正矣是故季子違王制委國事越境而會葬齊髙固莒慶以大夫即魯而圖婚末流可知矣春秋深貶王臣以明始亂備書諸國大夫而無譏焉則以著其效也凡此皆正其本之意冬把伯姬來禮父母在嵗一歸寧何以書來不當來也女子有行逺父母兄弟春會于洮冬又來歸不合禮之常矣故書春秋於男女往來之際嚴矣莒叔來逆慶姬叔姬何以稱字大夫自逆則稱字為其君逆則稱子尊卑之别也何以書諸侯嫁女於大夫而公自主之非禮也把伯來朝公會齊侯于城濮十一年春正月甲寅齊人伐衛衛人及齊人戰衛師敗績二月丁卯邾子薨子蘧蒢嗣楚令尹子元文王之弟也以車六百乘伐鄭入自純門鄭人將奔桐丘魯侯會齊人宋人救鄭楚師夜遁魯築郿魯大無麥禾魯臧文仲言於公曰國病矣君盍以名器請糴于齊公從之從者曰君不命吾子而自請之其為選事乎文仲曰賢者急病而讓夷若在上不恤下居官而避難非事君也遂以鬯圭玉磬如齊告糴曰天災流行戾於敝邑飢饉薦降民羸幾卒大懼乏周公太公之命祀職貢業事之不共而獲戾不腆先君之弊器敢告滯積以紓執事以救敝邑使能共職豈惟寡君與二三臣實受君賜其周公太公及百辟神祗實永饗而賴之齊侯歸其玉而豫之糴晉侯賈夫人無子齊薑生世子申生娶大戎狐姬生重耳小戎子生夷吾伐驪戎滅驪子以驪姬歸生奚齊其娣生卓子史蘇告諸大夫曰昔者之伐也興百姓以為百姓也今君起百姓以自封也其亂生哉吾聞君子好好而惡惡樂樂而安安是以能有常伐木不自其本必復生塞水不自其源必復流滅禍不自其基必復亂今君滅其父而畜其子禍之基也驪姬通於優施施與之謀去三公子而立其子賂外嬖二五言於公曰曲沃君之宗也蒲與二屈君之疆也若使太子主曲沃而重耳夷吾主蒲與屈則可以威民而懼戎且旌君伐使俱曰狄之廣莫於晉為都晉之啓土不亦宜乎公從之惟奚齊卓子在綘里克丕鄭荀息相見克曰若之何息曰事君者竭力以役事不聞違命丕鄭曰事君者從其義不阿其惑克曰我雖不識義亦不阿惑吾將靜也猛足言於太子曰盍圖之乎太子曰吾聞之羊舌大夫曰事君以敬事父以孝受命不違為敬敬順所安為孝孝敬君父之所安也棄安而圗逺於孝矣吾其止也唐國風終十二篇曰采苓三章章八句刺晉獻公也獻公好聽讒焉采苓采苓首陽之巔興也苓大苦也首陽山名也采苓細事也首陽幽僻也細事喻小行也幽僻喻無徵也人之為言茍亦無信舍旃舍旃茍亦無然人之為言胡得焉采苦采苦首陽之下苦苦菜也人之為言茍亦無與舍旃舍旃茍亦無然無與勿用也人之為言胡得焉采葑采葑首陽之東葑菜名也人之為言茍亦無從舍旃舍旃茍亦無然人之為言胡得焉經曰二十有八年春王三月甲寅齊人伐衛衛人及齊人戰衛人敗績齊人奉王命聲罪以討衛為衛計者誠有是罪則當請歸司寇服刑可也若惠徼康叔不泯其社稷使得自新亦惟命則可以免矣今不徵詞請罪而上逆王命下拒方伯之師直與交戰則是衛人為志乎此戰故書及以主之衛也戰不言伐伐不言日而書日者戰之日也見齊人伐罪方以是日至而衛人不請其故直以是日與之戰所以深疾之也而聖人之情見矣齊稱人將卑師少也夏四月丁未邾子瑣卒秋荆伐鄭公會齊人宋人救鄭楚無故伐鄭是陵弱暴寡之師也故以州舉狄之也諸侯得救急恤鄰之義故書救鄭善之也齊宋稱人將卑師少也桓公主兵攘夷狄安中國之事見矣冬築郿郿邑也凡用功大曰城小曰築故館則書築臺則書築囿則書築郿邑而書築者創作邑也其志不視嵗之豐凶而輕用民力於其所不必為也則非人君之心矣大無麥禾麥熟於夏禾成於秋而書於冬者莊公惟宫室臺榭是崇是飾費用浸廣調度不充有司計嵗入之多寡虛實然後知倉廪之竭也故於嵗杪而書曰大無麥禾莊公享國二十八年於古法當有九年之積而虛竭如此所謂寄生之君也聖人書之以戒來世為國之不知務臧孫辰告糴于齊劉敝曰言如齊告糴則其詞緩言告糴于齊則其情急所以譏大臣任國事治名而不治實之敞也魯人恱其名而以急病攘夷為功君子責其實而以不能務農重榖節用愛人為罪也十二年魯新延廏非時也凡馬日中而出日中而入鄭人侵許魯有蜚冬十月紀叔姬卒魯城諸及防時也凡土功龍見而畢務戒事也火見而致用水昏正而栽日至而畢樊皮叛王經曰二十有九年春新延廏言新者有故也何以書榖梁子曰古之君人者必時視民之所勤民勤於力則功築罕民勤於財則貢賦少民勤於食則百事廢矣大無麥禾告糴于齊冬築郿春新廏以其用民力為已悉矣此韓屈冝曰所謂時詘舉嬴者夏鄭人侵許秋有蜚冬十有二月紀叔姬卒紀已滅矣其卒之何以明紀侯不爭而去則可能使其民從而不釋則微矣城諸及防十三年王命虢公討樊皮夏四月丙辰虢公入樊執樊仲皮歸于京師魯師次于成鄣者紀之附庸也五月齊人脅鄣降之六月癸亥魯會葬紀叔姬日食魯鼓用牲于社北戎病燕職貢不至齊侯魯侯遇于魯濟謀伐山戎桓公自將刜令支斬孤竹而還燕賴以安楚子元驕楚王使申公鬭班殺之以鬭榖於菟為令尹實子文也自毁其家以紓楚國之難初鬬伯比從其母畜於鄖淫於鄖女生子文棄諸夢中虎乳之鄖子田見而收之楚人謂乳榖謂虎於菟也弼國風十一篇曰式微二章章四句黎侯寓于衛其臣勸以歸也式微式微胡不歸微君之故胡為乎中露微無也中露衛邑也式微式微胡不歸微君之躬胡為乎泥中泥中衛邑也邶國風十二篇曰旄丘四章章四句責衛伯也狄人迫逐黎侯黎侯寓於衛衛不能修方伯連率之職黎之臣子以責於衛也旄丘之葛兮何誕之節兮興也前髙後下曰旄丘諸侯以國相連屬憂患相及如葛之蔓延相連及也誕濶也叔兮伯兮何多日也日月以逝而不我憂何其處也必有與也言與仁義也何其久也必有以也狐裘蒙戎匪車不東大夫狐蒼裘蒙戎以言亂也不東言不來東也叔兮伯兮靡所與同無救患恤同也瑣兮尾兮流離之子瑣尾少好之貌流離鳥也少好長醜始而愈樂終以微弱叔兮伯兮褎如充耳褎盛服也充耳盛飾也大夫褎然有尊盛之服而不能稱也邶國風十三篇簡兮三章章六句刺不用賢也衛之賢者仕於伶官皆可以承事王者也簡兮簡兮方將萬舞簡大也方四方也將行也以干羽為萬舞用之宗廟山川故言於四方日之方中在前上處教國子弟以日中為期碩人俁俁公庭萬舞碩人大德也俁俁容貌大也萬舞非但在四方親在宗廟公庭有力如虎執轡如組組織組也武力比於虎可以禦亂御衆有文章言能冶衆動於近成於逺也左手執籥右手秉翟籥六孔翟翟羽也赫如渥赭公言鍚爵赫赤貌渥厚漬也祭有畀輝胞翟閽寺者惠下之道見惠不過一散山有榛隰有苓榛木名下濕曰隰苓大苦云誰之思西方美人彼美人兮西方之人兮乃冝在王室邶國風十四篇曰北門三章章七句刺仕不得志也言衛之忠臣不得其志爾出自北門憂心殷殷興也北門背明鄉隂終窶且貧莫知我艱窶者無禮也貧者困於財已焉哉天實為之謂之何哉王事適我政事一埤益我適之埤厚也我入自外室人交遍謫我謫責也已焉哉天實為之謂之何哉王事敦我政事一埤遺我敦厚遺加也我入自外室人交遍摧我摧沮也已焉哉天實為之謂之何哉秦宣公薨子九人莫立立其弟成公經曰三十年春王正月夏師次于成秋七月齊人降鄣鄣者紀之附庸微乎微者也齊人不道肆具強力脅使降附不書鄣降而曰降鄣者以齊之強故罪之深以鄣之微故責之薄春秋之法扶弱抑強明道義也霸者之政以強臨弱急事功也故曰五霸三王之罪人仲尼之徒無道桓文之事者八月癸亥葬紀叔姬滅國不葬此何以葬賢叔姬也不以亡故而虧婦道故繫之於紀而録其卒葬以賢而得書所以為後世勸也九月庚午朔日有食之鼓用牲于社冬公及齊侯遇于魯濟齊人伐山戎齊人者齊侯也何以知以來獻戎捷稱齊侯則知之矣其稱人譏伐戎也齊公以北戎病燕親越千里之險為燕關地可謂能修方伯連帥之職何以譏之乎桓公不務德勤兵逺伐不正王法以譏其罪則將開後世之君勞中國而事外夷捨近政而貴逺略困吾民之力爭不毛之地其患有不勝言者故特貶而稱人以為好武功而不修文德者之戒也然則伐楚之役何以美之其謂退師召陵責以大義不務交兵而強楚自服乎觀此可以見強本治內柔服逺人之意矣十四年魯築臺于郎二月薛伯薨魯築臺于薛齊侯以戎捷遺諸侯非禮也古者蠻夷戎狄不式王命王命伐之諸侯有功則獻于王王以警于夷兄弟甥舅侵敗王略王命伐之告事而已諸侯不相遺俘魯築臺于秦魯不雨經曰三十有一年春築臺于郎何以書厲民也天子有靈臺以候天地諸侯有時臺以候四時去國築臺于逺而不緣占候是為逰觀之所厲民以自樂也厲民自樂而不與民同樂則民欲與之偕亡雖有臺豈能獨樂乎夏四月薛伯卒築臺于薛六月齊侯來獻戎捷軍獲曰捷獻者下奉上之辭齊侯伐山戎以所得躬來誇示書來獻者抑之也後世宰臣有不賞邊功以沮外徼生事之人得春秋抑戎捷之意秋築臺于秦不雨十五年魯城小榖齊侯為楚伐鄭故請會于諸侯宋公請先見于齊侯夏遇於梁丘魯侯夫人薑氏無子娣叔薑生子啓初公築臺臨黨氏見孟任以夫人言許之生子般衆妾成風生子申公疾問後於叔牙對曰慶父材問於季友對曰臣以死奉般慶父叔牙季友皆桓公子也友之將生公使之曰男也其名曰友在公之右間于兩社為公室輔及生有文在其手曰友遂以名之成風聞友之繇遂事之屬其子焉友以公命鴆叔牙曰飲此則有後於魯國不然死且無後飲之而卒立叔孫氏魯侯薨子般嗣次于黨氏初魯講雩于梁氏女公子觀之圉人犖自牆外與之戲子般怒鞭之公曰不如殺之是有力焉能投蓋于稷門至是慶父使犖賊子般季友奔陳慶父立公子啓如齊求援齊人許之曹伯赤薨諡曰僖公子班嗣曹國風首篇曰蜉蝣三章章四句刺奢也昭公國小而迫無法以自守好奢而任小人將無所依焉蜉蝣之羽衣裳楚楚興也蜉蝣渠略也朝生夕死猶有羽翼以自修飾楚楚鮮明貌心之憂矣於我歸處蜉蝣之翼采采衣服采采衆多也心之憂矣於我歸息息止也蜉蝣掘閲麻衣如雪掘閲容閲也如雪言鮮潔心之憂矣於我歸説有神降于莘王問於內史過曰是何故固有之乎對曰昔夏之興也融降于崇山其亡也回祿信於耹隧商之興也檮杌次于丕山其亡也夷羊在牧周之興也鸑鷟鳴於岐山其衰也杜伯射王於鄗其君齊明衷正清潔惠和有德則興其君貪冒辟邪淫荒矯誣失德則亡王曰今何神也對曰昭王房后實有爽德協于丹朱是實照臨周之子孫而禍福之王曰其誰受之對曰今虢少荒其亡矣乎王使太宰忌父帥狸姓傅氏奉犧牲粢盛玉帛往獻不祈經曰三十有二年春城小榖夏宋公齊侯遇於梁丘秋七月癸巳公子牙卒牙有今將之心而季子殺之其不言刺者公羊以為善之也殺母兄何善爾誅不得避兄君臣之義也曷為不直誅而鴆之使託若以疾死然親親之道也陸淳曰季子恩義俱立變而得中夫子書其自卒以示無譏也得之矣八月癸亥公薨於路寢趙匡曰君終必於正寢就公卿也若蔽於隱是女子小人得行其志矣莊公薨于路寢不為不正而嗣子受禍幾至亡國何也大倫不明而宗嗣不定兵柄不分而主威不立得免其身幸矣冬十月己未子般卒莊公過時越禮而娶謬於易基乾坤詩始關雎大舜不告之義甚矣而子般乃孟任之所出也胡能有定乎有國者可不戒哉公子慶父如齊昔成王將終命七臣相康王方是時掌親兵者太公望之子伋也宰臣召公奭命仲完南宫毛取二干戈虎賁百人于伋以逆嗣子伋雖掌兵非有宰臣之命不敢發也召公雖制命非二諸侯將命以往伋亦不承也兵權散主不專屬於一人可知矣子般之卒慶父弒也宜書出奔其曰如齊者自書伐於餘丘見莊公專以兵權授之慶父至是弒君出入自如國人不能制也其垂戒之義明且逺矣狄伐邢十六年管仲言於齊侯曰戎狄豺狼不可厭也諸夏親䁥不可棄也宴安鴆毒不可懷也詩云豈不懷歸畏此簡書簡書同惡相恤之謂也請救邢以從簡書齊侯從之魯葬其君莊公既葬而絰不入庫門士大夫既卒哭麻不入魯侯會齊侯盟于落姑請復季友齊侯使召諸陳魯侯次于郎以待之友歸于魯齊侯使仲孫湫省魯難歸言於公曰不去慶父魯難未巳公曰若之何而去之對曰難不已將自斃君其待之公曰魯可取乎對曰不可猶秉周禮周禮所以本也臣聞之國將亡本必先顛而後枝葉從之魯不棄周禮未可動也君其務寧魯難而親之晉侯作二軍使太子申生將下軍公將上軍趙夙御戎畢萬為右以滅耿滅霍滅魏師還為太子城曲沃士蒍曰分之都城而位以卿先為之極世子不得立矣不如逃之無使罪至為吳太伯不亦可乎賜趙夙耿夙叔帶之五世孫也賜畢萬魏萬畢公髙之裔孫也唐國風十一篇曰葛生五章章四句刺晉獻公也好戰功則國人多喪矣葛生蒙楚蘞蔓于野興也葛生延而蒙楚蘝生蔓于野喻婦人外成於他家豫美亡此誰與獨處葛生蒙棘蘞蔓于域域營域也豫美亡此誰與獨息息止也角枕粲鮮明兮錦衾爛兮齊則角枕錦衾禮夫不在斂枕篋衾席韣而藏之豫美亡此誰與獨旦夏之日冬之夜言長也百嵗之後歸于其居冬之夜夏之日百嵗之後歸于其室室猶居也經曰元年春王正月不書即位莊公薨子般卒慶父夫人利閔公之幼而得立焉是內不承國於先君也魯有大故不告于周閔既主喪而王不遣使是上不請命於天子也內無所承上不請命故不書即位正人道之大倫也齊人救邢凡書救者未有不善之也救在京師則罪列國子突救衛是也救在夷狄則罪諸侯狄救齊吳救陳是也救在逺國則罪四鄰晉陽處父帥師伐楚以救江是也救而不速救者則書所次以罪其慢叔孫豹救晉次于雍榆是也救而不敢救者則書所至以罪其怯齊侯伐我北鄙圍成公救成至遇是也兵者春秋之所甚重衛靈公問陳孔子對曰俎豆之事則嘗聞之矣軍旅之事未之學也獨至於救兵而書法若此聖人之情見矣其稱人將卑師少也夏六月辛酉葬我君莊公秋八月公及齊侯盟於落姑季子來歸按左氏盟于落姑謀復季友也其曰季子賢之也其曰來歸喜之也自外至者為歸是嘗出奔矣何以不書莊公薨子般弒慶父主兵勢傾公室季子力不能支避難而出奔恥也魯國方危內賊未討國人思得季子以安社稷而公為落姑之盟以請于齊則是賢也春秋欲沒其耻故不書奔欲旌其賢故特稱季子聖人之情見矣隱惡而揚善舜也樂道人之善惡稱人之惡孔子也為尊者諱為親者諱為賢者諱春秋也明此可以畜納汙之德樂與人為善矣其不稱公子見季友自以賢德為國人所與不緣宗親之故也堯敦九族而急親賢退嚚訟周厚本枝而庸旦仲黜蔡鮮義皆在此而親親之殺尊賢之等著矣此義行則內無貴戚任事之私外無棄親用羈之失而國不治者未之有也此春秋待來世之意冬齊仲孫來仲孫齊大夫也其不稱使而曰來者略其君臣之常詞以見桓公使臣不以禮仲孫事君不以忠也按左氏齊侯憂魯使仲孫來省難何以言使臣不以禮也鄰有弒逆則當聲罪戒嚴修方伯之職以奉天討而更使計謀之士窺覘虛實有乘亂取國之心則使臣非以禮矣仲孫歸曰不去慶父魯難未已君其務寧魯難而親之何以言事君不以忠也田常弒簡公孔子沐浴而朝告於哀公請討焉豈曰齊人方強姑少待之也不勸其君急於討賊而俟其自斃則事君非以忠矣使慶父稔惡閔公再弒則桓公與仲孫始謀不臧之所致爾直書曰齊仲孫來交譏之也十七年冬十一月齊人遷陽春三月乙酉魯禘於莊公魯夫人薑氏欲立慶父初公傅奪卜齮田公不禁夏六月辛丑慶父使齮賊公于武闈諡曰閔公季友以公子申適邾七月夫人薑氏孫于邾慶父奔莒季友以申歸而立之慶父至莒莒人逐之將田乎齊齊人不納却反舍于汶水之上使公子魚請不許哭而往慶父曰奚斯之聲也乃縊立其後為仲孫氏齊侯使髙徯將南陽之甲至于魯時魯難初平人情未定徯助之修守備鎮撫內外結盟而歸魯人賴之以為美談至於久而不絶曰猶望髙子也邶國風十六篇曰北風三章章六句刺虐也衛國並為威虐百姓不親莫不相攜持而去焉北風其涼雨雪其雱興也北風寒涼之風雱盛貌惠而好我攜手同行惠愛行道也其虛其邪既亟只且虛虛也亟急也北風其喈雨雪其霏喈疾貌霏甚貌惠而好我攜手同歸歸有德也其虛其邪既亟只且莫赤匪狐莫黑非烏狐赤烏黑莫能别也惠而好我攜手同車攜手就車其虛其邪既亟只且十月狄人伐衛初衛侯好鶴鶴有乘軒者受甲者皆曰使鶴鶴實有祿位豫焉能戰衛侯與狄戰於熒澤衆潰衛侯死國人東走為狄所邀遂滅衛初公子頑生子曰申曰燬宋桓夫人許穆夫人燬見衛之多患也先適齊至是宋公逆諸河宵濟衛之遺民男女七百人合别邑共滕之民為五千人立申以廬於漕諡先君曰懿公未幾申薨諡曰戴公衛人立燬齊侯使公子無虧帥車三百乘甲士三千人戍漕鄘國風終十篇曰載馳五章一章六句二章章四句一章六句一章八句許穆夫人作也閔其宗國顛覆自傷不能救也衛懿公為狄人所滅國人分散露於漕邑許穆夫人閔衛之亡傷許之力小不能救思歸唁其兄又義不得故賦是詩也載馳載驅歸唁衛侯載辭也吊失國曰唁驅馬悠悠言至于漕悠悠逺貌漕衛東邑大夫跋涉我心則憂草行曰跋水行曰涉既不我嘉不能旋反不能旋反我思也視爾不臧我思不逺不能逺衛也既不我嘉不能旋濟濟止也視爾不臧我思不閟閟閉也陟彼阿丘言采其虻偏髙曰阿丘虻貝母也升至偏髙之丘采其虻者將以療疾女子善懷亦各有行行道也許人尤之衆稚且狂尤過也是乃衆幼稚且狂進取一槩之義我行其野芃芃其麥願行衛之野麥芃芃然方盛長控于大邦誰因誰極控引極至也大夫君子無我有尤百爾所思不如我所之不如我所思之篤厚也鄭大夫髙克好利而不顧其君鄭伯惡而欲逺之不能使克將兵禦狄于竟陳其師旅翺翔河上久而不召衆散而歸髙克奔陳公子素惡髙克進之不以禮鄭伯退之不以道危國亡師之本而作清人之詩焉鄭國風五篇曰清人三章章四句刺文公也清人在彭駟介旁旁清邑也彭衛之河上鄭之郊也介甲也二矛重英河上乎翺翔重英矛有英飾也清人在消駟介麃麃消河上地也麃麃武貌二矛重喬河上乎逍遙重喬纍荷也清人在軸駟介陶陶軸河上地也陶陶驅馳之貌左旋右抽中軍作好左旋講兵右抽抽矢以射居軍中為容貌鄭國風六篇曰羔裘三章章四句刺朝也言古之君子以風其朝焉羔裘如濡洵直且侯如濡潤澤也洵均侯君也彼其之子舍命不渝渝變也羔裘豹飾孔武有力豹飾緣以豹皮也孔甚也彼其之子邦之司直司主也羔裘晏兮三英粲兮晏鮮盛貌三英三德也彼其之子邦之彥兮彥士之美稱秦成公薨子七人莫立立其弟任好晉侯以驪姬為夫人將廢世子使世子伐東山臯落氏里克諌曰世子奉冢祀社稷之粢盛以朝夕視君膳者也君行則守有守則從古之制也師在制命而已稟命則不威專命則不孝君其舍之公曰寡人有子未知其誰立焉不對而退見世子世子曰吾其廢乎對曰告之以臨民教之以軍旅不共是懼何故廢乎且子懼不孝無懼弗得立修己而不責人則免於難梁餘子養先丹木曰縱敵可盡猶有內讒死而不孝不如違之世子不可遂伐狄至於稷桑世子欲戰狐突勸世子行曰若惠於父而逺於死惠於衆而利社稷可乎世子不可敗狄於稷桑而歸讒言彌興狐突杜門不出經曰二年春王正月齊人遷陽夏五月乙酉吉禘于莊公程氏曰天子曰禘諸侯曰祫其禮皆合祭也孔子曰魯之郊禘非禮也周公其衰矣禘言吉者喪未三年行之太早也于莊公者方祀于寢非宫廟也一舉而三失禮焉春秋之所謹也四時之祭有禘之名蓋禮文交錯之失秋八月辛丑公薨公薨不地者仲尼親筆觀于刪詩在諸國則變風皆取在魯則獨編史克之頌或問吾黨有直躬者其父攘羊而子證之則曰吾黨之直者異於是父為子隱子為父隱直在其中矣後世緣此制為五服相容隱之條以綴骨肉之恩然則諱而不言弒也何以傳信於將來曰書薨以示臣子之情不地以存見弒之實何為無以傳信也凡君終必書其所獨至於見弒則沒而無所其情厚矣其事亦白矣非聖人能修之乎後世記言之士欲諱國惡則必失其實直書無隱又非臣子所當施之於君父也而春秋之法不傳矣九月夫人薑氏孫于邾夫人稱孫聞乎故也不去姓氏降文薑也莊公忘親釋怨無志于復讐春秋深加貶絶一書再書又再書屢書而不諱者以謂三綱人道所由立也忘父子之恩絶君臣之義國人習而不察將以是為常事則亦不知有君之尊有父之親矣莊公行之而不疑大臣順之而不諫百姓安之而無憤疾之心也則人欲必肆天理必滅故叔牙之弒械成于前慶父之無君動于後圉人犖卜齮之刃交發于黨氏武闈之間哀薑以國君母與聞乎故而不忌也當是時魯君再弒幾至亡國其應不亦憯乎春秋以復讐為重而書法如此所謂治之于未亂保之于未危不可不察也公子慶父出奔莒公子出奔譏失賊也閔公立而季子歸何以見弒慶父主兵日久其權未可遽奪也季子執政日淺其謀未得盡行也設以聖人處之期月而已可矣季子賢人而當此能必克乎及閔公再弒慶父罪惡貫盈而疾之者愈衆季子忠誠顯著而附之者益多外固強齊之援內協國人之情正邪消長之勢判矣然後夫人不敢安其位慶父不得肆其姦此明為國者不知圖難于其昜為大於其細雖有智者亦不能善其後矣世儒或言用魯之衆因齊之力以戮慶父其勢甚易而季子不能故書夫人孫邾慶父奔莒所以深惡其緩不討賊則非也以絳侯勃之果陳平之無誤將相交歡而內有朱虛外連齊楚以制諸吕庸人宜易於反手然太尉已入北軍士皆左袒猶恐不勝未敢訟言誅之也況於慶父巨姦三十年執兵柄其植根深矣其耳目廣矣其用物𢎞矣而以為戮之其勢甚易此未察乎難易遲速之幾者也經書莊公忘親無復讐之志使百官則而象之亦不知有君父也而又使慶父主兵失馭臣之道是以至此極故書孫邾奔莒為後世之永鑒也冬齊髙子來盟髙子齊大夫也子者男子之美稱其稱子賢之也何賢乎髙子莊公薨子般卒閔公弒慶父夫人亂乎內魯於是曠年無君齊桓公使將南陽之甲至魯而謀其國其命髙子必曰魯可取則兼其國以廣地魯可存則平其亂以善鄰非有安危繼絶一定不可易之計也髙子至則平魯難定僖公魯人賴焉以為美談至于久而不絶曰猶望髙子也聖人美其明人臣之義得奉使之宜特稱髙子以著其善其不曰齊侯使之者權在髙子也十有二月狄入衛衛康叔之後蓋北州大國狄何以能入乎臣昔嘗謂河南劉奕曰史氏記繁而志寡如班固書載諸王淫亂等事盡削之可也奕曰必若此言仲尼刪詩如牆有茨鶉之奔奔桑中諸篇何以録於國風而不削乎臣不能答後以問延平楊時時曰此載衛為狄所滅之因也故在定之方中之前因以是説考於歷代凡淫亂者未有不至於殺身敗家而亡其國者也然後知古詩垂戒之大而近世有獻議乞於經筵不以國風進讀者殊失聖經之旨矣鄭棄其師按鄭詩清人刺文公也髙克好利而不顧其君文公惡之而不能逺使克將兵禦狄於境陳其師旅翺翔河上久而不召衆散而歸髙克奔陳公子素惡髙克進之不以禮文公退之不以道危國亡師之本故作是詩觀此則鄭棄其師可知矣或曰髙克進不以禮曷不書其出奔以貶克為人臣之戒而獨咎鄭伯何也曰人君擅一國之名寵殺生豫奪惟我所制爾使克不臣之罪已著按而誅之可也情狀未明黜而逺之可也愛惜其才以禮馭之可也烏有假以兵權委諸境上坐視其失伍離散而莫之恤乎然則棄師者鄭伯乃以國稱何也二三執政股肱心膂休戚之所同也不能進謀於君協志同力黜逐小人而國事至此是謂危而不持顛而不扶則將焉用彼相矣晉出帝時景延廣專權諸藩擅命及桑維翰為相出延廣於外一制書所敕者十有五鎮無敢不從者以五季之末維翰能之而鄭國二三執政畏一髙克不能退之以道何政之為書曰鄭棄其師君臣同責也皇王大紀卷三十九

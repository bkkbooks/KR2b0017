body:
  text: 皇王大紀卷二宋胡宏撰五帝紀黄帝軒轅氏黄帝軒轅氏少典之後曰公孫氏母曰附寶有蟜氏女也感大電光繞北斗樞星照於郊野之祥生軒轅於夀丘長於姬水為姬姓生而龍顔㓜而徇齊學於大真長而敦敏成而聰明有風后老天五聖知命規紀地典力牧或作墨七聖為之輔又有常光大鴻容光三臣為之佐神農侵暴諸侯軒轅興師征之神農氏大戰于阪泉之野三戰神農氏敗績黄龍負圖出于河有璽焉章曰天皇符璽軒轅遂踐天子位在所則有景雲若金枝玉葉蔭其上因以雲紀官春官為青雲氏夏官為縉雲氏秋官為白雲氏冬官為黒雲氏中官為黄雲氏置三公之職以象三台侍中風后配上台老天配中台五聖配下台推五徳之運以土承火號曰歸藏氏始作軒車故曰軒轅氏都于有熊作布政之所曰合宮又曰明庭神農氏之臣蚩尤起九冶始作鎧㦸戈矛以賊亂為政平民化之罔不寇賊鴟義姦宄奪攘矯䖍軒轅征之值天霧晦㝠軍行迷乃作指南車載之以旌前朱雀而後𤣥武左青龍而右白虎招揺在上進退有度左右有局各司其局進擊蚩尤殺之於涿鹿之阿徙其徒於有北天下有不道從而征之凡五十三征奄有中區東至於海登九山及岱宗西至崆峒登鷄頭南至於江登熊湘北逐葷粥合符釡山置左右大監監於萬國命倫氏訪大夏之西崑崙之陰取嶰谿之竹空竅厚均者斷兩節間而吹之中黄鍾之宫於是制十二籥以聽鳳凰之鳴其雄聲六雌聲亦六故黄鍾之宫聲發於自然為十二律之本其長九寸實秬黍其中容秬黍一千二十五是故度起於黄鍾之長量起於黄鍾之虚衡起於黄鍾之重或曰度始於忽十忽為毫十毫為釐以十積之而成分寸尺丈引是為五度量者始於一粟六十粟為一抄十抄為撮以十積之而成龠合升斗斛是為五量後至於周四升為豆四豆為區四區為鬴量實一鬴甗實二鬴盆實二鬴甑實二鬴豆實三而成觳簋實一觳庾實二觳鬲實五觳衡者始於絫黍粒百為銖二十銖為兩十六兩為斤三十斤為鈞四鈞為石是為五權度量權合於律然後措諸天下無所不行田可分禄可均法一政平禮可制樂可作故律也者萬事根本也是故度律均鍾紀之以三平之以六成於十二陰陽相扶同類取妻隔八生子黄鍾天統乾之初九始於子十一月也黄鍾生林鍾林鍾地統坤之初六位於未六月也林鍾生太簇太簇人統乾之九二位於寅正月也太簇生南呂南呂坤之六二位於酉八月也南呂生姑洗姑洗乾之九三位於辰三月也姑洗生應鍾應鍾坤之六三位於亥十月也應鍾生㽔賔㽔賔乾之九四位於午五月也㽔賔生大呂大呂坤之六四位於丑十二月也大呂生夷則夷則乾之九五位於申七月也夷則生夾鍾夾鍾坤之六五位於卯二月也夾鍾生無射無射乾之上九位於戌九月也無射生仲呂仲呂坤之上六位於巳四月也陽為六律陰為六呂自子至巳為陽律陽呂皆下生自午至亥為陰律陰吕皆上生下生者三分損一上生者三分益一制是十二筒即十二籥也黄鍾九寸林鍾六寸太簇八寸以候天地之氣是為三律其他咸不全寸有餘分焉子為天正中男之所也丑為地正少男之所也寅為人正長男之所也聖人明三正以正始則天下之理得矣軒轅命榮猨氏鑄是十二鐘大不出鈞重不過石合陰陽之和播之於五音宫商角徵羽文之以八聲金石土革絲木匏竹大不踰宫細不過羽器重者從細輕者從大是故鐘尚羽磬尚角琴瑟尚宫笙簫利徵鞉鼓柷敔一聲細鈞有鐘無鏄無鍾聲以和樂律以平聲金石以動之絲竹以行之詩以道之歌以詠之匏以宣之瓦以贊之革木以節之而行八風聲應相保而和細大不踰而平命曰雲門大卷樂論曰至哉宫之聲也猶五行之土金木水火得之然後生猶四端之仁義禮智得之然後得中猶事之中天地萬物得之然後成是故宫聲者不可以易知也必上有體元之君下有調元之臣安土樂天然後宫聲可識而雅樂可復也後世以其淺陋之徳而欲求𤣥妙之聲必不應矣惟禮亦然故孔子曰人而不仁如禮何人而不仁如樂何太極函三為一始動於子參之於丑得三又參之於寅得九又參之於卯得二十七厯十二辰得十七萬七千一百四十七而天地之數備陰陽保合元氣運行周天三百六十五度四分度之一二十八宿之躔次即天度也天道起於子自北東行周十二辰而為一晝夜行一周則東超一度與日相應五日為一候三候為一氣六氣為一時四時而成嵗日自牽牛東北西行一晝夜行一度而為一日月随日西行一晝夜行十三度十九分度之七其行度也有贏縮故或二十九周或三十周而日月會是以三五而盈三五而闕有晦有朔而為一月正月孟春天行至寅東北艮之方日月所㑹之辰曰娵訾其分野衞其宿箕十一度或云十度尾十八度或云十九度日在危經營室及奎昬參中旦尾中律中太簇其音匏其器笙竽其風條風至而立春其節雨水驚蟄其卦曰䝉曰益曰漸曰泰曰需曰遯二月仲春天行至卯正東震之方日月所㑹之辰曰降婁其分野魯其宿心大火也五度或云六度房五度氐十五度或云十六度日在奎經婁至胃昬弧中旦建星中南方朱鳥七宿昬畢見於南方律中夾鍾其聲角其音竹其器管籥其徳木其數八其味酸其臭羶其風明庻風至而春分日出而甲入于西極日在兩交晝夜等其於人也為肉為目為肝為呼為怒為號為仁其卦曰晉曰解曰大壯曰豫三月季春天行至辰東南巽之方日月所㑹之辰曰大梁其分野趙其宿角十二度亢九度日在胃經卯及畢昬七星中旦牽牛中胃西方之宿也是為西陸律中姑洗其節清明榖雨自箕至角七宿形為蒼龍鱗蟲屬焉其類三百六十龍為之長其卦曰訟曰蠱曰革曰夬曰旅四月孟夏天行至已東南巽之方日月所㑹之辰曰實沈其分野晉其宿軫十七度翼十八度日在畢經觜參及東井昬翼中旦婺女中律中仲吕其音木其器柷敔其風清明風至而立夏其節小滿芒種其卦曰師曰比曰小畜曰乾曰大有五月仲夏天行至午正南離之方日月所會之辰曰鶉首其分野秦其宿張十八度星七度柳十五度或云十四度日在東井經鬼及柳昬亢中旦危中東方蒼龍七宿昬中見於南方律中㽔賔其聲徵其音絲其器琴瑟其徳木其數七其味苦其臭焦其風景風至而夏至日出於艮南入於乾晝長夜短其於人也為脉為舌為心為笑為視為喜為禮其卦曰家人曰井曰咸曰姤曰鼎六月季夏天行至未其方西南坤之方日月所㑹之辰曰鶉火其分野周其宿鬼四度或云二度東井三十三度或云三十四度日在柳經星及張昬火中旦奎中柳南方之宿也是為南陸律中林鍾其節小暑大暑自軫至井七宿形為朱雀羽蟲屬焉其類三百六十鳳為之長其卦曰豐曰渙曰履曰遯曰恒土者物之府藏也偏王四時其數五其味甘其臭香其蟲倮其律中黄鍾之宫宫者聲之紀綱也徧主五聲其於人也為血為口為脾為歌為樂為思為信七月孟秋天行至申西南坤之方日月所會之辰曰鶉尾其分野楚其宿參九度或云十度觜二度或云一度日在張經翼及軫昬建星中旦畢中律中夷則其音土其器壎缶其風涼風至而立秋其節處暑白露其卦曰節曰同人曰損曰否曰巽八月仲秋天行至酉正西兊之方日月所㑹之辰曰壽星其分野鄭其宿畢十六度或云十八度昴十一度胃十四度或云十五度日在軫經角亢及氐昬牽牛中旦觜觿中北方𤣥武七宿昬畢見於南方律中南吕其聲商其音金其器鐘鼓其徳金其數九其味辛其臭腥其風閶闔風至而秋分日出於卯入於庚日在兩交晝夜等其於人也為骨為鼻為肺為哭為悲為言為義其卦曰萃曰大畜曰賁曰觀曰歸妹九月季秋天行至戌西北乾之方日月所會之辰曰大火心為大大其分野宋其宿娄十六度或云十二度奎十六度日在氐經房心及尾昬虚中旦柳中房東方之宿也是為東陸律中無射其節寒露霜降自參至奎七宿形為白虎毛蟲屬焉其類三百六十麟為之長其卦曰无妄曰明夷曰困曰剥十月孟冬天行至亥西北乾之方日月所㑹之辰曰析木其分野燕其宿東壁九度營室十六度或云十七度日在尾經箕及斗昬危中旦七星中律中應鍾其音石其器磬其風不周風至而立冬其節小雪大雪其卦曰艮曰既濟曰噬嗑曰大過曰坤十一月仲冬天行至子正北坎之方日月所會之辰曰星紀其分野吳越其宿虚十度湏女十二度或云十一度日在斗及湏女昬東壁中旦軫中牽牛北方之宿也是為北陸日出於巽南入於坤西方白虎七宿昬畢見於南方律中黄鍾其聲羽其徳水其數六其味鹹其臭朽其風廣莫風至而冬至是月之行度盡斗二十六度復起牽牛之初度則為冬至而三百六十五度四分度之一周矣是為一嵗而厯更端焉故為三微之始其於人也為髓為耳為腎為呻為恐為聽為智其卦曰未濟曰蹇曰順曰中孚曰復十二月季冬天行至丑東北艮之方日月所會之辰曰𤣥枵其分野齊其宿牽牛八度或云七度斗三十六度或云三十五度日在湏女經虚及危昬婁中旦氐中律中大呂其節小寒大寒自壁至斗七宿形為𤣥武介蟲屬焉其類三百六十龜為之長其卦曰屯曰謙曰睽曰升曰臨曰小過北斗七星一曰天樞又曰貪狼二曰天旋又曰巨門三曰天機又曰禄存四曰天權又曰文曲五曰天衡又曰亷貞六曰開陽又曰武曲七曰揺光又曰破軍自一至四為天魁是為璿璣自五至七為天綱是為玉衡玉衡為杓月建一辰閏則指兩辰之間周而復始斟酌元氣均節五行運平四時武曲之下有小星曰輔弼日之所行謂之黄道南北極之中謂之赤道二十八宿繫於黄道之上日春西陸夏南陸秋東陸冬北陸月立春春分行黄道東謂之青道立夏夏至行黄道南謂之朱道立秋秋分行黄道西謂之白道立冬冬至行黄道北謂之黑道黄道内外各四并黄道為九黄道赤道如二環相交而小差几日月同在一度相遇則日為之食正一闕則月為之食月生三日而成震曰朏與日相衡則光盈故十五而成乾近日則明闕故三十日成坤滅藏於癸曰晦合壁曰朔舒先速後近一逺三曰弦軒轅命師大撓氏正甲子羲和氏占日常儀氏占月㬰區氏占星隸首氏理算數伶倫氏榮猨氏正律吕各盡其方於是命容成氏綜六術為盖天著周天厯度造調厯以斗杓建寅春正月為嵗首天秉陽垂日星陽數竒故觀天者占星而已地秉陰竅於山川陰數耦故觀地者随山而理川軒轅既上觀天文大明時令乃周行天下觀地理遷徙徃来無常處以兵師為營衞按洛書之文方者土也於是畫天下為九州以井制地使民存亡更守出入相司嫁娶相媒有無相貸疾病相救六尺為歩歩百為畆畆百為夫夫三為屋屋三為井井方一里里五為邑邑十為丘丘十為都都十為師師十為州以總人心以詳民數塞欺陵之路弭姦宄之望治五氣藝五種撫萬民度四方上古牛未穿馬未絡至是服牛乗馬引重致逺而民力裕上古山處於穴棲於木至是營宫室制戸牖而猛暴禁作杵臼而榖粟始鑿作釡竈而民始粥作甑而民始飯以烹以炰以為醴酪行而有屝草為之屨帛為之履皮為之焉死而有棺椁焉城城築邑重門擊柝以待暴客弦木為弧剡木為矢弩刀槍鉞皆是時所作習熊虎貔貅之士以威天下後世因之以有六弓四弩八矢五兵五盾之法所以養民而保之者至矣於是制軒冕目垂旒耳充纊𤣥衣黄裳旁觀翬翟草木之英華畫繢五色為文章東青西白南赤北黒天地𤣥黄青與白相次也赤與黒相次也𤣥與黄相次也青與赤謂之文赤與白謂之章白與黒謂之黼黒與青謂之黻五采備謂之繡土以黄其象方天時變象以圜山以章水以龍鳥獸虵雜四時五色以章之凡畫繢之事後素工以别貴賤而上下有序各安其分五行之動迭相息也五行四時十二月還相為本也五聲六律十二管還相為宫也五味六和十二食還相為滋也五色六章十二衣還相為質也軒轅明於天地之道體神而起數倚數而觀象見象而制器是以成而人用之用而人利之利而人安之安而人守之守而人不可變是謂徳配天地道之至也制度之經也其可變者禮樂汚隆而已書契作而史官建左史記言右史記動倉頡沮誦軒轅史官也見鳥獸􅕭迒之迹有文理之可滋作鳥跡篆以乂百工以察萬品其文分類象形而生故謂之字字有六義一曰指事上下之類二曰象形日月之類三曰諧聲團圓之類四曰㑹意止戈為武之類五曰轉注考老之類六曰假借令長之類天下之字一而音不同者土風殊而呼吸異天有隂陽地有柔剛律有闢翕吕有唱和一陰一陽交春夏秋冬備而萬情生焉一柔一剛交東南西北備而萬形成焉一闢一翕交平上去入備而萬聲生焉一唱一和交開發收閉備而萬音成焉日生律月生吕星生聲辰生音金成律土成吕火成聲水成音律為君為夫吕為臣為婦聲為父為男音為子為女東方之言在齒舌其音輕而深西方之言在頰舌其音重而淺北方之言在喉舌其音重而深南方之言在唇舌其音輕而淺便於喉者不利於唇巧於齒者不善於頰是故吳楚傷於輕淺燕趙傷於重濁秦隴則去聲為入梁益則平聲似去若管之以天地律吕則輕重淺深清濁之變三十有六而窮矣故字有母止於三十六也能知其母律随天而變吕随地而化闢随陽而出翕随隂而入唱随剛而上和随柔而下故聲音之道正則字之義無不通近而能逺微而能彰雖五方之民言語不通而可以音詔之也軒轅居寶位百年而歿𦵏於橋山天下哀慕黄帝以其生而居中土宰制羣動者也帝推厯生律制器規圓矩方法一置而變順天地之紀幽明之占死生之說存亡之難時播百榖草木淳化鳥獸蟲蛾旁羅水波土石金玉勞動心思耳目節用水火材物故民安樂不使而成不禁而止百官無私天下和風雨時五榖登而人民夀鳳凰巢阿閣麒麟遊於郊猶作輿几之箴以警宴安作金几之銘以戒逸欲成功大致豐利不自髙其道不自聖其躬徳澤流天下至今人䝉其惠雖死猶生也世有方士家鼓惑愚人僥倖榮利言世有仙術帝得之騎龍上升天群臣思慕葬弓劍衣冠者真妖妄矣帝四妃二十五子其得姓者十有四人為十二姓姬酉祁己滕箴任荀嬉姞儇依元妃西陵之女嫘祖親蠶為絲以率天下生二子長曰𤣥囂是為青陽摯次曰昌意論曰按史載五帝三王唯包羲為别姓自炎而下皆同宗也厯世緜逺雖不可攷其然否以理推之則或可信今夫在天則日月迭照而五星二十八宿不得與之爭光在水則大江濁河貫注華夏而衆水演迤不得與之爭道在山則岍岐嶓􅜗横亘四海之内而萬山低伏不得與之爭勢在人則包羲神農黄帝堯舜禹湯文武仲尼傑出一世獨與天地相似而俊材異能之士委命陳力不得與之爭聖何獨至於姓而疑之乎其可疑者世數多寡長短耳故愚特載其苗裔而於世數則畧之云青陽少昊氏青陽摯之生螺祖感大星如虹下臨華渚之祥黄帝之時降居江水為己姓以金徳王故號曰金天氏能修太昊之法象日月之明故曰少昊氏都于曲阜青陽初立鳳鳥適至因作鳳凰之書以鳥紀官鳳鳥知天時故立鳳鳥氏為厯正𤣥鳥春分来秋分去故立𤣥鳥氏以司分伯趙夏至鳴冬至止故立伯趙氏以司至青鳥立春鳴立夏止故立青鳥氏以司啟丹鳥立秋来立冬去故立丹鳥氏以司閉是為厯正之四屬祝鳩性馴順故立司教化者為祝鳩氏睢鳩摯而有别故立司政法者為睢鳩氏鳲鳩均平故立司田土者為鳲鳩氏爽鳩鷙故立司刑禁者為爽鳩氏鶻鳩春来冬去故立司事者為鶻鳩氏是為鳩民之五氏西曰鷷雉東曰鶅雉南曰翟雉北曰鵗雉伊洛之間曰翬雉立五雉為五工正利器用正度量以夷民者也立春夏秋冬行宵桑老九扈為九農正扈民無淫者也少昊氏有四叔焉曰重曰該曰修曰熈重明木之性為勾芒該明金之性為蓐收修及熈明水之性為𤣥冥世不失職遂濟窮桑青陽在位八十四年樂作九淵之歌帝既殁少昊氏衰九黎亂徳天下之人相懼以神相惑以怪家為巫史民匱於祀災禍薦至論曰邪說之為人害也乆矣以五帝之時九黎猶亂風教矧漢以来聖學絶滅世衰一世在上之人茍且徼倖功成而氣盈利得而志怠崇尚勢力而不知仁義者乎是故雖隆盛之時禮制不必行刑賞不必中民不知方故釋氏巫祝得以其說誑惑斯民為薦死求生祈福免禍天下靡然從之在上者恬然不復知禮制賞刑之本在下者不復知正身修行之實鬼教浮虚之言徧天下風俗既移孰能不外飭事君之禮内懷背上之心志在伏節死義以三綱為己任臨事不茍免乎闕文庶幾頽靡之風可一變也顓頊髙陽氏顓頊髙陽氏昌意正妃蜀山氏曰女樞感瑶光貫月如虹之祥而生顓頊學於緑圖師於伯夷静淵有謀疏通知逺養財以任地載時以象天依鬼神以制義治氣以教化潔誠以祭祀四方歸之以水徳王都于濮陽後世謂濮陽為帝丘始以民事紀官覩蛞􅀢之形而作科斗書地純陰凝聚於中天浮陽轉旋於外周旋無端其體渾渾顓頊始為儀制以驗其盈升虚降治乙卯厯以明四時命少昊氏子重為南正司天以屬神髙陽氏子黎為火正司地以屬民絶地天通使無相侵潰革九黎之亂神人不雜萬物有序民安其生作五基之樂五莖之歌少昊子昧為𤣥𡨕師生允格臺駘能業其官宣汾洮障大澤以處大原帝用嘉之封諸汾川帝為天子北自幽陵南自交趾西自流沙東自蟠木動静之物大小之神日月所照莫不砥屬在位七十八年而歿適子曰窮蟬别子曰鯀封為崇伯帝嚳髙辛氏帝嚳髙辛氏青陽之孫生而神靈自言其名師於伯招聰以知逺明以察微順天之義知民之急仁而威愿而信其動衆也時其服喪也哀普施利物不私其身天下歸之都于亳次序三辰以治厯明時教民稼穡執中而尹天下取地之財而節用之撫教萬民而利誨之厯日月而迎送之明鬼神而敬事之其色郁郁其徳嶷嶷制鼙鼓鐘磬塤箎作六英之樂火正黎能昭顯天明敦大地徳光照四海帝使并掌重職賜之氏曰祝融市法壞祝融修之以便兆民祝融死弟吳回嗣居其位吳回之子陸終娶鬼方氏生六子皆析剖而産焉長曰樊封於昆吾為己姓次曰參胡後胡為國次曰彭城彭城其封國也次曰鄶人後為鄶國次曰安期次曰季連有封於豕韋者其後重黎職弛而閏餘乖次孟陬殄滅攝提失方帝元妃有邰氏女曰姜嫄與帝嚳禋祀上帝以弗無子步從帝而歸歆然心動孕十月而生子異而寘之隘巷寘之平林又寘之寒氷牛羊字之鳥覆翼之鳥去而呱厥聲載路匍匐岐嶷以就口實因名曰弃娶陳鋒氏女曰慶都有赤龍之祥孕十四月而生堯於丹陵娶有娀氏女曰簡狄浴於𤣥丘祈於髙禖有飛燕之祥卜之而順於是生契娶娵訾氏女曰常儀生子摯帝歿摯襲位未乆而殂堯有聖徳以子州支君疇為師初封於陶後封於唐號曰陶唐氏論曰天地之間有氣化有形化人之生雖以形相禪固天地之精也姜嫄克禋克祀以弗無子志之所至氣亦至焉氣之所至精亦至焉故履帝嚳之武而敏歆於是有子不可謂怪而諸儒不識陋可知也至於䜟緯之書謂慶都感赤龍之精而生堯簡狄吞𤣥鳥之卵而生契則誣矣何者人也乃與繁氣交而生人則無是理矣是以載其事而削其詞焉西漢薄太后有蒼龍據腹之祥而生文帝若非史氏記之詳明則後世必謂薄與龍交而生子矣是故儒者莫要於窮理理明然後物格而知至知至然後意誠而心不亂皇王大紀卷二

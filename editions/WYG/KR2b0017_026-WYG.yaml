body:
  text: 皇王大紀卷二十六宋胡宏撰三王紀康王服制曰喪之有服也稱其惻怛悲悼之情也自髙辛氏其服也哀後世聖人立制度識别親疎貴賤使足以成文理故服術有六一曰親親二曰尊尊三曰名四曰出入五曰長幼六曰從服服制有五一曰斬衰二曰齊衰三曰大功四曰小功五曰緦麻斬衰有二齊衰有四大功四小功緦麻闕親親以三為五以五為九上殺下殺旁殺而親畢從服有六有屬從有徒從有從有服而無服有從無服而有服有從重而輕有從輕而重斬不緝也衰裳上曰衰下曰裳絰麻在首在腰皆曰絰杖絞帶帶繩也冠繩纓菅屨三年者子為父諸侯為天子臣為君父為長子為人後者為所後父妻為夫妾為君父卒而為祖後者女子子在室為父布總箭笄髽衰三年子嫁反在父之室為父三年公士大夫之衆臣為其君布帶繩屨三年疏衰裳齊牡麻絰冠布纓削杖布帶疏屨三年者祖父卒而為祖母後者父卒為母繼母如母繼母如母者配父也慈母如母母為長子妾為君之長子為慈母後者為庶母可也為祖庶母可也子游問於孔子曰喪慈母如母禮與孔子曰非禮也古者男子外有傅内有慈母君命所使教子者也何服之有昔者魯昭公少喪其母有慈母良及其死也公欲喪之有司曰古之禮慈母無服公曰古者天子練冠以燕居公弗忍也遂練冠以喪慈母喪慈母自魯昭公始也疏衰裳齊牡麻絰冠布纓削杖布帶疏屨期者父在為母夫為妻出妻之子為母若為父後則不父卒繼母嫁從為之服報疏衰裳齊牡麻絰冠布纓不杖麻屨期者為祖父母雖天子不降也為世父母叔父母大夫之適子為妻昆弟為衆子昆弟之子大夫之庶子為適昆弟適孫為人後者為其父母報女子子適人者為其父母昆弟之為父後者為繼父同居者為夫之君姑姊妹女子子適人無主者姑姊妹報為君之父母妻長子祖父母妾為女君婦為舅姑夫之昆弟之子公妾大夫之妾為其子女子子為祖父母大夫之子為世父母叔父母子昆弟昆弟之子姑姊妹女子子無主者為大夫命婦者唯子不報大夫為祖父母適孫為士者公妾以及士妾為其父母疏衰裳齊牡麻絰無受三月者庶人為國君寄公為所寓丈夫婦人為宗子宗子之母妻為舊君君之母妻大夫在外其妻長子為舊君為繼父不同居者為曽祖父母大夫為宗子為舊君為曽祖父母為士者女子子嫁者未嫁者為曾祖父母大功布衰裳牡麻絰無受者子女子子叔父姑姊妹昆弟夫之昆弟之子女子子適孫之長殤中殤大夫之庶子為適昆弟公為適子大夫為適子之長殤中殤其長殤皆九月纓絰絰不樛垂其中殤七月不纓絰十九以下為長殤十五以下為中殤十一以下為下殤八歳以下為無服之殤無服之殤以日易月殤而無服大功布衰裳牡麻絰纓布帶三月受以小功衰即葛九月者為姑姊妹女子子適人者為從父昆弟為庶孫為適婦為人後者為其昆弟女子子適人者為衆昆弟為姪丈夫婦人報為夫之祖父母世父母叔父母夫之昆弟無服大夫為世父母叔父母子昆弟昆弟之子為士者若尊同則不降公之庶昆弟大夫之庶子為母妻昆弟皆為其從父昆弟之為大夫者為夫之昆弟之婦女子適人者大夫之妾為君之庶子女子子嫁者未嫁者為世父母叔父母姑姊妹大夫大夫之妻大夫之子公之昆弟為姑姊妹女子子嫁於大夫者君為姑姊妹女子子嫁於國君者旁親天子諸侯無服小功繐衰裳牡麻絰既塟除之者諸侯之大夫為天子小功布衰裳澡麻帶絰五月者為叔父及適孫及昆弟之下殤大夫庶子為適昆弟及姑姊妹女子子之下殤為人後者為其昆弟從父昆弟之長殤為夫之叔父之長殤昆弟之子女子子夫之昆弟之子女子子之下殤為姪庶孫丈夫婦人之長殤大夫公之昆弟大夫之子為其昆弟庶子姑姊妹女子子之長殤大夫之妾為庶子之長殤大功之殤中從上小功之殤中從下君之適長殤車三乗君之庶長殤大夫之適長殤車一乗曾子問曰下殤土周塟于園遂輿機而往塗邇故也若墓逺則如之何孔子曰昔者史佚有子而死下殤也墓逺召公曰何以不棺斂於宫中史佚曰吾敢乎哉召公言於周公周公曰豈不可史佚行之為殤後者以其服服之除殤之喪者其祭也必𤣥小功布衰裳牡麻絰即葛五月者從祖祖父母從祖父母報從祖昆弟從父姊妹孫適人者為人後者為其姊妹適人者為外祖父母從母丈夫婦人報夫之姑姊妹娣姒婦報大夫大夫之子公之昆弟為從父昆弟庶孫姑姊妹女子子適士者大夫之妾為庶子適人者庶婦君母之父母從母君子子為庶母慈已者緦麻三月者為族曾祖父母族祖父母族父母族昆弟庶孫之婦庶孫之中殤從祖姑姊妹適人者報從祖父從祖昆弟之長殤外孫從父昆弟姪之下殤夫之叔父之中殤下殤從母之長殤報庶子為父後者為其母士為庶母貴臣貴妾乳母從祖昆弟之子曾孫父之姑從母昆弟甥壻妻之父母姑之子舅之子夫之姑姊妹之長殤夫之諸祖父母報君母之昆弟從父昆弟之子之長殤昆弟之孫之長殤為夫之從父昆弟之妻士為妾之有子者何謂上殺父三年祖期則曽祖宜大功髙祖宜小功而皆齊衰三月者不敢以大功小功旁親之服加乎至尊也三月則殺矣此所謂上殺何謂下殺適子三年庶子期適孫大功則曾孫宜五月而與𤣥孫皆緦麻三月者曾孫服曾祖三月曾祖報之亦三月以其卑也故服緦麻此所謂下殺何謂旁殺服祖期則世叔父宜大功以其與父一體故加以期從世叔則疏矣故為之小功族世叔又疏矣故為之緦麻此自父而旁殺者也祖之兄弟小功曾祖兄弟緦麻髙祖兄弟無服此自祖而旁殺者也同父至親期同祖為從大功同曾祖為再從小功同髙祖三從緦麻此自兄弟而旁殺者也父為子期為兄弟之子宜九月而亦期者以其猶子而進之也從兄弟之子小功再從兄弟之子緦麻此自子而旁殺者也祖為孫大功兄弟之孫小功從兄弟之孫緦麻此自孫而旁殺者也公子之妻為其皇姑齊衰此從輕而重者也為妻之父母緦麻此從重而輕者也公子之妻為公子之外兄弟緦麻此從無服而有服者也公子為其妻之父母無服此從有服而無服者也王為三公六卿錫衰為諸侯緦衰為大夫士疑衰其首服皆弁絰公為卿大夫錫衰以居出亦如之當事則弁絰大夫相為亦然為其妻往則服出則否練冠麻衣縓緣公子為其母也縓冠葛絰帶麻衣縓緣公子為其妻也皆既塟除之宗子母在為妻禫與諸侯為兄弟者服斬君之母非夫人則羣臣無服唯近臣從君服其餘從而服不從而稅君雖未知喪臣服已從服者所從亡則已屬從者所從雖没服為母之君母母卒則不服為君母後者君母卒則不為君母之黨服妾從女君而出則不為女君之子服女君死則妾為女君之黨服攝女君則不為先女君之黨服生不及祖父母諸父昆弟而父稅喪已則否降而在緦小功者則稅之為君之父母妻長子君已除喪則不稅為慈母之父母無服大夫公之昆弟大夫之子於兄降一等為人後者於兄弟降一等報於所為後之兄弟之子若子君之所為兄弟服室老降一等夫之所為兄弟服妻降一等庶子為後者為其外祖父母從母舅無服宗子孤為殤大功衰小功衰皆三月親則月筭如邦人童子唯當室緦免而杖世子不降妻之父母其為妻也與大夫之適子同大夫降其庶子其孫不降其父夫為人後者其妻為舅姑大功宗子母在為妻禫為慈母後者為庶母可也為祖庶母可也為父母妻長子禫庶子在父之室則為其母不禫為父後者為出母無服無服也者喪者不祭故也適婦不為舅後者則姑為之小功大夫為其父母兄弟之未為大夫者之喪服如士服士為其父母兄弟之為大夫者之喪服如士服大夫之適子服大夫之服大夫之庶子為大夫則為其父母服大夫服其位與未為大夫者齒君為天子三年夫人如外宗之為君世子不為天子服大夫之適子為君夫人太子如士服君之母非夫人則羣臣無服唯近臣及僕驂乗從服唯君所服服也庶子在父之室則為其母不禫庶子不以杖即位父不主庶子之喪則孫以杖即位可也父為長子杖則其子不以杖即位或曰父不為主而杖者姑在為夫杖母為長子削杖女子子在室為父母其主喪者不杖則子一人杖君主夫人妻太子適婦之喪諸侯於異國之臣則其君為主凡喪父在父為主父没兄弟同居各主其喪親同長者主之不同親者主之凡主兄弟之喪雖疏亦虞之大夫不主士之喪士之子為大夫則其父母弗能主也使其子主之無子則為之置後妻之昆弟為父後者死哭之適室子為主袒免哭踊夫入門右父在哭於妻之室非為父後者哭諸異室姑姊妹其夫死而夫黨無兄弟使夫之族人主之妻之黨雖親弗主夫若無族則四鄰主之無四鄰則里尹主之喪有無後而無主男主必使同姓婦主必使異姓改塟緦為朋友麻斬衰不說絰帶居倚廬寢苫枕塊婦人則否容貌若苴纍纍顛顛瞿瞿繭繭哭若往而不反唯而不對三日不食既殯食粥既虞卒哭柱楣翦屏芐翦不納疏食水飲期而小祥居堊室寢有席不與人居食有菜菓又期而大祥食有醯醬中月而禫禫而從御飲醴酒吉祭而復寢齊衰貌若枲哭若往而反對而不言二日不食疏食水飲不食菜菓居堊室芐翦不納大功貌若止哭三曲而偯言而不議一日不食食不醯醬寢有席小功緦麻容貌可也哀容可也再不食可也議而不及樂不飲醴酒牀可也孔子曰伯母叔母疏衰踊不絶地姑姊妹之大功踊絶於地知此者由文矣哉布八十縷為一升斬衰三升齊衰四升五升六升大功七升八升九升小功十升十一升十二升緦麻十五升去其半有事其縷無事其布也苴絰大搹五分而去一以為帶杖大如要絰齊衰之絰斬衰之帶也斬衰既虞卒哭受以成布六升冠七升疏衰受以成布七升冠八升去麻服葛葛帶三重期而祭小祥練冠練衣黄裏縓緣履無絢角填鹿裘衡長袪袪裼之可也要絰不除男子除乎首婦人除乎帶除服者先重者易服者先輕者又期而祭大祥期服素縞麻衣中月而禫祭禫而纎無所不佩至親以期斷加隆焉使倍之故再期也三年以為隆緦小功以為殺期九月以為間上象於天下法於地中則於人人之所以羣居和壹之理盡矣三年之喪二十五月而畢哀痛思慕若駟之過隙然而遂之是無窮也故親喪外除兄弟之喪内除期而祭禮也期而除喪道也祭不為除喪也三年之喪既練矣有期之喪既塟矣則帶其故葛絰期之絰服其功衰有大功之喪亦如之小功無變也麻之有本者變三年之葛既練遇麻斷本者於免絰之既免去絰每可以絰必絰既絰則去之小功不易喪之練冠如免則絰其緦小功之絰因其初葛帶緦之麻不變小功之葛小功之麻不變大功之葛以有本為稅殤長中變三年之葛終殤之月筭而反三年之葛是非重麻為其無卒哭之稅下殤則否父大功小功之末可以冠子可以嫁子可以娶婦已雖小功既卒哭可以娶妻下殤之小功則不可三年而後塟者必再祭其祭之間不同時而除喪大功者主人之喪有三年者則必為之再祭朋友虞祔而已虞祭不致爵練祭不旅酬祥祭無筭爵小祥之祭主人之酢也嚌之衆賔兄弟啐之大祥主人啐之衆賔兄弟飲之可也凡待祭喪者告賔祭薦而不食餕餘不祭父不祭子夫不祭妻居喪之禮毁瘠不形視聽不衰升降不由阼階出入不當門隧孔子曰首有瘡則沐身有痬則浴病則飲酒食肉疾止復初毁瘠為病君子弗為也毁而死君子謂之無子五十不致毁六十不毁七十惟衰麻在身飲酒食肉處於内三年之喪如或遺之酒肉則受之必三辭衰絰而受之如君命則不敢辭受而薦之喪者不遺人人遺之雖酒肉弗受也從父兄弟以下既卒哭遺人可也有服人召之食不往大功以下既塟適人其黨食之則食非其黨則不食疏衰之喪既塟人請見之則見不請見人小功請見人可也大功不以執摯唯父母之喪不辟涕而見人父母之喪三年不從政齊衰大功之喪三月不從政將徙於諸侯三月不從政自諸侯來徙家期不從政又曰三年之喪祥而後從政期之喪卒哭而從政九月之喪既塟而從政小功緦之喪既殯而從政居喪未塟讀喪禮既塟讀祭禮喪復常讀樂章居喪不言樂祭事不言㐫凡見人無免絰雖朝於君無免絰唯公門有稅齊衰既塟與人立君言王事不言國事大夫士言公事不言家事君既葬王政入於國既卒哭而服王事大夫士既塟公政入於家既卒哭弁絰帶金革之事無辟也既練君謀國政大夫士謀家事適墓不登壟助塟必執紼臨喪不笑揖人必違其位望柩不歌入臨不翔當食不歎鄰有喪舂不相里有殯不巷歌適墓不歌哭日不歌送喪不由徑送塟不辟塗潦臨䘮則必有哀色執紼不笑臨樂不歎介胄則有不可犯之色故君子戒慎不失色於人君子已孤不更名已孤暴貴不為父作諡皇王大紀卷二十六

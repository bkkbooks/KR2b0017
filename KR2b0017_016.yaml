body:
  text: 皇王大紀卷十六宋胡宏撰三王紀成王解坎下震上初六無咎患難既解帷自處剛柔得宜安靜休息則無咎矣九二田獲三狐得黃矢貞吉田者去害之事狐者邪媚之獸三狐指卦之三隂也獲謂能變化除去二以陽剛得中之才上應六五之君用於時者也六五應柔明不能照威不足畏剛不能斷小人一近之則移其心矣二既當用必去羣邪則得黃矢中直之道乃真正而吉也桓敬不去武三思不知是義也六三負且乘致寇至貞吝隂柔小人宜在下以負荷而在下之上且乘車必致寇奪之至夫小人而竊位雖勉為正事而氣質卑下其何能久終可吝也九四解而拇朋至斯孚陽剛大臣解去應已之小人則君子之朋來至誠相得矣六五君子維有解吉有孚於小人居尊位為解之主人君之解也以君子通言之君子所解去者小人也小人去是以吉也驗於小人之黨去則是君子能有解也上六公用射隼于髙墉之上獲之無不利尊髙之地故曰公隼喻鷙害小人髙墉防限內外之嚴者也在其上而未去乃害之堅强者也上居解極解道已至器已成故能射而獲之天下之患解已盡矣何所不利損兊下艮上初九已事遄往無咎酌損之損已陽剛益四隂柔事既已則損去之不居其功乃無咎也損已益上之道當酌度其宜過不及皆不可矣九二利貞征凶弗損益之以柔說應上則失其剛中之德故戒以利在貞正不可征也征則離乎中而失其正是以凶也惟不自損其剛貞則能益隂柔之君乃益之也六三三人行則損一人一人行則得其友三人謂下三陽上三隂三陽同行則損九三以益上三隂同行則損上六以益三而初二二陽四五二隂同德相比三與上應而一卦皆成而相與也如是則志專皆為得其友矣天下無不二者一與二相對待生生之本也三則餘而當損矣六四損其疾使遄有喜無咎初之益四損其柔而益之以剛損其疾也損其不善惟使之遄速不至於深過則有喜而無咎六五或益之十朋之龜弗克違元吉人君能虛中自損以從順在下之賢則天下孰不損己自盡以益之故或有益之之事則十朋助之矣謀從衆則合天心雖龜筮不能違也可謂大善之吉也上九弗損益之無咎貞吉利有攸往得臣無家不行其損變而以剛陽之道益於下則無咎而得其正且吉在上能不損其下而益之則得人心歸服逺近內外之限也益震下巽上初六利用為大作元吉無咎四巽順之主上能巽於君下能巽於賢在下者不能有為也得在上者應從之則宜輔上作益天下之事所為大善而吉則上下皆無咎也六二或益之十朋之龜弗克違永貞吉王用享于帝吉二處中正虛其中以求益而能從順天下孰不願告而益之衆人所是理之當也龜亦弗能違也然質本隂柔故戒永貞固則吉也如二之虛中永貞用以享帝猶當獲吉況於人乎六三益之用凶事無咎有孚中行告公用圭三居陽應剛動之極果於為益者也惟用之於患難非常之事則無咎也下專自任上必忌疾雖義在可為然必有其孚誠而所為合於中道則誠意通於上而上信與之矣圭通誠信之物也六四中行告公從利用為依遷國四大臣居正然處不得中所應又不中是不足於中也故云中行則可告於公上而獲信從矣以其柔巽故用利於上依剛中之君下順剛陽之才以其行事遷國者順下而動者也九五有孚惠心勿問元吉有孚惠我德以九五之德之才之位而中心至誠在惠益於物其至善大吉勿問可知君至誠益於天下天下之人無不至誠愛戴以德澤為恩惠也上九莫益之或擊之立心勿恆凶居亢位之地非行益於人者也所應者隂非取善自益者也以剛而求益之極衆所共惡故莫益之而或攻擊之矣人存心不可惠利勿恆如是凶之道也所當速改也夬乾下兊上初九壯于前趾往不勝為咎初陽爻乾體剛健乃在下而居決時壯于前進者也行而宜則其決為是往而不勝則為咎也九二惕號莫夜有戎勿恤二處中居柔處夬之至善者也內懷兢惕外嚴誡號雖暮夜有兵戎亦可勿恤矣九三壯于頄有凶獨行遇雨君子夬夬若濡有愠無咎夬夬之時三居下體之上又處健體之極上有君而自任其剛決壯于頄者也頄顴骨也有凶之道也與上六為正應而違群陽而獨行則與上六隂陽和合惟君子知其非則能果決其決絶之若見濡汙有愠之色如此無過咎也九四臀無膚其行次且牽羊悔亡聞言不信以陽居隂剛決不足欲止則衆陽並進臀無膚言其居不安也欲行則不能强進故云其行次且也若能自强牽挽以從羣行可以亡其悔然既處柔雖使聞是言必不能信用也九五莧陸夬夬中行無咎五為夬隂之主而反於上六其咎大矣五雖感於隂而決斷之易如莧陸然則於中行之德為無咎莧陸曝之難乾感隂氣之多而脆易折故以為喻上六無號終有凶君子得時決去危極之小人故云無用號咷畏懼終必有凶也姤巽下乾上初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅隂始生而將長金柅止車之物而又繫之正固也九二包有魚無咎不利賔闕九三臀無膚其行次且厲無大咎闕九四包無魚起凶闕九五以把包瓜含章有隕自天闕上九姤其角吝無咎闕萃坤下兊上初六有孚不終乃亂乃萃若號一握為笑勿恤往無咎闕六二引吉無咎孚乃利用禴闕六三萃如嗟如無攸利往無咎小吝隂下不中正求四則非其應非其類為四所棄與二則三自以中正應五故萃如則為人棄絶而嗟如無所利也與上居相應之地處說順之極當萃之時以類相從故往從於上則得無咎也然動為如此然後得其所求亦可小羞吝也九四大吉無咎當萃之時得上下之聚可謂善矣然以陽居隂非正也雖上得君下得民必得大吉然後為無咎也大為周遍之義無所不周然後為大無所不正則為大吉大吉則無咎矣非理枉道而得君者自古多矣非理枉道而得民者蓋亦有焉如陳恆季氏得為大吉為無咎乎九五萃有位無咎匪孚元永貞悔亡萃天下之衆以陽剛居尊有其位矣得中正之道無過咎也如是而有不信未服者則當自反以修其元永貞之德則無思不服而悔亡矣悔者志之未光心之未慊也上六齎咨涕洟無咎隂柔說髙之位而處之天下莫肻與也其窮至於咨嗟涕洟不知所為此所自取也升巽下坤上初六允升大吉初隂柔無應不能自升信二而與之同升乃大吉也從剛中之賢以進是由剛中之道也吉孰大焉九二孚乃利用禴無咎以剛强之臣事柔弱之君又當升之時非至誠相交其免於咎云孚乃者謂既乃宜不用文飾專以其誠感通於上也如是則得無咎九三升虛邑陽剛正而且巽上皆順之復有援者以是而升如入無人之邑孰禦哉六四王用亨于岐山吉無咎昔者文王居于岐山之下上順天子欲升其道下順天下之賢使之升進已則柔順謙恭不出其位至德如此周之王業用是而亨也四居近君之位在升之時不可復升升則凶咎可知故云如文王則吉而無咎也分雖當止而道則當升也六五貞吉升階五以下有剛中之應故能居尊位而吉然質本隂柔必守貞固篤於任賢乃得其吉也賢者輔之而升猶升自階言有由而易也上六冥升利于不息之貞隂居升極昏冥於升不止者也惟于貞正之德自强不息以上六不已之心用之於此則利也困坎下兊上初六臀困于株木入於幽谷三歲不覿六隂柔處至卑而居坎險之下不能自濟賴上而援而四以陽居隂失其剛而不中正又方用於自掩臀所以居也株木無枝葉之木也故初無所庇不得安居也益迷暗動入於幽谷耳三歲不覿終不見其亨也九二困于酒食朱紱方來利用亨祀征凶無咎二剛中窮厄無所動其心惟困於其所欲者施惠天下也酒食人所欲而所以施惠也朱紱王者之服蔽膝也二困於下五道同德合以來相求故云朱紱方來也利用至誠相通如亨祀也若不待時而征乃不安其所為困所動也犯難得凶將誰咎乎六三困于石據于蒺藜入于其宫不見其妻凶隂柔不中正石堅重難勝之物蒺藜刺不可刺之物三以剛險而進一陽在上堅不可犯益自困耳以不善居九二剛中之正其不安猶據蒺藜也宫所居以安妻所之主也進退皆困處又失其所安則惟死而已其凶可知九四來徐徐困于金車吝有終當困之時相求援助理當然也二有剛中之才而初比之時四與初進應已不中正疑其少已而與二故其來遲疑困于金車金剛車在下載巳者也四所行如此為可吝然事之歸者正也初四正應終必相從九五劓刖困于赤紱乃徐有說利用祭祀截鼻曰劓去足曰刖上下皆掩于隂為其傷害也人君之困由上下無與也赤紱臣下之服以天下不來故云困於赤紱二五道同德合徐必相應是始困而徐有喜恱也利用如祭祀致其誠敬祭天神祀地祗享人鬼故五言祭二言享上六困于葛藟于臲卼曰動悔有悔征吉困既極矣猶葛藟之纒束而居高臲卼危動不安若能曰動輒得悔當變前之所為能有所悔則得吉也以說處進可以離乎田矣井巽下坎上初六井泥不食舊井無禽隂柔居下上無應援無上水之象乃井之井泥不食可也不可食則廢矣井水之上人獲其用禽鳥亦就而求焉舊廢之井禽鳥亦不復往矣九二井谷射鮒甕敝漏上無應而比視不上而下之象如澗谷之水傍出而就下注於蝦鮒而已如甕之敝漏水不用焉九三井泄不食為我心測可用汲王明並受其福陽剛居正在下未得其困如井之泄治清潔而不食為其心之惻怛陽性上而應上處剛而過中切於汲而食也異乎用之則行舍之則藏者矣然明王用人豈求備也舉而用之則上下並受其福也六四井甃無咎雖隂柔而處正上承陽剛中正之君但能處正不廣其事亦可以免咎也甃砌纍也謂修治也才不足以施利物亦可自守者也九五井冽寒泉食陽剛中正居尊位才德盡善盡美而甘潔之寒泉可為人食也上六井收勿幕有孚無吉上出為用收汲取也取而不蔽其利常大用之吉也它卦之終篇極為與罪終為成功是以吉也革離下兊上初九鞏用黃牛之革變革事之大也其才德剛明有餘而中順足黃中色牛順物局束以黃牛之革言當以順自固無妄動也六二已日乃革之征吉無咎中正無偏蔽則盡事理應上得權勢體無違悖時可矣位得矣才足矣然臣道不當為革之先又必待上下之信已乃革之也以二體柔而進緩當位而處固聖人慮其失可為之時故戒以當進行其道則吉而無咎也九三征凶貞厲革言三就有孚闕下於革以是而行則有凶也然居之上事茍當革豈可不為在乎守貞正而懷危懼審當革之言至於三而皆合則已可孚而衆信也如此則可革矣九四悔亡有孚改命吉事之可悔而後革之四之才之時之位之志之勢之用革之當也故其悔亡既事當而敝革處之以至誠則上下信之矣其吉可知九五大人虎變未占有孚以陽剛之才中正之德居尊位大人也以大人之道革天下之事無不當也所過變化事理炳著如虎之文采不待占決知其至當而天下信之也上六君子豹變小人革面征凶居貞吉革道成矣善良以變革如豹之彬蔚矣小人雖未能心化革其外不為惡矣茍更從而深治之則為己甚凶道也革至於成當貞固以守不則所革隨變故居貞則吉也鼎巽下離上初六鼎顛趾利出否得妾以其子無咎六在下鼎趾之象顛趾則覆其實矣然傾出敗惡則顛趾之利也四近君大臣之位而初應之乃上求於下下求於上如罪之顛趾未為悖理也若得良妾則能輔助致其主於無咎也子主也六隂居下而卑巽從陽妾之象也九二鼎有實我仇有疾不我能即吉以剛實居中鼎中有實之象仇對也隂陽相對之物謂初也我若對之則非正而害義是有疾也當以正自守使之不能來就已而上從六五之君則得正而其道可亨是以吉也九三鼎耳革其行塞雉膏不食方雨虧悔終吉鼎耳六五也為鼎之主三與之非應而才德相革異與有異故其行塞五文明之德故謂之雉三既道不行故不得雉膏祿位而食之也三剛正而能巽五柔中而文明方將隂陽和合而時雨也三懷才不偶有不足終得和合則為吉矣九四鼎折足覆公餗其形渥凶下應於初隂柔小人不可用者也而四用之其不勝而敗事猶鼎之折足傾覆公上之餗也居大臣之位當天下之任至於如是可羞愧之甚也六五鼎黃耳金鉉利貞五在鼎上耳之象也鼎之舉措在耳為鼎之主也鉉如耳者也五有中德故云黃耳二有剛中之德而應於五故為金鉉二五相應至善也利在貞固而已上九鼎玉鉉大吉無不利在上鉉之象九雖剛陽而居隂履柔不極剛而能溫者也故云玉鉉剛柔適宜動靜適宜居成功之道也故大吉無不利鉉在上雖居無位之地實當用也與他卦異矣井亦然震震下震上初九震來虩虩後笑言啞啞吉如震之來當震之始若能懼恐周旋顧慮虩虩然不敢寧止則終必保其安吉也六二震來厲億喪貝躋于九陵勿逐七日得九震之主震剛動而上震奮彼來既猛則處危矣度不能當必喪其所有之其則升九重至髙之陵以避逺之然不可自失其守退避自守處震之大方也卦有六位七則變矣時過事已則復其常故云七日得六三震蘇蘇震行無眚隂柔不正故當震則蘇蘇然神氣緩散自失也若震懼而能行去不止而就正則可以無過眚也九四震遂泥闕六五震往來厲億無喪有事五有中德者也動而上往則柔不可居動而下來則剛不可犯是往來皆危也當君位為動之上隨宜應變在中而已故當億度圖慮無喪失其所有之事而已謂中德也上六震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言隂柔居震動之極志氣殫索瞻視矍矍然不安足之貌如是而征凶可知矣若能震懼於未及身之前則不至於極矣故得無咎茍不至於篤極尚有可改之道柔處震終有能變之義上始變而終變與諸處震者異矣故婚媾有言也艮艮下艮上初六艮其趾無咎利永貞以柔處下當止之時也止於動之初未至失正故無咎也以其隂柔故戒以利在常永貞固六二艮其腓不拯其隨其心不快二中正三成止之主剛而失中不能降而從二也腓隨股而動者也二之行上繫乎三也二既不得以其道拯救三之失則必勉强而隨之故其心不快不得行其志也九三艮其限列其夤厲熏心限謂上下之際三以剛居剛而不中為成艮之主決止於下之上不復能進退者也如人之列絶其夤膂則上下相從屬言止之堅强也止道貴乎從宜而一定如此則處世乖戾與物睽絶危厲不安熏灼其心矣六四艮其身無咎四大臣之位止天下之當止也以隂柔而不遇陽剛之居惟能止物施於止則有咎矣無取之甚也六五艮其輔言有序悔亡輔言之所出也艮其輔止于中也止于輔則不妄出而有序也言輕發而無序則有悔止之於輔則悔亡也五隂柔不足主天下之止故止取慎于言之義上九敦艮吉剛實居止而又成艮之止在艮之終止之至堅篤者也敦篤實也人之止難於有終故節或移於晚守或失於終事或廢於久此敦艮之所以為吉也六爻惟此為吉漸艮下巽上初六鴻漸于干小子厲有言無咎鴻之為物至有時而羣有序不失其時序乃為漸取鴻象水鳥而止於水湄其進可謂漸矣六以柔居下而上無應以此而進如鴻之止于干也小人幼子見而不能進故危懼而有言曽不知在下所以有進也用柔所以不躁也無應所以能漸也於義自無咎也六二鴻漸于磐飲食衎衎吉二五以中正之道相應其進之安固平易若鴻自干之磐又漸進也磐石之平安者江淮之濵所有其飲食衎衎然和樂吉可知也九三鴻漸于陸夫征不復婦孕不育凶利禦寇在下卦之上進進至於陸矣平髙曰陸平原也志將進而上無應當守正自處於平之地以俟時耳三與四相比而無應三若不守正往與四合不復反顧義理四若不以正而合於三雖孕而不育三之所利在禁禦非理而至者能禦寇則不至於終凶也六四鴻漸于木或得其桷無咎隂柔進據剛陽之上非安處也或能安寧之道則無咎也如鴻之于木本不安或得平柯而處之則安四居正而巽順宜無咎者也必以得失言者因得以明其義也九五鴻漸于陵婦三歲不孕終莫之勝吉五居尊位猶鴻之漸于髙陵與二為正應而三比二四比五皆隔其交者也當漸之時未能即合故婦三歲不孕然中正之道有必亨之理不正豈能隔害之但其合有漸耳終得其吉也上九鴻漸于陸其羽可用為儀吉安定胡公謂陸當為逵逵雲路也上九在至高之位又益上進過於漸之時居巽之極必有其序是人超逸乎常事之外者也進至於是而不失其漸賢逹之髙致也故其羽可用為儀法而吉也羽其所用以進也歸妹兊下震上初九歸妹以娣跛能履征吉女之歸居下而無正應娣之象也剛陽在婦人為賢貞之義娣雖賢何所能為如跛者能履言不能及逺也然在其分為善故以是而行則吉也九二眇能視利幽人之貞九二剛陽而居中賢女也六五隂柔說體配不良也二雖賢不能成其內助之功能小施之如眇者之能視而已二幽靜之人也言利如幽人之貞非不足而為之戒也六三歸妹以須反歸以娣三居下之上本非賤者以六居三德不正柔而尚剛行不順也以說而動非理也無應無受之者也無所適故須也女子如是人誰取之不可以為人配矣當反歸而求為娣媵則可也九四歸妹愆期遲歸有時此女子居貴髙之地有賢明之資者也以無正應故為愆期若是女人情所願娶故其愆期乃為有時蓋自有待非不售也待得佳配而後行也六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉尊貴之女尚禮而不飾故其袂不如其娣之袂良也月幾望當不至於盈滿則不亢其夫乃為吉也女子處尊貴之道也六五居尊位妹之貴髙者也下應於二為下嫁之象王姬下嫁自古而然至帝乙而正婚姻之禮明男女之分也上六女承筐無實士刲羊無血無攸利女歸之終而無應無終者也夫婦共承宗廟承事筐篚而無實乃夫不能奉祭祀也故刲羊而無血亦無以為祭也則當離絶之矣是夫婦之無終者也何所往而利哉豐離下震上初九遇其配主雖旬無咎往有尚致豐之道明動相資初九明之初位則相應用則相資故初謂配主旬均也天下之相應者常非均敵惟豐之初四其用則相資其應則相感故雖均足剛陽相遇而無咎也往而相從可嘉尚也六二豐其蔀日中見斗往得疑疾有孚發若吉相動相資乃能成豐二至明中正之方五乃柔暗不正之君二獨明不能成豐故為豐其蔀掩也晦於明也斗昏見者也豐時遇昏主猶日中而見斗若往求之則疑猜忌疾惟盡其至誠以感發其志意而已茍誠意能動則蒙可開柔弱可輔不正可正是以吉九三豐其沛日中見沫折其右肱無咎沛幡幔圍蔽於內者其暗甚於蔀也三剛陽明體得正而反暗於四者豐之時而遇上六日中見沫也沫星之微細者也右肱人之所用賢者上無可賴之主則不能有為如人之折其右肱也無所歸咎也九四豐其蔀日中見斗遇其夷主吉四大臣剛陽為動之主然不中正而遇柔暗之君故不能致豐大遇其等夷相應之主謂初也居大臣之位而得在下之賢同德相輔其輔豈小哉故吉也天下之豐必有君而後能致六五來章有慶譽吉五既隂柔若能致六二文明中正章美之才而委任則可致豐大之慶名譽之美故吉也五無虛己下賢之義聖人設此以為教耳上六豐其屋蔀其家窺其户閴其無人三歲不覿凶處太髙也居不明也以隂柔居豐大而在無位之地乃髙亢昏暗自絶於人人誰與之故窺其户閴其無人至於三歲之久尚不見其人其才不能變也凶宜矣旅艮下離上初六旅瑣瑣斯其所取災柔弱卑下之人既處旅困鄙猥瑣細無所不至乃其所以致悔辱取災咎也才質如此上雖有援無能為也又在旅與他卦為大臣之位者異也六二旅即次懷其資得童僕貞柔順中正故得就次舍懷畜其資財又得童僕之貞良處旅之善者也不言吉者旅遇之際得免於災厲則善矣九三旅焚其次喪其童僕貞厲剛而不中正在下體之上與艮之上有自髙之象自髙則不順於上上離也故為焚其次過剛則暴下故失童僕之貞信此危厲之道也九四旅于處得其資斧我心不快陽剛處柔在上體之下有用柔能下之象為五所期為初所應旅得其處止得其資財器用之利也然上無陽剛之與下惟隂柔之應故不能伸其才行其志其心不快也六五射雉一矢亡終以譽命離為雉文明之物五居文明之位有文明之德動必中文明之道如射雉一矢而亡之發無不中則終能致令譽有福祿也人居旅則失位故五不義上九鳥焚其巢旅人先笑後號咷喪牛于易凶在旅之時謙降柔和乃自保上九過剛自髙故為鳥焚巢失所安也剛陽自處於至髙始快於意故先笑既而失安莫與故號咷輕易以喪其順德是以凶也巽巽下巽上初六進退利武人之貞隂柔居卑巽而承剛過于卑巽者也故恐畏不安或進或退不知所從若能用武人剛貞之志則為宜也九二巽在牀下用史巫紛若吉無咎牀人之所安二居巽時以陽處隂而在下過於所安矣史巫者通誠意於神明者也紛若多也茍至誠安於謙巽能使通於誠意者多則吉而無咎謂其誠足以動人也人不察其誠意則以過巽為諂也九三頻巽吝以陽處剛不得其中又在下體之上非能巽者居巽之時處下而上臨之以巽欲不巽得乎勉而為之故頻失而頻巽是可吝也六四悔亡田獲三品隂柔無援而承乘皆剛宜有悔也而四以隂居隂得巽之正居上之下巽於上也以巽臨下巽於下也如田之獲三品遍及上下善處如此故得悔亡九五貞吉悔亡無不利無初有終先庚三日後庚三日吉五居尊位為巽之主命令之所出也貞中正也處巽出令皆中正為吉貞非五之不足在巽當戒也既貞則吉而悔亡無所不利也無初始未善也有終更之使善也十干戊巳為中過中則變故謂之庚事之改更當原始要終能如是則吉也上九巽在牀下喪其資斧貞凶居巽之極過於巽也陽剛本有斷以過巽而失其剛斷失其所有喪資斧也居上而過巽至於自失在正道為凶也兌兌下兌上初九和兌吉陽剛則不卑居下則能巽處說則能和無應則不偏處說如是則吉也九二孚兌吉悔亡二承比隂柔隂小人也說之則當有悔二剛中之德孚信內充雖比小人自守不失故吉而悔亡六三來兌凶隂柔在中說不以道者也內為來比於在下之陽枉己非道就以來說所以凶也不知外者以同體而隂性下也九四商兌未寧介疾有喜四上承中正之五下比柔邪之三雖剛陽而不正三隂柔陽所說也故不能决商度所從而未定若介然守正而疾惡邪惡則有喜也九五孚于剝有厲剝者隂消陽之名九五居尊中正盡說道之善矣雖舜之聖且畏巧言令色蓋說之惑人易入可懼如此故聖人設戒以為五若誠心信小人少假善為實善而不知其包藏則危道也如堯於四凶初取其畏罪而强仁及其終惡則誅之矣上六引兌上六成說之主居說之極說不知已引而長之者也未見其所說善惡故不言悔吝渙坎下巽上初六用拯馬壯吉居渙之初始渙而拯之又得馬壯則吉也馬謂二也兩皆無應親比相求初隂順而託於二剛中之才以拯其渙則不至於渙是以吉也九二渙奔其機悔亡二在渙離之時而處險中有悔可知機者俯憑以為安者也故二目初為機初雖坎體而不在險中也當渙離之時兩皆無與隂陽相比相賴者也二急就於初以為安則能亡其悔矣渙之時以合力為勝六三渙其躬無悔三在渙時獨有應與無渙散之悔也然隂柔不中正而上又居無位之地豈能拯時之渙而及人也止於其身可以無悔而已六四渙其群元吉渙有丘匪夷所思闕九五渙汗其大號渙王居無咎五與四君臣合德當使號令浹於民心如人身之汗浹於四體則信服而從矣大號謂新民之大命救渙之大政能濟天下之渙則居王位為稱而無咎也渙之四五通言其義者渙散其害惟君臣合德乃濟爻義相須時之宜也上九渙其血去逖出無咎渙諸爻皆無係應惟上應三二居險陷之極有傷害畏懼之象上九居巽之極為能巽順於事理若能出於涣使其血去惕出則無咎節兊下坎上初九不出户庭無咎初以陽在下上復有應非能節者也初能固守終或渝之不謹於初安能有卒故於節之初戒之謹守至於不出戶庭則無咎也戶庭戶外之庭九二不出門庭凶二雖剛中之質然處隂不正也居說失剛也承柔近邪也節之道當以則中正二失其剛中之德不合於五是以凶也六三不節若則嗟若無咎六三不中正乘剛而臨險固宜有咎然柔順而和說若能自節而順於義則可以無過不然則可傷嗟已所自致無所歸咎也六四安節亨四順承九五剛中之道是以中正為節也以限居隂安於正也當位為有節之象下應於初四坎體水也上溢為無節就下有節也知四之義安於節者也故能致亨九五甘節吉往有尚剛中正居尊位在已則安行天下則說從節之甘美者也其吉可知以此而行有可嘉尚也上六苦節貞凶悔亡居節之極居險之極節之苦者也固守則凶悔而損過從中則凶亡矣中孚兊下巽上初九虞吉有它不燕中孚之初戒其審其所信虞度其可信而後信則吉也既得所信則當誠一若有它則不得其安樂矣九二鳴鶴在隂其子和之我有好爵吾與爾靡之闕六三得敵或鼓或罷或泣或歌三四皆以虛中為成孚之主四得位居正故亡四以從五三不中失正故得敵以纍志或鼓張或罷廢或悲泣或歌樂動息憂樂皆係乎所信也雖未知吉凶非明達君子也六四月幾望馬匹亡無咎四為成孚之主居近君之位如望則敵矣臣如敵君禍敗必至故以幾望為至盛也四與初為正應匹也古者駕車用四馬不能純色則兩服兩驂各一色又小大必相稱故兩馬謂為對也馬者行物也初應四四亦從五皆上行也故以馬為象孚道在一故四從五而不係於初馬匹亡則無咎也九五有孚攣如無咎人君當以至誠感通天下使天下之心信之固結如拘攣然則為無咎也上九翰音登於天貞凶陽性上進風體飛揚守孚至於窮極羽翰之音登聞于天貞固如此而不知變凶可知矣小過艮下震上初六飛鳥以凶隂柔小人上應於四四復動體小人躁易而上有應於所當過必至過甚况不當過而過乎其過如飛鳥之迅疾救止莫及所以凶也六二過其祖遇其妣不及其君遇其臣無咎陽之在上者父之象尊於父者祖之象隂而尊者祖妣之象二與五居相應之地同有柔中之德志不從於三四故過四而遇五也過之時必過其常故戒以不陵及於君適當臣道九三弗過防之從或戕之凶小過隂過陽失位之時三獨居正在過防於小人若弗過防之則或從而戕害之矣如是則凶也防小人之道正已為先三不失正故無必凶之義九四無咎弗過遇之往厲必戒勿用永貞闕六五密雲不雨自我西郊公弋取彼在穴闕上六勿遇過之飛鳥離之凶是謂災眚上隂而動體處過之地極不與理遇動皆過之知飛鳥之迅速違理過常之逺所以凶也既過之極豈惟人眚天災亦至其凶可知天理人事皆然也既濟離下坎上初九曳其輪濡其尾無咎初以陽居下上應於四又火體其進之志鋭也時既濟矣進不已則及於悔吝故倒曵其輪使不進也獸之涉水必揭其尾濡其毛則不能濟方既濟之初能止其進乃得無咎也六二婦喪其茀勿逐七日得二隂也故以婦言茀婦人出門以自蔽中正之德上應九五剛陽中正之君宜得行其志者也然時既已濟王得尊位無復進而有為矣故云不得遂其行也於斯時也則剛中反為中滿坎離乃為相戻矣然中正之道豈可廢也時過則行矣勿逐者自守不失也卦有六位七則變矣時變則終行矣九三髙宗伐鬼方三年克之小人勿用既濟而用剛乃髙宗伐鬼方之事髙宗天下之事既濟而逺伐暴亂也惟聖賢之君則可若小人為之則騁威武忿不服貪土地殘民肆欲而已故戒勿用小人六四繻有衣袽終日戒四在濟卦而水體故取舟為義四大臣既當濟以防患慮變為急繻當作濡舟有鏬漏則塞以衣袽有衣袽以備漏又當終日戒懼不怠也九五東鄰殺牛不如西鄰之禴祭實受其福五中實孚也二虛中誠也皆取祭祀為義求鄰陽也上六濡其首厲闕未濟坎下離上初六濡其尾吝闕九二曵其輪貞吉闕六三未濟征凶利涉大川隂柔不中正而居險不足以濟也未有可濟之道出險之用而征所以凶也然未濟有可濟之道險中有出險之理上有剛陽之應若能涉險而往從之則濟矣故利濟大川也九四貞吉悔亡震用伐鬼方三年有賞於大國濟天下之艱難非剛健之才不能也九以陽居柔故戒以貞固則吉而悔亡當如古人震動用力逺伐鬼方至於三年然後成功而行大國之賞必如是乃能濟也六五貞吉無悔君子之光有孚吉五雖以柔居尊位居剛應剛其處得中虛其心而陽為之輔至正至善德之吉也故無不濟之悔文明之主德輝之盛而功實稱之有孚也時可濟矣故為吉也上九有孚於飲酒無咎濡其首有孚失是以剛在上剛之極也居明之上明之極也剛極不能明明能燭理剛能斷義居未濟之極非得濟之位無可濟之理則當至誠自信於中安我命而自樂則可無咎若從樂而耽肆過禮放意而不及至濡其首則非能安於義命於有孚為失矣皇王大紀卷十六

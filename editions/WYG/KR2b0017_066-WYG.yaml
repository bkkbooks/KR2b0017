body:
  text: 皇王大紀卷六十六宋胡宏撰三王紀敬王二十九年蔡侯將如吳諸大夫恐其又遷也承公孫翩逐而射之入於家人而薨以兩矢門之衆莫敢進文之鍇後至曰如墻而進多而殺二人鍇執弓而先翩射之中肘鍇遂殺之子朔嗣逐公孫辰秦塟其君楚單浮餘圍蠻氏蠻氏潰蠻子赤奔晉隂地楚司馬眅起豐析與狄戎以臨上雒左師軍於莵和右師軍於倉野使謂隂地之命大夫士蔑曰晉楚有盟好惡同之若將不廢寡君之願也不然將通於少習以聽命士蔑請諸趙鞅鞅曰晉未寜安能惡於楚必速與之士蔑乃致九州之戎將裂田以與蠻子而城之且將為之卜蠻子聽卜遂執之與其五大夫以畀楚師于三户司馬致邑立宗焉以誘其遺民而盡俘以歸魯城西郛魯亳社災滕侯薨子虞母嗣蔡塟其君滕塟其君齊陳乞弦施衛寗跪救范氏圍五鹿趙鞅圍邯鄲荀寅奔鮮虞齊國夏伐晉㑹鮮虞納荀寅於栢人越王歸自吳坐卧飲食必甞膽問於范蠡曰節事奈何對曰惟地為能包萬物以為一乃經理其國南至於勾無北至於禦兒東至於鄞西至於姑蔑廣運千里則致其父母昆弟而誓之曰寡人聞之古之賢者四方之民歸之若水之歸下也今寡人不能將帥二三子夫婦以蕃女子十七不嫁丈夫二十不娶父母有罪將免者以告公毉守之生丈夫二壺酒一犬生女子一壺酒一豚當室者死三年釋其政友子死三月釋其政必哭泣塟埋之如其子令孤子寡婦疾疢貧病者納官其子四方之士來者必廟禮之范蠡曰時將有反事將有間必知天下之恒制乃有天下之成利事無間無反則撫民保教以須之辛研言於越王曰五榖者萬民之命國之重寳也糶二十病農九十病末上不過八十下不減三十則農末俱利平糶齊物物貴極則反賤賤極則反貴貿易財幣欲其行如流水行之十年越以富强孔子在陳曰歸與歸與吾黨之小子狂簡斐然成章不知所以裁之過衛季路曰衛君待子而為政子將奚先子曰必也正名乎子路曰有是哉子之迂也奚其正子曰野哉由也君子於其所不知蓋闕如也名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足是故君子名之必可言也言之必可行也君子於其言無所茍而已矣經曰四年春王二月庚戌盜殺蔡侯申按左氏蔡侯將如吳諸大夫恐其又遷也公孫翩逐而射之卒然則翩非㣲者其以盜稱何也蔡侯倍楚誑吳又委罪於執政其謀國如是則信義俱亡禮文並棄無以守身而自衛夫人得而害之矣故變文書盜以警有國之君也翩弑君而畧其名氏姓與霍皆翩之黨稱國以殺而不去其官者二公孫蓋嘗謀國不使其君至於是而弗見庸者也故書法如此而或者以翩非㣲者而稱盜蘇轍以謂求名而不得非矣天下豈有欲求弑君之名春秋又惜此名而不與者哉蔡公孫辰出奔吳葬秦惠公宋人執小邾子夏蔡殺其大夫公孫姓公孫霍晉人執戎蠻子赤歸于楚楚圍蠻氏蠻子赤奔晉楚謂晉曰晉楚有盟好惡同之若將不廢則寡人之願也不然將通於少習以聽命趙鞅曰晉國未寜安能惡楚必速與之乃詐執蠻子以畀楚師其曰晉人云者罪之也蠻子赤何以名夷狄也無罪見執亦書名外之也文公執曹伯則曰畀宋人今此曷云歸於楚歸於楚者猶曰京師楚也晉主夏盟為日久矣不競至此春秋所惡城西郛六月辛丑亳社災秋八月甲寅滕子結卒冬十有二月塟蔡昭公塟滕頃公三十年魯城毗晉圍栢人荀寅士吉射奔齊寅召其祝而責之祝簡對曰先君穆子皮車十乗惟憂德義之不足也今君革車百乗猶患不足民之怨詛多矣所以亡也一祝豈能勝萬詛哉寅大慙遂行過其屬邑從者請休寅曰是嗇夫也吾好音則遺我以鳴琴吾好佩則遺我以玉環是振我過以求容於我者今其以我求容於人矣遂去之季路問於孔子曰荀氏尊賢而賤不肖其亡何也子曰尊賢不能用賤不肖而不能去能無亡乎晉趙鞅伐衛取中牟以佛􅆄為宰齊燕姬無子諸子鬻姒之子荼嬖諸大夫恐其為世子也言於齊侯曰君之齒長矣未有世子若之何曰二三子間於憂虞則有疾疢亦姑謀樂何憂於無君齊侯疾使國夏髙張立荼寘羣公子於萊齊侯薨公子嘉公子駒公子黔奔衛公子鉏公子陽生奔魯魯叔還如齊齊塟其君晉趙鞅使尹鐸為晉陽宰請曰以為繭絲乎抑為保障乎鞅曰保障哉尹鐸損其户數鞅問壯馳兹曰東方之士孰愈對曰國家將興君子自以為不足其亡也若有餘今主任政而問及小人又求賢者焉其長有後於晉矣佛􅆄以中牟叛令曰從我者受邑否者烹田基進曰義死不辟鈇鉞義窮不受軒冕褰裳就鼎􅆄舍之使召孔子子欲徃季路曰由聞諸夫子曰親於其身為不善者君子不入也佛􅆄叛子之欲徃也如之何子曰然有是言也不曰堅乎磨而不磷不曰白乎涅而不緇吾豈匏𤓰也哉焉能繫而不食鞅平中牟論功以田基為首基不受而去鞅之臣尹綽郄厥鞅曰綽不愛我諫於顯厥愛我諫於隱綽曰不質君於衆恐君之不變化也經曰五年春城毗夏齊侯伐宋晉趙鞅帥師伐衛秋九月癸酉齊侯杵臼卒冬叔還如齊閏月塟齊景公三十一年魯城邾瑕吳復伐陳齊乞偽事髙國者每朝必驂乗焉所從必言諸大夫曰彼皆偃蹇將棄子之命皆曰髙國得君必偪我盍去諸固將謀子子早圗之需事之下也及朝則曰彼虎狼也見我在子之側殺我無日矣請就之位又謂諸大夫曰二子者禍矣恃得君而欲謀二三子曰國之多難貴寵之由盡去之而後君定及其未作也先諸大夫從之乞與鮑牧及諸大夫以甲入于公宫國夏髙張聞之乗如公戰于莊敗國夏奔莒遂及髙張晏圉弦施奔魯魯叔還㑹吳于柤楚王在城父將救陳卜戰不吉卜退不吉王曰然則死也再敗楚師不如死棄盟逃讎亦不如死死一也其死讎乎遂進師先是有雲如衆赤鳥夾日以飛三日楚王使問諸周太史太史曰其當王乎禜之可移於令尹司馬王曰除腹心之疾而寘之股肱何益不榖不有大過天其夭諸有罪受罰又焉移之遂弗禜王攻大冥將戰有疾卜曰河為祟王弗祭大夫請祭諸郊王曰三代命祀祭不越望江漢沮漳楚之望也禍福之至不是過也不榖雖不德河非所獲罪也遂弗祭孔子曰楚昭王知大道矣其不失國也宜哉王薨於城父諡曰昭王子章嗣孟軻氏曰堯舜性之也湯武身之也五伯假之也久假而不歸烏知其非有也又曰以力假仁者霸霸必有大國以德行仁者王王不待大以力服人者非心服也力不贍也以德服人者中心恱而誠服也論曰楚國敗壊於囊瓦創夷於强吳幾於亡滅昭王之所以復國而益安强者皆公子申之謀也或問申於孔子子曰彼哉彼哉聖人度量𢎞逺而責人以恕何獨於子西如此乎按楚之先鬻熊為文王師而封於楚及熊通越禮僭號聖人黜之等於荆蠻文莊而後與中國並駕齊驅聖人進之同於諸夏逮昭王之時中國衰諸侯放恣大夫驕橫無可告語者而昭王獨發大論皆當於道若左右得人其進未可量也惜也子西得君之專執政之久曽不能輔之變楚俗匡天下懵懵然守舊規而已故仲尼責之如此齊陳乞召公子陽生於魯陽生出萊門逮夜至於齊與饋者皆入遂立之將盟鮑牧醉而徃其臣曰誰之命也乞曰受命於夫子遂誣鮑子曰子之命也牧曰女忘君之為孺子牛而折其齒乎而背之也陽生稽首曰吾子奉義而行者也若我可不必亡一大夫若我不可不必亡一公子義則進否則退敢不惟子是從廢興無以亂則所願也牧曰誰非君之子乃受盟使胡姬以荼如賴去鬻姒殺王甲拘江説囚王豹于句竇之丘使朱毛告於乞曰㣲子則不及此雖然君異於器不可以二器二不匱君二多難敢布諸大夫乞不對而泣曰君舉不信羣臣乎以齊國之困困又有憂少君不可訪是以求長君庶亦能容羣臣乎不然夫孺子何罪毛復命公悔之毛曰君大訪於陳子而圗其小可也使毛遷孺子於駘不至殺諸野幕之下魯仲孫伐邾孔子居於衛冉有謂子貢曰夫子為衛君乎子貢曰諾吾將問之入曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨出曰夫子不為也經曰六年春城邾瑕晉趙鞅帥師伐鮮虞吳伐陳夏齊國夏及髙張來奔叔還㑹吳于柤秋七月庚寅楚子軫卒齊陽生入于齊齊陳乞弑其君荼陽生曷為不稱公子非先君之子也為人子者無以有己則以父母之心為心者景公命荼世其國已則簒荼而自立是自絶於先君豈復得為先君之子也不稱公子誅不子也陽生不子則曷為繫之齊春秋端本之書也正其本則事理陽生之不子也其誰使之然也不有廢長立少以啓亂者乎故齊景問政於孔子孔子對曰君君臣臣父父子子君不君則臣不臣父不父則子不子以陽生繫之齊著亂之所由生也然而弑荼者陽生與朱毛也曷為書陳乞初景公謂陳乞吾欲立荼如何對曰所樂乎為君者欲立則立之不欲立則不立也君如欲立則臣請立之陽生謂乞曰吾聞子蓋将不欲立我也對曰千乗之主將廢正而立不正必殺正者吾不立子者所以生子也與之玉節而走之魯景公死荼立陳乞使人迎陽生寘諸家召諸大夫知乞有備不得已逡巡北面再拜而君之爾故里克中立不免殺身之刑陳乞獻諛終被弑君之罪是皆不明春秋之義陷於大惡而不知者也冬仲孫何忌帥師伐邾宋向巢帥師伐曹三十二年魯侯會吳王于鄫吳徴百牢子服何對曰先王未之有也吳人曰宋百牢我魯不可以後宋且魯牢晉大夫過十吳王百牢不亦可乎何對曰晉范鞅貪而棄禮以大國懼敝邑故敝邑十一牢之君若以禮命於諸侯則有數矣若亦棄禮則有淫者矣周之禮制上物不過十二以為天之大數也今棄周禮而曰必百牢亦惟執事吳人弗聽何曰吳將亡矣棄天而背本太宰嚭召季孫季孫使子貢辭嚭曰國君道長而大夫不出門此何禮也對曰豈以為禮畏大國也大國不以禮命於諸侯茍不以禮豈可量也寡君既共命焉其老豈敢棄其國太伯端委以治周禮仲雍嗣之斷髪文身羸以為飾豈禮也哉有由然也反自鄫以吳為無能為也魯季孫肥欲伐邾饗大夫以謀之子服何曰小所以事大信也大所以保小仁也背大國不信伐小國不仁民保於城城保於德失二德者危將焉保仲孫何忌曰二三子以為如何惡賢而逆之對曰禹合諸侯於塗山執玉帛者萬國今其存者無數十焉惟大不字小小不事大也知必危何故不言魯德如邾而以衆加之可乎不樂而出遂伐邾及范門猶聞鐘聲大夫諫不聽茅夷鴻請告于吳不許曰魯擊柝聞於邾吳二千里不三月不至何及於我且國内豈不足夷鴻以茅叛魯師遂入邾處其公宫師晝掠邾衆保于繹師宵掠以邾子歸獻于亳社囚諸負瑕茅夷鴻以束帛乗韋自請救於吳曰魯弱晉而逺吳馮恃其衆而背君之盟辟君之執事以陵我小國邾非敢自愛也懼君威之不立君威之不立小國之憂也若夏盟於鄫衍秋而背之成求而不違四方諸侯其何以事君且魯賦八百乗君之貳也邾賦六百乗君之私也以私奉貳惟君圗之吳王從之曹伯好田弋鄙人公孫彊獲白鴈獻之且言田弋之說說之因訪政事大說之使為司成以聽政彊言霸說於曹伯乃背晉而姦宋宋人伐之晉人不救宋遂圍之築五邑於其郊曰黍丘揖丘大城鍾邗鄭桓子思曰宋人有曹鄭之患也不可以不救駟𢎞帥師侵宋經曰七年春宋皇瑗帥師侵鄭晉魏曼多帥師侵衛夏公㑹吳于鄫秋公伐邾八月己酉入邾以邾子益來春秋隱君之惡故滅國書取婉以成章而不失其實也恃强陵弱無故伐人而入其國處其宫晝夜掠以其君來獻于亳社囚於負瑕此天下之惡也吳師為是克東陽齊人為是取吾二邑辱國亦甚矣何以備書於䇿而不諱乎聖人道隆而德大人之有惡務去之而不積也則不念其惡而進之矣以邾子益來惡也歸邾子益于邾是知其為惡能去之而不積也故書以邾子來而不諱者欲見後書歸邾子之為能去其惡而與之也聖人之情見矣明此然後可以操賞罰之權不明乎此以操賞罰之權而能濟者鮮矣宋人圍曹冬鄭駟𢎞帥師救曹三十三年宋師將還褚師子肥殿曹人詬之不行師待之宋公聞之怒命反之遂滅曹執曹伯陽及司城彊以歸殺之吳王將伐魯問於叔孫輒對曰魯有名而無情伐之必得志焉退而告公山不狃不狃曰非禮也君子違不適讎國未臣而有伐之奔命焉死之可也所託也則隱且夫人之行也不以所惡廢鄉今子以小惡而欲覆宗國不亦難乎若使子帥子必辭王將使我輒病之王問於不狃對曰魯雖無與立必有與斃諸侯將救之未可以得志焉晉與齊楚輔之是四讎也夫魯齊晉之唇也唇亡齒寒君所知也不救何為吳王伐魯公山不狃率故道險從武城克東陽而進次于泗上㣲虎欲宵攻王舍私屬徒七百人三踊於幕庭卒三百人有若與焉及稷門之内或謂季孫曰不足以害吳而多殺國士不如己也乃止吳王聞之一夕三遷吳人行成將盟子服何曰楚人圍宋易子而食析骸而爨猶無城下之盟我未及虧而有城下之盟是棄國也吳輕而逺不能久將歸矣請少待之弗從吳人盟而還邾子齊出也鮑牧帥師伐魯取讙及闡齊侯使如吳請師將以伐魯魯乃歸邾子邾子又無道吳王使太宰嚭討之囚諸樓臺栫之以棘使諸大夫輔世子以為政魯及齊平杞伯薨子維嗣齊人歸魯讙及闡晉有豕人言經曰八年春王正月宋公入曹以曹伯陽歸此滅曹也曷為不言滅滅者亡國之善詞上下之同力也曹伯陽好田弋鄙人公孫彊獲白鴈獻之且言田弋之說因訪政事大說之彊言霸說於曹伯因背晉而姦宋宋人伐之晉人不救書宋公入曹以曹伯陽歸而削其見滅之實猶虞之亡書晉公執虞公而不言滅也春秋輕重之權衡故書法若此有國者妄聽辯言以亂舊政自取滅亡之禍可以鑒矣吳伐我吳為邾故興師伐魯兵加國都而盟于城下經書伐我不言四鄙及與吳盟者諱之也來戰于郎直書不諱盟于城下何諱之深也楚人圍宋易子而食析骸而爨亦云急矣欲盟城下則曰有以國斃不能從也晉師從齊齊侯致賂晉人不可國佐對曰子若不許請合餘燼背城借一敝邑之幸亦云從也遂盟于爰婁而春秋與之今魯未及虧不能少待遂有城下之盟是棄國也夫棄國者其能國乎使有華元國佐之臣則不至此矣故春秋不言四鄙及與吳盟者欲見其實而深諱之以為後世謀國之士不能以禮義自强偷生惜死至於侵削凌遲而不知耻者之戒也夏齊人取讙及闡歸邾子益于邾秋七月冬十有二月癸亥杞伯過卒齊人歸讙及闡按左氏邾子益齊出也魯以益來則齊人取讙及闡又如吳請師而怒猶未怠也以此見國君造惡不悛則四鄰謀取其國家莫能保矣歸邾子益于邾則齊人歸讙及闡又辭師于吳而德猶未冺也以此見國君去惡而不積則四鄰不侵其封境而自安矣曰伐曰取者逆詞也曰歸者順詞也去逆效順息兵休争齊無取地之罪魯無失地之辱以此見遷善之優改過之大而春秋不諱入邾以邾子益來則以明歸益于邾之能掩其前惡而美之也三十四年杞葬其君齊侯使孟公綽辭師于吳吳王曰昔既聞命今又革之不知所從將進受命於君鄭罕達之嬖許瑕求邑無以與之請外取許之圍宋雍丘宋皇瑗圍之每日遷舍壘合鄭師哭罕達救之大敗宋遂取鄭師使有能者無死以郟張與鄭羅歸楚人伐陳陳即吳故也吳城邘穿溝通江淮遣使至魯儆伐齊經曰九年春王二月葬杞僖公宋皇瑗帥師取鄭師于雍丘夏楚人伐陳秋宋公伐鄭冬十月三十五年邾子自吳奔魯遂奔齊吳王邾子郯子伐齊南鄙師于鄎魯侯㑹之齊人弑其君以說子壬嗣赴于師吳王三日哭于軍門之外徐承帥舟師將自海入齊齊人敗之吳師乃還晉趙鞅伐齊取犁及轅毁髙唐之郭侵及賴而還魯侯歸齊塟其君薛伯薨子某嗣薛塟其君吳王復儆師于魯楚師伐陳吳延州來季子救陳謂公子結曰二君不務德而力争諸侯民何罪焉我請退以為子名務德而安民乃還越王將伐吳范蠡曰未可以美女西施獻於吳王王受之伍員諫不聽初吳王光起臺於姑蘇夫差髙而飾之三年乃成别建春霄宫宫妓千人起海靈館飾以銅溝玉檻作天池青龍舟日與西施淫戲為長夜之飲經曰十年春王二月邾子益來奔公會吳伐齊三月戊戌齊侯陽生卒按左氏公㑹吳伐齊齊人弑悼公赴于師春秋不著齊人弑君之罪而以卒書者亦猶鄭伯髠頑弑而書卒不忍以夷狄之民加中國之君也其存天理之意㣲矣魯人入邾以其君來罪也齊侯為是取讙及闡如吳請師討之也魯人悔懼歸益于邾是知其罪正而能改也齊侯為是歸讙及闡又辭師于吳是變之也夫變之正者禮義之所在中國之君也吳人欲遂前言而背達正理狄道也齊之臣子不能將順上及其君此天下大變常理之所無也故没其見弑之禍而以卒書其㫖深矣春秋弑君大惡不待貶絶而自見也君而見弑豈無不善之積以及其身乎若悼公變而克正則無不善之積矣故公卒書而没其見弑所謂不忍以夷狄之民加中國之君也而存天理之意㣲矣夏宋人伐鄭晉趙鞅帥師侵齊五月公至自伐齊葬齊悼公衛公孟彄自齊歸于衛薛伯夷卒秋葬薛惠公冬楚公子結帥師伐陳吳救陳春秩惡首亂善解紛自誅亂臣討賊子之外凡書救者未有不善之也救在王室則罪諸侯子突救衛是也救在逺國則罪四鄰晉陽處父救江是也救在夷狄則罪中國楚公子貞救鄭狄救齊吳救陳是也吳雖蠻夷之國來㑹于齊則進而書人矣使季札聘則又進而書子矣救而果善曷以獨以號舉而不進之也其以號舉而不進之者深著楚罪而傷中國之衰也陳者有虞之後嘗為楚滅而僅存耳今又無故興師肆行侵伐而列國諸侯其其暴横不能修方伯連帥之職而吳能救之故獨以號舉深著楚罪而傷中國之衰也子欲居九夷乗桴浮海而曰夷狄之有君不如諸夏之亡也其書吳救陳意乎皇王大紀卷六十六

body:
  text: 皇王大紀卷十七宋胡宏撰三王紀周成王周公以君人之道在正其身正身之道在得其人左右前後皆正人也然後身正身正則有司正庶事畢正而天下皆正矣大君親庶事而官不擇人大亂之道也於是作立政以告于王周書敘曰周公作立政立政周公若曰拜手稽首告嗣天子王矣用咸戒于王曰王左右常伯常任準人綴衣虎賁周公曰嗚呼休兹知恤鮮哉古之人迪惟有夏乃有室大競籲俊尊上帝迪知忱恂于九德之行乃敢告教厥后曰拜手稽首后矣曰宅乃事宅乃牧宅乃凖兹惟后矣謀面用丕訓德則乃宅人兹乃三宅無義民桀德惟乃弗作往任是惟暴德罔後亦越成湯陟丕釐上帝之耿命乃用三有宅克即宅曰三有俊克即俊嚴惟丕式克用三宅三俊其在商邑用協于厥邑其在四方用丕式見德嗚呼其在受德暋惟羞刑暴德之人同于厥邦乃惟庶習逸德之人同于厥政帝欽罰之乃伻我有夏式商受命奄甸萬姓亦越文王武王克知三有宅心灼見三有俊心以敬事上帝立民長伯立政任人準夫牧作三事虎賁綴衣趣馬小尹左右攜僕百司庶府大都小伯藝人表臣百司太史尹伯庶常吉士司徒司馬司空亞旅夷微盧蒸三亳阪尹文王惟克厥宅心乃克立兹常事司牧人以克俊有德文王罔攸兼于庶言庶獄庶慎惟有司之牧夫是訓用違庶獄庶慎文王罔敢知于兹亦越武王率惟敉功不敢替厥義德率惟謀從容德以並受此丕丕基嗚呼孺子王矣繼自今我其立政立事凖人牧夫我其克灼知厥若丕乃俾亂相我受民和我庶獄庶慎時則勿有間之自一話一言我則末惟成德之彥以乂我受民嗚呼豫旦已受人之徽言咸告孺子王矣繼自今文子文孫其勿誤于庶獄庶慎惟正是乂之自古商人亦越我周文王立政立事牧夫凖人則克宅之克由繹之兹乃俾乂國則罔有立政用憸人不訓于德是罔顯在厥世繼自今立政其勿以憸人其惟吉士用勱相我國家今文子文孫孺子王矣其勿誤于庶獄庶慎惟有司之牧夫其克詰爾戎兵以陟禹之迹方行天下至于海表罔有不服以覲文王之耿光以揚武王之大烈鳴呼繼自今後王立政其惟克用常人周公若曰太史司冦蘇公式敬爾由獄以長我王國兹式有慎以列用中罰周公從王東巡狩伐淮夷遂踐奄作成王政成王既踐奄將遷其君於蒲姑周公告召公作將蒲姑五月丁亥王來自奄至于宗周周公慮天下諸侯不知天命復有干紀亂正自取毁滅如奄君者於是訓戒庶邦作多方周書敘曰成王歸自奄在宗周誥庶邦作多方多方周公曰王若曰猷告爾四國多方惟爾殷侯尹民我惟大降爾命爾罔不知洪惟圖天之命弗永寅念于祀惟帝降格于夏有夏誕厥逸不肯戚言于民乃大淫昏不克終日勸于帝之迪乃爾攸聞厥圖帝之命不克開于民之麗乃大降罰崇亂有夏因甲于內亂不克靈承于旅罔丕惟進之恭洪舒于民亦惟有夏之民叨懫日欽劓割夏邑天惟時求民主乃大降顯休命于成湯刑殄有夏惟天不畀純乃惟以爾多方之義民不克永于多享惟夏之恭多士大不克明保享于民乃胥惟虐于民至于百為大不克開乃惟成湯克以爾多方簡代夏作民主慎厥麗乃勸厥民刑用勸以至于帝乙罔不明德慎罰亦克用勸今至于爾辟弗克以爾多方享天之命嗚呼王若曰誥告爾多方非天庸釋有夏非天庸釋有殷乃惟爾辟以爾多方大淫圖天之命屑有辭乃惟有夏圖厥政不集于享天降時喪有邦間之乃惟有商後王逸厥逸圖厥政不蠲蒸天惟降時喪惟聖罔念作狂惟狂克念作聖天惟五年須暇之子孫誕作民主罔可念聽天惟求爾多方大動以威開厥顧天惟爾多方罔堪顧之惟我周王靈承于旅克堪用德惟典神天天惟式教我用休簡畀殷命尹爾多方今我曷敢多誥我惟大降爾四國民命爾曷不帎裕之于爾多方爾曷不夾介乂我周王享天之命今爾尚宅爾宅畋爾田爾曷不惠王熙天之命爾乃迪屢不靜爾心未愛爾乃不大宅天命爾乃屑播天命爾乃自作不典圖忱于正我惟時其教告之我惟時其戰要囚之至于再至于三乃有不用我降爾命我乃其大罰殛之非我有周秉德不康寧乃惟爾自速辜王曰嗚呼猷告爾有方多士暨殷多士今爾奔走臣我監五祀越惟有胥伯小大多正爾罔不克臬自作不和爾惟和哉爾室不睦爾惟和哉爾邑克明爾惟克勤乃事爾尚不忌于凶德亦則以穆穆在乃位王曰嗚呼多士爾不克勸帎我命爾亦則惟不克享凡民惟曰不享爾乃惟逸惟頗大逺王命則惟爾多方探天之威我則致天之罰離逖爾土王曰我不惟多誥我惟祗告爾命又曰時惟爾初不克敬于和則無我怨論曰多士今爾又曰夏迪簡在王庭有服在百僚豫一人惟聽用德宜在爾小子乃興從爾遷之下多方克閲于乃邑謀介爾乃自時洛邑尚永力畋爾田天惟畀矜爾我有周惟其大介賚爾迪簡在王庭尚爾事有服在大僚宜在多士豫一人于聽用德之下而殷革夏命宜與肆豫敢求爾于天邑商相屬也伏生耄矣口授於人文失其次如是正之則多士多方可讀而求其義矣肅慎氏來賀滅奄王俾榮伯作賄肅慎之命周公位冡宰正百工勤勞盡下一沐三握髮一飯三吐哺下白屋之士由是盡知天下賢才之滯淹者獄訟之失情者飢寒而無告者諸侯來朝大夫來聘各以戒之君卿士庶皆曰明哉周公何知我之悉乎交趾之南有越裳氏重三譯來朝贄以白雉周公曰德澤不加君子不享其贄政令不施君子不臣其人譯曰逺夷荒外有凄風苦雨之患今而無之長老曰必中國有聖人是以來也周公乃致薦宗廟歸德于先王七年初武王謂周公曰洛汭延于伊汭其地四平我南望三塗北望嶽鄙顧瞻有河粵詹伊洛毋逺天室宜營周居爾其成之於是王將宅洛邑居九鼎曰此天下中四方入貢道里均我寧王之命也乃命太保先至于洛卜宅作召誥周公繼之告于郊社庶殷丕作以圖及卜獻于王作洛誥明堂成圖堯舜桀紂善惡之狀于四門墉著興廢之戒焉孔子曰此周之所以盛也夫明鏡所以察形往古所以知今人主襲迹於其所以安存則危亡何從至哉周公朝諸侯于明堂歸政于王王負斧扆南鄉而立三公中階之前北面東上諸侯之位阼階之東西面北上諸伯之國西階之西東面北上諸子之國門東北面東上諸男之國門西北面東上九夷之國東門之外西面北上八蠻之國南門之外北面東上六戎之國西門之外東面南上五狄之國北門之外南面東上九采之國應門之外北面東上四塞世告至周書敘召誥曰成王在豐欲宅洛邑使召公先相宅作召誥召誥惟二月既望越六日乙未王朝步自周則至于豐惟太保先周公相宅越若來三月惟丙午朏越三日戊申太保朝至于洛卜宅厥既得卜則經營越三日庚戍太保乃以庶殷攻位于洛汭越五日甲寅位成若翼日乙卯周公朝至于洛則達觀于新邑營越三日丁巳用牲于郊牛二越翼日戊午乃社于新邑牛一羊一豕一越七日甲子周公乃朝用書命庶殷侯甸男邦伯厥既命庶殷庶殷丕作太保乃以庶邦冢君出取幣復入錫周公曰拜手稽首旅王若公誥告庶殷越自乃御事嗚呼皇天上帝改厥元子兹大國殷之命惟王受命無疆惟休亦無疆惟恤嗚呼曷其奈何弗敬天既遐終大邦殷之命兹殷多先哲王在天越厥後王後民兹服厥命厥終智藏鰥在夫知保抱攜持厥婦子以哀籲天徂厥亡出執嗚呼天亦哀于四方民其眷命用懋王其疾敬德相古先民有夏天迪從子保面稽天若今時既墜厥命今相有殷天迪格保面稽天若今時既墜厥命今沖子嗣則無遺壽耉曰其稽我古人之德矧曰其有能稽謀自天嗚呼有王雖小元子哉其丕能誠于小民今休王不敢後用顧畏于民碞王來紹上帝自服于上中旦曰其作大邑其自時配皇天毖祀于上下其自時中乂王厥有成命治民今休王先服殷御事比介于我有周御事節性惟日其邁王敬作所不可不敬德我不可不監于有夏亦不可不監于有殷我不敢知曰有夏服天命惟有歷年我不敢知曰不其延惟不敬厥德乃早墜厥命我不敢知曰有殷受天命惟有歷年我不敢知曰不其延惟不敬厥德乃早墜厥命今王嗣受厥命我亦惟兹二國命嗣若功王乃初服嗚呼若生子罔不在厥初生自貽哲命今天其命哲命吉凶命歷年知今我初服宅新邑肆惟王其疾敬德王其德之用祈天永命其惟王勿以小民淫用非彛亦敢殄戮用乂民若有功其惟王位在德元小民乃惟刑用于天下越王顯上下勤恤其曰我受天命丕若有夏歷年式勿替有殷歷年欲王以小民受天永命拜手稽首曰豫小臣敢以王之讐民百君子越友民保受王威命明德王末有成命王亦顯我非敢勤惟恭奉幣用供王能祈天永命周書敘洛誥曰召公既相宅周公往營成周使來告卜作洛誥洛誥惟三月哉生魄周公初基作新大邑于東國洛四方民大和會侯甸男邦采衛百工播民和見士于周周公咸勤乃洪大誥治周公拜手稽首曰朕復子明辟王如弗敢及天基命定命豫乃胤保大相東土其基作民明辟豫惟乙卯朝至于洛師我卜河朔黎水我乃卜澗水東瀍水西惟洛食我又卜瀍水東亦惟洛食伻來以圖及獻卜王拜手稽首曰公不敢不敬天之休來相宅其作周匹休公既定宅伻來視豫卜休恆吉我二人共貞公其以豫萬億年敬天之休拜手稽首誨言周公拜手稽首曰王命豫來承保乃文祖受命民越乃光烈考武王𢎞朕恭孺子來相宅其大惇典殷獻民亂為四方新辟作周恭先曰其自時中乂萬邦咸休惟王有成績豫旦以多子越御事篤前人成烈答其師作周孚先考朕昭子刑乃單文祖德伻來毖殷乃命寧豫以秬鬯二卣曰明禋拜手稽首休享豫不敢宿則禋于文王武王惠篤敘無有遘自疾萬年厭于乃德殷乃引考王伻殷乃承敘萬年其永觀朕子懷德王若曰公明保于沖子公稱丕顯德以豫小子揚文武烈奉答天命和恆四方民居師惇宗將禮稱秩元祀咸秩無文惟公德明光于上下勤施于四方旁作穆穆迓衡不遺文武勤教豫沖子夙夜毖祀周公曰王肇稱殷禮祀於新邑咸秩無文豫齊百工伻從王于周豫惟曰庶有事今王即命曰記功宗以功作元祀惟命曰汝受命篤弼丕視功載乃汝其悉自教工孺子其朋孺子其朋其往無若火始熖熖厥攸灼敘弗其絶厥若彛及撫事如豫惟以在周工往新邑伻嚮即有僚明作有功惇大成裕汝永有辭王曰公功棐迪篤罔不若時公定豫往已公功肅將祗歡公無困哉我惟無斁其康事公勿替刑四方其世享公曰已汝惟沖子惟終汝其敬識百辟享亦識其有不享享多儀儀不及物惟曰不享惟不役志于享凡民惟曰不享惟事其爽侮乃惟孺子頒朕不暇聽朕教汝于棐民彛汝乃是不蘉乃時惟不永哉篤敘乃正父罔不若豫不敢廢乃命汝往敬哉兹豫其明農哉彼裕我民無逺用戾王曰公豫小子其退即辟于周命公後四方迪亂未定于宗禮亦未克敉公功迪將其後監我士師工誕保文武受民亂為四輔十二月戊辰王在新邑蒸祭歲文王騂牛一武王騂牛一王命作册逸祝册惟告周公其後王賔殺禋咸格王入太室祼王命周公後作册逸誥惟周公誕保文武受命惟七年魯侯伯禽東之國王若曰處位必敬諫者無格其言通清白塞巧侫則君道也周公曰汝慎無以魯國驕人仰祿之士猶可驕也正身之士不可驕也性氣髙明守之以恭聰明敏達守之以愚博聞強記守之以約土地廣大守之以儉人衆共強守之以畏祿位尊盛守之以謙君子不施其親不使大臣怨乎不以故舊無大故則不棄也無求備於一人作敧器以賜之曰是器也虛則敧中則正滿則覆戒之哉魯公置之坐側名曰宥坐之器周頌首篇曰清廟一章八句祀文王也周公既成洛邑朝諸侯率以祀文王焉於穆清廟肅雍顯相於歎辭穆美也濟濟多士秉文之德對越在天駿奔走在廟不顯不承無射於人斯駿長也大也射厭也周頌二篇曰維天之命一章八句太平告文王也維天之命於穆不已於乎不顯文王之德之純假以溢我我其收之駿惠我文王假嘉溢饒衍收聚駿大惠順也曾孫篤之篤厚也周公三篇曰維清一章五句奏象舞也維清緝熙文王之典熙光明也典法也肇禋肇始也禋祀也迄用有成維周之禎迄至禎祥也周頌四篇曰烈文一章十三句成王即政諸侯助祭也烈文辟公謂文王武王也錫兹祉福惠我無疆子孫保之無封大也靡纍也于爾邦維王其崇立也之念兹戎大也功繼序其皇美也之無競強也維人四方其訓道也之不顯維德百辟其刑之於乎前王不忘武王也周頌五篇曰天作一章七句祀先王先公也天作髙山大王荒之作生荒大也彼作矣文王康之彼岨矣岐有夷之行夷易也子孫保之周頌六篇曰昊天有成命一章七句郊祀天地也昊天有成命二后受之成王不敢康夙夜基命宥密二后文武也基始命信宥寬密寧也於緝熙單厥心肆其靖之緝明熙廣單厚肆固靖和也周頌七篇曰我將一章四句祀文王於明堂也我將我享維羊維牛維天其右之將大享獻也儀式刑文王之典日靖四方伊嘏文王既右饗之儀善刑法典常靖謀受福曰嘏我其夙夜畏天之威于時保之周頌八篇曰時邁一章十五句巡狩告祭柴望也時邁其邦昊天其子之實右序有周薄言震之莫不震疊懷柔百神及河喬嶽允王維后邁行震動疊懼也懷來柔安喬髙嶽岱宗也明昭有周式序在位載戢干戈載櫜弓矢戢聚櫜韜也我求懿德肆于時夏允王保之夏大允信也周頌九篇曰執競一章十四句祀武王也執競武王無競維烈不顯成康上帝是皇無競競也烈業也自彼成康奄有四方斤斤其明斤斤明察也鐘鼓喤喤磬管將將降福穰穰降福簡簡威儀反反既醉既飽福祿來反喤喤和也將將集也穰穰多也簡簡大也反反難也反復也周頌十篇曰思文一章八句后稷配天也思文后稷克配彼天立我蒸民莫匪爾極貽我來牟帝命率育無此疆爾界陳常于時夏牟麥用也率周頌十一篇曰臣工諸侯助祭遣於廟也嗟嗟臣工敬爾在公王釐爾成來咨來茹嗟嗟勑之也工官也公君也嗟嗟保介維莫之春亦又何求如何新畬於皇來牟將受厥明明昭上帝迄用康年康樂也命我衆人庤乃錢鎛奄觀銍艾庤具錢銚鏄耨銍穫也周頌十二篇曰噫嘻一章八句春夏祈穀于上帝也噫嘻成王既昭假爾率時農夫播厥百穀噫歎也嘻勑也駿發爾私終三十里亦服爾耕十千維耦私民田也駿疾發伐也周頌十三篇曰振鷺一章八句二王之後來助祭也振鷺于飛于彼西雍我客戾止亦有斯容振振群飛貌雍澤也客二王之後在彼無惡在此無斁庶幾夙夜以永終譽周頌十四篇曰豐年一章七句秋冬報也豐年多黍多稌亦有髙廩萬億及秭豐大稌稻也為酒為醴蒸畀祖妣以洽百禮降福孔皆皆遍也周頌十五篇曰有瞽一章十三句始作樂而合乎祖也有瞽有瞽在周之庭設業設虡崇牙樹羽應田縣鼓鞉磬柷圉業大板也所以飾栒植者為虡衡者為栒崇牙上飾卷然可以縣也樹羽置羽也應小鞞田大鼓也縣鼓周鼓也鞉小鼓也柷木椌也圉楬也既備乃奏簫管備舉喤喤厥聲肅雍和鳴先祖是聽我客戾止永觀厥成周頌十六篇曰潛一章六句季冬薦魚春獻鮪也猗歟漆沮潛有多魚有鱣有鮪鰷鱨鰋鯉潛糝也鱣大鯉也鮪鮥也鰷白鰷也鰋鮎也以饗以祀以介景福周頌十七篇曰雍一章十六句禘太祖也有來雍雍至止肅肅相維辟公天子穆穆於薦廣牡相豫肆祀相助廣大也假哉皇考綏豫孝子宣哲維人文武維后假嘉也燕及皇天克昌厥後綏我眉夀介以繁祉既右烈考亦右文母烈考武王也文母太姒也周頌十八篇曰載見一章十四句諸侯始見乎武王廟也載見辟王曰求厥章龍旗陽陽和鈴央央鞗革有鶬休有烈光載始也龍旗陽陽言有文章也和在軾前鈴在旗上鞗革有鶬有法度也率見昭考以孝以享以介眉夀永言保之思皇多祐昭考武王也享獻也烈文辟公綏以多福俾緝熙于純嘏俾使純大也周頌十九篇曰有客一章十二句微子來見祖廟也有客有客亦白其馬有萋有且敦琢其旅殷尚白也萋且敬慎也有客宿宿有客信信言受之縶以縶其馬一宿曰宿再宿曰信欲縶其馬而留之薄言追之左右綏之既有淫威降福孔夷淫大威則夷易也周頌二十篇曰武一章七句奏大武也於皇武王無競維烈允文文王克開厥後烈業也嗣武受之勝殷遏劉耆定爾功武迹劉殺耆致也孔子曰韶盡美矣又盡善也武盡美矣未盡善也故聞韶音不知肉味而問於賔牟賈曰夫武之備戒之已久何也對曰病不得其衆也咏嘆之淫液之何也對曰恐不逮事也發揚蹈厲之已蚤何也對曰及時事也武坐致右憲左何也對曰非武坐也聲淫及商何也對曰非武音也子曰若非武音則何音也對曰有司失其傳也若非有司失其傳則武王之志荒矣子曰唯丘聞諸萇𢎞亦若吾子之言是也賔牟賈起免席而請曰夫武之備戒之已久則既聞命矣敢問遲之遲而又久何也子曰居吾語女夫樂者象成者也總干而山立武王之事也發揚蹈厲太公之志也武亂皆坐周召之治也且夫武始而北出再成而滅商三成而南四成而南國是疆五成而分周公左召公右六成復綴以崇天子夾振之而駟伐盛威於中國也分夾而進事蚤濟也久立於綴以待諸侯之至也克商偃武修文周道四達禮樂交通則夫武之遲久不亦宜乎周頌二十五篇曰載芟一章三十一句春籍田而祈社稷也載芟載柞其耕澤澤千耦其耘徂隰徂畛侯主侯伯侯亞侯旅侯強侯以除草曰芟除木曰柞畛埸也主家長也伯長子也亞仲叔也旅子弟也強強力也以用也有嗿其饁思媚其婦有依其士嗿衆貌士子弟也有略其耜俶載南畝播厥百穀實函斯活略利也驛驛其達有厭其傑厭厭其苖綿綿其麃達射也有厭其傑言傑苗厭然特美也麃耘也載穫濟濟有實其積萬億及秭濟濟難也為酒為醴蒸畀祖妣以洽百禮飶其香邦家之光飶芬香也有椒其馨胡考之寧椒猶飶也胡壽也考成也匪且有且匪今斯今振古如兹且此振自也周頌二十六篇曰良耜一章二十三句秋報社稷也畟畟良耜俶載南畝播厥百穀實函斯活畟畟猶測測也或來瞻女載筐及筥其餉伊黍其笠伊糾其鏄斯趙以薅荼蓼趙刺也蓼水草也荼蓼朽止黍稷茂止穫之挃挃積之栗栗其崇如墉其比如櫛以開百室挃挃穫聲也栗栗衆多也墉城也百室盈止婦子寧止殺時犉牡有救其角以似以續續古之人黃牛黑唇曰犉社稷之牛角尺以似以續嗣前歲續往事也周頌二十七篇曰絲衣一章九句繹賔尸也絲衣其紑載辨俅俅自堂徂基自羊徂牛鼐鼎及鼒絲衣祭服也紑潔鮮貌俅俅恭順貌基門孰之基自羊徂牛言先小後大也大鼎謂之鼐小鼎謂之鼒兕觥其觩旨酒思柔不吳不敖胡考之休柔安吳譁考成也周頌二十八篇曰酌一章八句告成大武也言能酌先祖之道以飬天下也於鑠王師遵飬時晦時純熙矣是用大介鑠美也我龍受之蹻蹻王之造載用有嗣龍和也蹻蹻武貌造為也實維爾公允師公事也周頌二十九篇曰桓一章九句講武類禡也桓武志也綏萬邦屢豐年天命匪解桓桓武王保有厥士于以四方克定厥家士事也於昭于天皇以間之間代也周頌終三十一篇曰般一章七句巡狩而祀四嶽河海也於皇時周陟其髙山嶞山喬嶽允猶翕河髙山四嶽也嶞山山之嶞嶞小者也翕合也敷天之下裒時之對時周之命裒聚也皇王大紀卷十七

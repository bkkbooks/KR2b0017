body:
  text: 皇王大紀卷七十一宋胡宏撰三王紀安王元年三晉頻年破秦兵奪河西地魏伐秦至陽孤二年秦簡公薨子惠公嗣韓景侯䖍薨子烈侯取立趙烈侯籍薨弟武侯嗣三年虢山崩壅河五年日有食之七年宋公購由薨諡曰悼公子田嗣九年晉侯止薨諡曰烈公子頎嗣十一年秦伐韓宜陽取六邑田和遷齊康公於海上食一城奉先祀十三年齊田和㑹魏侯楚人衛人于濁澤求為諸侯魏為之請於王及諸侯王許之十四年魯侯顯薨諡曰穆公子奮嗣穆公嘗問於子思曰為舊君反服古有與子思對曰古之君子進人以禮退人以禮故有舊君反服之禮也今之君子進人若將加諸膝退人若將墜諸淵毋為戎首不亦善乎又何反服之禮之有公好賢而不得其道亟問亟饋鼎肉於子思子思不悦於卒也摽使者出諸大門之外北面稽首再拜而不受曰今而後知君之犬馬畜伋於是子思去魯適衛孟子曰萬章曰士之不託諸侯何也孟子曰不敢也諸侯失國而後託於諸侯禮也士之託於諸侯非禮也萬章曰君餽之粟則受之乎曰受之受之何義也曰君之於氓也固周之曰周之則受賜之則不受何也曰不敢也曰敢問其不敢何也曰抱關擊柝者皆有常職以食於上無常職而賜於上者以為不恭也曰君餽之則受之不識可常繼乎曰繆公之於子思也亟問亟餽鼎肉子思不悦於卒也摽使者出諸大門之外北面稽首再拜而不受曰今而後知君之犬馬畜伋蓋自是臺無餽也悦賢不能舉又不能養也可謂悦賢乎曰敢問國君欲養君子如何斯可謂養矣曰以君命將之再拜稽首而受其後廪人繼粟庖人繼肉不以君命將之子思以為鼎肉使己僕僕爾亟拜也非養君子之道也堯之於舜也使其子九男事之二女女焉百官牛羊倉廪備以養舜於畎畆之中後舉而加諸上位故曰王公之尊賢者也十五年秦伐蜀取南鄭秦惠公薨子出公嗣庶長殺出公及其母沈之淵改立獻公魏侯斯薨是為文侯子武侯嗣武侯浮西河而下謂吳起曰美哉山河之固對曰在徳不在險昔三苗氏左洞庭右彭蠡徳義不修禹滅之夏桀之居左河濟右泰華伊闕在其南羊腸在其北湯放之商紂之國左孟門右太行常山在其北大河經其南武王殺之君若不修徳舟中之人皆敵國也武侯曰善魏相田文吳起不悦謂文曰將三軍使士卒樂死敵國不敢謀治百官親萬民實府庫守西河而秦兵不敢東鄉韓趙賔從子孰與起文曰不如起曰然則位加吾上何也文曰主少國疑大臣未附百姓不信方是時屬之子乎屬之我乎起黙然乆之魏相公叔尚公主而害起公叔之僕曰起易去也其為人剛勁自喜子先言於君曰吳起賢人而君之國小盍試延以女彼無留心則必辭矣子因與起歸而令公主辱子使之見之公叔從之起果辭公主武侯疑焉起懼遂奔楚楚王以為相起明法審令破縱横之説捐不急之官廢公族疏逺者以撫養戰士南平百越北却三晉西伐秦諸侯患楚強而貴戚大臣多怨起者趙武侯薨烈侯太子章嗣韓烈侯薨子文侯嗣十六年命齊田和為諸侯和薨諡太公子午嗣十九年秦城櫟陽徙都之二十年日有食之既二十一年楚王疑薨貴戚大臣作亂攻吳起起走之王尸而伏擊起之徒并中王尸太子臧即位誅為亂者七十餘家諡先君曰悼王二十二年齊康公薨無子田氏遂絶太公之祀齊桓公午薨子威王因齊嗣二十五年孔子思言茍變於衛侯曰其材可將五百乘公曰吾知之然變也嘗為吏賦於民而食人二雞子子思曰聖人善官人者猶匠用木也取所長棄所短故杞梓連抱而有數尺之朽良工不棄今君處戰國選爪牙以二卵棄干城之將此不可使聞於鄰國也衛侯言計是非羣臣和者如出一口子思曰吾觀衛君不君臣不臣矣人主自臧則衆謀不進事是而臧之猶却衆謀況和非以長惡乎夫不察事之是非而悦人讃已闇莫甚焉不度理之所在而阿諛求容諂莫甚焉君闇臣諂民不與也若此不已國無類矣乃言於衛侯曰君出言自以為是而卿大夫莫敢矯其非卿大夫出言亦自以為是而士庶人莫敢矯其非順之則有福逆之則有禍如此善安從生子思悼道不行乃著中庸書曰天命之謂性率性之謂道脩道之謂教道也者不可須叟離也可離非道也是故君子戒慎乎其所不睹恐懼乎其所不聞莫見乎隠莫顯乎微故君子慎其獨也喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之達道也致中和天地位焉萬物育焉仲尼曰君子中庸小人反中庸君子之中庸也君子而時中小人之中庸也小人而無忌憚也子曰中庸其至矣乎民鮮能乆矣子曰道之不行也我知之矣知者過之愚者不及也道之不明也我知之矣賢者過之不肖者不及也人莫不飲食也鮮能知味也子曰道其不行矣夫子曰舜其大智也與舜好問而好察邇言隠惡而揚善執其兩端用其中於民其斯以為舜乎子曰人皆曰予知驅而納諸罟擭陷阱之中而莫之知辟也人皆曰予知擇乎中庸而不能期月守也子曰回之為人也擇乎中庸得一善則拳拳服膺而弗失之矣子曰天下國家可均也爵禄可辭也白刃可蹈也中庸不可能也子路問強子曰南方之強與北方之強與抑而強與寛柔以教不報無道南方之強也君子居之袵金革死而不厭北方之強也而強者居之故君子和而不流強哉矯中立而不倚強哉矯國有道不變塞焉強哉矯國無道至死不變強哉矯子曰素隠行怪後世有述焉吾弗為之矣君子遵道而行半塗而廢吾弗能已矣君子依乎中庸遯世不見知而不悔惟聖者能之君子之道費而隠夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖聖人亦有所不能焉天地之大也人猶有所憾故君子語大天下莫能載焉語小天下莫能破焉詩云鳶飛戾天魚躍于淵言其上下察也君子之道造端乎夫婦及其至也察乎天地子曰道不逺人人之為道而逺人不可以為道詩云伐柯伐柯其則不逺執柯以伐柯晲而視之猶以為逺故君子以人治人改而止忠恕違道不逺施諸已而不願亦勿施於人君子之道四丘未能一焉所求乎子以事父未能也所求乎臣以事君未能也所求乎弟以事兄未能也所求乎朋友先施之未能也庸徳之行庸言之謹有所不足不敢不勉有餘不敢盡言顧行行顧言君子胡不慥慥爾君子素其位而行不願乎其外素富貴行乎富貴素貧賤行乎貧賤素夷狄行乎夷狄素患難行乎患難君子無入而不自得焉在上位不陵下在下位不援上正已而不求於人則無怨上不怨天下不尤人故君子居易以俟命小人行險以徼幸子曰射有似乎君子失諸正鵠反求諸其身君子之道辟如行逺必自邇辟如登高必自卑詩曰妻子好合如鼓瑟琴兄弟既翕和樂且耽宜爾室家樂爾妻帑子曰父母其順矣乎子曰鬼神之為徳其盛矣乎視之而弗見聽之而弗聞體物而不可遺使天下之人齊明盛服以承祭祀洋洋乎如在其上如在其左右詩曰神之格思不可度思矧可射思夫㣲之顯誠之不可揜如此夫子曰舜其大孝也與徳為聖人尊為天子富有四海之内宗廟饗之子孫保之故大徳必得其位必得其禄必得其名必得其壽故天之生物必因其材而篤焉故栽者培之傾者覆之詩曰嘉樂君子憲憲令德宜民宜人受禄于天保佑命之自天申之故大徳者必受命子曰無憂者其惟文王乎以王季為父以武王為子父作之子述之武王纉太王王季文王之緒壹戎衣而有天下身不失天下之顯名尊為天子富有四海之内宗廟饗之子孫保之武王未受命周公成文武之徳追王太王王季上祀先公以天子之禮斯禮也達乎諸侯大夫及士庻人父為大夫子為士𦵏以大夫祭以士父為士子為大夫𦵏以士祭以大夫期之喪達乎大夫三年之喪達乎天子父母之喪無貴賤一也子曰武王周公其達孝矣乎夫孝者善繼人之志善述人之事者也春秋修其祖廟陳其宗器設其裳衣薦其時食宗廟之禮所以序昭穆也序爵所以辨貴賤也序事所以辨賢也旅酬下為上所以逮賤也燕毛所以序齒也踐其位行其禮奏其樂敬其所尊愛其所親事死如事生事亡如事存孝之至也郊社之禮所以事上帝也宗廟之禮所以祀乎其先也明乎郊社之禮禘嘗之義治國其如示諸掌乎哀公問政子曰文武之政布在方䇿其人存則其政舉其人亡則其政息人道敏政地道敏樹夫政也者蒲盧也故為政在人取人以身修身以道修道以仁仁者人也親親為大義者宜也尊賢為大親親之殺尊賢之等禮所生也故君子不可以不修身思修身不可以不事親思事親不可以不知人思知人不可以不知天天下之達道五所以行之者三曰君臣也父子也夫婦也昆弟也朋友之交也五者天下之達道也知仁勇三者天下之達徳也所以行之者一也或生而知之或學而知之或困而知之及其知之一也或安而行之或利而行之或勉強而行之及其成功一也子曰好學近乎知力行近乎仁知恥近乎勇知斯三者則知所以修身知所以修身則知所以治人知所以治人則知所以治天下國家矣凡為天下國家有九經曰修身也尊賢也親親也敬大臣也體羣臣也子庶民也來百工也柔逺人也懐諸侯也修身則道立尊賢則不惑親親則諸父昆弟不怨敬大臣則不眩體羣臣則士之報禮重子庶民則百姓勸來百工則財用足柔逺人則四方歸之懐諸侯則天下畏之齊明盛服非禮不動所以脩身也去讒逺色賤貨而貴徳所以勸賢也尊其位重其禄同其好惡所以勸親親也官盛任使所以勸大臣也忠信重禄所以勸士也時使薄斂所以勸百姓也日省月試既稟稱事所以勸百工也送往迎來嘉善而矜不能所以柔逺人也繼絶世舉廢國治亂持危朝聘以時厚往而薄來所以懐諸侯也凡為天下國家有九經所以行之者一也凡事豫則立不豫則廢言前定則不跲事前定則不困行前定則不疚道前定則不窮在下位不獲乎上民不可得而治矣獲乎上有道不信乎朋友不獲乎上矣信乎朋友有道不順乎親不信乎朋友矣順乎親有道反諸身不誠不順乎親矣誠身有道不明乎善不誠乎身矣誠者天之道也誠之者人之道也誠者不勉而中不思而得從容中道聖人也誠之者擇善而固執之者也博學之審問之慎思之明辨之篤行之有弗學學之弗能弗措也有弗問問之弗知弗措也有弗思思之弗得弗措也有弗辨辨之弗明弗措也有弗行行之弗篤弗措也人一能之巳百之人十能之巳千之果能此道矣雖愚必明雖柔必強自誠明謂之性自明誠謂之教誠則明矣明則誠矣惟天下至誠為能盡其性能盡其性則能盡人之性能盡人之性則能盡物之性能盡物之性則可以賛天地之化育可以賛天地之化育則可以與天地參矣其次致曲曲能有誠誠則形形則著著則明明則動動則變變則化唯天下至誠為能化至誠之道可以前知國家將興必有禎祥國家将亡必有妖孽見乎蓍龜動乎四體禍福将至善必先知之不善必先知之故至誠如神誠者自成也而道自道也誠者物之終始不誠無物是故君子誠之為貴誠者非自成已而已也所以成物也成已仁也成物知也性之徳也合内外之道也故時措之冝也故至誠無息不息則乆乆則徵徵則悠逺悠逺則博厚博厚則高明博厚所以載物也高明所以覆物也悠乆所以成物也博厚配地高明配天悠乆無疆如此者不見而章不動而變無為而成天地之道可一言而盡也其為物不貳則其生物不測天地之道博也厚也高也明也悠也乆也今夫天斯昭昭之多及其無窮也日月星辰繫焉萬物覆焉今夫地一撮土之多及其廣厚載華嶽而不重振河海而不洩萬物載焉今夫山一卷石之多及其廣大草木生之禽獸居之寳藏興焉今夫水一勺之多及其不測黿鼉蛟龍魚鼈生焉貨財殖焉詩曰惟天之命於穆不巳蓋曰天之所以為天也於乎不顯文王之徳之純蓋曰文王之所以為文也純亦不已大哉聖人之道洋洋乎發育萬物峻極于天優優大哉禮儀三百威儀三千待其人而後行故曰茍不至徳至道不凝焉故君子尊徳性而道問學致廣大而盡精微極高明而道中庸温故而知新敦厚以崇禮是故居上不驕為下不倍國有道其言足以興國無道其黙足以容詩曰既明且哲以保其身其此之謂與子曰愚而好自用賤而好自專生乎今之世反古之道如此者烖及其身者也非天子不議禮不制度不考文今天下車同軌書同文行同倫雖有其位茍無其徳不敢作禮樂焉雖有其徳茍無其位亦不敢作禮樂焉子曰吾説夏禮杞不足徵也吾學殷禮有宋存焉吾學周禮今用之吾從周王天下有三重焉其寡過矣乎上焉者雖善無徵無徵不信不信民弗從下焉者雖善不尊不尊不信不信民弗從故君子之道本諸身徵諸庶民考諸三王而不繆建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑質諸鬼神而無疑知天也百世以俟聖人而不惑知人也是故君子動而世為天下道行而世為天下法言而世為天下則逺之則有望近之則不厭詩曰在彼無惡在此無斁庶㡬夙夜以永終譽君子未有不如此而蚤有譽於天下者也仲尼祖述堯舜憲章文武上律天時下襲水土譬如天地之無不持載無不覆幬譬如四時之錯行如日月之代明萬物並育而不相害道竝行而不相悖小徳川流大徳敦化此天地之所以為大也唯天下至聖為能聰明睿知足以有臨也寛裕温柔足以有容也發強剛毅足以有執也齊莊中正足以有敬也文理密察足以有别也溥博淵泉而時出之溥博如天淵泉如淵見而民莫不敬言而民莫不信行而民莫不説是以聲名洋溢乎中國施及蠻貊舟車所至人力所通天之所覆地之所載日月所照霜露所隊凢有血氣者莫不尊親故曰配天唯天下至誠為能經綸天下之大經立天下之大本知天地之化育夫焉有所倚肫肫其仁淵淵其淵浩浩其天茍不固聰明聖知達天徳者其孰能知之詩曰衣錦尚絅惡其文之著也故君子之道闇然而日章小人之道的然而日亡君子之道淡而不厭簡而文温而理知逺之近知風之自知㣲之顯可與入徳矣詩云濳雖伏矣亦孔之昭故君子内省不疚無惡於志君子之所不可及者其唯人之所不見乎詩云相在爾室尚不愧於屋漏故君子不動而敬不言而信詩曰奏假無言時靡有爭是故君子不賞而民勸不怒而民威於鈇鉞詩曰不顯惟徳百辟其刑之是故君子篤恭而天下平詩曰予懐明徳不大聲以色子曰聲色之於以化民末也詩曰徳輶如毛毛猶有倫上天之載無聲無臭至矣子思晚年復歸于魯鄒人孟軻師焉軻魯孟孫之族裔少孤母賢過人擇鄰三徙軻出就傅怠而歸母方織曰軻學不可已也遂截其織曰一絶則續之難矣軻由是進學不息軻見子思問牧民之道何先子思曰利之孟子曰君子教民亦仁義而已矣子思曰是所以利之也上不仁則下不得其所上不義則下樂為詐不利大矣孔氏之徒曰入其國其教可知也其為人也温柔敦厚而不愚則深於詩者也疏通知逺而不誣則深於書者也廣博易良而不奢則深於樂者也潔靜精㣲而不賊則深於易者也恭儉莊敬而不煩則深於禮者也屬辭比事而不亂則深於春秋者也天子不言出諸侯不生名君子不親惡諸侯失地名滅同姓名晉侯頎薨諡曰孝公子俱酒嗣蜀伐楚取茲方楚為扞關以拒之魯穆公薨子共公奮立韓文侯薨子哀侯立二十六年王崩諡曰安王子喜立魏韓趙盡取晉地廢晉侯俱酒為家人是為靜公唐叔之祀遂絶烈王元年日有食之鄭恭公傳子及孫二世皆不得其死至是子乙立而滅於韓韓徙都之趙敬侯章薨子成侯種嗣三年宋休公薨子桓公辟兵立案汲冢紀年作桓公辟兵而史作辟公辟兵且名辟兵而諡辟又辟於義無取史記蓋誤也當作桓公燕僖公衛慎公皆薨燕立桓公衛立公子訓五年韓哀侯相韓廆而甚愛嚴遂二人甚相害也遂令人刺廆兼及哀侯魏武侯薨不立太子子罃公仲緩爭立六年齊威王來朝是時諸侯莫朝天下益賢齊王齊王召即墨大夫曰子居即墨毁言日至然田野辟人民給官無事東方以寜是子不事吾左右以求譽也封之萬家召阿大夫曰自子守阿譽言日至然田野不辟人民貧餒趙攻鄄子不救衛取薛陵子不知是子厚幣事吾左右以求譽也烹之及左右嘗譽者羣臣聳懼莫敢飾詐齊國大治楚子臧薨諡曰肅王弟良夫嗣七年日有食之王崩諡曰烈王弟扁立魏大夫王錯出奔韓韓趙同伐魏遂圍之趙成侯曰殺罃立公仲緩割地而退韓懿侯曰殺魏君暴也割地而退貪也不如兩分之使不彊於宋衛則我終無魏患矣趙人不聽懿侯去成侯亦去罃殺公仲緩而立是為惠王太史公曰從一家之謀魏必分矣故曰君終無嫡子其國可破也宋桓公薨子剔成立皇王大紀卷七十一

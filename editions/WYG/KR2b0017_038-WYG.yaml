body:
  text: 皇王大紀卷三十八宋胡宏撰三王紀釐王元年冬齊侯宋公陳侯蔡侯邾子會于北杏以平宋亂遂人不至齊人滅遂而戍之遂虞帝之所出殷所封也齊伐魯取汶陽曰以報長勺之役管仲諫曰君不競於徳而競於兵外諸侯設備内百姓設詐國無危難矣齊侯曰請會魯侯而盟之可乎仲曰可魯侯召曹子曰寡人勿欲會曹子曰會之臣請從於是魯侯會齊侯于柯將盟曹子撫劒而進管仲曰兩君為好子將何求對曰請復汶陽之田齊侯許之乃盟宋人背北杏之會經曰十有三年春齊侯宋人陳人蔡人邾人會于北杏齊桓何以及四國之㣲者會是宋公邾子也然則何以稱人春秋之世以諸侯而主天下會盟之政自北杏始其後宋襄晉文楚莊秦穆交主夏盟跡此而為之者也桓公非受命之伯諸侯自相推戴以為盟主是無君矣故國稱人以誅始亂正王法也齊桓稱爵其與之乎上無天子下無方伯有能會諸侯安中國而免民於左枉則雖與之可也誅諸侯者正也與桓公者權也或曰桓公始平宋亂遂得諸侯故四國稱人言衆與之也夏六月齊人滅遂見滅而書滅亡國之善詞上下之同力也其亦不幸焉爾滅人之國而絶其世罪莫重焉齊稱人㣲者耳凡書滅者不待再貶而惡已見秋七月冬公㑹齊侯盟于柯始及齊平也世讐而平可乎於傳有之敵惠敵怨不在後嗣魯莊於齊襄當其身則釋怨不復故聖人詳加譏貶以著其罪今易世矣而桓公始合諸侯安中國攘夷狄尊天王乃欲修怨怒鄰而危其社稷可謂孝乎故長勺之役專以責魯而柯之盟公與齊皆書其爵則以為釋怨而平可也或稱齊襄公復九世之讐而春秋賢之信乎以柯之盟詞無貶則知其妄矣二年春齊人陳人曹人代宋魯單伯㑹之取成于宋而還鄭伯突自櫟侵鄭獲傅瑕瑕曰茍舎我吾請納君與之盟而赦之瑕殺子儀突入鄭遂殺瑕使謂原繁曰傅瑕貳周有常刑既伏其罪矣納我而無二心者吾皆許之上大夫之事吾願與伯父圖之且寡人出伯父無裏言入又不念寡人寡人憾焉對曰先君桓公命我先人典司宗祀社稷有主而外其心其何二如之茍主社稷國内之民其誰不為臣臣無二心天之制也子儀在位十四年矣而謀召君者庸非二乎莊公之子猶有八人若皆以官爵行賂勸貳而可以濟事君其若之何臣聞命矣乃縊而死初内蛇與外蛇鬪於鄭南門中内蛇死六年而厲公入公聞之問於申繻曰猶有妖乎對曰人之所忌其氣燄以取之妖由人興也人無釁焉妖不自作人棄常則妖興楚息媯生二子曰囏曰頵未言楚王問之對曰吾一婦人而事二夫縱弗能死其又奚言楚王以蔡侯滅息夏五月遂入蔡魯單伯會齊侯宋公衞侯鄭伯于鄄經曰十有四年春齊人陳人曹人伐宋稱人將卑師少也齊自管仲得政滅譚之後二十年間未嘗遣大夫為主將亦未嘗動大衆出侵伐盖以制用兵而賦於民薄矣故能南推强楚西抑秦晉天下莫能與之爭也或以為貶齊稱人誤矣夏單伯㑹伐宋宋人背北杏之會合諸侯而伐之者齊桓公也會伐者無貶焉故其詞平不復再舉三國之名也隠公四年主謀伐鄭而欲求寵於諸侯以定其位者州吁也會之者黨逆賊矣故其詞繁而不殺再舉而列書者甚疾四國之詞也言之不足故再言之而聖人之情見矣秋七月荆入蔡冬單伯㑹齊侯宋公衞侯鄭伯于鄄三年春齊侯宋公陳侯衞侯鄭伯㑹于鄄魯桓夫人如齊郳叛宋宋人齊人邾人伐之鄭人間之而侵宋曲沃稱殺晉侯緍而伐之盡以其寳器使大夫為之請命于王王使虢公命以一軍為晉侯唐國風九篇曰無衣二章章三句美晉武公也武公始幷晉國其大夫為之請命乎天子之使而作是詩也豈曰無衣七兮侯伯之禮七命冕服七章不如子之衣安且吉兮諸侯不命於天子則不成為君豈曰無衣六兮天子之卿六命車旗衣服以六為節不如子之衣安且燠兮燠煖也唐國風十篇曰有杕之杜二章章六句刺晉武公也武公寡特兼其宗族而不求賢以自輔焉有杖之杜生於道左興也道左之陽人所宜休息也彼君子兮噬肯適我噬逮也中心好之曷飲食之有杕之杜生于道周周曲也彼君子兮噬肯来遊遊觀也中心好之曷飲食之經曰十有五年春齊侯宋公陳侯衛侯鄭伯會于鄄夏夫人姜氏如齊秋宋人齊人邾人伐郳鄭人侵宋伯者之先諸侯專征也非伯者而先諸侯主兵也此齊桓之師何以序宋下猶未成乎伯也二十七年同盟于幽天下與之然後成乎伯矣聲罪致討曰伐鳴鐘擊鼓整衆而行兵法所謂正也濳師掠境曰侵銜杖卧鼓出人不意兵法所謂竒也謂之無名行師曰侵非也冬十月四年冬十有一月宋人齊人衞人伐鄭楚滅鄧鄭伯自櫟入緩告于楚楚伐鄭及櫟冬十月齊侯宋公魯侯陳侯衞侯鄭伯許男滑伯滕子㑹盟于幽邾子薨子𤨏嗣秦武公薨初以人從死死者六十六人有一子曰白不立封之平陽以弟徳公為嗣經曰十有六年春王正月夏宋人齊人衛人伐鄭秋荆伐鄭冬十有二月會齊侯宋公陳侯衛侯鄭伯許男滑伯滕子同盟于幽不書公諱也齊桓始霸仗義以盟而魯首叛盟故諱不稱公惡失信也其曰同盟何也程氏曰上無明王下無方伯列國交爭桓公始霸天下與之故書同盟志同欲也邾子克卒五年甲辰鄭伯不朝于齊齊執其大夫詹遂因氏頜氏工婁氏須遂氏醉齊戍而殲之鄭詹奔魯魯人受之王崩諡曰釐王王大變文武之制作𤣥黄華麗之飾宫室崇峻輿馬奢侈王室益㣲太子閬立晉侯稱薨諡曰武公子詭諸嗣魯多麋秦徙居雍始興諸祠用三百牢于鄜畤初作伏祠磔犬邑四門以禦蟲菑經曰十有七年春齊人執鄭詹書齊人執詹惡之也鄭既侵宋又不朝齊詹盖用事之臣也其見執宜矣而惡齊何也以責人之心責己則盡道以愛己之心愛人則盡仁此春秋待齊之意也夏齊人殲于遂殲盡也春秋書此者見齊人滅遂初非伐罪弔民之師也夫以亡國餘民能殲強齊之戍故申胥一身可以存楚楚雖三戸可以亡秦足為强而不義之戒而弱者亦可省身而自立矣秋鄭詹自齊逃来榖梁子曰逃義曰逃逃者匹夫之事詹之見執若其有罪雖死可也儻曰無罪茍見免焉請從惠於㑹使諸侯聞之則不辱君命矣不能以理自强而效匹夫之行特書曰逃以著其幸免而不知命之罪也齊桓始霸同盟于幽而魯首叛盟受其逋逃虧信義矣書自齊逃來又以罪魯也冬多麋麋魯所有也多則為異以其又害稼也故此書亦禹放龍蛇周公逺犀象之意也害稼則及人矣惠王元年正月日有食之虢公晉侯鄭伯来朝王使原莊公逆王后于陳陳媯歸于京師戎侵魯既去而後知之魯侯追之至于濟西魯有􅈮秦徳公薨子宣公嗣經曰十有八年春王三月日有食之夏公追戎于濟西此未有言侵伐者而書追戎是不覺其来已去而追之也為國無武備起戎心而不知警危道也春秋之意其必未雨而徹桑上閒暇而明政刑秋有􅈮􅈮魯所無也故以有書夫以含沙射人其為物至㣲魯人察之以聞于朝魯史異之以書于䇿何也山隂陸佃曰􅈮隂物也是時莊公上不能防閑其母下不能正其身陽淑消而隂慝長矣此惡氣之應其說是也春秋書之者欲人主之慎所感也世衰道㣲邪說作正論消小人長善類退天變動於上地變動於下禽獸將食人而不知懼也亦昧於仲尼之意矣冬十月二年楚王熊貲薨諡曰文王子囏嗣初鬻拳强諌文王不從臨之以兵懼而從之遂自刖也楚人以為大閽君子曰鬻拳可謂愛君矣魯公子結媵陳人之婦于鄄遂及齊侯宋公盟魯桓夫人如莒齊人宋人陳人伐魯西鄙初王姚嬖于莊王生子頽子頽有寵蒍國為之師王取蒍國圃邊伯宫奪子禽祝跪與詹父田而收膳夫之秩五大夫遂奉子頽伐王不克子頽奔衞經曰十有九年春王正月夏四月秋公子結媵陳人之婦于鄄遂及齊侯宋公盟禮者不失己亦不失人失己與人冦之招也媵淺事陳人㣲者公子往焉聖人書之譏其重以失己也齊侯伯主宋公王者之後盟國之大事也大夫輙與焉書曰遂譏其輕以失人也遂者專事之詞聘禮大夫受命不受詞出境有可以安社稷利國家則專之可者謂本有此命得以便宜從事特不受專對之詞爾若違命行私雖有利國家安社稷之功使者當以矯制請罪有司當以擅命用刑何者終不以一時之利亂萬世之法是春秋之㫖也夫人姜氏如莒冬齊人宋人陳人伐我西鄙奉詞曰伐其稱人將卑師少也方與三國結盟則其將伐我何也齊桓責魯不恭所謂失己與人以招冦也三年冬十二月魯桓夫人如莒衞師燕師伐京師立子頽王出適鄭處于櫟齊大災齊侯伐戎經曰二十年春王正月夫人姜氏如莒夫人姜氏初會于禚次享于祝丘又次如齊師又次會于防于穀又次如齊至是再如莒春秋悉書者禮義天下之大防也詩録泉水載馳以訓後世使知男女之别自逺於禽獸也今夫人父母已終如宗國猶不得而况莒乎莊公失子之道不能防閑禁亂之所由生以舊坊為無所用而廢之者也是以至此極觀春秋書法則知防閑之道矣夏齊大災秋七月冬齊人伐戎四年鄭伯虢公胥命于弭鄭伯謂林父曰子頽出王而代其位禍孰大焉聞其飲大夫酒樂及徧舞不息是樂禍也禍必及之盍納王乎虢叔許諾鄭伯將王自圉門入虢叔自北門入討子頽殺之及五大夫王入于王城鄭伯薨子捷嗣夏五月戊戌魯桓夫人薨諡曰文姜冬十月鄭葬其君厲公經曰二十有一年春王正月夏五月辛酉鄭伯突卒杜預稱莊公四年鄭伯遇于垂者子儀也而以為厲公者按春秋突歸鄭之後其出奔蔡入于櫟皆以名書猶繫於爵雖簒而實君雖君而實簒不沒其實也忽稱世子其出奔猶不得稱子其復歸猶不得稱伯以其實不能君也而况子儀雖乗間得立其為君㣲矣豈敢輕去國都與諸侯㑹于外乎故知遇于垂者乃厲公也始終書爵不沒其實也亦可以為居正而不能保者之戒矣秋七月戊戍夫人姜氏薨冬十有二月葬鄭厲公五年冬十一月魯肆大𤯝魯葬文姜陳侯夫人生世子禦冦嬖姬生子款陳侯欲以款為嗣遂殺禦冦公子完奔齊陳國風七篇曰防有鵲巢二章章四句憂讒賊也宣公多信讒君子憂懼焉防有鵲巢卭有㫖苕興也防邑也卭丘也苕草也誰侜予美心焉忉忉侜張狂也中唐有甓卭有㫖鷊中中庭也唐堂塗也甓瓴甋也鷊綬草也誰侜予美心焉惕惕惕惕猶忉忉也陳國風八篇曰月出三章章四句刺好色也在位不好徳而說美色焉月出皎兮興也皎月光也佼人僚兮舒窈糾兮僚好貌舒遲也窈糾舒之姿也勞心悄兮月出皎兮佼人懰兮舒懮受兮勞心慅兮月出照兮佼人燎兮舒天紹兮勞心慘兮齊侯以陳敬仲完為卿辭曰羇旅之臣幸若獲宥及於寛政赦其不閑於教訓而免於罪戾弛於負擔君之惠也所獲多矣敢辱髙位以速官謗請以死告詩云翹翹車乗招我以弓豈不欲往畏我友朋使為工正飲齊侯酒樂公曰以火繼之辭曰臣卜其晝未卜其夜公不說使食采於田初懿氏卜妻敬仲其妻占之曰是謂鳳凰于飛和鳴鏘鏘有媯之後將育于姜五世其昌並于正卿八世之後莫之與京齊侯遊於平陵見貧而無妻者以外御妻之管仲曰君必待見而後施惠何其狹也乃下令澤梁時縱市書而不賦令男二十而娶女十五而嫁夏五月丙申魯侯及齊大夫髙徯盟于防魯侯如齊納幣秦作密畤於渭南祭青帝楚王欲殺其弟頵頵奔隨與隨襲王殺之是謂杜敖頵襲位布徳施惠結舊好於諸侯經曰二十有二年春王正月肆大𤯝肆𤯝者蕩滌瑕垢之稱也聞聖王𤯝災肆赦赦過宥罪矣未聞肆大𤯝也大𤯝皆肆則廢天討惡人幸以免矣後世有姑息為政數行恩宥惠姦宄賊良民而其弊益滋盖流於此故諸葛孔明曰治世以大徳不以小惠其為政於蜀軍旅數興而赦不妄下蜀人乆而歌思猶周人之思召公也斯得春秋之㫖矣癸丑葬我小君文姜文姜之行甚矣而用小君之禮其無譏乎以書夫人孫于齊不稱姜氏及書哀姜薨于夷齊人以歸攷之則譏小君典禮當謹之於始而後可正也文姜已歸為國君母臣子致送終之禮雖欲貶之不可得矣陳人殺其公子禦冦公子之重視大夫殺而或稱君者獨出於其君之意如晉侯殺其世子申生之類是也或稱國者國君大夫與聞其事而不請於天子如鄭殺其大夫申侯之類是也或稱人者其一國亂無政衆人擅殺而不出於其君如陳人殺其公子禦冦之類是也其一弑君之賊人人之所得討背叛之臣國人之所同惡如衞人殺州吁鄭人殺良霄之類是也攷傳所載以觀經之所斷則罪之輕重見矣夏五月秋七月丙申及齊髙徯盟于防冬公如齊納幣㣲者名姓不登於史冊髙徯齊之貴大夫也曷為就吾之㣲者盟蓋公也其不言公諱與髙徯盟也来議結婚取仇人女大惡也取者其為吉下主乎已上主乎宗廟以為有人之心者冝於此焉變矣公親納幣則不待貶也六年祭叔聘于魯魯侯如齊觀社曹劌諫曰禮所以整民也故會以訓上下之則制財用之節朝以正班爵之義帥長幼之序征伐以討其不然諸侯有王王有巡狩以大習之非是君不舉矣夫土發而社助時也收攟而烝納要也今齊棄太公之法觀民於社君為是舉非故業矣天子祀上帝諸侯會之受命焉諸侯祀先公大夫佐之受事焉不聞諸侯之相會祀也君舉必書書而不法後嗣何觀不聽楚王遣使獻于天子天子命之曰鎮爾南方無侵中國楚遂遣使聘于諸侯齊侯魯侯遇于榖蕭叔朝魯侯于榖魯丹桓宫楹九月曹伯射姑薨世子羈嗣冬十月齊侯魯侯盟于扈晉桓莊之族偪晉侯患之士蒍曰去富子則羣公子可謀也已公曰爾試其事士蒍與羣公子謀譖富子而去之士蒍者杜隰叔之子唐帝堯之苖裔也在虞為陶唐氏在夏為御龍氏在商為豕韋氏在周為唐杜氏隰叔奔晉為士官遂為氏經曰二十有三年春公至自齊祭叔来聘榖梁子曰祭叔天子之内臣不言使不正其私交也祭伯来朝而不言朝祭叔来聘而不言使尹氏王子虎劉卷来計而不書其爵秩皆所以正人臣之義也人君而明此不容下比之臣人臣而明此不為交私之計黨錮之禍息矣夏公如齊觀社公至自齊荆人来聘荆自莊公十年始見於經十四年入蔡十六年伐鄭皆以州舉者惡其猾夏不恭故狄之也至是来聘遂稱人者嘉其慕義自通故進之也朝聘者中國諸侯之事雖蠻夷而能脩中國諸侯之事則不念其猾夏不恭而遂進焉見聖人之心樂與人為善矣後世之君能以聖人之心為心則與天地相似凡變於夷者叛則懲其不恪而威之以刑来則嘉其慕義而接之以禮邇人安逺者服矣春秋謹華夷之辨而荆吳徐越諸夏之變於夷者故書法如此公及齊侯遇于榖蕭叔来朝榖齊地蕭叔附庸之君也為禮必當其物與其所而後可以言禮大夫宗婦覿而用幣則非其物也蕭叔朝公在齊之榖則非其所也嘉禮不野合而朝公于外是姜之於野矣故禮非其所君子有不受必反之於正而後止此亦春秋撥亂之意也秋丹桓宫楹冬十有一月曹伯射姑卒十有二月甲寅公會齊侯盟于扈程子曰遇于榖盟于扈皆為要結姻好也傳稱男子二十而冠冠而列丈夫三十而不娶非禮也然天子諸侯十五而冠者以娶必先冠而國不可乆無儲貳欲人君早有繼體故因以為節也老而無妻曰鰥舜方三十未娶而師錫帝堯已曰有鰥在下今魯莊生三十有六年矣尚無内主何也盖文姜使必娶於母家而齊女待年未及故莊公越禮不顧如此其急齊人有疑如此其緩而遇于榖盟于扈要結之也娶夫人奉祭祀為宗廟主而母言是聽不以大義裁之至於失時不孝甚矣春秋詳書為後戒也七年春正月魯刻桓宫桷匠師慶諌曰臣聞儉徳之共也侈惡之大也先君有共徳而君納諸大惡無乃不可乎不聽曹葬其君莊公魯侯親迎于齊六月丁丑以夫人姜氏歸大夫宗婦覿用幣御孫曰男贄大者玊帛小者禽鳥以章物也女贄不過榛栗棗脩以吿䖍也今男女同贄是無别也男女之别國之大節也而由夫人亂之無乃不可乎不聽宗人夏公展曰非故也公曰君作故對曰君作而順則故之逆則亦書其逆也又不聽魯大水是時自岍隴以東至于伊洛往往有戎蕃育盛强遂侵曹曹世子羈出奔陳公子赤歸于曹郭亡晉士蒍又與羣公子謀使殺游氏之二子吿晉侯曰不過二年君必無患經曰二十有四年春王三月刻桓宫桷自常情觀之丹楹刻桷疑若小失而春秋詳書于䇿御孫以為大惡何也桓公見殺于齊則不能復而盛飾其宫夸示仇人之女乃有亂心廢人倫悖天道而不知正者也御孫知為大惡而不敢盡言春秋謹禮於㣲正後世人主之心術者也故詳書于䇿斥言桓宫以惡莊為後鑒也葬曹莊公夏公如齊逆女秋公至自齊榖梁子曰親迎常事也不志此其志何也不正其親迎於齊也或曰常事不志者嵗事之常也親迎可以常乎則其說誤也常事非一有月事之常則視朔是也有時事之常則蒐狩是也有嵗事之常則郊祀雩祭之類是也有合禮之常則婚姻納幣逆女至歸之類是也凡此類合禮之常則不志矣其志則於禮不合將以為戒者也若夫崩薨卒葬即位之類不以禮之合否而皆書此人道始終之大變也其於親迎異矣八月丁丑夫人姜氏入戊寅大夫宗婦覿用幣何以不致不可見乎宗廟也姜氏齊襄公之女入者不順之詞以宗廟為弗受也婚義以正始為先而公不與夫人皆至已失夫婦之正弑閔孫邾之亂兆矣莊公不勝其母越禮踰時俟仇人之女薦舎於宗廟以成好合卒使宗嗣不立弑逆相仍㡬至亡國故春秋詳書其事以著莊公不孝之罪為後戒也禮夫人至大夫郊迎明日執贄以見宗婦大夫之妻也公事曰見私事曰覿見夫人禮也夫人不可見乎宗廟則不可以臨諸臣故以私言之也用幣何以書御孫曰男女同贄是無别也公子牙慶父之亂兆矣春秋詳書正始之道也大水冬戎侵曹羈出奔陳赤歸于曹羈不稱爵者㣲弱不能君也赤庶公子歸易詞也鄭忽突出歸權在于宋曹羈赤出歸制在于戎使鄭忽曹羈明而能斷雖有宋戎之衆突赤之孽何縁而起以國儲君副不能自定其位於誰責而可故雖以國氏皆不書爵為居正者之戒郭公此郭公也義不可曉而先儒或以為郭亡者於傳有之齊桓公之郭之故墟問父老曰郭何故亡曰以其善善而惡惡也公曰若子之言乃賢君也何至於亡父老曰郭公善善不能用惡惡不能去所以亡也攷其時與事謂之郭亡理或然也夫善善而不能用則無貴於知其善惡惡而不能去則無貴於知其惡未之或知者猶有所覬也夫既或知之矣不能行其所知君子所以髙舉逺引小人所以肆行而無忌憚也然則非有能亡郭者郭自亡爾八年陳侯使大夫女叔聘于魯始結好也衛侯薨諡曰惠公子赤嗣夏四月辛未朔日有食之王者之制日食天子不舉伐鼓于社諸侯用幣于社伐鼓于朝凡天災有幣無牲非日月之𤯝不鼓魯人鼓用牲于社魯伯姬嫁于把秋大水魯始鼓用牲于社于門魯公子季友如陳報女叔之聘也晉士蒍與羣公子謀盡殺游氏之族乃城聚而處之晉侯圍聚盡殺羣公子以士蒍為司空經曰二十有五年春陳侯使女叔来聘夏五月癸丑衛侯朔卒六月辛未朔日有食之鼓用牲于社按禮諸侯旅見天子入門不得終禮者六而日食與焉古者固以為大變人君所當恐懼修省以答天意而不敢忽也今魯不鼓于朝而鼓于社又用牲非禮矣伯姬歸于把逆者非卿名姓不登於史䇿故書歸以志其失禮而有名姓登於史䇿猶書歸者以别於大夫之自逆者也猶書歸者紀伯姬是也自逆者莒慶齊髙固是也秋大水鼓用牲于社于門冬公子友如陳九年魯侯伐戎曹殺其大夫魯侯及宋人齊人伐徐晉士蒍城絳以深其宫秋虢侵晉冬十月癸亥朔日有食之虢人又侵晉經曰二十有六年春公伐戎夏公至自伐戎曹殺其大夫稱國以殺者國君大夫與謀其事不請於天子而擅殺之也義繫於殺則止書其官曹殺其大夫宋人殺其大夫是也義繫於人則兼書其名氏楚殺其大夫得臣陳殺其大夫洩冶之類是也古者諸侯卿大夫士命于天子而不敢專命也其有罪則請于天子而不敢專殺也及春秋時專命而不以告于王朝專殺而不以歸于司冦無王甚矣五霸三王之罪人而葵丘之會猶曰無專殺大夫故春秋明書于䇿備天子之禁也況諸侯之大夫方其交政中華會盟征伐雖齊晉上卿止録其名氏至於見殺雖曹莒小國亦書其官或抑或揚或奪或與聖人之大用也明此然後可以司賞罰之權矣秋公會宋人齊人伐徐在伯禽時徐戎已為魯患春公伐戎秋又伐徐者必戎與徐合兵表裏為魯國之患也故雖齊宋將卑師少而公獨親行其不致者役不淹時而齊人同會則無危殆之憂矣冬十有二月癸亥朔日有食之皇王大紀卷三十八

body:
  text: 皇王大紀卷七十四宋胡宏撰三王紀顯王孔子謂老聃曰丘治詩書禮樂易春秋以奸者七十二君一君無所鉤用甚矣夫人之難說也道之難明邪老子曰六經先生之陳迹也豈其所以迹哉今子之所言猶迹也夫迹履之所出而迹豈履哉性不可易命不可變時不可止道不可壅茍得於道無自而不可孔子曰丘得之矣不與化為人安能化人莊子曰刻意尚行離世異俗高論怨誹匪非二音為亢而已矣此山谷之士非世之人枯槁赴淵者之所好也語仁義忠信恭儉推讓為修而已矣此平世之士教誨之人遊居學者之所好也語大功立大名禮君臣正上下為治而已矣此朝廷之士尊主強國之人致功并兼者之所好也就藪澤處閒曠釣魚閒處無為而已矣此江海之士辟世之人閒暇者之所好也吹詬呼吸吐故納新熊經若熊之攀樹引也鳥申為壽而已矣此導引之士養形之人彭祖壽考者之所好也若夫不刻意而高無仁義而修無功名而治無江海而閒不導引而壽無不忘也無不有也淡然無極而衆美從之此天地之道聖人之德也故曰聖人休休焉靜而隂同德動而陽同波感而後應迫而後動不得已而後起去知與故循天之理其生若浮其死若休水之性不雜則清靜一而不變淡而無為動而以天行此養神之道也夫有干越之劍者干溪越山出善劍吳越之地也柙而藏之不敢用也寶之至也精神四達竝流無所不極化育萬物不可為象純素之道唯神是守守而勿失與神為一一之精通合乎天倫素也者謂其無所與雜也純也者謂其不虧其神也能體純素謂之真人莊子曰繕性於俗學以求復其初滑欲於俗思以求致其明謂之蔽蒙之民古之治道者以恬養知生而無以知為也謂之養恬知與恬交相養而和理出其性夫德和也道理也德無不容仁也道無不理義也中純實而反乎情樂也信行容體而順乎文禮也古之人在混芒之中一世而得淡漠焉當是時也莫之為而常自然逮德下衰興治化之流􅞏澆淳散朴離道以善險德以行然後去性而從於心附之以文益之以博民始就亂無以反其性情而復其初道無以興乎世世無以興乎道雖聖人不在山林之中其德隱矣古之所謂隱士者非伏其身而弗見也非閉其言而不出也非藏其知而不發也時命大謬也當時命而大行乎天下則反一無迹不當時命而大窮乎天下則深根寧極而待此存身之道也道固不小行德固不小識小識傷德小行傷道故曰正已而已矣古之所謂得志者非軒冕之謂也謂其無以益其樂而已矣今之所謂得志者軒冕之謂也軒冕在身非性命也物之儻來寄也寄之其來不可圉其去不可止不為軒冕肆志不為窮約趨俗其樂彼與此同故無憂而已矣今寄去則不樂由是觀之雖樂未嘗不荒也故曰喪已於物失性於俗者謂之倒置之民莊子曰井蛙不可以語於海者拘於虛也夏蟲不可以語於氷者篤於時也曲士不可以語於道者束於教也計四海之在天地之間也不似礨壘空孔之在大澤乎計中國之在海內不似稊徒兮爾雅云似稗米之在太倉乎號物之數謂之萬人處一焉人卒九州榖食之所生舟車之所通人處一焉此其比萬物也不似豪末之在馬體乎然則大天地而小豪末可乎夫物量無窮時無止分無常終始無故以其至小求其至大之域是迷而不能自得也又何以知毫末之足以定至細之倪又何以知天地之足以窮至大之域世之議者皆曰至精無形至大不可以圍夫自細視大者不盡自大視細者不明精粗者期於有形者也無形者數之所不能分也不可圍者數之所不能窮也可以言論者物之粗也可以意致者物之精也言之所不能論意之所不能察致者不期精粗焉故大人之行不多仁恩不多辭讓不多辟異爵祿不足以為勸戮恥不足以為辱也然則若物之內若物之外惡至而倪貴賤惡至而倪小大以道觀之物無貴賤以物觀之自貴而相賤以俗觀之貴賤不在己以差觀之因其所大而大之則萬物莫不大因其所小而小之則萬物莫不小以功觀之因其所有而有之則萬物莫不有因其所無而無之則萬物莫不無以趣觀之因其所然而然之則萬物莫不然因其所非而非之則萬物莫不非梁麗棟也可以衝城而不可窒穴言殊器也騏驥驊騮一日而馳千里捕鼠不如狸狌言殊技也鴟鵂夜撮蚤察毫末晝出瞋目而不見丘山言殊性也帝皇殊禪三代殊繼差其時逆其俗者謂之篡夫當其時順其俗者為之義之徒然則何為何不為辭受趣舍終奈何嚴乎若國之有君其無私德繇繇乎若祭之有社其無私福泛泛乎其若四方之無窮其無所畛域兼懷萬物其孰承翼道無終始物有死生物之生也若驟若馳無動而不變無時而不移何為乎何不為乎夫固將自化然則何貴於道耶知道者必達於理達於理者必明於權明於權者察乎安危寧於禍福謹於去就莫之能害也故曰天在內人在外牛馬四足是謂天落馬首穿牛鼻是謂人無以人滅天無以故滅命無以得徇名謹守而勿失是謂反其真公孫龍問魏牟曰龍少學先王之道長而明仁義之行合同異離堅白然不然可不可困百家之智窮衆口之辨吾自以為至達已今吾聞莊子之言茫焉異之不知論之不及與知之弗若今吾無所開吾喙敢問其方公子牟隱几太息仰天而笑曰子獨不聞夫坎坎井之蛙乎謂東海之鱉曰吾樂與吾跳梁乎井幹平去二聲之上入休乎缺甃之崖赴水則接腋持頥蹶泥則沒足滅跗附還虷寒並中赤蟲蟹與科斗莫吾能若也且夫擅一壑之水而跨跱坎井之樂此亦至矣夫子奚不時來入觀乎東海之鱉左足未入而右膝已縶矣於是逡巡而却告之海曰夫千里之逺不足以舉其大千仞之高不足以極其深禹之時十年九潦而水弗為加益湯之時八年七旱而崖不為加損不為頃久推移不以多少進退者此亦東海之大樂也於是坎井之蛙聞之適適然驚規規然自失也且夫知不知是非之竟而猶欲觀於壯子之言是猶使蚉負山商蚷巨商蚷馬蚣也馳河也必不勝任矣且夫知不知論極妙之言而自適一時之利者是非坎井之蛙與且彼方跐此踏也黃泉而登大皇無南無北奭然四解淪於不測無東無西始於𤣥冥反於大通子乃規規然而求之以察索之以辨是直用管窺天用錐指地也莊子與惠子遊于濠梁之上莊子曰鯈直留魚出游從容是魚樂也惠子曰子非魚安知魚之樂莊子曰子非我安知我不知魚之樂惠子曰我非子固不知子矣子固非魚也子之不知魚之樂全矣莊子曰請循其本子曰女安知魚樂云者既已知吾知之而問我我知之濠上也莊子曰天下有至樂無有哉天下之所樂也富貴也身安厚味美服好色音聲也夫富者苦身疾作多積財而不得盡用其為形也亦外矣夫貴者夜以繼日思慮善否其為形也亦疏矣果有樂無有哉吾以無為誠樂矣天無為以之清地無為以之寧兩無為相合萬物皆化芒乎芴乎而無從出乎芴乎芒乎而無有象乎萬物職職皆從無為殖故曰天地無為也而無不為也人也孰能得無為哉莊子妻死惠子弔之莊子則方箕踞鼓盆而歌惠子曰與人居長子老身死不哭亦足矣又鼓盆而歌不亦甚乎莊子曰不然是其始死也我獨何能無槩然察其始而本無生非徒無生也而本無形非徒無形也而本無氣雜乎芒芴之間變而有氣氣變而有形形變而有生今又變而之死是相與為春秋冬夏四時行也人且偃然寢於巨室而我噭噭然隨而哭之自以為不通乎命故止也顔淵東之齊子貢曰夫子有憂色何耶孔子曰昔者管子有言丘甚善之曰褚小者不可以懷大綆短者不可以汲深夫若是者以為命有所成而形有所適也夫不可損益吾恐回與齊侯言聖人之道彼將內求於己而不得不得則惑人惑則死咸池九韶之樂張之洞庭之野鳥聞之而飛獸聞之而走魚聞之而下入人卒聞之相與還旋面而觀之故先聖不一其能不同其事名止於實義設於適也莊子曰達生之情者不務生之所無以為達命之情者不務知之所無奈何養形必先之物物有餘而形不養者有之矣有生必先無離形形不離而生亡者有之矣生之來不能却其去不能止悲夫世之人以為養形足以存生而養形果不足以存生則世奚足為哉雖不足為而不可不為者其為不免矣夫欲免為形者莫如棄世棄世則無纍無纍則正平正平則與彼更生更生則幾矣事奚足棄而生奚足遺棄事則形不勞遺生則精不虧夫形全精復與天為一天地者萬物之父母也合則成體散則成始形精不虧是謂能移精而又精反以相天子列子問關尹曰至人行乎萬物之上而不栗請問何以至此關尹曰是純氣之守也非知巧果敢之列凡有貌象聲色者皆物也物何以相逺夫奚足以至乎先是色而已則物之造乎不形而止乎無所化夫得是而窮之者物焉得而止焉夫醉者之墜車雖疾不死骨節與人同而犯害與人異其神全也乘亦不知也墜亦不知也死生驚懼不入乎胸中是故􅘅物而不懾彼得全於酒而猶若是而况得全於天乎聖人藏於天故莫之能傷也復讎者不折鏌干雖有忮心者不怨飄瓦是以天下平均故無攻戰之亂無殺戮之刑者由此道也不開人之人而開天之天開天者德生開人者賊生不厭其天不忽於人民幾乎以其真仲尼適楚出於林中見痀僂者承蜩猶掇之也仲尼曰子巧乎有道耶曰我有道也五六月纍丸二而不墜則失者錙銖纍三而不墜則失者十一纍五而不墜猶掇之也吾處身也若橛株枸吾執臂也若槁木之枝雖天地之大萬物之多而唯蜩翼之知吾不反不側不以萬物易蜩之翼何為而不得孔子顧謂弟子曰用志不分乃凝於神其痀僂丈人之謂乎顔回濟乎觴深之淵津人操舟若神顏回問之曰善游者數能忘水也若乃夫沒人之未嘗見舟而便操之也彼視淵若陵視舟之覆猶其車却也覆却萬方陳乎前而不得入其舍惡往而不暇以瓦注者巧以黃金注者㱪其巧一也凡外重者內拙田開之曰善養生者若牧羊然視其後者而鞭之單善魯人豹養其內而虎食之張毅養其外而疾殺之此二子者皆不鞭其後者也仲尼曰無入而藏無出而陽柴立其中央三者若得其名必極夫畏塗者十殺一人則父子兄弟相戒也必盛卒徒而後敢出焉不亦知乎人之所取畏者袵席之上飲食之間而不知為之戒者過也孔子觀於呂梁縣水三十仞流沫四十里黿鼉魚鱉之所不能游也見一丈夫游之以為有苦而欲死也使弟子竝流而拯之數百步而出被髮行歌而遊於塘下孔子從而問焉曰吾始乎故生於陵而安於陵也長乎性長於水而安於水也成乎命與齊俱入與汨偕出從水之道而不為私焉不知吾所以然而然命也梓慶削木為鐻鐻成見者驚猶鬼神魯侯問焉對曰臣將為鐻未嘗敢以耗氣也必齊以靜心齊三日而不敢懷慶賞爵祿齊五日不敢懷非譽巧拙齊七日輒然忘吾有四肢形體也當是時也無公朝其巧專外骨消然後入山林觀天性形軀至矣然後成見鐻然後加手焉不然則已則以天合天器之所以疑者神其是與工倕旋而蓋規矩指與物化而不以心稽故其靈臺一而不桎忘足屨之適也忘要帶之適也知忘是非心之適也不內變不外從事㑹之適也始乎適而未嘗不適者忘適之適也弟子問於莊子曰昨日山中之木以不材得終其天年今日主人之鴈以不材死先生將何處莊子笑曰周將處夫材與不材之間材與不材之間似之而非也故未免乎纍若夫乘道德而浮遊則不然無譽無訾一龍一蛇與時俱化而無肻專為一上一下以和為量浮遊乎萬物之祖物物而不物於物則胡可得而纍邪此神農黃帝之法則也市南宜僚見魯侯有憂色市南子曰夫豐狐文豹棲於山林伏於巖穴靜也夜行晝居戒也雖饑渴隱約猶且胥疏於江湖之上而求食焉定也然且不免於罔羅機辟之患是何罪之有哉其皮為之災也今魯國獨非君之皮邪吾願君刳形去皮灑心去欲而遊於無人之野夫有人者纍見有於人者憂故堯非有人非見有於人也方舟而濟於河有虛船來觸舟雖有惼心之人不怒有一人在其上則呼張歙之一呼而不聞再呼而不聞於是三呼邪則必以惡聲隨之向也不怒而今也怒向也虛而今也實人能虛已以遊世其孰能害之孔子問於子桑雽戶于二音曰吾再逐於魯伐樹於宋削跡於衛窮於商周圍於陳蔡之間吾犯此數患親交益疏徒友益散何與子桑雽曰子獨不聞假古國名人之亡與林回殷之逃民林名棄千金之璧負赤子而趨或曰為其布與赤子之布寡矣為其纍與赤子之纍多矣棄千金之璧負赤子而趨何也林回曰彼以利合此以天屬也夫以利合者迫窮禍患害相棄也以天屬者迫窮禍患害相收也夫相收之與相棄亦逺矣且君子之交淡若水小人之交甘若醴君子淡以親小人甘以絶彼無故以合者則無故以離孔子曰敬聞命矣徐行翔徉而歸絶學捐書弟子無挹於前而愛益加進莊子衣大布而補之正緳賢節帶也係履而過魏王魏王曰何先生之憊邪莊子曰貧也非憊也士有道德不能行憊也衣弊履穿貧也非憊也田子方曰東郭順子其為人也真人貌而天虛緣而葆真清而容物物無道正容以悟之使人之意也消孔子見老聃老聃新沐方將被髮而乾慹然似非人孔子便而待之少焉見曰丘也眩與其信然與向者先生形體掘若槁木似遺物離人而立於獨也老聃曰吾遊於物之初孔子曰何謂邪曰至隂肅肅至陽赫赫肅肅出乎天赫赫出乎地兩者交通成和而物生焉或為之紀而莫見其形消息滿虛一晦一明日改月化日有所為而莫見其功生有所乎萌死有所乎歸始終相反乎無端而莫知乎其所窮非是也且孰為之宗孔子曰請問遊是老聃曰草食之獸不疾易藪水生之蟲不疾易水行小變而不失其大常也天下也者萬物之所一也得其所一而同焉則四肢百體將為塵垢而死生終始將為晝夜而莫之能滑而況得喪禍福之所介乎棄𨽻者若棄泥塗知身貴於𨽻也貴在於我而不失於變且萬化而末始有極也夫孰足以患心己為道者解乎此至人之於德也不修而物不能離焉若天之自高地之自厚日月之自明夫何修焉黃帝曰人之生氣之聚也聚則為生散則為死若死生為徒吾又何患故萬物一也是其所美者為神奇其所惡者為臭腐臭腐復化為神奇神奇復化為臭腐故曰通天下一氣耳聖人故貴一天地有大美而不言四時有明法而不議萬物有成理而不說聖人者原天地之美而達萬物之理是故至人無為大聖不作觀於天地之謂也孔子問至道於老聃對曰夫昭昭生於冥冥有倫生於無形精神生於道形本生於精而萬物以形相生其來無迹其往無崖無門無房四達之皇皇也邀於此者四枝彊思慮恂達耳目聰明其用心不勞其應物無方天不得不高地不得不廣日月不得不行萬物不得不昌此其道與孔子曰聖人之愛人也終無己曰古之人外化而內不化與物化者一不化者也狶虛豈韋氏之囿黃帝之圃有虞氏之宮湯武之室聖人處物不傷物不傷物者物亦不能傷者也南榮趎音疇漢書古今人表作疇淮南子亦然曰目之與形吾不知其異也而盲者不能自見耳之與形吾不知其異也而聾者不能自聞心之與形吾不知其異也而狂者不能自得形之與形亦辟矣而物或間之邪欲相求而不能相得老子曰夫至人者相與交食乎地而交樂乎天不以人物利害相攖靈臺者有持而不知其所持而不可持者也劵內者行乎無名劵外者志乎期費行乎無名者唯庸有光志乎期費者唯賈人也兵莫憯於志鏌鎁為下寇莫大於隂陽無所逃於天地之間非隂陽賊之心則使之也觀室者周於寢廟又適其偃焉蹍市人之足則辭以放驁兄則以嫗大親則已矣徹志之勃解心之謬去德之纍達道之塞貴富顯嚴名利也容動色理氣意也惡欲喜怒哀樂也去就取與知能也此四六者不蕩胸中則正正則靜靜則明明則虛虛則無為而無不為也性者生之質也性之動謂之為為之僞謂之失知者接也知者之所不知猶睨也動無非我之謂治聖人工乎天而拙乎人夫工乎天而俍良乎人者唯全人能之介者拸數止畫外非譽也胥靡登髙而不懼遺死生也敬之而不喜侮之而不怒者唯同乎天和者為然出怒不怒則怒出於不怒矣出為無為則為出於無為矣欲靜則平氣欲神則順心有為也欲當則緣於不得已不得已之類聖人之道徐無鬼謂魏武侯曰天地之養也一登高不可以為長居下不可以為短君獨為萬乘之主以苦一國之民以養耳目鼻口夫神者不自許也武侯曰吾欲愛民而為義偃兵其可乎無鬼曰不可愛民害民之始也為義偃兵造兵之本也君自此為之則殆不成夫殺人之士民兼人之土地以養吾私與吾神者其戰不知孰善勝之惡乎在君若勿已矣修胸中之誠以應天地之情而勿攖夫民民死已脫矣君將惡乎用夫偃兵哉黃帝將見大隗乎具茨之山方明為御昌㝢驂乘張若謵朋前馬昆閽滑稽後車至於襄城之野七聖皆迷無所問塗適遇牧馬童子問塗焉童子曰夫為天下者亦奚以異乎牧馬者哉亦去其害馬者而已矣黃帝再拜稽首稱天師而退知士無思慮之變則不樂辨士無談說之序則不樂察士無凌誶音訊凌誶陵轢而問也之事則不樂皆囿於物者也招世之士興朝中民之士榮官筋力之士矜難勇敢之士奮患兵革之士樂戰枯槁之士宿名法律之士廣治農夫無草萊之事則不比商賈無市井之事則不比庶人有旦暮之業則勸百工有器械之巧則壯錢財不積則貪者憂權勢不尤則夸者悲勢物之徒樂變遭時有所用不能無為也此皆順比於歲不物於易者也馳其形性潛之萬物終身不反悲夫莊子送葬過惠子之墓顧謂從者曰郢人堊烏洛漫平上二聲其鼻端若蠅翼使匠石斫之匠石運斤成風聽而斫之盡堊而鼻不傷郢人立不失容宋元君聞之召匠石曰嘗試為寡人為之匠石曰臣則嘗能斫之雖然臣之質死久矣自夫子之死也吾無以為質矣吾無與言之矣南伯子綦隱几而坐仰天而噓顔成子入見曰夫子物之尤也形固可使若槁骸心固可使如死灰乎吾嘗居山穴之中矣當是時也田禾一覩我而齊國之衆三賀之我必先之彼故知之我必賣之彼故鬻之若我而不有之彼惡得而知之若我而不賣之彼惡得而鬻之嗟夫我悲人之自喪者吾又悲夫悲人者吾又悲夫悲人之悲者其後而日逺矣孔子曰狗不以善吠為良人不以善言為賢許由曰夫民不難聚也愛之則親利之則至譽之則勸致其所惡則散愛利出乎仁義捐仁義者寡利仁義者衆夫仁義之行唯且無誠是以一人之斷制利天下譬之猶一覕薄結也莊子曰聖人其窮也使家人忘其貧其達也使王公忘爵祿而化卑故或不言而飲人以和與人竝立而使人化聖人之綢繆周盡一體矣而不知其然性也聖人之愛人也人與之名不告則不知其愛人也若知之若不知之若聞之若不聞之其愛人也終無已人之安之亦無已性也長梧封人謂子牢曰君為政焉勿鹵莽治民焉勿滅裂昔豫為禾耕而鹵莽之則其實亦鹵莽而報豫藝而滅裂之其實亦滅裂而報豫豫來年變齊深其耕而熟耰之其禾繁以滋豫終年厭飱莊子聞之曰今人之治其形理其心多有似封人之所謂遁其天離其性滅其精亡其神以衆為故鹵莽其性者欲惡之孽為性􅍉葦蒹葭始萌以扶吾形尋擢吾性竝潰漏發不擇所出漂匹遙疽疥癰內熱溲膏是也柏矩曰古之君人者以得為在民以失為在己以正為在民以枉為在已故一形有失其形者退而自責今則不然匿為物而愚不識大為難而罪不敢重為任而罰不勝逺其塗而誅不至民知力竭則以僞繼之日出多僞士民安取不僞力不足則僞知不足則欺財不足而盜盜竊之行於誰責而可乎蘧伯玉行年六十而六十化未嘗不始於是之而卒詘之以非也太公調曰丘山積卑而為高江河合水而為大大人合并而為公四時殊氣天不賜故歲成五官殊職君不私故國治計物之數不止於萬而期曰萬物者以數之多者號而讀之也天地者形之大者也隂陽者氣之大者也道者為之公因其大以號而讀之則可也時有始終氣有變化季真之莫為接子之或使二家之議孰正於其情孰偏於其理或使則實莫為則虛有名有實是物之居無名無實在物之虛可言可意言而愈疏言而足則終日言而盡道言而不足則終日言而盡物道物之極言默不足以載非言非默議其有極莊子曰外物不可必故人主莫不欲其臣之忠而忠未必信人親莫不欲其子之孝而孝未必愛木與木相摩則然金與火相守則流隂陽錯行則天地大絯駭利害相摩生火甚多衆人焚和月固不勝火於是乎有僓頽然而道盡老萊子曰聖人躊躇以興事以每成功皇王大紀卷七十四

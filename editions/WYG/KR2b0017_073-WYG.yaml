body:
  text: 皇王大紀卷七十三宋胡宏撰三王紀顯王葉公子高將使於齊問於仲尼曰王使諸梁也甚重齊之待使者蓋將甚敬而不急匹夫猶未可動也而況諸侯乎吾甚慄之子嘗語諸梁也曰凡事若小若大寡不道以懽成事若不成則必有人道之患事若成則必有隂陽之患若成若不成而後無患者唯有徳者能之吾食也執麤而不臧爨無欲清七性宜從假借也之人今吾朝受命而夕飲氷我其内熱與吾未至乎事之情而既有隂陽之患矣事若不成必有人道之患是兩也為人臣者不足以任之子其有以語我仲尼曰天下有大戒二其一命也其一義也子之愛親命也不可解於心臣之事君義也無適而非君也無所逃於天地之間是之謂大戒是以夫事其親者不擇地而安之孝之至也夫事其君者不擇事而安之忠之盛也自事其心者哀樂不易施乎前知其不可奈何而安之若命徳之至也為人臣子者固有所不得已行事之情而㤀其身何暇至於悦生而惡死夫子其行可矣仲尼曰人莫鑑於流水而鑑於止水惟止能止衆止受命於地唯松柏獨也正在冬夏青青受命於天唯舜獨也正幸能正生以正衆生夫保始之徵始也保其始可信其終也不懼之實勇士一人雄入於九軍將求名而能自要者而猶若是而況官天地府萬物直寓六骸象耳目一知之所知而心未嘗死者乎申屠嘉曰乆與賢人處則無過知不可奈何而安之若命唯有徳者能之兀者叔山無趾踵見仲尼仲尼曰子不謹前既犯患若是矣雖今來何及矣無趾曰吾唯不知務而輕用吾身吾是以亡足今吾來也猶有尊足者存吾是以務全之也夫天無不覆地無不載吾以夫子為天地安知夫子之猶若是也孔子曰丘則陋矣夫子胡不入乎請講以所聞無趾出孔子曰弟子勉之夫無趾兀者也猶務學以復補前行之惡而況全徳之人乎仲尼曰平者水停之盛也其可以為法也内保之而外不蕩也徳者成和之脩也徳不形者物不能離也惠子謂莊子曰人故無情乎莊子曰然惠子曰人而無情何以謂之人莊子曰吾所謂無情者言人之不以好惡内傷其身常因自然而不益生也大宗師曰知天之所為者天而生也知人之所為者以其知之所知以養其知之所不知也雖然夫知有所待而後當其所待者特未定也庸詎知吾所謂天之非人乎所謂人之非天乎古之眞人過而弗悔當而不自得也其寢不夢其覺無憂其食不甘其息深深眞人之息以踵衆人之息以喉其耆欲深者其天機淺古之眞人不知悦生不知惡死不忘其所始不求其所終是之謂不以心捐道不以人取天若然者其心忘其容寂凄然似秋煖然似春喜怒通四時與物有宜而莫知其極故聖人之用兵也亡國而不失人心利澤施乎萬世不為愛人天與人不相勝也是之謂眞人夫藏舟於壑藏山於澤謂之固矣然而夜半有力者負之而走昧者不知也若夫藏天下於天下而不得所遯是恒物之大情也故聖人將遊於物之所不得遯而皆存善夭善老善始善終人猶效之又况萬物之所繫而一化之所待乎夫道有情有信無為無形可傳而不可受可得而不可見自本自根未有天地自古以固存子祀子輿子犁子來相與語曰孰能知死生存亡之一體者吾與之友矣四人相視而笑莫逆於心遂相與為友俄而子輿有病子祀往問之曰汝惡之乎曰亡予何惡浸假而化予之左臂以為雞予因以求時夜浸假而化予之右臂以為彈予因以求鴞炙浸假而化予之凥以為輪以神為馬予因而乗之豈更駕哉安時而處順哀樂不能入也此古之所謂縣解縣而不能自解者物有結之且夫物不勝天乆矣吾又何惡焉俄而子來有病喘喘赤兊切然將死其妻子環而泣之子犁往問之曰叱避無怛化倚其户與之語曰造化将奚以適子來曰父母於子東西南北唯命之從隂陽於人不翅於父母彼近吾死而我不聽我則悍矣彼何罪焉夫大塊載我以形勞我以生佚我以老息我以死故善吾生者乃所以善吾死今一以天地為大鑪以造化為大冶惡乎往而不可哉成然寐蘧然覺子桑戸孟子反子琴張相與語曰孰能登天遊霧撓而小切挑徒小切無極相忘以生無所終窮三人相視而笑莫逆於心遂相與友莫然有間而子桑戸死未葬孔子使子貢往待事焉或編曲或鼓琴相和而歌子貢反以告孔子曰彼遊方之外者也而丘遊方之内者也彼方且與造物者為人而遊乎天地之一氣芒然彷徨乎塵垢之外逍遥乎無為之業彼又惡能憒憒上内然為世俗之禮以觀衆人之耳目哉故曰天之小人人之君子人之君子天之小人也顏回問曰孟孫才其母死哭泣無涕不慼不哀而以善喪蓋魯國固有無其實而得其名者乎仲尼曰夫孟孫氏盡之不知所以生不知所以死且方將化惡知不化哉方將不化惡知己化哉吾特與汝其夢未始覺者耶孟孫氏特覺人哭亦哭是自其所以乃且汝夢為鳥而厲乎天夢為魚而沒於淵不識今之言者其覺者乎其夢者乎安排而去化乃入於寥天一應帝王曰肩吾曰君人者以已出經式義度人孰敢不聴而化諸狂接輿曰聖人之治也治外乎正而後行確乎能其事者而已矣且鳥高飛以避矰弋之害鼷䑕深穴乎神丘之下以避熏鑿之患而曽二蟲之無知無名人謂天根曰遊心於淡合氣於漠順物自然而無容私焉而天下治矣老耼曰明王之治其功蓋天下而似不自己立乎不測而遊於無有者也列子見壺子而歸三年不出為其妻爨食豕如食人於事無與親雕琢復朴塊然獨以其形立紛而封哉一以是終無為名尸無為謀府無為事任無為知主盡其所受乎天而無見得亦虚而已至人之用心若鏡不將不迎應而不藏故能勝物而不傷外篇曰駢拇枝指出乎性哉而侈於徳附贅縣疣出乎形哉而侈於性多方乎仁義而用之者列於五藏哉而非道徳之正也彼正正者不失其性命之情故合者不為駢而枝者不為跂長者不為有餘短者不為不足是故鳬脛雖短續之則憂鶴脛雖長斷之則悲故性長非所斷性短非所續無所去憂也天下有常然者曲者不以鈎直者不以繩圓者不以規方者不以矩附離不以膠漆約束不以纆索故天下誘然皆生而不知其所以生同焉皆得而不知其所以得且夫屬其性乎仁義者雖通如曾史曾參史鰌非吾所謂臧也屬其性於五味雖通如兪兒兪兒古人善别味者非吾所謂臧也屬其性乎五聲雖通如師曠師曠冀州南和人生而無目善音律非吾所謂聰也屬其性乎五色雖通如離朱離朱黄帝時人百歩見秋毫非吾所謂明也吾所謂臧者臧於其徳而已矣任其性命之情而已矣吾所謂聰者非謂其聞彼也自聞而已矣吾所謂明者非謂其見彼也自見而已矣夫不自得而得彼者是得人之得而不自得其得者也適人之適而不自適其適者也若然者雖盜跖與伯夷是同為淫僻也莊子曰上誠好知而無道則天下大亂矣何以知其然耶夫弓弩畢弋機變之知多則鳥亂於上矣鈎餌網罟罾笱之知多則魚亂於水矣削七妙削格所以施羅網者格羅落罝罘之知多則獸亂於澤矣吾意善治天下者不然彼民有常性織而衣耕而食是謂同徳同乎無知其德不離同乎無欲是謂素樸素樸而民性得矣及至蹩躠為仁踶跂為義而天下始疑矣澶漫為樂摘擗為禮而天下始分矣故純樸不殘孰為犧樽白玉不毁孰為珪璋五色不亂孰為文采五聲不亂孰應六律及至屈折禮樂以匡天下之形縣跂仁義以慰天下之心而民乃始爭歸於利不可止也君子不得已而臨蒞天下莫若無為無為也而後安其性命之情故貴以身於為天下則可以託天下愛以身於為天下則可以寄天下故君子茍能無解其五藏無擢其聰明尸居而龍見淵黙而雷聲神動而天隨從容無為而萬物炊累焉吾又何暇治天下哉自天下之衰愚智相欺善否相非誕信相譏大徳不同而性命爛漫矣天下好知而百姓求竭矣於是乎釿鋸制焉繩墨殺焉椎鑿決焉天下脊脊大亂罪在攖人心故賢者伏處大山嵁巖之下而萬乗之君憂慄乎廟堂之上故曰絶聖棄智天下大治世俗之人皆喜人之同乎已而惡人之異於已也同乎已而欲之異於已而不欲者以出乎衆為心也夫以出乎衆為心者曷常出乎衆哉因衆以寜所聞不如衆技衆矣而欲為人之國者此以人之國僥倖也幾何僥倖而不喪人之國乎其存人之國也無萬分之一而喪人之國也一不成而萬有餘喪矣悲夫有土者之不知也夫有土者有大物也有大物者不可以物物而不物故能物物明乎物物者之非物也豈獨治天下百姓而已哉出入六合遊乎九州獨往獨來是謂獨有獨有之人是之謂至貴大人之教若形之於影聲之於響有問而應之盡其所懐為天下配處乎無響行乎無方出入無旁與日無始頌論形軀合乎大同大同而無巳無巳惡乎得有有覩有者昔之君子覩無者天地之友賤而不可不任者物也卑而不可不因者民也匿而不可不為者事也麤而不可不陳者法也故聖人接於事而不辭齊於法而不亂恃於民而不輕因於物而不去不明於天者不純於徳不通於道者無自而可有天道有人道無為而尊者天道也有為而累者人道也主者天道也臣者人道也相去逺矣不可不察也莊子曰天地雖大其化均也萬物雖多其治一也人卒雖衆其主君也古之君天下無為也天徳而已矣故無欲而天下足無為而萬物化淵靜而百姓定記曰通於一而萬事畢無心得而鬼神服夫子曰夫道覆載萬物者也洋洋乎大哉君子不可以不刳心焉無為為之之謂天無為言之之謂徳愛人利物之謂仁不同同之之謂大行不崖異之謂寛有萬不同之謂富執徳之謂紀徳成之謂立循於道之謂備不以物挫志之謂完君子明於此十者則韜乎其事心之大也若然者不榮通不醜窮不拘一世之利以為已私分不以王天下為已處顯萬物一府死生同狀莊子曰泰初有無無有無名一之所起有一而未形物得以生謂之徳未形者有分且然無間謂之命物成生理謂之形形體保神各有儀則謂之性性脩反徳徳至同於初同乃虚虚乃大將閭葂謂魯君曰必服恭儉拔出公忠之屬而無阿私民孰敢不輯季徹曰不然大聖之治天下也搖蕩民心使之成教易俗舉滅其賊心而皆進其獨志若性之自為而民不知其所由然漢隂丈人謂子貢曰有機械者必有機事有機事者必有機心機心存於胷中則純白不備純白不備則神生不定神生不定者道之所不載也身之不能治而何暇治天下乎子貢謂弟子曰吾聞之夫子事求可功求成用力少而見功多者聖人之道今徒不然執道者徳全徳全者形全形全者神全神全者聖人之道也功利機巧必忘夫人之心若夫人者非其志不之非其心不為雖以天下非譽之無益損焉以告孔子孔子曰彼假修渾沌氏之術者也識其一不知其二治其内不治其外無為復朴體性抱神以遊世俗之間者也苑風問於諄芒曰願聞聖治諄芒曰官施而不失其冝㧞舉而不失其能畢見其情事而行其所為行言自為而天下化手撓顧指四方之民莫不俱至此之謂聖治願聞徳人曰居無思行無慮是非美惡四海之内共利之之為悦共給之之為安願聞神人曰致命盡情天地樂而萬事銷亡此之謂混冥莊子曰孝子不諛其親忠臣不諂其君臣子之盛也親之所言而然所行而善則世俗謂之不肖子君之所言而然所行而善則世俗謂之不肖臣而未知此其必然耶世俗之所謂然而然之所謂善而善之則不謂之導諛之人也然則俗故嚴於親而尊於君耶謂已導人則勃然作色謂已諛人則怫然作色而終身導人也終身諛人也合譬飾辭聚衆也是終始本末不相坐垂衣裳設采色動容貌以媚一世而不自謂導諛與夫人為徒通是非而不自謂衆人愚之至也知其愚者非大愚也知其惑者非大惑也大惑者終身不解大愚者終身不靈三人行而一人惑所適者猶可致也惑者少也二人惑則勞而不至惑者勝也而今也以天下惑予雖有所嚮不可得也不亦悲乎大聲不入於里耳折楊皇荂則嗑然而笑是故高言不止於衆人之心至言不出俗言勝也以二缶鐘缶鐘當作垂踵言垂足空必不得有所知矣惑而所適不得矣而今也以天下惑予雖有祈嚮其庸可得耶知其不可得也而強之又一惑也故莫若釋之而不推不推誰其比憂莊子曰失性有五一曰五色亂目使目不明二曰五聲亂耳使耳不聰三曰五臭薰鼻困惾子公切猶刻塞不通也中顙四曰五味噣濁口使口厲爽五曰趣舎滑心使性飛揚皆生之害也而楊墨乃始離跂自以為得非吾所謂得也夫得者困可以為得乎則鳩鴞之在於籠虎豹在於囊檻亦可以為得矣莊子曰天道運而無所積故萬物成帝道運而無所積故天下歸聖道運而無所積故海内服明於天通於聖六通四辟於帝王之徳者其自為也昧然無不靜者矣聖人之靜也非曰靜也善故靜也萬物無足以鐃心者故靜也水靜則明燭鬚眉平中准大匠取法焉水靜猶明而況精神聖人之心靜乎天地之鑒也萬物之鏡也夫虚靜恬淡寂漠無為者天地之平而道徳之至故帝王聖人休焉休則虚虚則實實則倫矣虚則靜靜則動動則得矣靜則無為無為也則任事者責矣無為則俞俞俞俞者憂患不能處年壽長矣夫虚靜恬淡寂漠無為者萬物之本也明此以南鄉堯之為君也明此以北面舜之為臣也以此處上帝王天子之徳也以此處下𤣥聖素王之道也以此退居而閒游江海山林之士服以此進為而撫世則功大名顯而天下一也靜而聖動而王無為也而尊樸素而天下莫能與之爭矣夫明白於天地之徳者此之謂大本大宗與天和者也所以均調天下與人和者也與人和者謂之人樂與天和者謂之天樂知天樂者其動也天其靜也地一心定而王天下其鬼不祟其魂不疲一心定而萬物服夫帝王以天地為宗以道徳為主以無為為常無為也則用天下而有餘有為也則為天下用而不足故古之人貴夫無為也上無為也下亦無為也是下與上同徳下與上同徳則不臣下有為也上亦有為也是上與下同道上與下同道則不主上必無為而用天下下必有為為天下用此不易之道也故古之王天下者知雖落天地不自慮也辯雖彫萬物不自説也能雖窮海内不自為也天不產而萬物化地不長而萬物育帝王無為而天下功故曰莫神於天莫富於地莫大於帝王帝王之徳配天地本在於上末在於下要在於主詳在於臣三軍五兵之運徳之末也賞罰利害五刑之辟教之末也禮法度數刑名比詳比較詳密治之末也鐘鼓之音羽旄之容樂之末也哭泣衰絰降殺之服哀之末也此五末者須精神之運心術之動然後從之者也末學者古人有之而非所以先也君先而臣從父先而子從兄先而弟從長先而少從男先而女從夫先而婦從夫尊卑先後天地之行也故聖人取象焉天尊地卑神明之位也春夏先秋冬後四時之序也萬物化作萌區有狀盛衰之殺變化之流也天地至神而有尊卑先後之序而況人道乎宗廟尚親朝廷尚尊郷黨尚齒行事尚賢大道之序也語道而非其序者非其道也是故古之明大道者先明天而道徳次之道徳已明而仁義次之仁義已明而分守次之分守已明而形名次之形名已明而因任次之因任已明而原省次之原省已明而是非次之是非已明而賞罰次之賞罰已明而愚智處宜貴賤履位仁賢不肖襲情必分其能必由其名以此事上以此畜下以此治物以此脩身知謀不用必歸其天此之謂太平治之至也故書曰有形有名形名者古人有之而非所以先也驟而語形名不知其本也驟而語賞罰不知其始也倒道而言迕道而説者人之所治也安能治人驟而語形名賞罰此有知治之具非知治之道可用於天下不足以用天下此之謂辯士一曲之人也夫天地者古之所大也黃帝堯舜之所共美也故古之王天下者奚為哉天地而已矣世之所貴道者書也書不過語語有貴也語之所貴者意也意有所隨意之所隨者不可以言傳也而世因貴言傳書世雖貴之哉猶不足貴也為其貴非其貴也故視而可見者形與色也聽而可聞者名與聲也悲夫世人以形色名聲為足以得彼之情夫形色名聲果不足以得彼之情則知者不言言者不知而世豈識之哉桓公讀書於堂上輪扁斵輪於堂下釋椎鑿而上問桓公曰敢問公之所讀者何言耶公曰聖人之言也曰聖人在乎曰已死矣曰然則君之所讀者古人之糟粕已夫桓公曰寡人讀書輪人安得議乎有説則可無説則死輪扁曰以臣之事觀之斵輪徐則甘而不固疾則苦而不入不徐不疾得之於手而應於心口不能言有數存焉於其間臣不能以喻臣之子臣之子亦不能受之於臣是以行年七十而老斵輪古之人與其不可傳也死矣然則君之所讀者古人之糟魄􅥙夫莊子曰天其運乎地其處乎日月其爭於所乎孰主張是孰綱維是孰居無事推而行是意者其有機緘而不得已耶意者其運轉而不能自止耶雲者為雨乎雨者為雲乎孰隆施是孰居無事淫樂而勸是風起北方一西一東有上徬徨孰嘘吸是孰居無事而披拂是敢問何故巫咸祒曰來吾語汝天有六極五常帝王順之則治逆之則凶九洛之事治成徳備監照下土天下載之此謂上皇商大宰蕩問仁於莊子莊子曰虎狼仁也曰何謂也莊子曰父子相親何為不仁曰請問至仁曰至仁無親大宰曰蕩聞之無親則不愛不愛則不孝謂至仁不孝可乎莊子曰至仁尚矣孝固不足以言之故曰以敬孝易以愛孝難以愛孝易以忘親難忘親易使親忘我難使親忘我易兼忘天下難兼忘天下易使天下兼忘我難夫孝弟忠信此皆自勉以役其徳者也不足多也故曰至貴國爵并焉至富國財并焉至願名譽并焉是以道不渝莊子曰聖也者達於情而遂於命也天機不張而五官皆備此之謂天樂無言而心悦莊子曰水行莫如用舟而陸行莫如用車以舟之可行於水也而求推之於陸是未知夫無方之傳應物而不窮者也且子獨不見夫桔橰者乎引之則俯舎之則仰彼人之所引非引人也故俯仰而不得罪於人故夫三皇五帝之禮義法度不矜於同而矜於治故譬三皇五帝之禮義法度其猶柤棃橘柚耶其味相反而皆可於口故禮義法度者應時而變者也莊子曰老子曰使道而可獻則人莫不獻之於其君使道而可進則人莫不進之於其親使道而可以告人人莫不與其子孫然而不可者無他也中無主而不止外無正而不行古之至人假道於仁託宿於義以遊逍遥之墟食於茍簡之田立於不貸之圃謂是采眞之遊以富為是者不能讓禄以顯為是者不能讓名親權者不能與人柄操之則慄舎之則悲而一無所鑒以闚其所不休者是天之戮民也怨恩取與諫教生殺八者正之器也唯循大變無所湮者為能用之故曰正者正也其心以為不然者天門弗開矣皇王大紀巻七十三

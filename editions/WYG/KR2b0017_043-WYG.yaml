body:
  text: 皇王大紀卷四十三宋胡宏撰三王紀襄王十八年冬十一月己未魯侯莒兹丕公衛甯莊子速盟于向㝷洮之盟也齊師侵魯西鄙討與衞盟也公追齊師至酅弗及齊侯伐魯北鄙臧文仲欲以辭告病焉問於展禽對曰獲聞之處大教小處小事大所以禦亂也不聞以辭文仲曰國急矣願以子之辭行賂焉展禽曰不可乃使展喜以膏沐犒師展禽授之辭曰寡君不佞不能事疆場之司使君盛怒親舉玉趾以暴露於敝邑之野敢犒輿師齊侯見使者曰魯人恐乎對曰小人恐矣君子則否齊侯曰室如懸磬野無青草何恃而不恐對曰恃先王之命昔周公太公股肱周室夾輔成王王賜之盟曰世世子孫無相害也載在盟府大師職之桓公是以紏合諸侯而謀其不協彌縫其闕而匡救其災昭舊職也及君即位諸侯之望曰其率桓之功我敝邑用不敢保聚曰豈其嗣世九年而棄命廢職其若先君何君必不然恃此以不恐齊侯還衛人伐齊魯公子遂臧孫辰如楚乞師䕫子不祀祝融與鬻熊楚人譲之對曰我先王熊摯有疾鬼神弗赦而自竄于䕫吾是以失楚又何祀焉楚子玉帥師滅䕫以䕫子歸楚人伐宋以其善於晉侯也叛楚即晉子玉帥師伐宋圍緡魯侯以楚師伐齊取榖楚使申公叔侯戍之經曰二十有六年春王正月己未公㑹莒子衛甯速盟于向齊人侵我西鄙公追齊師至􅈶弗及書人書侵書師罪齊也書追書至酅弗及罪魯也潜師入境曰侵少則稱人衆則稱師前書齊人是見其弱以誘魯也後書齊師是伏其衆以邀魯也其為諼明矣凡書追者在境外則譏其深入追齊而至􅈶是也酅者齊地至者言逺也弗者遷詞也有畏而弗敢及之也齊魯皆私憤之兵而非正也故交譏之夏齊人伐我北鄙衞人伐齊公子遂如楚乞師衛人報徳以怨伐齊之喪助少陵長又遷怒於邢而滅其國不義甚矣公既與其君盟于洮又與其臣盟于向是黨衛也故齊人既侵其西又伐其北齊師固亦非義矣而僖公不能省德自反深思逺慮計安社稷乃乞楚師與齊為敵是以蠻夷殘中國也於義可乎其書公子遂如楚乞師而惡自見矣秋楚人滅䕫以䕫子歸諸侯之祀無過其祖者而䕫祖熊摯是不得祀祝融與鬻熊也而楚反以是滅之非其罪矣故特存其爵而不名也然則楚滅同姓何以不名人而不名春狄待夷狄之體也冬楚人伐宋圍緡公以楚師伐齊取榖公至自伐齊楚强魯弱而能用其師進退在己故特書曰以以者不以者也夫背華即夷取人之邑為已有失正甚矣患之起必自此始其致危之也十九年把侯朝魯用夷禮夏四月庚寅齊侯薨諡曰孝公公子潘因衛公子開方殺孝公子而自立六月乙未齊塟其君孝公魯公子遂帥師入把討其用夷禮也楚王將伐宋使子文治兵於睽終朝而畢不戮一人子玉復治兵于蔿終日而畢鞭七人貫三人耳國老皆賀子文蔿賈尚幼後至不賀子文問之對曰子玊剛而無禮不可以治兵過三百乗其不能以入矣苟入而賀何後之有楚王帥陳侯蔡侯鄭伯許男圍宋冬十月甲戌魯侯㑹楚王盟于宋宋告急于晉狐偃曰楚始得曹而新昏於衞若伐曹衞楚必救之則齊宋免矣晉侯蒐于被廬作三軍謀元帥趙衰曰郤縠可説禮樂而敦詩書行年五十矣守學彌惇使將中軍以為大政郤溱佐之初公入而教其民二年欲用之狐偃曰民未知義未安其居於是乎出定襄王晉俗苦奢公身行儉約無幾時人皆大布之衣脱粟之飯民用富實懷其生矣將用之偃曰民未知信未宣其用於是伐原以示之信民易資者不求豐焉明徴其辭公曰可矣乎偃曰民未知禮未生其共於是乎大蒐以示之禮作執秩以正其官民聽不惑而後用之晉侯欲用趙衰為卿辭曰偃出三德其章大矣公命偃偃曰毛之智賢於臣乃使狐毛將上軍而偃佐之復欲用衰辭曰欒枝貞慎先軫有謀胥臣多聞臣弗若也乃使枝將下軍而軫佐之經曰二十有七年春把子來朝夏六月庚寅齊侯昭卒秋八月乙未葬齊孝公乙巳公子遂帥師入把冬楚人陳侯蔡侯鄭伯許男圍宋十有二月甲戍公㑹諸侯盟于宋楚稱人貶也宋公先代之後作賔王家非有篡弑之惡楚人無故摟諸侯以圍之何名也故黜而稱人以著其罪諸侯信夷狄伐中國獨無貶乎人楚子所以人諸侯公與楚結好故徃㑹盟其地以宋者宋方見圍無嫌於與盟而公之罪亦著矣二十年晉侯將伐曹假道于衞衞人弗許還自南河濟伐衞取五鹿郤縠卒拔下軍佐原軫代之晉侯齊侯盟于斂盂衞侯請盟晉人弗許衛人欲與楚國人不欲故出其君以説于晉衛侯出居于襄牛魯公子買戍衞楚人救衞不克公懼於晉殺買以説焉謂楚人不卒戍也正月丙午晉侯入曹數其不用僖負羈而乗軒者三百人也魏犨顛頡不用命爇僖負羈氏公愛犫材乃舍之殺顛頡以徇宋復告急公曰宋人告急舍之則絶告楚不許我欲戰矣齊秦未可若之何原軫曰使宋舍我而賂齊秦藉之告楚我執曹君而分曹衛之田以賜宋人楚愛曹衞必不許也喜賂怒頑能無戰乎公説執曹伯分曹衞之田以畀宋人楚王使申叔去榖子玊去宋曰無從晉師晉侯在外十九年險阻艱難備甞之矣民之情僞盡知之矣天假之年而除其害天之所置其可廢乎子玉使請戰曰非敢必有功也願以間執讒慝之口王怒少與之師惟西廣東宫與若敖之六卒實從之子玉使宛春告於晉曰請復衛侯而封曹臣亦釋宋之圍狐偃曰無禮哉君取一臣取二先軫曰定人之謂禮楚一言而定三國我一言而亡之我則無禮何以戰乎不如私許復曹衞以攜之執宛春以怒楚既戰而後圖之公説乃拘宛春私許復曹衛曹衛告絶於楚子玊怒從晉師晉師退軍吏曰楚師老矣何故退狐偃曰師直為壯曲為老豈在乆乎微楚之惠不及此我退而楚還我將何求若其不還君退臣犯曲在彼矣退三舍楚衆欲止子玉不可晉侯宋公齊國歸父崔夭秦小子憗次于城濮楚師背酅而舍晉侯患之狐偃曰戰也戰而㨗必得諸侯若其不㨗表裏山河必無害也公曰若楚惠何欒枝曰漢陽諸姬楚實盡之思小惠而忘大恥可乎晉車七百乗韅靷鞅靽晉侯登有莘之墟以觀師曰少長有禮其可用也二月己巳遂陳于莘北胥臣佐下軍䝉馬以虎皮先犯陳蔡楚右師潰狐毛設二斾而退之欒枝使輿曵柴而僞遁楚師馳之先軫以中軍公族横撃之狐毛狐偃以上軍夹攻子西楚左師潰子玉收其卒而止故不敗晉師三日館榖楚王使謂子玉曰大夫若入其若申息之老何及連榖而死衞侯聞楚師敗懼出奔楚遂適陳使元咺奉其弟叔武以受盟鄭伯懼使子人九行成于晉晉師還至于衡鄭伯會晉侯盟焉王親勞晉侯作王宫于踐土獻楚俘鄭伯傅王用平禮也王享醴命晉侯宥策命晉侯為晉伯賜之大輅之服戎輅之服彤弓一彤矢百玈弓十玈矢千秬鬯一卣虎賁三百人曰王謂叔父敬服王命以綏四國紏逖王慝晉侯三辭再拜稽首曰重耳敢不奉揚天子之丕顯休命三月癸丑晉侯齊侯宋公魯侯蔡侯鄭伯衛子莒子盟于王庭王子虎涖盟曰皆奬王室無相害也陳侯如㑹魯侯朝王或訴元咺於衛侯曰立叔武矣其子角從公公使殺之咺不廢命奉叔武以入守晉人復衛侯甯俞與衛人盟曰天禍衛國君臣不協以及此憂也今天誘其衷使皆降心以相從不有居者誰守社稷不有行者誰扞牧圉自今以徃既盟之後行者無保其力居者無懼其罪國人聞此而後不貳四月衛侯先期入公子歂犬前驅叔武將沐聞君至喜捉髮走出前驅射而殺之公知其無罪也枕之股而哭歂犬走出公使殺之元咺出奔晉陳侯薨諡曰穆公子朔嗣把夫人魯伯姬歸寧于魯魯遂如齊晉侯會齊侯宋公蔡侯鄭伯陳子莒子邾子秦人于温召王以諸侯見且使王狩仲尼曰以臣召君不可訓也壬申魯侯朝王衛侯與元喧訟甯俞為輔鍼莊子為坐士榮為大士衛侯不勝殺士榮刖鍼莊子謂寗俞忠而免之執衛侯歸之于京師寘諸深室元咺歸于衛立公子瑕許男不㑹諸侯圍之晉侯有疾曹伯之豎侯獳貨筮史使曰以曹為解曹叔振鐸文之昭也先君唐叔武之穆也且合諸侯而滅兄弟非禮也與衞偕命而不與偕復非信也同罪異罰非刑也公説復曹伯遂㑹諸侯于許晉侯作三行以禦狄荀林父將中行屠擊將右行先蔑將左行經曰二十有八年春晉侯侵曹晉侯伐衛按左氏初公子重耳之出亡也曹衛皆不禮焉至是侵曹伐衛再稱晉侯者譏復怨也春秋之時用兵者非懐私復怨則利人土地耳詩云百爾君子不知徳行不忮不求何用不臧不忮則能懲忿不求則能窒慾然後貪憤之兵亡矣或曰曹衛背華即夷於是乎致武奚為不可曰楚人摟諸侯以圍宋陳蔡鄭許舉兵而同㑹魯公與㑹而同盟楚雖得曹新昏於衛然其君不在㑹其師不與圍以方諸國不猶愈乎又况衛已請盟而晉人弗之許也書曰必有忍其乃有濟有容徳乃大文公能忍於奄豎里鳬須矣何獨不能忍于曹衛乎再稱晉侯者甚之也下書楚人救衞則譏晉深矣春秋責備賢者而樂與人改過責備賢者故再稱晉侯樂與人改過故衛己請盟不當拒而絶之也公子買戍衛不卒戍刺之按左氏買為楚戍衛而以不卒戍刺之則知買無罪矣殺無罪之主將以茍説於強國於是乎不君矣故特書其故以貶之也楚人救衛三月丙午晉侯入曹執曹伯畀宋人古者覿文匿武脩其訓典序成而不至於是乎有攻伐之兵故孟子謂萬章曰子以為有王者作將比今之諸侯而誅之乎其教之不改而後誅之乎曹伯嬴者未狎晉政莫知所承晉文不脩詞令遽入其國既執其君又分其田暴矣欲致楚兵與之戰而以曹伯畀宋人譎矣雖一戰勝楚遂主夏盟舉動不中於禮亦多矣徒亂人上下之分無君臣之禮其功雖髙道不足尚也故曰五伯三王之罪人仲尼之徒無道桓文之事者夏四月己巳晉侯齊師宋師秦師及楚人戰于城濮楚師敗績楚稱人貶也戰而言及主乎是戰者也楚雖請戰而及在晉侯誅其意也荆楚恃强憑陵諸夏滅黄而霸主不能恤敗徐于婁林而諸大夫不能救執中國盟主而在㑹者不敢與之争今又戍榖逼齊合兵圍宋戰勝中國威動天下非有城濮之敗則民其被髮左衽矣冝有美詞稱揚其績而春秋所書如此其畧何也仁人明其道不計其功正其義不謀其利文公一戰勝楚遂主夏盟以功利言則髙矣語道義則三王之罪人矣知此説則曽西不為管仲而仲尼孟子雖老于行而不悔其有以夫楚殺其大夫得臣得臣信有罪矣而楚子知其不可敵而少與之師又以一敗殺之是以師為重而棄其將以與之也是晉再克而楚再敗也故稱國以殺而不去其官以仲尼書鄭棄其師與楚殺得臣之事觀之可為末世之永鑒矣衛侯出奔楚諸侯失國出奔未有不名者衛侯何以不名著文公之罪也衛侯失守社稷背華即夷於文公何罪乎衛之祸文公為之也即齊晉盟于斂孟衛侯請盟晉人不許是塞其向善之心雖欲自新改轍而其道無由也髙帝一封雍齒而功臣不競世祖燒棄文書而反側悉安使文公釋怨許衛結盟南向諸侯棄楚而歸晉矣忿不思難惟怨是圖必使衛侯竄身無所奔于荆蠻歸于京師兄弟相殘君臣交訟誰之咎也夫心不外者乃能統大衆智不鑿者乃能䖏大事文公欲王夏盟取威定霸而舉動煩擾若不勝任者惟鑿智自私而心不廣也春秋於衛侯失國出奔不以其罪名之而重文公之咎盖端本議刑責備賢者之意也五月癸丑公㑹晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土踐土之㑹天王下勞晉侯削而不書何也周室東遷所存者號與祭爾其實不及一小國之諸侯晉文之爵雖曰侯伯而號令天下幾於改物實行天子之事此春秋之名實也與其名存實亡猶愈於名實俱亡是故天王下勞晉侯於踐土則削而不書去其實以全名所謂君道也父道也晉侯以臣召君則書天王狩於河陽正其名以統實所謂臣道也子道也而天下之大倫尚存而不滅矣衛侯奔楚不書名曰未絶其位也叔武受盟而稱衛子者立以為君也此見聖人深罪晉文報怨行私專權自恣廢置諸侯之意陳侯如㑹公朝于王所朝不言所言所非其所也朝于廟禮也于外非禮也有虞氏五載一廵狩羣后四朝周制十有二年王乃時廵諸侯各朝于方岳亦何必於京師于廟然後為禮乎古者天子廵狩于四方有常時諸侯朝于方岳有常所其宫室道途可以預脩故民不勞其供給調度可以預備故國不費今天王下勞晉侯公朝于王所則非其時與地矣自秦而後巡遊無度至使長吏以倉卒不辦被誅民庶以煩勞不給生厭盖春秋之義不行故也然則天子在是其可以不朝乎天子在是而諸侯就朝禮之變也春秋不以諸侯就朝為非而以王所非其所為貶正其本之意也六月衛侯鄭自楚復歸于衛衛元咺出奔晉衛侯失國出奔則不名復歸得國何以名殺叔武也叔武者衛侯之弟也晉文公有憾於衛侯而不釋怨於是逐衛侯立叔武叔武辭立而他人立則恐衛侯之不得反也於是已立乎其位始反衛侯衛侯得反而疑其弟則曰叔武篡我元咺爭之曰叔武無罪衛侯不信其言終殺叔武是不念鞠子哀而以争國為心亂民彛滅天理其為罪大矣此其所以名也元咺由是走之晉而訟其君然衛侯初歸則稱復再歸何以不稱復乎春秋立法甚嚴而待人以恕鄭之初歸雖殺叔武既名之矣猶意其或出於悞而能革也是以稱復及其再歸又殺元咺及公子瑕則是終以爭國為心長惡不悛無自艾之意矣是以不稱復其曰歸於衛者易詞也諸侯嗣故稱復者繼之也不稱復者絶之也而國非其國矣陳侯款卒秋把伯姬來公子遂如齊冬公㑹晉侯宋公蔡侯鄭伯陳子莒子邾子秦人于温天王狩於河陽按左氏晉侯召王以諸侯見仲尼曰以臣召君不可以訓故書天王狩於河陽以尊周而全晉也啖助謂以常禮言之晉侯召君名義之罪人也其可訓乎若原其自嫌之心嘉其尊王之意則請王之狩忠亦至焉故夫子特書狩於河陽所謂原情為制以誠變禮者也夫踐土之㑹王實自往非晉罪也故為王而諱足矣温之㑹晉則有罪而其情順也故既為王諱之又為晉解之於是見春秋忠恕也壬申公朝于王所晉人執衛侯歸之于京師衛元咺自晉復歸于衛其言歸之于者執不以正之詞也古之君臣無獄諸侯不專殺為臣執君故衛侯不名而元咺稱復大夫不世其稱復絶之也自晉者晉有奉焉因其力也歸者易詞以文公為之主故其歸無難而方伯之罪亦明矣是以執而稱人不得為伯討也諸侯遂圍許諸侯比再㑹天子再至皆朝于王所以許獨不㑹以其不臣也故諸侯圍許按古者巡狩諸侯各朝于方嶽今法天子行幸三百里内亦皆問起居許距河陽踐土近矣而可以不㑹乎稱遂繼事之詞也曹伯襄復歸于曹遂㑹諸侯圍許曹伯襄何以名其歸之道非所以歸也晉侯有疾使其豎侯獳貨筮史曰以曹為解晉侯恐於是反曹伯夫以賂得國而春秋名之比於失地滅同姓之罪以此知聖人嚴於義利之别以正性命之理其説行而天下定矣豈曰小補之哉二十一年介葛盧朝于魯魯侯㑹王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子憖盟于翟泉魯大雨雹介葛盧以未見公復來朝晉狐毛卒使趙衰代之辭曰城濮之役先且居有三賞軍伐善君能其官且臣之倫箕鄭胥嬰先都在乃使且居將上軍經曰二十有九年春介葛盧來公至自圍許夏六月㑹王人晉人宋人齊人陳人蔡人秦人盟于翟泉按左氏公㑹王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子憖盟于翟泉則皆列國之貴大夫與王子而公與㑹也其貶而稱人諱不書公何也翟泉近在洛陽王城之内而王子虎於此下與列國盟是謂上替諸侯大夫入天子之境雖貴曰士而於此上盟王子虎是謂下陵而無君之心著矣故以為大惡諱公而不書諸國之卿貶稱人而王子亦與焉者此正其本之義也秋大雨雹雹者戾氣也隂脅陽臣侵君之象當是時僖公即位日乆季氏世卿公子遂專權政在大夫萌於此矣冬介葛盧來二十二年冬十一月晉人侵鄭以觀其可攻與否狄間晉之有鄭虞也遂侵齊晉侯使醫衍酖衛侯甯俞貨醫使薄其酖不死臧孫辰言於魯侯曰衛君之罪何至是刑無有隠者隠乃諱也今晉如是諱殺之也君盍請之以親兄弟之國公為之請晉侯將殺之王曰不可夫君臣無獄而叔父聽之一逆矣况為臣而殺其君乎乃釋衛侯衛侯使賂周歂冶厪曰茍能納我吾使爾為卿周冶殺元咺公子瑕及瑕弟子儀衛侯歸于衛晉侯秦伯圍鄭以其無禮於晉且貳於楚也鄭公子蘭在晉晉侯欲與之圍鄭蘭固辭許之晉軍函陵秦軍汜南鄭使燭之武見秦伯曰若亡鄭而有益於君敢以煩執事越國以鄙逺君知其難也焉用亡鄭以陪鄰鄰之厚君之薄也若舍鄭以為東道主行李之往来供其乏困君亦無所害且君嘗為晉君賜矣許君焦瑕朝濟而夕設版焉君之所知也夫晉何厭之有既東封鄭又欲肆其西封不闕秦焉取之闕秦以利晉惟君圖之秦伯説與鄭人盟使把子逢孫楊孫戍之乃還狐偃請擊之公曰不可微夫人之力不及此吾其還也亦去之初鄭伯有妾曰燕姞夢天使與己蘭既而文公與之蘭生子遂以名之時子蘭在晉公使石甲父侯宣多逆之以為世子而求成焉晉人許之介人侵蕭王使宰周公閲聘于魯使仲遂如京師遂初聘于晉經曰三十年春王正月夏狄侵齊左氏曰晉人伐鄭以觀其可攻與否狄間晉之有鄭虞也遂侵齊詩不云乎戎狄是膺荆舒是懲四夷交侵所當攘斥晉文公若移圖鄭之師以伐之則方伯連率之職修矣上書狄侵齊下書圖鄭此直書其事而義自見者也秋衛殺其大夫元咺元咺訟君為惡君歸則已出君出則已歸無人臣之禮信有罪矣則稱國以殺而不去其官何也春秋之法躬自厚而薄責於人君子之道譬諸射失諸正鵠反求諸己衛侯之躬無乃有闕盍亦省徳而内自訟乎夫稱國以殺者君與大臣專殺之也衛侯在外其稱國以殺何也穀梁子曰待其殺而後入也待其殺而後入是志乎殺咺瑕者也兵莫憯於志鏌鎁為下衛侯未入稱國以殺此春秋誅意之論也然則大臣何與焉從君以惡而不能止故并罪之也及公子瑕公子瑕未聞有罪殺之何也元咺立以為君故衛侯忌而殺之也然不與衛剽同者是瑕能拒咺辭其位而不立也不與陳佗同者是瑕能守節不為國人之所惡也故經以公子冠瑕而稱及見瑕無罪事起元咺以咺之故延及於瑕而衛侯忌刻專殺濫刑之惡著矣衛侯鄭歸于衛衛侯出奔于楚則不名見執于晉則不名今既歸國復有其土地矣何以反名之乎不名者責晉文之以小怨妨大徳名之者罪衛侯鄭之以忮害成本枝古者天下為公選賢與能不以為異况于戚屬豈有疑間猜忌之心哉末世隆怨薄恩趨利棄義有國家者恐公族之軋已至於網羅誅殺無以庇其本根而社稷傾覆如六朝者衆矣衛侯始歸而殺叔武再歸而及公子瑕是葛藟之不若而春秋之所惡也故再書其名為後世戒此義茍行則六朝之君或亦少省矣晉人秦人圍鄭書晉人秦人者貶之也於晉秦何貶乎行有不得者皆反求諸己而已矣晉文以私忿勤民動衆圍人之國秦伯惟利為向背從燭之武之言不以義舉也而二國結釁連兵暴骨原野自此始矣介人侵蕭冬天王使宰周公來聘公子遂如京師遂如晉大夫出疆有以二事出者有以一事出而專繼事者其書皆曰遂公子遂如周及晉以祭公自魯逆王后皆所謂以二事出者也公子結往媵而及齊宋盟則專繼事者也是非得失則存乎其事矣冢宰上兼三公其職仕為至重而來聘于魯天王之禮意莫厚焉魯侯既不朝京師而使公子遂往又以二事出夷周室于列國此大不恭之罪履霜堅氷之漸春秋之所誅而不以聽者也則何以無貶乎有不待貶絶而罪惡見者不貶絶以見罪惡二十三年晉告諸侯受曹地魯臧孫辰行宿于重館重館人曰晉新得諸侯必親其共不速行將無及也從之分曹地自洮以南東傅于濟魯仲遂如晉拜曹田也魯四卜郊不從乃免牲禮不卜常祀而卜其牲日牛卜日曰牲止祀泰山河海晉蒐于清原作五軍以禦狄公曰趙衰三讓其所讓皆社稷之衛也使將新上軍把夫人伯姬歸魯求婦焉狄圍衛遷于帝丘卜曰三百年衛侯夢康叔曰相奪予享公命祀相寗俞曰鬼神非其族類不歆其祀杞鄫何事相之不享於此久矣非衛之罪也不可以間成王周公之命祀請改祀命海有鳥曰爰居止於魯東門之外三日臧文仲使國人祭之展禽曰越哉聖王之制祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能扞大患則祀之及天之三辰民之瞻仰也及地之五行所以生殖也及九州名山川澤所以出財用也非此族也不在祀典海鳥之至避其災乎而祀之難以為仁且智矣經曰三十有一年春取濟西田公羊曰取之曹也晉侯執曹伯班其所侵地於諸侯不繋國者吾故田也復吾故田而謂之取何也春秋之法不以亂易亂公子遂如晉夏四月四卜郊記禮者曰祭帝于郊所以定天位也禮行於郊而百神受職焉魯諸侯何以有郊成王以周公有大勲勞於天下命魯公世世祀周公以天子之禮樂是故魯君孟春乗大輅載弧韣旂十有二旒日月之章祀帝于郊配以后㮨天子之禮也以人臣而用天子之禮可乎是成王過賜而魯公伯禽受之非也揚子曰天子之制諸侯庸節節莫差於僣僣莫重於祭祭莫重於地地莫重於天諸侯而祀天其僣極矣聖人於春秋欲削而不存則無以志其失為後世戒悉書之乎則歳事之常有不勝書者是故因禮之變而書于策或以卜或以時或以望或以牲或以牛於變之中又有變焉者悉書其事而謂言偃曰魯之郊禘非禮也周公其衰矣祀之郊也禹也宋之郊也契也是天子之事守也言杞宋夏商之後受命于周作賔王家統承先王脩其禮物其得行郊祀而配以其祖非列國諸侯之比也是故天子祭天地諸侯祭社稷祝嘏莫敢易其常嘏易則亂名犯分人道之大經拂矣故曰郊社之禮所以事上帝也宗廟之禮所以祀乎其先也明乎郊社之禮禘嘗之義治國其如指諸掌乎夫庶人不得祭五祀大夫之不得祭社稷諸侯之不得祭天地非欲故為等衰盖不易之定理也知其理之不可易則安於分守無欲僣之心矣為天下國家乎何有不從乃免牲古者大事决於卜故洪範稽疑獨以龜為主卜而不從則不郊矣故免牲猶三望望祭也有虞氏受終而望因於類巡守而望因於柴皆天子之事也今魯不郊而望故特書曰猶猶者可以己之詞其言三望何也天子有方望無所不通諸侯非名山大川在其封内者則不祭魯得用重禮視王室則殺故望止於三比諸侯則隆故河海雖不在其封而亦祭然非諸侯之所得為也秋七月冬把伯姬來求婦蕩伯姬来逆婦而書者以公自為之主失其班列書也把伯姬敵矣其来求婦曷為亦書見婦人之不可預國事也王后之詔命不施於天下夫人之教令不施於境中昏姻大事也把獨無君乎而夫人主之也故特書于策以為婦人亂政之戒母為子求婦猶曰不可何况于他乎此義行無吕武之禍矣乎秋圍衛十有二月衛遷于帝丘帝丘東郡濮陽顓頊之虚亦衛地也狄嘗廹逐黎侯寓于衛而衛不能修方伯連帥之職戎嘗伐凡伯于楚丘而衛不能救王臣之患其後遂為狄人所㓕東徒渡河矣齊桓公攘夷狄封之而衛國忘亡今又為狄所圍其遷於帝丘避狄難也而中國衰㣲夷狄強盛衛侯不能自强於政治晉文無郤四夷安諸夏之功莫不見矣皇王大紀卷四十三

body:
  text: 皇王大紀卷七十二宋胡宏撰三王紀顯王二年魯侯奮薨諡曰恭公子屯嗣五年秦獻公敗三晉于石門斬首十萬王賜以黼黻之服燕桓公衛聲公訓皆薨燕立文公衛立公子速七年秦獻公薨子孝公立生二十一年矣是時河山以東彊國六淮泗之間小國十餘楚魏與齊接境魏築長城自鄭濵洛以北有上郡楚自漢中南有巴黔中皆夷翟遇秦擯斥之不得與盟㑹孝公發憤修政欲以強秦八年下令曰昔我穆公自岐雍之間修德行武東平晉亂以河為界西霸戎翟廣地千里天子致伯諸侯畢賀為後世開業甚光美㑹往者厲躁簡公出子之不寧國家內憂未遑外事三晉攻奪我先君河西地醜莫大焉獻公即位鎮撫邊境徙治櫟陽且欲東伐復穆公故地而修其政令寡人思念先君之意常痛於心賔客羣臣有能出奇計強秦者吾且尊官與之分土於是衛公孫鞅聞是令下乃西入秦鞅好刑名學事魏相公叔痤痤賢之㑹病惠王問曰有如不可諱將奈社稷何曰痤之中庶子鞅年雖少有奇才願君舉國而聽之王默然公叔曰即不用必殺之無令出境王出謂左右曰公叔之言豈不悖哉叔召鞅謝曰吾先君而後臣故先為君謀後以告子子速行矣鞅曰君必不能用子言卒不去至是入秦見孝公說以富強之術公大說鞅欲變法秦人不順鞅曰民不可與慮始而可與樂成論至德者不和於俗成大功者不謀於衆甘寵曰不然緣法而治者吏習而民安之鞅曰常人安於故俗學者溺於所聞以此居官守法可也非所與論於法之外也智者作法愚者制焉公曰善拜鞅左庶長卒變法令民為什伍而相收司連坐告姦者與斬敵首同賞匿姦者與降敵同罰有軍功者各以率受上爵為私鬬者各以輕重被刑力本業耕織致粟帛多者復其身事末利及怠而貧者舉以為收孥宗室非有軍功論不得為屬籍明尊卑爵秩等級各以差次名田宅臣妾衣服有功者顯榮無功者雖富無所芬華令行期年民言不便者千數於是太子犯法鞅刑其傅公子䖍黜其師公孫賈明日秦人皆趣令行之十年道不拾遺山無盜賊民勇於公戰怯於私鬬鄉邑大治初言令不便者有來言便者鞅曰此亂民也盡遷之邊民莫敢議韓侯薨子昭侯立十一年魯侯屯薨諡曰康公子匽嗣十四年齊王魏王㑹田惠王曰齊有寶乎威王曰無有惠王曰寡人國雖小尚有徑寸之珠照車前後各十二乘者十枚豈以齊大而無寶乎威王曰寡人所寶者檀子守南城則楚人不敢為冦泗上十二諸侯皆來朝朌子守高唐則趙人不敢東漁於河黔夫守徐州則燕人祭北門趙人祭西門徙而從者七千餘家種首備盜賊則道不拾遺此四臣將照千里豈特十二乘哉十五年秦敗魏師取少梁十六年初孫臏龎㳙俱學兵法㳙為魏將自知能不及臏用法斷其足欲使廢棄齊使者至魏臏隂說之使者與之歸魏伐趙齊威王遣將軍田忌救趙孫子曰解紛者不控拳救鬬者不搏撠批亢搗虛形格勢禁而已今梁鋭卒竭於外老弱疲於內不若疾走魏都彼必自救是我一舉解趙圍而救弊於魏也忌從之魏師敗績十八年秦衛鞅圍魏固陽降之韓昭侯相申不害國治兵彊申子常請仕其從兄不許有怨色昭侯曰將聽子之謁而廢子之術乎其行子之術而廢子之請乎子嘗教寡人修功勞視次第今有所私求我將奚聽乎申子乃辟舍請罪昭侯有弊袴命藏之侍者曰君亦不仁者矣不賜左右而藏之昭侯曰明主愛一嚬一笑嚬有為嚬笑有為笑今袴豈特嚬笑哉吾必待有功者十九年秦衛鞅築冀闕宫庭於咸陽徙都之禁民父子兄弟同室內息者并諸小鄉為一縣縣置令丞凡三十一縣廢井田開阡陌得賣買論曰先王之所以溝封井田者畝數一定不可詭移一也邑里阻固雖有戎車不可超越二也道路有制雖有姦宄不可羣逞三也此三利者絶兼并之端止獄訟之原沮冦盜禁姦宄於未兆所以均平天下行政教美風俗保世永年之大法也自商鞅廢之及今千六百歲則棄日益深而禍亂不可禁矣可勝嘆哉二十一年秦衛鞅更為賦稅法二十二年宋公剔成為弟偃所攻敗奔齊偃自立二十六年王致伯于秦諸侯皆賀秦伯使公子少官帥師㑹諸侯于逢澤朝王二十八年魏龎㳙伐韓韓請救於齊宣王召大臣謀蚤救孰與晚救孫臏曰韓魏未弊而救之是吾代韓受魏兵也且魏有破國之志韓懼亡必訴於齊吾因深結韓親晚承魏弊可也王乃隂許韓韓恃救五戰不勝委國於齊齊使田忌將孫子為師直走魏都㳙歸禦之孫子曰晉人素悍勇號齊怯善戰者因其勢而利道之令軍人入魏地為十萬竈明日為五萬竈又明日為二萬竈㳙行三日大喜曰齊軍亡者過半矣乃并行逐之孫子度其暮當至馬陵伏隘待其過萬弩俱發㳙智窮自剄二十九年衛鞅言於孝公曰秦與魏譬若人有腹心之疾非魏并秦秦即并魏魏居嶺厄之西都安邑與秦界河而擅山東之利利則西侵秦病則東收地今大破於齊可因而伐之魏不能支必東涉然後秦據山河之固東鄉以制諸侯此王業也公使之將魏公子卬禦之鞅遺卬書願盟而罷卬信之鞅伏甲襲卬大破魏師魏王恐徙都大梁乃嘆曰吾恨不用公叔之言秦封鞅商於十五邑號商君楚王良夫薨諡曰宣王子商嗣三十一年秦孝公薨子惠文王立公子䖍之徒告商君欲反發吏捕之商君亡之魏魏內之秦秦人車裂以徇滅其家初商君用法嚴酷嘗臨渭論囚渭水盡赤問趙良曰我治秦孰與五羖大夫賢良曰千人之諾諾不如一士之諤諤僕請正言而無誅可乎五羖大夫荆之鄙人也穆公舉之牛口之下而加之百姓之上秦國莫敢望焉相秦六七年而東伐鄭三置晉君一救荆禍勞不坐乘暑不張蓋不從車乘不操干戈及其死也秦之男女流涕童子不歌謡舂者不相杵今君之見也主嬖人景監其從政也凌轢公族殘傷百姓公子䖍杜門八年矣又殺祝歡而黜公孫賈詩曰得人者興失人者崩此數者非所以得人也君之出也後車載甲多力而駢脅者為驂乘持矛而操闟㦸者旁車而趨此一物不具君固不出書曰恃德者昌恃力者亡此數者非恃德也君之危若朝露而尚貪商於寵秦政畜百姓之怨秦王一旦捐賔客而不立朝秦國所以收君者豈其微哉鞅弗從以至於難三十三年孟軻見魏惠王王曰叟不逺千里而來亦將有以利吾國乎孟子對曰王何必曰利亦有仁義而已矣王曰何以利吾國大夫曰何以利吾家士庶人曰何以利吾身上下交征利而國危矣萬乘之國弒其君者必千乘之家千乘之國弒其君者必百乘之家萬取千焉千取百焉不為不多矣茍為後義而先利不奪不饜未有仁而遺其親者也未有義而後其君者也王亦曰仁義而已矣何必曰利孟子見梁惠王王立於沼上顧鴻鴈麋鹿曰賢者亦樂此乎孟子對曰賢者而後樂此不賢者雖有此不樂也詩云經始靈臺經之營之庶民攻之不日成之經始勿亟庶民子來王在靈囿麀鹿攸伏麀鹿濯濯白鳥鶴鶴王在靈沼於牣魚躍文王以民力為臺為沼而民歡樂之謂其臺曰靈臺謂其沼曰靈沼樂其有麋鹿魚鱉古之人與民偕樂故能樂也湯誓曰時日曷喪豫及汝偕亡民欲與之偕亡雖有臺池鳥獸豈能獨樂哉王曰寡人之於國也盡心焉爾矣河內凶則移其民於河東移其粟於河內河東凶亦然察鄰國之政無如寡人之用心者鄰國之民不加少寡人之民不加多何也孟子對曰王好戰請以戰喻填然鼓之兵刃既接棄甲曳兵而走或百步而後止或五十步而後止以五十步笑百步則何如曰不可直不百步爾是亦走也曰王如知此則無望民之多於鄰國也不違農時榖不可勝食也數罟不入汙池魚鱉不可勝食也斧斤以時入山林材木不可勝用也榖與魚鱉不可勝食材木不可勝用是使民養生喪死無憾也養生喪死無憾王道之始也五畝之宅樹之以桑五十者可以衣帛矣雞豚狗彘之畜無失其時七十者可以食肉矣百畝之田勿奪其時數口之家可以無饑矣謹庠序之教申之以孝悌之義頒白者不負戴於道路矣七十者衣帛食肉黎民不饑不寒然而不王者未之有也王曰晉國天下莫強焉叟之所知也及寡人之身東敗於齊長子死焉西喪地於秦七百里南辱於楚寡人恥之願比死者一灑之如之何則可孟子對曰地方百里而可以王王如施仁政於民省刑罰薄稅斂深耕易耨壯者以暇日修其孝悌忠信入以事其父兄出以事其長上可使制梃以撻秦楚之堅甲利兵矣彼奪其民時使不得耕耨以養其父母父母凍餓兄弟妻子離散彼陷溺其民王往而征之夫誰與王敵故曰仁者無敵王請勿疑三十四年秦伐韓拔宜陽三十五年齊魏㑹于徐州以相王韓昭侯作高門屈宜臼曰君必不出此門何也不時夫人固有利不利時前年秦拔宜陽今年旱君不恤民之急而顧益奢所謂時詘舉贏者也越王無疆伐齊齊說以伐楚之利越遂伐楚楚人大敗之盡取吳故地東至浙江越由此散諸公族爭立海上朝服於楚三十六年韓高門成昭侯薨子宣惠王立洛陽人蘇秦說秦王以兼天下之術不用乃去說燕文公曰燕所以不被兵者趙蔽其南也且秦之攻燕戰於千里之外趙之攻燕戰於百里之內王與趙從親則無患矣文公從之資秦車馬說趙肅侯曰秦不敢伐趙者畏韓魏議其後也秦無韓魏之規則禍中於趙矣臣案天下之圖諸侯之地五倍於秦卒十倍於秦而衡人皆請割地豫秦秦成則其身富榮國被秦患而不與其憂故日夜務稱秦權恐愒諸侯竊為主計莫若合六國為從親以擯秦秦甲必不敢出函谷害山東矣肅侯大悅厚賜賚之使說韓王曰王事秦秦必求宜陽成臯今茲效之明年又求地有盡求無己此市怨結禍也鄙諺曰寧為雞口無為牛後夫以韓之強而有牛後之名竊為王羞之韓王從其言往說魏王曰大王地方千里武士蒼頭奮擊各二十萬車六百乘騎五千匹乃欲臣事秦願熟察之魏王聽之乃說齊王曰韓魏重畏秦者為接境壤也戰而勝秦則兵半折四境不守不勝則危亡隨其後所以重與秦戰而輕為之臣也今秦攻齊過衛陽晉之道經乎亢父之險車不得方軌騎不得比行深入則狼顧韓魏是故恫疑虛喝驕矜而不敢進奈何事之願王少留意齊王許之遂說楚王曰楚天下彊國也帶甲百萬粟支十年秦之所害莫如楚從親則諸侯割地事楚衡合則楚割地事秦兩事相去逺矣王何居焉楚王許之於是秦為從約長并相六國時有莊周者䝉人也嘗為漆園吏該貫辨博著書自見謂惠子曰孔子行年六十而六十化始時所是卒而非之未知今之所謂是之非五十九非也惠子曰孔子勤志服知也莊子曰孔子謝之矣而其未之嘗言孔子云夫受才乎大本復靈以生鳴而當律言而當法利義陳乎前而好惡是非直服人之口而已矣使人乃以心服而不敢蘁五各立定天下之定已乎已乎吾且不得及彼乎又曰建之以常無有主之以太一其動若水其靜若鏡其應若響未嘗先人而嘗隨人人皆取先已獨取後人皆取實已獨取虛常寬容於物不削於人可謂至極關尹老聃乎古之博大真人哉莊周聞其風而說之以天下為沈濁不可與莊端正也語以巵言為蔓衍以重言為真以寓言為廣獨與天地精神往來以不傲睨於萬物其書雖瑰瑋而連犿方圓宛轉與物相從之貌無傷也其詞雖參差而諔詭可觀彼其充實不可以已其逍遙遊略曰窮髮之北有𡨕海者有魚焉其廣數千里未有知其修者其名為鯤化而為鳥其名為鵬及朋皆古文鳳字背若泰山翼若垂天之雲摶扶搖風自下而上曰扶搖亦曰颷羊角而上者九萬里絶雲氣負青天然後圖南且適南𡨕也南𡨕者天池也齊諧者志怪者也諧之言曰鵬之徙於南𡨕去以六月息者也野馬也塵埃也遊氣馳聚如野馬蓊鬱如塵埃生物之以息相吹也天之蒼蒼其正色邪其逺而無所至極邪其視下也亦若是則已矣風之積也不厚則其負大翼也無力故九萬里則風斯在下矣而後乃今培裴風背負青天而莫之夭於表閼於葛者蜩與鷽鷽學鳩鵰鶻也鳩笑之曰我決起而飛搶七良突也榆枋時則不至而控於地而已矣奚以之九萬里而南為斥鴳笑之曰彼且奚適也我騰躍而上不過數仞而下翺翔蓬蒿之間此亦飛之至也而彼且奚適也此小大之辨也故夫知效一官行比一鄉德合一君而徵一國者其自視也亦若此矣而宋榮子猶然笑之且舉世譽之而不加勸舉世非之而不加沮定乎內外之分辨乎榮辱之境斯已矣彼其於世未數數然也雖然猶有未樹也列子御風而行泠然善也旬有五日而後反彼於致福者未數數然也此雖免乎行猶有所待者也若夫乘天地之正而御六氣之辨以遊無窮者彼且惡乎待哉故曰至人無已神人無功聖人無名肩吾問於連叔曰吾聞言於接輿接輿楚人姓陸名通大而無當往而不反吾驚怖其言猶河漢而無極也大有徑庭敇定徑庭激過也不近人情焉連叔曰其言謂何哉曰藐眇􅔨二音姑射之山有神人居焉肌膚若氷雪淖昌略淖約柔弱貌約若處子不食五榖吸風飲露乘雲氣御飛龍而遊乎四海之外其神凝使物不疵癘而年榖熟吾以是狂而不信也連叔曰然瞽者無以與乎文章之觀聾者無以與乎鐘鼓之聲豈唯形骸有聾盲哉夫知亦有之是其言也猶時女也之人也之德也將旁礴蒲薄萬物以為一世蘄祁乎亂孰弊弊焉以天下為事之人也物莫之傷大浸稽天而不溺大旱金石流土山焦而不熱是其塵垢粃卑以糠將猶陶鑄堯舜者也孰肻以物為事惠子謂莊子曰魏王貽我大瓠之種我樹之成而實五石以盛水漿其堅不能自舉也剖之以為瓢則瓠戶郭切瓠落猶云廓落也落無所容非不呺許驕然大也吾為其無用而掊之莊子曰夫子固拙於用大矣何不慮以為大樽樽如酒器縛之腰可以入水所謂腰舟者也而浮乎江湖而憂其瓠落無所容則夫子猶有蓬之心也夫惠子謂莊子曰吾有大樹人謂之樗其大本擁腫而不中繩墨其小枝卷曲而不中規矩立之塗匠者不顧今子之言大而無用衆所同去也莊子曰何不樹之於無何有之鄉廣莫大也之野倣徨乎無為其側逍遙乎寢卧其下不夭斤斧物無害者無所可用安所困苦哉齊物論曰南郭子綦隱几而卧仰天而噓嗒吐答焉似喪其耦顏成子游曰形固可使如槁木而心固可使如死灰乎子綦曰偃不亦善乎而問之也今者吾喪我汝知之乎汝聞人籟而未聞地籟汝聞地籟而未聞天籟夫子游曰地籟則衆竅是已人籟則比竹是已敢問天籟子綦曰夫吹萬不同而使其自己也咸其自取怒者其誰邪大知間間小知間間大言炎炎小言詹詹其寐也魂交其覺也形開與接為構日以心鬬縵寬心也者窖古孝深心也者密者小恐惴惴大恐縵縵齊死生貌其發若機栝其留如詛盟其殺色界如秋冬喜怒哀樂慮嘆變慹之涉反動貌姚佚啓態樂出虛蒸成菌古詠日夜相代乎前而莫知其所萌若有真宰而特不得其朕除忍兆也與物相刃相靡其行盡如馳而莫之能止終身役役而不見其成功薾然疲役而不知其所歸人之生也固若是芒乎其我獨芒而人亦有不芒者乎夫隨其成心而師之誰獨且無師乎未成乎心而有是非是以無有為有雖有神禹且不能知夫言非吹也言者有言其所言者特未定也道惡乎隱而有真僞言惡乎隱而有是非道隱於小成言隱於榮華自彼則不見自知則知之是以聖人不由而照之于天彼是莫得其偶謂之道樞樞始得其環中以應無窮故為是舉莛廷與楹厲與西施恢恑譎決怪道通為一唯達者知通為一勞神明為一而不知其同也謂之朝三何謂朝三曰狙公賦芧序橡子也曰朝三而暮四衆狙皆怒曰然則朝四而暮三衆狙皆悅名實未虧而喜怒為用亦因是也是以聖人和之以是非而休乎天鈞陶鈞也古之人其知有所至矣惡乎至有以為未始有物者至矣盡矣不可以加矣其次以為有物矣而未始有封也其次以為有封焉而未始有是非也是非之彰也道之所以虧也道之所以虧愛之所以成果且有成與虧乎哉果且無成與虧乎哉天下莫大於秋毫之末而太山為小莫壽乎殤子而彭祖為夭天地與我竝生而萬物與我為一既已為一矣且得有言乎既已謂之一矣且得無言乎一與言為二二與一為三自此以往巧厯不能得而况其凡乎六合之外聖人存而不論六合之內聖人論而不議春秋經世先王之志聖人議而不辨故曰大辨不言孰知不言之辨若有能知此之謂天府齧缺問乎王倪曰子知物之所同是乎曰吾惡乎知之子知子之所不知邪曰吾惡乎知之然則物無知邪曰吾惡乎知之雖然嘗試言之庸詎知吾所謂知之非不知邪庸詎知吾所謂不知之非知邪齧缺曰子不知利害則至人固不知利害乎王倪曰至人神矣大澤焚而不能熱河漢沍而不能寒疾雷破山風振海而不能驚若然者乘雲氣騎日月而遊乎四海之外死生無變於己而況利害之端乎夢飲酒者旦而哭泣夢哭泣者旦而田獵方其夢也不知其夢也夢之中又占其夢焉覺而後知其夢也且有大覺而後知此其大夢也昔者莊周夢為蝴蝶栩栩喜貌然蝴蝶也自喻適志與不知周也俄然覺則蘧蘧然周也不知周之夢為蝴蝶與蝴蝶之夢為周與周與蝴蝶則必有分矣此之謂物化養生主曰吾生也有涯而知也無涯以有涯隨無涯殆己巳而為知者殆而已矣為善無近名為惡無近刑緣督以為經可以保身可以全生可以養親可以盡年庖丁為文惠君解牛手之所觸肩之所倚足之所履膝之所踦􅒂畫月骨相離之貌然嚮然奏刀乎獲然莫不中音合於桑林之舞乃中經首之㑹經首之㑹司馬彪咸池樂章文惠君曰嘻善哉技蓋至此乎庖丁釋刀對曰臣之所好者道也進乎技矣始臣之解牛之時所見無非牛者三年之後未嘗見全牛也方今之時臣以神遇而不以目視官知止而神欲行依乎天理批大郤導大窾因其固然技經肻其忍骨肉間綮啓結處也之未嘗而況大軱孤骨也乎良庖嵗更刀割也族庖月更刀折也今臣之刀十九年矣所解數千牛矣而刀刃若新發於硎彼節者有間而刀刃者無厚以無厚入有間恢恢乎其於遊刃必有餘地矣是以十九年而刀刃若新發於硎雖然每至於族吾見其難為怵然為戒視為止行為遲動刀甚微謋許百然已解如土委地提刀而立為之四顧為之躊躇滿志善刀而藏之文惠君曰善哉吾聞庖丁之言得養生焉老聃死秦佚弔之三號而出弟子曰若此可乎曰然適來夫子時也適去夫子順也安時而處順哀樂不能入也人間世曰顔回將之衛孔子曰回道不欲雜古之至人先存諸已而後存諸人所存於已者未定何暇至於暴人之所行德厚信矼工若反矼確實貌未達人氣名聞不爭未達人心而彊以仁義繩墨之言術暴人之前者是以人惡有其美也命之曰菑人菑人者人必反菑之顔回曰我內直與天為徒外曲與人為徒成而上比與古為徒可乎仲尼曰未可以及化顏回曰敢問其方仲尼曰若一志無聽之以耳而聽之以心無聽之以心而聽之以氣聽止於耳心止於符氣也者虛而待物者也唯道集虛虛者心齊也皇王大紀卷七十二

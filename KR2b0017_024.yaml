body:
  text: 皇王大紀卷二十四宋胡宏撰三王紀康王車旗曰車王之五路一曰玉路鍚樊纓十有再就建太常十有二斿以祀金路鉤樊纓九就建大旂以賔同姓以封象路朱樊纓七就建大赤以朝異姓以封革路龍勒條纓五就建大白以即戎以封四衛木路前樊鵠工毒纓建大麾以田以封蕃國王后之五路重翟鍚靣朱總厭翟勒靣繢丘謂總安車雕靣鷖於雞總皆有容盖翟車貝靣組總有握輦車組輓無阮有翣色甲羽盖王之喪車五乘木車蒲蔽犬䄙尾櫜疏飾小服皆疏素車棼蔽犬䄙素飾小服皆素薻子道車薻蔽鹿淺䄙革飾駹莫江車萑蔽然䄙髹飾漆車蕃蔽豻䄙雀飾服車五乗孤乗夏篆卿乗夏縵莫旦大夫乗墨車士乗棧車庶人乗役車凡良車散車不在等者其用無常旗日月為常交龍為旂通帛為旜之延雜帛為物熊虎為旗鳥隼為旟弋於龜虵為旐全羽為旞以醉析羽為旌王建太常諸侯建旂孤卿建旜大夫士建物師都建旗各象其事州里各象其名家各象其號節建天下之六卿山國用虎節土國用人節澤國用龍節皆以金為之道路用旌節門關用符節都鄙用管節皆以竹為之舎王之會同之舍設梐蒲禮枑胡故再重設車宮轅門為壇壝宫棘門為帷宫設旌門無宫則共人門次王大旅上帝則張氊案設皇邸朝日祀五帝則張大次小次設重帟重案合諸侯亦如之師田則張幕設重帟重案諸侯朝覲會同則張大次小次師田則張幕設案孤卿有邦事則張幕設案凡祭祀張其旅幕張尸次射則張耦次几筵王大朝覲大饗射凡封國命諸侯王位設黼依依前南鄉設莞筵紛純之允加繅席畫純加次席黼純左右玉几祀先王昨席亦如之諸侯祭祀席蒲筵繢純加莞席紛純右雕凡昨席莞筵紛純加繅席畫純筵國賔于牖前亦如之左彤几甸役則設熊席右漆几凡喪事設葦席右素几其柏席用萑黼純諸侯則紛純每敦一几凡吉事變几㓙事仍几朝聘饗射燕飲曰九儀辨諸侯之命等諸臣之爵以同邦國之禮而待其賔客上公九命執桓圭九寸繅藉九寸冕九章建常九斿樊纓九就貳車九乗介九人禮九牢其朝位賔主之間九十歩立當車軹擯者五人廟中將幣三享王禮再祼而酢饗禮九獻食禮九舉出入五積三問三勞侯伯七命侯執信圭伯執躬圭立當前疾擯者四人廟中將幣三享王禮一祼而酢出入四積再問再勞其他皆以七為節子男五命子執穀璧男執蒲璧立當車衡擯者三人廟中將幣三享王禮一祼不酢出入三積一問一勞其他皆以五為節王之三公八命其卿六命其大夫四命及其出封皆加一等凡諸侯之適子誓於天子攝其君則下其君之禮一等未誓則以皮帛繼子男凡大國之孤四命執皮帛以繼小國之君出入三積不問一勞朝位當車前不交擯廟中無相以酒禮之其他皆眂小國之君凡諸侯之卿各下其君二等以下及其大夫士皆如之其宫室車旗衣服禮儀各眂其命之數王將合諸侯則令為壇三成宫旁一門詔王儀南鄉見諸侯土揖庶姓時揖異姓天揖同姓及其擯之各以其禮公於上等侯伯於中等子男於下等其將幣亦如之其禮亦如之王燕則諸侯毛凡諸公相為賔王國五積三問皆三辭拜皆旅擯再勞三辭三揖登拜受拜送主君郊勞交擯三辭車逆拜辱三揖三辭拜受車送三還再拜致館亦如之致飱如致積之禮及將幣交擯三辭車逆拜辱賔車進答拜三揖三讓毎門止一相及廟唯上相入賔三揖三讓登再拜授幣賔拜送幣每事如初賔亦如之及出車送三請三進再拜賔三還三辭告辟致饔音雍餼還圭饗食致贈郊送皆如將幣之儀賔之拜禮拜饔餼拜饗食賔繼主君皆如主國之禮諸侯諸伯諸子諸男之相為賔也各以其禮相待也如諸公之儀諸公之臣相為國客則三積皆三辭再受及大夫郊勞旅擯三辭拜辱三讓登聽命下拜登受賔使者如初之儀及退拜送致館如初之儀及將幣旅擯三辭拜送客辟三揖每門止一相及廟唯君相入三讓客登拜客三辟授幣下出每事如初之儀及禮私靣私獻皆再拜稽首君答拜出及中門之外問君客再拜對君拜客辟而對君問大夫客對君勞客客再拜稽首君答拜客趨辟致饔餼如勞之禮饗食還圭如將幣之儀君館客客辟介受命遂送客從拜辱于朝明日客拜禮賜遂行如入之積凡侯伯子男之臣以其國之爵相為客而相禮其儀亦如之凡四方之賔客禮儀辭命餼勞賜獻以二等從其爵而上下之凡賔客送逆同禮凡諸侯之交各稱其邦而為之幣以其幣為之禮凡行人之儀不朝不夕不正其主靣亦不背客王合諸侯而饗禮則具十有二牢庶具百物備諸侯而饗禮長十有再獻王廵守殷國則國君膳以牲犢令百官百牲皆具從者三公眂上公之禮卿眂侯伯之禮大夫眂子男之禮士眂諸侯之卿禮庶子壹眂其大夫之禮凡諸侯之禮上公五積皆眡飱牽三問皆脩羣介行人宰史皆有牢飱五牢食四十簠十豆四十鉶四十有二壺四十鼎簋十有二牲三十有六皆陳饔餼九牢其死牢如飱之陳牽四牢米百有二十筥醯醢百有二十罋車皆陳車米眡生牢牢十車車秉有五籔車未眡死牢牢十車車三秅丁故反芻薪倍禾皆陳乗禽日九十雙殷膳大牢以及歸三饗三食三燕若弗酌則以幣致之凡介行人宰史皆有飱饔餼以其爵等為之牢禮之陳數唯上介有禽獻夫人致禮八壺八豆八籩膳大牢致饗大牢食大牢卿皆見以羔膳大牢侯伯子男放是而殺者也凡諸侯之卿大夫士為國客則如其介之禮國新殺禮㐫荒殺禮札喪殺禮禍烖殺禮在野在外殺禮凡賔客死致禮以喪用賔客若有喪唯芻稍之受遭主國之喪則不受饗食受牲禮諸侯適天子必告於祖奠于禰冕而出視朝命祝告于社稷宗廟山川乃命國家五官而後行道而出告者五日而徧過是非禮也凡告用牲幣反亦如之諸侯相見必告于禰朝服而出視朝命祝史告于五廟所過山川亦命國家五官道而出反必親告于祖禰乃命祝史告至于前所告者而後聽朝而入曾子問曰諸侯旅見天子入門不得終禮廢者幾孔子曰四太廟火日食后之喪雨霑服失容則廢日食從天子救日各以其方色與其兵太廟火則從天子救火不以方色與兵曽子問曰諸侯相見揖讓入門不得終禮廢者幾孔子曰六天子崩太廟火日食后夫人之喪雨霑服失容則廢諸侯之聘禮天子無介上公七介侯伯五介子男三介所以明貴賤也君命使者夕幣于廟厥明使者釋幣于禰于行入朝受圭及享束帛加璧受夫人之聘璋享𤣥纁束帛加琮遂行君使士迊而請事于竟下大夫迎于郊卿勞夫人使下大夫勞卿致館宰夫設餐七安厥明賔皮弁入于次君皮弁拜迎于大門之外卿為上擯大夫為承擯士為紹擯以傳命君子於其所尊弗敢致敬之至也三讓而傳命三讓而後入廟門三揖而後至階三讓而後升所以致尊讓也賔襲執圭致命裼奉束帛加璧享夫人如公醴賔賔北面以臣禮見公北面拜貺拜君命之辱以客禮受之所以致敬也公送賔于大門内問君及大夫勞賔及介賔請有事於卿大夫卿勞賔賔辭大夫奠鴈上介受公使卿大夫致饔餼賔朝服問卿卿受于祖廟夫人使下大夫歸禮公于賔一食再饗燕與羞俶獻無常數大夫於賔一饗一食君使卿皮弁還玉大夫還璋此輕財重禮之義也公館賔賔辭請命于朝遂行公使卿贈士送于竟聘享夫人之聘享問大夫送賔公皆再拜使者反禳而入致命歸釋幣于門獻于禰凡四器者唯其所寳以聘重禮也貨多則傷徳幣美則没禮若兄弟之國則問大夫凡辭無常孫而說辭多則史少則不達若使者聘而誤則主君弗親饗食以愧厲之子云君子敬則用祭器故君子不以菲廢禮不以美没禮故食禮主人親饋則客祭主人不親饋則客不祭故君子茍無禮則羙不食焉諸侯相見灌用鬰鬯無籩豆之薦大夫聘禮以酺醢天子一食諸侯再大夫士三食力無數圭璋特琥璜爵諸侯視朝大夫特士旅之五獻之尊門外缶門内壺君尊瓦甒無甫天子諸侯之尊廢禁大夫士棜禁君子曰無節於内者觀物弗之察矣欲察物而不由禮弗之得矣故作事不以禮弗之敬矣出言不以禮弗之信矣故曰禮也者物之致也先王之制禮也因其財物而致其義焉爾是故先王尚有徳尊有道任有能繼世以立諸侯象賢也以官爵人徳之殺也死而諡今也古者生無爵死無諡禮之所尊尊其義也失其義陳其數祝史之事也故其數可陳也其義難知也知其義而敬守之天子之所以治天下也射天子之制諸侯歳獻貢士於天子天子試之於射宫三公北靣孤東靣卿大夫西靣諸侯北靣射人詔相其法天子將祭必先習射於澤而後射於射宫其容體比於禮其節比於樂而中多者得與於祭反是者不得與於祭數與於祭而君有慶數不與於祭而君有讓數冇慶而益地數有讓而削地射之為言繹也或曰舍也繹者各繹己之志也故心平體正持弓矢審固則射中矣射者仁之道也求正諸己巳正而後發發而不中不怨勝己者反求諸己而已矣故為人父者以為父鵠為人子者以為子鵠為人君者以為君鵠為人臣者以為臣鵠故射者各射已之鵠王以六耦射三侯三獲三容樂以騶虞九節五正諸侯以四耦射二侯二獲二容樂以貍首七節三正孤卿大夫以三耦射一侯一獲一容樂以采蘋五節二正士以三耦射豻侯一獲一容樂以采蘩五節二正騶虞者樂官備也貍方之首者樂㑹時也采蘋者樂循辭均法也采蘩者樂不失職也孔子曰射者何以射何以聽循聲而發發而不失正鵠者其唯賢者乎是故明乎其節之志以不失其事則功成而徳行立此天子所以養諸侯兵不用而諸侯自為正之具也是故古者天子以射選諸侯卿大夫射者男子之事也因而飾之以禮樂也内志正外體直持弓矢審固然後可以言中此可以觀徳行矣君使士射不能則辭以疾言曰某有負薪之憂燕古者諸侯之射也必先行燕禮卿大夫士之射也必先行鄉飲酒之禮燕禮者所以明君臣之義也是故將燕小臣戒與者尊兩方壺于東楹之西左𤣥酒南上公尊瓦大南上尊士兩圜壺于門西設洗于阼階東南罍力回東篚西膳篚在其北君席于阼階于上居主位也君獨升立席上西靣特立莫敢適之義也射人請賔君命某賔入中庭君降一等而揖之禮之也小卿次上卿大夫次小卿士庶子以次就位於下設賔主飲酒之禮也使宰夫為獻主臣莫敢與君亢禮也不以公卿為賔而以大夫為賔為疑也明嫌之義也主人洗盥獻賔賔酬主人主人北靣獻於公主人酢公酢賔公命下大夫二人媵爵酌觶之鼔公興以酬賔賔以旅酬卿大夫主人獻卿二大夫媵爵如初若賔若長唯公所酬以旅如初主人獻大夫工入升歌三終笙入三終間歌三終合樂三終大師告樂備公許射人為司正命安卿大夫遂徹俎降説吐活屨升坐羞庶羞主人獻士及祝史小臣賔媵以證觚音沽于公公興唯所欲酬受者就席坐行之卒受者以爵酬士士旅酌主人獻庶子遂獻左右正與内小臣無筭樂賔出奏陔公不送君舉旅於賔及君所賜爵皆降再拜稽首升成拜明臣禮也君答拜之禮無不答明君上之禮也獻君君舉旅行酬而後獻卿卿舉旅行酬而後獻大夫大夫舉旅行酬而後獻士士舉旅行酬而後獻庶子俎豆牲體薦羞皆有等差所以明貴賤也鄉飲酒鄉飲酒之禮者所以明長㓜之序也是故請賔及介必謀於先生主人席於東南僎席於東北賔於西北介席於西南衆賔之席不屬焉立賔以象天立主以象地設介僎以象日月設三賔以象三光主之以天地經之以日月參之以三光政教之本也六十者坐五十者立侍而聽政役六十者三豆七十者四豆八十者五豆九十者六豆牲用狗尊兩壺於房戸間斯禁有𤣥酒設洗于東榮水東篚西篚所以奠爵及觶也獻用爵其他以觶羮定主人拜迎賔于庠門之外三揖而后至階三讓而后升主人肅賔及介而衆賔自從之至于門外主人拜賔及介而衆賔自入貴賤之義别矣主人洗盥酌獻有司薦脯醢音海賔升席乃設折俎賔祭酺醢奠爵取肺以祭嚌加于俎祭酒興席末啐酒降席奠爵告㫖卒爵賔酢主人主人酬賔主人獻介不嚌不啐不告主人酢介主人獻衆賔主人升賔即席如初自拜至拜洗拜受拜送拜既獻酬辭讓之節繁及介省矣至於衆賔升受坐祭立飲不酢而降隆殺之義辨矣工四人二瑟入升席于堂簾歌三終鹿鳴四牡皇皇者華主人獻之笙入立堂下三終南陔白華華黍主人獻之間歌三終魚麗由庚南有嘉魚崇丘南山有臺由儀合樂三終關雎葛覃卷耳鵲巢采蘩采蘋工告樂備遂出一人揚觶主人作相為司正焉知其能和樂而不流也司正請安賔復席司正飲卒觶賔酬主人于阼階上主人酬介于西階上介酬衆賔畢司正復位使二人酬賔介主人命請坐賔辭以俎司正徹俎降說屨升坐乃羞無算爵無算樂賔出奏陔主人拜還送于門外自賔酬主人主人酬介介酬衆賔少長以齒終於沃洗者焉知其能弟長而無遺矣自降說屨升坐羞爵無數飲酒之節朝不廢朝莫不廢夕賔出主人拜送節文終遂焉知其能安燕而不亂也五者足以正身安國矣彼國安而天下安故孔子曰吾觀於鄉而知王道之易易也明日賔拜賜主人拜辱乃息司正無介不殺羞唯所有徵唯所欲以告于先生君子可也聘射之禮至大禮也質明而始行事日幾中而後禮成酒清人渴而不敢飲也肉乾人饑而不敢食也日暮人倦齊莊正齊而不敢懈惰非强有力者不能行也故勇敢强有力者將以行禮義也天下有事則用之於戰勝矣不用之於禮義戰勝而用之於爭鬬則謂之亂人刑罰行於國所誅者亂人也如此則民順治而國安也養老者人生十年曰㓜學二十曰弱冠三十曰壯有室四十曰强而仕五十曰艾服官政六十曰耆指使七十曰老而傳八十九十曰耄七年曰悼悼與耄雖有罪不加刑焉百年曰期頥以友大夫七十而致事若不得謝則必賜之几杖行役以婦人適四方乗安車自稱曰老夫於其國則稱名越國而問焉必告之以其制一命齒於鄉里再命齒於族三命不齒族有七十者不敢先七十者不有大故不入朝若有大故而入君必與之揖讓而後及爵者人生五十始衰六十非肉不飽七十非帛不煖八十非人不煖九十雖得人不煖矣是故五十而爵不從力政異粻杖於家養於鄉六十必宿肉杖於鄉養於國不親學不與服戎七十貳膳杖於國養於學達於諸侯不候朝君問則席不與賔客之事八十常珍杖於朝君問則就之拜君命一坐再至月告存齊喪之事弗及也一子不從政九十日有秩飲食不離寢天子欲有問焉則就其室以珍從天子有命則使人受其家不從政廢疾非人不養者一人不從政凡居鄉以齒而老窮不遺朝廷同爵則尚齒凡父母在子雖老不坐父之齒隨行兄弟之齒鴈行朋友不相踰輕任并重任分班白者不提挈不以其任行乎道路見老者則車徒辟君子耆老不徒行庶人耆老不徒食有虞氏皇而祭服深衣以燕禮養國老於上庠養庶老於下庠夏后氏収而祭服燕衣以饗禮養國老於東庠養庶老於西序殷人冔而祭服縞衣以食禮養國老於右學養庶老於左學周人冕而祭服𤣥衣兼用三代之禮養國老於東膠養庶老於虞庠凡養老天子視學大昕鼓徵衆至然後天子至乃命有司行事興秩節祭先師先聖焉有司卒事反命始之養也適東序釋奠於先老遂設三老五更羣老之席位焉適饌省醴養老之珍具遂發咏焉退脩之以孝養也反登歌清廟既歌而語以成之也言父子君臣長㓜之道合徳音之致禮之大者也下管象舞大武大合衆以事達有神興有徳也正君臣之位貴賤之等焉而上下之義行矣有司告以樂闋王乃命公侯伯子男及羣吏曰反養老於東序終之以仁也是故聖人之記事也慮之以大愛之以敬行之以禮脩之以孝養紀之以義終之以仁是故古之人一舉事而衆皆知其徳之備也古之君子舉大事必慎其終始而衆安得不喻焉說命曰念終始典於學有虞氏貴徳而尚齒夏后氏貴爵而尚齒殷人貴富而尚齒周人貴親而尚齒五帝憲三王有乞言五帝憲養氣體而不乞言有善則記之為惇史三王亦憲既養老而後乞言亦㣲其禮有惇史凡三王養老皆引年天子廵狩諸侯待於境天子先見百年者八十九十者東行西行者弗敢過西行東行者弗敢過欲言政者君就之可也虞夏殷周天下之盛王也未有遺年者年之貴乎天下乆矣次乎事親也皇王大紀巻二十四

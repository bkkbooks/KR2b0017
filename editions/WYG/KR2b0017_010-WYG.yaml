body:
  text: 皇王大紀卷十宋胡宏撰三王紀紂元祀紂見聞甚敏材力過人强足以拒諫文足以飾非矜人臣以能髙天下以聲以海内賢才皆出已下性汰侈好酒色始為象箸箕子歎曰今為象箸後必為玉杯玉杯象箸必將食熊蹯豹胎他又將稱是王求足欲天下殆哉遷都朝歌八祀甲寅王伐有蘇氏有蘇氏獻女妲己甚嬖之廣沙丘之苑多為臺榭有璜臺瑶宫瓊室玉門建大宫連屬百里中設九市為百有二十日長夜之飲設肉林酒池糟丘使師㳙作北里之舞靡靡之樂以悦婦女百姓嗟怨諸侯背叛妲己曰此罰輕誅薄威不立耳乃作炮烙之刑有罪者求死不得九侯鄂侯周侯入為三公九侯有女美而賢納之紂紂怒其不淫殺之十四祀紂醢九侯鄂侯強諌并脯鄂侯周侯竊歎崇侯虎以告囚之羑里古者包犧氏之作易也十有八變而成卦八卦而小成七八之卦在其中矣周侯被拘乃繫六十四卦之詞乾下乾上乾元亨利貞健而無息之謂乾乾者天之性情也元者萬物之始亨長也利遂貞成也坤下坤上坤元亨利牝馬之貞坤乾之對也四徳同而貞體異牝馬柔順而健行者也君子有攸往柔順而利貞君子之所行也先迷後得先唱則迷失隂道後利則得其常矣主利利萬物也西南得朋東北䘮朋安貞吉西南隂方其朋也必東北之陽方離䘮其朋則能成化育之功而有安貞之吉也震下坎上屯震始交於下坎始交於中隂陽始交雲雷相應而未成澤故為屯元亨屯有大亨之通也利貞利在正固勿用有攸往未可有所往也利建侯廣資輔助坎下艮上蒙亨水必行之物始出未有之故為蒙蒙有亨發之理也匪我求童蒙童蒙求我童蒙六五也為蒙之主我謂九二也六五柔順方在童蒙頼九三發其蒙也初筮告再三瀆瀆則不告筮占決也謂至誠一意而求己則告之再則瀆慢矣故不告也利貞發蒙之道利以貞正乾下坎上需乾健必上進而處坎險阻之下故為須待之意也有孚九五居中有信誠充實於中也光亨貞吉有孚則光明而通得正而吉也利渉大川以此而須何需不濟坎下乾上訟天水相違又上剛下險所以為訟有孚二訟之主以九居中有孚實也窒塞也惕畏也中吉得中則吉終凶終凶其事則凶也利見大人中正大人九五也不利渉大川訟宜處身平安之地坎下坤上師師衆也一陽在下為衆隂主將師統衆之象險道而以順行師之義也貞丈人吉无咎行師以正固為本帥之者必丈人才謀徳業為衆所嚴畏則吉而无咎矣坤下坎上比水在地上切比無間又一陽居尊位上親下下附上故為比吉人相親比吉道也原推原也筮占決卜度非以蓍龜元永貞无咎上下相比必有君長常乆正道則无咎矣不寕方來後夫凶不寜之事方來求比固宜汲汲不速而後則雖夫亦凶矣夫剛立之稱乾下巽上小畜畜止剛健莫如巽順一隂畜五陽小畜大也亨二五剛中故能亨宻雲不雨自我西郊西南隂方以四為唱故不和而不能成雨兌下乾上履虎尾不咥人亨天在上而澤處下六三以卑順説應履籍於乾上下各得其義事之至順理之至當人之履行如此雖履虎尾至危之地亦不見咥嚙而無所害所以亨也乾下坤上泰隂陽相交而和故為泰也小往大來小謂隂大謂陽隂生於外陽生於内吉亨隂陽和暢萬物生遂其道吉亨坤下乾上否天地隔絶不相交通故為否之匪人天地不交則不生萬物無人道矣匪人者非人道也不利君子貞大往小來上下交通剛柔和㑹君子之正道也陽往而隂來君子正道否塞不行矣離下乾上同人九五六二中正相應天在上而火性炎上同也又一隂衆所欲同為同人于野亨利渉大川同人於曠逺之地不係所私得至公大同之道其亨可知而何險阻艱難之不可濟利君子貞君子之正即天下至公大同之道也乾下離上大有火在天上照萬物又六五居尊執柔衆陽並應故為豐盛大有之義元亨卦之徳剛健文明應天而時行故能元亨艮下坤上謙山髙犬之物而居地之下謙之象也亨有其徳而不居何往而不亨乎君子有終安履乎謙終身不易坤下震上豫動而和順故為豫豫者安和悅順之義利建侯行師諸侯和則萬物悅服衆心和則行師有功故豫之道利建侯行師也震下兌上隨說而動動而說以小女從長男雷震於澤中澤隨而動乾上來居坤下坤初往居乾上以陽下隂隂必說隨皆為隨義元亨利貞无咎隨道可以致大亨必得其正乃能大亨而无咎巽下艮上蠱蠱乃有事也風在山下遇山而回物皆撓亂為有事之象元亨既蠱則有復治之理艮陽剛尊而在上巽隂柔卑而在下得正順理大喜而亨也利渉大川蠱之大者濟時之艱難也故利渉大川先甲三日後甲三日甲者數之首事之始也一日二日至於三日推原先後為救弊可乆之道也兌下坤上臨澤上之地岸也與水際臨近乎水故為臨元亨利貞二陽方長而盛大也兌說而坤順九二剛中得六五應臨人應事臨天下大亨得正矣至於八月有凶陽生之八月自建子至建未二隂長而陽消矣故聖人為戒於方盛之時坤下巽上觀風行地上徧觸萬類周觀之象二陽居尊四隂在下仰觀之義盥而不薦有孚顒若盥手酌鬱鬯於地始求神之時人心方盡其精神嚴肅之至居上者當常莊敬不可如薦腥薦熟之時誠意少散而精一不若始盥之時則天下盡其孚誠顒然瞻仰之矣震下離上噬嗑卦爻外剛中虚口之象也口有物間噬而後合故曰噬嗑亨天下事所以不得亨者以有間也噬而嗑則亨通矣利用獄獄者所以究察情偽知其為間之道者也離下艮上賁山下有火照見其下草木品彚皆被其光彩故為賁亨物有實而加飾則亨小利有攸往小進而已坤下艮上剝羣隂漸盛消剝惟餘一陽又山髙起地上而反附着於地類剝之象也不利有攸往衆小人剝䘮君子之時故不利有攸往震下坤上復一陽生五隂之下歳十月隂盛既極則一陽復生於地中故為復亨復則漸亨出入入謂復生於内出謂長進於外無疾㣲陽生長無害之者朋來無咎子丑寅三陽之氣以類進然後能成生物之功無差忒抑塞之咎反復其道消長之道反復迭至七日來復始陽之始消也七變而成復陽君子之道君子道長則小人道消利有攸往震下乾上无妄動以天為无妄无妄至誠也至誠天之道也天之化育萬物生生不窮各正其性命乃无妄也元亨君子行无妄之道可致大通矣利貞其匪正有眚人法无妄之道利在貞正雖無邪心茍不合正理則妄而為邪心也故其匪正則為過眚不利有攸往既已无妄不宜有往往則妄矣乾下艮上大畜天而在於山中所畜至大之象故為大畜利貞畜止也聚也人之藴畜宜得正道可也不家食吉道徳充積於内食天禄施為於天下則吉也利渉大川畜大則宜濟難險矣震下艮上頤卦上止而不動外實而中虚人頥頷之象也口所以飲食養身故名曰頥貞吉觀頥自求口實頥道以正則吉觀人之養生養形養徳養人養於人皆以正道然後吉巽下兌上大過澤潤養木者也乃至滅没於木故為大過棟橈大過者陽過也棟以象其任重中强而本末弱是以撓也利有攸往亨隂弱而陽强君子盛而小人衰故利有攸往而亨坎下坎上習坎一陽䧟於二隂故為坎䧟之義習重習謂險中復有險也有孚陽在中也維心亨維心誠一故能亨通行有尚以誠一而行則能出險而有可嘉尚也離下離上離離麗也明也隂麗於上下之陽則為附麗之義利貞亨利於貞正貞正則亨通矣畜牝牛吉牝牛順之至取其中虚則為明人之所麗者也人養其順於正道之徳如牝牛則吉也艮下兌上咸少男少女交相為感故曰咸亨利貞物相感則有通之理而感之道必在於正取女吉卦有止而說男下女之義以此義取女則得正吉矣巽下震上恒長男在長女之上男尊女卑男動于外女順于内得人理之常故為恒也亨无咎恒而能通乃无咎也利貞利有攸往恒所以亨由貞正也可乆之道何往不利艮下乾上遯天下有山下陵而上去又隂長陽消君子遯藏之時也故為遯亨由遯而道不屈所以有亨也小利貞君子與時消息隂未甚盛雖不可大貞尚利小貞也乾下震上大壯乾剛而震動又陽長過中大者壯盛故為大壯利貞壯道宜利於正也坤下離上晉日出於地升進而光明盛大故為晋康侯用錫馬蕃庶晝日三接上之大明下能同徳以附治安之侯也故錫予之多親禮之至離下坤上明夷日入地中闇君在上明者見傷之時也故為明夷利艱貞君子利在艱難而不失其正也能如是所以明也離下巽上家人二與五正男女之位於内外為家人之道明於内而巽於外處家之道也利女貞女正則家道正矣兌下離上睽離火炎上兌澤潤下又二女同居其志不同行故為睽乖之義小事吉卦才說而麗乎明柔進而上行得申而應乎剛故小事則吉艮下坎上蹇坎險在前艮止不進又前有險難後有峻阻故為蹇利西南不利東北西南坤方坤體順而易東北艮方艮體止而險處順易則難可紓止於險則難當益甚矣利見大人惟聖賢乃能濟難貞吉濟難者必以大正之道而堅固其守則吉也坎下震上解震動於坎險之外出乎險也又隂陽交感和暢則雷雨作而觧散故為天下難觧之時利西南無所往其來復吉有攸往坤體廣大平易人初得難觧當治以寛大簡易也難觧則安平無事當正紀綱明法度進復先代明王可乆可繼之治是有法也夙吉尚有當觧而未盡者不早去則將復盛故夙則吉也兊下艮上損艮山體髙兌澤體深下深則上益髙矣又澤在山下其氣上通潤及百物也又三爻皆上應說以奉上也又三本剛而成柔上本柔而成剛皆損下益上之義上益而下損故為損有孚損過而就中損浮末而就本實元吉无咎至誠順理大吉而善不合正理則有咎矣可貞利有攸往所損合正則可貞固常行所往皆利矣曷之用二簋可用饗饗祀之禮多儀備物所以飾誠敬之心而已飾過則偽故云何所用雖二簋亦可以饗言在誠也震下巽上益以象言之風烈則雷迅雷激則風怒兩相助益也以義言之巽震二卦皆由下變而成上卦變隂為損下卦變陽為益損上益下之義也下厚則上安故益下為益利有攸往利渉大川險難無所不可濟乾下兌上夬夬決也澤本下而上於至髙之處有潰夬之象又衆陽上進決去一隂所以為夬也揚于王庭孚號有厲陽剛君子之道既盛則去小人當顯行於公朝雖如是然必至誠以命衆使知尚有危道告自邑不利即戎上隂雖㣲猶有未去是君子之道未至也又當自治不剛尚武則道益進乃共之善利有攸往巽下乾上姤姤遇也風行天下徧觸萬類乃遇之象又一隂始生與陽遇也女壯勿用娶女隂始生而漸盛女壯則男弱故戒勿娶如是之女女柔和順從家道乃成坤下兊上萃萃聚也澤上於地水之方聚也亨亨下羡文王假有廟王者萃天下之道其至大莫過於宗廟也利見大人人物聚則爭亂起非大人莫能治之也亨利貞萃以正則能亨也用大牲吉豐厚之時上交鬼神下接民物其用宜稱也力足以有為與天下同其富樂可也利有攸往巽下坤上升木生地中長而益髙為升之象元亨升進則有亨義以卦才之善故元亨也用見大人勿恤南征吉用巽順剛中之道以見大人不假憂恤前進則吉也南征前進也坎下兊上困水在澤下枯涸之象為困乏之義又陽䧟於下隂揜於上君子為小人所揜蔽窮困之時也亨卦才處險而悅故亨貞大人吉无咎能不失其正大人也故吉而无咎焉有言不信當困而言人誰信之巽下坎上井木入於水下而上乎水汲井之義也改邑不改井无喪无得往來井井邑可改井不可遷汲之不竭存之不盈其徳也常至者皆得其用也周汔至亦未繘井羸其瓶凶用雖幾至亦與未下繘於井同君子之道貴有成也若贏敗其瓶則失其用而凶矣離下兊上革兊水離火相就而相克與相滅息所以為變革之義已日乃孚革變其故人未能遽信故必已日然後從元亨革弊壊而致其通宜大亨矣利貞悔亡革得正道則得去故之義而無變動之悔巽下離上鼎以木從火烹飪之象觀卦全體則足腹耳鉉其鼎之象矣元吉亨卦之才離明巽順五居中以柔應剛為得中道可以致元亨而未遽至元吉吉羨文震下震上震震乾坤一索而成動而上進生物之長也故為長男其象為雷為有主其義為動亨雷之奮發有驚懼之象動而進雷奮發省有主而保大皆可致亨震來虩虩笑言啞啞震驚百里不喪匕鬯虩虩顧慮不安之貌啞啞笑言和適之貌處震不敢自寜則能保其安裕人之致其誠敬莫如祭祀匕載鼎實升爼而祈亨鬯以酌祼灌地而降神當是時雖雷震不失其所守此言震動之大安而不自失其誠敬也艮下艮上艮其背不獲其身陽止於上隂靜於下安其止也人之所以不能安其止者動於欲也艮其背不牽於欲則無我矣故曰不獲行其庭不見其人无咎無我則安行而不為物所亂矣故无咎艮下巽上漸進不越次為漸山上有木其高因山也其高有因所以為漸女歸男女萬事之先也天下之事進必以漸者莫如女歸吉女之歸能如諸爻男女各得其正則善也利貞諸卦利貞有不正之疑而為之戒者損之九二是也有必貞乃得宜者大畜是也有言所以利者以其有貞漸是也兊下震上歸妹征凶震動兊說小女從長男以說而動動而位皆不當故凶妹小女也無攸利如卦之義不獨女歸將无所往而利矣離下震上豐震動離明以明而動動而能明皆致豐之道也亨豐為盛大其義自亨王假之極天下之光大者惟王者能之勿憂冝日中豐之時繁庶殷盛治之冝如日之中明照無所不及然後無憂艮下離上旅山上有火火行而不居又麗乎外皆旅之象小亨如卦之才柔得乎中外而順乎剛止而麗乎明是以小亨也旅貞吉得旅之正而吉也巽下巽上巽一隂在二陽之下順於陽所以為巽順也小亨利有攸往利見大人卦之才陽剛巽順於中正之道柔皆順乎剛故可以小亨利有攸往利見大人也兊亦剛中正而亨巽乃小亨者兊柔在外用柔也巽柔在内性柔故也兊下兊上兊一隂居二陽之上隂說於陽而為陽所說故為兊亨能說於物物所與也故亨利貞非道求說則為邪謟卦徳剛中能正者也坎下巽上渙亨水遇風則渙然離散人之離散由乎中治離散之道亦本乎中九來居二四同於五皆主中故亨王假有廟中者心之象也王者収合人心無大於享帝立廟利渉大川木在水上濟川之象利貞合渙之道利在正固兊下坎上節澤上有水澤之容有限水滿則不害故為有節之象亨凡事有節則能致通苦節節貴適中過則苦矣不可貞苦則豈能常是以不可固守也兊下巽上中孚義在二體則二五中實在全體則三四中虛中虚信之本中實信之質豚魚吉豚躁魚冥物之難感者也信能及之則無不至矣所以吉也利渉大川忠信可以蹈水火汎渉大川乎利貞守信之道利在堅正艮下震上小過雷震於髙其聲過常又隂居尊位為小者過又為小事過與過之小亨過者過其常也事有待過而亨者故小過自有亨義利貞過之道利於不失時宜可小事不可大事小事可過事之大者何可過也飛鳥遺之音謂過之不逺故也不宜上宜下謂宜順也其吉必大離下坎上既濟亨小水火相交各當其用故為既濟天下大事已濟之時也然不能無小未亨者利貞處時既濟正固守之初吉方濟時也終亂濟及則反坎下離上未濟火在水上不相為用故為未濟亨未濟有生生之義故亨為卦才五以柔居尊位居剛而應剛得柔之中有致亨之道小狐汔濟濡其尾無攸利老狐多疑畏故履氷而聽其䧟也小狐則未能然汔當為仡勇於濟也濡其尾而不能濟無所利矣十五祀周之臣子日夜憂懼謀所以救其君父者無所不至竭國中珎寳良馬使閎夭泰顛來獻遣使四出謀於牧伯及各諸侯諸侯憂懼憤惋入見請從昌囚是時西有昆夷之患北有獫狁之難紂懼華夷之大叛也已乃召昌釋之昌因獻洛西地請除炮烙之刑紂大喜許之賜以弓矢鈇鉞得專征伐為西方諸侯伯論曰君子小人之不可相處如水火也況文王大聖受辛下愚乎惟文王陟降在帝左右致紂敬信得專征伐紂雖名為天子其實與天下諸侯下及萬民均入化育之中矣此文王受命之實也先儒不識天道乃以改元稱王為受命陋之甚也文王得征伐之柄九年而薨故泰誓曰皇天震怒命我文考肅將天威惟九年大統未集既曰大統未集則安有改元稱王之事故泰誓三篇皆只稱文考及武成然後稱我文考文王先儒不本經文推原理而妄生此論是以文王為曹操司馬懿之流矣吁操與懿尚不改元稱帝而謂文王為之甚哉十六祀小雅七篇曰采薇六章章八句遣戍役也文王之時西有昆夷之患北有獫狁之難以天子之命命將率遣戍役以守衛中國故歌采薇以遣之出車以勞還枤杜以勤歸也采薇采薇薇亦作生也止曰歸曰歸歳亦莫止靡室靡家獫狁之故不遑啓居獫狁之故采薇采薇薇亦柔始生也止曰歸曰歸心亦憂止憂心烈烈載饑載渇我戍未定靡使歸聘采薇采薇薇亦剛少而剛止曰歸曰歸歳亦陽歴陽月也十月為陽止王事靡盬不遑啓處憂心孔疚我行不來彼爾維何爾華盛貌維常之華彼路斯何君子之車戎車既駕四牡業業壯貌豈敢定居一月三捷駕彼四牡四牡騤騤彊也君子所依小人所腓四牡翼翼閑習也象弭弓反末也魚服矢服豈不日戒獫狁孔棘昔我往矣楊柳蒲柳也依依今我來思雨雪霏霏甚也行道遲遲長逺也載渇載饑我心傷悲莫知我哀君子能盡人之情故人忘其死小雅八篇曰出車六章章八句勞還率也我出我車于彼牧矣出車就馬於牧地自天子所謂我來矣召彼僕夫謂之載矣王事多難維其棘矣我出我車于彼郊矣設此旐矣建彼旄矣彼旟旐斯胡不斾斾憂心悄悄僕夫況瘁王殷王命南仲文王屬往城於方朔方出車彭彭四馬貌旂旐央央鮮明貌天子命我城彼朔方赫赫南仲獫狁于襄除也昔我往矣黍稷方華今我來思雨雪載塗凍釋也王事多難不遑啓居豈不懷歸畏此簡書戒命也喓喓草蟲趯趯阜螽未見君子憂心忡忡既見君子我心則降赫赫南仲薄伐西戎春日遲遲卉草也木萋萋倉庚喈喈采繁祁祁執訊辭也獲醜薄言還歸赫赫南仲獫狁于夷平也小雅九篇曰枤杜四章章七句勞還役也有枤之杜有睆其實睆實貌也王事靡盬繼嗣我日日月陽止女心傷止征夫遑止有枤之杜其葉萋萋王事靡盬我心傷悲卉木萋止女心悲止征夫歸止陟彼北山言采其把王事靡盬憂我父母檀車役車也幝幝敝貌四牡痯痯罷貌征夫不逺匪載匪來憂心孔疚期逝往也不至而多為恤憂也卜筮偕止會言近止征夫邇止卜之筮之㑹人占之邇近也十八祀甲子西伯誅亂政大夫潘正於是詢于八虞而咨于二虢度於閎夭而謀於南宫諏於蔡原而訪於辛尹辛甲尹佚重之以榮公泰顛散宜生甞遊於鳳凰之墟襪系觧顧左右前後皆君子也乃自結之大雅四篇曰棫樸五章章四句文王能官人也芃芃盛貌棫樸薪之槱之積也濟濟辟王左右趣之濟濟辟王左右奉璋半圭也奉璋峨峨盛壯也髦士攸宜淠彼舟行也涇舟烝衆也徒楫櫂也之周王于邁六師及之倬大也彼雲漢天也為章于天周王夀考遐不作人追琢雕也金曰雕玉曰琢其章金玉其相質也勉勉我王綱紀四方呂望唐四岳姜姓之苖裔也事紂以其無道去之北海窮困於朝歌賣食於棘津逮西伯得征伐之柄喟然歎曰吾聞西伯善養老者盍往歸乎乃西歸于周釣于渭上西伯將獵卜之卜人曰所獲非龍非彲非虎非熊而王者之輔也遂出田渭陽至于磻溪見老父坐茅而釣昌使問之曰叟樂此耶對曰君子樂行其志小人樂供其事吾非樂於漁者也昌顧左右曰得無是乎問其姓名同車而歸與論政事大說之拜大司馬望曰王國富民霸國富士僅存之國富大夫將亡之國富倉府西伯曰吾願富其民望曰聞善斯行宿善不祥於是發倉庫益賑鰥寡孤獨以望為師虞芮争旧質之於周入其境耕者讓畔行者讓路入其邑男女異路班白不提挈入其朝卿士大夫濟濟相讓虞芮之君心愧而歸以所爭為閒田孔子曰不令而從不教而化文王之道不可加矣大雅三篇曰緜九章章六句文王之興本由大王也緜緜𤓰瓞瓝也民之初生自土沮漆二水也古公亶父豳公也古言乆也亶父名或字陶復陶其土而復之陶穴陶其壤而穴之未有家室古公亶父來朝走馬率循也西水滸涯也至於岐下爰及姜女大姜聿來胥相也宇居也周原在岐山南膴膴美也堇荼菜也如飴爰始爰謀爰契開也我龜曰止曰時築室于兹廼慰安也廼止廼左廼右廼疆廼理廼宣廼畆自西徂東周爰於也執事乃召司空乃召司徒俾立室家其繩則直縮版以載作廟翼翼捄之虆也桴也陾陾度猶投也之薨薨築之登登削屢馮馮削牆屢鍜之聲百堵皆興鼛大鼓長一丈二尺鼓弗勝廼立臯門臯門有伉髙貌廼立應門應門將將嚴正也廼立冡土大社戎大也醜攸行起大事動大衆必先宜于社而後行肆不殄厥慍亦不隕墜也厥問柞棫抜矣行道兊成蹊也矣昆夷駾突也矣維其喙困也矣虞芮質厥成文王蹶動也厥生予曰有疏附率下以親上也予曰有先後相道前後也予曰有奔奏喻徳宣譽也予曰有禦侮武臣折衝也諸侯密須氏不承王命西伯令之不聽興師侵阮遂至於共西伯帥師遏之密人乃服崇侯蔑侮父兄不敬長老聽獄不哀制禄不均百姓力盡不得衣食西伯伐之軍於其郊崇侯恃城郭之固不肻服西伯進軍其城下崇侯固守三旬猶不降西伯勒兵攻滅之於是四方無道諸侯多懼而修徳矣大雅七篇曰皇矣八章章十二句美周也人監視也代殷莫若周周世世修徳莫若文王皇矣大也上帝臨下有赫監觀四方求民之莫定也維此二國夏殷其政不獲維彼四國四方也爰究爰度上帝耆老也之憎其式廓乃眷西顧此維與宅作之屏之其菑其翳修之平之其灌其栵啓之辟之其檉其据攘之剔之其檿其柘帝遷明徳串習也夷常也載路大也天立厥配嫓也受命既固帝省其山柞棫斯拔松栢斯兊帝作邦作對自大伯王季維此王季因心則友則友其兄則篤其慶厚其善載錫之光大也受禄無喪奄大也有四方維此王季帝度其心貊靜也其徳音其徳克明克明克類克長克君王此大邦克順克比比於文王其徳靡悔既受帝祉施於孫子帝謂文王無然畔援無然歆羨誕先登於岸密人不共敢距大邦侵阮徂共王赫斯怒爰整其旅以按徂旅以篤周祜以對于天下依其在京侵自阮疆陟我髙岡無矢我陵我陵我阿無飲我泉我泉我池度其鮮原小山别大山曰鮮亦善也居岐之陽在渭之將側也萬邦之方則也下民之王帝謂文王予懐明徳不大聲以色不長夏以革不識不知順帝之則帝謂文王詢爾仇匹也方同爾兄弟以爾鉤援鉤梯也所以鉤引上城者與爾臨臨車衝衝車以伐崇墉城也臨衝閑閑動揺也崇墉言言髙下也執訊連連徐也攸所也馘不服者殺而獻其左耳曰馘安安是類是禡類禡師祭也於内曰類於外曰禡是致是附致其社稷羣神附其先祖為之立後四方以無侮臨衝茀茀彊盛崇墉仡仡亦髙大也是伐是肆犯突也是絶是忽滅也四方以無拂西伯自岐渉渭徙居于豐築城郭作臺池園囿庶民謂其臺曰靈臺囿曰靈囿沼曰靈沼大雅六篇曰靈臺五章章四句民始附也文王受命而民樂其有靈徳以及鳥獸昆蟲馬經始靈臺經之營之庶民攻之不日成之經始勿亟庶民子來王在靈囿麀鹿攸伏麀鹿濯濯娛遊貌白鳥翯翯肥澤貌王在靈沼於牣魚躍牣滿虡植者曰虡橫者曰栒業大版也維樅崇牙也賁鼓大鼓維鏞大鐘於論鼓鐘於樂辟廱水旋丘如壁曰辟雍以節觀者於論鼓鐘於樂辟廱鼉鼔逢逢和也矇瞍奏公事也初鑿沼得朽骨命葬之左右曰此無主矣西伯曰天子主天下諸侯主一國寡人固骨之主矣遂葬之天下聞之曰西伯仁及朽骨况生者乎論曰子産聽鄭國之政以其乘輿濟人於溱洧子輿氏以不知為政譏焉今記文王葬朽骨得無近似之乎夫施於人而望其報者情之常也朽骨而無主則無為望其報於此見文王心無一毫在於利也心無一毫在於利真天下之君也此所以記之也有載武王遇暍者於道負置䕃樾之下左擁而右扇之者夫武王克相上帝寵綏四方之君也豈陵遲無政姑息如此哉乃道路妄庸人之言爾是類則削周大姒不妬忌而西伯有内行此徳政之所以流布而風化之所以興也大雅六篇曰思齊四章章六句文王所以聖也思齊莊也太任文王之母思媚周姜京周地名室之婦太姒嗣徽音則百斯男惠于宗公神罔時怨神罔時恫痛也刑于寡妻至于兄弟以御於家邦雝雝在宮雝雝毛公云和也鄭氏云宮謂辟廱非是肅肅敬也在廟不顯亦臨無射亦保肆大也戎疾害也不殄絶也烈業也假大也不瑕不聞亦式不諫亦入肆成人有徳小子有造古之人無斁譽名也髦俊也斯士太姒生十子長曰伯邑考早卒次曰發性慈和有聖徳西伯以為世子世子帥西伯事季歴之道而行之不敢有加焉西伯有疾世子不說冠帶而養西伯一飯世子亦一飯西伯再飯世子亦再飯次曰鮮次曰旦旦師於虢叔仁聖多才多藝西伯任以政事唐虞而下夏后殷商千餘年中明天子賢后妃盡道於宮壼化行乎天下為時人所歌美者有矣逮孔子刪詩於周衰而文王之時有詩在焉故以為周南周南首篇曰關雎五章章四句后妃之徳也風之始也所以風天下而正夫婦也故用之鄉人焉用之邦國焉風風也教也風以動之教以化之詩者志之所之也在心為志發言為詩情動於中而形於言言之不足故嗟嘆之嗟嘆之不足故永歌之永歌之不足不知手之舞之足之蹈之也情發於聲聲成文謂之音治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困故正得失動天地感鬼神莫近於詩先王以是經夫婦成孝敬厚人倫美教化移風俗故詩有六義焉一曰風二曰賦三曰比四曰興五曰雅六曰頌上以風化下下以風刺上主文而譎諫言之者無罪聞之者足以戒故曰風至於王道衰禮義廢政教失國異政家殊俗而變風變雅作矣國史明乎得失之迹傷人倫之廢哀刑政之苛吟詠情性以風其上達於事變而懷其舊俗者也故變風發乎情止乎禮義發乎情民之性也止乎禮義先王之澤也是以一國之事繫一人之本謂之風言天下之事形四方之風謂之雅雅者正也言王政之所由廢興也政有小大故有小雅焉有大雅焉頌者美盛徳之形容以其成功告於神明者也是謂四始詩之至也然則關雎麟趾之化王者之風故繫之周公南言化自北而南也鵲巢騶虞之徳諸侯之風也先王之所以教故繫之召公周南召南正始之道王化之基是以關雎樂得淑女以配君子憂在進賢不淫其色哀窈窕思賢才而無傷善之心焉是關雎之義也關關雎鳩雎鳩摯而有别在河之洲水中可居曰洲窈窕淑善也女君子好逑匹也參差荇菜接余也左右流求也之窈窕淑女寤覺也寐寢也求之求之不得寤寐思服思之也悠哉悠哉輾轉反側參差荇菜左右采之窈窕淑女琴瑟友之宜以琴瑟友樂之參差行菜左右芼擇也之窈窕淑女鐘鼓樂之周南二篇曰葛覃三章章六句后妃之本也后妃在父母家則志在於女功之事躬儉節用服澣濯之衣尊敬師傅則可以歸寧父母化天下以婦道也葛之覃延也葛所以為絺綌兮施於中谷維葉萋萋茂盛也黄鳥摶黍也于飛集于灌聚也木其鳴喈喈和聲之逺聞也葛之覃兮施於中谷維葉莫莫成就貌是刈是濩煑也為絺精曰絺為綌麤曰綌服之無斁厭也言我也告師女師也氏言告言歸女嫁曰歸薄汙我私薄澣我衣害何也澣私服宜澣害否公服宜否歸寧父母父母在則有時而歸寧周南三篇卷耳四章章四句后妃之志也又當輔佐君子求賢審官知臣下之勤勞内有進賢之志而無險詖私謁請也之心朝夕思念至於憂勤也采采卷耳苓耳也不盈頃筐畚屬易盈之器嗟我懷人寘置也彼周行列也陟彼崔嵬土山之戴石者我馬虺隤病也我姑且也酌彼金罍人君黄金罍維以不永懷陟彼髙岡山脊也我馬𤣥黄𤣥馬病則黄我姑酌彼兕觥角爵也維以不永傷陟彼砠石山戴土矣我馬瘏病也矣我僕痡亦病也矣云何吁憂也矣周南四篇曰樛木三章章四句后妃逮下也言能逮下而無嫉妬之心焉南有樛木木下曲曰樛葛藟纍之樂只君子福履禄也綏安也之南有樛木葛藟荒奄也之樂只君子福履將大也之南有樛木葛藟縈旋也之樂只君子福履成就也之周南五篇曰螽斯蚣蝑也三章章四句后妃子孫衆多也言若螽斯不妬忌則子孫衆多也螽斯羽詵詵衆多也兮宜爾子孫振振仁厚也兮螽斯羽薨薨衆多也兮宜爾子孫繩繩戒慎也兮螽斯羽揖揖㑹聚也兮宜爾子孫蟄蟄和集也兮周南六篇曰桃夭三章章四句后妃之所致也不妬忌則男女以正婚姻以時國無鰥民也桃之夭夭少壯也灼灼華之盛也其華之子于歸宜其室家桃之夭夭有蕡其實實貌有色有徳之子于歸宜其家室桃之夭夭其葉蓁蓁至盛貌之子于歸宜其家人一家皆宜周南七篇曰兎罝三章章四句后妃之化也關雎之化行則莫不好徳賢人衆多也肅肅敬也兎罝罟也㭬之丁丁㭬杙聲也﨣﨣武夫公侯干杆也城肅肅兎罝施于中逵九達之道﨣﨣武夫公侯好仇肅肅兎罝施於中林﨣﨣武夫公侯腹心周南八篇曰芣苢三章章四句后妃之美也和平則婦人樂有子矣采采芣苢馬舄也車前也宜妊薄言采取也之采采芣苢薄言有藏也之采采芣苢薄言掇拾也之采采芣苢薄言捋取也之采采芣苢薄言袺執衽也之采采芣苢薄言襭扱衽也之周南九篇曰漢廣三章章八句徳廣所及也文王之化被于南國美化行乎江漢之域無思犯禮求而不可得也南有喬木不可休息漢有游女不可求思辭也漢之廣矣不可泳潛行也思江之永長也矣不可方思方泭也翹翹薪貌錯薪錯雜也言刈其楚尤翹翹者之子于歸言秣養也其馬漢之廣矣不可泳思江之永矣不可方思翹翹錯薪言刈其蔞之子于歸言秣其駒漢之廣矣不可泳思江之永矣不可方思周南十篇曰汝墳三章章四句道化行也文王之化行乎汝墳之國婦人能閔其君子猶勉之以正也遵循也彼汝水名也墳大防也伐其條枝也枚幹也未見君子惄饑意也如調朝也饑遵彼汝墳伐其條肄斬而復生曰肄既見君子不我遐逺也棄魴魚頳赤也尾魚勞則尾赤王室如燬火也雖則如燬父母孔邇甚近也周南終十一篇曰麟之趾三章章三句關雎之化行則天下無犯非禮雖衰世之公子皆信厚如麟趾之時也麟之趾足也振振信厚也公子于嗟麟兮麟之定題也振振公姓公同也于嗟麟兮麟之角角末肉振振公族公同祖于嗟麟兮論曰深逺哉周南之義后妃之能助其夫者事亦多矣聖人惟取不妬忌之詩至於四五者何歟愚讀史至隋文帝獨孤后然後知婦人之惡以妬忌為大也自漢而下后妃之妬忌者有矣何獨至於獨孤后而知之吁婦人之妬妬其夫已為非義獨孤后肆其妬心不獨妬文帝使不得有異生子又妬及其子焉太子勇有寵妾曰雲昭訓獨孤怒曰睍地伐漸不可耐專寵阿雲有如許豚犬遂内啓賊子廣行簒奪東宫之謀外賂姦臣素造放黜儲君之事而文帝亦不得其死曰獨孤誤我卒至宗祀絶滅生靈塗炭開皇之中天下户八百九千萬唐興撫綏三十餘年至永徽初始及三百八十萬戸耳吁獨孤一行妬忌於宫閫之閒而滅天下之戸五六百萬聖人刪詩立周南之義教訓萬世后妃專以無妬忌為大美也其意深且逺矣夫專以無妬忌為大美則必以妬忌為大惡矣攷諸獨孤后其為大惡豈不深切著明也哉愚是以知王者欲齊其家措之天下而周南不可不學也召公奭周之同姓或曰西伯庶子也食采於召西伯所掌南邦之政逮孔子刪詩於周衰取古諸侯夫人盡道為人所歌美者而召伯之詩在焉故謂之召南召南首篇曰鵲巢三章章四句夫人之徳也國君積行累功以致爵位夫人起家而居有之徳如鳲鳩秸鞠也乃可以配焉維鵲有巢維鳩居之鳲鳩不自為巢居鵲之成巢之子于歸百兩乗也御之迎也諸侯之子嫁於諸侯送迎皆百乗維鵲有巢維鳩方之有之也之子于歸百兩將之送也維鵲有巢維鳩盈之滿也之子于歸百兩成之召南二篇曰采繁三章章四句夫人不失職也夫人可以奉祭祀則不失職矣于以采蘩皤蒿也于沼池也于沚渚也于以用之公侯之事祭也于以采蘩于澗之中山夾水曰澗于以用之公侯之宫廟也被之首飾也僮僮竦敬也夙早也夜在公被之祁祁舒遲去事有儀也薄言還歸召南三篇曰草蟲三章章七句大夫妻能以禮自防也喓喓聲也草蟲常羊也趯趯阜螽蠜也妻待禮以從夫未見君子憂心忡忡猶衝衝亦既見止辭也亦既覯遇也止我心則䧏下也陟彼南山言采其蕨鼈也未見君子憂心惙惙憂也亦既見止亦既覯止我心則説服也陟彼南山言采其薇未見君子我心傷悲亦既見止亦既覯止我心則夷平也召南四篇曰采蘋三章章四句大夫妻能循法度能循法度則可以承先祖共祭祀矣于以采蘋大萍也南澗之濵厓也于以采藻聚藻也于彼行流也潦于以盛之維筐方者及莒圓者于以湘之烹也維錡釡屬有足者及釡于以奠置也之宗室牖下將嫁女者禮之於大宗之廟設几筵於戸外誰其尸之主也有齊敬也季少也女召南五篇曰甘棠三章章三句美召伯也召伯之教明於南國蔽芾小貌甘棠杜也勿翦勿伐召伯所茇草舍也蔽芾甘棠勿翦勿敗召伯所憩息也蔽芾甘棠勿翦勿拜㧞也召伯所說舍也召伯六篇曰行露三章一章三句二章六句召伯聽訟也衰亂之俗㣲貞信之教興彊暴之男不能侵陵貞女也厭浥濕意行道也露豈不夙夜謂行多露誰謂雀無角何以穿我屋雀之穿屋似有角者誰謂女無家何以速召也我獄埆也雖速我獄室家不足誰謂䑕無牙何以穿我墉牆也視牆之穿可謂鼠有牙誰謂女無家何以速我訟雖速我訟亦不女從不棄禮而從彊暴之男召南七篇曰羔羊三章章四句鵲巢之功致也召南之國化文王之政在位皆節儉正直徳如羔羊也大夫羔裘以居羔羊之皮小曰羔大曰羊素白也絲五紽數也退食自公委蛇委蛇委曲自得之貌羔羊之革素絲五緎縫也委蛇委蛇自公退食羔羊之縫素絲五總亦數也委蛇委蛇退食自公召南八篇曰殷其靁三章章六句勸以義也召南之大夫逺行從政不遑寧處其室家能閔其勤勞勸以義也殷雷聲也其靁在南山之陽山南曰陽何斯此也違去也斯莫敢或遑腵也振振信厚也君子歸哉歸哉殷其靁在南山之側何斯違斯莫敢遑息止也振振君子歸哉歸哉殷其靁在南山之下何斯違斯莫或遑處居也振振君子歸哉歸哉召南九篇曰摽有梅三章章四句男女及時也召南之國被文王之化男女得以及時也摽落也有梅其實七兮在樹者七也求我庶士迨及也其吉兮善也摽有梅其實三兮求我庶士迨其今兮急辭也摽有梅頃筐塈之取也求我庶士迨其謂之不待備禮也召南十篇曰小星二章章五句惠及下也夫人無妬忌之行以色曰妬以行曰忌惠及賤妾進御於君知其命有貴賤能盡其心矣嘒㣲貌彼小星衆無名者三五在東三心三月在東五噣正月在東肅肅宵征夙夜在公寔命不同嘒彼小星維參伐也與昴留也言衆無名之星隨也噣伐留在天也肅肅宵征抱衾被也與裯襌被也寔命不猶若也召南十一篇曰江有汜三章章五句美媵也勤而無怨嫡能悔過也文王之時江沱之間有嫡不以其媵備數媵遇勞而無怨嫡亦自悔也江有汜決復入為汜之子歸不我以不我以其後也悔江有渚小洲也之子歸不我與不我與其後也處止也江有沱江之别者之子歸不我過不我過其嘯也歌召南十二篇曰野有死麕三章章四句一章三句惡無禮者天下大亂彊暴相陵遂成淫風被文王之化雖當亂世猶惡無禮也野有死麕白茅包之郊外曰野包裹也羣田之所獲而分其肉白茅取潔清也凶荒殺禮猶有以將之有女懐春吉士誘之林有樸樕小木也野有死鹿白茅純束猶包之也有女如玉有徳也舒徐也而脱脱兮舒遲也無感動也我帨兮佩巾也無使尨也吠非禮相陵則狗吠召南十三篇曰何彼穠矣三章章四句美王姬也雖則王姬亦下嫁於諸侯車服不繫其夫下王后一等猶執婦道以成肅雝之徳也肅敬也雝和也何彼穠矣猶戎戎盛也唐棣栘也之華曷不肅雝王姬之車何彼穠矣華如桃李平王之孫齊侯之子武王之女大姬嫁胡公滿王之孫與侯之子齊平也其釣維何維絲伊緡釣者以絲為緡則善齊侯之子平王之孫召南終十四篇曰騶虞二章章三句鵲巢之應也鵲巢之化行人倫既正朝廷既治天下純被文王之化則庶類蕃殖蒐田以時仁如騶虞則王道成也彼茁出也者葭蘆也一發五豝豕牝曰豝虞人翼五豝以待君之發于嗟乎騶虞彼茁者蓬草名一發五豵云豕生三曰豵又一歳曰豵于嗟乎騶虞孔子謂其子伯魚曰女為周南召南矣乎人而不為周南召南其由正牆面而立也與是時也天下純被西伯之化三分天下有其二西伯惠訓不怠使盡臣節共王事焉孤竹君生三子長曰伯夷季曰叔齊父愛叔齊欲立之孤竹君薨大臣致國於叔齊叔齊不受則致於伯夷伯夷亦不受國人乃立其中子二子逺迹東海之濵聞西伯作興曰吾聞西伯善養老者偕往歸焉耕于首陽山周欲官之辭使者若曰吾寧貧賤而求志是以在此遂終身不食禄周亦不强致也孟子曰伯夷辟紂居北海之濵聞文王作興曰盍歸乎來吾聞西伯善養老者太公辟紂居東海之濵聞文王作興曰盍歸乎來吾聞西伯善養老者天下有善養老則仁人以為已歸矣五畆之宅樹牆下以桑匹婦蠶之則老者足以衣帛矣五母鷄二母彘無失其時則老者足以無失肉矣百畆之田匹夫耕之八口之家足以無饑矣所謂西伯善養老者制其田里教之樹畜導其妻子使養其老五十非帛不煖七十非肉不飽不煖不飽謂之凍餒文王之民無凍餒之老者此之謂也論曰先儒謂伯夷叔齊讓國不義武王不食粟為天下之清以愚觀之不然二子盖行天地正大之情彌縫父子兄弟之間者也其彌縫父子兄弟之間奈何孤竹君欲舍長子伯夷而立少子叔齊夫父子天性也兄弟天倫也舍長立少虧天性亂天倫矣使伯夷立則無父而天性遂虧使叔齊立則無兄而天倫遂亂天下豈有無父子兄弟之國哉故二子者寧舍君國之富貴尊榮潔身而去之既為是以辭先君之國矣豈復可仕乎空乏其身處㣲賤而不悔所以成吾仁非以讓國不仕立一節為髙者也此所以為聖之清乎若太史遷之說二子以武王伐紂而不食周粟是介僻淺陋不知天命難乎與語仁者烏得為聖之清哉將蓄徳之君子可不審諸亳有雀生鸇史占之曰以小生大威振名昌紂愈益輕肆棄耆舊貴戚大臣商容㣲子㣲仲箕子比干膠鬲之徒不用而用蜚廉惡來蜚廉者孟戲中衍之裔孫惡來其子也俱以材力進善諛好讒有梅伯者性忠直數諫争紂怒而殺之葅醢其身有雷開者性阿佞進諛言紂賜之金玉而封之嘗以夏田或諫曰非時也君踐一日之苗而民失終歳之食其可乎殺之園囿汙池沛澤多而虎豹犀象生焉夷羊在牧蜚鴻滿野山鳴河竭天雨肉雨石雨日見龜生毛兎有角女子化為丈夫宫中夜聞哭聲而不見其人二十三祀西伯寢疾病謂世子曰見善勿怠時至勿疑去非勿處此三者道之所以止也柔而定恭而敬屈而强忍而剛此四者道之所以起也世子再拜受西伯薨葬于畢孟子曰舜生於諸馮遷於負夏卒於鳴條東夷之人也文王生於岐周卒於畢郢西夷之人也地之相去也千有餘里世之相後也千有餘歳得志行乎中國若合符節先聖後聖其揆一也論曰記稱武王夢帝與九齡文王曰我百女九十吾與女三焉文王九十七乃終武王九十三而終夫聖人之所以為聖人者體天道開物成務無所為而已若年數之長短則亦聽乎天烏能以相與也先儒不窮理輕信其說又以文王受命改元稱王武王末受命為繼文王七年而崩也遂不敢以泰誓十一年為武王之年而生文王十四歳生武王武王不葬文王舉兵之論夫詩人言文王受命指其至誠動天人之助中庸言武王末受命者乃指其正天位也三年之䘮自天子達於庶人聖人之所以異於人者以其舉動以類而節奏和也豈有武王方在創巨痛深之中而舉兵耀武於天下之國者哉古者天子諸侯十五而冠既冠然後可以言娶豈有大聖如文王乃為童稚而生子者乎先儒謬誤相承誣聖人之盛徳而莫之察也愚是以辨云大雅九篇曰下武六章章四句繼文也武王有聖徳復受天命能昭先人之功焉下武維周世有哲王三后在天王配于京王配于京世徳作求永言配命成王之孚成王之孚下土之式永言孝思孝思維則則其先人也媚兹一人天子紂也應侯順徳永言孝思昭哉嗣服嗣為西伯也昭兹來許進也繩循也其祖武迹也於萬斯年受天之祜受天之祜四方來賀於萬斯年不遐有佐二十四祀周西伯發元年二十七祀周西伯納呂望之女邑姜邑姜賢立未嘗倚坐未甞倨怒未嘗厲是年生元子誦二十八祀甲戍三十二祀黎侯近于王畿不供王命紂方日夜極意聲色不知治也西伯發戡黎殷人大震祖伊告而不納作西伯戡黎紂窮凶極惡百姓化下可接屋而誅内史向摯去之於是㣲子告父師箕子少師比干遂遯于荒野箕子佯狂紂囚以為奴比干極諫陳先王艱難天命不易國家將亡之明徵請王洗心易行伏于象魏之門紂大怒曰比干自以為聖人吾聞聖人心有七竅遂剖而視之人人離懼呂望言於周伯曰先謀後事者昌先事後謀者亡夏條可結冬氷可折不可失者時也是歳大旱羣臣及四方諸侯皆請伐殷論曰孔子曰三分天下有其二以服事殷周之徳其可謂至徳也已矣先儒以為此言文王者也及觀下武媚兹一人應侯順徳及矢于牧野維予侯興之辭然後知孔子槩以周為言者方紂天命未絶武王固盡臣禮繩其祖武嗣服西伯媚于天子如文王之時矣及紂無天命為獨夫然後伐之而為王周之徳其可謂至徳也已矣商書叙曰殷始咎周周人乗黎祖伊恐奔告于受作西伯戡黎西伯戡黎西伯既戡黎祖伊恐奔告於王曰天子天既訖我殷命格人元龜罔敢知吉非先王不相我後人惟王淫戲用自絶故天棄我不有康食不虞天性不廸率典今我民罔弗欲喪曰天曷不降威大命不摯今王其如台王曰嗚呼我生不有命在天祖伊反曰嗚呼乃罪多參在上乃能責命于天殷之即喪指乃功不無戮于爾邦商書叙曰殷既錯天命㣲子作誥父師少師㣲子㣲子若曰父師少師殷其弗或亂正四方我祖底遂陳于上我用沈酗於酒用亂敗厥徳于下殷罔不小大好草竊姦宄卿士師師非度凡有辜罪乃罔恒獲小民方興相為敵讎今殷其淪喪若渉大水其無津涯殷遂喪越至于今曰父師少師我其發出狂吾家耄遜于荒今爾無指告予顛隮若之何其父師若曰王子天毒降災荒殷邦方興沈酗于酒乃罔畏畏咈其耉長舊有位人今殷民乃攘竊神祗之犧牷牲用以容將食無災降監殷民用乂讎斂召敵讎不怠罪合于一多瘠罔詔商今其有災我興受其敗商其淪䘮我罔為臣僕詔王子出廸我舊云刻子王子弗出我乃顛隮自靖人自獻于先王我不顧行遯皇王大紀卷十

body:
  text: 皇王大紀卷五十九宋胡宏撰三王紀景王二十五年齊北郭啟帥師伐莒莒子将戰苑羊牧之諌曰齊帥賤其求不多不如下之大國不可怒也弗聽敗齊師于夀餘齊侯伐莒莒子行成如齊涖盟盟于稷門之外莒於是乎大惡其君楚薳越使告于宋曰寡君聞君有不令之臣為君憂無寧以為宗羞寡君請受而戮之對曰孤不佞不能媚於父兄以為君憂拜命之辱抑君臣日戰君曰余必臣是助亦惟命人有言曰惟亂門之無過君若惠保敝邑無亢不衷以奨亂人孤之望也楚人患之諸侯之戍謀曰若華氏知困而致死楚恥無功而疾戰非吾利也不如出之以為楚功其亦無能為也已救宋而除其害又何求乃固請出之宋人從之五子奔楚魯大蒐王寵庶子朝語其傅賔起欲立之劉子摰之庶子伯蚠事單子旗惡賔起之為人也願殺之又惡子朝之言以為亂願去之王将田北山公卿皆從将殺劉單王有心疾而崩太子母弟猛立劉子摰卒無子單子立蚠見王攻賔起殺之盟羣王子於單氏遂葬王魯叔鞅來㑹葬子朝因舊官百工之喪職秩者與靈景之族以作亂帥郊要餞之甲逐劉子單子逆王于荘宫以歸王子還夜取王如荘宫單子奔平畤羣王子追之單子殺還姑發弱鬷延定稠子朝奔京魯叔鞅歸言王室之亂也閔馬父曰子朝必不克其所與者天所廢也晉荀吳畧東陽襲鼓滅之單子告急于晉以王如平畤遂次于皇使王子處守王城盟百工於平宫鄩􅆄伐皇而敗焚諸王城之市晉籍談荀躒帥九州之戎及焦瑕温原之師以納王于王城王崩諡曰悼王母弟匄立館于子旅氏晉賈辛司馬督軍于隂于侯氏于谿泉次于社王師軍于汜于解次于任人閏月晉師濟伊洛取前城軍其東南王師伐京毁其西南經曰二十有二年春齊侯伐莒宋華亥向寧華定自宋南里出奔楚華向誘殺羣公子又劫其君取其太子母弟為質又求助于吳楚蠻夷入披其國都以叛必誅不赦之賊宋宜竭力必討之於内諸侯宜恊心必救之於外楚子宜執叛臣之使而戮之於境今楚人釋君而臣是助諸侯之戍怠於救患固請逸賊而宋又從之則皆罪也故晋荀吳齊苑何忌衛公子朝曹大夫皆畧而不書其曰自宋南里者譏宋之縱釋有罪不能致討出奔楚者不待貶絶而亢不衷奨亂人之惡自見矣大蒐于昌間昭公之時凡三書蒐或以非其時或以非其地而大意在權臣專行公不與也三綱軍政之本古者春蒐夏苗秋獮冬狩皆于農隙以講事而所主者明貴賤辨等列順少長習威儀則皆納民於軌物而非馳射擊刺之末矣是故觀于有莘少長有禮知可用也而文公遂霸臨于洛陽袒而發䘮為義帝也而漢祖遂王今魯國其君則設兩觀乗大輅其臣則八佾舞于庭旅泰山以雍徹其宰則據大都執君命而軍政之本亡矣何以蒐為此春秋所書為後戒之意也夏四月乙丑天王崩六月叔鞅如京師葬景王王室亂何言乎王室亂王者以天下為家則以京師為室京師者本也周公作立政曰廸惟有夏乃有室大競其作鴟鴞詩以遺成王亦曰既取我子無毁我室皆指京師言之也以京師為室王畿為堂諸夏為庭戸四夷為藩籬治外者先自内治逺者先自近本亂而末治者否矣景王寵愛子朝使孽子配適以本亂者其言王室譏國本之不正也本正而天下定矣唐虞公天下則相禪而與賢三代家天下則相繼而與子春秋兼帝王之道可公也則以達節為權故季札辭國貶而稱名可家也則以居正為大故莊公始生即書于䇿鄭突歸而不氏以國陽生入而得係於齊此皆正本以及天下之義也其義茍行無易樹子王室豈有亂離之禍乎春秋書子同生於前而記王室亂于後其為來世法戒明矣劉子單子以王猛居于皇凢稱以者不以者也師而曰以能左右之也地而曰以能取與之也人而曰以能死生之也尊不以乎卑貴不以乎賤大不以乎小劉蚠單旗臣也曷為能以王猛乎猛無寵於景王不能自定其位制在劉單其曰以者能廢立之也按左氏景王太子夀以昭十五年卒至是八年矣猛與匄皆其母弟禮無疑於當立然久而未立者王愛庶子朝欲立以為嗣未果而王崩故諸大臣競立君諸王子爭欲立以正則有猛以寵則有朝猛雖正而無寵其威不足以攝羣下朝雖寵而不正其分不足以服人心二子廢立皆恃大臣强弱而後定者也故特稱曰以而景王之弱其後嗣輕其宗社之罪亦著矣易曰王居无咎稱居于皇者明其有土當得位之稱也秋劉子單子以王猛入于王城猛未踰年何以稱王示當立也既當立矣何以稱名明嗣君也曰王猛者見居尊得正又以别乎諸王子也君前臣名劉單不名而王名不嫌于倒置乎曰君前臣名常禮也禮當其變臣有不名名其君而不嫌者矣王不當稱未踰年而稱王名不當稱立為君而稱猛皆禮之變也惟可與權者能知其變而不越乎道之中再書劉子單子之以王何也春秋詞繁而不殺者必有羙惡焉劉子單子葢挾天子以令諸侯而專國柄者也書而未足故再書于䇿以著上下舛逆為後世之深戒也冬十月王子猛卒十有二月癸酉朔日有食之敬王元年冬十一月先是邾人城翼還自離姑公孫鉏曰魯将御我欲自武城還循山而南徐鉏丘弱茅地曰道下遇雨将不出是不歸也遂自離姑武城人塞其前斷其後之木而弗殊邾師過乃推而蹷之遂取邾師獲鉏弱地邾人愬于晉晉人討于魯魯叔孫婼如晉使與邾大夫坐叔孫曰列國之卿當小國之君固周制也邾又夷矣寡君之命介子服囘在請使當之乃不果坐士彌牟聼其辭皆執之館叔孫于箕范鞅求貨使請冠焉婼請其冠法而與之兩冠曰盡矣魯申豐以貨如晋婼曰見我吾告女所行貨見而不出吏人之與叔孫居者請其吠犬弗與及将歸殺而與之食之叔孫所館雖一日必葺其墻屋去之如始至二師圍郊郊鄩潰晉師在平隂王師在澤邑王使告間晉師還蔡侯薨于楚諡曰悼侯弟甲嗣莒子虐而好劍茍鑄劒必試諸人國人患之又将叛齊烏存帥國人逐之奔魯齊人納狂吳人伐州來楚令尹子瑕薳越帥師及諸侯之師奔命救州來遇吳師于雞父令尹卒楚師熸吳公子光曰諸侯從于楚者衆而皆小國畏楚而不獲已是以來吾聞之作事威克其愛雖小必濟胡沈之君弱而狂陳大夫齧壮而頑頓與許蔡疾楚政楚令尹死其師熸帥賤多寵政令不一七國同役而不同心帥賤而不能整無大威命楚可敗也乃使前者去備薄威後者敦陳整旅分師先犯胡沈與陳獲胡沈之君及陳大夫舍胡沈之囚使奔許與蔡頓曰吾君死矣師譟而從之三國奔楚師大敗王子朝入于尹單子劉子伐尹而敗召伯奐南宫極以成周人戍尹單子劉子以王如劉子朝入于王城次于左巷鄩羅納諸荘宫魯地震魯侯為叔孫之故如晉及河有疾而復楚囊瓦為令尹城郢沈尹戍曰子常必亡郢茍不能衛城無益也古者天子守在四夷天子卑守在諸侯諸侯守在四鄰諸侯卑守在四境慎其四境結其四援正其疆埸修其土田險其走集明其伍候完其守備民狎其野三務成功民無内憂而又無外懼國焉用城無亦監乎若敖蚡冒至于武文土不過同猶不城郢今土數圻而郢是城不亦難乎經曰三十有三年春王正月叔孫婼如晋癸丑叔鞅卒晉人執我行人叔孫婼晋人圍郊按左氏晋籍談荀躒帥師軍于侯氏箕遺樂徵濟師軍其東南正月二師圍郊郊子朝邑也既不書大夫之名氏又不稱師而曰晋人㣲之也所謂以其事而㣲之者也當是時天子蒙塵晋為方伯不奔問官守省視器具徐遣大夫往焉勤王尊主之義若是乎書晋人圍郊而罪自見矣夏六月蔡侯東國卒于楚秋七月莒子庚輿來奔左氏曰庚輿虐而好劍茍鑄劍必試諸人國人患之又将叛齊烏存帥國人逐之庚輿來奔齊人納郊公三代之得失天下仁與不仁而已矣茍無仁心甚則身弑國亡不甚則自危國削庚輿免死道左而出奔於魯幸耳入國不書而書其出奔惡之也郊公出入皆不書㣲之也所謂以其人而㣲之者也㣲之為義或以位或以人或以事春秋書法達王事名氏不登於史策若此類亦衆矣戊辰吳敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅獲陳夏齧吳伐州來楚令尹帥師及諸侯之師與吳戰曷為不書楚令尹既䘮楚師已熸六國先敗楚師遂奔是以不書楚也諸侯之師曷為畧而不序頓胡沈則其君自将蔡陳許則大夫帥師言戰則未陳也言敗績或滅或獲其事亦不同也故總言吳人以詐取勝於前而以君與大夫序六國於後胡沈書爵書名書滅者二國之君㓜而狂不能以禮自守役屬于楚悉師以出一敗而身與衆俱亡也其曰胡子髠沈子逞滅者若曰非有能滅之者咸其自取焉耳亦猶梁亡自亡也鄭棄其師自棄也齊人殱于遂自殱也或曰滅或曰獲别君臣也君死曰滅胡子髠沈子逞是也生得曰獲秦晋戰于韓原獲晋侯是也大夫生死皆曰獲鄭獲宋華元生也吳獲陳夏齧死也書其敗不以國分而以君大夫為序書其死不以事同而以君臣為别皆所以辨上下定民志雖顛沛必於是也其義行而亂自熄天王居于狄泉尹氏立王子朝立者不宜立也王猛當立而未能立故稱大臣以之而不言立子朝庶孽奪正以賤妨貴基亂周室不當立者也故特稱立而自尹氏尹氏天子之卿也王朝公卿書爵而變文稱氏者見世卿之擅權亂國為後戒也或曰稱氏者時以氏稱之也詩云王謂尹氏此大雅羙宣王之詩也亦譏世卿歟為此說者誤矣詩人主文而不以害意有羙而或過有刺而或深以意逆之可也春秋所書或稱爵或稱字或稱名或稱氏或稱子或稱人名分所由正是非所由定禮義所由出皆斷自聖人游夏不能與也狥時之所稱而稱之豈其然乎八月乙未地震冬公如晉至河有疾乃復昭公兩朝于晋而一見止五如晋而四不得入焉今此書有疾乃復殺恥也以周公之胄千乗之君執幣帛修兩君之好而不見納斯亦可恥矣有恥而後能知憤知憤而後能自强自强而後能為善為善而後能立身立身而後能行其政令保其國家矣昭公内則受制於權臣外則見陵於方伯此正憂患疢疾有徳慧智術保生免死之時也而安於屈辱甘處㣲弱無憤恥自强之心其失國出奔死於境外其自取之哉二年魯仲孫貜卒是為孟僖子晉士彌牟逆魯叔孫婼于箕禮而歸之晉侯使士彌牟涖問周故於介衆晉人乃辭子朝不納其使日食魯梓慎曰将水叔孫婼曰旱也日過分而陽猶不克克必甚能無旱乎鄭伯如晉游吉相見范鞅曰抑人有言曰􅊔不䘏其緯而憂宗周之隕為将及焉今王室實蠢蠢焉吾子其早圖之詩云瓶之罄矣惟罍之恥王室之不寧晉之耻也鞅懼乃徴㑹於諸侯期以明年楚王為舟師以畧吳疆沈尹戌曰此行也楚必亡邑不撫民而勞之吳不動而速之吳踵楚而疆埸無備邑能無亡乎王及圉陽而還吳王踵其後滅巢及鍾離沈尹戌曰王一動而亡二姓之帥幾如是而不及郢詩曰誰生厲階至今為梗其王之謂乎孔仲尼謂南宫說曰吾聞周室柱下史老耼傳古今之道禮樂之原明道徳之歸将往師焉說言於魯侯以車一乗馬一疋資孔子行至周見老耼歸三日不談弟子問曰夫子何規老耼孔子曰吾乃今于是乎見龍龍合而成體散而成章乗乎雲氣而養乎隂陽余又何規老耼哉子貢曰然則人固有尸居而龍見雷聲而淵黙發動如天地者乎仲尼歴觀於郊社太廟太廟右階之前有金人焉三緘其口背有銘曰古之慎言人也戒之哉無多言多言多敗無多事多事多患勿謂何傷其禍将長勿謂不聞神其伺人㳙㳙不壅終為江河毫末不札将尋斧柯强梁者不得其死好勝者必遇其敵盜憎主人民惡其上君子知天下之不可上也故下之知衆人之不可先也故後之戒之哉仲尼謂弟子曰識之仲尼問禮於老耼耼悉告仲尼辭而去耼曰富貴者送人以財仁者送人以言吾竊仁者之號請送子以言乎良賈深藏若虚盛徳容貌若愚夫聰明廣大而近於死以危其身者必好議人與發人之惡者也為人子者無以有已為人臣者無以有已仲尼復歸于魯老耼之先老彭為殷守藏史或曰耼楚人姓李名耳字伯陽老耼諡也晚年去周西出關關尹問道焉耼與之言其畧曰聖人處無為之事行不言之教為而不恃功成不居夫惟不居是以不去又曰聖人之治常使民無知無欲使夫知者不敢為也為無為則無不治矣又曰谷神不死是為𤣥牝𤣥牝之門是謂天地根綿綿若存用之不勤又曰功成名遂身退天之道又曰能知古始是謂道紀又曰絶巧棄利盜賊無有見素抱朴少私寡欲又曰聖人抱一為天下式夫唯不爭故天下莫能與之爭又曰善行無轍迹善言無瑕謫善計不用籌算善閉無關鍵而不可開善結無繩約而不可解是以聖人常善救人故無棄人常善救物故無棄物又曰天下神器不可為也為者敗之執者失之是以聖人去甚去奢去泰又曰以道佐人主者不以兵强天下其事好還師之所處荆棘生焉大軍之後必有㓙年兵者不祥之器不得已而用之恬淡為上勝而不美而美之也是樂殺人者不可得志於天下吉事尚左㓙事尚右偏将軍處左上将軍處右言以䘮禮處之也又曰知人者智自知者明知足者富强行者有志不失其所者久死而不亡者夀又曰将欲噏之必固張之将欲弱之必固强之将欲廢之必固興之将欲奪之必固與之柔弱勝剛強魚不可脫於淵國之利器不可以示人又曰失道而後徳失徳而後仁失仁而後義失義而後禮禮者忠信之薄而亂之首又曰甚愛必大費多藏必厚亡知足不辱知止不殆又曰大直若屈大巧若拙大辨若訥又曰天下有道郤走馬以糞天下無道戎馬生於郊罪莫大於可欲禍莫大於不知足咎莫大於欲得故知足之足常足矣又曰為學日益為道日損以至於無為無為而無不為取天下常以無事又曰法令滋章盜賊多有故聖人云我無為而民自化我無事而民自富我好靜而民自正我無欲而民自樸又曰禍兮福所倚福兮禍所伏又曰治之於未亂慎終如始則無敗事又曰古之善為道者非以明民将以愚之故以智治國國之賊又曰江海所以為百谷王者以其善下之故能為百谷王是以聖人欲上人以其言下之欲先人以其身後之是以處上而人不重處前而人不害是以天下樂推而不厭以其不爭故天下莫能與之爭又曰我有三寳一曰慈二曰儉三曰不敢為天下先夫慈故能勇儉故能廣不敢為天下先故能成器長又曰天之道其猶張弓乎髙者抑之下者舉之有餘者損之不足者與之天之道損有餘補不足人之道則不然損不足以奉有餘孰能以有餘奉天下唯有道者又曰柔勝剛弱勝强是以聖人言受國之垢是謂社稷主受國之不祥是謂天下王又曰天道無親常與善人又曰天下之道利而不害聖人之道為而不爭經曰二十有四年春王正月丙戍仲孫貜卒叔孫婼至自晉大夫執而致則名此獨書其姓氏何賢之也叔孫婼以禮立身而不屈于强國以忠事主而不順於强臣此社稷之衞魯之良大夫也使昭公稍有動心忍性强於為善之意舉國以聽豈其死于乾侯觀意如之稽顙于昭子叔孫之以逐君責意如其事可見矣及意如有異志而昭子使祝宗祈死所謂知其無可奈何安之若命者故婼至自晋特以姓氏書其死也公雖在外而特耆日以卒之所以表其節為後世勸也夏五月乙未朔日有食之秋八月大雩丁酉把伯郁釐卒冬吳滅巢巢楚之附庸實邑之也書吳入州來著陵楚之漸書吳滅巢著入郢之漸四鄰封境之守既不能制則封境震矣四鄰國都之守既不能保則國都危矣故沈尹戌以此為亡郢之始也春秋内失地不書明此為有國之大罪外取滅皆書明見取滅者不能有其土地人民則不君矣故諸侯之寳三以土地為首葬把平公三年魯季公若之姊為小邾夫人生宋元夫人曹氏生子以妻季孫意如叔孫婼聘于宋且為之逆公若謂曹氏勿與魯将逐之曹氏告公公告樂祁祁曰與之如是魯君必出政在季氏三世矣魯君䘮政四公矣無民而能逞志者未之有也國君是以鎮撫其民魯君失民焉得逞其志晉㑹諸侯之大夫以謀王室趙鞅令曰具戌輸粟明年納王魯有鸜鵒來巢者師已曰文武之世童謡有之鸜鵒之巢逺哉遥遥稠父喪勞宋父以驕今來巢其将及乎仲尼将去魯曰遲遲吾行也遂如齊有哭於道而哀者使人問之曰我吾丘子也少而好學周行天下比及歸而親死夫樹欲靜而風不止子欲養而親不待徃而不來者時也不可再見者親也吾将死矣遂赴於水仲尼愀然曰弟子戒之門人歸養者十三人仲尼至齊齊侯問政孔子對曰君君臣臣父父子子君曰善哉信如君不君臣不臣父不父子不子雖有粟吾得而食諸舍孔子於外館聞韶音食不知肉味嘆曰不圖為樂之至於斯也魯大雩魯季公若郈昭伯臧昭伯有怨於季孫意如公若獻弓於公為且與之出射於外而謀去季氏公為告公公以告臧孫臧孫以難告郈孫郈孫以可勸告子家羈對曰讒人以君僥倖事若不克君受其名不可為也舍民數世以求克事不可必也且政在焉其難圗也公退之辭曰臣與聞命矣言若洩臣不獲死乃館於公公居于長府伐季氏殺意如之弟公之于門遂入之意如登墻而請之曰君不察臣之罪使有司討臣以干戈臣請待于沂上以察罪弗許請囚於費弗許請以五乗亡弗許子家羈曰君其許之政自之出乆矣隱民多取食焉為之徒者衆矣日入慝作弗可知也衆怒不可蓄也蓄而弗治将藴蘊蓄民将生心生心同求将合君必悔之弗聼郈孫曰必殺之公使逆仲孫何忌叔孫氏司馬鬷戾言於其衆曰若之何莫對又曰我家臣也不敢知國凢有季氏與無於我孰利皆曰無季氏是無叔孫氏也遂帥以救季氏公徒釋甲執氷而踞遂逐之仲孫何忌使登而望見叔孫氏之旌乃殺郈孫伐公徒子家子曰諸臣偽劫君者而負罪以出君止意如之事君也不敢不改公曰余不忍也與臧孫如墓謀遂行孫於齊次于陽州齊侯唁魯侯于野井魯叔孫舍卒左師展将以魯侯乗馬歸公徒執之宋公以魯侯故如晉薨於曲棘子欒嗣經曰二十有五年春叔孫婼如宋夏叔詣會晉趙鞅宋樂大心衛北宫喜鄭游吉曹人邾人滕人薛人小邾人于黄父按左氏鄭子大叔如晋范獻子曰若王室何對曰王室之不寧大國之憂晋之耻也吾子其早圖之獻子懼乃徴㑹於諸侯㑹于黄父謀王室也趙簡子令諸侯之大夫輸王粟具戍人将納王夫以王猛之無寵單旗劉蚠之屢敗敬王初立子朝之衆召伯奐南宫嚚甘桓公之黨疑若多助之在朝也然㑹于黄父凡十國而諸侯之大夫無異議焉是知邪不勝正乆矣猶有寵愛庶孽配適奪正至於滅亡而不寤者不知幽王晋獻之父子亦何足效哉然則黄父之㑹王事也而無美辭何也王室不靜亦惟友邦冡君克修厥職以綏定王都非異人任亦何美之有免於譏貶足矣此春秋以正待人之體也後世以濫賞報臣子所當為之事為臣子者亦受而不辭失此義矣有鸜鵒來巢傳曰鸜鵒不踰濟濟水東北㑹于汶魯在汶南其所無也故書有巢者去穴而巢隂居陽位臣逐君象也鸜鵒宜穴處於下而巢居於上季孫宜臣順於家而主祭於國反常為異之兆能以徳消則無其應矣或曰此公子宋有國之祥矣秋七月上辛大雩季辛又雩左氏以再雩為旱甚聖人書此者以志禦災之非道而區區於禱祠之末也昭公之時雨雹地震四見於經旱乾為虐相繼而起有鸜鵒來巢異之甚也季辛又雩災之甚也考諸列位則國有人焉觀諸天時則猶有眷顧之心未終棄也若反身修徳信用忠賢灾異之來必可禦矣昔髙宗肜日雉升鼎耳異亦甚矣聼於祖己克正厥事故能嘉靖殷邦享國長乆宣王之時旱魃蘊隆災亦甚矣側身修行遇災而懼故能興衰撥亂王化復行此皆以人勝天以徳消變之驗也昭公至是猶不知畏罔克自省而求于禱祠之末将能勝乎故特書此以為後世鍳九月己亥公孫于齊次于陽州内出奔稱孫隠也次于陽州待齊命也昭公欲伐季氏子家子曰季氏得民已乆君無多辱公不從意如登䑓而請待於沂上以察罪弗許請囚于費弗許請以五乗亡弗許子家子曰君其許之政自之出乆矣隠民多取食焉為之徒者衆矣日入慝作弗可知也弗聽叔孫氏之司馬陷西北隅以入孟氏殺郈昭伯遂伐公徒公與臧孫如墓謀遂行以君伐臣曷為不勝魯自東門遂殺適立庶魯君於是乎失政禄去公室政在季氏於此君也四公矣作三軍盡征其一舍中軍兼有其二民賦入於其家半矣受命救台也遂入鄆帥師取卞也不以聞君政在其手專矣行父片言而東門氏逐南蒯一動而公子憖奔魯之羣臣無敢忠於公室而獻謀者所謂屯難之時也在易屯之六五曰屯其膏小貞吉大貞㓙象曰屯其膏施未光也昭公不明乎消息盈虚之理正身率徳擇任忠賢待時修政不忍一朝之忿求逞其私欲而以羣小謀之其及也宜矣齊侯唁公于野井唁者弔也生事曰唁死事曰弔齊侯唁公于野井以遇禮相見孔子曰其禮與其詞足觀矣然則何以失國而不反乎禮者有本末正身治人禮之本也威儀文辭禮之末也昭公䘮齊歸無慼容而不顧娶孟子為夫人而不命政令在家而不能取有子家子之賢而不能用而屑屑焉習儀以亟能有國乎雖齊侯來唁其禮與辭是矣而方伯連帥之職則未修也又豈所以為禮其言曰自莒疆以西請致千社将帥敝賦以從而子家子曰失魯而以千社為臣誰與之立且齊君無信不如早之晋書曰唁公亦明其無納君之實譏之也冬十月戊辰叔孫婼卒十有一月己亥宋公佐卒于曲棘按左氏宋元公為公故如晋卒于曲棘宋地也宋元公之夫人曹氏子妻意如或謂曹氏勿與魯捋逐之曹氏告元公公告樂祁祁曰與之如是魯君必出無民而能逞其志者未之有也魯君失民乆矣然則宋元意如之外舅也不此之顧而求欲納公是以正倫恤患為心而不匿其私親之惡者也其賢於當時諸侯逺矣故雖卒于封内而特書其地以别之也十有二月齊侯取鄆鄆魯地也直書齊侯取之何也齊不自取而為公取鄆使居之也昭公出奔經書次于陽州見公于魯未絶而季氏逐君為不臣及書齊侯取鄆則見公已絶於魯而逐于季氏為不君君者有其土地人民以奉宗廟之典籍也已不能有而他人是保則不君矣春秋之義欲為君盡君道欲為臣盡臣道各守其職而不渝也昭公失君道季氏為亂臣各渝其職而不守矣而為後世戒深切著明矣皇王大紀卷五十九

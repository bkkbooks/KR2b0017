body:
  text: 皇王大紀卷六十二宋胡宏撰三王紀敬王下象象曰山上有澤咸君子以虛受人咸其拇志在外也雖㓙居吉順不害也咸其股亦不處也志在隨人所執下也貞吉悔亡未感害也憧憧徃來未光大也咸其脢志末也咸其輔頰舌滕口説也象曰雷風恒君子以立不易方浚恒之㓙始求深也九二悔亡能久中也不恒其德无所容也久非其位安得禽也婦人貞吉從一而終也夫子制義從婦㐫也振恒在上大无功也象曰天下有山遯君子以逺小人不惡而嚴遯尾之厲不徃何灾也執用黄牛固志也係遯之厲有疾憊也畜臣妾吉不可大事也君子好遯小人否也嘉遯貞吉以正志也肥遯无不利无所疑也象曰雷在天上大壯君子以非禮弗履壯于趾其孚窮也九二貞吉以中也小人用壯君子罔也藩決不羸尚徃也䘮羊于易位不當也不能退不能遂不詳也艱則吉咎不長也象曰明出地上晉君子以自昭明德晉如摧如獨行正也裕无咎未受命也受兹介福以中正也衆允之志上行也鼫䑕貞厲位不當也失得勿恤徃有慶也維用伐邑道未光也象曰明入地中明夷君子以莅衆用晦而明君子于行義不食也六二之吉順以則也南狩之志乃大得也入于左腹獲心意也箕子之貞明不可息也初登于天照四國也後入于地失則也象曰風自火出家人君子以言有物而行有恒閑有家志未變也六二之吉順以巽也家人嗃嗃未失也婦子嘻嘻失家節也富家大吉順在位也王假有家交相愛也威如之吉反身之謂也象曰上火下澤睽君子以同而異見惡人以辟咎也遇主于巷未失道也見輿曵位不當也无初有終遇剛也交孚无咎志行也厥宗噬膚徃有慶也遇雨之吉羣疑亡也象曰山上有水蹇君子以反身修德徃蹇來譽宜待也王臣蹇蹇終无尤也徃蹇來反内喜之也徃蹇來連當位實也大蹇朋來以中節也徃蹇來碩志在内也利見大人以從貴也象曰雷雨作解君子以赦過宥罪剛柔之際義无咎也九二貞吉得中道也負且乗亦可醜也自我致戎又誰咎也解而拇未當位也君子有解小人退也公用射隼以解悖也象曰山下有澤損君子以懲忿窒慾已事遄徃尚合志也九二利貞中以為志也一人行三則疑也損其疾亦可喜也六五元吉自上祐也弗損益之大得志也象曰風雷益君子以見善則遷有過則改元吉无咎下不厚事也或益之自外來也益用㓙事固有之也告公從以益志也有孚恵心勿問之矣惠我德大得志也莫益之偏辭也或擊之自外來也象曰澤上于天夬君子以施禄及下居德則忌不勝而徃咎也有戎勿恤得中道也君子夬夬終无咎也其行次且位不當也聞言不信聰不明也中行无咎中未光也无號之㓙終不可長也象曰天下有風姤后以施命誥四方繫于金柅柔道牽也包有魚義不及賔也其行次且行未牽也无魚之㓙逺民也九五含章中正也有隕自天志不舍命也姤其角上窮吝也象曰澤上於地萃君子以除戎器戒不虞乃亂乃萃其志亂也引吉无咎中未變也徃无咎上巽也大吉无咎位不當也萃有位志未光也齎咨涕洟未安上也象曰地中生木升君子以順德積小以髙大允升大吉上合志也九二之孚有喜也升虛邑无所疑也王用享于岐山順事也貞吉升階大得志也冥升在上消不富也象曰澤无水困君子以致命遂志入于幽谷幽不明也困于酒食中有慶也據于蒺藜乗剛也入于其宫不見其妻不祥也來徐徐志在下也雖不當位有與也劓刖志未得也乃徐有說以中直也利用祭祀受福也困于葛藟未當也動悔有悔吉行也象曰木上有水井君子以勞民勸相井泥不食下也舊井无禽時舍也井谷射鮒无與也井渫不食行惻也求王明受福也井甃无咎修井也寒泉之食中正也元吉在上大成也象曰澤中有火革君子以治厯明時鞏用黄牛不可以有爲也已日革之行有嘉也革言三就又何之矣改命之吉信志也大人虎變其文炳也君子豹變其文蔚也小人革面順以從君也象曰木上有火鼎君子以正位凝命鼎顛趾未悖也利出否以從貴也鼎有實愼所之也我仇有疾終无尤也鼎耳革失其義也覆公餗信如何也鼎黄耳中以爲實也玉鉉在上剛柔節也象曰洊震雷君子以恐懼修省震來虩虩恐致福也笑言啞啞後有則也震來厲乗剛也震蘇蘇位不當也震遂泥未光也震徃來厲危行也其事在中大无喪也震索索中未得也雖㓙无咎畏鄰戒也象曰兼山艮君子以思不出其位艮其趾未失正也不拯其隨未聽退也艮其限危薰心也艮其身止諸躬也艮其輔以中正也敦艮之吉以厚終也象曰山上有木漸君子以居賢徳善俗小子之厲義无咎也飲食衎衎不素飽也夫征不復離羣醜也婦孕不育失其道也利用禦㓂順相保也或得其桷順以巽也終莫之勝吉得所願也其羽可用爲儀吉不可亂也象曰澤上有雷歸妺君子以永終知敝歸妺以娣以恒也跛能履吉相承也利幽人之貞未變常也歸妺以須未當也愆期之志有待而行也帝乙歸妺不如其娣之袂良也其位在中以貴行也上六无實承虚筐也象曰雷電皆至豐君子以折獄致刑雖旬无咎過旬災也有孚發若信以發志也豐其沛不可大事也折其右肱終不可用也豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也六五之吉有慶也豐其屋天際翔也闚其户閴其无人自藏也象曰山下有火旅君子以明愼用刑而不留獄旅瑣瑣志窮災也得童僕貞終无尤也旅焚其次亦以傷矣以旅與下其義喪也旅于處未得位也得其資斧心未快也終以譽命上逮也以旅在上其義焚也喪牛于易終莫之聞也象曰隨風巽君子以申命行事進退志疑也利武人之貞志治也紛若之吉得中也頻巽之吝志窮也田獲三品有功也九五之吉位正中也巽在牀下上窮也喪其資斧正乎㓙也象曰麗澤兊君子以朋友講習和兊之吉行未疑也孚兊之吉信志也來兊之㓙位不當也九四之喜有慶也孚于剥位正當也上六引兊未光也象曰風行水上渙先王以享于帝立廟初六之吉順也渙奔其机得願也渙其躬志在外也渙其羣元吉光大也王居无咎正位也渙其血遠害也象曰澤上有水節君子以制數度議徳行不出户庭知通塞也不出門庭㓙失時極也不節之嗟又誰咎也安節之亨承上道也甘節之吉居位中也苦節貞㐫其道窮也象曰澤上有風中孚君子以議獄緩死初九虞吉志未變也其子和之中心願也或鼓或罷位不當也馬匹亡絶類上也有孚攣如位正當也翰音登于天何可長也象曰山上有雷小過君子以行過乎恭䘮過乎哀用過乎儉飛鳥以㓙不可如何也不及其君臣不可過也從或戕之㓙如何也弗過遇之位不當也徃厲必戒終不可長也密雲不雨已上也弗遇過之已亢也象曰水在火上既濟君子以思患而豫防之曳其輪義无咎也七日得以中道也三年克之憊也終日戒有所疑也東鄰殺牛不如西鄰之時也實受其福吉大來也濡其首厲何可久也象曰火在水上未濟君子以愼辨物居方濡其尾亦不知極也九二貞吉中以行正也未濟征㓙位不當也貞吉悔亡志行也君子之光其暉吉也飲酒濡首亦不知節也文言曰元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事君子行此四徳者故曰乾元亨利貞初九曰潜龍勿用何謂也子曰龍徳而隱者也不易乎世不成乎名遯世无悶不見是而無悶樂則行之憂則違之確乎其不可拔濳龍也九二曰見龍在田利見大人何謂也子曰龍徳而正中者也庸言之信庸行之謹閑邪存其誠善世而不伐徳博而化易曰見龍在田利見大人君徳也九三曰君子終日乾乾夕惕若厲无咎何謂也子曰君子進徳脩業忠信所以進徳也脩辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危无咎矣九四曰或躍在淵无咎何謂也子曰上下无常非爲邪也進退无恒非離羣也君子進徳脩業欲及時也故无咎九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也上九曰亢龍有悔何謂也子曰貴而无位髙而无民賢人在下位而无輔是以動而有悔也濳龍勿用下也見龍在田時舍也終日乾乾行事也或躍在淵自試也飛龍在天上治也亢龍有悔窮之災也乾元用九天下治也濳龍勿用陽氣濳藏見龍在田天下文明終日乾乾與時偕行或躍在淵乾道乃革飛龍在天乃位乎天徳亢龍有悔與時偕極乾元用九乃見天則乾元者始而亨者也利貞者性情也乾始能以美利利天下不言所利大矣哉大哉乾乎剛徤中正純粹精也六爻發揮旁通情也時乗六龍以御天也雲行雨施天下平也君子以成徳爲行日可見之行也潛之爲言也隱而未見行而未成是以君子弗用也君子學以聚之問以辨之寛以居之仁以行之易曰見龍在田利見大人君徳也九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危无咎矣九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故无咎夫大人者與天地合其徳與日月合其明與四時合其序與鬼神合其吉㓙先天而天弗違後天而奉天時天且弗違而况於人乎况於鬼神乎亢之爲言也知進而不知退知存而不知亡知得而不知喪其唯聖人乎知進退存亡而不失其正者其唯聖人乎文言曰坤至柔而動也剛至靜而徳方後得主而有常含萬物而化光坤道其順乎承天而時行積善之家必有餘慶積不善之家必有餘殃臣弑其君子弑其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅氷至盖言順也直其正也方其義也君子敬以直内義以方外敬義立而徳不孤直方大不習无不利則不疑其所行也陰雖有美含之以從王事弗敢成也地道也妻道也臣道也地道无成而代有終也天地變化草木蕃天地閉賢人隱易曰括囊无咎无譽盖言謹也君子黄中通理正位居體美在其中而暢於四支發於事業美之至也隂疑於陽必戰爲其嫌於无陽也故稱龍焉猶未離其類也故稱血焉夫𤣥黄者天地之雜也天𤣥而地黄上繫天尊地卑乾坤定矣卑髙以陳貴賤位矣動靜有常剛柔㫁矣方以類聚物以羣分吉㓙生矣在天成象在地成形變化見矣是故剛柔相摩八卦相盪鼔之以雷霆潤之以風雨日月運行一寒一暑乾道成男坤道成女乾知大始坤作成物乾以易知坤以簡能易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之徳可大則賢人之業易簡而天下之理得矣天下之理得而成位乎其中矣聖人設卦觀象繫辭焉而明吉㓙剛柔相推而生變化是故吉㓙者失得之象也悔吝者憂虞之象也變化者進退之象也剛柔者晝夜之象也六爻之動三極之道也是故君子所居而安者易之序也所樂而玩者爻之辭也是故君子居則觀其象而玩其辭動則勸其變而玩其占是以自天祐之吉无不利彖者言乎象者也爻者言乎變者也吉㓙者言乎其失得也悔吝者言乎其小疵也无咎者善補過也是故列貴賤者存乎位齊小大者存乎卦辨吉㓙者存乎辭憂悔吝者存乎介震无咎者存乎悔是故卦有小大辭有險易辭也者各指其所之易與天地凖故能彌綸天地之道仰以觀於天文俯以察於地理是故知幽明之故原始反終故知死生之説精氣為物遊魂爲變是故知鬼神之情狀與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神无方而易无體一隂一陽之謂道繼之者善也成之者性也仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣顯諸仁藏諸用鼔萬物而不與聖人同憂盛徳大業至矣哉富有之謂大業日新之謂盛徳生生之謂易成象之謂乾效法之謂坤極數知來之謂占通變之謂事隂陽不測之謂神夫易廣矣大矣以言乎逺則不禦以言乎邇則靜而正以言乎天地之間則備矣夫乾其靜也專其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉廣大配天地變通配四時隂陽之義配日月易簡之善配至徳子曰易其至矣乎夫易聖人所以崇徳而廣業也知崇禮卑崇效天卑法地天地設位而易行乎其中矣成性存存道義之門聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以斷其吉㓙是故謂之爻言天下之至賾而不可惡也言天下之至動而不可亂也擬之而後言議之而後動擬議以成其變化鳴鶴在隂其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎言出乎身加乎民行發乎邇見乎遠言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎同人先號咷而後笑子曰君子之道或出或處或黙或語二人同心其利斷金同心之言其臭如蘭初六藉用白茅无咎子曰苟錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之爲物薄而用可重也慎斯術也以徃其无所失矣勞謙君子有終吉子曰勞而不伐有功而不徳厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也亢龍有悔子曰貴而无位髙而無民賢人在下位而无輔是以動而有悔也不出戸庭无咎子曰亂之所生也則言語以爲階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也子曰作易者其知盜乎易曰負且乗致㓂至負也者小人之事也乗也者君子之器也小人而乗君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乗致㓂至盜之招也大衍之數五十其用四十有九分而爲二以象兩掛一以象三揲之以四以象四時歸奇於扐以象閠五嵗再閠故再扐而後掛天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也乾之䇿二百一十有六坤之䇿百四十有四凡三百有六十當期之日二篇之䇿萬有一千五百二十當萬物之數也是故四營而成易十有八變而成卦八卦而小成引而伸之觸類而長之天下之能事畢矣顯道神徳行是故可與酬酢可與祐神矣子曰知變化之道者其知神之所爲乎易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占是以君子將有爲也將有行也問焉而以言其受命也如嚮无有遠近幽深遂知來物非天下之至精其孰能與於此參伍以變錯綜其數通其變遂成天地之文極其數遂成天下之象非天下之至變其孰能與於此易无思也无爲也寂然不動感而遂通天下之故非天下之至神其孰能與於此夫易聖人之所以極深而研幾也唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至子曰易有聖人之道四焉者此之謂也子曰夫易何爲者也夫易開物成務冒天下之道如斯而已者也是故聖人以通天下之志以定天下之業以斷天下之疑是故蓍之徳圓而神卦之徳方以知六爻之義易以貢聖人以此洗心退藏於密吉㐫與民同患神以知來知以藏徃其孰能與於此哉古之聰明睿知神武而不殺者夫是以明於天之道而察於民之故是興神物以前民用聖人以此齋戒以神明其徳夫是故闔户謂之坤闢戸謂之乾一闔一闢謂之變徃來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神是故易有太極是生兩儀兩儀生四象四象生八卦八卦定吉㓙吉㓙生大業是故法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月崇髙莫大乎富貴備物致用立成噐以爲天下利莫大乎聖人探賾索隠鈎深致遠以定天下之吉㓙成天下之亹亹者莫大乎蓍龜是故天生神物聖人則之天地變化聖人效之天垂象見吉㓙聖人象之河出圖洛出書聖人則之易有四象所以示也繫辭焉所以告也定之以吉㓙所以斷也易曰自天祐之吉无不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉无不利也子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情僞繫辭焉以盡其言變而通之以盡利鼔之舞之以盡神乾坤其易之緼邪乾坤成列而易立乎其中矣乾坤毁則无以見易易不可見則乾坤或幾乎息矣是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而措之天下之民謂之事業是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以斷其吉㓙是故謂之爻極天下之賾者存乎卦鼔天下之動者存乎辭化而裁之存乎變推而行之存乎通神而明之存乎其人黙而成之不言而信存乎徳行下繫八卦成列象在其中矣因而重之爻在其中矣剛柔相推變在其中矣繫辭焉而命之動在其中矣吉㓙悔吝者生乎動者也剛柔者立本者也變通者趣時者也吉㓙者貞勝者也天地之道貞觀者也日月之道貞明者也天地之動貞夫一者也夫乾確然示人易矣夫坤隤然示人簡矣爻也者效此者也象也者像此者也爻象動乎内吉㓙見乎外功業見乎變聖人之情見乎辭天地之大徳曰生聖人之大寳曰位何以守位曰仁何以聚人曰財理財正辭禁民爲非曰義古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身遠取諸物於是始作八卦以通神明之徳以類萬物之情作結繩而爲網罟以佃以漁蓋取諸離包犧氏没神農氏作斵木爲耜揉木爲耒耒耨之利以教天下蓋取諸益日中爲市致天下之民聚天下之貨交易而退各得其所盖取諸噬嗑神農氏没黄帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天祐之吉无不利黄帝堯舜垂衣裳而天下治盖取諸乾坤刳木爲舟剡木爲楫舟楫之利以濟不通致遠以利天下盖取諸渙服牛乗馬引重致遠以利天下盖取諸隨重門擊柝以待暴客盖取諸豫斷木爲杵掘地爲臼臼杵之利萬民以濟盖取諸小過弦木爲弧剡木爲矢弧矢之利以威天下蓋取諸睽上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯古之葬者厚衣之以薪葬之中野不封不樹喪期无數後世聖人易之以棺槨蓋取諸大過上古結䋲而治後世聖人易之以書契百官以治萬民以察蓋取諸夬皇王大紀卷六十二

body:
  text: 皇王大紀卷五十五宋胡宏撰三王紀靈王二十七年冬魯無氷衛人討寧氏之黨石惡奔晉衛人立其從子圃以守石氏之祀邾子朝于魯六月魯旱大雩魯仲孫羯如晉告將如楚也齊慶封好田而嗜酒與其子舍政則以其內遷于盧蒲嫳氏易內而飲酒數日國遷朝焉使諸因莊公之難而亡者得反於是盧蒲癸王何反臣於舍有寵使執寢戈而先後之慶封田于萊嘗於太公之廟慶舍蒞事癸自後刺舍何解其左肩而死齊侯懼鮑國曰羣臣為君故也陳須無以齊侯歸如內宫慶封歸遇告亂者伐西門不克伐北門克之入伐內宫弗克反陳于嶽請戰弗許遂出奔魯齊人讓之慶封奔吳吳王與之朱方聚其族焉而居富於其舊魯孟椒謂叔孫豹曰天殆富淫人慶封又富矣豹曰善人富謂之賞淫人富謂之殃天其殃之也其將聚而殱旃有黑氣麗于天如日者五晉叔向來聘發幣於大夫及單靖公公享之叔向退而告其老曰昔史佚有言曰動莫如敬居莫若儉德莫若讓事莫若咨單子有四美子孫必蕃後世不忘九月宋公魯侯朝于楚王崩諡曰靈王子貴立楚王昭卒諡曰康子麋嗣王子圍為令尹齊人改葬莊公尸崔杼於市魯侯行及漢聞楚喪欲反叔仲帶曰我楚國之為豈為一人行也孟椒曰君子有逺慮小人從邇飢寒之不恤誰遑恤其後不如姑歸也叔孫豹曰叔仲子專之矣孟子始學者也榮駕鵝曰逺圖者忠也魯侯遂行向戍曰我一人之為非為楚也飢寒之不恤誰能恤楚姑歸而息民待其立君而為之備宋公遂反經曰二十有八年春無氷夏衛石惡出奔晉邾子來朝秋八月大雩仲孫羯如晉冬齊慶封來奔十有一月公如楚十有二月甲寅天王崩乙未楚子昭卒景王元年冬十一月魯侯臨楚喪楚人曰必親襲魯人曰非禮也楚人強之巫先祓柩楚人悔之古者君臨臣喪以巫祝桃茢執戈惡之也所以異於生也喪有死之道焉先王之所難言也楚葬其君魯陳鄭許之君送至于西門之外諸侯之大夫皆至于墓魯侯還及方城季孫宿取卞使公冶問璽書追而與之曰聞守者將叛臣帥徒以討既得之矣敢告公冶致使而退及舍而後聞取卞公曰欲之而言叛祗見疏也吾不可以入乎對曰君實有國誰敢違君公欲無入榮駕鵝賦式微乃歸公冶致邑終身不入季氏曰欺其君而使余葬靈王鄭上卿有事使印段往良霄曰弱不可公孫舍之曰與其莫往弱不猶愈乎遂使往衛侯薨諡曰獻公子惡嗣吳人伐越獲俘焉以為閽使守舟吳王觀舟閽以刀弒之弟夷末嗣晉侯把出也故荀盈會諸國之大夫城把鄭遊吉曰甚乎其城杞也不恤宗周之闕而夏肄是屏其棄諸姬亦可知也諸姬是棄其誰歸之吉聞之棄同即異是謂離德詩曰協比其鄰婚姻孔云晉不鄰矣其誰云之晉士鞅聘于魯拜城把也魯侯享之展莊叔執幣射者三耦公臣不足取於家臣晉司馬侯如魯治杞田弗盡歸也悼夫人愠侯曰虞虢焦滑霍揚韓魏皆姬姓也晉是以大若非侵小將何所取武獻以下兼國多矣誰得治之杞夏餘也而即東夷魯周公之後也而睦於晉以杞封魯猶可而何有焉把伯朝魯盟而歸吳王使公子札聘于諸侯至魯見叔孫豹説之曰子好善而不能擇人為魯宗卿而不慎舉禍必及子至齊説晏嬰曰子速納邑與政乃免於難齊國之政將有所歸難未歇也至鄭見子産如舊相識曰鄭之執政侈難將至矣適衛説蘧瑗史鰌公子荆曰衛多君子未有患也自衛如晉將宿于戚聞鐘聲焉曰夫子獲罪於君以在此懼猶不足而何樂焉君又在殯而可以樂乎遂去之林父聞之終身不聽琴瑟至晉説趙武韓厥魏舒曰晉國其萃於三族乎將行謂叔向曰君侈而多良大夫皆富政將在家吾子好直必思自免於難衛葬其君齊公孫蠆公孫竈放其大夫髙止於北燕止好以事自為功且專故難及之止子豎以盧叛閭丘嬰帥師圍盧豎曰茍使髙氏有後請致邑齊人立傒之曽孫酀良敬仲也豎致盧而出奔晉魯仲孫羯如晉經曰二十有九年春王正月公在楚嵗之首月公如他國者有矣此猶書公在楚者外為夷狄所制以俟其葬而不得歸內為強臣所逼欲擅其國而不敢入故特於嵗首朝正之時而書曰公在楚使後世臣子戴天履地視君之危且困者必有天威不違顔咫尺食坐見于羮墻之意而不以頃刻忘也此義一行豈敢有顧其身與妻子與其家而不恤國朋附權臣以圖富貴而背其君者也夏五月公至自楚庚午衛侯衎卒閽弒吳子餘祭穀梁子曰閽門者寺人也不稱名姓閽不得齊於人不稱其君閽不得君其君也禮君不使無恥不近刑人不狎敵不邇怨賤人非所貴也貴人非所刑也刑人非所近也舉至賤而加之吳子吳子近刑人也閽弒吳子餘祭仇之也左氏以為伐越獲俘焉以為閽使守舟吳子觀舟閽以刀弒之亦邇怨之失也仲孫羯會晉荀盈齊髙止宋華定衛世叔儀鄭公孫段曹人莒人滕人薛人小邾人城把古之建國立家者必親九族然有父族而後及母族有母族而後及妻族此葛藟之詩所為戚也晉主夏盟令行中國平公不能修文襄悼公之業尊王室恤宗周之闕而夏肄是屏輕棄諸姬可謂知本乎平王惟不撫其民而逺屯戍於母家揚之水所以不得列于雅也城杞之役亦不待貶絶而可見矣晉侯使士鞅來聘把子來盟吳子使札來聘札者吳之公子何以不稱公子辭國而生亂者札為之也故因其來聘而貶之示法按吳子壽夢有子四人長曰諸樊次曰餘祭次曰夷末札其季子也壽夢欲立以為嗣札辭然後立諸樊既除喪則致國于季子季子又辭而去之諸樊乃舍其子而立弟約以次傳必及季子故諸樊卒而餘祭立餘祭卒而夷未立夷未卒則季子宜受命以安社稷成父兄之志矣乃徇匹夫之介節辭位以逃夷末之子僚僚既立諸樊子光曰先君所以不與子國而與弟者凡為季子爾將從先君之命歟則季子宜有國也如不從先君之命則我宜立僚烏得為君於是使專諸刺僚而致國乎季子季子不受去延陵終身不入吳國故曰貶之示法焉或謂先聖賢夷齊季子辭位獨不為賢而奚貶乎曰叔齊之德不越伯夷孤竹捨長而立幼私意也諸樊兄弟父子無及季札之賢也其父兄眷春而欲立札公心也故季子辭立而生亂為春秋之所貶或曰世衰道微暴行交作臣篡其君者有之子弒其父者有之季子於是焉而辭位則將使聞其風者貪夫亷爭夫讓而篡弒奪攘之禍損矣其於名教豈不有補何貶之深也曰春秋逹節而不守者也昔太伯奔吳而不反季歷嗣位而不辭武王繼統受命作周亦不以配天之業讓伯邑考官天下也彼王僚無季歷之賢武王之聖而季子為太伯之讓豈至德乎使爭弒禍興覆師喪國其誰階之也若季子之辭位守節立名全身自牧則可矣槩諸聖王之道則過矣中庸曰道之不行也我知之矣季子所謂賢且智過而不得中者也使由於季歷武王之義其肯附子臧之節而不受乎惜其擇乎中庸失時措之宜爾或曰吳子使札與楚子使椒秦伯使術一例爾吳楚蠻夷之國秦介戎狄之間其禮未同於中夏故使人之來皆略之而札何以獨為貶乎曰春秋多變例聖筆有特書荆楚無大夫而屈完書族王朝下士以人通而子突書字諸侯公子以名著而季友書子母弟之無列者不登其姓名而叔肸書氏皆賢而特書者也若仲尼亦賢季札必依此例或以字或以氏以公子持書之矣今乃略以名紀比于楚椒秦術之流無異稱焉是知仲尼不以其讓國為賢而貶之也噫世之君子盛稱季札之賢於讓國之際以為禮之大節不可亂也公子欣時春秋猶賢其後世於季札何獨貶之深也曰仲尼於季子望之深矣責之備矣惟與天地同德而達乎時中然後能與於此秋九月葬衛獻公齊髙止出奔北燕仲孫羯如晉二年甲戌冬楚王遣使聘于諸侯薳罷至魯公子圉至晉晉趙武子鞅鳴玉以相晉侯曰白珩楚之寶也圉應曰楚有觀父者能作訓辭以令於諸侯有左史倚相者朝夕獻善敗於寡君使無忘先王之業有藪曰雲連徒洲金木竹箭之所生皮革羽毛之所出以備軍賦是則楚之寶矣鞅有慙色蔡侯為世子般娶于楚通焉春二月般弒之諡曰景侯而自立三月宋火災近伯姬之室左右曰夫人避火乎伯姬曰婦人之義傅姆不在宵不下堂遂逮乎火而死初靈王之弟儋季卒其子括將見單公子愆期為王御士過諸廷聞其嘆而言曰嗚呼必有此夫入以告王且曰必殺之不戚而願大視躁而足髙心在他矣不殺必害王曰童子何知及靈王崩儋括欲立王子佞夫佞夫不知儋括圍蒍逐成愆尹言多劉毅單蔑甘過鞏成殺佞夫括瑕廖奔晉魯叔弓如宋葬伯姬鄭良霄侈而愎駟黑好在人上莫能相下也良霄嗜酒為窟室而夜飲擊鐘焉朝至未巳朝者曰公焉在其人曰公在壑谷皆自朝布路而罷黑伐而焚之良霄奔雍梁醒而後知之遂奔許鄭伯及其大夫盟于大宫盟國人于師之梁良霄聞之怒晨自墓門之瀆入介于襄庫以伐舊北門駟帶帥國人伐之皆召子産子産曰兄弟而及此吾從天所與良霄死于羊肆子産禭之斂而殯諸其臣之在市側者蔡葬其君楚令尹公子圍殺大司馬蒍掩而取其室申無宇曰善人國之主也司馬令尹之偏而王之四體也絶民之主去身之偏艾王之體不祥大焉必不免矣衛侯在楚北宫文子見圍之威儀言於衛侯曰令尹其將不免衛侯曰子何以知之對曰詩云敬慎威儀惟民之則君有君之威儀臣有臣之威儀是以上下能相固也令尹似君有他志矣民無則焉雖獲其志不可以終晉趙武齊公孫蠆宋向戍魯叔孫豹衛北宫他鄭罕虎及小邾之大夫為宋災故會于澶淵以謀歸宋財鄭罕虎授子産政辭曰國小而逼族大寵多不可為也虎曰虎帥以聽誰敢犯子子善相之國無小小能事大國乃寬子産為政使都鄙有章上下有服田有封洫廬井有伍擇能而使之誅亂政大夫史何馮簡子能斷大事遊吉美秀而文公孫揮能知四國之為而又善為詞令禆諶能謀謀於野則獲有諸侯之事子産必謀於諶問於揮斷於馮簡子乃授遊吉使行之以應對賔客是以鮮有敗事罕虎欲使尹何為邑子産曰子於鄭國棟也棟折榱崩僑將厭焉敢不盡言人之愛人求利之也今吾子愛人則以政猶未能操刀而使割也傷之而已其誰敢求愛於子子有美錦不使人學製焉大官大邑身之所庇也而使學者製焉其可乎僑聞學而後入政未聞以政學也罕虎以為忠故委政焉子産是以能為鄭國鄭人遊于鄉校以議執政之善否鬷蔑曰毁鄉校如何子産曰其所善者吾則行之其所惡者吾則改之是吾師也若何毁之我聞忠善以損怨不聞作威以防怨經曰三十年春王正月楚子使薳罷來聘夏四月蔡世子般弒其君固五月甲午宋災宋伯姬卒婦人以貞為行者也伯姬之婦道盡矣易曰恆其德貞婦人吉夫子凶而或以為伯姬女而不妘非也世衰道微暴行交作女德不貞婦道不明能全其節守死不回見於春秋者宋伯姬爾聖人書葬宋共姬以著其賢行勵天下之婦道也天王殺其弟佞夫王子瑕奔晉秋七月叔弓如宋葬宋共姬鄭良霄出奔許自許入于鄭鄭人殺良霄自許襲鄭以伐公門弗勝死于羊肆不言復入者其位未絶也若宋魚石若晉欒盈去國三年其稱復入位已絶矣不言叛者將以滅國非直叛也若華亥之入南里宋辰之入蕭其書叛者皆據土背君以自保未有滅國之謀也不言殺其大夫者非其大夫矣討賊之詞也冬十月葬蔡景公晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人杞人小邾人會于澶淵宋災故春秋大法君弒而賊不討則不書葬况世子之於君父乎蔡景公何以獨書葬遍刺天下之諸侯也葬送之禮在春秋視人情之疏密而為之者也有嘗同盟卒而不赴者有雖同姓赴而不會者則以哀死而致禭為輕弔生而歸賻為重必矣今蔡世子般弒其君藏在諸侯之策而往會其葬是恩義情禮之篤於世子般不以為賊而討之也人之所以異於禽獸中國之貴于夷狄者以其有父子之親君臣之義爾世子弒君是夷狄禽獸之不若也而不知討豈不廢人倫滅天理乎聖人深痛其所為遍刺天下之諸侯也何以知聖人罪諸侯之意如此乎以下文書會于澶淵宋災故而貶其大夫則知之矣二百四十二年之間列會亦衆而未有書其所為者此獨言所為何遍刺天下之大夫也大夫以智帥人者也智者無不知當務之為急不能三年之喪而緦小功之察放飯流而問無齒決是之謂不知務蔡世子般弒其君天下之大變人理所不容也則會其葬而不討宋國有災小事也則合十二國之大夫更宋之所喪而歸其財則可謂不知務矣三綱國政之本至於淪絶無父與君是禽獸也禽獸逼人雖得天下弗能一朝處矣世子弒君三綱淪絶禽獸逼人則與之同羣而不恤有國者不戒于火自亡其財茍其來告吊之可也則合十二國之大夫駐於澶淵而謀更其所喪曷為知類也三年魯侯作楚宫叔孫豹曰泰誓曰民之所欲天必從之君欲楚也夫故作其宫若不復適楚必死是宫也夏四月薨於楚宫諡曰襄公立胡女敬歸之子子野次于季氏秋七月毁而卒鄭伯如晉子産相晉侯以魯喪故未之見也子産使盡壞其館之垣而納車馬焉晉士丐讓之子産對曰文公之為盟主也宫室卑庳以崇大諸侯之館有司各贍其事百官展其物公不留賓亦無廢事無寧災患今銅鞮之宫數里而諸侯舍於隸人門不容車盜賊公行天癘不戒若又勿壞是無所藏幣以重罪也雖君之有魯喪亦敝邑之憂也若獲薦幣修垣而行君之惠也敢憚勤勞丐復命趙武曰是吾罪也乃見鄭伯而築諸侯之館魯仲孫羯卒魯人立敬歸弟齊歸之子禱叔孫豹曰世子死有母弟則立之無則立長年鈞擇賢義鈞則卜古之道也非適嗣何必娣之子且是人也居喪不哀在戚而有嘉容是謂不度不度之人鮮不為患若果立之必為季氏憂季孫宿卒立之比及葬三易衰衰袵如故衰於是裯生十九年矣猶有童心君子是以知其不能終也魯葬其君滕侯會葬莒子娶于齊生去疾娶于吳生展輿既立展輿又廢之莒子虐國人患之展輿因國人攻莒子弒之乃立去疾奔齊經曰三十有一年春王正月夏六月辛巳公薨于楚宫秋九月癸巳子野卒子般子赤弒而書卒子野過毁亦書卒何以别乎曰閔公內無所承不書即位則子般之弒可知下書夫人薑氏歸于齊上書公子遂叔孫得臣如齊赤之卒也隱而不日則子赤之弒可知與子野異矣子野有命立昭公故穆叔雖不欲而不能止也己亥仲孫羯卒冬十月滕子來會葬癸酉葬我君襄公十有一月莒人弒其君密州左氏稱莒子生去疾及展與既立展與又廢之莒子虐國人患焉展與因國人以攻莒子弒之乃立信斯言則子弒其父也而春秋有不書乎故趙匡謂其文當曰展輿因國人之攻莒子弒之乃立而後來傳寫誤為以字爾四年冬魯侯禱之元年楚令尹圍聘于鄭且娶于豐氏將以衆逆子産使公孫揮辭之請墠聽命圍使對曰若野賜之是委君貺于草莽也揮曰小國無罪恃實其罪將恃大國之安靖已而無乃包藏禍心以圖之小國失恃而懲諸侯使莫不憾者距違君命而有所壅塞不行是懼不然敝邑館人之屬也其敢愛豐氏之祧乃請垂櫜而入鄭人許之入逆而出遂與趙武會諸侯之大夫於虢祁午謂武曰令尹之不信諸侯所聞也子弗戒懼又如宋楚重得志晉之恥也子相晉國以為盟主於今十年矣而終之以恥午也是懼吾子其不可以不戒文子曰武受賜矣武將信以為本循而行之吾聞之能信不為人下吾不能是難楚不為患季武子伐莒瀆齊盟請戮其使樂桓子相趙文子欲求貨於叔孫而為之請使請帶焉弗與梁其脛曰貨以藩身子何愛焉叔孫曰我以貨免魯必受師雖怨季孫魯國何罪叔出季處有自來矣吾又誰怨然鮒也賄弗與不已召使者裂裳帛而與之曰帶其褊矣趙孟聞之曰臨患不忘國忠也思難不越官信也圖國忘死貞也謀主三者義也有是四者又可戮乎乃請諸楚曰魯雖有罪其執事不辟難免之以勸左右楚人許之叔孫既歸曾夭御季孫以勞之旦及日中不出曾夭謂曾阜曰旦及日中吾知罪矣魯以相忍為國也忍其外不忍其內焉用之阜謂叔孫曰可以出矣叔孫指楹曰雖惡是其可去乎乃出見之秦后子針有寵於桓如二君於景其母曰弗去懼選遂適晉其車千乘司馬侯問焉曰子之車盡於此而已乎對曰此之謂多矣若能少此吾何以得見司馬侯以告公曰秦公子必歸臣聞君子能知其過必有令圖令圖天所贊也見趙孟趙孟曰吾子曷歸對曰針懼選於寡君是以在此將待嗣君趙孟曰秦君何如對曰無道趙孟曰亡乎對曰何為一世無道國未艾也不數世淫弗能斃也趙孟曰天乎對曰有焉趙孟曰其幾何對曰國無道而年穀和熟天贊之也鮮不五稔趙孟視蔭曰朝夕不相及誰能待五針出而告人曰趙孟將死矣主民玩嵗而愒日其與幾何晉中行穆子敗無終及羣狄于太原崇卒也將戰魏舒曰彼徒我車所遇又厄請皆卒自我始乃毁車以為行荀吳之嬖人不肯即卒斬以徇為五陳以相離翟人笑之未陳而薄之大敗之莒展輿立而奪羣公子秩公子召去疾于齊展輿奔吳叔弓帥師疆鄆田因莒亂也楚公子圍使公子黑肱伯州犂城犨櫟郟鄭人懼子産曰不害令尹將行大事而先除二子也禍不及鄭何患焉冬楚公子圍至入問王疾縊而弒之殺其二子右尹王子比以車五乘出奔晉宫廏尹黑肱出奔鄭殺太宰伯州犂于郟葬王于郟謂之郟敖圍自立更名虔以薳罷為令尹薳啓疆為太宰使赴于鄭伍舉問應為後之辭焉對曰寡大夫圍舉更之曰共王之子圍為長晉侯有疾鄭子産聘且問叔向曰卜人曰實沈臺駘為祟敢問此何神也子産曰實沈參神也臺駘汾神也抑此二者不及君身若君身則亦出入飲食哀樂之事也僑聞之君子有四時朝以聽政晝以訪問夕以修令夜以安身於是乎節宣其氣勿使有所壅閉湫底以露其體茲心不爽而昏亂百度今無乃一之則生疾矣叔向曰善論曰醫卜祝史技數也然切於人身而人理之所不能不用者也先王之世醫卜祀史世守其事而身屬於官醫以十全為上過誤而殺人者有誅有大事則訊之卜有疑事則決之卜而吉凶軍賓嘉凡有告於鬼神之事必祝史宣其意然後主事者得全其精以與神明交矣今世則不然散於民間取人者無罪驕人者無禁殺人者無誅而妙達隂陽之奧有十全之功者官亦莫之旌用也國有大事事有大疑內不反復謀諸心外不謀之於士庶精不謀之於龜筮而卜道以亡噫五禮之不得其理也久矣君子漫不知其義祝史豈能知其數哉故民間惟有疾病則卜而卜者率皆誑言某鬼某神怨怒以恐惑之如晉卜人之言因為之祀祭以圖衣食而已民寧破産求鬼而不求醫至有敬事荒夷之神驅除其祖考而不薦者豈不傷人情逆天理乎是故君天下欲仁其民者雖醫卜祝史之流亦必如先王之世然後大化可行也秦伯使醫和視晉侯疾曰疾不可為也是謂近女室疾如蠱良臣將死天命不祐公曰女不可近乎對曰節之先王之樂所以節百事也故有五節遲速本末以相及中聲以降五降之後不容彈矣於是有煩手淫聲慆堙心耳乃忘平和君子弗聽也物亦如之隂陽風雨晦明是天之六氣也為時為節過則為災為五味為聲色淫則生寒熱末腹惑心之疾女陽物而晦時淫則生內熱惑蠱之疾君今不節不時能無及此乎出告趙武曰和聞國之大臣榮其寵祿任其大節有災禍興而無改焉必受其咎今君至于淫以生疾將不能圖恤社稷禍孰大焉主不能禦吾是以云良臣將死也趙孟曰良醫也禮而歸之晉將食楚比秦針皆百人之餼趙武曰秦公子富叔向曰底祿以德德鈞以年年同以尊公子以國不聞以富秦楚匹也使針與比齒十二月晉趙武卒是為文子叔向曰文子舉事於白屋者四十六人公家賴之文子死而弔皆就賓位是其無私德也經曰元年春王正月公即位叔孫豹會晉趙武楚公子圍齊國弱宋向戍衛石惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢此陳侯之弟招也何以不稱弟諸侯之尊弟兄不得以屬通曰公子者其本當稱者也曰弟者因事而獨稱之也所以然者諸侯非始封之君則臣諸父昆弟族人不得以屬戚于君也會于虢尋宋之盟而經何以不書圍請讀舊書加于牲上雖若楚重得志晉少惴矣然春秋不貴修盟晉人以信為本故每書必先趙武三月取鄆不曰伐莒取鄆者乘莒亂而取邑故不悉書為內諱也夏秦伯之弟針出奔晉書此見人君寵愛其子不差以禮是禍之也書曰弟者罪秦伯也夫后子出奔其父禍之而罪秦伯何也春秋以鈞愛望人父以能友責人兄父母有愛妾猶沒身敬之不衰況兄弟乎兄弟翕而後父母順矣故不曰公子而特稱秦伯之弟云六月丁巳邾子華卒晉荀吳帥師敗狄于大鹵按六月宣王北伐之詩其詞曰薄伐獫狁至于太原而詩人美之者謂不窮追逺討及封境而止也然則太原在禹服之內而狄人來侵攘斥宜矣其過在毁車崇卒以詐誘狄人而敗之非王者之師耳使後世車戰法亡崇尚步卒爭以變詐相髙日趨茍簡皆此等啓之矣秋莒去疾自齊入于莒國無二君也展輿乃莒子而去疾曷為又以國氏乎程氏曰去疾假齊之力以入莒討展與之罪正也其以國氏與去疾之討有罪也此莒之公子曷為不稱公子自謂先公之子可以有國不疑遂立乎其位而無所稿也其書入者難詞也莒展輿出奔吳展輿莒子也曷為不稱爵為弒君者所立既立乎其位而不能討賊則是與聞乎故也斯不可以有國矣不可以有國則曷為以國氏程氏曰罪諸侯與其立也虢之會展與無列何以見諸侯之與其立乎莒雖以亂未能預會然魯取鄆而在會者欲執叔孫則知諸侯之與其立矣亦以國氏惡崇亂也叔弓帥師疆鄆田葬邾悼公冬十有一月己酉楚子麇卒郟敖實弒而書卒何與令尹圍弒君以立中國力所不加而莫能致討則亦已矣至大合諸侯于申與會者凡十有三國其臣舉六王二公之事其君用齊桓召陵之禮而宋向戍鄭子産皆諸侯之良也而皆有獻焉不亦傷乎若革其偽赴而正以弒君將恐天下後世以篡弒之賊非獨不必致討又可從之以主會盟而無惡矣聖人至此憫之甚懼之甚憫之甚者憫中國之衰微而不能振也懼之甚者懼人欲之橫流而不能遏也是故察微顯權輕重而略其篡弒以扶人國制人欲存天理其立義微矣楚公子比出奔晉皇王大紀卷五十五

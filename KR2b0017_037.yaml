body:
  text: 皇王大紀卷三十七宋胡宏撰三王紀莊王五年冬十二月陳葬其君莊公魯公子慶父伐邾於餘丘齊侯夫人王姬薨訃於魯魯侯為之大功或曰由魯嫁故為之服姊妹之服冬十二月魯桓夫人會齊侯于禚齊國風六篇曰南山四章章六句刺襄公也鳥獸之行淫乎其妹大夫遇是惡作詩而去之南山崔崔雄狐綏綏興也南山齊南山崔崔髙大也國君尊嚴如南山崔崔然雄狐相綏綏然無别失隂陽之匹魯道有蕩齊子由歸蕩平易也齊子文薑也既曰歸止曷又懷止懷思也葛屨五兩冠緌雙止葛屨服之賤者冠緌服之尊者魯道有蕩齊子庸止庸用也既曰庸止曷又從止藝麻如之何衡從其畝藝樹也衡獵之從獵之種之然後得麻取妻如之何必告父母必告父母廟既曰告止曷又鞠止鞠窮也析薪如之何匪斧不克克能也取妻如之何匪媒不得既曰得止曷又極止極至也宋公薨子捷嗣經曰二年春王二月葬陳莊公夏公子慶父帥師伐於餘丘國而曰伐此邑爾其曰伐何也志慶父之得兵權也魯在春秋中見弒者三君其賊未有不得兵權者羽父專命再為主將仲遂擅兵兩世故翬弒隱公而寪氏不能明其罪慶父弒子般而成季不能遏其惡公子遂殺惡及視而叔仲惠伯不能免其死夫豈一朝一夕之故哉春秋所書為戒逺矣秋七月齊王姬卒夫服稱情而為之者也莊公於齊王姬比內女為之服厚矣如不共戴天之念何故特卒王姬比內女嫁為諸侯妻者以著其罪冬十有二月夫人薑氏會齊侯于禚婦人無外事送迎不出門見兄弟不踰閾在家從父既嫁從夫夫死從子今莊公不能防間其母失子道矣或曰子可以制母乎夫死從子通乎其下况於國君君者人神之主風教之本也不能正家如正國何若莊公者哀痛以思父戒敬以事母威刑以督下車馬僕從莫不俟命夫人徒往乎夫人之往也則公威命之不行哀戚之不至爾乙酉宋公馮卒六年冬十一月魯公子溺會齊師伐衛宋葬其君莊公三月葬桓王紀侯使其弟季以􅈶請為附庸於齊紀於是乎始判魯侯次于滑將會鄭伯謀紀故也鄭伯辭以難凡師一宿為舍再宿為信過宿為次王伐隨討其尊荆楚隨告絶于楚經曰三年春王正月溺會齊師伐衛榖梁子曰其不稱公子何也惡其會仇讐伐同姓故貶而名之也有父之讐而釋怨其罪大矣况與合黨興師伐人國乎夏四月葬宋莊公五月葬桓王天子七月而葬同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至王崩至是蓋七年矣先儒或言天子不志葬又曰常事也夫事孰有大於葬天子者而可以不志乎死生始終之際人道之大變豈以是為常事而不書也秋紀季以酅入于齊季紀侯之弟也天下無道強衆相陵天子不能正方伯不能伐紀侯命之屈己事齊請後五廟其亦不得已而為之者非其罪也所以書字而無貶乎入云者難詞也冬公次于滑春秋紀兵伐而書次以次為善救而書次以次為譏魯紀有婚姻之好當恤其患於齊有父之讎不共戴天茍能救紀抑齊一舉而兩善并矣見義不為而有畏也故書公次于滑以譏之也易於謙之六五則曰利用侵伐師六四則曰左次無咎進退勇怯顧義如何爾或以勇為鼓亂誤矣七年冬十二月魯桓夫人享齊侯于祝丘春正月紀夫人伯姬卒楚王熊通荆尸授師孑焉以伐隨將齊入告夫人鄧曼曰余心蕩鄧曼歎曰王祿盡矣盈而蕩天之道也若師徒無虧王薨於行國之福也王遂行卒於樠木之下令尹鬭祁莫敖屈重除道梁溠營軍臨隨隨人懼行成莫敖以王命入盟隨侯且請為會於漢汭而還濟漢而後發喪諡曰武王子熊資嗣始都于郢齊侯及陳侯鄭伯遇于垂謀屬紀也紀侯不能下齊以與紀季大去其國雖其夫人未葬亦不能恤也四月齊人為之葬伯姬魯侯會齊侯狩于禚經曰四年春王二月夫人薑氏享齊侯于祝丘兩君相見享於廟中禮也今夫人去其國而享諸侯甚矣三月紀伯姬卒夏齊侯陳侯鄭伯遇于垂蘇轍曰鄭伯子儀也春秋有一國而二君者鄭突衛衎始終為君子儀君鄭十有四年剽君衛十有一年皆能君者也突之入以篡衎之出以惡儀剽雖國人所立而突衎在焉非所以為安也故四人者春秋莫適與也因其寄耳君子不幸而處於此如子臧季札可也不如是則亂不止為此説者善矣然而鄭伯實厲公也非子儀也紀侯大去其國大閲大雩大搜譏其僣也大無者志倉廩之竭也大去者委之而不顧也或曰以爭國為小以去國為大而為之者也夫有國家者以義言之則當效死而勿去以道言之亦可去而不守昔太王去邠從之者如歸市紀侯去國日以微滅故聖人與其不爭而去異於失地之君侯而不名不與其去而不存是故書叔姬歸酅而不録紀之卒明其為君之末矣六月乙丑齊侯葬紀伯姬齊襄迫逐紀侯使不及葬其夫人而去然後見其罪矣或曰葬之禮也夫弒魯君滅其婚姻之國而葬其女是猶加刃於人以手撫之也斥言齊侯賤之也或曰惡其詐也如紀似禮存季似義葬伯姬似仁惡似而非者秋七月冬公及齊人狩于禚榖梁子曰何以人齊侯所以卑公也何為卑公公於齊侯不與共戴天而與之狩是忘親釋怨非人子矣故稱及稱人以著其罪也八年魯桓夫人如齊齊國風十篇曰載驅五章章四句齊人刺襄公也無禮義故盛其車服疾驅於通道大都與文薑淫播其惡於萬民焉載驅薄薄簟茀朱鞹薄薄疾驅聲也簟方文席也車之蔽曰茀諸侯之路車有朱革之質而羽飾魯道有蕩齊子發夕發夕自夕發至旦四驪濟濟垂轡濔濔四驟言物色盛也濟濟美貌垂轡轡之垂者濔濔衆也魯道有蕩齊子豈弟言文薑於是樂易然汶水湯湯行人彭彭湯湯大貌彭彭多貌魯道有蕩齊子翺翔翺翔猶倣徉也汶水滔滔行人儦儦滔滔流貌儦儦衆貌魯道有蕩齊子逰遨郳黎來朝于魯齊侯宋公魯侯陳侯蔡侯伐衛納衛侯朔經曰五年春王正月夏夫人薑氏如齊師師者衆多之地考於載驅之詩可見矣曰會曰享猶為之名也至是如齊師羞惡之心亡矣夫人之行不可復制矣春秋書此以戒後世謹禮於微慮患於早之意也秋郳黎來來朝夷狄附庸例書名郳黎來介葛盧是也能修朝禮故特書曰朝其後王命以為小邾子蓋於此已能自進於禮矣冬公會齊人宋人陳人蔡人伐衛魯桓十六年衛侯朔出奔齊經書其名者以王命絶之也榖梁子曰是齊侯宋公而人之何也人諸侯所以人公也其人公何也逆王命也九年王使子突救衛諸侯兵強王師不能禁朔遂入衛放黔牟于周殺二公子齊侯以衛賂分送于諸侯齊國風七篇曰甫田三章章四句大夫刺襄公也無禮義而求大功不修德而求諸侯志大心勞所以求者非其道也無田甫田維莠驕驕興也甫大也大田過度而無人功終不能獲無思逺人勞心忉忉忉忉憂勞也無田甫田維莠桀桀桀桀猶驕驕也無思逺人勞思怛怛怛怛猶忉忉也婉兮孌兮總角丱兮未幾見兮突而辨兮婉孌少好貌總角聚兩髦也丱幼稚也辨冠也齊國風八篇曰盧令三章章二句刺荒也襄公好田獵畢弋而不修民事百姓苦之故陳古以風焉盧令令其人美且仁盧田犬令令纓環聲言人君能有美德盡其仁愛百姓欣而奉之愛而樂之順時逰田百姓共其樂同其獲故百姓聞而説之其聲令令然盧重環重環子母環也其人美且鬈鬈好貌盧重鋂鋂一環貫二也其人美且偲偲才也楚文王伐申過鄧鄧祁侯曰吾甥也止而享之騅甥聃甥養甥請殺楚子鄧侯弗許三甥曰亡鄧國者必此人也若不早圖後君噬臍其及圗之乎圗之此為時矣鄧侯曰人將不食吾餘對曰若不從三臣抑社稷實不血食而君焉取餘弗從還年楚子伐鄧秦伐邽冀之戎初縣之經曰六年春王正月王人子突救衛夏六月衛侯朔入于衛秋公至自伐衛王人微者子突其字也以下士之微超從大夫之列者褒救衛也朔陷殺其兄罪固大矣然其父所立諸侯莫得而治也王治其舊惡而廢之可也又藉諸侯之力以抗王命故衛朔書名書入以著其惡王人書字書救以著其善外則諸侯書人內則魯侯書至而春秋之情見矣或曰子突王之子弟也用兵大事而委諸子弟使無成功故書人以譏之必若此言是春秋以成敗論事而不計理也使諸侯顧逆順則子突雖微自足以中王命彼阮肆行矣雖天子親臨將有請從如祝聃者況其下乎子突不勝五國使之得入也其亦不幸爾矣幸不幸命也守義循理者法也君子行法以佚命故其褒貶如此冬齊人來歸衛俘衛俘者衛寶也朔以弟弒兄篡國上逆王命人理所不容彼諸侯者豈其弗察而援之甚力未有以驗其喪心失志迷惑之端也及書齊人歸衛寶然後知其有欲貨之心而後動於惡也世衰道微賄賂公行使君臣父子兄弟終去仁義懷利以相與不至於篡弒奪攘則不厭也春秋特書此事結正諸侯之罪垂戒明矣十年甲午魯桓夫人會齊侯于防春二月辛卯夜恆星不見夜中星隕如雨五月大水無麥苗魯桓夫人會齊侯于榖齊國風終十一篇曰猗嗟三章章六句刺魯莊公也齊人傷魯莊公有威儀技藝然而不能以禮防間其母失子之道人以為齊侯之子焉猗嗟昌兮頎而長兮猗嗟歎辭昌盛也頎長貌抑若揚兮抑美色揚廣揚美目揚兮好目揚眉巧趨蹌兮射則臧兮蹌巧趨貌猗嗟名兮美目清兮目上為名目下為清儀既成兮終日射侯不出正兮展我甥兮二尺曰正外孫曰甥猗嗟孌兮孌壯好貌清揚婉兮婉好眉目也舞則選兮射則貫兮選齊貫中也四矢反兮以禦亂兮四矢乘矢秦初縣社鄭滅小虢經曰七年春夫人薑氏會齊侯于防夏四月辛卯夜恆星不見夜中星隕如雨恆星者列星也如雨者言衆也人事感於下天變動於上前此者五國連衡旅拒王命後此者齊桓晉文更霸中國政歸盟主而王室遂虛其為法度廢絶威信陵遲之象著矣漢成帝永始中亦有星隕之異而五侯擅權賊莽居攝漢之宗支掃蕩幾盡天之示人顯矣春秋謹於天象至矣秋大水無麥苗書大水畏天災也無麥苗重民命也畏天災重民命見王者之心矣忽天災而不懼輕民命而不圖國之亡無日矣春秋所以謹之也冬夫人薑氏會齊侯于榖防魯地也榖齊地也初會于禚次享于祝丘又次如齊師又一嵗而再會其為惡益逺矣明年無知弒諸兒其禍淫之明驗矣十一年冬十一月魯侯帥師次于郎以俟陳蔡陳蔡不至甲午治兵魯侯及齊侯圍郕郕降于齊公子慶父請伐之公曰我實不德齊師何罪遂還鮑叔牙見齊侯之無常也嘆曰君使民慢亂將作矣奉小白出奔莒齊侯使連稱管至父戍葵丘瓜時而往曰及瓜而代期戍公問不至請代弗許故謀作亂僖公之母弟曰夷仲年生公孫無知有寵於僖公衣服禮秩如適齊侯絀之二人因之以作亂九月齊侯遊于姑棼遂田于貝丘見大豕從者曰公子彭生也公懼隊車傷足而反徒人費遇賊鬬死于門中石之紛如死于階下賊入弒公而立無知管夷吾召忽奉公子糾出奔魯經曰八年春王正月師次于郎以俟陳人蔡人用大衆曰師次止也伐而次者有整兵慎戰之意其次善之也救而次者有緩師畏敵之意其次譏之也俟而次者有無名妄動之意曰次曰以俟者深貶之也甲午治兵役久不用則有失伍離次逃亡潰散之虞故復申明軍法以整齊之其志非善之也譏黷武也夏師及齊師圍郕郕降于齊師秋師還春秋正例君將不稱帥師者以君為重也今莊公親將其次其及其還皆不稱公者重衆也既不稱公又以為重衆何也輕舉大衆妄動久役俟陳蔡而陳蔡不至圍郕不服歷三時而後還則無名黷武非義害人未有如此之甚也至是師為重矣義係於師故不書公以著勞民動衆之罪為世戒春秋王道輕重之權衡此類是矣冬十有一月癸未齊無知無知曷為不稱公孫而以國氏罪僖公也弒君者無知於僖公何罪乎不以公孫之道待無知使恃寵而當國也按無知者夷仲年之子年者僖公母弟也私其同母異於它弟施及其子衣服禮秩如嫡此亂本也故於年之來聘特以弟書於無知之弒不稱公孫著其有寵而當國也垂戒之義明矣古者親親與尊賢並行而不相悖故堯親九族必克明峻德而後九族睦周封同姓必庸康叔蔡仲而後王室強徒知寵愛親屬而不急於尊賢使為儀表明親親之道必有篡弒之禍矣弒其君諸兒按左氏齊侯遊于姑棼遂田于貝丘徒人費遇賊于門先入伏公出而鬭死石之紛如死于階下是皆死節者也春秋重死節之臣而法有特書其不見于經何也如費等所謂便嬖私昵之臣逄君之惡田獵畢弋而不修民事使百姓苦之者也與大臣孔父仇牧義形於色不畏強禦以身死其職則異矣當是時管仲隰朋鮑叔皆沉於下寮不見用也而徒人費石之紛如乃得居左右襄公之所疏逺親信者如此故以齊國之強大一也桓公用之則九合諸侯不以兵車由親賢人逺小人所以興也襄公用之不能保其身死于戶下由親小人逺賢人所以亡也此二人雖死于難與自經於溝瀆而莫之知者猶不逮焉乃致亂之臣死不償貴又何取乎十二年春齊雍廩殺無知魯侯及齊大夫盟于蔇齊無君也夏魯侯伐齊納子糾桓公自莒先入初桓公亟舉兵作偽主以行孔子曰天子巡守遷廟主行今取七廟之主以行則失之矣且廟無虛主虛主者唯天子崩諸侯薨與去其國與祫祭於祖為無主耳吾聞諸老聃曰天子崩國君薨則祝取羣廟之主而藏諸祖廟禮也卒哭成事而後主各反其廟君去其國太宰取羣廟之主以從禮也祫祭於祖則祝迎四廟之主出廟必蹕曰古者師行無遷主則何主曰主命曰何謂也孔子曰天子諸侯將出必以幣帛皮圭告于祖禰遂奉以出載于齊車以行每舍奠焉而后就舍反必告設奠卒斂帛玉藏諸兩階之間乃出蓋貴命也六月庚申魯侯及齊師戰于乾時魯師敗績公喪戎輅傳乘而歸鮑叔言于齊侯曰管夷吾寬惠柔良智勇治於髙傒忠信可以結百姓禮義可法於四方君若欲霸諸侯使相可也遂帥師言於魯曰子糾親也請君討之管召讎也請受而甘心焉魯施伯曰管子天下之材也所居之國必得志於天下若令在齊長為魯國憂矣必殺之魯殺子糾於生竇將殺管召齊使者固請梏而豫之召忽自殺鮑叔得管仲比至三釁三浴之齊侯迎于郊與之坐而問焉曰我先君惟女是崇惟田是好百姓困窮戎士凍餒社稷幾亡孤欲大振齊國雪先君之恥奈何仲對曰先君之惡不可揚也不敬宗廟民乃上校身者治之本也地之生財有時人之用力有倦而君上之欲無窮茍不敬百姓無度量於其間則上下相疾而危亡至矣先王知與之為取不為不可成不求不可得下令於流水之源令順民心明必死之路開必得之門不然城郭溝池不足以固守兵甲勇力不足以應敵博地多才不足以有衆矣公曰敢問何謂度量仲對曰五榖者民之司命百物之主也珠玉黃金刀布者天下之通貨也人君重五榖禁末産視本末重輕而準之以幣謹持其權以調貴賤則利歸於國而敬老慈幼恤孤養疾矜獨問病通窮困接絶乏政可施矣是故倉廪實而知禮節衣食足而知榮辱禮義廉恥是為四維四維張則君令行四維不張國乃滅亡公曰敢問何以張四維而行令仲對曰制人羣擅殺生令行禁止者君之分也仰制奉法卑賤敬畏者臣之分也威不兩錯政不二門置儀設法愛人不私賞惡人不私罰以公制論以法制斷不知親踈逺近貴賤以法制行之令而不行令不法也法而不行令不審也審而不行賞罰輕也重而不行賞罰不信也信而不行不以身先之也禁勝於身令行於人民之從上也不從口之所言從情之所好未有多禁而能多止者也未有多令而能多行者也令重則君尊君尊則國安故曰令者人主之大寶君國之重器也牧民者欲民之有禮也欲民之有禮小禮不可不謹也小禮不謹於國求百姓之行大禮不可得也欲民之有義也欲民之有義小義不可不行也小義不行於國求百姓之行大義不可得也欲民之有廉有恥也小亷不修於國小恥不息於國求百姓之有大亷大恥不可得也故禮不踰節義不自進亷不蔽惡恥不從枉不踰節則上位安不自進則民無巧詐不蔽惡則行自全不從枉則邪事不生一維絶則傾二維絶則危三維絶則覆四維絶則滅傾可正危可安覆可起滅則不可復錯也百姓國之本也百姓之所欲者飲食也所願者安樂也茍足其欲贍其願則能用之矣故昔者聖王之治民也參其國伍其鄙定民之居成民之事以選賢才公曰善命仲定制仲制齊國為二十一鄉工商之鄉六士鄉十五公帥五鄉國子帥五鄉髙子帥五鄉臣立三宰工立三族市立三鄉澤立三虞山立三衡五家為軌五人為伍軌長帥之十軌為里五十人為小戎里有司帥之四里為連二百人為卒連長帥之十連為鄉二千人為旅鄉良人帥之萬人為軍五鄉之帥帥之故有中軍之鼓有髙子之鼓有國子之鼓春以搜振旅秋以獮治兵伍之人祭祀同福死喪同恤夜戰聲相聞晝戰目相識居同樂行同和死同哀三十家為邑邑有司十邑為卒卒有帥十卒為鄉鄉有帥三鄉為縣縣有帥十縣為屬屬有大夫五屬故立五大夫立五正各使聽一屬處士就間燕處工就官府處商就市井處農就田野士農工商少而習焉其心安焉不見異物而遷焉故其父兄之教不肅而成其子弟之學不勞而能正月之朝鄉長復事君親問焉五屬大夫復事君親問焉謫寡功者曰制地分民如一何獨寡功教不善政不治一再則宥三則不赦乃問曰於子之鄉於子之屬有居處好學孝悌聰惠質仁發聞於鄉里者有拳勇股肱之力秀出於衆者有則以告有孝而不告謂之蔽明有勇而不告謂之蔽賢其罪五有司已於事而竣君又問曰有不慈孝於親不長悌於鄉驕躁淫暴不用上令者不以告謂之下比其罪五有司已於事而竣鄉長屬大夫於是退而進賢君親見之遂使役官官長期而書伐以告且選其賢者而復用之以補用之不善政者君召而與語訾相其質設之以國家之患而不疚升以為上卿之贊謂之三選公曰善舉國以聽於仲行其法於是鄉長退而修鄉以及於五屬大夫退而修屬以及於邑伍與邑退而修家是故匹夫有善可得而舉也有不善可得而誅也故鄉不越長朝不越爵罷士無伍罷女無家民皆勉為善士有終身之功不為一朝之計齊國大治齊侯逰於郊有寧戚者飯牛於車下擊牛角而商歌公聞之曰非常人也將用之羣臣曰是衛人也盍往問之固賢人也任之未晚公曰問之恐其有小惡以小惡而忘其大美此所以失天下之士也且人固難全冝用其長管仲言於齊侯曰爭天下者必先爭人是故聖人卑禮以下天下之賢間進退習詞令臣不如隰朋請立為大行人知經界盡地利臣不如寧戚請立為大司田使三軍之士視死如歸臣不如王子城父請立為大司馬決獄折中臣不如賔胥無請立為大理知無不言不避死亡臣不如東郭牙請立為大諌公從之公有善仲未嘗不嘆有過未嘗不諌諌而不從終諌不止魯浚洙以備齊也經曰九年春齊人殺無知不書雍廩而曰齊人者討賊之詞也無知不稱君者已不能君齊人亦莫之君也公及齊大夫盟于蔇及者內為志大夫不名者義繫於齊而不繫於大夫之名氏也曰公及齊大夫盟者譏公之釋父讎也有父之讎而不知報乃欲安定其國家而圖其後嗣則人倫廢天理滅矣故聖人云以直報怨以德報德夏公伐齊納糾齊小白入于齊二傳經云只書糾子糾小白皆以庶子出奔而糾弟也故不書子明不當立也小白九也故繫諸齊明其冝有齊也冝有齊而不稱公子內無所承上不請命也桓公於王法雖可絶視子糾則當立故管氏相桓公徙義而召忽之死聖人比諸匹夫匹婦之諒而自經者也納者不受而強致之稱入者難詞也秋七月丁酉葬齊襄公八月庚申及齊師戰于乾時我師敗績敗績者公也內不言敗此其言敗者為與讎戰雖敗亦榮也然何以不言公若莊公以復讎舉事則此戰為義戰當書公冠于敗績之上與沙隨之不得見重丘之不與盟為比以示榮矣而莊公本欲納讐人之子謀定其國家不為復讐與之戰也是故諱公以重貶其忘親釋怨之罪其義深切著明矣九月齊人取子糾殺之取者不義之詞納糾不稱子者明不當立也殺糾復稱子者明不當殺也或奪或豫於義各安春秋精意也糾雖爭立越在他國置而勿問可也必欲殺之然後快於心其不仁亦甚矣然後世以傳讓為名而取國者必殺其主以為一人心防後患意與此同流毒豈不逺哉故孟子曰五霸三王之罪人仲尼之徒無道桓文之事者冬浚洙固國以保民為本輕用民力妄興大作邦本一搖雖有長江洞庭彭蠡河漢之險猶不足憑而况洙乎書浚洙見勞民於守國之末務而不知本為後戒也十三年冬齊侯欲從事於諸侯管仲請反侵地以安四鄰重皮幣以聘俯於諸侯為遊士八十人奉之以裘馬多之以資幣使號召天下之賢士以皮幣玩好鬻之四方以覘其上下之所好擇其淫亂者而征之於是齊侯將伐魯管仲諌曰兵有天論必先論其器論其士論其將論其主器濫惡不利以其士豫敵士不可用以其將與敵將不知兵以其主與敵人主不務積德於兵以其國與敵不聽遂伐魯魯侯將禦之曹劌請見問何以戰公曰余不愛衣食於民不愛牲玉於神對曰小賜不咸民不歸也獨恭不優神弗福也公曰小大之獄雖不能察必以情斷對曰忠之屬也可以一戰冬十一月公與之乘戰于長勺公將鼓之劌曰未可齊人三鼓劌曰可矣齊師敗績公將馳之劌曰未可下視其轍登軾而望之曰可矣遂逐齊師既克公問其故對曰夫戰勇氣也一鼓作氣再而衰三而竭彼竭我盈故克之夫大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之魯侯侵宋春正月宋人遷宿齊師宋師伐魯次于郎魯侯禦之公子偃曰宋師不整可敗也宋敗齊必還自雩門竊出蒙臯比而先犯之大敗宋師于乘丘齊師還是戰也縣賁父御公卜國為右公墜左車授綏公曰末之卜也縣賁父曰他日不敗績而今敗績是無勇也遂死之圉人浴馬有流矢在白肉公曰非其罪也遂誄之士之有誄自此始也齊大夫付乙頗用事管仲言於齊侯曰內有疑妻之妾則宫亂矣庶有疑嫡之子則家亂矣朝有疑相之臣則國亂矣臣以不才委命而付乙與政惟君裁焉齊侯誅付乙齊侯曰吾欲冨於財而藉樹畜可乎仲對曰惟山海可於是煮渠夷之鹽封金鐵之山動者死罪列輕重九府行伊尹之術不加賦於民而國用大饒昔禹治河自大陸澤之北疏為九道曰徒駭曰太史曰馬頰曰覆釡曰胡蘇曰簡潔曰鈎盤曰鬲津徒駭最北鬲津最南其中二百餘里齊侯欲冨國務廣其地治河並行徒駭於八河之地課樹藝建城邑通魚鹽于東萊使關市譏而不征齊制重罪贖以犀甲一戟輕罪贖以鞼楯一戟小罪謫以金分索訟者三禁而不可上下坐成以束矢美金以鑄劍戟惡金以鑄鉏夷斤斸甲兵大足有革車八百乘輕諸侯之幣以重其禮垂櫜而入稛載而歸拘之以利結之以信示之以武小國諸侯莫之敢背蔡侯息侯皆娶于陳息媯將歸過蔡蔡侯曰吾姨也止而見之弗賔息侯聞之怒使告于楚曰伐我吾求救於蔡而伐之楚王從之秋七月敗蔡師于莘以蔡侯歸自是漢沔江淮間諸侯皆服于楚齊侯之出也過談談不禮焉及其入也諸侯皆賀談又不至八月齊人滅談談子奔莒蔡侯以莘故繩息媯以語楚王楚王滅息以息媯歸經曰十年春王正月公敗齊師于長勺經不書齊師伐魯者意責魯也詐戰曰敗敗者為主或曰長勺魯也齊師至此所謂敵加於己不得已而後應者也疑若無罪焉何以見責乎善為國者不師善師者不陳善陳者不戰故行使則有文告之詞而疆場則有守禦之備至於善陳德已衰矣而况兵刃相接又以詐謀取勝乎故書魯為主以責之皆已亂之道寡怨之方王者之事也二月公侵宋三月宋人遷宿宿非欲遷為宋人之所遷也懷土常物之大情遷國重事也雖違害就利去危即安猶恐或沉于衆不肯率從而况迫於橫逆非其所欲棄久宅之田里刈新徙之蓬雚道途之勤營築之勞起怨咨傷和氣豈不惻然有隱乎肆行莫之顧也其不仁亦甚矣凡書遷不再貶而惡已見矣夏六月齊師宋師次于郎公敗宋師于乘丘齊侯輕舉大衆深入他國肆其報復之心誠有罪也魯人若能奉其辭令二國去矣偷得一時之捷而積四鄰之忿此小人之道故次者不以其事勝者不以其理交譏之秋七月荆敗蔡師于莘以蔡侯獻舞歸蔡侯何以名絶之也凡書敗書滅書入而以其君歸皆名者為其服為臣虜故絶之也若蔡獻舞潞嬰兒沈嘉許斯頓牂胡豹曹陽邾益之類是矣國君死社稷正也逃之雖罪猶有恥焉虜甚矣楚人滅夔以夔子歸獨不名者夔子以無罪見討雖國滅身為臣虜其義直其詞初不服也是以獨假之爵而不名也春秋之法諸侯不生名失地則生而名之比於賤者欲使人君戰戰兢兢長守冨貴無危溢之行也冬十月齊師滅談談子奔莒齊責談失事大之禮可矣而滅之可乎滅而書奔責不死位也不書出國亡無所出也國滅身奔而不能守其冨貴何以書爵無取滅之罪為橫逆所加不能勝至於出奔則亦不幸焉爾其義蓋未絶也故齊師滅談談子奔莒楚人滅弦弦子奔黃狄滅溫溫子奔衛所以皆存其爵不比於失地之君而名之也然則吳滅徐徐子章羽奔楚何以獨名按左氏吳伐徐徐子斷其髮攜其夫人以逆吳子既已屈服而後奔豈有興復之志乎獨書名所以絶之也春秋之義雖在於抑強扶弱又責弱者之不自強於為善也故其書法如此耳十四年宋人侵魯魯侯禦之宋師未陳而薄之敗諸戩獲其大夫南宫長萬宋大水魯侯使弔焉曰天作淫雨害於粢盛若之何不弔宋公使公子御説對曰孤實不敬天降之災又以為君憂拜命之辱臧文仲曰宋其興乎禹湯罪已其興也勃焉桀紂罪人其亡也忽焉且列國有凶稱孤禮也言懼而名禮其庶乎既而聞之曰公子御説之辭也臧孫逹曰是冝為君有恤民之心宋人請南宫長萬于魯魯人歸之宋公靳之曰始吾敬子今子魯囚也吾弗敬子矣病之經曰十有一年春王正月夏五月戊寅公敗宋師于鄑秋宋大水凡外災告則書所謂災者害及民物如水火兵戎之冦是也諸侯於四鄰有恤病救急之義則告為得禮而不可以不弔故四國同災許人不弔君子以是知許之先亡也凡志災見春秋有謹天戒恤民隱之心王者之事也冬王姬歸于齊按周制王姬嫁於諸侯車服不繫其夫下王后一等禮亦隆矣春秋之義尊君抑臣其書王姬下嫁曷為與列國之女同辭而不異乎曰陽唱而隂和夫先而婦從天理也述天理訓後世則雖以王姬之貴其當執婦道與公侯大夫士庶人之女何異哉自秦而後尤欲尊君抑臣為治而不得其道至謂列侯尚公主使男事女夫屈於婦逆隂陽之位故王陽條奏世務指此為失而長樂王回亦以其弊至父母不敢畜其子舅姑不敢畜其婦人倫悖於上風俗壞於下其流至此然後知春秋書王姬侯女同詞而不異聖訓之義大矣十五年春正月紀叔姬歸于酅南宫萬弒宋公于蒙澤遇仇牧于門批而殺之遇太宰督于東宫又殺之公子御説奔亳南宫牛猛獲帥師圍毫蕭叔大心及戴武宣穆莊之族以曹師伐之殺牛立御説諡先公曰閔公獲奔衛萬奔陳宋人請獲于衛衛人欲勿與石祈子曰天下之惡一也惡於宋而保於我保之何補得一夫而失一國與惡而棄好非謀也衛人歸之亦請南宫萬於陳以賂陳人使婦人飲之酒而以犀革裹之比及宋手足皆見宋人皆醢之王崩諡曰莊王太子胡齊立經曰十有二年春王三月紀叔姬歸于酅魯莊四年紀侯去國叔姬至此始歸于酅者紀侯方卒故叔姬至此然後歸耳歸順詞以宗廟在酅歸奉其祀也不以亡故而虧婦道魯人髙其節義恩禮有加焉是故其歸于酅其卒其葬史册悉書夫子修書存而弗削使與衛之共薑同埀不朽為後世勸若夏侯令女曹爽之弟婦也寡居守志父母欲奪而嫁之誓而弗許而曰曹氏全盛之時尚欲保終況今衰亡何忍棄之聞者為之感動其聞叔姬之風而興起者乎夏四月秋八月甲午宋萬弒其君捷及其大夫仇牧太宰督亦死前而不書者身有罪也大夫死於弒君之難而有不書者故知孔父牧息皆所取也夫仇牧徒殺其身不能執賊亦足取乎食焉不避其難義也雖不能執賊亦足為求利焉而逃其難者之訓矣惟此義不行然後有視棄其君猶土梗辨髦曽莫之省而三綱絶矣冬十月宋萬出奔陳萬已醢矣曷為不書殺萬而葬閔公乎夫天下之惡一也陳人不以萬為賊而納之又受宋人之賂而使婦人飲之酒是與賊為黨非政刑也特書出奔陳而閔公不葬以著陳人與賊為黨之罪而不能正天討其法嚴矣故曰春秋成而亂臣賊子懼皇王大紀卷三十七

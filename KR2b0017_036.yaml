body:
  text: 皇王大紀卷三十六宋胡宏撰三王紀桓王十九年冬十一月齊侯衛侯鄭伯盟于惡曹楚屈瑕將盟二軫鄖人軍於蒲騷將與隨絞州蓼伐楚師莫敖患之鬭廉曰鄖人軍其郊必不誡且日虞四邑之至也君次於郊郢以禦四邑我以鋭師宵加於鄖鄖有虞心而恃其城莫有鬭志若敗鄖師四邑必離莫敖曰盍請濟師對曰師克在和不在衆成軍以出又何濟焉莫敖曰卜之對曰卜以決疑不疑何卜遂敗鄖師於蒲騷卒盟而還三月癸未鄭伯薨子忽嗣初齊人將妻忽忽辭祭仲曰必取之君多內寵子無大援將不立三公子皆君也弗從初祭仲有寵於莊公為公娶鄧曼生忽故祭仲立之夏五月鄭葬其君莊公宋雍氏女於莊公曰雍姞生公子突雍氏宗有寵於宋公宋公誘祭仲而執之曰不立突將死亦執突而求賂焉秋七月祭仲與宋人盟以突歸而立之鄭伯忽出奔衛鄭國風九篇曰有女同車二章章六句刺忽也鄭人刺忽之不昏于齊太子忽嘗有功于齊齊侯請妻之齊女賢而不取卒以無大國之助至於見逐故國人刺之有女同車顔如舜華親迎同車也舜木槿也將翺將翔佩玉瓊琚佩有琚瑀所以納間彼美孟薑洵美且都孟薑齊長女間都也有女同行顔如舜英行行道也英猶華也將翺將翔佩玉將將將將鳴玊而後行彼美孟薑德音不忘鄭國風十篇曰山有扶蘇二章章四句刺忽也所美非美然也山有扶蘇隰有荷華興也扶蘇扶胥小木也荷華扶渠也其華菡蓞言髙下大小各得其所也不見子都乃見狂且子都世人之美好者也狂狂人也且辭也山有橋松隰有遊龍松木也龍紅草也不見子充乃見狡童子充良人也狡童昭公也鄭國風十一篇曰蘀兮二章章四句刺忽也君弱臣強不倡而和也蘀兮蘀兮風其吹女興也蘀稿也人臣待君倡而後和叔兮伯兮倡豫和女叔伯言羣臣長幼也君倡臣和也蘀兮蘀兮風其漂女漂猶吹也叔兮伯兮倡豫要女要成也鄭國風十二篇曰狡童二章章四句刺忽也不能與賢人圖事權臣擅命也彼狡童兮不與我言兮昭公有狂狡之志維子之故使我不能餐兮憂懼不遑餐也彼狡童兮不與我食兮不與賢人共食祿維子之故使我不能息兮憂不能息也宋公陳侯魯柔蔡叔盟于折魯侯會宋公于夫鍾冬十月魯侯會宋公于闞經曰十有一年春正月齊人衛人鄭人盟于惡曹微者盟會不志于春秋其所志必有君與貴大夫矣惡曹之盟三國之君也既不以道興師又結怨固黨故前書其爵而以來戰著罪後書此盟而以奪爵示貶夏五月癸未鄭伯寤生卒鄭莊公一念不善志殺其弟使糊其日於四方自以為保國之計得也然身歿未幾忽儀亹突則而象之兄弟相殘國內大亂民人思保其室家而不得不亦酷乎可以為永鑒矣秋七月葬鄭莊公九月宋人執鄭祭仲祭仲不名命大夫也以天子命大夫為諸侯相乃至於見執廢絀其君而立不正不亦甚乎故稱其字者所以尊王命貴正卿大祭仲之罪以深責之也春秋美惡不嫌同詞突之書名則本非有國由祭仲立之也若忽則以世嫡之正至於見逐不能立乎其位貴賤之分亡矣凡此類皆聖人親筆非國史所能與也突歸于鄭不以突繫之鄭者正其不當立也不稱公子絶之也何以書于鄭春秋書歸有二義一易詞也一順詞也其書入亦有二義一難詞也一逆詞也突雖不順焉權臣許之立大國為之援而世子忽之才不能以自固也則其歸無難故榖梁子曰歸易詞也鄭忽出奔衛忽以國氏正也出奔而名不能君也考於詩可以見忽之失國亦其自取非獨仲之罪矣春秋書法如此欲人自強於為善者也柔會宋公陳侯蔡叔盟于折公會宋公于夫鍾冬十有二月公會宋公于闞二十年夏四月壬寅魯侯會把侯莒子于曲池平二國盟焉宋多責賂於鄭鄭不堪命魯侯欲平宋鄭五月丁亥會宋公燕人盟于句瀆之丘六月壬辰陳侯薨舍公子完而立弟林魯侯以宋公之成未可知也再會之于虛九月又會之于龜宋公辭平丙戌遂與鄭伯盟于武父十月陳葬其君厲公丙戌衛侯薨子朔嗣魯侯鄭伯帥帥伐宋戰焉楚伐絞莫敖屈瑕曰絞小而輕輕則寡謀請無扞採樵者以誘之從之絞人獲三十人明日絞人爭出楚人坐其北門而覆諸山下大敗之為城下之盟而還伐絞之役楚師分涉於彭羅人欲伐之使伯嘉諜之三巡數之經曰十有二年春正月夏六月壬寅公會把侯莒子盟于曲池秋七月丁亥公會宋公燕人盟于榖丘八月壬辰陳侯躍卒公會宋公于虛冬十有一月公會宋公于龜丙戌公會鄭伯盟于武父魯君臣頻與宋公盟會皆存而不削何其費也曰盟者春秋所惡而屢盟以長亂會者諸侯所不得而數會以厚疑聖人不削者於以見屢盟而卒叛數會而卒離故春秋之志在於天下為公講信修睦不以會盟為可恃也丙戌衛侯晉卒十有二月及鄭師伐宋丁未戰于宋宋責賂於鄭而無厭屢盟於魯而無信二國聲其罪以致討故書曰伐然取其賂以立督者魯桓也資其力以篡國者鄭突也無諸己然後非諸人春秋之義用賢治不肖不以亂易亂也故又書曰戰于宋罪在內也二十一年冬十一月楚屈瑕伐羅鬬伯比送之還謂其御曰莫敖必敗舉趾髙心不固矣遂見楚子曰必濟師楚子辭焉夫人鄧曼曰大夫其非衆之謂其謂君撫小民以信訓諸司以德而威莫敖以刑也莫敖狃於蒲騷之役將自用也夫固謂君訓衆而好鎮撫之召諸司而勸之以令德見莫敖而告諸天之不假易也不然夫豈不知楚師之盡行也楚子使賴人追之不及莫敖使徇于師曰諌者有刑及鄢亂次以濟且不設備及羅羅與盧戎兩軍之大敗之莫敖縊于荒谷羣帥囚于冶父以聽刑楚子曰孤之罪也皆免之十二月齊侯帥師及宋公衛侯燕人侵紀魯侯鄭伯會紀侯伐之四國之師皆敗走春正月衛葬其君宣公魯大水王寵子克屬諸周公黑肩辛伯諌曰內寵並后嬖子匹嫡外寵二政大都耦國亂之本也弗聽冬十月鄭人請修好于魯經曰十有三年春二月公會紀侯鄭伯己巳及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績齊為無道恃強淩弱而以紀為主何也彼為無道加兵於己必有引咎辨喻之文不得免則固其封守訴諸天子方伯及四鄰諸侯其必有伸之者矣不如是而憤然與戰為之援者弒君之賊篡國之人也不得保其國自此戰始矣故春秋以紀為主省德相時自治之意也三月葬衛宣公葬自內録也既與衛人戰曷為葬宣公怨不棄義怒不廢禮是知古人以葬為重也禮喪在殯孤無外事衛宣未葬朔乃即戎已為失禮又不稱子是以吉服從金革之事其為惡大矣凡此類據事直書年月具存而惡自見矣秋七月冬十月二十二年冬十一月魯侯鄭伯會于曹曹人致餼焉鄭使公子子人于魯尋盟且修曹之會夏六月壬申魯御廪災乙亥嘗齊侯生三子諸兒小白子糾使鮑叔牙傅小白鮑叔曰臣知棄矣召忽曰固也小白必不為後管仲曰事未知也冬十月丁巳齊侯薨諸兒嗣宋人以齊人蔡人衛人陳人伐鄭焚渠門入及大逵伐東郊取牛首以大宫之椽歸為盧門之椽秦庶長三父等賊殺出子復立世子武公經曰十有四年春正月公會鄭伯于曹無冰古人於冰藏之周用之遍亦理隂陽天地之一事也仲冬燠而無氷則政治縱弛不明之所致也春秋經邦大訓而書法若此其察於四時之變詳矣夏五傳疑也疑而不益見聖人之慎也而世或以私意改易古書者有矣盍亦視此為鑒也然則春秋何以謂之作曰其義則斷自聖心或筆或削明聖人之大用其事則因舊史有可損而不能益也鄭伯使其弟語來盟來盟稱使則前定之盟也其不稱使如楚屈宄齊髙子則權在二子盟不盟特未定也秋八月壬申御廪災門觀災而新作則書御廩災其新必矣何以不書常事也以為常事而不書垂教之意深矣知其説者然後知其國之急務為政之後先矣乙亥嘗禮以時為大六月嘗則不時也禮以敬為本壬申災乙亥嘗是不改卜而供未易災之餘則不敬也故書冬十有二月丁巳齊侯祿父卒宋人以齊人蔡人衛人陳人伐鄭師而曰以能左右之以行己意也列國之兵有制皆統乎天子而敢私用之與私為之用以伐人國大亂之道也故榖梁子曰以者不以者也二十三年甲申冬十二月王使家父求車于魯古者諸侯不貢車服天子不私求財春正月乙未王崩諡曰桓王太子他立二月己巳齊葬其君僖公祭仲專鄭伯患之使其壻雍糾殺之雍姬知之以告仲三月仲殺糾公載以出奔蔡曰謀及婦人宜其死也四月乙亥鄭昭公入許叔復歸于許齊侯魯侯盟于艾以謀定許邾人牟人葛人朝于魯鄭伯突因櫟人殺檀伯而遂居櫟九月宋公魯侯衛侯陳侯會于袲伐鄭將納突弗克而還秦伐彭戲氏至于華山經曰十有五年春二月天王使家父來求車需索之謂求王畿千里所入不至於有求諸侯各有職貢不至於來求若王者有求下觀而化未至於篡弒奪攘則不厭矣古之君人者必昭儉德以臨照百官尊卑登降各有度數示等威明貴賤然後民志定安其分而無求兵刑寢矣及侈心一動莫為防制必至於亢不衷官失德廉恥道喪寵賂日章淪於危亡而後止也觀春秋所書則見王室衰亂之由而知興衰撥亂之説矣三月乙未天王崩夏四月己巳葬齊僖公五月鄭伯突出奔蔡祭仲逐君不書何也陸淳曰聖人之教在乎端本清源故凡諸侯之奔皆不書所逐之臣而以自奔為名所以警乎人君其説是也夫君實有國而出於臣乃其自取焉耳本正而天下之事理也鄭世子忽復歸于鄭忽嘗嗣位君其國歸而獨稱世子者亡其君位也其稱復歸謂絶而復歸也古者諸侯世國故失國出奔歸而稱復則可大夫不世官故失位出奔歸而稱復則不可或曰復厭詞也許叔入于許許大嶽之裔先王建國迫於齊鄭不得奉其社稷則當伸大義以直詞告諸天子方伯求復其國糞除宗廟孰能與之爭今乃因亂竊入則非復國之義故書入入云者難詞也公會齊侯盟于艾邾人牟人葛人來朝公羊曰皆何以稱人皆外之也其外之何天王崩不奔喪而相率朝弒君之賊也秋九月鄭伯突入于櫟制邑之死虢君京城之叛大叔皆莊公所親戒也而又城櫟而置子元焉使昭公不立何謀國之疏也衛有蒲戚而出獻公楚有陳蔡不羮而叛棄疾末大必折有國之害也故夫子行乎季孫墮三都以張公室於厲公復國削而不書獨書入于櫟則其國已復矣於以明居重馭輕強幹弱枝以身使臂之義為來世鑒也為國者可不謹於禮乎春秋此義皆小康之事衰世之意也冬十有一月會宋公衛侯陳侯于袲伐鄭榖梁曰地而後伐疑詞非其疑也昭公與突之是非邪正亦明矣然昭公雖正其才不足以君一國之人復歸于鄭日以微弱厲公雖篡其智足以結四鄰之援既入于櫟日以盛強諸侯不顧是非而計其強弱始疑於輔正終變而與邪故詳書其會地而後言伐譏其疑於為義而果於為不義也莊王元年冬十一月宋公魯侯蔡侯衛侯會于曹謀伐鄭也春二月諸侯遂伐鄭弗克而還衛國風六篇曰芃蘭二章章六句刺惠公也驕而無禮大夫刺之芃蘭之支興也芃蘭草也君子之德當柔潤溫良童子佩觿觿所以解結成人之佩也人君治成人之事雖童子猶佩觿早成其德雖佩佩觿能不我知不自謂無知以驕慢人也容兮遂兮垂帶悸兮容儀可觀佩玉遂遂然垂其紳帶悸悸然有節度芃蘭之葉童子佩韘韘玦也能射御則佩韘雖則佩韘能不我甲甲狎也容兮遂兮垂帶悸兮衛左公子泄右公子職怨衛侯之搆殺二子也相與立羣公子黔牟而逐之衛侯奔齊鄘國風二篇曰牆有茨三章章六句衛人刺其上也公子頑通乎君母國人疾之而不可道也牆有茨不可掃也興也牆所以防非常茨蒺藜也欲掃去之反傷牆也中冓之言不可道也中冓內冓也所可道也言之醜也於君醜也牆有茨不可襄也中冓之言不可詳也詳審也所可詳也言之長也長惡長也牆有茨不可束也束而去之中冓之言不可讀也讀抽也所可讀也言之辱也辱辱君也鄘國風三篇曰君子偕老三章一章七句一章八句一章九句刺衛夫人也夫人淫亂失事君子之事故陳人君之德服飾之盛宜與君子偕老也君子偕老副笄六珈能與君子俱老乃宜居尊位服盛服也副者后夫人之首飾編髮為之笄衡笄也珈笄飾之最盛者所以别尊卑委委他他如山如河委委者行可委曲從迹也他他者德平易也山無不容河無不潤象服是宜象服尊者所以為飾子之不淑云如之何有子若是何謂不善乎玼兮玼兮其之翟也玼鮮盛貌褕翟翟羽飾衣也鬒髮如雲不屑髢也鬒黑髮也如雲言美長也屑潔也玉之瑱也象之揥也瑱塞耳也揥所以摘髮也揚且之晳也揚眉之廣晳白晳胡然而天也胡然而帝也尊之如天審諦如帝瑳兮瑳兮其之展也蒙彼皺絺是袣袢也禮有展衣者以丹縠為衣蒙覆也絺之靡者為皺當是濖袢延之服也子之清揚揚且之顔也清視清明也揚廣揚而顔角豐滿展如之人兮邦之媛也展誠也美女為媛鄘國風五篇曰鶉之奔奔二章章四句刺衛宣薑也衛人以為宣薑鶉鵲之不若也鶉之奔奔鵲之強強鶉則奔奔鵲則強強然人之無良我以為兄良善也兄謂君之兄鵲之強強鶉之奔奔人之無良我以為君君國小君鄘國風四篇曰桑中三章章七句刺奔也衛之公室淫亂男女相奔至于世族在位相竊妻妾期於幽逺政散民流而不可止衛之公室淫亂謂宣惠之世男女相奔不待媒氏以禮會之也世族在位取薑氏弋氏庸氏者也竊盜也幽逺謂桑中之野爰采唐矣沫之鄉矣爰於也唐蒙菜名沫衛邑云誰之思美孟薑矣薑姓也言世族在位有是惡行期我乎桑中要我乎上宫送我乎淇之上矣桑中上宫所期之地淇水名爰采麥矣沫之北矣云誰之思美孟弋矣弋姓也期我乎桑中要我乎上宫送我乎淇之上矣爰采葑矣沫之東矣云誰之思美孟庸矣庸姓也期我乎桑中要我乎上宫送我乎淇之上矣弼國風七篇曰凱風四章章四句美孝子也衛之淫風流行雖有七子之母猶不能安其室故美七子能盡其孝道以慰其母心而成其志焉凱風自南吹彼棘心興也南風謂之凱風樂夏之長養棘難長養者棘心夭夭母氏劬勞夭夭盛貌劬勞病苦也凱風自南吹彼棘薪棘薪其成就者母氏聖善我無令人聖也爰有寒泉在浚之下浚衛邑也在浚之下言冇益於浚有子七人母氏勞苦睍睆黃鳥載好其音睍睆好貌有子七人莫慰母心慰安也經曰十有六年春正月公會宋公蔡侯衛侯于曹夏四月公會宋公衛侯陳侯蔡侯伐鄭春會于曹蔡先於衛四月伐鄭衛先於蔡王制諸侯之爵次其先後有序不可亂也春秋時霸者以意之向背為升降諸國以勢之強弱為上下蔡嘗先衛今序陳下者先儒以為後至也以至先後易其序是以利率人而不要諸禮也後世有以醵賞誘人之趨事赴功以重罰沮人之奉公守正意亦如此夫亂之所由生也則儀位以為階春秋防微杜漸尤嚴於名分考其所書意自見矣秋七月公至自伐鄭其致罪納突也罪桓之上無王法恣為不義而莫之禁也冬城向十有一月衛侯朔出奔齊二年冬十一月丙辰魯侯齊侯紀侯會盟于黃魯侯平齊紀且謀衛故也十有二月丙午魯侯邾子會盟于趡三月齊人侵魯疆疆吏來告公曰強場之事慎守其一而備其不虞姑盡所備事至而戰又何謁焉丙午及齊師戰于奚四月丁丑蔡侯薨弟獻舞嗣蔡人召蔡季于陳六月季自陳歸于蔡蔡人嘉之癸巳蔡人葬其君桓侯魯宋衛伐邾天子有日官諸侯有日御日官居卿以底日日御不失日以授百官于朝八月朔日有食之不書日官失之也鄭國風十三篇曰褰裳二章章五句思見正也狂童恣行國人思大國之正已也子惠思我褰裳涉溱惠愛也溱水名也子不我思豈無他人狂童之狂也且狂行童昏所化也子惠思我褰裳涉洧洧水名也子不我思豈無他士士事也狂童之狂也且鄭國風十四篇曰丰四章二章章三句二章章四句刺亂也婚姻之道闕陽倡而隂不和男行而女不隨子之丰兮俟我乎巷兮丰豐滿也巷門外也悔豫不送兮時有違而不至者子之昌兮俟我乎堂兮昌盛壯貌悔豫不將兮將行也衣錦褧衣裳錦褧裳衣錦褧裳嫁者之服叔兮伯兮駕豫與行叔伯迎己也裳錦褧裳衣錦褧衣叔兮伯兮駕豫與歸鄭國風十五篇曰東門之墠二章章四句刺亂也男女有不待禮而相奔者也東門之墠茹藘在阪東門城東門也墠除地町町者茹藘茅搜也男女之際近而易則如東門之墠逺而難則如茹藘在阪其室則邇其人甚逺邇近也得禮則近不得禮則逺東門之栗有踐家室栗行上栗也踐淺也豈不爾思子不我即就也鄭國風十六篇曰風雨三章章四句思君子也亂世則思君子不改其度焉風雨凄凄雞鳴喈喈興也風雨凄凄然雞鳴猶守時而鳴喈喈然既見君子云胡不夷胡何夷説也風雨瀟瀟雞鳴膠膠瀟瀟暴疾也膠膠猶喈喈也既見君子云胡不瘳瘳愈也風雨如晦雞鳴不已晦昏也既見君子云胡不喜鄭國風十七篇曰子襟二章章四句刺學校廢也亂世則學校不修焉青青子襟悠悠我心青襟青領也學子之所服縱我不往子寧不嗣音嗣習也古者教以詩樂誦之歌之絃之舞之青青子佩悠悠我思佩佩玉也士佩瓀珉而青組綬縱我不往子寧不來不來者言不一來也佻兮逹子在城闕兮佻逹往來相見貌乘城而見闕一日不見如三月兮言禮樂不可一日而廢鄭忽素惡髙渠彌渠彌因獵射而殺之諡曰昭公祭仲立公子亹鄭國風十八篇曰揚之水二章章六句閔無臣也君子閔忽之無忠臣良士終以死亡而作是詩也揚之水不流束楚揚激揚也激揚之水可謂不能流溧束楚乎終鮮兄弟維豫與女無信人之言人實迋女迋誑也揚之水不流束薪終鮮兄弟維豫二人二人同心也無信人之言人實不信秦人誅三父等夷三族討其弒出子也經曰十有七年春正月丙辰公會齊侯紀侯盟于黃二月丙午公會邾儀父盟于趡五月丙午及齊師戰于奚六月丁丑蔡侯封人卒秋八月蔡季自陳歸于蔡季字也歸順詞劉敞曰若季者所謂智足以與權而不亂力足以得國而不居逺而不攜邇而不迫者也是以見貴於春秋癸巳葬蔡桓侯啖助曰蔡桓何以稱侯蓋蔡季之賢知請諡也人亦多愛其君莫能愛君以禮而季能行也此賢者所以異於衆人也然則魯君生而稱公可乎曰生而稱公為虛位禮之文也沒而繫諡為定名禮之實也春秋諸侯雖伯子男葬皆稱公志其失禮之實為後世戒欲其以正終也人子不以非所得而加於父是為孝人臣不以非所得而加於君是為忠其垂訓之義大矣及宋人衛人伐邾冬十月朔日有食之三年冬十有一月魯侯將與夫人如齊申繻曰女有家男有室無相瀆也謂之有禮易此必敗不聽會齊侯于濼遂與夫人同如齊齊侯通焉公謫之以告齊國風九篇曰敝笱三章章四句刺文薑也齊人惡魯桓公微弱不能防間文薑使至淫亂為二國患焉敝笱在梁其魚鮪鰥興也鰥大魚齊子歸止其從如雲如雲言盛也敝笱在梁其魚魴鱮魴鱮大魚齊子歸止其從如雨加雨言多也敝笱在梁其魚唯唯唯唯出入不制齊子歸止其從如水水喻衆也二月丙子齊侯設享使公子彭生乘魯侯薨于車魯人告于齊曰寡君畏君之威不敢寧居來修舊好禮成而不反無所歸咎惡于諸侯請以彭生除之齊人殺彭生魯人以其君喪歸世子同嗣齊侯師于首止鄭子亹會之髙渠彌相齊人殺子亹而轘髙渠彌祭仲逆子儀于陳而立之鄭國風十九篇曰出其東門二章章六句閔亂也公子互爭兵革不息男女相棄民人思保其室家焉出其東門有女如雲如雲衆多也雖則如雲匪我思存思不存乎相救急縞衣綦巾聊樂我員縞衣白色男服也綦巾蒼艾色女服也願室家得相樂也出其闉闍有女如荼闉曲城也闍城臺也荼英荼也言皆喪服也雖則如荼匪我思且縞衣茹藘聊可與娛茹藘茅搜之染女服也娛樂也鄭國風二十篇曰野有蔓草二章章六句思遇時也君之澤不下流民窮於兵革男女失時思不期而會焉野有蔓草零露漙兮興也野四郊之外蔓延也漙漙然盛多也有美一人清揚婉兮邂逅相遇適我願兮清揚眉目之間婉然美也邂逅不期而會適其時願野有蔓草零露瀼瀼瀼瀼盛貌有美一人婉如清揚邂逅相遇與子偕臧臧善也鄭國風終二十一篇曰溱洧二章章十二句刺亂也兵革不息男女相棄淫風大行莫之能救焉溱與洧方渙渙兮溱洧鄭兩水名渙渙春水盛也士與女方秉蕳兮蕳蘭也女曰觀乎士曰既且且往觀乎洧之外洵訏且樂訏大也維士與女伊其相謔贈之以勺藥勺藥香草溱與洧瀏其清矣瀏深貌士與女殷其盈矣殷衆也女曰觀乎士曰既且且往觀乎洧之外洵訏且樂維士與女伊其相謔贈之以勺藥周公欲弒王而立子克辛伯以告王殺黑肩子克奔燕冬十月己丑魯葬其君桓公經曰十有八年春王正月是年魯桓已終復書王者春秋之時諸侯篡弒者已列於會則不復致討孔子為此懼作春秋於十八年復書王者明弒君之賊雖身已歿而王法不得赦也又據桓十五年天王崩至是新君嗣立三年之喪畢矣明弒君之賊雖在前朝而古今之惡一也然則篡弒者不容於天地之間身無存歿時無古今皆得討而不赦聖人之法嚴矣故曰春秋成而亂臣賊子懼公會齊侯于濼公與夫人薑氏遂如齊與者許可之詞公於齊薑委曲從順無所不可敝笱之詩所以刺也故為亂者文薑而春秋罪桓公治其本也乾者夫道也以乘御為才坤者婦道也以承順為事易著于乾坤述其理春秋施於桓公見其用也夏四月丙子公薨于齊魯君弒者不地以見弒今書薨于齊不殁其實乎前書公與夫人薑氏如齊後書夫人孫于齊去其姓氏而莊公不書即位則其實亦明矣丁酉公之喪至自齊秋七月冬十有二月己丑葬我君桓公公羊曰賊未討何以書葬讐在外也榖梁子曰讐在外者不責踰國而討于是也故十八年書王而桓公書葬惟可與權者其知之矣四年春正月魯桓夫人以桓公之不得其所也歸于齊先王之制天子嫁女於諸侯必使諸侯同姓者主之諸侯嫁女於大夫必使大夫同姓者主之王女之嫁于齊者魯世為之主至是王將妻齊侯使魯大夫單伯逆之于京師魯人以桓公之見殺於齊疑欲弗為之主遂為王姬築别館館之于外八月乙亥陳侯薨弟杵臼嗣王使榮叔錫魯桓公命於是魯遂主王姬歸于齊王國風終十一篇曰丘中有麻三章章四句思賢也莊王不明賢人放逐國人思之而作是詩也丘中有麻彼留子嗟留大夫氏子嗟字也丘中墝埆之處盡有麻麥草木乃彼子嗟之所治彼留子嗟將其來施施施施難進之意丘中有麥彼留子國子國子嗟父彼留子國將其來食子國復來我乃得食丘中有李彼留之子彼留之子貽我佩玖玖石次玉者言能遺我美實齊侯帥師遷紀三邑郱鄑郚以為已屬經曰元年春王正月魯莊公雖世嫡可以有國然未誓於王則得稱世子擅有其國故不書即位三月夫人孫于齊夫人與聞乎弒臣子義不共戴天而嗣君夫人所出也恩如之何徇私情則害天下之大義舉王法則傷母子之至恩此國論之難斷者也梁人有繼母殺其父者而其子殺之有司欲當以大逆孔季彥曰文薑與弒魯桓春秋去其薑氏絶不為親與凡人等也今宜以非司寇而擅殺當之不得以逆論也人以為允孫者順讓委逺之詞使若不為人子所逐以全恩也有若去而弗返深絶之也然則恩輕而義重矣聖人取河廣之詩者明宋襄公之重本亦此義也垂訓逺矣夏單伯逆王姬單伯者魯之命大夫也逆王姬使魯為之主也其不言如者魯君弒於齊使之主婚姻與齊為禮榖梁子以為義不可受於京師也此明忘親釋怨則無以立人道矣秋築王姬之館于外魯主王姬之嫁舊矣館於國中必有常處今特築之于外者榖梁子以為仇讐之人非所以接婚姻也衰麻非所以接辨冕也知其不可故特築之于外也築之于外不若辭而弗主之為正也春秋於此事一書再書又再書者其義以復讐為重示天下後世臣子不可忘君親之意冬十月乙亥陳侯林卒王使榮叔來錫桓公命啖助曰不稱天王寵篡弒以瀆三綱也春秋書王必稱天所履者天位也所行者天道也所賞者天命也所刑者天討也桓公弒君篡國而王不能誅反追命之無天甚矣桓無王王無天非小惡也與葬成風使妾並嫡無以異故其文一施之范寧以為非義之所存誤矣王姬歸于齊魯主王姬在他時常事不書此獨書者以歸于齊故也逆于京師築館于外而不書歸于齊則無以見其罪之在也書歸于齊而後忘親釋怨之罪著矣春秋復讐之義明矣齊師遷紀郱鄑郚此紀三邑也邑不言遷遷不言師其以師遷之者見紀民猶足與守而齊人強暴用大衆以迫之為已屬也凡書遷者自是而滅矣春秋興滅國繼絶世則遷國邑者不再貶而罪已見矣皇王大紀卷三十六

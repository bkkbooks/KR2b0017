body:
  text: 皇王大紀卷七十八宋胡宏撰三王紀赧王五十年秦伐趙取三城趙王新立太后用事求救扵齊齊人曰必以長安君為質太后不可齊師不出大臣强諫太后明謂左右曰復言者老婦必唾其靣左師觸龍請見太后盛氣胥之入左師公徐趨而坐謝曰老臣病足不能見乆矣而恐太后體之有所苦也太后曰老婦恃輦而行食得無衰乎曰恃粥耳不和之色稍解左師曰賤息舒祺最少而臣衰竊憐愛之願得補黒衣之闕以衛王宫太后曰諾年幾何曰十五嵗矣雖少願及臣未填溝壑而託之太后曰丈夫亦愛少子乎曰甚於婦人太后笑曰婦人異甚對曰老臣竊謂媪之送燕后也持其踵而泣念其逺也亦哀之而已已行非不思也祭祀則祝之曰必勿使反豈非為之計長乆為子孫相繼王也者太后曰然左師曰今三世已前至於王之子孫為侯者其繼有在者乎曰無有曰此其近者禍及身逺者及子孫豈人主之子侯則不善哉位尊奉厚無功勞而挾重器多也今媪尊長安君封以膏腴之地多與之重器而不及今令有功於國一旦山陵崩長安君何以自託於趙哉太后曰諾恣君之所使乃為長安君約車百乗質于齊齊師乃出秦師退趙王聞荀卿賢召見問以兵要對曰在乎附民齊人隆技擊得一首者賜贖錙金無本賞矣事大敵堅則渙然離耳是亡國之兵也其去賃市傭而戰之幾矣魏氏武卒以度取之衣三屬之甲操十二石之弩負矢五十箇置戈其上冠胄帯劔贏三日糧日中而趨百里中試則復其戶利其田宅氣力數年而衰而復利未可奪改造則不易周也故地雖大其税必寡是危國之兵也秦人使民要利於上者非鬬無由以功相賞五甲首而隷五家最為衆强長乆之道四世有勝非幸也故齊之技擊不可以遇魏之武卒魏之武卒不可以遇秦之鋭士秦之銳士不可以當桓文之節制桓文之節制不可以敵湯武之仁義王曰善請問為将對曰號令欲嚴以威賞罰欲必以信處舎欲周以固進退欲安以重欲疾以速窺敵觀變欲濳以深欲伍以參遇敵决戰毋行吾所疑毋欲将而惡廢毋急勝而忘敗毋威内而輕外毋見其利而不顧其害凡慮事欲熟而用財欲泰可殺而不可使處不完可殺而不可使擊不可勝可殺而不可使欺百姓慎此六術五權三至而處之以恭敬無壙是謂天下之将矣卿名况亦以其所學著書其略曰君子曰學不可以己青出於藍而青於藍氷水為之而寒於水木受繩則直金就礪則利君子博學而日省乎已則知明而行無過矣故不聞先王之遺言不知學問之大也詩曰嗟爾君子無恒安息靖共爾位好是正直神之聼之介爾景福神莫大於化道福莫長於無禍吾嘗終日而思矣不如湏㬰之所學也假輿馬者致千里假舟檝者絶江河君子生非異也善假於物也蓬生麻中不扶而直故君子居必擇鄉逰必就士所以防邪僻而近中正也物類之起必有所使榮辱之来必象其徳質的張而弓矢至焉林木茂而斧斤至焉故言有召禍也行有招辱也君子其慎所立乎積善成徳而神明自得聖心循焉故不積跬歩無以至千里不積小流無以成江河功在不舎鍥而不舎金石可鏤是故行衢道者不至事兩君者不容目不兩視而明耳不兩聽而聰螣蛇無足而飛鼯䑕五技而窮詩曰淑人君子其儀一兮心如結兮故君子結於一也聲無小而不聞行無隠而不形玉在山而木潤淵生珠而崖不枯為善不積邪安有不聞者乎學惡乎始惡乎終曰其數則始乎誦經終乎讀禮其義則始乎為士終乎為聖人真積力乆則入學至乎没而後止也書者政事之紀也詩者中聲之所止也禮者法之大分羣類之綱紀也故學至乎禮而止矣夫是之謂道徳之極禮之敬文也樂之中和也詩書之博也春秋之微也在天地之間者畢矣君子之學也入乎耳著乎心布乎四體形乎動静以美其身也小人之學以為禽犢學之經莫速乎好其人隆禮次之上不能好其人下不能隆其禮則卒世窮年不免為陋儒而已将原先王本仁義則禮正其經緯蹊徑也不道禮憲以詩書為之譬之猶以指測河戈舂黍也倫類不通仁義不一不足謂善學全之盡之然後學者也君子知夫不全不粹不足以為美也故誦數以貫之思索以通之為其人以處之除其害者以持養之使目非是無欲見也使耳非是無欲聞也使口非是無欲言也使心非是無欲慮也及至其致好之也目好之五色耳好之五聲口好之五味心利之有天下是故權利不能傾也羣衆不能移也天下不能蕩也生乎由是死乎由是夫是之謂徳操徳操然後能定能定然後能應能定能應夫是之謂成人荀子曰見善修然必以自存也善在身介然必以自好也非我而當者吾師也是我而當者吾友也諂諛我者吾賊也隆師而親友以致惡其賊凢用血氣志意知慮由禮則治通不由禮則勃亂提僈食飲衣服動靜居處由禮則和節不由禮則夷固辟違庸衆而野故人無禮則不生事無禮則不成國家無禮則不寕凡治氣養心之術莫徑由禮莫要得師莫神一好志意修則驕富貴矣道義重則輕王公矣内省則外物輕矣身勞而心安為之利少而義多為之事亂君而通不如事窮君而順焉故良農不為水旱不耕良賈不為折閲不市士君子不謂貧窮怠乎道道雖邇不行不至事雖小不為不成其為人也多暇日者其出入不逺矣禮者所以正身也師者所以正禮也禮然而然則是情安禮也師云而云則是知若師也情安禮知若師則是聖人也君子之求利也略其逺思也早其避辱也懼其行道理也勇君子貧窮而志廣隆仁也冨貴而體恭殺勢也安燕而血氣不惰柬理也勞勌而容貎不枯好交也怒不過奪喜不過予法勝私也書曰無有作好遵王之道無有作惡遵王之路此言君子之能以公義勝私欲也荀子曰君子行不貴茍難説不貴茍察名不貴茍𫝊唯其當之為貴君子能則寛容易直以開道人不能則恭敬繜絀以畏事人小人能則倨傲僻違以驕溢人不能則嫉妬怨誹以傾覆人君子寛而不僈亷而不劌辯而不爭柔從而不流崇人之徳揚人之美非諂諛也正義直指舉人之過非毁疵也言己之光美擬於舜禹參於天地非夸誕也與時屈伸柔從若蒲葦非懾怯也剛强猛毅靡所不信非驕暴也以義變應知當曲直故也詩曰左之左之君子宜之右之右之君子有之此言君子之能以義屈信變應也君子養心莫善於誠唯仁之為守唯義之為存誠心守仁則形形則神神則能化矣誠心行義則理理則明明則能變化矣變化代興謂之天徳誠者君子之所守而政事之本也君子位尊而志恭心小而道大所聽視者近而所聞見者逺是何耶則操術然也故千人萬人之情一人之情是也故操彌約而事彌大公生明偏生闇端慤生通詐偽生塞誠信生神夸誕生惑見其可欲也則必慮其可惡也見其可利也則必慮其可害也取舎如是則常不失於陷矣荀子曰鬬者忘其心者也忘其親者也忘其君者也人之有鬬何哉我甚醜之輕死而暴是小人之勇也重死持義而不撓是士君子之勇也自知者不怨人知命者不怨天先義而後利者榮先利而後義者辱志意致修徳行致厚智慮致明是天子之所以取天下也政令法舉措時聽斷公上順天子下保百姓是諸侯之所以取國家也志行修順上保職是士大夫之所以取田邑也修法則度量刑辟圗籍不知其義謹守其數父子相傳是官人百吏之所以取秩禄也孝悌愿慤􅟁録疾力以敦比其事業而不敢怠傲是庶人之所以煖衣飽食也飾邪説文姦言為倚事以偷生反側於亂世之間是姦人之所以取危辱死刑也材性知能君子小人一也君子注錯之當小人注錯之過譬之越人安越楚人安楚是非知能材性然也是注錯習俗之節異也仁義徳行常安術也然而未必不危也汗僈突盗常危術也然而未必不安也君子道其常而小人道其怪饑而欲食寒而欲煖勞而欲息好利而惡害目辨白黒美惡耳辨音聲清濁口辨鹹酸甘苦鼻辨芬芳腥臊骨體膚理辨寒暑疾養可以為堯禹可以為桀跖可以為工匠可以為農賈是人之所生而有也是無待而然者也是禹桀之所同也為堯禹則常安榮為桀跖則常危辱堯禹者非生而具者也夫起於變故成乎修之為待盡而後備者也人之生固小人無師無法則惟利之見耳君子非得勢以臨之則無由得開内焉今使人生而未嘗睹芻豢稻粱也惟菽藿糟糠之睹則以至足為在此也俄而粲然有秉芻豢稻粱者而至臭之而無嗛於鼻嘗之而甘於口食之而安於體則莫不棄此而取彼矣今以夫先王之道仁義之統以相羣居以相持飬以相藩飾以相安固以夫桀跖之道㡬直夫芻豢之懸糟糠耳哉然而人力為此而寡為彼何也曰陋也仁者告之示之靡之儇之鈆之重之則夫塞者俄且通也陋者俄且僩也愚者俄且知也是豈非人之情固可與如此可與如彼也哉人之情食欲有芻豢衣欲有丈繡行欲有輿馬然有者幾不長慮顧後而恐無以繼之故也偷生淺知之屬曽此而不知是其所以不免於凍餓操瓢囊為溝壑中瘠者也先王之道仁義之統詩書禮樂之分固為天下生民之屬長慮顧後而保萬世也非熟修為之君子莫之能知也以治情則利以為名則榮以羣則和以獨則足樂意者其是耶夫貴為天子富有天下是人情之所同欲也然則從人之欲則勢不能容物不能贍也故先王按為之制禮義以分之使有貴賤之等長㓜之差智愚能不能之分皆使人載其事而各得其宜故或祿天下而不自以為多或監門御旅抱闗擊柝而不自以為寡夫是之謂人倫荀子曰古有姑布子卿今世有唐舉相人之形状顔色而知其吉凶妖祥世俗稱之學者不道也故相形不如論心論心不如擇術孫叔敖突秃長左葉公子高微小短瘠然仁義功名善於後世桀紂長巨姣美然身死國亡為天下大僇人有三不祥㓜而不肯事長賤而不肯事貴不肖而不肯事賢是不祥也為上則不能愛為下則好非其上是人之必窮也人之所以為人者以其有辨也辨莫大於分分莫大於禮禮莫大於聖王聖王有百吾孰法焉文乆而息節奏乆而絶欲觀千嵗則審今日欲知億萬則審一二欲知上世則審周道欲知周道則審其人所貴君子故曰以近知逺以一知萬以㣲知明此之謂也凡言不合先王不順禮義謂之姦言法先王順禮義然而不好言不樂言則非必誠士也凡人莫不好言其所善而君子為甚故贈人以言重於金石珠玉觀人以言美於黼黻文章聽人以言樂於鐘鼓琴瑟故君子之於言無厭易曰括囊無咎無譽腐儒之謂也凡説之難以至髙遇至卑以至治接至亂善者於是間也與世偃仰緩急贏絀曲得所謂焉故君子度已則以繩接人則用抴度己以繩足為天下法則矣接人用抴故能容寛因求以成天下之大事故談説之術齊荘以蒞之端誠以處之堅強以持之分别以論之譬稱以明之欣驩芬薌以送之寳之珍之貴之神之如是則説常無不受小人辯言險而君子辯言仁也君子之行仁也無厭志好之行安之樂言之聽其言辯而無綂不足以和齊百姓是謂姦人之雄聖王起所以先誅也荀子曰飾邪説文姦言其持之有故其言之成理足以欺惑愚衆者有人矣縱性情安恣雎是它囂魏牟也忍情性茍以分異人為高是陳仲史鰌也不知一天下建國家之權稱上功用大儉約而僈差等是墨翟宋銒也無法而好作聼上從俗無所歸宿是慎到田駢也治恠說玩琦辯不可以為治是恵施鄧析也略法先王不知其綂材劇志大聞見雜博案往舊造説謂之五行僻違幽隐閉約而無解案飾其辭而祗敬之曰此真先君子之言也子思唱之孟子和之世俗不知其非遂受而𫝊之以為仲尼子弓為茲厚於後世是則子思孟子之罪也若夫總方略齊言行一綂類羣天下英傑而告之以太古教之以至順奥窔之間簟席之上歛然聖王之文章具焉佛然平世之俗起焉是聖人之不得勢者仲尼子弓是也一天下財萬物養長生民兼利天下通逹之屬莫不服從則聖人之得勢者舜禹是也今夫仁人将何務哉上則法舜禹之制下則法仲尼子弓之義以務息十二子之説如是而天下之害除仁人之事畢聖王之跡著矣兼服天下之心高上尊貴不以驕人聰明聖智不以窮人齊給速通不争先人剛毅勇敢不以傷人不知則問不能則學雖能必讓遇君則修臣下之義遇鄉則修長㓜之義遇長則修子弟之義遇友則修禮節辭讓之義遇賤而少者則修告導寛容之義故無不愛也無不敬也無與人争也恢然如天地之苞萬物如是則贒者貴之不肖者親之如是而不服者則可謂訞恠狡猾之人矣古之所謂士仕者合羣者也樂分施者也務事理者也今之所謂士仕者無禮義而唯權勢之嗜者也古之所謂處士者修正者也知命者也今之所謂處士者利心無足而佯無欲者也離蹤而跂訾者也君子率道而行端然正已不為物傾側第作其冠衶禫其辭禹行而舜趨是子張氏之賤儒也正其衣冠齊其顔色嗛然而終日不言是子夏氏之賤儒也偷儒憚事曰君子固不用力是子游氏之賤儒也彼君子不然佚而不惰勞而不慢宗原應變曲得其宜也荀子曰仲尼之門五尺之豎子言羞稱乎五伯是何也曰齊桓五伯之盛者也前事則殺兄而爭國内行則姑姊妹之不嫁者七人外事則詐邾襲莒并國三十五行事若是小人之傑也彼固曷足稱乎大君子之門哉王者致賢而能以救不肖委然成文而暴國自化故文王載百里地而天下一桀紂有天下而不得以匹夫老故人主不務得道而廣有其勢是其所以危也持寵處位終身不厭之術恭敬辭讓援賢博施推賢讓能少事長賤事貴不肖事賢是天下之通義也有人也勢不在人上而羞為人之下是姦人之心也君子時詘則詘時伸則伸荀子曰大儒之效武王崩成王㓜周公履天下之籍聽天下之斷教誨開導成王使諭於道成王冠成人周公歸周反籍焉故以枝代主而非越也君臣易位而非不順也因天下之和遂文武之業天下厭然猶一也是謂大儒之效秦昭王問荀卿曰儒無益人之國卿曰儒者法先王隆禮義謹乎臣子而致貴其上者也明於為社稷之大義通乎財萬物養百姓之經紀在本朝則志意定乎内禮節修乎朝法則度量正乎官忠信愛利刑于天下應之如讙何謂其無益於人之國也昭王曰善先王之道仁人隆也比中而行之曷謂中曰禮義是也言必當理事必當務凡事行有益於理者立之無益者廢之夫是之謂中事凡知説有益於理者為之無益者舎之夫是之謂中説我欲賤而貴愚而智貧而富可乎曰其惟學乎行之曰士也敦慕焉君子也知之聖人也上為聖人下為士君子孰禁我哉鄉也混然塗之人也俄而竝乎堯禹豈不賤而貴矣哉鄉也效門室之辨混然曽不能决也俄而原仁義分是非圖廻天下於掌上豈不愚而智矣哉鄉也胥靡之人俄而治天下之大器舉在此豈不貧而富矣哉故君子無爵而貴無祿而富不言而信不怒而威窮處而榮獨居而樂豈不至尊至富至重至嚴之情舉積此哉故曰誠此然後就也爭之則失讓之則至遵道則積夸誕則虛故君子務修其内而讓之於外務積徳於身而處之以遵道如是則貴名起之如日月天下應之如雷霆故曰君子隐而顯微而明辭讓而勝修百王之法若辨白黒應當時之變若數一二行禮若生四枝立功若詔四時如是則可謂聖人矣此其道出乎一曷謂一曰執神而固曷謂神曰盡善狹浹洽之謂神萬物莫足以傾之之謂固神固之謂聖人詩言其志也書言其事也禮言其行也樂言其和也春秋言其微也天下之道畢矣用百里之地而不能以調一天下制强暴則非大儒也其言有類其行有禮其舉事無悔其持險應變曲當與時遷徙與世偃仰千舉萬變其道一也是大儒之稽也通則一天下窮則獨立貴名仲尼子弓是也法先王統禮義一制度以淺持博以古持今以一行萬是大儒者也用大儒則百里之地乆而後三年天下如一諸侯為臣聞之不若見之見之不若知之知之不若行之聖人也者本仁義當是非齊言行不失毫釐無他道焉已乎行之矣師法者人之大寳也人無師法則隆性矣有師法則隆積矣而師法者所得乎情非所受乎性不足以獨立而治性也者吾所不能為也然而可化也情也者非吾所有也然而可為乎注錯習俗所以化性也并一而不貳所以成積也習俗移志安乆移質并一而不貳則通於神明參於天地矣塗之人百姓積善而全盡謂之聖人積耨耕而為農夫積禮義而為君子故人知謹擇注錯慎習俗大積靡則為君子矣縱情性而不足問學則為小人矣君子言有壇宇行有防表道過三代謂之蕩法貳後王謂之不雅荀子曰請問為政曰賢能不待次而舉罷不能不待須而廢元惡不待教而誅雖王公士大夫之子孫也不能屬於禮義則歸之庶人雖庻人之子孫也積文學正身行能屬於禮義則歸之卿相士大夫以善至者待之以禮以不善至者待之以刑兩者分别則賢不肖不雜是非不亂賢不肖不雜則英傑至是非不亂則國家治公平者職之衡也中和者聽之繩也其有法者以法行其無法者以類舉聽之盡也故有良法而亂者有君子而亂者未嘗聞也分扶問均則不偏勢齊則不一衆齊則不使明王始立而處國有制使有貧富貴賤之等足以相兼臨者是養天下之本也馬駭輿則君子不安輿庶人駭政故君子不安政選賢良舉篤敬興孝悌收孤寡補貧窮如是則庶人安政矣庶人安政然後君子安位故君人者欲安則莫若平政愛民矣欲榮則莫若隆禮敬士矣欲立功名則莫若尚賢使能矣是君人者之大節也孔子曰大節是也小節非也上君也大節是也小節一出焉一入焉中君也大節非也小節雖是也吾無觀其餘矣成侯嗣公聚斂計數之君也未及取民也子産取民者也未及為政也管仲為政者也未及修禮也故修禮者王為政者强取民者安聚斂者亡筐篋富府庫實而百姓貧夫是之謂上溢而下漏傾覆滅亡可立而待也故聚斂者召冦肥敵亡國危身之道也王奪之人霸奪之輿奪之人者臣諸侯奪之輿者友諸侯慮以王命全其力凝其德力全則諸侯不能弱也德凝則諸侯不能削也天下無王霸王則常勝矣王者仁𦕈天下義𦕈天下威𦕈天下故甲兵不勞而天下服之此三具者欲王而王欲霸而霸欲强而强者王者之制道不過三代法不二後王道過三代謂之蕩法二後王謂之不雅衣服有制宫室有度人徒有數喪祭械用皆有等宜無德不貴無能不官無功不賞無罪不罰朝無幸位民無幸生尚賢使能而等位不遺析愿禁悍而刑罰不過百姓曉然皆知夫為善於家而取賞於朝也為不善於幽而蒙刑於顯也夫是之謂定論是王者之論也王者等賦政事財萬物上以飾賢良下以養百姓而安樂之夫是之謂大神以類行雜以一行萬始則終終則始若環之無端也舎是天下以衰矣天地者生之始也禮義者治之始也君子者禮義之始也為之貫之積重之致好之者君子之始也故天地生君子理天地君子者天地之參也萬物之總也民之父母也君臣父子兄弟夫婦始則終終則始與天地同理與萬世同乆夫是之謂大本人生不能無羣羣而無分則爭爭則亂亂則離離則弱弱則不能勝物故宫室不可得而居也不可少頃舎禮義之謂也能以事親謂之孝能以事兄謂之悌能以事上謂之順能以治下謂之君君者善羣也羣道當則萬物皆得其宜故上察於天下錯於地塞備天地之間加施萬物之上㣲而明短而長狹而廣神明博大以至約故曰一與一是為人者謂之聖人本政教正法則兼聽而時稽之度其功勞論其慶賞以時慎脩使百吏免盡而衆庶不偷冢宰之事也論禮樂正身行廣教化美風俗兼覆而調一之辟公之事也全道德致隆高綦文理一天下振毫末使天下莫不順比從服天王之事也殷之日按以中立無有所偏無為縱横之事偃然按兵無動以觀夫暴國之相卒也案平政教審節奏砥礪百姓為是之日而兵剸天下勁矣按然脩仁義伉隆高正法則選賢良養百姓為是之日而名聲剸天下美矣權者重之兵者勁之名聲者美之夫堯舜者一天下也不能加毫末於是矣權謀傾覆之人退則賢良知聖之士按自進矣刑政平百姓和國俗節則兵勁城固敵國按自屈矣務本事積財物而勿忘棲遲薛越也是使羣臣百姓皆以制度行則財物積國家按自富矣三者體此而天下服暴國之君按自不能用其兵矣皇王大紀卷七十八

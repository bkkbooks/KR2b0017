body:
  text: 皇王大紀卷十八宋胡宏撰三王紀成王八年周公分正東郊理殷頑民周書敘曰成周既成遷殷頑民周公以王命誥作多士多士惟三月周公初于新邑洛用告商王士王若曰爾殷遺多士弗弔旻天大降喪于殷我有周佑命將天明威致王罰勑殷命終于帝肆爾多士非我小國敢弋殷命惟天不畀允罔固亂弼我我其敢求位惟帝不畀惟我下民秉為惟天明畏我聞曰上帝引逸有夏不適逸則惟帝降格嚮于時夏弗克庸帝大淫泆有辭惟時天罔念聞厥惟廢元命降致罰乃命爾先祖成湯革夏俊民甸四方自成湯至于帝乙罔不明德恤祀亦惟天丕建保乂有殷殷王亦罔敢失帝罔不配天其澤在今後嗣王誕罔顯于天矧曰其有聽念于先王勤家誕淫厥泆罔顧于天顯民祗惟時上帝不保降若兹大喪惟天不畀不明厥德凡四方小大邦喪罔非有辭于罰王若曰爾多士今惟我周王丕靈承帝事有命曰割殷告勑于帝惟我事不二適惟爾王家我適豫其曰惟爾洪無度我不爾動自乃邑豫亦念天即于殷大戾肆不正王曰猷告爾多士豫惟時其遷居西爾非我一人奉德不康寧時惟天命無違朕不敢有後無我怨惟爾知惟殷先人有册有典殷革夏命今爾其曰夏迪簡在王庭有服在百僚豫一人惟聽用德肆豫敢求爾于天邑商豫惟率肆矜爾非豫罪時惟天命王曰多士昔朕來自奄豫大降爾四國民命我乃明致天罰移爾遐逖比事臣我宗多遜王曰告爾殷多士今豫惟不爾殺豫惟時命有申今朕作大邑于兹洛豫惟四方罔攸賔亦惟爾多士攸服奔走臣我多遜爾乃尚有爾土爾乃尚寧幹止爾克敬天惟畀矜爾爾不克敬爾不啻不有爾土豫亦致天之罰于爾躬今爾惟時宅爾邑繼爾居厥有幹有年于兹洛爾小子乃興從爾遷今爾又曰夏迪簡在王庭有服在大僚豫一人惟聽用德克閲于乃邑謀介爾乃自時洛邑尚永力畋爾田天惟畀矜爾我有周惟其大賚爾迪在王庭尚爾事有服在大僚王曰又曰時豫乃或言爾攸居初蔡叔既囚其子仲克庸祗德周公以為卿士叔卒乃命諸王邦之蔡周書敘曰蔡叔既沒王命蔡仲踐諸侯位作蔡仲之命蔡仲之命王若曰小子胡惟爾率德改行克慎厥猷肆豫命爾侯于東土往即乃封敬哉爾尚蓋前人之愆惟忠惟孝爾乃邁迹自身克勤無怠以垂憲乃後率乃祖文王之彛訓無若爾考之違王命皇天無親惟德是輔民心無常惟惠之懷為善不同同歸于治為惡不同同歸于亂爾其戒哉慎厥初惟厥終終以不困不惟厥終終以困窮懋乃攸績睦乃四鄰以蕃王室以和兄弟康濟小民率自中無作聰明亂舊章詳乃視聽無以側言改厥度則豫一人汝嘉王曰嗚呼小子胡汝往哉無荒棄朕命蔡仲之國過洛見周公周公曰不如吾者勿與處纍我也與我齊者勿與處無益我也惟賢於己者可與處也九年甲午周書敘曰成王既黜殷命滅淮夷還歸在豐作周官周官惟周王撫萬邦巡侯甸四征弗庭綏厥兆民六服羣辟罔不承德歸于宗周董正治官王曰若昔大猷制治于未亂保邦于未危曰唐虞稽古建官惟百內有百揆四嶽外有州牧侯伯庶政惟和萬國咸寧夏商官倍亦克用乂明王立政不惟其官惟其人今豫小子祗勤于德夙夜不逮仰惟前代時若訓迪厥官立太師太傅太保兹惟三公論道經邦燮理隂陽官不必備惟其人少師少傅少保曰三孤二公𢎞化寅亮天地弼豫一人冢宰掌邦治統百官均四海司徒掌邦教敷五典擾兆民宗伯掌邦禮治神人和上下司馬掌邦政統六師平邦國司冦掌邦禁詰姦慝刑暴亂司空掌邦土居四民時地利六卿分職各率其屬以倡九牧阜成兆民六年五服一朝又六年王乃時巡考制度于四嶽諸侯各朝于方嶽大明黜陟王曰嗚呼凡我有官君子欽乃攸司慎乃出令令出惟行弗惟反以公滅私民其允懷學古入官議事以制政乃不迷其爾典常作之師無以利口亂厥官蓄疑敗謀怠忽荒政不學牆面蒞事惟煩戒爾卿士功崇惟志業廣惟勤惟克果斷乃罔後艱位不期驕祿不期侈恭儉惟德無載爾偽作德心逸日休作偽心勞日拙居寵思危罔不惟畏弗畏入畏推賢讓能庶官乃和不和政龎舉能其官惟爾之能稱匪其人惟爾不任王曰嗚呼三事暨大夫敬爾有官亂爾有政以佑乃辟永康兆民萬邦惟無斁周官太宰之職掌建邦之六典一曰治典二曰教典三曰禮典四曰政典五曰刑典六曰事典以八法治官府一曰官屬以舉邦治二曰官職以辨邦治三曰官聯以會官治四曰官常以聽官治五曰官成以經邦治六曰官法以正邦治七曰官刑以紏邦治八曰官計以弊邦治以八則治都鄙一曰祭祀以馭其神二曰法則以馭其官三曰廢置以馭其吏四曰祿位以馭其士五曰賦貢以馭其用六曰禮俗以馭其民七曰刑賞以馭其威八曰田役以馭其衆以八柄詔王羣臣一曰爵以馭其貴二曰祿以馭其富三曰豫以馭其幸四曰置以馭其行五曰生以馭其福六曰奪以馭其貧七曰廢以馭其罪八曰誅以馭其過以八統詔王馭萬民一曰親親二曰敬故三曰進賢四曰使能五曰保庸六曰尊貴七曰達吏八曰禮賔以九職任萬民一曰三農生九穀二曰園圃育草木三曰虞衡作山澤之材四曰藪牧以養蕃鳥獸五曰百工飭化八材六曰商賈阜通貨賄七曰嬪婦化治絲枲八曰臣妾聚斂疏材九曰間民無常職轉移執事以九賦斂財賄一曰邦中二曰四郊三曰邦甸四曰家削五曰邦縣六曰邦都七曰關市八曰山澤九曰幣餘以九式均節財用一曰祭祀二曰賔客三曰喪荒四曰羞服五曰工事六曰幣帛七曰芻秣八曰匪頒九曰好用以九貢致邦國之用一曰祀二曰嬪三曰器四曰幣五曰材六曰貨七曰服八曰斿九曰物以九兩繫邦國之民一曰牧以地二曰長以貴三曰師以賢四曰儒以道五曰宗以族六曰主以利七曰吏以治八曰友以任九曰藪以富正月之吉始和布治于邦國都鄙乃縣治象之法于象魏使萬民觀治象挾日而斂之乃施典于邦國而建其牧立其監設其參傅其伍陳其殷置其輔乃施法于官府而建其正立其二設其考陳其殷置其輔歲終則令百官府各正其治受其會聽其致事而詔王廢置三歲則大計羣吏之治而誅賞之小宰掌建邦之宫刑以治王宫之政令凡宫之糾禁以官府之六敘正羣吏一曰以敘正其位二曰以敘進其治三曰以敘作其事四曰以敘制其食五曰以敘受其會六曰以敘聽其情以官府六屬舉邦治一曰天官二曰地官三曰春官四曰夏官五曰秋官六曰冬官屬各六十大事從其長小事則專達以官府之六職辨邦治一曰治職以平邦國以均萬民以節財用二曰教職以安邦國以寧萬民以懷賔客三曰禮職以和邦國以諧萬民以事鬼神四曰政職以服邦國以正萬民以聚百物五曰刑職以詰邦國以糾萬民以除盜賊六曰事職以富邦國以養萬民以生百物以官府之六聯合邦治一曰祭祀二曰賔客三曰喪荒四曰軍旅五曰田役六曰斂弛凡小事皆有聯以官府之八成經邦治一曰聽政役以比居二曰聽師田以簡稽三曰聽閭里以版圖四曰聽稱責以傅别五曰聽祿位以禮命六曰聽取豫以書契七曰聽賣買以質劑八曰聽出入以要會以聽官府之六計弊羣吏之治一曰廉善二曰廉能三曰廉敬四曰廉正五曰廉法六曰廉辨以法掌祭祀朝覲會同賔客之戒具軍旅田役喪荒亦如之七事者令百官府共其財用治其施舍聽其治訟月終則以官之敘受羣吏之要贊冢宰受會嵗終則令羣吏致事正歲帥治官之屬而觀治象之法徇以木鐸曰不用法者國有常刑乃退以宫刑憲禁于王宫令于百官府曰各修乃職考乃法待乃事以聽王命其有不共則國有大刑宰夫掌治朝之法以正王及三公六卿大夫羣吏之位掌其禁令敘羣吏之治以待賔客之令諸臣之復萬民之逆掌百官府之徵令辨其八職一曰正掌官法以治要二曰師掌官成以治凡三曰司掌官法以治目四曰旅掌官常以治數五曰府掌官契以治藏六曰史掌官書以贊治七曰胥掌官敘以治敘八曰徒掌官令以徵令歲終則令羣吏正歲會月終則令正月要旬終則令正日成而以考其治治不以時舉者以告而誅之正歲則以法警戒羣吏令修宫中之職事書其能者與其良者而以告于上大司徒以土會之法辨五地之物生一口山林宜毛物宜皂物其民毛而方二曰川澤宜鱗物宜膏物其民黑而津三曰丘陵宜羽物宜核物其民専而長四曰墳衍宜介物宜莢物其民晳而瘠五曰原隰宜裸物宜叢物其民豐肉而庳以荒政十有二聚萬民一曰散利二曰薄征三曰緩刑四曰弛力五曰舍禁六曰去幾七曰眚禮八曰殺哀九曰蕃樂十曰多昏十有一曰索鬼神十有二曰除盜賊以保息六養萬民一曰慈幼二曰養老三曰振窮四曰恤貧五曰寬疾六曰安富以本俗六安萬民一曰媺宫室二曰族墳墓三曰聯兄弟四曰聯師儒五曰聯朋友六曰同衣服頒職事十有二于邦國都鄙使以登萬民一曰稼穡二曰樹藝三曰作材四曰阜蕃五曰飭材六曰通材七曰化材八曰斂材九曰生材十曰學藝十有一曰世事十有二曰服事以鄉三物教萬民而賔興之一曰六德知仁聖義忠和二曰六行孝友睦姻任恤三曰六藝禮樂射御書數以鄉八刑糾萬民一曰不孝之刑二曰不睦之刑三曰不姻之刑四曰不弟之刑五曰不任之刑六曰不恤之刑七曰造言之刑八曰亂民之刑以五禮防萬民之偽而教之中以六樂防萬民之情而教之和凡萬民之不服教而有獄訟與有地治者聽而斷之其附于刑者歸于士歲終則令教官正治而致事正歲令于教官曰各共爾職修乃事以聽王命其有不正則國有常刑小司徒掌建邦之教法以稽國中及四郊都鄙之夫家九比之數辨其貴賤老幼廢疾凡征役之施舍與其祭祀飲食喪紀之禁令使六鄉之大夫各登其鄉之衆寡六畜車輦辨其物以歲時入其數乃會萬民之卒伍以起軍旅以作田役以比追胥以令貢賦及三年則大比大比則受邦國之比要鄉大夫正月之吉受教法于司徒退而頒之于其鄉吏使各以教其所治辨其可任者國中自七尺以及六十野自六尺以及六十有伍皆征之其舍者國中貴者賢者能者服公事者老者疾者皆舍歲終則令六鄉之吏皆會政致事大比則考其德行道藝而興賢者能者此謂使民興賢出使長之使民興能入使治之族師五家為比十家為聯五人為伍十人為聯四閭為族八閭為聯使之相保相受刑罰慶賞相及相共以受邦職以役國事以相葬埋比長五家相受相和親有罪竒邪則相及師氏掌以媺詔王以三德教國子一曰至德以為道本二曰敏德以為行本三曰教德以知逆惡教三行一曰孝行以親父母二曰友行以尊賢良三曰順行以事師長居虎門之左司王朝掌國中失之事以教國子弟凡國之貴遊子弟學焉凡祭祀賔客會同喪紀軍旅王舉則從聽治亦如之保氏掌諫王惡而養國子以道乃教之六藝一曰五禮二曰六樂三曰五射四曰五御五曰六書六曰九數乃教之六儀一曰祭祀之容二曰賔客之容三曰朝廷之容四曰喪紀之容五曰軍旅之容六曰車馬之容凡祭祀賔客會同喪紀軍旅王舉則從聽治亦如之司諫掌糾萬民之德而勸之朋友正其行而強之道藝巡問而觀察之以時書其德行道藝辨其能而可任於國事者以考鄉里之治以詔廢置以行赦宥司救掌萬民之邪惡過失而誅讓之以禮防禁而救之凡民之有邪惡者三讓而罰三罰而士加明刑恥諸嘉石役諸司空其有過失者三讓而罰三罰而歸于圜土凡歲時有天患民病則以節巡國中及郊野而以王命施惠大宗伯掌吉禮以實柴槱燎禋祀昊天上帝血祭社稷五祀五嶽貍沈祭山林川澤疈辜祭四方百物享先王春祠夏禴秋嘗冬蒸凶禮哀邦國一曰喪二曰荒三曰弔四曰禬五曰恤所以補諸侯也賔禮春曰朝夏曰宗秋曰覲冬曰遇時會殷同聘俯所以圖事比功陳謨協慮也所以發禁施政結好除慝也軍禮大師以用之大均以恤之大田以簡之大役以任之大封以合之嘉禮飲食親宗族兄弟昏冠成男女賔射親故舊朋友饗燕親四方賔客脤膰親兄弟之國賀慶親異姓之國以禮樂合天地之化百物之産以事鬼神以諧萬民凡大祭祀卜日宿視滌濯涖鬯省牲鑊奉玉齍詔大號若王不與祭祀則攝位凡大祭祀王后不與則攝而薦豆籩徹大賔客則攝而載果朝覲會同則為上相大喪亦如之王命諸侯則儐論曰武王定天下命周公制禮追王大王王季文王上祀先公以天子之禮夫先公之於先王雖有逺近侯王之制皆吾祖也故一事以天子之禮劉歆附會成書乃曰享先王則衮冕享先公享射則鷩冕是降先公於先王使與賔客為伍也天下寧有是故周禮之書顛倒人倫不可以為經也又曰天子有天下祭祀以立本莫先於宗廟莫大於天莫重於社稷山川祀之經也觀周家庚戌之禮則鬼神之序可知矣周禮乃曰祀山川則毳冕祭社稷則絺冕是以社稷降於山川也故劉歆顛倒鬼神其書不得與易詩書春秋比也小宗伯掌建國之神位右社稷左宗廟掌五禮之禁令與其用等掌三族之别以辨親疏其正室皆謂之門子毛六牲辨其名物而頒之于五官使共奉之辨六齍之名物與其用使六宫之人共奉之大祭祀省牲視滌濯逆齍省鑊將瓉祼賜卿大夫士爵則儐大師立軍社奉主車大甸饁獸頒禽會同軍旅甸役之禱祠肄儀為位肆師掌立大祀用玉帛牲牷立次祀用牲幣立小祀用牲大祭祀展犧牲表齍盛告潔展器陳告備及果築鬻禮成則告事畢凡事佐宗伯鬱人掌祼器凡祼玉濯之陳之以贊祼事鬯人掌共秬鬯凡祭祀社壝用大罍禜門用瓢齎廟用修凡山川四方用蜃凡祼事用概凡疈事用散大喪之大渳設斗共其釁鬯凡王之齋事共其秬鬯凡王弔臨共介鬯天府掌祖廟之守藏凡國之玉鎮大寶器藏焉若祭天之司民司祿而獻民數穀數則受而藏之守祧掌守先王先公之廟祧其遺衣服藏焉若將祭祀則各以其服授尸冡人掌公墓之地辨其兆域而為之圖先王之葬居中以昭穆為左右凡諸侯居左右以前卿大夫士居後各以其族凡死於兵者不入兆域凡有功者居前以爵等為丘封之度與其樹數凡祭墓為尸凡諸侯及諸臣葬於墓者授之兆為之蹕均其禁令國民族葬使皆有私地域職喪掌諸侯及卿大夫士之喪蒞其禁令樂師掌教國子小舞凡舞有帗舞有羽舞有皇舞有旄舞有干舞有人舞教樂儀行以肆夏趨以采齊車亦如之環拜以鐘鼓為節大胥掌學士之版以待致諸子春入學舍采合舞秋頒學合聲小胥掌學士之徵令而比之觥其不敬者正樂縣之位王宫縣諸侯軒縣卿大夫判縣士特縣辨其聲凡縣鐘磬半為堵全為肆大師掌六律六同以合隂陽之聲陽聲黃鍾大簇姑洗蕤賔夷則無射隂聲大吕應鍾南吕林鍾小吕夾鍾皆文之以五聲宫商角徵羽皆播之以八音金石土革絲木匏竹教六詩曰風曰賦曰比曰興曰雅曰頌以六德為之本以六律為之音小師掌教鼓鼗柷敔塤簫管弦歌鼓􅉧擊頌磬笙磬凡為樂器以十有二律為之數度以十有二聲為之齊量凡和樂亦如之編鐘以鐘鼓奏九夏王夏肆夏昭夏納夏章夏齊夏族夏祴夏驁夏鼙鼓吹竽笙塤籥簫篪笛管舂牘應雅以教祴樂擊土鼓吹豳詩祈年于田祖以樂田畯論曰樂舞所以象德也故必於其人必於其事必於其時不於其人不於其事不於其時則為無義人心不厭鬼神不饗也劉歆奈何牽合周禮之文乃曰黃帝之雲門以祀天神堯之咸池以祀地示舜之韶以祀四望禹之大夏以祀山川成湯之大濩以祀先妣夫以雲門祭天猶可言也地示烏知堯之咸池四望烏知舜之韶山川烏知禹之大夏而周之先妣烏能知商湯之大濩也哉設禮作樂而不知其義則何以為禮樂也彼劉歆者叛父背君不祥之人也是烏知禮樂世儒瞢瞢然推尊其書使與聖經並此愚之所以拊膺太息論之而不能自己者也又曰天命之謂性王者受命于天宰制天下其所以祭祀天地者盡其心以成吾性耳非有天地神示在吾度外有形體狀貌可得見而承事之也劉歆周禮曰樂六變而天神皆降八變而地示皆出此豈君子知理之言類巫祝造妖怪者之辭也則又以為神降示出然後可得而禮曽不知樂所以導和禮所以為節作樂乃所以行禮禮神也豈待神降示出然後行禮哉夫天地之道一往一來否泰相因變化無方人日用而不窮不可以智慮測度不可以才能作為者謂之鬼神鬼神特以往來言之道固一體不可分也先儒多以神屬之天鬼屬之人我知其不知鬼神之情狀矣故易書詩春秋皆無如周禮之文者然則劉歆偽妄其可不闢乎太卜與其屬掌卜筮之占龜有六屬天曰靈地曰繹東曰果西曰靁南曰獵北曰若秋取而春攻之上春釁之及卜辨其上下左右隂陽陳之貞之命之作之作龜有八命一曰征二曰象三曰與四曰謀五曰果六曰至七曰雨八曰瘳辨九簭一曰更二曰咸三曰式四曰目五曰易六曰比七曰祠八曰參九曰環凡國之大事簭而後卜上春相蓍凡卜簭君占體大夫占色史占墨卜人占坼掌三兆之法一曰玉兆二曰瓦兆三曰原兆其經兆之體皆百有二十其頌皆千有二百兆分為四一曰方二曰功三曰義四曰弓掌三易一曰連山二曰歸藏三曰周易其經卦皆八其别皆六十有四掌三夢一曰致夢二曰觭夢三曰咸陟其經運十其别九十以八命者贊三兆三易三夢之占以觀國家之吉凶以詔救政馮相氏掌十有二歲十有二月十有二辰十日二十有八星之次冬夏致日春秋致月辨四時之序以會天位保章氏辨九州封域之分星至星辰日月之變動辨十輝一曰祲二曰象三曰鐫四曰監五曰暗六曰瞢七曰彌八曰敘九曰隮十曰想以觀天下之遷分妖祥辨吉凶以五雲之物辨豐荒之祲象以十有二風察天地之和命乖别之妖祥以詔救政訪序事占夢以歲時觀天地之會辨隂陽之氣以日月星辰占六夢之吉凶一曰正二曰噩三曰思四曰寤五曰喜六曰懼季冬聘王夢獻吉夢于王舍萌于四方遂令巫始儺歐疫堂贈無方無算春招弭以除疾殃太祝掌六祝之辭以事鬼神示一曰順祝順豐年也二曰年祝求永真也三曰吉祝祈福祥也四曰化祝弭災兵也五曰瑞祝逆時雨寧風旱也六曰策祝逺罪疾也掌六祈以同鬼神示一曰類二曰造三曰禬四曰禜五曰攻六曰説作六辭以通上下親疏逺近一曰祠二曰命三曰誥四曰會五曰禱六曰誄辨六號一曰神二曰鬼三曰示四曰牲五曰齍六曰幣辨九祭一曰命二曰衍三曰炮四曰周五曰振六曰擩七曰絶八曰繚九曰共辨九拜一曰稽首二曰頓首三曰空首四曰振動五曰吉六曰凶七曰竒八曰褒九曰肅以享右祭祀國有大故災彌祀社稷禱祠大師宜于社造于祖設軍社類上帝有事于四望及軍歸獻于社大會同造于廟宜于社過大山川則用事焉反行舍奠建邦國先告后土用牲幣禁督逆祀命者旱暵則令巫舞雩有冦戎則保郊祀于社大史掌六典法則約劑以二六官頒告朔于邦國閏月詔王居門終月祭祀與執事讀禮書而協事大會同朝覲執書以詔王小史掌邦國之志奠繫世辨昭穆若有事則詔王之忌諱讀禮法佐太史卿大夫之喪賜諡讀誄內史掌王之八枋之法以詔王治一曰爵二曰祿三曰廢四曰置五曰殺六曰生七曰豫八曰奪執國法及國令之二以考政事以逆會計受納訪以詔王聽治凡命諸侯及孤卿大夫則策命之凡四方之事書內史讀之掌書王命遂二之外史掌書外令掌四方之志掌三皇五帝之書掌達書名于四方御史掌邦國都鄙及萬民之治令以贊冢宰掌贊書凡數從政者皇王大紀卷十八

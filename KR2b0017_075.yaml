body:
  text: 皇王大紀巻七十五宋胡宏撰三王紀顯王仲尼曰神龜能見夢於元君而不能避余且之網知能七十二鑚而無遺策不能避刳腸之患如是則知有所困神有所不及也雖有至知萬人謀之魚不畏網而畏鵜鶘亦名淘河去小知而大知明去善而自善矣嬰兒生無石猶碩也師而能言與能言者處也惠子謂荘子曰子言無用荘子曰知無用而始可與言用矣夫地非不廣且大也人之所用容足爾然則廁側足而墊之致黄泉人尚有用乎惠子曰無用荘子曰然則無用之為用也亦明矣筌魚笱也者所以在魚得魚而忘筌蹄兎罥也係其脚者所以在兎得兎而忘蹄言者所以在意得意而忘言吾安得夫忘言之人而與之言哉荘子曰陽子居南之沛老子謂之曰而睢睢盱盱音于而誰與居太白若辱盛徳若不足陽子居蹙然變容曰敬聞命矣其往也舎者迎将其家公執席妻執巾櫛舎者避席煬羊尚炊也者避竈其反也舎者與之爭席矣荘子曰舜讓天下於子州支伯對曰予適有幽憂之病方且治之未暇治天下也故天下大器也而不以易生此有道者之所以異乎俗者也大王不以所養人者害人避狄而去之若大王者可謂能尊生矣能尊生者雖富貴不以養傷身雖貧賤不以利累形夫居高官尊爵者重失之見利輕亡其身豈不惑哉荘子曰帝王之功聖人之餘事楚昭王失國屠羊説從昭王反國将賞之説辭王曰强之説曰大王失國非臣之罪故不敢伏其誅大王反國非臣之功故不敢當其賞荘子曰審自得者失之而不懼行修於内者無位而不怍荘子曰古之人不以人之壊自成也不以人之卑自高也不以遭時自利也荘子曰天與地無窮人死生有時操有時之具而託於無窮之間忽然無異馳驥之馳過隙也不能説其志意養其壽命者皆非通道者也荘子曰平為福有餘為害者物莫不然而財其甚者也荘子曰真者精誠之至也不精不誠不能動人故强哭者雖悲不哀强怒者雖嚴不威強親者雖笑不和真悲無聲而哀真怒未發而威真親未笑而和真在内者神動於外是以貴真也禮者世俗之所為也真者所以受於天地也自然不可易故聖人法天貴真不拘於俗荘子曰道者萬物之所由也庶物失之者死得之者生為事逆之則敗順之則成故道之所在聖人尊之列禦寇之齊中道而反遇伯昏瞀人伯昏瞀人曰奚方而反曰吾驚焉曰惡乎驚曰吾嘗食於十􅜅而五􅜅先饋伯昏瞀人曰若是則汝何為驚已曰夫内誠不解形諜成光以外鎮人心使人輕乎貴老而􅕖其所患夫􅜅人特為食羮之貨多餘之贏其為利也薄其為權也輕而猶若是而况於萬乗之主乎身勞於國而知盡於事彼将任我以事而効我以功吾是以驚伯昏瞀人曰善哉觀乎汝處已人将保汝矣無幾何而往則户外之屨滿矣荘子曰巧者勞而智者憂無能者無所求飽食而遨遊汎若不繫之舟虛而遨遊者也荘子曰夫造物者之報人也不報其人而報其人之天聖人安其所安不安其所不安衆人安其所不安不安其所安荘子曰知道易勿言難小夫之智不離苞苴竿牘敝精神乎蹇淺而欲兼濟道物太一形虛若是者迷惑于宇宙形累不知太初孔子曰凡人心險於山川難於知天天猶有春秋冬夏旦暮之期人者厚貎深情故其就義若渇者其去義若熱故君子逺使之而觀其忠近使之而觀其敬煩使之而觀其能卒然問焉而觀其知急與之期而觀其信委之以財而觀其仁告之以危而觀其節醉之以酒而觀其則雜之以處而觀其色九徵至不肖人得矣正考父一命而傴再命而僂三命而俯循牆而走孰敢不軌如而夫者一命而吕鉅驕貌再命而於車上儛三命而名諸父孰協唐許賊莫大乎徳有心荘子曰美髯長大壮麗勇敢八者因以是窮縁循偃佒於仗困畏三者俱通逹天下之治方術者多矣皆以其有為不可加矣古之所為道術者果惡乎在曰無乎不在以天為宗以徳為本以道為門兆於變化謂之聖人以仁為恩以義為理以禮為行以樂為和薫然慈仁謂之君子以法為分以名為表以參為驗以稽為决其數一二三四是也百官以此相齒以事為常以衣食為主蕃息畜蔵老弱孤寡為意皆有以養民之理也古之人其備乎配神明醇天地育萬物和天下澤及百姓明於本數係於末度六通四闢小大精粗其運無乎不在其明而在數度者舊法世傳之史尚多有之其在於詩書禮樂者鄒魯之士縉紳先生多能明之詩以道志書以道事禮以道行樂以道和易以道隂陽春秋以道名分其數散於天下而設於中國者百家之學時或稱而道之天下大亂賢聖不明道徳不一天下多得一察焉以自好譬如耳目鼻口皆有所明不能相通猶百家衆技也皆有所長時有所用雖然不該不徧一曲之士也判天地之美析萬物之理察古人之全寡能備於天地之美稱神明之容是故内聖外王之道闇而不明鬱而不發天下之人各為其所欲為以自為方悲夫百家往而不反必不合矣後世之學者不幸不見天地之純古人之大體道術将為天下裂黄帝有咸池堯有大章舜有大韶禹有大夏湯有大濩文王有辟雍之樂武王周公作武古之喪禮貴賤有儀上下有等天子棺槨七重諸侯五重大夫三重士再重今墨子獨生不歌死不服桐棺三寸而無椁以此教人恐不愛人以此自行固不愛己歌而非歌哭而非哭樂而非樂是果類乎其生也勤其死也薄其道大觳音角使人憂使人悲其行難為也墨子雖獨能任壬奈天下何其去王也逺矣荘子晚釣於濮水楚王使大夫往先焉曰願以境内累矣荘子持竿不顧曰吾聞楚有神龜死已三千嵗矣王巾笥而蔵之廟堂之上此龜者寕其死為留骨而貴乎寕生而曵尾塗中乎大夫曰寕生而曵尾塗中荘子曰往矣吾将曵尾塗中楚王使以厚幣聘之荘子應其使曰子見犧牛乎衣以文繡食以芻粟及其牽入太廟欲為孤豚其可得乎遂終身不仕三十七年秦惠王使犀首欺齊魏與共伐趙以敗從約趙肅侯讓蘇秦秦恐請使燕必報齊秦去而從約解魏割隂晉和於秦寔華隂三十九年秦伐魏圍焦曲沃魏入少梁河西地于秦四十年秦伐魏度河取汾隂皮氏抜焦魯侯匽薨諡曰景公子叔嗣四十一年秦張儀圍魏蒲陽取之請以還魏而使公子繇往質因説魏王曰秦遇魏甚厚魏不可無禮於秦魏因盡入上郡十五縣儀歸四十三年趙武靈王立置博聞師三人左右司過三人首問先君貴臣肥義加其秩四十四年夏秦初稱王衛平侯薨子嗣君立衛有胥靡亡之魏請以左氏易之左右諌曰以一都買一胥靡可乎嗣君曰治無小亂無大法不立誅不必雖有十左氏無益也法立誅必失十左氏無害也魏王聞而獻之四十五年秦張儀伐魏取陜蘇秦偽得罪於燕奔齊為客卿説齊王高宫室大苑囿以明得意而敝齊四十六年韓燕稱王趙王獨不肯曰無其實敢處其名乎令國人謂已曰君四十八年王崩諡曰顯王子定立齊田嬰之子文通儻饒智略嗣為薛公號曰孟嘗君招致名士食客常數千人名重天下韓宣惠王欲兩用公仲公叔為政問於繆留對曰晉用六卿而國分齊簡公用陳恒闞止而見殺魏用犀首張儀而西河之外亡君兩用之其多力者内樹黨其寡力者籍外權君之國危矣趙魏瀕山齊地卑下齊使白圭治水去大河二十五里作堤而河東逼齊堤西泛趙魏趙魏亦去大河二十五里作堤以禦之慎靚王元年衛更貶號曰君二年秦伐韓取鄢三年楚趙魏韓燕同伐秦攻函谷闗敗而走宋初稱王四年秦敗韓師虜其将諸侯震恐齊大夫與蘇秦争寵殺之張儀説魏襄王曰梁地四平無名山大川之限戌境守亭障者不下十萬固戰塲也王不事秦秦攻河外據巻衍酸棗刦衛取陽晉則趙不南而從道絶國欲無危不可得也魏王乃倍從約請成于秦孟子見齊宣王王問曰齊桓晉文之事可得聞乎孟子對曰仲尼之徒無道桓文之事者是以後世無傳焉臣未之聞也無以則王乎曰徳何如則可以王矣曰保民而王莫之能禦也曰若寡人者可以保民乎哉曰可曰何由知吾可也曰臣聞之胡齕曰王坐於堂上有牽牛而過堂下者王見之曰牛何之對曰将以釁鐘王曰舎之吾不忍其觳觫若無罪而就死地對曰然則廢釁鐘與曰何可廢也以羊易之不識有諸曰有之曰是心足以王矣百姓皆以王為愛也臣故知王之不忍也王曰然誠有百姓者齊國雖𥚹小吾何愛一牛即不忍其觳觫若無罪而就死地故以羊易之也曰王無異於百姓之以王為愛也以小易大彼惡知之王若隠其無罪而就死地則牛羊何擇焉王笑曰是誠何心哉我非愛其財而易之以羊宜乎百姓之謂我愛也曰無傷也是乃仁術也見牛未見羊也君子之於禽獸也見其生不忍見其死聞其聲不忍食其肉是以君子逺庖厨也王説曰詩云他人有心予忖度之夫子之謂也夫我乃行之反而求之不得吾心夫子言之於我心有戚戚焉此心之所以合於王者何也曰有復於王者曰吾力足以舉百鈞而不足以舉一羽明足以察秋毫之末而不見輿薪則王許之乎曰否今恩足以及禽獸而功不至於百姓者獨何與然則一羽之不舉為不用力焉輿薪之不見為不用明焉百姓之不見保為不用恩焉故王之不王不為也非不能也曰不為者與不能者之形何以異曰挾太山以超北海語人曰我不能是誠不能也為長者折枝語人曰我不能是不為也非不能也故王之不王非挾太山以超北海之類也王之不王是折枝之類也老吾老以及人之老幼吾幼以及人之幼天下可運於掌詩云刑于寡妻至于兄弟以御于家邦言舉斯心加諸彼而已故推恩足以保四海不推恩無以保妻子古之人所以大過人者無他焉善推其所為而已矣今恩足以及禽獸而功不至於百姓者獨何與權然後知輕重度然後知長短物皆然心為甚王請度之抑王興甲兵危士臣搆怨於諸侯然後快於心與王曰否吾何快於是将以求吾所大欲也曰王之所大欲可得聞與王笑而不言曰為肥甘不足於口與輕煖不足於體與抑為采色不足視於目與聲音不足聴於耳與便嬖不足使令於前與王之諸臣皆足以供之而王豈為是哉王曰否吾不為是也曰然則王之所大欲可知已欲辟土地朝秦楚莅中國而撫四夷也以若所為求若所欲猶縁木而求魚也王曰若是其甚與曰殆有甚焉縁木求魚雖不得魚無後災以若所為求若所欲盡心力而為之後必有災曰可得聞與曰鄒人與楚人戰則王以為孰勝曰楚人勝曰然則小固不可以敵大寡固不可以敵衆弱固不可以敵强海内之地方千里者九齊集有其一以一服八何以異於鄒敵楚哉盖亦反其本矣今王發政施仁使天下仕者皆欲立於王之朝耕者皆欲耕於王之野商賈皆欲藏於王之市行旅皆欲出於王之塗天下之欲疾其君者皆欲赴愬於王其若是孰能禦之王曰吾惽不能進於是矣願夫子輔吾志明以教我我雖不敏請嘗試之曰無恒産而有恒心者唯士為能若民則無恒産因無恒心苟無恒心放辟邪侈無不為已及陷於罪然後從而刑之是罔民也焉有仁人在位罔民而可為也是故明君制民之產必使仰足以事父母俯足以畜妻子樂嵗終身飽㓙年免於死亡然後驅而之善故民之從之也輕今也制民之產仰不足以事父母俯不足以畜妻子樂嵗終身苦㓙年不免於死亡此惟救死而恐不贍奚暇治禮義哉王欲行之則盍反其本矣五畆之宅樹之以桑五十者可以衣帛矣雞豚狗彘之畜無失其時七十者可以食肉矣百畝之田勿奪其時八口之家可以無饑矣謹庠序之敎申之以孝悌之義頒白者不負戴於道路矣老者衣帛食肉黎民不饑不寒然而不王者未之有也王問曰交鄰國有道乎孟子對曰有惟仁者為能以大事小是故湯事葛文王事昆夷惟智者為能以小事大故太王事獯鬻勾踐事呉以大事小者樂天者也以小事大者畏天者也樂天者保天下畏天者保其國詩云畏天之威于時保之王曰大哉言矣寡人有疾寡人好勇對曰王請無好小勇夫撫劔疾視曰彼惡敢當我哉此匹夫之勇敵一人者也王請大之詩云王赫斯怒爰整其旅以遏徂莒以篤周祜以對于天下此文王之勇也文王一怒而安天下之民書曰天降下民作之君作之師惟曰其助上帝寵之四方有罪無罪惟我在天下曷敢有越厥志一人衡行於天下武王耻之此武王之勇也而武王亦一怒而安天下之民今王亦一怒而安天下之民民惟恐王之不好勇也宣王問曰人皆謂我毁明堂毁諸己乎孟子對曰夫明堂者王者之堂也王欲行王政則勿毀之矣王曰王政可得聞歟對曰昔者文王之治岐也耕者九一仕者世禄闗市譏而不征澤梁無禁罪人不孥老而無妻曰鰥老而無夫曰寡老而無子曰獨㓜而無父曰孤此四者天下之窮民而無告者文王發政施仁必先斯四者詩云哿矣富人哀此㷀獨王曰善哉言乎曰王如善之則何為不行王曰寡人有疾寡人好貨對曰昔者公劉好貨詩云乃積乃倉乃裹餱糧于槖于囊思戢用光弓矢斯張干戈戚揚爰方啟行故居者有積倉行者有裹糧也然後可以爰方啟行王如好貨與百姓同之於王何有王曰寡人有疾寡人好色對曰昔者太王好色愛厥妃詩云古公亶父来朝走馬率西水滸至于岐下爰及姜女聿来胥宇當是時也内無怨女外無曠夫王如好色與百姓同之於王何有或謂孟子曰子三見齊王而不言事何也孟子曰我先攻其邪心五年巴蜀相攻俱告急於秦王議伐蜀韓又来侵張儀曰不如伐韓以臨二周挾天子令天下臣聞争名者於朝争利於市三川周室天下之朝市也而王不争焉顧爭於戎翟去王業逺矣司馬錯曰欲富國者務廣其地欲强兵者務富其民王地小民貧故臣願先從事於易夫蜀西僻有桀紂之亂得其地足以廣國取其財足以富民一舉而名實附矣攻韓刦天子惡名也而未必利也王伐蜀取之遂益富强蘇秦弟代亦以遊説顯燕相子之與代婚謀得燕權代使齊還燕王問曰齊其霸乎對曰不能王曰何故曰不信其臣於是燕王専任子之鹿毛夀曰人稱堯賢者以能讓天下也王以國譲子之是與堯同名也王因屬國於子之或曰禹薦益而以啟人為吏啟率交黨攻益奪之天下謂禹名傳益而實令啟自取今吏無非太子人者是名屬子之而實太子用事也王因収印綬自三百石吏以上效之子之子之南靣行王事而噲顧為臣六年王崩諡曰慎靚王子延立赧王元年秦侵義渠得城二十五遂稍蠶食滅之置隴西北地上郡伐魏取曲沃而歸其人燕大亂将軍市被與太子平謀攻子之齊大夫沈同以其私問於孟軻曰燕可伐與孟子曰可子噲無王命而與人燕子之無王命而受燕於子噲齊王遂使謂平曰聞太子将飭君臣之分明父子之位寡人國雖小惟所以令之太子聚衆攻子之不克市被反攻太子死者數萬齊因伐燕或問孟子曰勸齊伐燕有諸孟子曰為天吏則可以伐之今以燕伐燕何為勸之哉齊人勝燕醢子之殺燕王噲宣王問孟子曰或謂寡人不取必有天殃取之何如孟子對曰取之而燕民悦則取之古之人有行之者武王是也取之而燕民不悦則勿取古之人有行之者文王是也以萬乗之國伐萬乗之國簞食壺漿以迎王師豈有他哉避水火也如水益深如火益熱亦運而已矣齊人取燕諸侯将救燕宣王曰諸侯多謀伐寡人者何以待之孟子對曰臣聞七十里為政於天下者湯是也未聞以千里畏人者也今燕虐其民王往而征之民以為将拯已於水火之中也簞食壺漿以迎王師若殺其父兄係累其子弟毁其宗廟遷其重器如之何其可也天下固畏齊之彊也今又倍地而不行仁政是動天下之兵也王速出令反其旄倪止其重器謀於燕衆置君而後去之則猶可及止也王不能用燕人叛王曰吾甚慙於孟子陳賈曰王無患焉王自以為與周公孰仁且智王曰惡是何言也曰周公使管叔監殷管叔以殷畔知而使之不仁也不知而使之不智也仁智周公未之盡也而况於王乎賈見孟子問之曰周公弟也管叔兄也周公之過不亦宜乎古之君子其過也如日月之食民皆見之及其更也民皆仰之今之君子豈徒順之又從而為之辭孟子為卿於齊公孫丑問曰管仲晏子之功可復許乎孟子曰或問乎曾西曰吾子與子路孰賢曾西蹙然曰吾先子之所畏也曰然則吾子與管仲孰賢曾西艴然不悦曰爾何曾比予於管仲管仲得君如彼其専也行乎國政如彼其乆也功烈如彼其卑也爾何曾比予於是曰管仲曾西之所不為也而子謂我願之乎曰仲以君霸晏以君顯猶不足為歟曰以齊王猶反手也且王者之不作未有疏於此時者也民之憔悴於虐政未有甚於此時者也饑者易為食渴者易為飲孔子曰徳之流行速於置郵而傳命當今之時萬乗之國行仁政民之悦之猶解倒懸也故事半古之人功必倍之惟此時為然孟子曰無或乎王之不智也雖有天下易生之物也一日暴之十日寒之未有能生者也吾見亦罕矣吾退而寒之者至矣吾如有萌焉何哉公孫丑問曰夫子加齊之卿相得行道焉雖由此霸王不異矣如此則動心否乎孟子曰否我四十不動心敢問夫子惡乎長曰我知言我善養吾浩然之氣敢問何謂浩然之氣曰難言也其為氣也至大至剛以直養而無害則塞乎天地之間其為氣也配義與道無是餒也是集義所生者非義襲而取之也行有不慊於心則餒矣必有事焉而勿正心勿忘勿助長也何謂知言曰詖辭知其所蔽滛辭知其所陷邪辭知其所離遁辭知其所窮生於其心害於其政發於其政害於其事聖人復起必從吾言矣昔者竊聞之子夏子游子張皆有聖人一體冉牛閔子顔淵則具體而㣲敢問所安曰乃所願則學孔子也曰伯夷伊尹何如曰不同道非其君不事非其民不使治則進亂則退伯夷也何事非君何使非民治亦進亂亦進伊尹也可以仕則仕可以止則止可以乆則乆可以速則速孔子也自生民以来未有孔子也孟子致為臣而歸王謂時子曰我欲中國而授孟子室養弟子以萬鍾使諸大夫國人皆有所矜式子盍為我言之時子因陳子而以告孟子孟子曰異哉子叔疑使已為政不用則亦已矣又使其子弟為卿人亦孰不欲富貴而獨於富貴之中有私龍斷焉孟子去齊尹士語人曰不識王之不可以為湯武則是不明也識其不可然且至則是干澤也千里而見王不遇故去三宿而後出晝是何濡滯也士則茲不悦髙子以告曰夫尹士惡知予哉千里而見王是予所欲也不遇故去豈予所欲哉予不得已也予三宿而出晝於予心猶以為速王庶㡬改之王如改諸則必反予夫出晝而王不予追也予然後浩然有歸志予雖然豈舎王哉王猶足用為善王如用予則豈徒齊民安天下之民舉安王庶㡬改之予日望之予豈若是小丈夫然哉諌於其君而不受則怒悻悻然見於其靣去則窮日之力而後宿哉孟子去齊居於宋萬章問曰宋小國也今将行王政齊楚惡而伐之則如之何孟子曰子不見湯武之事乎不行王政云爾苟行王政四海之内皆舉首而望之欲以為君齊楚雖大何畏焉孟子謂戴不勝曰子欲子之王之善歟我明告子有楚大夫於此欲其子之齊語也則使齊人傅諸使楚人傅諸曰使齊人傅之曰一齊人傅之衆楚人咻之雖日撻而求其齊也不可得矣引而置之荘嶽之間數年雖日撻而求其楚也亦不可得矣子謂薛居州善士也使之居於王所在王所者長幼卑尊皆薛居州也王誰與為不善在王所者長幼卑尊皆非薛居州也王誰與為善一薛居州獨如宋王何戴盈之曰什一去闗市之征今茲未能請輕之以待来年然後已何如孟子曰今有人日攘其鄰之雞者或告之曰是非君子之道請損之月攘一雞以待来年然後己如知其非義斯速已矣何待来年孟子曰仁之勝不仁也猶水勝火今之為仁者猶以一杯水救一車薪之火也不熄則謂之水不勝火此又與於不仁之甚者也亦終必亡而已矣皇王大紀卷七十五

body:
  text: 皇王大紀卷六宋胡宏撰三王紀夏少康三載甲辰十三載甲寅二十三載甲子少康既長為仍牧正澆使椒之仍求少康少康奔有虞虞思妻之以二姚而邑諸綸有田一成有衆一旅厚樹恩徳隂結夏衆撫納舊官寒浞既得志恃其讒慝詐偽而不徳於民少康使女艾諜澆使季杼誘豷靡亦撫納二斟之燼是時姬不窋之孫公劉遭夏氏之亂勤勞於民民用富厚和協輯睦備其戎器抗中華之難諸侯之從者十有八國遂平西戎漆沮之地荒大豳土詩大雅十六篇曰公劉六章章十句周召康公戒成王也成王將莅政戒以民事美公劉之厚於民而獻是詩也篤公劉篤厚也匪居匪康迺埸迺疆迺積迺倉迺裹糇糧于槖于囊小曰槖大曰囊思輯用光弓矢斯張干盾也戈勾子㦸也戚斧也揚鉞也爰方啟行篤公劉于胥相也斯原既庶既繁既順乃宣徧也而無永嘆陟則在巘小山也復降在原廣平曰原何以舟之帯也維玉及瑶鞞琫上曰鞞下曰琫容刀篤公劉逝彼百泉瞻彼溥廣大也原廼陟南岡山脊曰岡乃覯于京絶髙曰京京師之野于時處處于時廬旅于時言言直言曰言于時語語論難曰語篤公劉于京斯依蹌蹌濟濟俾筵俾几既登乃依乃造其曹群也執豕新國殺禮于牢酌之用匏儉質也食之飲之君之宗之篤公劉既溥既長既景廼岡相其隂陽觀其流泉其軍三單羡也度其隰原徹田為糧度其夕陽山西曰夕陽豳居允荒篤公劉于豳斯館涉渭為亂正絶流曰亂取厲取鍛鍛厲斧斤之石止基廼理爰衆爰有夾其皇澗遡其過澗止旅乃密芮鞫之即皇過皆澗名芮之言内也水之内曰隩水之外曰鞫及公劉薨累世㣲弱三十三載甲戍四十一載靡起有鬲之師并二斟之士討寒浞滅之迎少康于有虞少康帥有虞之衆滅澆于過滅豷于戈威動天下四方諸侯奔走来朝復禹舊跡入踐天子位封庶子於㑹稽謂之越子論曰人殺其父子必欲死人辱其君臣必欲報忍死謀報能以天道為定命不觀敵勢而改圖則庶幾焉茍顧其私内覬大利外畏大難雖有良心日銷月鑠其不忘君父者希矣少康靡鬲真人臣子哉志在討賊行吾義而已非圖富貴者也故受困厄而不渝濵死亡而不怠兢兢業業經營四十年然後克殄元凶祀夏配天不失舊物嗚呼此真可謂中興者矣故唐虞世南論歴代中興之主以少康為冠噫前王之所為後王之師也可不鑒哉四十三載甲申五十三載甲午六十二載王崩子杼立季杼元載甲辰十一載甲寅王能帥禹之道十七載王崩子槐立槐四載甲子契六世孫根圉之子曰㝠為水官勤於其職而死十四載甲戌二十四載甲申二十六載王崩子芒立芒八載甲午十八載甲辰王崩子泄立泄十載甲寅契八世孫曰上甲㣲能帥契之道十六載王崩子不降立不降四載甲子十四載甲戍二十四載甲申三十四載甲午四十四載甲辰五十四載甲寅五十九載王崩弟扄立扄五載甲子十五載甲戌二十二載王崩子廑立廑四載甲申十四載甲午二十一載王崩不降子孔甲立孔甲三載甲辰王好事鬼神肆行淫亂作破斧之歌是為東音諸侯化之夏政始衰天降龍二唐堯之後有劉累者能知其嗜欲而豢之王封累於魯縣十三載甲寅二十三載甲子三十一載王崩子臯立臯二載甲戌稷十世孫公非之子曰髙圉能帥后稷之道十三載王崩子發立發元載甲申十九載王崩子癸踐位是謂之桀桀二載甲辰十二載甲寅二十二載甲子三十二載甲戌三十三載自孔甲之後王室政徳日衰諸侯或不朝桀能申鈎索鐵負恃其力不務徳而務傷百姓有趙梁者教為無道勸以貪狠伐䝉山有施氏有施氏進女妹喜桀嬖之所言皆聽為之為瓊室象廊瑶臺王行淫縱樂政事怠廢為肉山脯林酒池可以運舟一鼓而牛飲者三千人以為戲劇初殷侯契之孫相土徙居商丘因閼伯之故墟逮相土十世孫主癸之妃夫都感白氣貫月之祥而生天乙是嵗主癸卒天乙立是為成湯三十五載成湯元年自契至于成湯八遷湯始居亳從先君居作帝告釐沃有田方七十里聞逸民伊尹摯耕于有莘之野樂堯舜之道非其道也非其義也一介不以與人一介不以取諸人禄之以天下弗顧也繫馬千駟弗視也則使人以幣聘之伊尹囂囂然曰我何以湯之幣聘為哉我豈若處畎畆之中由是以樂堯舜之道哉湯三使徃聘之既而幡然改曰與我處畎畆之中由是以樂堯舜之道吾豈若使是君為堯舜之君哉吾豈若使是民為堯舜之民哉吾豈若使吾身親見之哉天之生此民也使先知覺後知使先覺覺後覺也予天民之先覺者也予將以斯道覺斯民也非予覺之而誰也遂受湯聘起為上卿論曰自下士而上天位也天位聖人之大寶也義則貴利則賤伊尹之初所以不從湯命者恐其以為利也三聘幡然而起者知其非為利也居天位者慎毋以爵禄期人哉其有棄天下猶敝屣視富貴如浮雲者必望望然去之矣所得而官使者皆冀事功求温飽之士亡國敗家率由於此矣湯又得莱朱慶誧湟里且東門虚南門蠕西門疵北門側皆天下之賢士也是時王室昬亂黎民困窮伊尹自任以天下之重思天下之民匹夫匹婦有不被堯舜之澤者如己推而納之溝中於是殷國大治三十六載亳與葛為鄰葛伯淫放貪虐不修祭祀湯使人問之曰無以供粢盛也湯使亳衆往為之耕老弱饋食葛伯率其民要其有酒肉者奪之衆畏君命不敢校也有一童子校曰而不能耕吾為汝耕而又奪吾酒食不亦甚乎葛伯殺之湯聞之怒帥師征之誅葛伯作湯征論曰齊桓晉文仗義以為利者也猶須王命以率諸侯成湯則尚義矣征伐大事必請王命書經焚毁失亡過半文無所徵是以不可得而書也三十七載成湯薦伊尹于桀為陳素王及九主之事桀不聽與羣臣沉湎于酒伊尹進諌若曰君王以酒色之㣲壅天命而不理失人心而不圖反是為善善則祥集習是為不善不善則殃来君王宜留意焉桀曰子無訞言吾之有民猶天之有日也日亡吾乃亡矣伊尹自亳凡五適夏告桀以堯舜之道桀終不聽四十載伊尹既醜有夏復歸于亳入自北門乃遇汝鳩汝方昔先王之田也開三面而驅之順驅則逐逆驅則殺所以愛天物而存仁心以禮存心不惟務獲而已也是時田者張網四面合圍以殄天物浸及其民於是成湯出田命去網三面曰欲左者左右者右惟不用命者乃入吾網復古制也漢南諸侯聞之曰湯仁及禽獸而况於人乎皆歸心焉桀疾其大得諸侯和也召之囚於重泉夏臺已而釋之四十一載甲申桀窮其宗族恥其勲舊輕其賢良棄義聽讒卿士干辛凌轢諸侯左帥曹觸龍讒嫉才智諸侯危其位大夫隱其道羙人不容曼聲不歌舉事戾于天發令逆于時瞿山地裂及泉發徒鑿之通于河諫者曰洩天氣發地藏天子失道後必敗殺之耆老或諫又殺之或獻録書曰亡夏者桀也於是大誅豪傑闗龍逄引黄圖進諫若曰古之人君謙恭敬信節用愛人故天下安而社稷宗廟固今君用財若無窮殺人若不勝民惟恐君之後亡矣人心已去天命不佑盍少悛乎不聽龍逢立而不去桀焚黄圗殺龍逄大㑹諸侯于有仍氏有緡氏見王汰侈弗善也引師先歸桀帥諸侯攻克之愈自矜肆國人大崩諸侯韋氏顧氏昆吾氏黨桀之惡恣行亂政王之世犬羣嘷兩日鬬枉矢流星隕五星錯行雨血夏霜木氷地震伊洛竭太山崩商成湯十八祀夏桀鑿地為夜宫男女雜處三旬不朝太史終古執其圖法泣諌不聽終古出奔湯以薛侯仲虺為左相命諸侯為景亳興師伐韋氏顧氏昆吾氏遂伐桀以若木裔孫費昌為御桀衆敗績自安邑東入山太行東南涉河湯緩追之遂奔南巢湯放之告諸侯羣后曰古禹臯陶久勞于外其有功於民民乃有安東為江北為濟西為河南為淮四瀆已修萬民乃有居后稷降播農殖百榖三公咸有功於民故後有立羣后毋不有功於民勤力迺事予乃大罰殛汝毋予怨湯始征自葛載民望之若大旱之望雲霓也歸市者不止芸者不變誅其君而弔其民若時雨降民大恱十一征而無敵於天下天下之人皆曰王非富天下也為匹夫匹婦復讎也三月歸于亳踐天子位定都焉國號曰商其圖書曰歸藏坤乾震巽坎離艮兊歸藏之河圖也商人因之故曰歸藏以斗杓建丑冬十二月為嵗首是謂地綂論曰古史不載湯改元獨劉道原載之愚竊以為非其實也夫人君即位之一年謂之元年所以謂一為元者竊譬諸人猶其始生也猶其有首也生之時一定而不載身之首一生而不可易成湯之始立於桀之三十五載矣其所以克享天心受天明命以有九有之師爰革夏正本是而為之者也又可改乎元者義之所存非若一二之為數也後世以元為數而不知其義如漢武之初年曰建元元年既曰元年則元已建矣又曰建元豈不贅乎後又因事别建年號如曰元朔元年既曰元又曰朔又曰元年失其義也甚矣嗚呼使人君知此義而體之則原元於一豈至如是紛紛乎以日中為朔改載曰祀建太白乗大路白馬黒首大事斂用日中戎事乗翰戎車曰寅車先疾馬牲用白牡封夏后氏之後於杞行甲寅厯商書敘曰伊尹相湯伐桀升自陑遂與桀戰于鳴條之野作湯誓湯誓王曰格爾衆庶悉聽朕言非台小子敢行稱亂有夏多罪天命殛之今汝有衆汝曰我后不恤我衆舍我穡事而割正夏予惟聞汝衆言夏氏有罪予畏上帝不敢不正今汝其曰夏罪其如台夏王率遏衆力率割夏邑有衆率怠弗協曰時日曷䘮予及汝皆亡夏徳若茲今朕必往爾尚輔予一人致天之罰予其大賚汝爾無不信朕不食言爾不從誓言予則孥戮汝罔有攸赦湯既勝夏欲遷其社不可作夏社至臣扈夏師敗績湯遂從之遂伐三朡俘厥寶玉誼伯仲伯作典寶仲虺申王奉天伐夏之義作誥焉商書敘曰湯歸自夏至于大坰仲虺作誥仲虺之誥成湯放桀于南巢惟有慙徳曰予恐来世以台為口實仲虺乃作誥曰嗚呼惟天生民有欲無主乃亂惟天生聰明時又有夏昬徳民墜塗炭天乃錫王勇智表正萬邦纉禹舊服兹率厥典奉若天命夏王有罪矯誣上帝以布命于下帝用不臧式商受命用爽厥師簡賢附勢寔繁有徒肇我邦于有夏若苗之有莠若粟之有秕小大戰戰罔不懼于非辜矧予之徳言足聽聞惟王不邇聲色不殖貨利徳懋懋官功懋懋賞用人惟已改過不吝克寛克仁彰信兆民乃葛伯仇餉初征自葛東征西夷怨南征北狄怨曰奚獨後予攸徂之民室家相慶曰徯我后后来其蘇民之戴商厥惟舊哉佑賢輔徳顯忠遂良兼弱攻昧取亂侮亡推亡固存邦乃其昌徳日新萬邦惟懐志自滿九族乃離王懋昭大徳建中于民以義制事以禮制心垂裕後昆予聞曰能自得師者王謂人莫己若者亡好問則裕自用則小嗚呼慎厥終惟其始殖有禮覆昬暴欽崇天道永保天命商書敘湯誥湯既黜夏命復歸于亳作湯誥湯誥王歸自克夏至于亳誕告萬方王曰嗟爾萬方有衆明聽予一人誥惟皇上帝降衷于下民若有恒性克綏厥猷惟后夏王滅徳作威以敷虐于爾萬方百姓萬方百姓罹其凶害弗忍荼毒並告無辜于上下神祗天道福善禍淫降災于夏以彰厥罪肆予小子將天命明威不敢赦敢用𤣥牡敢昭告于上天神后請罪有夏聿求元聖與之戮力以與爾有衆請命上天孚佑下民罪人黜伏天命弗僣賁若草木兆民允殖俾予一人輯寜爾邦家茲朕未知獲戾于上下慄慄危懼若將隕于深淵凡我造邦無從匪彛無即慆淫各守爾典以承天休爾有善朕弗敢蔽罪當朕躬弗敢自赦惟簡在上帝之心其爾萬方有罪在予一人予一人有罪無以爾萬方嗚呼尚克時忱乃亦有終咎單作明居建天官以理明事命六太典司六典曰太宰太宗太史太祝太士太卜命五官典司五衆曰司徒司馬司空司士司冦命六府典司六職曰司土司木司水司草司器司貨命六工典制六材曰上工金工石工木工獸工草工天子三公九卿二十七大夫八十一元士大國三卿皆命於天子下大夫五人上士二十七人次國三卿二卿命於天子一卿命於其君下大夫五人上士二十七人小國三卿皆命於其君下大夫五人上士二十七人制三公一命卷若有加則賜也不過九命次國之君不過七命小國之君不過五命大國之卿不過三命下卿再命小國之卿與下大夫一命正九州之封域兩河間曰冀州河南曰豫州河西曰雍州漢南曰荆州江南曰揚州濟河間曰兖州濟州東曰徐州易北曰幽州岱東曰營州州方千里州建百里之國三十七十里之國六十五十里之國百有二十八州州二百一十國名山大澤不以封其餘以為附庸以為閒田諸侯之有功者取於閒田以禄之其有削地者歸之閒田天子之縣内方百里之國九七十里之國二十有一五十里之國六十有三凡九十三國名山大澤不以朌其餘以禄士以為閒田農民一夫一婦受田七十畆耕公田七畆天子之田方千里諸侯爵三列田三等公田方百里侯七十里伯五十里不能五十里附於諸侯曰附庸王太子食百里天子三公之田視公卿視侯大夫視伯元士視附庸謂之采地是故天子有田以處其子孫諸侯有國以處其子孫大夫有采以處其子孫卿以下必有圭田圭田五十畆無征天子之縣内視元士天子使其大夫為三監監於方伯之國國三人其禄視諸侯之卿其爵視次國之君其禄取之於方伯之地諸侯之於天子也比年一小聘三年一大聘五年一朝天子五年一廵狩嵗二月東巡狩至於岱宗柴而望祀山川覲諸侯問百年者就見之命太師陳詩以觀民風命市納價以觀民好惡命典禮考時月定日同律禮樂制度衣服正之山川神祗有不舉者為不敬不敬者君削以地宗廟有不順者為不孝不孝者君絀以爵變禮易樂者為不從不從者君流革制度衣服者為畔畔者君討有功徳於民者加地進律南巡西巡北巡皆如初禮歸假于祖禰用特天子將出類乎上帝宜乎社造乎禰諸侯將出宜乎社造乎禰天子無事與諸侯相見曰朝考禮正刑一徳以尊于天子諸侯賜弓矢然後征賜鈇鉞然後殺賜圭瓚然後鬯未賜圭瓉則資鬯於天子承桀暴亂之後大旱十九祀大旱二十祀大旱二十一祀大旱伊尹言於王發莊山之金鑄幣通有無於四方以賑救之民以是不困二十二祀大旱皇王大紀卷六

body:
  text: 皇王大紀卷六十九宋胡宏撰三王紀敬王四十三年甲子石圃逐起輒自齊入衛逐石圃秦悼公薨子共公嗣孔門羣弟子追記夫子平生言行總學之大綱而作大學大學曰大學之道在明明德在親民在止於至善知止而后有定定而后能靜靜而后能安安而后能慮慮而后能得物有本末事有終始知所先後則近道矣古之欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物物格而后知至知至而后意誠意誠而后心正心正而后身修身修而后家齊家齊而后國治國治而后天下平自天子以至於庶人一是皆以修身為本其本亂而末治者否矣其所厚者薄而其所薄者厚未之有也此謂知本此謂知之至也康誥曰克明德太甲曰顧諟天之明命帝典曰克明峻德皆自明也湯之盤銘曰茍日新日日新又日新康誥曰作新民詩云周雖舊邦其命惟新是故君子無所不用其極詩云邦畿千里惟民所止詩云綿蠻黃鳥止於丘隅子曰於止知其所止可以人而不如鳥乎詩云穆穆文王於緝熙敬止為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信所謂誠其意者無自欺也如惡惡臭如好好色此之謂自慊故君子慎其獨也小人閒居為不善無所不至見君子而後厭然掩其不善而著其善人之視己如見其肺肝然則何益矣此謂誠於中形於外故君子必慎其獨也曽子曰十目所視十手所指其嚴乎富潤屋德潤身心廣體胖故君子必誠其意所謂修身在正其心者心有所忿懥則不得其正有所恐懼則不得其正有所好樂則不得其正有所憂患則不得其正心不在焉視而不見聽而不聞食而不知其味此謂修身在正其心所謂齊其家在修其身者人之其所親愛而辟焉之其所賤惡而辟焉之其所畏敬而辟焉之其所哀矜而辟焉之其所敖惰而辟焉故好而知其惡惡而知其美者天下鮮矣故諺有之曰人莫知其子之惡莫知其苗之碩此謂身不修不可以齊其家所謂治國必先齊其家者其家不可教而能教人者無之故君子不出家而成教於國孝者所以事君也弟者所以事長也慈者所以使衆也康誥曰如保赤子心誠求之雖不中不遠矣未有學養子而後嫁者也一家仁一國興仁一家讓一國興讓一人貪戾一國作亂其機如此此謂一言僨事一人定國堯舜率天下以仁而民從之桀紂率天下以暴而民從之其所令反其所好而民不從是故君子有諸己而後求諸人無諸已而後非諸人所藏乎身不恕而能喻諸人者未之有也故治國在齊其家詩云桃之夭夭其葉蓁蓁之子于歸宜其家人宜其家人而後可以教國人詩云宜兄宜弟宜兄宜弟而後可以教國人詩云其儀不忒正是四國其為父子兄弟足法而後民法之也此謂治國在齊其家所謂平天下在治其國者上老老而民興孝上長長而民興弟上恤孤而民不倍是以君子有潔矩之道也所惡於上毋以使下所惡於下毋以事上所惡於前毋以先後所惡於後毋以從前所惡於右毋以交於左所惡於左毋以交於右此之謂潔矩之道詩云樂只君子民之父母民之所好好之民之所惡惡之此之謂民之父母詩云節彼南山維石巖巖赫赫師尹民具爾瞻有國者不可以不慎辟則為天下僇矣詩云瞻彼淇奧菉竹猗猗有斐君子如切如磋如琢如磨瑟兮僴兮赫兮喧兮有斐君子終不可喧兮如切如磋者道學也如琢如磨者自修也瑟兮僴兮者恂音峻栗也赫兮喧兮者威儀也有斐君子終不可喧兮者道盛德至善民之不能忘也詩云於戲前王不忘君子賢其賢而親其親小人樂其樂而利其利此以沒世不忘也子曰聽訟吾猶人也必也使無訟乎無情者不得盡其辭大畏民志康誥曰惟命不于常道善則得之不善則失之矣楚書曰楚國無以為寶惟善以為寶舅犯曰亡人無以為寶仁親以為寶秦誓曰若有一個臣斷斷兮無他技其心休休焉其如有容焉人之有技若已有之人之彥聖其心好之不啻若自其口出實能容之以能保我子孫黎民尚亦有利哉人之有技媢疾以惡之人之彥聖而違之俾不通實不能容以不能保我子孫黎民亦曰殆哉唯仁人放流之迸諸四夷不與同中國此謂唯仁人為能愛人能惡人見賢而不能舉舉而不能先命也見不善而不能退退而不能遠過也好人之所惡惡人之所好是謂拂人之性菑必逮夫身是故君子有大道必忠信以得之驕泰以失之詩云殷之未喪師克配上帝儀監于殷駿命不易道得衆則得國失衆則失國是故君子先慎乎德有德此有人有人此有土有土此有財有財此有用德者本也財者末也外本內末爭民施奪是故財聚則民散財散則民聚是故言悖而出者亦悖而入貨悖而入者亦悖而出生財有大道生之者衆食之者寡為之者疾用之者舒則財恆足矣仁者以財發身不仁者以身發財未有上好仁而下不好義者也未有好義其事不終者也未有府庫財非其財者也孟獻子曰畜馬乘不察於雞豚伐氷之家不畜牛羊百乘之家不畜聚斂之臣與其有聚斂之臣寧有盜臣此謂國不以利為利以義為利也長國家而務財用者必自小人矣彼為善之小人之使為國家菑害竝至雖有善者亦無如之何矣此謂國不以利為利以義為利也羣弟子追記夫子平生約言微義凡百有十九章子曰先王之所以治天下者五貴有德貴貴貴老敬長慈幼此五者先王之所以定天下也貴有德何為也為其近於道也貴貴為其近於君也貴老為其近於親也敬長為其近於兄也慈幼為其近於子也子曰立愛自親始教民睦也立敬自長始教民順也教以慈睦而民貴有親教以敬長而民貴用命孝以事親順以聽命錯諸天下無所不行子曰天子有善讓德於天諸侯有善歸諸天子卿大夫有善薦於諸侯士庶人有善本諸父母存諸長老爵祿慶賞成諸宗廟所以示順也昔者聖人建隂陽天地之情立以為易易抱龜南面天子卷冕北面雖有明知之心必進斷其志焉示不敢專以尊天也子云刑以坊淫命以坊欲小人貧斯約富斯驕約斯盜驕斯亂禮者因人之情而為之節文以為民坊者也故聖人之制富貴也使民富不足以驕貧不至於約貴不慊於上故亂益亡子云貧而好樂富而好禮衆而以寧者天下其幾矣故制國不過千乘都城不過百雉家富不過百乘以此坊民諸侯猶有叛者子云天無二日土無二王家無二主尊無二上示民有君臣之别也故春秋不稱楚越之王恐民之惑也子云君不與同姓同車與異姓同車不同服示民不嫌也子云君子辭貴不辭賤辭富不辭貧則亂益亡子云君子貴人而賤己先人而後己則民作讓子云利祿先死者而後生者則民不背先亡者而後存者則民可以託子云有國家者貴人而賤祿則民興讓故君子約言小人先言子云善則稱人過則稱己則民不爭而怨益亡善則稱君過則稱己則民作忠善則稱親過則稱已則民作孝子云君子弛其親之過而敬其美子云從命不忿微諫不倦勞而不怨可謂孝矣子云睦於父母之黨可謂孝矣子云父子不同位以厚敬也子云於父之執可以乘其車不可以衣其衣君子以廣孝也子云朝廷敬老則民作孝子云君子有君不謀仕唯卜之日稱二君子云父母在不敢有其身不敢私其財示民有上也故天子四海之內無客禮莫敢為主焉故君適其臣升自阼階即位於堂示民不敢有其室也父母在饋獻不及車馬示民不敢專也以此坊民民猶忘其親而二其君子云禮之先辭而後幣帛也欲民之先事而後祿也故君子於有饋者弗能見則不視其饋子云君子不盡利以遺民故君子仕則不稼田則不漁食時不力珍大夫不坐羊士不坐犬以此坊民民猶忘義而爭利以亡其身子云禮非祭男女不交爵以此坊民陽侯猶殺繆侯而竊其夫人故大饗廢夫人之禮子言之歸乎君子隱而顯不矜而莊不厲而威不言而信子曰君子不失足於人不失色於人不失口於人子曰祭極敬不繼之以樂朝極辨不繼之以倦子曰君子慎以辟禍篤以不掩恭以遠恥子曰君子莊敬日強安肆日偷君子不以一日使其躬儳焉如不終日子言之仁者天下之表也義者天下之制也報者天下之利也子曰以德報德則民有所勸以怨報怨則民有所懲以德報怨寬身之仁也以怨報德刑戮之民也子曰無欲而好仁者無畏而惡不仁者天下一人而已矣是故君子議道自己而置法以民子曰以義度人則難為人以人望人則賢者可知矣子曰中心安仁者天下一人而已矣子曰君子不以其所能者病人不以人之所不能者愧人子曰君子恥服其服而無其德是故衰絰則有哀色端冕則有敬色介胄則有不可辱之色子曰舜禹文王周公有君人之大德有事君之小心子曰君子不自大其事不自尚其功以求處情彰人之善而美人之功以求下賢子言之曰後世雖有作者虞帝弗可及也已矣子民如父母有憯怛之愛有忠利之教親而尊安而敬威而愛富而有禮惠而能散其君子尊仁畏義恥費輕實忠而不犯義而順文而靜寬而有辨子言之事君先資其言拜自獻其身以成其信是故君有責於其臣臣有死於其言故其受祿不誣而受罪益寡子曰事君大言人則望大利小言人則望小利故君子不以大言受小祿不以小言受大祿子曰事君不下逹不尚辭非其人弗自子曰事君逺而諫則讇也近而不諫則尸利也子曰邇臣守和宰正百官大臣慮四方子曰事君者量而後入不入而後量凡乞假於人為人從事者亦然然故上無怨而下遠罪也子曰事君欲諫不欲陳子曰事君難進而易退則位有序易進而難退則亂也故君子三揖而進一辭而退以遠亂也子曰事君慎始而敬終子曰事君可貴可賤可富可貧可生可殺而不可使為亂子曰事君軍旅不避難朝廷不辭賤處其位而不履其事則亂也故君使其臣得志則慎慮而從之否則熟慮而從之終事而退臣之厚也子曰唯天子受命于天士受命于君故君命順則臣有順命君命逆則臣有逆命子曰君子不以辭盡人故君子之接如水小人之接如醴君子淡以成小人甘以壞子曰君子不以口譽人故問人之寒則衣之問人之饑則食之稱人之美則爵之子曰口惠而實不至怨菑及其身故君子與其有諾責也寧有己怨子曰君子不以色親人情疏而貌親在小人則穿窬之盜也與子曰情欲信辭欲巧子言之曰為上易事也為下易知也則刑不煩矣子曰君民者子以愛之則民親之信以結之則民不倍恭以蒞之則民有孫心子曰下之事上也不從其所令從其所行上好是物下必有甚焉者矣故上之好惡不可不慎也子曰上好仁則下之為仁爭先人故長民者章志貞教尊仁以子愛百姓則民致行已以說其上矣詩云上帝板板下民卒􅓠小雅曰匪其止共惟王之卭子曰王言如絲其出如綸王言如綸其出如綍故大人不倡游言可言也不可行君子弗言也可行也不可言君子弗行也子曰君子道人以言而禁人以行故言必慮其所終而行必稽其所敝則民謹於言而慎於行子曰有國者章善􅓠惡以示民厚則民情不二子曰上人疑則百姓惑下難知則君長勞故君民者章好以示民俗愼惡以御民之淫則民不惑矣臣儀行不重辭不援其所不及不煩其所不知則君不勞矣子曰政之不行也教之不成也爵祿不足勸也刑罰不足恥也故上不可以褻刑而輕爵子曰大臣不可不敬也是民之表也邇臣不可不慎也是民之道也君毋以小謀大毋以遠言近毋以內圖外則大臣不怨邇臣不疾而遠臣不蔽矣子曰民以君為心君以民為體心莊則體舒心肅則容敬心好之身必安之君好之民必欲之心以體全亦以體傷君以民存亦以民亡子曰言有物而行有格也是以生則不可奪志死則不可奪名子曰輕絶貧賤而重絶富貴則好賢不堅而惡惡不著矣人雖曰不利吾不信也子曰茍有車必見其軾茍有衣必見其敝人茍或言之必聞其聲茍或行之必見其成子曰言從而行之則言不可飾也故君子寡言而行以成其信子曰頌而無讇諫而無驕怠則張而相之廢則掃而更之謂之社稷之役毋拔來毋報往毋測未至為人臣下者有諫而無訕有亡而無疾子曰管仲鏤簋而朱紘旅樹而反坫山節而藻棁賢大夫也而難為上也晏平仲事其先人豚肩不掩豆賢大夫也而難為下也君子上不僭上下不逼下子曰君子有三患未之聞患弗得聞也既聞之患弗得學也既學之患弗能行也君子曰甘受和白受采忠信之人可以學禮茍無忠信之人則禮不虛道是以得其人之為貴也孔子曰誦詩三百不足以一獻一獻之禮不足以大饗大饗之禮不足以大旅大旅具矣不足以饗帝毋輕議禮孔子曰無體之禮敬也無服之喪哀也無聲之樂歡也不言而信不施而仁夫鐘之音怒而擊之則武憂而擊之則悲至誠之動通於金石況於人乎孔子曰自賢者天下之善言不得聞於耳故自損者必有以益之自益者必有以決之子路欲釋古道而行其意孔子曰昔東夷有人慕諸夏之禮有女而寡為納私壻終身不嫁嫁則不嫁矣而非義也蒼梧嬈娶妻美而讓其兄讓則讓矣而非禮也舍古道行子意庸知不以是為非以非為是乎孔子見人一善而忘其百非子曰敬老尊齒親賢好德樂施惡貪尚讓之謂七教至禮不讓而天下治至賞不費而天下士恱至樂無聲而天下民和之謂三至七教修而守則折衝千里之外三至行而征則還師衽席之上子曰見小暗大從物如流者庸人也知審其所知言審其所謂行審其所由智知之言道之行由之者士也心不忌色無伐辭不專自強不息油然若將可越而終不可及者君子也德合天地明竝日月化行若神者聖人也魯哀公問取人之法孔子對曰無取捷捷無取鉗鉗無取啍啍哀公問曰國家存亡有天命乎孔子曰存亡禍福皆已而已天災地妖不能加也哀公問壽孔子曰寢處不時飲食不節逸勞過度者疾殺之居下而干上嗜欲無厭而求不止者刑殺之以少弱犯衆强忿怒不類者兵殺之三者非命也自取也智士仁人動靜以義其壽也不亦宜乎孔子曰季孫賜我粟千鍾而交益親南宫敬叔乘我以車馬而道加行故道雖貴必有待而後重必有勢而後行子路曰負重涉逺者不擇地而休家貧親老者不擇祿而仕孔子曰與人交推其長而違其短故能久也孔子曰有君不能事有臣而求其使非恕也有親不能孝有子而求其報非恕也有兄不能敬有弟而求其順非恕也子貢問曰君子見水必觀何也孔子曰以其不息也子路曰知者使人知己仁者使人愛己子貢曰智者知人仁者愛人顏回曰知者自知仁者自愛子曰君子以心導耳目立義以為勇小人以耳目導心不孫以為勇子曰有其言而無其行君子恥之地有餘而民不足君子恥之衆寡均而人功倍已焉君子恥之子貢曰知莫難於知人顏回將之宋問為身子曰恭敬忠信而已矣夫不比親而比於疏不亦逺乎不修中而修於外不亦反乎慮不先定臨事而謀不亦晚乎哀公問政孔子對曰省力役薄賦斂公曰國貧奈何孔子對曰未有子富而父母貧者也孔子曰不殺無辜不釋罪人則民不惑任能黜否則官府治理孔子曰諌有五一曰譎諫二曰戇諫三曰降諫四曰直諫五曰風諫吾其從風諫者乎孔子曰立身有義而孝為本喪紀有禮而哀為本戰陳有列而勇為本治政有理而農為本居國有道而嗣為本生財有時而力為本孔子曰藥酒苦口而利於病忠言逆耳而利於行湯武以諤諤而昌桀紂以唯唯而亡故父不可以無爭子君不可以無爭臣兄不可以無爭弟士不可以無爭友孔子曰不知其地視其草木不知其人視其友不知其君視其所使與善人居如入芝蘭之室久即與之俱化是以君子必謹所與處焉孔子曰中人之情無禁則淫無度則逸鞭朴之子不從父之教刑戮之民不從君之令故君子不急斷不急制使飲食有量衣服有節宫室有度畜積有數車器有限所以防亂之原也夫舟非水不行水入舟則沒君非民不治民犯上則傾是故君子不可不言也小人不可不整一也孔子曰勇而好問必勝智而好謀必成顏回曰馬窮則佚人窮則詐自古及今未有窮其下而能無危者顏回曰一言而有益於智莫如預一言而有益於仁莫如恕知其所不由斯知所由矣孔子曰小人毁人之善以為辨狡訐懷詐以為智幸人有過恥學而羞不能孔子曰君子以行言小人以舌言孔子曰言人善惡非所以美已顏回曰聞諸夫子曰身不用禮而望禮於人身不用德而望德於人亂也子路將行孔子曰不強不達不勞無功不忠無親不信無復不恭失禮慎此五者而已孔子曰君子有終身之樂無一日之憂曽子曰受人施者常畏人與人者常驕人孔子曰君上者民之儀也有司者民之表也邇臣者羣下之紀也故賢君必自擇左右勞於取人逸於治事子張問入官孔子曰已有善勿專教不能勿怠已過勿發失言勿掎不善勿遂行事勿留孔子曰拒諫者慮之所以塞也奢侈者財之所以不足也專獨者事之所以不成也孔子曰古者聖王冕而前旒所以蔽明也紘紞充耳所以掩聰也水至清則無魚人至察則無徒孔子曰欲政之速行以身先之欲民之速服以道御之孔子曰行修而名立內行不修身之罪也行修而名不彰友之罪也故君子入則篤行出則交賢孔子曰姦邪生於不足不足生於無度無度則偷墮侈靡非法妄行而陷於刑罰故刑罰之源生於嗜欲不節夫禮度者所以禦民之嗜欲者也是故制度明則姦不犯喪祭明則百姓孝朝覲明則天下順鄉飲酒之禮行則民讓婚姻之禮行則民别而五刑不用故聖人之設防貴其不犯也孔子曰天子者與天地參故德配天地兼利萬物與日月並明明照四海而不遺微小孔子曰禮之於正國也猶權衡之於輕重也繩墨之於曲直也規矩之於方圓也夫禮禁亂之所由生猶坊止水之所自來也故以舊坊為無所用而壞之者必有水敗以舊禮為無用而去之者必有亂患故婚姻之禮廢則夫婦之道苦而淫辟之罪多矣鄉飲酒之禮廢則長幼之序失而爭鬬之獄繁矣喪祭之禮廢則臣子之恩薄而倍死忘生者衆矣聘覲之禮廢則君臣之位失諸侯之行惡而倍畔侵陵之敗起矣故禮之教化也微其止邪也於未形使人日遷善逺罪而不自知也於是孔子三年喪畢門人治任將歸入揖於子貢相鄉而哭皆失聲然後歸子貢反築室於場獨居三年然後歸四十四年春越王伐吳吳公子慶忌欲除不忠者以說于越吳人殺之初趙鞅生二子長曰伯魯幼曰無恤將置後不知所立乃書訓戒之辭於二簡以授二子曰謹識之三年而問之伯魯不能舉其詞求其簡已失之矣問無恤誦其詞甚習求其簡出諸袖中而奏之於是以為後鞅疾亟謂無恤曰晉國有難而無以尹鐸為少晉陽為逺必以為歸鞅卒諡曰簡子無恤嗣王崩諡曰敬王子仁立皇王大紀卷六十九

body:
  text: 皇王大紀卷三宋胡宏撰五帝紀帝堯陶唐氏元載甲辰論曰或傳自開闢或曰自燧皇至於春秋獲麟之嵗二百七十六萬年分為十紀六紀在包羲前三紀在包羲後而末紀流訖於黄帝者也謹按包羲始畫卦造書契夫孰知其前之六紀五百年必有王者興自包羲至於皇帝兩紀五十餘萬年間作者惟神農氏一人其妄可知故自盤古至於帝嚳雖有紀其年者皆不敢信姑載其事而已西洛先覺卲雍氏作皇極經世厯帝堯即位之年起于甲辰惟雍精極天之數必不妄也故用之以表時序事庶幾可以傳信乎堯自唐侯升為天子時年十六都于平陽奉養儉素富而不汰貴而不驕黄收純衣彤車白馬物不尚竒異器不寶玩好樂不聽滛泆其仁如天其知如神就之如日望之如雲巡狩行教周流五嶽心周率土意加窮獨民饑寒曰我饑寒之也民有罪曰我陷之也放則天命勤於君道日月勞之来之匡之直之輔之翼之使自得之又從而振徳之作布政之宫曰衢室立誹謗之木使天下得盡其言建進善之旌使天下得盡其才置諫鼓於朝使天下得攻其過天下之人無有異心不賞而勸不罰而治戴之如日月親之如父母仁昭而義立徳溥而化廣有蓂莢之草生於庭朔後日生一葉望後日落一葉月二十九日而晦則一葉厭而不落羲和立渾儀之制以銅為壺再叠差置實以清水吐以玉虬轉注兩壺右為夜左為晝一晝夜十二辰百刻一辰得四刻六分刻之一着之箭置之壺内浮箭壺以出刻為準漏水壺以沒刻為度鑄金為胥銅為徒居壺之左右左手握箭右手指刻以别早暮地居天中日出地上為晝日入地下為夜其制肇於盖天羲和祝融之後也世世相傳為疇師以建寅月為嵗首十二載甲寅二十一載甲子三十一載甲戌四十一載甲申有閼伯實沈者亦髙辛氏之子兄弟也居於曠林而不相能日尋干戈以相征討堯遷閼伯於商丘主辰遷實沈於大夏主參契仁聖帝使為司徒教天下以人倫父子有親君臣有義夫婦有别長㓜有序朋友有信五十一載甲午有苗暴殺戮無辜始大為割耳截鼻㭬隂黥面五虐之刑民相漸化泯泯棼棼反覆詛盟堯與戰于丹水之浦以遏止其惡夷絶其世六十一載甲辰大荒之開自帝太昊炎帝黄帝保聚生養至於堯時人民衆多耕牧之地日少西北則龍底横濁河之衝西南則灔澦巫峽塞岷江之口淮濟萬川未由地中行汜濫於天下蛇龍居之草木暢茂禽獸偪人五榖不登獸蹄鳥跡之道交於中國民無所定下者為巢上者為營窟堯有憂之羣臣薦崇伯鯀往治之七十載許由居于沛澤養性無欲堯聞而往見之曰日月出矣而爝火不息其於光也不亦難乎時雨降矣而猶浸灌其於澤也不亦勞乎天生夫子於天下而我猶尸之吾自視缺然請致天下許由對曰子治天下天下既已治矣而我猶代子吾將為名乎名者實之賔也吾將為賔乎鷦鷯巢林不過一枝偃䑕飲河不過滿腹歸休乎君予無所用天下為庖人雖不治庖尸祝不越樽俎而代之矣他日由以告其友巢父巢父曰汝何不隱汝光而見若身揚若名令聞於君而又告予子行矣毋汙我乃臨清泠之水以洗其耳由悵然而不自得遂遯於箕山之下潁水之陽終身不復見初窮蟬生敬康敬康生勾芒勾芒生蟜牛蟜牛生瞽瞍瞽瞍之妻握登有大虹之祥而生舜於諸馮之姚墟故為有姚居于媯汭故為有媯好學樂善寛裕温良善與人同樂取諸人以為善學於務成昭務成昭曰避天下之逆從天下之順則身脩而萬物得矣握登死瞽瞍再娶生象愛象而惡舜必欲殺之舜大杖則走小杖則受順適孝慈欲殺不可得年二十孝友聞於人有友七人焉雄陶方回續牙伯陽東或作陳不訾秦不虚或作宇靈甫常輔翼之耕於歴山歴山之人皆讓畔漁於雷澤雷澤之人皆讓居陶甄於河濵器不苦窳作什器於夀丘就時於負夏一遷而所居成聚二遷成邑三遷成都至鄧之墟十有萬家克供子職號泣于旻天曰父母之不我愛於我何加焉念未順於父母如窮人無所歸孟子曰舜之居深山之中與木石居與鹿豕遊其所以異於深山之野人者幾希及其聞一善言見一善行若決江河沛然莫之能禦也堯欲以位讓四岳四岳辭堯命悉舉貴戚及疏逺隱匿者於是衆以舜言之於堯堯曰然朕聞之舜生三十年矣父母不使娶堯知舜告則不得娶也遂女以二女娥皇女英九男百官牛羊倉廩備以養舜於畎畆之中舜内行彌謹釐降二女不敢貴驕於媯汭事舜親戚甚有婦道九男皆益篤舜事父母彌至於是瞽瞍信其孝而順其道焉舜尚見堯堯館甥於貳室亦饗舜迭為賔主論曰子告父母而娶女氏告父母而妻此婚禮之常也若夫聖人不居廟堂之上而窮居山林聖人人倫之至而反不得於父母此則非常之大事也堯為天子當此非常之事豈得不以為急務是故二聖人略常禮以天子二女嫁於匹夫既二女嬪虞瞽瞍底豫聖人之化行而人倫明於天下後世豈特不格姦於一家一時而已耶大哉權乎去輕以就重略名以全實虧小以成大舎近以圖逺聖人之所以變化莫測而天下之所以治也聖學衰㣲當事任者尚變詐随流俗急輕而緩重務名而棄實知小而昧大見近而忘逺因循茍且以是為權兆於滅亡而不悟悲夫堯問舜曰人情如何舜對若曰天命理㣲人心情慢妻子具而孝衰于親嗜欲得而信衰於友爵禄盈而忠衰於君操志以事天者其唯君子乎成性而配天者其唯聖人乎舜問於堯曰天王之用心何如堯曰吾不敖無告不廢窮民苦死者嘉孺子而哀婦人此吾所以用心已舜曰美則美矣而未大也堯曰然則如何舜曰天徳而出寜日月照而四時行若晝夜之有經雲行而雨施矣堯曰子天之合也與之語禮樂而不逸道廣大而不窮於是以為大蔚孟子曰天下大恱而將歸已視天下恱而歸猶草芥也惟舜為然不得乎親不可以為人不順乎親不可以為子舜盡事親之道瞽瞍底豫而天下化瞽瞍底豫而天下之為父子者定此之謂大孝七十一載甲寅堯命舜朝廷之大位理天下之大事時髙陽氏有才子八人蒼舒隤敳檮戭大臨龎降庭堅仲容叔逹齊聖廣淵明允篤誠天下謂之八凱髙辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍忠肅恭懿宣慈惠和天下謂之八元舜悉舉而用之共工者金天氏子也毁信廢忠崇飾惡言靖譛庸囘服讒蒐慝以誣盛徳天下謂之窮竒舜北流之於幽陵讙兠者有熊氏之子也掩義隱賊好行㓙徳醜類惡物頑嚚不友是與比周天下謂之渾敦舜南放之崇山三苗之君貪于飲食冐于貨賄侵欲崇侈不可盈饜聚斂積實不知紀極不分孤寡不恤窮匱天下謂之饕餮舜西竄之三危崇伯鯀不可教訓不知話言告之則頑舎之則嚚傲狠明徳以亂天常築堤城以湮洪水九載績用弗成天下謂之檮杌舜東殛之于羽山遷四族於四裔以禦魑魅虞書堯典叙曰昔在帝堯聰明文思光宅天下將遜於位讓於虞舜作堯典堯典曰若稽古帝堯曰放勲欽明文思安安允恭克讓光被四表格于上下克明峻徳以親九族九族既睦平章百姓百姓昭明協和萬邦黎民於變時雍乃命羲和欽若昊天厯象日月星辰敬授人時分命羲仲宅嵎夷曰暘谷寅賔出日平秩東作日中星鳥以殷仲春厥民析鳥獸孳尾申命羲叔宅南交平秩南訛敬致日永星火以正仲夏厥民因鳥獸希革分命和仲宅西曰昧谷寅餞納日平秩西成宵中星虚以殷仲秋厥民夷鳥獸毛毨申命和叔宅朔方曰幽都平在朔易日短星昴以正仲冬厥民隩鳥獸氄毛帝曰咨汝羲暨和朞三百有六旬有六日以閏月定四時成嵗允釐百工庶績咸熙帝曰疇咨若時登庸放齊曰𦙍子朱啟明帝曰吁嚚訟可乎帝曰疇咨若予采驩兠曰都共工方鳩僝功帝曰吁靜言庸違象恭滔天帝曰咨四岳湯湯洪水方割蕩蕩懷山襄陵浩浩滔天下民其咨有能俾乂僉曰於鯀哉帝曰吁咈哉方命圯族岳曰异哉試可乃已帝曰徃欽哉九載績用弗成帝曰咨四岳朕在位七十載汝能庸命遜朕位岳曰否徳沗帝位曰明明揚側陋師錫帝曰有鰥在下曰虞舜帝曰俞予聞如何岳曰瞽子父頑母嚚象傲克諧以孝烝烝又不格姦帝曰我其試哉女于時觀厥刑于二女釐降二女于媯汭嬪于虞帝曰欽哉論曰堯典載寅賔出日寅餞納日不及月者傳曰日之所行為中道月五星随之而已故不及也周官冬夏致日春秋致月失聖人之㫖矣七十二載堯娶散宜氏女曰女皇生子丹朱丹朱不肖於是堯生八十七年老而衰矣將命舜攝天子事或曰奈何舍𦙍子朱堯曰私一人病天下可乎鯀之妻有莘氏女曰脩紀感流星之祥生子禹于石紐長於西羌師于大成摯學于西王國傷先人之非度將釐改制量乃濳心圖書南遊衡山東登宛委見石匱發之得金簡玉字洪範九疇究天地之理知萬物之性舜薦禹為司空往平水土顓頊裔孫伯益大費能議百物堯命益作虞棄自幼而遊戯樹藝五榖輙美大及長便弓矢有殊能為大司馬甚好農事堯命為后稷與禹偕行論曰宏聞諸先君子有曰知人之哲無過於堯有言丹朱可登庸者已知嚚訟有言共工若予采者已知其象恭有言伯鯀可使治水者已知其方命有言舜可以遜位者則曰俞予聞之矣妻舜之二女觀其刑家二女嬪虞瞽瞍底豫而家齊乃命以位觀其治國五典克從百揆時叙四門穆穆而國治納于大麓使大録萬機之政觀其平天下無烈風雷雨之迷天地之和應而天下平然後授以帝位此事理之次不可易者也司馬子長曰堯使舜入山林川澤暴風雷雨舜行不迷堯以為聖吁安得此淺陋之言哉夫處已之難莫難於正心誠意處物之難莫難於治國平天下觀其家齊國治天下平則知其意誠心正矣意誠心正與天地參不可以有加矣於是又使入山林川澤豈所以試乎且烈風雷雨非可期者也設若不遇堯將遂無以知其聖耶此真齊東野人之語而子長不察也孟子曰盡信書不如無書故君子於文詞有滯者取其理與意可矣七十三載堯曰格汝舜詢事攷言乃言底可績三載汝陟帝位舜讓于徳弗嗣堯曰咨爾舜天之厯數在爾躬人心惟危道心惟㣲惟精惟一允執厥中四海困窮天禄永終堯授終于文祖舜遂攝天子事八十一載甲子初禹既受命命諸侯興人徒發歴山之金始鑄幣調有餘給不足咸使傳工令曰九月除道十月成梁其時儆曰收而場工偫而畚挶營室之中土功其始火之初見期于司里伯益所至烈山澤而焚之禹身為民先左繩準右規矩載四時水行乗舟陸行乗車山行乗輴泥行乗樏櫛風沐雨不避艱險思天下有溺者猶已溺之后稷思天下有饑者猶已饑之教民稼穡樹藝五榖令民一夫一婦受田五十畆校數嵗所收之中為定式而貢五畆于公禹八年於外三過其門而不入或一饋而十起或一沐三握髪延接四方之士曰吾不恐賢者留於中道恐其留吾門也訪之以利害咨之以謀䇿得善則拜甞曰人無食則不可使利歸之則勞而不怨故導河自積石刳龍門之腹析底柱為三門疏九河論曰龍門華陰底柱孟津大伾大陸皆河之衝也九河之處徒駭最北鬲津最南其中二百餘里地勢平延其流澶漫易以淤塞遷徙不常故禹多與之地使下流通曠則中國無河患及齊桓公擅一時之利不顧大河形便為萬世慮適河行徒駭遂因以太史馬頰覆釡胡蘇簡潔鈎盤鬲津八河之地充樹藝立城邑河之下流始迫隘矣自是而後中國始以河為患焉為天下者何必與河爭此地乎不計其利深計其害捐河故地以與河亦省事安民永世之一䇿也瀹濟漯决汝漢排淮泗掘地而注之江凡治天下名川三百支川三千髙髙下下導滯豐物封崇九山陂障九澤豐殖九藪泪越九原宅居九隩合通四海殺九嬰於汶水繳大風於青丘斬猰㺄脩蛇于洞庭禽封狶于桑林至危且勞也而民樂盡其力於是險阻夷通鳥獸之害人者消人得平土而居之使大章步東極至於泰逺歩西垂至於邠使豎亥步南極至於濮鈆步北垂至於祝栗東西二萬八千里南北二萬六千里莆雚之地悉為良田田始開一嵗曰菑二嵗曰新田三嵗曰畬東有九夷被髪文身南有六蠻雕題交趾有不火食者焉西有七戎被髪衣皮北有八狄衣羽毛穴居有不粒食者焉中國夷蠻戎狄五方之性不可推移皆有安居和味宜服利用備器五方之民言語不通嗜欲不同逹其志通其欲舟車所至無不臣服堯賜禹姓姒氏妻伯益以姚姓之玉女賜姓嬴氏封契于殷賜姓子氏封棄于邰賜姓姬氏棄娶姞姓之女為元妃夏書禹貢敘曰禹别九州随山濬川任土作貢作禹貢禹敷土随山刋木奠髙山大川冀州既載壺口治梁及岐既脩大原至于岳陽覃懷底績至于衡漳厥土惟白壤厥賦惟上上錯厥田惟中中恒衞既從大陸既作島夷皮服夾右碣石入于河濟河惟兖州九河既道雷夏既澤灉沮㑹同桑土既蠶是降丘宅土厥土黒墳厥草惟繇厥木惟條厥田惟中下厥賦貞作十有三載乃同厥貢漆絲厥篚織文浮于濟漯逹于河海岱惟青州嵎夷既略濰淄其道厥土白墳海濵廣斥厥田惟上下厥賦中上厥貢鹽絺海物惟錯岱畎絲枲鉛松怪石莱夷作牧厥篚檿絲浮于汶達于濟海岱及淮惟徐州淮沂其乂䝉羽其藝大野既豬東原底平厥土赤埴墳草木漸包厥田惟上中厥賦中中厥貢惟土五色羽畎夏翟嶧陽孤桐泗濵浮磬淮夷蠙珠暨魚厥篚𤣥纎縞浮于淮泗逹于河淮海惟揚州彭蠡既豬陽鳥攸居三江既入震澤底定篠簜既敷厥草惟天厥木惟喬厥土惟塗泥厥田惟下下厥賦下上上錯厥貢惟金三品瑶琨篠蕩齒革羽毛惟木島夷卉服厥篚織貝厥包橘柚錫貢沿于江海達于淮泗荆及衡陽惟荆州江漢朝宗于海九江孔殷沱濳既道雲土夣作又厥土惟塗泥厥田惟下中厥賦上下厥貢羽毛齒革惟金三品杶榦栝栢礪砥砮丹惟箘簵楛三邦底貢厥名包匭菁茅厥篚𤣥纁璣組九江納錫大龜浮于江沱濳漢逾于洛至于南河荆河惟豫州伊洛瀍澗既入于河滎波既豬導菏澤被孟豬厥土惟壤下土墳壚厥田惟中上厥賦錯上中厥貢漆枲絺紵厥篚纎纊錫貢磬錯浮于洛達于河華陽黑水惟梁州岷嶓既藝沱濳既道蔡䝉旅平和夷底績厥土青黎厥田惟下上厥賦下中三錯厥貢璆鐵銀鏤砮磬熊羆狐貍織皮西傾因桓是来浮于濳逾于沔入于渭亂于河黒水西河惟雍州弱水既西涇屬渭汭漆沮既從灃水攸同荆岐既旅終南惇物至于鳥䑕原隰底績至于豬野三危既宅三苗丕敘厥土惟黄壤厥田惟上上厥賦中下厥貢惟球琳琅玕浮于積石至于龍門西河㑹于渭汭織皮崑崙析支渠摉西戎即敘導岍及岐至于荆山逾于河壺口雷首至于太岳底柱析城至于王屋太行恒山至于碣石入于海西傾朱圉鳥䑕至于太華熊耳外方桐栢至于陪尾導嶓冢至于荆山内方至于大别岷山之陽至于衡山過九江至于敷淺原導弱水至于合黎餘波入于流沙導黒水至于三危入于南海導河積石至于龍門南至于華隂東至于底柱又東至于孟津東過洛汭至于大伾北過洚水至于大陸又北播為九河同為逆河入于海嶓冢導漾東流為漢又東為滄浪之水過三澨至于大别南入于江東匯澤為彭蠡東為北江入于海岷山導江東别為沱又東至于澧過九江至于東陵東迤北㑹于匯東為中江入于海導沇水東流為濟入于河溢為滎東出于陶丘北又東至于菏又東北㑹于汶又北東入于海導淮自桐栢東㑹于泗沂東入于海導渭自鳥䑕同穴東㑹于灃又東㑹于涇又東過漆沮入于河導洛自熊耳東北㑹于澗瀍又東㑹于伊又東北入于河九州攸同四隩既宅九山刋旅九川滌源九澤既陂四海㑹同六府孔脩庶土交正底慎財賦咸則三壤成賦中邦錫上姓祇台徳先不距朕行五百里甸服百里賦納總二百里納秷三百里納秸服四百里粟五百里米五百里侯服百里采二百里男邦三百里諸侯五百里綏服三百里揆文教二百里奮武衞五百里要服三百里夷二百里蔡五百里荒服三百里蠻二百里流東漸于海西被于流沙朔南暨聲教訖于四海禹錫𤣥圭告厥成功禹請於堯貢金九牧以鑄九鼎著九州之制度焉論曰史載秦滅周九鼎入于秦自是不復見左氏以為鼎者圖象百物而為之備使民知神姦者也愚竊以為誣矣魑魅魍魎自古不以為天下患惟鄙夫鄙婦則或言之縉紳先生不道也王者恊于上下以承天休乃以此為事而庸鑄之於鼎乎然則禹所鑄者何也始除洪水之害别九州之分野差土田之髙下定貢賦之式度立井田封建之經界盡一時生養斯民之道矣故又鑄于九鼎以為萬世準桀有昏徳而遷于商商紂暴虐而遷于周如此其重也春秋之時晉鄭鑄刑書則知古人創立制度欲傳久逺者必於鼎矣秦方廢井田開阡陌除封建置郡縣滅先王之迹焚及簡編況鼎者明著制度章章堅大之器乎秦不沈之于伊洛必淪之于瀍澗矣始皇百不資于先代而無故求周鼎於泗水則其欲詭惑天下之意可知矣漢興去古未逺易解利西南無所往其来復吉有攸往夙吉髙祖父子知無所往之利而不知来復往夙之吉侵尋至今茫茫禹迹法度盡廢上不仁其身民各私其有不均不平不正不定暴虐無告寃陷困窮争鬬滋起獄訟煩多皆此之由也孰能居其位而仁其民博咨于天下求所正諸靈后氏因軒轅靈龜之圖象形篆以銘鐘鼎命天下脩社祀水既大洩益始教民鑿井而飲命后夔作咸池大章之樂堯曰樂者天地之精也得失之節也夔能和之以平天下一而足矣有老人擊壤而歌曰日出而作兮日入而息兮耕田而食兮汲井而飲兮帝何力於我兮景星見甘露降醴泉出朱草生鳳凰来百載舜相堯二十有八載堯乃殂落葬于陽城丘隴小葬具㣲孔子曰大哉堯之為君也惟天為大惟堯則之蕩蕩乎民無能名焉巍巍乎其有成功煥乎其有文章百有一載甲申百有二載丹朱既除喪舜委政于禹臯陶退避于南河之南丹朱惟慢遊是好傲虐是作朋淫于家天下諸侯朝覲者不之丹朱而之舜訟獄者不之丹朱而之舜謳歌者不謳歌丹朱而謳歌舜論曰堯舜命舜禹行天子之事舜禹亦既受命行天子之事及堯舜既終又避其子何哉人臣至于代天子行天下之政已亢矣況又將去人臣以為天子乎堯舜之䘮甫除舜禹政自己出使丹朱商均去其宫室可則可矣是用九而為首非所以明微也故舜禹避之以展天下之情成揖讓之禮其心與計利害遼乎天地之不相及也使舜禹而有計利之心則是以爭奪行尚何授受之有若夫益則又異於舜禹矣啟賢能敬承繼禹之道益歴事三代年亦老矣奉身而退順天道也讀書者能無以文害辭無以辭害意則子輿氏之言燦然明白無可疑皇王大紀卷三

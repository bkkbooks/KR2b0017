body:
  text: 皇王大紀卷五十四宋胡宏撰三王紀靈王二十二年冬十二月癸酉朔日有食之春正月把伯薨諡曰孝公子益姑嗣晉悼夫人喪把孝公晉侯不徹樂邾畀我奔魯把葬其君陳侯如楚公子黄愬二慶于楚楚人召之使慶樂往殺之慶氏以陳叛楚屈建從陳侯圍陳陳人城板墜而殺人役人相命各殺其長遂殺二慶公子黄復歸晉將嫁女於吳齊人使析歸父媵之以藩載欒盈及其士納諸曲沃盈夜見胥午而告之對曰不可天之所廢誰能興之子必不免盈曰雖然因子而死吾無悔矣我實不天子無咎焉許諾伏之而觴曲沃人曰今也得欒孺子何如對曰得主而爲之死猶不死也皆嘆有泣者盈出徧拜之帥曲沃之甲因魏舒以晝入絳初盈佐魏絳於下軍舒私焉故因之趙氏以同括之難怨欒氏韓趙方睦中行氏以伐秦之役怨欒氏而固與范氏和親樂王鮒侍坐於士匄或告曰欒氏至矣匄懼鮒曰奉公以走固宫必無害也且欒氏多怨子爲政欒氏自外子在位其利多矣旣有利權又執民柄將何懼焉欒氏所得其惟魏氏乎而可强取也夫克亂在權子無懈也匄奉公以如固宫范鞅逆魏舒則成列旣乗將逆欒氏矣趨進曰欒氏帥賊以入鞅之父與二三子在君所矣使鞅逆吾子鞅請驂乗持帶遂超乗右撫劍左援帶命驅之僕請鞅曰之公匄逆諸階執其手賂之以曲沃欒氏乗公門匄謂鞅曰矢及君屋死之鞅用劍以帥卒欒氏退攝車從之盈奔曲沃晉人圍之齊侯伐衛將遂伐晉晏嬰曰君恃勇力以伐盟主若不濟國之福也不徳而有功憂必及君崔杼諫曰不可臣聞小國間大國之敗而毁焉必受其咎君其圖之弗聽陳湏無見崔杼曰將如君何曰吾言於君君弗聽也以爲盟主而利其難羣臣若急君於何有湏無退曰謂君甚而又過之不得其死必矣齊伐晉取朝歌以報平隂之役乃還魯叔孫豹救晉魯季孫宿無適子公彌長而愛少子紇欲立之訪於申豐豐趨退盡室將行乃止訪於臧紇紇曰飲我酒吾為子立之季氏飲大夫酒臧紇為客獻命北靣新樽絜之召紇降逆之大夫皆起及旅而召公彌使與之齒宿失色以公彌爲馬正仲孫速惡臧紇庶長秩少子羯速之御騶豐㸃好羯速疾病㸃為公彌曰苟立羯請讐臧氏公彌言於宿宿弗應速卒入哭曰秩焉在公彌曰羯在此矣宿曰秩長對曰惟其才也遂立羯仲孫氏告於季孫曰臧氏將為亂紇聞之戒宿使視之怒命攻臧氏八月乙亥紇斬鹿門之闗以出奔邾自邾如防使來告曰紇非敢請茍守先祀無廢二勲敢不辟邑乃許立其子爲紇致防而奔齊紇之人曰魯其盟我乎紇曰無辭季孫召外史掌惡臣而問盟首焉對曰盟東門氏也曰毋或如東門遂不聽公命殺適立庶盟叔孫氏也曰毋或如叔孫僑如欲廢國常蕩覆公室宿曰臧孫之罪皆不及此孟椒曰盍以其犯門斬闗乃盟曰無或如臧孫紇干國之紀犯門斬闗臧孫聞之曰國有人焉誰居其孟椒乎孔子曰臧武仲以防求為後於魯雖曰不要君吾不信也晉人克欒盈于曲沃盡殺欒氏之族黨欒魴出奔宋齊侯還自晉不入遂襲莒門于且于傷股而退明日將復戰把梁載甲夜入且于之隧明日先遇莒子親鼓之從而伐之獲把梁莒人行成歸杞梁之尸其妻迎其柩於路而哭之哀齊侯使人弔之對曰君之臣不免於罪則將肆諸市朝而妻妾執君之臣免於罪則有先人之敝廬在君無所辱命洛在王城之南榖在王城之北是年糓水盛出於王城之西南合於洛毁王城西南將及王宫王欲壅之太子晉諫曰山土之聚也藪物之歸也川氣之導也澤水之鍾也古之聖人不墜山不崇藪不防川不竇澤天無伏隂地無散陽民無淫心物無害生故皇天嘉之祚之以天下今吾執政無乃實有所避而滑夫三川之神使至于鬭以妨王宫乎人有言曰無過亂人之門又曰佐饔者甞焉佐鬬者傷焉又曰禍不好不能爲禍將防鬬而飾宫無乃不可乎黄炎之子孫或在畎畝由欲亂民也畎畝之人或在社稷由欲靖民也自周后稷始基靖民十五王而文始平之十八王而康克安之其難如是厲始革典宣王幽平貪天之禍至于今未弭吾朝夕儆懼曰其何徳之脩而少光王室以逆天休將安用飾宫以章輔禍亂也王卒壅之起宣照之臺晉早卒孔叔梁紇卒葬于防山經曰二十有三年春王二月癸酉朔日有食之三月己巳把伯匄卒夏邾畀我來奔葬把孝公陳殺其大夫慶虎及慶寅按左氏慶虎求專陳國畏公子黄之偪而愬諸楚曰與蔡司馬同謀楚人以為討公子黄奔楚愬之二慶以陳叛楚屈建圍陳殺二慶夫人君擅一國之利勢使權臣暴蔑其身而不能遠欲去其親而不能保譖愬之於大國而不能辨至因夷狄之力然後能克則非君人之道也故二慶之死稱國以殺公子黄之出特以弟書者譏歸陳侯也凡此皆春秋端本之意陳侯之弟黄自楚歸于陳晉欒盈復入于晉入于曲沃欒氏晉室之世臣故盈雖出奔猶繋于晉復入者甚逆之詞爲其旣絶而復入也若非天棄欒氏又有范鞅之謀晉亦殆矣原其失在于錮之甚急使無所容于天地之間是以至此極春秋備書之以見人而不仁疾之已甚亂也其爲後世鑒豈不深切著明也哉秋齊侯伐衛遂伐晉八月叔孫豹帥師救晉次于雍榆己卯仲孫速卒冬十月乙亥臧孫紇出奔邾晉人殺欒盈齊侯襲莒二十三年魯叔孫豹如晉士匄問曰古人有言曰死而不朽何謂也豹未對匄曰昔匄之祖自虞以上爲陶唐氏在夏爲御龍氏在商爲豕韋氏在周為唐杜氏晉主夏盟爲范氏其是之謂乎對曰此之謂世禄非不朽也豹聞之太上有立徳其次有立功其次有立言雖乆不廢此之謂不朽士匄聽晉國之政諸侯之幣重鄭子産遺匄書曰僑聞爲國家者非無賄之患而無令名之難夫諸侯之賄聚于公室則諸侯貳若吾子賴之則晉國貳諸侯貳則晉國壞晉國貳則子之家壞何没没也夫令名徳之輿也徳國家之基也有基無壞無壞則樂樂則能乆匄説乃輕幣魯師侵齊晉故也楚王爲舟師以伐吳不爲軍政無功而還夏五月甲子朔日有食之旣齊侯聞將有晉師懼使陳無宇如楚乞師崔杼帥師送之遂伐莒侵介根魯大水六月癸巳朔日有食之晉侯魯侯宋公衛侯鄭伯曹伯莒子邾子滕侯薛伯杞伯小邾子會于夷儀將以伐齊水不克楚王以蔡侯陳侯許男伐鄭以救齊門于東門次于棘澤諸侯救鄭楚師還吳人為楚舟師之役故召舒鳩人舒鳩人叛楚楚王師于荒浦使沈尹壽與師祁犂讓之舒鳩子敬逆二子而告無之且請受命王欲伐之令尹薳子馮曰不可彼告不叛且請受命而又伐之伐無罪也姑歸息民以待其卒卒而不貳吾又何求若猶叛我無辭有庸乃還陳人討慶氏之黨鍼宜咎出奔楚齊人城郟為天子也魯叔孫豹來聘且賀城魯大饑經曰二十有四年春叔孫豹如晉仲孫羯帥師侵齊夏楚子伐吳秋七月甲子朔日有食之旣齊崔杼帥師伐莒大水八月癸巳朔日有食之公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀冬楚子蔡侯陳侯許男伐鄭公至自會陳鍼宜咎出奔楚叔孫豹如京師大饑古有救災之政若國㐫荒或發廩以賑乏或移粟以通用或徙民以就食或爲粥溢以救餓莩或興工作以聚失業之人緩刑舎禁弛力薄征索鬼神除盜賊弛射侯而不燕置庭道而不修殺禮物而不備雖有旱乾水溢民無菜色所以備之者如此其至是年秋有隂沴之災而冬大饑盖所以賑業之者有不備矣故書之以爲戒二十四年春齊崔杼伐魯魯人患之使告于晉孟公綽曰崔子將有大志不在病我必速歸何患焉其來也不冦使民不嚴異於它日齊師徒歸齊棠公死棠姜美崔杼取之齊侯通焉驟如崔氏以崔子之冠賜人侍者不可公曰不爲崔子其無冠乎崔子因是又以其間伐晉也曰晉必將報欲弑公以説于晉莒子朝齊饗諸北郭崔子稱疾不出公問之遂從姜氏姜氏入于室與崔子自側戸出甲興公登臺而請弗許請盟弗許請自刃於廟弗許皆曰君之臣杼疾病不能聽命近于公宫陪臣干掫有淫者不知二命公踰牆射之中股反隊遂弑之諡曰莊公賈舉州綽邴師公孫敖等十人死之皆公嬖勇力之臣也晏嬰立於崔氏之門外其人曰死乎曰獨吾君也乎哉吾死也曰行乎曰吾罪也乎哉吾亡也歸乎曰君死安歸君民者豈以陵民社稷是主臣君者豈惟其口食社稷是養故君為社稷死則死之為社稷亡則亡之若為己死而為己亡非其私暱誰敢任之且人有君而弑之吾焉得死之而焉得亡之門啓而入枕尸股而哭崔子曰吾將殺女嬰曰志於仁者不可以利回由於義者不可以死恐嬰雖不才豈懼乎死哭興三踊而出授綏而乘其僕將馳嬰曰止鹿在山林其命在庖厨疾不益生緩不益死按之成節而去人謂崔子必殺之崔子曰民之望也舎之得民叔孫僑如之在齊也納其女於靈公生子杵臼杼立而相之慶封為左相盟國人於大宫曰所不與崔慶者晏子仰天歎曰嬰所不惟忠於君利社稷者是與有如上帝乃歃太史書曰崔杼弑其君杼殺之其弟嗣書而死者二人其弟又書乃舎之南史氏聞太史盡死執簡以往聞既書矣乃還崔氏側莊公于北郭丁亥葬諸士孫之里四翣不蹕下車七乘不以兵甲須無有馬十乘棄之而去晉侯㑹諸侯于夷儀將伐齊齊使隰鉏請成慶封如師男女以班賂晉侯以宗器樂器自六正五吏三十帥三軍之大夫百官之正長師旅及處守者皆有賂晉侯許之晉侯使魏舒逆衛侯衎將使衛與之夷儀初陳侯㑹楚王伐鄭當陳隧者井堙木刋鄭人怨之四月壬子公孫舎之公孫僑帥車七百乗伐陳宵突陳城遂入之陳侯扶其太子偃師奔墓舎之命無入公宫與僑親御諸門祝祓社司徒致民司馬致節司空致地乃還六月晉侯會夷儀之諸侯及齊侯同盟于重丘晉趙武為政薄諸侯之幣而重其禮謂魯叔孫豹曰齊崔慶新得政將求善於諸侯武也知楚令尹屈建若敬行其禮道之以文辭以靖諸侯兵可以弭衛侯衎遂入夷儀舒鳩人卒叛楚楚屈建伐之及離城吳人救之建遽以右師先屈蕩帥左師以退吳人居其間七日蕩曰乆將墊隘隘乃禽也不如速戰請以私卒誘之簡師陳以待我我克則進奔亦視之乃可以免羣帥從之吳師奔登山以望見楚師不繼復逐之傅諸其軍簡師會之吳師大敗遂圍舒鳩舒鳩潰遂滅之鄭復伐陳陳及鄭平子産獻捷于晉晉人問陳之罪對曰我先王以元女大姬配胡公而封諸陳以備三恪則我周之自出至于今是賴厲公莊宣皆我之自立成公播蕩又我之自入君所知也今陳忘周之大徳蔑我大惠棄我姻親介恃楚衆以馮陵我敝邑大懼不競而恥大姬天誘其𠂻啓敝邑心陳知其罪授手于我用敢獻功晉人曰何故侵小對曰先王之命惟罪所在各致其辟昔天子之地一圻列國一同自是以衰今大國多數圻矣若非侵小何以至焉趙武曰其辭順犯順不祥乃受之孔子曰志有之言以足志文以足言不言誰知其志言之無文行之不遠晉為伯鄭入陳非文辭不爲功慎辭哉楚蔿掩為司馬屈建使庀賦數甲兵甲午蒍掩書土田度山林鳩藪澤辨京陵表淳鹵數疆潦規偃豬町原防牧隰臯井衍沃量入脩賦賦車籍馬賦兵車甲楯之數旣成以授屈建冬十月吳諸樊伐楚以報舟師之役引師至巢入其門巢人射諸城上矢中吳王而卒吳王嘗謂其諸弟曰吾兄弟相傳必致國於季子故弟餘祭立衛侯衎自夷儀使與寗喜言喜許之曰必公子鱄在不然必敗大叔儀曰詩所謂我躬不閱皇恤我後甯子可謂不䘏其後矣殆必不可君子之行思其終也思其復也書曰愼始而敬終終以不困今甯子視君不如奕棋其何以免乎奕者舉棋不定不勝其耦况置君而弗定乎必不免矣九世之卿族一舉而滅之可哀也哉鄭子産問為政於鬷蔑對曰視民如子見不仁者如鷹鸇之逐鳥雀也游吉問於子産子産曰政如農功日夜思之思其始而成其終朝夕而行之行無越思如農之有畔其過鮮矣子産以其乘輿濟人於溱洧孟子論之曰惠而不知為政歳十一月徒杠成十二月輿梁成民未病涉也君子平其政行辟人可也焉得人人而濟之故為政者每人而悦之日亦不足矣經曰二十有五年春齊崔杼帥師伐我北鄙夏五月乙亥齊崔杼弑其君光齊荘公見弑賈舉州綽等十人皆死之而不得以死節稱何也所謂死節者以義事君責難陳善有所從違而不茍者是也雖在屬車後乗必不肯同入崔氏之宮矣若此十人者皆逢君之惡而荘公嬖之者死非其所比諸匹夫匹婦自經於溝瀆而莫之知者猶不逮也雖殺身不償責安得以死節許之哉公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀會于夷儀將以討齊齊使隰鉏請成慶封如師男女以班賂晉侯以宗器樂器自六正五吏三十帥三軍之大夫百官之正長師旅及處守者皆有賂晉侯許之夫晉本為報朝歌之役及㑹夷儀旣聞崔杼之弑則宜下令三軍建而復斾示天討之義則方伯連帥之職脩矣今乃知賊不討而受其賂則是與之同情也故春秋治之如下文所貶云六月壬子鄭公孫舎之帥師入陳秋八月己巳諸侯同盟于重丘崔杼既弑其君矣晉侯受其賂而許之成故盟于重丘特書曰同公至自會衛侯入于夷儀衛侯蔑其冢卿失國出奔不為無罪矣然有世叔儀以守有母弟鱄以出或撫其内或營其外有歸道焉則其義猶未絶也故止書其爵而不名及寗喜弑剽復歸于衛然後書名此聖人俟其改過遷善不輕絶人之意曾子曰夫子之道忠恕而已矣此類是也楚屈建帥師滅舒鳩冬鄭公孫夏帥師伐陳十有二月吳子遏伐楚門于巢卒門于巢卒非吳子之自輕而見殺也古者入境必假道過門必釋甲入國則不馳或曰古者大國過小邑小邑必飾城而請罪亦非巢之輕以一矢相加不飾城而請罪也二十五年冬十二月衛侯使公子鱄為復辭其母敬姒强命之對曰君無信臣懼不免敬姒曰雖然以吾故也鱄乃以公命與寗喜言曰茍反政由甯氏祭則寡人寗喜告蘧瑗瑗曰瑗不能聞君之出敢聞其入遂行從近闗出告右宰榖穀曰不可獲罪於兩君天下其誰畜之喜曰吾受命於先人不可以貳穀曰我請使焉而觀之反曰君淹恤在外十二年矣而無憂色亦無寛言猶夫人也若不已死無日矣喜曰子鮮在糓曰何益多而能亡孫林父在戚孫嘉聘於齊孫襄居守喜糓伐之不克孫襄傷喜出舎於郊國人召喜復攻孫氏克之殺衛侯剽孫林父以戚如晉君子曰臣之禄君實有之義則進否則奉身而退專禄以周旋戮也衛侯復于衛及郊將班邑於從者而後入桞莊曰如皆守社稷則孰執羈靮而從如皆從則孰守社禝君反其國而有私也無乃不可乎弗果班大夫逆於竟者執其手而與之言道逆者自車揖之逆於門者頷之而已使讓大叔儀曰寡人淹恤在外二三子皆使寡人朝夕聞衛國之言吾子獨不在寡人古人有言曰非所怨勿怨寡人怨矣對曰臣不能負羈絏以從扞牧圉罪一也有出者有居者臣不能貳通内外之言以事君罪二也敢忘其罪乃行從近闗出公使止之以桞莊為太史其後荘寢疾公曰若疾革雖當祭必告再拜稽首請於尸曰有臣桞莊也者非寡人之臣社稷之臣也聞之死請往不釋服而往遂以襚之與之邑裘氏與縣潘氏書而納諸棺曰世世萬子孫無變也衛人侵戚東鄙孫氏愬于晉晉人為之召諸侯将以討衛荀吳聘於魯召魯侯魯侯會晉趙武宋向戍鄭良霄曹人于澶淵以討衛疆戚田取衛西鄙懿氏六十以與孫氏初宋芮司徒生女赤而毛弃諸堤下共姬之妾取以入長而美宋公入夕見而視之姬納御嬖生佐惡而婉太子痤美而狠左師向戍畏而惡之寺人惠牆伊戾為太子内師而無寵楚客聘于晉過宋竟太子請享之公使往伊戾請從公曰夫不惡女乎對曰小人之事君子惡之不敢逺好之不敢近敬以待命敢有二心縱共其外莫共其内臣請往也遣之至則欿用牲加書徵之而騁告公曰太子將為亂旣與楚客盟矣公曰爲我子又何求對曰欲速公使視之則信有焉問諸夫人與左師則皆曰固聞之公囚太子縊而死公徐聞其無罪也烹伊戾以佐為太子於是衛侯㑹于澶淵晉人執甯喜北宫遺使司馬侯以先歸衛侯如晉晉人囚之於士弱氏齊侯鄭伯為衛侯故如晉晏嬰私於叔向曰晉君宣明其徳於諸侯所以為盟主也今為臣執君若之何晉侯乃許歸衛侯許男如楚請伐鄭曰師不興孤不歸矣六月薨于楚子買嗣楚王曰不伐鄭何以求諸侯遂及蔡侯陳侯伐鄭鄭人將禦之子産曰晉楚將平諸侯将和楚王是故昧於一來不如使逞而歸乃易成也夫小人之性釁於勇而嗇於禍以足其性而求名焉非國家之利也若何從之公孫舎之曰善楚入南里門于師之梁涉於汜而歸許人乃葬其君衛人歸衛姬于晉乃釋衛侯楚椒舉娶於王子牟子牟獲罪而亡楚人曰舉實送之舉出奔鄭聲子言于屈建曰善為國者賞不僭而刑不濫賞僭則懼及淫人刑濫則懼及善人古之治者恤民不倦賞以春夏刑以秋冬三者禮之大節也有禮無敗今楚多淫刑其大夫逃死于四方而為之謀主以害楚國不可救療所謂不能也屈建言於王乃歸椒舉經曰二十有六年春王二月辛卯衛寗喜弑其君剽喜甞受命於其父使納獻公以免逐君之惡衛侯出入皆以爵稱而剽以公孫非次而立則喜之罪應末減矣亦以弑其君書何也奕者舉棋不定不勝其耦况置君乎於衎則殖也出之喜也納之於剽則殖也立之喜也弑之是弈棋之不若也不思其終亦甚矣故聖人特正其為弑君之罪示天下後世使知慎於廢立之際而不敢忽也衛孫林父入于戚以叛按左氏孫林父以戚如晉書曰入于戚以叛者著其據土背君之罪也甲午衛侯衎復歸于衛衛侯出奔齊入于夷儀皆以爵稱今旣復歸而得國矣乃書其名何也人之有徳慧智術者嘗存乎疢疾衛侯淹恤在外十有二年困於心衡於慮乆矣一旦得國猶夫人也則是困而弗革雖復得國猶非其國也此見春秋俟人改過之深而責人自棄之重欲其强於爲善之意也夏晉侯使荀吳來聘公㑹晉人鄭良霄宋人曹人于澶淵秋宋公殺其世子痤殺世子母弟直稱君者甚之也本寺人伊戾為太子内師無寵譛於宋公而殺之則賊世子痤者寺人矣而獨甚宋公何哉譛言之得行也必有嬖妾配適以惑其心又有小人欲結内援者以為之助然後愛惡一移父子夫婦之間不能相保者衆矣尸此者其誰乎晉獻之殺申生宋公之殺痤直稱君者正其本之意晉人執衛寗喜八月壬午許男寗卒于楚冬楚子蔡侯陳侯伐鄭𦵏許靈公二十六年齊慶封聘于晉宋向戍善於晉趙武又善於楚屈建欲弭諸侯之兵以為名遂如晉如楚如齊告於秦皆許之乃約小國為會於宋屈建謂戍請晉楚之從交相見戍復於趙孟曰晉楚齊秦匹也晉之不能於齊猶楚之不能於秦也楚君若能使秦君辱於敝邑寡君敢不固請於齊戍復於建建使驛謁諸王王曰釋齊秦他國請相見也於是晉趙武魯叔孫豹衛石惡鄭良霄許人曹人楚屈建蔡公孫歸生陳孔奐皆㑹于宋以藩爲軍晉楚各處其偏衛寗喜專獻公患之公孫免餘請殺之公曰微寗子不及此吾與之言矣事未可知祇成惡名止也對曰臣殺之君勿與知乃與公孫無地公孫臣謀使攻寗氏弗克皆死公曰臣也無罪父子死余矣免餘復攻寗氏殺寗喜及右宰穀尸諸朝公子鱄曰逐我者出納我者死賞罰無章何以沮勸君失其信而國無刑不亦難乎且鱄實使之遂出奔晉衛侯使止之不可及河又使止之止使者而盟於河託於木門不鄉衛國而坐木門大夫勸之仕不可曰仕而廢其事罪也從之昭吾所以出也吾不可以立於人之朝矣終身不仕諸侯之大夫將盟楚人𠂻甲伯州犂曰諸侯望信於楚是以來服若不信是棄其所以服諸侯也固請釋甲屈建曰晉楚無信乆矣茍得志焉焉用有信州犂告人曰令尹將死矣趙孟患之叔向曰何害也匹夫一為不信猶不可單斃其死若合諸侯之卿以為不信必不捷矣魯季孫使謂叔孫豹曰公命視邾滕旣而齊人請邾宋人請滕皆不與盟豹曰邾滕人之私也我列國何故視之宋衛吾匹也及盟晉楚争先晉人曰晉國為諸侯盟主未有先晉者也楚人曰子言晉楚匹也若晉常先是楚弱也且晉楚主諸侯之盟也乆矣豈專在晉叔向謂武曰諸侯歸晉之徳只非歸其尸盟也昔成王盟諸侯於岐陽楚為荆蠻置茒絶設望表與鮮卑守燎故不與盟今將與狎主諸侯之盟惟有徳也子務徳無争先且諸侯盟小國必有尸盟者乃先楚宋向戍請賞公與之邑以示樂喜喜曰小國兵威之畏而後上下慈和安靖其國家無威則驕驕則亂生滅亡必矣天生五材民並用之廢一不可誰能去兵兵所以威不軌而昭文徳也聖人以興亂人以廢而求去之不亦誣乎以誣道蔽諸侯罪莫大焉縱無大討而又求賞無厭之甚也削而投之向氏欲攻司城戍止之曰我將亡矣夫子存我徳莫大焉十月乙亥朔日有食之辰在申司厯過也再失閏矣齊崔杼生成及彊而寡娶棠姜生明姜之子棠無咎弟東郭偃相崔氏廢成而立明成請老于崔弗許彊怒告慶封封曰茍利夫子必去之難吾助女成彊逐二子杼怒見慶封封曰是何敢然使其屬盧蒲嫳攻殺成彊棠姜縊遂滅崔氏嫳復命杼至則無歸矣乃縊崔明奔魯慶封當國經曰二十有七年春齊侯使慶封來聘夏叔孫豹㑹晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋衛殺其大夫甯喜寗喜既坐弑君之罪矣不以討賊之詞何也初衛侯使與寗喜言茍反政由寗氏祭則寡人寗氏納之衛侯復國患寗喜之專也公孫免餘請殺喜尸諸廟子鮮曰逐我者出納我者死賞罰無章何以勸沮君失其信而國無刑不亦宜乎故稱國以殺而不去其官衛侯之弟鱄出奔晉衛侯之入使鱄與寗喜納言既殺寗喜鱄病失言遂出奔晉託於木門不鄉衛國而坐木門大夫勸之仕不可曰仕而廢其事罪也從之昭吾所以出也吾不可以立人之朝矣終身不仕其稱弟罪衛侯也榖梁曰鱄之去合乎春秋秋七月辛巳豹及諸侯之大夫盟于宋此一地也曷為再言宋書之重詞之複其中必有大美惡焉宋之盟自是中國諸侯南面而朝楚及申之㑹蠻夷之君簒弑之賊人合十有一國之衆而用齊桓召陵之禮宋世子佐以後至遂辭而不見伐呉滅賴無敢違者聖人至是哀人倫之滅傷中國之衰而其事自宋之盟始也而或者乃以宋之盟中國不出蠻夷不入玉帛之使交乎天下以尊周室為晉趙武楚屈建之力而善此盟也其說誤矣冬十有二月乙亥朔日有食之皇王大紀卷五十四

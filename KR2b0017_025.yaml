body:
  text: 皇王大紀卷二十五宋胡宏撰三王紀康王喪葬曰古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人制衾冒棺槨使死者有終生者無憾歷夏商至周而禮節大備凡病革者內外皆掃寢東首於北牖下廢牀徹䙝衣加新衣體一人男女改服屬纊以俟氣絶男子不死於婦人之手婦人不死於男子之手君夫人卒於路寢大夫世婦卒於適寢士庶之妻皆死於寢天子死曰崩諸侯死曰薨大夫曰卒士曰不祿庶人曰死壽考曰卒短折曰不祿死寇曰兵送終之具六十歲制七十時制八十月制九十日修惟絞襟衾冒死而後制復始終虞人狄人設階小臣復復者朝服天子以冕服復於太廟復於小寢大寢小祖大祖以乘車建綏復于四郊曰天子復矣自諸侯至於庶人各以其服皆升自東榮中屋履危北面三號捲衣投于前司服受之降自西北榮復衣不以衣尸不以斂婦人復不以袡而亷凡復男子稱名婦人稱字復盡愛之之道也有禱祠之心焉望反諸幽求諸鬼神之道也北靣求諸幽之義也唯哭先復復而後行死事主人羔裘𤣥冠者易之笄纚徒跣扱上衽而審交手哭水漿不入口心悵焉愴焉惚焉愾焉故辟踊哭泣訃父兄命赴者赴於他國君日寡君不祿敢告執事夫人曰寡小君不祿太子曰寡君之適子某死臣訃於君曰君之臣某死父母妻長子曰君之君某之某死大夫訃於大夫士曰某不祿士訃於大夫曰某死浴尸帷堂天子張帟三重諸侯再重孤卿大夫不重君設大盤大夫夷盤造氷焉士瓦盤扶君僕人師扶右射人師扶左君薨以是舉浴尸殷人掘中霤而浴毁竈以綴足周人浴以盆沐以盤楔齒用角柶綴足以燕几君大夫士一也設牀袒如䇿彥君以簟席大夫以蒲席士以葦席有枕襲一牀含一牀遷尸于堂又一牀君大夫士一也飯尸襲已正尸於牖下南首飯尸天子沐用黍諸侯用稷大夫士用稻含尸用具天子九諸侯七大夫五士三飯用米貝弗忍虛也不以食道用美焉耳子坐於東卿大夫父兄子姓立焉有司庶士哭於堂下北面夫人坐於西內命婦姑姊妹子姓立焉外命婦率外宗哭於堂上北面君之喪為寄公國賔出大夫之喪為君命出士之喪於大夫不當斂則出出必徒跣蘇典扱衽拊心降自西階小斂三日小斂於戶內男女奉尸夷于堂布絞縮者一橫者三君錦衾大夫縞衾士緇衾皆一是為夷衾夷衾質殺之裁猶冒也凡冒質長與手齊殺三尺衣十有九稱君陳衣于庭百稱大夫五十士三十主人即位袒說髦括髮婦人髽側瓜帶麻于房中重重主道也殷主綴重焉周主重徹焉以脯醢奠曾子曰始死之奠其餘閣也歟大斂於阼子辨絰大結即位於序端布絞縮者三橫者五布襟二衾君大夫士一也絞襟如朝服絞一幅為三不辟襟五幅無紞君錦冒黼殺綴旁七大夫𤣥冒黼殺綴旁五士緇冒赬殺綴旁三小斂大斂祭服不倒皆左衽結絞不紐卒斂宰告子馮之踊夫人東西亦如之天子崩三日祝先服五日官長服七日國中男女服三月天下服殯天子七日而殯諸侯五日大夫士庶人三日夏后氏殯於東階之上殷人殯於兩楹之間周人殯於西階之上在牀曰尸在棺曰柩動尸舉柩哭踊無數惻怛痛疾悲哀志悶氣盛故袒而踊之所以動體安心下氣也婦人不袒故發胸擊心爵踊也君即位而為椑歲一漆之藏焉其色朱緑用雜金鐟大夫𤣥緑用骨士不緑天子之棺四重水兕革棺被之其厚三寸杝棺一梓棺二四者皆周棺束縮二衡三衽每束一外柏椁諸侯三重大夫士再重棺椁之間君容柷大夫容壺士容甒無甫古者棺椁無度中古棺七寸椁稱之自天子達於庶人天子龍輴而椁幬直流為四阿加斧于椁上畢塗屋諸侯輴丑輪而設幬無四阿大夫以幬攢塗不暨于棺士殯見衽塗上帷之設熬加魚臘音昔於旁天子之喪官正授廬舍辨其親疏貴賤主人襲斬衰帶絰居於倚廬哭無時非喪事不言寢苫舒廉枕塊杖而後能起為父苴杖為母削杖苴杖竹削杖桐也公侯之喪諸達官之長杖父在為妻不杖不稽顙桑郎母在為妻杖而不稽顙稽顙其贈也拜袒括髮去飾之甚也有所袒有襲哀之節也拜稽顙哀戚之至隱也稽顙隱之甚也為父與為長子稽顙大夫弔之雖緦必稽顙拜而后稽顙殷之喪拜也孔子曰頽乎其順也稽顙而后拜周之喪拜也孔子曰頎乎其至也三年之喪吾從其至者或曰婦人為夫與長子稽顙銘旌書銘男子稱名婦人書姓與伯仲如不知姓則書氏曰某之柩自天子至于士一也置于西階上銘明旌也以死者為不可别已故以旗識之愛之斯録之矣敬之斯盡其道焉耳奠朝奠日出夕奠逮日朔奠致盛焉薦新如之奠以素器以生者有哀素之心也唯祭祀之禮主人自盡焉耳豈知神之所饗亦以主人有齊敬之心也曾子問於孔子曰大功可以與饋奠乎孔子曰自斬哀以下可也曰不以輕服而重相為乎曰非此之謂也天子諸侯之喪斬衰者奠大夫齊衰者奠士則朋友奠不足則取於大功以下者不足則反之曰廢喪服可以與於饋奠乎曰說衰與奠非禮也以擯相可也弔衾禭賵臨凡有弔者相者以入升堂致命子拜稽顙弔者出含者執璧將命子拜稽顙含者坐委于殯東南乃出襚似醉者執冕服致命子拜稽顙襚者下堂受爵辨服於門內霤受皮辨服於中庭自西階受朝服自堂受𤣥端將命子皆拜稽顙委衣於殯襚者出賵孚鳳者陳乘黃大路於中庭北輈執圭將命子拜稽顙坐委於殯東南隅賵者出弔含襚賵臨皆同日而畢事者也諸侯之相禭也以後路與冕服先路褒衣不以襚知生者弔知死者傷知生而不知死弔而不傷知死而不知生傷而不弔行弔之日不飲酒食肉羔裘𤣥冠不以弔弔於葬者必執引若從柩其又及壙皆執紼君遇柩於路必使人弔之婦人非三年之喪不踰封而弔婦人送迎不下堂下堂不哭男子出寢門見人不哭其無女主則男主拜女賔于寢門內其無男主則女主拜男賔于阼階下子幼則以衰抱之人為之拜為後者不在則有爵者辭無爵者人為之拜在竟內則俟之在竟外則殯葬可也卿大夫疾君問之無算在殯三往焉比葬不食肉比卒哭不舉樂士有疾問之在殯一往焉比葬不舉將往必先戒之主人具殷奠以俟于門外見馬首則先入門右君入即位于阼主人拜稽顙君稱言視祝而踊主人踊卒奠先俟于門外送君拜稽顙夫人弔於大夫士主人出迎如君夫人升堂即位主婦降自西階拜稽顙于下夫人視世子而踊卒奠主婦送于門內拜稽顙主人送於大門之外不拜明器既殯旬而布材與明器竹不成用瓦不成沫木不成斫琴瑟張而不平竽笙具而不和有鐘磬而無筍虡其曰明器神明之也葬則置之墓中孔子謂為明器者知喪道矣備物而不可用也哀哉死者而用生者之器也不殆於用殉乎哉塗車芻靈自古有之明器之道也孔子謂為芻靈者善謂為俑者不仁不殆於用人乎哉葬天子七月而葬諸侯五月大夫士庶人三月凡葬卜宅兆卜日外事用剛日內事用柔日旬之外曰逺某日旬之內曰近某日喪事先逺日吉事先近日卜筮不過三卜筮不相襲卜筮者先聖王之所以使民信時日敬鬼神畏法令也所以使民决嫌疑定猶與也大夫之喪其卜也有司麻衣布衰帶因喪屨緇布冠不㽔占者皮辨如筮則史練冠長衣以筮占者朝服凡聽卜有事於尸則去杖葬有日啓殯設啓奠朝於祖其朝也順死者之孝心也其哀離其室也故至於祖考之廟而後行殷祭而殯於祖及葬毁宗躐行出于大門周朝而遂葬質明設遷祖之奠奉柩載於桞車有虞氏之綏夏后氏之綢練殷之崇牙周之壁翣飾棺君龍帷三池振容黼荒火黻三列素錦禇加帷荒纁紐六齊五采五貝黼黻畫翣各二皆戴圭魚躍拂池纁戴六纁披六大夫士視是以衰載銘旌之車是為祥車祥車曠左遷柩南首設祖奠厥明遣奠苞牲體載之天子九箇車九乘疏布輤四面有章置于四隅諸侯七大夫五君執綍五百人皆銜枚司馬執鐸十有六人匠執羽葆御柩大夫執引者三百人執鐸四人御柩以茅葬於北方北首三代之達禮也之幽之故也端衰喪車無等大夫將葬弔於官及出命引之三步則止如是者三君退朝亦如之哀次亦如之天子之壙闕地為隧庶人縣棺而封三年之喪自天子達葬不為雨止不封不樹喪不二事自天子達於庶人殷人冔而葬周人辨而葬者與神交之道也曾子問於孔子曰葬引至於堩古鐙日食如之何孔子曰吾嘗從老聃耽助葬於巷黨及堩日有食之老聃曰丘止柩就道右止哭以聽變既明反而後行曰禮也反葬而問之曰夫柩不可以反者也日有食之不知其已之遲速則豈如行哉老聃曰諸侯朝天子見日而行逮日而舍奠大夫使見日而行逮日而舍夫柩不早出不暮宿見星而行者唯罪人與奔父母之喪者乎日有食之安知其不見星也君子行禮不以人之親痁始廉患老聃云封弔虞封主人贈以𤣥纁束帛弔殷既封而弔弔於壙作虞主其木用桑祝先歸宿虞尸是故送形而往迎精而反啜主人主婦室老為其病也君命食之也反哭升堂反諸其所作也主婦入于室反諸其所養也周反哭而弔弔於家其弔也哀之至也反而亡焉失之矣於是為甚孔子曰死民之卒事也殷已慤吾從周既反哭有司以几筵舍奠於墓左主人與有司視虞牲是日以虞易奠以吉祭易喪祭弗忍一日離也男男尸女女尸天子九虞諸侯七大夫五士三曾子問於孔子曰小功可以與於祭乎孔子曰自斬衰以下禮也曰不以輕喪而重祭乎曰天子諸侯之喪祭也不斬衰者不與祭大夫齊衰者與祭士祭不足則取於兄弟大功以下者曰相識有喪服可以與於祭乎曰緦不祭又何助於人卒哭既虞卒哭天子九月諸侯七月大夫五月士三月報葬者報虞三月而后卒哭既卒哭宰夫執木鐸以命于宫曰舍故而諱新禮不諱嫌名二名不偏諱逮事父母則諱王父母不逮事父母則不諱王父母君所無私諱大夫之所有公諱詩書不諱臨文不諱廟中不諱夫人之諱雖質君之前臣不諱也婦諱不出門大功小功不諱入竟而問禁入國而問俗入門而問諱周人明日奉主于太廟祭從昭穆是謂之祔自始虞至于祔必於是日也接不忍一日未有所歸也虞杖不入於室祔杖不升於堂祔士大夫不得祔於諸侯祔於諸祖父之為士大夫者其妻祔於諸祖姑妾祔於妾祖姑無妾祖姑者易牲而祔於女君可也其妻為大夫而卒而後其夫不為大夫而祔於其妻則不易牲妻卒而後夫為大夫而祔於其妻則以大夫牲諸侯不得祔於天子天子諸侯大夫可以祔於士士不攝大夫攝大夫唯宗子士不祔於大夫之昆弟無昆弟則從其昭穆雖王父在亦然王父死未練祥而孫又死猶是祔於王父也男子祔於王父則配女子祔於王母則不配公子祔於公子婦之喪虞卒哭其夫若子主之祔則舅主之婦祔於祖姑祖姑有三人則祔於親者有父母之喪尚功哀而祔兄弟之殤詩羊則練冠祔於殤稱陽童某甫不名神也祔葬者不筮宅練期十三月而練筮日筮尸視濯皆要絰杖屨繩有司告具而後去杖筮日筮尸有司告事畢而後杖拜送賔祥二十五月而祥吉服而筮尸作栗主主人朝服縞冠素紕奉主入廟二十六月而禫徒感既禫復常曾子問於孔子曰三年之喪弔乎孔子曰三年之喪練不羣立不旅行君子以禮飾情三年之喪而弔哭不亦虛乎是故雖功衰不弔期之喪十一月而練十三月而祥十五月而禫練則弔弔於鄉人哭而退不聽事焉功哀弔待事而執事小功緦執事不與於禮相趨也出宫而退相揖也哀次而退相問也既封而退相見也反哭而退朋友虞祔而退諸侯葬必皮辨裼衰所弔雖葬主人必免主人未喪服則君亦不裼衰忌日忌日必哀稱諱君子以為終身之憂遭喪雜禮曾子問於孔子曰並有喪如之何孔子曰葬先輕而後重其奠也先重而後輕禮也自啓及葬不奠行葬不哀次反葬奠而後辭於殯遂修葬事其虞也先重而後輕禮也先葬者不虞祔待後事其葬服斬衰父喪未終而有母之喪其除喪也服其除服卒事反喪服諸父昆弟之喪亦然父母之喪將祭而昆弟死既殯而祭如同宫則雖臣妾葬而後祭主人及執事者之升降散等虞祔亦然自諸侯達諸士曾子問於孔子曰士大夫有私喪可以除之矣而有君服焉如之何孔子曰有君服於身者不敢私服於是有過時而弗除也君之喪服除而後殷祭禮也曾子曰父母之喪弗除可乎孔子曰先王制禮過時弗舉禮也非弗能勿除也患其過於制也故君子過時不祭禮也曾子曰君薨既殯而臣有父母之喪如之何孔子曰歸居于家有殷事則之君所朝夕否曰君既啓而臣有父母之喪則如之何孔子曰歸哭而反送君曰君未殯而臣有父母之喪則如之何曰歸殯反于君所有殷事則歸朝夕否大夫室老行事士則子孫行事大夫內子有殷事亦之君所朝夕否君之喪既引臣聞父母之喪遂既封而歸不俟子父母之喪既引及塗聞君薨遂既封改服而往君出疆以三年之戒以椑從君薨及其入也其殯服則子麻辨絰音勉疏衰菲杖入自關升自西階如小斂則子勉而從柩入自門升自阼階君大夫士一也君薨於路館復如國於道則以綏復於車左轂其輤有裧緇布裳帷素錦為屋而行至於廟門說輤不毁牆遂入適所殯大夫士輤蒲裳布帷葦席為屋至家說輤輲市專車遂入至阼階說適所殯大夫使他國卒於公館者復於私館者不復公館與公所為曰公館卿大夫士之家曰私館奔喪之禮始聞親喪哭盡哀問故又哭盡哀遂行見星而行見星而舍哭辟市朝望境而哭入門升自西階殯東坐哭盡哀括髮袒降堂東即位哭踊襲絰于序東絞帶反位拜賔成踊送賔反位衆主人兄弟出哭止相者告就次於又哭三哭皆括髮袒成踊三日成服於五哭拜賔送賔如初奔喪者非主人則主人為之拜賔送賔齊衰以下奔者入中庭北靣哭免麻于序東即位袒與主人哭成踊於又哭三哭皆免袒冠至尊也不居肉袒之禮故為之免以代之也冠者不袒袒者必免母喪異於父者一括髮而已括髮以麻免而以布齊衰惡筓以終喪奔不及殯者先之墓北靣坐哭盡哀主人即位於墓左婦人於右奔者成踊盡哀括髮東即主所絰絞帶哭成踊遂冠歸入門左北靣哭盡哀括髮袒成踊東即位他皆如前禮齊衰以下不及殯先之墓西靣哭免麻襲歸免袒他如前禮聞喪不得奔則為位行禮如之若除喪而後歸則之墓哭成踊東括髮袒絰哭盡哀遂除至家不哭主人無變於服哭不踊奔兄弟之喪先之墓而後之家為位而哭所知之喪則哭於宫而後之墓奔齊哀者望鄉而哭大功望門小功至門緦麻即位而哭三年之喪則君夫人歸夫人其歸也以諸侯之弔禮其待之也若待諸侯然夫人至自闈門升自側階君在阼其他如奔喪坐哭於殯東西靣盡哀東髽即位與主人更踊婦人喪父母者既練而歸期九月者既葬而歸大夫士父母之喪既練而歸朔月忌日則歸哭於宗室諸父兄之喪既卒喪而歸父不次於子兄不次於弟父不為衆子次於外哭父之黨於廟母妻之黨於寢師於廟門外朋友於寢門外所識於野張帷凡為位不奠哭天子九諸侯七卿大夫五士三大夫哭諸侯不敢拜賔凡奔喪有大夫至袒拜之成踊而后襲士則襲而后拜之凡異居聞兄弟之喪其始麻散帶絰未服麻而奔喪及主人未成絰也疏者與主人皆成之親者終其麻帶絰之日數主人未除喪有兄弟自他國至則主人不免而為主凡喪服未畢有弔者則為位而哭拜踊逺兄弟之喪既除喪而后聞免袒成踊拜賔則尚左手久而不葬者唯主喪者不除為兄弟既除喪已及其葬也反服其服緦小功虞卒哭則免既葬而不報虞則雖主人皆冠及虞則皆免逺葬者比反哭則皆冠及郊而後免反哭君弔雖不當免時也主人必免不散麻雖異國之君免也親者皆免皇王大紀卷二十五

body:
  text: 皇王大紀卷十三宋胡宏撰三王紀武王十三年初王克商以箕子歸于豐王就見之問道焉箕子為王陳洪範周書叙曰武王勝殷殺受立武庚以箕子歸作洪範洪範惟十有三祀王訪于箕子王乃言曰嗚呼箕子惟天隂隲下民相協厥居我不知其彞倫攸叙箕子乃言曰我聞在昔鯀陻洪水汨陳其五行帝乃震怒不畀洪範九疇彞倫攸斁鯀則殛死禹乃嗣興天乃錫禹洪範九疇彞倫攸叙初一曰五行次二曰敬用五事次三曰農用八政次四曰協用五紀次五曰建用皇極次六曰乂用三徳次七曰明用稽疑次八曰念用庶徵次九曰嚮用五福威用六極一五行一曰水二曰火三曰木四曰金五曰土水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡潤下作鹹炎上作苦曲直作酸從革作辛稼穡作甘二五事一曰貌二曰言三曰視四曰聽五曰思貌曰恭言曰從視曰明聽曰聰思曰睿恭作肅從作乂明作哲聰作謀睿作聖三八政一曰食二曰貨三曰祀四曰司空五曰司徒六曰司冦七曰賔八曰師四五紀一曰歳二曰月三曰日四曰星辰五曰厯數五皇極皇建其有極斂時五福用敷錫厥庶民惟時厥庶民于汝極錫汝保極凡厥庶民無有淫朋人無有比徳惟皇作極凡厥庶民有猷有為有守汝則念之不恊于極不罹于咎皇則受之而康而色曰予攸好徳汝則錫之福時人斯其惟皇之極無虐㷀獨而畏髙明人之有能有為使羞其行而邦其昌凡厥正人既富方穀汝弗能使有好于而家時人斯其辜于其無好徳汝雖錫之福其作汝用咎無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直會其有極歸其有極曰皇極之敷言是彞是訓于帝其訓凡厥庶民極之敷言是訓是行以近天子之光曰天子作民父母以為天下王六三徳一曰正直二曰剛克三曰柔克平康正直彊弗友剛克燮友柔克沈潛剛克髙明柔克惟辟作福惟辟作威惟辟玉食臣無有作福作威玉食臣之有作福作威玉食其害于而家凶于而國人用側頗僻民用僭忒七稽疑擇建立卜筮人乃命卜筮曰雨曰霽曰䝉曰驛曰克曰貞曰悔凡七卜五占用二衍忒立時人作卜筮三人占則從二人之言汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮汝則從龜從筮從卿士從庶民從是之謂大同身其康强子孫其逢吉汝則從龜從筮從卿士逆庶民逆吉卿士從龜從筮從汝則逆庶民逆吉庶民從龜從筮從汝則逆卿士逆吉汝則從龜從筮逆卿士逆庶民逆作内吉作外凶龜筮共違于人用靜吉用作凶八庻徴曰雨曰暘曰燠曰寒曰風曰時五者來備各以其叙庻草蕃廡一極備凶一極無凶曰休徴曰肅時雨若曰乂時暘若曰哲時燠若曰謀時寒若曰聖時風若曰咎徴曰狂恒雨若曰僭恒暘若曰豫恒燠若曰急恒寒若曰䝉恒風若曰王省惟歳卿士惟月師尹惟日歳月日時無易百穀用成乂用明俊民用章家用平康日月歳時既易百穀用不成乂用昬不明俊民用㣲家用不寜庻民惟星星有好風星有好雨日月之行則有冬有夏月之從星則以風雨九五福一曰壽二曰富三曰康寜四曰攸好徳五曰考終命六極一曰凶短折二曰疾三曰憂四曰貧五曰惡六曰弱王敬受焉將封之箕子不受儻佯而去商人以盖天之法正時令周人受於商而志其法謂之周髀後世失其傳遂與渾儀異天子寢疾病周人深以為憂周公祈于先王欲以身代作金縢曰武王有疾周公作金縢金縢既克商二年王有疾弗豫二公曰我其為王穆卜周公曰未可戚我先王公乃自以為功為三壇同墠為壇於南方北面周公立焉植璧秉珪乃告太王王季文王史乃冊祝曰惟爾元孫某遘厲虐疾若爾三王是有丕子之責于天以旦代某之身予仁若考能多材多藝能事鬼神乃元孫不若旦多材多藝不能事鬼神乃命于帝庭敷祐四方用能定爾子孫于下地四方之民罔不祗畏嗚呼無墜天之降寳命我先王亦永有依歸今我即命于元龜爾之許我我其以璧與珪歸俟爾命爾不許我我乃屏璧與珪乃卜三龜一習吉啓籥見書乃并是吉公曰體王其罔害予小子新命于三王惟永終是圖兹攸俟能念予一人公歸乃納冊于金縢之匱中王翼日乃瘳王問於師尚父曰黄帝髙陽之道可得聞乎尚父對曰在丹書王下堂將南面而聽尚父曰先王之道不北面王乃東面尚父西面道書之言曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶且臣聞之仁而得之仁而守之其量百世不仁得之仁而守之其量十世以不仁得之以不仁守之必及其世王曰善哉退而為銘於席之前左端曰安樂必敬右端曰毋行可悔後左端曰一反一側亦不可忘右端曰所監不逺視爾所代銘於鑑曰見爾前慮爾後銘於盥盤曰與其溺於人也寜溺於淵溺於淵猶可游也溺於人不可救也銘於楹曰毋曰胡殘其禍將延母曰胡害其禍將大母曰胡傷其禍將長銘於杖曰嗚呼危於忿㚄嗚呼失道於嗜慾嗚呼相忘於富貴銘於帶曰慎戒必恭恭則壽銘於劍曰帶之以為服動必行徳行徳則興背徳則崩銘於矛曰造矛造矛少間弗忍終身之羞予一人所聞以戒後世子孫命以衮服之日月星辰章於旌旗自殷而上天子之服十有二章以日月星辰山龍華蟲繪之於衣以宗彞藻火粉米黼黻繡之於絺以為裳至是定為九章登龍於山登火於宗彛王之服大裘冕為上龍衮而下皆為禆冕六服皆𤣥衣纁裳盖取諸乾坤東方有醫無閭之珣玕琪焉南方有梁山之犀象焉西方有霍山之珠玉焉北方有幽都之筋角焉東南有會稽之竹箭焉西南有華山之金石焉東北有斥山之文皮焉西北有崑崙之璆琳琅玕焉中有岱岳與其五穀魚鹽生焉是謂九府唐虞夏商以珠玉為上幣其次金幣三等或赤或黄或白赤為上幣銅錢為下幣名曰泉後轉曰錢尚父立圜法輕重以銖通九府之貨十六年甲申古者君名世子有司端冕見之南郊過闕則下過廟則趨自為赤子而教固已行矣少長立太傅少傅飬之以禮樂樂所以脩内也禮所以脩外也禮樂交錯於中發形於外是故其成也懌恭敬而溫文太傅審父子君臣長㓜之道以示之少傅奉世子以觀太傅之徳行而審喻之太傅在前少傅在後入則有保出則有師師也者教之以事而喻諸徳者也保也者慎其身以輔翼之而歸諸道者也知為子然後可以為人父知為臣然後可以為人君知事人然後可以使人是故養世子不可不慎也記曰虞夏商周有師保有疑丞設四輔及三公不必備惟其人語使能也君子曰徳徳成而教尊教尊而官正官正而國治君之謂也世子初學周公以為世子則無為也抗世子法於伯禽使與世子居處出入欲令世子知父子君臣長㓜之道也世子有過則撻伯禽所以示世子以世子之道也君之於世子也親則父也尊則君也有父之親有君之尊然後兼天下而有之是故飬世子不可不慎也行一物而三善皆得者唯世子而已其齒於學之謂也故世子齒於學國人觀之曰將君我而與我齒讓何也曰父在也君在也長長也然而衆知父子之道君臣之義長幼之節矣故父在斯為子焉為君臣焉為長幼焉父子君臣長幼之道得而國治語曰樂正司業父師司成一人元良萬國以貞世子之謂也仲尼曰聞之曰為人臣者殺其身有益於君則為之况迂其身以善其君乎周公優為之周禮夏官之屬曰諸子掌國子之倅記曰周庻子官職諸侯卿大夫士之庻子之倅掌其戒令與其教治别其等正其位國有大事則帥國子而致於太子唯所用之若有甲兵之事則授之以車甲合其卒伍置其有司以軍法治之司馬弗征凡國之政事國子存游倅使之脩徳學道春合諸學秋合諸射以考其藝而進退之所以預為太子羽翼也王跡箕子之所之東至朝鮮就封之朝鮮夷也箕子始教其民田蠶織作設禁八條相殺以當時償相傷以穀償相盗者男没為奴女没為婢欲自贖者人五十萬雖免為民俗猶羞之嫁娶無所售是以其民終不相盜無門戸之閉婦人貞信不淫僻初箕子去周過故殷墟野哭則不可飲泣則婦人乃歌曰麥秀漸漸兮禾黍油油兮彼狡童兮不與我好兮殷人聞之無不流涕十七年王崩周公奉元子誦以即位生十三年矣祝雍作頌曰使王世子近於民逺於年嗇於時惠於則親賢而任能其頌曰令月吉日惟王太子始加元服去子㓜志存心衮軄欽若昊天六合是式率商祖考永永無極王尸天位周公應問無窮導之以道太公誠立而敢斷輔善而相義以充大其志召公㢘潔而切直匡過而諫邪以矯拂其行史佚博聞强記敏給而善詞以承救其遺忘王雖童䝉四聖維之故朝廷無過事孔子曰舜有臣五人而天下治武王曰予有亂臣十人孔子曰才難不其然乎唐虞之際於斯為盛有婦人焉九人而已孟子曰堯舜性之也湯武身之也動容周旋中禮者盛徳之至也哭死而哀非為生者也經徳不回非以干禄也言語必信非以正行也君子行法以俟命而已矣孟子曰齊宣王問曰湯放桀武王伐紂有諸孟子對曰於傳有之曰臣弑其君可乎曰賊仁者謂之賊賊義者謂之殘殘賊之人謂之一夫聞誅一夫紂矣未聞弑君也皇王大紀卷十三

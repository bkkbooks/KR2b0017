body:
  text: 皇王大紀卷二十二宋胡宏撰三王紀康王十一年甲子宋公㣲子啓薨世子蚤死有孫曰腯不立以弟衍嗣是為㣲仲十二年君陳薨命畢公高之洛邑周書叙曰康王命作冊畢分居里成周郊作畢命惟十有二年六月庚午朏越三日壬申王朝步自宗周至于豐以成周之衆命畢公保釐東郊王曰嗚呼父師惟文王武王敷大徳于天下用克受殷命惟周公左右先王綏定厥家毖殷頑民遷于洛邑宻邇王室式化厥訓既歴三紀世變風移四方無虞予一人以寜道有升䧏政由俗革不臧厥臧民罔攸勸惟公懋徳克勤小物弼亮四世正色率下罔不祇師言嘉績多于先王予小子垂拱仰成王曰嗚呼父師今予祇命以周公之事往哉旌别淑慝表厥宅里彰善癉惡樹之風聲弗率訓典殊厥井疆俾克畏慕申盡郊圻慎固封守以康四海政貴有恒辭尚體要不惟好異商俗靡靡利口惟贒餘風未殄公其念哉我聞曰世禄之家鮮克由禮以蕩陵徳實悖天道敝化奢麗萬同流兹殷庶士席寵惟舊怙侈滅義服美于人驕淫矜夸將由惡終雖収放心閑之惟艱資富能訓惟以永年惟徳惟義時乃大訓不由古訓于何其訓王曰嗚呼父師邦之安危惟兹殷士不剛不柔厥徳允脩惟周公克慎厥始惟君陳克和厥中惟公克成厥終三后協心同底于道道洽政治澤潤生民四夷左衽罔不咸頼予小子永膺多福公其惟時成周建無窮之基亦有無窮之聞子孫訓其成式惟乂嗚呼罔曰弗克惟既厥心罔曰民寡惟慎厥事欽若先王成烈以休于前政聖人生知性與道合宜無待於思也而孟子謂聖人既竭心思焉繼之以不忍人之政然後仁覆於天下者盖天下之情萬端變動百出聖人欲總攝無遺永終必用故竭心思然後可也聖人竭心思而為之愚人肆愚見而改之天下之無仁政也乆矣立宗廟井田封建學校軍制宫室車旗冠服聘射燕飲養老喪塟服制祭祀皆仁政之大者也集為十有三篇以見帝王之法制大略具存若能引而伸之觸類而長之亦可以致大治人道曰聖人南面而治天下必自人道始矣立權度量考文章改正朔易服色殊徽號異器械别衣服此其所以得與民變革者也其不可得變革者則有矣親親也尊尊也長長也男女有别也上治祖禰尊尊也下治子孫親親也旁治昆弟合族之道也族人不得以其戚戚君位也君不與同姓同車與異姓同車不同服同姓從宗合族屬異姓主名治際會名著而男女有别别子為祖繼别為宗有百世不遷之宗宗其繼别子之所自出者謂宗其為始祖後者為大宗也大宗百世不遷者也宗其繼髙祖者五世則遷者也是故祖遷于上宗易于下宗其為曾祖之後者為曽祖宗宗其為祖後者為祖宗宗其為父後者為禰宗自髙祖宗至禰宗四宗為小宗四世而緦服之窮也五世袒免殺同姓也六世而親屬竭矣其庶姓别於上而戚單於下婚姻可以通乎繫之以姓而勿别綴之以食而弗殊雖百世而婚姻不通者周道然也適子庶子祇事宗子宗婦雖貴富不敢以貴富入宗子之家雖衆車徒舍於外以寡約入子弟猶歸器衣服衾裘車馬則必獻其上而後敢服用其次也若非所獻則不敢以入於宗子之門不敢以富貴加於父兄宗族若富則具二牲獻其贒者於宗子夫婦皆齊而敬宗焉終事而後私祭曾子問於孔子曰宗子為士庶子為大夫其祭也如之何孔子曰以上牲祭於宗子之家祝曰孝子某為介子某薦其常事若宗子有罪居於他國庶子為大夫其祭也祝曰孝子某使介子某執其常事攝主不厭祭不旅不假不綏祭不配布奠于賔賔奠而不舉不歸肉其辭于賔曰宗兄宗弟宗子在他國使某辭宗子去在他國庶子無爵而居者望墓為壇以時祭若宗子死告於墓而後祭於家宗子死稱名不言孝身没而已祭殤必厭盖弗成也祭成喪而無尸是殤之也殤有隂厭有陽厭宗子為殤而死庶子弗為後也其吉祭特牲祭殤不舉無肵俎無𤣥酒不告利成是為隂厭几殤與無後者祭於宗子之家當室之白尊于東房是謂陽厭庶子不祭祖者明其宗也庶子不為長子斬不繼祖與禰故也庶子不祭殤與無後者從子祔食庶子不祭禰者同其宗也有小宗而無大宗者有大宗而無小宗者有無宗亦莫與之宗者公子是也公子有宗道公子之家為士大夫之庶者宗其士大夫之適者公子之宗道也絶族無移服親者屬也自仁率親等而上之至于祖自義率祖順而下之至于禰是故人道親親也親親故尊祖尊祖故敬宗敬宗故収族収族故宗廟嚴宗廟嚴故重社稷重社稷故愛百姓愛百姓故刑罰中刑罰中故庶民安庶民安故財用足財用足故百志成百志成故禮俗刑禮俗刑然後樂井田曰先王之井田也井不易之田也城郭宫室塗巷溝洫不與焉夏后氏之田九州九等見天下之田有九等也而州一等者舉其多者也故田必以九等定周承二代以六尺為步步百為畆寸有長短尺有大小以中人之指為度則今之官尺可以為準也尺定則步定步定則畝定畝定則井定井定則四井為邑四邑為丘四丘為甸四甸為縣四縣為都一都之田一千二十四井百里之國均分為十都則不足為九都則有餘故有大都有小都因山川形勢之宜而制之也王畿方千里為方百里者百為夫家八百萬五家為比五比為閭四閭為族五族為黨五黨為州五州為鄉是四萬五千家為鄉也五家為鄰五鄰為里四里為鄼五鄼為鄙五鄙為縣五縣為遂是七萬五千家為六遂也近郊為鄉逺郊為遂王畿八百萬夫為鄉遂者六十猶有餘夫五千而曰六鄉六遂者百里為六鄉一鄉大夫治百里也百里為六遂一遂大夫治百里也與外公侯所治同也諸侯百里為夫家八萬雖百里六遂其為地也狹於王畿百倍其為夫家也少於王畿百倍矣當家之一夫一婦受田百畝夏后商周之百畝當秦四十一畝一百六十步餘夫二十五畝當秦十畝一百步餘夫為少壯未娶者已娶未成家者人受十畝一百步盖先王以百步為畝而秦以二百四十步也一井之田九百畝八夫耕之以百畝為公田當今五六口之家能耕古之百畝而已耕秦之百畝則力不給以古畝分田則易以秦分田則難盖古畝實収公田之穀粟而已秦畝則税之惟取公家之穀粟而已不問民之有山陵川澤之出與否也秦畝則賦之惟取公家之財具而已不問民有水旱蟲螟之災也是故古畝雖小而民得其所秦畝雖大而民不獲其所者衆矣今遵用先王之畝而井之井九百畝因其山川宜溝洫者溝洫之宜封樹者封樹之夫間有遂遂上有徑十夫有溝溝上有道百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路以達于畿田首廣二尺深二尺謂之遂九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮專達于川凡井邑皆有溝樹之限而都鄙有城郭溝池之固居者有定宅行者有定路善良得安姦宄可禁今日土田之欺弊爭訟皆絶矣法制一定壞之則難此其大畧也行之者可以類推焉也孟子曰百畝之糞上農夫食九人其次食八人其次食七人其次食六人下食五人言農有勤惰則得穀粟有多寡也封建曰先王之封建也計不易之田以為都畿以封諸侯畿田方千里公侯田方百里伯方七十里子男方五十里方者以数計為定制也不能五十里附於諸侯曰附庸若夫山陵林麓川澤之地則因田之所占以為疆界其長短廣狹不可懸定不可得而方也名山大澤天子自有之不以封諸侯也若田則必以數計周公封魯儉於百里太公封齊亦儉於百里此其正封錫之山川土田是也加賜附庸所以尊盛之耳附庸之君自有其田諸侯不得兼而有之也故顓臾為束䝉主在魯邦域之内至於末流而魯猶不敢奄為已有也先王之制嚴密如此而王制曰方百里者為田九十億山林陵麓川澤溝洫城郭宫室涂巷三分去一其餘六十億畝既曰方百里者為田九十億畝矣又曰去山陵林麓川澤溝洫城郭宫室塗巷其文脱疎自相牴牾秦滅先王之迹漢興儒者首為此言後世不復推究妄妄相承井田封建之制亂而不可尋矣故劉歆周官大司徒之職遂以為諸公侯伯子男之地封疆方五百里四百里三百里二百里其食者半三之一四之一而職方氏又曰以方五百里則四公方四百里則六侯方三百里則七伯方二百里則五十子方百里則百男前後乖異無復法制也削去漢儒妄言則公侯伯子男田土人民各有定數山林陵麓川澤各隨田以為封疆之界制國不過千乗都城不過百雉家富不過百乗五國以為屬屬有長十國以為連連有帥三十國以為率率有正二百一十國以為州州有伯天子賜之以弓矢然後得專征賜之以鈇鉞然後得專殺諸侯之於天子比年一小聘三年一大聘五年一朝此商制也與唐虞五載一巡狩羣后四朝之制同乎異乎曰不異如元年東方諸侯來朝二年南方諸侯來朝則東方諸侯來小聘是謂比年一小聘三年西方諸侯來朝則南方諸侯來小聘而東方諸侯來大聘是謂三年大聘四年北方諸侯來朝是謂羣后四朝是年也則西方諸侯來小聘而南方諸侯來大聘五年北方諸侯來小聘而西方諸侯來大聘六年二月天子乃東巡狩是謂五載一巡狩時則東方諸侯朝于岱宗之下是謂五年一朝是年也受北方諸侯大聘七年五月南巡狩則受東方諸侯小聘八年八月西巡狩則受南方諸侯小聘而受東方諸侯大聘九年十一月北巡狩則受西方諸侯小聘而受南方諸侯大聘十年則東方諸侯復來朝而北方諸侯來小聘十年西方諸侯來大聘周而復始天子無踰年不與四方諸侯接四方諸侯無踰年不禀命於天子此真帝王檢身修徳保大其業日新無弊之良法也故周制亦比年一小聘三年一大聘而六年五服一朝者周家禮文繁縟故朝與巡狩各展一年欲行之者無倦可長乆也曰然則周以十二歳而一巡狩之言非與曰非也周官曰六年五服一朝又六年王乃巡狩者猶曰前六年五服朝之年後六年王時巡狩之年爾讀者以詞害意不知簡易尋繹先王之制而劉歆周官遂生異說以為王之所撫諸侯者歳徧存三歳徧覜五歳徧省七歳屬象胥諭言語協辭命九歳屬瞽史諭書名聽聲音十有一歳達瑞節同度量成牢禮同數器修法則十有二歳王巡狩殷國欲推行則乖戾使先王之制亦不明于後世此學士大夫之罪也鄭氏謂三年一大聘五年一朝乃晉文霸時所致安得此無稽之言乎鄭氏於經無不通誦為之解釋然以臆斷者十七八其言封建之制所害尤大不得不辨也天子適諸侯曰巡狩諸侯朝於天子曰述職春省耕而補不足秋省斂而助不給入其疆土地辟田野治養老尊贒俊傑在位則有慶慶以地入其疆土地荒蕪遺老失贒掊克在位則有讓一不朝則貶其爵再不朝則削其地三不朝則六師移之諸侯有世子世其國者也夫人之首子為嫡子嫡子死則立母弟無母弟則立庶長無庶長則選於支庶之親且贒者入繼大宗皆因朝而與見之天子天子許之而誓之以事上君民之道然後定為世子其秩視天子之元士諸侯薨世子居喪諒隂三年政在命卿喪畢以士服入見天子曰類見言諡曰類天子以册命命之以宗廟賜之以袞冕之類而饗之始成為諸侯此繼世之諸侯也始封者論功徳定其爵等分之以田數天子立於太廟阼階之南南面大宗伯儐天子所封者北面史由天子之右執策命之再拜稽首受職再命受服三命受位四命受器五命賜則六命賜官七命賜國八命賜牧九命作伯大司徒命土方氏以土圭土其地而制其域小司徒立其宗廟社稷正其畿疆之封量人為之營城郭宫室市朝道巷門渠司險設五溝五涂而樹之林以為阻固而達其道路大宗伯作其瑞典正其儀辨其等司服正其服内史作册命副以命卿公侯之國三卿皆命於天子伯國二卿命於天子一卿命于其君子男之國二卿皆命於其君無送故迎新之勞無簿書縁絶之弊無胥吏專擅之姦上無苟且之政下無觀望之事上下之分辨而民志定貴貴尊尊化行天下城郭溝池周遍四垂以經理國家而姦宄强暴不得縱横以守衛中夏而蠻夷戎狄不得猖獗垣藩屏翰本固根深牢不可㧞此太昊神農黄帝堯舜禹湯文武聖聖相承竭其心思使諸華之人父子世世相保不為兵戈之所摧折者也自堯而上年不可知自堯而下二千餘年雖有衰亂而終未嘗大禍中國也自秦郡縣天下及今才千五百餘歳而戰爭大作中原蹂踐屠毒者至於再至於三矣而為國者猶未悟也嗚呼天乎悲夫論曰先儒以為王畿方千里積百同九百萬夫之地其言是也以為中有山林陵麓川澤溝瀆城郭宫室塗巷三分去一餘六百萬夫又以田不易一易再易相通定受田者三百萬家則非矣何以言之愚深攷封建之法王畿方千里者田方千里也公侯方百里者田方百里也方千里者為方百里者百為田百萬井九百萬夫之地受田者八百萬夫百倍公侯之國夫然後足以為天子都畿鎮撫天下也若受田者止於三百萬家則是方百里者三十七五十里者一爾安在其為方千里本根不强將何以應千八百國之求乎劉歆所言以為諸公之地封疆方五百里其食者半諸侯之地方四百里諸伯之地方三百里其食三之一諸子之地方二百里諸男之地方百里其食者四之一亦非矣按周制分土惟三未嘗有五等也先王以田制禄一夫一婦受田百畝上農夫食九人諸侯之下士視上農夫中士倍下士上士倍中士下大夫倍上士卿四大夫禄君十卿禄計口受田積而上之視其交際之廣狹裁其用度之多寡而受之也為公侯者田必百里不百里不足以事天子睦四隣親九族守宗廟定社稷伯必七十里子男必五十里不可多也不可寡也若鄭氏劉歆所言乃連山亘川不審田之定數茫然依約以為國者也夫田之肥磽四方不同故大禹有九等之别後世亦有十色之辨因其地之肥磽以定井之廣狹百里之田提封萬井是為定制豈有先定四封然後去山林陵麓川澤又始以不易一易再易定其夫家之數乎井田封國帝王之世萬事根本也若根本無法制則萬事將如之何又諸公封方五百里其食者半則是方百里者六十五十里者一矣以鄭氏所言王畿計之合六國諸侯已足與王為敵尾大不掉豈先王之良制哉嗚呼井田封國仁民之要法也唐太宗嘗慨然有復古之心惜其諸臣識不足以知三代之遺風也使太宗有其臣足以行之則唐世終無藩鎮跋扈簒弑之禍而术流終無卒徒扶立强鎮制命之事矣噫有國家者欲如三代保守中國以天年終必有以封國而後可皇王大紀卷二十二

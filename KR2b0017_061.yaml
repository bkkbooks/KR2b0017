body:
  text: 皇王大紀卷六十一宋胡宏撰三王紀敬王十一年魯侯宋之元年晉人以宋仲幾歸于京師成周城畢歸諸侯之戍魯叔孫不敢逆其君之喪于乾侯請見子家子子家子辭不敢使告之曰公衍公為實使羣臣不得事君若以君弟宋主社稷則羣臣之願也凡從君出而可以入者將惟子是聽子家氏未有後季孫願與子從政使不敢以告對曰若立君則有卿士大夫與守龜在羈弗敢知若從君者則貌而出者入可也寇而出者行可也若羈也則君知其出也而未知其入也羈將逃也喪及壞隤公子宋先入從公者皆自壞隤反夏六月癸亥喪至公子宋立季孫意如葬其君於墓道之南又將溝絶之榮駕鵝曰生不能事死又離之以自旌也乃止曽子問於孔子曰祭之如何則不行旅酬之事矣孔子曰聞之小祥者主人練祭而不旅奠酬于賔賔弗舉禮也昔者昭公練祭而舉酬行旅非禮也孝公大祥奠酬而弗舉亦非禮也魯大雩魯季孫意如以昭公出故禱于煬公至是立其宫論曰煬公伯禽之子考公之弟以弟而得國者也喪事即逺有進而無退宫廟即逺有毁而無立焬公至是十有九世矣是祧主也其不可立宫明甚所以立之者季氏以少子當魯國祭祀自專廢立自恣重賂足以結四鄰私恩足以收百姓所懼者神怒或降之罰而已故有禱於焬公而立宫也聖人筆之於經使後人考其世尋其由則季氏誣神之罪著而禮制不至於遂亂而惑人之聽矣八月魯隕霜殺菽孔仲尼在齊喜晏嬰曰善與人交久而敬之齊侯請置廪丘之邑於孔子以為養孔子辭謂弟子曰君子當功受賞吾言於齊君君未之有行而賜吾邑其不知丘亦甚矣齊侯曰若季氏則吾不能以季孟之間待之曰吾老矣不能用也孔子遂行反於魯命門弟子網羅天下得帝王典謨訓誥誓命之文剪截繁詞撮其機要斷自唐虞至於秦穆凡百篇是為書帝王隨時理物之軌範盡在是矣及吕政竊秦國蔑帝王之道焚毁經籍仲尼八世孫鮒鮒弟之子襄藏經籍於屋壁漢文求能治書者得濟南伏生勝所傳授裁二十餘篇景帝子魯王餘得科斗文字於孔子屋壁乃書及論語孝經也悉以還孔氏孝武時孔襄曽孫孔安國以伏生之書參考文義定其可知者為五十八篇科斗書廢已久且錯亂磨滅故餘篇弗復可知孝武以安國為博士詔之作傳遂傳至于今世人讀是書者以為經與史異道與事反故愚各繫其時庶人知經本史而作事本道而成不入於清净空寂之偏以承夫子之志云於是又得古詩三千篇其不近於禮義者刪之得存者三百十有一篇分為周南召南弼鄘衛王鄭齊魏唐陳秦鄶曹豳是為十五國風次之以小雅大雅周頌魯頌商頌人之性情盡在是矣雖經焚毁亡者六篇而已愚今各以繫其時使讀者易以考人情去就而知天命興亡之故也孔子謂門弟子曰小子何莫學夫詩詩可以興可以觀可以羣可以怨邇之事父逺之事君多識於鳥獸草木之名又曰誦詩三百授之以政不達使於四方不能專對雖多亦奚以為謂子鯉曰不學詩無以言又謂門弟子曰詩三百一言以蔽之曰思無邪詩書既成謂弟子曰加我數年五十以學易可以無大過矣易之為書也伏羲始畫卦夏后氏曰連山商人曰歸藏至周文王始繫爻下之詞孔子讀易韋編三絶然後克贊伏羲文王周公之義作上彖下彖上象下象文言上繫下繫說卦序卦雜卦十篇謂之十翼上彖彖曰大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乘六龍以御天乾道變化各正性命保合太和乃利貞首出庶物萬國咸寧彖曰至哉坤元萬物資生乃順承天坤厚載物德合無疆含𢎞光大品物咸亨牝馬地類行地無疆柔順利貞君子攸行先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶安貞之吉應地無疆論曰此彖文孔子之所作也孔子極言天地之道謂乾道變化則萬物各正性命坤順承天而萬物生焉是故雖一物之微無非天地合而後成其施者天也産者地也劉歆周禮曰以天産作隂德以中禮防之以地産作陽德以和樂防之是裂天地為二本而中和禮樂異道矣何可以為經與易書詩春秋比乎彖曰屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寧彖曰蒙山下有險險而止䝉䝉亨以亨行時中也匪我求童䝉童䝉求我志應也初筮吉以剛中也再三瀆瀆則不告瀆䝉也䝉以飬正聖功也彖曰需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利涉大川往有功也彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可長也利見大人尚中正也不利涉大川入于淵也彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣彖曰比吉也比輔也下順從也原筮元永貞無咎以剛中也不寧方來上下應也後夫凶其道窮也彖曰小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨密雲不雨尚往也自我西郊施未行也彖曰履柔履剛也說而應乎乾是以履虎尾不嘻人亨剛中正履帝位而不疚光明也彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外隂內健而外順內君子而外小人君子道長小人道消也彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下無邦也內隂而外陽內柔而外剛內小人而外君子小人道長君子道消也彖曰同人柔得位得中而應乎乾曰同人同人于野亨利涉大川乾行也文明以健中正而應君子正也惟君子為能通天下之志彖曰大有柔得尊位大中而上下應之曰大有其德剛健而文明應乎天而時行是以元亨彖曰謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也彖曰豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉彖曰隨剛來而下柔動而說隨大亨貞無咎而天下隨時隨時之義大矣哉彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也彖曰臨剛浸而長說而順剛中而應大亨以正天之道也至於八月有凶消不久也彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣彖曰頥中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下彖曰剝剝也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虛天行也彖曰復亨剛反動而以順行是以出入無疾朋來無咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎彖曰無妄剛自外來而為主於內動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往無妄之往何之矣天命不祐行矣哉彖曰大畜剛健篤實輝光日新其德剛上而尚賢能止健大正也不家食吉飬賢也利涉大川應乎天也彖曰頥貞吉飬正則吉也觀頥觀其所養也自求口食觀其自飬也天地養萬物聖人飬賢以及萬民頥之時大矣哉彖曰大過大者過也棟撓本末弱也剛過而中巽而說行利有攸往乃亨大過之時大矣哉彖曰習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉彖曰離麗也日月麗乎天百榖草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也下彖彖曰咸感也柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣彖曰恆久也剛上而柔下雷風相與巽而動剛柔皆應恆恆亨無咎利貞久於其道也天地之道恆久而不已也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恆而天地萬物之情可見矣豕曰遁亨遁而亨也剛當位而應與時行也小利貞浸而長也遁之時義大矣哉彖曰大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣彖曰晋進也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也彖曰明入地中明夷內文明而外柔順以䝉大難文王以之利艱貞晦其明也內難而能正其志箕子以之彖曰家人女正位乎內男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣彖曰睽火動而上澤動而下二女同居其志不同行說而麗乎明柔進而上行得中而應乎剛是以小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事順也睽之時用大矣哉彖曰蹇難也險在前也見險而能止知矣哉蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉彖曰解險以動動而免乎險解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也天地解而雷雨作雷雨作而百榖草木皆甲拆解之時大矣哉彖曰損損下益上其道上行損而有孚元吉無咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虛與時偕行彖曰益損上益下民說無疆自上下下其道大光利有攸往中正有慶利涉大川木道乃行益動而巽日進無疆天施地生其益無方凡益之道與時偕行彖曰夬决也剛决柔也健而說决而和揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也彖曰姤遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉彖曰萃聚也順以說剛中而應故聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣彖曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也彖曰困剛掩也險以說困而不失其所亨其唯君子乎貞大人吉以剛中也有言不信尚口乃窮也彖曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也彖曰革水火相息二女同居其志不相得曰革已日乃孚革而信之文明以說大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉彖曰鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢巽而耳目聰明柔進而上行得中而應乎剛是以元亨彖曰震亨震來虩虩恐致福也笑言啞啞後有則也震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也彖曰艮止也時止則止時行則行動靜不失其時其道光明艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也彖曰漸之進也女歸吉也進得位往有功也進以正可以正邦也其位剛得中也止而巽動不窮也彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也說以動所歸妹也征凶位不當也無攸利柔乘剛也彖曰豐大也明以動故豐王假之尚大也勿憂宜日中宜照天下也日中則昃月盈則食天地盈虛與時消息而况於人乎况於鬼神乎彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉彖曰重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人彖曰兊說也剛中而柔外說以利貞是以順乎天而應乎人說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉彖曰渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川乘木有功也彖曰節亨剛柔分而剛得中苦節不可貞其道窮也說以行險當位以節中正以通天地節而四時成節以制度不傷財不害民彖曰中孚柔在內而剛得中說而巽孚乃化邦也豚魚吉信及豚魚也利涉大川乘木舟虛也中孚以利貞乃應乎天也彖曰小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也彖曰既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也彖曰未濟亨柔得中也小狐汔濟未出中也濡其尾無攸利不續終也雖不當位剛柔應也上象象曰天行健君子以自强不息潜龍勿用陽在下也見龍在田德施普也終日乾乾反復道也或躍在淵進無咎也飛龍在天大人造也亢龍有悔盈不可久也用九天德不可為首也象曰地勢坤君子以厚德載物履霜堅氷隂始凝也馴致其道至堅冰也六二之動直以方也不習無不利地道光也含章可貞以時發也或從王事知光大也括囊無咎慎不害也黃裳元吉文在中也龍戰於野其道窮也用六永貞以大終也象曰雲雷屯君子以經綸雖盤桓志行正也以貴下賤大得民也六二之難乘剛也十年乃字反常也即鹿無虞以從禽也君子舍之往吝窮也求而往明也屯其膏施未光也泣血漣如何可長也象曰山下出泉䝉君子以果行育德利用刑人以正法也子克家剛柔接也勿用取女行不順也困䝉之吝獨逺實也童䝉之吉順以巽也利用禦冠上下順也象曰雲上於天需君子以飲食宴樂需于郊不犯難行也利用恆無咎未失常也需于沙衍在中也雖小有言以吉終也需于泥災在外也自我致寇敬慎不敗也需于血順以聽也酒食貞吉以中正也不速之客來敬之終吉雖不當位未大失也象曰天與水違行訟君子以作事謀始不永所事訟不可長也雖小有言其辨明也不克訟歸逋竄也自下訟上患至掇也食舊德從上吉也復即命渝安貞不失也訟元吉以中正也以訟受服亦不足敬也象曰地中有水師君子以容民畜衆師出以律失律凶也在師中吉承天寵也王三錫命懷萬邦也師或輿尸大無功也左次無咎未失常也長子帥師以中行也弟子輿尸使不當也大君有命以正功也小人勿用必亂邦也象曰地上有水比先王以建萬國親諸侯比之初六有它吉也比之自內不自失也比之匪人不亦傷乎外比於賢以從上也顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也比之無首無所終也象曰風行天上小畜君子以懿文德復自道其義吉也牽復在中亦不自失也夫妻反目不能正室也有孚惕出上合志也有孚攣如不獨富也既雨既處德積載也君子征凶有所疑也象曰上天下澤履君子以辨上下定民志素履之往獨行願也幽人貞吉中不自亂也眇能視不足以有明也跛能履不足以與行也嘻人之凶位不當也武人為于大君志剛也訴訴終吉志行也夬履貞厲位正當也元吉在上大有慶也象曰天地交泰后以財成天地之道輔相天地之宜以左右民拔茅征吉志在外也包荒得尚于中行以光大也無往不復天地際也翩翩不富皆失實也不戒以孚中心願也以祉元吉中以行願也城復于隍其命亂也象曰天地不交否君子以險德辟難不可榮以祿拔茅貞吉志在君也大人否亨不亂羣也包羞位不當也有命無咎志行也大人之吉位正當也否終則傾何可長也象曰天與火同人君子以類族辨物出門同人又誰咎也同人于宗吝道也伏戎于莽敵剛也三嵗不興安行也乘其墉義弗克也其吉則困而反則也同人之先以中直也大師相遇言相克也同人于郊志未得也象曰火在天上大有君子以遏惡揚善順天休命大有初九無交害也大車以載積中不敗也公用亨于天子小人害也匪其彭無咎明辨晢也厥孚交如信以發志也威如之吉易而無備也大有上吉自天祐也象曰地中有山謙君子以裒多益寡稱物平施謙謙君子卑以自牧也鳴謙貞吉中心得也勞謙君子萬民服也無不利撝謙不違則也利用侵伐征不服也鳴謙志未得也可用行師征邑國也象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考初六鳴豫志窮凶也不終日貞吉以中正也盱豫有悔位不當也由豫大有得志大行也六五貞疾乘剛也恆不死中未亡也𡨕豫在上何可長也象曰澤中有雷隨君子以嚮晦入宴息官有渝從正吉也出門交有功不失也係小子弗兼與也係丈夫志舍下也隨有獲其義凶也有孚在道明功也孚于嘉吉位正中也拘繫之上窮也象曰山下有風蠱君子以振民育德幹父之蠱意承考也幹母之蠱得中道也幹父之蠱終無咎也裕父之蠱往未得也幹父用裕承以德也不事王侯志可則也象曰澤上有地臨君子以教思無窮容保民無疆咸臨貞吉志行正也咸臨吉無不利未順命也甘臨位不當也既憂之咎不長也至臨無咎位當也大君之宜行中之謂也敦臨之吉志在內也象曰風行地上觀先王以省方觀民設教初六童觀小人道也窺觀女貞亦可醜也觀我生進退未失道也觀國之光尚賔也觀我生觀民也觀其生志未平也象曰雷電噬嗑先王以明罰飭法屨校滅趾不行也噬膚滅鼻乘剛也遇毒位不當也利艱貞吉未光也貞厲無咎得當也何校滅耳聰不明也象曰山下有火賁君子以明庶政無敢折獄舍車而徒義弗乘也賁其須與上興也永貞之吉終莫之陵也六四當位疑也匪寇婚媾終無尤也六五之吉有喜也白賁無咎上得志也象曰山附於地剝上以厚下安宅剝牀以足以滅下也剝牀以辨未有與也剝之無咎失上下也剝牀以膚切近災也以官人寵終無尤也君子得輿民所載也小人剝廬終不可用也象曰雷在地中復先王以至日閉關商旅不行后不省方不逺之復以修身也休復之吉以下仁也頻復之厲義無咎也中行獨復以從道也敦復無悔中以自考也迷復之凶反君道也象曰天下雷行物與無妄先王以茂對時育萬物無妄之往得志也不耕穫未富也行人得牛邑人災也可貞無咎固有之也無妄之藥不可試也無妄之行窮之災也象曰天在山中大畜君子以多識前言往行以畜其德有厲利己不犯災也輿說輹中無尤也利有攸往上合志也六四元吉有喜也六五之吉有慶也何天之衢道大行也象曰山下有雷頤君子以慎言語節飲食觀我朵頤亦不足貴也六二征凶行失類也十年勿用道大悖也顛頤之吉上施光也居貞之吉順以從上也由頤厲吉大有慶也象曰澤滅木大過君子以獨立不懼遁世無悶藉用白茅柔在下也老夫女妻過以相與也棟橈之凶不可以有輔也棟隆之吉不橈乎下也枯楊生華何可久也老婦士夫亦可醜也過涉之凶不可咎也象曰水洊至習坎君子以常德行習教事習坎入坎失道凶也求小得未出中也來之坎坎終無功也樽酒簋二剛柔際也坎不盈中未大也上六失道凶三歲也象曰明兩作離大人以繼明照于四方履錯之敬以辟咎也黃離元吉得中道也日昃之離何可久也突如其來如無所容也六五之吉離王公也王用出征以正邦也皇王大紀卷六十一

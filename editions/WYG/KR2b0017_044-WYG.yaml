body:
  text: 皇王大紀卷四十四宋胡宏撰三王紀襄王二十四年楚鬬章請平于晉晉陽處父報之晉楚始通二月己丑鄭伯捷薨諡曰文公子蘭嗣狄有亂衛人侵狄狄請平焉衛人許之冬十月己卯晉侯重耳薨諡曰文公子讙嗣衛侯不朝于晉使孔達侵鄭伐緜訾及匡把子使告于秦曰鄭人使我掌其北門之管若潛師以来國可得也蹇叔曰勞師以襲逺非所聞也師勞力竭逺主備之無乃不可乎師之所為鄭必知之勤而無所必有悖心公不聽召百里孟明視西乞術白乙丙帥師而東蹇叔哭之曰晉人禦師必於殽殽有二陵必死是間經曰三十有二年春王正月夏四月己丑鄭伯捷卒衛人侵狄秋衛人及狄盟按左氏狄有亂衛人侵狄狄請平焉衛人及狄盟其不地者盟于狄也再書衛人而稱及者所以罪衛也盟㑹中國諸侯之禮衰世之事已非春秋之所貴况與戎狄為交即其廬帳而刑牲㰱血以要之哉冬十有二月己卯晉侯重耳卒按左氏載秦伯納晉文公及殺懷公于髙梁其事甚詳而春秋不書者以為不告也徐邈曰諸侯有朝聘之禮赴告之命所以敦交好通憂虞若鄰國相望而情志否隔存亡禍福不以相關則他國之史無由得書魯政雖陵典刑猶在史䇿所録不失常法其文足証仲尼修之事仍本史有可損而不可益也二十五年甲午秦師過周北門左右免胄而下超乗者三百乗王孫滿觀之曰秦師輕而無禮入險必敗及滑鄭商人弦髙將市於周遇之以乗韋先牛十二犒師曰寡君聞吾子將步師出於敝邑敢犒從者不腆敝邑為從者之淹居則備一日之積行則備一夕之衛且使遽告于鄭鄭伯使視客館則束載厲兵秣馬矣使皇武子辭焉曰吾子淹久於敝邑唯是脯資餼牽竭矣為吾子之將行也鄭之有原圃猶秦之有具囿也吾子取其麋鹿以間敝邑若何把子奔齊逢孫楊孫奔宋百里孟明曰鄭有備矣不可冀也滅滑而還齊大夫國莊子歸父聘於魯先軫言於晉侯曰秦違蹇叔而以貪勤民天奉我也奉不可失敵不可縱縱敵患生違天不祥欒枝曰未報秦施而伐其師其為死君乎軫曰秦不哀吾喪而伐吾同姓秦則無禮何施之為一日縱敵數世之患也謀及子孫可謂死君乎遂發命遽興姜戎子墨衰經二月辛巳敗秦師于殽獲三帥以歸癸巳遂墨以葬文公文嬴請三帥晉侯歸之先軫朝問秦囚公曰舍之矣軫怒曰武夫力而拘諸原婦人暫而免諸國隳軍實而長寇讐亡無日矣公使追之及諸河則在舟中矣秦伯素服郊次鄉師而哭曰孤違蹇叔以辱二三子孤之罪也初百里奚相秦有大功請老秦伯使為五羖大夫終其身視其子也秦伯曰吾不以一眚掩大徳復使孟明為政作秦誓秦誓公曰嗟我士聽無譁予誓告汝羣言之首古人有言曰民訖自若是多盤責人斯無難惟受責俾如流是惟艱哉我心之憂日月逾邁若弗云來惟古之謀人則曰未就予忌惟今之謀人姑將以為親雖則云然尚猷詢兹黄髮則罔所愆番番良士旅力既愆我尚有之仡仡勇夫射御不違我尚不欲惟截截善諞言俾君子易辭我皇多有之昧昧我思之如有一个臣斷斷猗無他技其心休休焉其如有容人之有技若已有之人之彦聖其心好之不啻如自其口出寔能容之以能保我子孫黎民亦職有利哉人之有技媢疾以惡之人之彦聖而違之俾不通寔不能容以不能保我子孫黎民亦曰殆哉邦之杌隉曰由一人邦之榮懷亦尚一人之慶狄侵齊魯侯伐邾晉侯伐狄于箕郤缺獲白狄子先軫入狄師死焉曰吾自討也晉侯命其子且居將中軍初胥臣過冀見郤缺耨其妻饁之敬相待如賔與之歸言諸文公曰敬徳之聚也能敬必徳德以治民君請用之公曰其父芮誅對曰康誥曰父不慈子不祗兄不友弟不恭不相及也以為大夫反自箕以一命命缺為卿復與之冀亦未有軍行八月魯侯朝於齊且弔有狄師十月乙巳魯侯申薨諡曰僖公子興嗣隕霜不殺草李梅實晉陳鄭伐許討其貳於楚也經曰三十有三年春王二月秦人入滑齊侯使國歸父来聘夏四月辛巳晉人及姜戎敗秦于殽按書序秦穆公伐鄭晉襄公帥師敗諸殽而經書晉人敗秦于殽是皆仲尼親筆其詞何以異乎書序專取穆公悔過自誓之言止於勸善其詞恕春秋備書秦晉無道用兵之失兼於懲惡其法􅃊此所以異也晉襄親將絀不稱君者俯逼葬期忘親背惠墨衰絰而即戎其惡甚矣視秦猶狄其罪云何客人之館而謀其主因人之信己而逞其詐利人之危而襲其國越人之境而不哀其䘮叛盟失信以貪勤民而棄其師狄道也夫杞子先軫之謀偷見一時之利徼倖其成自以為功者也二君皆過聽焉而貪其利是使為人臣者懷利以事其君為人子者懷利以事其父君臣父子去仁義懷利以相與利之所在則從之矣何有於君父故一失則夷狄再失則禽獸而大倫滅矣春秋人晉子而狄秦所以立人道存天理也癸巳葬晉文公狄侵齊公伐邾取訾婁秋公遂帥師伐邾按左氏公伐邾取訾婁報升陘之役邾人不設備襄仲復伐之此皆不勝忿欲報怨貪得恃強陵弱不義之兵也盖書其事而罪自見矣或曰取湏句訾婁有為為之也伐邾至于再三念母勤矣大念母者必當止乎禮義平王不撫其民而逺屯戍于母家詩人刺之夫子録焉僖公以成風之有功于己也越禮以尊其身違義以報其怨殘民動衆取人之邑曽是以為可乎晉人敗狄于箕冬十月公如齊十有二月公至自齊乙巳公薨于小寢左氏曰即安也周制王官六寢路寢一小寢五君日出而眂朝退適路寢聽政使人眡大夫退然後適小寢釋服是路寢治事之所也而小寢燕息之地也公羊以西宫為小寢魯子以諸侯有三宫則列國之制盖降於王其以路寢為正則一爾君終不於路寢則非正矣曽子曰吾得正而斃又何求哉古人貴於得正乃如此凡此直書而義自見矣隕霜不殺草李梅實哀公問於仲尼曰春秋記隕霜不殺草何為記之也曰此言可殺也大宜殺而不殺則李梅冬實天失其道草木猶干犯之而况君乎是故以天道言四時失其序則其施必悖無以統萬象矣以君道言五刑失其用則其權必喪無以服萬民矣哀公欲去三桓張公室問社於宰我宰我對以使民戰栗盖勸之斷也仲尼則曰成事不説既往不咎其自與哀公言乃以為可殺何也在聖人則能處變而不失其常在賢者必有小貞吉大貞凶之戒矣其論隕霜殺草則李梅冬實盖除惡於微慮患於早之意也晉人陳人鄭人伐許二十六年冬十二月癸亥日有食之春二月王使叔服㑹魯葬其君僖公又使毛伯衛賜魯侯命晉侯既祥使告于諸侯伐衛及南陽先且居曰效尤禍也請君朝王臣從師晉侯朝王于温先且居伐衛圍戚取之魯叔孫得臣来拜錫命衛人使告于陳陳侯曰更伐之我辭之衛孔逹帥師伐晉晉侯疆戚田魯公孫敖㑹之初楚王將以商臣為太子訪諸令尹子上對曰君之齒未也而又多愛黜乃亂也楚國之舉恒在少者且是人也蠭目而豺聲忍人也不可立也弗聽既又欲立王子職而黜太子商臣聞之而未察告其師潘崇崇曰享江􅇗而勿敬也從之江芉怒曰呼役夫宜君王之欲殺汝而立職也崇曰能事諸乎曰不能能行乎曰不能能大事乎曰能八月丁未以宫甲圍王王請食熊蹯而死弗聽乃縊諡曰成王商臣立以其為太子之室與潘崇使為太師且掌環列之尹魯公孫敖聘于齊凡君即位卿出竝聘踐脩舊好要結外援好事鄰國以衛社稷忠信卑譲之道也忠徳之正也信德之固也卑譲徳之基也經曰元年春王正月公即位即位者告廟臨羣臣也國君嗣世定於初䘮必逾年然後改元書即位者緣始終之義一年不二君縁民臣之心不可曠年無君按書載舜禹受終傳位之事在舜則曰月正元日格于文祖在禹則曰正月朔旦受命于神宗率百官若帝之初夫于文祖神宗則告廟也率百官若帝之初則臨羣臣也自古通喪三年其以凶服則不可入宗廟其以吉服則斬焉在衰絰之中不可既成而又易之也如之何而可子張問于孔子髙宗諒隂三年不言何謂也子曰何必髙宗古之人皆然君薨百官總己以聽于冢宰三年則告廟臨羣臣固有攝行之禮矣按商書稱太甲元年伊尹祠于先王則攝而告廟之證也百官總己以聽冡宰則攝而臨羣臣之證也其曰祗見厥祖者言伊尹以奉嗣王之事祗見太甲之祖也至三祀十有二月伊尹以冕服奉嗣王則免䘮從吉之證也然顧命康誥記成王之崩其君臣皆冕服何也當是時成王方崩就殯猶未成服故用麻冕黼裳入受顧命已受命誥諸侯而後釋冕反喪服者於是成服而宅憂也或以為康王釋服離次而即吉則誤矣二月癸亥日有食之天王使叔服來㑹葬凡薨卒葬人道始終之大變也不以得禮為常事而不書其或失禮而害于王法之甚者聖人則有削而不存以示義者矣夏四月丁巳葬我君僖公天王使毛伯來錫公命諸侯終䘮入見則有錫嵗時來朝則有錫能敵王所愾則有錫黻冕圭璧因其終䘮入見而錫之者也禮所謂䘮畢以士服見天子已見賜之黻冕圭璧然後歸是已車馬衮黻因其嵗時來朝而錫之者也詩所謂君子來朝何錫予之路車乗馬又何予之𤣥衮及黼是已彤弓玈矢因其敵氣獻功而錫之者也詩所謂彤弓弨兮受言藏之我有嘉賔中心貺之鐘鼔既設一朝享之是已今文公􅁇世䘮制未畢非初見􅁇朝而獻功也何為來錫命乎故穀梁子曰禮有受命無來錫命來錫命非正也晉侯伐衛叔孫得臣如京師衛人伐晉秋公孫敖㑹晉侯於戚冬十月丁未楚世子商臣弑其君頵書世子弑君者有父之親有君之尊而至於弑逆此天理大變人情所深駭春秋詳書其事欲以起問者察所由示懲誡也唐世子𢎞受左氏春秋至此廢書嘆曰經籍聖人垂訓何書此也郭瑜對曰春秋義存褒貶以善惡為勸誡故商臣十載而惡名不滅𢎞曰非惟口不可道故亦耳不忍聞願受他書瑜請詣禮世子從之嗚呼聖人大訓不明于後世皆腐儒學經不知其義者之罪耳其亂臣賊子雖䧟穽在前斧鉞加于頸而不避顧謂身後惡名足以像其邪志而懲於為惡豈不謬哉持此曉人可謂茅塞其心意矣若語之曰為人君父而不通於春秋之義者必䝉首惡之名為人臣子而不通於春秋之義者必陷簒弑誅死之罪聖人書此者使天下後世察於天倫知所以為君臣父子之道而免于首惡之名誅死之罪也則世子𢎞而聞此必將􅋏然畏懼知春秋之不可不學矣學於春秋必明臣子之義不至於奏請拂㫖而見酖矣傳者案也經者斷也考於傳之所載可以見其所由致之漸豈隠乎嫡妾必正而楚子多愛立子必長而楚國之舉常在少者養世子不可不慎也而以潘崇為之師侍膳問安世子職也而多置宫甲䧏而不憾憾而能昣者鮮矣乃欲黜兄而立其弟謀及婦人宜其敗也而使江芊知其情是以不仁處其身而以不孝處其子也其及宜矣楚頵僣王憑陵中國戰勝諸侯毒被天下然昧於君臣父子之道禍發蕭牆而不之覺也不善之積豈可揜哉君不君則臣不臣父不父則子不子春秋書世子弑其君者推本所由而著其首惡為萬世之大戒也然則商臣無貶矣曰弑父與君之賊其惡猶待于貶而後著乎公孫敖如齊二十七年秦孟明帥師伐晉晉侯禦之箕之役狼瞫為右先軫黜之其友曰盍死之瞫曰吾未獲死所死而不義非勇也吾以勇求右無勇而黜亦其所也子姑待之冬十二月甲子秦晉戰于彭衙狼瞫以其屬馳秦師死焉晉師從之秦師敗績孟明歸増修國政重施於民晉趙衰言於諸大夫曰秦師又至將必辟之懼而增德不可當也丁丑魯始作僖公主晉人討于魯以其不朝也魯侯如晉春正月乙巳晉人使大夫陽處父盟魯侯而耻之夏四月宋公陳侯鄭伯晉士縠魯公孫敖㑹盟于垂隴謀討衛也陳侯為衛請成於晉執孔達以説晉魯不雨自去年十月至於五月六月丁卯魯禘于太廟躋公夏父弗忌為宗伯曰先大後小順也躋聖賢明也有司曰宗廟之有昭穆以次世之長幼而等胄之親疏也自𤣥王及主癸莫若湯自稷及王季莫若文武商周之廟未嘗躋湯與文武也弗忌不聽君子以為失禮禮無不順祀國之大事也而逆之可乎子雖齊聖不先父食久矣故禹不先鯀湯不先契文武不先不窋詩曰皇皇后帝皇祖后稷謂后稷親而先帝也問我諸姑遂及伯姊謂姊親而先姑也展禽曰犯順以逆不祥莫大焉展禽為士師三黜人曰子未可以去乎曰直道而事人焉往而不三黜枉道而事人何必去父母之邦季孫行父欲尊美僖公請命于周而史克作頌焉駉頌僖公能遵伯禽之法儉以足用寛以愛民務農重榖牧於坰野駉駉牡馬在坰之野駉駉良馬腹幹肥張也坰逺郊也邑外曰郊郊外曰野野外曰林林外曰坰薄言駉者有驈有皇有驪有黄以車彭彭牧之坰野則駉駉然驪馬白跨曰驈黄白曰皇純黒曰驪黄騂曰黄諸侯六閑馬四種有良馬有戎馬有田馬有駑馬彭彭有力有容也思無疆思馬斯臧駉駉牡馬在坰之野薄言駉者有騅有駓有騂有騏以車伾伾蒼白雜毛曰騅黄白雜毛曰駓赤黄曰騂蒼騏曰騏伾伾有力也思無期思馬斯才才多材也駉駉牡馬在坰之野薄言駉者有驒有駱有駵有雒以車繹繹青驪驎曰驒白馬黒鬛曰駱赤身黒鬛曰駵黒身白鬛曰雒繹繹善走也思無斁思馬斯作作始也駉駉牡馬在坰之野薄言駉者有駰有騢有驔有魚以車袪祛隂白雜毛曰駰彤白雜毛曰騢豪骭曰驔二目白曰魚袪袪彊徤也思無邪思馬斯徂有駜三章章九句頌僖公君臣之有道也有駜有駜駜彼乗黄駜馬肥彊貌馬肥彊則能升髙進逺臣彊力則能安國夙夜在公在公明明振振鷺鷺于下鼓咽咽醉言舞于胥樂兮振振羣飛貌鷺白鳥也以興潔白之士咽咽鼔節也有駜有駜駜彼乘牡夙夜在公在公飲酒言臣有餘敬而君有餘恵振振鷺鷺于飛鼓咽咽醉言歸于胥樂兮有駜有駜駜彼乗駽青驪曰駽夙夜在公在公載燕自今以始嵗其有君子有榖貽孫子于胥樂兮嵗其有豐年也泮水八章章八句頌僖公能修泮宫也思樂泮水薄采其芹泮水泮宫之水也天子辟廱諸侯泮宫言水則采取其芹宫則采取其化魯侯戾止言觀其旂其旂茷茷鸞聲噦噦無小無大從公于邁戻來止至也言觀其旂言法則其文章也茷茷言有法度也噦噦言有聲也思樂泮水薄采其藻魯侯戻止其馬蹻蹻其馬蹻蹻其音昭昭其馬蹻蹻言彊盛也載色載笑匪怒伊教色温潤也思樂泮水薄采其茆茆鳧葵也魯侯戻止在泮飲酒既飲㫖酒永錫難老順彼長道屈此羣醜屈收醜衆也穆穆魯侯敬明其徳敬慎威儀維民之則允文允武昭假烈祖靡有不孝自求伊祜明明魯侯克明其徳既作泮宫淮夷攸服矯矯虎臣在泮獻馘淑問如臯陶在泮獻囚囚拘也濟濟多士克廣徳心桓桓于征狄彼東南桓桓威武貌烝烝皇皇不吳不揚不告于酗在泮獻功烝烝厚也皇皇美也揚傷也角弓其觩束矢其搜戎車孔博徒御無斁既克淮夷孔淑不逆觩弛貌五十矢為束搜衆意也式固爾猶淮夷卒獲翩彼飛鴞集于泮林食我桑黮懐我好音翩飛貌鴞惡聲之鳥也黮桑實也憬彼淮夷来獻其琛元龜象齒大賂南金憬逺行貌琛寳也元龜尺二寸賂遺也南謂荆揚也閟宫八章二章章十七句一章十二句一章三十八句二章章八句二章章十句頌僖公能復周公之宇也閟宫有侐實實枚枚閟閉也先妣姜嫄之廟在周常閉而無事孟仲子曰是禖宫也侐清淨也實實廣大也枚枚礱宻也是生后稷降之百福黍稷重穋稙穉菽麥奄有下國俾民稼穡先種曰植後種曰穉有稷有黍有稻有秬奄有下土纘禹之緒緒業也后稷之孫實維太王居岐之陽實始翦商翦齊也至于文武纉太王之緒致天之届于牧之野無貳無虞上帝臨女虞誤也敦商之旅克咸厥功王曰叔父建爾元子俾侯于魯大啓爾宇為周室輔王成王也元首宇居也乃命魯公俾侯于東錫之山川土田附庸周公之孫莊公之子龍旂承祀六轡耳耳春秋匪解享祀不忒周公之孫莊公之子謂僖公也耳耳然至盛也皇皇后帝皇祖后稷享以騂犧是饗是宜降福既多騂赤犧純也周公皇祖亦其福女秋而載嘗夏而楅衡白牡騂剛犧尊將將毛炰胾羮籩豆大房萬舞洋洋孝孫有慶諸侯夏禘則不礿秋祫則不嘗惟天子兼之楅衡設牛角以楅之也白牡周公牲也騂剛魯公牲也犧尊有沙飾也毛炰豚也胾肉也羮大羮鉶羮也大房半體之爼也羊洋衆多也俾爾熾而昌俾爾夀而臧保彼東方魯邦是常不虧不崩不震不騰三夀作朋如岡如陵公車千乗朱英緑縢二矛重弓大國之賦千乗朱英矛飾也縢繩也重弓重於鬯中也公徒三萬貝胄朱綅烝徒增增貝胄貝飾也朱綅以朱綅綴之増增衆也戎狄是膺荆舒是懲則莫我敢承膺當承止也俾爾昌而熾俾爾夀而富黄髪台背壽胥與試俾爾昌而大俾爾耆而艾萬有千歳眉壽無有害泰山巖巖魯邦所詹奄有龜䝉遂荒大東至于海邦淮夷来同莫不率從魯侯之功詹至也龜山也䝉山也荒有也保有鳬繹遂荒徐宅至于海邦淮夷蠻貊及彼南夷莫不率從莫敢不諾魯侯是若鳬山也繹山也宅猶居也淮夷蠻貊而夷行也南夷荆楚也若順也天錫公純嘏眉壽保魯居常與許復周公之宇常許魯南鄙西鄙魯侯燕喜令妻壽母冝太夫庶士邦國是有既多受祉黄髪兒齒徂來之松新甫之栢是斷是度是㝷是尺徂来山也新甫山也八尺曰尋松桷有舄路寢孔碩新廟奕奕奚斯所作桷榱也舄大貌路寢正寢也新廟閔公廟也有大夫公子奚斯者作是廟也孔曼且碩萬民是若經曰春王二月甲子晉侯及秦師戰于彭衙秦師敗績戰而言及者主乎是戰者也夫敵加於己不得已而起者謂之應兵争恨小故不忍忿怒者謂之忿兵按左氏秦孟明帥師伐晉報殽之役此所謂忿兵疑罪之在秦也而以晉侯主之何哉處已息爭之道逺怨之方也然則敵加於己縱其侵暴將不得應乎曰敵加於己而已有罪焉引咎責躬服其罪則可矣已則無罪而不義見加諭之以辭命猶不得免焉亦告于天子方伯可也若遽然興師而與戰是謂以桀攻桀何愈乎故以晉侯為土者處已息争之道寡怨之方王者之事也丁丑作僖公主作主者造木主也既葬而反虞虞主用桑期年而練祭練主用栗者藏主也何以書僖公薨至是十有五月然後作主慢而不敬甚矣夫慢而不敬積惡之原也以為無傷而不去至於惡積而不可揜所以謹之也三月乙巳及晉處父盟及處父盟者公也其不地於晉也諱不書公者抑大夫之伉不使與公為敵正君臣之分也適晉不書反國不致為公諱耻存臣子之禮也凡此類筆削魯史之舊文衆矣夏六月公孫敖㑹宋公陳侯鄭伯晉士縠盟于垂隴自十有二月不雨至於秋七月書不雨至于秋七月而不曰至于秋七月不雨者蓋後言不雨則是冀雨之詞非文公之意也夫書不雨至于秋七月而止即八月嘗雨矣然而不書八月雨者見文公之無意於雨不以民事繋憂樂也其怠於政事可知而魯衰自此始矣八月丁卯大事于大廟躋僖公有事者時祭大事祫也合羣廟之主食於大廟升僖於閔之上也閔僖二公親則兄弟分則君臣以為逆祀者兄弟之不先君臣禮也君子不以親親害尊尊故左氏則曰祀國之大事而逆之可乎子祖雖齊聖不先父食久矣公羊則曰其逆祀先禰而後也穀梁則曰逆祀則是無昭穆也無昭穆則是無祖也閔僖非祖禰而為之祖禰者何臣子一例也夫有天下者事七世諸侯五世説禮者世指父子非兄弟也然三傳同以閔公為祖而臣子一例是以僖公父視閔公為禮而父死子繼兄亡弟及名號雖不同其為世一矣冬晉人宋人陳人鄭人伐秦按左氏四國伐秦報彭衙之役則皆國卿也其貶而稱人者晉人再勝秦師在常情亦可以已矣而復興此役結怨勤民是全不務徳専欲力争而報復之無已也以致濟河焚舟之師故特貶而稱人公子遂如齊納幣婚姻常事不書其書納幣者喪未終而圖婚也夫娶在三年之外矣則何譏乎春秋論事莫重乎志志敬而節其與之知禮志和而音雅與之知樂志哀而居約與之知喪非虚加之也重志之謂也此皆使人私欲不行閑邪復禮之意二十八年冬十一月晉人宋人魯叔孫莊叔得臣陳人衛人鄭人伐沈以其服於楚也沈潰三月王子虎薨諡曰文公秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還楚息公子朱圍江秋雨螽于宋晉人悔其無禮於魯也請改盟魯侯如晉冬十月己巳晉侯及魯侯盟晉陽處父帥師伐楚以救江門于方城遇子朱而還經曰三年春王正月叔孫得臣㑹晉人宋人陳人衛人鄭人伐沈沈潰沈潰民迯其上五國皆稱人將非命卿也沈在汝南平與縣北未嘗與中國㑹盟而南服於楚師入其境而民人迯散雖非義舉此比於報復私怨之兵則有間矣故其辭無褒貶凡此類欲示後世用師者知權而本之以正也夏五月王子虎卒王子虎不書爵譏之也天子内臣無外交或曰禮稱情而為之節者也叔服新使乎我則冝有恩禮矣仲尼脱驂於舊館雖卒叔服可也夫脱驂於舊館惡夫涕之無從而為之者非禮之經也天子内官無外交而以新使乎我致恩禮焉是以私情害公義矣輕重之權失矣秦人伐晉按左氏秦伯稱人何也聖人作易以懲忿窒慾為損卦之象其辭曰損徳之修春秋諸侯之知徳者鮮矣穆公初聽把子之請違蹇叔之言其名為貪兵是慾而不能窒也及敗于殽歸作秦誓庶㡬能改将窒其慾矣復起彭衙之師報殽函之役其名為憤兵是忿而不能懲也今又濟河取郊人之稱斯師也何義哉晉人畏泰而不出穆公逞其忿而後悔自是見伐不報始能踐自誓之言矣是故於此貶而稱人備責之也秋楚人圍江雨螽于宋冬公如晉十有二月己巳公及晉侯盟晉陽處父帥師伐楚以救江以者不以者也救江善矣其書以何楚甞伐鄭矣齊桓公連結江黄合九國之師於召陵然後伐鄭之謀罷又嘗圍宋矣晉文公許復曹衛㑹四國之師於城濮然後圍宋之役解今江國小而弱非能與宋鄭比楚人圍之必不待徹四境屯禦守戍之衆與宿衛盡行也當是時楚有覆載不容之罪晉主夏盟宜合諸侯聲罪致討命秦甲出武關齊以東兵略陳蔡而南處父等軍方城之外楚必震恐而江圍自解矣計不出此乃獨遣一軍逺攻強國豈能濟乎故書伐楚以救江言救江雖善而所以救之者非其道矣此春秋紀用兵之法也皇王大紀卷四十四

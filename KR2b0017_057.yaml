body:
  text: 皇王大紀卷五十七宋胡宏撰三王紀景王十三年冬十一月有星出于婺女鄭禆竈曰晉君將死矣齊欒髙氏皆嗜酒信内多怨彊於陳鮑氏而惡之或告陳無宇曰欒施髙彊將攻陳鮑無宇授甲見鮑國使視二子則皆將飲酒無宇曰彼雖不信聞我授甲則必逐我及其飲酒也伐諸遂伐欒髙欒髙謀曰先得公陳鮑焉徃遂伐虎門晏嬰端委立於虎門之外四族召之無所徃公召之而後入四族戰于稷欒髙敗國人追之又敗諸鹿門施彊奔魯陳鮑分其室晏嬰曰必致諸公無宇從之因請老于莒凡公子公孫之無祿者私分之邑國之貧約孤寡者私與之粟陳氏益大九月魯季孫意如伐莒取郠獻俘始用人於亳社晉侯薨諡曰平公子夷嗣晉𦵏其君齊國弱宋華定魯叔孫婼衛北宫喜鄭罕虎許人曹人莒人邾人滕人薛人杞人小邾人會𦵏事畢欲見新君叔向辭曰大夫之事畢矣而又命孤孤斬焉在衰絰之中其以嘉服見則喪禮未畢其以喪服見是重受弔也大夫將若之何皆無辭以見初罕虎將以幣行子産曰喪焉用幣幣必百兩百兩必千人千人至將不行必盡用之幾千人而國不亡不從既盡用其幣悔之曰書云欲敗度縱敗禮我之謂矣宋公薨子佐嗣初佐惡寺人栁欲殺之及喪栁熾炭于位将至而去之比𦵏又有寵經曰十年春王正月齊欒施來奔秋七月季孫意如叔弓仲孫貜帥師伐莒前已舍中軍矣曷為猶以三卿並將乎季氏毁中軍四分公室擇其二二家各有其一至是季孫身為主將二子各率一軍為之副則三軍固在其曰舍之者特欲中分魯國之衆為己私爾以為復古則誤矣戊子晉侯彪卒九月叔孫婼如晉𦵏晉平公十有二月甲子宋公成卒十四年春二月楚王在申召蔡侯將徃大夫曰王貪而無信幣重而言甘誘我也蔡侯不可楚王伏甲享之醉而執之明日殺之刑其士七十人公子棄疾帥師圍蔡韓起問於叔向曰楚其克乎對曰蔡侯獲罪於其君天將假手以斃之何故不克然肹聞之不信以幸不可再也昔年誑陳今又誘蔡雖幸而克必受其咎弗能乆矣桀克緍以喪其國紂克東夷而隕其身天之假助不善非祚之也厚其㐫惡以降之罰也魯夫人薨魯大蒐魯仲孫會邾子盟于祲祥晉荀吳謂韓起曰不能救陳又不能救蔡物以無親晉之不能亦可知也已為盟主而不䘏亡國將焉用之於是韓起會諸侯之大夫謀救蔡子産曰蔡小而不順楚大而不徳天將棄蔡以壅楚盈而罰之蔡必亡矣且喪君而能守者鮮矣美惡周必復王惡周矣晉人使狐父請蔡於楚弗許遂還魯葬齊歸公不慼叔向曰魯公室其卑乎君有大喪國不廢蒐有三年之喪而無一日之慼國不䘏喪不忌君也君無慼容不顧親也國不忌君君不顧親能無卑乎殆其失國楚王滅蔡執世子有用之于岡山申無宇曰不祥五牲不相為用况用諸侯乎王城陳蔡不羮賦皆千乘使棄疾為蔡公問無宇曰如何對曰擇子莫若父擇臣莫若君鄭莊公城櫟而寘子元焉使昭公不立齊桓公城穀而寘管仲焉至于今賴之臣聞五大不在邊五細不在庭親不在外羈不在内今棄疾在外鄭丹在内君其少戒王曰國有大城何如對曰鄭京櫟實殺曼伯宋蕭亳實殺子游齊渠丘實殺無知衛蒲戚實出獻公末大必折尾大不掉君所知也王又遷胡沈道房申於荆焉經曰十有一年春王二月叔弓如宋葬宋平公夏四月丁巳楚子䖍誘蔡侯般殺之于申楚公子棄疾帥師圍蔡此討賊也雖殺之若無罪春秋深惡楚子貶而稱名何也世子般殺其君諸侯與通㑹盟十有三年矣是中國變為夷狄而莫之覺也楚子若以大義倡天下奉詞致討討其弑父之罪而在宫者無赦焉討其弑君之罪而在官者無赦焉殘其身瀦其宫室謀於蔡衆置君而去雖古之征暴亂者不越此矣又何惡乎今䖍本心欲圖其國不為討賊舉也而又挾欺毁信重幣甘言詐誘其君執而殺之肆行無道貪得一時流毒於後傾危成俗天下大亂劉項之際死者十九聖人深惡楚䖍而名之也其慮達矣五月甲申夫人歸氏薨大蒐于比蒲其曰大蒐越禮也君有重喪國不廢蒐不忌君也三綱軍政之本君執此以御其下臣執此以事其上政之大本於是乎在君有三年之戚而國不廢一日之蒐則無本矣有門庭之冦而宗廟社稷之存亡係焉必從權制而無避矣伯禽喪服徐夷並興至于東郊出戰之師與築城之役同日並舉度緩急輕重盖有不得已焉者矣晉王克用薨梁兵壓境而荘宗决勝於夾寨周太祖殂契丹入冦而世宗接戰於髙平若此類者君行為顯親非不顧也臣行為愛君非不忌也惟審於緩急輕重之宜斯可矣仲孫貜㑹邾子盟于祲祥秋季孫意如㑹晉韓起齊國弱宋華亥衛北宫佗鄭罕虎曹人杞人于厥憗楚將滅蔡請于楚而弗許晉之不能亦可知矣曷為諸國猶序而大夫無貶乎扈之盟晉侯受賂弗克而還諸侯畧而不序亡義利之分也澶淵之㑹謀救宋災而不討蔡罪大夫貶而稱人魯卿諱而不書失重輕之别也亡義利之分為不仁失輕重之别為不智今晉輿諸侯心欲救蔡而力弗加焉則無惡也凡此見春秋明義利審重輕以恕待人而不求其備矣九月乙亥𦵏我小君齊歸冬十有一月丁酉楚師滅蔡執蔡世子有以歸用之内入國而以其君來外滅國而以其君歸皆服而以之易詞也既書滅蔡矣又書執蔡世子有者世子無降服之狀强以歸而虐用之也父母之仇不與共天下與民守國効死不降至於力屈就擒虐用其身而不顧也則有之為世子之道得矣十五年齊師納北燕伯款于陽因其衆也鄭伯薨子寧嗣宋華定聘于魯取郠之役莒人愬魯于晉晉有平公之喪未之治也魯侯如晉晉人辭之至河而歸公子慭如晉齊侯衛侯鄭伯朝于晉晉侯享諸侯子産相鄭伯辭於享請免喪而後聽命晉人許之晉侯以齊侯宴荀吳相投壺晉侯先吳曰有酒如淮有肉如坻寡君中此為諸侯師中之齊侯曰有酒如澠有肉如陵寡人中此與君代興亦中之伯瑕謂吳曰子失辭吾固師諸侯矣壼何為焉其以中雋也齊侯弱吾君歸弗來矣公孫傁趨進曰日旰君勤可以出矣以齊侯出或譛成熊於楚王熊知之而不能行王謂熊若敖氏之餘也遂殺之晉荀吳偽會齊師者假道於鮮虞遂入昔陽滅肥以肥子綿臯歸魯季孫意如不禮於南蒯蒯謂公子慭吾出季氏而歸其室於公子更其位我以費為公臣慭許之以告公而遂從公如晉蒯不克以費叛如齊慭自晉還及衛聞亂逃介而先及郊聞費叛遂奔齊楚王狩于州來使五大夫帥師圍徐以懼吳次于乾谿以為之援經曰十有二年春齊髙偃帥師納北燕伯于陽三月壬申鄭伯嘉卒夏宋公使華定來聘公如晉至河乃復五月𦵏鄭簡公楚殺其大夫成熊秋七月冬十月公子慭出奔齊楚子伐徐晉伐鮮虞獻公假道於虞以滅虢因執虞公則以師與人稱之今晉雖為諼固可罪也而狄之不亦過乎楚奉孫吳討陳因以滅陳誘蔡般殺之因以滅蔡晉人視其殘虐莫能救則亦已矣而效其所為以伐人國是中國居而夷狄行也人之所以為人中國之所以為中國信義而已矣一失則為夷狄再失則為禽獸禽獸逼人人將相食自春秋末世至于六國亡秦變詐竝興傾危成俗河決魚爛不可壅而收之皆失信棄義之明驗也春秋謹嚴於此制治未亂拔本塞源之意豈曰過乎十六年魯叔弓圍費弗克敗焉意如怒令見費人執之以為囚俘冶區夫曰非也若見費人寒者衣之饑者食之為之令主而共其乏困費來如歸南氏亡矣民將叛之誰與居邑若憚之以威懼之以怒民疾而叛為之聚也意如從之費人叛南氏楚王虐既殺薳掩又奪薳居田而不禮許圍蔡洧蔓成然白公子張驟諫王曰不穀雖不能用慭寘之於耳子復語對曰賴君用之也故言不然巴浦之犀犛兕象其可盡乎其又以規為瑱也遂趨而退於是薳氏許氏蔡氏鬭氏因羣喪職之族作亂觀從聞之謂朝吳曰今不封蔡蔡不封矣我請試之以棄疾命召公子比公子黒肱于晉及郊而告之情强與之盟入襲蔡棄疾將食見之而逃觀從使比食坎用牲加書而速行已徇於蔡曰蔡公召二子將納之與之盟而遣之矣將師而從之蔡人聚將執之辭曰失賊成軍而殺余何益乃釋之朝吳曰二三子若能死亡則如違之以待所濟若求安定則如與之以濟所欲且違上何適而可衆曰與之乃奉蔡公召二子而盟帥陳蔡不羮許葉之師因四族之徒以入楚殺太子禄及公子罷敵比為王黒肱為令尹次于魚陂棄疾為司馬先除王宫使觀從師於乾豁而遂告之且曰先歸復所後者劓師及訾梁而潰王聞羣公子之死也自投于車下曰人之愛其子也亦如余乎余殺人子多矣能無及此乎右尹鄭丹曰請待于郊以聽國人王曰衆怒不可犯也曰若入於大都而乞師於諸侯王曰皆叛矣曰若亡於諸侯以聽大國之圖君也王曰大福不再祇取辱焉㳂夏將入鄢縊于芋尹申亥氏觀從謂比曰不殺棄疾雖得國猶受禍也曰余不忍也曰人將忍子吾不忍俟也乃行國每夜駭曰王入矣棄疾使周走而呼曰王至矣告比及黒肱曰君若早自圖也可以無辱衆怒如水火焉不可為謀二子自殺棄疾為王更名熊居𦵏比於訾殺囚衣之王服而流諸漢取而塟之以靖國人他年申亥以䖍柩告乃改𦵏之諡曰靈王比之歸也晉韓起問叔向曰濟乎對曰難起曰同惡相求如市賈焉何難對曰無與同好誰與同惡取國有五難有寵而無人一也有人而無主二也有主而無謀三也有謀而無民四也有民而無徳五也比在晉十三年矣晉楚之從不聞達者族盡親叛無釁而動為羇終世亡無愛徴涉五難以弑舊君誰能濟之有楚國者棄疾乎君陳蔡苛慝不作盜賊隱伏私欲不違民無怨心芈姓有亂必季實立楚之常也誰能害之起曰齊桓晉文不亦是乎對曰齊桓衛姬之子有寵於僖從善如流下善齊肅不藏賄不從欲求善不厭有三士以為輔佐外主莒衛内主國髙有國不亦宜乎文公狐季姬之子有寵於獻好學不貳生十七年有士五人以為腹心股肱亡十九年守志彌篤外主齊宋秦楚内主欒郤狐先天方相晉何以代文晉叔向言於諸大夫曰諸侯貳矣不可以不示威乃並徴會治兵于邾南甲車四千乘夏劉子及諸侯㑹晉侯于平丘將尋盟齊人曰諸侯討貳則有尋盟若皆用命何盟之尋叔向曰明王之制使諸侯歲聘以志業間朝以講禮再朝而㑹以示威再會而盟以顯昭明奉承齊犠求終事也君曰余必廢之何齊之有惟君圖之寡君聞命矣齊人聽命叔向曰諸侯有間矣不可以不示衆六月辛未治兵建而不斾壬申復斾之諸侯畏之邾人莒人愬于晉曰魯朝夕伐我幾亡矣我之不共魯故之以晉侯不見魯侯使叔向辭之曰諸侯將盟寡君知不得事君矣請君無勤孟椒對曰君信蠻夷之愬以絶兄弟之國棄周公之後亦惟君叔向曰寡君有甲車四千乘在雖以無道行之必可畏也況其率道其何敵之有牛雖瘠僨於豚上其畏不死南蒯公子憖之憂其庸可棄乎若奉晉之衆用諸侯之師因邾莒杞鄫之怒以討魯罪間其二憂何求而弗克魯人聽命甲戌同盟于平丘鄭子産爭承曰昔天子班貢輕重以列列尊貢重周制也卑而貢重者甸服也鄭伯男也而使從諸侯之貢懼弗給也敢以為請自日中以爭至于昏晉人許之既盟罕虎咎之曰諸侯若討其可瀆乎對曰晉政多門貳偷之不暇何暇討國不競亦陵何國之為晉人執季孫意如以幕䝉之使狄人守之以歸孟椒從楚王歸蔡世子有之子廬於蔡陳悼世子偃師之子吳於陳盡復遷邑致羣賂魯侯如晉荀吳謂韓起曰諸侯相朝講舊好也執其卿而朝其君有不好焉不如辭之使士彌牟辭公于河吳滅州來令尹鬭成然請伐吳王曰吾未撫民人未事鬼神未修守備未定國家而用民力敗不可悔州來在吳猶在楚也子姑待之魯孔丘之母顔氏卒孔子少孤不知叔梁紇之墓乃殯其母於五父之衢人之見之者皆以為𦵏也其慎也盖殯也問於鄹曼父之母然後得合𦵏於防曰吾聞之古也墓而不墳今丘也東西南北之人也不可以弗識也於是封之崇四尺孔子先反門人後雨甚至孔子問焉曰爾來何遲也曰防墓崩孔子不應三孔子泫然流涕曰吾聞之古不修墓經曰十有三年春叔弓帥師圍費費内邑也命正卿為主將舉大衆圍其城若敵國然者家臣强大夫弱也季孫意如所以惡於下者事其上而不忠於其君以所惡於上者使其下而不禮於其臣出乎爾者反乎爾宜南蒯之及此也春秋之法不書内叛反求諸己而已矣其書圍實欲著其實不沒之也夏四月楚公子比自晉歸于楚弑其君䖍于乾谿或曰昭元年楚䖍弑立比出奔晉十三年比歸而䖍縊于棘圍則比未甞一日北靣事䖍為之臣䖍又弑立固非比之君也而書曰比弑其君䖍何也曰去國雖乆而爵祿有列於朝出入有詔於國不掃其墳墓不收其田里不係纍其宗族即君臣之分猶在也比雖奔晉而晉人以羇待比以國底禄固楚之亡公子也楚又未甞錮之如晉之於欒盈比又未甞不向楚而坐如子鮮之於衛安得以為比非楚臣而䖍非比之君乎春秋書比弑其君䖍明於君臣之義也或曰䖍弑郟敖以立比之獲罪豈其無討賊之心而徒貪夫位與曰春秋罪比不明乎君臣之義不責其無討賊之心夫比雖當次及之序而棄疾亦居楚國之常以取國言之比具五難而棄疾有五利此事之變也為比者宜乎効死不立若國有歸為曹子臧魯叔肹不亦善乎不然身居令尹貴戚之卿為社稷鎮亂不自己亦可也今乃脅於勢而忘其守怵其利而忘其義被之大惡欲辭而不可得矣為人臣而不知春秋守經事而不知其宜遭變事而不知其權者若此類是也悲夫聖人垂戒之意明矣楚公子棄疾殺公子比宜書曰棄疾弑其君比而曰殺公子比何也初子干歸自晉觀從假棄疾之命而召之來則來坎牲加書而強之盟則盟帥四族衆而使之入楚則入殺太子祿而立之為王則王周走而使於國中謂衆怒如水火而逼之自殺則自殺其行止遲速去就死生皆觀從與國人所為而比未甞可否之也則宜書曰楚人殺比而春秋變文歸獄棄疾者誅其本意在于代比而非討之也所謂輕重之權衡曲直之繩墨而懐惡者亦無所隱其情矣秋公會劉子晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于平丘按左氏晉成虒祁諸侯朝而歸者皆有貳心方是時楚人暴横陵蔑中華在宋之盟爭晉先㰱及虢之㑹仍讀舊書遂召諸侯為申之㑹遷賴於鄢縣陳滅蔡此乃敵國外患臨深履薄恐懼省戒之時其君當倚於法家弼士以徳脩國政其臣當急於責難陳善以禮格君心内結夏盟外攘夷狄復悼公之業若弗暇也今乃施施然安於不競無憤恥自强之志惟宫室臺榭是崇是飾及諸侯皆貳顧欲示威徵㑹而以兵甲㑹之不亦末乎春秋之法制治於未亂保安于未危貴事之預恥以茍成而不要諸道者也是以深惡此㑹如下文所貶云明其義者然後知仲尼作經於一臺囿之築一宫室門觀之作必謹而書以重民力其弭亂持危固結人心之慮逺矣八月甲戌同盟于平丘其書同盟者劉子與盟同懼楚也㑹與盟同地再書平丘者書之重詞之複其中必有美惡者見行事之深切著明故詞繁而不殺也是盟盖或善之而以為惡何哉盟雖衰世之事然有定人道之大倫者矣有備天子之明禁者矣有束牲不㰱相命而信自喻者矣有納斥侯禁侵掠誠格而不復叛者矣其次猶以載書詞命相爭約於大神而不敢越者則未聞主盟中國奉承齊犧而矜其威力恐迫諸侯又信蠻夷之訴絶兄弟之歡求逞私憤問其憂疑如此盟者流及戰國强衆相誇恫疑恐喝恣行而陵暴死者十九積習所致有自來矣春秋禮義之大宗也曽是以為善乎詞繁而不殺則惡其競力不道為後世鑒矣公不與盟晉主此盟徳則不競而矜兵甲之威肆脅持之術以諸侯上要天子之老而㰱血以中國惴惴夷狄簒逆之主而結盟無禮義忠信誠慤之心而以威詐涖之備此五不韙者得不與焉幸也聖人筆削春秋凡魯君可耻者必為之隱諱至㑹于沙隨而公不得見盟于平丘而公不得與自衆人常情必深沮喪以為辱矣仲尼推明其故自反而縮雖晉國之嚴不可及也彼以其威我以其理彼以其勢我以其義夫何慊乎哉直書其事示後世立身行己之道也其垂訓之用大矣晉人執季孫意如以歸稱人以執非伯討也晉人若按邾莒所討有無之狀究南蒯子仲奔叛之因告於諸侯以其罪執之請於天子以大義廢之選於魯卿更意如之位收斂私邑為公室之民使政令在君三家臣順則方伯之職矣今魯興邾通好亦不朝夕伐莒而鄆郠之故又非昭公之意也徒以邾莒之言曰我之不共魯故之以遂辭魯君而執意如則是意在貨物而不責其無君臣之義也何得為伯討乎稱人以執罪晉之偷也公至自㑹蔡侯廬歸于蔡陳侯吳歸于陳曰歸者順詞也陳蔡昔皆滅矣不稱復歸者不與楚䖍之得滅也其稱歸于者國其所宜歸也廬與吳皆亡世子之子也而棄疾封之可謂有奉矣不言自楚者不與楚子之得封也其稱侯者位其所固有也陳列聖之後蔡王室之親見滅於楚䖍而諸侯不能救復封於棄疾而諸侯不能與是以夷狄制諸夏也聖人至是懼之甚盖有不得已焉制春秋為後法大要皆天子之事也其義則以公天下為心興滅國繼絶世異於自私其身欲擅而有之者也故書法如此為天下國家而不封建欲望先王之冶難矣冬十月𦵏蔡靈公公如晉至河乃復吳滅州來十七年魯孟椒私於荀吳曰魯事晉何以不如夷之小國且兄弟也土地猶大所命能具若為夷棄之使事齊楚其何瘳於㫖親親與大賞共罰否所以為盟主也諺曰臣一主二吾豈無大國吳以告韓起乃歸季孫椒曰寡君未知其罪合諸侯而執其老若猶有罪死命可也若曰無罪而惠免之諸侯不聞是逃命也何免之為請從君惠於會起患之以語叔向對曰鮒也能歸之鮒見季孫曰昔鮒得罪于晉君自歸于魯君㣲武子之賜不至于今敢不盡情歸子而不歸鮒也聞諸吏將為子除館于西河其若之何且泣意如懼先歸孟椒待禮曹伯薨子須嗣費人司徒老祁慮癸因民之欲叛遂刼南蒯曰羣臣不忘其君子若弗圖費人不忍其君將不能畏子矣何所不逞欲請送子蒯遂奔齊莒子薨諡曰著丘公子狂不慼國人弗順欲立弟庚輿蒲餘侯惡公子意恢而善於庚輿狂惡羣公子鐸而善意恢鐸因與蒲餘侯殺意恢出狂于齊而納庚輿楚鬭成然有徳於王而不知度與養氏比而求無厭殺成然滅養氏使鬬申居鄖以無忘舊勲晉邢侯與雍子爭鄐田樂王鮒攝理罪在雍子雍子納女于鮒鮒蔽罪邢侯邢侯怒殺二子于朝韓起問于叔向叔向曰買直鬻獄專殺其罪一也已惡而掠美為昏貪以敗官為墨殺人不忌為賊夏書曰昏墨賊殺臯陶之刑也乃施邢侯而尸二子於市仲尼曰叔向古之遺直也經曰十有四年春意如至自晉其始執之為乏邾莒之供而非有扶弱擊强之義也其終歸之為土地猶大所命能其而非有不能救蔡為夷執親之悔也然則晉人喜怒皆以利發其勸沮皆以利行違遒甚矣故平丘之㑹深加貶斥自是而後諸侯不合二十餘年至於召陵又以賄敗十有八國之諸侯而書侵楚以譏之於是晉日益衰外攜内叛不復振矣利之能敗人國家乃如此春秋之深戒也三月曹伯榺卒夏四月秋𦵏曹武公八月莒子去疾卒卒自外録者也莒人來赴故魯史書其卒𦵏自内録者也魯人不徃是以闕其𦵏自昭公以來雖薛紀㣲國無不㑹其𦵏者何獨於莒則不徃乎方是時意如専政莒甞訴其疆鄆取鄄之罪于方伯而見執矣為是怒莒故獨不㑹其塟也若意如者其傲狠修怨敢施於昭公與莒子及其在晉聞除館西河則恐懼逃歸如一匹夫何也小人無禮喜怒勇怯不中節皆若是爾茍不逺之其能國乎冬莒殺其公子意恢十八年吳王夷末薨授國於季札札迯去吳人立夷末之子僚魯禘於武宫叔弓涖事籥入而卒去樂卒事楚費無極害朝吳之在蔡也欲去之乃謂之曰王惟信子故處子於蔡子亦長矣而在下位辱也必求之吾助子請又謂其上之人曰王惟信吳故處諸蔡二三子在其上不亦難乎弗圖必及於難蔡人逐朝吳出奔鄭王怒曰余惟信吳故置諸蔡且㣲吳不及此女何故去之無極對曰臣豈不欲吳然而前知其為人之異也吳在蔡蔡必速飛去吳所以剪其翼也四月乙丑太子壽卒六月戊寅王后崩晉荀吳伐鮮虞圍鼓鼓人或請以城叛吳弗許左右曰何故曰吾聞諸叔向曰好惡不愆民知所適事無不濟或以吾城叛吾所甚惡也賞所甚惡若所好何若其弗賞是失信也何以庇民使民知義有死命而無二心不亦可乎鼓人告食竭力盡而後取之不戮一人以鼔子鳶鞮歸魯侯如晉平丘之㑹故也晉人止之𦵏王后諡曰穆晉荀躒會𦵏籍談為介既𦵏除喪以躒宴尊以魯壺王曰伯氏諸侯皆有以鎮撫王室晉獨無有何也躒揖談對曰晉居深山王靈不及拜戎不暇其何以獻器王曰密須之鼓闕鞏之甲襄之二路鏚鉞秬鬯彤弓虎賁非分而何昔而髙祖孫伯黶司晉之典籍故曰籍氏何故忘之談不能對歸以語叔向叔向曰王其不終乎吾聞所樂必卒焉今王樂憂若卒以憂不可謂終王一歳而有三年之喪二焉於是乎以喪賔晏又求彞器樂憂甚矣且非禮也彞器之來嘉功之由非由喪也三年之喪雖貴遂服禮也王雖弗遂宴樂以早亦非禮也一動而失二禮無大經矣魯孔丘既除喪五日彈琴而不成聲十日而成笙歌言在不稱徴言徴不稱在經曰十有五年春王正月吴子夷末卒二月癸酉有事于武宫籥入叔弓卒去樂卒事按曾子問君在祭不得成禮者夫子語之詳矣而無有及大臣者是知去樂不可也有事於宗廟遭大夫之變則以聞可乎按禮衛有太史柳莊寢疾君曰若疾革雖當祭必告是知祭而以聞不可也禮莫重於當祭大夫有變而不以聞則内得盡其誠敬之心於宗廟外全隱恤之意於大臣是兩得之也然則有事於宗廟大臣涖事籥入而卒於其所則如之何禮雖未之有可以義起也有事於宗廟大臣蒞事籥入而卒於其所去樂卒事其可也緣先祖之心見大臣之卒必聞樂不樂縁孝子之心視已設之饌必不忍輕徹故去樂卒事其可也宗廟合禮者常事不書茍以為可則春秋何書乎此記禮之變而書之者也夏蔡朝吳出奔鄭朝吳蔡之忠臣雖不能存蔡而能復蔡其從於棄疾者謂蔡滅而棄疾必能封之也棄疾以其忠於舊君而信之使居舊國可謂知所信矣則曷出奔費無極害其寵也無極楚之讒人去朝吳出蔡侯朱喪太子建殺連尹奢屏王耳目使不聰明卒使吳師入郢辱及宗廟讒人為亂可不畏乎為國有九經而尊賢為上勸賢有四事而去讒為首志朝吳出奔而入郢之師兆矣然朝吳身居舊國處危疑之地荀有譛之者則王不能無動也能以忠信自任而杜讒諂之謀則善矣而費無極乃語之曰子亦長矣而在下位辱也欲為之請以名利累其心而莫之覺不智亦甚矣故特書其出奔以罪吳為後戒也六月丁巳朔日有食之秋晉荀吳帥師伐鮮虞普滅潞氏甲氏乃再伐鮮虞皆用大夫為主將而或稱人或稱國或稱其名氏何也以殄滅為期而無矜惻之意則稱人見利忘義而以狄道欺詐行之則稱國以正兵加敵而不納其叛臣則稱名氏夫稱其名氏非褒之也纔免於貶爾而春秋用兵禦敵之畧咸見矣冬公如晉皇王大紀卷五十七

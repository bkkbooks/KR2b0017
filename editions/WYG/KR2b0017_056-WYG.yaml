body:
  text: 皇王大紀卷五十六宋胡宏撰三王紀景王五年晉侯使韓起聘于魯且告為政焉觀書於太史氏見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之徳與周之所以王也公享之既享宴于季氏遂如齊晉公族大夫韓須逆女齊上大夫陳無宇送女致少姜少姜有寵晉侯謂之少齊謂無宇非卿執諸中都少姜曰送從逆班畏大國也猶有所易是以亂作魯叔弓聘于晉鄭駟黒欲去游氏而代其位傷疾作而不果其族與諸大夫欲殺之子産在鄙乗遽而至使吏數之曰良霄之亂以大國之事而未爾討也爾有亂心無厭國不女堪專伐良霄而罪一也昆弟爭室而罪二也薫隧之盟女矯君位而罪三也有死罪三何以堪之不速死司冦將至縊而尸諸周氏之衢加木焉晉少姜卒魯侯如晉及河晉侯使伯瑕來辭曰非伉儷也請君無辱公還季孫宿遂致服焉叔向言陳無宇之無罪也晉侯歸之晉侯怠於政事叔向憂曰肹聞公室將卑其宗族枝葉先落則公從之肹之宗十一族惟羊舌氏在而已戎馬不駕卿無軍行公乗無人列卒無長庶民罷敝而宫室滋侈道殣相望而女富溢尤民聞公命如逃冦讐欒郤胥原狐續慶伯降在皂𨽻政在家門民無所依君日不悛以樂慆憂公室之卑其何日之有陳無宇有寵於齊侯晏嬰曰齊其為陳氏乎公棄其民而歸于陳氏齊舊四量豆區釡鍾四升為豆各自其四以登於釡釡十為鍾陳氏三量皆登一焉鍾乃大矣以家量貸而以公量収之山木如市弗加於山魚鹽蜃蛤弗加於海民參其力二入於公而衣食其一公聚朽蠧而三老凍餒國之諸市屨賤踊貴民人痛疾而或燠休之其愛之如父母而歸之如流水箕伯直柄虞遂伯戲其相胡公大姬已在齊矣經曰二年春晉侯使韓起來聘夏叔弓如晉秋鄭殺其大夫公孫黑黒則有罪而鄭人初畏其强不之討也因其疾而幸勝之則亦云殆矣故稱國以殺累乎上矣冬公如晉至河乃復季孫宿如晉舉動人君之大節賢哲量之以行藏其道奸邪窺之以作止其惡四鄰視之以厚薄其情故有國者必謹於禮而後動此守身之本保國之基也禮雖自卑而尊人亦不妄悦人以自辱昭公既不能據經守正失禮而妄動又不能從權適變無故而輕復經書公如晉至河乃復季孫宿如晉而昭公失國之因季氏逐君之漸晉人下比之迹不行貶絶而皆見矣六年冬滕侯薨子寧嗣滕𦵏其君魯叔弓如滕孟椒為介及郊為椒叔父之忌不入椒曰政也不可以己私不將公事遂入小邾子朝于魯季孫欲卑之穆叔曰是逆羣好也不可其如舊而加敬焉志曰能敬無災宿從之魯旱大雩北燕伯款多嬖寵欲去諸大夫而立其寵人燕大夫比以殺公之外嬖燕伯懼奔齊燕人立悼公經曰三年春王正月丁未滕子原卒夏叔弓如滕五月𦵏滕成公秋小邾子來朝八月大雩冬大雨雹北燕伯款出奔齊罪之也君雖不君臣不可以不臣燕伯欲去諸大夫固不君矣而大夫相與比以殺其外嬖是威脅其主而出之矣與鬻拳之以兵諫無異而獨罪燕伯何哉大夫國君之陪貳以公心選之而不可私也以誠意委之而不可疑也以隆禮待之而不可輕也以直道馭之而不可辱也否則是忽其陪貳以自危此有國之大戒也春秋凡見逐於臣者皆以自奔為文正其本之意也而垂戒逺矣七年冬十一月魯大雨雹季孫宿問於申豐曰雹可禦乎對曰聖人在上無雹古者日在北陸而藏氷西陸朝覿而出之其藏之也周其用之也徧則冬無愆陽夏無伏隂春無凄風秋無苦雨雷出不震無菑霜雹癘疾不降民不夭札今藏川池之氷棄而不用風不越而殺雷不發而震雹之為菑誰能禦之楚王卜曰余尚得天下不吉投龜詬天而呼曰是區區者而不余畀余必自取之乃使椒舉如晉求諸侯曰日君有惠賜盟于宋曰晉楚之從交相見也君若茍無四方之虞則願假寵以請於諸侯晉侯欲勿許司馬侯曰君其許之晉侯曰晉國險而多馬齊楚多難吾何向而不濟對曰四嶽三塗陽城大室荆山中南九州之險也是不一姓冀之北土馬之所生無興國焉自古或多難以固其國啟其疆土或無難以喪其國失其守宇若何虞難楚王方侈君其許之而修徳以待其歸乃許楚使舉遂請昏晉侯亦許之楚王問於子産曰晉其許我諸侯乎對曰晉君少安不在諸侯其大夫多求莫匡其君在宋之盟又曰如一若不許君將焉用之王曰諸侯其來乎對曰必來曹畏宋邾畏魯魯衞偪於齊而親於晉惟是不來其餘君之所及也諸侯會楚王于申椒舉曰諸侯無歸禮以為歸始得諸侯其慎禮矣楚王遂以諸侯滅賴遷於鄢王欲遷許於賴使鬭韋龜與公子棄疾城之而還申無宇曰禍在此矣召諸侯而來伐國而克城竟莫校王心不違民其居乎莒子不撫鄫鄫叛歸于魯鄭子産作丘賦國人謗之渾罕以告子産曰茍利社稷死生以之吾聞為善者不改其度故能有濟也民不可逞度不可改詩曰禮義不愆何恤於人言渾罕曰作法於涼其獘猶貪作法於貪獘將若之何吳伐楚入棘櫟麻魯叔孫豹之豎牛譛孟丙殺之譛仲任逐之豹疾病欲食不得餓而死是為穆子仲壬歸牛又譛於季孫殺之而立婼婼即位朝其家衆曰牛禍叔孫氏使亂大從殺適立庶罪莫大焉必速殺之牛懼奔齊孟仲之子殺之孔子曰叔孫昭子之不勞不可能也周任有言曰為政者不賞私勞不罰私怨詩云有覺徳行四國順之經曰四年春王正月大雨雹隂陽之氣和而散則為霜雪雨露不和而散則為戾氣曀霾雹戾氣也隂脅陽臣侵君之象當是時季孫宿襲位世卿將毁中軍専執兵權以弱公室故數月之間再有大變意者昭公遇災而懼以禮為國行其政令無失其民雹之災也庶可禦也不然雖得藏氷之道合於豳風七月之詩其將能乎夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷會于申申之㑹楚子為主而不殊淮夷是㑹之諸侯皆狄也其意也何楚䖍弑麋以立而求諸侯於晉晉人許之中國從之至使窮凶極惡師潰訾梁身竄棘里而縊於申亥人不致討而天自封之是賁命于天而以人事為無益而弗為也而可乎弑君之賊在春秋時有臣子討之有四鄰討之臣子不能討之于内四鄰不能討之於外有與之㑹以定其位有受其賂以免於討然至此極矣則未有不以為賊而又推為盟主相與朝事之以順其所為而不敢忤者也故申之㑹不殊淮夷者以在㑹諸侯皆為夷狄之行皆王法所當討而不使夏變於夷之意也或曰晉叔向鄭子産宋向戍皆諸侯之良也謀其國至變於夷而不校何哉聖人以天自處賢者聼天所命春秋之法以人合天不任於天以義立命不委於命而宇宙在其手者也故楚麋書卒不革其偽赴於前諸侯㑹申與淮夷累數於後此以恕待人而責備賢者之意其垂訓之義大矣楚人執徐子秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳執齊慶封殺之遂滅賴九月取鄫冬十有二月乙卯叔孫豹卒八年冬魯舎中軍四分公室季氏擇二二子各一皆盡征之而貢於公楚王以屈申為貳於吳殺之魯侯朝于晉自郊勞至于贈賄無失禮晉侯謂司馬侯曰魯侯不亦善於禮乎對曰是儀也不可謂禮禮所以守其國行其政令無失其民者也今政令在家不能取也有子家羈弗能用也奸大國之盟陵虐小國利人之難不知其私公室四分民食於他思莫在公不圖其終為國君難將及身不恤其所禮之本末將於此乎在而屑屑焉習儀以亟言善於禮不亦逺乎楚令尹逆后于晉晉韓起叔向送女楚王曰晉讐敵也吾將以起為閽以肹為司宫足以辱晉矣薳啟疆曰昔者聖王朝聘有珪享頫有璋小有述職大有巡功設机而不倚爵盈而不飲宴有好貨飱有陪鼎入有郊勞出有贈賄務行禮焉失是道則禍亂興且恥匹夫不可以無備自鄢以來晉不失備楚不能報而求親焉今將以親易怨實無禮以速冦而未有其備使羣臣徃遺之禽以逞君心何不可之有王乃厚禮而歸之莒牟夷以牟婁防茲奔魯莒人愬于晉晉侯欲止魯侯范鞅曰不可人朝而執之誘也討不以師而誘以成之惰也請歸之間而以師討焉九月莒人伐魯師于蚡泉不設備魯叔弓敗之秦伯薨子某嗣楚王以諸侯伐吳不設備吳人敗之鵲岸楚王乘驛赴之濟於羅汭吳王使其弟蹶由犒師楚王執之進及汝清吳不可入而還楚王懼吳使沈尹射待命于巢薳啟疆待命于雩婁秦公子鍼歸經曰五年春王正月舎中軍公室益卑而魯國之兵權悉歸于季氏矣兵權有國之司命三綱兵政之本原書其作舍而公孫于齊薨于乾侯定公舞正必至之理也已則不臣三綱淪替南遺叛陽虎専季斯囚而三桓之子孫㣲矣亦能免乎楚殺其大夫屈申公如晉夏莒牟夷以牟婁及防茲來奔邾莒之大夫名姓不登於史冊㣲也牟夷莒大夫曷為以姓氏通重地也以地叛雖賤必書地以名其人終為不義弗可滅矣其書來奔是接我以利而我入其利兩譏之也為國以義不以利如以利則上下交征而國必危矣為己以義不以利如以利則患得患失亦無所不至矣春秋於三叛人雖賤特書其名以懲不義懼滛人為後戒也邑而言及者公羊所謂不以私邑累公邑是也秋七月公至自晉戊辰叔弓帥師敗莒師于蚡泉秦伯卒冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吳越始見經而與徐皆得稱人何也吳以朱方處齊慶封而富於其蕉崇惡也楚圍朱方執齊慶封殺之討罪也吳不顧義入棘櫟麻以報朱方之役狄道也楚於是以諸侯伐吳則比吳為善而師亦有名其從之者進而稱人可也吳大伯之後也楚祝融之後也徐伯益之後也越大禹之後也其上世皆為元徳顯功通于周室與中國冠帶之君無以異王非諸侯所當稱也故春秋比諸夷狄雖然猶不欲絶其類是以上不使與中國等下不使與夷狄均推之可逺引之可來此聖人愼絶人亦春秋之意也九年冬杞伯薨弟有釐嗣魯季孫宿如晉拜不討受牟夷之田也晉侯待之禮有加焉宋寺人桞有寵世子佐惡之華合比曰我殺之桞聞之乃坎用牲埋書而告公曰合比將納華臣之族既盟於北郭矣公使視之有焉遂逐合比於是華亥欲代右師乃與桞比從為之徴曰聞之乆矣公使代之魯旱大雩徐儀楚聘于楚楚王執之逃歸懼其叛也使薳洩伐徐吳人救之令尹薳罷帥師伐吳師於豫章吳人敗其師於房鍾獲宮廏尹罷歸罪於洩而殺之魯叔弓聘于楚齊侯如晉請伐北燕納北燕伯款晉侯許之晏嬰曰燕有君矣民不貳吾君賄左右諂諛作大事不以信未嘗可也鄭鑄刑書叔向詒子産書曰昔夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑今吾子相鄭不能臨之以敬誨之以忠閑之以義行之以禮而制參辟鑄刑書民將弃禮而徴於書錐刀之末將盡爭之亂獄滋豐賄賂並行終子之世鄭其敗乎肹聞之國將亡必多制其此之謂乎子産報曰僑不才不能及子孫吾以救世也既不承命敢忘大惠楚公子棄疾如晉過鄭伯如見王禁芻牧不樵樹不采蓺鄭人皆知其將為王也初楚人弗逆韓起晉侯將如之叔向曰楚辟我衷從我而已焉用效人之辟無寧以善為則而則人之辟乎晉侯從之經曰六年春正月杞伯益姑卒𦵏秦景公夏季孫宿如晉塟杞文公宋華合比出奔衞宋公寵信閹寺殺世適瘞而父子之恩絶逐華合比而君臣之義暌刑人之能敗國亡家亦可畏矣猶有任趙髙以亡秦信㳟顯十常侍以亡漢寵王守澄田令孜以亡唐而不知鑒覆車之轍者不亦悲夫凡此類直書而義自見矣秋九月大雩楚薳罷帥師伐吳冬叔弓如楚齊侯伐北燕十年齊侯將伐北燕求成于魯魯侯許之齊侯伐北燕次于虢燕人行成曰敝邑知罪敢不聽命先君之敝器請以謝罪齊侯許之盟于濡上取燕姬瑶甕玉櫝斚耳而還楚王為章華之宫納亡人以實之芋尹無宇之閽入焉無宇執之有司執無宇謁諸王王將飲酒無宇辭曰天子經略諸侯正封天有十日人有十等下所以事上上所以共神也周文王之法曰有亡荒閲所以得天下也吾先君文王作僕區之法曰盜所隱器與盜同罪所以封汝也逃而舎之是無陪臺也王事無乃闕乎王赦之曰取而臣以徃章華臺成王與伍舉升焉曰臺美夫對曰先君莊王為匏居之臺髙不過望國氛大不過容宴豆先君以是除亂克敵而無惡於諸侯今此臺也民罷而財盡未知其為美也楚王願與諸侯落之使薳啟疆召魯侯曰昔先君成公命我先大夫嬰齊曰吾不忘先君之好將使衡父照臨楚國鎮撫其社稷嬰齊受命于蜀奉承以來弗敢失殞而嘉惠未至今君若步玉趾辱見寡君寵靈楚國以信蜀之役致君之嘉惠是寡君既受貺矣何蜀之敢望魯侯遂如楚夏六月甲辰朔日有食之晉侯問於伯瑕曰誰當之對曰去衞地如魯地二國惡之公曰詩云彼日而食于何不臧者何也對曰國無政不用善則自取謫于日月之災故政不可不慎也務三而已一曰擇人二曰因民三曰從時衞侯薨夫人姜氏無子嬖人婤姶生孟縶及元孟縶之足不良弱行孔烝鉏奉元為嗣晉大夫言於范鞅曰衞事晉為睦晉庇其賊人而取其地故諸侯貳今又不禮於其孤衛必叛我是絶諸侯也鞅説如衛弔反戚田焉魯季孫宿卒是為武子孫意如代為政晉侯謂伯瑕曰信矣可常乎對曰不可六物不同民心不一胡可常也公曰何謂六物對曰歳時日月星辰也公曰何謂辰對曰日月之㑹是謂辰故以配日經曰七年春王正月暨齊平我所欲曰及不得已日暨當時昭公結昏强吳外附荆楚其與齊平無汲汲之意乃齊求於魯而許之平也故曰暨至定公八年魯再侵齊結大國之怨見復必矣其與齊平非不得已乃魯求於齊而欲其平也故曰及平者聖人之所貴然或以賄賂而結平或以臣下而擅平或以附夷狄而得平或以侵犯大國而急於平則皆罪也攷其事而輕重見矣三月公如楚叔孫舎如齊涖盟夏四月甲辰朔日有食之秋八月戊辰衛侯惡卒九月公至自楚冬十有一月癸未季孫宿卒十有二月癸亥𦵏衛襄公十一年冬陳侯元妃鄭姬生悼世子偃師二妃生留下妃生勝二妃嬖留有寵公屬諸弟司徒招與公子過公有廢疾招殺偃師而立留春二月陳侯縊晉築虒祁之宫民力彫盡怨讟並作魯叔弓如晉鄭伯如晉賀宫成也史趙曰甚哉其相䝉也可弔也而又賀之陳人使干徴師赴于楚且告有立君公子勝愬之楚人殺干徴師留奔鄭魯大蒐于紅自根牟至于商衛革車千乘陳公子招歸罪于過而殺之魯大雩楚公子弃疾帥師奉偃師之子吳圍陳曰將定而國陳人聽命遂縣陳使楚穿封戍為公放招于越殺孔奐魯孔丘字仲尼為兒時雖嬉戲必陳俎豆設禮容及長愽學洽聞强記無所不通仲孫貜見之曰孔丘正考父之後也臧孫紇有言曰聖人有明徳者若不當世其後必有達人今其將在孔丘乎乃屬其二子説與何忌使學禮焉自是名聞日昭學者推尊焉是年娶于宋丌官氏明年生子魯君適賜之鯉因以為名居處窮約嘗為委吏曰㑹計當而已矣為乘田曰牛羊茁壯長而已矣經曰八年春陳侯之弟招殺陳世子偃師此公子招特以弟稱者著招馮寵稔惡而陳侯失親親之道也招以公子為師徒乃貴戚之卿親則介弟尊則叔父號令廢立自己而出莫敢干之者也不能援立嫡冢安靜國家而逢君之惡戕殺偃師以致大冦宗社覆沒罪固大矣陳侯信愛其弟何以為失親親乎尊賢者親親之本不能擇親之賢者厚加尊寵以表儀公族而徇其私愛施於不令之人以至亡國敗家豈不失親親之道乎其曰陳侯之弟招殺陳世子偃師交貶之也夏四月辛丑陳侯溺卒叔弓如晉楚人執陳行人干徴師殺之陳公子留出奔鄭秋蒐于紅蒐春事也秋興之則違天時有常所矣其于紅則易地利三家專行公不與焉而兵權在臣下則悖人理此亦直書其事不待貶絶而自見者也凡亂臣欲竊國命必先為非禮以動民而後上及於君父昭公至是民食於它不恤其所昧於履霜之戒甚矣陳人殺其大夫公子過大雩冬十一月壬午楚師滅陳執陳公子招放之于越殺陳孔奐𦵏陳哀公十二年甲申宋華亥魯叔弓鄭游吉衛趙黶㑹楚王于陳楚公子弃疾遷許于夷實城父取州來淮北之田以益之伍舉授許男田然丹遷城父人于陳以夷濮西田益之遷方城外人于許周甘人與晉閻嘉爭閻田晉梁丙張趯以隂戎伐潁王使詹桓伯辭于晉曰先王建母弟以藩屏周亦其廢墜是為豈如弁髦而因以敝之伯父惠公誘允姓之姦自瓜州入我郊甸后稷封殖天下今戎有中國誰之咎也我在伯父猶衣服之有冠冕木水之有本原也伯父若裂冠毁冕㧞本塞原雖戎狄其何有予一人晉人遂致閻田而反潁俘晉荀盈卒未𦵏晉侯飲酒師曠李調侍鼓鐘杜蒯自外來聞聲曰安在曰在寢杜蒯入寢歴階而升酌曰曠飲斯又酌曰調飲斯又酌堂上北面坐飲之降趨而出晉侯呼而問之曰蒯曩者爾心或開予是以不與爾言爾飲曠何也曰子夘疾日君徹宴樂學人舍業知悼子在堂斯其為子夘也大矣曠也太師也不以詔是以飲之也爾飲調何也曰調也君之䙝臣也為一飲一食而忘君之疾是以飲之也爾飲何也曰蒯也宰夫也惟刀匕是共又敢與知防是以飲之也晉侯曰寡人亦有過焉酌而飲寡人杜蒯洗而揚觶遂命徹酒魯仲孫貜如齊魯築郎囿季孫意如欲速成叔孫婼曰經始勿亟庶民子來焉用速成其以勦民也無囿猶可無民其可乎經曰九年春叔弓會楚子于陳許遷于夷夏四月陳災凡外災告則書今楚以威陳夷於屬縣使穿封戍為公矣必不遣使告於諸侯言亡國之有天災也何以書於魯國之䇿乎當是時叔弓與楚子㑹于陳則目擊其事魯史遂書之爾或曰國史所書必承赴告豈有馮使人之言而載之於史者曰周景王崩有尹單猛朝之變國無赴告矣叔鞅至自京師言王室之亂也春秋承其言遂書於策亦此類爾仲尼作經存而弗革者盖興滅國繼絶世以堯舜三代公天下之心為心異於孤秦罷侯置守欲私一人以自奉者所以歸民心合天徳也穀梁以為存陳得其㫖矣秋仲孫貜如齊冬築郎囿皇王大紀卷五十六

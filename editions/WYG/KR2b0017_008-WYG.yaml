body:
  text: 皇王大紀卷八宋胡宏撰三王紀太甲七祀甲寅商書叙曰伊尹作咸有一徳咸有一徳伊尹既復政厥辟將告歸乃陳戒于徳曰嗚呼天難諶命靡常常厥徳保厥位厥徳靡常九有以亡夏王弗克庸徳慢神虐民皇天弗保監于萬方啓廸有命眷求一徳俾作神主惟尹躬暨湯咸有一徳克享天心受天明命以有九有之師爰革夏正非犬私我有商惟天佑于一徳非商求于下民惟民歸于一徳徳惟一動罔不吉徳二三動罔不㓙惟吉㓙不僭在人惟天降灾祥在徳今嗣王新服厥命惟新厥徳終始惟一時乃日新任官惟賢才左右惟其人臣為上為徳為下為民其難其慎惟和惟一徳無常師主善為師善無常主恊于克一俾萬姓咸曰大哉王言又曰一哉王心克綏先王之禄永底烝民之生嗚呼七世之廟可以觀徳萬夫之長可以觀政后非民罔使民非后罔事無自廣以狹人匹夫匹婦不獲自盡民主罔與成厥功商頌首篇曰那一章二十二句祀成湯也猗嘆詞與那多也與置植也我鞉鼔奏鼔簡簡衎我烈祖湯孫奏格綏我思成鞉鼔鞉貫而揺之淵淵嘒嘒管聲既和且平依我磬玉磬聲於赫湯孫穆穆厥聲庸大鍾鼓有斁斁斁然盛而有序萬舞有奕奕奕閑習我有嘉客亦不丕字夷說也懌自古在昔先民有作溫恭朝夕執事有恪顧予烝甞湯孫之將將有扶助也二十七祀甲戍三十三祀王崩天下號王為太宗子沃丁立沃丁四祀甲申八祀伊尹薨百有餘歳王親弔臨祀以太牢塟之於亳咎單遂訓伊尹事作沃丁十四祀甲午二十四祀甲辰二十九祀沃丁崩立弟太庚太庚五祀甲寅十五祀甲子二十五祀甲戍太庚崩子小甲立小甲十祀甲申十七祀小甲崩立弟雍已雍已三祀甲午王尸君位不能綱紀庶政號令不行諸侯或不朝十二祀雍已崩立弟太戊太戊元祀甲辰亳有祥桑榖共生于朝七日大拱太戊退而占之曰桑榖野木而生于朝意者朝亡乎伊陟曰臣聞妖不勝徳王之徳無乃有闕乎王於是以巫咸為相伊陟贊于巫咸作咸乂四篇王用其言嚴於持己恭以接下寅畏天命自守法度推行於民夙夜祗懼不敢荒寧桑榖遂枯太戊贊于伊陟作伊陟原命以陟象賢命與臣扈巫成同又王家十一祀甲寅天運三十歳一小變百年中變五百載大變三大變一紀而大備此大數也欲知天運占星而已夏后之時昆吾氏演其奥巫咸深明天道述而脩之天道始於子極星居於北是為大㣲宫門正南北門中為端門端門東西有左右執法東執法上將次將次相上相西執法上相次相次將上將凡十星列而為垣垣中有謁者三公九卿五諸侯即將位即將内屏幸臣太子從官常陳虎賁環于内坐之中明堂靈䑓在端門外外為紫㣲宫東蕃左樞少尉少輔上輔上衛少衛少丞七星四蕃左樞上宰少宰上輔少輔上衛少衛上丞八星共為垣垣門正南北其名閶闔勾陳當垣中華盖當閶闔門之北天床當閶闔門之南内坐天極四輔尚書柱下史御宫隂徳大理天柱内厨六甲十有二星環于勾陳帝居勾陳之内北斗相文昌三台天理天槍天棓内階三公天一太一太尊太陽𤣥戈勢輔八穀扶匡天厨天牢閣道傳舍二十星環于垣外為天闕内為天庭門為天門黄道當其中日月五星所行也左角在南主刑為太陽道右角在北主兵為太隂道亢為疏廟或為宗為天子之内朝帝一名大角居攝提之中攝提隨斗柄紀八節氐為路寢房為明堂又為四表以總四方又為三道日月星之所常行也心為大火前星太子後星庶子中天帝也尾為後宫箕為后妃之府外為天市垣帝居中車肆市樓侯臣宗官列肆屠肆宗正宗人帛度斗斛十有二星環于帝坐左魏趙九河中山齊吳越徐東海燕南海十星右河中河間晉鄭周秦蜀巴梁楚韓宋十有二星合而繞之斗為天廟牛為天府建為牛斗之都關日月五星之行起焉列宿之行若入宫庭必正行不得有犯有犯隨而占之木為歳星主齊吳十二歳一周天常以十二月起于牽牛東行十二度百日而止反逆行逆行八度百日復東行歳行三十度十六分之七率日行十二分度之一所舍之宿其國安和見伏留行逆順遲速合于度若人君不敬宗廟不施恩惠好行殺戮則盈縮前舍曰盈後舍曰縮失度其精散為天槍長數丈曰仞銳出西南天衝如人形狀蒼頭赤衣國星去地三文如炬火天欃長四丈末銳出西方天彗或長數寸或長竟天其體無光假日之光火為熒惑主楚越其行無常常以十月入太㣲宫受制命伺無道之國守而告之若人君視不逺見不明賦斂重刑罰過則乘陵環繞勾犯歴掩及蝕守淺應速而禍小守乆應遲而禍大其精散為天欃狀如劍長四五尺蚩尤旗似彗而後曲司危出正西大如太白去地可五六丈照明大而白乍上乍下土為鎮星主王子二十八歳一周天所舍之宿其國安固若人君信有虧思不正廣宫室逆時令則色不黄或青或黄或白或黑而為灾其精散為五殘出正東威漢出正北内青外赤燭星狀如太白其上有彗旬始出斗傍狀如雄雞其怒青色狀如鼈金為太白主大臣常以甲寅與熒惑晨出東方二十四日而伏伏二十四日出于西方四十日而入入四十五日復出于東方出以寅戌入以丑未若人主無義號令不常日方北太白贏而居其北日方南太白縮而居其南或失其舍當出而不出當入而不入或晝出過午而經天其精散為天狗狀如犬奔墮地有聲望之如火光出南方水為辰星主燕趙代常以春分見於奎婁夏至見於東井秋分見於角亢冬至見於牽牛出以辰戌入以丑未晨候東方夕候西方歳一周天若人君不知道義聽用姦邪淫刑縱欲則辰失其度其精散為枉矢類大流星蒼黑望之如毛角長數尺孛彗之屬芒氣孛星然天運變于上人事應於下人君變於内兆民應于外五更聚于太㣲之宫謂之天易有徳受慶改立大人奄有四方子孫蕃昌無徳受殃底于滅亡論曰皇天上帝一而已矣攷之天文而有五帝何也五者天地之真數也所以起變化行鬼神而成萬物者也一在太㣲一在紫㣲一在天市不在二十八宿之位何也四者體也二十八宿運行者也二十八宿職在運行而一在大火何也是所以為一也其所為一何也冬十一月大火在子仲春在卯仲夏在午仲秋在酉而太㣲攝提天市居其所衆星隨大火運行而繫焉以其居於北也故謂之北辰以其為衆星之所繫也故謂之北極古之王者動必法天故營寢廟立五門定都關要廵狩天下歳二月東廵狩五月南廵狩八月西廵狩十有一月朔廵狩應心而行所以格天也惟剛徤不息徳合於天故上帝襲焉四方服焉如北辰在天而衆星拱焉大亷裔孫孟戱仲衍為王御王妻以女十一祀甲寅二十一祀甲子三十一祀甲戍四十一祀甲申五十一祀甲午六十一祀甲辰七十一祀甲寅王脩先王養老之禮籧篨戚施僬僥侏儒矇瞍嚚瘖聾瞶昬童皆使有常餼天下歸心焉重譯而朝者十六國七十五祀王崩天下號王為中宗子仲丁立仲丁元祀王之世遷于囂作仲丁六祀甲子商頌二篇曰烈祖一章二十二句祀中宗廟也嗟嗟列祖有秩常也斯祜福也申重也錫無疆及爾斯所既載清酤酒也賚賜也我思成亦有和羮既戒致也敬也既平鬷總也假大也無言時靡有爭綏我眉夀黄耉無疆約軧轂也錯衡八鸞鎗鎗鸞在鑣以假以享我受命溥將自天降康豐年穰穰來假來饗降福無疆顧予蒸甞湯孫之將十三祀王崩國内亂弟外壬立外壬三祀甲戌十三祀甲申十五祀王崩國復亂弟河亶甲立河亶甲元祀王之世遷都于相作河亶甲八祀甲午九祀王崩子祖乙立祖乙九祀甲辰十九祀甲寅王之世遷都于耿為水所圯作祖乙王懼以巫咸之子賢為相諸侯賔服天下大和是歳王崩子祖辛立祖辛十祀甲子十六祀王崩立弟沃甲沃甲四祀甲戌十四祀甲申二十四祀甲午二十五祀王崩國内亂祖辛之子祖丁立祖丁九祀甲辰十九祀甲寅二十九祀甲子三十二祀王崩國内又亂沃甲之子南庚立南庚七祀甲戌十七祀甲申二十五祀王崩國内又亂祖丁之子陽甲立陽甲元祀自沃丁以來廢嫡而更立諸弟子諸弟子或爭相代立比九世亂諸侯莫朝二祀甲午七祀王崩立弟盤庚盤庚五祀甲辰十五祀甲寅商都有南亳有北亳有西亳西亳偃師之地湯所都為亳殷自成湯遷都殷仲丁遷囂河亶甲居相祖乙遷耿盤庚復遷亳殷是謂五遷商書叙曰盤庚五遷將治亳殷民咨胥怨作盤庚三篇盤庚上篇曰盤庚遷於殷民不適有居率籲衆慼出矢言曰我王來既爰宅于兹重我民無盡劉不能胥匡以生卜稽曰其如台先王有服恪敬天命兹猶不常寧不常厥邑于今五邦今不承于古罔知天之斷命矧曰其克從先王之烈若顛木之有由蘖天其永我命于兹新邑紹復先王之大業底綏四方盤庚斆于民由乃在位以常舊服正法度曰無或敢伏小人之攸箴王命衆悉至于庭王若曰格汝衆予告汝訓汝猷黜乃心無傲從康古我先王亦惟圖任舊人共政王播告之脩不匿厥指王用丕欽罔有逸言民用丕變今汝聒聒起信險膚予弗知乃所訟非予自荒兹徳惟汝含徳不惕予一人予若觀火予亦拙謀作乃逸若網在綱有條而不紊若農服田力穡乃亦有秋汝克黜乃心施實徳于民至于㛰友丕乃敢大言汝有積徳乃不畏戎毒于逺邇惰農自安不昬作勞不服田畆越其罔有黍稷汝不和吉言于百姓惟汝自生毒乃敗禍姦宄以自災于厥身乃既先惡于民乃奉其恫汝悔身何及相時憸民猶胥顧于箴言其發有逸口矧予制乃短長之命汝曷弗告朕而胥動以浮言恐沉于衆若火之燎于原不可嚮邇其猶可撲滅則惟爾衆自作弗靖非予有咎遲任有言曰人惟求舊器非求舊惟新古我先王暨乃祖乃父胥及逸勤予敢動用非罰世選爾勞予不掩爾善兹予大享于先王爾祖其從與享之作福作灾予亦不敢動用非徳予告汝于難若射之有志汝無侮老成人無弱孤有㓜各長于厥居勉出乃力聽予一人之作猷無有逺邇用罪伐厥死用徳彰厥善邦之臧惟汝衆邦之不臧惟予一人有佚罰凡爾衆其惟致告自今至于後日各恭爾事齊乃位度乃口罰及爾身弗可悔盤庚中篇曰盤庚作惟渉河以民遷乃話民之弗率誕告用亶其有衆咸造勿䙝在王庭盤庚乃登進厥民曰明聽朕言無荒失朕命嗚呼古我前后罔不惟民之承保后胥慼鮮以不浮于天時殷降大虐先王不懐厥攸作視民利用遷汝曷不念我古后之聞承汝俾汝惟喜康共非汝有咎比于罰予若籲懐兹新邑亦惟汝故以丕從厥志今予將試以汝遷安定厥邦汝不憂朕心之攸困乃咸大不宣乃心欽念以忱動予一人爾惟自鞠自苦若乘舟汝弗濟臭厥載爾忱不屬惟胥以忱不其或稽自怒曷瘳汝不謀長以思乃災汝誕勸憂今其有今罔後汝何生在上今予命汝一無起穢以自臭恐人倚乃身迀乃心予迓續乃命于天予豈汝威用奉畜汝衆予念我先神后之勞爾先予丕克羞爾用懐爾然失于政陳于兹髙后丕乃崇降罪疾曰曷虐朕民汝萬民乃不生生暨予一人猷同心先后丕降與汝罪疾曰曷不暨朕㓜孫有比故有爽徳自上其罰汝汝罔能廸古我先后既勞乃祖乃父汝共作我畜民汝有戕則在乃心我先后綏乃祖乃父乃祖乃父乃斷棄汝不救乃死茲予有亂政同位具乃貝玉乃祖乃父丕乃告我髙后曰作丕刑于朕孫迪髙后丕乃崇降弗祥嗚呼今予告汝不易永敬大恤無胥絶逺汝分猷念以相從各設中于乃心乃有不吉不廸顛越不恭暫遇姦宄我乃劓殄滅之無遺育無俾易種于茲新邑往哉生生今予將試以汝遷永建乃家盤庚下篇曰盤庚既遷奠厥攸居乃正厥位綏爰有衆曰無戯怠懋建大命今予其敷心腹腎膓歴告汝百姓于朕志罔罪爾衆爾無其怒恊比讒言予一人古我先王將多于前功適于山用降我凶徳嘉績于朕邦今我民用蕩析離居罔有定極爾謂朕曷震動萬民以遷肆上帝將復我髙祖之徳亂越我家朕及篤敬恭承民命用永地于兹新邑肆予冲人非廢厥謀弔由靈各非敢違卜用宏兹賁嗚呼邦伯師長百執事之人尚皆隐哉予其懋簡相爾敬念我衆朕不肩好貨敢恭生生鞠人謀人之保居敘欽今我既羞告爾于朕志若否罔有弗欽無總于貨寳生生自庸式敷民徳永肩一心論曰盤庚之時非有敵國外患之虞水火焚蕩之灾也其所以不安厥居而必遷者自祖乙都耿之後三世有兄弟爭奪之禍宗族羣下各有黨與蕩析離居罔有定極盤庚欲正名而誅罰之則傷親親召變亂聽其所為而縱之則不可以為國故必遷于亳理之以舊制參之以新民消散黨與使定于一也自是而後子弟更立十世無復爭奪之禍矣賢者所為盡善盡美如此哉後世人君欲有所為者既不能行其所無事則必更張舊制奬拔新進沮格羣言誅責貴近以厲其餘矣方事未成則戒慎及事已成則安肆矣方遷之初道路阻長工力勞費有能以財濟國事者則必旌顯之矣此天下所以敗也盤庚三篇有六善焉以常舊服正法度一也圖任舊人二也無敢或伏小人之攸箴三也以人情事理反覆訓諭開導民心使之通曉無纖毫恃髙馮威勢之意四也奠厥攸居始以無戯怠為戒五也叙欽有徳有謀之人而不肩好貨六也一舉而六善立弭禍亂之根此孔子所以取之訓後世也先儒謂商人尚神愚初疑之及觀湯誥盤庚之文然後知聖人以神道設教非如末世及夷教之妄誕也行妄誕而能成事者未之有也二十五祀甲子二十八祀王崩弟小辛立小辛七祀甲戍十七祀甲申二十七祀王之世殷政復衰是歳崩立弟小乙帝乙或作小乙六祀甲午十六祀甲辰二十六祀甲寅王即位以來殷政益衰諸侯皆畔四夷内侵姬公劉之裔孫古公亶父敦徳讓積行義國人戴之為犬戎薰鬻所攻事之以皮幣不得免焉事之以犬馬不得免焉事之以珠玉不得免焉古公亶父曰然則狄人之所欲者吾土地也乃屬其耆老而告之曰吾聞之君子不以其所以養人者害人二三子何患乎無君我將去之去邠踰梁山邑于岐山之下居焉邠人曰仁人也不可失也從之者如歸市一年成邑二年成都三年五倍其初二十八祀王崩子武丁立皇王大紀卷八

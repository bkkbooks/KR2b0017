body:
  text: 皇王大紀卷五十八宋胡宏撰三王紀景王十九年齊侯伐徐師于蒲隧徐子及郯人莒人㑹齊侯盟賂以甲父之鼎魯叔孫婼曰諸侯無害哉齊君之無道也興師而伐逺方會之有成而還莫之亢也晉韓起聘于鄭鄭伯享之孔張後至失位客笑之富子諌子産曰非子之恥乎子産曰發命之不𠂻出令之不信刑之頗類獄之放紛會朝之不敬使命之不聽取陵於大國罷民而無功罪及而弗知僑之耻也孔張執政之嗣世守其業而忘其所僑焉得耻之韓起有環其一在鄭商起謁諸鄭伯子産曰非官府之守器也寡君不知公孫揮謂子産曰晉國韓子未可偷也若屬有讒人交鬭其間鬼神而助之以興其凶怒悔之何及吾子何愛於一環子産曰吾非偷晉而有二心將終事之是以弗與大國之人皆獲其求將何以給之一共一否為罪滋大無禮以斥之何厭之有吾且為鄙邑出一玉而失吾位韓子成貪將焉用之起私覲於子産以玉與馬曰子命起舍夫玉是賜我玉而免吾死也敢不藉手以拜楚王聞蠻氏之亂也與蠻子之無質也使鄭丹誘戎蠻子嘉殺之遂取蠻氏既而復立其子焉晉歸魯侯子服回語季孫曰晉公室將遂卑矣君幼弱六卿强而奢傲將因是以習習實為常能無卑乎晉侯薨子去疾嗣魯大雩鄭大旱晉葬其君魯季孫意如如晉㑹葬歸語人曰子服回之言猶信子服氏有子哉經曰十有六年春齊侯伐徐楚子誘戎蠻子殺之楚子之誘一也或名或不名者䖍欲滅中國而棄疾討蠻氏謹夷華之辨也蔡侯與蠻子之見殺一也或名或不名者蔡般弒父與君蠻氏亂而無質其罪之輕重差矣夏公至自晉左氏曰公如晉平丘之㑹故也至是始歸者晉人止公其不書諱之也昭公數朝于晉三至于河而不得入兩得見晉侯又欲討其罪而止旃其困辱大甚矣在易之困曰困亨者因困窮而至亨也夫困於心衡於慮而後作徵於色發於聲而後喻此正憤悱自强之時而夏少康衛文公越勾踐燕昭王四君子者由此其選也今昭公安於危辱無激昻勉勵之志所謂自暴自棄不可與有為而人亦莫之告矣不亦悲乎諱而不書深貶之也秋八月己亥晉侯夷卒九月大雩季孫意如如晉冬十月葬晉昭公二十年小邾子朝于魯四月甲戍朔日有食之魯祝史請所用幣叔孫婼曰日食天子不舉伐鼓於社諸侯用幣于社伐鼓于朝季孫意如曰惟正月朔慝未作日有食之於是乎有伐鼓用幣其餘則否太史曰在此月也日過分而未至三辰有災於是乎百官降物君不舉辟移時樂奏鼓祝用幣史用辭故夏書曰辰弗集于房瞽奏鼓嗇夫馳庶人走此月朔之謂也當夏四月是謂孟夏意如弗從婼退曰夫子將有異志不君君矣郯子朝于魯魯侯與之宴叔孫婼問焉曰少皥氏鳥名官何故郯子曰我髙祖少皥摯之立也鳳鳥適至故紀於鳥為鳥師而鳥名孔丘聞之見郯子而學焉既而告人曰吾聞之天子失官學在四夷猶信諸戎自轘轅之東在河南山北者其種滋廣甚睦於楚晉侯使屠蒯來聘請有事於洛與三塗萇𢎞曰客容猛非祭也其伐戎乎荀吳帥師涉自棘津使祭史先用牲于洛潛師從之遂滅陸渾之戎數之以其二於楚也陸渾子奔楚其衆奔甘鹿有星孛入于大辰西及漢魯申須曰彗所以除舊布新也天事恆象今除於火火出必布焉諸侯其有火災乎梓慎曰若火其宋衛陳鄭乎宋大辰之虛也陳太皥之虗也鄭祝融之虗也皆火房也星孛及漢漢水祥也衛顓頊之虗故為帝丘其星為大水水火之牡也鄭禆竈言於子産曰宋衛陳鄭將同日火若我用瓘斚玉瓉鄭必不火子産弗與吳伐楚陽丐為令尹卜戰不吉司馬魴曰我得上流何故不吉戰于長岸魴先死楚師繼之大敗吳師獲其乘舟餘皇吳公子光曰喪先王之乘舟豈惟光之罪衆亦有焉乃使長鬛者三人潛伏舟側曰我呼餘皇則對師夜從之三呼皆迭對楚師亂吳人大敗之取餘皇以歸經曰十有七年春小邾子來朝夏六月甲戌朔日有食之秋郯子來朝八月晉荀吳帥師滅陸渾之戎林父之於潞氏士㑹之於甲氏荀吳之於陸渾戎皆滅之也林父士㑹稱人荀吳舉其名氏何哉夷不亂華陸渾之戎密邇王室而縱之雜處則非膺戎狄别內外之義也輿闢土服逺以圖强霸則異矣然舉其名氏非褒詞也才得無貶耳則窮兵於逺虗內事外者可知矣冬有星孛於大辰大辰心也心為明堂天子之象其前星太子後星庶子孛星加心象天子嫡庶將分爭也後五年景王崩王室亂劉子單子立王猛尹氏召伯立子朝歷數載而後定至哀十三年有星孛于東方不言宿名者不加宿也當是時吳人僣亂馮陵上國日敝於兵暴骨如莽其戾氣所感固將壅吳而降之罰也故氛祲所指在于東方假手越人吳國遂滅天之示人顯矣史之有占明矣楚人及吳戰于長岸言戰不言敗勝負敵也楚地五千里帶甲數十萬戰勝諸侯威服天下本非吳敵也惟不能去讒賤貨使費無極以讒勝囊瓦以貨行而䇿士竒才為敵國用故日以侵削至父之師七國皆敗柏舉之戰國破君奔幾於亡滅吳日益強而楚削矣是故為國必以得賢為本勸賢必以去讒賤貨為先不然雖廣土衆民不足恃也考其所書本末强弱之由其為後世戒明矣二十一年曹伯薨子午嗣三月壬午火始昏見戊寅風甚壬午火甚宋衛陳鄭火子産辭晉公子公孫于門外使司冦出新客禁舊客勿出於宫使子寬子上巡羣屏攝至于大宫使公孫登徙大龜使祝史徙主祏於周廟告於先君使府人庫人各警其事商成公警司宫出舊宫人置諸火所不及司馬司冦别居火道行火所焮城下之人伍列登城明日使野司冦各保其徴郊人助祝史除於國北禳火于𤣥𡨕回祿祈于四鄘書焚室而寬其征與之材三日哭國不市使行人告於諸侯宋衛皆如是陳不救火許不弔災君子是以知陳許之先亡也禆竈曰不用吾言鄭又將火鄭人請用之子産不可游吉曰寶以保民也若有火國幾亡可以救亡子何愛焉子産曰天道逺人道邇非所及也何以知之竈焉知天道是亦多言矣豈不或信遂不與亦不復火鄅人藉稻邾人襲鄅鄅人將閉門邾人羊羅攝其首焉遂入之盡俘以歸鄅子曰余無歸矣從帑于邾邾子反其夫人而舍其女曹葬其君魯人㑹之見周原伯魯焉與之語不說學閔子馬曰周其亂乎夫必多有是說而後及其大人大人患失而惑又曰可以無學則茍而可於是乎下陵上替能無亂乎夫學殖也不學將落原氏其亡乎楚左尹王子勝言於楚王曰許於鄭仇敵也而居楚地以不禮於鄭晉鄭方睦鄭若伐許而晉助之楚喪地矣君盍遷許許不專於楚鄭方有令政許曰余舊國也鄭曰余俘邑也葉在楚方城外之蔽也土不可易國不可小許不可俘仇不可啓君其圖之王說使遷許於白羽王將廢小錢鑄大錢單穆公曰古者民患輕則作重幣以行之為母權子若不堪重則作輕而行之亦不廢重為子權母小大利之今廢輕而作重民失其資能無匱乎絶民用以實王府猶塞川源而為潢汙竭無日矣經曰十有八年春王三月曹伯須卒夏五月壬午宋衛陳鄭災按左氏鄭災子産臨事而備至于焚室而寬其征與之材三日哭國不市使行人告于諸侯宋衛皆如是陳不救火許不弔災君子以是知陳許之先亡也初禆竈言于子産宋衛陳鄭將同日火若我用瓘斚玉瓉鄭必不火子産弗與及鄭既哭竈曰不用吾言鄭又將火鄭人請用之子産不可曰天道逺人道邇非所及也何以知之亦不復火禆竈所言蓋以象推非妄也而鄭不復大者子産當國方有令政此以德消變之驗矣是知吉凶禍福固有可移之理古人所以必先人事而後言命也六月邾人入鄅秋葬曹平公冬許遷于白羽二十二年甲午鄅夫人宋向戍之女也向寧請師宋公伐邾圍蟲取之乃盡歸鄅俘許男瘧飲世子止之藥薨世子曰我與夫弒者不立乎其位以國與其弟斯遂奔晉哭泣啜飦粥嗌不容粒未踰年而死魯地震齊髙發帥師伐莒莒子奔紀鄣使孫書伐之初莒有婦人莒子殺其夫已為嫠婦及老託于紀鄣紡焉以度而去之及師至則投諸外師夜縋而登莒子懼啓西門而出齊師入紀許葬其君楚王使伍舉子奢為太子建師費無極為少師無寵言於王曰建可室矣王為之聘于秦而美無極與逆勸王取之王從之無極又曰晉之伯也邇於諸夏而楚僻陋故弗能與爭若大城城父而置太子焉以邇北方王收南方是得天下也王從之楚城州來沈尹戌曰昔吳滅州來王以未撫吾民不忍報也今亦如之而城以挑吳能無敗乎侍者曰王施舍不倦息民五年矣戌曰吾聞撫民者節用於內樹德於外民樂其性而無冦仇今宫室無量民人日駭勞罷死轉忘寢與食非撫之也其敗必矣楚陽丐言吳蹶由於楚王曰彼何罪諺所謂室於怒而市於色者楚之謂矣乃歸蹶由經曰十有九年春宋公伐鄅按左氏宋公伐邾圍蟲取之而經不書圉與取何也初鄅人藉稻邾人襲鄅盡俘之鄅子曰余無歸矣從帑於邾邾子反其夫人而舍其女夫人宋向戌之女也故向寧請師圉蟲取之盡歸鄅俘此所謂聲罪執言之兵歸鄅之俘其善意也故書伐邾而釋其取邑之罪此亦善善長惡惡短之義也夏五月戊辰許世子弒其君買按左氏許悼公瘧戊辰飲世子止之藥卒弒其君者止不嘗藥也古者醫不三世不服其藥夫子之所慎者三疾居其一季康子饋藥曰丘未逹不敢嘗敬慎其身如此也而於君父可忽乎君有疾飲藥臣先嘗之父有疾飲藥子先嘗之蓋言慎也止不擇醫而輕用其藥藥不先嘗而誤進於君是有忽君父之心而不慎矣自小人之情度之世子弒君欲速得其位而止無此心故曰我與夫弒者不立乎其位哭泣歇飦粥嗌不容粒未逾年而卒無此心故被以大惡而不受自君子聽之止不嘗藥是忽君父之尊而不慎也而止有此心忽君父之尊而不慎此篡弒之盟堅冰之漸而春秋之所謹也有此心故加以大惡而不得辭書許世子止弒君乃除惡於微之意也而或者故以操創而殺與不躬進藥及進藥而不嘗三者罪當殊科疑於三傳之說則誤矣必若此言夫人而能為春秋奚待於聖筆乎墨翟兼愛豈其無父楊朱為我豈其無君子輿氏辭而闢之以為禽獸逼人人將相食後世推明其功不在禹下未有譏其過者知此說則知止不嘗藥春秋以為弒君之意也己卯地震秋齊髙發帥師伐莒冬葬許悼公何以書葬穀梁子曰不使止為弒父也其說曰子既生不免乎水火母之罪也羈貫成童不就師傅父之罪也就師學問無方心志不通身之罪也心志既通而名譽不聞友之罪也名譽既聞有司不舉有司之罪也有司舉之王者不用王者之過也許世子止不知嘗藥纍及許君也觀止自責可謂有過人之質也乃至以弒君獲罪此為人世子而不知春秋之義也古者太子自其初生固舉以禮有司端冕見之南郊過闕則下過廟則趨為赤子而其教已有齊肅敬慎之端矣此春秋訓臣子除惡於微積善於早之意也二十三年衛孟縶狎齊豹豹見宗魯焉以為驂乘縶奪豹司冦與鄄有役則反之無則取之又惡北宫喜禇師圃欲去之三子將作亂豹謂魯曰縶之不善子所知也勿與乘吾將殺之對曰吾由子事公孟子假吾名焉故不吾逺也雖其不善吾亦知之抑以利故不能去是吾過也今聞難而逃是僣子也子行事乎吾將死之以周事子公孟有事於蓋獲之門外齊氏伏甲擊之宗魯蔽之皆死衛侯聞亂載寶以出北宫氏之宰不與聞謀伐齊氏滅之衛侯入與喜盟圃出奔晉琴張聞宗魯死將往弔之孔仲尼曰齊豹之盜而孟縶之賊女何弔焉君子不食姦不受亂不為利疚於回不以回待人不蓋不義不犯非禮宋公無信多私而惡華向大司徒華定華亥與向寧謀曰亡愈於死先諸亥誘執羣公子寅御戎朱固公孫援公孫丁殺之拘向勝向行公往請焉亥劫公取世子欒母弟辰公子地公亦取亥之子無戚寧子羅定子啓相為質公子成出奔晉亥與其妻必盥而食所質公子而後食公與夫人每日必適華氏食公子而後歸亥患之欲歸公子寧曰惟不信故質其子若又歸之死無日矣公請於司馬華費遂將攻華氏對曰臣不敢愛死無乃求去憂而滋長乎公曰子死亡有命余不忍其詬遂殺三子而攻之寧欲殺世子亥曰干君而出又殺其子其誰納我且歸之有庸使庶兄少司寇牼以歸華向奔陳公使牼復其所九月蔡侯薨子朱嗣費無極言於楚王曰建與位奢將以方城之外叛自以為猶宋鄭也齊晉又將輔之將以害楚王召問奢對曰君一過多矣何信於讒王執之使司馬奮揚殺建建奔宋奮揚歸王曰言出余口而入於爾耳誰告建也對曰君王初命臣曰事建如事余臣不佞不能茍二奉初以還不忍後命故遣之王曰而敢來何也對曰使而失命召而不來是再姦也逃無所入王曰歸從政如它日無極曰奢之子材若在吳必憂楚國盍以免其父召之彼仁必來不然將為患王使召之曰來吾免而父棠君尚謂其弟員曰爾適吳我將歸死吾知不逮我能死爾能報聞免父之命不可以莫之奔也親戚為戮不可以莫之報也奔死免父孝也度功而行仁也擇任而往智也知死不辟勇也爾其勉之奢聞員不來曰楚君大夫其旰食乎楚人皆殺之員從世子建於宋道逢其友申包胥曰我必覆楚國申包胥曰子能覆之我必能興之自宋之晉晉謀滅鄭鄭人殺建員與建子勝奔吳言伐楚之利公子光者諸樊子也嘗曰以兄弟次耶季子當立必以子乎則光真適嗣光素聞員之材欲與謀吳王則陽沮之曰是宗為戮而欲反其讐不可從也員心悟曰公子將有它志余姑為之求士見鱄設諸焉而耕於鄙齊侯疥遂痁期而不瘳諸侯之賔問疾者多在梁丘據曰吾事鬼神豐於先君有加矣今君疾病是祝史之罪也諸侯不知其謂我不敬君盍誅於祝固史嚚以辭賔公告晏嬰對曰日宋之盟楚屈建問士㑹之德於趙武武曰夫子之家事治言於晉國無隱情其祝史祭祀陳信不愧其家事無猜其祝史不祈建以語康王王曰神人無怨宜夫子之光輔五君以為盟主也公曰子稱是語何故對曰若有德之君外內不廢上下無怨動無違事其祝史薦信無愧心矣是以鬼神用享國受其福其遇淫君從欲厭私肆行非度無所還忌神怒民痛其祝史薦信是言罪也其蓋失數美是矯誣也進退無辭則虛以求媚是以鬼神不饗其國以禍之今山林之木衡鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞候守之海之鹽蜃祈望守之縣鄙之人入從其政逼介之關暴征其私承嗣大夫强易其賄布常無藝徴斂無度宫室日更淫樂不違內寵之妾肆奪於市外寵之臣僭令於鄙私欲養求不給則應人民苦病夫婦皆詛祝有益也詛亦有損固嚚之祝豈能勝億兆之詛乎惟修德而後可齊侯使有司寬政毁關去禁薄斂已責它日齊侯田于沛招虞人以弓不進將殺之辭曰先君之田也旃以招大夫弓以招士皮冠以招虞人臣故不敢進乃舍之孔仲尼曰守道不如守官君子韙之齊侯至于遄臺晏子侍梁丘據造焉齊侯曰惟據與我和夫嬰對曰所謂和者君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否是以政平而不干民無爭心今據不然君所謂可亦曰可否亦曰否是亦同也焉得為和它日問於嬰曰忠臣事君若何對曰計謀見用國家安靖內不死難外不送亡凡不能納君於善而與君死亡者皆內臣也鄭子産疾謂游吉曰我死子必為政惟有德者能以寬服民其次莫如猛夫火烈民望而畏之故鮮死焉水懦弱民狎而玩之則多死焉子産卒孔仲尼聞之出涕曰古之遺愛也有君子之道四焉其行已也恭其事上也敬其養民也惠其使民也義又曰子産猶衆人之母也能食之而不能教也游吉為政不忍猛而寬於是多盜取人於萑苻之澤興兵戍之吉乃悔曰吾早從夫子不及此經曰二十年春王正月夏曹公孫會自鄸出奔宋奔未有言自者此其言自何劉敞曰待放也古者大夫有罪待放於其境三年君賜之環則復賜之玦則去踰境則為位向國而哭素衣裳冠不說人以無罪此去國之禮曹無大夫其曰公孫賢之也待放而後出奔臣子常禮免於貶足矣而何以賢之為公子喜時之後賢之也喜時者曹之社稷鎮公子能以國讓不取乎為諸侯所謂子臧是也春秋之義善善也長惡惡也短善善及子孫惡惡止其身以其賢者之後苟可善焉斯進之矣此舜典罰弗及嗣賞延于世之意也後世議者有乞録用賢者之類功臣之世蓋得春秋之㫖矣秋盜殺衛侯之兄縶左氏以為齊豹殺之也齊犳為衛司冦守嗣大夫其書為盜所謂求名而不得者也若艱難其身以險危大人而有名章徹攻難之士將奔走之臣竊以為仲尼書斷此獄罪在宗魯宗魯孟縶之驂乘也於法應書曰盜非求名而不得者也天下豈有欲求險危大人之惡名而聖人又靳此名而不與者哉然則齊豹者謀作亂宗魯雖預聞行事又以身死之矣今乃釋豹不誅而歸獄於宗魯不亦頗乎曰豹之不義夫人皆知之也若宗魯欲周事豹而死於公孟蓋未有知其罪者故琴張聞其死將往弔之仲尼曰齊豹之盜孟縶之賊汝何弔焉非聖人發其食姦受亂蓋不義犯非禮之罪書於春秋則齊豹所畜養之盜孟縶所見殺之賊其大惡隱矣冬十月宋華亥向寧華定出奔陳十有一月辛卯蔡侯廬卒二十四年蔡葬其君世子朱失位在卑魯人㑹葬者歸以語叔孫婼婼曰蔡其亡乎若不亡是君也不終詩曰不解于位民之攸塈今始即位而適卑身將從之晉士鞅聘于魯宋華費遂生三子貙為少司馬多僚與貙相惡乃譛諸公曰將納亡人公懼逐之其臣張丐殺多僚劫費遂而召亡人居盧門以南里叛宋城舊鄘及桑林之門而守之日食魯侯問禍福於梓慎對曰二至二分而食不為災日月之行也分同道也至相過也其他月則為災陽不克也故常為水魯叔輒卒宋華登以吳師救華氏齊烏枝嗚戍宋厨人濮曰軍志有之先人有奪人之心後人有待其衰盍及其勞且未定也伐諸若入而固則華氏衆矣悔無及也從之敗吳師于鴻口華登帥其餘以敗宋師宋公欲出厨人濮曰吾小人可藉死而不能送亡君請待之乃徇曰揚徽者公徒也衆從之濮以裳裹首而荷以走曰得華登矣遂敗華氏於新里公子城以晉師至曹翰胡㑹晉荀吳齊苑何忌衛公子朝救宋與華氏戰於赭丘走華氏圍諸南里華亥搏膺而呼見華貙曰吾為欒氏矣貙曰子無我廷不幸而後亡使華登如楚乞師楚王使薳越逆華氏太宰犯諌曰釋君而臣是助無乃不可乎王曰而告我也後既許之矣楚費無極取蔡侯叔父東國之貨而謂蔡人曰朱不用命於楚君王將立東國若不先從王欲楚必圍蔡蔡人懼出朱而立東國朱訴於楚王將討蔡無極曰平侯與楚有盟故封其子有二心故廢之靈王殺隱太子其子與君同惡德君必甚又使立之不亦可乎且廢置在君蔡無它矣魯侯如晉及河㑹鼓叛晉初荀吳以鼓子歸既獻而反之又叛於鮮虞晉以將伐鮮虞辭魯侯經曰二十有一年春王三月葬蔡平公夏晉侯使士鞅來聘宋華亥向寧華定自陳入于宋南里以叛按左氏初宋元公無信多私而惡華向三大夫謀曰亡愈於死先諸乃誘羣公子殺之公如華氏請焉弗許遂劫公取太子及其母弟以為質公怒攻之華向奔陳至是入于南里以叛凡書叛有入于戚者而不言衛有入于朝歌者而不言晉有入于蕭者而不言宋此獨稱宋南里何也戚與朝歌及蕭皆其所食私邑也若南里則宋國城內之里名也傳稱華氏居盧門南里以叛而宋城舊鄘及桑林門以守是華氏與宋分國而居矣故其入其出皆以南里繫之宋此深罪叛臣逼脅其君己甚之詞也秋七月朔壬午日有食之八月乙亥叔輒卒冬蔡侯朱出奔楚公如晉至河乃復皇王大紀卷五十八

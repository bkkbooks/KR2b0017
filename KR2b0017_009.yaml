body:
  text: 皇王大紀卷九宋胡宏撰三王紀武丁元祀王自為太子時能盡知人民之所好惡修聳其徳達於神明既即位宅憂諒隂論曰子張曰書云髙宗三年不言言乃雍有諸仲尼曰胡為其不然也古者天子崩王世子聽於冡宰三年蓋父子天性哭泣之哀齊衰之情饘粥之食自天子至於庶人一也古者天子崩天下之人無不服者愚觀漢紀惟文帝有孜孜愛民之心其將没也自愧徳薄無恩於百姓故令輕其服不欲使踈逺之人為不情之舉耳曷甞命太子曰爾毋喪我三年乎景帝能終身遵文帝之恭儉而不能有三年之愛遂比類從事以日易月輕蔑君父等於無服之殤何哉漢初貴黄老尚清淨景帝之為太子孝文未甞教之以禮也自是而後嗣子按為故常若晉武魏文徒能知母而不知父豈禮也哉後世欲復是禮者必君父明於大道了達死生深知仁政之必由是禮起也當天下安平春秋強盛之時講明是禮著為大典則倉卒之際可以按行而無疑矣三祀王悼先王數致祭祀祭於成湯有飛雉之異王使以雉為扇曰以彰吾過恭黙深思夢帝錫之以良弼命百工圖其形象營求於天下說築於傅巖之野惟肖王與之語果聖人立以為相開先祖之府取其明法以為君臣上下之節修政行徳天下讙洽王終身不敢荒寜嘉靖殷邦至於小大無時或怨鬼方暴亂興師伐之三年然後克重譯來朝者六國商書叙曰髙宗夢得說使百工營求諸野得諸傅巖作說命三篇說命上篇曰王宅憂諒隂三祀既免䘮其惟弗言羣臣咸諫于王曰嗚呼知之曰明哲明哲實作則天子惟君萬邦百官承式王言惟作命不言臣下罔攸禀令王庸作書以誥曰以台正於四方台恐徳弗類兹故弗言恭黙思道夢帝賚予良弼其代予言乃審厥象俾以形旁求於天下說築傅巖之野惟肖爰立作相王置諸其左右命之曰朝夕納誨以輔台徳若金用汝作礪若濟巨川用汝作舟楫若歳大旱用汝作霖雨啓乃心沃朕心若藥弗瞑眩厥疾弗瘳若跣弗視地厥足用傷惟暨乃僚罔不同心以匡乃辟俾率先王廸我髙后以康兆民嗚呼欽予時命其惟有終說復於王曰惟木從繩則正后從諫則聖后克聖臣不命其承疇敢不祗若王之休命說命中篇曰惟說命總百官乃進於王曰嗚呼明王奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民惟天聰明惟聖時憲惟臣欽若惟民從乂惟口起羞惟甲胄起戎惟衣裳在笥惟干戈省厥躬王惟戒兹允兹克明乃罔不休惟治亂在庶官官不及私昵惟其能爵罔及惡徳惟其賢慮善以動動惟厥時有其善䘮厥善矜其能䘮厥功惟事事乃其有備有備無患無啓寵納侮無恥過作非惟厥攸居政事惟醇黷於祭祀時謂弗欽禮煩則亂事神則難王曰㫖哉說乃言惟服乃不良於言予罔聞於行說拜稽首曰非知之艱行之惟艱王忱不艱允恊於先王成徳惟說不言有厥咎說命下篇曰王曰來汝說台小子舊學於甘盤既乃遯於荒野入宅於河自河徂亳暨厥終罔顯爾惟訓於朕志若作酒醴爾惟麴蘖若作和羮爾惟鹽梅爾交修予罔予棄予惟克邁乃訓說曰王人求多聞時惟建事學於古訓乃有獲事不師古以克永世匪說攸聞惟學遜志務時敏厥修乃來允懐於兹道積於厥躬惟斆學半念終始典於學厥徳修罔覺監於先王成憲其永無愆惟說式克欽承旁招俊乂列於庶位王曰嗚呼說四海之内成仰朕徳時乃風股肱惟人良臣惟聖昔先正保衡作我先王乃曰予弗克俾厥后惟堯舜其心愧耻若撻於市一夫不獲則曰時予之辜佑我烈祖格于皇天爾尚明保予㒺俾阿衡專美有商惟后非賢不乂惟賢非后不食其爾克紹乃辟於先王永綏民説拜稽首曰敢對揚天子之休命商書髙宗肜日越有雊雉祖已曰惟先格王正厥事乃訓于王曰惟天監下民典厥義降年有永有不永非天夭民民中絶命民有不若徳不聴罪天既孚命正厥徳乃曰其如台嗚呼王司敬民㒺非天𦙍典祀無豐於昵八祀甲子十八祀甲戌豕韋之後失道滅之以劉累之後代之二十八祀甲申三十八祀甲午四十八祀甲辰五十八祀甲寅五十九祀王崩天下號王為髙宗子祖庚立子張問於孔子曰書云髙宗三年不言言乃讙有諸仲尼曰胡為其不然也古者天子崩王世子聽於冡宰三年凡禮之大體體天地法四時則隂陽順人情者也天無二日土無二王國無二君家無二尊以一治之也故父在為母齊衰期者見無二尊也所以體天地也喪有四制變而從宜法四時也吉凶異道不得相干則隂陽也故麻者不紳執玉不麻麻不加於采有恩有理有節有權順人情也恩者仁也義者理也禮者節也權者智也其恩厚者其服重故為父斬衰三年貴貴尊尊義之大者也故為君亦斬衰三年始死三日不怠三月不觧期悲哀三年憂恩之殺也聖人因殺以制節三日而食粥三月而沐期十二月而練冠三年而祥䘮不過三年苴衰不補墳墓不培祥之日鼓素琴告民有終也三日受子杖五日受大夫杖七日受士杖輔病也婦人童子不杖不能病也百官備百物具不言而事行者扶而起言而後事行者杖而起身自執事而後行者面垢而已秃者不免不髽傴者不袒跛者不踊老病不止酒肉八者以權制者也賢者不得過不肖者不得不及此䘮之中庸也王者之所常行也書曰髙宗諒闇三年不言善之也王者莫不行此禮何以獨善之也曰髙宗者武丁武丁者殷之賢王也繼世即位而慈良於䘮當此之時殷衰而復興禮廢而復起故善之善之故載之書中而髙之故謂之髙宗三年之䘮君不言然而曰言不文者謂臣下也祖庚三祀商頌三篇曰𤣥鳥一章二十二句祀髙宗也天命𤣥鳥降而生商宅殷土芒芒古帝命武湯正域彼四方天命厥后奄有九有商之先后受命不殆在武丁孫子武丁孫子武王靡不勝任也龍旂十乘大糦是承邦畿千里惟民所止肇域彼四海四海來假來假祁祁景大也貟維河河何也殷受命咸宜百禄是荷商頌四篇曰長發七章一章八句四章章七句一章九句一章六句大禘也濬哲維商長發其祥洪水芒芒禹敷下土方外大國是疆幅隕既長有娀方將帝立子生商𤣥王桓大也撥治也受小國是達受大國是達率履不越遂視既發相土烈烈海外有截帝命不違至於湯齊湯降不遲聖敬日躋昭假遲遲上帝是祗帝命式于九圍受小球大球玉也為下國綴旒何負也天之休不競不絿急也不剛不柔敷政優優和也百禄是遒受小共大共為下國駿厖何天之龍敷奏其勇不震不動不戁不竦恐也百禄是總武王載斾有䖍秉鉞如火烈烈則莫我敢曷害也苞有三蘖莫遂莫達九有有截韋顧既伐昆吾夏桀昔在中葉世也有震且業危也允也天子降於卿士實維阿衡實左右商王商頌終五篇曰殷武六章三章章六句二章章七句一章五句祀髙宗也撻疾也彼殷武奮伐荆楚冞深也入其阻裒聚也荆之旅有截其所湯孫之緒維女荆楚居國南鄉昔有成湯自彼氐羌莫敢不來饗莫敢不來王曰商是常天命多辟設都於禹之績歳事來辟勿予禍適過也稼穡匪解天命降監下民有嚴不僣不濫不敢怠遑命于下國封建厥福商邑翼翼四方之極赫赫厥聲濯濯厥靈夀考且寧以保我後生陟彼景山松栢丸丸是斷是遷方斵是䖍松桷有梴旅楹有閑寢成孔安七祀王崩弟祖甲立祖甲二祀甲子惟王少年不義髙宗逺之居處困厄不得志作其即位爰知小人之依能保惠於庶民不敢侮鰥寡十二祀甲戌二十二祀甲申三十一祀初周古公亶父娶於齊有台氏女曰太姜美而賢生三子泰伯仲雍季歴能化導之皆成賢徳古公有事諮謀焉季歴天性㳟順二兄甚友愛之季歴娶於摯曰太任亦有賢徳目不視窈色耳不聽淫聲口不出惡言容貌㳟肅齊如也是年生子古公亶父視之曰我世當有興者其在斯乎名之曰昌昌之弟曰仲曰叔古公亶父薨泰伯仲雍承父之志亡之荆楚國人奉季歴為嗣三十二祀甲午王作盤盂諸書二十六篇以自警戒三十三祀王崩子廪辛立廪辛六祀王崩弟庚丁立庚丁三祀甲辰十三祀甲寅周季歴有謀能斷守正而和照臨無蔽勤施無私教誨不倦順以事上比以親民慶賞刑威政自己出四隣服焉以昌為世子娶於有莘氏曰大姒初昌在母不憂處師弗煩自㓜有成人之度為世子朝於季歴日三鷄初鳴而衣服至於大寢之門外問内豎之御者曰今日安否何如内豎曰安世子乃喜及日中又至亦如之及莫又至亦如之其有不安節則内豎以告世子世子色憂不滿容行不能正履内豎言復初然後亦復初朝夕之食上世子必在視寒煖之節食下問所膳羞必知所進命膳宰曰末有原應曰諾然後退若内豎言疾則世子親齊𤣥而養膳宰之饌必敬視之疾之藥必親甞之甞饌善則世子亦能食甞饌寡則世子亦不能飽以至於復初然後亦復初二十一祀王崩子武乙立武乙二祀甲子王復遷都河北暴虐不道為偶人謂之天神與之搏而辱之又為革囊盛血仰而射之謂之射天國内衰弊東夷寖盛分遷淮岱漸居中土時有為銘者曰嗛嗛之徳不足就也不可以矜而祗取憂也嗛嗛之食不足狃也不能為膏而祗罹咎也四祀獵於河渭之間震死子太丁立太丁元祀命周季歴為牧帥師伐始呼之戎又伐翳徒之戎獲其三大夫王嘉其功錫之圭瓉秬鬯為侯伯大雅五篇旱麓旱山名也麓山足也六章章四句受祖也周之先祖世修后稷公劉之業太王王季申以百福干禄焉瞻彼旱麓榛楛濟濟豈弟君子干禄豈弟瑟彼玉瓉黄流在中豈弟君子福禄攸降鳶飛戾天魚躍于淵豈弟君子遐不作人清酒既載騂牡既備以享以祀以介景福瑟衆貌彼柞棫民所燎矣豈弟君子神所勞矣莫莫葛藟施于條枚豈弟君子求福不回三祀太丁崩子帝乙立帝乙五祀甲戌十祀周季歴薨夀百歳世子昌嗣十二祀周侯昌之祭也事死者如事生思死者如不欲生忌日必哀稱諱如見親如欲色然祭之日樂與哀半饗之必樂已祭必哀十三祀周侯昌將大勸農桑乃先正經界以六尺為歩歩百為畆一夫一婦受田百畆為一井其方一里以百畆為公田八家皆私百畆同養公田是為徹法九夫為井井間有溝深廣四尺方十里為成成間有洫深廣八尺方百里為同同間有澮廣二尋深二仞仕者世禄關市譏而不征澤梁無禁罪人不孥老而無妻曰鰥老而無夫曰寡老而無子曰獨㓜而無父曰孤周侯發政施仁必先斯四者曰此天下之窮民而無告者也唐虞之世季連受芉姓其裔孫鬻熊年九十矣來見周侯周侯曰惜也老矣鬻熊曰使坐而策國事心尚壯也周侯問為政對曰君子能必用道而不能必見受能必忠而不能必見入能必信而不能必見信為天下福謂之道起天下疾謂之仁上下相親謂之和民不求而得謂之信四者帝王之器也昔之王者其明以吏其功以民其選吏也士民與則舉之苦則去之周侯以為師十五祀甲申二十五祀甲午三十五祀甲辰三十七祀帝乙崩庶長㣲子啓賢箕子勸王以為嗣王以其母賤不立也立適子受辛是為紂論曰堯舜與賢三王與嫡二帝三王同道惟所遇之時不同也堯舜之時中夏方開闢制度草創自非以聖繼聖則不能成功以貽萬世使丹朱足為中材之君猶不與也故商均無大過亦不得為天子而大禹以有天下及其末年制度已成雖中材之君輔之以賢者亦可以守矣聖人不世出徳賢無以大相過則定於與嫡所以一民心重天下也雖然大君人命所繫興亡之本聖人有權焉未甞執一也是以大甲雖嫡又有成湯之命而幾不免於廢武王雖弟上承文考之命而終不釋為君帝乙亦賢君也泥於立嫡而不知紂之足以亡天下也亦不慎不知變之過矣孔子作春秋鑒觀前代賢可與則以天下為官嫡可與則以天下為家此萬世無弊之法也使帝乙而知道商之卜世猶未可知矣皇王大紀卷九

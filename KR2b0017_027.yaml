body:
  text: 皇王大紀卷二十七宋胡宏撰三王紀康王祭祀曰自包羲氏教民養牲以薦神祇後聖有作為政於天下必本諸天殽以降命命降於社之謂殽地降於祖廟之謂仁義降於山川之謂興作降於五祀之謂制度有天下者祭百神是故天子祭天地祭四方祭山川祭五祀歲遍諸侯方祀祭山川祭五祀嵗遍在其地則祭之亡其地則不祭大夫祭五祀嵗遍士祭其先凡祭有其廢之莫敢舉也有其舉之莫敢廢也非其所祭而祭之名曰淫祀淫祀無福郊聖人因天事天因地事地因名山升中于天因吉土以饗帝于郊是故天子適四方先柴郊之祭也迎長日之至也大報天而主日配以月夏后氏祭其暗殷人祭其陽周人祭日以朝及暗祭日於壇祭月於坎以别幽明以制上下祭日於東祭月於西以别內外以端其位兆於南郊就陽位也掃地而祭於其質也器用陶匏以象天地之性也於郊故謂之郊牲用騂尚赤也特牲用犢貴誠也郊之用辛也周之始郊日以至卜郊受命於祖廟作龜于禰宫尊祖親考之義也卜之日王立於澤親聽誓命受教諌之義也孔子曰昔三代明王皆事天地之神明無非卜筮之用不敢以其私䙝事上帝是故不犯日月不違卜筮卜筮不相襲也大事有時日小事無時日有筮外事用剛日內事用柔日不違龜筮獻命庫門之內戒百官也大廟之命戒百姓也祭之日王皮辨以聽祭報示民嚴上也喪者不敢哭凶服者不敢入國門汜掃反道鄉為田燭弗命而民聽上祭之日王被衮以象天戴冕藻十有二則天數也乘素車貴其質也旗十有二旒龍章而設日月以象天也天埀象聖人則之郊所以明天道也帝牛不吉以為稷牛帝牛必在滌三月稷牛唯具萬物本乎天人本乎祖此所以配上帝也郊之祭也大報本反始也啓蟄而郊祈穀于上帝也禮之近人情者非其至者也郊血大饗腥三獻爓一獻孰至敬不享味而貴氣臭也是故至敬無文父黨無容祀帝於郊敬之至也至敬不壇故掃地而祭社社祭土而主隂氣也土發而社助時也君南鄉於北牖下答陽之義也日用甲用日之始也天子大社必受霜露風雨以達天地之氣也是故喪國之社屋之不受天陽也亳社北牖使隂明也社所以神地之道也地載萬物天垂象取財於地取法於天是以尊天而親地也故教民美報焉家主中霤而國主社示本也唯為社事單出里唯為社田國人畢作唯社丘乘共粢盛所以報本反始也季春出火為焚也然後簡其車賦而歷其卒伍而君親誓社以習軍旅左之右之坐之起之以觀其習變也而流示之禽而豔諸利以觀其不犯命也求服其志不貪其得故以戰則克以祭則受福天子社稷皆太牢諸侯社稷皆少牢論曰成身莫大於禮禮莫重於祭祭祀之禮所以立吾誠也鬼神之為物非他即吾之誠是矣王者繼天而為之子獨主萬化故祭天於郊祭地於社祭名山大川五祀各於其方後世禮失其傳論者不本於性命故秦禮八神以求仙人一曰天二曰地三曰兵四曰隂五曰陽六曰月七曰日八曰四時漢祠太一求神仙方士曰天神貴者太一太一佐曰五帝是皆不知鬼神之情狀方士家妄作儒者不取也及歷考儒者論祭天地之禮於天則有昊天上帝有五方帝有感生帝夫土不可以有二王而天可以有七帝乎於地則或立方澤或立方丘或立北郊與天敵體是猶家有二主也且子事父母父在為母齊衰期不敢亢其父者尊無二上故也王者父事天母事地而可崇地以抗天乎是故夫獨制義於其家而家道正矣君獨出令於其國而天下定矣天獨健而無息地道順承而無成而太極立矣王者以父事天立誠而精一其德故兆於南郊掃地而祭者昊天上帝而已天言其氣帝言其性也社祭土所以神地道也名山大川者寶貨財用之所出而四方之所依據也五祀者穀與水火金木也人所日用莫過五材不是之報而顧報行與門戶舉失輕重豈禮也哉禮之所貴貴其義也是故王者祭天以柴燎牲使氣上達語其精誠則謂之禋語其感格則謂之類語其方兆則謂之郊指事異名其實一也周禮乃專以禋祀歸之上帝以實柴歸之日月星辰以槱燎歸之司中司命風師雨師不以日月星辰一于天而以柴燎分為三多見其妄也又司中司命風師雨師說者以為星也上文既曰以實柴祀日月星辰則宜兼之矣夫日月猶可兼於星辰豈此四星而不可兼於日月乎其文乖次失禮之義蓋劉歆下逸宗廟生曰父曰母曰妻死曰考曰妣曰嬪祭王父曰皇祖考王母曰皇祖妣父曰皇考母曰皇妣夫曰皇辟禮有五經莫重於祭祭者自中出生於心也賢者之祭也必受其福福者備也無所不順之謂備忠臣以事其君孝子以事其親其本一也子之事親有三道焉養則觀其順也喪則觀其哀也祭則觀其敬而時也天子七廟左三昭右三穆與大祖之廟而七諸侯五廟山節藻棁復廟重檐刮楹達鄉反坫出尊崇坫康圭疏屏天子之廟飾也春祠夏禴秋嘗冬蒸夏殷宗廟之祭春曰礿夏曰禘禮不王不禘禘王者之大祭也王者禘其祖之所自出時祭曰禘則亂名也於是春更曰祠夏更曰禴諸侯祫及其太祖大夫士有大事省於君于祫及其髙祖三年一禘五年一祫大夫三廟士一廟有田則祭無田則薦凡祭祀張旅幕張尸次祭成喪者必有尸孫為王父尸所使為尸者於祭者子行也父北面而事之所以明子事父之道也孫幼則使人抱之無孫則取於同姓之適孔子曰尸冕辨而出卿大夫士皆下之君知所以為尸者則自下之尸必式乘必以几必有前驅君與尸行接武大夫繼武士中武徐趨皆用是疾趨則欲發而手足毋移及時將祭君子乃齊散齊七日致齊三日齊者不樂不弔不敢散其志也精明之至然後可以交神明是故先期旬有一日宫宰宿夫人夫人亦散齊七日致齊三日君子生則敬養死則敬享致愛則存致慤則著唯聖人為能饗帝孝子為能饗親三月繫七日齊三日宿慎之至也君致齊於外夫人致齊於內然後㑹於太廟鋪筵設同几為依神也天道至教聖人至德廟堂之上罍尊在阼犧尊在西廟堂之下縣鼓在西應鼓在東君西酌犧象夫人東酌罍尊君衮冕立於阼夫人副禕立於東房夫祭必夫婦親之所以備外內之官也官備則具備水草之菹陸産之醢三牲之俎八簋之實昆蟲之異草木之實天之所生地之所長茍可薦者莫不咸在示盡物也外則盡物內則盡志此祭之心也君迎牲而不迎尸别嫌也尸在廟門外則疑於臣在廟中則全於君君在廟門外則疑於君入廟門則全於臣全於子是故不出者明君臣之義也崇事宗廟社稷則子孫順孝祭者教之本也是故君子之事君也必身行之所不安於上則不以使下所惡於下則不以事上非諸人行諸己非教之道也君執圭瓉祼尸大宗執璋瓉亞祼及迎牲君執紖卿大夫贊幣而從士執芻宗婦執盎從夫人奠盎薦涗水君執鸞刀羞嚌君獻尸夫人薦豆執校執醴授之執鐙君親制祭夫人薦盎君親割牲夫人薦酒卿大夫從君命婦從夫人尸酢夫人執柄夫人受尸執足夫婦相授受不相襲處酢必易爵明夫婦之别也洞洞乎其敬也屬屬乎其忠也勿勿乎其欲其饗之也納牲詔於庭血毛詔於室羮定詔於堂三詔皆不同位蓋道求而未之得也設祭于堂為祊乎外故曰於彼乎於此乎或曰君牽牲穆答君卿大夫序從既入廟門麗于碑卿大夫袒而毛牛尚耳鸞刀以刲取膟膋乃退爓祭祭腥而退敬之至也又曰𤣥酒在室醴盞在戶粢醍在堂澄酒在下陳其犧牲備其鼎俎列其琴瑟管磬鼓鐘修其祝嘏以降上神與其先祖以正君臣以篤父子以睦兄弟以齊上下夫婦有所是謂承天之祜作其祝號𤣥酒以祭薦其血毛腥其爼孰其殽與其越席疏布以幂衣其浣帛醴盞以獻薦其燔炙君與夫人交獻以嘉魂魄是謂合莫然後退而合烹體其犬豕牛羊實其簠簋籩豆鉶羮祝以孝告嘏以慈告是謂大祥此禮之大成也又曰及入舞君執干戚就舞位君為東上冕而總干率其羣臣以樂皇尸禮交動乎上樂交應乎下和之至也禮也者反其所自生樂也者樂其所自成是故聖王制禮以節事修樂以道志夫祭有三重焉獻之屬莫重於祼聲莫重於聲歌舞莫重於武宿夜此周道也凡三道者所以假於外而以增君子之志也有事於太廟則羣昭羣穆咸在凡賜爵昭為一穆為一昭與昭齒穆與穆齒及羣有司皆以齒所以别父子逺近長幼親疏之序而無亂也古者明君爵有德祿有功必於大廟故祭之日一獻君降立于阼階之南南鄉所命北面史由君右執䇿命之再拜稽首受書以歸而舍奠於其廟此爵賞之施也凡為俎者以骨為主骨有貴賤殷人貴髀周人貴肩凡前貴於後俎者所以明祭之必有惠也是故貴者取貴骨賤者取賤骨貴者不重賤者不虛示均也羔豚而祭百官皆足太牢而祭不必有餘惠均則政行事成而功立矣餕者祭之末也善終者如始餕其是已君子曰尸亦餕鬼神之餘也惠術也可以觀政矣是故尸謖君與卿四人餕君起大夫六人餕大夫起士八人餕士起各執其具以出陳於堂下百官進徹之所以别貴賤之等而興施惠之象也是故以四簋黍見其修於廟中也廟中者竟內之象也故曰可以觀政矣又曰尸飲三君洗玉爵獻卿尸飲七以瑶爵獻大夫尸飲九以散爵獻士及羣有司是故貴者獻以爵一升賤者獻以散五升尊者舉觶三升卑者舉角四升明尊卑之等也輝胞翟閽者吏之至賤者也尸又至尊以至尊既祭之末不忘至賤而以其餘畀之此之謂上下之際又曰有虞氏之祭也尚用氣血腥爓祭用氣也殷人尚聲臭味未成滌蕩其聲樂三闋然後出迎牲周人尚臭灌用鬯臭鬱合鬯臭隂達於淵泉灌以圭璋用玉氣也既灌然後迎牲致隂氣也蕭合黍稷臭陽達於牆屋故既奠然後焫蕭合羶薌几祭慎諸此魂氣歸于天形魄降于地故祭求諸隂陽之義也殷人先求諸陽周人先求諸隂詔祝於室坐尸於堂用牲於庭升首於室直祭祝于主索祭祝于祊不知神之所在於彼乎於此乎或逺諸人乎祭于祊尚曰求諸逺者歟是故詔祝於室而出于祊此神明之道也有虞氏祭首夏后氏祭心殷祭肝周祭肺血毛告幽全之物也貴純之道也血祭盛氣也祭肺肝心貴氣主也祭黍稷加肺祭齊加明水報隂也取膟膋燔燎升首報陽也明水涗齊貴新也其謂之明水也由主人之潔著此水也縮酌用茅明酌也盞酒涗于清汁獻涗于盞酒凡涗新之也君再拜稽首肉袒親割敬之至也祭稱孝子孝孫以其義稱也稱曾孫某謂國家也祭祀之相主人自致其敬盡其嘉而無與讓也腥肆爓腍祭豈知神之所饗主人自盡其敬而已矣舉斚角詔妥尸古者尸無事則立有事而後坐也夏立尸而卒祭殷坐尸周旅酬六尸尸神象也祝將命也凡祭宗廟之禮牛曰一元大武豕曰剛鬛豚曰腯肥羊曰柔毛雞曰翰音犬曰羮獻雉曰疏趾兔曰明視脯曰尹祭槀魚曰商祭鮮魚曰脡祭水曰清滌酒曰清酌黍曰薌合梁曰薌萁稷曰明粢稻曰嘉蔬韭曰豐本鹽曰鹹鹺玉曰嘉玉幣曰量幣犧尊疏布幂禪杓大路素而越席黃目鬱氣之上尊也黃者中也目者氣之清明者也言酌於中而清明於外也醯醢之美而煎鹽之尚貴天産也割刀之用鸞刀之貴貴其義也聲和而後斷也酒醴之美𤣥酒明水之尚貴五味之本也黼黻之美疏布之尚反女功之始也莞簟之安而蒲越槀鞂之設明之也大羮不和貴其質也大圭不琢美其質也丹漆雕幾之美素車之乘尊其朴也貴其質而已矣所以交於神明者不敢同於所安䙝之義也君子曰禮之近人情者非其至者也郊血大饗腥三獻爓一獻孰是故君子之於禮也非作而致其情也此有由始也是故七介以相見也不然則已慤三辭三讓而至不然則已蹙故禮有擯詔樂有相步溫之至也禮也者反本修古不忘其初者也故凶事不詔朝事以樂孔子曰七日戒三日齊承一人焉以為尸過之者趨以教敬也醴酒在室醍酒在堂澄酒在下示民不淫也尸飲三衆賔飲一示民有上下也因其酒肉聚其宗族教民睦也故堂上觀乎室堂下觀乎上是故見事鬼神之道焉見君臣之義焉見父子之親焉見夫婦之别焉見長幼之敘焉見上下之際焉見貴賤之等焉見親疏之殺焉見爵賞之施焉見政事之均焉是之謂十倫記曰夏后氏尚明水殷尚醴周尚酒尊有虞氏曰泰夏后氏曰山罍殷曰著周曰犧象爵夏后氏以盞殷以斚周以爵灌尊夏后氏以雞彛殷以斚周以黃目勺夏后氏以龍勺殷以疏勺周以蒲勺鼓夏后氏之鼓足殷楹鼓周縣鼓夏后氏之龍簨簴殷之崇牙周之壁翣敦有虞氏之兩敦夏后氏之四璉殷之六瑚周之八簋俎有虞氏以梡夏后氏以嶡殷以椇周以房豆夏后氏揭豆殷玉豆周獻豆凡天子以犧牛諸侯以肥牛大夫以羊豕天地之牛角繭栗宗廟之牛角握賔客之牛角尺諸侯無故不殺牛大夫無故不殺羊士無故不殺犬豕庶人薦於寢春薦韭夏薦麥秋薦黍冬薦稻韭以卵麥以魚黍以豚稻以鴈庶人無故不食珍庶羞不踰牲燕衣不踰祭服寢不踰廟祭豐年不奢凶年不儉凡喪從死者祭從生者父為士子為天子諸侯則祭以天子諸侯其尸服以士父為天子諸侯子為士祭以士其尸服以士祭容貌顔色如見所祭者成廟則釁之以羊與雞成寢則考之而不釁凡宗廟之器其名者成則釁之以豭豚釁者交神明之道也臨祭不惰祭服敝則焚之祭器敝則埋之龜策敝則埋之牲死則埋之為人祭曰致福為已祭而致膳於君子曰膳祔練曰告凡膳告於君子主人展之以授使者于阼階之南南面再拜稽首送反命主人又再拜稽首其禮太牢則以牛左肩臂臑折九箇少牢則以羊左肩七箇犆豕則以豕左肩五箇君子將營宫室宗廟為先廄庫為次居室為後凡家造祭器為先犧賦為次養器為後無田祿者不設祭器有田祿者先為祭服為宫室不斬於丘木曾子問於孔子曰天子嘗禘郊社五祀之祭簠簋既陳天子崩后之喪則如之何孔子曰廢如當祭而日食太廟火則如之何曰接祭而已矣如牲至未殺則廢天子崩未殯五祀之祭不行既殯而祭其祭也尸入三飯不侑酳不酢而已矣自啓至于反哭五祀之祭不行已葬而祭祝畢獻而已諸侯之祭社稷俎豆既陳聞天子崩后之喪君薨夫人之喪則廢自薨比至于殯自啓至于反哭奉帥天子大夫之祭鼎爼既陳籩豆既設天子崩后之喪君薨夫人之喪君之太廟火日食三年之喪齊衰大功皆廢外喪自齊衰以下行也其齊衰之祭也尸入三飯不侑酳不酢而已矣大功酢而已矣小功緦室中之事而已矣士之所以異者緦不祭所祭於死者無服則祭大夫士將與祭於公既視濯而父母死則猶是與於祭也次於異宫既祭釋服出公門哭而歸入奔喪禮如未視濯則使人告告者反而後哭如諸父昆弟姑姊妹之喪既宿則與祭卒事而後歸如同宫則次于異宫卿大夫將為尸於公受宿矣而有齊衰內喪則出舍于公館以待事大夫冕而祭於公辨而祭於己士辨而祭於公冠而祭於己士辨而親迎然則士辨而祭可也君子之祭也必身親涖之有故則使人可也祭不欲數數則煩煩則不敬祭不欲疏疏則怠怠則忘是故霜露既降君子履之必有悽愴之心雨露既濡君子履之必有怵惕之心君子合諸天道春禴秋嘗春饗孤子秋食耆老其義一也凡飲養陽氣也食養隂氣也樂以迎來哀以送往故饗禴有樂而食嘗無樂隂陽之義也禮樂曰樂者音之所由生也凡音之起由人心之感於物也感於物而動故形於聲聲相應故生變變成方謂之音比音而通於倫理謂之樂是故其哀心感者其聲噍以殺其樂心感者其聲嘽以緩其喜心感者其聲發以散其怒心感者其聲粗以厲其敬心感者其聲直以亷其愛心感者其聲和以柔六者非性也感於物而後動故先王慎所以感之者故禮以道其志樂以和其聲政以一其行刑以防其姦禮樂刑政其極一也是故治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困聲音之道與政通矣宫為君商為臣角為民徴為事羽為物五者不亂則無怗懘之音矣宫亂則荒其君驕商亂則陂其臣壞角亂則憂其民怨徴亂則哀其事勤羽亂則危其財匱五者皆亂迭相陵謂之慢如此則國之滅亡無日矣是故知聲者可與言音知音者可與言樂知樂則幾於禮矣樂之隆非極音也食饗之禮非致味也清廟之瑟朱弦而疏越一倡而三歎有遺音者矣大饗之禮尚𤣥酒而俎腥魚大羮不和有遺味者矣是故先王之制禮樂也非以極口腹耳目之欲也將以教民平好惡而反人道之正也人生而靜天之性也感物而動性之欲也物至知知然後好惡形焉好惡無節於內知誘於外不能反躬天理滅矣於是有悖逆詐僞之心有淫佚作亂之事是故先王制禮樂人為之節禮節民心樂和民聲仁以愛之義以正之如此則民治行矣樂由中出禮自外作樂由中出故靜禮自外作故文大樂必易大禮必簡易故與天地同和簡故與天地同節和故百物不失節故祀天祭地明則有禮樂幽則有鬼神如此則四海之內合敬同愛矣禮者殊事合敬者也樂者異文合愛者也禮樂之情同故明王以相沿也故事與時並名與功偕鐘鼓管磬羽籥干戚樂之器也屈伸俯仰綴兆舒疾樂之文也簠簋俎豆制度文章禮之器也升降上下周旋禓襲禮之文也知禮樂之情者能作識禮樂之文者能述樂者天地之和也禮者天地之序也和故百物皆化序故羣物皆别樂由天作禮以地制過制則亂過作則暴明於天地然後能興禮樂也王者功成作樂治定制禮其功大者其樂備其治辨者其禮具干戚之舞非備樂也孰亨而祀非達禮也五帝殊時不相沿樂三王異世不相襲禮敦樂而無憂禮備而不偏者其惟大聖乎天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉春作夏長仁也秋斂冬藏義也仁近於樂義近於禮樂者敦和率神而從天禮者别宜居鬼而從地故聖人作樂以應天制禮以配地禮樂明備天地官矣化不時則不生男女無辨則亂升天地之情也樂著太始而禮居成物著不息者天也著不動者地也一動一靜者天地之間也昔者舜作五絃之琴以歌南風夔始制樂以賞諸侯德盛而教尊五穀時熟然後賞之以樂故其治民勞者其舞行綴逺其治民逸者其舞行綴短故觀其舞知其德聞其諡知其行也故酒食者所以合歡也樂者所以象德也禮者所以綴淫也先王有大事必有禮以哀之有大福必有禮以樂之哀樂之分皆以禮終樂也者聖人之所樂也而可以善民心故先王著其教焉土敝則草木不長水煩則魚鱉不大氣衰則生物不遂世亂則禮慝而樂淫是故其聲哀而不莊樂而不安慢易以犯節流湎以忘本廣則容姦狹則思欲感條暢之氣而滅平和之德君子反情以和其志比類以成其行姦聲亂色不留聰明淫樂慝禮不接心術惰慢邪辟之氣不設於身體使耳目鼻口心知百體皆由順正以行其義然後發以聲音而文以琴瑟動以干戚飾以羽旄從以簫管清明象天廣大象地終始象四時周旋象風雨五色成文而不亂八風從律而不姦百度得數而有常小大相成終始相生倡和清濁迭相為經故樂行而倫清耳目聰明血氣和平移風易俗天下皆寧故曰樂者樂也君子樂得其道小人樂得其欲以道制欲則樂而不亂以欲忘道則惑而不樂樂者心之動也聲者樂之象也君子動其本樂其象然後治其文采節奏是故三鼓以警戒三步以見方再始以著往復亂以飭歸奮疾而不拔極幽而不隱獨樂其志備舉其道樂行而民鄉方可以觀德矣夫樂者樂也人情之所不能免也樂必發於聲音形於動靜故先王制雅頌之聲以道之使其聲足樂而不流使其文足論而不息使其曲直繁瘠廉肉節奏足以感動人之善心而已矣不使放心邪氣得接焉故聽其雅頌之聲志意得廣焉執其干戚習其俯仰詘伸容貌得莊焉行其綴兆要其節奏行列得正焉進退得齊焉故樂者天地之命中和之紀人情之所不能免也樂也者情之不可變者也禮也者理之不可易者也和順積中而英華發外者也黃鍾大吕弦歌干揚者樂之末節也故童者舞之鋪筵席陳尊俎列籩豆以升降為禮者禮之末節也故有司掌之樂師辨乎聲詩故北面而弦宗祝辨乎宗廟之禮故後尸商祝辨乎喪禮故後主人是故德成而上藝成而下行成而先事成而後是故先王有上有下有先有後然後可以有制於天下也君子曰禮樂不可斯須去身致樂以治心則易直子諒之心油然而生生則樂樂則安安則久久則天天則神天則不言而信神則不怒而威致禮以治躬則莊敬莊敬則嚴威心中斯須不和不樂而鄙詐之心入之矣外貌斯須不莊不敬而慢易之心入之矣樂極和禮極順內和而外順則民瞻其顔色而不與爭也望其容貌而衆不生慢易焉樂也者動於內者也禮也者動於外者也故禮主其減樂主其盈禮減而進以進為文樂盈而反以反為文禮減而不進則銷樂盈而不反則放故禮有報而樂有反禮得其報則樂樂得其反則安禮之報樂之反其義一也皇王大紀卷二十七

  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0017_WYG_001-1a, image: WYG0313/WYG0313-0009a.png}
body:
  text: 皇王大紀卷一宋胡宏撰三皇紀盤古氏太和涵動靜之性一動一靜交天地之道也動則為陽陽極則隂生一隂一陽交天之用也靜則為柔柔極則剛生一剛一柔交地之用也動之大者為太陽太剛小者為少陽少剛靜之大者為太陰太柔小者為少陰少柔太陽為日太隂為月少陽為星少陰為辰日月星辰交天之體也金木生於水土石之際故不數金木也日月星辰為寒暑晝夜暑寒晝夜交天之變也變乎情性形質者也水火石土為雨風露雷雨風露雷交地之化也化乎飛走草木者也本乎天者分陰分陽本乎地者分柔分剛陰伏陽而形質生陽伏陰而情性生陽生陰陰生陽陽剋陰陰剋陽陽之不可伏者不見于地隂之不可剋者不見于天得天氣者動得地氣者靜陽之類圓成形則方隂之類方成象則圓陽得隂而為雨隂得陽而為風剛得柔而為雲柔得剛而為雷雨生于水露生于土雷生于石電生于火雷與風同為陽之極故有電必有風陽交乎隂而生蹄角之類剛交乎柔而生根荄之類隂交乎陽而生羽翼之類柔交乎剛而生枝幹之類天交於地地交於天故有羽而走者足而騰者草而木者木而草者此物之所以萬也人也者暑寒晝夜無不變雨風露雷無不化情性形體無不感飛走草木無不應所以目善萬物之色耳善萬物之聲鼻善萬物之氣口善萬物之味而為萬物之靈也盤古氏生於大荒莫知其始仰觀天倪俯察地軸明天地之道達陰陽之變為三才首君於是宇宙光輝而混茫開矣論曰鴻荒文明天行也鴻荒之世結繩而治理則昭然其事不可詳矣世傳天地之初如雞子盤古氏以身變化天地日月山河草木於其中所謂訛失其真而盤姓為萬姓之先則不可沒者也天皇氏隂陽常和而太極立太極常存而天命行得陽之多者為天得隂之多者為地天變時而地應物時則隂變而陽應物則陽變而隂應時可逆知物必順成陽逆而隂隨隂逆而陽順故有變必有應變於內者應於外變於外者應於內變於下者應於上變於上者應於下天變而日應之故變者從天而應者法日也是以在天則日紀于星月㑹于辰在地則水生于土火濳于石在物則飛者棲木走者依草在人則心聮于肺膽屬于肝本一氣也生則為陽消則為隂自下而上謂之升自上而下謂之降升者生也降者消也陽生於下隂生於上是以萬物皆反生也陰生陽陽生陰陰復生陽陽復生隂隂為陽之母陽為隂之父陽得隂而生陰得陽而成陽者道之用陰者道之體陽用隂隂用陽以陽為用則尊陰以陰為用則尊陽陽不能獨立必待陰而後生隂不能自見必待陽而後成陽以隂為基陰以陽為倡夫陰雖對陽為二然陽存則生陽去則死天地萬物生死于陽則歸之于一也天皇氏之先與乾曜合德君有五期輔有三名三五厯紀嵗在攝提一姓十三頭十三人也零陵山中民俗至今謂一人為一頭閼逢甲旃䝉乙柔兆丙彊圉丁著雍戊屠維己上章庚重光辛𤣥黓壬昭陽癸十干也困敦子赤奮若丑攝提格寅單閼卯執徐辰大荒落巳敦牂午協洽未涒灘申作噩酉閹茂戍大淵獻亥十二支也論曰世傳羲農黃帝之書謂之三墳少昊顓頊髙辛唐虞之書謂之五典孔子討論墳典斷自唐虞上世文書簡邃經三季而失其傳不可得而論次故也今去孔子又逺矣乃欲始於古初不亦過乎吁因秦焚書後世競傳古先事紛亂怪誕迷誤後生無所考正其有能不悖於理者可不采拾乎其有顯然謬妄背義而傷道者可不剪削乎其有誣罔聖人者可不明辨乎或謂有欲正人心息邪說之志愚敢僭子輿氏之名乎哉考其事窮其理以自正而已地皇氏天曰皇天地曰后土天圓而地方天有四時春三月曰蒼天夏三月曰昊天秋三月曰旻天冬三月曰上天地有四方方有嶽東曰皡天西曰成天南曰白天北曰𤣥天東南曰暘天西南曰朱天西北曰幽天東北曰昜天或作鸞中央曰鈞天東方曰岱嶽西方曰華嶽南方曰衡嶽北方曰恆嶽中央曰嵩嶽天南髙而北下是以望之如倚蓋焉地東南下而西北髙是以東南多水西北多山也天之陽在東南日月居之地之陽在西北土石處之海之潮汐陰陽盈虛升降之候也所以應月者天道左旋日月右轉日入則晚潮生於左日出則早潮生於右月近於日則潮小月逺於日則潮大陰陽盛衰之義也陽主贏陰主虛故天之南全見而北全不見陽侵陰陰侵陽故東西各半見天之陽在南而陰在北地之隂在南而陽在北人之陽在上而陰在下既交則陽下而陰上地皇氏一姓十二頭定星辰分晝夜以三十日為月朔以十一月為冬至人皇氏天有八象地有八象合天地而生人合父母而生子而人有十六象天主用地主體體必交而後生故陽與剛交而生心肺陽與柔交而生肝膽剛與陽交而生腸胃柔與陰交而生腎與膀胱肺生骨肝生肉胃生髓膀胱生血心生目膽生耳脾生鼻腎生口日為心心藏神辰為腎腎藏精星為脾脾藏魂月為膽膽藏魄火為胃石為肺土為肝水為膀胱府故胃受物而化之傳氣為肺傳血為肝而傳水榖為脬腸天之神棲於日人之神發于目人之神寤則棲於心寐則棲於腎所以象天地之晝夜也神統於心氣統於腎魂隨氣而變焉形統於首魄隨形而止焉形氣交而神主乎其中焉神者人之主也將寐在脾熟寐在腎將寤在膽正寤在心心居肺膽居肝何也言性者歸諸天言體者歸諸地地中有天石中有火是以星膽象之也其倒懸何也草木者地之本體也人與草木反生是以倒懸也口目橫而耳鼻縱何也動者體橫植者體縱體必交也故動者宜縱而反橫植者宜橫而反縱是故陰陽交而天有形剛柔交而地有質仁義行而人有位東至日所出為太平南戴日為丹穴西至日所入為太䝉北戴斗極為崆峒太平之人仁丹穴之人武人皇氏之世萬物群生連屬其鄉禽獸成羣草木遂長淳風沕穆兄弟九頭分理九州有窼氏上古之民同與禽獸居族與萬物並於是始教民構木為橧窼夏暑居之穴地為營窟冬寒居之未知稼穡食草木之食未有火化飲禽獸而茹其毛先取其皮而蔽前後取而蔽後或曰古者禽獸多而人民少於是民皆窼居以避之晝拾橡栗暮栖木上故命之曰有窼之民燧人氏天渾渾於上不可測也觀斗之所建則知天之行矣天行所以為晝夜天行無息也以地故成晝夜日月所以為寒暑夏淺冬深春夏夜數少秋冬夜數多天地之交也左旋右行天日之交也日朝東夕西隨天之行也夏北冬南隨天之交也天一周而超一星應日之行也春卯正夏午正秋酉正冬子正應日之交也極南大暑極北大寒南融北結萬物之死地也夏則日隨斗而北冬則日隨斗而南故天地交而寒往暑來暑往寒來亭毒化育而物乃生人之初生倥侗顓䝉未知五行之用燧人氏上觀星辰握機矩教人出火民未知衣服夏多積薪冬則煬之未知烹炮飲血而茹腥始教之燔炙養人利性遂天之意後世聖人有鑽燧改火之法春以榆栁夏以棗杏季夏以桑柘秋以柞槱冬以槐檀燧人氏有四佐焉明由必育成博隕丘贊曰嘗聞邵雍氏問堯夫曰我非羲皇上世之人乎愚考其言猶信雖生末世不及見三墳亦無憾矣論曰濳心三皇之紀則知太和保合無窮之道無始而有始無終而有終者也是故有鴻荒之時亦猶日之夜月之晦時之冬焉生消升降終而復始於穆天命不已而成四時之造化於皇群聖體是以為三綱之禮樂事本乎道道藏於事天生人人成天三皇神其體五帝妙其用禹湯文武成其功孔子孟子傳其學孟之死雖未得其傳者惟皇上帝降𠂻於下民若有恆性誰能出不由戶何莫由斯道也當周昭王時西方有傑戎厭苦世纍欲求超脫之道遂捐君叛親棄婦入山刻私意窮幻見駕空說曰我能得心法變現萬端出生入死願欲必從而非一世事理之所能嬰也漢明帝時其書始入中國魏晉以上為其徒有禁逮乎末流樹立典教橫被中華據名山勝地千百為羣談渺茫陳禍福以恐喝愚衆而士大夫爭信鄉之用夷變夏三綱弛絶人無宰物之情由於此矣可不懼乎夫隂陽剛柔天地之體也體立而變萬物無窮矣人生合天地之道者也故君臣父子夫婦交而萬事生焉酬酢變化妙道精義各有攸止亦無窮己傑戎能力索於心而不知天命故其說周羅包括髙妙𤣥微無所不通而其行則背違天地之道淪滅三綱體用分離本末不貫不足以開物成務終為邪說噫戴天履地冬裘夏葛日作夜息渴飲飢食應其身萬事皆不能與常人殊異獨於君臣之義父子之仁夫婦之禮則掃之除之殄之滅之謂之盡性可乎謂之不失其心可乎是又下於戎狄一等矣中華豪傑天下有大道列聖之所傳授者日新而無窮也豈可冥然為戎傑邪說所誘化而不自知耶五帝紀帝太昊包犧氏帝太昊風姓成紀人也母曰華胥履大人跡而生太昊太昊生而聖明德合天地圗書出而蓍草生圖龍馬也出於河書龜書也出於洛蓍靈草也生於蔡一叢而滿百莖者其下必有神龜守之河圖見九宫洛書見五行五居於中右七而左三九在五上右二而左四一在五下右六而左八天一生水地六成之地二生火天七成之天三生木地八成之地四生金天九成之天五生土地十成之天數二十有五地數三十天地之數五十有五二五為一故大衍之數五十而其用四十有九𤣥乎富哉此圖書之文也有天之圓焉有地之方焉天地之道起於中焉天道周流起一而積六變三而積九地道執方起一而積八變四而積十二天函地故圓者刓方以為用變其體而不變其用地函天故方者引圓以為體變其用而不變其體八者天地之體也六者天之用也十二者地之用也太昊用蓍三衍而成爻三少為九九老陽乾也三多為六六老為陰坤也乾變三女坤變三男離肖乾坎肖坤震艮相變巽兊相效而八卦以六變立不言之數曰乾坤震巽坎離艮兊消息謂易是故卦成于八極于六十四而用止于六十也爻止六重為三百八十四而用止于三百六十也是故一年四時一時三月一月三十日也天數五地數五五者天地之闕數也一三五九也二四六也是故爻用九六而不用七八候氣之法平地於室埋十二律管管上與地平實以葭莩之灰冬至陽氣距地面九寸黃鐘九寸故黃鐘應餘律皆然太古以竹為管後世以玉為管始候陽氣以辨五氣以明五音氣始于木木生火火生土土生金金生水水生木相生不窮音起於金金剋木木剋土土剋水水剋火火剋金一律含五音十二律納六十音相生不窮於是始作甲厯甲乙丙丁戊己庚辛壬癸即十干也子丑寅卯辰己午未申酉戌亥即十二支也支干相配為十二辰六甲而天道周矣嵗以是紀而年不亂月以是紀而時不易晝夜以是紀而人知度東西南北以是定而方不惑夫然故乾居西北納甲與壬坤居西南納乙與癸震東方也納庚巽東南也納辛坎正北納戊離正南納己艮居東北納丙兊在正西納丁度十二律均十二鐘父始之母終之六子經營之而六甲十二辰者二十四卦之祖三十二卦之宗重之為六十四也兩地而三天數之所起也吉凶之徵也是故乾坤定上下之位坎離别左右之門六戊為天門六己為地户天地之所以闢闔日月之所以出入春夏秋冬晦朔弦望晝夜有長短行度有盈縮五運六氣一嵗五行主運各七十二日少隂君火太陰濕土少陽相火陽明燥金太陽寒水厥陰風木叠周十二辰假令壬寅年少陽相火司天則在前第四厥陰在泉前一辰少陰君火為初氣太陰為二少陽為三陽明為四太陽為五厥陰為六各六十日交騖乎天地之間既萬物矣日隨天而轉月隨日而行星隨月而現天半明半晦日半贏半縮月半盈半虧星半動半靜日月交會謂之辰辰天之體也元氣之節會也日為天之主月為日之婦星為日餘辰為月餘日為天之元月為天之㑹星為天之運辰為天之世元㑹運世日月星辰迭經而無窮辰至日為生日至辰為用順為用而逆為生也陽在陰中陽逆行陰在陽中陰逆行陽在陽中陰在陰中則皆順行按圖可見日行陽度則贏行陰度則縮陽主舒長陰主慘急日入贏度陰從為陽日入縮度陽從為陰冬至之月所行如夏至之日夏至之月所行如冬至之日夏至之午中陽之極秋分之酉中陰之中凡三百六十中分之則二至二分相去之數也日紀於星月㑹於辰日以遲為進月以疾為退日月一㑹而加半日減半日是以為閏餘也朞三百有六旬有六日日之餘贏也六則月之餘縮也亦六去日月之餘十有二則三百五十有四乃日行之數一嵗之閏六陰六陽凡三年一閏五年再閏三年三十六日五年六十日凡十九年閏闕為一章四章為一蔀五蔀周六甲凡三百八十年而厯象小成爰自古先人知其母不知其父卧則呿呿起則于于其行填填其視顛顛無知如草木有欲如禽獸質美者抱其璞情厚者含其真未知三綱五常之倫器用之利帝始推擇天下之賢可與共代天工者得金提鳥鳴視默紀通仲起陽侯以為輔佐作龍書以代結繩之政制龍官以範徜徉之民教民佃漁以網罟為器教民婚姻以儷皮為禮於是夫婦别君親尊臣子順羣生和樂有網罟之歌都于宛丘宛丘後為陳都謂之太昊之墟始有卜筮龜曰卜蓍曰筮後世有天下凡有大疑必決之卜筮卜人定龜史定墨君定體天子之龜長尺有二寸諸侯一尺大夫八寸龜有六色六體具八卦五行天地之數神物也天子蓍長九尺諸侯七尺大夫五尺士三尺孔子曰大人之器威敬天子無筮諸侯有守筮天子道以筮諸侯非其國不筮卜宅寢室天子不卜處太廟教天下豢養六牲馬也牛也雞也豕也狗也羊也以祭天神以祀地祗以饗人鬼以充庖厨以養聖賢故號曰包犧氏始推五德之運帝出乎震震東方也甲者萬物之始生木德之盛也於是以木德王天下光理天下明如日月陰陽和靜鬼神不擾四時得節萬物不傷羣生不天雖有詭智無所用之此之謂至一君主四海之內一百有一十年而魂氣歸于天體魄降于地生民追思其德號曰帝太昊女媧襲據尊位世傳女媧者帝女弟也循帝之跡無所革造始制笙簧號曰女帝論曰世傳往古天不兼覆女媧鍊五色石以補天其言雖陋甚推其本㫖蓋言女媧以婦人能理男子之事爾乃婦人而有雄才大略者也後世唐武氏其似之乎此非常之變也自漢以來不擇天下之才任以為相寄託宗廟社稷之主而以天下大柄倚仗婦人女子其不生禍亂者亦云幸矣幸也者小人之事非大人之道天下公器不受正命乃欲以小人之道持之豈非不知學之過歟若漢之武帝蜀之昭烈託霍光而寄孔明其於道學槩乎其有聞者矣女媧死共工氏伯九州自謂水德失五行之叙不能奄有天下虞其湛樂淫失其身欲壅防百川隳髙湮下以害天下皇天弗福庶民弗助禍亂並興而天下歸於大庭氏共工氏有子曰勾龍能辨土之所宜以教兆民後世有天下者祀勾龍以配社驪連氏栗陸氏中央氏柏皇氏大庭氏赫胥氏赫胥氏之時民居不知所為行不知所舍含哺而嘻鼓腹而遊尊盧氏啓統氏一作混沌氏昊英氏朱襄氏葛天氏葛天之樂三人摻牛尾投足以歌八闋一曰載民二曰𤣥鳥三曰遂草木四曰奮五榖五曰敬天常六曰達帝功七曰依地德八曰總萬物之極陰康氏無懷氏凡十三氏皆祖包犧氏論曰劉道原博極羣書以為古無三皇五帝三王五伯之數其辨甚悉愚以為如是稱而逆理害義雖人謂之聖賢之經猶當改也茍於理義無傷害雖庸愚之說猶可從也皇帝王伯雖經不稱其數而雜見於前修之文非有逆理害義之事也奈何必欲去之乎皇者初冒天下者也帝者主宰天下者也王者天下歸往者也自燧人氏而上則三皇之世也包犧神農黃帝堯舜是五君有先天地開闢之仁後天地制作之義人至於今受其賜故孔子曰包犧氏沒神農氏作神農氏沒黃帝堯舜氏作按黃帝之後少昊顓頊髙辛皆嘗帝天下矣孔子所以越而遺之必稱堯舜者以三君居位僅可持其世而已未嘗有制作貽萬世故也則五帝之名實定矣夏禹商湯文武為三王齊桓晉文秦穆宋襄楚莊之為五伯其迹詳甚焉可誣也炎帝神農氏炎帝神農氏有熊之君少典正妃有蟜氏之女曰任已之所生也少典女登遊于華山之陽有神龍之祥生為神農長於姜水為姜姓師為悉諸學於老龍吉得河圖圖之真數三而已太極具萬象為神神生象象生器器生數是故天六地四天以氣為質神為神地以質為質氣為神人得天地日月交之用故四肢各有脉一脉三部一部五候應天數也神農知天地之道明於人之性以有天下更無懷氏神農立極先定乾坤推五德之運以火承木因以紀官號曰烈山氏亦曰連山氏都于曲阜時人生益庶殫螺蛖之肉窮草木之滋或傷生而殞命於是神農遍閲百物著其可食者與其可療治者使民知所用避作為陶冶合土范金制斤斧耒耜枷芟槍刈耨鏄茅蒲襏襫相土田燥濕肥磽興農桑之業春耕夏耘秋穫冬藏為臺榭而居治其絲麻為之布帛有子曰柱能治百榖百蔬與民並耕而食發教於天下使之積粟國富民安故號曰神農氏又曰伊祁氏伊祁氏始為蠟蠟也者合也嵗十二月合聚萬物索饗之主先嗇而祭司嗇焉祭百種以報嗇也饗農及郵表畷禽獸迎猫為其食田鼠迎虎為其食田豕祭坊與水庸事也曰土反其宅水歸其壑昆蟲毋作草木歸其澤皮辨素服以祭若送終也野夫黃冠故黃衣黃冠而祭息田夫也大羅氏草笠而至致鹿與女而詔戒諸侯曰好田好女者亡其國四方年不順成八蠟不通以謹民財也順成之方其蠟乃通以移民也既蠟不興功而休民息已後世王天下者祀柱以配稷有獻羊頭山嘉禾八穗者乃作穗書以頒時令令曰丈夫丁壯而不耕天下有受其飢者婦人豐盈而不織天下有受其寒者神農親耕籍田之禮蓋始此后親織以為天下先於是四方之民豐衣足食各執其方物或舉而不用事或廢而不舉乃命天下日中為市致天下之民聚天下之貨交易而退各得其所夙沙氏煮海為鹽行不用道其臣箕文諫而殺之神農修德不征夙沙之人以其君歸命是時也禮草昧而未制樂湮塞而未作燔黍為飱捭豚為俎𤣥酒大羮汙尊而杯飲蕢桴而土鼓截葦為籥繩絲削桐為五弦之琴詠豐年之歌以通神明之德合天人之和法省而不煩威厲而不殺俗朴而不爭不令而人化南至交趾北至幽都東至暘谷西至三危莫不服從神農居天位百有四年而歿號曰炎帝伯夷叔齊曰神農之有天下也時祀盡敬而不祈禧其於人也忠信盡治而無求焉樂與政闕治為治不以人之壞自成也不以人之卑闕以遭時自利也此真吾所謂道也帝臨魁在位八十年帝承在位六十年帝明在位四十九年帝直在位四十五年帝來在位四十八年帝哀在位四十三年帝榆罔在位五十五年皇王大紀卷一

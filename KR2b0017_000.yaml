body:
  text: 皇王大紀總目編年類卷一三皇紀五帝紀卷二五帝紀卷三五帝紀卷四五帝紀卷五三王紀卷六三王紀卷七三王紀卷八三王紀卷九三王紀卷十三王紀卷十一三王紀卷十二三王紀卷十三三王紀卷十四三王紀卷十五三王紀卷十六三王紀卷十七三王紀卷十八三王紀卷十九三王紀卷二十三王紀卷二十一三王紀卷二十二三王紀卷二十三三王紀卷二十四三王紀卷二十五三王紀卷二十六三王紀卷二十七三王紀卷二十八三王紀卷二十九三王紀卷三十三王紀卷三十一三王紀卷三十二三王紀卷三十三三王紀卷三十四三王紀卷三十五三王紀卷三十六三王紀卷三十七三王紀卷三十八三王紀卷三十九三王紀卷四十三王紀卷四十一三王紀卷四十二三王紀卷四十三三王紀卷四十四三王紀卷四十五三王紀卷四十六三王紀卷四十七三王紀卷四十八三王紀卷四十九三王紀卷五十三王紀卷五十一三王紀卷五十二三王紀卷五十三三王紀卷五十四三王紀卷五十五三王紀卷五十六三王紀卷五十七三王紀卷五十八三王紀卷五十九三王紀卷六十三王紀卷六十一三王紀卷六十二三王紀卷六十三三王紀卷六十四三王紀卷六十五三王紀卷六十六三王紀卷六十七三王紀卷六十八三王紀卷六十九三王紀卷七十三王紀卷七十一三王紀卷七十二三王紀卷七十三三王紀卷七十四三王紀卷七十五三王紀卷七十六三王紀卷七十七三王紀卷七十八三王紀卷七十九三王紀卷八十三王紀臣等謹案皇王大紀八十卷宋胡宏撰宏字仁仲號五峯崇安人安國之季子也幼事楊時侯仲良而卒傳其父之學紹興中嘗上書數千言忤秦檜意以䕃補承務郎乆不調檜死始召用辭疾不赴是書成於紹興辛酉紹定間嘗宣取入秘閣所述上起盤古下迄周末前二卷皆粗存名號事迹帝堯以後始用皇極經世編年博採經傳而附以論斷陳振孫書録解題譏其悮取莊子寓言及敘邃古之初無徴不信然古帝王名號可攷統系斯存典籍相傳豈得遽為芟削至其採摭浩繁雖不免小有出入較之羅泌路史則切實多矣故陳亮極重是書而朱子亦取之未可以一𤯝掩也朱彛尊曝書亭集有是書跋稱近時鄒平馬驌撰繹史體例頗相似疑其未見是書正可並存不廢今考驌書多引路史而不及皇王大紀一字彛尊以為未見理或有然至於此書體用編年繹史則每事標題而雜引古書之文排比論次畧如袁樞記事本末之法體例截然不同不知彛尊何以謂其相似殆偶未詳檢驌書歟乾隆四十四年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀皇王大紀序天道保合而太極立氤氲升降而二氣分天成位乎上地成位乎下而人生於其中故人也者父乾母坤保茲天命生生不窮者也天始萬物日月星辰施其性地生萬物水火金木運其氣人主萬物仁義禮智行其道君長陪貳由道以紀綱人生而理其性然後庶績熈萬物遂地平天成而人道立三皇五帝三王五伯者人之英傑為君為長率其陪貳應時成物如春之生夏之長秋之利冬之貞也自堯而上六閼逢荒落堯之初載甲辰迄於赧王乙巳二千有三十年一代之盛衰一周人事之治亂備矣萬世不能易其道者也後人欲稽養生理性之法則舎皇帝王伯之事何適哉嗚呼聖人作書契以記事之情明心之用自皇帝墳典至於孔子春秋法度文章盈天下七雄諸侯棄禮縱欲竊去害己之籍逮秦吕政窮欲極凶遂公行焚禁孔子八世孫鮒雖以藏經為己任然亡秦之暴烈於猛火藏之甚秘禁未解而鮒死漢興數葉然後出於孔子屋壁壊爛漫滅經是以僅存而不完若夫史傳則莫為之主追記録於雜識多聞之事或出於好事者之胷臆故有甚悖於理害於事者歴世老師宿儒或循習而不悟或存置而不察或偏倚而不該後生䝉蔽不知取正於道大道之為百家裂也乆矣我先人上稽天運下察人事述孔子承先聖之志作春秋傳為大君開為仁之方深切著明配天無極者也愚承先人之業輒不自量研精經典泛觀史傳致大荒於兩離齊萬古於一息根源開闢之㣲茫究竟亂亡之徵驗事有近似古先而實恠誕鄙悖者則裁之削之事有近似後世而不害於道義者咸詳而著之庶幾皇帝王伯之事可以本始百世諸史祖春秋載紀所謂史也史之有經猶身之肢體有脉絡也易詩書春秋所謂經也經之有史猶身之脉絡附肢體也肢體具脉絡存孰能得其生乎夫生之者仁也人仁則生矣生則天地交泰乾坤正禮樂作而萬物俱生矣是故萬物成於性者也萬事貫於理者也萬化者一體之所變也萬世者一息之所累也若太極不立則三才不備人情横放事不貫物不成變化不興而天命不幾於息乎愚是以將求友於天下與之合堂同席而舍焉又與之接袂比肩而進焉不得於今必得於後此皇王大紀之所以書也有宋紹興重光作噩夏四月朔安定胡宏序

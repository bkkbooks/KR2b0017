body:
  text: 皇王大紀卷十五宋胡宏撰三王紀成王易爻詞周公居東之所作也周公遭管叔蔡叔之變於是繫爻以詞承文考之志焉乾乾下乾上初九潛龍勿用初爻在一卦之下為始物之端聖人側㣲若潛龍未可自用九二見龍在田利見大人出見地上大人之徳已著上下利見之也九三君子終日乾乾夕惕若厲无咎三在下體之上在下之人君徳已著若日夕不懈而兢惕雖處危地而無咎九四或躍在淵无咎或躍或不躍聖人惟及時以就安耳九五飛龍在天利見大人正位之極也聖人得天位利見大人與共成天下之事天下固利見大徳之君也上九亢龍有悔過極則亢故有悔用九見群龍无首吉處乾剛之道觀諸爻之義無為首則吉以剛為天下先凶之道也坤坤下坤上初六履霜堅氷至隂之始生聖人以其將長則為之戒也六二直方大不習无不利六二中正在下地之道也以直方大三者形容其徳用盡地之道矣由直方大故不習無不利六三含章可貞或從王事无成有終三居下之上得位者也含晦章美可以常乆而無悔咎或從上之事不敢當其成功惟守職以終其事者臣之道也六四括囊无咎无譽四近五無相得之義自處以正危疑之地也若晦藏如括結囊口則無咎無譽六五黄裳元吉坤雖臣道五實君位黄中色裳下服若守中而居下則大善而吉也上六龍戰于野其血𤣥黄隂從陽者也盛極不已則抗而爭必皆復故其血𤣥黄用六利永貞隂道柔而難常故利在常永貞屯震下坎上初九磐桓利居貞利建侯陽剛居下磐桓也宜居正而固其志廣求輔助六二屯如邅如乘馬班如匪冦婚媾女子貞不字十年乃字二欲從五正應而逼於初剛故復班如守中正不茍合於初所以不字若正固不易至於屯極必獲正應而字育矣六三即鹿无虞惟入于林中君子幾不如舍往吝以柔居剛而不中正則貪得妄動如即鹿而無虞人以道之惟䧟入于林莽之中君子見幾不如舍而勿逐往則吝也六四乘馬班如求婚媾往吉无不利柔順得君而才不足故欲進而復止初剛四之正應若求此剛陽之婚媾往與共輔陽剛中正之君則吉無不利也九五屯其膏小貞吉大貞凶陽剛居尊得正以下無剛明之輔故澤不下流以漸正則吉大正則㐫矣上六乗馬班如泣血漣如隂柔居屯險之極進退不能故泣血漣如蒙坎下艮上初六發蒙利用刑人用說桎梏以往吝下民䝉發之之道當明刑禁以脫去其蒙昏之桎梏然後善教可入茍専用刑則民免而無耻矣九二包蒙吉納婦吉子克家二當發䝉之任必廣其含容哀矜昏愚雖婦人之柔闇尚當納其所善如是則克濟其君之事猶子能治其家也六三勿用取女見金夫不有躬无攸利隂柔不中不正不能逺從正應而近從九二是見多金之夫不能保其有身者取如是之女則無所往而利矣六四困䝉吝隂柔困於昏蒙為可吝也六五童䝉吉童取資於人也以柔中之徳任九二剛明之才可以治天下之蒙故吉也上九擊蒙不利為冦利禦冦愚䝉之極者當擊伐之然九居上剛極而不中故戒之以利禦寇不利為冦需乾下坎上初九需于郊利用恒无咎需者以遇險故需而後進初最逺於險故為需于郊然安守其常則無咎九二需于沙小有言終吉去險漸近故有需于沙雖未至害己小有語言之傷矣九二剛陽居柔守中故終吉九三需于泥致冦至三剛而不中又居徤體之上有進動之象泥逼於水九既進逼於險當致冦難之至也六四需于血出自穴隂柔處險下當三陽之進傷於險難不能安處也九五需于酒食貞吉陽剛居中得正位乎天位宴安酒食以需之何需不獲故云貞吉上六入於穴有不速之客三人來敬之終吉隂止於六乃安其處也乾三陽非在下之物需時而進者也需既極矣故不速之而自來也陽志在上進六隂位非所止之故敬之終吉訟坎下乾上初六不永所事小有言終吉隂柔居下上有應援而能不長永其事故雖小有言終得吉也九二不克訟歸而逋其邑人三百户无𤯝二五正應而兩剛不相與九二自外來以剛處險為訟之主五以中正處君位其可敵乎是為訟而義不克也若能歸而逋避為敵之地以寡約自處則得無遇𤯝也六三食舊徳貞厲終吉或從王事无成質本隂柔而處險承乗皆剛若守素分而堅固處危而知懼終必獲吉也九四不克訟復即命渝安貞吉剛徤不中止躁動不安貞本為訟者也五君也義不克訟三居下而柔初正應而順故不克訟命謂正理若能反就正理變而為安貞則吉矣九五訟元吉中正居尊位以治訟故大吉而盡善上九或錫之鞶帶終朝三褫之人之肆其剛强窮極於訟取祸䘮身固其理也設或然至於受服命之賞是亦與人仇爭所獲其能安保之乎師坎下坤上初六師出以律否臧㓙出師之義以禁亂誅暴為本行師之道以號令節制為先不如是者雖克勝亦凶道也九二在師中吉无咎王三錫命人臣之道於事無所敢専惟閫外之事則専制之雖専而得中處之盡善則能成功吉而无咎王錫命至于三極其寵數所以重其威而信其下也六三師或輿尸㓙三居位當任者也二既為五信倚矣若更使三衆主之㓙之道也六四師左次无咎闕六五田有禽利執言无咎長子帥師弟子輿尸貞㓙五君也故言興師任將之道戎狄猾夏不可懐來然後聲罪致討如禽入田害稼於義宜獵取則獵取之則無咎授師之道當任長子若以弟子衆主之則雖正亦㓙也上六大君有命開國承家小人勿用師終功成行賞封諸侯命卿大夫不可用小人小人有功賞之以金帛禄位可也比坤下坎上初六有孚比之无咎有孚盈缶終來有他吉孚信之在中也有孚則人親之故無咎能誠信充實於内若物之盈缶不用文飾則終能来他外之吉也六二比之自内貞吉擇才而用雖在乎上而以身許國必由於己也不汲汲以來比乃得正而吉也六三比之匪人四隂柔而不中二存應而比初三不中正所比皆不中正匪人也六四外比之貞吉四與初不相應而五比之外比於五君臣相比也親賢從上也得正而吉也必以正道則吉也九五顯比王用三驅失前禽邑人不誡吉人君顯明其比道而已來者撫之不煦煦然求比於物也天子之田圉合三靣前開一路去者不追來者取之故以為喻不誡於居也言其至公不私無逺邇親踈之别如是則吉也上六比之无首㓙首始也未有無始而有終者也小畜乾下巽上初九復自道何其咎吉剛陽在上之物復與上同志上進復自道也何所過咎而又有吉也九二牽復吉二五為隂所畜俱欲上進二陽牽連並進則隂不勝得遂其復故吉九三輿說輻夫妻反目陽剛不中暱比於四故不能前進猶車輿脫去輪輻也正如夫寵惑於妻致其不順而反目也六四有孚血去愓出无咎一隂畜衆陽惟盡其孚誠則可以逺傷害免危懼也如此則可以无咎九五有孚攣如富以其鄰以中正居尊位而有孚信牽攣其類如富者推其財力與鄰比共之也上九既雨既處尚徳載婦貞厲月幾望君子征㓙巽順之極處畜之終與四和而上也四用柔巽之徳積滿也以隂柔而畜制陽剛婦若貞固守此危道也隂盛將與陽為敵君子動則㓙也履兊下乾上初九素履往无咎陽剛之才可以上進若安其卑下之素而往則無咎矣九二履道坦坦幽人貞吉居柔居中所履得坦易之道亦必幽靜安恬之人則能貞固而吉也六三眇能視跛能履履虎尾咥人㐫武人為于大君體柔居剛處不中而履不正此危地必及禍患如武暴之人而居人上也九四履虎尾愬愬終吉陽剛而乾體在近君多懼之地若愬愬然兢畏懼則終獲吉也九五夬履貞厲陽剛乾體居尊位任其夬决而行者也如此雖得正猶危厲也上九視履考祥其旋元吉於履之終視其所履以考其祥善禍福若周旋完備則元吉也泰乾下坤上初九拔茅茹以其彚征吉剛明之才而居下時將泰則志在上進必牽抜其三朋類如茅之根相牽連而起矣九二包荒用馮河不遐遺朋亡得尚于中行君臣同徳二以剛中之才為上所任主治泰者也泰寜之世人忸習安佚政法踈緩廢弛惰於因循憚於變更茍於安佚必以含𢎞之量施剛果之用不遺遐逺絶去朋比則能配合九二中行之義也九三旡平不陂无往不復艱貞无咎勿恤其孚于食有福無常安平而不險陂者無常往而不返者泰盛則將否矣若常艱危其思慮貞固其施為則可無咎不勞憂恤不失所期而於禄食有福益也謂可長也六四翩翩不富以其鄰不戒以孚翩翩疾飛之貌隂志趨下如此與其鄰非富而相從不待誡告而誠意相合也六五帝乙歸妹以祉元吉五能降其尊而順從於二如帝乙之歸妹則受祉且元吉也上六城復于隍勿用師自邑告命貞吝隍土積累以成城泰終將否如城土頺圯復反于隍也衆心離散不從其上用之則亂方自其親近而告命之雖正亦可羞吝也否坤下乾上初六㧞茅茹以其彚貞吉亨否之時任之者君子也初六能與其類貞固其節則處否之吉而其道之亨也六二包承小人吉大人否亨小人包承順之心欲為身利是其吉也大人中正自守身雖否乃其道之亨也九四有命无咎疇離祉陽剛乾體當君道否時處逼近之地所惡在居功取忌若能使動必出於君命則無咎而疇類皆附離其福祉也九五休否大人吉其亡其亡繫于苞桑陽剛中正居尊位休息天下之否大人之吉也若使安肆不深慮逺戒為安固之道則否將復來故有其亡之戒上九傾否先否後喜否終則傾否傾則矣同人離下乾上初九同人于門无咎初九係應故為同人于門無親暱之偏誰其咎之六二同人于宗吝同於所係應是偏於宗黨為可吝也九三伏戎于莽升其髙陵三歲不興二中正與五相應三以剛强與之比欲奪而同之然懐惡而内不直故伏兵林莽時升髙願望至於三歳終不敢興此爻深見小人之情狀也九四乗其墉弗克攻吉剛而不中正志亦欲同二切近於五如隔墉耳故乗其墉欲攻之知義不直而不攻則為吉也九五同人先號咷而後笑大師克相遇五與二正應而二陽非隔奪以二陽之强故五不勝憤故先號咷邪不勝正終不得合故後笑必用大師克勝之乃得相遇上九同人于郊无悔郊在外者也上九居外而無應終無與同者故亦無悔大有乾下離上初九无交害匪咎艱則无咎居大有之初未有驕盈之失未渉於害也富有本非有咎也處富有而知艱則自無咎九二大車以載有攸往无咎剛徤柔順居中而君如大車能勝重任可以行逺而無咎也九三公用亨于天子小人弗克在下而居人上公侯也公侯有其富盛以其有為天子之有而不敢専也小人則以為己私而亡奉上之道也九四匪其彭无咎居大道遇盛之時能自謙損則得無咎六五厥孚交如威如吉執柔守中而以孚信接下則下亦誠信以事上然大有之時人心安易若專尚柔和則陵慢生矣故戒以有威嚴然後吉也上九自天祐之吉无不利履信思順尚賢崇徳合道之至故自天祐之吉無不利謙艮下坤上初六謙謙君子用渉大川吉以柔順自處卑下謙而又謙君子人也雖渉險難亦無患害何所不吉乎六二鳴謙貞吉柔順謙徳積於中發見於聲音顔色也居中得正貞吉所自有也九三勞謙君子有終吉陽剛居正而在下體為下之上為隂所宗是有功勞而持謙徳者也惟君子行之有終則吉六四无不利撝謙居多懼之地而處勞臣之上無所不利於施布其謙也六五不富以其鄰利用侵伐无不利人君而持謙順天下所歸心不待有財而後能有其鄰也然君道不可専尚謙柔湏威徳並著乃能懷服天下上六鳴謙利用行師征邑國以極謙而反居髙不得遂其謙故發於聲音人之行已必湏剛柔相濟故利在用剛武自治其私豫坤下震上初六鳴豫㓙四豫之主而應隂柔居下者是小人處豫而為上所寵其志意滿極至發於聲音必至於㓙也六二介于石不終日貞吉處豫不可安且久乆則溺矣二獨能以中正自守其介如石之堅其去之速不俟終日故貞正而吉也六三盱豫悔遲有悔三不中正上瞻於四不為四所取四豫之主茍遲遲而不前則見棄絶亦有悔也然則如之何在正身而已九四由豫大有得勿疑朋盍簪以陽剛居大臣之位五柔弱之君順從之是專主乎豫得大行其志者也然獨當倚任下無同徳之助所以疑也茍盡其至誠則朋類何有不合聚者乎簮聚也六五貞疾恒不死柔弱耽惑受制於下有疾苦也權雖失而位未亡常疾而不死若漢魏末世之君也上六㝠豫成有渝无咎豫極隂柔㝠迷於豫已成者也若能有變亦可以無咎隨震下兊上初九官有渝貞吉出門交有功官主守也當隨時而為動主是所主守有變也變得貞則吉交不以私䁥故其隨當而有功六二係小子失丈夫二應五而比初隨先於近柔不能固守故為之戒六三係丈夫失小子隨有求得利居貞闕九四隨有獲貞㓙有孚在道以明何咎闕九五孚于嘉吉闕上六拘係之乃從維之王用亨于西山闕蠱巽下艮上初六幹父之蠱有子考无咎厲終吉闕九二幹母之蠱不可貞闕九三幹父之蠱小有悔无大咎闕六四裕父之蠱往見吝闕六五幹父之蠱用譽闕上九不事王侯髙尚其事闕臨兊下坤上初九咸臨貞吉闕九二咸臨吉无不利闕六三甘臨无攸利既憂之无咎隂柔說體不中正以甘說臨人者無所利也又乗方長之陽故不安而益甘既而危懼憂而能改持謙守正至誠以自處則無咎也六四至臨无咎臨道尚近四比於下居正而任賢是以無咎六五知臨大君之宜吉順應於剛中之賢任之以臨下乃已以明智臨天下也其吉可知上六敦臨吉无咎坤之極順之至大率隂求於陽故上以尊而應卑髙而從下尊賢取善故為敦厚於臨吉而無咎觀坤下巽上初六童觀小人无咎君子吝隂柔居逺於陽所觀見者淺近如童稚也在下民而當分不足謂之過咎若君子而如是則可鄙吝矣六二闚觀利女貞隂暗柔弱不能明見九五之道如窺覘之觀耳然能如女子之順從則不失中正乃為利也六三觀我生進退居非其位處順之極觀我之動作施為能順時以進退者也六四觀國之光利用賔于王觀莫明於近四居正柔巽而切近於五觀見國之盛徳光輝其賔禮於王朝効其智力以康濟天下九五觀我生君子无咎觀己之所生政治俗化君子矣乃無咎也上九觀其生君子无咎陽剛居上是賢人君子不在於位而徳業行義為天下所觀仰者也當自觀所君子矣則無過咎也其噬嗑震下離上初九屨校滅趾无咎初與上無位為受刑之人餘四爻皆為用刑之人當用刑之始人有小過用屨校之於足以滅傷其趾則懲懼不敢進於惡矣故得無咎也六二噬膚滅鼻无咎以中正用刑則人易服故取噬膚為易入也然乗初剛是用刑於剛中之人必湏深痛故至滅鼻而無咎也六三噬腊肉遇毒小吝无咎自處不常而刑於人則人不服反致怨傷如噬堅韌之物而遇毒惡之味是可鄙吝也然噬間而嗑之非咎也九四噬乾胏得金矢利艱貞吉時已過中間愈大而用刑愈深故如噬乾肉之兼骨者四得剛直之道而居柔故戒以克艱其事貞固其守則吉也六五噬乾肉得黄金貞厲无咎在卦將極為間甚大非易噬也故為乾肉然反易於四者乘在上之勢故也五得中道居剛而四輔以剛然實柔體故戒以必正固而懐危厲則得無咎也上九何校滅耳㓙居中是間之大噬之極也係辭所謂罪大而不可觧者故何校而滅其耳㓙可知矣賁離下艮上初九賁其趾舍車而徒剛明君子居無位之地無所施於天下惟自賁飾其所行而已守節處義故有舍車而寧徒行者衆之所羞君子以為賁六二賁其湏二文明賁之主也故主言賁道賁飾之道因其質而加飾耳故取湏義湏隨頥而動者也九三賁如濡如永貞吉如辭助也三與四相賁又比於二二柔文一剛上下交賁賁之盛也光彩之盛則潤澤然皆非正應且修飾之事難乎常也故戒以常永貞則吉六四賁如皤如白馬翰如匪冦婚媾四與初正應本當相賁而為三所隔故皤如馬在下而動者也其從正應之志如飛也匪三之冦則婚媾遂矣六五賁于丘園束帛戔戔吝終吉丘園謂在外而近者指上九也六五隂柔志從於上上受其賁也束帛六五本質戔戔謂受上九裁制紛裂之狀為人君而資於人為可吝然亨賁之功終為吉也上九白賁无咎賁過實則失於華偽惟能質素其飾則無過飾之咎不使華没實也剥坤下艮上初六剥牀以足蔑貞㐫隂之剥陽自下而上床身所處也隂自下進漸消蔑正道其㓙可知六二剥牀以辨蔑貞㓙辨分别上下者床之榦也剥至於辨愈蔑於正㓙益甚矣六三剥之无咎居剛應剛志從於正在剥之時為無咎者也六四剥牀以膚㓙剥牀足漸至於身之膚其㓙可知六五貫魚以宫人寵无不利剥及君位㐫不在言矣故更設義以開小人遷善之門魚隂物五群隂之主能使群隂順序如貫魚然獲寵愛於上如宫人則無不利上九碩果不食君子得輿小人剥廬諸陽消剥已盡獨上九一爻尚存如碩大之果不見食將有復生之理也亂極則人心思治衆心願載於君子矣小人當剥極則反其廬無所容其身也復震下坤上初九不逺復无祇悔元吉初九復之最先者是不逺而復也惟失之不逺而復則不至於悔大善而吉也六二休復吉初陽復復於仁也二中止初比而志從之復之休美者也六三頻復厲无咎隂柔處動之極復之頻數而不能固者也頻失則危屢復何咎過在失而不在復也六四中行獨復四行群隂之中處正而獨應於初剛可謂善矣不言吉㓙者初方甚㣲不足以相援聖人不欲言其不可濟之理也六五敦復无悔居尊中順能敦篤於復善者也故無悔上六迷復㓙有災𤯝用行師終有大敗以其國君㓙至於十年不克征隂柔居終終迷不復者也其㓙可知在已則動有𤯝過天災亦自外來迷道不復無施而可行師則大敗為國則君㓙十年謂無時而可行也无妄震下乾上初九无妄往吉以剛變柔而居内中誠不妄者也以無妄之道行何所不吉六二不耕穫不菑畬則利有攸往儿理之所然者非妄也人欲所為者乃妄也二動能順乎中正無妄者故極言無妄之義不為穫而耕不為菑而畬如是則所往利而無害六三无妄之灾或繫之牛行人之得邑人之災隂柔不中正是為妄者也妄動得失已大矣况復有災悔乎妄得之福災亦隨之不足以為福也九四可貞无咎剛陽無私可貞固守此无咎也九五无妄之疾勿藥有喜五以中正當尊位下復以中正順應之无妄之至其道无以加矣无妄之所謂疾者如舜之有庳周公之管蔡孔子之叔孫武叔是也勿以藥治之則有喜也上九无妄行有𤯝无攸利无妄之極也極而復行過於理矣何所利乎大畜乾下艮上初九有厲利已大畜艮畜乾也初剛健居下必上進者然安能敵四在上之勢若犯之而進則危厲故利在己而不進也九二輿說輹雖剛健而得中知為五所畜止不可犯而不進如車脫其輻謂不行也九三良馬逐利艱貞曰閑輿衛利有攸往上處畜之極而思變與三不相畜而志相合三剛健在上者與之相合其進如良馬之馳逐然不可忘備與慎故宜艱難其事由貞正之道當日閑習其車輿與其防衛則利有攸往六四童牛之牿元吉大臣當畜之任上畜止人君之邪心下畜止天下之惡於未發之前猶童牛而加牿則大善而吉也六五豶豕之牙吉居君畜止天下之邪惡在知其本得其要而已不尚威刑而修政教是猶患豕牙之利不制其牙而豶其勢也上九何天之衢亨小畜畜之小故極而成大畜畜之大故極而散天路亨通旡有蔽阻則畜道變矣頤震下艮上初九舍爾靈龜觀我朶頥㓙陽體剛明足以養正若志在上行應於六四是舍靈龜迷欲失已朶動其頥何所不至是以㐫也六二顛頥拂經于丘頥征㓙隂柔必待養於人者也以上飬下理之正也下求飬於初則拂經常上求養於上非道妄動則得㓙也六三拂頥貞㓙十年勿用无攸利隂柔動不中正拂違於頥之正道是以㓙也十年勿用謂終不可用无所往而利也六四顛頥吉虎視耽耽其欲逐逐无咎四與初為應反頼下之養者也顛倒也然以貴下賤故吉也才質隂柔頼人以濟濟人之所輕當養其威嚴重其體貌則下不敢易又取於人者必逐逐相繼而不窮則無咎也六五拂經居貞吉不可渉大川五順從於上上師傅之位君養人者也反頼養於人然必居守貞固篤於委任則吉也以隂柔之質無剛貞之性能持循於平時當艱難變故則不可恃矣上九由頥厲吉利渉大川剛陽為師傅而君順從天下由之以養也必憂勤兢畏則吉也能竭其才力濟天下之艱危乃稱委遇大過巽下兊上初六藉用白茅无咎以柔在下用茅藉物之象不措諸地而藉以茅過於慎也過於敬慎為之非艱而可以保其安而無過咎九二枯楊生稊老夫得其女妻无不利大過之陽過中居柔而比初枯楊生根老夫得女妻之象能成生育之功故无不利九三棟橈㓙大過之陽復以剛自居而不得中動則違於中和而拂於衆不勝其任如棟之橈傾敗其室是以㐫也九四棟隆吉有它吝剛柔得宜能勝其任如棟之隆起是以吉也若又與初六之隂相應是有它也有它則有累於剛雖未至於大害亦可吝也謂可少也九五枯楊生華老婦得其士夫无咎无譽中正居尊當大過之時下無應與而上比過極之隂如枯楊之生華無益於枯也猶士夫而得老婦雖无過咎殊非美也故云无咎无譽上六過渉滅頂㓙无咎小人過常越理不恤危亡如過渉於水至滅没其頂其㓙可知禍自取也何所怨咎坎坎下坎上初六習坎入于坎窞㓙隂柔居隂之下柔弱無援惟益陷於深險耳其㓙可知窞坎中之陷處九二坎有險求小得當坎險之時陷二隂之中是有險也然其剛足以自衛居中動不失宜是所求小得也六三來之坎坎險且枕入于坎窞勿用隂柔而處不中正來與之皆坎險而居亦險枕謂支倚不安所處如此惟益入于深險耳不可用也六四樽酒簋貳用缶納約自牖終无咎以在髙位故言為臣處險之道大臣當險難之時惟當盡其質實而已譬如燕享用一樽之酒三簋之食瓦缶之器質之至也又湏納約自其明處如張良之諫廢太子而招致四皓如左師觸龍之於趙太后是也九五坎不盈祇既平无咎雖以剛中居尊位然上下無助安能獨濟天下之險方在坎中是不盈也必祗平而出乃得无咎上六係用徽纒寘于叢棘三歳不得㓙隂柔居險之極如係縛之以徽纒囚寘於叢棘之中三歳之久不得出也其㓙可知離離下離上初九履錯然敬之无咎陽居下好動欲進其履錯然然居明而剛知進退之義而敬慎之則不至於咎者矣六二黄離元吉以文明中正之徳上同於文明中順之君所以為大喜之吉也九三日昃之離不鼓缶而歌則大耋之嗟㓙八純卦皆有三體之義離二明繼照在人事最大三居下體之終是前明將盡後明繼之時人之始終也故為日下昃之明也將没矣當鼓缶而歌樂其常理不然則以傾没為嗟憂乃為㓙也九四突如其來如焚如死如棄如離下體而升上體在上而近君繼承之象也陽居離體剛躁而不中正突然而來氣燄如焚不善如此必被誅殺為衆所棄絶矣㓙不假言也六五出涕沱若戚嗟若吉居尊位而文明中正然在下無助獨附麗於剛陽之間畏懼憂慮出涕戚嗟如此之深所以能保其吉也上九王用出征有嘉折首獲匪其醜无咎明照足以察邪惡剛斷足以行威利王者宜用如此則有嘉美之功然當折取其魁首所執獲者非漸染詿誤之衆則无殘暴之咎也咸艮下兊上初六咸其拇以㣲處初如人足大指之動未足以感人而至也六二咸其腓㓙居吉腓足肚行則先動二中正之人以其在咸而應五故戒以不可如腓先動則躁妄自失所以㓙也若安其分不自動則吉也九三咸其股執其隨往吝股在身之下足之上不能自由隨身而動者也陽好上而說隂三下能自主所執守者如股隨於物也陽剛之中如此而往可羞吝者也九四貞吉悔亡憧憧往來朋從爾思貞者虚中無我之謂也四在中而居上心之位也故直言感之道不言咸其心者感乃心也貞正則吉而悔亡夫貞一其意則窮天下无不感通若往來憧憧然用其私心以感物朋從爾思所感狹矣既主於一隅一事豈能廓然無所不通者乎九五咸其脢无悔五應二以比上則偏私淺狹非人君之道脢背肉也所不見也言能感非其所見而說者則得人君感天下之正而無悔也上六咸其輔頰舌輔頰舌所用以言也隂柔說體居感之深不能以至誠感物而發見於口舌之間小人女子之常態也豈能動於人也恒巽下震上初六浚恒貞㓙无攸利柔暗守常不能度勢四雖正應然震體陽剛居髙志上而不下應初之志異乎常矣而初求望之深堅固而不知變㓙之道況常如此无所往而利矣九二悔亡陽居隂位不得其正非常理所富其悔然二五以中相應其居與動皆得中則不失其正矣故其悔亡九三不恒其徳或承之羞貞吝三得其常處然志從於上風復從雷於常處而不處不常之人也其徳不常則羞辱有時而至矣固守不常以為常可羞吝也九四田無禽以陽居隂處非其位處非其所雖使常乆如田獵而無禽獸之獲謂徒用力而無功也六五恒其徳貞婦人吉夫子㓙隂柔應陽剛居中而應中恒乆則其徳為貞此婦人之恒道也故吉若大夫而以順從於人為常則失其剛陽之正乃㓙也上六振恒㓙居恒之極在震之終隂不安於上柔不能固其守以振為恒者也振者抖擻運動之意在上而以是為常其㓙宜矣遯艮下乾上初六遯尾厲勿用有攸往它卦以下為初遯者往也前者往矣故初反為尾遯而在後不及者也是以危也然㣲者易於晦藏既已後矣不可往也六二執之用黄牛之革莫之勝說二五以中正之道相與之固如執繫之以黄牛之革也其交之固不可勝言也在遯時故極言之九三係遯有疾厲畜臣妾吉遯貴速而逺三係累於二故其遯為有疾害也是以危也小人女子親愛之則忠戀其上故以畜養臣妾則吉也九四好遯君子吉小人否四剛者與初為正應是所愛也君子義茍當遯則去而不疑故吉小人則䁥於所好至陷辱其身而不能已聖人以四處隂而有係故設小人不善之戒九五嘉遯貞吉遯非人君之事然有所避逺乃遯也處中正無私係之失所以為吉也故為貞正而吉上九肥遯無不利上九乾體下無係應是飄然逺逝遯去冇餘裕者也故肥窮困之時善處如此何所不利大壯乾下震上初九壯于趾征㓙有孚乾剛在下壯于趾也以剛處壯雖居上猶不可行况在下乎故征則其㓙可必矣九二貞吉以陽剛居柔處中是剛柔得中不過於壯得貞正而吉也九三小人用壯君子用罔貞厲羝羊觸藩羸其角此君子小人以位言剛陽處壯又當體乾之終在小人則為用其壯勇在君子則為用罔罔无也蔑視於事无復忌憚也夫剛柔得中則不折不屈施於天下而无不宜剛太過則多傷莫與貞固守此危道也猶羝羊喜觸藩籬必摧困其角矣九四貞吉悔亡藩决不羸壯于大輿之輹九居四為不正居子道長之時豈可有不正也小失則害亨進之勢故戒以貞則吉而悔亡藩籬决開不復羸其壯如强壯大車之輪輻旡輻折敗車之悔也六五䘮羊于易无悔四陽方長而並進五以柔居上能用和易之道群陽無所用其剛䘮其壯于和易故无悔也上六羝羊觸藩不能退不能遂无攸利艱則吉處隂震終而當壯極其過可知如羝羊觸藩籬進則礙身退則妨角進退皆可知也所以然者以才本隂柔不能勝已就義又不能終用其壯故无所往而利也若既知艱而處柔則吉矣晉坤下離上初六晉如摧如貞吉罔孚裕无咎升進抑退皆以正則吉也始進之時茍欲信於上之心切非汲汲以失其守則悻悻以傷於義是有咎也茍尚未見信當寛裕自守旡急於求上之信則无咎也六二晉如愁如貞吉受兹介福于其王母以中正柔和之徳上旡應援非强奮於進者也故愁如然守其貞正則當得吉乆而必彰王母謂隂之至尊者指六五也六五同徳大明之君必當求之加之寵禄受大福也六三衆允悔亡三隂皆順上者也六三雖不得中正然處順之極是與衆同志順上之大明是以亡其中正之失也九四晉如鼫鼠貞厲以九居四處非其位貪據髙位者也三隂與上同徳順麗於上勢必上進四心畏忌之夫貪而畏人者鼫鼠也故云貞固守此其危可知六五悔亡失得勿恤往吉无不利以柔居尊本當有悔以大明而下皆順附故其悔得亡也然大明或過於察察失委任之道故戒以失得勿恤夫盡天下之公豈當復自用其私察也如此而往故吉而无不利上九晉其角維用伐邑厲吉无咎貞吝剛極則有强猛之過進極則有躁急之失維獨用於自治則守道愈固遷善愈速雖傷於厲則吉且无咎然嚴厲非安和之道故於貞正之道為可吝也不失中正為吉明夷離下坤上初九明夷于飛垂其翼君子于行三日不食有攸往主人有言昏暗在上傷陽之明使不得上進君子見事之㣲故行去避之困窮至于三日不食也夫垂其翼傷其所以飛爾其明未顯故有所往則衆人疑恠而主人有言也六二明夷夷于左股用拯馬壯吉至明中正而體順順時善處者也故雖為所傷傷不甚切夷于左股也雖然亦必自免有道拯用壯健之馬則獲之速而吉也九三明夷于南狩得其大首不可疾貞至明居下而為下之上至闇在上而處窮極之地正相敵應將以明去闇也南狩謂前進而除害也當克獲其大首謂闇之魁首上六義既誅其大首舊染汚俗當以漸正之不可疾遽也斯也其湯武之事乎六四入于左腹獲明夷之心于出門庭以隂居陽而在隂柔之體處近君之位是小人由隠僻之道深入其君得其心意也既得其心意而後行其威福於外六五箕子之明夷利貞箕子商之舊臣而同姓親切近於紂故徉狂為奴自晦其明以免於害外晦其明内守其正以五隂柔故戒以宜如箕子之貞固也君道亦有當外晦内正之時上六不明晦初登于天後入于地在至髙之地本當逺照明既夷傷不明而晦故初登後入于地也家人離下巽上初九閑有家悔亡治家之始能以法度為之防閑則不至於有悔六二无攸遂在中饋貞吉治家之道大要以剛為善六二隂柔居柔故無所為而可也若在婦人之道則其正而吉也而主饋故云中饋九三家人嗃嗃悔厲吉婦子嘻嘻終吝以陽居剛正而不中治家過乎剛者也故家人嗃嗃然有悔於嚴厲然齊肅祗畏猶為家人之吉也若婦子嘻嘻放肆則終可羞吝六四富家大吉巽順於事而由正道能保其富者也能有其富是能保其家也吉孰大馬九五王假有家勿恤吉男中止居尊於外女中正順應於内王者極乎有道之家也家正而天下治矣故不憂勞而吉也上九有孚威如終吉治家以有孚為本為善不由至誠已且不能常守也况欲使人乎為家之患常在禮法不足而瀆慢生也故必有威嚴則能終吉保家之道在有孚威如二者而已睽兊下離上初九悔亡䘮馬勿逐自復見惡人无咎暌乖之時以剛動於下有悔可知所以得亡者九四在上亦以剛陽暌離無與自然同類相合故能亡其悔也馬者所以行也暌獨無與不能行是䘮其馬也四既與之合則能行矣是勿逐而馬復自得也惡人與已睽異者也見者與相通也如此則得含𢎞之道姦㓙可化仇敵可革无㓙咎矣九二遇主于巷无咎在睽時隂陽相應之道衰則剛柔相戾之意勝君臣睽離其咎大矣故二當委曲相求期於㑹遇也所謂委曲者以善道宛轉將就使合而已非枉己屈道也六三見輿曳其牛掣其人天且劓无初有終三隂柔居剛欲進從正應為上下二陽所侵凌輿牽曳於後牛掣阻於前天髠首也劓截鼻也三力進以犯之故重傷是無初也三敵合居剛守正之道暌極則正應有終合之理是有終也九四睽孤遇元夫交孚厲无咎當暌之時孤處二隂之間孤立無與自然同徳相求故與初九之元夫遇也元善也上下二陽以至誠相合故雖危厲而无咎也六五悔亡厥宗噬膚往何咎隂柔當暌而居尊位有悔可知以有剛陽正應故悔亡也正應其宗黨也輔翼之以剛陽之道而入之者深如齧其肌膚也如是往而有慶何咎之有上九睽孤見豕負塗載鬼一車先張之弧後說之弧匪冦婚媾往遇雨則吉睽極則咈戾而難合剛極則躁暴而不詳明極則過察而多疑有三之正應實不孤而其才性如此自睽孤也其見三如豕之汙穢可惡之甚也鬼本無形而又見載鬼一車妄之極也先張弧欲射之妄安能常終必復正故後說弧而不射與三非復是冦讐乃婚媾也自此以往隂陽交而和暢則吉也蹇艮下坎上初六往蹇来譽隂柔旡援往而益蹇不往而來止而不進則有見㡬知時之美譽也六二王臣蹇蹇匪躬之故五方在大蹇之中二以中正應之致力於蹇之艱蹇至甚主在濟君非為身故聖人稱其志義可嘉也九三往蹇來反三往應上上隂柔旡位不足以為援故蹇也來還歸也當蹇之時在下者皆柔必依於己故來為反其所也稍安之地也六四往蹇來連往則益入於坎險之深往蹇也四與三相比相親者也二與初同類相與者也四居上位而與在下者同有得位之正同處蹇難之世其志不謀而相同是來則與在下之衆相連合也九五大蹇朋來五居君位而在蹇難之中是天下之大蹇也又在隂中亦為大蹇而二在下以中正相應是得朋助之來也而為吉也臣不及君能賛助之而已不能濟天下之難也上六往蹇來碩吉利見大人厄蹇窮蹇隂柔冒險而往所以蹇也不往而來從五求三得剛陽之助是以碩也碩寛裕之稱其蹇得舒則為吉也五陽剛中正居君位大人也蹇極之時利見大人則能濟於蹇也皇王大紀卷十五

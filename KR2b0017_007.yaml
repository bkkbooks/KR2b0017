body:
  text: 皇王大紀卷七宋胡宏撰三王紀成湯二十三祀大旱祀周棄以配稷二十四祀大旱王遍走羣望以六事自責曰政不節歟使民疾歟宫室營歟女謁盛歟苞苴行歟讒夫昌歟何不雨之極也最後禱於桑林之社天油然作雲沛然下雨歲則大熟天下歡洽遂作桑林之樂名曰大濩作諸器之用銘以為警戒史失之矣其盤銘有曰茍日新日日新又日新欲其德日新也德日新故其政日新也天下無弊事而人受其福也自神農氏大興農桑之業生民衣被其業後世聖人修其制度不忘其初天子必有籍田千畝冕而朱紘躬秉耒三推諸侯必有籍田百畝冕而青紘躬秉耒九推以事天地山川社稷先祖以為醴酪粢盛於是乎取之身致其誠信誠信之謂盡盡之謂敬敬盡然後可以事神明古者公田籍而不稅市㕓而不稅關譏而不征林麓川澤以時入而不禁春省耕而補不足秋省斂而助不給凡使民興事任力任老者之事食壯者之食用民之力歲不過三日三年耕必有一年之食九年耕必有三年之食冢宰制國用必於歲之杪五榖皆入然後制國用用地大小視年之豐耗以三十年之通制國用量入以為出祭用數之仂喪用三年之仂太史典禮執簡記奉諱惡天子齋戒受諫司會以歲之成質於天子冡宰齋戒受質大樂正大司寇市三官以其成從質於天子大司徒大司馬大司空齋戒受質百官各以其成質於三官大司徒大司馬大司空以百官之成質於天子百官齋戒受質然後休老勞農成歲事制國用先王必舉其定國之數以地廣狹年之上下禮之厚薄以為禮之大經禮之大倫凶旱水溢年雖大殺民無菜色衆不懼國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非國也古者天子諸侯必有公桑蠶室近川而為之築宫仞有三尺棘牆而外閉之大昕之朝君皮辨素積卜三宫之夫人世婦之吉者先入蠶于蠶室奉種浴于川桑于公桑風戾以食之歲既單矣世婦卒蠶奉繭獻于君于夫人曰此所以為君服歟遂副禕而受之因少牢以禮之及良日后夫人繅三盆手遂布于三宫夫人世婦之吉者使繅遂朱緑之玄黃之以為黼黻文章社而賦事蒸而獻功服既成君服以祀先王先公敬之至也自包犧氏以田漁教民後世聖人立制度以習軍律天子諸侯無事則歲三田傳曰田者大艾草以防或舍其中褐纒旃以為門裘纒質以為槸間容握驅而入轚則不得入左者之左右者之右然後焚而射焉天子發然後諸侯發諸侯發然後大夫士發天子發抗大綏諸侯發抗小綏獻禽於其下故戰不出頃田不出防不逐奔走古之道也記曰天子不合圍諸侯不掩羣大夫不麛不卵士不塞隱庶人不數罟罟必四寸然後入澤梁天子殺則下大綏諸侯殺則下小綏大夫殺則止佐車佐車止則百姓獵射左膘逹于右腢為上殺射右耳本者次之射左髀逹于右䯚為下殺上殺為乾豆中殺為賓客下殺充君之庖靣傷不獻踐毛不獻不成禽不獻禽雖多每禽擇取三十焉其餘以與士大夫習射於澤宫田雖得禽射不中不得取禽田雖不得禽射而中則得取禽古者以辭讓取不以勇力取不風不暴不行火草木不折不操斧斤不入山林獺祭魚然後虞人入澤梁豺祭獸然後入山林鳩化為鷹鷹隼擊然後設罻羅昆蟲未蟄不以火田鳥獸孕禁罝羅矠魚龞水蟲孕禁罜䍡設穽鄂上蟄發講罛罶取名魚登川禽禁鯤鮞長麑􅀢翼鷇卵舍蚳蝝不殺胎不夭夭不覆巢不槎蘖伐一樹殺一獸必以其時故山不童澤不竭鳥獸魚龞皆得其所無事而不田曰不敬田不以禮曰暴天物禮也者令於天時設於地財順於鬼神合於人心理萬物者也是故天時有生也地理有冝也人官有能也物曲有利也天不生地不養君子不以為禮也鬼神弗享也居山以魚鱉為禮居澤以鹿豕為禮君子謂之不知禮王初作囿養禽獸以為田獵之常所是故有養獸之官及歲時齋戒沐浴而躬朝之犧牷祭牲必於是取之敬之至也君召牛納而視之擇其毛而卜之吉然後養之君皮辨素積朔月月半君巡牲所以致力孝之至也天子七廟三昭三穆與太祖之廟而七諸侯五廟二昭二穆與太祖之廟而五大夫三廟一昭一穆與太祖之廟而三士一廟庶人祭於寢天子諸侯宗廟之祭春曰礿夏曰禘秋曰嘗冬曰蒸天子祭天下名山大川五嶽視三公四瀆視諸侯諸侯祭名山大川之在其地者天子諸侯祭因國之在其地而無主後者天子宗廟歲五享犆礿祫禘祫嘗祫蒸諸侯宗廟歲四享礿則不禘禘則不嘗嘗則不蒸蒸則不礿是故礿犆禘一犆一祫嘗祫蒸祫喪三年不祭唯祭天地社稷為越紼而行事祭豐年不奢凶年不儉司空執度量地以制邑度地以居民地邑民居必參相得田里不粥墓地不請凡居民材必因天地寒暖燥濕廣谷大川異制民生其間異俗剛柔輕重遲速異齊五味異和器械異制衣服異冝修其教不易其俗齊其政不異其冝不使山者居川不使渚者居中原無曠上無遊民食節事時少而無父者謂之孤老而無子者謂之獨老而無妻者謂之鰥老而無夫者謂之寡此四者天民之窮而無告也皆有常餼瘖聾跛躃斷折侏儒百工各以其器食之然後民咸安其居樂事勸功尊君親上於是興學六禮冠昏喪祭鄉相見七教父子兄弟夫婦君臣長幼朋友賔客八政飲食衣服事為異别度量數制司徒修六禮以節民性明七教以興民德齊八政以防淫一道德以同俗用水火金木飲食必時合男女頒爵用必當年德用民必順養耆老以致孝恤孤獨以逮不足上賢以崇德簡不肖以絀惡命鄉大夫論秀士升之司徒曰選士為選士者不征於鄉司徒論選士之秀者而升之學見樂正焉曰俊士為俊士者不征於司徒曰造士樂正崇四術立四教春秋教以禮樂冬夏教以詩書順先王詩書禮樂以造士禮在瞽宗書在上庠王太子王子羣后之太子卿大夫元士之適子國之俊選皆造焉凡入學以齒大樂正論造士之秀者以告于王而升諸司馬曰進士司馬辨論官材論進士之賢者以告于王而定其論論定而後官之任官而後爵之位定而後祿之大夫廢其事終身不仕死以士禮葬之命鄉簡不帥教者以教耆老皆朝于庠元日習射尚功習鄉上齒大司徒率國之俊士與執事焉不變右移之左左移之右如初禮不變移之郊如初禮不變移之遂如初禮不變屏之逺方終身不齒造士將出學小胥大胥小樂正簡不帥教者以告于大樂正大樂正以告于王王命三公九卿大夫正之終身不齒有發則命大司徒教士以車甲凡執技論力適四方裸股肱決射御凡執技以事上者祝史射御卜醫及百工凡執技以事上者不二事不移官出鄉不與士齒仕於家出鄉不與士齒爵人於朝與士共之刑人於市與衆棄之是故公家不畜刑人刑人不在君側大夫弗養士遇之塗弗與言也屏之四方唯其所之不及以政弗故生也諸侯天子命之教然後興學小學在公宫南之左大學在郊天子將出征類于上帝冝于社造于禰禡于所征之地受命於祖受成于學出征執有罪反釋奠于學以訊馘告司寇正刑明辟以聽獄訟必三刺有旨無簡不聽附從輕赦從重凡制五刑必即天論郵罰麗於事凡聽五刑之訟必原父子之親立君臣之義以權之意論輕重之序慎測淺深之量以别之悉其聰明致其忠愛以盡之疑獄汜與衆共之衆疑赦之必察大小之比以成之成獄辭史以獄成告于正正聽之正以獄成告于大司寇大司寇聽之棘木之下大司寇以獄之成告于王王命三公參聽之三公以獄之成告于王王三又然後制刑凡作刑罰輕無赦刑者侀也侀者成也一成而不可變故君子盡心焉析言破律亂名改作執左道以亂政殺作淫聲異服竒技竒器以疑衆殺行偽而堅言偽而辨學非而博順非而澤以疑衆殺假於鬼神時日卜筮以疑衆殺此四誅者不以聽有圭璧金璋不粥於市犧牲宗廟之器不粥於市命服命車戎器兵車不粥於市錦文珠玉成器不粥於市衣服飲食不粥於市姦色亂正色不粥於市用器不中度布帛精粗不中數幅廣狹不中度五榖不時果實未熟木不中伐禽獸魚鱉不中殺不粥於市關執禁以譏禁異服識異言凡執禁以齊衆不赦過二十七祀甲辰制王子下嫁之儀正婚姻之禮明男女之分使至貴之女不得失柔巽之道有貴驕之志謙降從禮以成其尊高之德命之曰毋以天子之尊而乘諸侯毋以天子之富而驕諸侯隂從陽女順夫天地之義也往事爾夫必以禮義於是王子之嫁於諸侯者處尊貴有道尚質素而不尚華飾降屈柔順不盈極而亢其夫諸侯夫人莫不化之家道正而夏季驕淫之風變矣天子有虎賁諸侯有旅賁大夫有二車士有陪乘或曰乘二車則式佐車則否二車者諸侯七乘上大夫五乘下大夫三乘武車不式介者不拜古者天子五路玉路為先繁纓十二就金路九就象路七就革路五就木路一就王命以木路為大路以祀天君齊車羔幦虎犆大夫齊車鹿幦豹犆未命為士者不得乘飾車駢馬道路男子由右婦人由左車從中央宫中謂之壼室中謂之陳廟中謂之唐一逹曰道路二逹曰歧旁四逹曰衢五逹曰康六逹曰莊九逹曰逵君天下曰天子朝諸侯分職授政任功曰子一人踐祚臨祭祀內事曰孝王某外事曰嗣王某天子當依而立諸侯北面而見曰覲天子當寧而立諸公東靣諸侯靣西曰朝臨諸侯畛于鬼神曰有天王某甫崩曰天王崩復曰天子復告喪曰天子登遐措之廟立之主曰帝天子未除喪曰豫小子生名之死亦名之五官致貢曰享五官之長曰伯是職方其擯於天子也曰天子之吏天子同姓謂之伯父異姓謂之伯舅自稱於諸侯曰天子之老於外曰公於其國曰君九州之長入天子之國曰牧天子同姓謂之叔父異姓謂之叔舅於外曰侯於其國曰君自稱曰天子之力臣諸侯見天子曰臣某侯某亦曰某土之守臣某其在邉邑曰某屏之臣某其於敵以下曰寡人其在凶服曰適子孤臨祭祀內事曰孝子某侯某外事曰曽孫某侯某死曰薨復曰某甫復矣庶方小侯入天子之國曰某入於外曰子自稱曰孤擯者亦曰孤進賢逹能謂之大夫通古今辨然否謂之士列國之大夫入天子之國曰某士自稱曰陪臣某於外曰子於其國曰寡君之老使者自稱曰某諸侯使人於諸侯使者自稱上大夫曰下臣擯者曰寡君之老下大夫自名擯者曰寡大夫世子自名擯者曰寡君之嫡公子曰臣孽士曰傳遽之臣於大夫曰外私大夫私事使私人擯則稱名四夷之君地雖大曰子於內自稱曰不榖於外自稱曰王老仕於公曰臣仕於家曰僕國君不名卿老世婦大夫不名世臣姪娣士不名家相長妾君大夫之子不敢自稱曰豫小子大夫士之子不敢自稱曰嗣子某不敢與世子同名天子之妻曰后公侯曰夫人大夫曰孺人士曰婦人庶人曰妻邦君之妻君稱之曰夫人夫人自稱於天子曰老婦自稱於其君曰小童邦人稱之曰君夫人稱諸異邦曰寡小君異邦人亦稱之曰君夫人自世婦以下自稱曰婢子三十祀初成湯娶有莘氏生太丁為嫡子蚤卒有子曰太甲為世嫡孫以伊尹為太保湯崩夀百歲伊尹奉太甲即位葬成湯於亳北論曰太史公記湯崩太丁蚤死外丙立三年仲壬立四年相繼而崩然後立太甲非其實也何以知非其實二帝官天下定於與賢三王家天下定於立嫡立嫡者敬宗也敬宗者尊祖也尊祖者所以親親也兄死弟及不敬宗尊祖本支亂而爭奪起矣豈親親之道哉且成湯伊尹以元聖之德戮力創王業乃舍嫡孫而立諸子亂倫壞制大開後嗣爭奪之端乎故公儀仲子舍孫而立子言偃問曰禮歟孔子曰否立孫夫孔子殷人也冝知其先王之故矣而不以立弟為是此以義理知其非者一也夫賢君先能遵先王之道不賢之君反是者也以殷世考之自三宗及祖乙祖甲皆立子其立弟者盤庚爾必有所不得已也豈有諸聖賢之君皆不遵先王之制而沃丁小甲諸中才之君反皆能耶此以人情知其非者二也商自沃丁始衰太史公陽甲之紀曰自仲丁以來廢嫡而更立諸弟子諸弟子或爭相代立比九世亂以其世考之自沃丁至陽甲立弟者九世則知仲丁之名誤也沃丁既以廢嫡立諸弟子生亂為罪則成湯未嘗立外丙仲壬明矣不然是成湯首為亂制又可罪沃丁乎此以事實知其非者三也唐李淳風通於小數猶能逆知帝王世數多少邵康節極數知來非淳風比也其作皇極經世史亦無外丙仲壬名世此以厯數知其非者四也經所傳者義也史所載者事也事有可疑則棄事而取義可也義有可疑則假事以證義可也若取事而忘義則雖無經史可也太甲太甲元祀古者天子崩太子尸天位居喪哀慕天下事付之冢宰伊尹為殷保衡以天下自任首訓太甲以修身律物之道是為伊訓商書敘曰成湯既沒太甲元年伊尹作伊訓肆命徂后伊訓惟元祀十有二月乙丑伊尹祠於先王奉嗣王祗見厥祖侯甸羣后咸在百官總己以聽冢宰伊尹乃明言烈祖之成德以訓于王曰嗚呼古有夏先后方懋厥德罔有天災山川鬼神亦莫不寧塈鳥獸魚鱉咸若于其子孫弗率皇天降災假手于我有命造攻自鳴條朕載自亳惟我商王布昭聖武代虐以寬兆民允懷今王嗣厥德罔不在初立愛惟親立敬惟長始于家邦終于四海嗚呼先王肇修人紀從諫弗咈先民時若居上克明為下克忠與人不求備檢身若不及以至于有萬邦茲惟艱哉敷求哲人俾輔于爾後嗣制官刑警于有位曰敢有恆舞于宫酣歌于室時謂巫風敢有殉于貨色恆于遊畋時謂淫風敢有侮聖言逆忠直逺耆德比頑童時謂亂風惟茲三風十愆卿士有一于身家必喪邦君有一于身國必亡臣下不匡其刑墨具訓于蒙士嗚呼嗣王祗厥身念哉聖謨洋洋嘉言孔彰惟上帝不常作善降之百祥作不善降之百殃爾惟德罔小萬邦惟慶爾惟不德罔大墜厥宗肆命徂后太甲尸位專恣興事顛覆湯之典刑伊尹放諸桐宫有廢昏立明之意太甲自怨自艾處仁遷義於是作太甲三篇商書敘曰太甲既立不明伊尹放諸桐三年復歸于亳思庸伊尹作太甲三篇太甲上篇曰惟嗣王不惠于阿衡伊尹作書曰先王顧諟天之明命以承上下神祗社稷宗廟罔不祗肅天監厥德用集大命撫綏萬方惟尹躬克左右厥辟宅師肆嗣王丕承基緒惟尹躬先見于西邑夏自周有終相亦惟終其後嗣王罔克有終相亦罔終嗣王戒哉祗爾厥辟辟不辟忝厥祖王惟庸罔念聞伊尹乃言曰先王昧爽丕顯坐以待旦旁求俊乂啓迪後人無越厥命以自覆慎乃儉德惟懷永圖若虞機張往省括于度則釋欽厥止率乃祖攸行惟朕以懌萬世有辭王未克變伊尹曰茲乃不義習與性成豫弗狎于弗順營于桐宫密邇先王其訓無俾世迷王徂桐宫居憂克終允德三祀伊尹既放太甲必選天下名德重望與之居處出入禁切曉喻之故太甲悟太甲中篇曰惟三祀十有二月朔伊尹以冕服奉嗣王歸于亳作書曰民非后罔克胥匡以生后非民罔以辟四方皇天眷右有商俾嗣王克終厥德實萬世無疆之休王拜手稽首曰豫小子不明于德自底不類欲敗度縱敗禮以速戾于厥初尚賴匡救之德圖惟厥終伊尹拜手稽首曰修厥身允德協于下惟明后先王子惠困窮民服厥命罔有不恱並其有邦厥鄰乃曰徯我后后來無罰王懋乃德視乃厥祖無時豫怠奉先思孝接下思恭視逺惟明聽德惟聰朕承王之休無斁太甲下篇曰伊尹申誥于王曰嗚呼惟天無親克敬惟親民罔常懷懷于有仁鬼神無常享享于克誠天位艱哉德惟治否德亂與治同道罔不興與亂同事罔不亡終始愼厥與惟明明后先王惟時懋敬厥德克配上帝今王嗣有令緒尚鑒兹哉若升髙必自下若陟遐必自邇無輕民事惟難無安厥位惟危慎終于始有言逆于汝志必求諸道有言遜于汝志必求諸非道嗚呼弗慮胡獲弗為胡成一人元良萬邦以貞君罔以辨言亂舊政臣罔以寵利居成功邦其永孚于休孟子曰公孫丑問曰伊尹曰豫弗狎于弗順放太甲于桐民大悅太甲賢又反之民大悅賢者之為人臣也其君不賢則固可放歟孟子曰有伊尹之志則可無伊尹之志則篡也論曰孔子曰太甲既立不明伊尹放諸桐三年夫三年之喪天下之通喪也太甲上承其祖居憂三年冝矣何以謂之放乎曰桐宫非嗣王居憂之常所也伊尹於是有廢昏立明之意故特謂之放也蘇子瞻曰湯放桀伊尹放太甲聖人將以救天下後世不得已而為之者也以為不得已之變則可以為道固當然則不可甚矣其鑿也興廢道之常也聖人當廢興之際不得已而有為者所以由道也若非道固當然而迫於不得已之變是無本也本則不立將何以識輕重定取舍濟天下之艱難乎是故衡陳然後可以決輕重本立然後可以趨變化皇王大紀卷七

body:
  text: 皇王大紀卷三十宋胡宏撰三王紀宣王元年甲戌二年天下大旱三年旱四年旱五年旱六年大旱大雅二十四篇曰雲漢八章章十句仍叔美宣王也宣王承厲王之烈内有撥亂之志遇烖而懼側身脩行欲銷去之天下喜於王化復行百姓見憂故作是詩也倬彼雲漢天河也昭回轉于天王曰於乎何辜今之人天降喪亂饑饉薦重也臻至也靡神不舉靡愛斯牲圭璧既卒寧莫我聽旱既太甚藴言暑也隆言雷也蟲蟲言熱也不殄絶也禋祀自郊徂宫上下奠瘞靡神不宗上天下地奠禮瘞物宗尊也后稷不克上帝不臨耗斁下土寧丁當也我躬旱既大甚則不可推去也兢兢恐也業業危也如霆如雷周餘黎民靡有孑遺昊天上帝則不我遺胡不相畏先祖于摧至也旱既大甚則不可沮止也赫赫旱氣炎炎熱氣云我無所大命近止靡瞻靡顧羣公先正百辟卿士也則不我助父母先祖胡寧忍予旱既太甚滌滌山川旱氣山無木川無水也旱魃旱神也為虐如惔燎之也如焚我心憚勞也暑憂心如熏灼也羣公先正則不我聞昊天上帝寧俾我遯旱既太甚黽勉畏去胡寧瘨病也我以旱憯不知其故祈年孔夙方社不莫昊天上帝則不我虞敬恭明神宜無悔恨也怒旱既太甚散無友紀鞫哉庶正疚哉冢宰趣馬師氏膳夫左右嵗㐫則殺禮百官禄餼不足矣靡人不周救也無不能止瞻卬昊天云如何里或云憂也瞻卬昊天有嘒衆星貌其星大夫君子昭假無贏大命近止無棄爾成何求為我以戾定也庶正瞻卬昊天曷惠其寧大雅二十五篇曰崧髙八章章八句尹吉甫美宣王也天下復平能建國親諸侯褒賞申伯焉崧髙維嶽駿大也極于天維嶽降神生甫及申維申及甫維周之翰幹也四國于蕃四方于宣亹亹申伯王纉之事于邑于謝周之南國也南國是式王命召伯定申伯之宅登成也是南邦世執其功事也王命申伯式是南邦因是謝人以作爾庸城也王命召伯徹治也申伯土田王命傅御治事之官遷其私人家人也申伯之功召伯是營有俶作也其城寢廟既成既成藐藐髙美貌王錫申伯四牡蹻蹻牡貌鉤膺樊纓也濯濯光明也王遣申伯路車乘馬四馬也我圖爾居莫如南土錫爾介圭以作爾寳徃近已也王舅申伯宣王之舅南土是保申伯信邁王餞于郿申伯還南謝于誠歸王命召伯徹申伯土疆以峙其粻式遄其行申伯畨畨武勇也既入于謝徒御嘽嘽喜樂也安舒也周邦咸喜戎有良翰不丕也顯申伯王之元舅文武是憲有文有武可為表式申伯之徳柔惠且直揉此萬邦聞于四國吉甫作誦其詩孔碩其風肆長也好以贈申伯王以樊侯仲山甫為相大雅二十六篇曰烝民八章章八句尹吉甫美宣王也任賢使能周室中興焉天生烝衆也民有物事也有則法也民之秉彛常也好是懿美也徳天監有周昭假于下保茲天子生仲山甫仲山甫之徳柔嘉維則令儀令色小心翼翼古故也訓道也是式威儀是力天子是若順也明命使賦布也王命仲山甫式是百辟纉戎大也祖考王躬是保出納王命王之喉舌冢宰也賦政于外四方爰發肅肅王命仲山甫將行也之邦國若否仲山甫明之既明且哲以保其身夙夜匪解以事一人人亦有言柔則茹之剛則吐之維仲山甫柔亦不茹剛亦不吐不侮矜寡不畏彊禦人亦有言徳輶如毛輕也民鮮克舉之我儀宦也圖之維仲山甫舉之愛隱也或曰惜也莫助之衮君之上服職王職也有闕維仲山甫補之仲山甫出祖四牡業業言髙大也征夫捷捷言樂事也毎懐靡及四牡彭彭盛也八鸞鏘鏘鳴聲王命仲山甫城彼東方四牡騤騤八鸞喈喈仲山甫徂齊式遄其歸言周人望其速回也吉甫作誦穆如清風清㣲之風飬萬物者也仲山甫永懐以慰其心大雅二十七篇曰韓奕六章章十二句尹吉甫美宣王也能錫命諸侯奕奕梁山維禹甸治之之有倬其道有倬如之道韓侯受命王親命之纉戎大也祖考無廢朕命夙夜匪解䖍共固執也爾位朕命不易幹不庭直方方以佐戎辟四牡奕奕孔脩長也且張大也韓侯入覲以其介圭入覲于王王錫韓侯淑善也旂綏章所引以登車有采章也簟茀車蔽也錯衡文衡也𤣥衮赤舄鉤膺樊纓也鏤錫眉上曰鍚今之當盧以金飾之鞹鞃革軾中也淺幭虎皮覆式淺毛也鞗革轡也金厄鳥蠋也韓侯出祖出宿于屠地名顯父有顯徳者餞之清酒百壺其殽維何炰鼈鮮魚其䔩菜殽也維何維筍及蒲蒻也其贈維何乗馬路車籩豆有且多貌侯氏燕胥皆也韓侯取妻汾王大也或云指厲王也之甥蹶父卿士也之子韓侯迎止于蹶之里百兩彭彭八鸞鏘鏘不丕字顯其光諸娣從之祁祁徐靚也如雲韓侯顧之爛其盈門蹶父姞蹶父姓也孔武靡國不到為韓姞相攸莫如韓樂孔樂韓土川澤訏訏大也魴鱮甫甫大也麀鹿噳噳衆也有熊有羆有猫有虎慶既令居韓姞燕譽溥大也彼韓城燕安也師衆也所完以先祖受命因時百蠻王錫韓侯其追其貊奄受百國韓侯之先武王之子也長是蠻服之百國撫戎狄追貊之國因以其伯實寔也是也墉實壑溝也實畆實籍獻其貔皮赤豹黄羆皆猛獸也大雅二十八篇曰江漢六章章八句尹吉甫美宣王也能興衰撥亂命召公平淮夷江漢浮浮廣強貌武夫滔滔匪安匪遊淮夷來求既出我車既設我旟匪安匪舒淮夷來鋪病也江漢湯湯武夫洸洸武貌經營四方告成于王四方既平王國庶定時靡有爭王心載寧江漢之滸水瀍也王命召虎式辟四方徹我疆土匪疚病也匪棘急也王國來極中也于疆于理至于南海王命召虎來勤也旬營也來宣徧也文武受命召公維翰無曰予小子召公是似嗣也肇謀也敏疾也戎大也公事也用錫爾祉釐賜也爾圭瓉秬鬯一卣黒黍香草酒一噐也告于文人錫山土田于周受命自召祖命虎拜稽首天子萬年虎拜稽首對遂也揚王休作召公考成也天子萬壽明明天子令聞不已矢施也其文徳洽此四國大雅二十九篇曰常武六章章八句召穆公美宣王也有常徳以立武事因以戒焉赫赫明明王命卿士南仲大祖大師皇父整我六師以脩我戎既敬既戒惠此南國王謂尹氏命程伯休父左右陳行戒我師旅率彼淮浦省此徐土不留不處三事就緒誅其君弔其民為之立三有事之臣赫赫業業動也有嚴天子王舒徐也保安也作匪紹匪遊不敢繼以傲遊也徐方繹騷震驚徐方如雷如霆徐方震驚王奮厥武如震如怒進厥虎臣闞如虓虎鋪敦淮濆陳屯其兵於淮水之厓也仍執醜虜截治也彼淮浦王師之所王旅嘽嘽盛貌如飛如翰如江如漢如山之苞如川之流緜緜翼翼靚以敬也不測不克濯大也征徐國王猶謀也允塞徐方既來徐方既同天子之功四方既平徐方來庭徐方不回王曰還歸重黎羲和世叙天地掌四嶽之祀述諸侯之職陶虞之時姜氏為四伯歴虞夏商不失其守至周有甫有申有齊有許皆其苗胄也程伯休父始為大司馬焉王嘗視朝而宴姜后脱簮珥待罪于永巷王退朝使傅姆請曰王樂慾而不崇徳棄禮而怠於政亂之興自妾始妾豈能受天下之誅願賜以死王愀然變色使命后曰是寡人之過也夙興夜寢勤於政事厲王之時鹿鳴廢而和樂闕矣常棣廢而兄弟闕矣伐木廢而朋友闕矣四牡廢而君臣闕矣皇皇者華廢而忠信闕矣天保廢而福禄闕矣采薇廢而征伐闕矣出車廢而功力闕矣杕杜廢而師衆闕矣魚麗廢而法度闕矣南陔廢而孝友闕矣白華廢而亷恥闕矣華黍廢而蓄積闕矣由庚廢而隂陽失其道理矣南有嘉魚廢而賢者不安下不得其所矣崇丘廢而萬物失其道理矣蓼蕭廢而恩澤乖矣湛露廢而萬國離矣彤弓廢而諸夏衰矣菁菁者莪廢而無禮儀矣小雅盡廢故四夷交侵中國微矣小雅二十三篇曰六月六章章八句宣王北伐也六月棲棲簡閲貎戎車既飭四牡騤騤載是常服日月為常服戎服獫狁孔熾我是用急王于出征以匡王國比物四驪閑之維則物是毛物也則法也言先教戰維此六月既成我服我服既成于三十里師行三十里王于出征以佐天子出征以佐其為天子四牡脩廣其大有顒大貌薄伐獫狁以奏為也膚大也公功也有嚴威也有翼敬也共武之服共武之服以定王國獫狁匪茹整居焦穫周地接狄者侵鎬北方地及方至于涇陽織文鳥章白斾繼旐者也央央鮮明貌元戎十乘以先啟行戎車既安如輊如軒從後視之如輊從前視之如軒四牡既佶壯徤貌既佶且閑薄伐獫狁至于太原文武吉甫萬邦為憲吉甫燕喜既多受祉來歸自鎬我行永乆飲御進也諸友恩舊炰鼈鱠鯉侯維也誰在矣張仲孝友荆楚盛強王命方叔帥車三千乗征之楚人震恐去王號小雅二十四篇曰采芑四章章十二句宣王南征也薄言采芑芑菜也于彼新田于此菑畆言宣王能新美天下之士也方叔涖止其車三千師干之試方叔卿士受命為將臨衆試之也方叔率止乗其四騏四騏翼翼路車有奭赤貌簟茀魚服鉤膺樊纓也鞗革轡有垂也薄言采芑于彼新田于此中鄉方叔涖止其車三千旂旐央央方叔率止約軧錯衡朱而約之文衡八鸞瑲瑲聲也服其命服朱芾斯皇有瑲聲也葱蒼也珩三命葱珩鴥彼飛隼其飛戾天亦集爰止方叔涖止其車三千師干之試方叔率止鉦人伐鼓鉦以静之鼓以動之也陳師鞠告也旅顯允方叔伐鼓淵淵聲也振旅闐闐蠢動也爾蠻荆大邦為讎方叔元老克壯其猶方叔率止執訊獲醜戎車嘽嘽嘽嘽焞焞衆盛貌如霆如雷顯允方叔征伐獫狁蠻荆來威小雅二十五篇曰車攻八章章四句宣王復古也宣王能内脩政事外攘夷狄復文武之境土脩車馬備器械復㑹諸侯於東都因田獵而選車徒焉我車既攻堅也我馬既同齊也宗廟齊豪尚純戎事齊力尚強也田獵齊足尚疾也四牡龐龐充實也駕言徂東之洛也田車既好四牡孔阜東有甫草大也駕言行狩之子于苗選徒囂囂建旐設旄搏獸于敖地名駕彼四牡四牡奕奕言諸侯來㑹也赤芾金舄㑹同有繹陳也決鉤弦拾遂也既佽利也弓矢既調射夫既同助我舉柴積也四黄既駕兩驂不猗御者良也不失其馳舎矢如破習射御法也蕭蕭馬鳴悠悠斾旌不諠譁也徒御不驚大庖不盈之子于征有聞無聲肅也允矣君子展也大成小雅二十六篇曰吉日四章章六句美宣王田獵也能慎㣲接下無不自盡以奉其上焉吉日維戊戊午皆剛日也既伯既禱伯馬祖也田車既好四牡孔阜升彼大阜從其羣醜吉日庚午既差擇也我馬獸之所同麀鹿鹿牝曰麀麌麌多也漆沮之從天子之所從漆沮驅來也瞻彼中原其祁大也孔有儦儦俟俟或羣或友悉率左右以燕天子既張我弓既挾我矢發彼小豝殪此大兕一發而死曰殪以御賔客且以酌醴十年陳侯薨諡曰幽公子孝嗣是為僖公陳國風三篇曰衡門三章章四句誘僖公也愿而無立志故作是詩以誘掖其君也横木為門言淺陋也衡門之下可以棲遲遊息也泌泉水也之洋洋廣大也可以樂饑樂道忘饑豈其食魚必河之魴豈其娶妻必齊之姜豈其食魚必河之鯉豈其娶妻必宋之子陳國風四篇曰東門之池三章章四句刺時也疾其君之淫昬而思賢女以配君子也東門之池可以漚麻彼美淑姬可與晤遇也對也歌東門之池可以漚紵彼美淑姬可與晤語東門之池可以漚菅彼美淑姬可與晤言陳國風五篇曰東門之楊二章章四句刺時也昏姻失時男女多違親迎女猶有不至也東門之楊其葉牂牂盛貌昬以為期明星煌煌東門之楊其葉肺肺亦盛貌昬以為期明星晢晢十一年甲申小雅二十七篇曰鴻鴈三章章六句美宣王也萬民離散不安其居而能勞來還定安集之至于鰥寡無不得所焉鴻鴈于飛大曰鴻小曰鴈肅肅其羽羽聲之子侯伯卿士于征劬勞于野爰及矜人哀此鰥寡鴻鴈于飛集于中澤之子于垣百堵皆作一丈為板五丈為堵雖則劬勞其究安宅鴻鴈于飛哀鳴嗸嗸維此哲人謂我劬勞維彼愚人謂我宣示也驕秦仲戰死於西戎破之自厲王之流籍田禮廢虢文公言於王曰民之大事在農上帝之粢盛於是乎出民之蕃庶於是乎生事之供給於是乎在和恊輯穆於是乎興財用蕃殖於是乎始敦龎純固於是乎成今天子脩先王之緒而棄其大功匱神乏祀而困民之財將何以求福用民王不能從十二年初魯侯伯禽薨子考公酋無子立弟煬公熈自熈至魯侯敖子弟更立六世矣是年敖來朝以其子括與戲見王王欲立戲仲山甫曰不可不順必犯犯命必誅故出令不可不順也行而不順民將棄上夫下事上少事長所以為順也今建其少是教逆也若魯從之諸侯效之王命將有所壅若其不從而誅之是自誅也是事也誅亦失不誅亦失夏魯侯歸而薨諡曰武公王卒立戲是後諸侯多不遵先王之制矣齊侯無忌暴虐不道國人殺之諡曰厲公立其子赤赤誅殺厲公者七十人十六年晉侯費立僖公之孫也徙都于絳二十一年甲午小雅二十八篇曰庭燎三章章五句美宣王也因以箴之夜如何其夜未央庭燎大燭也之光光也君子至止鸞聲將將夜如何其夜未艾芟末曰艾庭燎晣晣明也君子至止鸞聲噦噦夜如何其夜鄉晨庭燎有煇光明㣲也君子至止言觀其旂小雅二十九篇曰沔水三章二章章八句一章六句規宣王也沔彼流水朝宗于海水猶有所朝宗也鴥彼飛隼載飛載止嗟我兄弟同姓臣也邦人諸友異姓臣也莫肯念亂誰無父母沔彼流水其流湯湯言放縱無所歸也鴥彼飛隼載飛載揚念彼不蹟不循道也載起載行心之憂矣不可弭止也忘鴥彼飛隼率彼中陵民之訛言寧莫之懲我友敬矣讒言其興小雅三十篇曰鶴鳴二章章九句誨宣王也鶴鳴于九臯深逺之澤也聲聞于野魚潛在淵或在于渚樂彼之園爰有樹檀其下維蘀他山之石可以為錯石錯可以琢玉鶴鳴于九臯聲聞于天魚在于渚或潛在淵樂彼之園爰有樹檀其下維榖惡木他山之石可以攻玉魯人奉括之子伯御弑其君戲諡曰懿公二十二年王封母弟友于鄭錫之祊田為巡狩助祭泰山湯沐之邑二十三年晉侯伐條三十年有兎舞于鎬京三十一年甲辰小雅三十一篇曰祈父三章章四句刺宣王也祈父司馬也祈圻畿同予王之爪牙胡轉予于恤靡所止居祈父予王之爪士胡轉予于恤靡所底止祈父亶不聰胡轉予于恤有母之尸饔小雅三十二篇曰白駒四章章六句大夫刺宣王也皎皎白駒宣王之末賢者有乗白駒而去者食我場苗縶之維之以永今朝所謂伊人於焉逍遥皎皎白駒食我場藿縶之維之以永今夕所謂伊人於焉嘉客皎皎白駒賁然來思爾公爾侯逸豫無期慎爾優游勉爾遁思皎皎白駒在彼空谷生芻一束其人如玉母金玉爾音而有遐心小雅三十三篇曰黄鳥三章章七句刺宣王也黄鳥黄鳥無集于榖無啄我粟此邦之人不我肯榖言旋言歸復我邦族黄鳥黄鳥無集于桑無啄我粱此邦之人不可與明言旋言歸復我諸兄黄鳥黄鳥無集于栩無啄我黍此邦之人不可與處言旋言歸復我諸父小雅三十四篇曰我行其野三章章六句刺宣王也我行其野蔽芾其樗惡木也昬姻之故言就爾居爾不我畜復我邦家我行其野言采其蓫惡菜也昬姻之故言就爾宿爾不我畜言歸思復我行其野言采其葍亦惡菜也不思舊姻求爾新特外昏成不以富亦祇以異小雅三十五篇曰斯干九章四章章七句五章章五句宣王考室也秩秩流行也斯干澗也幽幽南山如竹苞矣如松茂矣兄及弟矣式相好矣無相猶道也病也矣似嗣也續妣祖築室百堵西南其戸爰居爰處爰笑爰語約縮板之閣閣椓㨨土也之橐橐風雨攸除鳥䑕攸去君子攸芋大也覆也如跂斯翼如矢斯棘如鳥斯革如翬斯飛君子攸躋殖殖平正也其庭有覺大其楹噲噲其正噦噦其冥正晝冥夜也言寛明君子攸寧下莞蒲席上簟竹也乃安斯寢乃寢乃興乃占我夢吉夢維何維熊維羆維虺維蛇大人占之維熊維羆男子之祥維虺維蛇女子之祥乃生男子載寢之牀載衣之裳載弄之璋晝日衣下之餙也半圭曰璋臣之職也其泣喤喤朱芾斯皇芾天子純朱諸侯黄室家君王乃生女子載寢之地載衣之禓載弄之瓦禓褓也夜衣也瓦紡磚也無非無儀唯酒食是議無父母貽罹小雅三十六篇曰無羊四章章八句宣王考牧也誰謂爾無羊三百維羣誰謂爾無牛九十其犉黄牛黑唇曰犉爾羊來思其角濈濈爾牛來思其耳濕濕或降于阿或飲于池或寢或訛動也爾牧來思何蓑何笠或負其餱三十維物異毛色者三十也爾牲則具爾牧來思以薪以蒸以雌以雄爾羊來思矜矜兢兢言堅強也不騫虧也不崩群疾也麾之以肱畢來既升從人意也牧人乃夢衆維魚矣旐維旟矣大人占之衆維魚矣實維豐年隂陽和而魚衆多旐維旟矣室家溱溱衆也旐旟所以聚衆三十二年王師伐魯誅伯御立懿公之弟稱王欲得國子之能訓導諸侯者仲山甫曰魯侯肅恭明神敬事耆老賦事行刑必問於遺訓而咨於故實不干所問不犯所咨於是命魯侯於夷宫以為侯伯尹吉甫之子伯竒事父母孝後母疾之譖於吉甫吉甫放之伯竒抱石自投於河三十九年王伐姜戎戰于千畆王師敗績晉侯擊却戎兵全師以歸晉侯取齊姜以條之役生世子命之曰仇是戰也生少子命之曰成師師服曰異哉君之名子也四十年王既喪南國之師將料大原之民仲山甫曰古者司民協孤終司商協名姓司徒協旅司㓂協姦牧協職工協革場協入廪協出是則少多死生出入徃來者皆可知也於是又審之以事王治農於籍春蒐夏苗秋獮冬狩是皆習民數者也又何料焉王卒料之人民咨怨四十一年甲寅啟商之時有作倒薤篆者至於文王有赤雀銜書丹鳥入室之瑞而作鳥書王之世史籕作大篆四十三年王殺杜伯杜伯無辜其子隰叔奔晉四十六年王㑹諸侯田于圃日中見杜伯起於道左朱衣朱冠操朱弓朱矢射王若中心折脊者王暴崩諡曰宣王太子涅立皇王大紀巻三十

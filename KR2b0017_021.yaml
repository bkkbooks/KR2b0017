body:
  text: 皇王大紀卷二十一宋胡宏撰三王紀康王元年自帝太昊開明倫理後聖繼作至于康王修身齊家之法備矣於是集為十篇以垂後世統人倫曰天下之人莫不有家家之大至于王者極矣君臣父子夫婦謂之三綱夫婦父子君臣長幼朋友謂之五典又曰五常父子兄弟夫婦君臣長幼朋友賔客謂之七教祖父伯叔子孫姑姊妹女子子外王父外王母舅姨外舅外姑謂之九族或曰上親父下親子三也以父親子以子親孫五也以祖親曾髙以孫親𤣥九也或曰諸父兄弟姊妹諸舅師長朋友謂之六紀極家之大父子之性夫婦之道兄弟之倫與衆庶一也恩莫隆焉義莫重焉叙莫備焉所以為天下率也王或失度則史書之士誦之三公進讀之宰夫徹其膳史不書其罪死宰不徹膳其罪死是故王者莫大於修身身修然後能齊其家齊家之道始於夫婦夫婦之道得故天地合而萬物興冠禮曰天下無生而貴者天子之元子士也故始冠𤣥冠諸侯之有冠禮夏之末造也古者五十而後爵故無大夫冠禮夏殷之世冠適子於阼一加緇布之冠再加皮辨三加爵辨每一加則醮於客位周公之冠元子也三加畢乃一醴是後遂以為常其冠庶子也則醮於房外士之冠者也冠而字之敬其名也見於母母拜之見於兄弟兄弟拜之成人而與為禮也𤣥冠𤣥端奠摰於君遂以摰見於鄉大夫鄉先生成人之道也將責以禮義也禮義之始在於正容體齊顔色順詞令故冠而後服備服備而後容體正顔色齊詞令順委貌周道也章甫殷道也母追夏后氏之道也周辨殷冔夏收三王共皮辨素積古者冠禮筮日筮賔所以敬冠事敬冠事所以重禮正君臣親父子和長幼為國本也故孝弟忠順之行立而後可以為人可以為人而後可以治人故聖王重冠冠者禮之為始也嘉事之重者也行之於祖廟以祼享之禮將之以金石之樂節之而不敢擅重事所以自卑而尊先祖也大古冠布齊則緇之三入為纁五入為緅七入為緇其緌也孔子曰吾未之聞也冠而敝之可也是故緇布之冠不緌曾子問於孔子曰將冠子冠者至揖讓而入聞齊衰大功之喪如之何孔子曰內喪則廢外喪則冠而不醴徹饌而掃即位而哭如冠者未至則廢如將冠子未及期日而有齊衰大功小功之喪則因喪服而冠除喪不改冠乎孔子曰天子賜諸侯大夫冕辨服於太廟歸設奠服賜服於斯乎有冠醮無冠醴父沒而冠則己冠掃素報地而祭於禰已祭而見伯父叔父而後饗冠者或曰以喪冠者雖三年之喪可也既冠於次入哭踊者三乃出天子之子十有三年而冠十有五年而娶諸侯之子十有五年而冠二十而娶士及庶人二十而冠三十而娶男娶曰婚女嫁曰姻父子為子嫁娶必擇世有仁義者婚義曰昏禮萬世之始也將以為社稷主為先祖後而可以不致敬乎婚姻之禮行之以媒妁納采問名納吉納徴請期親迎是謂六禮禮以幣雁主人皆筵几於廟而拜迎於門外入揖讓而升聽命於廟幣必誠辭無不腆告之以直信信事人也信婦德也古者婦人先嫁三月祖廟未毁教于公宫祖廟既毁教于宗室女師教之以婦德婦言婦容婦功教成祭之牲用魚芼之以蘋藻及期女次純衣纁許云袡而立於房中姆纚山竒笄宵衣在其右女從者畢袗𤣥纚笄被顈乎善黼在其後父親醮子而命之迎男先於女剛柔之義也天先乎地君先乎臣其義一也子承命以迎主人爵辨纁許云裳緇袘筵几於廟而拜迎於門外壻執鴈入揖讓升堂見外舅外姑再拜奠鴈舅姑承子以授壻恐事之違也男女有别然後父子親父子親然後義生義生然後禮作禮作然後萬物安女乘以几壻降出御婦車而壻授綏親之也親之也者親之也敬而親之先王之所以得天下也姆辭不受乃驅御輪三周御者代壻乃先俟于門外女從男夫婦之義由此始也婦至壻揖婦以入共牢而食合卺而酳音𦙍同尊卑也故婦人無爵從夫之爵坐以夫之齒三王作牢用陶匏夙興婦沐浴以俟見質明贊見婦於舅姑婦執笲棗栗腵修以特豚饋卒食婦餕餘私之也厥明舅姑共饗婦以一獻之禮奠酬舅姑先降自西階婦降自阼階授之室也以著代也孔子曰嫁女之家三夜不息燭思相離也取婦之家三日不舉樂思嗣親也三月而廟見稱來婦也擇日而祭於禰成婦之義也曾子曰女未廟見而死則如之何孔子曰不遷於祖不祔於皇姑壻不杖不菲不次歸葬於女氏之黨示未成婦也男女非有行媒不相知名非受幣不交不親故日月以告君齊戒以告鬼神為酒食以召鄉黨僚友以厚其别也以此坊民民猶有自獻其身取妻不取同姓故買妾不知其姓則卜之寡婦之子非有見焉弗與為友故朋友之交主人不在不有大故則不入其門賀娶妻者曰某子使某聞子有客使某羞貧者不以貨財為禮老者不以筋力為禮或曰昏禮不賀人之序也納女於天子曰備百姓於國居曰備酒漿於大夫曰備灑掃夫婦曰天子娶后三夫人九嬪二十七世婦八十一御妻有妾諸侯一娶九女三姓夫人行以姪娣從兩國來媵亦以姪娣從有世婦有妻有妾諸侯不下漁邑君子逺色以為民紀后夫人必有女史彤管之法史不紀過其罪殺后妃羣妾以禮御於君所女史書其日月當御者授之以銀環著于左手當退者授之以金環著于右手事無小大記以成法大夫曰孺人有姪有娣士曰婦人有妾庶人曰妻孔子曰宗子雖七十無無主婦非宗子雖無主婦可也諸侯不再娶不二嫡也妻者齊也一與之齊終身不改是故婦人從人者也幼從父兄嫁從夫夫死不嫁而從子所以敬父母尊先祖也夫也者夫也夫也者以知帥人者也是故慎之於始有五不取之制不幸而誤雖有七出之義而又有三不去之禮焉曾子問於孔子曰昏禮既納幣有吉日女之父母死則如之何孔子曰壻使人弔如壻之父母死則女之家亦使人弔父喪稱父母喪稱母父母不在則稱伯父世母壻已葬壻之伯父致命女氏曰某之子有父母之喪不得嗣為兄弟使某致命氏許諾而弗敢嫁禮也壻免喪女之父母使人請壻弗取而後嫁之禮也女之父母死壻亦如之曰親迎女在塗則如之何曰女改服布深衣縞總以趨喪女在塗而女之父母死則女反如壻親迎女未至而有齊衰大功之喪則如之何曰男不入改服於外次女入改服於內次然後即位而哭曰除喪則不復昏禮乎曰祭過時不祭禮也又何反於初曰取女有日而女死如之何曰壻齊衰而弔既葬而除之夫死亦如之子婦曰后王命冢宰降德于衆庶兆民子事父母婦事舅姑雞初鳴咸盥潄櫛側乞縰所買笄總子拂髦冠緌纓端韠音必紳搢笏逼屨著綦其記婦衣紳襟纓綦屨左皆佩紛帨刀礪小觽許規金燧右皆佩大觽木燧子有玦捍管遰時世婦有緘管線纊施縏步下袠秩以適父母舅姑之所下氣怡聲問衣燠寒疾痛苛音何癢而敬抑搔之出入則或先後而敬扶持之問所欲而敬進柔色以溫之饘酏羊支酒醴飯食膳羞芼羮惟所欲棗栗飴蜜以甘之堇荁丸枌榆扶云免問薧滫瀡以滑之脂膏以膏之春宜羔豚膳膏薌牛夏宜腒鱐膳膏臊狗秋宜犢麛音迷膳膏腥雞冬宜鮮羽膳膏羶羊狼腸狗腎狸正脊兔凥苦髙狐首豚腦魚乙鱉醜去之雛尾不盈握舒雁翠鵠梟胖音判舒鳬翠雞肝雁腎鴇音保奧鹿胃雛鱉弗食羮食自諸侯以下至於庶人無等大夫燕食有膾無脯有脯無膾士不二羮胾側吏男女未冠笄者總角襟其鴆纓皆佩容臭昧爽而朝問何食飲矣若已食則退若未食則佐長者視具孺子早寢晏起惟所欲食無時由命士以上父子異宫昧爽而朝日出而退各從其事日入而夕父母舅姑之衣衾簟席枕几不𫝊杖屨祇敬之勿敢近敦對牟巵匜羊支非餕音俊莫敢用孺子餕在父母舅姑之所有命之應唯敬對進退周旋慎齊升降出入揖遜不敢噦於月噫於介嚏咳缺伸跛倚睇視不敢唾洟寒不敢襲癢不敢搔不有敬事不敢袒裼不涉不撅居衛褻衣衾不見裏父母唾洟不見冠帶垢和灰請潄衣裳垢和灰請浣衣裳綻裂紉女陳針請補綴朱劣五日則燂詳亷湯請浴三日具沐其間面垢燂潘方煩請靧音悔足垢燂湯請洗少事長賤事貴共帥時子婦孝敬者父母舅姑之命勿逆勿怠若飲食之雖不嗜必嘗而待加之衣服雖不欲必服而待加之事人代之已雖弗欲姑與之而姑使之而後復之子婦有勤勞之事雖甚愛之姑縱之而寧數休之子婦未孝未敬勿庸疾怨姑教之而後怒之不可怒子放婦出而不表禮焉父子不同席父母有過下氣怡色柔聲以諫諫若不入起敬起孝說則復諫不說與其得罪於鄉黨州閭寧熟諫父母怒不恱而撻之流血不敢疾怨起敬起孝父母有婢子若庶子庶孫甚愛之雖父母沒沒身敬之不衰子有二妾父母愛一人焉子愛一人焉由父母衣服飲食由執事毋敢視父母所愛雖父母沒不衰子甚宜其妻父母不恱出子不宜其妻父母曰是善事我子行夫婦之禮焉沒身不衰曾子曰孝子之養老也樂其心不違其志樂其耳目安其寢處以其飲食供養之孝子之身終終身也者非終父母之身終其身也是故父母之所愛亦愛之父母之所敬亦敬之至於犬馬盡然而況於人乎凡為人子之禮冬溫而夏清昏定而晨省冠衣不純素在醜夷不爭出必告反必面所遊必有常所習必有業恆言不稱老言孝不言慈閨門之內戲而不嘆居不主奧坐不中席行不中道立不中門食饗不為槩祭祀不為尸聽於無聲視於無形不登髙不臨深不茍訾不茍笑不服暗不登危不許友以死親在行禮於人則稱父人或賜之則稱父拜之父命呼唯而不諾手執業則投之食在口則吐之走而不趨親老出不易方復不過時親癠色容不盛冠者不櫛行不翔言不惰琴瑟不御食肉不至變味飲酒不至變貌笑不至矧怒不至詈疾止復初舅沒則姑老冢婦每事必請於姑介婦請於冢婦舅姑使冢婦母怠不敢無禮於介婦舅姑若使介婦毋敢敵禮於冢婦不敢並行不敢並命不敢並坐凡婦不命適私室不敢退子婦無私貨無私畜無私器不敢私假不敢私與婦或賜之則受而獻諸舅姑受則喜若反賜之則辭不得命如更受賜藏以待乏婦若有私親兄弟將與之則必請而後與之內則曰禮始於謹夫婦為宫室辨外內凡內外雞初鳴咸盥潄衣服斂枕簟灑掃堂室及庭布席各從其事男子居外女子居內深宫固門閽寺守之男不入女不出不敢懸於夫之楎椸不敢藏於夫之篋笥不敢共湢浴夫不在斂枕簟篋席襡器而藏之少事長賤事貴咸如之男不言內女不言外非祭非喪不相受器其相授則女授以篚其無篚則皆坐奠之而後取之內外不共井不共湢浴不通寢席不通乞假男女不通衣裳內言不出外言不入男子入內不嘯不指夜行以燭無燭則止女子出門必擁蔽其面夜行以燭無燭則止是故男女不雜坐不同椸枷不同巾櫛嫂叔不通問諸母不潄裳女子許嫁纓非有大故不入其門姑姊妹女子子已嫁而反兄弟弗與同席而坐弗與同器而食僕御婦人則進左手寡婦不夜哭婦人疾問之不問其疾以此坊民民猶淫泆而亂於德夫婦七十而同藏無間妾未五十必與五日之御雖婢妾衣服飲食必後長者妻不在妾御莫當夕妻將生子及月辰居側室夫使人日再問之作而自問之妻不敢見使姆對至于子生夫復使人日再問之男設弧于門左女設帨于門右國君世子生告于君接以大牢宰掌具大夫少牢士特豕庶人特豚其非冢子則皆降一等三日卜士負之吉者宿齊朝服寢門外詩負之射人以桑弧蓬矢六射天地四方女則否天地四方者男子之所有事也故必先志於其事然後卜士之妻大夫之妾使食子異為孺子室於宫中擇於諸母與可者必求其寬裕慈惠溫良恭敬慎而寡言者使為子師其次為慈母其次為保母皆居子室他人無事不往三月之末擇日剪髮為鬌男角女羈是日也夫婦夙興沐浴衣服具視朔食夫入門升自阼西妻抱子出自房東面姆先相曰母某祇見孺子夫對曰欽有帥執子右手而名之妻曰記有成遂有名辨告內外書曰某年某月某生而藏之宰告閭史閭史書而藏諸閭府獻其一於州史州史獻諸州伯州伯命藏諸州府夫入食如養禮世子生則君夫人皆立于階西鄉世婦抱子升自西階君名之乃降適子庶子見於外寢君撫其首咳而名之禮帥初無辭衆子則使有司名之凡父在孫見於祖祖名之無辭大夫之子有食母士之妻自養其子冢子未食而見必執其右手適子庶子已食而見必循其首曾子問於孔子曰君薨而世子生如之何孔子曰卿大夫從攝主北面於西階南大祝禆冕執束帛升自西階盡等不升堂命母哭祝聲三告曰某之子生敢告升奠幣于殯東兒上哭降衆主人卿大夫士房中皆哭不踊盡一哀反位遂朝奠小宰升舉幣三日衆主人卿大夫士如初位北面太宰太宗太祝皆禆冕少師奉子以衰祝先子從宰宗人從入門哭者止子升自西階殯前北面祝立于殯東南隅祝聲三曰某之子某從執事敢見子拜稽顙哭衆皆哭踊三者三降東反位皆袒子踊房中亦踊三者三襲衰杕奠出太宰命祝史以名遍告于五祀山川曾子問曰如已葬而世子生則如之何孔子曰太宰太宗從太祝而告于禰三月乃名于禰以名遍告于社稷宗廟山川凡名子者不以國不以隱疾不以山川男女曰子能食食教以右手能言男唯女俞男鞶革女鞶絲六年教之數與方名七年男女不同席不共食八年出入門戶即席飲食必後長者始教之讓九年教之數日曲禮曰幼子常視毋誑童子不衣裘裳立必正方不傾聽長者與之提攜則兩手捧長者之手負劍辟咡詔之則掩口而對十年出就外傅居宿於外學書計衣不帛𥜗汝朱袴朝夕學幼儀請肄以至簡諒凡男拜尚左手女子十年不出姆教婉娩聽從執麻枲治絲繭織絍組紃學女事以供衣服觀於祭祀納酒漿籩豆菹醢禮相助奠男子十有三年學樂誦詩舞勺成童舞象學射御玉藻曰童子不裘不帛不屨絇無緦服聽事不麻無事則立主人之北南面見先生從人而入女子十五而笄二十而嫁笄而字有故二十三年而嫁雜記曰女雖未嫁年二十而笄禮之婦人執其禮燕則鬈首聘則為妻奔則為妾凡女拜尚右手修身曰男子二十而冠冠而字父前子名君前臣名始學禮曲禮曰毋不敬儼若思安定辭安民哉傲不可長欲不可縱志不可滿樂不可極坐如尸立如齊賢者狎而敬之畏而愛之愛而知惡憎而知善積而能散安安而能遷臨財毋茍得臨難毋茍免狠毋求勝分毋求多疑事毋質直而勿有夫禮者所以定親疏決嫌疑别同異明是非也禮不妄說人不辭費禮從宜不踰節修身踐言謂之善行行修言道禮之質也禮聞取於人不聞取人禮聞來學不聞往教道德仁義非禮不成教訓正俗非禮不備是以君子恭敬撙節退讓以明禮太上貴德其次務施報禮尚往來往而不來非禮也來而不往亦非禮也夫禮者自卑而尊人富貴而知好禮則不驕不淫貧賤而知好禮則志不懾男子既冠可以衣裘帛舞大夏惇行孝弟博學不教內而不出曲禮曰侍坐於先生先生問焉終則對請業則起請益則起先生召無諾唯而起從於先生不越路而與人言遭先生於道趨而進正立拱手先生與之言則對不與之言則趨而退將適舍求毋固將上堂聲必揚將即席容毋怍衣毋撥足毋蹶虛坐盡後食坐盡前坐必安執爾顔長者不及毋儳言正爾容聽必恭毋勦說毋雷同必則古昔稱先生君子之容舒遲見所尊者齊遫足容重手容恭日容端口容止聲容靜頭容直氣容肅立容德色容莊燕居告溫溫戎容暨暨言容詻詻色容厲肅視容清明立容辨卑毋讇丑冉頭頸必中山立時行盛氣顛實揚休玉色侍坐於尊所尊見起同坐不起燭至起食至起上客起始見君子者辭曰某固願聞名於將命者敵者曰某固願見童子曰聽事侍坐於君子不顧望而對非禮也侍坐於君子君子缺伸撰杖屨視日早暮侍坐者請出矣侍坐於君子君子問更端則起而對侍坐於君子若有告者曰少問願有復也則左右屏而待不窺密不旁狎不道舊故不戲色不疑在躬不度民械不願於大家不訾重器毋訾衣服成器毋身質言語有二車之乘馬服車不齒觀君子之衣服服劍乘馬弗賈毋側聽毋噭應毋淫視毋怠荒毋瀆神毋循枉遊毋倨立毋跛坐毋箕寢毋伏斂髮毋髢冠毋免勞毋袒暑毋褰裳謀於長者必操几杖以從之長者問不辭讓而對非禮也見父之執不謂之進不敢進不謂之退不敢退不問不敢對此孝子之行也尊長於己踰等不敢問其年燕見不將命遇於道見則面不請所之喪俟事不犆弔年長以倍則父事之十年以長則肩隨之羣居五人則長者必異席博學曰男子三十而有室始理男事博學無方孫友視志學記曰發慮憲求善良足以謏聞不足以動衆就賢體逺足以動衆未足以化民君子如欲化民成俗其必由學乎玉不琢不成器人不學不知道是故古之王者建國君民教學為先說命曰念終始典于學其此之謂乎雖有嘉肴弗食不知其㫖也雖有至道弗學不知其善也是故學然後知不足教然後知困知不足然後能自反也知困然後能自强也故曰教學相長也說命曰斆學半其此之謂乎古之教者家有孰黨有庠遂有序國有學比年入學中年考校一年視離經辨志三年視敬業樂羣五年知類通達强立而不反謂之大成夫然後足以化民成俗近者說服逺者懷之此大學之道也記曰蛾子時術之其此之謂乎大學始教皮辨祭菜示敬道也宵雅肄三官其始也入學鼓篋孫其業也夏楚二物收其威也未卜禘不視學游其志也時觀而弗語存其心也幼者聽而弗問學不躐等也此七者教之大倫也記曰凡學官先事士先志其此之謂乎大學之教也時教必有正業退息必有居學不學操縵不能安弦不學博依不能安詩不學雜服不能安禮不興其藝不能樂學故君子之於學也藏焉修焉息焉遊焉夫然故安其學而親其師樂其友而信其道是以雖離師輔而亦不反也說命曰敬孫務時敏厥修乃來其此之謂乎今之教者呻其呫畢多其訊言及于數進而不顧其安使人不由其誠教人不盡其材其施之也悖其求之也拂夫然故隱其學而疾其師苦其難而不知其益也雖終其業其去之必速教之不刑其此之謂乎大學之法禁於未發之謂豫當其可之謂時不凌節而施之謂孫相觀而善之謂摩此四者教之所興也發然後禁則扞格而不勝時過然後學則勤苦而難成雜施而不孫則壞亂而不修獨學而無友則孤陋而寡聞燕朋逆其師燕辟廢其學此六者教之所由廢也君子既知教之所由興又知教之所由廢然後可以為人師也故君子之教喻也道而弗牽强而弗抑開而弗達道而弗牽則和强而弗抑則易開而弗達則思和易以思可謂善喻矣學者有四失教者必知之人之學也或失則多或失則寡或失則易或失則止此四者心之莫同也知其心然後能救其失也教也者長善而救其失者也善歌者使人繼其聲善教者使人繼其志其言也約而達微而臧罕譬而喻可謂繼志矣君子知至學之難易而知其美惡然後能博喻能博喻然後能為師能為師然後能為長能為長然後能為君故師也者所以學為君也是故擇師不可不慎也記曰三王四代唯其師此之謂乎凡學之道嚴師為難師嚴然後道尊道尊然後民知敬學是故君之所不臣於其臣者二當其為尸則弗臣也當其為師則弗臣也大學之禮雖詔於天子無北面所以尊師也善學者師逸而功倍又從而庸之不善學者師勤而功半又從而怨之善問者如攻堅木先其易者後其節目及其久也相說以解不善問者反此善待問者如撞鐘叩之以小則小鳴叩之以大則大鳴待其從容然後盡其聲不善答問者反此此皆進學之道也記問之學不足以為師必也其聽語乎力不能問然後語之語之而不知雖舍之可也良冶之子必學為裘良工之子必學為箕始駕馬者反之車在馬前君子察於此三者可以有志於學矣古之學者比物醜類鼓無當於五聲五聲弗得不和水無當於五色五色弗得不章學無當於五官五官弗得不治師無當於五服五服弗得不親君子曰大德不官大道不器大信不約大時不齊察於此者可以有志於本矣三王之祭川也皆先河而後海或源也或委也此之謂務本仕道曰男子四十始仕方物出謀發慮道合則服從不合則去七十懸車致仕君子之居恆當戶寢恆東首若有疾風迅雷甚雨則必變雖夜必興衣服冠而坐日五盥沐稷而靧粱櫛用樿櫛髮晞用象櫛進禨進羞工乃歌浴用二中上絺下綌出杅履蒯席連用湯履蒲席衣布晞身乃屨進飲將適公所宿齊居戒外寢沐浴史進象笏書思對命既服習容觀玉聲乃出揖私朝輝如也登車則有光矣侍坐則必退席不退則必引而去君之黨若賜之食而君客之則命之祭然後祭先飯辨嘗羞飲而俟若有嘗羞者則俟君之食然後食飯飲而俟君命之羞羞近者命之品嘗然後唯所欲凡嘗逺食必順近食君未覆手不敢餐君既食又飯飱飯飱者三飯也君既徹執飯與醬乃出授從者凡侑食不盡食食於人不飽唯水漿不祭若祭為已偞卑君若賜之爵則越席再拜稽首受登席祭之飲卒爵而俟君卒爵然後受虛爵君子之飲酒也受一爵而色灑如也二爵而言言斯禮已三爵而油油以退退則坐取屨隱辟而後屨坐左納右坐右納左凡尊必上𤣥酒惟君面尊惟饗野人皆酒凡侍於君紳垂足如履齊頥霤垂拱視下而聽上視帶以及祫聽嚮任左凡君召以三節二節以走一節以趨在官不俟屨在外不俟車士於大夫不敢拜迎而拜送士於尊者先拜進面答之拜則走士於君言大夫沒矣則稱諡若字名士與大夫言名士字大夫於大夫所有公諱無私諱凡祭不諱廟中不諱教學臨文不諱侍食於先生異爵者後祭先飯客祭主人辭曰不足祭也客飱主人辭以疏主人自置其醬則客自徹之一室之人非賔客一人徹一食之人一人徹凡燕食婦人不徹食棗桃李弗致于核瓜祭上環食中弃所操凡食果實者後君子火熟者先君子有慶非君賜不賀君賜車馬乘以拜賜衣服服以拜賜君未有命弗敢即乘服也君賜稽首據掌致諸地酒肉之賜弗拜凡賜君子與小人不同日凡獻於君大夫使宰士親皆拜稽首送之大夫不親拜為君之答已也大夫拜賜而退士待諾而退又拜弗答拜大夫親賜士士拜受又拜於其室凡於尊者有獻而弗敢以聞士於大夫不承賀下大夫於上大夫承賀皇王大紀卷二十一

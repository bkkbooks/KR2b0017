body:
  text: 皇王大紀卷五宋胡宏撰三王紀夏大禹元載禹踐天子位都于安邑以水徳王正仍建寅是謂人統朔以平旦建綏乗先路駱馬黒鬛大事斂用昬戎事乗驪戎車曰鉤車先正馬牲用黑牡國號夏即蒲坂而封商均是為虞以奉其先祀服其服禮樂如之以客見天子天子弗臣示不敢專也行丙寅厯其圖書曰連山艮震巽離坤兊乾坎此連山氏之河圖也夏后氏因之故曰連山王天資敏給其徳不違其儀可親其言可信不貴尺璧而重寸隂聲為律身為度亹亹穆穆為紀為綱以五聲聽治為銘於簨簴曰告寡人以道者擊鼓以義者擊鐘以事者振鐸以憂者擊磬以獄者揮鞀黄帝作車少昊加牛以輈端衡之輗服之王命奚仲為車正始駕以馬以轅端曲衡之軏服之馬車小而牛車大矣於是等級之度修貴賤之分明封奚仲為薛侯古者為醴酪以制儀狄作㫖酒以獻王大惡之曰後世必有以此亡國敗家者矣遂䟽儀狄王之世三苗氏恃其水國有洞庭彭蠡之險修政不仁王滅之論曰戰國之時吳起有言三苗左洞庭右彭蠡脩政不仁禹滅之按虞夏之書舜竄三苖于三危在雍州之境及禹滅之乃在洞庭彭蠡之間或曰三苖九黎之後也參攷傳記黎苖之人反覆為亂經涉皇帝之世聖人屢遷而教擾之而不艾殺之其仁如天何可及也滅者廢其居易其綂而已㑹諸侯於塗山執玉帛者萬國論曰甚哉秦始皇李斯君臣之不仁也除封建蔑帝王明徳之裔絶公侯名臣之世郡縣天下欲自專其利也夫諸侯之興自生民始皇帝之際有未如制者則不可知然天運之方泰及禹平水土同九州分五服齊之以長道之以師公侯伯子男各有定制無得踰越者矣夏商之季天下紛亂湯武起而治之聞無一物不獲其所矣未聞縱釋強大諸侯而不裁正之也謹以天下圗按之四海之内九州州方千里先王之制州建二百一十國則九州千八百國之君乃自古諸侯之本數也而塗山之㑹稱萬國者猶周王八百國之君而云撫萬邦也聖王有不忍之心斯有不忍人之政矣封建諸侯仁政之大者也秦人專利削除封建郡縣天下天運方否自是而後聖人之道不行人君莫不蓄獨擅天下之心故襲用郡縣之制而不能革也吁一蓄獨擅天下之心已亡王道之本修徳用贒力行善政差可不大亂而已豈有三王之至治乎天下之大不與天下共一人不好善則天下贒才盡廢寇盜蠭起戎馬馮陵所至如隄潰河決殺人盈天下郡守縣令莫之能禦也而國随以亡譬如人之死於鋒刃壓於巖石溺於風濤非天命之正者忠臣痛焉故周之建國自后稷也商之傳世逮桀宋也夏把有後至楚悼王後息也是三代者經歴變故而宗廟血食咸二千餘年豈若秦隋卒暴漢唐亡則絶世乎有天下者盍監秦否而傾諸見耕者五耦而式過十室之邑則下為秉徳之士存焉甞見刑者惕然傷之曰豈吾不徳而陷人之罪與申命天下省徳慎刑務盡人心百姓為之諺曰吾王不遊吾何以休吾王不豫吾何以助一逰一豫為諸侯度至於三年以仁遂焉是時天下殷盛公家有三十載之積私家有九載之儲作大夏之樂臯陶謨曰若稽古臯陶曰允廸厥徳謨明弼諧禹曰俞如何臯陶曰都慎厥身修思永惇敘九族庶明勵翼邇可逺在茲禹拜昌言曰俞臯陶曰都在知人在安民禹曰吁咸若時惟帝其難之知人則哲能官人安民則惠黎民懷之能哲而惠何憂乎驩兠何遷乎有苖何畏乎巧言令色孔壬臯陶曰都亦行有九徳亦言其人有徳乃言曰載采采禹曰何臯陶曰寛而栗柔而立愿而恭亂而敬擾而毅直而溫簡而亷剛而塞彊而義彰厥有常吉哉日宣三徳夙夜浚明有家日嚴祗敬六徳亮采有邦翕受敷施九徳咸事俊乂在官百僚師師百工惟時撫于五辰庶績其凝無教逸欲有邦兢兢業業一日二日萬幾無曠庶官天工人其代之天敘有典敕我五典五惇哉天秩有禮自我五禮有庸哉同寅恊恭和𠂻哉天命有徳五服五章哉天討有罪五刑五用哉政事懋哉懋哉天聰明自我民聰明天明畏自我民明威逹於上下敬哉有土臯陶曰朕言惠可底行禹曰俞乃言底可績臯陶曰予未有知思日贊贊襄哉咎繇封國於英六薨於王之世益封其支庶有在許者八載王東巡狩登茅山受諸侯之計更名曰㑹稽汪芒漆之姓君守封堣山是為長狄防風氏獨後至戮之以戒不䖍王崩于越論曰記稱舜𦵏蒼梧劉道原以爲巡守南裔往而不返者欲兆庶專意戴禹也夫舜本以耄期倦于勤使禹攝政若逺巡荒外而死是與經意相反也舜之授禹以天下者本乎民心與天意爾使禹有天命舜雖不死於荒外何病於禹使禹無天命舜雖死於荒外豈能有益於禹哉此記者謬誤道原習而未之察也若史載禹葬㑹稽道原曰大江之南前代要服大禹死則葬焉何哉古者不墓祭時享存乎廟主王者以四海為家若魂氣則無不之也秦漢而後人君以死為大諱崇尚墓祭違經棄禮逺事尸柩難以語乎理矣善哉論也厥後少康封其子於越者豈不為禹葬在所故歟啟贒能敬承繼王之道伯益奉啟踐天子位葬王于㑹稽衣冠儉素從王命也孔子曰巍巍乎舜禹之有天下也而不與焉孔子曰禹吾無間然矣菲飲食而致孝乎鬼神惡衣服而致美乎黻冕卑宫室而盡力乎溝洫禹吾無間然矣論曰人君雖不可勞人而佚已亦不當薄己以厚人貴為天子富有天下其奉養有度自不至於㣲薄也大禹貴為天子富有天下而菲飲食惡衣服卑宫室不享其奉無乃非中道耶吁鯀堙洪水得罪於天下以殛死者也禹平水土得天下心以有天下者也父以此誅己以此王雖身得享其奉而心有所不忍故菲惡卑陋不以天子為尊榮也夫古之人愛其親有深長之思如此哉故孔子重贊之曰吾無間然有天下而不與於此見之矣孟子曰禹之治水水之道也行其所無事也孟子曰季路人告之以有過則喜禹聞善言則拜大舜有大焉善與人同舎己從人樂取於人以為善自耕稼陶漁以至為帝無非取諸人者取諸人以為善是與人為善者也故君子莫大乎與人為善孟子曰萬章問曰堯以有天下與舜有諸孟子曰否天子能薦人於天不能使天與之天下諸侯能薦人於天子不能使天子與之諸侯大夫能薦人於諸侯不能使諸侯與之大夫昔者堯薦舜於天而天受之暴之於民而民受之天受之者使之主祭而百神享之也民受之者使之主事而事治百姓安之也天與之人與之故曰天子不能以天下與人萬章曰人有言至於禹而徳衰不傳於贒而傳於子有諸孟子曰不然也天與贒則與贒天與子則與子堯舜禹益相去乆逺其子之贒不肖皆天也非人之所能為也莫之為而為者天也莫之致而至者命也啟元載甲申二載啟既除喪伯益歸政就國於箕山之陰生二子一曰大亷實鳥俗氏二曰若木實費氏有扈氏不用命啟滅之享諸侯於鈞臺作九辨九歌之樂夏書甘誓啟與有扈戰于甘之野作甘誓甘誓大戰於甘乃召六卿王曰嗟六事之人予誓告汝有扈氏威侮五行怠棄三正天用絶其命今予惟恭行天之罰左不攻於左汝不恭命右不攻於右汝不恭命御非其馬之正汝不恭命用命賞於祖弗用命戮于社予則孥戮汝論曰理得而無阿私是謂天意故可殺而不殺猶可赦而不赦也一容私說於其間則非天意矣罰弗及嗣者堯舜常典其所以興也罪人以族者紂之虐政其所以亡也若夏啟甘之戰成湯鳴條之師稱孥戮者此用兵誓衆使人致死之法不可以常典論虐政比也古者用兵皆出於必不得已自非以至順伐至逆至仁伐至不仁則不舉也驅人而致之死地茍非示以重法有踰於死或致敗績使逆者肆行不仁者得志於天下其殘害生民豈有窮極故聖人權輕重不得已而有孥戮之誓也設有不用命者則必施之豈空言哉後世儒者不復知兵當天下大難放棄軍律使逆賊肆行殺人盈天下而莫之禁也非天意矣九載啟崩子太康踐位太康二載甲午太康居喪不哀農政不修四夷背叛后稷棄當舜之世薨於黑水之山其子不窋嗣太康棄稷不務不窋不義太康去之邠邊於夷狄不敢怠先業時序其徳遵修其緒肄其訓典朝夕勤恪守以敦篤奉以忠信奕世載徳不忝前人戎狄服焉十二載甲辰二十載甲寅二十九載后羿為射官羿尤善於其職太康迷于原獸羿因民之怨以兵距王王畏之不敢還翺翔河上衆散而死弟仲康立夏書五子之歌敘曰太康失邦昆弟五人須於洛汭作五子之歌五子之歌太康尸位以逸豫滅厥徳黎民咸貳乃盤逰無度畋于有洛之表十旬弗反有窮后羿因民弗忍距于河厥弟五人御其母以從徯于洛之汭五子咸怨述大禹之戒以作歌其一曰皇祖有訓民可近不可下民惟邦本本固邦寜予視天下愚夫愚婦一能勝予一人三失怨豈在明不見是圗予臨兆民懔乎若朽索之馭六馬為人上者奈何不敬其二曰訓有之内作色荒外作禽荒甘酒嗜音峻宇彫牆有一于此未或不亡其三曰惟彼陶唐有此冀方今失厥道亂其紀綱乃底滅亡其四曰明明我祖萬邦之君有典有則貽厥子孫闗石和鈞王府則有荒墜厥緒覆宗絶嗣其五曰嗚呼曷歸予懐之悲萬姓仇予予將疇依鬱陶乎予心顔厚有忸怩弗慎厥徳雖悔可追仲康元載羿自鉏遷于窮石號有窮氏因夏民入總夏政仲康不得有所為于是羲和湎淫廢時亂日𦙍往征之作𦙍征夏書叙𦙍征曰惟仲康肇位四海𦙍侯命掌六師羲和廢厥職酒荒于其邑𦙍侯迺承王命徂征告于衆曰嗟予有衆聖有謨訓明徴定保先王克謹天戒臣人克有常憲百官修輔厥后惟明明每嵗孟春遒人以木鐸循于路官師相䂓工執藝事以諌其或不恭邦有常刑惟時羲和顛覆厥徳沈亂于酒畔官離次俶擾天紀遐棄厥司乃季秋月朔辰弗集于房瞽奏鼓嗇夫馳庶人走羲和尸厥官罔聞知昬迷于天象以干先王之誅政典曰先時者殺無赦不及時者殺無赦今予以爾有衆奉將天罰爾衆士同力王室尚弼予欽承天子威命火炎崐崗玉石俱焚天吏逸徳烈于猛火殲厥渠魁脅從罔治舊染汚俗咸與惟新嗚呼威克厥愛允濟愛克厥威允罔功其爾衆士懋戒哉論曰夏商之事缺失最多雖聖人去取之思不可盡見如𦙍侯征羲和以其事考之廢之可爾何至興師疑其黨於羿欲假託於正仗兵威以恐動天下也人臣當是時或内受顧託或外掌藩宣則宜辨之於早小心翼翼廣求鄰援雖勝負不可必行法以立命則忠臣矣今羲和雖不黨於羿乃沉湎于酒廢時亂日自取滅亡烏得為忠聖人載之者所以為後世戒也或曰先時者殺無赦不及時者殺無赦此軍法一切之政也是道也以用於民事則可謂之一切之政在軍法則為令典矣又曰威克厥愛允濟愛克厥威允罔功此誓衆一切之言也是道也以用於民事則可謂之一切之言在軍法則為善政矣𦙍侯之書正軍法也其舉兵之志則王者之罪人也其行軍之法則未為過故孔子悉取其言而不削也三載甲子樂正后夔之子伯封實有豕心貪惏無厭忿纇無期人謂之封豕羿討滅之諸侯震服羿負恃其射而有大功不恤民事習於田獵武羅伯因熊髠龎圉其贒臣也咸被其棄逐而信寒浞寒浞伯明氏之讒子弟也行媚于内施賂于外而娛羿于田十三載甲戍仲康崩子相立相元載王尸天位同姓諸侯惟斟灌氏斟尋氏迺心王家羿田無厭馳逐不休衆甚苦之寒浞因其衆殺羿國内大亂相以故得走依二斟浞因羿之室生二子曰澆曰豷十載甲申二十載甲午二十七載寒浞使澆及豷伐斟灌氏斟尋氏攻相弑之相之臣靡逃奔有鬲氏相之后緍方娠逃出自竇乃奔有仍氏生少康皇王大紀卷五

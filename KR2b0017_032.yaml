body:
  text: 皇王大紀卷三十二宋胡宏撰三王紀幽王六年衛侯和入為卿士小雅六十六篇曰賔之初筵五章章十四句衞武公刺時也幽王荒廢媟近小人飲酒無度天下化之君臣上下沉湎淫泆武公既入而作是詩也賔之初筵左右秩秩肅敬也籩豆有楚列貌殽豆實也核加籩也維旅陳也酒既和㫖飲酒孔偕鐘鼓既設舉醻逸逸往來次序也大侯既抗舉也弓矢斯張射夫既同獻爾發功發彼有的以祈爾爵籥舞笙鼓秉籥而舞與笙鼔相應樂既和奏烝衎烈祖以洽百禮百禮既至有壬大也有林君也錫爾純大也嘏福也子孫其湛其湛曰樂各奏爾能賔載手仇室人入又鄭公仇讀曰㪺賔手挹酒室人復酌為加爵酌彼康爵酒所以安體也以奏爾時時謂心所尊者也賔之初筵温温其恭其未醉止威儀反反言重順也曰既醉止威儀幡幡失威儀也舎其坐遷屢舞僊僊其未醉止威儀抑抑慎宻也曰既醉止威儀怭怭媟嫚也是曰既醉不知其秩常也賔既醉止載號載呶亂我籩豆屢舞僛僛不正也是曰既醉不知其郵過也側弁之俄屢舞傞傞不止也既醉而出並受其福醉而不出是謂伐徳飲酒孔嘉維其令儀凡此飲酒或醉或否既立之監或佐之史彼醉不臧不醉反恥式勿從謂無俾大怠匪言勿言匪由勿語由醉之言俾出童羖羖羊不童也三爵獻也酬也酢也不識矧敢多又小雅六十七篇曰魚藻三章章四句刺幽王也言萬物失其性王居鎬京將不能以自樂故君子思古之武王焉魚在在藻有頒其首頒大首貌魚以依蒲藻為得其性王在在鎬豈樂飲酒魚在在藻有莘長貌其尾王在在鎬飲酒樂豈魚在在藻依于其蒲王在在鎬有那鄭云安也其居小雅六十八篇曰采菽五章章八句刺幽王也侮慢諸侯來朝不能錫命以禮數徴㑹之而無信義君子見㣲而思古焉采菽采菽大豆也采菽之苗所以芼太牢羊則苦豕則蔽筐之筥之君子來朝何錫予之雖無予之路車乗馬又何予之𤣥衮及黼觱沸泉出貌檻泉正出也泉言采其芹君子來朝言觀其旂其旂淠淠動也鸞聲嘒嘒中節也載驂載駟驂乘乘四馬君子所届赤芾在股芾太古象也在冕服謂之蔽滕之芾在他服謂之韠邪幅在下如今行縢也偪束其脛自足至膝故曰在下彼交匪紓天子所予樂只君子天子命之樂只君子福祿申之維柞之枝其葉蓬蓬盛貌樂只君子殿鎮也天子之邦樂只君子萬福攸同平平辨治也左右亦是率從汎汎楊舟紼繂也纚緌也維之樂只君子天子葵揆也之樂只君子福禄膍之厚也優哉游哉亦是戾矣至也小雅六十九篇曰角弓八章章四句父兄刺幽王也不親九族而好讒佞骨肉相怨故作是詩也騂騂調和也角弓翩其反矣不善紲檠巧用則翩然而反兄弟婚姻無胥逺矣爾之逺矣民胥然矣爾之教矣民胥傚矣此令兄弟綽綽有裕饒也不令兄弟交相為瘉病也民之無良相怨一方受爵不讓至于已斯亡爵禄不以相讓故怨禍及之老馬反為駒不顧其後已老而孩童慢之如食宜饇飽也如酌孔取謂宜量其多少毋教猱猨類升木如塗泥也塗附著也君子有徽美也猷小人與屬連也從也雨雪瀌瀌見晛日氣曰消莫肯下遺式居婁驕雨雪浮浮見睍曰流如蠻如髦我是用憂小雅七十篇曰菀栁三章章六句刺幽王也暴虐無親而刑罰不中諸侯皆不欲朝言王者之不可朝事也有菀者栁不尚息焉上帝甚蹈動也無自暱近也焉俾予靖治也之後予極窮也焉有菀者栁不尚愒焉上帝甚蹈無自瘵焉俾予靖之後予邁行也焉有鳥髙飛亦傅于天彼人之心于何其臻曷予靖之居以㐫矜危也小雅七十一篇曰都人士五章章六句周人刺衣服無常也古者長民衣服不貳從容有常以齊其民則民徳歸壹傷今不復見古人也彼都君之所居曰都人士狐裘黄黄其容不改出言有章行歸于周忠信也萬民所望彼都人士臺笠緇撮以臺皮為笠所以禦雨撮以緇布為冠也彼君子女綢直如髪言其情宻緻正直也我不見兮我心不説彼都人士充耳琇美石也實彼君子女謂之尹尹氏吉姞氏名族我不見兮我心苑結彼都人士垂帶而厲厲帶之垂者彼君子女卷髪如蠆髪末卷然我不見兮言從之邁匪衣垂之帶則有餘匪伊卷之髪則有旟揚也我不見兮云何盱矣病也思望之甚也小雅七十二篇曰采緑四章章四句刺怨曠也幽王之時多怨曠者也終朝自旦及食時采緑不盈一匊兩手也予髪曲局卷也薄言歸沐婦人夫不在則不容飾終朝采藍不盈一襜衣蔽前也五日為期六日不詹至也之子于狩言韔其弓之子于釣言綸之繩其釣維何維魴及鱮維魴及鱮薄言觀者小雅七十二篇曰黍苗五章章四句刺幽王也不能膏潤天下卿士不能行召伯之職焉芃芃長大也黍苗隂雨膏之悠悠南行召伯勞之我任負者我輦輓者我車將車也我牛舝傍牛者我行既集盖云歸哉我徒徒行者我御御車者我師師者我旅旅者我行既集盖云歸處肅肅謝邑名功召伯營之烈烈征師召伯成之原隰既平土治曰平泉流既清水治曰清召伯有成王心載寧小雅七十四篇曰隰桑四章章四句刺幽王也小人在位君子在野思見君子盡心以事之隰桑有阿阿美然貌其葉有難難然盛貌既見君子其樂如何隰桑有阿其葉有沃光澤也既見君子云何不樂隰桑有阿其葉有幽濃色黒也既見君子徳音孔膠固也心乎愛矣遐不謂矣中心藏之何日忘之小雅七十五篇曰白華八章章四句周人刺幽王也幽王以嬖寵立褒姒而黜申后故下國化之以妾為妻以孽代宗而王弗能治周人為之作是詩也白華菅兮白華於野已漚為菅白茅束兮之子之逺俾我獨兮英英白雲露彼菅茅天步艱難之子不猶可也圖也滮流貌池北流豐鎬間水浸彼稻田嘯歌傷懷念彼碩人樵彼桑薪卬我也烘燎也于煁烓竈也用以炤事物維彼碩人實勞我心鼓鐘于宫聲聞于外念子懆懆誠心不寧貌視我邁邁棄逺之意有鶖在梁秃鶖貪惡有鶴在林鶴清髙反在林維彼碩人實勞我心鴛鴦在梁戢其左翼鳥之雌雄不可别者以翼右掩左為雄左掩右為雌之子無良二三其徳有扁斯石扁乘石貌王乗車履石履之卑兮之子之逺俾我疷兮病也小雅七十六篇曰綿蠻三章章八句㣲臣刺亂也大臣不用仁心遺忘㣲賤不肯飲食教載之故作是詩也綿蠻小鳥貌黄鳥止于丘阿曲阿也道之云逺我勞如何飲之食之教之誨之命彼後車謂之載之緜蠻黄鳥止于丘隅豈敢憚行畏不能趨飲之食之教之誨之命彼後車謂之載之綿蠻黄鳥止于丘側豈敢憚行畏不能極飲之食之教之誨之命彼後車謂之載之小雅七十七篇曰瓠葉四章章四句大夫刺幽王也上棄禮而不能行雖有牲牢饔餼不肯用也故思古人不以輕薄廢禮幡幡匏葉采之亨之君子有酒酌言甞之有兎斯首炮之燔之君子有酒酌言獻之有兎斯首燔之炙之君子有酒酌言酢之有兎斯首燔之炮之君子有酒酌言醻之小雅七十八篇曰漸漸之石三章章六句下國刺幽王也戎狄叛之荆舒不至乃命將征役乆病于外故作是詩也漸漸山石髙峻貌之石維其髙矣山川悠逺維其勞矣武人將帥東征不皇朝矣漸漸之石維其卒山巔也竟也矣山川悠逺曷其沒盡也矣武人東征不皇出矣有豕白蹢烝涉波矣白蹢豕之尤躁疾唐突難禁制者將乆兩則進涉水波月離于畢俾滂沱矣月離隂星則雨武人東征不皇他矣小雅七十九篇曰苕之華三章章四句大夫閔時也幽王之時西戎東夷交侵中國師旅並起因之以饑饉君子閔周室之將亡傷已逢之故作是詩也苕之華芸其黄矣陵苕也將落則黄心之憂矣維其傷矣苕之華其葉青青華落葉青青然知我如此不如無生牂牝也羊墳大也首三星心也在罶曲梁也心星見於曲梁其去湏史矣人可以食鮮可以飽小雅終八十篇曰何草不黄四章章四句下國刺幽王也四夷交侵中國背叛用兵不息視民如禽獸君子憂之故作是詩也何草不黄何日不行何人不將言無不從役之人經營四方何草不𤣥何人不矜哀我征夫獨為匪民匪兕匪虎率彼曠野哀我征夫朝夕不暇有芃者狐小獸貌率彼幽草有棧之車役車也行彼周道八年鄭伯友入為司寇以王室傾危懼及於難問計於史伯史伯曰王室已卑戎狄必昌不可偪也鄭居濟洛河潁之㑹若脩典刑以守之可以少固公曰周其弊乎對曰王棄髙明昭顯而好讒匿暗昧惡角犀豐盈而近頑童窮固去和而取同夫和實生物同則不繼故先王雜五行以成物節五味以調口劑四肢以衛體和六律以聰耳正七體以役心平八索以成人建九紀以立純徳合十數以訓百體出千品具萬方計億事裁兆物收經入行姟極和之至也聲一無聽物一無文味一無菓物一不講王棄是類也而與剸同欲無弊得乎鄶墟在禹貢豫州外方之北滎波之南居溱洧之間祝融之後妘姓封於鄶檜國風首篇曰羔裘三章章四句大夫以道去其君也三諌不從待放於郊得玦乃去國小而迫君不用道好潔其衣服逍遥遊燕而不能自强於政治故作是詩也羔裘逍遥狐裘以朝羔裘以遊燕狐裘以適朝豈不爾思勞心忉忉羔裘翺翔狐裘在堂公堂也豈不爾思我心憂傷羔裘如膏日出有曜豈不爾思中心是悼檜國風二篇曰素冠三章章三句刺時不能三年也庶見素冠兮棘艱棘也人欒欒瘠貌兮勞心慱慱憂勞也兮庶見素衣兮我心傷悲兮聊與子同歸兮願見有禮之人與之同歸庶見素韠兮我心藴結兮聊與子如一兮過之者俯而就不至者企而及檜國風三篇曰隰有萇楚三章章四句疾恣也國人疾其君之淫恣而思無情慾者也隰有萇楚銚弋也猗儺柔順也其枝夭之沃沃少壯佼好也樂子之無知隰有萇楚猗儺其華夭之沃沃樂子之無家隰有萇楚猗儺其實夭之沃沃樂子之無室鄶國風終四篇曰匪風三章章四句思周道也國小政亂憂及禍難而思周道焉匪風發兮匪車偈兮發發飄風非有道之風偈偈疾驅非有道之車頋瞻周道中心怛傷也兮匪風飄疾也兮匪車嘌兮無節度也顧瞻周道中心弔傷也兮誰能烹魚溉滌也之釡鬵鬵釡屬言不可攪動也煩則魚碎矣誰將西歸懷之好音大雅三十篇曰瞻卬凡伯刺幽王大壞也瞻仰昊天斥王也則不我惠孔填乆也不寧降此大厲惡也邦靡有定士民其瘵病也蟊賊蟊疾靡有夷常也屇極也罪罟不收設罪為罟靡有夷瘳愈也人有土田女反有之人有民人女覆奪之此宜無罪女反收拘也之彼宜有罪女覆説赦也之哲夫成城哲婦傾城懿厥哲婦為梟為鴟婦有長舌維厲之階亂匪䧏自天生自婦人匪教匪誨時維婦寺近也鞠窮也人忮害也忒變也譖始竟背豈曰不極伊胡為慝如賈三倍君子是識賈物而有三倍之利者小人所宜也婦無公事休其蠶織婦人不宜與公事者也天何以刺責也何神不富福也舎爾介甲也狄戎狄也維予胥忌而忌賢者不弔不祥心不慈祥威儀不類動無法度人之云亡邦國殄瘁天之降罔維其優矣寛也大也人之云亡心之憂矣天之降罔維其幾㣲也近也矣人之云亡心之悲矣觱沸檻泉維其深矣心之憂矣寧自今矣不自我先不自我後藐藐昊天無不克鞏圗也無忝皇祖式救爾後大雅終三十一篇曰召旻凡伯刺幽王大壊也旻閔也閔天下無如召公之臣也旻天疾威天篤降喪瘨我饑饉民卒流亡我居圉垂也卒荒天降罪罟蟊賊内訌潰也昬椓奄人也靡共潰潰亂也邪也回遹行也逺也實靖夷滅也我邦臯臯頑不知道也訿訿窳不供事也曾不知其玷缺也兢兢戒也業業危也孔塡不寧我位孔貶墜也如彼嵗旱草不潰茂遂也如彼棲苴水中浮草我相此邦無不潰止維昔之富不如時徃者富仁賢今也富讒佞維今之疚不如兹今則病賢也彼疏斯粺宜食疏者反食精胡不自替職况茲也斯引長也池之竭矣不云自頻厓也泉之竭矣不云自中溥斯害矣職兄斯𢎞不烖我躬昔先王受命有如召公日辟國百里今也日蹙國百里於乎哀哉維今之人不尚有舊時犬戎盛強荐侵王都始為烽燧以徴兵備不虞王寵褒姒甚褒姒不好笑王欲其笑萬方故不笑則試令舉烽兵甲四集而實無寇褒姒乃大笑王讙樂之於是為數舉烽逺近無所取信十一年王遊驪山犬戎猝至王急舉烽莫有應者戎殺王于戲虜褒姒立伯服為王鄭伯友戰死秦襄公聞之帥師救之力戰稍破戎兵衛侯和從晉侯仇合諸侯之師擊逐西戎黜伯服鄭世子掘突收父散兵從諸侯東迎太子宜臼於申太子使命秦襄公曰戎無道侵奪我岐豐秦能攻逐戎即有其地平王元年太子至洛邑即天子位遂定都焉諡先王曰幽錫晉文侯作文侯之命周書叙曰平王錫晉文侯秬鬯圭瓚作文侯之命文侯之命王若曰父義和丕顯文武克慎明徳昭升于上敷聞在下惟時上帝集厥命于文王亦惟先正克左右昭事厥辟越小大謀猷罔不率從肆先祖懐在位嗚呼閔予小子嗣造天丕愆殄資澤于下民侵戎我國家純即我御事罔或耆夀俊在厥服予則罔克曰惟祖惟父其伊恤朕躬嗚呼有績予一人永綏在位父義和汝克昭乃顯祖汝肇刑文武用會紹乃辟追孝于前文人汝多修扞我于艱若汝予嘉王曰父義和其歸視爾師寧爾邦用賚爾秬鬯一卣彤弓一彤矢百盧弓一盧矢百馬四匹父徃哉柔逺能爾惠康小民無荒寧簡恤爾都用成爾顯徳賜以河内附庸晉於是始大論曰幽王無道雖天下所不與其見殺於犬戎則天下所不忍而平王乃其子也所宜卧薪甞膽飬民訓兵帥天下諸侯披其巢穴誅其種類復居鎬京繼迹文武成康盖前人之愆則可謂人子矣愚觀其命秦晉之詞語平而不切志舒而不慘忘不共戴天之仇輕棄舊都以西事委之於秦而即安於洛邑亡三綱矣孔子定書而取文侯之命何哉平王雖不自飭勵而晉侯不失蕃宣之道逐西戎黜伯服扶立冢嗣定都成周號令天下莫敢不從使平王稍有仁心義氣而輔以晉文衛武則周室中興矣聖人心廣道大權輕重不失毫釐是以深取晉文而於平王猶有望也及其末年怠惰放縱不可救藥日以衰㣲名號雖存其實與杞宋等矣聖人據事實本天道而作春秋固非衆人之所識也秦襄公乗勝取岐豐之地王命賜秦爵為伯秦國風五篇曰終南二章章六句戒襄公也能取周地始為諸侯受顯服大夫美之故作是詩以戒勸之終南何有有條有梅條槄梅柟也君子至止錦衣狐裘顔如渥丹其君也哉終南何有有紀有堂紀基臺畢道平君子至止黻衣繡裳佩玉將將夀考不忘衛侯和留周輔政時年九十有五矣克勤不怠在輿有虎賁之規位宁有官師之典倚几有誦訓之諌居處有䙝御之箴臨事有瞽史之導宴居有工師之誦史不失書矇不失誦衛國風首篇曰淇澳三章章九句美武公之徳也有文章又能聽其規諫以禮自防故能入相于周美而作是詩也瞻彼淇奥隈也緑竹猗猗有匪文章貌君子如切如磋如琢如磨治骨曰切象曰磋玉曰琢石曰磨瑟兮僴兮矜莊寛大也赫兮喧兮徳容赫赫宣著也有匪君子終不可諼忘也兮瞻彼淇奥緑竹青青有匪君子充耳琇瑩琇瑩美石㑹弁如星㑹謂弁之縫中飾之以玉皪皪如星瑟兮僴兮赫兮喧兮有匪君子終不可諼兮瞻彼淇奥緑竹如簀茂宻也有匪君子如金如錫如圭如璧寛兮綽兮猗重較卿士之車也兮善戲謔兮不為虐兮居無何衛侯以老歸國諡鄭伯友曰桓公召掘突入為司徒鄭國風首篇曰緇衣三章章四句美武公也父子並為周司徒善於其職國人宜之故美其徳以明有國善善之功焉緇衣毛云卿士聽朝正服鄭云居私朝之服之宜兮敝予又改為兮適子之館兮還予授子之粲餐也兮緇衣之好兮敝予又改造兮適子之館兮還予授子之粲兮緇衣之蓆大也兮敝予又改作兮適子之館兮還予授子之粲兮二年秦自以居西垂立西畤用騮駒黄牛羝羊各一祠白帝魯侯稱薨諡曰孝公子弗湟嗣四年甲戌東虢公都于制恃其地勢驕侈怠慢鄭人并其地鄶仲恃險國家荒亂鄭人滅之鄭伯欲伐胡以其子妻之問羣臣曰吾欲用兵誰可伐者關其思曰胡可鄭伯曰胡兄弟之國也遂戮其思胡君聞之以鄭為親己不設備鄭伯襲取之五年秦襄公伐西戎無虛嵗是嵗出師至岐薨子文公嗣九年秦文公東獵至汧渭之㑹曰吾先邑也即營居之十三年衛侯和薨國人謂之睿聖武公子揚嗣衛國風二篇曰考槃三章章四句刺莊公也不能繼先公之業使賢者退而窮處考成也槃樂也在澗山夾水碩人之寛獨寐寤言永矢弗諼考槃在阿曲陵碩人之薖寛大貌獨寐寤歌永矢弗過考槃在陸碩人之軸進立凝重也獨寐寤宿永矢弗告十四年甲申王國風首篇曰黍離三章章十句閔宗周也周大夫行役至于宗周過故宗廟宫室盡為禾黍閔周室之顛覆彷徨不忍去而作是詩也彼黍離離彼稷之苗行邁靡靡中心揺揺知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉彼黍離離彼稷之穗行邁靡靡中心如醉知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉彼黍離離彼稷之實行邁靡靡中心如噎知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉王國風二篇曰君子于役二章章八句刺平王也君子行役無期度大夫思其危難以風焉君子于役不知其期曷至哉鷄棲于塒鑿墻曰塒日之夕矣羊牛下來君子于役如之何勿思君子于役不日不月曷其有佸㑹期也鷄棲于桀棲杙為桀日之夕矣羊牛下括聚也君子于役茍無饑渴王國風三篇曰君子陽陽二章章四句閔君子也君子遭亂相招為祿仕全身逺害而己君子陽陽若自得者左執簧笙也右招我由房國君有房中之樂其樂只且其自樂此而已君子陶陶和樂也左執翿纛也右招我由敖蔗遊也其樂只且王國風四篇曰揚之水三章章六句刺平王也不撫其民而逺屯戍于母家周人怨思焉揚激揚也之水不流束薪彼其之子不與我戍申懐哉懐哉曷月予還歸哉揚之水不流束楚彼其之子不與我戍甫懷哉懷哉曷月予還歸哉揚之水不流束蒲彼其之子不與我戍許懷哉懷哉曷月予還歸哉王國風五篇曰中谷有蓷三章章六句閔周也夫婦日以衰薄㓙年饑饉室家相棄爾中谷有蓷暵菸貌其乾矣蓷生於陸而生於谷乍乾乍濕則槁矣有女仳别也離嘅其嘆矣嘅其嘆矣遇人之艱難矣中谷有蓷暵其脩乾硬也矣有女仳離條其歗矣意翛翛而悲歗條其歗矣遇人之不淑矣中谷有蓷暵其濕矣乾得濕則腐矣有女仳離啜其泣矣啜其泣矣何嗟及矣王國風七篇曰葛藟三章章六句王族刺平王也周室道衰棄其九族焉緜緜長延之貌葛藟在河之滸水厓終逺兄弟謂他人父謂他人父亦莫我顧緜緜葛藟在河之涘亦厓也終逺兄弟謂他人母謂他人母亦莫我有緜緜葛藟在河之漘水隒也終逺兄弟謂他人昆兄也謂他人昆亦莫我聞荆季紃四世孫蚡冒立綱紀庶事篳路藍縷以啟四封蠻夷皆服十五年秦文公夢黄蛇自天屬地其口止於酈畤遂作酈畤用三牲祠白帝而雍旁故有吳陽武畤雍東有好畤皆廢無祠或曰雍州積髙神明之隩故立畤郊上帝黄帝嘗用事雖晚周亦郊焉十八年秦初有史以紀事二十一年秦文公伐戎戎兵敗散文公遂有周地二十三年宋公鮒之曾孫戴公戴公之世弗父何之孫正考父補禮樂之廢壊得商頌十二篇於周之太師是嵗戴公之子司空薨諡曰武公子力嗣皇王大紀卷三十二

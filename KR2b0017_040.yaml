body:
  text: 皇王大紀卷四十宋胡宏撰三王紀惠王十八年狄既滅衛遂伐邢諸侯救之次于聶北邢人潰圍與諸侯合兵逐狄人遷于夷儀諸侯城之男女不淫牛馬選具邢人如歸齊侯以魯莊夫人之與聞乎弑也召之于邾邾人以師送之因戍虚丘欲以侵魯齊侯殺姜氏于夷以其尸歸楚王伐鄭齊侯會宋公魯侯曹伯鄭伯邾人于檉以謀楚魯侯請莊夫人之喪于齊齊侯許之邾人乃歸虚丘之戍魯侯要而敗之莒人以慶父死求賂于魯曰吾得子之賊矣魯人弗與遂伐魯季友帥師敗諸酈獲莒子之弟挐魯侯賜季友費及汶陽田為季孫氏齊歸魯莊夫人之喪經曰元年春王正月閔公薨夫人孫于邾慶父出奔莒公於是焉以成風所屬而季子立之内無所承也嗣子定位於初喪而魯使不吿于周明年正改元而周使亦不至于魯又明年服喪已畢而不見於京師上不請命也不書即位正王法也是故有四海而即天王之位者受之天者也有一國而即諸侯之位者受之於王者也受之於天者必奉若天道而後能保天下受之於王者必謹守王度而後能保其國齊師宋師曹師次于聶北救邢三國稱師見兵力之有餘也聶北書次譏救邢之不速也春秋大義伐而書次其次為善遂伐楚次于陘美之也救而書次其次為貶救邢次于聶北譏之也聖人之情見矣故救患分災於禮為急而好攻戰樂殺人者於罪為大夏六月邢遷于夷儀齊師宋師曹師城邢書邢遷于夷儀見齊師次止緩不及事也然邢以自遷為文而再書齊師宋師曹師城邢者美桓公志義卒有救患之功也不以王命興師亦聖人之所與乎中國衰㣲夷狄猾夏天子不能正至於遷徙奔亡諸侯有能救而存之則救而存之可也以王命興師者正能救而與之者權秋七月戊辰夫人姜氏薨于夷齊人以歸夫人薨不地其曰薨于夷故也桓公召而殺之也其曰齊人以歸者以其喪歸于魯也齊為盟主義得舉法是伯者之所以行乎諸侯也既誅其人又歸其喪何居魯欲拒而勿受乎則子無讎母之義受而葬之乎已絶者復得享小君之禮典刑紊矣故特以書歸而不曰歸夫人之喪以者不以者也楚人伐鄭楚稱人浸強也莊公十年敗蔡師虜獻舞固已強矣然獨舉其號者始見于經則本其僣竊之罪正其夷狄之名著王法也二十三年来聘嘉其慕義乃以人書二十八年伐鄭惡其猾夏復以號舉至是又伐鄭也亦書人者豈許其伐國而人之乎㑹中華執盟主朝諸侯長齊晉其所由来者漸矣八月公會齊侯宋公鄭伯曹伯邾人于檉九月公敗邾師于偃檉之㑹謀救鄭而公與邾人咸與焉則是志同而謀恊也今既㑹邾人于檉又敗邾師于偃於此責公無攘夷狄安中國之誠矣凢此類皆直書其事而義自見也詐戰曰敗敗之者為主冬十月壬午公子友帥師敗莒師于酈獲莒挐莒人求賂于魯魯人弗與為是興師而来伐然則罪在莒也而以季友主此戰何也抑鋒止銳喻以詞命使之不縮而引去則善矣今至於兵刃既接又用詐謀擒其主將此強國之事非王者之師春秋之志故以季友為主而書敗獲責之備也十有二月丁巳夫人氏之喪至自齊夫人預弑二君幾於亡國大義已絶不可復入宗廟矣書孫于邾薨于夷者絶哀姜也書齊人以歸夫人氏之喪至自齊者譏桓公也不稱姓者殺于齊不去氏者受於魯十九年冬十一月齊侯帥諸侯城楚丘而封衛焉歸公乗馬祭服五稱牛羊豕鷄狗皆三百與門材歸夫人魚軒重錦三十兩衛侯衣大布之衣大帛之冠務材訓農通商惠工敬教勸學受方任能元年有革車三十乗及其季年乃三百乗鄘國風六篇曰定之方中三章章七句羙衛文公也衛為狄所滅東徙渡河野處漕邑齊桓公攘夷狄而封之文公徙居楚丘始建城市而營宫室得其時制百姓說之國家殷富焉定之方中作于楚宫定營室也方中昏正四方楚宫楚丘之宫也仲梁子曰初立楚宫也揆之以日作于楚室揆度也度日出日入以知東西南視定北凖極以正南北室猶宫也樹之榛栗椅桐梓漆爰伐琴瑟椅梓屬升彼虚矣以望楚矣望楚與堂景山與京虚漕虚也楚丘有堂邑者景山大山京髙丘也降觀于桑地勢宜蠶可以居民卜云其吉終焉允臧龜曰卜允信臧善也建國必卜之故建邦能命龜田能施命作器能銘使能造命登髙能賦師旅能誓山川能說喪紀能誄祭祀能語君子能此九者可謂有徳音可以為大夫靈雨既零命彼倌人星言夙駕說于桑田零落也倌人主駕者匪直也人非徒庸君秉心塞淵秉操也騋牝三千馬七尺曰騋騋馬與牝馬也衛國風終十篇曰木𤓰三章章四句美齊桓公也衞國有狄人之敗出處于漕齊桓公救而封之遺之車馬器服焉衞人思之欲厚報之而作是詩也投我以木𤓰報之以瓊琚木𤓰楙木也可食之木瓊玉之羙者琚佩玉名匪報也永以為好也投我以木桃報之以瓊瑤瓊瑶美玉匪報也永以為好也投我以木李報之以瓊玖瓊玖玉名匪報也永以為好也孔子曰吾於木𤓰見苞苴之禮行鄘國風七篇蝃蝀三章章四句止奔也衛文公能以道義化其民淫奔之恥國人不齒也蝃蝀在東莫之敢指蝃蝀虹也夫婦過禮則虹氣盛君子見戒而懼諱之莫之敢指女子有行逺父母兄弟朝隮于西崇朝其雨隮开崇終也從旦至食時為終朝女子有行逺兄弟父母乃如之人也懷婚姻也乃如是淫奔之人也大無信也不知命也不待命也鄘國風八篇曰相䑕三章章四句刺無禮也衛文公能正其羣臣而刺在位承先君之化無禮儀也相鼠有皮人而無儀相視也無禮儀者雖居尊位猶為闇昧之行人而無儀不死何為相䑕有齒人而無止止所止息人而無止不死何俟俟待也相䑕有體體支體也人而無禮人而無禮胡不遄死遄速也鄘國風九篇曰干旄三章章六句美好善也衛文公臣子多好善賢者樂吿以善道也孑孑干旄在浚之郊孑孑干旄之貌注旄於干首大夫之旃也浚衛邑古者臣有大功世其官邑郊外曰野素絲紕之良馬四之紕所以織組也總紕於此成文於彼願以素絲紕組之法御四馬也彼姝者子何以畀之姝順貌畀予也孑孑干旟在浚之都鳥隼曰旟下邑曰都素絲組之良馬五之總以素絲而成組也驂馬五轡彼姝者子何以予之孑孑干旌在浚之城析羽為旌城都城也素絲祝之良馬六之祝織也四馬六轡彼姝者子何以告之三月辛巳魯塟莊夫人哀姜虢侵晉南鄙晉荀息請以埀棘之璧與屈産之乗假道於虞以伐虢虞公請先宫之竒諌不聽里克荀息帥師會之伐虢取下陽江黄楚與國也始服于齊秋七月齊侯宋公與盟于貫虢公敗戎于桑田晉卜偃曰虢必亡矣亡下陽不懼而又有功是天奪之鑒而益其疾也必昜晉而不撫其民矣不可以五稔八月魯不雨楚人伐鄭鬭章囚鄭聃伯齊寺人貂始漏師于多魚管仲言於齊侯曰明君之所重者政與軍也失主之所重者馬與玉也故輕與人政而重與人馬輕與人軍而重與人玉君其戒之夏殷之世刑殘之人放諸磽确不毛之地使與禽獸為伍周衰始命墨者守門劓者守闗宫者守内刖者守囿髠者守積論曰五帝三王之盛一行一止必於其時必於其義是故晝居於外所任使者則公卿賢士大夫也夜居於内所叙御者則后夫人淑嬪婦也曷甞有刑餘之人在日月之側乎雖夏商季世桀紂之亂尚無是也及幽王寵褒姒滅西周始有婦寺之名自是以来帝王大本日以消亡為人君者以行道布徳之公位為快情遂欲之私居故聽政有數而公卿進接者希宴遊無度而妃嬪御幸者無節外不分於晝内不分於夜矣然天下萬事来者不可不應也公卿既不可使至於内妃姬又不可使至於外於是始有用刑餘之人將命於其間者矣齊小白用自刑之豎貂死不獲殯秦胡亥信天刑之趙髙為其所殺後世人君聞是宜披根拔本追復夏商之制剗革周衰之弊矣而漢唐猶有用之以亡國者豈非在於不仁之君哉噫病在不仁之君不可與言也使其可與言則何亡國之有經曰二年春王正月城楚丘楚丘衛邑桓公帥諸侯城之而封衛也略而不書城邢詞繁而不殺何也封國天子大權非諸侯所得而行之者也衞嘗亡滅城楚丘是擅天子之大權而封國也邢遷於夷儀經以自遷為文則其遷出於已意其國未甞滅也諸侯城邢是謂同惡相恤以從簡書故詞繁而不殺羙救患也桓公封衛而衞國忘亡其有功於中華甚大為利於衛人甚溥宜有美詞發揚其事今乃㣲之若此者正其義不謀其利明其道不計其功略小惠存大節春秋之法也故曰五霸三王之罪人仲尼之徒無道桓文之事者夏五月辛巳葬我小君哀姜虞師晉師滅下陽伐虢晉人造意以虞首惡何也貪得重賂遂其強暴滅兄弟之國以及其身而亡其社稷所以為首乎春秋聖人律令也觀此義可以見法矣唐髙宗賜其臣長孫無忌金寳繒錦欲以立武昭儀雖無忌終不順㫖君子猶譏其没於利而不反君賜也矧受他人之賂遂其強暴者乎國而曰滅下陽邑爾其書滅何也下陽虞虢之塞邑猶秦有潼闗蜀有劒嶺皆國之門戸也潼劒不守則秦蜀破下陽既舉而虞虢亡矣春秋此義以天下為家以城郭溝池為固以山川丘陵為險設之以守國而待暴客者也其衰世之意耶秋九月齊侯宋公江人黄人盟于貫荆楚天下莫強焉江黄者其東方之與國也二國来定盟則楚人失其右臂矣樂毅破齊先結韓趙孔明伐魏申好江東雖武王牧野之師亦誓友邦逺及庸蜀彭濮八國之人共為犄角之勢也桓公此盟其服荆楚之慮周矣其攘夷狄免民於左袵之義著矣盟雖春秋所惡然諸侯皆在獨言逺國者許是盟也冬十月不雨楚人侵鄭二十年甲子冬十一月魯不雨至四月乃雨徐人取舒齊侯會宋人江人黄人于陽榖以謀伐楚齊侯使魯来㝷盟公子友如齊涖盟楚人伐鄭鄭伯欲成孔叔不可曰齊方勤我棄徳不祥經曰三年春王正月不雨夏四月不雨榖梁子曰不雨者勤雨也每時而一書閔雨也閔雨有志乎民者也歴時而總書不憂雨也不憂雨無志乎民者也按詩稱僖公儉以足用寛以愛民務農重榖則誠賢君也其有志乎民審矣故冬不雨而書春不雨而書夏不雨而書以著其勤也文公以練祭則緩於作主以宗廟則太室屋壞以賦政則四不視朔以邦交則三不㑹盟其無志乎民亦審矣故自十有二月不雨至於秋七月而書自正月不雨至於秋七月而書以著其慢也徐人取舒六月雨雨云者喜雨也閔雨與民同其憂喜雨與民同其樂此君國子民之道也觀此義則知春秋有懼天災恤民隠之意遇天災而不懼視民隠而不恤自樂其樂而不與民同也國之亡無日矣秋齊侯宋公江人黄人㑹于陽榖按左氏謀伐楚也或曰侵蔡自陘之師諸侯皆在江黄獨不與焉則安知其謀伐為楚乎曰兵有聚而為正亦有分而為竒諸侯之師同次于陘所謂聚而為正也江人黄人各守其地所謂分而為竒也次陘大衆厚集其陣聲罪致討以震中國之威江人黄人各守其境按兵不動以為八國之援此克敵制勝之謀也退于召陵而盟禮定循海以歸而濤塗執然後及江人黄人伐陳則知侵蔡次陘而二國不㑹自為犄角之勢明矣此大㑹而木言者善是謀也冬公子友如齊涖盟楚人伐鄭二十一年冬十一月齊侯宋公魯侯陳侯衛侯鄭伯許男曹伯侵蔡蔡潰遂伐楚楚王使與師言曰君處北海寡人處南海唯是風馬牛不相及也不虞君之涉吾地也何故管仲對曰昔召康公命我先君太公曰五侯九伯女實征之以夾輔周室爾貢苞茅纁組不入王祭不共無以縮酒寡人是徵昭王南征而不復寡人是問對曰貢之不入寡君之罪也敢不共給昭王之不復君其問諸水濵師進次于陘許男新臣薨楚王使屈完如師師退次于召陵齊侯陳諸侯之師與屈完乗而觀之曰豈不榖是為先君之好是繼與不榖同好如何對曰君惠徼福於敝邑寡君之願也齊侯曰以此衆戰誰能禦之以此攻城何城不克對曰君若以徳綏諸侯誰敢不服君若以力楚國方城以為城漢水以為池雖衆無所用之屈完及諸侯盟于召陵陳轅濤塗謂鄭申侯曰師出於陳鄭之間國必甚病若出於東方觀兵於東夷循海而歸其可也申侯曰善濤塗以吿齊侯許之申侯見曰師老矣若出於東方而遇敵懼不可用也若出於陳鄭之間共其資糧屝屨其可也齊侯說與之虎牢執濤塗及江人黄人伐陳六月諸侯還許葬其君穆公葬之以侯禮也凡諸侯薨于朝會加一等死王事加二等於是有以衮斂冬十月魯叔孫戴伯帥師㑹齊宋衛鄭許曹之師侵陳陳成歸轅濤塗晉驪姬言於公曰世子矜狄之戰其志益廣狐突不順故不出難將至矣公曰吾不忘也抑未有以致罪焉驪姬告優施曰君既許我矣而難里克奈何施曰子為我具從之飲酒中施起舞歌曰暇豫之吾吾曾不如鳥烏人皆集於菀已獨集於枯施出克辟奠不餐而寢夜半召施而問之施曰君許姬殺太子立奚齊謀既成矣克曰秉君以殺太子吾不忍通復故交吾不敢中立其免乎施曰免旦見丕鄭而告之鄭曰惜也不如不信以䟽之固太子以携之多為之故以變其志乃可間也克曰不可及矣子將何如鄭曰事君者君為我心制不在我克曰撓志以從君利方以成人吾不能將伏也明日稱疾不朝三旬而難作經曰四年春王正月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡蔡潰遂伐楚次于陘濳師掠境曰侵侵蔡者竒也聲罪致討曰伐伐楚者正也遂者繼事之詞而有專意次止也楚貢苞茅不入王祭不供無以縮酒桓公是徴而楚人服罪師則有名矣孟氏何以獨言春秋無義戰也楚雖暴横慿陵上國齊不請命擅合諸侯豈所謂為天吏以伐之乎春秋以義正名而樂與人為善以義正名則君臣之分嚴矣書遂伐楚譏其專也樂與人為善茍志於善斯善之矣書次于陘楚屈完来盟于師盟于召陵序其績也夏許男新臣卒劉敞曰諸侯卒于外者在師則稱師在㑹則稱㑹今許男一無稱者此去師與㑹而復歸其國之驗也召陵地在潁川是以許男復焉古者國君即位而為俾嵗一漆之出疆必載捭卒于師曰師卒于㑹曰㑹正也許男新臣卒非正也其為人君不知命者也不知命則必畏死畏死則必貪生貪生則必亂於禮矣而後有容身茍免之恥而後有淫祀非望之惑此說是也夫知死生之說通晝夜之道者亦豈有以異於人哉茍得正而斃焉則無求矣楚屈完来盟于師盟于召陵楚大夫未有以名氏通者其曰屈完進之也其不稱使權在完也来盟于師嘉服義也盟于召陵序桓績也桓公帥九國之師侵蔡而蔡潰伐楚而楚人震恐兵力強矣責苞茅之不貢則諾問昭王之不復則辭徼與同好則承以寡君之願語其戰勝攻克則對以用力之難然而桓公退師召陵以禮楚使卒與之盟而不遂也於此見齊師雖強桓公能以律用之而不暴楚人已服桓公能以禮下之而不驕庶幾乎王者之事矣故春秋之盟於斯為盛而揚子稱之曰齊桓之時緼而春秋美召陵是也齊人執陳轅濤塗秋及江人黄人伐陳八月公至自伐楚葬許穆公十有二月公孫茲帥師會齊人宋人衛人鄭人許人曹人侵陳桓公識明而量淺管仲器不足而才有餘方楚人未帖而齊以為憂也致勤于鄭振中夏之威㑹于陽榖敦逺國之信按兵于陘修文告之詞退舍召陵結㑹盟之禮何其念之深禮之謹也存此心以進善則桓有王徳而管氏為王佐矣堯舜性之也湯武身之也五伯假之也乆假而不歸烏知其非有惜乎桓公假之不乆而遽歸也楚方受盟志已驕溢陳大夫一謀不協其身見執其國見伐見侵而怒猶未怠也桓徳於是乎衰矣愛人不親反其仁治人不治反其智禮人不答反其敬行有不得者皆反求諸己其身正而天下歸之曽可厚以責人不自反乎原其失在于量淺而器不宏也魏武纔得荆州而張松見忽唐莊宗自矜取汴而髙氏不朝成湯勝夏橅有萬方乃曰茲朕未知獲戾于上下慄慄危懼若將隕于深淵其爾萬方有罪在予一人予一人有罪無以爾萬方人之度量相越豈不逺哉春秋稱人以執罪齊侯也稱侵陳者深責之也故孟子曰仲尼之徒無道桓文之事者管仲曾西之所不為也而子為我願之乎二十二年驪姬謂世子曰君夢齊姜必速祭之世子祭于曲沃歸胙于公姬毒而獻之祭地地墳與犬犬斃姬泣曰賊由世子公殺其傅杜原款將死使謂世子曰守情說父孝也殺身成志仁也死不忘君敬也孺子勉之世子奔新城重耳曰子盍言子之志於公乎世子曰不可君安驪姬是我傷公之心也然則盍行乎世子曰不可君謂我欲弑君也天下豈有無父之國哉吾何行如之使人辭於狐突曰申生有罪不念伯氏之言也以至於此申生不敢愛其死雖然吾君老矣子少國家多難伯氏不出而圖吾君伯氏茍出而圖吾君申生受賜而死再拜稽首乃卒諡曰恭世子姬遂譖二公子曰皆知之晉侯使寺人披伐蒲重耳曰君父之命不校乃徇曰校者吾讐也踰垣而走披斬其袪狐偃狐毛趙衰顛頡魏犨胥臣賈佗從及栢谷卜適齊楚狐偃曰毋卜齊楚道逺而望大不可以困往狄近晉不通多怨走之易逹可以竄惡可與共憂遂奔翟把伯姬以其子朝于魯魯叔孫戴伯如牟娶焉王以后愛子帶故將廢太子鄭管仲言于齊侯曰王將以嬖寵之私廢嫡立庶王室既以此卑矣今又行之亂亡必至君將何以伯諸侯匡天下乎齊侯曰何若而可對曰君若大㑹諸侯吿于王而請與世子會王以天下之歸心世子也必無害矣齊侯曰善於是帥宋公魯侯陳侯衞侯鄭伯許男曹伯會世子于首止謀寜周也諸侯盟焉王畏齊侯之逼已也使召鄭伯曰吾撫汝以從楚輔之以晉可以少安鄭伯喜於王命而懼其不朝于齊也將逃盟孔叔曰國君不可以輕輕則失親失親患必至病而乞盟所喪多矣不聽遂逃歸是時江黄道栢方睦於齊皆弦姻也弦子恃之而不事楚又不設備楚鬬榖於莬滅弦弦子奔黄秋七月戊申朔日有食之晉侯復假道於虞以伐虢宫之竒諫曰虢虞之表也虢亡虞必從之諺所謂輔車相依唇亡齒寒者也弗聽宫之竒以其族行曰虞不臘矣晉侯滅虢師還館于虞遂襲虞滅之於是晉地益大西有河西與秦接境北邊狄南至于河宛人百里奚遊諸侯無所遇晚仕於虞以虞君昏亂去之秦年七十矣秦伯聞其賢拜為上卿奚因薦其友蹇叔秦伯厚幣聘于宋以為上大夫經曰五年春晉侯殺其世子申生公羊子曰殺世子母弟直稱君者甚之也申生進不能自明退不能違難愛父以姑息而陷之不義讒人得志幾至亡國先儒以為大仁之賊而目晉侯斥殺專罪獻公何也春秋端本清源之書也内寵竝后嬖子配嫡亂之本也驪姬寵奚齊卓子嬖亂本成矣尸此者其誰乎是故目晉侯斥殺專罪獻公使後世有欲紊妃妾之名亂嫡庶之位縱人欲滅天理以敗其國家者知所戒焉以此防民猶有以堯母名門使姦臣逆探其意有危皇后太子之心以成巫蠱之禍者矣把伯姬来朝其子夏公孫茲如牟公及齊侯宋公陳侯衞侯鄭伯許男曹伯㑹王世子于首止及以㑹尊之也以王世子而下㑹諸侯則陵以諸侯而上與王世子㑹則抗春秋抑強臣扶弱主撥亂世反之正特書及以㑹者若曰王世子在是諸侯咸往㑹焉示不可得而抗也後世論其班位有次于三公宰臣之下亦有序乎其上者則將奚正自天王而言欲屈逺其子使次乎其下示謙徳也自臣下而言欲尊敬王世子則序乎其上正分義也天尊地卑而其分定典叙禮秩而其義明使羣臣得伸其敬則貴有常尊上下辨矣經書宰周公祗與王人同序於諸侯之上而不得與殊㑹同書此聖人尊君抑臣之㫖也而班位定矣秋八月諸侯盟于首止無中事復舉諸侯會盟同地再言首止書之重詞之複其中必有大羙惡焉首止之盟羙之大者也王將以愛易世子桓公有憂之控大國扶小國會于首止以定其位太子踐祚是為襄王一舉而父子君臣之道皆得焉故夫子稱之曰管仲相桓公一匡天下民到于今受其賜㣲管仲吾其被髪左衽矣中國之為中國以有父子君臣之大倫也一失則為夷狄矣故曰首止之盟羙之大者也鄭伯逃歸不盟事有惡者不與為幸其善者不與為貶平丘之盟惡也請魯無勤是以為幸故直書曰公不與盟首止之盟善也犯衆不盟是以為貶故特書曰鄭伯逃歸逃者匹夫之事以諸侯之尊下行匹夫之事雖悔於終病而乞盟如所喪何其書逃歸不盟深貶之也或曰首止之㑹非王志也王惡齊侯定世子而使周公召鄭伯曰吾撫汝以從楚可以少安鄭伯善於王命而畏齊故逃歸不盟然則何罪乎曰春秋道名分尊天王而以大義為主夫義者權名分之中而當其可之謂也諸侯㑹王世子雖衰世之事而春秋與之者是變之中也鄭伯雖承王命而制命非義春秋逃之者亦變之中也天下之大倫有常有變舜之於父子湯武之於君臣周公之於兄弟皆處其變者也賢者守其常聖人盡其變㑹首止逃鄭伯處父子君臣之變而不失其中也噫此春秋之所以為春秋而非聖人莫能修之者也楚人滅弦弦子奔黄九月戊申朔日有食之冬晉人執虞公公羊子曰虞已滅矣其言執何不與滅也滅者亡國之善詞上下之同力也若夫虞公地之緼於晉乆矣晉命行乎虞民信矣其曰晉人執之者猶衆執獨大耳貴為天子富有四海而身為獨夫商紂是也貴為諸侯富有一國而身為獨夫虞公是也其曰公者非存其爵猶下執之之詞也不言以歸驗其為匹夫之實也書滅下陽於始而記執虞公於後可以見棄義趨利瀆貨無厭之能亡國敗家審矣二十三年初晉侯使士蒍築蒲與屈不慎寘薪焉夷吾訴之公以讓蒍對曰臣聞無喪而慼憂必讎焉無戎而城讎必保焉㓂讎之保又何慎焉守官廢命不敬固讎之保不忠失忠與敬何以事君詩云懐徳惟寜宗子惟城君其修徳而固宗子何城如之於是晉侯使賈華伐屈夷吾不能守盟而行盡逐羣公子始為令國無公族焉夷吾將奔狄郤芮曰偕出偕入難聚居異情惡不如之梁梁近秦而幸焉子往驪姬懼必援於秦且必告悔是吾免也乃之梁居二年驪姬使奄楚以環釋言齊侯㑹魯侯宋公陳侯衞侯曹伯伐鄭圍新城秋楚圍許諸侯遂救許楚師還諸侯罷兵歸楚王軍于武城將復伐許許男懼因蔡侯請服于楚面縛銜璧大夫衰絰士輿櫬釋其縛受其璧而祓之焚其櫬禮而命之使復其所狄侵晉晉里克敗之于采桑梁由靡曰狄無恥從之必大克里克曰懼之而已無速衆狄虢射曰狄必復至示之弱矣經曰六年春王正月夏公會齊侯宋公陳侯衞侯曹伯伐鄭圍新城楚人圍許諸侯遂救許冬公至自伐鄭齊自召陵之後兵服四夷威動諸夏今合六國之師圍新造之邑宜若振槁然圉而不舉有遺力者矣及楚人攻許即解新城之圍移師救許是又得討罪分災救急之義也故特書曰楚人圍許諸侯遂救許凢書者未有不善之也其曰遂救許善之尤者也善之尤則何以致乆也二十四年齊人伐鄭管仲言於齊侯曰臣聞之招攜以禮来逺以徳徳禮不易無人不懷齊師還小邾子朝于魯孔叔言於鄭伯曰諺有之曰心則不競何憚於病既不能強又不能弱所以斃也請下齊以救國公曰吾知其所由来矣殺申侯以說于齊初申侯有寵於楚文王王曰女專利而不厭予取予求不女疵瑕也我死必速行無適小國將不女容既葬出奔鄭又有寵於厲公鬬榖於莵聞其死也曰古人有言曰知臣莫若君弗可改也巳夏五月齊侯㑹宋公魯侯陳世子款鄭世子華盟于甯母鄭伯使世子華聽命華言於齊侯洩氏孔氏子人氏三族實違君命君若去之以為成我以鄭為内臣齊侯將許之管仲曰君以禮與信屬諸侯而以姦終之可乎公曰討之未捷茍有釁從之不亦可乎對曰君若綏之以徳加之以訓辭誰敢不服若總其罪人以臨之鄭有詞矣何懼夫子華既為世子而求介於大國以弱其國亦必不免鄭有叔詹堵叔師叔三良為政未可間也齊侯辭焉乃盟而歸子華由是得罪於國曹伯薨子襄嗣魯季友如齊曹𦵏其君昭公王寢疾太子鄭懼叔帶作難使告吿齊經曰七年春齊人伐鄭夏小邾子来朝鄭殺其大夫申侯稱國以殺者罪累上也不知自反内忌聽讒而擅殺其大夫信失刑也如申侯者其見殺何也專利而不獻則足以殺其身而已矣秋七月公㑹齊侯宋公陳世子款鄭世子華盟于甯母曹伯班卒公子友如齊冬𦵏曹昭公二十五年冬十一月齊侯帥宋公魯侯衛侯許男曹伯陳世子款㑹王人盟于洮鄭伯乞盟狄伐晉報采桑之役夏五月魯禘于太廟立成風為夫人冬十月丁未王崩諡曰惠王太子鄭立宋公寢疾世子茲父固請曰目夷長且仁君其立之公命子魚辭曰能以國讓仁孰大焉臣不及也立庶不順經曰八年春王正月公㑹王人齊侯宋公衛侯許男曹伯陳世子款盟于洮鄭伯乞盟王人下士也内臣之微者莫㣲於下士外臣之貴者莫貴於方伯公侯今以下士之㣲序乎方伯公侯之上外輕内重不亦偏乎春秋之法内臣以私事出朝者直書曰来以私好出聘者不稱其使以私情出訃者止録其名不以其貴故尊之也以王命行者雖下士之㣲序乎方伯公侯之上不以其賤故輕之也然則班列之髙下不在乎内外特係乎王命耳聖人之情見矣尊君之義明矣乞者卑遜自屈之詞欲與是盟而未知其得與否也始而逃歸今則乞盟於以見舉動人君之大節不可不慎也夏狄伐晉秋七月禘于太廟用致夫人按禮大禘升歌清廟下而管象朱干玊戚以舞大武八佾以舞大夏此天子之禮樂也踐其位則行其禮奏其樂故雝禘大祖周頌也而其詩曰相維辟公天子穆穆周公人臣不踐其位魯侯國而用天子之禮亂名犯分莫大乎是故夫子志之曰郊社之禮所以事上帝也宗廟之禮所以祀乎其先也魯侯國而以王禮祀太廟是誣偽不誠而非所以事乎其先矣故夫子傷之曰禘自既灌而往之者吾不欲觀之矣夫灌以降神乃祭之始而已不欲觀是自始至終皆非禮矣用者不宜用也致者不宜致也夫人者風氏也初成風聞季友之繇遂事之而屬僖公焉故季子立之公賜季子汶陽之田及費又生而命之氏俾世其卿而私門強矣於成風則舉大事於始祖之廟立以為夫人而嫡妾亂矣以私勞寵其臣而卑公室以私恩崇其母而輕宗廟皆越禮之罪也經舊夫人而不書姓氏其貶深矣冬十有二月丁未天王崩皇王大紀卷四十

body:
  text: 皇王大紀卷十九宋胡宏撰三王紀周成王大司馬制畿封國以正邦國設儀辨位以等邦國進賢興功以作邦國建牧立監以維邦國制軍詰禁以糾邦國施貢分職以任邦國簡稽鄉民以用邦國均守平則以安邦國比小事大以和邦國以九伐之法正邦國馮弱犯寡則眚之賊賢害民則伐之暴內陵外則壇之野荒民散則削之負固不服則侵之賊殺其親則正之放弒其君則殘之犯令陵政則杜之外內亂鳥獸行則滅之凡令賦以地與民制之上地食者三之二其民可用者家三人中地食者半其民可用者二家五人下地食者三之一其民可用者家二人中春教振旅中夏教茇舍中秋教治兵中冬教大閲大合軍以行禁令以救無辜伐有罪大㑹同則率士庶子而掌其政令大祭祀饗食羞牲魚授其祭司勳掌六鄉賞地之法以等其功王功曰勳國功曰功民功曰庸事功曰勞治功曰力戰功曰多凡有功者銘書於王之太常祭于大蒸司勳詔之凡賞無常輕重視功凡頒賞地三之一食唯加田無國征掌固掌修城郭溝池樹渠之固頒其士庶子及其衆庶之守造都邑治其固與其守法凡國都之竟有溝樹之固郊亦如之民皆有職焉若有山川則因之候人各掌其方之道治與其禁令司士掌羣臣之版辨其年歲與其貴賤周知邦國都家縣鄙之數卿大夫士庶子之數以詔王治以德詔爵以功詔祿以能詔事以久奠食唯賜無常正朝儀之位辨其貴賤之等王南鄉三公北面東上孤東面北上卿大夫西面北上王族故士虎士在路門之右南面東上大僕大右大僕從者在路門之左南面西上司士擯孤卿特揖大夫以其等旅揖士旁三揖王還揖門左揖門右大僕前王入內朝皆退凡祭祀帥其屬而割牲羞俎豆司右掌羣右之政令凡軍旅㑹同合其車之卒伍而比其乘屬其右凡國之勇力之士能用五兵者屬焉虎賁氏掌先後王而趨以卒伍旅賁氏掌執戈盾夾王車而趨大僕掌正王之服位出入王之大命掌諸侯之復逆王視朝則前正位而退入亦如之建路鼓于大寢之門外以待達窮者與遽令王出入則自左馭而前驅凡軍旅田役贊王鼓救日月亦如之小臣掌王之小命詔相王之小法儀掌三公及孤卿之復逆正王之燕服位王之燕出入則前驅御僕掌羣吏之逆及庶民之復掌王之燕令𨽻僕掌五寢掃除之事大馭掌馭玉路以祀及犯軷王自左馭馭下祝登受轡犯軷遂驅之及祭酌僕僕左執轡右祭兩軹祭軓乃飲凡馭路行以肆夏趨以采齊凡馭路儀以鸞和為節戎僕掌馭戎車掌倅車之政以巡守及兵車之㑹齊僕掌馭金路以賔朝覲宗遇饗食道僕掌馭象路以朝夕燕出入掌二車之政令田僕掌馭田路以田以鄙掌佐車之政凡田王提馬而走諸侯晉大夫馳車僕掌戎路之萃廣車之萃闕車之萃革車之萃輕車之萃凡師共革車各以其萃校人辨六馬之屬種馬一物戎馬一物齊馬一物道馬一物田馬一物駑馬一物天子十有二間馬六種邦國六間馬四種家四間馬二種馬八尺以上為龍七尺以上為騋六尺以上為馬職方氏掌天下之圖周知其利害使同貫利東南曰揚州其山鎮曰㑹稽其澤藪曰具區其川三江其浸五湖其利金錫竹箭其民二男五女其畜宜鳥獸其穀宜稻正南曰荆州其山鎮曰衡山其澤藪曰雲夢其川江漢其浸潁湛其利丹銀齒革其民一男二女其畜宜鳥獸其穀宜稻河南曰豫州其山鎮曰華山其澤藪曰圃田其川滎雒其浸波溠其利林漆絲枲其民二男三女其畜宜六擾其穀宜五種正東曰青州其山鎮曰沂山其澤藪曰望諸其川淮泗其浸沂沭其利蒲魚其民二男二女其畜宜雞狗其穀宜稻麥河東曰兖州其山鎮曰岱山其澤藪曰大野其川河泲其浸盧維其利蒲魚其民二男三女其畜宜六擾其穀宜四種正西曰雍州其山鎮曰嶽山其澤藪曰弦蒲其川涇汭其浸渭洛其利玉石其民三男二女其畜宜牛馬其穀宜黍稷東北曰幽州其山鎮曰醫無閭其澤藪曰貕飬其川河泲其浸淄時其利魚鹽其民一男三女其畜宜四擾其穀宜三種河內曰冀州其山鎮曰霍山其澤藪曰楊紆其川漳其浸汾潞其利松柏其民五男三女其畜宜牛羊其穀宜黍稷正北曰并州其山鎮曰恆山其澤藪曰昭餘祁其川滹沱嘔夷其浸淶易其利布帛其民二男三女其畜宜五擾其穀宜五種凡邦國大小相維王設其牧制其職各以其所能制其貢各以其所有形方氏掌制邦國之地域而正其封疆無有華離之地使小國事大國大國比小國大司冦掌三典一曰刑新國用輕典二曰刑平國用中典三曰刑亂國用重典以五刑糾萬民一曰野刑上功糾力二曰軍刑上命糾守三曰鄉刑上德糾孝四曰官刑上能糾職五曰國刑上願糾暴以圜土聚教罷民凡害人者置之圜土弗使冠飾而施職事焉以明刑恥之其能改者上罪三年而舍中罪二年而舍下罪一年而舍反於中國不齒三年其不能改而出圜土者殺凡圜土之刑人也不虧體其罰人也不虧財以兩造禁民訟入束矢於朝然後聽之以兩劑禁民獄入鈞金三日乃致于朝然後聽之以嘉石平罷民凡萬民之有罪過而未麗於法而害於州里者桎梏而坐諸嘉石役諸司空重罪旬有三日坐朞役其次九日坐九月役其次七日坐七月役其次五日坐五月役其下罪三日坐三月役使州里任之則宥而舍之以肺石達窮民凡逺近惸獨老幼之欲有復於上而其長弗達者立於肺石三日士聽其辭以告於上而罪其長凡諸侯之獄訟以邦典定之凡卿大夫之獄訟以邦法斷之凡庶民之獄訟以邦成弊之小司冦以五刑聽萬民之獄訟附于刑用情訊之至于旬乃弊之讀書則用法凡命夫命婦不躬坐獄訟凡王之同族有罪不即市奉而適甸師氏以待刑殺以五聲聽獄訟求民情一曰辭聽二曰色聽三曰氣聽四曰耳聽五曰目聽以八辟麗邦法附刑罰一曰議親二曰議故三曰議賢四曰議能五曰議功六曰議貴七曰議勤八曰議賔聽民之所刺宥以施上服下服之刑大比登民數自生齒以上登于天府內史司㑹冡宰二之以制國用孟冬司民獻民數於王王拜受之以圖國用而進退之歲終則令羣士計獄弊訟登中于天府司刑掌五刑之法以麗萬民之罪墨罪五百劓罪五百宫罪五百刖罪五百殺罪五百若司冦聽獄弊訟則以五刑之法詔刑罰而以辨罪之輕重墨者使守門劓者使守關宫者使守內刖者使守囿髠者使守積司刺掌三刺三宥三赦之法以贊司冦聽獄訟一刺曰訊羣臣再刺曰訊羣吏三刺曰訊萬民一宥曰不識再宥曰過失三宥曰遺忘一赦曰幼弱再赦曰老耄三赦曰蠢愚以此三法求民情斷民中而施上服下服之罪司約掌邦國及萬民之約劑治神之約為上治民之約次之治地之約次之治功之約次之治器之約次之治摯之約次之凡大約劑書於宗彛小約劑書於丹圖若有訟者則珥而辟藏其不信者服墨若大亂則六官辟藏其不信者殺司盟凡邦國有疑㑹同則掌其盟約之載既盟則二之司隸帥其民而搏盜賊凡囚執人之事士師掌五禁左右刑罰一曰宫禁二曰官禁三曰國禁四曰野禁五曰軍禁以木鐸徇于朝書而縣于門閭禁庶民之亂暴力正者矯誣犯禁者作語言而不信者禁野之橫行徑踰者禁山之為苑澤之沈者禁川游者禦晨行者禁宵行者夜遊者禁以兵革趨行者禁馳騁於國中者禁嘂呼歎鳴於國中者行歌哭於國中之道者幾禁行作不時者不物者幾酒謹酒以五戒先後刑罰毋使罪麗于民一曰誓用之于軍旅二曰誥用之于㑹同三曰禁用諸田役四曰糾用諸國中五曰憲用諸都鄙掌士之八成一曰邦汋二曰邦賊三曰邦諜四曰犯邦令五曰矯邦令六曰邦盜七曰邦朋八曰邦誣論曰此司冦之書宅心忠恕雖條貫闕失而恤刑之意深殆周公之遺法也歟春秋之時鄭子産趙宣子始出入先王用刑之法作為刑書末流至於暴秦以斬劓人為不足而夷人之三族帝王五刑之典盡廢而墨劓剕宫大辟五虐之刑獨行天下之人搖手觸重罪而無輕刑以當之漢孝文哀民之無辜於是廢肉刑而立笞與棄市之法雖恤民之意甚至而未知先王五刑之本也故當斬右趾者棄市笞者往往至死雖名為輕刑而實殺人與專用肉刑無異故後世不得不更之以輕至于令有笞杖徒流絞斬雖差善於漢然使人自新之路猶狹繩人以罪之法猶急非帝王以刑弼教之意也虞書曰象以典刑鞭作官刑撲作教刑金作贖刑怙終賊刑此乃帝王正五刑也又曰流宥五刑五刑有服五服三就五流有宅五宅三居是此正五刑皆有流宥之法也墨劓剕宫大辟賊刑之科目也後世止以是為五刑故肉刑一廢遂不可復非不可復也不行帝王正五刑而專以賊刑當天下之罪慘莫甚焉自非天下之至不仁者孰忍專用之若盡復正五刑於當絞斬之科增立劓剕與宫無遂絶人命而笞杖悉行流宥之法無輕折辱人典刑所以待士大夫也昔人為輔相士大夫失行有能不顯其過隨宜他叙人以為愧至於無敢犯者意其近似典刑流宥之法也鞭刑所以待府史胥徒在官之有過者撲刑所以待士農工商從師之不率者嘉石之役疑其近似鞭刑流宥之法也朝庠之禮疑其近似撲刑流宥之法也雖鞭撲輕刑聖人猶慎行之待人如此其有禮也人豈得不生愧恥其能使天下人人有士君子之行無足怪也流宥之而不改然後刑之刑之而不改然後當之以墨劓剕宫大辟則又審其輕重而許之贖又流宥之今之三流圜土之禁其近之乎及其終不改然後殘賊其肌體雖殺之所謂以生道殺之也其誰不心悅誠服乎行之以歲月頑鈍無恥之風宜亦少衰矣大司徒掌天下土地之圖周知九州之地域廣輪之數辨其山林川澤丘陵墳衍原隰之名物而辨其邦國都鄙之數制其畿疆而溝封之設其社稷之壝而樹之田主各以其野之所宜木遂以名其社與其野載師掌任土之法以物地事授地職而待其政令以廛里任國中之地以場圃任園地以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地以公邑之田任甸地以家邑之田任稍地以小都之田任縣地以大都之田任疆地凡任地國宅無征園廛二十而一近郊十一逺郊二十而三甸稍縣都皆無過十二唯其漆林之征二十而五凡宅不毛者有里布凡田不耕者出屋粟凡民無職事者出夫家之征以時徵其賦閭師掌國中及四郊之人民六畜之數以任其力以待其政令以時徵其賦凡任民任農以耕事貢九穀任圃以樹事貢草木任工以飭材事貢器物任商以市事貢貨賄任牧以畜事貢鳥獸任嬪以女事貢布帛任衡以山事貢其物任虞以澤事貢其物凡無職者出夫布凡庶民不畜者祭無牲不耕者祭無盛不樹者無槨不蠶者不帛不績者不衰遺人掌邦之委積以待施惠鄉里之委積以恤民之囏厄門關之委積以飬老孤郊里之委積以待賔客野鄙之委積以待羇旅縣都之委積以待凶荒凡賔客㑹同師役掌其道路之委積凡國野之道十里有廬廬有飲食三十里有宿宿有路室路室有委五十里有市市有候館候館有積凡委積之事巡而比之以時頒之均人掌均地政均地守均地職均人民牛馬車輦之力政凡均力政以歲上下豐年則公旬用三日焉中年則公旬用二日焉無年則公旬用一日焉凶札則無力政無財賦不收地守地職不均地政三年大比則大均廩人掌九穀之數以待國之匪頒賙賜稍食以歲之上下數邦用凡萬民之食食者人四釜上也人三釜中也人二釜下也若食不能人二釜則令邦移民就穀詔王殺邦用司市以次叙分地而經市以陳肆辨物而平市以政令禁物靡而均市以商賈阜貨而行布以度量成賈而徵儥以質劑結信而止訟以賈民禁僞而除詐以刑罰禁暴而去盜以泉府同貨而斂賖大市以質小市以劑大市日􅔨而市百族為主朝市朝時商賈為主夕市夕時販夫販婦為主凡陳貨賄名相近者相逺也實相近者相邇也而平正之凡治貨賄六畜珍異亡者使有利者使阜害者使亡靡者使微國凶荒札喪則市無征而作布凡市僞飭之禁在民商工賈皆十有二市刑小刑憲罰中刑徇罰大刑撲罰其附于刑者歸于士國君過市則刑人赦夫人過市罰一幕世子過市罰一帟命夫過市罰一蓋命婦過市罰一帷凡天患禁貴儥者使有恆賈四時之珍異亦如之㕓人掌斂布絘布總布質布罰布㕓布入于泉府以斂布之不售貨之滯于民用者以其賈買之物揭而書之以待不時而買者賣者各從其抵都鄙從其主國人郊人從其有司然後豫之凡賖者祭祀無過旬日喪紀無過三日凡民之貨者與其有司辨而授之以國服為之息約以國之所用來償以此使為息也禁鬭囂暴亂者出入相凌犯者以屬遊飲食于市者若不可禁則搏而戮之坐而論道謂之王公作而行之謂之士大夫審曲面藝以飭五材以辨民器謂之百工百工之事皆聖人之所作也智者創物巧者述之守之世謂之工天有時地有氣材有美工有巧合此四者然後可以為良也攻木之工七輪輿弓廬匠車梓攻金之工六築冶鳬㮚段桃攻皮之工五函鮑韗韋裘設色之工五畫繪鍾筐㡛刮摩之工五玉楖雕矢磬搏埴之工二陶旊有虞氏上陶夏后氏上匠殷人上梓周人上輿故一器而工聚焉者車為多車有六等輈有三度軸有三理軫之方也以象地也蓋之圜也以象天也輪輻三十以象日月也蓋弓二十有八以象星也龍旗九斿以象大火也鳥旟七斿以象鶉火也熊旗六斿以象伐也龜蛇四斿以象營室也弧旌枉矢以象弧也論曰謹按孔子定書周官六卿冡宰掌邦治統百官均四海者也今以劉歆所成周禮考之太宰掌建邦之六典夫太宰統五官之典以為治者豈於五官之外更有治典哉則掌建六典歆之妄也太宰之屬六十小宰也司㑹也司書也職內也職歲也職幣也是六官之所掌詞繁而事復類皆簿書期㑹之末俗吏掊克之所為而非贊冡宰進退百官均一四海之治者也古之君國子民者以義為利不以利為利故百乘之家不畜聚斂之臣與其有聚斂之臣寧有盜臣今天官有宰夫者考羣都縣鄙之治乘其財用之出入凡失財用物辟名者誅之其足用長財善物者賞之夫君相守恭儉而不尚末作使民務本則足用長財之要也百官有司謹守其職豈敢踰越制度自以足用長財為事若劉歆之說是使百官有司不守三尺上下交征利椎剝其民以危亡其國之道非周公致太平之典也古之王者守禮寡欲由義而行無所忌諱不畏災患今天官甸師乃曰喪事代王受眚災此楚昭宋景之所不為者也而謂周公立以為訓開後王忌諱之端乎先王之制凡官府次舍列于庫門之外所以别內外嚴貴賤也今宫正乃比宫中之官府次舍之衆寡又曰去其竒邪之民則是妃嬪與官吏衆庶雜處簾陛不嚴而內外亂矣宫伯掌王宫之士庶子鄭𤣥以為宫中諸吏之嫡庶宿衛王宫者也天子深居九重前朝後市謹之以門衛嚴之以城郭溝池環之以鄉遂縣都藩之以侯甸男邦采衛守之以夷蠻戎狄周匝四垂中天下而立定四海之民周公乃於宫中置諸史又以其士庶子衛王宫何示人不廣而自削弱如此也王后之職恭儉不妬忌帥夫人嬪婦以承天子奉宗廟而已矣今內宰凡建國佐后立市豈后之職也哉內小臣掌王后之命后有好事于四方則使往有好令于卿大夫則亦如之閽人掌守王宫中門之禁說者以為此二官奄者墨者也婦人無外事以貞潔為行若外通諸侯內交羣下則將安用君矣夫人臣尚無境外之交曽謂后而可乎古者不使刑人守門公家不畜刑人大夫弗飬士遇諸塗弗與言也周公作立政戒成王以恤左右綴衣虎賁欲其皆得俊乂之人今反以隱宫刑餘在日月之側開亂亡之端乎寺人內豎賤人非所貴也女祝掌宫中禱祠禳禬之事夫祭祀之禮天子公卿大夫士行之於外后妃夫人嬪婦供祭服籩豆於內凡天地宗廟山川百神祀有常典又安用此么麼禱祠禳禬於宫中此殆漢世女巫執左道入宫中乘妃姬爭妬與為厭勝之事者劉歆乃以為太宰之屬置於王宫其誣周公也甚矣冡宰當以天下自任故王者內嬖嬪婦敵於后外寵庶孽齊於嫡宴遊無度衣服無章賜豫無節法度之廢將自此始雖在內廷為冢宰者真當任其責者也若九嬪之婦法世婦之宫具女御之功事女史之內政典婦之女功后夫人之職也王安石以為皆統於冡宰則王所以治內可謂至公而盡正矣夫順理而無阿私之謂公由理而無邪曲之謂正修身以齊家此王者治國平天下之定理所自盡心者茍身不能齊家而以付之冡宰為王也悖理莫甚焉又可謂之公正乎噫安石真姦人哉四方職貢各有定制王者為天下主財奉禮義以飬天下無非王者之財也不可以有公私之異今大府乃有式貢之餘財以共玩好之用不幾有如李唐之君受裴延齡之欺罔者乎玉府乃有王之金玉良貨賄之藏不幾有如漢桓靈置私庫者乎內府乃有四方金玉齒革良貨賄之獻而共王之好賜不幾有如李唐之君受四方羡餘之輕侮者乎王之裘服宜夫人嬪婦之任也今既有司裘又有縫人屨人等九官則皆掌衣服者也膳夫酒正之職固不可廢又有醋人鹽人等十有六官則皆掌飲食者也醫師之職固不可廢又有獸醫等五官皆醫事也􅱃幕次舍之事固不可廢而皂隸之所作也亦置五官焉凡此類不應冗濫如是且皆執技以事上役於人者也而以為冡宰進退百官均一四海之屬何也漢興經五伯七雄聖道絶滅大亂之後陳平為相尚不肯任廷尉內史之事况周公承文武之德相成王為太師乃廣置宫闕猥䙝衣服飲食技藝之官以為屬必不然矣其末則又有夏采之官焉專掌王崩復土者嗚呼安得是不祥之人哉禮官臨大變一時行之可矣乃預置官以俟王崩而行其職何不祥之甚也太宰之屬六十有二考之未有一官完善者則五卿之屬可知矣而可謂之經與易詩書春秋配乎又按周公司徒掌邦教敷五典者也司空掌邦土居四民者也世傳周禮缺冬官愚考其書而質其事則冬官未嘗闕也乃劉歆顛迷妄以冬官事屬之地官其大綱已失亂如是又可信以為經與易詩書春秋配乎昔先王盛時不令而行不禁而止天下風動無一物不得其所其次猶令行禁止天下無寃民今劉歆司徒之屬有調人者掌和萬民之難有辟讎之法有交讎之令有成鬭怒之書此下陵上替政令不行之明徵也周公力平王室身致太平其經世之典固如是哉王者提綱撫世已受大不窺小今劉歆司徒之屬有㕓人者凡珍異之有滯者斂而入于膳府其細已甚矣細已甚而民不傷者未之冇也夫齊民非有勢禁也徒以財利相役猶能制人之命破人之産招怨生禍况人君居九重以雷霆之威萬鈞之勢而細可行哉百官有司必承望風㫖禦人於國門之外使民欲與之偕亡而後已也又有泉府者掌買賣商賈之滯貨斂散百姓之賒貸夫審於音者聾於官理勢自然王者布正大之德以治世不行煦沫姑息之惠以沽名乃能張理天綱整頓萬姓若夫買賣賒貸之事正市井商賈爭錐刀之末而草莽細民私相交際之所為也豈大君之所宜及哉其言顛悖如是乃尊以為經使與易詩書並是學者之不察也愚又考劉歆王畿之制邦中為六卿四郊為六遂遂外為邦甸甸外為家削削外為邦縣縣外為邦都名雖不同其制度則一不應更有異也其所載鄉遂之官比與里皆下士一人閭與鄼皆中士一人族與鄙皆上士一人黨與縣皆下大夫一人州與遂皆中大夫一人鄉卿一人王畿八百萬家略計其所當置卿大夫士已有百餘人矣成王固曰唐虞稽古建官惟百夏商官倍今子小子仰惟前代時若訓迪厥官說者謂周官三百也今乃冗濫如是又設三百六十職焉其妄誕不經昭昭矣自劉歆成書獨鄭康成推贊之真周公之罪人也謹按劉歆漢家賢宗室向之子附㑹王莽變亂舊章殘賊本宗以趨榮利周禮之書本成於孝武之時為其雜亂藏之祕府不以列於學宫及成哀之世歆得校理祕書始列序為經衆儒共排其非惟歆以為是夫歆不知天下有三綱以親則背父以尊則背君與周公所為正相反者也其所列序之書假託周官之名勦入私說希合賊莽之所為爾王安石乃酷好亂臣賊子僞妄之書而廢大聖垂老筆削之經棄恭儉而崇汰侈舍仁義而營貨財不數十年夷戎亂華首足易位塗炭天下未知終始原禍亂之本乃在於是嗚呼悲夫有天下者尚監之哉皇王大紀卷十九

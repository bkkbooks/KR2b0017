body:
  text: 皇王大紀卷七十七宋胡宏撰三王紀赧王九年趙王略中山地至寕葭略胡地至榆中林胡王獻馬十年彗星見趙伐中山取東垣中山獻四邑以和秦宣太后異父弟曰穰侯魏冉同父弟曰華陽君芊戎王同母弟曰高陵君涇陽君冉自惠王時任職武王薨諸弟爭立冉力能立昭襄王是嵗庶長及大臣諸父子謀作亂冉誅之惠文王后不得良死武后出歸魏王兄弟不善者冉皆滅之王少宣太后任冉為政威震秦國十二年彗星見秦取魏蒲坂晉陽封陵取韓武遂齊韓魏忿楚負從親同伐之楚王質太子於秦而請救三國引兵歸十三年秦大夫有私與楚太子鬬者太子殺之亡歸十四年日食既秦取韓穰㑹韓魏齊伐楚殺其将取重丘趙王伐中山中山君奔齊十五年秦伐楚殺其将取襄城楚王質太子於齊而請平十六年趙王傳國於何肥義相王自號主父西北略地破林胡置雲中鴈門代郡将自九原南襲咸陽詐稱使者入秦觀地形及秦王之為人秦王怪其状非人臣之度使逐之行已脱闗矣審問之主父也大驚秦伐楚取八城遺楚王書請㑹武闗約盟楚王欲往恐見欺欲不往恐秦怒昭睢曰發兵自守爾王子子蘭勸行屈平曰秦虎狼也可信乎王不聼秦人設伏武闗劫之至咸陽朝章䑓如藩臣禮要割巫黔中郡楚王不許秦人㽞之楚大臣曰吾君不得還太子質於齊齊秦合則楚無國矣謀立王之它子昭睢曰倍王命不宜乃詐赴於齊齊臣欲留太子求楚之淮北其相曰郢中立君是吾抱空質而行不義於天下也乃歸之楚人立之十七年告於秦曰賴社稷神靈國有王矣秦王怒擊楚取十六城屈平者名原楚同姓也事懐王為左徒博聞强志明於治亂嫺於辭令入則圖議國事出則應對諸侯王甚任之上官大夫害其能而讒之王疎平平憂愁幽思而作離騷及與子蘭異議則又嫉子蘭一篇之中三致意焉幸君之一悟也至是子蘭為令尹介上官大夫短之於王王遷諸江南被髮行吟形容枯槁漁父問之曰子非三閭大夫歟何故而至此原曰舉世混濁而我獨清衆人皆醉而我獨醒是以見放漁父曰聖人不凝滯於物而能與世推移舉世混濁何不隨其流而揚其波衆人皆醉何不餔其糟而餟其醨何故懐瑾握瑜而自令見放為原曰新沐者必彈冠新浴者必振衣誰能以身之察察而受物之汶汶者乎寕赴江流而葬乎魚腹耳又安能以浩浩之白而䝉世之温蠖乎九年乃作懐沙之賦自投乎汨羅後之為詞賦者皆祖焉趙王弟勝號平原君好士食客數千人有公孫龍者善為堅白同異之辯孔穿自魯適趙龍論臧三耳甚析子高弗應平原君曰何如穿曰謂三耳甚難而實非也謂兩耳甚易而實是也不知君将從易而是者乎其亦從難而非者乎平原君謂龍曰子高理勝於詞公詞勝於理齊鄒衍過趙平原君令與龍論白馬非馬之説鄒子曰夫辯者别殊絶類使不相害序異端使不相亂抒意通指明其所謂使人與知焉不務相迷也故勝者不失其所守不勝者得其所求及至煩文以相假飾詞以相惇巧譬以相移引人使不得反其意如此害大道衍不為也坐皆稱善龍由是絀十八年楚王亡歸秦人遮道追及之十九年發病薨秦歸其喪楚人如悲親戚齊韓趙魏宋同伐秦至鹽氏二十年趙主父與齊燕共㓕中山封長子章於代使田不禮相之李兊謂肥義曰章黨衆欲大不禮忍殺而驕二人相得必有隂謀子之任重禍所集也稱疾不出不亦可乎對曰主父以王屬義也曰母變而度義拜而籍之今畏難忘籍變孰大焉子則有賜而忠我矣吾言已在前矣終不敢失兊曰子勉之兊數見公子成以備不禮義謂信期曰自今有召王者必見吾面我将以身先之無故而後王可入也時吳娃死王愛弛主父見故太子傫然北面於其弟心憐之欲分趙而王章計未决主父及王逰沙丘異宫章不禮矯主父令召王義先入被殺成兑自國起兵入距難殺章不禮滅其黨王少成兊專政章之敗也往走主父主父入之成兊因圍主父宫章死成兊曰既解兵吾屬夷矣乃令宫人後出者族主父欲出不得探雀鷇而食之三月餘餓死二十二年魏韓同伐秦秦穰侯薦左更白起将敗二師于伊闕斬首二十四萬級拔五城秦王遺楚王書願飭士卒得一樂戰楚王患之復和親二十三年迎婦于秦司馬氏曰甚哉楚之不競也忍婚其讎二十四年秦伐韓拔宛燕人破東胡山戎置上谷漁陽右北平遼東郡二十五年魏入河東地四百里于秦韓入武遂地二百里于秦魏芒卯始以詐見重二十六年秦白起伐魏至軹取城大小六十一二十七年冬秦王稱西帝遣使立齊王為東帝蘇代曰願王勿受以收天下之望齊王稱二日而歸之秦亦復稱王攻趙拔杜陽二十八年秦攻魏拔新垣曲陽二十九年秦擊魏河内魏獻安邑以和秦歸其人宋有雀生鸇史占之曰小而生巨必霸王喜起兵滅滕東敗齊南敗楚西敗魏欲霸之亟成射天笞地斬社稷而焚㓕之為長夜之飲於室中呼萬嵗使堂下門外至於國中無敢不呼者天下謂之桀宋齊王伐之民㪚城不守王死於温三十年秦擊齊拔九城齊王既滅宋而驕南侵楚西侵晉欲并二周為天子狐咺正議斮之陳舉直言殺之燕王日夜撫循民益富實乃謀伐齊樂毅曰齊霸國之餘業地大人衆未易獨攻於是約韓趙連楚魏且令趙㗖秦以伐齊之利三十一年燕拜樂毅為上将并将諸侯之師擊齊戰于濟西齊師大敗毅還秦韓之衆分魏師略宋地部趙師収河間身率燕師長驅逐北齊王出奔毅入臨淄取寳物祭噐輸扵燕燕王至濟上勞軍行賞封毅昌國君齊王之衛衛君辟宫稱臣而共具齊王不遜衛人侵之去奔鄒魯有驕色鄒魯弗内遂走莒楚俾淖齒救齊因為齊相淖齒欲與燕分齊地乃執王而數之曰千乗博昌方數百里雨血沾衣嬴博之間地坼及泉有人當闕而哭者求之不得去則聞其聲王知之乎曰知之淖齒曰雨血沾衣者天以告也地坼及泉者地以告也有人當闕而哭者人以吿也而王不誡焉何得無誅遂擢王筋懸之梁宿夕而死荀卿曰國者天下利勢也得道以持之則大安也大榮也積美之源也不得道以持之則大危也大累也有之不如無之及其綦也索為匹夫不可得也齊閔宋獻是也卿趙人名况樂毅聞畫邑人王蠋賢令軍中環畫邑三十里無入使人請蠋蠋謝之燕人曰不来吾且屠畫蠋曰忠臣不事二君列女不更二夫齊王不用吾諌故退而耕於野國破君亡吾不能存與其不義而生不若死遂自經毅整軍禁侵掠求齊逸民顯而禮之寛賦斂除暴令修其舊政齊人喜悦乃遣左軍渡膠東東莱前軍循太山東至海略瑯琊右軍循河濟屯阿鄄以連魏師後軍旁北海而撫千乗中軍據臨菑而鎮齊都祀桓公管仲於郊齊人食邑於燕者二十餘君爵位於薊者百有餘人六月之間下七十餘城三十二年秦拔魏安城齊太子法章變姓名為莒太史敫家傭敫女奇其状貎竊衣食之王孫賈從閔王失王處其母曰汝朝出而晚来則吾倚門而望汝暮出而不還則吾倚閭而望汝事王不知其處汝尚何歸焉賈出呼於市曰淖齒弑王欲與我誅之者袒右得四百人攻殺之諸亡臣求立法章保莒城以拒燕趙王得楚和氏璧秦王請易以十五城趙欲勿與畏秦强欲與之恐見欺宦者令舎人藺相如曰臣願奉璧而往既見秦王無意償城相如乃紿取璧却立倚柱怒髮上衝冠謂秦王曰布衣之交尚不相欺臣觀大王之意欲欺趙故臣復取璧大王必欲急臣臣頭與璧俱碎於柱矣秦王乃館相如相如遣從者懐璧間行歸趙而身待命秦王賢之趙王拜為上大夫衛嗣君好察隐㣲縣令有發褥而席弊者嗣君賜之席令大驚使人過闗市賂之既而召闗市問有客過遺女金女回遣之闗市大恐又愛泄姬重如耳而恐其因愛壅已也乃貴薄疑以敵如耳尊魏妃以偶泄姬曰以是相參也荀卿論曰嗣君聚斂計數之君也未及取民也子産取民者也未及為政也管仲為政者也未及修禮也修禮者王為政者强取民者安聚斂者亡魯侯賈薨諡曰文公子讎嗣是為頃公三十三年秦伐趙拔兩城三十四年秦伐趙拔石城楚欲圖周王使東周武公謂令尹昭子曰西周絶長補短不過百里名為天下共主裂其地不足以肥國得其衆不足以勁兵攻之者名為弑君而猶有欲攻之者見祭器在故也夫虎肉臊而兵利身人猶攻之若使澤中之麋䝉虎之皮攻之者必萬倍矣今子将殘天下之共主居三代之傳器器南則兵至矣楚計遂輟三十五年秦白起敗趙取代光狼城司馬錯因蜀攻楚黔中拔之楚獻漢北及上庸地三十六年秦白起伐楚取鄢鄧西陵秦趙約好㑹於澠池亷頗送王至境訣曰度道里會畢不過三十日王不得還則請立太子絶秦望王許之至則盛設備秦不敢動王歸拜藺相如上卿頗曰相如素賤徒以口舌而位我上我必辱之相如出而望見輒引車避匿其舎人皆恥之相如曰亷将軍孰與秦王澠池之㑹吾王鼓琴秦王不肯擊缶相如廷叱之獨畏亷将軍哉顧念强秦不敢加於趙者徒以吾兩人在也今若共鬬勢不俱生吾寕先國家之急而後私讎也頗聞之肉袒負荆至門謝罪遂結刎頸交齊地獨莒即墨未屬燕即墨人以臨淄市掾田單多智習兵推立為将樂毅解圍去城九里築壘令曰城中人出者勿獲困者賑之俾即舊業三年而猶不下或䜛之於昭王曰毅欲乆仗兵威服齊人而王耳王置酒大㑹引言者讓之曰齊為無道害先王寡人痛之入骨樂君為吾報仇齊固其國也女何敢言若此乃斬之遣相立為齊王毅皇恐不受以死自誓由是齊人服其義諸侯畏其信莫敢謀者昭王薨惠王自為太子時嘗不快於毅田單縱反間曰毅與燕王有隙畏誅将連兵王齊齊人未附故且緩攻即墨以待其事齊人所懼它将之来即墨殘矣燕王使騎刼代将毅遂奔趙将士憤惋單宣言曰吾獨懼燕軍劓所得齊卒置之前行燕人如其言城中怒堅守唯恐見得單又言吾甚懼燕掘吾城外冢墓可為寒心燕軍盡掘燒之齊憤泣思戰怒自十倍單身操版鍤散飲食饗勞遣使約降燕軍益懈單收牛千餘束刃扵角束脂葦扵尾鑿城數十六夜縱牛燒葦端壮士五千隨之牛熱而奔燕軍驚走齊人殺騎刼逐北至河上亡城畢復乃迎王入臨淄王立太史敫女為后生太子建趙封樂毅於觀津燕王謝之曰将軍過聼與寡人有隙捐燕歸趙自為計則可矣而亦何以報先王遇将軍之意乎毅荅書曰勉身立功以明先王臣之上計也離毁辱之謗墮先王之名臣所大恐也臨不測之罪以幸為利義之所不敢出也古之君子交絶不出惡聲忠臣去國不潔其名臣雖不佞數奉教於君子矣唯君王留意焉燕封毅子間昌國君田單攻狄魯仲連曰不能下也單曰臣以即墨餘卒破燕復齊今攻狄而不下何也既三月不克乃懼而問仲連曰将軍在即墨織蕢仗鍤為士卒倡曰無可往矣宗廟亡矣當此之時有死之心士卒揮泣思戰所以破燕也今東有夜邑之奉西有淄上之娛黄金横帯而騁乎淄澠之間有生之樂所以不勝也單明日厲氣循城立扵矢石之所援枹鼓之狄人乃下三十七年秦白起伐楚㧞郢燒夷陵楚王兵散遂不復戰徙都陳秦扵郢置南郡封白起武安君三十八年秦武安君定巫黔中初置黔中郡三十九年秦武安君伐魏㧞兩城楚王收東地兵得十餘萬復西取江南十五邑四十年秦穰侯伐魏大破之魏納八城以和穰侯復伐之走芒夘入北宅遂圍大梁魏割温以和四十一年魏復與齊合從秦穰侯伐之拔四城四十二年魏伐韓華陽韓遣陳筮告于秦穰侯曰事急乎公来筮曰未急也急則變而它從矣穰侯使武安君救韓八日而至敗魏師虜三将魏段干子請割南陽以和蘇代謂魏王曰欲璽者段干子也欲地者秦也今使欲地者制璽欲璽者制地魏地盡矣夫入地事秦猶抱薪救火薪不盡火不㓕王曰是則然也雖然事已行不可更矣對曰夫博之貴梟者便則食不便則止何王之用智不如用梟與不聼卒以南陽為和秦王率韓魏伐楚楚使者黄歇適至上書曰韓魏父子兄弟接踵而死於秦者将十世矣今王資之不亦過乎臣為王慮莫如善楚秦楚合而臨韓韓必朝王施以東山之險帯以曲河之利韓為闗内侯矣發卒十萬戍鄭梁氏寒心許鄢陵嬰城而上蔡召陵不往来也而魏亦闗内侯矣王從之俾歇歸約親四十三年歇侍太子完質于秦秦置南陽郡燕惠王薨子武成王立四十四年趙平原君家不肯出租税田部吏趙奢戮其用事者九人平原君将殺之奢曰君趙貴公子也不奉公則法削法削則國弱而諸侯加兵是無趙也以君之貴奉公如法則上下平國强趙固而君為貴戚豈輕於天下邪平原君賢之言於王使治賦民富而府庫實四十五年秦伐趙圍閼與亷頗樂乗曰道險難救王命趙奢救之奢去邯鄲三十里堅壁復増壘得秦間善食而遣之因卷甲一日一夜而至用許歴言先據北山秦師争山不得奢擊敗之解圍而還趙封奢馬服君魏人范雎從湏賈使齊齊王聞其口辯私賜之金賈歸告相魏齊齊怒笞雎折脅摺齒置厠中雎得出更名姓秦王稽使魏載與俱歸薦於王王見之離宫雎佯為不知永巷而入宦者怒逐之曰王至睢謬曰秦安得王獨有太后穰侯耳王微聞乃屏左右跽而請曰何以幸教寡人對曰唯唯如是者三王曰先生卒不教寡人耶雎曰羇旅之臣交踈於王所願陳者皆匡君之事處人骨肉之間而未知王之心也王跽曰天以寡人溷先生而存宗廟事無大小上及太后下及大臣悉以教無疑也雎曰穰侯越韓魏而攻齊剛夀非計也今王不如逺交而近攻得寸則王之寸得尺則王之尺夫韓魏中國之處而天下之樞也王若欲霸必親中國以為天下樞王曰善乃與謀兵事四十七年秦伐魏拔懐四十九年秦拔魏邢丘范雎日益親用事承間説王曰臣居山東時聞齊有孟嘗君不聞有王秦有太后穰侯不聞有王夫擅國之謂王能利害之謂王制殺生之謂王今太后擅行不顧穰侯出使不報華陽涇陽擊斷無諱高陵進退不請自有秩以上至于大吏及王左右無非相國之人王獨立扵朝臣恐萬世後秦國非王子孫有也於是廢太后逐穰侯高陵華陽涇陽君於闗外以雎為丞相封應侯魏湏賈聘于秦應侯使歸告魏王曰速斬魏齊頭来不然且屠大梁齊奔趙匿平原君家趙惠文王薨子孝成王丹立皇王大紀卷七十七

body:
  text: 皇王大紀卷五十三宋胡宏撰三王紀靈王十一年春正月莒人伐魯圍台季孫宿救台遂伐莒入鄆以報之晉士魴聘於魯吳王夀夢薨夀夢四子諸樊餘祭夷昧季札札賢夀夢欲立之於是致國焉札曰君義嗣也誰敢姦君札雖不才願附子臧之節諸樊固以為請札棄其室而耕於延陵諸樊乃嗣位楚令尹貞秦庶長無地伐宋師于楊梁以報晉之取鄭也王求后於齊齊侯問對於晏桓子對曰禮辭有之天子求后於諸侯諸侯對曰夫婦所生若而人妾婦之子若而人君而有姊妹則曰先守某公之遺女若而人齊侯許昏王使隂里結之魯侯朝于晉經曰十有二年春王三月莒人伐我東鄙圍台季孫宿帥師救台遂入鄆鄆莒邑也遂者生事也入者逆詞也大夫無逆事受命而救台不受命而入鄆惡季孫宿之擅權使公不得有為於其國也或曰古者命將得專制閫外之事有可以安國家利社稷者專之可也曰此為境外言之也台在邦域之中而專行之非有無君之心者不敢為也昭公逐定無正夫豈一朝一夕之故哉其所由來者漸矣夏晉侯使士魴來聘秋九月吳子乘卒冬楚公子貞帥師侵宋公如晉十二年魯侯歸邿亂分為三魯師救邿遂滅之楚王多寵子屈見曰夫一兔走於市萬人逐之一人得之爭者悉止分定故也世子國之基而民之望也不定則亂猶走兔矣王從其言立世子昭至是有疾告大夫曰不榖生十年而喪先君未及習師保之教訓而應受多福是以不德而亡師于鄢以辱社稷若以大夫之靈得保首領以沒於地惟是春秋窀穸之事所以從先君於禰廟者請為靈若厲秋七月薨世子嗣令尹貞謀諡大夫曰君有命矣令尹曰君命以共若之何毁之君臨楚國奄征南海以屬諸夏而知其過可不謂共乎請諡曰共大夫從之吳侵楚養由基曰吳乘我喪謂我不能師也必易我而不戒請誘之大敗吳師於庸浦鄭石㲋言于楚令尹貞曰先王卜征五年而歲習其祥祥習則行不習則增修德而改卜今楚實不競行人何罪楚人歸良霄魯城防經曰十有三年春公至自晉夏取邿秋九月庚辰楚子審卒冬城防十三年冬十一月吳告敗於晉晉士丐會諸侯之大夫會吳於向將為之伐楚士丐數吳之不德也以退吳人執莒公子務婁以其通楚使也將執戎子駒支士丐親數諸朝曰來薑戎氏昔秦人迫逐乃祖吾離于瓜州乃祖吾離被苫蓋蒙荆棘以來歸我先君我先君惠公有不腆之田與女剖分而食之今諸侯之事我寡君不如昔者蓋言語漏泄則職女之由詰朝之事女無與焉與將執女對曰昔秦人負恃其衆貪於土地逐我諸戎惠公蠲其大德謂我諸戎是四嶽之裔胄也毋是剪棄賜我南鄙之田狐狸所居豺狼所嘷我諸戎剪除其荆棘驅其狐狸豺狼以為先君不侵不畔之臣至於今不二昔文公與秦伐鄭秦人竊與鄭盟而舍戍焉於是乎有殽之師晉禦其上戎亢其下秦師不復我諸戎實然譬猶捕鹿晉人角之諸戎犄之與晉踣之戎何以不免自是以來晉之百役與我諸戎相繼于時以從執政猶殽志也豈敢離逖今官之師旅無乃實有所闕以攜諸侯而罪我諸戎我諸戎飲食衣服不與華同贄幣不通言語不逹何惡之能為不與於會亦無瞢焉賦青蠅而退士丐辭焉使執事于會成愷悌也十二月乙未朔日有食之春二月諸侯之大夫從晉侯伐秦以報櫟之役晉侯待於境使六卿帥諸侯之師以進及涇不濟叔向見叔孫豹豹賦匏有苦葉叔向退而具舟魯人莒人先濟鄭公孫蠆見衛北宫括曰與人而不固取惡莫甚焉若社稷何括説見諸侯之師而勸之濟濟涇而次秦人毒涇上流師人多死鄭公孫蠆帥師以進師皆從之至於棫林不獲成焉荀偃將中軍令曰雞鳴而駕塞井夷竈惟余馬首是瞻欒黶曰晉國之命未有是也余馬首欲東乃歸下軍從之偃曰吾令實過悔之何及多遺秦禽乃命大還晉人謂之遷延之役戎右欒針曰吾有二位於戎路報敗而無功恥也與士鞅馳秦師死焉鞅反黶欲殺之鞅懼奔秦秦伯曰晉大夫其誰先亡對曰其欒氏乎黶汰虐已甚然猶可以免其在盈乎秦伯曰何故對曰武子之德在民如周人之思召公焉愛其甘棠況其子乎黶死盈之善未能及人武子所施沒矣而黶之怨實章將於是乎在秦伯以為知言請於晉而復之衛侯戒孫林父寧殖食皆服而朝日旰不召而射鴻於囿二子從之不釋皮冠而與之言二子怒林父如戚子蒯入使公飲之酒使大師歌巧言之卒章大師辭師曹請為之初公有嬖妾使師曹誨之琴師曹鞭之公怒鞭師曹三百故師曹請歌之欲怒孫子以報衛侯衛侯使歌之遂誦之蒯懼告曰君忌我矣弗先必死并帑於戚衛侯使子蟜子伯子皮與孫林父盟於丘宫林父皆殺之衛侯如鄄使子行於林父林父又殺之遂出奔齊孫氏追之敗公徒於阿澤弟鱄從及竟使祝宗告亡且告無罪定薑曰神不可誣也舍大臣而與小臣謀一罪也先君有冡卿以為師保而蔑之二罪也余以巾櫛事先君而暴妾使余三罪也告亡而已無告無罪魯侯使厚瘠弔于衛歸語臧孫紇曰衛侯其必歸有大叔儀以守有母弟鱄以出或撫其內或營其外能無歸乎衛人立公孫剽孫林父寧殖相之晉侯問於師曠曰衛人出其君不亦甚乎對曰或者其君實甚良君將賞善而刑淫養民如子蓋之如天容之如地民奉其君愛之如父母仰之如日月敬之如神明畏之如雷霆其可出乎夫君臣之主而民之望也若困民之主匱神乏祀百姓絶望社稷無主將安用之弗去何為天生民而立之君使司牧之勿使失性有君而為之二使師保之勿使過度是故天子有公諸侯有卿卿有側室大夫有二宗士有朋友庶人工商皂𨽻牧圉皆有親昵以相輔佐也善則賞之過則匡之患則救之失則革之天之愛民甚矣豈其使一人肆於民上縱其淫而棄天地之性必不然矣莒人侵魯楚王為庸浦之役故公子貞師于棠以伐吳吳不出而還貞殿以吳為不能而弗警吳人自臯舟之隘要擊之楚師大敗王使劉夏賜齊侯命晉侯問衛故於中行偃對曰不如因而定之衛有君矣伐之未可以得志而勤諸侯史佚有言曰因重而撫之仲虺曰亡者侮之亂者取之推亡固存國之道也君其定衛以待時乎乃命士丐會諸國之大夫于戚以謀定衛士丐假羽毛於齊而弗歸齊人始二經曰十有四年春王正月季孫宿叔老會晉士丐齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人會吳于向使舉上客而叔老並書者以內卿行則不得不書矣季孫宿以卿為介而不使之免叔老介於宿而不敢避蓋兩失之雖晉人輕其幣而敬其使於君命使人之體豈為得哉二月乙未朔日有食之夏四月叔孫豹會晉荀偃齊人宋人衛北宫括鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人伐秦己未衛侯出奔齊按左氏衛寧殖將死語其子曰吾得罪于君名在諸侯之䇿曰寧殖出其君今春秋書衛侯出奔齊者蓋仲尼筆削不因舊史之文也欲知經之大義深考舊文筆削之不同其得之矣或曰孫寧出君衆所同疾史䇿書之是也聖人曷為掩姦藏惡不暴其罪而以歸咎人主何哉曰臣而逐君其罪已明矣人君擅一國之名寵臣之主而民之望也愛之如父母仰之如日月敬之如神明畏之如雷霆何可出也所為見逐無乃肆於民上縱其淫虐以棄天地之性乎故衛衎出奔使祝宗告亡且告無罪而定薑曰有罪若何告無春秋端本之書故不書所逐之臣而以自奔為名所以警乎人君者為後世鑒非聖人莫能修之為此類也莒人侵我東鄙秋楚公子貞帥師伐吳冬季孫宿會晉士丐宋華閲衛孫林父鄭公孫蠆莒人邾人于戚十四年冬十一月宋向戍聘于魯魯人及戍盟于劉官師夏從單子逆王后於齊齊侯伐魯以二放晉魯以齊師圍成故季孫宿叔孫豹帥師城成夏六月丁巳日有食之邾人伐魯魯告於晉將為會以討邾莒晉侯有疾乃止九月癸亥晉侯薨諡曰悼公子彪嗣經曰十有五年春宋公使向戍來聘二月己亥及向戍盟于劉劉夏逆王后于齊劉夏士也士而逆后是不重人倫之本而輕天下之母矣然則何使卿往逆公監之禮也官師從單靖公逆王后于齊書劉夏而不書靖公是知卿往逆公監之禮也春秋婚姻得禮者常事不書夏齊侯伐我北鄙圍成公救成至遇季孫宿叔孫豹帥師城成郛秋八月丁巳日有食之邾人伐我南鄙冬十有一月癸亥晉侯周卒十五年冬十一月晉葬其君晉以叔向為公傅改服修官蒸于曲沃警守而下春正月會諸侯于溴梁命歸侵田以魯故執邾子莒子晉侯與諸侯宴于溫使諸大夫舞曰歌詩必類齊髙厚之詩不類荀偃怒且曰諸侯有異志矣使諸大夫盟髙厚髙厚逃歸於是晉荀偃及諸國之大夫盟曰同討不庭齊伐魯許男請遷於晉諸侯遂遷許許大夫不可晉人歸諸侯魯叔孫豹從魯侯歸三月魯地震鄭公孫蠆聞將伐許遂相鄭伯以從諸侯之師魯叔老帥師會晉荀偃宋衛之師次於棫林伐許齊侯伐魯圍成魯孟孫速徼之齊侯去之速遂塞海陘而還魯大雩魯叔孫豹如晉言齊故晉人曰以寡君之未禘祀與民之未息不然不敢忘豹曰齊人釋憾敝邑之急朝不及夕比執事之間恐無及也見荀偃賦圻父對曰偃知罪矣敢不從執事以同恤社稷晉司馬侯死叔向哭之曰吾蔑與比而事君矣籍偃曰有比乎叔向曰君子比而不别德以贊事為比引黨以封己利己而忘君為别經曰十有六年春王正月葬晉悼公三月公會晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯把伯小邾子于溴梁戊寅大夫盟溴梁之會諸侯皆在是若欲使大夫盟者則宜書魯卿及諸侯之大夫盟可也而獨書大夫盟何也諸侯失政大夫皆不臣也上二年春正月會於向十有四國之大夫也夏四月會伐秦十冇三國之大夫也冬會於戚七國之大夫也此三會皆國之大事而大夫皆專之是列國之君不自為政弗躬弗親禮樂征伐己自大夫出矣況悼公既沒晉平初立無先公之明也君若贅旒而大夫張亦宜矣夫豈一朝一夕之故哉善惡積於至微而不可掩常情忽於未兆而不預謀荀偃怒大夫盟而晉靖公廢趙籍韓虔魏斯為諸侯之勢見矣有國者謹於禮而不敢忽此春秋以待後世之意也晉人執莒子邾子以歸齊侯伐我北鄙夏公至自會五月甲子地震叔老會鄭伯晉荀偃衛寧殖宋人伐許秋齊侯伐我北鄙圍成大雩冬叔孫豹如晉十六年冬十二月邾子薨諡曰宣公子華嗣宋莊朝伐陳獲司徒卬衛孫蒯田于曹隧飲馬于重丘毁其瓶重丘人閉門而詬之曰親逐而君爾父為厲是之不憂而何以田為衛人伐曹取重丘曹人訴於晉齊人以未得志于魯伐其北鄙圍桃圍臧紇於防獲臧堅齊侯使夙沙衛唁之且曰無死堅稽首曰拜命之辱抑君賜不終姑又使其刑臣禮於士以杙抉其傷而死秋九月魯大雩宋華閲卒其弟臣弱其子臯比之室使賊殺其宰吳而幽其妻曰畀余而大璧宋公聞之曰臣也不惟其宗室是暴大亂宋國之政必逐之向戍曰臣也亦卿也大臣不順國之恥也不如蓋之乃舍之國人逐瘈狗入於華臣氏臣懼遂奔陳邾人伐魯為齊故也經曰十有七年春王二月庚午邾子牼卒宋人伐陳夏衛石買帥師伐曹秋齊侯伐我北鄙圍桃髙厚帥師伐我北鄙圍防九月大雩宋華臣出奔陳冬邾人伐我南鄙十七年白狄朝於魯晉人執衛石買于長子孫蒯于純留討伐曹也齊侯伐魯秋七月晉侯魯侯宋公衛侯鄭伯曹伯莒子邾子滕侯薛侯把伯小邾子會于魯濟伐齊齊侯禦之平隂塹防門而守之廣里諸侯之士門焉齊人多死齊侯登巫山以望晉師畏其衆也乃脫歸齊師夜遁晉侯入平隂遂從齊師夙沙衛連大車以塞隧而殿殖綽郭最曰子殿國師齊之辱也乃代之殿衛殺馬于隘以塞道晉州綽及之射殖中肩并獲郭最荀偃以中軍克京茲魏絳以下軍克邿趙武以上軍圍盧伐雍門之萩焚申池之竹木齊侯駕將走郵棠太子扣馬曰師速而疾略也將退矣何懼且社稷之主不可以輕輕則失衆抽劍斷鞅乃止諸侯之師東侵及濰南及沂曹伯薨諡曰成公子勝嗣鄭公子嘉將叛晉而起楚師以去諸大夫隂使告于楚楚令尹公子午不可王曰即位五年師徒不出人其以不榖為自逸而忘先君之業矣大夫圖之午嘆曰君王其謂午懷安乎吾以利社稷也諸侯方睦於晉臣請嘗之治兵於汾鄭公孫舍之公孫夏居守知嘉謀完守入保嘉不敢發楚師伐鄭門于純門信于城下甚雨及之楚師多凍役徒幾盡經曰十有八年春白狄來劉敞曰夷狄於中國無事焉其於天子世一見則諸侯雖善其交際不得而通是以春秋亦不與其朝夏晉人執衛行人石買秋齊師伐我北鄙冬十月公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子同圍齊凡侵伐圍入未有書同者而獨於此書同圍齊何也齊環背盟棄好陵虐神主肆其暴橫數伐鄰國諸侯所共疾故同心而圍之也同心圍齊其以伐致何也見齊環無道宜得惡疾大諸侯之伐而免其圍齊之罪詞也春秋於此有沮橫逆抑強暴之意孟子曰國必自伐而後人伐之自作孽不可活其齊侯環之謂矣尚誰懟哉曹伯負芻卒于師楚公子午帥師伐鄭十八年冬十一月諸侯還自沂上盟于祝柯曰大毋侵小執邾子以其伐魯故遂次于泗上取邾田自漷水歸之于魯季孫宿如晉拜師曹葬其君晉欒魴衛孫林父伐齊齊侯娶于魯曰顔懿姬無子其姪鬷聲姬生光以為太子諸子仲子戎子戎子嬖仲子生牙屬諸戎子戎子請以為嗣仲子曰不可廢常不祥間諸侯難光之立也列於諸侯矣今無故而廢之是專黜諸侯而以難犯不祥也君必悔之公曰在我而已遂東太子光使高厚傅牙為後夙沙衛為少傅齊侯疾崔杼微逆光疾病而立之光殺戎子夏五月齊侯薨諡曰靈公光為嗣執公子牙夙沙衛奔高唐以叛齊崔杼殺髙厚於灑藍而兼其室鄭公子嘉之為政也專國人患之乃討西宫之難與純門之師嘉當罪以其甲守公孫舍之公孫夏帥國人伐之殺嘉而分其室嘉黨鄭丹奔楚為右尹鄭人使舍之當國夏聽政立子産為卿齊葬其君魯城西郛懼齊也齊人及晉平盟于大隧魯人聞之使叔孫豹會晉士丐焉歸曰齊猶未也不可以不懼乃城武城齊侯攻高唐禽夙沙衛醢之經曰十有九年春王正月諸侯盟于祝柯晉人執邾子公至自伐齊取邾田自漷水季孫宿如晉葬曹成公夏衛孫林父帥師伐齊秋七月辛卯齊侯環卒晉士丐帥師侵齊至榖聞齊侯卒乃還穀齊地也還者終事之詞古之為師不伐喪大夫以君命出境有可以安國家利社稷者則專之可也已至齊地則進退在士丐矣故至榖聞齊侯卒乃還善之也八月丙辰仲孫蔑卒齊侯殺其大夫高厚鄭殺其大夫公子嘉按左氏初盜殺鄭三卿於西宫之朝公子嘉知而不言既又欲起楚師以去其大夫故楚人伐鄭至於純門而返至是嘉之為政也專國人患之乃討西宫之難與純門之師子展子西率國人殺嘉而分其室不稱鄭人者嘉則有罪矣而子展子西不能正以王法肆諸市朝與衆同棄乃利其室而分之有私意焉故稱國以殺而不去其官此春秋原情定罪之意冬葬齊靈公城西郛叔孫豹會晉士丐于柯城武城十九年甲子冬魯及莒平使仲孫速會莒人盟于向晉侯會諸侯盟于澶淵齊成故也邾師驟至於魯魯仲孫速伐之以報焉初蔡文侯欲事晉曰先君與于踐土之盟晉不可棄且兄弟也畏楚不能行而死楚人使蔡無常司馬公子燮求從先君以利蔡蔡人殺之燮弟履出奔楚陳慶虎慶寅畏公子黃之逼訴諸楚曰與蔡司馬同謀楚人以為討黃呼於國曰慶氏無道求專陳國暴蔑其君而去其親五年不滅是無天也遂出奔楚魯叔老如齊秋八月丙辰朔日有食之魯季孫宿如宋衛寧殖疾召其子喜曰吾得罪於君悔而無及也名藏在諸侯之䇿曰孫林父寧殖出其君君入則掩之若能掩之則吾子也喜曰諾殖遂卒經曰二十年春王正月辛亥仲孫速會莒人盟於向夏六月庚申公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子盟於澶淵秋公至自會仲孫速帥師伐邾蔡殺其大夫公子燮蔡公子履出奔楚按左氏初蔡文侯欲事晉畏楚不能行而卒楚人使蔡無常公子燮求從先君以利蔡謀國之合於義者也國人乃不順焉而殺燮此何罪矣故稱國而不去其官公子履其母弟也進不能正國退不能逺害懼禍而奔從於蠻夷書者罪之也陳侯之弟黃出奔楚叔老如齊冬十月丙辰朔日有食之季孫宿如宋二十年冬魯侯如晉拜師及邾田邾庶其以漆閭丘奔魯季孫宿以公姑姊妻之皆有賜於從者於是魯多盜宿謂司寇紇曰子盍詰盜對曰子召外盜而大禮焉何以止吾盜夫上之所為民之歸也上所不為民或為之是以加刑罰焉而莫敢不懲若上之所為而民亦為之乃其所也又可禁乎魯侯歸晉欒黶娶士丐之女叔祁生盈范鞅以亡故與盈不相能黶卒叔祁與其老州賔通盈患之祁懼訴于丐曰盈將為亂鞅為之徵盈好施士多歸之丐惡其多士也信之盈為下卿丐使城著而遂逐之盈出奔楚丐殺其黨箕遺羊舌虎等十人囚叔向羊舌鮒叔罷樂王鮒見叔向曰吾為子請叔向不應人皆咎之叔向曰鮒從君者也何能行祁大夫外舉不棄讐內舉不失親其獨遺我乎於是祁奚老矣聞叔向被囚乘驛見士丐曰叔向多謀而鮮過惠訓不倦社稷之固也猶將十世宥之以勸能者今一不免其身以棄社稷不亦惑乎丐與言於公而免之欒盈過周西鄙掠之辭於行人曰天子陪臣盈得罪於王之守臣將逃罪敢布其死昔陪臣書能輸力於王室王施惠焉其子黶不能保任其父之勞大君若不棄書之力亡臣猶有所逃若棄書之力而思黶之罪臣戮餘也將歸死於尉氏不敢還矣王曰尤而效之其又甚焉使司徒禁掠欒氏者歸所取焉使候出諸轘轅日有食之晉侯會齊侯魯侯宋公衛侯鄭伯曹伯莒子邾子于商任錮欒氏也經曰二十有一年春王正月公如晉邾庶其以漆閭丘來奔庶其邾大夫也春秋小國之大夫不書其姓氏微也其以事接我則書其姓氏謹之也漆一邑閭丘一邑而不言及者庶其之私邑所受於君而食之者也此叛臣何以不書叛書名書地而竊邑叛君之罪見矣夫棄夷狄從諸夏其慕義之心疑可與也然有據城以求援者君子猶以為不可受而况鄰國乎書來奔而魯受叛臣納其地之罪亦見矣夏公至自晉秋晉欒盈出奔楚九月庚戌朔日有食之冬十月庚辰朔日有食之曹伯來朝公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子于商任二十一年冬諸侯還夏五月魯叔老卒欒盈自楚適齊晏嬰曰小所以事大信也失信不立今納欒氏奈商任之命何齊侯不聽晉侯會齊侯於沙隨復錮欒氏也盈猶在齊晏嬰曰禍將作矣齊將伐晉不可以不懼楚觀起有寵於令尹追舒未益祿而有馬數十乘楚人患之其子棄疾為王御士王每見之必泣棄疾曰君三泣臣矣敢問誰之罪也王曰令尹之不能子所知也國將討焉爾其居乎對曰父戮子居君焉用之泄命重刑臣亦不為王遂殺追舒于朝轘觀起於四境三日棄疾請尸王許之既葬其徒曰行乎曰吾與殺吾父行將焉入曰然則臣王乎曰棄父事讐吾弗忍也遂縊論曰有子曰君子務本本立而道生孝悌也者其為仁之本與按公子追舒非有大逆之罪退之可也而王必欲殺之則非仁矣為棄疾者進宜陳使臣之禮以諌王退宜陳事君之禮以諫父諫於王而不聽竊負父而去之可也諫於父而不聽則號泣而隨之可也諫於王與父皆不聽焉則請後祖廟而以身代父死可也烏有閔默恬然不動其心坐待王殺其父而後死之者以為子則不孝以為臣則不忠噫大道不明是以至此極而莫覺莫悟也故愚論之以示為仁之道焉而春秋書楚殺其大夫公子追舒不罪棄疾者大夫君之股肱心膂也公子宗室之枝葉庇廕也而輕殺之所以罪楚君也棄疾與殺其父矣豈待貶而後見乎起之子在蔡事蔡大夫朝吳魯孔防叔之孫曰叔梁紇無子娶顔氏之季女曰徵在於是叔梁紇老矣顔氏貧不能備禮遂野合焉冬十月庚子生子或曰是夕也有二龍繞舍五老降庭當空中有笙鏞之音焉名之曰丘是為孔子經曰二十有二年春正月公至自會夏四月秋九月辛酉叔老卒冬公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子薛伯把伯小邾子于沙隨按左氏會于沙隨錮欒氏也古者大夫去國君不掃其社稷不係纍其子弟不收其田邑使人導之出疆又先之於其所往敕五典厚人倫也今晉不念欒氏世勳而逐盈又將搏執之而命諸侯無得納焉則亦過也楚逐申公巫臣子反請以重幣錮之楚子曰止彼若能利國家雖重幣晉將可乎若無益於晉晉將棄之何勞錮焉其賢於商任沙隨之謀逺矣公至自會楚殺其大夫公子追舒皇王大紀卷五十三

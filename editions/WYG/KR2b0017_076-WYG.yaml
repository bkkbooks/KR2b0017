body:
  text: 皇王大紀巻七十六宋胡宏撰三王紀赧王二年秦王欲伐齊患其與楚從親使張儀説楚王曰王能絶齊請獻商於地六百里使秦女為王箕帚妾楚王説而許之羣臣皆賀陳軫獨弔曰秦重楚者為其有齊也今絶齊則楚孤秦奚貪夫孤國而與之地儀必負王王曰願陳子閉口使一将軍隨儀至秦儀佯墮車不朝楚王聞之又使勇士借宋之符北罵齊王王大怒折節事秦儀乃朝見楚使曰子何不受地從某至某廣袤六里使者還報楚王欲攻秦陳軫曰軫可發口言乎攻之不如因賂以一名都幷兵而攻齊是我亡地於秦取償於齊也不然國必大傷矣不聴使屈匄伐秦三年春戰于丹陽秦虜匄及列侯執珪七十餘人取漢中郡楚王悉兵襲秦戰于藍田大敗韓魏襲楚至鄧楚王歸割兩城請平於秦燕人立太子平為王王弔死問疾同百姓甘苦謂郭隗曰誠得賢士與共國雪先恥孤之願也隗曰王從隗始况賢於隗者豈逺千里哉王改築官而師事之樂毅自魏往拜亞卿任政魯欲使慎子為将軍孟子曰不教民而用之謂之殃民殃民者不容于堯舜之世一戰勝齊遂有南陽然且不可慎子勃然不悦曰此則滑釐所不識也曰吾明告子天子之地方千里不千里不足以待諸侯諸侯之地方百里不百里不足以守宗廟之典籍周公之封於魯為方百里也地非不足而儉於百里太公之封於齊也亦為方百里也地非不足也而儉於百里今魯方百里者五子以為有王者作則魯在所損乎在所益乎徒取諸彼以與此然且仁者不為况於殺人以求之乎君子之事君也務引其君以當道志於仁而已魯平公将出嬖人臧倉者請曰他日君出則必命有司所之今乗輿已駕矣有司未知所之敢請公曰将見孟子曰何哉君所為輕身以先於匹夫者以為賢乎禮義由賢者出而孟子之後喪踰前喪君無見焉公曰諾樂正子入見曰君奚為不見孟軻也曰或告寡人曰孟子之後喪踰前喪是以不往見也曰何哉君所謂踰者前以士後以大夫前以三鼎而後以五鼎與曰否謂棺槨衣衾之美也曰非所謂踰也貧富不同也樂正子見孟子曰克告於君君為来見也嬖人有臧倉者沮君君是以不果来也曰行或使之止或尼之行止非人所能也吾之不遇魯侯天也臧氏之子焉能使予不遇哉浩生不害問曰樂正子何人也孟子曰善人也信人也何謂善何謂信曰可欲之謂善有諸已之謂信充實之謂美充實而有光輝之謂大大而化之之謂聖聖而不可知之謂神樂正子二之中四之下也四年秦以武闗之外易楚黔中楚願得張儀而獻地儀請行王曰楚甘心於子奈何儀曰臣善其嬖臣靳尚尚事幸姬鄭袖袖言無不聽遂往楚王将殺之尚謂袖曰秦王甚愛張儀欲捐六縣及美女贖之王重地尊秦秦女必貴而夫人斥矣於是袖日夜泣曰臣各為其主耳今殺張儀秦必大怒妾請子母俱遷江南毋為秦所魚肉也王乃赦儀儀因説曰王不事秦秦西有巴蜀治船積粟浮岷江而下日行三百餘里不十日而距扞闗杆闗驚則從境以東盡城守矣黔中巫郡非王有也秦攻楚危難在三月之内而楚待救在半嵗之外此臣所以為大王患也誠能聽臣請令秦楚為兄弟國楚王已得儀而重出黔中乃許之儀遂之韓説曰韓地險惡山居所生菽麥國無二嵗之食秦據宜陽塞成臯則王國分矣為王計莫如攻楚轉禍而悦秦韓王許之儀説齊曰從人言齊蔽於三晉土廣民衆兵彊士勇有百秦無奈齊何今秦楚嫁娶韓獻宜陽梁效河外趙割河間大王不事秦秦驅韓梁攻南地悉趙兵指博闗臨菑即墨非王有也齊王許之儀西説趙曰大王收率天下以擯秦秦心忿含怒乆矣有敝甲凋兵軍於澠池願渡河踰漳據畨吾㑹邯鄲下使臣先聞左右竊為大王計莫如與秦相約結也趙王許之儀北說燕曰齊趙於秦猶郡縣也不敢妄相攻伐王事秦長無齊趙之患矣燕王請獻恒山之尾五城以和儀歸報未至而惠王薨子武王素不説儀諸侯復合從滕世子𢎞将之楚過宋而見孟子孟子道性善言必稱堯舜世子自楚反復見孟子孟子曰世子疑吾言乎夫道一而已矣成覵謂齊景公曰彼丈夫也我丈夫也吾何畏彼哉顔淵曰舜何人也予何人也有為者亦若是公明儀曰文王我師也周公豈欺我哉今滕截長補短将五十里也猶可以為善國書曰若藥不瞑眩厥疾不瘳滕定公麋薨世子謂然友曰昔者孟子嘗與我言於宋於心終不忘今也不幸至於大故吾欲使子問於孟子然後行事然友之鄒問於孟子孟子曰不亦善乎親喪固所自盡也曾子曰生事之以禮死𦵏之以禮祭之以禮可謂孝矣諸侯之禮吾未之學也雖然吾嘗聞之矣三年之喪齊疏之服飦粥之食自天子達於庶人三代共之然友反命定為三年之喪父兄百官皆不欲曰吾宗國魯先君莫之行吾先君亦莫之行也至於子之身而反之不可且志曰喪祭從先祖曰吾有所受之也謂然友曰吾他日未嘗學問好馳馬試劔今也父兄百官不我足也恐其不能盡於大事子為我問孟子然友復之鄒問孟子孟子曰然不可以他求者也孔子曰君薨聽於冢宰啜粥面深墨即位而哭百官有司莫敢不哀先之也上有好者下必有甚焉者矣君子之徳風也小人之徳草也草尚之風必偃是在世子然友反命世子曰然是誠在我五月居廬未有命戒百官族人可謂曰知及至葬四方来觀之顔色之戚哭泣之哀弔者大悦滕文公問為國孟子曰民事不可緩也詩云晝爾于茅宵爾索綯亟其乘屋其始播百榖民之為道也有恒産者有恒心無恒産者無恒心茍無恒心放辟邪侈無不為已及陷乎罪然後從而刑之是罔民也焉有仁人在位罔民而可為也是故賢君必恭儉禮下取於民有制陽虎曰為富不仁矣為仁不富矣夏后氏五十而貢殷人七十而助周人百畝而徹其實皆什一也徹者徹也助者藉也龍子曰治地莫善於助莫不善於貢貢者校數嵗之中以為常樂嵗粒米狼戾多取之而不為虐則寡取之凶年糞其田而不足則必取盈焉為民父母使民盻盻然将終嵗勤動不得以養其父母又稱貸而益之使老稚轉乎溝壑惡在其為民父母也夫世禄滕固行之矣詩云雨我公田遂及我私惟助為有公田由此觀之雖周亦助也設為庠序學校以教之庠者養也校者教也序者射也夏曰校殷曰序周曰庠學則三代共之皆所以明人倫也人倫明於上小民親於下有王者起必来取法是為王者師也詩云周雖舊邦其命惟新文王之謂也子力行之亦以新子之國使畢戰問井地孟子曰子之君将行仁政選擇而使子子必勉之夫仁政必自經界始經界不正井地不均榖禄不平是故暴君汙吏必慢其經界經界既正分田制祿可坐而定也夫滕壤地褊小将為君子焉将為野人焉無君子莫治野人無野人莫養君子請野九一而助國中什一使自賦卿以下必有圭田圭田五十畝餘夫二十五畝死徙無出鄉鄉田同井出入相友守望相助疾病相扶持則百姓親睦方里而井井九百畝其中為公田八家皆私百畝同養公田公事畢然後敢治私事所以别野人也此其大略也若夫潤澤之則在君與子矣滕文公問曰齊人将築薛吾甚恐如之何則可孟子對曰昔者太王居邠狄人侵之去之岐山之下居焉非擇而處之不得已也茍為善後世子孫必有王者矣君子創業垂統為可繼也若夫成功則天也君如彼何哉强為善而已矣北宫錡問曰周室班爵禄也如之何孟子曰其詳不可得聞也諸侯惡其害已也而皆去其籍然而軻也嘗聞其略也天子一位公一位侯一位伯一位子男同一位凡五等也君一位卿一位大夫一位上士一位中士一位下士一位凡六等天子之制地方千里公侯皆方百里伯七十里子男五十里凡四等不能五十里不達於天子附於諸侯曰附庸天子之卿受地視侯大夫受地視伯元士受地視子男大國地方百里君十卿禄卿禄四大夫大夫倍上士上士倍中士中士倍下士下士與庶人在官者同禄禄足以代其耕也次國地方七十里君十卿禄卿禄三大夫大夫倍上士上士倍中士中士倍下士下士與庶人在官者同禄禄足以代其耕也小國地方五十里君十卿禄卿禄二大夫大夫倍上士上士倍中士中士倍下士下士與庶人在官者同祿祿足以代其耕也耕者之所獲一夫百畝百畝之糞上農夫食九人上次食八人中食七人中次食六人下食五人庶人在官者其禄以是為差五年張儀乞身之魏一嵗卒儀秦以遊説諸侯致位富貴其餘犀首樓緩之徒爭慕效之紛紜徧於天下不可勝紀孟子曰景春曰公孫衍張儀豈不誠大丈夫哉一怒而諸侯懼安居而天下息孟子曰是焉得為大丈夫乎子未學禮乎丈夫之冠也父命之女子之嫁也母命之往送之門戒之曰往之汝家必敬必戒無違夫子以順為正者妾婦之道也居天下之廣居立天下之正位行天下之大道得志與民由之不得志獨行其道富貴不能淫貧賤不能移威武不能屈此之謂大丈夫趙王納呉廣女孟姚有寵為后生子何欲及其生而立之遂廢太子六年秦初置丞相七年秦王使甘茂伐韓茂曰宜陽大縣其實郡也今倍數險而行千里攻之難矣昔魯人有與曾參同姓名者殺人人告其母織自若也及三人告之投杼而走臣之賢不若曾參王之信臣不如其母疑臣者非特三人臣恐大王之投杼也魏文侯令樂羊攻中山三年拔之反而論功文侯示之謗書一箧羊曰此非臣功君之力也臣羈旅之臣也樗里子公孫奭挾韓而議之王聼之必矣王與盟於息壤八年茂攻宜陽五月而不拔樗里奭果争之王欲罷兵茂曰息壤在彼王濟之師遂㧞宜陽秦王好力戲力士烏獲之徒皆至大官舉鼎絶脉而薨無子異母弟稷立是為昭襄王王母芈八子楚女也實宣太后孟子與弟子講明道義其書略曰孟子曰尊賢使能俊傑在位則天下之士皆悦而願立於其朝矣市㕓而不征法而不㕓則天下之商皆悦而願蔵於其市矣闗譏而不征則天下之旅皆悦而願出於其路矣耕者助而不税則天下之農皆悦而願為之氓矣信能行此五者則鄰國之民仰之若父母矣率其子弟攻其父母自生民以来未有濟者也如此則無敵於天下無敵於天下者天吏也然而不王者未之有也孟子曰人皆有不忍人之心先王有不忍人之心斯有不忍人之政矣以不忍人之心行不忍人之政治天下可運於掌上所以謂人皆有不忍人之心者今人乍見孺子将入於井皆有怵惕惻隐之心非所以内交於孺子之父母也非所以要譽於鄉黨朋友也非惡其聲而然也由是觀之無惻隐之心非人也無羞惡之心非人也無辭讓之心非人也無是非之心非人也惻隐之心仁之端也羞惡之心義之端也辭讓之心禮之端也是非之心智之端也人之有是四端也猶其有四體也有是四端而自謂不能者自賊者也謂其君不能者賊其君者也凡有四端於我者知皆擴而充之矣若火之始然泉之始達茍能充之足以保四海茍不充之不足以事父母孟子曰天時不如地利地利不如人和三里之城七里之郭環而攻之而不勝夫環而攻之必有得天時者矣然而不勝者是天時不如地利也城非不高也池非不深也兵革非不堅利也米粟非不多也委而去之是地利不如人和也故曰域民不以封疆之界固國不以山谿之險威天下不以兵革之利得道者多助失道者寡助寡助之至親戚畔之多助之至天下順之以天下之所順攻親戚之所畔故君子有不戰戰必勝矣孟子曰天下有達尊三爵一齒一徳一朝廷莫如爵鄉黨莫如齒輔世長民莫如徳惡得有其一以慢其二哉故将大有為之君必有所不召之臣欲有謀焉則就之其尊徳樂道不如是不足以有為也故湯之於伊尹學焉而後臣之故不勞而王桓公之於管仲學焉而後臣之故不勞而霸今天下地醜徳齊莫能相尚無他好臣其所教而不好臣其所受教湯之於伊尹桓公之於管仲則不敢召管仲且猶不可召而况不為管仲者乎孟子曰離婁之明公輸子之巧不以規矩不能成方員師曠之聰不以六律不能正五音堯舜之道不以仁政不能平治天下今有仁心仁聞而民不被其澤不可法於後世者不行先王之道也故曰徒善不足以為政徒法不能以自行詩云不愆不忘率由舊章遵先王之法而過者未之有也聖人既竭目力焉繼之以規矩凖繩以為方員平直不可勝用也既竭耳力焉繼之以六律正五音不可勝用也既竭心思焉繼之以不忍人之政而仁覆天下矣故曰為髙必因丘陵為下必因川澤為政不因先王之道可謂智乎是以惟仁者宜在髙位不仁而在高位是播其惡於衆也上無道揆也下無法守也朝不信道工不信度君子犯義小人犯刑國之所存者幸也故曰城郭不完兵甲不多非國之災也田野不辟貨財不聚非國之害也上無禮下無學賊民興喪無日矣詩曰天之方蹶無然泄泄泄泄猶沓沓也事君無義進退無禮言則非先王之道者猶沓沓也故曰責難於君謂之恭陳善閉邪謂之敬吾君不能謂之賊孟子曰規矩方員之至也聖人人倫之至也欲為君盡君道欲為臣盡臣道二者皆法堯舜而已矣不以舜之所以事堯事君不敬其君者也不以堯之所以治民治民賊其民者也孔子曰道二仁與不仁而已矣暴其民甚則身弑國亡不甚則身危國削名之曰幽厲雖孝子慈孫百世不能改也詩云殷鑒不逺在夏后之世此之謂也孟子曰三代之得天下也以仁其失天下也以不仁國之所以廢興存亡者亦然天子不仁不保四海諸侯不仁不保社稷卿大夫不仁不保宗廟士庶人不仁不保四體今惡死亡而樂不仁是惡醉而強酒孟子曰愛人不親反其仁治人不治反其智禮人不答反其敬行有不得者皆反求諸已其身正而天下歸之詩曰永言配命自求多福孟子曰人有恒言皆曰天下國家天下之本在國國之本在家家之本在身孟子曰人不足與適也政不足與間也惟大人為能格君心之非君仁莫不仁君義莫不義君正莫不正一正君而國定矣孟子曰君子所以異於人者以其存心也君子以仁存心以禮存心仁者愛人有禮者敬人愛人者人恒愛之敬人者人恒敬之有人於此其待我以横逆則君子必自反矣我必不仁也必無禮也此物奚宜至哉其自反而仁矣自反而有禮矣其横逆由是也君子必自反也我必不忠自反而忠矣其横逆由是也君子曰此亦妄人也已矣如此則與禽獸奚擇哉於禽獸又何難焉是故君子有終身之憂無一朝之患也乃若所憂則有之舜人也我亦人也舜為法於天下可傳於後世我猶未免為鄉人也是則可憂也憂之如何如舜而已矣若夫君子所患則亡矣非仁無為也非禮無行也如有一朝之患則君子不患矣孟子曰以善服人者未有能服人者也以善養人然後能服天下天下不心服而王者未之有也孟子曰諸侯之寳三土地人民政事寳珠玉殃必及身孟子曰五霸者摟諸侯以伐諸侯三王之罪人也今之諸侯犯葵丘之五禁五霸之罪人也今之大夫逢君之惡今之諸侯之罪人也孟子曰士非為貧也而有時乎為貧娶妻非為飬也而有時乎為養為貧者辭尊居卑辭富居貧位卑而言髙罪也立乎人之本朝而道不行恥也萬章曰敢問不見諸侯何義也孟子曰在國曰市井之臣在野曰草莽之臣皆為庶人庶人不傳質為臣不敢見諸侯禮也萬章曰庶人召之役則往役君欲見之召之則不往見之何也曰往役義也往見不義也且君之欲見之也何為也哉曰為其多聞也為其賢也曰為其多聞也則天子不召師而况諸侯乎為其賢也則吾未聞欲見賢而召之也繆公亟見於子思曰古千乗之國以友士何如子思不悦曰古之人有言曰事之云乎豈曰友之云乎子思之不悦也豈不曰以位則子君也我臣也何敢與君友也以徳則子事我者也奚可以與我友千乗之君求與之友而不可得也而况可召歟齊景公田招虞人以旌不至将殺之志士不忘在溝壑勇士不忘喪其元孔子奚取焉取非其招不往也曰敢問招虞人何以曰以皮冠庶人以旃士以旂大夫以旌以大夫之招招虞人虞人死不敢往以士之招招庶人庶人豈敢往哉况乎以不賢人之招招賢人乎欲見賢而不以其道猶欲其入而閉之門也夫義路也禮門也惟君子能由是路出入是門也詩曰周道如砥其直如矢君子所履小人所視萬章曰孔子君命召不俟駕而行然則孔子非歟曰孔子當仕有官職而以其官召之也陳子曰古之君子何如則仕孟子曰所就三所去三迎之致敬以有禮言將行其言也則就之禮貎未衰言弗行也則去之其次雖未行其言也迎之致敬以有禮則就之禮貎衰則去之其下朝不食夕不食饑餓不能出門户君聞之曰吾大者不能行其道又不能從其言也使饑餓於我土地吾恥之周之亦可受也免死而已矣孟子曰盡其心者知其性也知其性則知天矣存其心養其性所以事天也夭夀不貳修身以俟之所以立命也孟子曰莫非命也順受其正是故知命者不立乎巖牆之下盡其道而死者正命也桎梏而死者非正命也孟子曰求則得之舎則失之是求有益於得也求在我者也求之有道得之有命是求無益於得也求在外者也孟子曰古之賢王好善而忘勢古之賢士何獨不然樂其道而忘人之勢故王公不致敬盡禮則不得亟見之見且猶不得亟而况得而臣之乎孟子曰君子之於物也愛之而不仁於人也仁之而弗親親親而仁民仁民而愛物孟子曰不信仁賢則國空虛無禮義則上下亂無政事則財用不足孟子曰伯夷聖之清者也伊尹聖之任者也栁下惠聖之和者也孔子聖之時者也孔子之謂集大成集大成也者金聲而玉振之也金聲也者始條理也玉振之也者終條理也始條理者智之事也終條理者聖之事也智譬則巧也聖譬則力也猶射於百歩之外也其至爾力也其中非爾力也孟子曰有事君人者則事是君為容悦者也有安社稷臣者以安社稷為説者也有天民者達可行於天下而後行之者也有大人者正已而物正者也孟子曰口之於味也目之於色也耳之於聲也鼻之於臭也四肢之於安佚也性也有命焉君子不謂性也仁之於父子也義之於君臣也禮之於賔主也智之於賢者也聖人之於天道也命也有性焉君子不謂命也孟子曰由堯舜至於湯五百有餘歲若禹臯陶則見而知之若湯則聞而知之由湯至於文王五百有餘嵗若伊尹莱朱則見而知之若文王則聞而知之由文王至於孔子若太公望散宜生則見而知之若孔子則聞而知之由孔子而来至於今百有餘嵗去聖人之世若此其未逺也近聖人之居若此其甚也然而無有乎爾則亦無有乎爾論曰愚讀孟子書謂楊朱墨翟之言盈天下及攷諸史則朱翟未嘗用於時君時君亦莫有信用其言惡在其為盈天下而孟氏闢之如此其力似空言侈大無益於實者後人雖信誦其言亦莫能究明其義愚始而疑中而惑卒喟然長嘆見孟子指意深逺廣大非茍為夸辭而已也何以言之天下之道為人為己二端而已惟聖人為能合内外之道得時措之宜故不塞不流而王道行百姓寕舎是則或失於為人太重而不知立己或失於為己太重而不知立人失己與人則天地否塞而人之類滅矣五伯之末仁義不明有志於為己者直欲髙飛深入不在人間如接輿沮溺之徒是也於是楊朱倡為我之説而其徒翕然是之矣有志於為人者直欲自沽自獻必行其説如衛鞅儀秦之徒是也於是墨翟倡兼愛之論而其徒翕然是之矣此二氏之言所以盈天下也然孟氏所以不闢沮溺者為其無辭説而楊朱之言近義故也所以不闢儀秦者為其事淺陋而墨翟之言近仁故也近於仁則不仁近於義則不義不仁不義近於禽獸人将何以立於天地之間故孟氏拔其本塞其源則末流将自止矣有見於此然後知孟氏闢楊墨承先聖大有功於王道而可以為萬世法也使齊梁之君一行其言豈至人之類自相殘滅陳呉劉項之際死者什九而後止哉趙王與肥義謀胡服騎射國人不欲公子成稱疾不朝王使請之曰制國有常利民為本從政有經令行為上明徳先論於賤而施法先信於貴故願慕公叔之義以成胡服之功也成曰中國者聖賢之所教禮樂之所用逺方之所觀赴蠻夷之所則效也今王變古道逆人心願熟圖之使者以報王自往請曰先時中山負齊之強侵暴吾地引水圍鄗呼老先君醜之故寡人欲備四境之難報中山之怨而叔父順俗忘鄗醜非所望也成聽命焉魯侯叔薨諡曰平公子賈嗣皇王大紀卷七十六

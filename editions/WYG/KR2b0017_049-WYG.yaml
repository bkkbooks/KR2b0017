body:
  text: 皇王大紀卷四十九宋胡宏撰三王紀定王十五年冬十一月庚子許男錫我薨諡曰昭公子寗嗣丁未蔡侯申薨諡曰文公子固嗣夏四月癸卯日有食之晉侯使郤克徴㑹于齊與魯臧孫許同入見郤克跛臧孫眇齊侯帷婦人使觀之二子登婦人笑聞諸賔郤克出而誓曰所不此報無能涉河歸請伐齊晉侯不許請以其私屬又不許晉侯魯侯衛侯曹伯邾子㑹于斷道齊侯不出使髙固晏弱蔡朝南郭偃㑹髙固逃歸己未諸侯盟執弱朝偃苗賁皇曰使反者得辭而害來者以懼諸侯將焉用之晉人緩之逸晉士會召其子燮曰喜怒以類者鮮易者實多詩曰君子如怒亂庶遄沮君子如祉亂庶遄已君子之喜怒以己亂也弗己者必益之郤子其或者欲已亂於齊乎不然余懼其益之也余將老使郤子逞其志庶有豸乎爾從二三子惟敬乃老郤克為政有秦客庾言於朝諸大夫莫能對燮應之三歸而言之武子怒曰大夫非不能也讓父兄也爾童子而三掩人於朝乎擊之以杖折委笄九月壬午魯叔􅆄卒初魯侯有簒適之謀母弟叔􅆄曰不可魯侯不聽叔􅆄非之織屨而食與之財則曰我足矣終身不食魯侯之食以至於死經曰十有七年春王正月庚子許男錫我卒丁未蔡侯申卒夏葬許昭公葬蔡文公日卒書名赴而得禮記之詳也葬而不月其略在内宣公為國務華而無忠信誠慤之心計利而不知禮義邦交之實哀死送終獨厚於齊而利害不切其身者皆闕如也大則薄其君親次則忽於盟主又其次若秦若衛若滕雖來告計怠於禮而不㑹也比事以觀義自見矣六月癸卯日有食之己未公會晉侯衛侯曹伯邾子同盟于斷道書同盟者志同欲也大國率之小國畏威而從命非同欲也小國訴之大國勉强而應焉非同欲也若斷道之之盟諸侯同心謀欲伐齊釋其憤怒非有不得已而要者也或以為㑹同天子之事築宫為壇設方明如方嶽之盟故書同疑其說之誤矣秋公至自會冬十有一月壬午公弟叔􅆄卒稱弟得弟道也稱字賢也何賢乎叔􅆄宣弑而非之也非之則胡為不去也兄弟無絶道故雖非之而不去也與之財則曰我足矣終身不食宣公之禄君子以是為通恩也論情可以明親親言義可以厲不軌所以取貴乎春秋書曰公弟而稱字以表之也公子為正大夫而書卒貴也不大夫而書卒賢也或以為叔􅆄寵弟在寅公有私親之愛故生賜氏俾世其卿與仲遂比則其說誤矣誠使叔􅆄生而賜氏則是貴戚用事之卿豈有不見於經者勢必與聞政事執國命矣況宣公之時煩於聘問㑹朝之禮遂蔑季孫歸父交鄰國衆矣而獨叔􅆄不與焉其非生而賜氏俾世其卿亦明矣十六年冬晉侯衛世子臧伐齊至於陽榖齊侯㑹晉侯盟于繒以公子强為質晉師還魯侯伐把夏五月邾人戕鄫子于鄫魯侯乞師于楚欲伐齊甲戌楚王薨諡曰莊王世子審嗣楚師遂不出初莊王使士亹傅世子亹辭王曰賴子之善善之也對曰善在世子世子欲善善人將至若不欲善善則不用王曰雖然願子傅之亹乃受命魯侯以仲遂之立己也故寵其子歸父歸父欲去三桓以張公室與公謀而聘于晉欲以晉人去之八月壬戌魯侯薨于路寢子黒肱嗣季孫行父言於朝曰使我殺適立庻以失大援者仲也夫臧孫許請去之遂逐東門氏歸父還及笙壇帷復命於介既復命袒括髪即位而哭三踊遂出奔齊經曰十有八年春晉侯衛世子臧伐齊保國以禮為本者也齊頃公不謹於禮自己致寇所謂人必自伐而後人伐之矣諸侯上卿皆執國命取必於其君以行克伐怨欲之私故盟于斷道至大戰于鞌逞其志而後止春秋詳書于策見伐與伐者之罪皆可以為鑒矣公伐把夏四月秋七月邾人戕鄫子于鄫戕者殘賊而殺之也于鄫者刺臣子不能救君難也夷貉無城郭宫室百官有司單車使者直造其廬帳虜其酋長者則有之矣中國則重門擊柝亷陛等威侍衛守禦之嚴奚至於坐使其君為邾人殘賊殺之而莫禦乎邾人盖嘗執鄫子用之則不共戴天之世讐也既不能復又使邾人得造其國都而戕殺其君曰于鄫者所以深責鄫之臣子至此極也甲戌楚子旅卒楚僭稱王降而稱子者是仲尼筆之也其不書𦵏者恐民之惑而避其號是仲尼削之也若楚若呉若徐皆自王降而稱子若滕自侯降而稱子若把自伯降而稱子四夷雖大皆曰子其降稱子者狄之也或謂春秋不擅進退諸侯亂名實則非矣述天理正人倫此名實所由定也奚名為亂哉公孫歸父如晉宣公因齊得國故刻意事之雖易世猶未怠也及頃公不能謹禮怒晉魯上卿而郤克當國决䇿討之晉方強盛齊少懦矣於是背齊而事晉其於邦交以利為嚮背無忠信誠慤之心者也按左氏歸父欲去三桓以張公室與公謀而聘于晉欲以晉人去之夫輕於背與國易於謀大家而不知其本未有能成而無悔也然則公室不可張乎務引其君當道正心以正朝廷禮樂刑政自己出也其庻㡬乎必欲倚外援以去之是去疥瘍而得腹心之疾也庸愈哉冬十月壬戌公薨于路寢歸父還自晉至笙遂奔齊仲尼稱孟莊子之孝其不改父之臣與父之政是難能也又曰三年無改於父之道可謂孝矣夫仁人孝子於其父之臣非有大不可如晉悼公於夷羊五之屬必存始終進退之禮而不遽也歸父於君命出使未反而君薨在聘禮有執圭復命于殯之文升自西階子臣皆哭情亦戚矣今宣公猶未殯而東門氏逐忍乎哉書曰歸父還自晉者已畢事之辭也至笙遂奔齊者罪成公君臣死君而忘父逐之亟也榖梁子曰捐殯而奔其父之使者是亦奔父也得經意矣君薨家遣方寸宜亦亂而造次顛沛不失禮焉非志於仁者弗能也詞繁而不殺歸父之善自著矣比事以觀則見當國者有無君之心此春秋所以作不可不察也十七年冬十一月魯侯黒肱即位魯𦵏其君宣公魯無氷春正月魯為齊難故作丘甲魯聞齊將出楚師使臧孫許結盟于晉及晉侯盟于赤棘晉侯使瑕嘉平戎于王單襄公如晉拜成劉康公徼戎將遂伐之叔服曰背盟而欺大國神人弗助將何以勝不聽遂伐茅戎敗績于徐吾氏秋吳子夀夢立周章十四世孫也經曰元年春王正月公即位二月辛酉𦵏我君宣公無冰寒極而無氷者常燠也洪範傳曰豫常燠若此政事舒緩紀綱縱弛之象成公幼弱政在三家公室不張其象已見固當固隂沍寒而常燠應之古者日在北陸而藏氷獻羔而啓朝之禄位賔食喪祭氷皆與焉此亦燮調愆伏之一事也今既寒而燠遂廢凌人之職然策書所載皆經邦大訓人有㣲而不登其姓名事有小而不記其本末雨雹氷雪何以悉書天人一理也萬物一氣也觀於隂陽寒暑之變以察其消息盈虚此制治于未亂慎於㣲之意也毎慎於㣲然後王事備矣三月作丘甲作丘甲益兵也古者九夫為井四井為邑四邑為丘四丘為甸甸地方八里旁加一里為成所取於民者出長轂一乗此司馬法一成之賦也為齊難作丘甲益兵備敵重困農民非為國之道其曰作者不宜作也唐太宗問李靖楚廣與周制如何靖曰周制一乘歩卒七十二人甲士三人以二十五人為一甲几三甲共七十五人然則一丘所出十有八人積四丘而具一乗耳今作丘甲者即丘作一甲是一甸之中共百人為兵矣則未知其所作者三甸而増一乗乎毎乗而増一甲乎魯至昭公時嘗蒐于紅革車千乗則計甸而增乗未可知也楚人二廣之法一乗至用百五十人則魯每乗而増一甲亦未可知也賦雖不同其實皆為益兵其數皆増二之一耳先儒或言甲非人之所能為又以為丘出甸賦加四倍者誤矣夏臧孫許及晉侯盟于赤棘初宣公謀以晉人去三桓歸父為是見逐而奔齊矣今季孫當國恨齊人之立宣公納歸父又懼晉人之或見討也故往結此盟赤棘晉地也其稱及魯所欲也夫盟非春秋所貴而惡屢盟者非惟長亂亦國用民力所難給也成公即位之初方經大故未有施舎己責逮鰥寡救乏困之事也為齊難既作丘甲矣聞將出楚師又遂與晉尋盟豈固本保邦之道乎書及晉侯盟于赤棘非特備齊懼晉盖三桓懐忿懟君父之心將有事於齊而汲汲欲之者罪可見矣秋王師敗績于茅戎程氏曰王師於諸侯不言敗諸侯不可敵王也於夷狄不言戰夷狄不能抗王也不可敵不可抗者理也其敵其抗王道之失也桓王伐鄭兵敗身傷而經不書敗存君臣之義立天下之防也劉康公邀戎伐之敗績於徐吾氏而經不書戰辨華夷之分立中國之防也是皆聖人筆削非魯史之舊文也然筆於經者雖以尊君父外戎狄為義而君父所以尊戎狄所以服則有道矣桓王不以討賊興師而急於伐鄭康公不以惇信持國而輕於邀戎是失其所以君天下禦四夷之道也書敗績于茅戎者言自敗也其自反亦至矣冬十月十八年齊伐魯北鄙取龍遂南侵及巢春二月衛孫良夫石稷將侵齊與齊師遇石子欲還孫子曰不可以師伐人遇其師而還將謂君何若知不能則如無出今既遇矣不如戰也丙戌戰于新築衛師甚敗新築人仲叔于奚救良夫免之賞之以邑辭請曲縣繁纓以朝許之孔子曰惜也不如多與之邑惟器與名不可以假人衛孫良夫魯臧孫許如晉乞師皆主郤克克請八百乗晉侯許之克將中軍士燮佐上軍欒書將下軍韓厥為司馬以救魯衛臧孫許逆晉師且道之季孫行父叔孫僑如公孫嬰齊曹公子首帥師㑹之夏四月癸酉陳于鞌邴夏御齊侯逄丑父為右晉解張御郤克克傷於矢流血及屨未絶皷音曰余病矣解張曰師之耳目在吾旗鼓進退從之若之何其以病敗事也擐甲執兵固即死也病未及死吾子勉之援桴而皷馬逸不能止師從之齊師敗績韓厥從齊侯逢丑父與公易位將及華泉絓於木而止厥執縶馬前再拜稽首曰寡君使羣臣為魯衛請曰無令輿師陷入君地下臣不幸屬當戎行敢告不敏攝官承乏丑父使公下如華泉取飲齊侯以免厥獻丑父克曰人不難以死免其君我戮之不祥赦之以勸事君者乃免之齊侯遂自徐關入辟女子女子曰君免乎曰免矣銳司徒免乎曰免矣曰茍君與吾父免矣可若何乃奔齊侯以為有禮予之石窌晉師從齊師入自丘輿擊馬陘五月齊侯使國佐賂以紀甗玉磬與地晉人不可曰必以蕭同叔子為質而使齊之封内盡東其畝對曰蕭同叔子非它寡君之母也若以匹敵則亦晉君之母也吾子布大命於諸侯而曰必質其母以為信其若王命何且是以不孝令也先王疆理天下物土之冝而布其利故詩曰我疆我理東南其畝今吾子疆理諸侯而曰盡東其畝唯吾子戎車是利無顧土宜其無乃非先王之命也乎寡君之命使臣則有辭矣曰子以君師辱於敝邑畏君之震師徒撓敗唯是先君之敝器土地不敢愛子又不許請收合餘燼背城借一敝邑之幸亦云從也況其不幸敢不唯命是聽揖而去之魯衛諫曰齊疾我矣子得其國寳我亦得地而紓於難其榮多矣克因魯衛之使以其詞為之請己酉逮乎爰婁而與之盟六月壬午宋公鮑薨諡曰文公子固嗣庚寅衛侯速薨諡曰穆公子臧嗣晉使齊歸魯汶陽田楚將救齊使屈巫聘于齊屈巫聘夏姬遂奔晉公子側請以重幣錮之王曰止自為謀則過矣其為吾先君謀也則忠忠社稷之固也所益多矣楚王以魯宣公嘗求好而魯侯受盟于晉也又以衛人不行使而從晉伐齊也故使令尹公子嬰齊救齊嬰齊請曰師衆而後可先君莊王曰無徳以及遠方莫如惠恤其民而善用之乃大戸已責逮鰥救乏赦罪悉師王卒盡行彭名御戎蔡侯為左許男為右侵衛遂侵魯師于蜀及陽橋魯仲孫蔑請徃賂之以請盟楚人許平九月魯侯㑹楚公子嬰齊于蜀遂及楚公子嬰齊蔡侯許男秦右大夫說宋華元陳公孫寧衛孫良夫鄭公子去疾及齊國之大夫曹人邾人薛人鄫人盟于蜀於是畏晉而竊與楚盟論曰唐末馬殷竊據長沙畏荆南成汭淮南楊行密之强議以貨結之髙郁曰奉天子撫士民訓勵卒伍霸業修明誰敢為敵殷從之果能平定湖南沒身傳嗣敵人不敢謀吁觀此則周公之裔宗卿之嗣至于以貨賂人而乞盟者其棄禮義人民辱國家也明矣是行也晉辟楚畏其衆也晉侯使鞏朔來獻齊捷王弗見使單襄公辭焉曰蠻夷戎狄不式王命淫湎毁常王命伐之則有獻捷王親受而勞之所以懲不敬勸有功也兄弟甥舅侵敗王略王命伐之告事而已不獻其功所以敬親暱禁淫慝也今叔父克遂有功于齊而不使命卿鎮撫王室所使來撫余一人而鞏伯實來未有職司於王室又姦先王之禮余雖欲於鞏伯其敢廢舊典以忝叔父夫齊甥舅之國也而太師之後也寜不亦淫從其欲以怒叔父抑豈不可諫誨士莊伯不能對王使委於三吏禮之如侯伯克敵使大夫告慶之禮降於卿禮一等王以鞏伯宴而私賄之使相告之曰非禮也勿籍楚公子嬰齊公子側殺屈巫之族而分其室屈巫遺二子書曰爾以讒慝貪惏事君而多殺不辜余必使爾罷於奔命以死乃求使於呉晉侯許之以兩之一卒適呉舎偏兩之一焉與其射御教呉乗車教之戰陳教之叛楚使其子狐庸為呉行人呉始不役屬於楚伐楚伐巢伐徐地始大僭稱王經曰二年春齊侯伐我北鄙初魯事齊謹甚雖易世而聘㑹不絶也又與晉侯盟于斷道而後怨隙成再盟于赤棘而後伐吾北鄙齊侯之興是役非義矣魯人為鞌之戰豈義乎同曰憤兵務相報復而彼此皆無善者則亦不待貶而罪自見矣夏四月丙戌衛孫良夫帥師及齊師戰于新築衛師敗績齊師侵虐而以衛主此戰何也衛侯初與晉同盟于斷道矣又使世子臧與晉同伐齊矣又使孫良夫石稷將侵齊矣及與齊師遇石稷欲還良夫不可曰以師伐人遇其師而還將謂君何若知不能則如無出今既遇矣不如戰也遂戰于新築故齊師雖侵虐而此戰以衛主之也春秋善解紛貴遠怨而惡以兵刃相接故書法如此六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師會晉郤克衛孫良夫曹公子首及齊侯戰于鞌齊師敗績大國三軍次國二軍二卿並將是四軍也當此時舊制猶存尺地皆公室之土也一民皆公室之兵也上卿行父與僑如嬰齊各帥一軍㑹戰而臧孫許如晉乞師又逆晉師為之道本不將兵特徃來晉魯兩軍之間預謀議耳成公初立主幼國危為季孫一怒掃境内興師而四卿並出肆其憤欲雖無人乎成公之側有不恤也然後政自季氏出矣將稱元帥畧其副屬詞之體也而四卿皆書者豈特為詳内録哉堅冰之戒亦明矣經之大例受伐者為主而此以四國及之者以一笑之㣲殘民毒衆幾獲其君而怒猶未怠焚雍門之茨侵車東至海故以四國主之為憤兵之大戒見諸行事深切著明矣秋七月齊侯使國佐如師己酉及國佐盟于袁婁齊國佐如師與楚屈完來一也然陘之役則曰來盟于師盟于召陵鞌之戰則曰及國佐盟于袁婁何也荆楚暴横憑陵諸夏齊桓公仗義聲罪致討威行江漢之上不待加兵而楚人怗服其書來盟于師者楚人自服而求盟也盟于召陵桓公退舎禮與之盟也在春秋時斯為善矣若夫袁婁則異於是齊雖侵虐未若荆楚之暴也諸國大夫貪憤積怒欲雪一笑之耻至於殺人盈野非有擊強扶弱之心國佐如師將以賂克非服之也晉大夫又不以徳命使齊人盡東其畆而以蕭同叔子為質夫蕭同叔子齊君之母則亦悖矣由是國子不可請合餘燼背城借一揖而去之郤克使魯衛之使以其詞為之請逮乎袁婁而與之盟則汲汲欲盟者晉也故反以晉人及之若此類見曲直之繩墨矣是故制敵莫如仗義天下莫大於理而强有力不與焉亦可謂深切著明矣八月壬午宋公鮑卒庚寅衛侯速卒取汶陽田汶陽之田本魯田也取者得非其有之稱不曰復而謂之取何也恃大國兵力一戰勝齊得其故壤而不請於天王以正疆理則取之不以其道與得非其冇奚異乎然則宜奈何考於建邦土地之圖若在封域之中則先王所錫先祖所受經界世守不可亂矣不然侵小得之春秋固有興滅國繼絶世之義必有處也魯在戰國時地方五百里而孟氏語慎子曰如有王者作在所損乎在所益乎經於復其故田而書取所損益亦可知矣冬楚師鄭師侵衛十有一月公㑹楚公子嬰齊于蜀按左氏魯衛受盟于晉從于伐齊故楚為陽橋之役令尹子重曰師衆而後可於是王卒盡行二國稱師著其衆也侵衛則書侵我師于蜀致賂納質沒而不書非諱也書其重者則莫重乎其以中國諸侯降班失列與夷狄之大夫㑹也季孫行父為國上卿當使其君尊榮其民免於侵陵之患而危辱至此特起於忿忮肆其褊心而不知制之以禮也書曰必有忍乃其有濟懲忿窒慾徳之修也不忮不求行之善也躬自厚而薄責於人逺怨之方也季孫忿忮弗能懲也而辱逮君父不亦憯乎故春秋史外傳心之要典也考其行事深切著明於以反求諸己則亦知戒矣丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀盟而魯與必先書公尊内也次書主盟者衆所推也此書公及楚人則知主盟者楚也公子嬰齊秦右說宋華元陳公孫寧衛孫良夫鄭去疾皆國卿也何以稱人楚僭稱王春秋黜之比諸夷狄晉雖不競猶主夏盟諸侯茍能任仁賢修政事保固疆圉要結鄰好同心擇義堅事晉室荆楚雖大何畏焉今乃西向服從而與之盟不亦恥乎古者用夏服夷未聞服於夷也乃是之從亦為不善擇矣經於魯君盟㑹不信則諱公而不書不臣則諱公而不書棄中國從夷秋則諱公而不書蜀之盟棄晉從楚書公不諱何也事同而既貶則從同同正始之義也從荆楚而與盟既諱公於僖十九年齊之盟矣是以於此不諱而人諸國之大夫以見意也十九年冬十一月晉侯宋公魯侯衛侯曹伯討邲之役侵鄭公子偃禦之使東鄙覆諸鄤敗之丘輿獻捷于楚辛亥衛𦵏其君十二月甲子魯新宫災三日哭乙亥宋塟其君始厚塟僭王禮君子謂華元樂舉不臣魯侯如晉鄭公子去疾帥師伐許魯取汶陽田棘不服叔孫僑如帥師圍之魯大雩廧咎如赤狄之餘也晉郤克衛孫良夫伐之廧咎如潰九月晉荀庚衛孫良夫聘于魯魯侯問諸臧孫許曰中行伯之於晉其位在三孫子於衛為上卿將誰先對曰次國之上卿當大國之中小國之上卿當大國之下卿衛在晉不得為次國晉為盟主其將先之丙午及庚盟丁未及良夫盟鄭人伐許晉荀首佐中軍使求其子罃於楚楚王曰子其怨我乎對曰二國治戎臣不才不勝其任又誰敢怨曰然則徳我乎對曰二國圖其社稷兩釋纍囚以成其好其誰敢徳曰何以報我對曰以君之靈得反次及於事而帥偏師以脩封疆其竭力致死無有二心王曰晉未可與爭禮而歸之齊侯恥於鞌之敗弛苑囿薄賦斂問疾弔䘮國家無事是年朝於晉晉作六軍經曰三年春王正月公㑹晉侯宋公衛侯曹伯伐鄭討邲之役則復怨勦民非觀釁也遂東侵則潜師掠境非以律也覆而敗諸鄤則專用詐謀非正勝也度彼參此皆無善也略而不紀勝負㣲也晉侯稱爵而以伐書何也初為是役必以鄭之從楚也附蠻夷擾中國則盟主有詞于伐耳宋衛未𦵏曷為稱爵背殯越境以吉禮從金革之事也辛亥𦵏衛穆公二月公至自伐鄭甲子新宫災三日哭廟災而哭禮也得禮為常事則何以書緱氏劉絢然曰新宫者宣宫也不曰宣宫者神主未遷也知其者丹楹刻桷皆稱桓宫此不舉諡故知其未遷也宫成而主未入遇災而哭何禮也宣公薨至是二十有八月緩於遷主可知矣言災則不㳟之致亦自見矣此說據經為合或曰禮稱有焚其先人之室則三日哭新宫將以安神主也雖未遷而哭不亦可乎曰先人之室盖常寝於斯食於斯㑹族屬於斯其居處笑語之所在皆可想也事死如事生故有焚其室則哭之禮神主未遷而哭於人情何居乙亥塟宋文公按左氏文公卒始厚塟塟益車馬重器備君子謂華元樂舉於是乎不臣攷於經未有以驗其厚也數其塟之月則信然矣天子七月諸侯五月大夫三月士踰月以降殺遲速為禮之節不可亂也文公之卒國家安靖外無危難曷為越禮踰時建乎七月而後克襄事哉故知華元樂舉之棄君於惡而益其侈無疑矣夫禮之厚薄稱人情而為之者也宋公在殯而離次出境從金革之事哀戚之情忘矣顧欲厚𦵏其君親此非有所不忍於死者特欲誇耀淫侈無知之人耳世衰道㣲禮法既壊無以制其侈心至於秦漢之間窮竭民力以事丘隴其禍有不可勝言者春秋據事直書而失自見此類是也豈不為永戒哉夏公如晉鄭公子去疾帥師伐許公至自晉宣公薨至是三年之喪畢矣宜入朝京師見天子受王命然後歸而即政可也嗣守社稷之重而不朝于周以拜汶陽田之故而徃朝於晉其行事亦悖矣此春秋所為作也公行多不致其書公至自晉何其至也必有以也秋叔孫僑如帥師圍棘按左氏取汶陽之田棘不服故圍之復故地而民不聽至於命上將用大師環其邑而攻之何也魯於是時初稅畝作丘甲稅役日益重矣棘雖復歸故國所以不願為之民也歟成公不知薄稅斂輕力役修徳政以來之而肆其兵力雖得之必亦失之矣大雩晉郤克衛孫良夫伐廧咎如冬十有一月晉侯使荀庚來聘衛侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟劉敞曰諸侯有聘無盟聘禮也盟非禮也庚與良夫不務引其君當道而生事專命為非禮不信以干先王之典故不繫於國以見其遂事之辱非人臣之操此說然也其言及者公與之盟而不言公見二卿之抗也盟者春秋所惡於惡之中又有惡焉者此類是矣鄭伐許稱國以伐狄之也晉楚爭鄭鄭兩事焉及邲之敗於是乎專意事楚不通中華晉雖加兵終莫之聽也至此一歳而再伐許甚矣夫利在中國則從中國利在夷狄則從夷狄而不擇於義之可否以為去就其所以異於夷者㡬希况又馮弱犯寡一歳之中而再動干戈於鄰國不既甚乎春秋之法中國而夷狄行者則狄之所以懲惡也以為告詞畧而從告乃實録耳一字為褒貶義安在也二十年甲戌冬宋華元聘于魯通嗣君也春正月壬申鄭伯薨諡曰襄公子費嗣把朝于魯將歸叔姬焉二月魯臧孫許卒魯侯如晉晉侯不敬季孫行父曰晉侯必不免魯侯歸欲求成于楚行父曰晉雖無道國大臣睦而邇於我諸侯聽焉未可以貳史佚有言曰非我族類其心必異楚雖大非吾族也公乃止鄭𦵏其君魯城鄆鄭公孫申疆許田許人敗諸展陂鄭伯伐許取鉏任泠敦之田晉欒書救許伐鄭取氾祭楚公子側救鄭鄭伯與許男訟焉皇戌攝鄭伯之辭側不能决經曰四年春宋公使華元來聘三月壬申鄭伯堅卒把伯來朝夏四月甲寅臧孫許卒公如晉𦵏鄭襄公秋公至自晉冬城鄆鄭伯伐許前此鄭襄公伐許既狄之矣今悼公又伐許乃復稱爵何也喪未踰年以吉禮從金革之事則忘親矣稱爵非美詞所以著其惡也二十一年冬十一月把夫人歸于魯魯仲孫蔑如宋報華元也晉荀首如齊逆女魯叔孫僑如會諸榖晉梁山崩絳人曰國主山川故山崩川竭君為之不舉降服乗縵出次策於上帝國三日哭以禮焉魯大水九月己酉王崩諡曰定王子夷立許男愬鄭伯于楚鄭伯如楚訟不勝楚人執皇戌及公子發鄭伯歸請成于晉及趙同盟于垂棘十月己丑晉侯齊侯宋公魯侯衛侯鄭伯曹伯邾子把伯同盟于蟲牢鄭服也諸侯謀復㑹宋公辭經曰五年春王正月把叔姬來歸前書杞伯來朝左氏以為歸叔姬也此書杞叔姬來歸則出也春秋於内女其歸其出録之詳者男女居室人之大倫也男子生而願為之有室女子生而願為之有家父母之心人皆有之而不能為之擇家與室則夫婦之道苦淫僻之罪多矣王法所重人倫之本録之詳矣為世戒也仲孫蔑如宋夏叔孫僑如會晉荀首于榖梁山崩梁山韓國也詩曰奕奕梁山韓侯受命而謂之韓奕者言奕然髙大為韓國之鎮也後為晉所滅而大夫韓氏以為邑焉書而不繫國者為天下記異是以不言晉也左氏載絳人之語於禮文備矣而未記其實也夫降服乗縵徹樂出次祝幣史詞六者禮之文也古之遭變異而外為此文者必有恐懼脩省之心主於内若成湯以六事檢身髙宗克正厥事宣王側身脩行欲銷去之是也徒舉其文而無實以先之何足以弭災變乎夫國主山川至於崩竭當時諸侯未聞有戒心而脩徳也故自是而後六十年間弑君十有四亡國三十二其應亦僣矣春秋不明著其事應而事應具存其可忽諸秋大水冬十有一月己酉天王崩十有二月己丑公㑹晉侯齊侯宋公衛侯鄭伯曹伯邾子把伯同盟于蟲牢按左氏許靈公愬鄭伯于楚鄭伯如楚訟不勝歸而請成于晉盟于蟲牢鄭服也鄭服則何以書同盟天王崩赴告已及在諸侯之策矣以所聞先後而犇喪禮也而九國諸侯㑹盟不廢故特書同盟以見其皆不臣春秋惡盟誓於惡之中又有惡者此類是也皇王大紀卷四十九

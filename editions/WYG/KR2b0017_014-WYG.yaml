body:
  text: 皇王大紀卷十四宋胡宏撰三王紀成王元年召公為太保周公為太師畢公為太傅六月塟王于畢諡曰武王周公以太師位冢宰曰昔大禹惡㫖酒而好善言湯執中立賢無方文王視民如傷望道而未之見武王不泄邇不忘逺用集大命于厥躬今予小子旦朂輔冲人思兼三王以施四事其有不合者仰而思之夜以繼日幸而得之坐以待旦管叔自以年長而周公居中專政已與二叔監殷屏棄居外乃相與宣言於國曰公將不利於孺子周公乃告二公曰我之弗辟我無以告我先王淮夷奄君聞王室將有内亂為武庚謀復殷祚通使三監勸之起兵曰此萬世一時也武庚從之召公不懌周公作書開喻勉勵焉名曰君奭周書叙曰召公為保周公為師相成王為左右召公不說周公作君奭君奭周公若曰君奭弗弔天降䘮於殷殷既墜厥命我有周既受我不敢知曰厥基永孚于休若天棐忱我亦不敢知曰其終出於不祥嗚呼君已曰時我我亦不敢寜于上帝命弗永逺念天威越我民罔尤違惟人在我後嗣子孫大弗克恭上下遏佚前人光在家不知天命不易天難諶乃其墜命弗克經歴嗣前人恭明徳在今予小子旦非克有正迪惟前人光施于我沖子又曰天不可信我道惟寜王徳延天不庸釋于文王受命公曰君奭我聞在昔成湯既受命時則有若伊尹格于皇天在太甲時則有若保衡在太戊時則有若伊陟臣扈格于上帝巫咸乂王家在祖乙時則有若巫賢在武丁時則有若甘盤率惟兹有陳保乂有殷故殷禮陟配天多歴年所天惟純佑命則商實百姓王人罔不秉徳明恤小臣屏侯甸矧咸奔走惟兹惟徳稱用乂厥辟故一人有事于四方若卜筮罔不是孚公曰君奭天壽平格保乂有殷有殷嗣天滅威今汝永念則有固命厥亂明我新造邦公曰君奭在昔上帝割申勸寜王之徳其集大命于厥躬惟文王尚克修和我有夏亦惟有若虢叔有若閎夭有若散宜生有若泰顛有若南宫括又曰無能往來兹廸彛教文王蔑徳降于國人亦惟純佑秉徳廸知天威乃惟時昭文王廸見冒聞于上帝惟時受有殷命哉武王惟兹四人尚廸有禄後暨武王誕將天威咸劉厥敵惟兹四人昭武王惟冒丕單稱徳今在予小子旦若游大川予往暨汝奭其濟小子同未在位誕無我責収罔朂不及耉造徳不降我則鳴鳥不聞矧曰其有能格公曰嗚呼君肆其監于兹我受命無疆惟休亦大惟艱告君乃猷裕我不以後人迷公曰前人敷乃心乃悉命汝作汝民極曰汝明朂偶王在亶乗兹大命惟文王徳丕承無疆之恤公曰君告汝朕允保奭其汝克敬以予監于殷喪大否肆念我天威予不允惟若兹誥予惟曰襄我二人汝有合哉言曰在時二人天休滋至惟時二人弗戡其汝克敬徳明我俊民在讓後人于丕時嗚呼篤棐時二人我式克至于今日休我咸成文王功于不怠丕冒海隅出日罔不率俾公曰君予不惠若兹多誥予惟用閔于天越民公曰嗚呼君惟乃知民徳亦罔不能厥初惟其終祇若兹往敬用治記曰周公踐祚庶子之正於公族者教之以孝弟睦友子愛明父子之義長幼之序其朝于公内朝則東面北上内親也雖有貴者以齒明父子也其在外朝則以官體異姓也司士為之其在宗廟之中則如外朝之位崇徳也宗人授事以爵以官尊贒也其登餕獻受爵則以上嗣尊祖之道也庶子治之雖有三命不踰父兄其公大事則以喪服之精麄為序不專人親也雖於公族之喪亦如之以次主人若公與族燕則異姓為賔膳宰為主人公與父兄齒而孝弟之道達也族食世降一等親親之殺也其在軍則守公禰孝愛之深也公若有出疆之政庶子以公族之無事者守於公宫正室守大廟尊宗室而君臣之道著矣諸父守貴宫貴室諸子諸孫守下宫下室讓道達矣五廟之孫祖廟未毁雖為庶人冠取妻必告死則赴練祥則告不忘親也親未絶而列於庶人賤無能也族之相為也宜弔不弔宜免不免有司罰之至于􅈖賻承含皆有正焉睦友之道也公族其有死罪則磬于甸人其刑罪則纎剸亦告于甸人公族無宫刑獄成有司讞于公其死罪則曰某之罪在大辟其刑罪則曰某之罪在小辟公曰宥之有司曰在辟公又曰宥之有司又曰在辟及三宥不對走出致刑于甸人公又使人追之曰雖然必赦之有司對曰無及也反命于公公素服不舉為之變如其倫之喪無服親哭之是故庶子之官治而邦國有倫邦國有倫而衆鄉方矣公族之罪雖親不以犯有司正術也所以體百姓也刑于隱者不與國人慮兄弟也弗弔弗為服哭于異姓之廟為忝祖逺之也素服居外不聽樂私喪之也骨肉之親無絶也公族無宫刑不翦其類也大雅十七篇曰泂酌三章章五句召公戒王也言皇天親有徳饗有道也泂逺酌彼行潦流潦挹彼注兹可以餴餾也饎酒食也豈弟君子民之父母泂酌彼行潦挹彼注兹可以濯罍豈弟君子民之攸歸泂酌彼行潦挹彼注兹可以濯溉豈弟君子民之攸塈大雅十八篇曰卷阿十章六章章五句四章章六句召公戒成王也言求賢用吉士也有卷者阿太陵曰阿卷然深逺飄風自南豈弟君子來游來歌以矢其音伴奐爾游矣優游爾休矣豈弟君子俾爾彌爾性似先公酋矣爾土宇昄章亦孔之厚矣豈弟君子俾爾彌爾性百神爾主矣爾受命長矣茀禄爾康矣豈弟君子俾爾彌爾性純嘏爾常矣有馮有翼有孝有徳以引以翼豈弟君子四方為則顒顒卬卬如圭如璋令聞令望豈弟君子四方為綱鳳凰于飛翽翽其羽亦集爰止藹藹王多吉士維君子使媚于天子鳳凰于飛翽翽其羽亦傅于天藹藹王多吉人維君子命媚于庶人鳳凰鳴矣于彼髙岡梧桐生矣于彼朝陽菶菶萋萋雝雝喈喈君子之車既庶且多君子之馬既閑且馳矢詩不多維以遂歌周書叙旅獒曰西旅獻獒太保作旅獒旅獒惟克商遂通道于九夷八蠻西旅底貢厥獒太保乃作旅獒用訓于王曰嗚呼明王慎徳四夷咸賔無冇逺邇畢獻方物惟服食器用王乃昭徳之致于異姓之邦無替厥服分寳玉于伯叔之國時庸展親人不易物惟徳其物徳盛不狎侮狎侮君子罔以盡人心狎侮小人罔以盡其力不役耳目百度惟貞玩人喪徳玩物喪志志以道寜言以道接不作無益害有益功乃成不貴異物賤用物民乃足犬馬非其土性不畜珍禽竒獸不育于國不寳逺物則逺人格所寳惟賢則邇人安嗚呼夙夜罔或不勤不矜細行終累大徳為山九仞功虧一簣允迪兹生民保厥居惟乃世王巢伯來朝芮伯作旅巢命二年三監及淮夷叛挾武庚西伐周周人震動周公决䇿東征諸侯百官皆以為難以為可征者十人而已周公委召公畢公以内事帥師而東作大誥大誥王曰猷大誥爾多邦越爾御事弗弔天降割于我家不少延洪惟我幼沖人嗣無疆大歴服弗造哲迪民康矧曰其有能格知天命已予惟小子若渉淵水予惟往求朕攸濟敷賁敷前人受命兹不忘大功予不敢閉于天降威用寜王遺我大寳龜紹天明即命曰有大艱于西土西土人亦不靜越兹蠢殷小腆誕敢紀其叙天降威知我國有疵民不康曰予復反鄙我周邦今蠢今翼日民獻有十夫予翼以于敉寜武圖功我有大事休朕卜并吉肆予告我友邦君越尹氏庶士御事曰予得吉卜予惟以爾庶邦于伐殷逋播臣爾庶邦君越庶士御事罔不反曰艱大民不靜亦惟在王宫邦君室越予小子考翼不可征王害不違卜肆予沖人永思艱曰嗚呼允蠢鰥寡哀哉予造天役遺大投艱于朕身越予沖人不卬自恤義爾邦君越爾多士尹氏御事綏予曰無毖于恤不可不成乃寜考圖功已予惟小子不敢替上帝命天休于寜王興我小邦周寜王惟卜用克綏受兹命今天其相民矧亦惟卜用嗚呼天明畏弼我丕丕基王曰爾惟舊人爾丕克逺省爾知寜王若勤哉天閟毖我成功所予不敢不極卒寜王圖事肆予大化誘我友邦君天棐忱辭其考我民予曷其不于前寜人圖功攸終天亦惟用勤毖我民若有疾予曷敢不于前寜人攸受休畢王曰若昔朕其逝朕言艱日思若考作室既底法厥子乃弗肯堂矧肯構厥父菑厥子乃弗肯播矧肯穫厥考翼其肯曰予有後弗棄基肆予曷敢不越卬敉寜王大命若兄考乃有友伐厥子民飬其勸弗救王曰嗚呼肆哉爾庶邦君越爾御事爽邦由哲亦惟十人廸知上帝命越天棐忱爾時罔敢易法矧今天降戾于周邦惟大艱人誕鄰胥伐于厥室爾亦不知天命不易予永念曰天惟喪殷若穡夫予曷敢不終朕畝天亦惟休于前寜人予曷其極卜敢弗于從率寜人有指疆土矧今卜并吉肆朕誕以爾東征天命不僣卜陳惟若兹􅃎風首篇曰七月八章章十一句陳王業也周公遭變故陳后稷先公風化之所由致王業之艱難也七月流火九月授衣一之日觱發二之日栗烈無衣無褐何以卒歳三之日于耜四之日舉趾同我婦子饁彼南畝田畯至喜七月流火九月授衣春日載陽有鳴倉庚女執懿筐遵彼㣲行爰求柔桑春日遲遲采蘩祁祁女心傷悲殆及公子同歸七月流火八月萑葦蠶月條桑取彼斧斨以伐逺揚猗彼女桑七月鳴鵙八月載績載𤣥載黄我朱孔陽為公子裳四月秀葽五月鳴蜩八月其穫十月隕蘀一之日于貉取彼狐貍為公子裘二之日其同載纉武功言私其豵獻豜于公五月斯螽動股六月莎鷄振羽七月在野八月在宇九月在戸十月蟋蟀入我牀下穹窒熏䑕塞向墐戸嗟我婦子曰為改歲入此室處六月食鬱及薁七月亨葵及菽八月剥棗十月穫稻為此春酒以介眉壽七月食𤓰八月斷壺九月叔苴采荼薪樗食我農夫九月築場圃十月納禾稼黍稷重穋禾麻菽麥嗟我農夫我稼既同上入執宫功晝爾于茅宵爾索綯亟其乗屋其始播百穀二之日鑿氷沖沖三之日納于凌隂四之日其蚤獻羔祭韭九月肅霜十月滌場朋酒斯饗曰殺羔羊躋彼公堂稱彼兕觥萬壽無疆周公居東勞來殷民固守其所三監淮夷欲西不得西欲戰不得戰其黨日離論曰漢景帝時吳楚七國反天下震動周亞夫為上將疾走洛陽據形便堅壁不戰而遣偏裨出淮泗絶其饟道凡三月七國皆破滅其謀暗與周公合成功宜哉三年封王母弟叔虞於河汾之東唐之故墟初邑姜方娠夢上帝曰余命而子曰虞將與之唐屬之參而蕃育其子孫及生有文在其手曰虞遂以名之王與叔虞戯削桐為圭曰以此封若史佚請命有司卜日王曰吾戯耳佚曰天子無戯言言則史書之禮成之樂歌之言不可不慎也遂封之唐箕子曰唐叔之後必大國南有晉水至子燮父改號為晉論曰人非聖人出言安能盡善言而是則踐言可也言而非則改之可也史佚戒成王慎可矣使之有言必踐則非矣然當時諸公不以為過者豈非唐叔適可以封故歟四年周人執武庚殺之致辟管叔于商囚蔡叔于郭鄰以車七乗降霍叔于庶人三年不齒王有疑周公之心公乃為詩以貽王名之曰鴟鴞豳風二篇曰鴟鴞四章章五句周公救亂也以王未知其志也鴟鴞鴟鴞既取我子無毁我室恩斯勤斯鬻子之閔斯迨天之未隂雨徹彼桑土綢繆牖户今女下民或敢侮予予手拮据予所捋荼予所蓄租予口卒瘏曰予未有室家予羽譙譙予尾翛翛予室翹翹風雨所漂揺予維音嘵嘵王亦未敢誚公論曰鴟鴞食母之鳥也詩曰鴟鴞鴟鴞既取我子者指管蔡背父叛君流不利孺子之言使成王有疑心也毋毁我室恩斯勤斯鬻子之閔斯者重傷管蔡背毁王室不思君父顧復之恩創業之勤也迨天之未隂雨徹彼桑土綢繆牖戸今女下民或敢侮予者言如是然後可以有室家而人信服也予手拮据予所捋荼予所蓄租予口卒瘏者周公佐佑武王創立室家勤苦如是也曰予未有室家者以成王為室家主而有疑周公之心王室危而未可保也夫鴟鴞遞相食者也管蔡既背成王矣今成王又將背周公故周公亦以鴟鴞自喻曰予羽譙譙予尾翛翛予室翹翹風雨所漂揺予維音嘵嘵其事惡故其比惡其心切故其辭切成王讀是詩知比鴟鴞之為惡矣心不能無愠怒而未敢誚公者以其心疑而未決也及天威震動則啓書感泣焉寜知非此詩不先有以驚動其心乎豳風四篇曰破斧三章章六句美周公也周大夫以惡四國焉既破我斧又缺我斨周公東征四國是皇哀我人斯亦孔之將既破我斧又缺我錡周公東征四國是吪哀我人斯亦孔之嘉既破我斧又缺我銶周公東征四國是遒哀我人斯亦孔之休豳風五篇曰伐柯二章章四句美周公也周大夫刺朝廷之不知也伐柯如何匪斧不克娶妻如何匪媒不得伐柯伐柯其則不逺我覯之子籩豆有踐􅃎風六篇曰九罭四章一章四句三章章三句美周公也周大夫刺朝廷之不知也九罭之魚鱒魴我覯之子衮衣繡裳鴻飛遵渚公歸無所於女信處鴻飛遵陸公歸不復於女信宿是以有衮衣兮無以我公歸兮無使我心悲兮王既免喪周頌二十一篇曰閔予小子一章十一句嗣王朝於廟也閔予小子遭家不造嬛嬛在疚於乎皇考永世克孝念兹皇祖陟降庭止維予小子夙夜敬止於乎皇王繼序思不忘周頌二十二篇曰訪落一章十二句嗣王謀於廟訪予訪予落止率時昭考於乎悠哉朕未有艾將予就之繼猶泮渙維予小子未堪家多難紹庭上下陟降厥家休矣皇考以保明其身周頌二十三篇曰敬之一章十二句群臣進諫嗣王也敬之敬之天維顯思命不易哉無曰髙髙在上陟降厥士日監在兹惟予小子不聰敬止日就月將學有緝熙于光明佛時仔肩示我顯徳行周頌二十四篇曰小毖一章七句嗣王求助也予其懲而毖後患莫予荓蜂自求辛螫肇允彼桃蟲拚飛維鳥未堪家多難予又集于蓼秋大熟未穫天大雷電以風禾盡偃大木斯拔邦人大恐王與大夫盡弁以啓余縢之書乃得周公所自以為功代武王之說二公及王乃問諸史與百執事對曰信噫公命我勿敢言王執書以泣曰其勿穆卜昔公勤勞王家惟予沖人弗及知今天動威以彰周公之徳惟朕小子其新逆我國家禮亦宜之王出郊天乃雨反風禾則盡起二公命邦人凡大木所偃盡起而築之歲則大熟唐叔得禾異畝同穎獻諸天子王命唐叔歸周公于東作歸禾周公既得命禾旅天子之命作嘉禾周公歸于周豳風三篇曰東山四章章十二句周公東征也周公東征三年而歸勞歸士大夫美之故作是詩也一章言其完也二章言其思也三章言其室家之望女也四章樂男女之及時也君子之於人予其情而閔其勞所以說之也說以使民民忘其死其惟東山乎我徂東山慆慆不歸我來自東零雨其濛我東曰歸我心西悲制彼裳衣勿士行枚蜎蜎者蠋烝在桑野敦彼獨宿亦在車下我徂東山慆慆不歸我來自東零雨其濛果臝之實亦施于宇伊威在室蠨蛸在戸町畽鹿場熠燿宵行不可畏也伊可懐也我徂東山慆慆不歸我來自東零雨其濛鸛鳴于垤婦嘆于室洒掃穹窒我征聿至有敦瓜苦烝在栗薪自我不見于今三年我徂東山慆慆不歸我來自東零雨其濛倉庚于飛熠燿其羽之子于歸皇駁其馬親結其縭九十其儀其新孔嘉其舊如之何􅃎風終七篇曰狼跋二章章四句美周公也周公攝政逺則四國流言近則王不知周大夫美不失其聖也狼跋其胡載㚄其尾公孫碩膚赤舄几几狼㚄其尾載跋其胡公孫碩膚徳音不瑕封㣲子于宋周書叙㣲子之命曰成王既黜殷命殺武庚命㣲子啓代殷後作㣲子之命㣲子之命王若曰猷殷王元子惟稽古崇徳象賢統承先王脩其禮物作賔于王家與國咸休永世無窮嗚呼乃祖成湯克齊聖廣淵皇天眷佑誕受厥命撫民以寛除其邪虐功加于時徳垂後裔爾惟踐脩厥猷舊有令聞恪慎克孝肅恭神人予嘉乃徳曰篤不忘上帝時歆下民祇恊庸建爾于上公尹兹東夏欽哉往敷乃訓慎乃服命率由典常以蕃王室以和兄弟𢎞乃烈祖律乃有民永綏厥位毗予一人世世享徳萬邦作式俾我有周無斁嗚呼往哉惟休無替朕命皇王大紀卷十四

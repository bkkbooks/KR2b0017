body:
  text: 皇王大紀卷六十四宋胡宏撰三王紀敬王十五年王人殺子朝于楚魯以粟濟蔡人越人乘虛入吳申包胥以秦師五百乘大敗夫槩王于沂公子申收散亡敗吳師于軍祥夫槩王曰秦軍逺鬬楚衆日集而越入吳都大王留楚不去此危道也吳王不聽夫槩王亡歸擊走之遂自立也吳王乃還師討夫槩王夫槩王奔楚魯季孫意如卒是為平子子斯代為政將以君之璵璠斂贈以珠玉孔子曰是猶暴尸於平原也示民以姦利之端而有害於死者將安用之季氏乃止季氏之臣公山不狃仲梁懷有隙不狃謂陽虎逐懷虎恐斯不從囚之而逐懷盟斯於稷門之內陽虎欲見孔子而惡無禮大夫有賜於士不得受於其家則往拜其門陽虎闞孔子之亡也而饋孔子蒸豚孔子亦闞其亡也而往拜之遇諸途謂孔子曰來豫與爾言曰懷其寶而迷其邦可謂仁乎曰不可好從事而亟失時可謂知乎曰不可日月逝矣歲不我與孔子曰諾吾將仕矣楚王復國將殺藍尹亹曰臣之敢見觀君德也庶億懼而監前惡乎公子申曰囊瓦惟思舊怨以敗君何效焉王使復其所曰以無忘前敗賞鬬辛鬬懷申包胥公子申曰請舍懷也王曰大德滅小怨道也申包胥曰吾為君也非為身也君既定矣又何求吾嘗尤鬬成然其又為諸遂逃賞叔孫不敢卒楚人滅唐王子朝之黨儋翩結鄭人以作亂鄭人為之伐我胥靡是歲有如日隕于地經曰五年春王三月辛亥朔日有食之夏歸粟于蔡於越入吳六月丙申季孫意如卒內大夫有罪見討則不書卒公子翬是也仲遂殺惡及視惡與翬同而書卒者以事之變卒之也意如何以書卒見定公不討逐君之賊以為大夫全始終之禮也定雖受國於季氏茍有叔孫婼之見不賞私勞致辟意如以明君臣之義則三綱可振公室強矣今茍於利而亡其讐三綱滅公室益侵陪臣執命宜矣故意如書卒主人習其讀而問其傳則未知己之有罪焉耳秋七月壬子叔孫不敢卒冬晉士鞅帥師圍鮮虞十六年魯侯伐鄭取匡為我討其伐胥靡晉命也往不假道於衛及還陽虎使季孟自南門入出自東門衛侯怒將伐之公叔發老矣輦而如公曰尤而效之非禮也昭公之難公將以文之舒鼎成之昭兆定之鞶鑑茍可以納之擇用一焉公子與二三臣之子諸侯茍憂之將以為之質今將以小忿蒙舊德不可乃止公孫發卒其子戍請諡於君曰日月有時將葬矣請所以易其名者君曰昔者衛國凶飢夫子為粥與國之餓者是不亦惠乎昔者衛國有難夫子以其死衛寡人不亦貞乎夫子聽衛國之政修其班制以與四鄰交衛國之社稷不辱不亦文乎故謂夫子貞惠文子魯季孫斯如晉獻鄭俘陽虎強使仲孫何忌如晉報夫人之幣晉人兼享之何忌立於房外謂范鞅曰陽虎若不能居魯而息肩于晉所不以為中軍司馬者有如先君鞅謂趙鞅曰魯人患陽虎矣吳世子終纍敗楚舟師獲二帥七大夫楚國大惕懼亡司馬公子結又以陵師敗于繁陽令尹子西喜曰乃今可為矣於是遷郢於鄀而改紀其政以定楚國子期欲以妾為妻訪諸左史倚相曰吾有妾而願欲笄之其可乎對曰君子之行進退周旋惟道是從昔子夕嗜芰死而屬曰必以芰祭子木違之君子曰違而道吾子經營楚國而欲薦芰以干之其可乎結乃止樂祁言於公曰諸侯唯我事晉今使不往晉其憾矣退告其宰陳寅寅曰必使子往他日公謂祁曰惟寡人説子之言子必往寅曰子立後而行吾室亦不亡惟君亦以我為知難而行也見溷而行趙鞅逆而飲之酒於綿上獻楊楯六十寅曰昔吾主范氏今子主趙氏又有納焉以楊楯賈禍弗可為也已然子死晉國子孫必得志于宋范鞅言於晉侯曰以君命越疆而使未致使而私飲酒不敬二君不可不討也乃執樂祁魯陽虎盟公及三桓于周社盟國人於亳社詛于五父之衢城中城經曰六年春王正月癸亥鄭遊速帥師滅許以許男斯歸二月公侵鄭公至自侵鄭夏季孫斯仲孫何忌如晉秋晉人執宋行人樂祁犂稱人以執非伯討也祁犁聘于晉主趙簡子飲酒焉獻楊楯六十范趙方惡其宰曰吾主范氏今子主趙氏是賈禍也范獻子果怒言于晉侯曰以君命越疆未致使而私飲酒不敬二君不可不討也乃執樂祁執非無名何以非伯討也使范趙方睦皆有獻焉則弗執之矣執異國行人出於列卿私意威福之柄移矣三卿分晉而靖公廢為家人豈一朝一夕之故哉冬城中城季孫斯仲孫忌帥師圍鄆十七年甲寅齊人歸魯鄆陽虎居之以為政徴會于衛衛侯欲叛晉諸大夫不可使北宫結如晉而私於齊侯曰執結以侵我齊侯從之乃盟于沙魯大雩齊師伐魯陽虎御季孫公斂處父御仲孫虎將宵軍齊師齊人墮伏而待之處父曰虎不圗禍而必死苫夷曰虎陷二子於難不待有司余必殺女虎懼乃還不敗魯大雩經曰七年春王正月夏四月秋齊侯鄭伯盟于鹹齊人執衛行人北宫結以侵衛齊侯衛侯盟于沙大雩齊國夏帥師伐我西鄙九月大雩冬十月十八年魯侯侵齊門于陽州士皆坐列陽州人出敗之晉趙鞅將歸樂祁范鞅曰三年止之無故而歸之宋必叛祁歸卒于太行范鞅曰止其尸以求成魯侯侵齊曹伯薨子陽嗣齊國夏髙張帥師伐魯晉范鞅趙鞅荀寅救魯魯侯會之于瓦晉師將盟衛侯于鄟澤趙鞅曰羣臣誰敢盟衛君者涉他成何曰我能盟之衛人請執牛耳成何曰衛吾溫原也焉得視諸侯將歃涉他捘衛侯之手及捥衛侯怒王孫賈進曰盟以信禮也有如衛君其敢不唯禮是事而受此盟也乃歸叛晉晉人請改盟弗許陳侯薨子越嗣晉士鞅侵鄭圍蟲牢遂侵衛曹葬其君陳葬其君魯人侵衛魯季孫斯之弟寤族子公鉏極及公山不狃皆不得志於季氏叔孫氏之庶子輒無寵於叔孫氏叔仲志不得志於魯故五人因陽虎欲去三桓以寤更季氏以輒更叔孫氏已更孟氏順祀先公而祈焉禘于僖公虎將享季氏于蒲圃而殺之戒都車孟氏宰公斂處父告何忌曰季氏戒都車何故曰吾弗聞處父曰然則亂也必及于子先備諸於是陽虎前驅林楚御季孫將如蒲圃斯作謂楚曰以我適孟氏楚怒馬及衢而騁孟氏開入之虎劫公與叔孫伐孟氏公斂處父帥成人戰于棘下虎敗説甲如公宫取寶玉大弓以出舍于五父之衢寢而為食其徒曰追其將至虎曰魯人聞余出喜於徴死何暇追余入于歡陽關以叛經曰八年春王正月公侵齊公至自侵齊二月公侵齊三月公至自侵齊曹伯露卒夏齊國夏帥師伐我西鄙公會晉師于瓦按左氏晉士鞅荀寅救魯則其書公會晉師何也春秋大法雖師次于君而與大夫敵至用大衆則君與大夫皆以師為重而不敢輕也故棐林之會不言趙盾而言晉師瓦之會言晉師而不書士鞅於以見人臣不可取民有衆專主兵權之意陳氏厚施於齊以移其國季孫盡征于魯以奪其民皆王法所禁也春秋之義行則不得為爾矣公至自瓦秋七月戊辰陳侯柳卒晉士鞅帥師侵鄭遂侵衛葬曹靖公九月葬陳懷公季孫斯仲孫何忌帥師侵衛冬衛侯鄭伯盟于曲濮從祀先公蜀人馮山曰昭公至是始得從祀於太廟其説是也季氏逐君而制其死生之命公薨乾侯不得終于正寢既薨七月又不得以時歸葬既葬絶其兆域又不得同於先君而在墓道之南至孔子為司寇然後溝而合諸墓則其主雖久未得從昭穆而祔祭宜矣及意如已卒陽虎專季氏將殺季孫斯而亂魯國託於正以售其不正始以昭公之主從祀太廟蓋欲著季氏之罪以取媚於國人然其事雖順其情則逆春秋原情制法故不書禘事與日特曰從祀先公於盜竊寶玉大弓之上見事出陽虎而不可詳也其亦深切著明矣盜竊寶玉大弓十九年宋公使樂大心盟于晉且逆樂祁之尸辭偽有疾乃使向巢樂溷言於公曰大心將不利戴氏不肯適晉將作亂也不然無疾鄭伯薨子勝嗣陽虎歸寶玉大弓於魯魯人伐陽關虎奔齊請師伐魯曰三加必取之齊侯將許之鮑國諫曰魯未可取也上下猶和衆庶猶睦能事大國而無天災若之何取之陽虎欲勤齊師也齊師罷大臣必多死亡已於是乎奮其詐謀夫虎有寵於季氏而將殺季孫以不利魯國而求容焉親富不親仁君焉用之君富於季氏而大於魯國兹陽虎所欲傾覆也魯免其疾而君又收之無乃害乎齊侯執陽虎將東之虎願東乃囚諸西鄙逃於宋遂奔晉適趙氏孔仲尼曰趙氏其世有亂乎鄭葬其君齊侯伐晉夷儀晉車千乘在中牟衛侯將會齊侯于五氏卜過中牟龜焦衛侯曰可也衛車當其半寡人當其半敵矣乃過之中牟人欲伐之衛褚師圃亡在焉曰衛雖小其君在焉未可勝也齊師克城而驕其帥又賤遇必敗之乃從齊師敗之齊侯致禚媚杏于衛臨朝而嘆曰先君桓公以車八百乘而伯今我以長轂千乘敗於諸侯安得管仲之臣也哉弦章進曰昔有桓公故有管仲齊侯有慙色秦太子早死諡為夷公秦伯薨夷公子嗣魯以仲尼為中都宰制飬生送死之節長幼異食強弱異任男女别途路不拾遺器不雕偽為四寸之棺五寸之椁因丘陵為墳不封不樹四方之人多取則焉魯侯問君使臣臣事君如之何對曰君使臣以禮臣事君以忠經曰九年春王正月夏四月戊申鄭伯蠆卒得寶玉大弓榖梁子曰寶玉封圭大弓武王之戎弓周公受賜藏之魯或曰夏后氏之璜封父之繁弱也子孫世守罔敢失墜以昭先祖之德存肅敬之心爾古者告終易代𢎞璧琬琰天球夷玉兊之戈和之弓垂之竹矢莫不陳列非直為美觀也先王所寶傳及其身能全而歸之則可以免矣魯失其政陪臣擅權雖先公分器猶不能守而盜得竊諸公宫其能國乎故失之書得之書所以譏公與執政之臣見不恭之大也此義行則有天下國家者各知所守之職不敢忽矣六月葬鄭獻公秋齊侯衛侯次于五氏秦伯卒冬葬秦哀公二十年魯及齊平齊侯魯侯會于夾谷以孔仲尼攝相事犁彌言於齊侯曰孔丘知禮而無勇若使萊人以兵劫魯侯必得志焉齊侯從之仲尼以公退曰士兵之兩君合好而裔夷之俘以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不逼好於神為不祥於德為愆義於人為失禮君必不然齊侯聞之遽辟之將盟齊人加於載書曰齊師出竟而不以甲車三百乘從我者有如此盟孔子使兹無還對曰而不反我汶陽之田吾以共命者亦如之齊侯將享公孔子謂梁丘據曰齊魯之故吾子何不聞焉事既成矣而又享之是勤執事也且犧象不出門嘉樂不野合饗而既具是棄禮也若其不具是秕稗也用秕稗君辱棄禮名惡子盍圗之夫享所以昭德也不昭不如其已也乃不果享魯侯問於孔子曰一言而可以興邦有諸孔子曰言不可以若是其幾也人之言曰為君難為臣不易如知為君之難也不幾乎一言而興邦乎曰一言而喪邦有諸對曰言不可以若是其幾也人之言曰豫無樂乎為君惟其言而莫豫違也如其善而莫之違也不亦善乎如不善而莫之違也不幾乎一言而喪邦乎晉趙鞅圍衛執涉他成何以求成焉衛人不許晉人殺涉他成何奔燕齊侯歸自夾谷責羣臣曰孔丘以禮義相其君而二三子專以夷狄之道教寡人寡人病焉晏嬰曰小人之謝過也以文君子之謝過也以質君既知過則謝之以質耳齊侯曰善乃歸魯鄆歡龜隂之田季孫大説以孔子為司空孔子溝昭公之墓合諸先公之域謂季孫曰貶君以彰己罪非禮也今合之所以掩夫子之不臣季孫曰善初魯叔孫不敢欲立州仇公若固諫不敢立之而卒州仇既定使郈馬正侯犯殺公若侯犯以郈叛叔孫仲孫圍郈弗克及齊師復圍之弗克宋公逐樂大心魯叔孫謂郈工師駟赤曰郈非唯叔孫氏之憂社稷之患也將若之何赤謂犯曰居齊魯之際而無事必不可矣子盍求事於齊以臨民不然將叛侯犯從之齊使至駟赤與郈人為之宣言於郈中曰犯將以郈易於齊齊人將遷郈民衆凶懼圍犯赤將射之犯止之曰謀免我請行許之犯奔齊齊人致郈宋公子地嬖蘧富獵十一分其室而以其五與之地有白馬四公嬖向魋魋欲之公取而朱其尾鬛以與之地怒使其徒抶魋而奪之魋懼將走公閉門而泣之目盡腫母弟辰曰子分室以與獵也而獨卑魋亦有頗焉子為君禮不過出竟君必止子地出奔陳魯叔孫如齊齊侯享之曰郈屬與敝邑際故敢助君憂之州仇對曰寡君所以事君封疆社稷是以敢以家𨽻勤君之執事夫不令之臣天下之所惡也君豈以為寡君賜宋公子地之出奔也公弗止辰為之請弗聽辰曰是我迋吾兄也吾以國人出君誰與處與仲他石彄出奔陳魯以孔子為司寇七日收大夫少正卯戮之于兩觀之下門人端木賜問曰少正卯魯之聞人奈何誅之孔子曰行偽而堅言偽而辨學非而博變亂名實足以惑衆人之姦雄尹諧潘正付乙史何之流也焉得無誅於是有父子訟者孔子同狴執之三月不别其父請止孔子訓而釋之季孫不説門人冉有以告孔子曰風俗陵遲久矣未嘗教焉而聽其獄是誅無辜也飭法度明禁令於是沈猶氏不敢朝飲其羊公愼氏出其淫妻愼潰氏奢侈踰法越竟而徙風化浸行齊晏嬰卒孔子門人有若論曰晏子一狐裘三十年遣車一乘及墓而反國君七個遣車七乘大夫五個遣車五乘晏子焉知禮曾參曰國無道君子耻盈禮焉國奢則示之以儉國儉則示之以禮記曰晏平仲祀其先人豚肩不掩豆浣衣濯冠以朝君子以為隘矣經曰十年春王三月及齊平夏公會齊侯于夾谷公至自夾谷夾谷之會孔子相犁彌言於齊侯曰孔子知禮而無勇若使萊人以兵劫魯侯必得志焉齊侯從之兩君就禮兩相相揖齊人鼓譟而起欲以執魯君孔子歷階而升不盡一等而視歸乎齊侯曰兩君合好而裔夷之俘以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不逼好於神為不祥於德為愆義於人為失禮齊侯遽止之而屬其臣曰夫人率其君與行古人之道二三子獨率我入夷狄之俗使寡人獲罪於魯侯如之何晏子曰小人之謝過也以文君子之謝過也以質君已知過則謝之以質爾理於是歸鄆歡龜隂之田仲尼一言威重於三軍亦順於而已矣故天下莫大於理而強衆不與焉晉趙鞅帥師圍衛齊人來歸鄆歡龜隂田齊人前此嘗歸濟西田矣後此嘗歸歡及闡矣而此獨書來歸何也曰歸者魯請而得之也曰來歸者齊人心服而歸之也定公齊侯會于夾谷孔子攝相事具左右司馬以從至于會所以禮相見郤裔俘拒兵車之命而罷享禮之設于野由是齊侯歸三邑以謝過故揚子法言曰仲尼用於魯齊人章章歸其侵疆桓公以義責楚而楚人求盟夫子以禮責齊而齊人歸地皆書曰來序績也春秋夫子之筆削自序其繢可乎聖人會人物於一身萬象異形而同體通古今於一息百王異世而同神於土皆安而無所避也於我皆真而無所忘也其曰天之將喪斯文也後死者不得與於斯文也天之未喪斯文也匡人其如豫何是以天自處矣而亦何嫌之有叔孫州仇仲孫何忌帥師圍郈秋叔孫州仇仲孫何忌帥師圍郈郈叔孫氏邑也侯犯以郈叛不書于䇿書圍郈則叛可知矣再書二卿帥師圍郈則強亦可知矣天子失道征伐自諸侯出而後大夫強諸侯失道征伐自大夫出而後家臣強其逆彌甚則其失彌速故自諸侯出十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣三家専魯為日既久至是家臣爭叛亦其理宜矣春秋制法本忠恕施諸已而不願亦勿施諸人故所惡於上不以使下所惡於下不以事上二三子知傾公室以自張而不知家𨽻之擬其後也凡此類皆據事直書深切著明矣宋樂大心出奔曹宋公子地出奔陳冬齊侯衛侯鄭遊速會于安甫叔孫州仇如齊宋公之弟辰暨仲他石彄出奔陳按左氏宋公子地有白馬四公以與桓魋地怒抶魋奪之魋懼將走公泣之母弟辰曰子為君禮不過出竟君必止子地出奔陳公弗止辰為之請弗聽辰曰是我迋吾兄也吾以國人出君誰與處書曰宋公之弟辰暨仲他石彄出奔陳其弟云者罪宋公以嬖魋故而失二弟無親親之恩暨云者罪辰以兄故帥其大夫出奔無尊君之義夫暨者不得已之詞又見仲他石彄見脅于辰不能自立無大臣之節者也二十一年宋公子辰公子地暨仲他石彄入于蕭樂大心自曹從之大為宋患魯及鄭平經曰十有一年春宋公之弟辰及仲他石彄公子地自陳入于蕭以叛夏四月秋樂大心自曹入于蕭出奔陳則稱暨入于蕭以叛則稱及及非不得已之詞得已而不已者也夫事君者可貧可賤可殺而不可使為亂今不得已而輕於去國猶之可也得已不已而果於叛君則無首從之别其罪一施之故不稱暨而稱及四卿在蕭以叛而大心自曹從之其叛可知矣故不書叛而曰入於蕭入逆詞也書自陳自曹者結鄰國以入叛陳與曹之罪亦著矣冬及鄭平叔還如鄭涖盟二十二年春薛伯薨子比嗣薛葬其君魯公山不狃專費不受命召孔子欲往季路不説曰何必公山氏之之也孔子曰夫召我者而豈徒哉如有用我者吾其為東周乎孔子言於魯侯曰古者家不藏甲邑無百雉之城請損三都之過制者魯侯告於三子三子從乃以季路為季氏宰帥師從叔孫州仇墮郈季氏祭嘗逮暗繼之以燭有司跛倚不敬大矣於是祭子路與室事交乎户堂事交乎階質明而始行禮晏朝而退孔子聞之曰誰謂由也而不知禮乎又將墮費公山不狃叔孫輒帥費人襲魯魯侯與三子入于季氏之宫登武子之臺費人攻之及臺側孔子命申句須樂頎伐之費人北國人追之敗諸姑蔑二子奔齊遂奔吳季孫仲孫墮費叔孫州仇語大夫於朝曰子貢賢於仲尼子服何以告子貢子貢曰譬之宫牆賜之牆也及肩窺見室家之好夫子之牆數仞不得其門而入不見宗廟之美百官之富得其門者或寡矣夫子之云不亦宜乎州仇以毁孔子子貢曰無以為也仲尼不可毁也他人之賢者丘陵也猶可踰也仲尼日月也無得而踰焉人雖欲自絶其何傷於日月乎多見其不知量也陳亢謂子貢曰子為恭也仲尼豈賢於子乎子貢曰君子一言以為智一言以為不智言不可不愼也夫子之不可及也猶天之不可階而升也夫子之得邦家者所謂立之斯立道之斯行綏之斯來動之斯和其生也榮其死也哀如之何其可及也論曰凡人之情利害不相及則不相譽不相毁也彼叔孫之所以貶聖人譽子貢者孔子方用事惡其有不便於己而子貢孔氏之門人也一貶一譽人固不疑於以嘗試大夫之向背其姦慝如此而衆莫以為非也故遂毁聖人而擠之陳亢若非真不知聖人則黨於州仇者也觀子貢以自絶責州仇而以為邦語陳亢則知州仇之毁譽正孔子用事利害相及之時而小人去君子之情狀可見矣人君臨涖羣臣與夫執國命進忠賢察姦罔之君子其可忽諸魯大雩齊侯魯侯會盟于黃魯將墮成公斂處父謂仲孫曰墮成齊人必至於北門且成孟氏之保障也無成是無孟氏也子偽不知我將不墮公圍成公斂處父固守弗克而歸齊人懼魯得諸侯言於其君選女子八十人衣以文衣而舞容璣與樂獻於魯季孫微服往觀將受之孔子見季孫季孫不恱孔子又見之宰豫進曰昔者豫聞諸夫子曰王公不我聘則弗動今屈節數矣未可以已乎孔子不對季孫卒受女樂三日不朝子路曰夫子可以行矣公伯寮訴子路於季孫子服何以告曰夫子固有惑志於公伯寮吾力猶能肆諸市朝子曰道之將行也歟命也道之將廢也歟命也公伯寮其如命何論曰人之有德慧術智者嘗存乎疢疾陽虎在鄆不狃在費侯犯在郈此三家之疢疾也季孫斯幾於死故發憤悶思禮義遵用孔子孔子行乎季孫三月不違謂此時也故能墮費三家才損其死疾而叔孫遂毁聖人仲孫遂聽處父季孫遂受女樂惜哉三子者期於茍安而不能逺謀拘於小利而不知大慮習於人欲而不能久於天理也經曰十有二年春薛伯定卒夏葬薛襄公叔孫州仇帥師墮郈衛公孟彄帥師伐曹季孫斯仲孫何忌帥師墮費按左氏仲由為季氏宰將墮三都於是叔孫氏墮郈季氏將墮費公山不狃叔孫輒帥費人襲魯公與三子入季氏之宫登武子之臺費人攻之入及公則仲尼命申句須樂頎下伐之二子奔齊遂墮費禮曰制國不過千乘都城不過百雉家富不過百乘以此坊民諸侯猶有叛者故家不藏甲邑無百雉之城禮所當謹也郈費成者三家之邑政在大夫三卿越禮各固其城公室欲張而不得也三桓既微陪臣擅命馮恃其城數有叛者三家亦不能制也而問於仲尼遂墮三都是謂以禮為國可以為之兆也推而行諸魯國而凖則地方五百里凡侵小而得者必有與滅國繼絶世之義諸侯大夫各謹於禮不以所惡於上者使其下亦不以所惡於下者事其上上下交相順而王政行矣故曰茍有用我者期月而可三年有成秋大雩冬十月癸亥公會齊侯盟于黃十有一月丙寅朔日有食之公至自黃十有二月公圍成公至自圍成按左氏將墮成公斂處父謂孟孫曰墮成齊人必至于北門且成孟氏之保障無成是無孟氏也子偽不知我將不墮書公圍成強也其致危之也仲由為季氏宰孔子為魯司寇而不能墮成何也按是冬公圍成弗克越明年孔子由大司寇攝相事然後誅少正卯與聞國政三月而商賈信於市男女别於途及齊人饋女樂孔子遂行然則圍成之時仲尼雖用事未能專得魯國之政也而辨言亂政如少正卯等必肆疑阻於其間矣成雖未墮無與為比亦不能為患使聖人得志行乎魯國以及期月則不待兵革而自墮矣皇王大紀卷六十四

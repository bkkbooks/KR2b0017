body:
  text: 皇王大紀卷六十三宋胡宏撰三王紀敬王是故易者象也象也者像也彖者材也爻也者效天下之動者也是故吉凶生而悔吝著也陽卦多隂隂卦多陽其故何也陽卦竒隂卦耦其德行何也陽一君而二民君子之道也隂二君而一民小人之道也易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊途一致而百慮天下何思何慮日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而嵗成焉往者屈也來者信也屈信相感而利生焉尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也過此以往未之或知也窮神知化德之盛也易曰困于石據于蒺藜入于其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見邪易曰公用射隼于髙墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而動者也子曰小人不耻不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾無咎此之謂也善不積不足以成名惡不積不足以滅身小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑子曰德薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也子曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不遠復無祗悔元吉天地絪緼萬物化醇男女搆精萬物化生易曰三人行則損一人一人行則得其友言致一也子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也無交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恆凶子曰乾坤其易之門邪乾陽物也坤隂物也隂陽合德而剛柔有體以體天地之撰以通神明之德其稱名也雜而不越於稽其類其衰世之意邪夫易彰往而察來而微顯闡幽開而當名辨物正言斷辭則備矣其稱名也小其取類也大其旨逺其辭文其言曲而中其事肆而隱因二以濟民行以明失得之報易之興也其於中古乎作易者其有憂患乎是故履德之基也謙德之柄也復德之本也恆德之固也損德之修也益德之裕也困德之辨也井德之地也巽德之制也履和而至謙尊而光復小而辨於物恆雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而隱履以和行謙以制禮復以自知恆以一德損以遠害益以興利困以寡怨井以辨義巽以行權易之為書也不可逺為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要唯變所適其出入以度外內使知懼又明於憂患與故無有師保如臨父母初率其辭而揆其方既有典常茍非其人道不虛行易之為書也原始要終以為質也六爻相雜惟其時物也其初難知其上易知本末也初辭擬之卒成之終若夫雜物撰德辨是與非則非其中爻不備噫亦要存亡吉凶則居可知矣知者觀其彖辭則思過半矣二與四同功而異位其善不同二多譽四多懼近也柔之為道不利逺者其要無咎其用柔中也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝邪易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非它也三才之道也道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉易之興也其當殷之末世周之盛德邪當文王與紂之事邪是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要無咎此之謂易之道也夫乾天下之至健也德行恆易以知險夫坤天下之至順也德行恆簡以知阻能説諸心能研諸侯之慮定天下之吉凶成天下之亹亹者是故變化云為吉事有祥象事知器占事知來天地設位聖人成能人謀鬼謀百姓與能八卦以象告爻彖以情言剛柔雜居而吉凶可見矣變動以利言吉凶以情遷是故愛惡相攻而吉凶生逺近相取而悔吝生情偽相感而利害生凡易之情近而不相得則凶或害之悔且吝將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭遊失其守者其辭屈説卦昔者聖人之作易也幽贊於神明而生蓍參天兩地而倚數觀變於隂陽而立卦發揮於剛柔而生爻和順於道德而理於義窮理盡性以至於命昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆是故易逆數也雷以動之風以散之雨以潤之日以烜之艮以止之兊以説之乾以君之坤以藏之帝出乎震齊乎巽相見乎離致役乎坤説言乎兊戰乎乾勞乎坎成言乎艮萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南靣而聽天下嚮明而治蓋取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兊正秋也萬物之所説也故曰説言乎兊戰乎乾乾西北之卦也言隂陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮神也者妙萬物而為言者也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火説萬物者莫説乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也乾健也坤順也震動也巽入也坎陷也離麗也艮止也兊説也乾為馬坤為牛震為龍巽為雞坎為豕離為雉艮為狗兊為羊乾為首坤為腹震為足巽為股坎為耳離為目艮為手兊為口乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兊三索而得女故謂之少女乾為天為圜為君為父為玉為金為寒為氷為大赤為良馬為老馬為瘠馬為駁馬為木果坤為地為母為布為釡為吝嗇為均為子母牛為大輿為文為衆為柄其於地也為黑震為雷為龍為玄黃為敷為大塗為長子為決躁為蒼筤竹為萑葦其於馬也為善鳴為馵足為作足為的顙其於稼也為反生其究為健為蕃鮮巽為風為木為長女為繩直為工為白為長為髙為進退為不果為臭其於人也為寡髮為廣顙為多白眼為近利市三倍其究為躁卦坎為水為溝瀆為隱伏為矯輮為弓輪其於人也為加憂為心病為耳痛為血卦為赤其於馬也為美脊為亟心為下首為薄蹄為曳其於輿也為多眚為通為月為盜其於木也為堅多心離為火為日為電為中女為甲胄為戈兵其於人也為大腹為乾卦為鱉為蟹為螺為蚌為龜其於木也為科上稿艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為鼠為黔喙之屬其於木也為堅多節兊為澤為少女為巫為口舌為毁折為附決其於地也為剛鹵為妾為羊序卦有天地然後萬物生焉盈天地之間者唯萬物故受之以屯屯者盈也屯者物之始生也物生必蒙故受之以蒙蒙者蒙也物之稚也物稚不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟訟必有衆起故受之以師師者衆也衆必有所比故受之以比比者比也比必有所畜故受之以小畜物畜然後有禮故受之以履履而泰然後安故受之以泰泰者通也物不可以終通故受之以否物不可以終否故受之以同人與人同者物必歸焉故受之以大有有大者不可以盈故受之以謙有大而能謙必豫故受之以豫豫必有隨故受之以隨以喜隨人者必有事故受之以蠱蠱者事也有事而後可大故受之以臨臨者大也物大然後可觀故受之以觀可觀而後有所合故受之以噬嗑嗑者合也物不可以茍合而已故受之以賁賁者飾也致飾然後亨則盡矣故受之以剝剝者剝也物不可以終盡剝窮上反下故受之以復復則不妄矣故受之以無妄有無妄然後可畜故受之以大畜物畜然後可養故受之以頥頥者養也不養則不可動故受之以大過物不可以終過故受之以坎坎者陷也陷必有所麗故受之以離離者麗也有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯夫婦之道不可不久也故受之以恆恆者久也物不可以久居其所故受之以遁遁者退也物不可以終遁故受之以大壯物不可以終壯故受之以晉晉者進也進必有所傷故受之以明夷夷者傷也傷於外者必反於家故受之以家人家道窮必乖故受之以睽睽者乖也乖必有難故受之以蹇蹇者難也物不可以終難故受之以解解者緩也緩必有所失故受之以損損而不已必益故受之以益益而不已必決故受之以夬夬者決也決必有所遇故受之以姤姤者遇也物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升升而不已必困故受之以困困乎上者必反下故受之以井井道不可不革故受之以革革物者莫若鼎故受之以鼎主器者莫若長子故受之以震震者動也物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妹得其所歸者必大故受之以豐豐者大也窮大者必失其居故受之以旅旅而無所容故受之以巽巽者入也入而後説之故受之以兊兊者説也説而後散之故受之以渙渙者離也物不可以終離故受之以節節而信之故受之以中孚有其信者必行之故受之以小過有過物者必濟故受之以既濟物不可窮也故受之以未濟終焉雜卦乾剛坤柔比樂師憂臨觀之義或與或求屯見而不失其居蒙雜而著震起也艮止也損益盛衰之始也大畜時也無妄災也萃聚而升不來也謙輕而豫怠也噬嗑食也賁無色也兊見而巽伏也隨無故也蠱則飭也剝爛也復反也晉晝也明夷誅也井通而困相遇也咸速也恆久也渙離也節止也解緩也蹇難也睽外也家人內也否泰反其類也大壯則止遁則退也大有衆也同人親也革去故也鼎取新也小過過也中孚信也豐多故親寡旅也離上而坎下也小畜寡也履不處也需不進也訟不親也大過顛也姤遇也柔遇剛也漸女歸待男行也頤飬正也既濟定也歸妹女之終也未濟男之窮也夬決也剛決柔也君子道長小人道憂也論曰愚謂包犧畫卦文王繫辭周公爻辭孔子十翼然後知聖人憂患後世之至也後生晚學守一卷成書豈復知經百千嵗四聖人竭心思之勤故愚復其舊將以啓之也先聖後聖發明文義如太和之體萬物春生秋殺雷動風行千變萬化務曉人以生生之道初非緣已成事由聞見知識而為之者故愚讀之警動焉嗚呼聖人亦人耳所以臻此必有道矣夫詩書春秋後人猶多引以正心斷事至於易則希矣吁士大夫負先聖可勝道哉經曰元年春王元年必書正月謹始也定何以無正月昭公薨于乾侯不得正其終定公制在權臣不得正其始魯於是曠年無君春秋欲謹之而不可也季氏廢太子衍及務人而立公子宋宋者昭公之弟其主社稷非先君所命而專受之於意如者也故不書正月見魯國無君定公無正主人習其讀而問其傳則未知己之有罪焉爾三月晉人執宋仲幾于京師按左氏諸侯會成周宋仲幾不受切曰滕薛郳吾役也為是執之則有罪矣書晉人執幾於京師則貶詞也以王事討有罪何貶乎按周官司𨽻掌凡囚執人之事屬於司寇凡諸侯之獄訟定以邦典凡卿大夫之獄訟斷以邦法則大司寇之職也不告諸司寇而執人於天子之側故雖以王事討有罪猶貶凡此類皆篡弒之萌履霜之漸執而書其地謹之也每謹于初而禍亂熄矣夏六月癸亥公之喪至自乾侯戊辰公即位昭公之薨已越葬期猶未得返至于六月癸亥然後喪至而定之即位乃在是月之戊辰蓋遲速進退為意如所制不得專也以周書顧命考之成王之崩在四月乙丑宰臣太保即于是日命仲桓南宫毛俾爰齊侯呂伋以二干戈虎賁百人逆王世子釗于南門之外延入翼室宅憂為天下主不待崇朝而後定也今昭公喪至在葬期之後公子宋自壞隤先入猶未得立是知為意如所制不得以時定非謂正棺乎兩楹之間故定之即位不可不察也夫即位大事也宗嗣先定則變故不生蓋代君享國而主其祭宜戚宜懼一失機會或萌窺伺之心至於生變則為不孝矣古人所以貴定國家之本也今昭公之薨定之即位春秋詳書于䇿非為後法乃見諸行事為永鑒耳秋七月癸巳葬我君昭公九月大雩立焬宫焬公伯禽之子其曰立者不宜立也喪事即逺有進而無退宫廟即逺有毁而無立冬十月隕霜殺菽榖梁子曰菽舉重也未可以殺而殺舉重可殺而不殺舉輕其象則刑罰不中之應十二年魯雉門兩觀災桐叛楚吳使舒鳩氏誘楚人曰以師臨我我伐桐為我使之無忌秋楚囊瓦伐吳師于豫章吳人見舟於豫章而潛師于巢遂軍楚師于豫章敗之圍巢克之獲楚公子繁魯雉門兩觀成經曰二年春王正月夏五月壬辰雉門及兩觀災秋楚人伐吳冬十月新作雉門及兩觀書新作者譏僣王制而不能革也雉門象魏之門其外為庫門而臯門在庫門之外其內為應門而路門在應門之內是天子之五門也僖公嘗修泮宫復悶宫非不用民力也而春秋不書新作南門而獨書者南非一門也必有不當為者子家駒以設兩觀為僣天子是非諸侯之制明矣夫撥亂反正者必本諸身身正者物必正春秋於僣君必書者必正之意也使定公遇災而懼革其僣禮三家陪臣雖欲僣諸侯執國命其敢乎習舊而不知以為非何以禁季氏之脅其主矣故特書新作以譏之也十三年魯侯如晉至河而復邾子薨子益嗣邾葬其君鮮虞人敗晉師魯仲孫及邾子盟蔡侯朝楚獻一裘一珮於王而自服其一令尹欲之不與三年止之唐成公如楚有兩肅爽焉令尹欲之弗與亦三年止之唐人或相與謀請代先從者許之飲先從者酒醉之竊馬而獻之令尹歸唐侯自拘於司敗曰君以弄馬之故隱君身棄國家羣人請相夫人以償馬必如之唐侯曰寡人之過也二三子無辱皆賞之蔡人聞之固請獻珮令尹命有司曰蔡侯之久也官不共也明日禮不畢將死蔡侯歸及漢執玉而沈曰余所有濟漢而南者有若大川蔡侯如晉請伐楚以其子元與其大夫之子為質經曰三年春王正月公如晉至河乃復二月辛卯邾子穿卒夏四月秋葬邾莊公冬仲孫何忌及邾子盟于拔十四年陳侯薨子栁嗣劉子晉侯合諸侯謀伐楚也晉荀寅求貨于蔡侯弗得言於范鞅曰國家方危諸侯方二將以襲敵不亦難乎水潦方降疾瘧方起中山不服棄盟取怨無損於楚而失中山不如辭蔡吾自方城以來楚未可以得志晉人假羽旄於鄭鄭人與之明日或斾以會晉於是乎失諸侯將會衛子行敬子曰會同難嘖有煩言莫之治也其使祝鮀從衛侯曰善鮀辭曰臣展四體以率舊職猶懼不給而煩刑書若又共二徼大罪也且夫祝社稷之常隸也社稷不動祝不出境官之制也君以軍行祓社釁鼓祝奉以從於是乎出境若嘉好之事君行師從卿行旅從臣無事焉衛侯曰行也將盟于臯鼬鮀私於萇𢎞曰聞諸道路蔡將先衛信乎𢎞曰蔡叔康叔之兄也先衛不亦可乎鮀曰以先王觀之則尚德也昔武王克商成王定之選建明德以藩屏周故周公相王室以尹天下於周為睦分魯公以大路大旗夏后氏之璜封父之繁弱殷民六族分之土田陪敦祝宗卜史備物典策官司彛器命以伯禽而封於少皥之墟分康叔以大路少帛綪茷旃旌大吕殷民七族司空聃季授土司徒陶叔授民命以康誥而封於殷墟皆啓以商政疆以周索分唐叔以大路密須之鼓闕鞏姑洗懷姓九宗職官五正命以唐誥而封於夏墟啓以夏政疆以戎索三者皆有令德故昭之以分物不然文武成康之伯猶多而不獲是分也惟不尚年也管蔡啓商惎間王室王於是乎殺管叔而蔡蔡叔若之何其使蔡先衛也乃長衛侯沈人不會蔡公孫姓滅沈諸侯盟杞伯薨于會子乞嗣諡曰悼公悼公弟弒乞諡曰隱公而自立陳葬其君曹聲公弟弒其君通諸侯還于臯鼬劉子卷薨杞葬其君蔡侯朝于吳因太宰嚭以其子乾與大夫之子為質故吳王蔡侯唐侯伐楚舍舟於淮汭自豫章與楚夾漢左司馬沈尹戍謂囊瓦曰子沿漢而與之上下我悉方城外以毁其舟還塞大隧直轅冥厄子濟漢而伐之我自後擊之必大敗之遂行史皇謂瓦曰若司馬之䇿是獨克吳也子必速戰乃濟漢而陳自小别至於大别三戰瓦知不可欲奔史皇曰安求其事難而逃之將何所入子必死之初罪必盡説瓦陳于柏舉吳王之弟夫槩王曰楚瓦不仁其臣莫有死志先伐之其卒必奔而後大師繼之必克以其屬五千先進瓦之卒奔楚師亂吳師大敗之瓦奔鄭吳從楚師及清發將擊之夫槩王曰困獸猶鬬况人乎若知不免而致死必敗我若使先濟者知免後者慕之蔑有鬬心矣半濟而後可擊也從之又敗之五戰及郢司馬還力戰而死楚王取其妹季芉畀我以出涉雎吳師入郢以班處宫夫槩王與王子山爭鄖公辛聞之曰不讓則不和不和則不可以逺征吳其自有亂也乎焉能定楚楚王濟江入于雲中王寢盜攻之以戈擊王王孫由于以背受之中肩王奔鄖鄖公弟懷將弒王曰平王殺吾父我殺其子不亦可乎辛曰君討臣誰敢仇之君命天也若死天命將誰讐違強凌弱非勇也乘人之約非仁也滅宗廢祀非孝也動無令名非知也必犯是余將殺女乃與弟巢以王奔隨楚將涉於成臼藍尹亹載其帑不與王舟王至隨吳人從之謂隨人曰周之子孫在漢川者楚實盡之天誘其衷致罰于楚而君又竄之周室何罪君若顧報周室施及寡人以奬天衷君之惠也漢陽之田君實有之隨人辭曰以隨之小而密邇於楚楚實存之世有盟誓至於今未改若難而棄之何以事君執事之患不惟一人若鳩楚竟敢不聽命吳人乃退伍員鞭平王之墓三百申包胥使人謂之曰何無天道之極也乃走乞師于秦曰吳為封豕長蛇以薦食上國虐始于楚寡君失守社稷越在草莽使下臣告急曰夷德無厭若鄰於君疆埸之患也逮吳之未定君其取分焉若楚之遂亡君之土也若以君靈撫之世以事君秦伯使辭焉曰寡人聞命矣子姑就館將圗以告對曰寡君越在草莽未獲所伏下臣何敢即安立依於庭牆而哭日夜不絶聲勺飲不入口七日秦哀公為之賦無衣九頓首而坐秦師乃出吳王使召陳侯逢滑曰國之興也以福其亡也以禍今吳未有福楚未有禍楚未可棄吳未可從而晉盟主也以晉辭吳若何公曰國勝君亡非禍而何對曰國之有是多矣何必不復小國猶復况大國乎臣聞國之興也視民如傷是其福也其亡也以民為土芥是其禍也楚雖無德亦不艾殺其民吳日敝於兵暴骨如莽而未見德焉天其或者正訓楚也禍之適吳其何日之有陳侯辭吳經曰四年春王二月癸巳陳侯吳卒三月公會劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯杞伯小邾子齊國夏于召陵侵楚按左氏傳書伐而經書侵楚者楚為無道憑陵諸夏為一裘一馬拘唐蔡二君三年而後遣蔡侯既歸請師于晉晉人請命于周大合諸侯天子之元老在焉若能暴明其罪恭行天討庶幾哉王者之師齊桓晉文之功褊矣有荀寅者求貨于蔡侯弗得遂辭蔡人晉由是失諸侯無功而還書曰侵楚陋之也夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之沈人不會于召陵晉人使蔡伐之書滅沈罪公孫姓也書以歸罪沈子嘉也書殺之罪蔡侯也奉詞致討而覆其邦家為敵所執不死于位皆不仁矣所惡於前無以先後出乎爾者反乎爾者也蔡侯視楚猶沈視蔡也昭公拘于郢三年而後反非亦國小而弱乎沈雖不會召陵未有大罪惡也而恃強殺之甚矣能無公孫翩之及哉宋以曹伯陽歸蔡以沈子嘉歸皆殺之也而或書或不書其不書者賤而略之也五月公及諸侯盟于臯鼬定公之立上不請於天王下不告於方伯而受國於季孫意如故三年朝晉至河而復今會諸侯求為此盟書公及者內為志也召陵之會必序不序十有八國之諸侯則無以見侵楚之陋臯鼬之盟序與不序非義所係則以凡舉可也杞伯成卒于會六月葬陳惠公許遷于容城秋七月公至自會劉卷卒葬杞悼公楚人圍蔡晉士鞅衛孔圉帥師伐鮮虞葬劉文公冬十有一月庚午蔡侯以吳子及楚人戰于柏舉楚師敗績楚囊瓦出奔鄭吳何以稱子善伐楚解蔡圍也荆楚暴橫盟主不能致其討天王不能達其命長惡不悛復興師而圍蔡王法所當討而不赦也吳能自卑聽蔡之義以達天子之命興師救蔡戰于柏舉大敗楚師成伯討之功善矣晉主夏盟中國所仰若嘉榖之望雨也有請于晉如彼其難吳國天下莫強焉非諸侯所能以也有請于吳如此其易故召陵之會大合諸侯而書侵楚柏舉之戰蔡用吳師特書曰以者深罪晉人保利棄義難於救蔡也然則何以不言救乎救大矣闔閭子胥宰嚭皆懷謀楚之心蔡人往請會逢其適非有救災恤鄰從簡書憂中國之實也聖人德大道宏樂與人為善故因其從蔡特進而書爵囊瓦貪以敗國又不能死可賤甚矣故記其出奔特貶而稱人春秋之情見矣庚辰吳入郢及楚人戰則稱爵入郢則舉其號何也君舍于其君之室大夫舍於大夫之室狄道也聖人誰毁誰譽救災恤鄰則進而書爵非有心於與之順天命也乘約肆淫則黜而舉號非有心於貶之奉天討也伐國者固將拯民於水火之中而鳩集之耳殺其父兄係其子弟毁其宗廟遷其重器而亂男女之配也如水益深如火益熱則善小而惡大功不足以掩之矣聖人心無毁譽如鏡之無姸醜也因事物善惡而施褒貶焉不期公而自公爾明此義然後可以司賞罰之權得春秋之法矣皇王大紀卷六十三
